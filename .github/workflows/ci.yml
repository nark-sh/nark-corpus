name: CI

# qt-251 (dogfood Phase B #4): pre-merge YAML validation for nark-corpus.
# Previously the validator existed (scripts/validate-contracts.js) but
# nothing ran it on PRs. A broken YAML could land on main, ship to npm
# via the next release, and break every consumer's scan on `npm install`.
# This workflow runs the validator on every PR + main push.
#
# Local husky pre-push hook in .husky/pre-push runs the same script
# before push reaches the remote — CI is the backstop when contributors
# work in an environment without husky (web editors, codespaces, etc.).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts
        # --ignore-scripts to skip husky install in CI (no .git to hook)

      - name: Validate all contracts against schema
        run: npm run validate
