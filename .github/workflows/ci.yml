name: CI

# qt-251 (dogfood Phase B #4): pre-merge YAML validation for nark-corpus.
# Previously the validator existed (scripts/validate-contracts.js) but
# nothing ran it on PRs. A broken YAML could land on main, ship to npm
# via the next release, and break every consumer's scan on `npm install`.
# This workflow runs the validator on every PR + main push.
#
# Local husky pre-push hook in .husky/pre-push runs the same script
# before push reaches the remote — CI is the backstop when contributors
# work in an environment without husky (web editors, codespaces, etc.).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        # No `cache: npm`: package-lock.json is gitignored in this repo
        # because the workspace dev setup produces a lockfile referencing
        # ../../behavioral-contracts-saas/node_modules/.pnpm/... paths,
        # which break `npm ci` outside the workspace. See .gitignore.

      - name: Install dependencies
        run: npm install --ignore-scripts --no-package-lock
        # --ignore-scripts to skip husky install in CI (no .git to hook).
        # --no-package-lock because the workspace dev setup produces a
        # broken lockfile; re-resolving against package.json on every CI
        # run is the cost of the workspace coupling. devDeps are 3 small
        # packages (ajv, husky, yaml) — install completes in <2s.

      - name: Validate all contracts against schema
        run: npm run validate
