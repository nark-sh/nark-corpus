name: Notify marketing rebuild

# Fires the marketing-site Vercel deploy hook whenever the corpus
# changes. This is the auto-update signal that drives www.nark.sh/profiles/*
# — every push to main rebuilds the marketing site so new or updated
# profiles surface within minutes.
#
# Why this lives in the corpus repo (not the marketing repo):
# the corpus IS the data source. Marketing rebuilds when corpus
# changes; corpus rebuilds run elsewhere. Coupling the trigger to
# the data source keeps the signal honest.
#
# The bc-publish-packages skill ALSO fires this hook on npm publish,
# but most corpus commits don't publish — this workflow catches
# commits that bump last_verified, fix typos, or land new profiles
# between releases.
#
# Setup: add VERCEL_MARKETING_DEPLOY_HOOK_URL to this repo's secrets
# (Settings → Secrets and variables → Actions → New repository secret).
# The URL is minted in the marketing project on Vercel:
# Settings → Git → Deploy Hooks → Create Hook (branch: main).

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "schema/**"
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fire Vercel deploy hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_MARKETING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::warning::VERCEL_MARKETING_DEPLOY_HOOK_URL is not set; skipping marketing rebuild."
            exit 0
          fi
          response=$(curl -sS -o /tmp/response.json -w "%{http_code}" -X POST "$HOOK_URL")
          if [ "$response" = "200" ] || [ "$response" = "201" ]; then
            echo "Deploy hook fired successfully (HTTP $response)."
            cat /tmp/response.json
          else
            echo "::error::Deploy hook returned HTTP $response"
            cat /tmp/response.json
            exit 1
          fi
