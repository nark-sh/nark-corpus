  - name: tool
    import_path: "ai"
    # Evidence: seen in 180 primary firings across 14 repos in scan-ai-2026-04-01.json
    # Highest violation count — tool.execute missing try-catch is most common error
    description: "Defines a tool/function that can be called by the LLM during generation."

    postconditions:
      - id: tool-execution-error
        maturity: stable
        condition: "Tool function throws an error during execution"
        throws: "Error from tool function execution"
        required_handling: >
          Caller MUST wrap tool.execute in try-catch to handle execution errors.
          Tool errors should be reported back to the model appropriately.
        detector: >
          This postcondition applies only to the execute property of a tool() call:
          tool({ execute: async (args) => { /* must have try-catch here */ } }).
          It does NOT apply to standalone exported async functions or utility helpers
          that are not directly used as the execute property of an AI SDK tool().
          If the function is an inner utility called from another function, the
          postcondition should apply at the calling layer, not the inner function.
          Common FP: files exporting standalone async arrow functions that are
          passed as tool execute callbacks by the caller — the scanner fires on the
          exported function, but the try-catch responsibility lies with the wrapper.
        sources:
          - "https://ai-sdk.dev/docs/ai-sdk-core/tools-and-tool-calling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

