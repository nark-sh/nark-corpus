package: ai
semver: ">=2.0.0 <7.0.0"
contract_version: "2.2.0"
maintainer: "agent-001"
last_verified: "2026-06-23"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.94  # 14 of 15 in-scope async-callable functions covered. 2026-06-23 deepen pass re-enumerated against ai@6.0.209 and added ToolLoopAgent (agent.generate/.stream), validateUIMessages, and createUIMessageStream. Intentionally omitted: experimental_generateVideo (still experimental, mirrors generateImage error model). UI message stream auxiliaries (callCompletionApi, createAgentUIStream, readUIMessageStream, convertFileListToFileUIParts, parsePartialJson, consumeStream) are call-site-thin wrappers whose error contracts collapse to APICallError / TypeValidationError covered upstream — no separate postconditions add net value.
# FP note (2026-04-17): Violations are frequently reported on:
# 1. Inner utility/helper functions called from a caller that handles the error.
#    These are FPs — the postcondition applies to the outermost call site that
#    does not have error handling, not to every helper in the call chain.
# 2. Eval/scoring functions (e.g., lib/evals/scorers/*, lib/catalog/*) that run
#    AI calls in batch test pipelines where the harness handles errors.
# 3. Tool execute callbacks exported as standalone functions and composed at the
#    tool() call site — the execute property caller bears the try-catch responsibility.
# Downstream FP classification: if the function's only callers wrap it in try-catch,
# the violation at the inner function is a FP.

functions:
