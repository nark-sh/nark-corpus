    import_path: "ai"
    # Evidence: seen in 52 primary firings across 20 repos in scan-ai-2026-04-01.json
    # Top affected: 20 repos with unprotected generateText() calls
    description: "Generates text using an LLM model. Waits for complete response before returning."

    postconditions:
      - id: api-error-rate-limit
        maturity: stable
        condition: "API provider returns 429 (rate limit exceeded)"
        throws: "Error with API error details"
        required_handling: >
          Caller MUST wrap in try-catch and implement retry logic with exponential backoff.
          Check error response for Retry-After header. Consider using maxRetries parameter.
        sources:
          - "https://ai-sdk.dev/docs/ai-sdk-core/generating-text"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

