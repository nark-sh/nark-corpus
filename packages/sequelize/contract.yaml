package: sequelize
semver: ">=6.28.1"
contract_version: "2.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: partial

# CRITICAL SECURITY NOTE:
# sequelize has 6 CVEs in versions < 6.28.1:
# - CVE-2023-25813 (CVSS 10.0): SQL Injection via replacements + where
# - CVE-2023-22578 (CVSS 8.1): Special character filtering bypass
# - CVE-2019-10752 (CVSS 7.5): JSON path SQL injection
# - CVE-2019-10748 (CVSS 7.5): JSON path keys injection
# - CVE-2019-10749 (CVSS 7.5): JSON Path Key Handler injection
# - CVE-2023-22580 (CVSS 5.3): Information exposure
#
# MINIMUM VERSION: 6.28.1 (includes all security fixes)
# RECOMMENDED VERSION: 6.37.7 (latest stable)
#
# Common production bugs:
# 1. Not handling UniqueConstraintError specifically - MOST COMMON
# 2. Missing transaction rollback in unmanaged transactions - CRITICAL
# 3. Not checking ValidationError.errors array - VERY COMMON
# 4. Using sync() in production - CATASTROPHIC (data loss)

detection:
  class_names: ["Sequelize", "Model", "QueryInterface"]
  type_names: ["Sequelize", "Model", "ModelStatic", "Transaction"]
  factory_methods: []
  require_instance_tracking: true

  await_patterns:
    # Connection
    - ".authenticate("
    - ".sync("
    - ".close("

    # Query operations
    - ".findall("
    - ".findone("
    - ".findbypk("
    - ".findandcountall("
    - ".findorcreate("
    - ".create("
    - ".bulkcreate("
    - ".upsert("
    - ".update("
    - ".destroy("
    - ".count("
    - ".restore("
    - ".increment("
    - ".decrement("
    - ".truncate("
    - ".aggregate("
    - ".max("
    - ".min("
    - ".sum("

    # Instance operations
    - ".save("
    - ".reload("
    - ".validate("

    # Transaction operations
    - ".transaction("
    - ".commit("
    - ".rollback("

    # Raw queries
    - ".query("

functions:
  - name: authenticate
    import_path: "sequelize"
    description: "Tests database connection"
    postconditions:
      - id: connection-failure
        condition: "Cannot connect to database (wrong credentials, host unreachable, etc.)"
        throws: "ConnectionError, ConnectionRefusedError, HostNotFoundError"
        required_handling: >
          Caller MUST catch connection errors.
          Common causes: wrong credentials, database down, network issues.
          Implement retry with exponential backoff for transient issues.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/getting-started/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: query
    import_path: "sequelize"
    description: "Executes raw SQL query"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error"
        throws: "DatabaseError with original SQL error from underlying driver"
        required_handling: >
          Caller MUST validate SQL syntax before execution.
          DO NOT retry - indicates SQL syntax error.
          Check error.original for underlying driver error.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/raw-queries/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: constraint-violation
        condition: "Unique constraint, foreign key, or NOT NULL violation"
        throws: "UniqueConstraintError, ForeignKeyConstraintError, ValidationError"
        required_handling: >
          Caller MUST handle constraint violations gracefully.
          UniqueConstraintError: extract fields from error.fields.
          ForeignKeyConstraintError: check error.index.
          DO NOT retry without fixing data.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/validations-and-constraints/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-error
        condition: "Connection lost during query execution"
        throws: "ConnectionError, TimeoutError"
        required_handling: >
          Caller MUST handle connection errors separately from query errors.
          Implement retry with exponential backoff for transient connection issues.
        sources:
          - "https://sequelize.org/docs/v6/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: findAll
    import_path: "sequelize"
    description: "Finds all records matching criteria"
    postconditions:
      - id: query-failure
        condition: "Network error, timeout, or invalid query"
        throws: "DatabaseError, ConnectionError, TimeoutError"
        required_handling: >
          Caller MUST catch query errors.
          Network errors may be transient and retriable.
          Invalid query errors should not be retried.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-basics/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: findOne
    import_path: "sequelize"
    description: "Finds single record matching criteria"
    postconditions:
      - id: query-failure
        condition: "Network error, timeout, or invalid query"
        throws: "DatabaseError, ConnectionError, TimeoutError"
        required_handling: >
          Caller MUST catch query errors.
          Returns null if no record matches (not an error).
          Network errors may be transient and retriable.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-basics/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: findByPk
    import_path: "sequelize"
    description: "Finds record by primary key"
    postconditions:
      - id: query-failure
        condition: "Network error or timeout"
        throws: "DatabaseError, ConnectionError, TimeoutError"
        required_handling: >
          Caller MUST catch query errors.
          Returns null if record not found (not an error).
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-finders/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: create
    import_path: "sequelize"
    description: "Inserts new record into database"
    postconditions:
      - id: unique-constraint
        condition: "Unique constraint violation"
        throws: "UniqueConstraintError with fields and error.errors array"
        required_handling: >
          Caller MUST catch unique constraint errors.
          Extract conflicting fields from error.fields.
          DO NOT retry without changing unique field values.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/validations-and-constraints/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: validation-error
        condition: "Model validation fails (NOT NULL, data type, etc.)"
        throws: "ValidationError with error.errors array"
        required_handling: >
          Caller MUST validate data before insert.
          Check error.errors for list of validation failures.
          DO NOT retry without fixing validation issues.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/validations-and-constraints/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: foreign-key-constraint
        condition: "Foreign key constraint violation"
        throws: "ForeignKeyConstraintError"
        required_handling: >
          Caller MUST verify referenced record exists before insertion.
          DO NOT retry - indicates data integrity issue.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/validations-and-constraints/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: unique-constraint-not-handled
        description: >
          MOST COMMON PRODUCTION BUG: Not handling UniqueConstraintError specifically.
          Results in generic 500 errors for duplicate entries (like email registration).
          ALWAYS check error.name === 'SequelizeUniqueConstraintError' and return 400.
          Alternative: Use Model.findOrCreate() to avoid the error entirely.
        sources:
          - "https://github.com/sequelize/sequelize/issues/6762"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: validation-errors-array-not-checked
        description: >
          VERY COMMON: Not iterating error.errors array for ValidationError.
          Each item in error.errors contains: message, type, path, value, validatorKey.
          Checking only error.message loses all validation details.
        sources:
          - "https://github.com/sequelize/sequelize/issues/9249"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: update
    import_path: "sequelize"
    description: "Updates existing records"
    postconditions:
      - id: update-failure
        condition: "Network error, validation error, or constraint violation"
        throws: "DatabaseError, ValidationError, UniqueConstraintError"
        required_handling: >
          Caller MUST catch update errors.
          Validation errors: check error.errors array.
          Constraint violations: DO NOT retry without fixing data.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-basics/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: destroy
    import_path: "sequelize"
    description: "Deletes records from database"
    postconditions:
      - id: delete-failure
        condition: "Network error or foreign key constraint"
        throws: "DatabaseError, ForeignKeyConstraintError"
        required_handling: >
          Caller MUST catch delete errors.
          Foreign key errors: child records may still reference this record.
          Deleting non-existent record is NOT an error (returns 0).
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-basics/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: transaction
    import_path: "sequelize"
    description: "Executes operations within transaction"
    postconditions:
      - id: transaction-failure
        condition: "Deadlock, timeout, or constraint violation during transaction"
        throws: "DatabaseError, TimeoutError, UniqueConstraintError, etc."
        required_handling: >
          Caller MUST catch transaction errors and handle rollback.
          Sequelize auto-rollbacks on error in managed transactions.
          For unmanaged transactions, caller must explicitly rollback.
          Deadlocks may be transient and retriable.
        sources:
          - "https://sequelize.org/docs/v6/other-topics/transactions/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: missing-transaction-rollback
        description: >
          CRITICAL: Forgetting to rollback unmanaged transactions on error causes
          connection pool exhaustion. ALWAYS use try-catch-finally pattern:
          const t = await sequelize.transaction();
          try { await operations(t); await t.commit(); }
          catch (e) { await t.rollback(); throw e; }
          RECOMMENDED: Use managed transactions (auto-rollback on error).
        sources:
          - "https://github.com/sequelize/sequelize/issues/3355"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: deadlock-retry-missing
        description: >
          Database deadlocks are transient errors that should be retried.
          Check if error.original?.code === 'ER_LOCK_DEADLOCK' (MySQL) or
          error.original?.code === '40P01' (Postgres) and retry the transaction
          with exponential backoff.
        sources:
          - "https://dev.to/anonyma/how-to-retry-transactions-in-sequelize-5h5c"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sync
    import_path: "sequelize"
    description: "Synchronizes model definitions with database"
    postconditions:
      - id: sync-failure
        condition: "Schema mismatch, permission denied, or connection error"
        throws: "DatabaseError, ConnectionError"
        required_handling: >
          Caller MUST catch sync errors.
          NEVER use sync() in production - use migrations instead.
          sync() can drop and recreate tables - data loss risk.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-basics/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: sync-production-danger
        description: >
          CATASTROPHIC: NEVER use sync() in production, especially sync({ force: true }).
          It drops and recreates tables, causing permanent data loss. Use migrations
          instead (Sequelize CLI: sequelize-cli). This is the #1 disaster scenario.
        sources:
          - "https://github.com/sequelize/sequelize/issues/2670"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: count
    import_path: "sequelize"
    description: "Counts records matching criteria"
    postconditions:
      - id: count-failure
        condition: "Network error, timeout, or invalid query"
        throws: "DatabaseError, ConnectionError, TimeoutError"
        required_handling: >
          Caller MUST catch count errors.
          Network errors may be transient and retriable.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-basics/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # ── HIGH PRIORITY: Bulk & Upsert Operations ──

  - name: bulkCreate
    import_path: "sequelize"
    description: "Inserts multiple records in a single query"
    postconditions:
      - id: unique-constraint
        condition: "One or more records violate unique constraint"
        throws: "UniqueConstraintError — entire batch fails unless ignoreDuplicates option is set"
        required_handling: >
          Caller MUST catch UniqueConstraintError.
          Use ignoreDuplicates: true to skip duplicates without throwing.
          Use updateOnDuplicate to upsert instead of error.
          Without these options, entire batch fails on first duplicate.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-basics/#creating-in-bulk"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: validation-error
        condition: "One or more records fail model validation"
        throws: "AggregateError containing ValidationError for each failed record"
        required_handling: >
          Caller MUST catch validation errors.
          Use validate: true (default) to validate all records before insert.
          Check error.errors for individual validation failures.
          Partial inserts may occur if validate option is false.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/validations-and-constraints/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-error
        condition: "Connection lost during bulk insert"
        throws: "ConnectionError, TimeoutError"
        required_handling: >
          Caller MUST handle connection errors.
          Large bulk inserts are more likely to timeout.
          Consider chunking into smaller batches.
        sources:
          - "https://sequelize.org/docs/v6/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: findOrCreate
    import_path: "sequelize"
    description: "Finds a record matching criteria or creates one if not found"
    postconditions:
      - id: unique-constraint-race
        condition: "Race condition: concurrent findOrCreate calls create duplicate"
        throws: "UniqueConstraintError when two concurrent calls both try to create"
        required_handling: >
          Caller MUST catch UniqueConstraintError even though findOrCreate
          is designed to avoid it. Under concurrency, two calls may both
          fail the find and both attempt create. Retry the findOrCreate
          on UniqueConstraintError. Returns [instance, created] tuple.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-finders/#findorcreate"
          - "https://github.com/sequelize/sequelize/issues/4631"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: validation-error
        condition: "Defaults fail model validation"
        throws: "ValidationError"
        required_handling: >
          Caller MUST catch ValidationError.
          The defaults object is used for creation — validate it.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/validations-and-constraints/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: findAndCountAll
    import_path: "sequelize"
    description: "Finds all records matching criteria and returns total count (pagination)"
    postconditions:
      - id: query-failure
        condition: "Network error, timeout, or invalid query"
        throws: "DatabaseError, ConnectionError, TimeoutError"
        required_handling: >
          Caller MUST catch query errors.
          Returns { count, rows }. count is total matching records,
          rows is the current page. Network errors may be transient.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-finders/#findandcountall"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: upsert
    import_path: "sequelize"
    description: "Inserts or updates a single record (INSERT ... ON CONFLICT UPDATE)"
    postconditions:
      - id: validation-error
        condition: "Record fails model validation"
        throws: "ValidationError"
        required_handling: >
          Caller MUST catch ValidationError.
          Validate data before upsert. Check error.errors array.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-basics/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-error
        condition: "Connection lost during upsert"
        throws: "DatabaseError, ConnectionError, TimeoutError"
        required_handling: >
          Caller MUST handle connection errors.
          Upsert is atomic but connection loss mid-query is possible.
        sources:
          - "https://sequelize.org/docs/v6/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # ── HIGH PRIORITY: Instance & Connection Methods ──

  - name: save
    import_path: "sequelize"
    description: "Persists instance changes to database (INSERT or UPDATE)"
    postconditions:
      - id: unique-constraint
        condition: "Unique constraint violation on save"
        throws: "UniqueConstraintError"
        required_handling: >
          Caller MUST catch UniqueConstraintError.
          save() performs INSERT for new instances and UPDATE for existing ones.
          Both can trigger unique constraint violations.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-instances/#updating-an-instance"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: validation-error
        condition: "Model validation fails on save"
        throws: "ValidationError with error.errors array"
        required_handling: >
          Caller MUST catch ValidationError.
          save() runs model validations before persisting.
          Check error.errors for individual validation failures.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/validations-and-constraints/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: optimistic-lock-error
        condition: "Concurrent modification detected (optimistic locking)"
        throws: "OptimisticLockError when version column mismatch"
        required_handling: >
          Caller MUST catch OptimisticLockError if model uses version column.
          Reload instance and retry or inform user of conflict.
        sources:
          - "https://sequelize.org/docs/v6/other-topics/optimistic-locking/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: close
    import_path: "sequelize"
    description: "Closes all database connections in the pool"
    postconditions:
      - id: close-failure
        condition: "Error while closing connection pool"
        throws: "Error — underlying driver error during pool shutdown"
        required_handling: >
          Caller MUST catch close errors during graceful shutdown.
          Failing to close leaks database connections.
          Call close() in process exit handlers (SIGTERM, SIGINT).
          After close(), all queries will fail with ConnectionError.
        sources:
          - "https://sequelize.org/docs/v6/getting-started/#closing-the-connection"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # ── MED PRIORITY: Static Methods ──

  - name: restore
    import_path: "sequelize"
    description: "Restores soft-deleted records (paranoid mode)"
    postconditions:
      - id: restore-failure
        condition: "Network error or record not found"
        throws: "DatabaseError, ConnectionError"
        required_handling: >
          Caller MUST catch restore errors.
          Only works on models with paranoid: true.
          Restoring non-existent record is not an error (updates 0 rows).
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/paranoid/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: increment
    import_path: "sequelize"
    description: "Atomically increments one or more columns"
    postconditions:
      - id: increment-failure
        condition: "Network error, invalid column, or record not found"
        throws: "DatabaseError, ConnectionError"
        required_handling: >
          Caller MUST catch increment errors.
          Increment is atomic at the database level.
          Static version increments all matching records.
          Instance version increments the specific record.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-instances/#incrementing-and-decrementing-integer-values"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: decrement
    import_path: "sequelize"
    description: "Atomically decrements one or more columns"
    postconditions:
      - id: decrement-failure
        condition: "Network error, invalid column, or record not found"
        throws: "DatabaseError, ConnectionError"
        required_handling: >
          Caller MUST catch decrement errors.
          Decrement is atomic at the database level.
          Does NOT prevent negative values — add check constraints if needed.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-instances/#incrementing-and-decrementing-integer-values"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: truncate
    import_path: "sequelize"
    description: "Deletes all records from the table (TRUNCATE)"
    postconditions:
      - id: truncate-failure
        condition: "Foreign key constraint prevents truncation"
        throws: "DatabaseError, ForeignKeyConstraintError"
        required_handling: >
          Caller MUST catch truncate errors.
          TRUNCATE fails if other tables reference this table via FK.
          Use cascade: true option to truncate dependent tables.
          DANGEROUS in production — use with extreme caution.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-querying-basics/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # ── MED PRIORITY: Instance Methods ──

  - name: reload
    import_path: "sequelize"
    description: "Refreshes instance data from database"
    postconditions:
      - id: reload-deleted
        condition: "Record was deleted from database since last fetch"
        throws: "InstanceError — record no longer exists"
        required_handling: >
          Caller MUST catch errors when reloading.
          If the record was deleted between fetch and reload,
          Sequelize throws an error. Check instance existence first.
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/model-instances/#reloading-an-instance"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validate
    import_path: "sequelize"
    description: "Runs model validations without saving to database"
    postconditions:
      - id: validation-failure
        condition: "One or more model validations fail"
        throws: "ValidationError with error.errors array"
        required_handling: >
          Caller MUST catch ValidationError.
          validate() runs all model-level validations.
          Does NOT touch the database — only checks in-memory state.
          Useful for pre-flight validation before save().
        sources:
          - "https://sequelize.org/docs/v6/core-concepts/validations-and-constraints/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

