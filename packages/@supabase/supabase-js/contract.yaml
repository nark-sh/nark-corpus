        condition: >
          Project has "Secure password change" enabled and the user's session is
          older than the reauthentication window (typically 24h). updateUser({ password })
          requires calling reauthenticate() first to receive a nonce, then passing
          { password, nonce } to updateUser().
        throws: "AuthApiError with error.code='reauthentication_needed'"
        required_handling: >
          Caller MUST check { error.code === 'reauthentication_needed' } and
