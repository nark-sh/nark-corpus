package: "@supabase/supabase-js"
semver: ">=2.0.0 <3.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
# Evidence: 59 violations across 8/34 repos (24%) in scan-supabase-supabase-js-2026-04-02.json
# Top affected: srizzon/git-city (⭐ 4331), astriaai/headshots-starter (⭐ 4454)
# Most violated: from (30 violations, 8 repos), select (22 violations, 7 repos)
evidence_quality: confirmed
coverage_score: 0.62  # 13/21 callable API functions (post-deepen pass 2026-04-02)

detection:
  factory_methods:
    - createClient

functions:
  - name: signUp
    import_path: "@supabase/supabase-js"
    description: "Creates a new user account"

    postconditions:
      - id: weak-password
        condition: "Password does not meet strength requirements"
        throws: "AuthApiError with error.message about password strength"
        required_handling: >
          Caller MUST validate password strength before signup.
          Display user-friendly error with password requirements.
          DO NOT retry without user changing password.
        sources:
          - "https://supabase.com/docs/guides/auth/debugging/error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: user-already-exists
        condition: "Email already registered"
        throws: "AuthApiError with error related to duplicate user"
        required_handling: >
          Caller MUST handle duplicate user gracefully.
          Provide clear error message to user.
          Consider redirecting to login page.
        sources:
          - "https://supabase.com/docs/guides/auth/debugging/error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: rate-limit-exceeded
        condition: "Too many signup attempts (429)"
        throws: "AuthApiError with status 429"
        required_handling: >
          Caller MUST handle rate limit errors gracefully.
          Implement exponential backoff.
          Show user-friendly message about trying again later.
          DO NOT automatically retry - may indicate abuse.
        sources:
          - "https://supabase.com/docs/guides/auth/troubleshooting"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: server-error
        condition: "Auth server degraded (500)"
        throws: "AuthApiError with status 500"
        required_handling: >
          500 errors typically indicate issues with database or SMTP provider.
          Retry with exponential backoff.
          Check logs for database triggers or SMTP issues.
          Alert operations if persistent.
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/resolving-500-status-authentication-errors-7bU5U8"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

    edge_cases:
      - id: email-confirmation
        description: "By default, users must confirm email before login. Handle unconfirmed state gracefully."
        sources:
          - "https://supabase.com/docs/guides/auth/troubleshooting"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: signInWithPassword
    import_path: "@supabase/supabase-js"
    description: "Signs in a user with email and password"

    postconditions:
      - id: invalid-credentials
        condition: "Email or password incorrect"
        throws: "AuthApiError with error about invalid credentials"
        required_handling: >
          Caller MUST handle invalid credentials gracefully.
          DO NOT specify whether email or password was wrong (security).
          Implement rate limiting to prevent brute force attacks.
          Consider account lockout after multiple failures.
        sources:
          - "https://supabase.com/docs/guides/auth/debugging/error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: rate-limit-exceeded
        condition: "Too many login attempts (429)"
        throws: "AuthApiError with status 429"
        required_handling: >
          Handle rate limit errors with user-friendly message.
          This often indicates potential abuse.
          Consider CAPTCHA or additional verification.
        sources:
          - "https://supabase.com/docs/guides/auth/debugging/error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: user-not-confirmed
        condition: "User hasn't confirmed email"
        throws: "AuthApiError indicating email not confirmed"
        required_handling: >
          Redirect user to email confirmation flow.
          Provide option to resend confirmation email.
        sources:
          - "https://supabase.com/docs/guides/auth/troubleshooting"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: server-error
        condition: "Auth server error (500)"
        throws: "AuthApiError with status 500"
        required_handling: "Retry with exponential backoff. Check database and SMTP provider health."
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/resolving-500-status-authentication-errors-7bU5U8"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: from
    import_path: "@supabase/supabase-js"
    description: "Initiates query builder for a table (builder entry point)"

    postconditions:
      - id: table-not-found
        condition: "Table does not exist"
        throws: "Error indicating table not found"
        required_handling: >
          Verify table name is correct.
          Ensure migrations have been applied.
        sources:
          - "https://supabase.com/docs/guides/database/tables"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: select
    import_path: "@supabase/supabase-js"
    description: "Queries data from a table (can be chained after from())"

    postconditions:
      - id: rls-policy-violation
        condition: "Row Level Security policy denies access (42501)"
        throws: "Error with code '42501' or status 403"
        required_handling: >
          Caller MUST handle RLS policy violations gracefully.
          This indicates user doesn't have permission to access data.
          CRITICAL: Ensure RLS policies are configured for all tables.
          Using anon or authenticated role without RLS is a MAJOR security risk.
          Return empty result or access denied message to user.
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/database-api-42501-errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: column-access-denied
        condition: "Column-level RLS denies access to specific columns"
        throws: "Error with code '42501' when using select *"
        required_handling: >
          Avoid using select * if column-level RLS is configured.
          Explicitly select only columns user should access.
          Handle 42501 errors by selecting subset of columns.
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/database-api-42501-errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: connection-error
        condition: "Database connection failed"
        throws: "Network or connection error"
        required_handling: >
          Implement retry with exponential backoff.
          Check database health status.
          Alert operations if persistent.
        sources:
          - "https://supabase.com/docs/reference/javascript/v1"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

    edge_cases:
      - id: service-role-bypasses-rls
        description: "Client initialized with service_role key ALWAYS bypasses RLS. NEVER use service_role in client-side code."
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/why-is-my-service-role-key-client-getting-rls-errors-or-not-returning-data-7_1K9z"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: rls-not-enabled-by-default
        description: "RLS is NOT enabled by default on new tables. Always enable RLS and create policies."
        sources:
          - "https://supabase.com/docs/guides/database/postgres/row-level-security"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: insert
    import_path: "@supabase/supabase-js"
    description: "Inserts data into a table"

    postconditions:
      - id: rls-policy-violation
        condition: "RLS policy denies insert permission (42501)"
        throws: "Error with code '42501'"
        required_handling: >
          Ensure RLS policies allow INSERT for user's role.
          Check if user is authenticated if policy requires it.
          Return clear error about insufficient permissions.
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/database-api-42501-errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: unique-constraint-violation
        condition: "Unique constraint violated (23505)"
        throws: "Error with code '23505'"
        required_handling: >
          Handle duplicate key violations gracefully.
          Check if record already exists before inserting.
          Return user-friendly error message.
        sources:
          - "https://supabase.com/docs/reference/javascript/v1"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: foreign-key-violation
        condition: "Foreign key constraint violated (23503)"
        throws: "Error with code '23503'"
        required_handling: >
          Verify referenced records exist before insert.
          DO NOT retry without fixing data integrity issue.
        sources:
          - "https://supabase.com/docs/reference/javascript/v1"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: connection-error
        condition: "Database connection failed"
        throws: "Network error"
        required_handling: "Retry with exponential backoff"
        sources:
          - "https://supabase.com/docs/reference/javascript/v1"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

    edge_cases:
      - id: returning-minimal-for-rls
        description: "If RLS blocks select after insert, set returning: 'minimal' to avoid error"
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/why-is-my-service-role-key-client-getting-rls-errors-or-not-returning-data-7_1K9z"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: update
    import_path: "@supabase/supabase-js"
    description: "Updates data in a table"

    postconditions:
      - id: rls-policy-violation
        condition: "RLS policy denies update permission (42501)"
        throws: "Error with code '42501'"
        required_handling: >
          Ensure RLS policies allow UPDATE for user.
          Verify user owns the record if policy checks ownership.
          Return insufficient permissions error.
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/database-api-42501-errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: record-not-found
        condition: "No records match the update criteria"
        returns: "Empty data array"
        required_handling: >
          Check if returned data array is empty.
          This may indicate record doesn't exist or RLS filters it out.
          Distinguish between "not found" and "no permission".
        sources:
          - "https://supabase.com/docs/reference/javascript/v1"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: unique-constraint-violation
        condition: "Update would violate unique constraint (23505)"
        throws: "Error with code '23505'"
        required_handling: "Check for conflicts before updating. DO NOT retry."
        sources:
          - "https://supabase.com/docs/reference/javascript/v1"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: delete
    import_path: "@supabase/supabase-js"
    description: "Deletes data from a table"

    postconditions:
      - id: rls-policy-violation
        condition: "RLS policy denies delete permission (42501)"
        throws: "Error with code '42501'"
        required_handling: >
          Ensure RLS policies allow DELETE for user.
          Verify user owns the record if policy checks ownership.
        sources:
