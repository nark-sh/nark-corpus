        throws: "Error with code '42501' or status 403"
        required_handling: >
          Caller MUST handle RLS policy violations gracefully.
          This indicates user doesn't have permission to access data.
          CRITICAL: Ensure RLS policies are configured for all tables.
          Using anon or authenticated role without RLS is a MAJOR security risk.
          Return empty result or access denied message to user.
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/database-api-42501-errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: column-access-denied
        condition: "Column-level RLS denies access to specific columns"
        throws: "Error with code '42501' when using select *"
        required_handling: >
          Avoid using select * if column-level RLS is configured.
          Explicitly select only columns user should access.
          Handle 42501 errors by selecting subset of columns.
        sources:
          - "https://supabase.com/docs/guides/troubleshooting/database-api-42501-errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

