  - name: storage.download
    import_path: "@supabase/supabase-js"
    description: >
      Downloads a file from a Supabase Storage bucket. Called as
      supabase.storage.from('bucket').download('path/file.png').
      Returns { data: Blob | null, error: StorageApiError | null }.
      Does NOT throw — wraps all errors in the returned error field.
      Signature confirmed at storage-js/dist/index.d.cts (supabase-js@2.108.2).

    postconditions:
      # Evidence: https://supabase.com/docs/reference/javascript/storage-from-download
      # StorageApiError class from @supabase/storage-js/src/lib/common/errors.ts.
      # Status codes confirmed from StorageApiError constructor.
      - id: storage-download-not-found
        condition: "The file at the specified path does not exist in the bucket"
        throws: "StorageApiError with error.status=404 and error.message containing 'Object not found' or 'not_found'"
        required_handling: >
          Caller MUST check { error } before treating data as a valid file blob.
          A null data with no error is also possible — handle both cases.
          Show user a clear "file not found" message. DO NOT retry — the file
          will not appear by retrying.
          For user-uploaded content, verify the database row still references this
          path (file rows can outlive deleted storage objects).
        sources:
          - "https://supabase.com/docs/reference/javascript/storage-from-download"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: storage-download-unauthorized
        condition: >
          RLS policy denies read access — user is unauthenticated and bucket is private,
          or user lacks the SELECT policy for this object path.
        throws: "StorageApiError with error.status=400 or 403 and error.statusCode containing 'Unauthorized' or RLS-policy text"
        required_handling: >
          Caller MUST check { error } and distinguish 'not found' from 'unauthorized'.
          DO NOT leak the difference to end users — a 'file not found' message for
          both prevents enumeration of private file paths.
          Log the violation server-side for security review if it's unexpected.
        sources:
          - "https://supabase.com/docs/reference/javascript/storage-from-download"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

  - name: storage.createSignedUrl
    import_path: "@supabase/supabase-js"
    description: >
      Generates a time-limited signed URL that grants access to a private file
      without requiring an authenticated client. Called as
      supabase.storage.from('bucket').createSignedUrl('path/file.png', expiresIn).
      Returns { data: { signedUrl, path, token } | null, error: StorageApiError | null }.
      Does NOT throw — wraps all errors in the returned error field.
      Signature confirmed at storage-js/dist/index.d.cts line 1202 (supabase-js@2.108.2).

    postconditions:
      # Evidence: https://supabase.com/docs/reference/javascript/storage-from-createsignedurl
      # StorageApiError class from @supabase/storage-js/src/lib/common/errors.ts.
      - id: storage-signed-url-not-found
        condition: "The file at the specified path does not exist when generating the signed URL"
        throws: "StorageApiError with error.status=400 or 404 and error.message containing 'Object not found'"
        required_handling: >
          Caller MUST check { error } before sharing the signed URL with the requester.
          DO NOT return a signed URL pointing at a missing object — the recipient
          gets a confusing 404 at use-time with no actionable error.
          Surface the missing-file error to the requester immediately so they can
          re-upload or pick a different file.
        sources:
          - "https://supabase.com/docs/reference/javascript/storage-from-createsignedurl"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: storage-signed-url-unauthorized
        condition: >
          The current client lacks permission to sign URLs for this path. Anon clients
          cannot sign URLs for private bucket objects; only the service role and
          authenticated users with appropriate RLS policies can.
        throws: "StorageApiError with error.status=400 or 403 and error.statusCode containing 'Unauthorized'"
        required_handling: >
          Caller MUST check { error } before returning the signed URL.
          Move signed-URL generation to a server-side route (Edge Function, Next.js
          Route Handler) where you can use the service role key safely — generating
          on the client with the anon key fails for any private bucket object.
          DO NOT expose the service role key to the browser to "work around" this.
        sources:
          - "https://supabase.com/docs/reference/javascript/storage-from-createsignedurl"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
