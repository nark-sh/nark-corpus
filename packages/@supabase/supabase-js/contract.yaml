  - name: functions.invoke
    import_path: "@supabase/supabase-js"
    description: >
      Invokes a Supabase Edge Function. Called as supabase.functions.invoke('function-name', options).
      Returns { data: T | null, error: FunctionsError | null }. In practice, errors are RETURNED
      not thrown — but the error field MUST be checked. Three distinct error classes indicate
      different failure modes: function logic errors vs relay errors vs network errors.

    postconditions:
      # Evidence: FunctionsClient.ts invoke() source — all three error types confirmed.
      # FunctionsFetchError, FunctionsRelayError, FunctionsHttpError all extend FunctionsError.
      # Confirmed from @supabase/functions-js/src/types.ts and FunctionsClient.ts.
      - id: functions-invoke-http-error
        condition: "Edge function executed but returned a non-2xx HTTP status (4xx or 5xx)"
        throws: "FunctionsHttpError (name='FunctionsHttpError', extends FunctionsError) — error in { error } field"
        required_handling: >
          Caller MUST check { error } and use instanceof to distinguish error types:
            if (error instanceof FunctionsHttpError) — function ran but returned error response
            if (error instanceof FunctionsRelayError) — Supabase relay failed
            if (error instanceof FunctionsFetchError) — network request failed
          For FunctionsHttpError, read the response body: await error.context.json()
          Distinguishing error types is critical for correct retry logic.
        sources:
          - "https://supabase.com/docs/guides/functions/error-handling"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed

      - id: functions-invoke-relay-error
        condition: "Supabase relay infrastructure cannot reach the edge function (relay-side failure)"
        throws: "FunctionsRelayError (name='FunctionsRelayError', x-relay-error header='true') — error in { error } field"
        required_handling: >
          Caller MUST distinguish FunctionsRelayError from FunctionsHttpError.
          FunctionsRelayError is a Supabase infrastructure problem, NOT a function logic problem.
          These are transient and safe to retry with exponential backoff.
          Alert ops if relay errors persist — may indicate regional outage.
        sources:
          - "https://supabase.com/docs/guides/functions/error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: functions-invoke-fetch-error
        condition: "Network request to edge function failed completely (offline, DNS, timeout)"
        throws: "FunctionsFetchError (name='FunctionsFetchError') — wraps the original fetch error in error.context"
        required_handling: >
          Caller MUST handle FunctionsFetchError as a network-layer failure.
          The function was never reached — no side effects occurred on the function side.
          Safe to retry. Implement exponential backoff with a reasonable timeout (30s).
          Show user a "connection error, retrying..." message for user-initiated operations.
        sources:
          - "https://supabase.com/docs/guides/functions/error-handling"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed
