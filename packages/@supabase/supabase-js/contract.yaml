  - name: storage.upload
    import_path: "@supabase/supabase-js"
    description: >
      Uploads a file to a Supabase Storage bucket. Called as
      supabase.storage.from('bucket-name').upload('path/file.png', fileBody, options).
      Returns { data: { id, path, fullPath }, error: StorageApiError | null }.
      Does NOT throw — wraps all errors in the returned error field.

    postconditions:
      # Evidence: StorageFileApi.ts uploadOrUpdate(), StorageApiError confirmed from
      # @supabase/storage-js/src/lib/common/errors.ts. Error status codes confirmed from
      # StorageApiError constructor (status: number, statusCode: string).
      # Bucket not found = 404, unauthorized = 400/403, duplicate = 409 (upsert=false)
      - id: storage-upload-bucket-not-found
        condition: "The specified bucket does not exist"
        throws: "StorageApiError with error.status=400 or 404 and error.message containing 'Bucket not found'"
        required_handling: >
          Caller MUST check { error } in the upload() response.
          Verify bucket name in the Supabase dashboard.
          DO NOT retry with the same bucket name — this is a configuration error.
          Return a clear error to the user; do not expose bucket names in user-facing messages.
        sources:
          - "https://supabase.com/docs/reference/javascript/storage-from-upload"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed

      - id: storage-upload-unauthorized
        condition: "RLS policy denies upload (user not authenticated or bucket policy blocks write)"
        throws: "StorageApiError with error.status=400 and error.statusCode containing 'Unauthorized' or RLS policy error"
        required_handling: >
          Caller MUST check { error } in the upload() response.
          Verify the user is authenticated before attempting upload.
          Check bucket RLS policies in Storage settings — public buckets allow unauthenticated upload,
          private buckets require a valid session.
          Return a user-facing error: "You must be logged in to upload files."
        sources:
          - "https://supabase.com/docs/reference/javascript/storage-from-upload"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
