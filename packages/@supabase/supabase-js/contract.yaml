  - name: signOut
    import_path: "@supabase/supabase-js"
    description: >
      Signs out the current user. In browser context, removes the session from localStorage
      and fires a SIGNED_OUT event. With scope='global', revokes all sessions; 'local' revokes
      only the current session; 'others' revokes other sessions but fires no SIGNED_OUT event.

    postconditions:
      # Evidence: GoTrueClient source — _signOut() calls admin.signOut(accessToken, scope)
      # and returns { error: AuthError | null }. AuthError subclasses confirmed from
      # @supabase/auth-js/src/lib/errors.ts
      - id: signout-session-missing
        condition: "No active session exists when signOut() is called"
        throws: "AuthSessionMissingError (name='AuthSessionMissingError', status=400)"
        required_handling: >
          Caller MUST check the returned { error } object.
          signOut() does NOT throw — it returns { error }.
          A missing session error on logout is usually safe to ignore (user is already
          effectively signed out), but must be explicitly handled to avoid silent failures
          in session cleanup callbacks. Log the error and proceed with local UI cleanup.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-signout"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

      - id: signout-network-error
        condition: "Network request to Supabase Auth fails (offline, DNS failure, timeout)"
        throws: "AuthRetryableFetchError (name='AuthRetryableFetchError') or AuthError with network cause"
        required_handling: >
          Caller MUST check { error } on the signOut() response.
          On network failure, clear the local session regardless (local cleanup is safe).
          Inform the user that remote session revocation may not have succeeded.
          The JWT remains valid until it expires — this is a known Supabase limitation.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-signout"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: signInWithOAuth
    import_path: "@supabase/supabase-js"
    description: >
      Initiates OAuth sign-in with a third-party provider (Google, GitHub, etc.).
      In browser, triggers a redirect. With PKCE flow, exchanges an authorization code for
      a session. Returns { data: { provider, url }, error } — does not directly return a session.

    postconditions:
      # Evidence: GoTrueClient source line 1172, error-codes.ts: bad_oauth_state, bad_oauth_callback,
      # oauth_provider_not_supported, bad_code_verifier. AuthPKCEGrantCodeExchangeError and
      # AuthPKCECodeVerifierMissingError confirmed from @supabase/auth-js/src/lib/errors.ts
      - id: oauth-provider-not-supported
        condition: "The specified OAuth provider is not enabled in Supabase project settings"
        throws: "AuthApiError with error.code='oauth_provider_not_supported'"
        required_handling: >
          Caller MUST check { error } in the response.
          Display a user-friendly message that this login method is unavailable.
          DO NOT retry automatically — this is a configuration error, not a transient failure.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-signinwithoauth"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: oauth-pkce-code-verifier-missing
        condition: >
          PKCE flow: callback URL reached but code_verifier is missing from storage.
          Happens when auth was initiated in a different browser/tab, user cleared storage,
          or SSR framework stored the verifier incorrectly.
        throws: "AuthPKCECodeVerifierMissingError (name='AuthPKCECodeVerifierMissingError', status=400, code='pkce_code_verifier_not_found')"
        required_handling: >
          Caller MUST check { error } in the exchangeCodeForSession() response.
          Redirect user to the login page with a message to try again from the same browser.
          For SSR frameworks (Next.js, SvelteKit), use @supabase/ssr to store the verifier
          in cookies rather than localStorage to avoid cross-context failures.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-signinwithoauth"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: oauth-bad-callback-state
        condition: "OAuth state parameter mismatch (CSRF protection failure or replay attack)"
        throws: "AuthApiError with error.code='bad_oauth_state' or 'bad_oauth_callback'"
        required_handling: >
          Caller MUST check { error } in the auth callback handler.
          Redirect to login page — do not retry the OAuth flow automatically.
          Log the state mismatch for security review.
          This can be a legitimate security alert if the state was tampered with.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-signinwithoauth"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

  - name: getSession
    import_path: "@supabase/supabase-js"
    description: >
      Returns the current session from in-memory storage. If no session is present and
      autoRefreshToken is enabled, attempts to refresh using the stored refresh token.
      Returns { data: { session: Session | null }, error: AuthError | null }.
      NOTE: Supabase docs warn this is INSECURE on the server — use getUser() for
      server-side auth validation instead.

    postconditions:
      # Evidence: GoTrueClient source line 2604, error-codes.ts: session_expired,
      # refresh_token_not_found, refresh_token_already_used, session_not_found.
      # AuthRetryableFetchError confirmed from @supabase/auth-js/src/lib/errors.ts
      - id: session-refresh-token-expired
        condition: >
          Refresh token is expired or has already been used (rotated). Common after
          long periods of inactivity or if the same refresh token is used twice.
        throws: "AuthApiError with error.code='refresh_token_not_found' or 'refresh_token_already_used' or 'session_expired'"
        required_handling: >
          Caller MUST check { error } in the getSession() response.
          Redirect user to the login page — session cannot be recovered without re-auth.
          Clear any locally cached session state.
          DO NOT retry getSession() — the token is permanently invalid.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-getsession"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: session-network-error
        condition: "Network failure prevents session refresh (offline, Supabase degraded)"
        throws: "AuthRetryableFetchError (name='AuthRetryableFetchError')"
        required_handling: >
          Caller MUST check { error } on the getSession() response.
          AuthRetryableFetchError indicates a transient failure — safe to retry with backoff.
          Show the user an offline/degraded state indicator rather than silently failing.
          Do NOT treat a network error as "no session" — the session may still be valid.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-getsession"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

    edge_cases:
      - id: server-side-insecure
        description: >
          getSession() is explicitly documented as INSECURE on the server because the session
          data comes from the client and cannot be trusted server-side. Use getUser() to
          validate JWT with Supabase Auth server instead for server-side authorization.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-getsession"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: resetPasswordForEmail
