      - id: storage-upload-duplicate-file
        condition: "File already exists at this path and upsert is false (default)"
        throws: "StorageApiError with error.status=409 (Conflict)"
        required_handling: >
          Caller MUST check { error } in the upload() response.
          To overwrite, pass { upsert: true } in fileOptions.
          To avoid conflicts, generate unique paths (UUID prefix) or check for existence first.
          Return a user-facing message: "A file with this name already exists."
        sources:
