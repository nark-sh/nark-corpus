  - name: getUser
    import_path: "@supabase/supabase-js"
    description: >
      Returns the current user by validating the JWT with the Supabase Auth server.
      UNLIKE getSession(), this method is SAFE TO USE ON THE SERVER because it
      verifies the token against the auth server, not just reading from client storage.
      Returns { data: { user: User | null }, error: AuthError | null }.
      Signature confirmed at GoTrueClient.d.ts line 1558 (supabase-js@2.108.2).

    postconditions:
      # Evidence: https://supabase.com/docs/reference/javascript/auth-getuser
      # Error codes from @supabase/auth-js error-codes.ts: session_expired, bad_jwt,
      # user_not_found. AuthRetryableFetchError for transient network failures.
      - id: get-user-session-expired
        condition: >
          The user's session has expired or the JWT is no longer valid (revoked,
          rotated past, or the project's JWT secret was rotated). On the server,
          this is the canonical signal that the request is unauthenticated.
        throws: "AuthApiError with error.code='session_expired', 'bad_jwt', or 'user_not_found' and error.status=401"
        required_handling: >
          Caller MUST check { error } before treating the user as authenticated.
          On the server (Next.js Route Handler / middleware / SvelteKit hooks),
          treat a 401 from getUser() as "not signed in" and return a 401 response
          or redirect to login. DO NOT trust getSession() result without getUser()
          validation — the session may be stale.
          On the client, redirect to /login and clear local auth state.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-getuser"
          - "https://supabase.com/docs/guides/auth/server-side/nextjs"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: critical
        evidence_quality: confirmed

      - id: get-user-network-error
        condition: "Network failure prevents JWT validation with the auth server"
        throws: "AuthRetryableFetchError (name='AuthRetryableFetchError')"
        required_handling: >
          Caller MUST distinguish AuthRetryableFetchError from a real auth failure.
          A network error is NOT the same as "user is not authenticated" —
          treating it as such logs users out during transient outages.
          On the client, retry with exponential backoff (2-3 attempts, jittered).
          On the server (SSR/middleware), return a 503 to the user rather than 401
          — instructing the browser the user state is unknown, not invalid.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-getuser"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

    edge_cases:
      - id: prefer-getuser-on-server
        description: >
          Supabase docs explicitly state that getSession() is INSECURE on the server
          because session data is read from client-controlled storage. For any
          server-side authorization check (Row Level Security gating, role checks,
          API auth), use getUser() — it validates the JWT against the auth server.
        sources:
          - "https://supabase.com/docs/reference/javascript/auth-getuser"
          - "https://supabase.com/docs/guides/auth/server-side/nextjs"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: critical

