package: xml2js
semver: ">=0.5.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-12"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 5 contracted / 5 contractable async-callable (5 sync processor utils omitted; 1 new postcondition added 2026-06-12 pass 3)
# Evidence: scan-xml2js-2026-04-04.json — 2 repos scanned, 0 affected, 0 violations
# 23 repos errored (TS compilation), 2 skipped (no tsconfig)
# FP check: 0/50 repos false-positive-free. FP rate 0%. Confirmed evidence quality.
# Depth pass 2026-04-17: enumerated full API surface from @types/xml2js index.d.ts
# and xml2js/lib/parser.js + builder.js + sax dependency source.
# API surface: 6 callable functions/methods. Contracted: 4. Omitted: 2 (processor utils).
# v1.1.0: Added detection.class_names for Builder and Parser instance tracking.
# Renamed parse-promise-empty-string → parse-promise-null-return so the contract-matcher
# routes it through the null-check path (id.includes("null") condition).
#
# Depth pass 2026-06-12 (deepen-stream-2 pass 3):
# +1 postcondition: parse-promise-validator-throws on parseStringPromise.
# Re-enumerated full surface against @types/xml2js@0.4.x types and xml2js@0.6.2 lib/
# source. API surface unchanged from pass 2: 5 async-callable methods (parseString,
# parseStringPromise, Builder.buildObject, Parser.parseString, Parser.parseStringPromise),
# all 5 still contracted. Depth refinement added: parser.js lines 217-235 show that
# options.validator (if supplied) is invoked inside a try/catch and any thrown value is
# routed through the same emit("error", err) reject path as malformed XML. Distinct
# failure-origin (user-code), shared reject channel, documented discriminator
# (instanceof xml2js.ValidationError). Added as a warning-severity postcondition because
# silent mis-routing of validation failures as parse failures masks business-logic bugs
# in logs. Effective coverage stays at 1.0; postcondition count grew from 8 → 9.
#
# Depth pass 2026-06-12 (deepen-stream-1 pass 2):
# +1 function: Parser.parseString (instance method, callback-based)
# Gap identified: Parser.prototype.parseString (callback form) was uncovered while
# Parser.prototype.parseStringPromise was covered. Both ship with the Parser class and
# share identical sax-js error semantics, but the instance callback form has an
# additional silent-failure failure mode (no-callback path emits an unhandled "error"
# event on the EventEmitter that crashes Node.js — same root cause as module-level
# parse-string-no-callback). Re-enumerated full surface against current @types/xml2js
# declarations (still 0.7.x). After this pass: 5/5 async-callable methods contracted
# (4 previously + Parser.parseString this pass). All 5 processors.* utilities remain
# correctly omitted as pure sync transformers with no error contracts.
# Evidence sources confirmed from:
#   node_modules/@types/xml2js/index.d.ts (Parser class declaration)
#   node_modules/xml2js/lib/parser.js (Parser.prototype.parseString impl, lines around
#     try/catch block calling saxParser.write/close and emit("error", err))
#   https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js

detection:
  class_names:
    - "Builder"
    - "Parser"

functions:
  - name: parseStringPromise
    import_path: "xml2js"
    description: >
      Parse an XML string asynchronously using the Promise API. Returns a JavaScript
      object representation of the XML. Rejects with an Error if the XML is malformed.
      This is the modern preferred API over the callback-based parseString().

    postconditions:
      # Evidence: xml2js/lib/parser.js source — parseStringPromise wraps parseString(cb)
      # which calls saxParser.write().close(), where onerror emits "error" which reject()s
      # the promise. Error objects come from sax-js and are generic Error instances.
      # Source: https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js
      # Source: https://github.com/isaacs/sax-js (sax dependency)
      - id: parse-error-malformed-xml
        condition: "input XML is malformed, non-well-formed, or cannot be parsed by the SAX parser"
        throws: "Error"
        required_handling: >
          Caller MUST wrap parseStringPromise() in try-catch (or .catch()) because it rejects
          with a generic Error when given malformed XML. This is common when parsing XML from
          external APIs or files where the content is not guaranteed to be valid XML.
        sources:
          - "https://raw.githubusercontent.com/Leonidas-from-XIV/node-xml2js/master/README.md"
          - "https://github.com/Leonidas-from-XIV/node-xml2js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: parse-promise-null-return
        condition: "input string is empty or whitespace-only"
        returns: "null (resolves with null, not an object)"
        required_handling: >
          Caller MUST null-check the resolved value before accessing properties.
          When given an empty or whitespace-only string, parseStringPromise() resolves
          with null rather than rejecting. Accessing result.someProperty crashes silently
          as a TypeError in downstream code.
        sources:
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      # Evidence: xml2js/lib/parser.js lines 217-235 — when options.validator is set,
      # the parser invokes the user-supplied callable for each element via a try/catch.
      # If the validator throws (commonly an instance of xml2js.ValidationError but ANY
      # thrown value), the parser does `this.emit("error", err)` which routes the error
      # through the same reject path as a sax-level malformed-XML error. This is a
      # distinct failure-origin (user-code validation logic, not XML well-formedness)
      # that shares the same reject channel — try/catch around parseStringPromise()
      # MUST also cover this case, and an `instanceof ValidationError` discriminator is
      # the documented way to distinguish validation errors from parse errors.
      # Source: https://github.com/Leonidas-from-XIV/node-xml2js#options (validator)
      # Source: https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js#L217-L235
      - id: parse-promise-validator-throws
        condition: "options.validator is supplied and throws (typically ValidationError) for one or more elements"
        throws: "Error (the value the user's validator threw — typically xml2js.ValidationError)"
        required_handling: >
          When using options.validator, callers MUST treat parseStringPromise() as
          potentially throwing two distinct error classes: sax-level XML parse Errors
          AND any error type thrown by the validator callable. Code that only checks
          for malformed-XML cases (e.g. by message-matching) silently mis-routes
          validation errors as parse errors, masking schema/business-rule violations
          as "bad XML" in logs. The documented discriminator is
          `error instanceof xml2js.ValidationError` — but only if the validator
          actually throws a ValidationError (xml2js exports the class but does not
          force its use). Defensive code should branch on instanceof when known.
        sources:
          - "https://github.com/Leonidas-from-XIV/node-xml2js#options"
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js"
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/xml2js.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: parseString
    import_path: "xml2js"
    description: >
      Parse an XML string using the Node.js callback pattern. The callback receives
      (err, result) where err is an Error on parse failure or null on success.
      Most common pattern in legacy Node.js codebases. The error parameter in the
      callback is frequently ignored, leading to silent failures.

    postconditions:
      # Evidence: xml2js/lib/parser.js — parseString(str, cb) registers on("error") handler
      # that calls cb(err). If cb is not provided or ignores first arg, errors are swallowed.
      # Source: https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js
      # sax-js emits error events via strictFail() for: malformed tags, unclosed root,
      # invalid chars, unmatched closing tags, etc.
      - id: parse-string-callback-error-ignored
        condition: "XML is malformed and callback does not check first argument"
        throws: "Error passed as first callback argument"
        required_handling: >
          Caller MUST check the err parameter in the callback before using result.
          Pattern: parseString(xml, function(err, result) { if (err) { /* handle */ return; } /* use result */ }).
          Ignoring err causes the callback to proceed with an undefined result object,
          producing TypeErrors when accessing result properties.
        sources:
          - "https://github.com/Leonidas-from-XIV/node-xml2js#usage"
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: parse-string-no-callback
        condition: "parseString() called without a callback (using it like a synchronous function)"
        throws: "Error event emitted to process, no caller to handle it"
        required_handling: >
          parseString() MUST be called with a callback. Without a callback, parse errors
          emit an unhandled 'error' event on the Parser (which extends EventEmitter),
          crashing Node.js with an uncaught error. Use parseStringPromise() for promise-based code.
        sources:
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: buildObject
    import_path: "xml2js"
    import_class: "Builder"
    description: >
      Synchronously converts a JavaScript object into an XML string. Called on a
      Builder instance: new xml2js.Builder().buildObject(obj). Throws synchronously
      on invalid object structure (null root name, invalid XML characters in keys, etc).
      Commonly called without try-catch since developers expect synchronous functions to be safe.

    postconditions:
      # Evidence: xml2js/lib/builder.js calls xmlbuilder.create(rootName, ...) which
      # throws Error("Root element needs a name.") when rootName is undefined/empty.
      # xmlbuilder/lib/XMLStringifier.js throws Error("Invalid character in name") and
      # Error("Invalid character in string") for non-XML-safe values in keys/values.
      # Source: https://github.com/oozcitak/xmlbuilder-js (xmlbuilder dependency)
      - id: build-object-invalid-root-name
        condition: "rootObj has no keys or rootName option produces an invalid XML element name"
        throws: "Error"
        required_handling: >
          Caller MUST wrap buildObject() in try-catch. When the input object is empty
          or the inferred root name is invalid XML (null, undefined, starts with digit,
          contains invalid chars), xmlbuilder throws "Root element needs a name."
          This is common when building XML from dynamically-shaped data objects.
        sources:
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/builder.js"
          - "https://github.com/oozcitak/xmlbuilder-js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: build-object-invalid-xml-chars
        condition: "object values or keys contain characters illegal in XML (control chars, surrogates)"
        throws: "Error"
        required_handling: >
          Caller MUST wrap buildObject() in try-catch. xmlbuilder validates all element
          names and text content. Keys with XML-illegal characters throw
          "Invalid character in name" and values with illegal characters throw
          "Invalid character in string at index N". Common when serializing user-provided
          data or database content with binary/control characters.
        sources:
          - "https://github.com/oozcitak/xmlbuilder-js/blob/master/lib/XMLStringifier.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Parser.parseStringPromise
    import_path: "xml2js"
    import_class: "Parser"
    description: >
      Instance method on the Parser class equivalent to the module-level parseStringPromise().
      Used when callers need to reuse a configured parser instance across multiple parses.
      Same error behavior as the module-level function: rejects with Error on malformed XML.

    postconditions:
      # Evidence: xml2js/lib/parser.js Parser.prototype.parseStringPromise wraps parseString
      # Same reject path as the module-level function.
      # Source: https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js
      - id: parser-instance-malformed-xml
        condition: "XML input is malformed when using a Parser instance"
        throws: "Error (promise rejection)"
        required_handling: >
          Caller MUST wrap parser.parseStringPromise() in try-catch or use .catch().
          Same error behavior as the module-level parseStringPromise() — rejects with
          an Error from the underlying sax parser. Not wrapping leads to unhandled
          promise rejections crashing Node.js in production.
        sources:
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Parser.parseString
    import_path: "xml2js"
    import_class: "Parser"
    description: >
      Instance method on the Parser class equivalent to the module-level parseString().
      Callback-based: parser.parseString(xml, function(err, result) { ... }). Used when
      callers need to reuse a configured Parser instance (e.g. with explicitArray: false,
      mergeAttrs: true, or custom tagNameProcessors) across many parse calls. Same error
      semantics as the module-level callback form: sax-js errors land in cb(err) for
      malformed XML, and a missing callback emits an unhandled "error" event on the
      Parser EventEmitter that crashes Node.js.

    postconditions:
      # Evidence: node_modules/xml2js/lib/parser.js — Parser.prototype.parseString registers
      # `this.on("end", ...)` and `this.on("error", ...)` against the callback only when cb
      # is a function. The body wraps str.toString() + saxParser.write(str).close() in a
      # try/catch; caught errors are re-emitted via this.emit("error", err) which routes
      # to the cb(err) handler IF cb was provided, otherwise the "error" event is unhandled
      # and Node.js crashes (EventEmitter default for unhandled "error"). The module-level
      # exports.parseString delegates straight to this via `new exports.Parser(options); parser.parseString(...)`.
      # Source: https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js
      - id: parser-instance-parse-string-callback-error-ignored
        condition: "XML is malformed and instance callback does not check first argument"
        throws: "Error passed as first callback argument"
        required_handling: >
          Caller MUST check the err parameter in the callback before using result.
          Pattern: parser.parseString(xml, function(err, result) { if (err) { /* handle */ return; } /* use result */ }).
          Long-lived Parser instances are typically configured once and reused across
          many parse calls in API request handlers — ignoring err here silently corrupts
          downstream processing exactly the same way the module-level parseString does,
          producing TypeErrors when accessing properties of undefined result objects.
        sources:
          - "https://github.com/Leonidas-from-XIV/node-xml2js#usage"
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: parser-instance-parse-string-no-callback
        condition: "Parser.parseString() called without a callback (using it like a synchronous function on the instance)"
        throws: "Error event emitted on Parser EventEmitter, no caller to handle it"
        required_handling: >
          Parser.parseString() MUST be called with a callback. Without a callback, parse
          errors emit an unhandled 'error' event on the Parser instance (which extends
          EventEmitter), crashing Node.js with an uncaught error. Use parser.parseStringPromise()
          for promise-based code instead. This is identical to the module-level
          parseString no-callback failure mode but easier to miss because the Parser
          instance is often constructed far from the parse call site.
        sources:
          - "https://github.com/Leonidas-from-XIV/node-xml2js/blob/master/lib/parser.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
