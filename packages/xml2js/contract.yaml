package: xml2js
semver: ">=0.5.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-04"
status: production
evidence_quality: confirmed
# Evidence: scan-xml2js-2026-04-04.json — 2 repos scanned, 0 affected, 0 violations
# 23 repos errored (TS compilation), 2 skipped (no tsconfig)
# FP check: 0/50 repos false-positive-free. FP rate 0%. Confirmed evidence quality.

functions:
  - name: parseStringPromise
    import_path: "xml2js"
    description: "Parse an XML string asynchronously and return a JavaScript object"

    postconditions:
      - id: parse-error-malformed-xml
        condition: "input XML is malformed, non-well-formed, or cannot be parsed by the SAX parser"
        throws: "Error"
        required_handling: >
          Caller MUST wrap parseStringPromise() in try-catch (or .catch()) because it rejects
          with a generic Error when given malformed XML. This is common when parsing XML from
          external APIs or files where the content is not guaranteed to be valid XML.
        sources:
          - "https://raw.githubusercontent.com/Leonidas-from-XIV/node-xml2js/master/README.md"
          - "https://github.com/Leonidas-from-XIV/node-xml2js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
