package: "posthog-js"
semver: ">=0.0.0"
contract_version: "1.0.0"
maintainer: "nark-sh"
last_verified: "2026-06-11"
coverage_status: "no-async-contract"
researched_at: "2026-06-11"
coverage_rationale: |
  Fire-and-forget analytics SDK. The primary callsites (capture, identify, alias,
  group, reset, register) do not throw or return rejecting promises — they queue
  events to an in-memory buffer and flush them in the background via XHR/fetch
  with internal retry. Failed requests are logged to console but never surface
  to the calling code. No async error contract worth enforcing for static analysis.
  State.json triage (2026-03-24, status: skipped-low-callsite) confirmed in
  2026-06-11 reconcile audit and stubbed for SaaS coverage-page visibility.
