package: cassandra-driver
semver: ">=4.0.0 <5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-06-25"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0

detection:
  class_names: ["Client", "Mapper", "ResultSet"]
  type_names: ["Client", "ClientOptions", "QueryOptions", "ResultSet"]
  factory_methods: []
  require_instance_tracking: true

  await_patterns:
    # Connection
    - ".connect("
    - ".shutdown("

    # Query operations
    - ".execute("
    - ".executeGraph("
    - ".batch("
    - ".stream("

    # Metadata operations
    - ".metadata.getkeyspace("
    - ".metadata.gettable("
    - ".metadata.getTable("
    - ".metadata.refreshKeyspaces("
    - ".metadata.refreshKeyspace("

    # Mapper operations
    - ".get("
    - ".find("
    - ".insert("
    - ".update("
    - ".remove("
    - ".batch("

    # Concurrent operations
    - ".executeConcurrent("

functions:
  - name: connect
    import_path: "cassandra-driver"
    description: "Establishes connection to Cassandra cluster"
    postconditions:
      - id: connection-failure
        condition: "Cannot connect to any contact point in cluster"
        throws: "NoHostAvailableError with details of failed contact points"
        required_handling: >
          Caller MUST handle NoHostAvailableError.
          Common causes:
          - All nodes unreachable
          - Wrong contact points
          - Authentication failure
          Check error.innerErrors for details on each contact point.
          Implement retry with exponential backoff.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/getting-started/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: authentication-failure
        condition: "Invalid credentials"
        throws: "AuthenticationError"
        required_handling: >
          Caller MUST handle authentication errors.
          DO NOT retry with same credentials.
          Verify username/password in connection config.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/auth/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: execute
    import_path: "cassandra-driver"
    description: "Executes CQL query or prepared statement"
    postconditions:
      - id: syntax-error
        condition: "Invalid CQL syntax"
        throws: "ResponseError with code indicating syntax error"
        # Evidence: seen in 1 primary firing across 1 repo in scan-cassandra-driver-2026-04-14.json
        # Top affected: odota/core (⭐ 1601 stars)
        required_handling: >
          Caller MUST validate CQL syntax before execution.
          Common error codes:
          - 0x2000: Syntax error
          - 0x2200: Invalid query
          DO NOT retry - fix CQL syntax.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: unavailable
        condition: "Required replicas unavailable for consistency level"
        throws: "ResponseError with code 0x1000 (Unavailable)"
        required_handling: >
          Caller MUST handle unavailable errors.
          Not enough replicas available for requested consistency level.
          May be transient if nodes are recovering.
          Consider:
          1. Retry with exponential backoff
          2. Lower consistency level (if acceptable)
          3. Check cluster health
        sources:
          - "https://docs.datastax.com/en/cassandra-oss/3.x/cassandra/dml/dmlAboutDataConsistency.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: timeout
        condition: "Query timeout exceeded"
        throws: "OperationTimedOutError"
        required_handling: >
          Caller MUST handle timeout errors.
          Query took longer than configured timeout.
          May indicate:
          - Slow query needing optimization
          - Overloaded cluster
          - Network issues
          Consider retry with exponential backoff for transient issues.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: write-timeout
        condition: "Write operation timeout at replica"
        throws: "ResponseError with code 0x1100 (Write_timeout)"
        required_handling: >
          Caller MUST handle write timeout errors.
          Write acknowledged by coordinator but timeout waiting for replicas.
          Data may or may not be written (non-idempotent risk).
          Implement idempotent retries or check if write succeeded.
        sources:
          - "https://docs.datastax.com/en/cassandra-oss/3.x/cassandra/dml/dmlAboutDataConsistency.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: read-timeout
        condition: "Read operation timeout at replica"
        throws: "ResponseError with code 0x1200 (Read_timeout)"
        required_handling: >
          Caller MUST handle read timeout errors.
          Timeout waiting for replicas to respond.
          May be transient - implement retry logic.
        sources:
          - "https://docs.datastax.com/en/cassandra-oss/3.x/cassandra/dml/dmlAboutDataConsistency.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: overloaded
        condition: "Coordinator node is overloaded"
        throws: "ResponseError with code 0x1001 (Overloaded)"
        required_handling: >
          Caller MUST handle overloaded errors.
          Coordinator cannot handle more requests.
          Implement retry with exponential backoff and jitter.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: invalid-query
        condition: "Keyspace or table does not exist"
        throws: "ResponseError with code 0x2200 (Invalid)"
        required_handling: >
          Caller MUST verify schema exists before querying.
          DO NOT retry - indicates schema mismatch.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: batch
    import_path: "cassandra-driver"
    description: "Executes batch of statements atomically (within same partition)"
    postconditions:
      - id: batch-failure
        condition: "One or more statements in batch failed"
        throws: "ResponseError with details of failure"
        required_handling: >
          Caller MUST handle batch errors.
          Entire batch fails if any statement fails.
          Check error code to determine failure reason.
          Note: Cassandra batches are NOT transactions across partitions.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/batch/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: write-timeout
        condition: "Batch write timeout"
        throws: "ResponseError with code 0x1100 (Write_timeout)"
        required_handling: >
          Caller MUST handle batch write timeouts.
          Batch may be partially applied (non-atomic across partitions).
          Implement idempotent retry logic.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/batch/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: shutdown
    import_path: "cassandra-driver"
    description: "Closes all connections to cluster"
    postconditions:
      - id: shutdown-error
        condition: "Error during shutdown (rare)"
        throws: "Error with details of shutdown issue"
        required_handling: >
          Caller SHOULD handle shutdown errors.
          Typically safe to ignore, but log for investigation.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/getting-started/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: stream
    import_path: "cassandra-driver"
    description: "Returns readable stream for query results"
    postconditions:
      - id: stream-error
        condition: "Query execution fails during streaming"
        throws: "ResponseError emitted via 'error' event"
        required_handling: >
          Caller MUST listen for 'error' event on stream.
          Without error listener, unhandled error will crash process.
          Errors can occur during query execution or while reading rows.
          Handle NoHostAvailableError, OperationTimedOutError, ResponseError.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/queries/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: eachRow
    import_path: "cassandra-driver"
    description: "Processes query results row-by-row via callback"
    postconditions:
      - id: row-callback-error
        condition: "Query fails or row processing throws error"
        throws: "Error passed to endCallback parameter"
        required_handling: >
          Caller MUST check error parameter in endCallback.
          Errors include:
          - NoHostAvailableError: Connection failure
          - OperationTimedOutError: Query timeout
          - ResponseError: Server-side query error
          If row callback throws, eachRow stops and calls endCallback with error.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/queries/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Mapper API — ModelMapper operations
  - name: insert
    import_path: "cassandra-driver"
    namespace: "mapping.ModelMapper"
    description: >
      Inserts a document into the Cassandra table via the object mapper.
      Translates the document to a CQL INSERT statement using the configured
      table mappings. Throws the same error types as Client.execute() since
      it ultimately calls execute() under the hood.
    postconditions:
      # Evidence: https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/
      # Error types confirmed from mapper.js source: propagates NoHostAvailableError, OperationTimedOutError, ResponseError
      - id: mapper-insert-no-try-catch
        condition: "ModelMapper.insert() called without try-catch"
        throws: "NoHostAvailableError, OperationTimedOutError, or ResponseError (write_timeout, overloaded, unavailable)"
        required_handling: >
          Caller MUST wrap ModelMapper.insert() in try-catch.
          The Mapper abstracts CQL but still performs async network operations
          that can fail with the same error types as Client.execute().
          Handle NoHostAvailableError (cluster unreachable), OperationTimedOutError
          (query timeout), and ResponseError (server-side errors).
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mapper-insert-if-not-exists-not-checked
        condition: "ModelMapper.insert() called with docInfo.ifNotExists=true but result.wasApplied() not checked"
        throws: "Does not throw — silently returns Result with wasApplied()=false when row already exists"
        required_handling: >
          When insert() is used as a lightweight transaction (ifNotExists=true),
          callers MUST check result.wasApplied() after the call.
          An un-applied conditional insert returns successfully without throwing
          but the row was NOT written. Without the check, the caller silently
          proceeds assuming the insert succeeded.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: update
    import_path: "cassandra-driver"
    namespace: "mapping.ModelMapper"
    description: >
      Updates a document in the Cassandra table via the object mapper.
      Translates the document to a CQL UPDATE statement. When ifExists or
      a when condition is specified, returns a lightweight transaction result.
    postconditions:
      # Evidence: https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/
      # Source: mapping-handler.js rejects on network errors; same error surface as execute()
      - id: mapper-update-no-try-catch
        condition: "ModelMapper.update() called without try-catch"
        throws: "NoHostAvailableError, OperationTimedOutError, or ResponseError"
        required_handling: >
          Caller MUST wrap ModelMapper.update() in try-catch.
          The Mapper abstraction hides the async network operation.
          Handle the same error types as Client.execute().
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mapper-update-if-exists-not-checked
        condition: "ModelMapper.update() called with docInfo.ifExists=true but result.wasApplied() not checked"
        throws: "Does not throw — silently returns Result with wasApplied()=false when row does not exist"
        required_handling: >
          When update() is a lightweight transaction (ifExists=true or when condition),
          callers MUST check result.wasApplied().
          If the row does not exist or when condition is not met, the update
          is silently skipped and the caller proceeds assuming it succeeded.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: remove
    import_path: "cassandra-driver"
    namespace: "mapping.ModelMapper"
    description: >
      Deletes a document from the Cassandra table via the object mapper.
      Translates to a CQL DELETE statement. Supports conditional deletes
      via docInfo.ifExists.
    postconditions:
      # Evidence: https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/
      - id: mapper-remove-no-try-catch
        condition: "ModelMapper.remove() called without try-catch"
        throws: "NoHostAvailableError, OperationTimedOutError, or ResponseError"
        required_handling: >
          Caller MUST wrap ModelMapper.remove() in try-catch.
          Cassandra DELETE is idempotent (no error for non-existent rows)
          but WILL throw on cluster unavailability, timeout, or overload.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: get
    import_path: "cassandra-driver"
    namespace: "mapping.ModelMapper"
    description: >
      Retrieves a single document from Cassandra by primary key via the object mapper.
      Returns null if the row does not exist (does NOT throw on missing row).
    postconditions:
      # Evidence: https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/
      - id: mapper-get-null-not-checked
        condition: "ModelMapper.get() result accessed without null check when row may not exist"
        throws: "TypeError: Cannot read properties of null (does not throw from get itself)"
        required_handling: >
          Caller MUST check if the result is null before accessing any properties.
          ModelMapper.get() returns null when the row does not exist — it does NOT throw.
          Pattern: const user = await mapper.get({ id }); if (!user) return null;
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mapper-get-no-try-catch
        condition: "ModelMapper.get() called without try-catch"
        throws: "NoHostAvailableError or OperationTimedOutError on cluster/network failure"
        required_handling: >
          Caller MUST wrap ModelMapper.get() in try-catch.
          Read operations can fail on connection errors or timeouts.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: find
    import_path: "cassandra-driver"
    namespace: "mapping.ModelMapper"
    description: >
      Queries Cassandra for multiple documents matching a filter via the object mapper.
      Returns a Result iterable (not an Array — must call .toArray() to materialize).
    postconditions:
      # Evidence: https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/
      - id: mapper-find-result-not-iterated
        condition: "ModelMapper.find() result treated as Array (calling .map, .filter, .length) without .toArray() first"
        throws: "TypeError: result.map is not a function (Result is not an Array)"
        required_handling: >
          Caller MUST call result.toArray() to get a standard Array, or use
          result.forEach() from the Result interface.
          The Result type returned by find() is an iterable object — not an Array.
          Array methods like .map(), .filter(), .length are undefined on it.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: mapper-find-no-try-catch
        condition: "ModelMapper.find() called without try-catch"
        throws: "NoHostAvailableError, ResponseError (unavailable, read_timeout), or OperationTimedOutError"
        required_handling: >
          Caller MUST wrap ModelMapper.find() in try-catch.
          Query failures under load (unavailable, read_timeout) are common
          for result sets that involve multiple replicas.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # concurrent.executeConcurrent — bulk execution helper
  - name: executeConcurrent
    import_path: "cassandra-driver"
    namespace: "concurrent"
    description: >
      Executes a large number of queries concurrently against Cassandra with
      configurable concurrency level. By default (raiseOnFirstError=true), rejects
      the Promise on the first failed query. When raiseOnFirstError=false, collects
      up to maxErrors (default 100) errors in ResultSetGroup.errors array without
      throwing. This dual behavior is the primary source of bugs.
    postconditions:
      # Evidence: https://docs.datastax.com/en/developer/nodejs-driver/4.6/api/module.concurrent/
      # Confirmed from concurrent/index.js source: this._raiseOnFirstError = options.raiseOnFirstError !== false
      - id: execute-concurrent-no-try-catch
        condition: "concurrent.executeConcurrent() called without try-catch (default raiseOnFirstError=true)"
        throws: "First error encountered — NoHostAvailableError, OperationTimedOutError, or ResponseError"
        required_handling: >
          Caller MUST wrap executeConcurrent() in try-catch when using the default
          raiseOnFirstError=true mode. The Promise rejects on the FIRST query failure,
          leaving remaining queries unexecuted. Without try-catch, the crash leaves
          partial write state with no tracking of which queries succeeded.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/api/module.concurrent/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

      - id: execute-concurrent-errors-not-checked
        condition: "concurrent.executeConcurrent() called with raiseOnFirstError=false but ResultSetGroup.errors not checked"
        throws: "Does not throw — resolves with ResultSetGroup even if all queries fail"
        required_handling: >
          When using raiseOnFirstError=false, callers MUST check result.errors.length
          after the Promise resolves. The function accumulates errors silently in
          result.errors[] up to maxErrors (default 100). If errors are not checked,
          ALL failed writes are invisible — the bulk job appears to succeed.
          Pattern: if (result.errors.length > 0) { throw new Error('Batch had failures'); }
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/api/module.concurrent/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  # mapping.Mapper.batch — multi-model atomic batch via the object mapper
  - name: batch
    import_path: "cassandra-driver"
    namespace: "mapping.Mapper"
    description: >
      Executes a batch of ModelBatchItem operations atomically (within the same
      partition) via the object mapper. Each item must be created via
      modelMapper.batching.{insert,update,remove}(). Promotes the same
      atomicity guarantees as Client.batch() but with mapper-translated CQL.
    postconditions:
      # Evidence: lib/mapping/mapper.js batch() — early-rejects on bad input via
      # Promise.reject(ArgumentError) and Promise.reject(Error 'Batch items must be
      # instances of ModelBatchItem'); otherwise delegates to client.batch() and
      # propagates NoHostAvailableError / ResponseError / OperationTimedOutError.
      - id: mapper-batch-no-try-catch
        condition: "mapping.Mapper.batch() called without try-catch"
        throws: "ArgumentError (empty items), Error (non-ModelBatchItem entries), NoHostAvailableError, OperationTimedOutError, or ResponseError (write_timeout, unavailable, overloaded)"
        required_handling: >
          Caller MUST wrap mapper.batch() in try-catch. The Mapper.batch() Promise
          rejects on three distinct error families:
          (1) input-shape errors (empty array or non-ModelBatchItem entries)
              that throw before any network call,
          (2) cluster errors (NoHostAvailableError, OperationTimedOutError) from
              the underlying client.batch() call,
          (3) server-side errors (ResponseError with codes 0x1100 write_timeout,
              0x1000 unavailable, 0x1001 overloaded).
          As with Client.batch(), a write_timeout means the batch MAY have been
          partially applied across partitions — implement idempotent retries or
          a verification read.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/batch/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

      - id: mapper-batch-lwt-not-checked
        condition: "mapping.Mapper.batch() with conditional (LWT) items but result.wasApplied() not checked"
        throws: "Does not throw — returns Result with wasApplied()=false when the conditional batch was rejected"
        required_handling: >
          When a Mapper.batch() contains conditional items (ifNotExists, ifExists,
          or when conditions), the returned Result reflects the LWT outcome.
          Callers MUST check result.wasApplied() after the Promise resolves. An
          un-applied conditional batch resolves successfully but NO writes were
          performed. Without the check, the caller silently proceeds as if the
          mutation succeeded.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/features/mapper/"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  # metadata.Metadata.getTable — schema introspection
  - name: getTable
    import_path: "cassandra-driver"
    namespace: "metadata.Metadata"
    description: >
      Retrieves the TableMetadata for a given keyspace/table. Accessed via
      client.metadata.getTable(). Returns null when the keyspace is not in
      the loaded schema (does NOT throw on missing keyspace/table). Used by
      ORM code, migration tools, and admin dashboards to introspect the
      live schema before issuing queries.
    postconditions:
      # Evidence: lib/metadata/index.js _getTable() — throws this._uninitializedError()
      # when called pre-connect; returns null when keyspaceName is unknown; otherwise
      # propagates rejections from _schemaParser.getTable (control connection failures).
      - id: metadata-gettable-no-try-catch
        condition: "client.metadata.getTable() called without try-catch"
        throws: "DriverError ('Metadata has not been initialized') when called before client.connect(); NoHostAvailableError on control-connection loss during schema query"
        required_handling: >
          Caller MUST wrap metadata.getTable() in try-catch. Two distinct
          rejection paths exist:
          (1) calling getTable() before client.connect() resolves rejects with
              an uninitialized DriverError — common in startup race conditions
              where introspection runs before the driver has populated the
              schema cache,
          (2) control-connection failures while the schema query is in flight
              propagate as NoHostAvailableError from the underlying
              _schemaParser.getTable() call.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/api/module.metadata/class.Metadata/#getTable"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: metadata-gettable-null-not-checked
        condition: "client.metadata.getTable() result accessed without null check when keyspace/table may not exist"
        throws: "TypeError: Cannot read properties of null (does not throw from getTable itself)"
        required_handling: >
          Caller MUST check if the result is null before accessing properties.
          getTable() returns null synchronously (resolved Promise<null>) when
          the keyspace is unknown to the loaded schema metadata — it does NOT
          throw. Pattern:
          const t = await client.metadata.getTable(ks, name); if (!t) return null;
          Without the check, downstream property access (.columns, .partitionKeys)
          crashes the caller with a misleading TypeError.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/api/module.metadata/class.Metadata/#getTable"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # metadata.Metadata.refreshKeyspaces — schema reload after DDL
  - name: refreshKeyspaces
    import_path: "cassandra-driver"
    namespace: "metadata.Metadata"
    description: >
      Reloads the full keyspace metadata from the cluster. Accessed via
      client.metadata.refreshKeyspaces(). Typically called after DDL
      operations (CREATE/ALTER/DROP KEYSPACE/TABLE) so subsequent
      metadata.getTable / getUdt / getFunction calls see fresh schema. The
      sister method refreshKeyspace(name) reloads a single keyspace.
    postconditions:
      # Evidence: lib/metadata/index.js refreshKeyspaces() — rejects with
      # uninitialized DriverError pre-connect; delegates to refreshKeyspacesInternal
      # which awaits _schemaParser.getKeyspaces(waitReconnect) and rethrows any
      # control-connection failure after logging.
      - id: metadata-refreshkeyspaces-no-try-catch
        condition: "client.metadata.refreshKeyspaces() called without try-catch"
        throws: "DriverError ('Metadata has not been initialized') when called before client.connect(); NoHostAvailableError or ResponseError when the control connection fails while loading schema"
        required_handling: >
          Caller MUST wrap metadata.refreshKeyspaces() in try-catch. Schema
          refresh is performed over the control connection and can fail when
          the cluster is reachable for queries but the control host is being
          replaced (common during rolling restarts). Without a catch, a
          post-DDL refresh that hits a transient control-connection error
          crashes the migration job mid-run, leaving subsequent metadata reads
          stale until the next refresh.
        sources:
          - "https://docs.datastax.com/en/developer/nodejs-driver/4.6/api/module.metadata/class.Metadata/#refreshKeyspaces"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Client.executeGraph — DataStax Graph traversal (DSE / Astra Graph Engine)
  - name: executeGraph
    import_path: "cassandra-driver"
    namespace: "Client"
    description: >
      Executes a Gremlin traversal or DSE Graph query against a DataStax Enterprise or
      DataStax Astra Graph. Accessed via client.executeGraph(). Returns a GraphResultSet
      iterable of Traverser objects. Distinct from Client.execute() in two critical ways:
      (1) uses FallthroughRetryPolicy by default — no automatic retry on any failure type,
      (2) accepts parameters as Object only (Array input throws TypeError synchronously).
    postconditions:
      # Evidence: lib/datastax/graph/graph-executor.js send() and _executeGraphQuery()
      # confirmed from cassandra-driver@4.9.0 node_modules source inspection
      # FallthroughRetryPolicy confirmed from lib/policies/retry.js lines 209-258:
      # "A retry policy that never retries nor ignores — all methods unconditionally
      # return rethrowResult()". Assigned to graph queries in graph-executor.js constructor.
      - id: execute-graph-no-try-catch
        condition: "Client.executeGraph() called without try-catch"
        throws: "NoHostAvailableError when no cluster node is reachable; OperationTimedOutError when graph traversal exceeds timeout; ResponseError for Gremlin syntax errors or server-side traversal failures"
        required_handling: >
          Caller MUST wrap client.executeGraph() in try-catch. Unlike client.execute(),
          graph queries use FallthroughRetryPolicy — the driver NEVER automatically
          retries on read_timeout, unavailable, or request_error. Every transient
          failure propagates immediately to the caller. This is by design (graph
          traversals may mutate state and are not assumed idempotent), but it means
          callers must implement their own retry/backoff logic for transient failures.
          Handle: NoHostAvailableError (cluster unreachable or graph service down),
          OperationTimedOutError (traversal took too long — common for full-graph scans),
          ResponseError (Gremlin syntax error code 0x2000, or traversal step failure).
        sources:
          - "https://github.com/datastax/nodejs-driver/blob/v4.9.0/lib/datastax/graph/graph-executor.js"
          - "https://github.com/datastax/nodejs-driver/blob/v4.9.0/lib/policies/retry.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: execute-graph-array-params
        condition: "Client.executeGraph() called with Array as parameters argument (common porting mistake from Client.execute() where Arrays are valid)"
        throws: "TypeError: 'Parameters must be a Object instance as an associative array' — thrown synchronously before any network call"
        required_handling: >
          Caller MUST pass parameters as a plain Object (associative array), not an Array.
          executeGraph() rejects Arrays in graph-executor.js send() before any network call:
          `if (Array.isArray(parameters)) { throw new TypeError('Parameters must be a Object instance...') }`
          This is a porting bug when migrating from client.execute() (where params can be Array)
          to client.executeGraph(). The fix: convert `['value']` to `{ paramName: 'value' }`.
          Reference parameters in Gremlin as named bindings: `g.V().has('id', id)` with
          `{ id: 'actual-value' }`.
        sources:
          - "https://github.com/datastax/nodejs-driver/blob/v4.9.0/lib/datastax/graph/graph-executor.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

