package: express
semver: ">=4.0.0 <6.0.0"
contract_version: 1.0.0
maintainer: behavioral-contracts
last_verified: 2026-04-04
status: production
evidence_quality: confirmed
coverage_score: 1.0
# Audit 2026-04-02: 51 repos scanned, 0 affected (0%), 0 violations. 0/70 FPs.
# Scanner found no violations — likely because app.METHOD/app.use patterns require
# deeper async handler analysis. Contract is valid but scanner detection needs improvement.
# evidence_quality: partial (contract well-sourced but scanner not yet detecting violations)
detection:
  factory_methods:
    - express
description: |
  Behavioral contracts for Express.js focusing on async error handling in route handlers
  and middleware. Express 4.x requires explicit error forwarding via next(err), while
  Express 5+ automatically handles promise rejections.
functions:
  - name: app.METHOD
    import_path: express
    description: |
      Route handler methods (get, post, put, delete, patch, etc.) that accept
      async callback functions. In Express 4.x, unhandled promise rejections
      in async route handlers will not be caught automatically.
    postconditions:
      - id: async-route-handler-unhandled-rejection
        condition: |
          When an async function is used as a route handler (callback to app.get,
          app.post, etc.) and contains await expressions without try-catch blocks
        throws: UnhandledPromiseRejection
        required_handling: |
          Must wrap async operations in try-catch blocks and call next(err) with
          the caught error to forward it to error-handling middleware. Alternatively,
          use the express-async-errors package or upgrade to Express 5.x for automatic
          promise rejection handling.

          Example:
          app.get('/path', async (req, res, next) => {
            try {
              const data = await asyncOperation();
              res.json(data);
            } catch (err) {
              next(err); // Forward to error handler
            }
          });
        source: https://expressjs.com/en/guide/error-handling.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          Express 5.x automatically handles promise rejections by calling next(value)
          when async route handlers reject or throw errors. Express 4.x requires
          explicit error handling.
        sources:
          - https://expressjs.com/en/guide/error-handling.html
  - name: app.use
    import_path: express
    description: |
      Middleware registration function. When async functions are used as middleware,
      they must handle errors properly.
    postconditions:
      - id: async-middleware-unhandled-rejection
        condition: |
          When an async function is used as middleware and contains await expressions
          without try-catch blocks
        throws: UnhandledPromiseRejection
        required_handling: |
          Must wrap async operations in try-catch blocks and call next(err) to forward
          errors to error-handling middleware. Alternatively, use express-async-errors.

          Example:
          app.use(async (req, res, next) => {
            try {
              await authenticateUser(req);
              next(); // Continue to next middleware
            } catch (err) {
              next(err); // Forward to error handler
            }
          });
        source: https://expressjs.com/en/guide/error-handling.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://expressjs.com/en/guide/error-handling.html
      - id: error-middleware-signature
        condition: |
          When defining error-handling middleware
        throws: N/A
        required_handling: |
          Error-handling middleware must be defined with exactly 4 parameters
          (err, req, res, next) to be recognized by Express. Error-handling
          middleware must be defined AFTER all other middleware and routes.

          Example:
          app.use((err, req, res, next) => {
            console.error(err.stack);
            res.status(500).send('Something broke!');
          });
        source: https://expressjs.com/en/guide/error-handling.html
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          This is a structural requirement rather than a runtime error. Middleware
          with fewer than 4 parameters will not be treated as error handlers.
        sources:
          - https://expressjs.com/en/guide/error-handling.html
  - name: router.METHOD
    import_path: express
    description: |
      Router methods (get, post, put, delete, patch, etc.) created via express.Router().
      Same async error handling requirements as app.METHOD.
    postconditions:
      - id: async-router-handler-unhandled-rejection
        condition: |
          When an async function is used as a router handler and contains await
          expressions without try-catch blocks
        throws: UnhandledPromiseRejection
        required_handling: |
          Must wrap async operations in try-catch blocks and call next(err).
          Same requirements as app.METHOD route handlers.

          Example:
          const router = express.Router();
          router.get('/users', async (req, res, next) => {
            try {
              const users = await User.findAll();
              res.json(users);
            } catch (err) {
              next(err);
            }
          });
        source: https://expressjs.com/en/guide/error-handling.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://expressjs.com/en/guide/error-handling.html
  - name: router.use
    import_path: express
    description: |
      Router middleware registration. Same async error handling requirements as app.use.
    postconditions:
      - id: async-router-middleware-unhandled-rejection
        condition: |
          When an async function is used as router middleware and contains await
          expressions without try-catch blocks
        throws: UnhandledPromiseRejection
        required_handling: |
          Must wrap async operations in try-catch blocks and call next(err).
          Same requirements as app.use middleware.
        source: https://expressjs.com/en/guide/error-handling.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://expressjs.com/en/guide/error-handling.html
  - name: express.json
    import_path: express
    description: |
      Built-in middleware that parses incoming requests with JSON payloads.
      Based on body-parser. Produces specific HTTP errors for malformed input,
      oversized payloads, and encoding issues that must be handled by
      error-handling middleware.
    postconditions:
      # Evidence: body-parser/lib/read.js source, body-parser/lib/types/json.js source
      # Error types confirmed from http-errors createError() calls in body-parser
      - id: json-parse-syntax-error
        condition: |
          When request body contains malformed JSON that cannot be parsed
        throws: SyntaxError (status 400, type 'entity.parse.failed')
        required_handling: |
          Must define error-handling middleware that catches SyntaxError with
          status 400 and returns an appropriate error response. Without this,
          the default Express error handler exposes the stack trace in
          development and returns a generic 500 in production.

          Example:
          app.use(express.json());
          app.use((err, req, res, next) => {
            if (err.status === 400 && err.type === 'entity.parse.failed') {
              return res.status(400).json({ error: 'Invalid JSON' });
            }
            next(err);
          });
        source: https://github.com/expressjs/body-parser/blob/master/lib/read.js
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        sources:
          - https://expressjs.com/en/api.html#express.json
          - https://github.com/expressjs/body-parser/blob/master/lib/types/json.js
      - id: json-payload-too-large
        condition: |
          When request body exceeds the configured limit option (default 100kb)
        throws: HttpError (status 413, type 'entity.too.large')
        required_handling: |
          Must handle 413 errors in error-handling middleware. Without this,
          legitimate large payloads (file uploads via JSON, bulk operations)
          fail silently with unhelpful error messages.

          Example:
          app.use(express.json({ limit: '1mb' }));
          app.use((err, req, res, next) => {
            if (err.status === 413) {
              return res.status(413).json({ error: 'Payload too large' });
            }
            next(err);
          });
        source: https://github.com/stream-utils/raw-body/blob/master/index.js
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        sources:
          - https://expressjs.com/en/api.html#express.json
          - https://github.com/stream-utils/raw-body/blob/master/index.js
      - id: json-charset-unsupported
        condition: |
          When request body uses an unsupported character encoding
        throws: HttpError (status 415, type 'charset.unsupported')
        required_handling: |
          Must handle 415 errors in error-handling middleware to return a
          clear error message about unsupported encoding.
        source: https://github.com/expressjs/body-parser/blob/master/lib/read.js
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        sources:
          - https://github.com/expressjs/body-parser/blob/master/lib/read.js
  - name: express.urlencoded
    import_path: express
    description: |
      Built-in middleware that parses incoming requests with URL-encoded payloads.
      Based on body-parser. Produces errors for oversized payloads and when
      parameter count exceeds the configured limit.
    postconditions:
      # Evidence: body-parser source, raw-body source
      # Same error chain as express.json for payload size and encoding
      - id: urlencoded-parameters-too-many
        condition: |
          When URL-encoded request body contains more parameters than the
          configured parameterLimit (default 1000)
        throws: HttpError (status 413, type 'parameters.too.many')
        required_handling: |
          Must handle this in error-handling middleware. This error is common
          when forms have dynamically generated fields or when malicious actors
          attempt hash collision DoS attacks via parameter flooding.

          Example:
          app.use(express.urlencoded({ extended: true, parameterLimit: 2000 }));
        source: https://expressjs.com/en/api.html#express.urlencoded
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        sources:
          - https://expressjs.com/en/api.html#express.urlencoded
      - id: urlencoded-payload-too-large
        condition: |
          When URL-encoded request body exceeds the configured limit (default 100kb)
        throws: HttpError (status 413, type 'entity.too.large')
        required_handling: |
          Same handling as json-payload-too-large. Must handle 413 errors
          in error-handling middleware.
        source: https://github.com/stream-utils/raw-body/blob/master/index.js
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        sources:
          - https://github.com/stream-utils/raw-body/blob/master/index.js
  - name: res.sendFile
    import_path: express
    description: |
      Transfers the file at the given path. Uses the send module internally.
      Produces specific file system errors (ENOENT, EACCES) and HTTP errors
      (403 for forbidden paths, 404 for missing files) that must be handled
      via the error callback or error-handling middleware.
    postconditions:
      # Evidence: send/index.js source — onStatError switches on error.code
      # ENOENT/ENAMETOOLONG → 404, other fs errors → 500, dotfile access → 403
      - id: sendfile-file-not-found
        condition: |
          When the file path does not exist or the filename is too long
        throws: HttpError (status 404, original error.code ENOENT or ENAMETOOLONG)
        required_handling: |
          Must provide an error callback to res.sendFile() or handle the error
          in error-handling middleware. Without this, missing files cause
          unhandled errors that crash the request. Must also check
          res.headersSent before attempting to send an error response, as
          partial data may have already been transmitted.

          Example:
          res.sendFile('/uploads/' + filename, (err) => {
            if (err) {
              if (!res.headersSent) {
                res.status(404).send('File not found');
              }
            }
          });
        source: https://github.com/pillarjs/send/blob/master/index.js
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - https://expressjs.com/en/api.html#res.sendFile
          - https://github.com/pillarjs/send/blob/master/index.js
      - id: sendfile-forbidden-path
        condition: |
          When the file path traverses outside the root directory or accesses
          a dotfile with dotfiles option set to 'deny'
        throws: HttpError (status 403)
        required_handling: |
          Must handle 403 errors from sendFile. Path traversal attempts
          (e.g., ../../etc/passwd) are common attack vectors. Always use
          the root option to restrict file access.

          Example:
          res.sendFile(filename, { root: path.join(__dirname, 'uploads') });
        source: https://github.com/pillarjs/send/blob/master/index.js
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        sources:
          - https://github.com/pillarjs/send/blob/master/index.js
  - name: res.download
    import_path: express
    description: |
      Transfers the file at path as an attachment. Wraps res.sendFile()
      internally with Content-Disposition header. Same error behavior as
      res.sendFile().
    postconditions:
      # Evidence: express/lib/response.js — download() calls sendFile() internally
      - id: download-file-error
        condition: |
          When the file does not exist, is inaccessible, or the transfer fails
        throws: Error (ENOENT, EACCES, or other fs error)
        required_handling: |
          Must provide an error callback and check res.headersSent before
          attempting to send an error response. The response may be partially
          sent when the error occurs.

          Example:
          res.download('/report.pdf', 'report.pdf', (err) => {
            if (err && !res.headersSent) {
              res.status(404).send('File not found');
            }
          });
        source: https://expressjs.com/en/api.html#res.download
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - https://expressjs.com/en/api.html#res.download
  - name: app.listen
    import_path: express
    description: |
      Binds and listens for connections on the specified host and port.
      Returns a Node.js http.Server. Inherits error behavior from
      http.Server.listen() including port conflicts and permission errors.
    postconditions:
      # Evidence: Node.js http.Server.listen() documentation
      # Express app.listen() delegates to http.createServer(app).listen()
      - id: listen-eaddrinuse
        condition: |
          When the specified port is already in use by another process
        throws: Error (code 'EADDRINUSE')
        required_handling: |
          Must listen for the 'error' event on the returned http.Server
          object, or handle the error in the listen callback. EADDRINUSE
          is the most common Express startup failure and causes the process
          to crash if unhandled.

          Example:
          const server = app.listen(3000, (err) => {
            if (err) {
              console.error('Failed to start server:', err);
              process.exit(1);
            }
          });
          server.on('error', (err) => {
            if (err.code === 'EADDRINUSE') {
              console.error('Port 3000 already in use');
              process.exit(1);
            }
          });
        source: https://nodejs.org/api/net.html#serverlisten
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        sources:
          - https://expressjs.com/en/api.html#app.listen
          - https://nodejs.org/api/net.html#event-error
      - id: listen-eacces
        condition: |
          When the process lacks permission to bind to the specified port
          (typically ports below 1024 on Unix systems)
        throws: Error (code 'EACCES')
        required_handling: |
          Must handle EACCES errors on server startup. Common in production
          when trying to bind to port 80 or 443 without root privileges.
        source: https://nodejs.org/api/net.html#serverlisten
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        sources:
          - https://nodejs.org/api/net.html#event-error
  - name: res.render
    import_path: express
    description: |
      Renders a view template and sends the rendered HTML string to the client.
      Uses the configured view engine. Errors from file system operations,
      template parsing, and view engine execution are passed to the callback
      or error-handling middleware.
    postconditions:
      # Evidence: express/lib/application.js render() implementation
      # Calls view.render() which calls engine() callback with (err, html)
      - id: render-view-not-found
        condition: |
          When the specified view template file cannot be found by the
          configured view engine
        throws: Error ('Failed to lookup view "<name>" in views directory')
        required_handling: |
          Must provide a callback to res.render() or handle errors in
          error-handling middleware. Missing template files cause 500 errors
          that expose internal paths if not handled.

          Example:
          res.render('dashboard', { user }, (err, html) => {
            if (err) {
              return res.status(500).send('Template error');
            }
            res.send(html);
          });
        source: https://expressjs.com/en/api.html#res.render
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://expressjs.com/en/api.html#res.render
      - id: render-template-error
        condition: |
          When the template engine encounters a syntax error or runtime
          error during template compilation/rendering
        throws: Error (engine-specific error from EJS, Pug, Handlebars, etc.)
        required_handling: |
          Must handle template rendering errors. Template syntax errors in
          user-editable templates (email templates, CMS content) cause
          500 errors that can take down entire pages.
        source: https://expressjs.com/en/api.html#res.render
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://expressjs.com/en/api.html#res.render
  - name: express.static
    import_path: express
    description: |
      Built-in middleware that serves static files. Based on serve-static.
      The fallthrough option controls whether file-not-found errors are
      passed to next() or handled silently.
    postconditions:
      # Evidence: serve-static source, send module source
      # fallthrough: true (default) calls next() on 404, false calls next(err)
      - id: static-fallthrough-disabled
        condition: |
          When express.static is configured with fallthrough: false and a
          requested file is not found
        throws: HttpError (status 404)
        required_handling: |
          When fallthrough is set to false, file-not-found errors are passed
          to error-handling middleware via next(err). Must have error-handling
          middleware to return a proper 404 response.

          Example:
          app.use(express.static('public', { fallthrough: false }));
          app.use((err, req, res, next) => {
            if (err.status === 404) {
              return res.status(404).send('Not found');
            }
            next(err);
          });
        source: https://expressjs.com/en/api.html#express.static
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        sources:
          - https://expressjs.com/en/api.html#express.static
related_packages:
  - express-async-errors
  - express-async-handler
notes: |
  Express error handling has evolved significantly:

  1. Express 4.x: Requires explicit try-catch and next(err) for async functions
  2. Express 5.x: Automatically handles promise rejections in route handlers and middleware

  Common anti-patterns:
  - Forgetting try-catch in async route handlers
  - Not calling next(err) to forward errors
  - Defining error middleware with wrong number of parameters
  - Placing error middleware before route definitions

  CVEs related to Express error handling:
  - CVE-2024-29041: Open redirect via malformed URLs in res.redirect()
  - CVE-2024-10491: Link header injection in response.links()

  These CVEs highlight the importance of input validation and sanitization,
  but are not directly related to async error handling patterns.

  The most common real-world issues are unhandled promise rejections that can
  crash the Node.js process or leave the server in an inconsistent state.
