package: bcryptjs
semver: ">=2.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed

detection:
  # bcryptjs is a pure JavaScript library with simple function exports
  # Functions are called directly on the module import
  await_patterns:
    - "bcrypt.hash("
    - "bcrypt.compare("
    - "bcrypt.genSalt("

functions:
  - name: hash
    import_path: "bcryptjs"
    description: "Hashes a password using bcrypt algorithm with specified salt rounds"

    postconditions:
      # Evidence: seen in 21 primary firings across 15 repos in scan-bcryptjs-2026-04-02.json
      # Top affected: iOfficeAI/AionUi (⭐ 19789), nextjs/saas-starter (⭐ 15534)
      - id: hash-type-error
        condition: "password is not a string or Buffer, or salt is invalid type"
        throws: "Error: Illegal arguments: [actual_type], [actual_type]"
        required_handling: >
          Caller MUST wrap bcrypt.hash() in try-catch block or use .catch() handler.
          Type errors occur when forgetting await on Promise or passing wrong types.
          Validate input types before calling hash() to provide better error messages.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/146"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hash-invalid-salt
        condition: "salt parameter is not a string, number, or valid salt format"
        throws: "Error: Invalid salt version or Illegal arguments"
        required_handling: >
          Caller MUST handle errors from invalid salt parameter. Use genSalt() to
          generate valid salts, or pass numeric salt rounds (recommended: 12).
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/20"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hash-rounds-out-of-range
        condition: "salt rounds < 4 or > 31"
        throws: "Error: Rounds out of range (4-31)"
        required_handling: >
          Caller MUST validate salt rounds are between 4 and 31. Production systems
          should use rounds >= 12 for adequate security.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/issues/898"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hash-internal-failure
        condition: "internal hashing operation fails"
        throws: "Error"
        required_handling: >
          Caller MUST handle unexpected errors from hash() operation. While rare,
          internal failures can occur and should not crash the application.
        sources:
          - "https://www.npmjs.com/package/bcryptjs"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: password-truncation
        description: >
          Passwords longer than 72 bytes (UTF-8 encoded) are silently truncated.
          This is a bcrypt algorithm limitation, not a bug. Applications should
          validate password length before hashing to prevent user confusion.
        sources:
          - "https://auth0.com/blog/hashing-in-action-understanding-bcrypt/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: low-salt-rounds
        description: >
          Using salt rounds < 12 provides inadequate protection against modern
          hardware attacks. Recommended minimum is 12 for 2026 (increases over time).
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/issues/437"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: compare
    import_path: "bcryptjs"
    description: "Compares a plaintext password with a bcrypt hash to verify match"

    postconditions:
      # Evidence: seen in 18 primary firings across 15 repos in scan-bcryptjs-2026-04-02.json
      # Top affected: iOfficeAI/AionUi (⭐ 19789), nextjs/saas-starter (⭐ 15534)
      - id: compare-type-error
        condition: "password or hash parameter is not a string"
        throws: "Error: Illegal arguments: [actual_type], [actual_type]"
        required_handling: >
          Caller MUST wrap bcrypt.compare() in try-catch or use .catch() handler.
          Type errors commonly occur when retrieving hash from database as Buffer
          instead of string, or when password input is undefined/null.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/76"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: compare-invalid-hash
        condition: "hash parameter is not a valid bcrypt hash format"
        throws: "Error: Invalid hash provided or hash is not a valid bcrypt hash"
        required_handling: >
          Caller MUST handle errors from malformed hash values. Database corruption,
          string truncation (VARCHAR < 60), or encoding issues can cause invalid hashes.
          This is the #1 production authentication bug.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/issues/1037"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: compare-internal-failure
        condition: "internal comparison operation fails"
        throws: "Error"
        required_handling: >
          Caller MUST handle unexpected errors from compare() operation. Errors should
          not be silently swallowed as they may indicate security issues or data corruption.
        sources:
          - "https://www.npmjs.com/package/bcryptjs"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: hash-version-compatibility
        description: >
          bcrypt.js supports $2a$ and $2b$ hash versions. Some hashes generated by
          other bcrypt libraries (like $2y$ from PHP) may not verify correctly.
          Use bcrypt.getRounds() to check hash version compatibility if needed.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/81"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: timing-attack-safe
        description: >
          bcrypt.compare() uses constant-time comparison to prevent timing attacks.
          Never use === or == to compare hashes directly - always use bcrypt.compare().
        sources:
          - "https://blog.ircmaxell.com/2012/12/seven-ways-to-screw-up-bcrypt.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: genSalt
    import_path: "bcryptjs"
    description: "Generates a random salt for use with hash() function"

    postconditions:
      # Evidence: seen in 6 primary firings across 3 repos in scan-bcryptjs-2026-04-02.json
      # Top affected: pvarentsov/typescript-clean-architecture, captableinc/captable (⭐ 804)
      - id: gensalt-invalid-rounds
        condition: "rounds parameter < 4 or > 31"
        throws: "Error: Rounds out of range (4-31)"
        required_handling: >
          Caller MUST wrap genSalt() in try-catch or use .catch() handler when
          rounds parameter could be invalid. Validate rounds before calling.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/issues/898"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: gensalt-type-error
        condition: "rounds parameter is not a number"
        throws: "Error: Illegal arguments: [actual_type]"
        required_handling: >
          Caller MUST validate rounds is a number. Common error when reading from
          environment variables or config files without parsing to integer.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/58"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: gensalt-rng-failure
        condition: "random number generator fails (browser context without setRandomFallback)"
        throws: "Error: Secure random number generator not available"
        required_handling: >
          Caller MUST handle RNG failures. In browser environments, call
          bcrypt.setRandomFallback() to provide a CSPRNG fallback.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js#usage---async"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: browser-rng-requirement
        description: >
          In browser environments, a cryptographically secure random number generator
          must be provided via setRandomFallback() or genSalt() will fail. Node.js
          environments use crypto.randomBytes() automatically.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js#random-numbers"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

# SOURCES.md has comprehensive documentation of all error conditions
# See: corpus/packages/bcryptjs/SOURCES.md (489 lines)
#
# Research completed 2026-02-26:
# - Phase 1: Research planning
# - Phase 2: Documentation analysis (25+ error conditions documented)
# - Phase 3: CVE analysis (ZERO vulnerabilities found)
# - Phase 4: Production usage analysis (5 repos, 20+ code examples)
#
# Key findings:
# - Most common mistake: Missing try-catch around bcrypt operations
# - #1 production bug: Database hash corruption (trimming, encoding, wrong field type)
# - Security: Zero CVEs, actively maintained, widely used
# - Detection focus: Missing error handling on async operations
