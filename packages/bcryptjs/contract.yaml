#
# Research completed 2026-02-26:
# - Phase 1: Research planning
# - Phase 2: Documentation analysis (25+ error conditions documented)
# - Phase 3: CVE analysis (ZERO vulnerabilities found)
# - Phase 4: Production usage analysis (5 repos, 20+ code examples)
#
# Depth pass 2026-04-13 (deepen-stream-2 pass 18):
# - Added hashSync (3 postconditions + 1 edge case)
# - Added compareSync (3 postconditions)
# - Added genSaltSync (2 postconditions)
# - Coverage: 50% → 100% (3/6 → 6/6 contractable async+sync-throwable functions)
#
# Key findings:
# - Most common mistake: Missing try-catch around bcrypt operations
# - #1 production bug: Database hash corruption (trimming, encoding, wrong field type)
# - #1 SILENT bug: compareSync() returns false (not throws) for malformed hash —
#   impossible to distinguish wrong-password from corrupted-hash without schema validation
# - Sync functions block the event loop for 100ms-400ms+ — MUST NOT use in HTTP handlers
# - Security: Zero CVEs, actively maintained, widely used
# - Detection focus: Missing error handling on async operations
