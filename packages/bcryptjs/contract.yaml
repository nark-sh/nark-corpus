package: bcryptjs
semver: ">=2.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-25"
coverage_status: covered
status: production
evidence_quality: confirmed
# coverage_score = contracted / total_exports = 9/12 = 0.75 (raw)
# effective_coverage = contracted / (total - intentionally_omitted) = 9/9 = 1.0
# Omitted: setRandomFallback (config-only), encodeBase64 (internal), decodeBase64 (internal)
coverage_score: 0.75

detection:
  # bcryptjs is a pure JavaScript library with simple function exports
  # Functions are called directly on the module import.
  # async/await_patterns: only the Promise-returning entry points; sync functions
  # (hashSync, compareSync, genSaltSync, getRounds, getSalt, truncates) throw
  # synchronously and are flagged via require_try_catch scanner rules instead.
  await_patterns:
    - "bcrypt.hash("
    - "bcrypt.compare("
    - "bcrypt.genSalt("

functions:
  - name: hash
    import_path: "bcryptjs"
    description: "Hashes a password using bcrypt algorithm with specified salt rounds"

    postconditions:
      # Evidence: seen in 21 primary firings across 15 repos in scan-bcryptjs-2026-04-02.json
      # Top affected: iOfficeAI/AionUi (⭐ 19789), nextjs/saas-starter (⭐ 15534)
      - id: hash-type-error
        condition: "password is not a string or Buffer, or salt is invalid type"
        throws: "Error: Illegal arguments: [actual_type], [actual_type]"
        required_handling: >
          Caller MUST wrap bcrypt.hash() in try-catch block or use .catch() handler.
          Type errors occur when forgetting await on Promise or passing wrong types.
          Validate input types before calling hash() to provide better error messages.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/146"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hash-invalid-salt
        condition: "salt parameter is not a string, number, or valid salt format"
        throws: "Error: Invalid salt version or Illegal arguments"
        required_handling: >
          Caller MUST handle errors from invalid salt parameter. Use genSalt() to
          generate valid salts, or pass numeric salt rounds (recommended: 12).
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/20"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hash-rounds-out-of-range
        condition: "salt rounds < 4 or > 31"
        throws: "Error: Rounds out of range (4-31)"
        required_handling: >
          Caller MUST validate salt rounds are between 4 and 31. Production systems
          should use rounds >= 12 for adequate security.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/issues/898"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hash-internal-failure
        condition: "internal hashing operation fails"
        throws: "Error"
        required_handling: >
          Caller MUST handle unexpected errors from hash() operation. While rare,
          internal failures can occur and should not crash the application.
        sources:
          - "https://www.npmjs.com/package/bcryptjs"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: password-truncation
        description: >
          Passwords longer than 72 bytes (UTF-8 encoded) are silently truncated.
          This is a bcrypt algorithm limitation, not a bug. Applications should
          validate password length before hashing to prevent user confusion.
        sources:
          - "https://auth0.com/blog/hashing-in-action-understanding-bcrypt/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: low-salt-rounds
        description: >
          Using salt rounds < 12 provides inadequate protection against modern
          hardware attacks. Recommended minimum is 12 for 2026 (increases over time).
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/issues/437"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: compare
    import_path: "bcryptjs"
    description: "Compares a plaintext password with a bcrypt hash to verify match"

    postconditions:
      # Evidence: seen in 18 primary firings across 15 repos in scan-bcryptjs-2026-04-02.json
      # Top affected: iOfficeAI/AionUi (⭐ 19789), nextjs/saas-starter (⭐ 15534)
      - id: compare-type-error
        condition: "password or hash parameter is not a string"
        throws: "Error: Illegal arguments: [actual_type], [actual_type]"
        required_handling: >
          Caller MUST wrap bcrypt.compare() in try-catch or use .catch() handler.
          Type errors commonly occur when retrieving hash from database as Buffer
          instead of string, or when password input is undefined/null.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/76"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: compare-invalid-hash
        condition: "hash parameter is not a valid bcrypt hash format"
        throws: "Error: Invalid hash provided or hash is not a valid bcrypt hash"
        required_handling: >
          Caller MUST handle errors from malformed hash values. Database corruption,
          string truncation (VARCHAR < 60), or encoding issues can cause invalid hashes.
          This is the #1 production authentication bug.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/issues/1037"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: compare-internal-failure
        condition: "internal comparison operation fails"
        throws: "Error"
        required_handling: >
          Caller MUST handle unexpected errors from compare() operation. Errors should
          not be silently swallowed as they may indicate security issues or data corruption.
        sources:
          - "https://www.npmjs.com/package/bcryptjs"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: hash-version-compatibility
        description: >
          bcrypt.js supports $2a$ and $2b$ hash versions. Some hashes generated by
          other bcrypt libraries (like $2y$ from PHP) may not verify correctly.
          Use bcrypt.getRounds() to check hash version compatibility if needed.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/81"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: timing-attack-safe
        description: >
          bcrypt.compare() uses constant-time comparison to prevent timing attacks.
          Never use === or == to compare hashes directly - always use bcrypt.compare().
        sources:
          - "https://blog.ircmaxell.com/2012/12/seven-ways-to-screw-up-bcrypt.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: genSalt
    import_path: "bcryptjs"
    description: "Generates a random salt for use with hash() function"

    postconditions:
      # Evidence: seen in 6 primary firings across 3 repos in scan-bcryptjs-2026-04-02.json
      # Top affected: pvarentsov/typescript-clean-architecture, captableinc/captable (⭐ 804)
      - id: gensalt-invalid-rounds
        condition: "rounds parameter < 4 or > 31"
        throws: "Error: Rounds out of range (4-31)"
        required_handling: >
          Caller MUST wrap genSalt() in try-catch or use .catch() handler when
          rounds parameter could be invalid. Validate rounds before calling.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/issues/898"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: gensalt-type-error
        condition: "rounds parameter is not a number"
        throws: "Error: Illegal arguments: [actual_type]"
        required_handling: >
          Caller MUST validate rounds is a number. Common error when reading from
          environment variables or config files without parsing to integer.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/issues/58"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: gensalt-rng-failure
        condition: "random number generator fails (browser context without setRandomFallback)"
        throws: "Error: Secure random number generator not available"
        required_handling: >
          Caller MUST handle RNG failures. In browser environments, call
          bcrypt.setRandomFallback() to provide a CSPRNG fallback.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js#usage---async"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: browser-rng-requirement
        description: >
          In browser environments, a cryptographically secure random number generator
          must be provided via setRandomFallback() or genSalt() will fail. Node.js
          environments use crypto.randomBytes() automatically.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js#random-numbers"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: hashSync
    import_path: "bcryptjs"
    description: >
      Synchronously generates a bcrypt hash for a password. Blocks the Node.js event loop
      for the full duration of the hashing operation (100ms+ at 10 rounds, 400ms+ at 12 rounds).
      Must NOT be used in request handlers or any event-loop-sensitive context.
      Use the async hash() for web servers. hashSync is appropriate only in CLI scripts,
      one-time migration scripts, and test setup.

    postconditions:
      # Evidence: https://github.com/dcodeIO/bcrypt.js/blob/master/index.js (lines 153-163)
      # Confirmed from source: hashSync throws synchronously with no Promise rejection
      - id: hash-sync-type-error
        condition: "password is not a string or salt is not a string/number"
        throws: "Error: Illegal arguments: [typeof password], [typeof salt]"
        required_handling: >
          Caller MUST wrap hashSync() in a try-catch block. Type errors throw synchronously.
          Most common cause: passing undefined/null password (unvalidated input) or an
          already-hashed password Buffer from a database query instead of a string.
          Unlike the async hash(), there is no .catch() available — only try-catch.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hash-sync-rounds-out-of-range
        condition: "salt is a number and rounds < 4 or > 31"
        throws: "Error: Illegal number of rounds (4-31): [N]"
        required_handling: >
          Caller MUST wrap hashSync() in try-catch when rounds parameter comes from
          configuration or environment variables. Validate rounds is 4-31 before calling.
          Production minimum recommended: 12.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hash-sync-blocks-event-loop
        condition: "hashSync() is called in a Node.js HTTP request handler or any async context"
        throws: "Does not throw — instead blocks event loop for 100ms-400ms+"
        required_handling: >
          Caller MUST NOT use hashSync() in Express/Fastify/Next.js API routes, background
          workers serving concurrent requests, or any code running in the main event loop.
          The operation blocks all other requests for its duration. Use async hash() instead.
          hashSync is ONLY appropriate in: CLI scripts, database seed files, one-time migration
          scripts, and test setup (beforeAll/beforeEach fixtures).
        sources:
          - "https://raw.githubusercontent.com/dcodeIO/bcrypt.js/master/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: hash-sync-password-truncation
        description: >
          Passwords longer than 72 bytes (UTF-8 encoded) are silently truncated.
          hashSync does not warn, throw, or reject — it silently produces a valid-looking
          hash for a truncated password. Use bcrypt.truncates(password) before calling
          hashSync() when handling user-provided passwords of arbitrary length.
        sources:
          - "https://raw.githubusercontent.com/dcodeIO/bcrypt.js/master/README.md"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: compareSync
    import_path: "bcryptjs"
    description: >
      Synchronously tests a plaintext password against a bcrypt hash. Returns a boolean.
      Like hashSync, blocks the event loop for the full comparison duration. The critical
      footgun is the SILENT RETURN OF FALSE for invalid/malformed hashes — it does NOT
      throw an error when the hash is the wrong length, which causes silent authentication
      bypass if the caller does not distinguish false (wrong password) from false (bad hash).

    postconditions:
      # Evidence: https://github.com/dcodeIO/bcrypt.js/blob/master/index.js (lines 226-234)
      # Source confirmed: compareSync returns false (not throws) when hash.length !== 60
      - id: compare-sync-type-error
        condition: "password or hash is not a string"
        throws: "Error: Illegal arguments: [typeof password], [typeof hash]"
        required_handling: >
          Caller MUST wrap compareSync() in try-catch. Common cause: retrieving hash
          from database as Buffer instead of string, or passing undefined when the
          user record is not found. Unlike the async compare(), no .catch() is available.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: compare-sync-silent-false-on-bad-hash
        condition: "hash parameter is a string but not exactly 60 characters (malformed bcrypt hash)"
        returns: "false — NOT an error, not a throw. Silent authentication failure."
        required_handling: >
          Callers who only check `if (isMatch)` without validating that the stored hash
          is well-formed will silently deny authentication for ALL users whose hashes were
          truncated, corrupted, or stored in a VARCHAR(40) column. Always validate that
          the hash column is VARCHAR(60) or CHAR(60) in the database schema and that the
          hash was not corrupted in transit. This is the #1 silent authentication bug with
          bcryptjs — the function returns false for wrong-password AND bad-hash, making it
          impossible to distinguish them without additional checks.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
          - "https://github.com/dcodeIO/bcrypt.js/issues/20"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: authentication_failure
          incident_cost_range: high

      - id: compare-sync-blocks-event-loop
        condition: "compareSync() is called in a Node.js HTTP request handler or async context"
        throws: "Does not throw — instead blocks event loop for 100ms-400ms+"
        required_handling: >
          Caller MUST NOT use compareSync() in Express/Fastify/Next.js API routes or any
          code running in the main event loop. Use async compare() for all authentication
          endpoints. compareSync is ONLY appropriate in: CLI scripts, test setup, and
          one-off verification scripts.
        sources:
          - "https://raw.githubusercontent.com/dcodeIO/bcrypt.js/master/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: genSaltSync
    import_path: "bcryptjs"
    description: >
      Synchronously generates a bcrypt salt. Typically used in conjunction with hashSync()
      in non-async contexts. The same event-loop-blocking concern applies. In most cases,
      simply passing a numeric rounds value to hashSync() or hash() is preferable to calling
      genSaltSync() + hashSync() separately.

    postconditions:
      # Evidence: https://github.com/dcodeIO/bcrypt.js/blob/master/index.js (lines 87-103)
      # Source confirmed: genSaltSync throws for invalid rounds type and out-of-range values
      - id: gensalt-sync-invalid-rounds
        condition: "rounds is not a number, or rounds < 4 or rounds > 31"
        throws: "Error: Illegal arguments: [typeof rounds] (wrong type) or Error: Illegal number of rounds (4-31): [N] (out of range)"
        required_handling: >
          Caller MUST wrap genSaltSync() in try-catch when rounds comes from
          configuration or user input. Validate rounds is an integer between 4 and 31.
          Common error: reading BCRYPT_ROUNDS from environment variable as string without
          parseInt() — e.g., process.env.BCRYPT_ROUNDS returns '12' (string) not 12 (number).
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: gensalt-sync-rng-failure
        condition: "called in a browser environment without setting a random fallback via setRandomFallback()"
        throws: "Error: Secure random number generator not available"
        required_handling: >
          In browser environments, bcryptjs requires calling bcrypt.setRandomFallback()
          with a CSPRNG implementation before using any salt-generating functions.
          Node.js environments use crypto.randomBytes() automatically and are unaffected.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getRounds
    import_path: "bcryptjs"
    description: >
      Extracts the cost factor (rounds) from a bcrypt hash string. Used to detect when
      stored hashes were generated with an outdated cost factor and need to be rehashed
      on next login. This is a common pattern in production auth systems for
      transparent password upgrades.

    postconditions:
      # Evidence: https://github.com/dcodeIO/bcrypt.js/blob/master/index.js (lines 296-300)
      # Source confirmed at bcryptjs@3.0.3 node_modules/bcryptjs/index.js:296-300
      # Throws Error("Illegal arguments: " + typeof hash) if hash is not a string.
      # Otherwise parseInt(hash.split("$")[2], 10) — returns NaN for malformed hashes (silent).
      - id: get-rounds-type-error
        condition: "hash parameter is not a string"
        throws: "Error: Illegal arguments: [typeof hash]"
        required_handling: >
          Caller MUST wrap getRounds() in try-catch when the hash comes from a database
          column or external source where it could be null, undefined, a Buffer, or any
          non-string type. Common cause: the user record was not found (hash is undefined)
          and the calling code did not guard, so a synchronous throw bubbles up into a
          login or password-rotation handler that does not expect it. Validate that the
          hash is a string of length 60 before calling getRounds().
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: get-rounds-silent-nan-on-malformed-hash
        description: >
          getRounds() does NOT validate the hash format. If the hash is a string but is
          not a well-formed bcrypt hash (wrong length, wrong prefix, truncated, or
          stored in a VARCHAR column too narrow to hold the full 60 chars), getRounds()
          returns NaN silently — no throw, no warning. Comparing the result to a target
          rounds value (`if (getRounds(hash) < 12) { rehash() }`) will evaluate to false
          for NaN, so rehash logic silently never runs and weak hashes persist forever.
          Always validate the hash format separately (length === 60 && starts with $2a$
          or $2b$) before relying on getRounds(). This is a silent security-degradation
          path that escapes most testing.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: getSalt
    import_path: "bcryptjs"
    description: >
      Extracts the salt portion (first 29 characters) from a bcrypt hash. Used in
      rare cases where an application wants to deterministically re-hash a known
      password against the existing salt — for instance, during password verification
      in legacy migration paths. In modern code, compare() should be preferred.

    postconditions:
      # Evidence: https://github.com/dcodeIO/bcrypt.js/blob/master/index.js (lines 308-314)
      # Source confirmed at bcryptjs@3.0.3 node_modules/bcryptjs/index.js:308-314.
      # Throws Error("Illegal arguments: " + typeof hash) if hash is not a string.
      # Throws Error("Illegal hash length: " + length + " != 60") if hash.length !== 60.
      - id: get-salt-type-error
        condition: "hash parameter is not a string"
        throws: "Error: Illegal arguments: [typeof hash]"
        required_handling: >
          Caller MUST wrap getSalt() in try-catch when the hash comes from a database
          row or external source where it may be null, undefined, or a non-string type
          (Buffer, Object). The function throws synchronously — there is no Promise
          and no .catch() path. Validate that the hash is a 60-character string
          before calling.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: get-salt-illegal-length
        condition: "hash is a string but its length is not exactly 60 characters"
        throws: "Error: Illegal hash length: [length] != 60"
        required_handling: >
          Caller MUST handle the length-validation throw. Common cause: the hash was
          stored in a VARCHAR column narrower than 60 (e.g. VARCHAR(40)), or it was
          trimmed/encoded on insert, or it was migrated from a different bcrypt
          variant (some libraries produce $2y$ hashes that may have different
          lengths). Unlike compareSync() which silently returns false for malformed
          hashes, getSalt() throws explicitly — so an uncaught throw will crash the
          handler. Validate hash.length === 60 before calling, or wrap the call.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: truncates
    import_path: "bcryptjs"
    description: >
      Returns true if a password's UTF-8 byte length exceeds 72 bytes (the bcrypt
      algorithm's truncation boundary). Used as a preflight check in authentication
      flows to either reject overly-long passwords up front or warn the user that
      only the first 72 bytes will be considered. Without this check, users with
      long passwords can change their password to a "different" one whose first
      72 bytes match the old one and silently bypass the change.

    postconditions:
      # Evidence: https://github.com/dcodeIO/bcrypt.js/blob/master/index.js (lines 322-326)
      # Source confirmed at bcryptjs@3.0.3 node_modules/bcryptjs/index.js:322-326.
      # Throws Error("Illegal arguments: " + typeof password) if password is not a string.
      - id: truncates-type-error
        condition: "password parameter is not a string"
        throws: "Error: Illegal arguments: [typeof password]"
        required_handling: >
          Caller MUST wrap truncates() in try-catch or validate the input is a string
          first. Common cause: passing undefined when the user-submitted form field
          is missing, or passing a Buffer from a binary upload path. The function is
          synchronous — there is no Promise rejection or .catch() handler available.
        sources:
          - "https://github.com/dcodeIO/bcrypt.js/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

    edge_cases:
      - id: truncates-must-precede-hashing
        description: >
          If truncates() returns true and the caller proceeds to call hash() or
          hashSync() anyway, bcryptjs silently hashes only the first 72 bytes of the
          password. Two different long passwords whose first 72 bytes are identical
          will produce verifiable matches — a serious authentication ambiguity. Best
          practice in a registration/password-change flow is to (1) call truncates()
          first, (2) reject the password and ask the user for a shorter one, OR
          (3) pre-hash with SHA-256 to a fixed-length input before passing to bcrypt
          (with the caveat that SHA-256-then-bcrypt should NOT mix passwords with
          non-prehashed bcrypt hashes — pick one strategy app-wide).
        sources:
          - "https://raw.githubusercontent.com/dcodeIO/bcrypt.js/master/README.md"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: authentication_failure
          incident_cost_range: medium

