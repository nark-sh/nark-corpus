package: simple-oauth2
semver: ">=4.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed

functions:
  - name: getToken
    import_path: "simple-oauth2"
    description: "Requests an access token from the OAuth2 provider. Available on AuthorizationCode, ClientCredentials, and ResourceOwnerPassword grant instances."

    postconditions:
      - id: network-error
        condition: "Network error, connection timeout, or DNS resolution failure when contacting the OAuth2 server"
        throws: "Error with network error details (no response body)"
        required_handling: >
          Caller MUST wrap getToken() in try-catch to handle network failures.
          Network errors have no response body; check error.message for details.
          Implement retry with exponential backoff for transient network failures.
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: invalid-credentials
        condition: "OAuth2 server returns 401 Unauthorized (invalid client_id, client_secret, or credentials)"
        throws: "Error with response body containing OAuth2 error description"
        required_handling: >
          Caller MUST catch this error and handle configuration failures.
          DO NOT retry invalid credentials automatically — this indicates a configuration error.
          Error object includes response.status and OAuth2 error details in the message.
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: server-error
        condition: "OAuth2 server returns 4xx or 5xx status code"
        throws: "Error with HTTP status and response body"
        required_handling: >
          Caller MUST catch and inspect the error. For 5xx errors, implement retry logic.
          For 4xx client errors, log and surface to operations — retrying without fixing
          the configuration will not resolve the issue.
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: client-credentials-no-refresh
        description: "Tokens obtained with the Client Credentials grant cannot be refreshed with refresh(). A new token must be requested with getToken() instead."
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: refresh
    import_path: "simple-oauth2"
    description: "Refreshes an existing access token using its refresh_token. Available on AccessToken instances."

    postconditions:
      - id: refresh-token-expired-or-invalid
        condition: "The refresh token has expired, been revoked, or is invalid"
        throws: "Error with OAuth2 error response (typically 400 Bad Request with invalid_grant)"
        required_handling: >
          Caller MUST catch refresh errors and handle re-authentication.
          When refresh fails with invalid_grant, the user MUST re-authenticate from scratch.
          DO NOT retry refresh token errors — the token is invalid and a new authorization flow is required.
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
          - "https://www.oauth.com/oauth2-servers/making-authenticated-requests/refreshing-an-access-token/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: network-error
        condition: "Network error when contacting the OAuth2 server during refresh"
        throws: "Error with network error details"
        required_handling: >
          Caller MUST wrap refresh() in try-catch and implement retry logic for network failures.
          Distinguish between network errors (retry safe) and OAuth2 errors (not retry safe).
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: check-expired-before-refresh
        description: "Use token.expired() to check if the token needs refreshing before calling refresh(). Token expiry should be checked with a buffer (e.g., 300 seconds before actual expiry) to account for clock skew."
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
          - "https://www.oauth.com/oauth2-servers/making-authenticated-requests/refreshing-an-access-token/"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: revoke
    import_path: "simple-oauth2"
    description: "Revokes an access or refresh token at the OAuth2 server."

    postconditions:
      - id: revoke-network-error
        condition: "Network error when contacting the OAuth2 server during revocation"
        throws: "Error with network error details"
        required_handling: >
          Caller MUST wrap revoke() in try-catch. Network errors during revocation do not
          guarantee whether the token was revoked or not. Log the error and treat the token
          as potentially still valid.
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: revoke-server-error
        condition: "OAuth2 server returns error during revocation"
        throws: "Error with HTTP status and OAuth2 error response"
        required_handling: >
          Caller MUST catch errors from revoke() and handle revocation failures gracefully.
          If revocation fails, do not assume the token is invalid on the server side.
        sources:
          - "https://github.com/lelylan/simple-oauth2/blob/master/API.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
