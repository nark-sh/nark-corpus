status: production
evidence_quality: confirmed

detection:
  type_names:
    - Injectable
    - Controller
    - HttpException
    - ExceptionFilter

functions:
  - name: Injectable
    import_path: "@nestjs/common"
    description: "Decorator for dependency injection"
    postconditions:
      # Evidence: 0 primary firings across 10 repos in scan-nestjs-common-2026-04-02.json
      # Scanner correctly identifies NestJS decorator usage; no violations fired in clean repos.
      # Top scanned: ghostfolio/ghostfolio (⭐ 7985), lujakob/nestjs-realworld-example-app (⭐ 3326), notadd/notadd (⭐ 2836)
      - id: injectable-constructor-error
        condition: "constructor throws error during dependency injection (connection failure, initialization error)"
        throws: "Error that prevents application startup"
        required_handling: "Injectable class constructors SHOULD handle initialization errors gracefully or throw descriptive errors. Constructor errors during DI crash application startup with unclear error messages."
        sources:
          - "https://docs.nestjs.com/providers"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Controller
    import_path: "@nestjs/common"
    description: "Decorator for route controllers"
    postconditions:
      # Evidence: 0 primary firings across 10 repos in scan-nestjs-common-2026-04-02.json
      # NestJS framework handles async errors through exception filters; most repos rely on framework-level handling.
      # Top scanned: NarHakobyan/awesome-nest-boilerplate (⭐ 2775), nestjs/typeorm (⭐ 2121), nestjs/swagger (⭐ 1861)
      - id: controller-async-handler-error
        condition: "async route handler throws error or promise rejects"
        throws: "Error propagated to exception filter or default error handler"
        required_handling: "Controller route handlers MUST handle async errors with try-catch or let NestJS exception filters handle them. Unhandled async errors crash application if no exception filter is configured."
        sources:
          - "https://docs.nestjs.com/exception-filters"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

edge_cases:
  - id: exception-filter-pattern
    description: "Use @UseFilters() with custom ExceptionFilter for centralized error handling - prevents inconsistent error responses and provides proper error formatting"
    sources:
      - "https://docs.nestjs.com/exception-filters#exception-filters-1"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

