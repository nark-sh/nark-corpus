package: "@nestjs/jwt"
semver: ">=9.0.0 <12.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed
# Audit 2026-04-02: 6 repos scanned, 3 affected (50%), 3 violations. 0/87 FPs.
# verifyAsync, verify, signAsync all confirmed firing across NestJS boilerplates.

detection:
  type_names:
    - JwtService

functions:
  - name: verifyAsync
    import_path: "@nestjs/jwt"
    description: "Asynchronously verify and decode a JWT token"
    postconditions:
      - id: verify-no-try-catch
        # Evidence: seen in 1 primary firing across 1 repo in scan-nestjs-jwt-2026-04-02.json
        # Top affected: surmon-china/nodepress (⭐ 1521 stars)
        condition: "token is expired, has invalid signature, is malformed, or fails audience/issuer/subject checks"
        throws: "JsonWebTokenError | TokenExpiredError | NotBeforeError"
        required_handling: "MUST wrap in try-catch. In production, expired and invalid tokens are expected inputs (not programmer errors). Unhandled rejection crashes the request handler and leaks 500 errors to clients."
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#errors--codes"
          - "https://docs.nestjs.com/security/authentication"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: verify
    import_path: "@nestjs/jwt"
    description: "Synchronously verify and decode a JWT token"
    postconditions:
      - id: verify-sync-no-try-catch
        # Evidence: seen in 1 primary firing across 1 repo in scan-nestjs-jwt-2026-04-02.json
        # Top affected: CatsMiaow/nestjs-project-structure (⭐ 1342 stars)
        condition: "token is expired, has invalid signature, is malformed, or fails claim checks"
        throws: "JsonWebTokenError | TokenExpiredError | NotBeforeError"
        required_handling: "MUST wrap in try-catch. Throws synchronously — same error types as verifyAsync."
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#errors--codes"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: signAsync
    import_path: "@nestjs/jwt"
    description: "Asynchronously sign a payload and return a JWT token"
    postconditions:
      - id: sign-async-no-try-catch
        # Evidence: seen in 1 primary firing across 1 repo in scan-nestjs-jwt-2026-04-02.json
        # Top affected: NarHakobyan/awesome-nest-boilerplate (⭐ 2775 stars)
        condition: "async secretOrKeyProvider fails, or invalid algorithm/key configuration"
        throws: "Error (from secretOrKeyProvider rejection or jsonwebtoken signing failure)"
        required_handling: "SHOULD wrap in try-catch when using async secretOrKeyProvider. Low-risk when using static secret strings."
        sources:
          - "https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
