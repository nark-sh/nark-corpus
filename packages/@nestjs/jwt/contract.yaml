package: "@nestjs/jwt"
semver: ">=9.0.0 <12.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0
# Audit 2026-04-13: 6 repos scanned, 3 affected (50%), 3 violations. 0/87 FPs (from Apr-02).
# Audit 2026-04-02: 6 repos scanned, 3 affected (50%), 3 violations. 0/87 FPs.
# verifyAsync, verify, signAsync all confirmed firing across NestJS boilerplates.
# Deepen pass 2026-04-15 (deepen-stream-2): added sign() sync method.
# API surface: 4 async-callable functions (sign, signAsync, verify, verifyAsync). decode() omitted (never throws, returns null).
# coverage_score: 0.75 → 1.0 (4/4 functions contracted)
# Deepen pass 2026-06-24 (deepen-stream-2 pass 36, drift-mode): added 2 postcondition-density entries against @nestjs/jwt@11.0.2 source:
#   (1) signAsync sync-throw on string-payload+options (Promise constructor never runs, .catch() can't catch it)
#   (2) verifyAsync misconfigured-secret unhandled-rejection (boot-time config validation gap)
# Coverage stays 1.0 (no new functions, deepened density only). last_verified 2026-04-15 → 2026-06-24.

detection:
  type_names:
    - JwtService

functions:
  - name: verifyAsync
    import_path: "@nestjs/jwt"
    description: "Asynchronously verify and decode a JWT token"
    postconditions:
      - id: verify-no-try-catch
        # Evidence: seen in 1 primary firing across 1 repo in scan-nestjs-jwt-2026-04-02.json
        # Top affected: surmon-china/nodepress (⭐ 1521 stars)
        condition: "token is expired, has invalid signature, is malformed, or fails audience/issuer/subject checks"
        throws: "JsonWebTokenError | TokenExpiredError | NotBeforeError"
        required_handling: "MUST wrap in try-catch. In production, expired and invalid tokens are expected inputs (not programmer errors). Unhandled rejection crashes the request handler and leaks 500 errors to clients."
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#errors--codes"
          - "https://docs.nestjs.com/security/authentication"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      # Evidence: https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts
      # Source confirmed (node_modules/@nestjs/jwt/dist/jwt.service.js lines 69-78, version 11.0.2):
      #   verifyAsync() calls getSecretKey() which, when no secret/publicKey/secretOrKeyProvider
      #   is configured, returns undefined. jsonwebtoken's verify() then rejects with
      #   "secret or public key must be provided" via the callback shim — but this rejection
      #   surfaces only inside the inner Promise resolution, *not* via the outer .catch(reject)
      #   on the same tick. The rejection propagates as an unhandledRejection if the caller
      #   pattern is `verifyAsync(token).then(...)` without an attached catch.
      - id: verify-async-misconfigured-secret-unhandled-rejection
        condition: "JwtService instantiated without a secret/publicKey/secretOrKeyProvider AND verifyAsync() called without per-call secret override"
        throws: "Error('secret or public key must be provided') from jsonwebtoken — Promise rejection, NOT a sync throw"
        required_handling: "MUST validate JwtModule configuration at boot time (registerAsync useFactory should throw if secret resolution returns undefined). When config-validation is not feasible, every verifyAsync() call site must attach a .catch() or be wrapped in try-catch on await. Misconfigured JwtService is a deployment-time hazard that only fires on first verify call — easy to ship to staging undetected, common cause of '500 on /auth/me' incidents post-deploy."
        sources:
          - "https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts"
          - "https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts#L69-L78"
          - "https://github.com/auth0/node-jsonwebtoken/blob/master/verify.js"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: verify
    import_path: "@nestjs/jwt"
    description: "Synchronously verify and decode a JWT token"
    postconditions:
      - id: verify-sync-no-try-catch
        # Evidence: seen in 1 primary firing across 1 repo in scan-nestjs-jwt-2026-04-02.json
        # Top affected: CatsMiaow/nestjs-project-structure (⭐ 1342 stars)
        condition: "token is expired, has invalid signature, is malformed, or fails claim checks"
        throws: "JsonWebTokenError | TokenExpiredError | NotBeforeError"
        required_handling: "MUST wrap in try-catch. Throws synchronously — same error types as verifyAsync."
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#errors--codes"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: signAsync
    import_path: "@nestjs/jwt"
    description: "Asynchronously sign a payload and return a JWT token"
    postconditions:
      - id: sign-async-no-try-catch
        # Evidence: seen in 1 primary firing across 1 repo in scan-nestjs-jwt-2026-04-02.json
        # Top affected: NarHakobyan/awesome-nest-boilerplate (⭐ 2775 stars)
        condition: "async secretOrKeyProvider fails, or invalid algorithm/key configuration"
        throws: "Error (from secretOrKeyProvider rejection or jsonwebtoken signing failure)"
        required_handling: "SHOULD wrap in try-catch when using async secretOrKeyProvider. Low-risk when using static secret strings."
        sources:
          - "https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts
      # Source confirmed (node_modules/@nestjs/jwt/dist/jwt.service.js lines 48-51, version 11.0.2):
      #   signAsync() runs the string-payload + disallowed-options check BEFORE returning the Promise.
      #   The throw happens synchronously, not as a Promise rejection. signAsync(...).catch() cannot
      #   catch it because the Promise constructor never runs.
      - id: sign-async-sync-throw-on-string-payload-with-options
        condition: "signAsync() called with string payload AND signOptions containing keys other than 'secret' or 'privateKey' (e.g. expiresIn, audience, issuer)"
        throws: "Error('Payload as string is not allowed with the following sign options: <keys>') — thrown SYNCHRONOUSLY before the Promise is constructed"
        required_handling: "MUST wrap signAsync() call in try-catch (not just .catch()) when payload may be a string and signOptions vary at runtime. signAsync(payload, opts).catch() CANNOT catch this synchronous throw because the Promise never gets constructed. The .catch() handler runs against a Promise that throws during its own creation, leaving an unhandled exception that crashes the request handler."
        sources:
          - "https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts"
          - "https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts#L48-L51"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: sign
    import_path: "@nestjs/jwt"
    description: >
      Synchronously signs a payload and returns a JWT token string. Throws
      synchronously for two distinct reasons: (1) when an async secretOrKeyProvider
      is configured but the sync method is called, and (2) when the payload is a
      string but disallowed sign options are present.
    postconditions:
      # Evidence: https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts
      # Source confirmed: throw new WrongSecretProviderError() when secret instanceof Promise
      - id: sign-sync-wrong-secret-provider
        condition: "secretOrKeyProvider option is async (returns Promise) but sync sign() is called instead of signAsync()"
        throws: "WrongSecretProviderError — extends Error, thrown synchronously before jwt.sign() is called"
        required_handling: "MUST use signAsync() when secretOrKeyProvider is async. Using sign() with an async provider throws immediately and the token is never generated."
        sources:
          - "https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

      # Evidence: https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts
      # Source confirmed: throw new Error('Payload as string is not allowed with the following sign options: ...')
      - id: sign-sync-string-payload-with-options
        condition: "payload is a string AND sign options contain keys other than 'secret' or 'privateKey' (e.g. expiresIn, audience, issuer)"
        throws: "Error('Payload as string is not allowed with the following sign options: <keys>')"
        required_handling: "MUST use object or Buffer payload when setting sign options like expiresIn, audience, or issuer. String payloads only accept secret/privateKey overrides."
        sources:
          - "https://github.com/nestjs/jwt/blob/master/lib/jwt.service.ts"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: low
