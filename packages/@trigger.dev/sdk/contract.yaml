package: "@trigger.dev/sdk"
semver: ">=3.0.0 <5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: partial

detection:
  require_instance_tracking: false

functions:
  - name: trigger
    import_path: "@trigger.dev/sdk"
    description: >
      Triggers a background task by task ID. Called as tasks.trigger(taskId, payload, options?).
      Makes an authenticated HTTP POST to the Trigger.dev API. Returns a RunHandle with the runId.
      Throws on network failures, invalid API key, task not found, or rate limiting.

    postconditions:
      - id: trigger-no-try-catch
        condition: >
          tasks.trigger() called in async context without surrounding try/catch.
          API failures (auth, rate limit, network) result in unhandled rejected Promises.
        throws: >
          ApiRequestError (extends Error).
          status 401: Invalid or missing API key (TRIGGER_SECRET_KEY not set or wrong).
          status 403: API key lacks permission to trigger the task.
          status 404: Task with given ID not registered in this environment.
          status 429: Rate limit exceeded.
          Error: Network failure (DNS, timeout, connection refused).
        required_handling: >
          Caller MUST wrap tasks.trigger() in try/catch.
          Handle at minimum:
          - 404: task not found — may indicate deployment mismatch
          - 429: rate limit — implement backoff
          - Network errors: surface to caller rather than silently failing
        sources:
          - "https://trigger.dev/docs/management/runs/trigger"
          - "https://trigger.dev/docs/errors-retrying"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: batchTrigger
    import_path: "@trigger.dev/sdk"
    description: >
      Triggers multiple background tasks in a single API call. Called as
      tasks.batchTrigger([{id, payload}, ...]). Makes an authenticated HTTP POST.
      Throws on network failures, auth errors, or rate limiting.

    postconditions:
      - id: batchtrigger-no-try-catch
        condition: >
          tasks.batchTrigger() called in async context without surrounding try/catch.
          API failures result in unhandled rejected Promises.
        throws: >
          ApiRequestError (extends Error).
          status 401: Invalid API key.
          status 429: Rate limit exceeded.
          Error: Network failure.
        required_handling: >
          Caller MUST wrap tasks.batchTrigger() in try/catch.
          Handle rate limiting with exponential backoff.
        sources:
          - "https://trigger.dev/docs/management/runs/trigger"
          - "https://trigger.dev/docs/errors-retrying"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: retrieve
    import_path: "@trigger.dev/sdk"
    description: >
      Retrieves a task run by ID. Called as runs.retrieve(runId).
      Makes an authenticated HTTP GET to the Trigger.dev API.
      Throws if the run is not found (404) or on auth/network errors.

    postconditions:
      - id: retrieve-no-try-catch
        condition: >
          runs.retrieve() called in async context without surrounding try/catch.
          Not-found and auth errors result in unhandled rejected Promises.
        throws: >
          ApiRequestError (extends Error).
          status 401: Invalid API key.
          status 404: Run not found with given ID.
          Error: Network failure.
        required_handling: >
          Caller MUST wrap runs.retrieve() in try/catch.
          Handle 404 as graceful not-found — return null instead of throwing.
        sources:
          - "https://trigger.dev/docs/management/runs/retrieve"
          - "https://trigger.dev/docs/errors-retrying"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: list
    import_path: "@trigger.dev/sdk"
    description: >
      Lists task runs with optional filtering. Called as runs.list(options?).
      Makes an authenticated HTTP GET to the Trigger.dev API.
      Throws on auth failures, invalid filters, or network errors.

    postconditions:
      # Evidence: seen in 2 primary firings across 1 repo in scan-trigger.dev-sdk-2026-04-02.json
      # Top affected: mfts/papermark (⭐ top)
      - id: list-no-try-catch
        condition: >
          runs.list() called in async context without surrounding try/catch.
          Auth and network errors result in unhandled rejected Promises.
        throws: >
          ApiRequestError (extends Error).
          status 401: Invalid API key.
          status 400: Invalid filter parameters.
          status 429: Rate limit exceeded.
          Error: Network failure.
        required_handling: >
          Caller MUST wrap runs.list() in try/catch.
          Return empty array on failure rather than crashing.
        sources:
          - "https://trigger.dev/docs/management/runs/list"
          - "https://trigger.dev/docs/errors-retrying"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: create
    import_path: "@trigger.dev/sdk"
    description: >
      Creates a schedule for a task. Called as schedules.create({task, cron, ...}).
      Makes an authenticated HTTP POST to the Trigger.dev API.
      Throws on auth failures, invalid cron expressions, or network errors.

    postconditions:
      - id: schedules-create-no-try-catch
        condition: >
          schedules.create() called in async context without surrounding try/catch.
          Auth, validation, and network errors result in unhandled rejected Promises.
        throws: >
          ApiRequestError (extends Error).
          status 401: Invalid API key.
          status 422: Invalid schedule parameters (bad cron, unknown task).
          status 429: Rate limit exceeded.
          Error: Network failure.
        required_handling: >
          Caller MUST wrap schedules.create() in try/catch.
          Handle 422 for invalid cron expressions or task IDs.
        sources:
          - "https://trigger.dev/docs/management/schedules/create"
          - "https://trigger.dev/docs/errors-retrying"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: update
    import_path: "@trigger.dev/sdk"
    description: >
      Updates an existing schedule. Called as schedules.update(scheduleId, options).
      Makes an authenticated HTTP PUT to the Trigger.dev API.
      Throws if the schedule is not found (404) or on auth/network errors.

    postconditions:
      - id: schedules-update-no-try-catch
        condition: >
          schedules.update() called in async context without surrounding try/catch.
          Not-found and auth errors result in unhandled rejected Promises.
        throws: >
          ApiRequestError (extends Error).
          status 401: Invalid API key.
          status 404: Schedule not found with given ID.
          status 422: Invalid schedule parameters.
          Error: Network failure.
        required_handling: >
          Caller MUST wrap schedules.update() in try/catch.
          Handle 404 gracefully — schedule may have been deleted.
        sources:
          - "https://trigger.dev/docs/management/schedules/update"
          - "https://trigger.dev/docs/errors-retrying"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
