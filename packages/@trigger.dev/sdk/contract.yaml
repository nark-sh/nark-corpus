          try {
            await envvars.create({ name: "STRIPE_KEY", value: process.env.STRIPE_KEY });
          } catch (err) {
            if (err instanceof ConflictError) {
              await envvars.update("STRIPE_KEY", { value: process.env.STRIPE_KEY });
