  - name: createToken
    import_path: "@trigger.dev/sdk"
    description: >
      Creates a waitpoint token that can be used to pause a task run until an
      external event completes. Called as wait.createToken(options?).
      Used to implement human-in-the-loop, webhook callbacks, or approval flows.
      The token has a URL that external systems POST to in order to complete the wait.
      Can be called from inside or outside a task.

    postconditions:
      # Evidence: @trigger.dev/sdk/dist/commonjs/v3/wait.d.ts — function signature
      # ApiPromise<CreateWaitpointTokenResponse> — confirms it returns a Promise
      # AuthenticationError/ApiConnectionError confirmed from error class source
      - id: createtoken-no-try-catch
        condition: >
          wait.createToken() called in async context without surrounding try/catch.
          Auth failures or network errors result in unhandled rejected Promise.
        throws: >
          AuthenticationError (status 401) — invalid or missing API key.
          ApiConnectionError — network failure creating the token.
          RateLimitError (status 429) — rate limit on waitpoint creation.
        required_handling: >
          Caller MUST wrap wait.createToken() in try/catch.
          A failed token creation means the external callback URL was never
          created — the workflow pauses without any way to resume.

          try {
            const token = await wait.createToken({
              idempotencyKey: `approve-${documentId}`,
              timeout: "24h",
            });
            // Send token.url to external system
            await notifyApprover(token.url);
            // Now wait for it (inside task only)
            const result = await wait.forToken(token);
          } catch (err) {
            console.error("Failed to create approval token:", err);
            throw err; // Abort the task — no way to proceed
          }
        sources:
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/wait.ts"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/core/src/v3/apiClient/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: completeToken
    import_path: "@trigger.dev/sdk"
    description: >
      Completes a waitpoint token, unblocking the task run that is waiting on it.
      Called as wait.completeToken(token, data). The token can be a string ID or
      object with an id property. Called from OUTSIDE the waiting task — typically
      from a webhook handler or approval endpoint.
      Returns {success: true} on success, throws on token-not-found or auth failure.

    postconditions:
      # Evidence: @trigger.dev/sdk/dist/commonjs/v3/wait.d.ts — function signature
      # Promise<{success: true}> return type — confirms it rejects on failure
      - id: completetoken-no-try-catch
        condition: >
          wait.completeToken() called in a webhook handler or API route without
          try/catch. NotFoundError (token expired or never created) or
          AuthenticationError results in unhandled rejected Promise.
          Common in webhook handlers that forget error handling.
        throws: >
          NotFoundError (status 404) — token not found (expired, already completed,
            or token ID is incorrect).
          AuthenticationError (status 401) — invalid or missing API key.
          ApiConnectionError — network failure.
          ConflictError (status 409) — token already completed (idempotent
            completion attempted twice with different data).
        required_handling: >
          Caller MUST wrap wait.completeToken() in try/catch.
          In webhook handlers, a 404 is usually safe to ignore (already completed)
          but should be logged for debugging.

          // In your webhook handler:
          try {
            await wait.completeToken(tokenId, { status: "approved", approvedBy: userId });
          } catch (err) {
            if (err instanceof NotFoundError) {
              // Token already completed or expired — safe to ignore
              console.warn("Token already completed:", tokenId);
              return res.status(200).json({ ok: true }); // Don't retry
            }
            console.error("Failed to complete token:", err);
            return res.status(500).json({ error: "Failed" }); // Allow retry
          }
        sources:
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/wait.ts"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/core/src/v3/apiClient/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
