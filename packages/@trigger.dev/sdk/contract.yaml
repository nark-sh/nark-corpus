  - name: envvars-upload
    import_path: "@trigger.dev/sdk"
    description: >
      Uploads (bulk-imports) environment variables to a Trigger.dev project/environment.
      Called as envvars.upload(projectRef, slug, params) or envvars.upload(params) when
      task-runtime ambient context provides projectRef+slug. Makes an authenticated HTTP
      POST that REPLACES the entire env-var set when `override: true` is set in params.
      Both arg-validation (synchronous throws on missing projectRef/slug/params) and the
      remote API call can fail.

    postconditions:
      # Evidence: source inspection — @trigger.dev/sdk/dist/commonjs/v3/envvars.js
      # Synchronous arg-validation throws: "params is required", "slug is required",
      # "projectRef is required" — these throw BEFORE returning a Promise.
      # Async errors via apiClient.importEnvVars: full ApiError hierarchy.
      - id: envvars-upload-no-try-catch
        maturity: stable
        condition: >
          envvars.upload() called in async context without surrounding try/catch.
          Arg-validation throws synchronously when projectRef/slug/params are missing
          (deployment-pipeline misconfiguration), and the network upload can fail with
          AuthenticationError, RateLimitError, BadRequestError, or ApiConnectionError.
          When `override: true`, a half-applied failure can leave the environment in a
          partially-replaced state — some vars updated, others stale.
        throws: >
          Error (synchronous) — "params is required", "slug is required",
          "projectRef is required" (when called via overload that requires them).
          ApiClientMissingError (synchronous) — TRIGGER_SECRET_KEY not set.
          AuthenticationError (status 401) — invalid or revoked Personal Access Token.
          BadRequestError (status 400) — malformed env var names (e.g. starting with a digit),
          reserved key collisions (TRIGGER_*).
          RateLimitError (status 429) — bulk import rate limit.
          ApiConnectionError — network failure mid-upload.
        required_handling: >
          Caller MUST wrap envvars.upload() in try/catch — typically in a deploy script
          or CI step. Distinguish BadRequestError (developer error: fix the var names,
          do not retry) from RateLimitError / ApiConnectionError (transient: retry with
          exponential backoff).

          try {
            await envvars.upload(projectRef, "prod", {
              variables: { DATABASE_URL: process.env.NEW_DB_URL, ... },
              override: true,
            });
          } catch (err) {
            if (err instanceof BadRequestError) {
              console.error("Invalid env var spec — fix and re-run:", err.message);
              process.exit(2);
            }
            if (err instanceof AuthenticationError) {
              console.error("TRIGGER_ACCESS_TOKEN invalid — rotate and re-run");
              process.exit(3);
            }
            throw err;
          }

          CRITICAL: when `override: true`, a mid-upload failure can leave the
          environment partially replaced. Re-run the upload to make it idempotent,
          or set override: false and patch individual vars.
        sources:
          - "https://trigger.dev/docs/management/envvars/import"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/envvars.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

