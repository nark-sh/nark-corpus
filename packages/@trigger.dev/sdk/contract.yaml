      from within a task runtime. Makes an authenticated HTTP POST. Throws on
      duplicate-name conflict (409), reserved key collisions, or auth/network errors.

    postconditions:
      # Evidence: source inspection — @trigger.dev/sdk/dist/commonjs/v3/envvars.js
      # Synchronous arg-validation as in envvars.upload.
      # Async errors via apiClient.createEnvVar: full ApiError hierarchy + ConflictError.
      - id: envvars-create-no-try-catch
        maturity: stable
        condition: >
          envvars.create() called in async context without surrounding try/catch.
          Synchronous arg-validation throws "params is required"/"slug is required"/
          "projectRef is required", and the network call can fail with auth, conflict
          (variable already exists), or validation errors.
        throws: >
          Error (synchronous) — "params is required", "slug is required",
