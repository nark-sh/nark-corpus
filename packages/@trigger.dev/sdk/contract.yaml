  - name: idempotency-keys-create
    import_path: "@trigger.dev/sdk"
    description: >
      Creates a deterministic idempotency key derived from the provided key material.
      Called as idempotencyKeys.create(key, options?). When inside a task, the run ID
      is mixed into the hash — making the key unique per parent run, which is the
      whole point of idempotency keys for child triggers. ASYNC — returns
      Promise<IdempotencyKey>, despite the misleading "key creation" naming.
      Without try/catch, a crypto failure or hash-context error becomes an unhandled
      rejection — and child tasks triggered without an idempotency key duplicate on
      parent-task retry.

    postconditions:
      # Evidence: source inspection of @trigger.dev/core/dist/commonjs/v3/idempotencyKeys.js (fetched 2026-06-24)
      # createIdempotencyKey() is async — internally uses Web Crypto SubtleCrypto.digest()
      # in browser/edge, falls back to node:crypto in node. SubtleCrypto can throw
      # OperationError on bad inputs; node:crypto throws synchronously.
      - id: idempotency-keys-create-no-try-catch
        maturity: stable
        condition: >
          idempotencyKeys.create() called in async context without surrounding
          try/catch. While operational errors are rare, the SDK looks up
          taskContext.ctx?.run.id internally — a crypto subsystem failure or
          context-mismatch can reject the promise. More importantly, if the caller
          treats this as synchronous (forgets the await), the IdempotencyKey is a
          Promise object passed to .trigger({ idempotencyKey: ... }) and the API
          rejects with a confusing "key must be a string" error, defeating
          idempotency entirely and allowing duplicate child runs on parent retry.
        throws: >
          OperationError / Error — crypto subsystem failure (edge/browser SubtleCrypto).
          Synchronous TypeError — when called with non-string non-array input
          (developer error caught at call site).
        required_handling: >
          Always await idempotencyKeys.create() and wrap in try/catch in
          retry-sensitive paths. The key purpose of this call is to prevent
          duplicate child runs on parent retry — if creation fails silently and the
          caller passes an undefined idempotency key, the subsequent retry will
          trigger a duplicate child task.

          try {
            const key = await idempotencyKeys.create(["user", userId, "welcome"]);
            await childTask.trigger(payload, { idempotencyKey: key });
          } catch (err) {
            console.error("Idempotency key creation failed — refusing to trigger duplicate", err);
            throw err;
          }
        sources:
          - "https://trigger.dev/docs/idempotency"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/core/src/v3/idempotencyKeys.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: streams-read
    import_path: "@trigger.dev/sdk"
    description: >
      Reads a realtime stream associated with a task run. Called as
      streams.read(runId) or streams.read(runId, key). Returns
      Promise<AsyncIterableStream<T>> — the resolved stream MUST be iterated to
      consume chunks. Throws on auth failures, missing run, or network errors
      during the initial subscription handshake.

    postconditions:
      # Evidence: source inspection — @trigger.dev/sdk/dist/commonjs/v3/streams.js
      # streams.read uses apiClient to open a Server-Sent Events subscription.
      # Initial handshake can fail with the full ApiError hierarchy.
      - id: streams-read-no-try-catch
        maturity: stable
        condition: >
          streams.read() called in async context without surrounding try/catch.
          The initial subscription handshake can fail (auth, network, run-not-found),
          but more subtly — iteration of the returned AsyncIterableStream can throw
          mid-stream when the connection drops. Production dashboards that pipe
          streams to the browser crash silently if the iterator's errors aren't
          caught.
        throws: >
          ApiClientMissingError (synchronous) — TRIGGER_SECRET_KEY not set.
          AuthenticationError (status 401) — invalid token.
          NotFoundError (status 404) — runId doesn't exist or has no stream with
          the given key.
          ApiConnectionError — initial handshake network failure, OR mid-stream
          connection drop (surfaced via the iterator's next() rejection).
        required_handling: >
          Caller MUST wrap both the subscription AND the iteration loop in try/catch.
          Mid-stream errors surface only at the for-await level — a try/catch around
          only streams.read() will miss connection drops.

          try {
            const stream = await streams.read<Chunk>(runId, "completion");
            try {
              for await (const chunk of stream) {
                process(chunk);
              }
            } catch (iterErr) {
              console.warn("Stream dropped mid-flight:", iterErr);
              // Optionally: reconnect via streams.read again
            }
          } catch (err) {
            if (err instanceof NotFoundError) {
              return; // Run has no stream — caller may need to wait
            }
            throw err;
          }
        sources:
          - "https://trigger.dev/docs/realtime/streams"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/streams.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: streams-append
    import_path: "@trigger.dev/sdk"
    description: >
      Appends a chunk to a realtime stream from the current task run. Called as
      streams.append(value) or streams.append(key, value). MUST be called from
      inside a task — throws synchronously otherwise ("Could not determine the
      target run ID for the realtime stream"). Used to feed LLM tokens or
      task-progress updates to a subscribed dashboard.

    postconditions:
      # Evidence: source inspection — @trigger.dev/sdk/dist/commonjs/v3/streams.js
      # Throws Error("Could not determine the target run ID...") when called
      # outside a task without an explicit target. Async write goes through the
      # apiClient and can hit RateLimitError.
      - id: streams-append-no-try-catch
        maturity: stable
        condition: >
          streams.append() called outside a task without an explicit `target` option,
          or called inside a task with a transient API error. The synchronous
          target-run-id error throws BEFORE returning a Promise — a try/catch is
          still required because the synchronous throw will reject the surrounding
          async function. Mid-flight RateLimitError causes partial stream loss —
          chunks before the error reach the consumer, chunks after do not, but the
          consumer has no signal that the stream is now truncated.
        throws: >
          Error (synchronous) — "Could not determine the target run ID for the
          realtime stream. Please specify a target run ID using the `target` option
          or use this function from inside a task."
          ApiClientMissingError (synchronous) — TRIGGER_SECRET_KEY not set.
          AuthenticationError (status 401) — invalid token.
          RateLimitError (status 429) — per-run stream-write rate limit.
          ApiConnectionError — network failure during write.
        required_handling: >
          Caller MUST wrap streams.append() in try/catch. For high-throughput LLM
          streaming use cases, RateLimitError is the dominant failure mode — handle
          by buffering and retrying after the indicated retry-after delay, NOT by
          dropping chunks (the consumer dashboard will display partial output).

          for await (const chunk of openaiStream) {
            try {
              await streams.append("completion", chunk);
            } catch (err) {
              if (err instanceof RateLimitError) {
                await sleep(err.retryAfterMs);
                await streams.append("completion", chunk); // single retry
              } else {
                throw err;
              }
            }
          }
        sources:
          - "https://trigger.dev/docs/realtime/streams"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/streams.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: batch-retrieve
    import_path: "@trigger.dev/sdk"
    description: >
      Retrieves status and per-item results for a previously triggered batch.
      Called as batch.retrieve(batchId). Makes an authenticated HTTP GET.
      Returns the batch shape including per-item run statuses and a top-level
      progress counter. The retrieve itself can fail with the full ApiError
      hierarchy — but the SUBTLE failure is when retrieve succeeds but the
      caller doesn't check per-item status and assumes the batch is healthy.

    postconditions:
      # Evidence: source inspection — @trigger.dev/sdk/dist/commonjs/v3/batch.js
      # batch.retrieve is a thin wrapper over apiClient.retrieveBatch — same ApiError
      # hierarchy as runs.retrieve.
      - id: batch-retrieve-no-try-catch
        maturity: stable
        condition: >
          batch.retrieve() called in async context without surrounding try/catch.
          NotFoundError (404) when the batch ID doesn't exist or was purged
          (default 30-day TTL), AuthenticationError on bad token,
          ApiConnectionError on network failure.
        throws: >
          ApiClientMissingError (synchronous) — TRIGGER_SECRET_KEY not set.
          AuthenticationError (status 401) — invalid token.
          NotFoundError (status 404) — batchId doesn't exist or has expired.
          ApiConnectionError — network failure.
        required_handling: >
          Caller MUST wrap batch.retrieve() in try/catch. Treat NotFoundError as a
          terminal "batch unknown" — do not retry. Treat ApiConnectionError as
          transient and retry with exponential backoff.

          try {
            const batchInfo = await batch.retrieve(batchId);
            // CRITICAL: always check per-item status before declaring success
            const failed = batchInfo.runs.filter(r => r.status !== "COMPLETED");
            if (failed.length > 0) {
              console.warn(`${failed.length}/${batchInfo.runs.length} items failed`);
            }
          } catch (err) {
            if (err instanceof NotFoundError) {
              return null; // batch unknown — surface to caller as "not found"
            }
            throw err;
          }
        sources:
          - "https://trigger.dev/docs/management/batch/retrieve"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/batch.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: usage-measure
    import_path: "@trigger.dev/sdk"
    description: >
      Measures the compute cost and duration of an async callback. Called as
      usage.measure(async () => { ... }). Returns Promise<{ result, compute }>.
      The async callback executes inside an OTEL span — the SDK is responsible for
      starting and ending the span. If the callback throws, the span is closed
      with error status and the throw propagates. Without try/catch, a callback
      throw becomes an unhandled rejection in the parent task.

    postconditions:
      # Evidence: @trigger.dev/sdk/dist/commonjs/v3/usage.d.ts — measure: <T>(cb: () => Promise<T>) => Promise<{result: T; compute: ComputeUsage}>
      # The wrapper propagates callback errors after closing the span.
      - id: usage-measure-no-try-catch
        maturity: stable
        condition: >
          usage.measure() called without try/catch around an inner callback that
          can throw. The compute span is closed correctly, but the throw bubbles
          out of measure() and crashes the surrounding task code. Callers writing
          "I'll handle errors in the callback" are misled — measure() does not
          catch them, it propagates them.
        throws: >
          Whatever the inner callback throws — propagated unchanged after closing
          the compute span.
        required_handling: >
          Caller MUST wrap usage.measure() in try/catch when the inner callback can
          throw and the task should continue on failure. The compute measurement is
          still captured even if the callback throws — read it from the error path
          via a finally block if needed.

          try {
            const { result, compute } = await usage.measure(async () => {
              return await expensiveLLMCall();
            });
            console.log("LLM call cost", compute.costInCents);
            return result;
          } catch (err) {
            console.error("Measured call failed:", err);
            throw err;
          }
        sources:
          - "https://trigger.dev/docs/run-usage"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/usage.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
