functions:
  - name: trigger
    import_path: "@trigger.dev/sdk"
    description: >
      Triggers a background task by task ID. Called as tasks.trigger(taskId, payload, options?).
      Makes an authenticated HTTP POST to the Trigger.dev API. Returns a RunHandle with the runId.
      Throws on network failures, invalid API key, task not found, or rate limiting.

    postconditions:
      # Evidence: source inspection — trigger.dev SDK ApiRequestError class confirmed in src/apiClient.ts
      # FP check 2026-04-13: 0/27 false positives across repos without @trigger.dev/sdk
      - id: trigger-no-try-catch
        condition: >
          tasks.trigger() called in async context without surrounding try/catch.
          API failures (auth, rate limit, network) result in unhandled rejected Promises.
        throws: >
          ApiRequestError (extends Error).
          status 401: Invalid or missing API key (TRIGGER_SECRET_KEY not set or wrong).
          status 403: API key lacks permission to trigger the task.
          status 404: Task with given ID not registered in this environment.
          status 429: Rate limit exceeded.
          Error: Network failure (DNS, timeout, connection refused).
        required_handling: >
          Caller MUST wrap tasks.trigger() in try/catch.
          Handle at minimum:
          - 404: task not found — may indicate deployment mismatch
          - 429: rate limit — implement backoff
          - Network errors: surface to caller rather than silently failing
        sources:
          - "https://trigger.dev/docs/management/runs/trigger"
          - "https://trigger.dev/docs/errors-retrying"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

