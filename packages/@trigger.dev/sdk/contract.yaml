      if an override already exists for the slug (use updateOverride instead).

    postconditions:
      # Evidence: source inspection — @trigger.dev/sdk/dist/commonjs/v3/promptManagement.js
      - id: prompts-create-override-no-try-catch
        maturity: stable
        condition: >
          prompts.createOverride() called in async context without surrounding
          try/catch. ConflictError when an override already exists, NotFoundError
          if slug doesn't exist, BadRequestError on malformed body.
        throws: >
          ApiClientMissingError (synchronous) — TRIGGER_SECRET_KEY not set.
          AuthenticationError (status 401) — invalid token.
          NotFoundError (status 404) — slug doesn't exist.
          ConflictError (status 409) — override already exists for this slug.
          BadRequestError (status 400) — malformed override body, missing required fields.
          ApiConnectionError — network failure.
        required_handling: >
          Caller MUST wrap prompts.createOverride() in try/catch. Most operational
          callers should attempt create-or-update — handle ConflictError by calling
          updateOverride.

          try {
            await prompts.createOverride("summarize-email", { content: newText });
          } catch (err) {
            if (err instanceof ConflictError) {
              await prompts.updateOverride("summarize-email", { content: newText });
              return;
            }
            throw err;
          }
        sources:
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/promptManagement.ts"
