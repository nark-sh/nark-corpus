  # ── Added in depth pass 2026-04-16 ──────────────────────────────────────────

  - name: triggerAndWait
    import_path: "@trigger.dev/sdk"
    description: >
      Triggers a child task and waits for it to complete before returning.
      Called as tasks.triggerAndWait(taskId, payload, options?). ONLY usable
      inside another task's run() function — calling from backend routes throws.
      Returns a TaskRunResult discriminated union: {ok: true, output: T} | {ok: false, error: unknown}.
      Use .unwrap() to automatically throw SubtaskUnwrapError on failure.

    postconditions:
      # Evidence: https://trigger.dev/docs/triggering (fetched 2026-04-16)
      # SubtaskUnwrapError confirmed in @trigger.dev/core/v3/types/tasks.d.ts
      # AuthenticationError/NotFoundError confirmed in @trigger.dev/core/v3/apiClient/errors.d.ts
      - id: triggerandwait-unwrap-error
        maturity: stable
        condition: >
          tasks.triggerAndWait(...).unwrap() called without try/catch, and the
          child task fails (throws, crashes, or is canceled). The .unwrap() call
          throws SubtaskUnwrapError containing taskId, runId, and the child error.
        throws: >
          SubtaskUnwrapError (extends Error) with properties:
            .taskId — the child task identifier
            .runId  — the run ID of the failed child
            .cause  — the error thrown by the child task
        required_handling: >
          Caller MUST wrap .unwrap() in try/catch when child task failure should
          be handled rather than crashing the parent task.

          Pattern 1 — check result.ok (no throw):
            const result = await tasks.triggerAndWait("child-task", payload);
            if (!result.ok) {
              console.error("Child task failed:", result.error);
              return; // or fallback
            }
            return result.output;

          Pattern 2 — use .unwrap() with catch:
            try {
              const output = await tasks.triggerAndWait("child-task", payload).unwrap();
            } catch (err) {
              if (err instanceof SubtaskUnwrapError) {
                console.error("Child task failed:", err.cause);
              }
              throw err;
            }

          CRITICAL: Do NOT use .unwrap() without try/catch when child failures
          are expected (e.g., user input validation, external API calls in child).
        sources:
          - "https://trigger.dev/docs/triggering"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/core/src/v3/types/tasks.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: triggerandwait-called-outside-task
        maturity: stable
        condition: >
          tasks.triggerAndWait() called from backend route handler, serverless
          function, or any context outside a Trigger.dev task run() function.
          This is explicitly unsupported and throws at runtime.
        throws: >
          Error: "triggerAndWait can only be called from inside a task"
          (or similar — the exact message varies by SDK version).
        required_handling: >
          Caller MUST use tasks.trigger() (fire-and-forget) when calling from
          backend routes. Use tasks.triggerAndWait() ONLY inside a parent task's
          run() function.
          The difference: trigger() makes an API call and returns immediately;
          triggerAndWait() suspends the current task execution until the child
          task completes — this suspension mechanism only works inside a task.
        sources:
          - "https://trigger.dev/docs/triggering"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: batchTriggerAndWait
    import_path: "@trigger.dev/sdk"
    description: >
      Triggers multiple child tasks and waits for ALL of them to complete.
      Called as tasks.batchTriggerAndWait(taskId, items, options?). ONLY usable
      inside another task's run() function. Returns a BatchResult containing
      an array of TaskRunResult objects — one per item, each must be checked.
      Throws BatchTriggerError if the batch creation phase fails (before any tasks run).

    postconditions:
      # Evidence: @trigger.dev/sdk/dist/commonjs/v3/shared.d.ts — BatchTriggerError class
      # BatchTriggerError confirmed with isRateLimited, retryAfterMs, apiError properties
      # https://trigger.dev/docs/triggering (fetched 2026-04-16)
      - id: batchtriggerandwait-creation-error
        maturity: stable
        condition: >
          tasks.batchTriggerAndWait() fails during the batch creation phase
          (before any child tasks start executing). Common causes: rate limiting,
          invalid API key, task ID not found.
        throws: >
          BatchTriggerError (extends Error) with properties:
            .phase          — "create" (failed during batch creation)
            .isRateLimited  — true if caused by HTTP 429
            .retryAfterMs   — milliseconds until rate limit resets (when isRateLimited)
            .apiError       — the underlying ApiError (auth, not-found, etc.)
            .itemCount      — number of items in the batch

          When rate limited: BatchTriggerError.isRateLimited === true
          When auth fails: BatchTriggerError.apiError instanceof AuthenticationError
        required_handling: >
          Caller MUST wrap tasks.batchTriggerAndWait() in try/catch.

          try {
            const results = await tasks.batchTriggerAndWait("my-task", items);
            for (const result of results.runs) {
              if (!result.ok) {
                console.error("Item failed:", result.error);
              }
            }
          } catch (err) {
            if (err instanceof BatchTriggerError && err.isRateLimited) {
              // Retry after err.retryAfterMs
            }
            throw err;
          }

          CRITICAL: Even on success, each item in results.runs must be checked
          individually — some items may fail while others succeed.
        sources:
          - "https://trigger.dev/docs/triggering"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/shared.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: batchtriggerandwait-individual-failures-unchecked
        maturity: stable
        condition: >
          tasks.batchTriggerAndWait() succeeds (no throw) but individual items
          in the batch fail. Caller does not check result.runs[i].ok and assumes
          all items completed successfully. Failed items silently lose their
          work without any error propagation.
        throws: >
          No throw — individual item failures are returned in results.runs[i]
          with ok: false. The overall batch call succeeds.
          results.runs[i] = { ok: false, error: unknown, runId: string }
        required_handling: >
          Caller MUST check each item in results.runs after awaiting:
          for (const result of results.runs) {
            if (!result.ok) {
              // This item failed — handle or re-queue
              console.error("Batch item failed:", result.error);
            }
          }
          Never assume all items completed successfully after a successful await.
        sources:
          - "https://trigger.dev/docs/triggering"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: cancel
    import_path: "@trigger.dev/sdk"
    description: >
      Cancels a task run by run ID. Called as runs.cancel(runId).
      Makes an authenticated HTTP DELETE to the Trigger.dev API.
      Throws NotFoundError (404) if the run doesn't exist, AuthenticationError (401)
      if the API key is invalid, or BadRequestError (400) on invalid run ID.
      Evidence: https://trigger.dev/docs/management/runs/cancel (fetched 2026-04-16)

    postconditions:
      # Evidence: https://trigger.dev/docs/management/runs/cancel (fetched 2026-04-16)
      # Error types confirmed from @trigger.dev/core/v3/apiClient/errors.d.ts
      - id: cancel-no-try-catch
        maturity: stable
        condition: >
          runs.cancel() called in async context without surrounding try/catch.
          NotFoundError, AuthenticationError, or BadRequestError results in
          unhandled rejected Promise.
        throws: >
          NotFoundError (status 404) — run not found with given ID.
          AuthenticationError (status 401) — invalid or missing API key.
          BadRequestError (status 400) — invalid run ID format.
          ApiConnectionError — network failure.
          All extend ApiError with .status and .error properties.
        required_handling: >
          Caller MUST wrap runs.cancel() in try/catch.
          Handle 404 gracefully — the run may have already completed by the time
          cancel is called (race condition in cleanup flows).

          try {
            await runs.cancel(runId);
          } catch (err) {
            if (err instanceof NotFoundError) {
              // Run already completed or never existed — safe to ignore
              return;
            }
            throw err;
          }
        sources:
          - "https://trigger.dev/docs/management/runs/cancel"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/core/src/v3/apiClient/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: replay
    import_path: "@trigger.dev/sdk"
    description: >
      Replays a task run with the same payload and options as the original run.
      Called as runs.replay(runId). Makes an authenticated HTTP POST to the
      Trigger.dev API. Creates a new run — does NOT restart the original.
      Throws NotFoundError (404) if the run doesn't exist, AuthenticationError (401)
      on bad API key, or BadRequestError (400) on invalid run ID.
      Evidence: https://trigger.dev/docs/management/runs/replay (fetched 2026-04-16)

    postconditions:
      # Evidence: https://trigger.dev/docs/management/runs/replay (fetched 2026-04-16)
      # Error types confirmed from @trigger.dev/core/v3/apiClient/errors.d.ts
      - id: replay-no-try-catch
        maturity: stable
        condition: >
          runs.replay() called in async context without surrounding try/catch.
          NotFoundError or BadRequestError results in unhandled rejected Promise.
        throws: >
          NotFoundError (status 404) — run not found with given ID.
          AuthenticationError (status 401) — invalid or missing API key.
          BadRequestError (status 400) — invalid run ID or "Failed to create new run".
          ApiConnectionError — network failure.
        required_handling: >
          Caller MUST wrap runs.replay() in try/catch.
          Handle 404 as the run may have been purged (TTL expiry is default 30 days).

          try {
            const newRun = await runs.replay(runId);
            console.log("Replayed as:", newRun.id);
          } catch (err) {
            if (err instanceof NotFoundError) {
              console.error("Run not found — may have expired:", runId);
            }
            throw err;
          }
        sources:
          - "https://trigger.dev/docs/management/runs/replay"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/core/src/v3/apiClient/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: reschedule
    import_path: "@trigger.dev/sdk"
    description: >
      Reschedules a delayed run to a new time. Called as runs.reschedule(runId, {delay}).
      Makes an authenticated HTTP POST to the Trigger.dev API.
      Throws NotFoundError if the run doesn't exist or has already started executing.
      Can only reschedule runs that are in DELAYED state.

    postconditions:
      # Evidence: @trigger.dev/sdk/dist/commonjs/v3/runs.d.ts — function signature
      # Error types inferred from @trigger.dev/core/v3/apiClient/errors.d.ts
      - id: reschedule-no-try-catch
        maturity: stable
        condition: >
          runs.reschedule() called in async context without surrounding try/catch.
          NotFoundError or AuthenticationError results in unhandled rejected Promise.
        throws: >
          NotFoundError (status 404) — run not found or not in DELAYED state.
          AuthenticationError (status 401) — invalid or missing API key.
          BadRequestError (status 400) — invalid delay format.
          ApiConnectionError — network failure.
        required_handling: >
          Caller MUST wrap runs.reschedule() in try/catch.
          Handle 404 as the run may have already dequeued and started.
          This race condition is common in high-throughput systems.

          try {
            await runs.reschedule(runId, { delay: "5m" });
          } catch (err) {
            if (err instanceof NotFoundError) {
              // Run already started — reschedule not possible, log and continue
              console.warn("Could not reschedule run (already started):", runId);
            } else {
              throw err;
            }
          }
        sources:
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/trigger-sdk/src/v3/runs.ts"
          - "https://github.com/triggerdotdev/trigger.dev/blob/main/packages/core/src/v3/apiClient/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: poll
    import_path: "@trigger.dev/sdk"
    description: >
      Polls a run until it reaches a terminal state (COMPLETED, FAILED, CANCELED, etc.).
      Called as runs.poll(runId, {pollIntervalMs}). Repeatedly calls runs.retrieve()
      internally. Returns the final run object with output or error.
      CRITICAL: Has no built-in timeout — will poll indefinitely if a run is stuck.

    postconditions:
