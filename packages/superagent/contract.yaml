package: superagent
semver: ">=3.7.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed

functions:
  - name: get
    import_path: "superagent"
    description: "Makes HTTP GET request"
    postconditions:
      # Evidence: scan-superagent-2026-04-03.json — 2 violations in 1 repo out of 2 scanned (50% affect rate)
      # Top affected: hengliyin/cdfang-spider (await superagent.get() missing try-catch)
      - id: network-error-handling
        condition: "network failure, DNS error, timeout, connection refused, HTTP 4xx/5xx errors"
        throws: "Error with status, response, timeout fields (Promise rejection)"
        required_handling: "Use try-catch (async/await) or .catch() (promises) or .end() callback"
        sources:
          - "https://forwardemail.github.io/superagent/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

