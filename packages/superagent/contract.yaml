      - id: timeout-error-identifiable
        condition: "request exceeds deadline or response timeout"
        throws: "Error with err.timeout=<number> and err.code='ETIME' (deadline) or 'ETIMEDOUT' (response timeout)"
        required_handling: "Check err.timeout in catch to distinguish timeout from auth/rate-limit errors; POST requests are not idempotent so do not auto-retry without deduplication"
        sources:
