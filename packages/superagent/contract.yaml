  - name: get
    import_path: "superagent"
    description: "Makes HTTP GET request"
    postconditions:
      # Evidence: scan-superagent-2026-06-30.json — 14 violations in 2 repos out of 4 scanned (50% affect rate)
      # Top affected: FoxxMD/multi-scrobbler (14 violations), hengliyin/cdfang-spider (3 violations)
      - id: network-error-handling
        condition: "network failure, DNS error, timeout, connection refused, HTTP 4xx/5xx errors"
        throws: "Error with status, response, timeout fields (Promise rejection)"
        required_handling: "Use try-catch (async/await) or .catch() (promises) or .end() callback"
        sources:
          - "https://forwardemail.github.io/superagent/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: lib/request-base.js line 690-716 — _timeoutError() sets err.timeout and err.code
      # deadline timeout: err.code='ETIME', response timeout: err.code='ETIMEDOUT'
      # https://forwardemail.github.io/superagent/#timeouts
      - id: timeout-error-identifiable
        condition: "request exceeds deadline (.timeout(ms)) or response timeout (.timeout({response:ms}))"
        throws: "Error with err.timeout=<number> and err.code='ETIME' (deadline) or 'ETIMEDOUT' (response timeout)"
        required_handling: "Check err.timeout in catch block to distinguish timeout from network errors; retry with backoff if appropriate"
        sources:
          - "https://forwardemail.github.io/superagent/#timeouts"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: lib/node/index.js lines 1067-1080 — ETOOLARGE error when response exceeds maxResponseSize
      # Default limit: 200,000,000 bytes (200MB). Can be lowered with .maxResponseSize(n).
      # Error: new Error('Maximum response size reached') with .code='ETOOLARGE'
      - id: max-response-size-exceeded
        condition: "response body exceeds maxResponseSize limit (default 200MB for buffered responses)"
        throws: "Error with code='ETOOLARGE' and message='Maximum response size reached'"
        required_handling: "Handle in catch block; check err.code === 'ETOOLARGE' for specific handling; use streaming .pipe() for large responses instead of buffering"
        sources:
          - "https://forwardemail.github.io/superagent/#response-body"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

