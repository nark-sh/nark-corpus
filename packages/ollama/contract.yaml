package: ollama
semver: ">=0.1.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed
coverage_score: 0.80

functions:
  - name: chat
    import_path: "ollama"
    description: "Send a chat completion request to the Ollama server"

    postconditions:
      # Evidence: seen in 8 primary firings across 5 repos in scan-ollama-2026-04-03.json
      # Top affected: ItzCrazyKns/Vane (⭐ 33343), BuilderIO/micro-agent (⭐ 4284), btahir/open-deep-research (⭐ 2132)
      - id: chat-no-try-catch
        condition: "awaited ollama.chat() call is not wrapped in try/catch"
        throws: "Error"
        required_handling: >
          Caller MUST wrap ollama.chat() in try/catch. The Ollama server runs locally
          and connection refused errors (ECONNREFUSED) are common when the server is not
          running. Model-not-found errors also throw. The error object has .status /
          .statusCode (HTTP status) and .message properties.
        sources:
          - https://raw.githubusercontent.com/ollama/ollama-js/main/README.md
          - https://github.com/ollama/ollama-js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: generate
    import_path: "ollama"
    description: "Generate a text completion from the Ollama server"

    postconditions:
      - id: generate-no-try-catch
        condition: "awaited ollama.generate() call is not wrapped in try/catch"
        throws: "Error"
        required_handling: >
          Caller MUST wrap ollama.generate() in try/catch. Connection refused, model
          not found, and network errors all throw an unhandled Error. This is
          particularly dangerous in AI pipelines where silent failure breaks the
          entire workflow without visible user feedback.
        sources:
          - https://raw.githubusercontent.com/ollama/ollama-js/main/README.md
          - https://github.com/ollama/ollama-js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: embed
    import_path: "ollama"
    description: "Generate vector embeddings for text input"

    postconditions:
      # Evidence: seen in 3 primary firings across 2 repos in scan-ollama-2026-04-03.json
      # Top affected: ItzCrazyKns/Vane (⭐ 33343), nbonamy/witsy (⭐ 1916)
      - id: embed-no-try-catch
        condition: "awaited ollama.embed() call is not wrapped in try/catch"
        throws: "Error"
        required_handling: >
          Caller MUST wrap ollama.embed() in try/catch. Embedding generation makes
          an HTTP request to the Ollama server. Server unavailability or invalid model
          name throws an uncaught Error that silently breaks RAG pipelines.
        sources:
          - https://raw.githubusercontent.com/ollama/ollama-js/main/README.md
          - https://github.com/ollama/ollama-js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
