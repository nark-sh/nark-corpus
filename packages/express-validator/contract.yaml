package: express-validator
semver: '>=6.0.0 <8.0.0'
contract_version: 1.1.0
maintainer: corpus-team
last_verified: '2026-04-13'
status: production
evidence_quality: confirmed
coverage_score: 0.73
functions:
  - name: validationResult
    import_path: express-validator
    description: >
      Extracts validation errors accumulated by validation chains (body(), check(), query(), etc.) from the request and
      returns a Result object. Must be called in the route handler after validation middleware has run.
    postconditions:
      - id: errors-not-checked
        condition: validationResult() is called but the result is not inspected before using request data
        returns: Validation errors exist but are silently ignored. Invalid input is processed as if valid.
        required_handling: >
          Caller MUST call validationResult(req) and check isEmpty() or the errors array before using validated fields.
          Failing to check means invalid input silently passes through. Pattern: const errors = validationResult(req);
          if (!errors.isEmpty()) { return res.status(400).json({ errors: errors.array() }); }
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success-no-errors
        condition: All validation chains passed for the request
        returns: Result object with isEmpty() === true
        sources:
          - https://express-validator.github.io/docs/api/validation-result
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: validation-failed
        condition: One or more validation chains failed for the request
        returns: Result object with isEmpty() === false. errors.array() returns list of {type, msg, path, location} objects.
        sources:
          - https://express-validator.github.io/docs/api/validation-result
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
  - name: body
    import_path: express-validator
    description: >
      Creates a validation chain for fields in req.body. Must be used as middleware before the route handler. Validates
      and optionally sanitizes fields. Does not throw on validation failure — errors are collected and must be retrieved
      via validationResult().
    postconditions:
      - id: validation-errors-silent
        condition: The field fails validation (e.g., notEmpty(), isEmail())
        returns: >-
          Error is added to the request's validation error list. Request processing continues to the next middleware. No
          HTTP error is sent automatically.
        required_handling: >
          Route handler MUST call validationResult(req) and return an error response when isEmpty() is false. Without
          this check, invalid data silently reaches business logic.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success
        condition: Field passes all validation rules
        returns: No error is added. Request continues normally.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: missing-field
        description: >-
          If the field does not exist in req.body, validation chains that use notEmpty() or exists() will report an
          error. Other validators may silently pass on undefined values unless .exists() is chained first.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: check
    import_path: express-validator
    description: >
      Creates a validation chain that checks the specified field across all request locations (body, query, params,
      cookies, headers). Equivalent to body() but location-agnostic. Must be used as middleware. Errors collected via
      validationResult().
    postconditions:
      - id: validation-errors-silent
        condition: The field fails validation
        returns: Error is added to the request's validation error list. Request processing continues.
        required_handling: >
          Route handler MUST call validationResult(req) and return an error response when isEmpty() is false. Without
          this check, invalid data silently reaches business logic.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success
        condition: Field passes all validation rules
        returns: No error is added. Request continues normally.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
  - name: query
    import_path: express-validator
    description: >-
      Creates a validation chain for fields in req.query. Behaves identically to body() but targets query string
      parameters.
    postconditions:
      - id: validation-errors-silent
        condition: The query parameter fails validation
        returns: Error is added to the request's validation error list. Request processing continues.
        required_handling: |
          Route handler MUST call validationResult(req) and return an error response when isEmpty() is false.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success
        condition: Query parameter passes all validation rules
        returns: No error is added. Request continues normally.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
  - name: param
    import_path: express-validator
    description: >-
      Creates a validation chain for fields in req.params (URL path parameters). Behaves identically to body() but
      targets route parameters.
    postconditions:
      - id: validation-errors-silent
        condition: The route parameter fails validation
        returns: Error is added to the request's validation error list. Request processing continues.
        required_handling: |
          Route handler MUST call validationResult(req) and return an error response when isEmpty() is false.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success
        condition: Route parameter passes all validation rules
        returns: No error is added. Request continues normally.
        sources:
          - https://express-validator.github.io/docs/guides/getting-started
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
  - name: cookie
    import_path: express-validator
    description: >-
      Creates a validation chain for fields in req.cookies. Behaves identically to body() but
      targets cookie values. Must be used as middleware before the route handler. Errors collected
      via validationResult().
    postconditions:
      # Evidence: https://express-validator.github.io/docs/api/validation-chain-builders
      # Confirmed from TypeScript declarations: lib/middlewares/validation-chain-builders.d.ts
      - id: cookie-validation-errors-silent
        condition: The cookie field fails validation (e.g., notEmpty(), isUUID())
        returns: Error is added to the request's validation error list. Request processing continues.
        required_handling: >
          Route handler MUST call validationResult(req) and return an error response when
          isEmpty() is false. Without this check, invalid cookie data silently reaches
          business logic. Cookie-based auth tokens are a common validation target.
        sources:
          - https://express-validator.github.io/docs/api/validation-chain-builders
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
      - id: cookie-success
        condition: Cookie field passes all validation rules
        returns: No error is added. Request continues normally.
        sources:
          - https://express-validator.github.io/docs/api/validation-chain-builders
        severity: info
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        required_handling: No action required.
  - name: header
    import_path: express-validator
    description: >-
      Creates a validation chain for fields in req.headers. Behaves identically to body() but
      targets HTTP request headers. Must be used as middleware before the route handler. Errors
      collected via validationResult(). Useful for validating Authorization headers, API keys,
      Content-Type, or custom headers.
    postconditions:
      # Evidence: https://express-validator.github.io/docs/api/validation-chain-builders
      # Confirmed from TypeScript declarations: lib/middlewares/validation-chain-builders.d.ts
      - id: header-validation-errors-silent
        condition: The header field fails validation (e.g., required Authorization header is missing or malformed)
        returns: Error is added to the request's validation error list. Request processing continues.
        required_handling: >
          Route handler MUST call validationResult(req) and return an error response when
          isEmpty() is false. Header validation often checks auth tokens or API keys —
          failure to check means unauthorized requests may reach protected business logic.
        sources:
          - https://express-validator.github.io/docs/api/validation-chain-builders
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
      - id: header-success
        condition: Header field passes all validation rules
        returns: No error is added. Request continues normally.
        sources:
          - https://express-validator.github.io/docs/api/validation-chain-builders
        severity: info
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        required_handling: No action required.
  - name: checkSchema
    import_path: express-validator
    description: >
      Creates express middleware with validations for multiple fields at once using a schema object.
      Equivalent to declaring individual body()/check() chains for each field but in a declarative form.
      Each field key maps to a ParamSchema with validator/sanitizer options. Returns a
      RunnableValidationChains array — can be spread into a route as middleware or called with .run().
      Errors are collected and must be retrieved via validationResult() like other chains.
    postconditions:
      # Evidence: https://express-validator.github.io/docs/api/check-schema
      # Evidence: https://express-validator.github.io/docs/guides/manually-running
      # Confirmed from TypeScript declarations: lib/middlewares/schema.d.ts
      - id: checkschema-validation-errors-silent
        condition: One or more fields in the schema fail their validation rules
        returns: >-
          Errors are added to the request's validation error list. Request processing continues
          to the next middleware. No HTTP error is sent automatically.
        required_handling: >
          Route handler MUST call validationResult(req) and return an error response when
          isEmpty() is false. checkSchema() is commonly used for complex multi-field forms —
          failure to check means all field errors are silently ignored and invalid data reaches
          business logic.
        sources:
          - https://express-validator.github.io/docs/api/check-schema
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
      - id: checkschema-run-result-not-checked
        condition: checkSchema chains are invoked with .run(req) but validationResult is not called afterward
        returns: >-
          Validation runs but results are discarded. All validated fields pass through to the
          handler regardless of validity.
        required_handling: >
          When using checkSchema chains programmatically with .run(req), always call
          validationResult(req) in the route handler afterward. The .run() persists errors to
          req (dryRun: false by default), so validationResult will see them — but only if called.
        sources:
          - https://express-validator.github.io/docs/guides/manually-running
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
    edge_cases:
      - id: checkschema-array-options-wrapper
        description: >-
          Validators expecting an array of valid values (e.g., isIn) require a double-nested
          array in the schema: options: [['saturday', 'sunday']]. Omitting the outer wrapper
          causes isIn to receive a string instead of an array, silently accepting any value.
        sources:
          - https://express-validator.github.io/docs/api/check-schema
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
  - name: oneOf
    import_path: express-validator
    description: >
      Creates middleware that validates at least one of the given validation chain groups. If none
      are valid, a single error of type AlternativeValidationError or GroupedAlternativeValidationError
      is added to the request with nested errors from each failing chain. The error type is
      controlled by the errorType option (grouped | least_errored | flat). Must be used as
      middleware; errors retrieved via validationResult().
    postconditions:
      # Evidence: https://express-validator.github.io/docs/api/one-of
      # Confirmed from TypeScript declarations: lib/middlewares/one-of.d.ts
      - id: oneof-all-chains-failed-error-not-checked
        condition: None of the provided validation chains pass, but validationResult() is not called
        returns: >-
          A single AlternativeValidationError (or GroupedAlternativeValidationError) is added to
          the request with nested errors. Request continues to the route handler, which silently
          processes the invalid input.
        required_handling: >
          Route handler MUST call validationResult(req) and check isEmpty(). With oneOf(),
          errors are nested under nestedErrors — the alternative error wraps all chain errors.
          Accessing errors.array() returns the top-level alternative error. Use
          error.nestedErrors to inspect which alternatives failed and why.
        sources:
          - https://express-validator.github.io/docs/api/one-of
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
      - id: oneof-nested-errors-not-inspected
        condition: >
          validationResult() is called and errors exist from oneOf(), but only the top-level
          error is inspected without examining nestedErrors
        returns: >-
          The top-level AlternativeValidationError is returned. The nestedErrors property
          contains the actual per-chain failures but is never read, so users receive a generic
          error message instead of actionable field-level errors.
        required_handling: >
          For user-facing error messages, access error.nestedErrors to get per-chain failure
          details. The errorType option controls structure: 'flat' provides all errors in one
          array; 'least_errored' shows only the closest-to-passing chain; 'grouped' (default)
          groups by chain group.
        sources:
          - https://express-validator.github.io/docs/api/one-of
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
  - name: checkExact
    import_path: express-validator
    description: >
      Middleware that validates the request contains ONLY fields that have been previously
      validated by other chains. Unknown fields generate a UnknownFieldsError of type 'unknown_fields'.
      By default, checks body, params, and query (not headers or cookies, to avoid false positives
      from browser/proxy additions). MUST be placed AFTER all other validation middleware.
    postconditions:
      # Evidence: https://express-validator.github.io/docs/api/check-exact
      # Confirmed from TypeScript declarations: lib/middlewares/exact.d.ts
      - id: checkexact-unknown-fields-not-checked
        condition: Request contains fields not covered by any validation chain, but validationResult() is not called
        returns: >-
          A UnknownFieldsError with type 'unknown_fields' is added to the request. The
          unknownFields property lists all unexpected fields. Request continues to the route
          handler, which may process the unexpected data.
        required_handling: >
          Route handler MUST call validationResult(req) and return an error response when
          isEmpty() is false. The UnknownFieldsError has an unknownFields property listing
          all unexpected fields and their locations. Without this check, mass-assignment
          attacks succeed — users can submit arbitrary fields that bypass your validation schema.
        sources:
          - https://express-validator.github.io/docs/api/check-exact
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
      - id: checkexact-ordering-violation
        condition: checkExact() is placed BEFORE other validation middleware in the route
        returns: >-
          Fields validated by middleware that runs after checkExact() are incorrectly flagged
          as unknown fields. This generates false-positive UnknownFieldsErrors that block
          valid requests.
        required_handling: >
          Always place checkExact() as the LAST validation middleware before the route handler.
          It only recognizes fields for which validation chains were registered before it runs.
        sources:
          - https://express-validator.github.io/docs/api/check-exact
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: run
    import_path: express-validator
    description: >
      Instance method on ValidationChain and RunnableValidationChains (returned by checkSchema).
      Manually executes a validation chain against a request and returns a Promise resolving to
      ResultWithContext. Used for programmatic control over validation — conditional validation,
      sequential validation with bail, or unit testing. Results are persisted to req unless
      dryRun: true is passed.
    postconditions:
      # Evidence: https://express-validator.github.io/docs/guides/manually-running
      # Confirmed from TypeScript declarations: lib/chain/context-runner.d.ts
      - id: run-result-not-checked
        condition: >
          .run(req) is awaited but neither the returned ResultWithContext is checked,
          nor is validationResult(req) called afterward in the route handler
        returns: >-
          Validation runs and errors are stored on the request, but if the caller never
          checks them, all validation errors are silently ignored. The handler proceeds
          with potentially invalid data.
        required_handling: >
          After await chain.run(req), EITHER check the returned result directly
          (result.isEmpty(), result.array()) OR call validationResult(req) in the handler.
          The most common pattern: await chain.run(req); const errors = validationResult(req);
          if (\!errors.isEmpty()) { return res.status(400).json(...); }
        sources:
          - https://express-validator.github.io/docs/guides/manually-running
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
      - id: run-not-awaited
        condition: .run(req) is called without await (fire-and-forget)
        returns: >-
          Validation starts asynchronously but completes after the route handler has already
          continued. Errors are never persisted to req. validationResult(req) returns empty.
          All fields silently pass validation.
        required_handling: >
          Always await chain.run(req). Fire-and-forget causes silent validation skips that are
          extremely difficult to debug — validationResult appears to pass even when fields are invalid.
        sources:
          - https://express-validator.github.io/docs/guides/manually-running
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
  - name: result-throw
    import_path: express-validator
    description: >
      Method on the Result object returned by validationResult(). Throws a decorated error
      (with .array(), .mapped(), .isEmpty() methods attached) if validation errors exist.
      Does nothing if isEmpty() is true. Alternative to the explicit if (\!errors.isEmpty())
      pattern — used when error propagation via exception is preferred, e.g., forwarding to
      Express error-handling middleware.
    postconditions:
      # Evidence: https://express-validator.github.io/docs/api/validation-result#throw
      # Confirmed from TypeScript declarations: lib/validation-result.d.ts
      - id: result-throw-no-trycatch
        condition: >
          validationResult(req).throw() is called in a route handler not wrapped in try-catch
          and not using express-async-errors or Express 5
        returns: >-
          If validation errors exist, throws an unhandled exception. Express 4's default error
          handler returns a 500 Internal Server Error rather than a 400 Bad Request. This leaks
          validation state as a server error and may expose internal error details to clients.
        required_handling: >
          Either: (a) wrap in try-catch and send a structured 400 response, or (b) use
          express-async-errors (patches Express to handle async throws), or (c) use Express 5
          which handles async route errors natively. In Express 4 without async-errors, throw()
          produces a 500, not a 400, and may expose error details.
        sources:
          - https://express-validator.github.io/docs/api/validation-result#throw
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: result-throw-success
        condition: No validation errors exist when .throw() is called
        returns: Returns void without throwing. Execution continues normally.
        required_handling: No action required.
        sources:
          - https://express-validator.github.io/docs/api/validation-result#throw
        severity: info
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
