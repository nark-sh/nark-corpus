# Depth pass 2026-04-06 (deepen-stream-2):
# Added 9 new function entries covering session cookies, custom tokens,
# token revocation, password reset, Firestore transactions/batches, and
# modern messaging APIs (sendEach, subscribeToTopic).
# Depth pass 2026-06-24 pass 42 (deepen-stream-3, drift-by-staleness mode):
# v14.0.0 surface — added 2 new function entries:
#   DataConnect.executeGraphql (Postgres-backed GraphQL, GA in v14)
#   PhoneNumberVerification.verifyToken (first-class Admin SDK service in v14)
