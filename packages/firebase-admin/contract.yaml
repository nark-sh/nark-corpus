        throws: "FirebaseAuthError with code 'auth/tenant-not-found'"
        required_handling: >
          Treat as idempotent — the tenant is already gone.
          In offboarding workflows, this is generally safe to ignore.
          Log the occurrence for audit trails (the tenant may have been
          deleted by a concurrent request or external process).
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/auth-api-request.ts"
        business_impact:
