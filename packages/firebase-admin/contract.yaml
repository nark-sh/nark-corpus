  # ── Cloud Storage — Download URL ─────────────────────────────────────────────

  - name: getDownloadURL
    import_path: "firebase-admin/storage"
    description: >
      Generates a public download URL for a Cloud Storage file using Firebase's
      download token system. This is the Admin SDK equivalent of getDownloadURL()
      from the client SDK. Used in server-side workflows to generate shareable
      links after file uploads. The URL is permanent until the download token is
      revoked.

    postconditions:
      # Evidence: lib/storage/index.js line 64-76
      # if (!downloadTokens) throw FirebaseError({ code: 'storage/no-download-token' })
      - id: get-download-url-no-token
        maturity: stable
        severity: error
        condition: >
          File exists in Cloud Storage but has no Firebase download token.
          Files uploaded directly via Google Cloud Storage APIs (not Firebase SDK)
          do not have download tokens by default.
        throws: "FirebaseError with code 'storage/no-download-token'"
        required_handling: >
          Catch and handle: create a download token by updating the file's metadata
          via the Firebase Console or by calling file.setMetadata() to add a
          firebaseStorageDownloadTokens metadata entry.
          Files uploaded via Firebase Client SDK automatically have tokens.
          Files uploaded via @google-cloud/storage SDK do NOT have tokens unless
          explicitly added. This is a common pitfall in hybrid upload architectures.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/storage/index.ts"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: lib/storage/index.js — getFirebaseMetadata() wraps @google-cloud/storage file.getMetadata()
      # File not found throws 404 from Google Cloud Storage
      - id: get-download-url-file-not-found
        maturity: stable
        severity: error
        condition: "File does not exist in the Cloud Storage bucket"
        throws: "Error with HTTP 404 from Google Cloud Storage API"
        required_handling: >
          Catch HTTP 404 errors — this occurs when the file path is incorrect,
          the file was deleted, or the bucket name is wrong. Always verify file
          existence before generating download URLs in critical workflows.
          Return 404 to the calling client.
        sources:
