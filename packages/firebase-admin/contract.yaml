      # Confirmed from firebase-admin@14.1.0 auth-api-request.js
      - id: generate-email-verification-link-email-not-found
        maturity: stable
        severity: error
        condition: >
          No Firebase Auth user exists with the provided email address.
          The email action link cannot be sent to an unregistered address.
          Error code 'email-not-found' maps from server response 'EMAIL_NOT_FOUND'.
        throws: "FirebaseAuthError with code 'auth/email-not-found'"
        required_handling: >
          Do not reveal to end users whether the email is registered (security
          best practice). Log the error server-side for monitoring. In
          registration flows, this indicates the user record was not created
          before the verification link was requested -- fix the ordering.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/auth-api-request.ts"
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/error.ts"
          - "https://firebase.google.com/docs/auth/admin/email-action-links"
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: generate-email-verification-link-unauthorized-domain
        maturity: stable
        severity: error
        condition: >
          The continue URL in actionCodeSettings points to a domain that is
          not authorized in the Firebase console (Authentication > Settings >
          Authorized domains). The request is rejected by the Firebase Auth
          backend.
        throws: "FirebaseAuthError with code 'auth/unauthorized-continue-uri'"
        required_handling: >
          Add the continue URL domain to the authorized domains list in the
          Firebase console. This is a configuration error that will affect all
          users -- alert and fix immediately. Do not retry with the same
          actionCodeSettings.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/auth-api-request.ts"
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/error.ts"
          - "https://firebase.google.com/docs/auth/admin/email-action-links"
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # ── Messaging -- Multicast and Topic Unsubscription ───────────────────────

  - name: sendEachForMulticast
    import_path: "firebase-admin/messaging"
    description: >
      Sends a multicast FCM message to a list of device registration tokens
      and/or Firebase Installation IDs (FIDs) as separate per-token messages.
      Returns a BatchResponse where each SendResponse corresponds to one token
      -- not all tokens succeed or fail together. Like sendEach(), callers must
      check response.failureCount and iterate response.responses[] to detect
      per-token failures. The maximum batch size is 500 tokens/FIDs combined.

    postconditions:
      # Evidence: src/messaging/messaging.ts (sendEachForMulticast),
      # firebase-admin@14.1.0 messaging.js -- FCM_MAX_BATCH_SIZE = 500
      - id: send-each-for-multicast-batch-size-exceeded
        maturity: stable
        severity: error
        condition: >
          The combined count of tokens and fids exceeds 500
          (FCM_MAX_BATCH_SIZE). Thrown synchronously before any network call.
          Also thrown if tokens is not an array or fids is not an array, or
          both tokens and fids are empty.
        throws: "FirebaseMessagingError with code 'messaging/invalid-argument'"
        required_handling: >
          Chunk the token list into batches of at most 500. Use Promise.all()
          to send chunks in parallel. Validate token and fid arrays are
          non-empty and within limits before calling.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/messaging/messaging.ts"
          - "https://firebase.google.com/docs/cloud-messaging/send-message#send-to-multiple-devices"
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: send-each-for-multicast-partial-failure
        maturity: stable
        severity: warning
        condition: >
          One or more tokens in the batch failed delivery. The method resolves
          but response.failureCount > 0. Individual failures in
          response.responses[i] contain a FirebaseMessagingError with codes
          like 'messaging/registration-token-not-registered' (stale token),
          'messaging/invalid-registration-token', or 'messaging/quota-exceeded'.
          The method never throws for individual token failures.
        throws: "resolves with BatchResponse; per-token failures in response.responses[] as FirebaseMessagingError"
        required_handling: >
          Always check response.failureCount. If > 0, iterate response.responses[]
          and for each failed entry (success === false): log the token and error.
          For 'registration-token-not-registered' errors, remove the stale token
          from your database to prevent repeated failed sends. For quota errors,
          implement exponential backoff on the next batch.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/messaging/messaging.ts"
          - "https://firebase.google.com/docs/cloud-messaging/send-message#send-to-multiple-devices"
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: unsubscribeFromTopic
    import_path: "firebase-admin/messaging"
    description: >
      Unsubscribes one or more device registration tokens from an FCM topic.
      Used to remove devices from topic-based notification channels (e.g.,
      when a user disables a notification category or unsubscribes from a
      newsletter). Shares the same sendTopicManagementRequest() internal path
      as subscribeToTopic() (already contracted). Partial failures are returned
      in result.errors[], not thrown -- callers who do not inspect the result
      will silently leave devices subscribed to topics after supposedly
      unsubscribing them.

    postconditions:
      # Evidence: src/messaging/messaging.ts (unsubscribeFromTopic calls
      # sendTopicManagementRequest with FCM_TOPIC_MANAGEMENT_REMOVE_PATH)
      # Same error surface as subscribeToTopic -- confirmed from messaging.js
      - id: unsubscribe-from-topic-partial-failure
        maturity: stable
        severity: warning
        condition: >
          One or more tokens failed to unsubscribe from the topic. The method
          resolves but result.failureCount > 0. Per-token failures in
          result.errors[] contain a FirebaseMessagingError. Common causes:
          stale/invalid registration token, malformed topic name.
        throws: "resolves with MessagingTopicManagementResponse; per-token failures in result.errors[] as FirebaseMessagingError"
        required_handling: >
          Check result.failureCount after every unsubscribeFromTopic() call.
          If > 0, log each error with the corresponding token index. For
          'registration-token-not-registered' errors, remove the stale token
          from your database. For other errors, retry with exponential backoff.
          A silent partial failure here means devices remain subscribed to a
          topic after the user requested removal.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/messaging/messaging.ts"
          - "https://firebase.google.com/docs/cloud-messaging/manage-topics"
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      - id: unsubscribe-from-topic-invalid-argument
        maturity: stable
        severity: error
        condition: >
          The topic name is malformed (contains invalid characters -- only
          [a-zA-Z0-9-_.~%]+ is valid; the /topics/ prefix must NOT be included
          as it is added automatically), or the registration tokens array is
          empty, or a token is not a valid non-empty string. Thrown synchronously
          via sendTopicManagementRequest() validation.
        throws: "FirebaseMessagingError with code 'messaging/invalid-argument'"
        required_handling: >
          Validate topic names against the pattern [a-zA-Z0-9-_.~%]+ before
          calling. Ensure the tokens array is non-empty and all tokens are
          valid non-empty strings. Do NOT pass the /topics/ prefix -- it is
          added automatically.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/messaging/messaging.ts"
          - "https://firebase.google.com/docs/cloud-messaging/manage-topics"
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
