detection:
  class_names: ["Auth", "BaseAuth", "Messaging", "Firestore", "Database", "AppCheck", "DataConnect", "PhoneNumberVerification"]
  type_names: ["Auth", "BaseAuth", "UserRecord", "DecodedIdToken", "Messaging", "Firestore", "DataConnect", "PhoneNumberVerification"]
  factory_methods:
    - "getAuth"
    - "getMessaging"
    - "getFirestore"
    - "getDatabase"
    - "getAppCheck"
    - "getRemoteConfig"
    - "getDataConnect"
    - "getPhoneNumberVerification"
    - "initializeApp"
  require_instance_tracking: true
  import_source: "firebase-admin"

  await_patterns:
    # Auth
    - ".verifyIdToken("
    - ".verifySessionCookie("
    - ".createSessionCookie("
