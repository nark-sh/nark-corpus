package: firebase-admin
semver: ">=11.0.0 <14.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-06"
status: production
evidence_quality: confirmed
# Depth pass 2026-04-06 (deepen-stream-2):
# Added 9 new function entries covering session cookies, custom tokens,
# token revocation, password reset, Firestore transactions/batches, and
# modern messaging APIs (sendEach, subscribeToTopic).
# API surface total: ~38 async-callable; contracted: 28; omitted: 10
# Omitted: getUserByPhoneNumber, getUsers, listUsers, deleteUsers,
#   sendEachForMulticast (same surface as sendEach), generateEmailVerificationLink
#   (same surface as generatePasswordResetLink), unsubscribeFromTopic (same surface),
#   AppCheck.createToken, AppCheck.verifyToken (rarely called directly in SaaS backends)
# coverage_score: 0.74 (28 contracted / 38 total)
coverage_score: 0.74

detection:
  class_names: ["Auth", "BaseAuth", "Messaging", "Firestore", "Database", "AppCheck"]
  type_names: ["Auth", "BaseAuth", "UserRecord", "DecodedIdToken", "Messaging", "Firestore"]
  factory_methods:
    - "getAuth"
    - "getMessaging"
    - "getFirestore"
    - "getDatabase"
    - "getAppCheck"
    - "initializeApp"
  require_instance_tracking: true
  import_source: "firebase-admin"

  await_patterns:
    # Auth
    - ".verifyIdToken("
    - ".verifySessionCookie("
    - ".createSessionCookie("
    - ".createCustomToken("
    - ".getUser("
    - ".getUserByEmail("
    - ".getUserByPhoneNumber("
    - ".createUser("
    - ".updateUser("
    - ".deleteUser("
    - ".setCustomUserClaims("
    - ".revokeRefreshTokens("
    - ".generatePasswordResetLink("
    - ".generateEmailVerificationLink("
    # Firestore
    - ".runTransaction("
    - ".commit("
    - ".get("
    - ".set("
    - ".update("
    - ".delete("
    - ".add("
    # Messaging
    - ".send("
    - ".sendEach("
    - ".sendMulticast("
    - ".sendEachForMulticast("
    - ".sendToTopic("
    - ".subscribeToTopic("
    - ".unsubscribeFromTopic("
    # Realtime Database
    - ".once("
    - ".remove("

functions:
  # Authentication Service
  - name: verifyIdToken
    import_path: "firebase-admin"
    description: "Verifies a Firebase ID token (JWT)"

    postconditions:
      - id: token-expired
        condition: "ID token has expired"
        throws: "FirebaseAuthError with code 'auth/id-token-expired'"
        required_handling: >
          Caller MUST catch and handle expired token errors.
          Return 401 Unauthorized to client and require re-authentication.
          DO NOT retry with same token - it's permanently expired.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: token-invalid
        condition: "ID token is invalid (malformed, wrong project, revoked)"
        throws: "FirebaseAuthError with code 'auth/argument-error' or 'auth/id-token-revoked'"
        required_handling: >
          Caller MUST validate token format and handle invalid tokens.
          Check error.code to distinguish between format errors and revoked tokens.
          Return 401 Unauthorized to client.
        sources:
          - "https://firebase.google.com/docs/auth/admin/verify-id-tokens"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: network-error
        condition: "Network request to Firebase Auth service failed"
        throws: "FirebaseAuthError or generic Error"
        required_handling: >
          Caller SHOULD implement retry with exponential backoff for transient failures.
          Check if Firebase Auth service is available.
        sources:
          - "https://firebase.google.com/docs/reference/admin/error-handling"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

    edge_cases:
      - id: custom-token-vs-id-token
        description: "verifyIdToken() only works with ID tokens, not custom tokens"
        sources:
          - "https://firebase.google.com/docs/auth/admin/verify-id-tokens"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: createUser
    import_path: "firebase-admin"
    description: "Creates a new Firebase user account"

    postconditions:
      - id: email-already-exists
        condition: "Email address is already in use"
        throws: "FirebaseAuthError with code 'auth/email-already-exists'"
        required_handling: >
          Caller MUST check if error.code === 'auth/email-already-exists'.
          Return user-friendly error message.
          Consider suggesting password reset if user forgot they have an account.
          DO NOT retry with same email.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: invalid-email
        condition: "Email format is invalid"
        throws: "FirebaseAuthError with code 'auth/invalid-email'"
        required_handling: >
          Caller SHOULD validate email format before calling createUser.
          Use email validation library to prevent this error.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: uid-already-exists
        condition: "Provided UID is already in use (when specifying custom UID)"
        throws: "FirebaseAuthError with code 'auth/uid-already-exists'"
        required_handling: >
          If using custom UIDs, generate unique values.
          Catch this error and either generate new UID or handle collision.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: invalid-password
        condition: "Password is too weak or doesn't meet requirements"
        throws: "FirebaseAuthError with code 'auth/invalid-password'"
        required_handling: >
          Validate password strength on client side.
          Firebase requires minimum 6 characters.
          Return helpful error to user about password requirements.
        sources:
          - "https://firebase.google.com/docs/auth/admin/manage-users"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: getUser
    import_path: "firebase-admin"
    description: "Fetches user data by UID"

    postconditions:
      - id: user-not-found
        condition: "No user record found for the given UID"
        throws: "FirebaseAuthError with code 'auth/user-not-found'"
        required_handling: >
          Caller MUST handle user-not-found errors.
          DO NOT assume user exists - always catch this error.
          Consider if this indicates deleted account or invalid UID.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: invalid-uid
        condition: "UID format is invalid"
        throws: "FirebaseAuthError with code 'auth/invalid-uid'"
        required_handling: >
          Validate UID format before calling getUser.
          Firebase UIDs are typically 28-character strings.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: updateUser
    import_path: "firebase-admin"
    description: "Updates an existing user's data"

    postconditions:
      - id: user-not-found
        condition: "No user record found for the given UID"
        throws: "FirebaseAuthError with code 'auth/user-not-found'"
        required_handling: >
          Caller MUST handle user-not-found errors.
          Decide whether to create user or return error.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: email-already-exists
        condition: "New email address is already in use by another user"
        throws: "FirebaseAuthError with code 'auth/email-already-exists'"
        required_handling: >
          Check if new email is available before updating.
          Return user-friendly error if email is taken.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: deleteUser
    import_path: "firebase-admin"
    description: "Deletes a user account"

    postconditions:
      - id: user-not-found
        condition: "No user record found for the given UID"
        throws: "FirebaseAuthError with code 'auth/user-not-found'"
        required_handling: >
          Caller SHOULD handle user-not-found errors gracefully.
          Consider if idempotent delete is acceptable (user already deleted).
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: getUserByEmail
    import_path: "firebase-admin"
    description: "Fetches user data by email address"

    postconditions:
      - id: user-not-found
        condition: "No user record with the given email"
        throws: "FirebaseAuthError with code 'auth/user-not-found'"
        required_handling: >
          Caller MUST handle user-not-found errors.
          This is common when checking if email is registered.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: setCustomUserClaims
    import_path: "firebase-admin"
    description: "Sets custom claims for user tokens"

    postconditions:
      - id: user-not-found
        condition: "No user record found"
        throws: "FirebaseAuthError with code 'auth/user-not-found'"
        required_handling: >
          Verify user exists before setting claims.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: invalid-claims
        condition: "Claims object exceeds 1000 bytes or uses reserved keys"
        throws: "FirebaseAuthError with code 'auth/invalid-claims'"
        required_handling: >
          Validate claims size and avoid reserved keys.
          Reserved keys: iss, sub, aud, exp, iat, auth_time, nonce, etc.
        sources:
          - "https://firebase.google.com/docs/auth/admin/custom-claims"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  # Firestore Service
  - name: get
    import_path: "firebase-admin"
    description: "Reads Firestore document or collection data"

    postconditions:
      - id: permission-denied
        condition: "Security rules deny read access"
        throws: "Error with code 'PERMISSION_DENIED' (gRPC code 7)"
        required_handling: >
          Caller MUST handle permission errors.
          Check Firestore security rules.
          Admin SDK bypasses rules by default - if seeing this, check service account permissions.
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: not-found
        condition: "Document does not exist"
        returns: "DocumentSnapshot with exists: false"
        required_handling: >
          Caller MUST check snapshot.exists before accessing data.
          Use snapshot.exists or check if snapshot.data() is undefined.
        sources:
          - "https://firebase.google.com/docs/firestore/query-data/get-data"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: deadline-exceeded
        condition: "Operation timed out"
        throws: "Error with code 'DEADLINE_EXCEEDED' (gRPC code 4)"
        required_handling: >
          Caller SHOULD implement retry with exponential backoff.
          Check network connectivity and Firestore status.
          Consider if query is too complex (missing indexes).
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: add
    import_path: "firebase-admin"
    description: "Adds a new document to Firestore collection with auto-generated ID"

    postconditions:
      - id: permission-denied
        condition: "Security rules deny write access"
        throws: "Error with code 'PERMISSION_DENIED' (gRPC code 7)"
        required_handling: >
          Check Firestore security rules and service account permissions.
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: resource-exhausted
        condition: "Write quota exceeded or rate limit hit"
        throws: "Error with code 'RESOURCE_EXHAUSTED' (gRPC code 8)"
        required_handling: >
          Caller MUST handle quota errors.
          Check if billing is enabled (free tier limits).
          Implement backoff and reduce write rate.
          Avoid writing to lexicographically close documents (hot spots).
        sources:
          - "https://firebase.google.com/docs/firestore/best-practices"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: set
    import_path: "firebase-admin"
    description: "Writes or overwrites a Firestore document"

    postconditions:
      - id: aborted
        condition: "Transaction aborted due to contention"
        throws: "Error with code 'ABORTED' (gRPC code 10)"
        required_handling: >
          Caller SHOULD retry with exponential backoff and jitter.
          Occurs when multiple transactions access same data.
          Consider redesigning to reduce contention.
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: resource-exhausted
        condition: "Write quota exceeded"
        throws: "Error with code 'RESOURCE_EXHAUSTED'"
        required_handling: >
          Implement rate limiting and backoff.
          Check daily write quota and billing status.
        sources:
          - "https://firebase.google.com/docs/firestore/best-practices"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: update
    import_path: "firebase-admin"
    description: "Updates fields in existing Firestore document"

    postconditions:
      - id: not-found
        condition: "Document to update does not exist"
        throws: "Error with code 'NOT_FOUND' (gRPC code 5)"
        required_handling: >
          Caller MUST handle not-found errors.
          Use set() with merge: true if you want to create-or-update.
          update() requires document to exist.
        sources:
          - "https://firebase.google.com/docs/firestore/manage-data/add-data"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: aborted
        condition: "Transaction contention"
        throws: "Error with code 'ABORTED'"
        required_handling: "Retry with exponential backoff."
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: delete
    import_path: "firebase-admin"
    description: "Deletes a Firestore document"

    postconditions:
      - id: permission-denied
        condition: "Security rules deny delete access"
        throws: "Error with code 'PERMISSION_DENIED'"
        required_handling: "Check security rules and permissions."
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  # Cloud Messaging Service
  - name: send
    import_path: "firebase-admin"
    description: "Sends a message to a device via Firebase Cloud Messaging"

    postconditions:
      - id: invalid-recipient
        condition: "Device token is invalid, expired, or unregistered"
        throws: "FirebaseMessagingError with code 'messaging/invalid-recipient'"
        required_handling: >
          Caller MUST remove invalid tokens from database.
          Check error code and error.code === 'messaging/invalid-recipient'.
          Tokens can expire if user uninstalls app or revokes permissions.
        sources:
          - "https://firebase.google.com/docs/cloud-messaging/error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: invalid-argument
        condition: "Message payload is malformed or exceeds size limits"
        throws: "FirebaseMessagingError with code 'messaging/invalid-argument'"
        required_handling: >
          Validate message structure before sending.
          Check payload size limits (4KB for data messages).
          Verify required fields are present.
        sources:
          - "https://firebase.google.com/docs/cloud-messaging/error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: quota-exceeded
        condition: "FCM rate limit exceeded"
        throws: "FirebaseMessagingError with code 'messaging/quota-exceeded'"
        required_handling: >
          Implement exponential backoff retry.
          Reduce message send rate.
          Check if quota limit is reasonable for use case.
        sources:
          - "https://firebase.google.com/docs/cloud-messaging/error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: sendMulticast
    import_path: "firebase-admin"
    description: "Sends a message to multiple devices (up to 500)"

    postconditions:
      - id: partial-failure
        condition: "Some tokens succeeded, some failed"
        returns: "BatchResponse with failureCount > 0"
        required_handling: >
          Caller MUST check response.failureCount and response.responses array.
          Each response contains success boolean and optional error.
          Remove invalid tokens from database based on specific error codes.
        sources:
          - "https://firebase.google.com/docs/cloud-messaging/send-message"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: invalid-argument
        condition: "Invalid tokens or payload"
        throws: "FirebaseMessagingError"
        required_handling: "Validate all tokens and payload before sending."
        sources:
          - "https://firebase.google.com/docs/cloud-messaging/error-codes"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: sendToTopic
    import_path: "firebase-admin"
    description: "Sends a message to all devices subscribed to a topic"

    postconditions:
      - id: invalid-topic
        condition: "Topic name is invalid or doesn't exist"
        throws: "FirebaseMessagingError with code 'messaging/invalid-argument'"
        required_handling: >
          Validate topic name format.
          Topic names must match /topics/[a-zA-Z0-9-_.~%]+
        sources:
          - "https://firebase.google.com/docs/cloud-messaging/send-message#send-messages-to-topics"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  # Realtime Database Service
  - name: once
    import_path: "firebase-admin"
    description: "Reads Realtime Database data once (non-listening)"

    postconditions:
      - id: permission-denied
        condition: "Database rules deny read access"
        throws: "Error with code 'PERMISSION_DENIED'"
        required_handling: >
          Check Realtime Database rules.
          Admin SDK bypasses rules by default - if seeing this, check databaseAuthVariableOverride.
        sources:
          - "https://firebase.google.com/docs/database/admin/start"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: network-error
        condition: "Network connection failed"
        throws: "Error"
        required_handling: >
          Implement retry with exponential backoff for transient failures.
        sources:
          - "https://firebase.google.com/docs/reference/admin/error-handling"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: set
    import_path: "firebase-admin"
    description: "Writes data to Realtime Database path (overwrites)"

    postconditions:
      - id: permission-denied
        condition: "Database rules deny write access"
        throws: "Error with code 'PERMISSION_DENIED'"
        required_handling: "Check database rules and authentication."
        sources:
          - "https://firebase.google.com/docs/database/admin/save-data"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: update
    import_path: "firebase-admin"
    description: "Updates specific fields in Realtime Database"

    postconditions:
      - id: permission-denied
        condition: "Database rules deny write access"
        throws: "Error with code 'PERMISSION_DENIED'"
        required_handling: "Check database rules."
        sources:
          - "https://firebase.google.com/docs/database/admin/save-data"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: remove
    import_path: "firebase-admin"
    description: "Deletes data from Realtime Database path"

    postconditions:
      - id: permission-denied
        condition: "Database rules deny delete access"
        throws: "Error with code 'PERMISSION_DENIED'"
        required_handling: "Check database rules."
        sources:
          - "https://firebase.google.com/docs/database/admin/save-data"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  # --- Added by deepen-stream-2 depth pass 2026-04-06 ---
  # Evidence: firebase-admin v13.7.0 source (lib/auth/base-auth.js, lib/utils/error.js)
  # Evidence: https://firebase.google.com/docs/auth/admin/manage-cookies (session cookies)
  # Evidence: https://firebase.google.com/docs/auth/admin/custom-tokens (createCustomToken)
  # Evidence: @google-cloud/firestore source (transaction.js — DEFAULT_MAX_TRANSACTION_ATTEMPTS=5)
  # Evidence: https://cloud.google.com/firestore/docs/understand-error-codes (ABORTED, RESOURCE_EXHAUSTED)
  # Evidence: https://firebase.google.com/docs/cloud-messaging/error-codes (messaging errors)

  # Auth Service — Session Cookie Management

  - name: createSessionCookie
    import_path: "firebase-admin"
    description: >
      Creates a Firebase session cookie from a valid ID token. Used to implement
      server-side session management with httpOnly cookies. The cookie is a signed
      JWT with configurable expiry (5 minutes to 2 weeks). Called in login endpoints
      to exchange an ID token for a long-lived session cookie.

    postconditions:
      # Evidence: lib/auth/base-auth.js createSessionCookie() validates duration before calling authRequestHandler
      # Evidence: lib/utils/error.js — AuthClientErrorCode.INVALID_SESSION_COOKIE_DURATION
      - id: session-cookie-invalid-duration
        severity: error
        condition: "expiresIn is not provided, not a number, or outside the allowed range (5 minutes to 2 weeks)"
        throws: "FirebaseAuthError with code 'auth/invalid-session-cookie-duration'"
        required_handling: >
          Validate expiresIn is a number between 300000ms (5 min) and 1209600000ms (2 weeks)
          before calling. Catch this error and return 400 Bad Request with a clear message.
          This error rejects synchronously — no network call is made.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      # Evidence: lib/auth/auth-api-request.js — sends idToken to Firebase Auth REST API
