  # Firestore — Transaction and Batch Operations

  - name: runTransaction
    import_path: "firebase-admin"
    description: >
      Executes a transaction against Firestore with automatic retry on contention.
      The transaction function receives a Transaction object and must return a Promise.
      Firestore retries up to DEFAULT_MAX_TRANSACTION_ATTEMPTS (5) times on ABORTED
      errors. After 5 failed attempts, the promise rejects with the last ABORTED error.
      All reads must happen before any writes within the transaction function.

    postconditions:
      # Evidence: @google-cloud/firestore/build/src/transaction.js — _maxAttempts=5, retries on ABORTED
      # Evidence: @google-cloud/firestore/build/src/index.js — DEFAULT_MAX_TRANSACTION_ATTEMPTS = 5
      # Evidence: https://cloud.google.com/firestore/docs/understand-error-codes (ABORTED code 10)
      - id: transaction-aborted-max-retries
        severity: error
        condition: "Transaction contention persists across all 5 automatic retry attempts"
        throws: "Error with gRPC code ABORTED (code 10) — message: 'Too much contention on these datastore entities. Please try again.'"
        required_handling: >
          Catch the final rejection after retries are exhausted and return a 409 Conflict
          or retry the full operation at the application level with backoff. Do not swallow
          this error — silent swallowing causes lost writes that appear as stale data.
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high

      # Evidence: https://cloud.google.com/firestore/docs/understand-error-codes (DEADLINE_EXCEEDED code 4)
      - id: transaction-deadline-exceeded
        severity: error
        condition: "Transaction execution exceeds Firestore's 60-second server deadline"
        throws: "Error with gRPC code DEADLINE_EXCEEDED (code 4)"
        required_handling: >
          Catch and treat as a non-retryable failure — the transaction was rolled back.
          For background jobs, return a failure result. For API routes, return 503.
          Break large transactions into smaller units to avoid hitting the deadline.
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      # Evidence: @google-cloud/firestore/build/src/transaction.js — offline triggers immediate failure
      - id: transaction-failed-offline
        severity: error
        condition: "Firestore service is unreachable or the network connection is unavailable"
        throws: "Error with gRPC code UNAVAILABLE (code 14)"
        required_handling: >
          Catch and implement external retry with exponential backoff. The Admin SDK
          does NOT queue offline — it fails immediately. Background jobs MUST retry
          externally when UNAVAILABLE errors occur during network partitions.
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      # Evidence: Firestore docs — updateFunction must not have side effects; retried up to 5 times
      - id: transaction-function-side-effects
        severity: warning
        condition: "The transaction update function contains side effects that execute on every retry attempt"
        throws: "No throw — side effects execute silently N times (up to 5)"
        required_handling: >
          Keep the updateFunction free of observable side effects beyond Firestore writes.
          Move external API calls, payments, and email sends to AFTER the transaction resolves.
        sources:
          - "https://firebase.google.com/docs/firestore/manage-data/transactions"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

  - name: commit
    import_path: "firebase-admin"
    description: >
      Commits a Firestore WriteBatch atomically. All operations in the batch succeed
      or all fail — no partial commits. Batches can contain up to 500 operations.
      Unlike transactions, batched writes do NOT read before writing and do NOT
      retry on contention — the caller is responsible for retry logic.

    postconditions:
      # Evidence: https://cloud.google.com/firestore/docs/understand-error-codes (RESOURCE_EXHAUSTED code 8)
      # Evidence: @google-cloud/firestore write-batch.d.ts — commit() returns Promise<WriteResult[]>
      - id: batch-resource-exhausted
        severity: error
        condition: "Write quota is exceeded or batch causes a hot-spot on a document"
        throws: "Error with gRPC code RESOURCE_EXHAUSTED (code 8)"
        required_handling: >
          Catch and implement exponential backoff retry. Batch commits that hit
          RESOURCE_EXHAUSTED have NOT been applied — retry the full batch. Add
          jitter to backoff to prevent thundering herd in serverless deployments.
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      # Evidence: https://cloud.google.com/firestore/docs/understand-error-codes (ABORTED code 10)
      - id: batch-aborted
        severity: error
        condition: "Batch write fails due to document contention"
        throws: "Error with gRPC code ABORTED (code 10)"
        required_handling: >
          Catch ABORTED and retry the full batch from scratch. WriteBatch does NOT
          automatically retry unlike runTransaction(). No writes are applied on
          ABORTED — the batch is atomic and all-or-nothing.
        sources:
          - "https://cloud.google.com/firestore/docs/understand-error-codes"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      # Evidence: @google-cloud/firestore source — INVALID_ARGUMENT thrown for >500 ops
      - id: batch-too-many-operations
        severity: error
        condition: "Batch contains more than 500 write operations"
        throws: "Error with gRPC INVALID_ARGUMENT — Firestore's hard 500-operation limit per batch"
        required_handling: >
          Split large datasets into chunks of 500 or fewer before committing.
          Validate batch size before calling commit(). The SDK throws before
          sending to the server — no partial writes occur.
        sources:
          - "https://firebase.google.com/docs/firestore/manage-data/transactions"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Messaging Service — Modern Batch Send API

  - name: sendEach
    import_path: "firebase-admin"
    description: >
      Sends a list of messages via Firebase Cloud Messaging, one per HTTP/2 connection.
      This is the modern replacement for the deprecated sendAll(). Returns a BatchResponse
      where each individual send result must be inspected — partial failure is possible.
      Maximum 500 messages per call. Unlike send(), does NOT throw on per-message failure;
      instead, the failure is captured in the individual SendResponse.

    postconditions:
      # Evidence: messaging.d.ts — sendEach returns Promise<BatchResponse>
      # Evidence: lib/messaging/messaging.js — parses per-message responses
      - id: send-each-partial-failure
        severity: error
        condition: "One or more messages fail to send while others succeed (partial failure)"
        throws: "Promise resolves with BatchResponse where failureCount > 0; does NOT reject on partial failure"
        required_handling: >
          After every sendEach() call, check response.failureCount. If > 0, iterate
          response.responses to find per-message errors. Remove tokens with
          'messaging/registration-token-not-registered' from the database.
          failureCount === messages.length means total failure with no deliveries.
        sources:
          - "https://firebase.google.com/docs/cloud-messaging/send-message"
