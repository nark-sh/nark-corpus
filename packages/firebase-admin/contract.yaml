        condition: "updatedConfig is null, not an object, or contains invalid field values"
        throws: "FirebaseAuthError with code 'auth/invalid-config'"
        required_handling: >
          Validate configuration object before calling updateProviderConfig.
          OIDC requires clientId, issuer, and clientSecret for code flow.
