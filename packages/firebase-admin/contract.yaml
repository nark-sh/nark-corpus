        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      # Evidence: lib/utils/error.js — AuthClientErrorCode.INVALID_CREDENTIAL
      - id: session-cookie-network-error
        severity: error
        condition: "Firebase Auth service is unreachable"
        throws: "FirebaseAuthError or network Error"
        required_handling: >
          Catch network errors at the login endpoint and return 503 Service Unavailable.
          Implement exponential backoff retry for transient failures.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: verifySessionCookie
    import_path: "firebase-admin"
    description: >
      Verifies a Firebase session cookie and returns its decoded claims. Used in
      middleware to authenticate requests. With checkRevoked=true, makes an extra
      network call to check if the session was explicitly revoked via revokeRefreshTokens().
      Must be called on every authenticated request in session-cookie-based auth flows.

    postconditions:
      # Evidence: lib/utils/error.js — AuthClientErrorCode.SESSION_COOKIE_EXPIRED
      # Evidence: base-auth.d.ts JSDoc — "auth/session-cookie-revoked error is thrown"
      - id: session-cookie-expired
        severity: error
        condition: "Session cookie's expiry time has passed"
        throws: "FirebaseAuthError with code 'auth/session-cookie-expired'"
        required_handling: >
          Catch in authentication middleware. Clear the session cookie and redirect
          to login. DO NOT retry — the cookie is permanently expired.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      # Evidence: lib/utils/error.js — AuthClientErrorCode.SESSION_COOKIE_REVOKED
      - id: session-cookie-revoked
        severity: error
        condition: "checkRevoked=true and the user's session was revoked via revokeRefreshTokens()"
        throws: "FirebaseAuthError with code 'auth/session-cookie-revoked'"
        required_handling: >
          Catch in authentication middleware alongside cookie-expired. Clear the session
          cookie and redirect to login. Distinguish from expired for proper UX messaging.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      # Evidence: lib/utils/error.js — general auth errors thrown by token verifier
      - id: session-cookie-invalid
        severity: error
        condition: "Session cookie is malformed, has invalid signature, or belongs to different Firebase project"
        throws: "FirebaseAuthError with code 'auth/argument-error' or similar"
        required_handling: >
          Catch in authentication middleware. Return 401 Unauthorized and clear the
          invalid cookie. Never swallow this error — tampered cookies must be rejected.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      # Evidence: base-auth.d.ts JSDoc — checkRevoked requires network call to Firebase
      - id: session-cookie-user-disabled
        severity: error
        condition: "checkRevoked=true and the user account has been disabled"
        throws: "FirebaseAuthError with code 'auth/user-disabled'"
        required_handling: >
          Catch separately from cookie-expired and cookie-revoked. Return a
          disabled-account response, not a generic 401. Requires network call to Firebase Auth.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  # Auth Service — Custom Tokens

  - name: createCustomToken
    import_path: "firebase-admin"
    description: >
      Creates a signed JWT that client-side SDKs can use with signInWithCustomToken()
