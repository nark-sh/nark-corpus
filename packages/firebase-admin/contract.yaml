        severity: error
        condition: "Project has reached the maximum number of tenants for the GCIP plan"
        throws: "FirebaseAuthError with code 'auth/quota-exceeded'"
        required_handling: >
          Catch and surface as a billing/capacity limit. Contact Google Cloud
          support to increase tenant quota. Do not retry — the error is persistent
          until quota is increased or existing tenants are deleted.
          Alert operations team immediately.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/utils/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: updateTenant
    import_path: "firebase-admin/auth"
    description: >
      Updates an existing tenant's properties (displayName, email sign-in settings,
      MFA configuration, etc.). Used in admin workflows to modify tenant settings
      after creation.

    postconditions:
      # Evidence: lib/auth/auth-api-request.js line 1827
      # throw INVALID_TENANT_ID on empty/invalid tenantId; server maps TENANT_NOT_FOUND
      - id: update-tenant-not-found
        severity: error
        condition: "No tenant exists for the provided tenantId"
        throws: "FirebaseAuthError with code 'auth/tenant-not-found'"
        required_handling: >
          Catch and handle as 404. Verify the tenantId is correct.
          This can occur if a tenant was deleted between reads.
          Do not retry — the tenant must be recreated if missing.
          Return 404 to calling service.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/auth-api-request.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: lib/utils/error.js — INVALID_TENANT_TYPE: code 'invalid-tenant-type'
      # Cannot change tenant type after creation (full_service vs lightweight)
      - id: update-tenant-invalid-tenant-type
        severity: error
        condition: "Attempting to change the tenant type (full_service vs lightweight) after creation"
        throws: "FirebaseAuthError with code 'auth/invalid-tenant-type'"
        required_handling: >
          Tenant type cannot be changed after creation. Remove the tenantType
          field from update requests if the type is already set. This is a
          permanent constraint — the only fix is to delete and recreate the tenant.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/utils/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteTenant
    import_path: "firebase-admin/auth"
    description: >
      Permanently deletes a tenant and all its associated users and configurations.
      This is a destructive, irreversible operation. All users within the tenant
      are permanently deleted. Used in B2B SaaS offboarding workflows when a
      customer account is terminated.

    postconditions:
      # Evidence: lib/auth/auth-api-request.js line 1862
      # server-side: TENANT_NOT_FOUND maps to 'tenant-not-found'
      - id: delete-tenant-not-found
        severity: warning
        condition: "No tenant exists for the provided tenantId"
        throws: "FirebaseAuthError with code 'auth/tenant-not-found'"
        required_handling: >
          Treat as idempotent — the tenant is already gone.
          In offboarding workflows, this is generally safe to ignore.
          Log the occurrence for audit trails (the tenant may have been
          deleted by a concurrent request or external process).
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/auth-api-request.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

  - name: getTenant
    import_path: "firebase-admin/auth"
    description: >
      Retrieves the tenant configuration for the given tenantId. Used to verify
      tenant existence, read settings, and validate tenant state before performing
      tenant-scoped operations.

    postconditions:
      # Evidence: lib/auth/auth-api-request.js — TENANT_NOT_FOUND error code
      # lib/utils/error.js: TENANT_NOT_FOUND: code 'tenant-not-found'
      - id: get-tenant-not-found
        severity: error
        condition: "No tenant exists for the provided tenantId"
        throws: "FirebaseAuthError with code 'auth/tenant-not-found'"
        required_handling: >
          Catch and handle as 404. Always check tenant existence before performing
          tenant-scoped operations. If tenantId comes from user input or external
          systems, validate it with getTenant before calling authForTenant().
          Return 404 to calling service.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/utils/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # ── Realtime Database — Security Rules Management ───────────────────────────

  - name: setRules
    import_path: "firebase-admin/database"
    description: >
      Writes new security rules to the Firebase Realtime Database instance.
      This is an admin-only operation used in deployment automation scripts,
      CI/CD pipelines, and infrastructure provisioning workflows. Immediately
      replaces all existing rules — there is no merge or diff operation.

    postconditions:
      # Evidence: lib/database/database.js line 200-208
      # if (!isNonEmptyString && !isBuffer && !isNonNullObject) throw FirebaseDatabaseError invalid-argument
      - id: set-rules-invalid-argument
        severity: error
        condition: "source is null, undefined, empty string, or not a string/Buffer/object"
        throws: "FirebaseDatabaseError with code 'database/invalid-argument'"
        required_handling: >
          Validate rules source before calling setRules. The source must be a
          non-empty string (rules JSON), a Buffer containing rules, or a parsed
          object. Never pass null or empty string. This is a synchronous validation
          — no network call is made.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/database/database.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: lib/database/database.js — handleError() on HTTP failure
      # Firebase RTDB REST API rules endpoint requires Firebase Admin or firebase-rules IAM permission
      - id: set-rules-permission-denied
        severity: error
        condition: "Service account lacks firebaserules.rulesets.create IAM permission or Firebase Admin role"
        throws: "FirebaseDatabaseError with HTTP 403 / permission-denied"
        required_handling: >
          Catch and alert — this is a service account misconfiguration in the
          deployment environment. The service account requires the Firebase Admin
          SDK Service Agent role or firebaserules.rulesets.create permission.
          Do not retry. Alert the deployment pipeline — rules were NOT updated.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/database/database.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  # ── Cloud Storage — Download URL ─────────────────────────────────────────────

  - name: getDownloadURL
    import_path: "firebase-admin/storage"
    description: >
      Generates a public download URL for a Cloud Storage file using Firebase's
      download token system. This is the Admin SDK equivalent of getDownloadURL()
      from the client SDK. Used in server-side workflows to generate shareable
      links after file uploads. The URL is permanent until the download token is
      revoked.

    postconditions:
      # Evidence: lib/storage/index.js line 64-76
      # if (!downloadTokens) throw FirebaseError({ code: 'storage/no-download-token' })
      - id: get-download-url-no-token
        severity: error
        condition: >
          File exists in Cloud Storage but has no Firebase download token.
          Files uploaded directly via Google Cloud Storage APIs (not Firebase SDK)
          do not have download tokens by default.
        throws: "FirebaseError with code 'storage/no-download-token'"
        required_handling: >
          Catch and handle: create a download token by updating the file's metadata
          via the Firebase Console or by calling file.setMetadata() to add a
          firebaseStorageDownloadTokens metadata entry.
          Files uploaded via Firebase Client SDK automatically have tokens.
          Files uploaded via @google-cloud/storage SDK do NOT have tokens unless
          explicitly added. This is a common pitfall in hybrid upload architectures.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/storage/index.ts"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: lib/storage/index.js — getFirebaseMetadata() wraps @google-cloud/storage file.getMetadata()
      # File not found throws 404 from Google Cloud Storage
      - id: get-download-url-file-not-found
        severity: error
        condition: "File does not exist in the Cloud Storage bucket"
        throws: "Error with HTTP 404 from Google Cloud Storage API"
        required_handling: >
          Catch HTTP 404 errors — this occurs when the file path is incorrect,
          the file was deleted, or the bucket name is wrong. Always verify file
          existence before generating download URLs in critical workflows.
          Return 404 to the calling client.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/storage/index.ts"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
