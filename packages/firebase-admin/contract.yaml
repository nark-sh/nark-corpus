  # ── Security Rules — Ruleset Management ─────────────────────────────────────

  - name: SecurityRules.releaseFirestoreRulesetFromSource
    import_path: "firebase-admin/security-rules"
    description: >
      Creates a new Ruleset from the given source string/Buffer and atomically
      releases (applies) it to Cloud Firestore. This is the primary API for
      deploying Firestore security rules from CI/CD pipelines, deployment scripts,
      and infrastructure provisioning workflows. If either the createRuleset or
      releaseRuleset step fails, the operation rejects — Firestore continues using
      the previously applied ruleset. Silent failure here means a broken security
      rules deployment goes undetected, leaving production data at risk.

    postconditions:
      # Evidence: src/security-rules/security-rules.ts — createRulesFileFromSource()
      # throws FirebaseSecurityRulesError('invalid-argument') for empty/non-string source
      # Evidence: src/security-rules/security-rules-api-client-internal.ts
      # SecurityRulesErrorCode: INVALID_ARGUMENT -> 'invalid-argument'
      - id: security-rules-release-firestore-invalid-argument
        maturity: stable
        severity: error
        condition: >
          source is null, undefined, empty string, or not a string/Buffer.
          Thrown synchronously before any network call is made.
        throws: "FirebaseSecurityRulesError with code 'security-rules/invalid-argument'"
        required_handling: >
          Validate the rules source before calling. The source must be a non-empty
          string (rules text) or a Buffer containing the rules. Empty string is a
          common bug in templated deployment scripts that interpolate an undefined
          variable. Catch this error and fail the deployment pipeline immediately --
          the rules were NOT updated.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/security-rules/security-rules.ts"
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/security-rules/error.ts"
        evidence_quality: confirmed
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: security-rules-api-client-internal.ts ERROR_CODE_MAPPING
      # UNAUTHENTICATED -> 'authentication-error' (HTTP 401)
      - id: security-rules-release-firestore-auth-error
        maturity: stable
        severity: error
        condition: >
          The service account does not have permission to manage Firebase Security
          Rules (requires Firebase Rules Admin role or securityrules.rulesets.create
          IAM permission). HTTP 401 from the Cloud Security Rules API.
        throws: "FirebaseSecurityRulesError with code 'security-rules/authentication-error'"
        required_handling: >
          Catch and fail the deployment pipeline with a clear alert. This is a
          service account misconfiguration -- the rules were NOT deployed. Do NOT
          retry. Requires granting the Firebase Admin or Security Rules Admin IAM
          role to the service account used by the deployment process.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/security-rules/security-rules-api-client-internal.ts"
          - "https://firebase.google.com/docs/projects/iam/permissions"
        evidence_quality: confirmed
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: security-rules-api-client-internal.ts ERROR_CODE_MAPPING
      # RESOURCE_EXHAUSTED -> 'resource-exhausted' (quota limit on rulesets)
      - id: security-rules-release-firestore-resource-exhausted
        maturity: stable
        severity: warning
        condition: >
          The project has exceeded the maximum number of rulesets (2500 per project
          per day for creation, or 200 concurrent rulesets). Each call to
          releaseFirestoreRulesetFromSource creates a new ruleset -- without
          periodic deleteRuleset cleanup, quota is exhausted.
        throws: "FirebaseSecurityRulesError with code 'security-rules/resource-exhausted'"
        required_handling: >
          Catch and alert the ops team. After receiving this error, list and delete
          old rulesets using listRulesetMetadata() + deleteRuleset() before retrying.
          In CI/CD pipelines that deploy frequently, implement automatic ruleset
          rotation: keep the last N rulesets and delete the oldest after each deploy.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/security-rules/security-rules-api-client-internal.ts"
          - "https://firebase.google.com/docs/firestore/security/get-started"
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

