  # Remote Config Service

  - name: getTemplate
    import_path: "firebase-admin"
    description: >
      Fetches the current active Remote Config template from the Firebase project.
      Returns a RemoteConfigTemplate containing parameters, parameter groups,
      conditions, and an ETag. The ETag MUST be preserved and sent back when
      calling publishTemplate() to prevent overwriting concurrent changes.
      This is the entry point for all server-side Remote Config workflows.

    postconditions:
      # Evidence: lib/remote-config/remote-config-api-client-internal.js — ERROR_CODE_MAPPING
      # PERMISSION_DENIED → 'permission-denied', UNAUTHENTICATED → 'unauthenticated'
      - id: remote-config-get-permission-denied
        severity: error
        condition: "Service account lacks Remote Config Viewer or Editor role"
        throws: "FirebaseRemoteConfigError with code 'remote-config/permission-denied'"
        required_handling: >
          Catch and alert — this is a service account misconfiguration that will
          prevent all Remote Config reads. Return 500 to the caller. Grant the
          Firebase Remote Config Admin role to the service account in IAM.
          Do not retry — this error is not transient.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: lib/remote-config/remote-config-api-client-internal.js — ERROR_CODE_MAPPING
      # RESOURCE_EXHAUSTED → 'resource-exhausted' (quota exceeded)
      - id: remote-config-get-quota-exceeded
        severity: warning
        condition: "Remote Config REST API quota is exceeded (default: 2000 requests/day for GET)"
        throws: "FirebaseRemoteConfigError with code 'remote-config/resource-exhausted'"
        required_handling: >
          Cache the Remote Config template locally rather than fetching it on every
          request. Implement a TTL-based cache (Firebase recommends 15 minutes for
          most use cases). Catch this error and serve the last cached template.
          Do not fetch on every user request — this rapidly exhausts quota.
        sources:
          - "https://firebase.google.com/docs/remote-config/use-config-rest#quotas"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: lib/remote-config/remote-config-api-client-internal.js — validateEtag() throws 'invalid-argument'
      # 'ETag header is not present in the server response.'
      - id: remote-config-get-network-error
        severity: error
        condition: "Firebase Remote Config service is unreachable or network fails"
        throws: "FirebaseRemoteConfigError with code 'remote-config/unknown-error' or network Error"
        required_handling: >
          Catch and serve last cached template if available. Implement exponential
          backoff retry for transient failures. Do not crash the application when
          Remote Config is temporarily unavailable — serve defaults instead.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: publishTemplate
    import_path: "firebase-admin"
    description: >
      Publishes a Remote Config template, making it immediately live for all
      clients. Uses optimistic concurrency control via ETags — the template's
      etag field MUST match the current server ETag or the publish fails with
      ABORTED. Use force:true to bypass ETag checking (not recommended).
      Pushing invalid template structures fails with INVALID_ARGUMENT.

    postconditions:
      # Evidence: lib/remote-config/remote-config-api-client-internal.js
      # sendPutRequest() sends If-Match: etag header; server returns ABORTED if ETag doesn't match
      # ERROR_CODE_MAPPING: ABORTED → 'aborted'
      - id: remote-config-publish-etag-mismatch
        severity: error
        condition: >
          Template ETag does not match the current server ETag — another process
          published the template after getTemplate() was called
        throws: "FirebaseRemoteConfigError with code 'remote-config/aborted'"
        required_handling: >
          Catch 'remote-config/aborted' and retry: call getTemplate() to get the
          latest template, reapply your changes to it, then call publishTemplate()
          again. This prevents overwriting concurrent changes. Using force:true
          bypasses the ETag but risks losing changes made by other processes.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: lib/remote-config/remote-config-api-client-internal.js
      # validateInputRemoteConfigTemplate() throws 'invalid-argument' for invalid ETag or template structure
      - id: remote-config-publish-invalid-template
        severity: error
        condition: "Template has missing ETag, invalid conditions, or malformed parameter values"
        throws: "FirebaseRemoteConfigError with code 'remote-config/invalid-argument'"
        required_handling: >
          Call validateTemplate() before publishTemplate() to catch structural
          errors without committing them. Catch 'invalid-argument' and log the
          error details — these indicate template schema violations.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: ERROR_CODE_MAPPING: RESOURCE_EXHAUSTED → 'resource-exhausted'
      # Remote Config has 1 publish per second rate limit per project
      - id: remote-config-publish-quota-exceeded
        severity: error
        condition: "Remote Config write quota exceeded (default: 1 publish per second per project)"
        throws: "FirebaseRemoteConfigError with code 'remote-config/resource-exhausted'"
        required_handling: >
          Implement rate limiting before publishing — only one publish per second
          is allowed. Catch this error and retry after a 1-second delay.
          Do not use publishTemplate() in hot code paths — it is an admin operation.
        sources:
          - "https://firebase.google.com/docs/remote-config/use-config-rest#quotas"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validateTemplate
    import_path: "firebase-admin"
    description: >
      Validates a Remote Config template without publishing it. Sends the template
      to the Firebase Remote Config REST API for structural validation and returns
      the template if valid. The returned template's ETag has a special '-0' suffix
      to indicate it is a validation result — the SDK resets the ETag to the
      original input ETag before returning. Use before publishTemplate() to
      catch errors without modifying the live configuration.

    postconditions:
      # Evidence: lib/remote-config/remote-config-api-client-internal.js
      # validateInputRemoteConfigTemplate() — throws invalid-argument for missing ETag, bad conditions
      - id: remote-config-validate-invalid-argument
        severity: error
        condition: "Template has missing ETag, malformed conditions, invalid parameter names, or circular references"
        throws: "FirebaseRemoteConfigError with code 'remote-config/invalid-argument'"
        required_handling: >
          Catch and inspect the error message — the server returns specific details
          about what is invalid (e.g., invalid condition expression, reserved parameter
          name). Fix the template structure before retrying. This is the expected
          failure mode — validateTemplate() is specifically designed to surface
          these errors before they affect production.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: validateTemplate calls sendPutRequest with validateOnly=true
      # Same permission requirements as publishTemplate
      - id: remote-config-validate-permission-denied
        severity: error
        condition: "Service account lacks Remote Config Editor or Admin role"
        throws: "FirebaseRemoteConfigError with code 'remote-config/permission-denied'"
        required_handling: >
          Catch and alert on this error — it indicates service account misconfiguration.
          The service account requires Firebase Remote Config Admin role, not just Viewer.
          Return 500 Internal Server Error. Do not retry.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # ── Auth Provider Config Management (SAML / OIDC) ───────────────────────────

  - name: createProviderConfig
    import_path: "firebase-admin/auth"
    description: >
      Creates a new SAML or OIDC provider configuration for federated identity.
      Used in enterprise B2B SaaS apps to enable SSO via customer identity providers.
      SAML providers use prefix 'saml.' and OIDC providers use prefix 'oidc.'.
      Requires Google Cloud Identity Platform (GCIP) — not available on Spark/Blaze
      without GCIP enabled.

    postconditions:
      # Evidence: lib/auth/auth-api-request.js line 1372, 1525
      # if (!OIDCConfig.isProviderId(config.providerId)) throw INVALID_PROVIDER_ID
      # lib/utils/error.js: code: 'invalid-provider-id'
      - id: create-provider-config-invalid-provider-id
        severity: error
        condition: >
          providerId does not start with 'saml.' or 'oidc.' prefix, or is missing
          from the config object entirely
        throws: "FirebaseAuthError with code 'auth/invalid-provider-id'"
        required_handling: >
          Validate providerId format before calling createProviderConfig.
          OIDC provider IDs must start with 'oidc.' and SAML with 'saml.'.
          This is a synchronous validation error — no retry is useful.
          Return 400 Bad Request with clear description of required format.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/auth-api-request.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: lib/utils/error.js — QUOTA_EXCEEDED: code 'quota-exceeded'
      # GCIP imposes limits on number of SAML/OIDC configs per project
      - id: create-provider-config-quota-exceeded
        severity: error
        condition: "Project has reached the maximum number of SAML or OIDC provider configurations"
        throws: "FirebaseAuthError with code 'auth/quota-exceeded'"
        required_handling: >
          Catch and surface this as a billing/plan limit error.
          The project has hit the GCIP provider config limit.
          Do not retry — the error persists until existing configs are deleted.
          Return 429 or 503 with explanation to the calling service.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/utils/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: lib/utils/error.js — INSUFFICIENT_PERMISSION: code 'insufficient-permission'
      # 'PERMISSION_DENIED' server error maps to INSUFFICIENT_PERMISSION
      - id: create-provider-config-insufficient-permission
        severity: error
        condition: "Service account lacks Identity Platform Admin or required IAM role"
        throws: "FirebaseAuthError with code 'auth/insufficient-permission'"
        required_handling: >
          Catch and alert — this is a service account misconfiguration.
          The service account requires the 'Firebase Authentication Admin' or
          'identitytoolkit.admin' IAM role. Do not retry.
          Return 500 Internal Server Error and alert on-call.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/utils/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: updateProviderConfig
    import_path: "firebase-admin/auth"
    description: >
      Updates an existing SAML or OIDC provider configuration. Used to rotate
      certificates, update issuer URLs, or toggle the provider on/off. If the
      specified providerId does not exist, throws configuration-not-found.

    postconditions:
      # Evidence: lib/auth/base-auth.d.ts JSDoc —
      # "If the specified ID does not exist, an `auth/configuration-not-found` error is thrown."
      # lib/utils/error.js: CONFIGURATION_NOT_FOUND: code 'configuration-not-found'
      - id: update-provider-config-not-found
        severity: error
        condition: "No provider configuration exists for the given providerId"
        throws: "FirebaseAuthError with code 'auth/configuration-not-found'"
        required_handling: >
          Catch and handle this as a 404. The provider config was deleted or never
          created. Verify the providerId is correct and the config exists before
          updating. Do not retry with same ID — the error is permanent until the
          config is created.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/base-auth.ts"
        business_impact:
