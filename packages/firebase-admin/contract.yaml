    - ".importUsers("
    # Firestore
    - ".runTransaction("
    - ".commit("
    - ".get("
    - ".set("
    - ".update("
    - ".delete("
    - ".add("
    # Messaging
    - ".send("
    - ".sendEach("
    - ".sendMulticast("
    - ".sendEachForMulticast("
    - ".sendToTopic("
    - ".subscribeToTopic("
    - ".unsubscribeFromTopic("
    # Realtime Database
    - ".once("
