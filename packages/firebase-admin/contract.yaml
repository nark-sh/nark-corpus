  # Auth Service — Bulk User Import

  - name: importUsers
    import_path: "firebase-admin"
    description: >
      Imports a list of users into Firebase Authentication in bulk. Used for
      migrating users from another auth system. Supports importing password hashes
      with BCRYPT, HMAC-SHA256, SCRYPT, and other algorithms. Returns a
      UserImportResult where per-user failures are captured in the result object —
      the Promise itself only rejects for batch-level errors (>1000 users, invalid
      options).

    postconditions:
      # Evidence: lib/auth/auth-api-request.js — MAX_UPLOAD_ACCOUNT_BATCH_SIZE = 1000
      # throw new FirebaseAuthError(MAXIMUM_USER_COUNT_EXCEEDED, 'A maximum of 1000 users can be imported at once.')
      - id: import-users-batch-too-large
        maturity: stable
        severity: error
        condition: "users array contains more than 1000 records"
        throws: "FirebaseAuthError with code 'auth/maximum-user-count-exceeded'"
        required_handling: >
          Split user arrays into chunks of 1000 before calling importUsers().
          The SDK throws synchronously before any network call. Validate batch
          size before calling to avoid this failure mid-migration.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/auth/auth-api-request.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: lib/auth/user-import-builder.js — buildResponse() merges client-side and server-side errors
      # importResult = { successCount, failureCount, errors: [...] }
      # Server returns failedUploads array — individual user errors ARE NOT thrown, they are in the result
      - id: import-users-partial-failure
        maturity: stable
        severity: error
        condition: "One or more individual user records fail validation or import while others succeed"
        throws: "Promise RESOLVES with UserImportResult where failureCount > 0; does NOT reject on per-user failure"
        required_handling: >
          After every importUsers() call, check result.failureCount. If > 0,
          inspect result.errors array — each entry contains index (original array
          position) and error (the failure reason). DO NOT assume all users were
          imported when the Promise resolves. Per-user failures include invalid
          email, duplicate UID, invalid password hash, and provider data conflicts.
          Log per-user errors for remediation.
        sources:
          - "https://firebase.google.com/docs/auth/admin/manage-users#import_users"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
