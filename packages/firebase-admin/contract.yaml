        condition: "tenantId in options is an empty string or invalid format"
        throws: "FirebaseAuthError with code 'auth/invalid-tenant-id'"
        required_handling: >
          Validate tenantId before calling createTenant. Tenant IDs must be
          non-empty strings. If using auto-generated IDs, omit the tenantId field
          and Firebase will generate one. Catch and return 400 Bad Request.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/auth-api-request.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: lib/utils/error.js — MISSING_DISPLAY_NAME: code 'missing-display-name'
      # API error map: MISSING_DISPLAY_NAME → 'missing-display-name'
      - id: create-tenant-missing-display-name
        maturity: stable
        severity: error
        condition: "displayName is required but missing from tenant options"
        throws: "FirebaseAuthError with code 'auth/missing-display-name'"
        required_handling: >
          Always include a displayName when creating tenants. The displayName is
          required by GCIP for tenant creation and is used in the Firebase Console
          and audit logs. Catch and return 400 with field validation details.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/utils/error.ts"
