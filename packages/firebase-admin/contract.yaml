#   same error profile as executeGraphql and are covered by the same await_patterns.
# API surface total: 77; contracted: 46; omitted: 31; coverage_score: 0.60
# Depth pass 2026-06-25 (deepen-stream-2 pass 3):
# Added 8 new function entries: TaskQueue.enqueue, TaskQueue.delete (Cloud Functions),
