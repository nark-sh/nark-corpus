        throws: "FirebaseRemoteConfigError with code 'remote-config/invalid-argument'"
        required_handling: >
          Catch and inspect the error message — the server returns specific details
          about what is invalid (e.g., invalid condition expression, reserved parameter
          name). Fix the template structure before retrying. This is the expected
          failure mode — validateTemplate() is specifically designed to surface
          these errors before they affect production.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: validateTemplate calls sendPutRequest with validateOnly=true
      # Same permission requirements as publishTemplate
      - id: remote-config-validate-permission-denied
        maturity: stable
        severity: error
        condition: "Service account lacks Remote Config Editor or Admin role"
