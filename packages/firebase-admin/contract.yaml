  # ── Auth -- Batch User Management ─────────────────────────────────────────

  - name: deleteUsers
    import_path: "firebase-admin/auth"
    description: >
      Deletes up to 1000 Firebase Auth users in a single batch call. Returns
      a DeleteUsersResult with successCount, failureCount, and an errors[]
      array containing per-user failures. Unlike deleteUser() which throws on
      failure, deleteUsers() NEVER throws on individual user failures -- it
      returns them in the result object. Callers who do not inspect
      result.failureCount and result.errors[] will silently miss failed
      deletions, leaving active accounts that should have been removed
      (GDPR non-compliance, security risk, billing impact from zombie accounts).

    postconditions:
      # Evidence: src/auth/base-auth.ts (deleteUsers), firebase-admin@14.1.0
      # deleteUsers() resolves (does NOT throw) for individual user failures.
      # It only throws on: batch size exceeded (>1000 uids), invalid argument,
      # or network-level failure.
      - id: delete-users-partial-failure
        maturity: stable
        severity: error
        condition: >
          One or more users in the batch could not be deleted. The method
          resolves successfully but result.failureCount > 0. Each failure entry
          in result.errors[] contains an index (position in the input uids
          array) and a FirebaseAuthError describing the failure. The non-failed
          users ARE deleted. This silent partial failure is the primary risk.
        throws: "resolves with DeleteUsersResult; individual failures in result.errors[] as FirebaseAuthError"
        required_handling: >
          Always check result.failureCount after every deleteUsers() call. If
          failureCount > 0, iterate result.errors[] to log each failure with
          the user UID (uids[error.index]) and error details. In GDPR/compliance
          flows, failed deletions MUST be retried or escalated -- do not treat
          a resolved promise as a success signal without inspecting failureCount.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/base-auth.ts"
          - "https://firebase.google.com/docs/auth/admin/manage-users#delete_multiple_users"
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: delete-users-batch-size-exceeded
        maturity: stable
        severity: error
        condition: >
          The uids array contains more than 1000 entries. The maximum batch
          size is 1000 (MAX_DELETE_ACCOUNTS_BATCH_SIZE). Thrown synchronously
          before any network call is made.
        throws: "FirebaseAuthError with code 'auth/maximum-user-count-exceeded'"
        required_handling: >
          Chunk the input uids array into batches of at most 1000 before
          calling deleteUsers(). Use Promise.all() to run chunks in parallel
          or sequential await for rate-limit safety.
        sources:
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/auth/auth-api-request.ts"
          - "https://firebase.google.com/docs/auth/admin/manage-users#delete_multiple_users"
        evidence_quality: confirmed
