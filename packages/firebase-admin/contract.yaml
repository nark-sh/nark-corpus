  # ── Remote Config (additional methods) ───────────────────────────────────────

  - name: RemoteConfig.rollback
    import_path: "firebase-admin/remote-config"
    description: >
      Rolls back the active Remote Config template to a previously published version.
      Equivalent to fetching the specified historical version and re-publishing it with
      force=true. Only the last 300 versions are retained; versions deleted for staleness
      (older than 90 days when non-active) cannot be rolled back to. Used as an emergency
      revert during a config-driven incident. A critical operational method — a bug here
      can leave an app in a broken config state or roll back to a wrong version.

    postconditions:
      # Evidence: lib/remote-config/error.d.ts — RemoteConfigErrorCode: NOT_FOUND: 'not-found'
      # Rolling back to a version number that was deleted due to staleness or never existed
      - id: remote-config-rollback-version-not-found
        maturity: stable
        severity: error
        condition: >
          The specified version number does not exist — it was never published, was
          deleted due to staleness (older than 90 days and no longer active), or
          exceeds the 300-version retention window.
        throws: "FirebaseRemoteConfigError with code 'remote-config/not-found'"
        required_handling: >
          Catch and alert. During an incident rollback, a not-found error means
          the target version is unavailable — fall back to the next-older known-good
          version. Use listVersions() to inspect the available version window before
          calling rollback(). Do NOT retry with the same version number.
        sources:
          - "https://firebase.google.com/docs/remote-config/automate-rc"
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/remote-config/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: lib/remote-config/error.d.ts — RemoteConfigErrorCode: FAILED_PRECONDITION
      # Rolling back to a version number >= current version violates the precondition
      - id: remote-config-rollback-invalid-version
        maturity: stable
        severity: error
        condition: >
          The specified version number is invalid — it is greater than or equal to
          the current version, or is not a positive integer.
        throws: "FirebaseRemoteConfigError with code 'remote-config/failed-precondition' or 'remote-config/invalid-argument'"
        required_handling: >
          Validate that the target version number is less than the current template
          version (available from template.version.versionNumber after getTemplate()).
          Rollback to the same or newer version is logically invalid.
        sources:
          - "https://firebase.google.com/docs/remote-config/automate-rc"
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/remote-config/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: RemoteConfig.getServerTemplate
    import_path: "firebase-admin/remote-config"
    description: >
      Fetches the active Remote Config template for server-side evaluation, returning
      a ServerTemplate object. ServerTemplate is used in Server-Side Personalization
      flows where parameter values are evaluated server-side (with user context) rather
      than being fetched on the client. Requires network access to the Remote Config
      REST API. Added in firebase-admin v12 for server-side personalization use cases.

    postconditions:
      # Evidence: lib/remote-config/error.d.ts — RemoteConfigErrorCode: UNAUTHENTICATED, PERMISSION_DENIED
      # Evidence: https://firebase.google.com/docs/remote-config/server
      - id: remote-config-server-template-auth-error
        maturity: stable
        severity: error
        condition: >
          The service account lacks Firebase Remote Config Viewer or Admin permission,
          or the Remote Config REST API is not enabled for the project. Also fires
          if the credentials have expired (UNAUTHENTICATED).
        throws: "FirebaseRemoteConfigError with code 'remote-config/permission-denied' or 'remote-config/unauthenticated'"
        required_handling: >
          Grant roles/firebaseremoteconfig.viewer to the service account. If the
          credential has expired, re-initialize the Admin SDK. This error blocks
          all server-side personalization — surface as a startup error rather than
          letting it manifest as a runtime NullPointerException when using the
          template object.
        sources:
          - "https://firebase.google.com/docs/remote-config/server"
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/remote-config/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: high

