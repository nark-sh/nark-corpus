        maturity: stable
        severity: error
        condition: "Project has reached the maximum number of tenants for the GCIP plan"
        throws: "FirebaseAuthError with code 'auth/quota-exceeded'"
        required_handling: >
          Catch and surface as a billing/capacity limit. Contact Google Cloud
          support to increase tenant quota. Do not retry — the error is persistent
          until quota is increased or existing tenants are deleted.
          Alert operations team immediately.
