        throws: "FirebaseMachineLearningError with code 'machine-learning/already-exists'"
        required_handling: >
          Catch and either update the existing model via updateModel() or use a
          unique display name. In idempotent create-or-update flows, catch this
          error, retrieve the existing model, and call updateModel() with the new
          model file URI.
