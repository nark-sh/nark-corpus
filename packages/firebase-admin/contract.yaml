  # Auth Service — Session Revocation

  - name: revokeRefreshTokens
    import_path: "firebase-admin"
    description: >
      Revokes all refresh tokens for a user, invalidating all existing sessions.
      Used after password changes, security events, or account compromise detection.
      After calling this, verifyIdToken(token, true) and verifySessionCookie(cookie, true)
      will throw revoked errors for that user. Takes effect within 1 hour for ID tokens
      without checkRevoked.

    postconditions:
      # Evidence: base-auth.d.ts and auth API — requires valid UID
      - id: revoke-tokens-user-not-found
        maturity: stable
        severity: error
        condition: "UID does not correspond to an existing Firebase user"
        throws: "FirebaseAuthError with code 'auth/user-not-found'"
        required_handling: >
          Catch and treat as success — user is already gone so revocation is moot.
          Log the discrepancy but do not crash the security incident handler.
        sources:
          - "https://firebase.google.com/docs/auth/admin/errors"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
