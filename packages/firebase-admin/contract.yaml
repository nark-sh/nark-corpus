  # Remote Config Service

  - name: getTemplate
    import_path: "firebase-admin"
    description: >
      Fetches the current active Remote Config template from the Firebase project.
      Returns a RemoteConfigTemplate containing parameters, parameter groups,
      conditions, and an ETag. The ETag MUST be preserved and sent back when
      calling publishTemplate() to prevent overwriting concurrent changes.
      This is the entry point for all server-side Remote Config workflows.

    postconditions:
      # Evidence: lib/remote-config/remote-config-api-client-internal.js — ERROR_CODE_MAPPING
      # PERMISSION_DENIED → 'permission-denied', UNAUTHENTICATED → 'unauthenticated'
      - id: remote-config-get-permission-denied
        maturity: stable
        severity: error
        condition: "Service account lacks Remote Config Viewer or Editor role"
        throws: "FirebaseRemoteConfigError with code 'remote-config/permission-denied'"
        required_handling: >
          Catch and alert — this is a service account misconfiguration that will
          prevent all Remote Config reads. Return 500 to the caller. Grant the
          Firebase Remote Config Admin role to the service account in IAM.
          Do not retry — this error is not transient.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: lib/remote-config/remote-config-api-client-internal.js — ERROR_CODE_MAPPING
      # RESOURCE_EXHAUSTED → 'resource-exhausted' (quota exceeded)
      - id: remote-config-get-quota-exceeded
        maturity: stable
        severity: warning
        condition: "Remote Config REST API quota is exceeded (default: 2000 requests/day for GET)"
        throws: "FirebaseRemoteConfigError with code 'remote-config/resource-exhausted'"
        required_handling: >
          Cache the Remote Config template locally rather than fetching it on every
          request. Implement a TTL-based cache (Firebase recommends 15 minutes for
          most use cases). Catch this error and serve the last cached template.
          Do not fetch on every user request — this rapidly exhausts quota.
        sources:
          - "https://firebase.google.com/docs/remote-config/use-config-rest#quotas"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: lib/remote-config/remote-config-api-client-internal.js — validateEtag() throws 'invalid-argument'
      # 'ETag header is not present in the server response.'
      - id: remote-config-get-network-error
        maturity: stable
        severity: error
        condition: "Firebase Remote Config service is unreachable or network fails"
        throws: "FirebaseRemoteConfigError with code 'remote-config/unknown-error' or network Error"
        required_handling: >
          Catch and serve last cached template if available. Implement exponential
          backoff retry for transient failures. Do not crash the application when
          Remote Config is temporarily unavailable — serve defaults instead.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: publishTemplate
    import_path: "firebase-admin"
    description: >
      Publishes a Remote Config template, making it immediately live for all
      clients. Uses optimistic concurrency control via ETags — the template's
      etag field MUST match the current server ETag or the publish fails with
      ABORTED. Use force:true to bypass ETag checking (not recommended).
      Pushing invalid template structures fails with INVALID_ARGUMENT.

    postconditions:
      # Evidence: lib/remote-config/remote-config-api-client-internal.js
      # sendPutRequest() sends If-Match: etag header; server returns ABORTED if ETag doesn't match
      # ERROR_CODE_MAPPING: ABORTED → 'aborted'
      - id: remote-config-publish-etag-mismatch
        maturity: stable
        severity: error
        condition: >
          Template ETag does not match the current server ETag — another process
          published the template after getTemplate() was called
        throws: "FirebaseRemoteConfigError with code 'remote-config/aborted'"
        required_handling: >
          Catch 'remote-config/aborted' and retry: call getTemplate() to get the
          latest template, reapply your changes to it, then call publishTemplate()
          again. This prevents overwriting concurrent changes. Using force:true
          bypasses the ETag but risks losing changes made by other processes.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: lib/remote-config/remote-config-api-client-internal.js
      # validateInputRemoteConfigTemplate() throws 'invalid-argument' for invalid ETag or template structure
      - id: remote-config-publish-invalid-template
        maturity: stable
        severity: error
        condition: "Template has missing ETag, invalid conditions, or malformed parameter values"
        throws: "FirebaseRemoteConfigError with code 'remote-config/invalid-argument'"
        required_handling: >
          Call validateTemplate() before publishTemplate() to catch structural
          errors without committing them. Catch 'invalid-argument' and log the
          error details — these indicate template schema violations.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/remote-config/remote-config-api-client-internal.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: ERROR_CODE_MAPPING: RESOURCE_EXHAUSTED → 'resource-exhausted'
      # Remote Config has 1 publish per second rate limit per project
      - id: remote-config-publish-quota-exceeded
        maturity: stable
        severity: error
        condition: "Remote Config write quota exceeded (default: 1 publish per second per project)"
        throws: "FirebaseRemoteConfigError with code 'remote-config/resource-exhausted'"
        required_handling: >
          Implement rate limiting before publishing — only one publish per second
          is allowed. Catch this error and retry after a 1-second delay.
          Do not use publishTemplate() in hot code paths — it is an admin operation.
        sources:
          - "https://firebase.google.com/docs/remote-config/use-config-rest#quotas"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validateTemplate
    import_path: "firebase-admin"
    description: >
      Validates a Remote Config template without publishing it. Sends the template
      to the Firebase Remote Config REST API for structural validation and returns
      the template if valid. The returned template's ETag has a special '-0' suffix
      to indicate it is a validation result — the SDK resets the ETag to the
      original input ETag before returning. Use before publishTemplate() to
      catch errors without modifying the live configuration.

    postconditions:
