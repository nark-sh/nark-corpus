      - id: import-users-partial-failure
        severity: error
        condition: "One or more individual user records fail validation or import while others succeed"
        throws: "Promise RESOLVES with UserImportResult where failureCount > 0; does NOT reject on per-user failure"
        required_handling: >
          After every importUsers() call, check result.failureCount. If > 0,
          inspect result.errors array — each entry contains index (original array
          position) and error (the failure reason). DO NOT assume all users were
          imported when the Promise resolves. Per-user failures include invalid
          email, duplicate UID, invalid password hash, and provider data conflicts.
          Log per-user errors for remediation.
        sources:
          - "https://firebase.google.com/docs/auth/admin/manage-users#import_users"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high

      # Evidence: lib/auth/auth-api-request.js — MISMATCHING_TENANT_ID thrown when tenant IDs don't match
      # 'User tenant ID does not match with the current TenantAwareAuth tenant ID.'
      - id: import-users-tenant-mismatch
        severity: error
        condition: "User records contain tenantId fields that don't match the TenantAwareAuth tenant context"
        throws: "FirebaseAuthError with code 'auth/mismatching-tenant-id'"
        required_handling: >
          When using multi-tenancy: ensure all user records in the batch have
          tenantId matching the TenantAwareAuth instance. Catch this error and
          reject the entire import batch — this is a configuration error.
        sources:
          - "https://raw.githubusercontent.com/firebase/firebase-admin-node/master/src/auth/auth-api-request.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

