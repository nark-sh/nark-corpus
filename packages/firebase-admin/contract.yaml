  - name: MachineLearning.publishModel
    import_path: "firebase-admin/machine-learning"
    description: >
      Publishes a Firebase ML model, making it downloadable by client SDKs (Android,
      iOS, Flutter). The model must exist and be in a valid state (not locked by an
      ongoing operation). A published model is what end-user devices download via
      the Firebase ML SDK. If this call fails silently, clients continue using the
      old model version indefinitely with no alert.

    postconditions:
      # Evidence: lib/machine-learning/error.d.ts — MachineLearningErrorCode: NOT_FOUND: 'not-found'
      - id: ml-publish-model-not-found
        maturity: stable
        severity: error
        condition: >
          The model with the given modelId does not exist in the project —
          it was never created, or was deleted before publish was called.
        throws: "FirebaseMachineLearningError with code 'machine-learning/not-found'"
        required_handling: >
          Catch and fail the deployment pipeline with a clear error. In CI/CD
          model-deployment flows, treat this as a fatal error requiring manual
          intervention — a missing model cannot be auto-recovered by retrying.
        sources:
          - "https://firebase.google.com/docs/ml/manage-models-admin"
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/machine-learning/error.ts"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: lib/machine-learning/error.d.ts — MachineLearningErrorCode: FAILED_PRECONDITION
      # publishModel() fails if the model is locked (e.g. another operation in progress) or
      # if the model file validation is still pending
      - id: ml-publish-model-failed-precondition
        maturity: stable
        severity: error
        condition: >
          The model is in a locked state due to a concurrent operation (e.g. the
          model file is still being processed or validated by Firebase ML).
        throws: "FirebaseMachineLearningError with code 'machine-learning/failed-precondition'"
        required_handling: >
          Catch and poll for the model to reach a non-locked state using getModel()
          before retrying publishModel(). Implement exponential backoff with a
          reasonable timeout (e.g. 60 seconds) — model processing is typically fast
          but can be slow for large models.
        sources:
          - "https://firebase.google.com/docs/ml/manage-models-admin"
          - "https://github.com/firebase/firebase-admin-node/blob/master/src/machine-learning/error.ts"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

