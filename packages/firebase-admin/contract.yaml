      Identity Platform (GCIP). Each tenant is an isolated authentication namespace
      with its own users and provider configurations. Requires GCIP — not available
      on standard Firebase projects. Tenants are accessed via TenantManager obtained
      from auth.tenantManager().createTenant().

    postconditions:
      # Evidence: lib/auth/auth-api-request.js line 1781
