functions:
  - name: connect
    import_path: '@modelcontextprotocol/sdk'
    description: >-
      Establishes connection from MCP client to a transport (Client.connect) or connects MCP server to a transport
      (McpServer.connect)
    postconditions:
      # Evidence: scan-modelcontextprotocol-sdk-2026-04-11.json — 4 repos scanned (limited by cloner errors), 0 violations found
      # FP check: 0/20 type-A FPs confirmed
      - id: connect-success
        condition: when connection is established successfully
        returns: void (connection is ready for use)
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/packages/client/src/client/client.ts
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: connect-throws-on-failure
        condition: when transport fails, spawn fails (stdio), protocol negotiation fails, or transport already connected
        throws: Error — transport error, spawn error, or protocol mismatch
        required_handling: >
          Caller MUST wrap connect() in a try-catch block. Connection failures are unrecoverable and must be surfaced to
          the caller. Log the error and stop further MCP operations on this client/server. For CLI tools, a top-level
          process.catch() on main() is acceptable. For HTTP-embedded servers, missing error handling crashes the request
          handler.
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/packages/client/src/client/client.ts
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
