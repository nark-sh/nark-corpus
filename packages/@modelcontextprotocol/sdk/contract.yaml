      - id: sse-transport-connection-error
        condition: >
          async function calls client.connect(sseTransport) without try-catch, and the
          SSE connection to the server fails. The EventSource connection fires an error
          event — server unreachable, HTTP error status (4xx/5xx), or network failure.
          The transport rejects with SseError containing the HTTP status code and message.
        throws: >
          SseError(code: number | undefined, message: string, event: ErrorEvent)
          from '@modelcontextprotocol/sdk/client/sse'. The code field is the HTTP
          status code if available (e.g., 404, 500), or undefined for network errors.
        required_handling: >
          Wrap connect() in try-catch. For migration from SSE to StreamableHTTP, catch
          SseError to trigger SSE fallback after StreamableHTTP fails:

            try {
              await client.connect(streamableTransport);
            } catch {
              // Fall back to legacy SSE transport
              try {
                const sseTransport = new SSEClientTransport(serverUrl);
                await client.connect(sseTransport);
              } catch (error) {
                if (error instanceof SseError) {
                  console.error(`SSE connection failed (HTTP ${error.code}): ${error.message}`);
                }
                throw error;
              }
            }
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports#backwards-compatibility
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
