  - name: close
    import_path: '@modelcontextprotocol/sdk'
    description: >
      Closes the MCP connection and disposes the transport. Available on Client, McpServer, and
      Server instances. Must be called to release resources (network connections, stdio subprocesses,
      timers) when the MCP session is no longer needed. Failure to close causes resource leaks and
      leaves the remote side with a zombie connection.
    postconditions:
      # Evidence: dist/cjs/shared/protocol.js — close() calls transport.close(), which can throw
      # transport-specific errors (network teardown, subprocess kill failure). The McpError
      # ConnectionClosed (-32000) is emitted to in-flight request handlers via the error callback.
      # https://modelcontextprotocol.io/docs/concepts/transports
      - id: close-discards-in-flight-requests
        condition: >
          close() is called while there are pending request() calls awaiting a response.
          In-flight requests receive McpError(ErrorCode.ConnectionClosed, 'Connection closed') instead
          of a response. This is confirmed from dist/cjs/shared/protocol.js:
          "const error = McpError.fromError(ErrorCode.ConnectionClosed, 'Connection closed')".
        throws: >
          McpError with code ErrorCode.ConnectionClosed (-32000) thrown into any pending request()
          awaiting a response. The close() call itself does not throw.
        required_handling: >
          Callers MUST handle McpError from in-flight requests when the connection is closed.
          In teardown sequences (shutdown handlers, test cleanup), ensure all request promises are
          settled BEFORE calling close(). Common pattern:
            await Promise.allSettled([pendingRequests]);
            await client.close();
          Do NOT fire-and-forget close() if there are active request workflows that need results.
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      - id: close-missing-on-server-shutdown
        condition: >
          McpServer.connect() is called in a long-running process but close() is never called
          when the HTTP request ends (stateless Streamable HTTP) or when the user disconnects
          (stdio session). Transport resources (SSE connections, subprocess handles, timers) accumulate.
        throws: No error thrown — resource leak is silent
        required_handling: >
          Callers MUST call close() in all exit paths: HTTP response finalizers, process SIGTERM
          handlers, test afterEach/afterAll hooks. For Express/Next.js MCP servers using
          StreamableHTTPServerTransport, call close() at the end of each request handler.
          For stdio MCP servers, register process.on('SIGINT', ...) and process.on('SIGTERM', ...)
          handlers that call server.close().
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: readResource
    import_path: '@modelcontextprotocol/sdk'
    description: >
      Reads the contents of a specific resource by URI from the connected MCP server.
      Used in agentic systems to retrieve context data (file contents, database records,
      API responses) that the server exposes as resources. Resources are server-managed
      data sources identified by URIs (e.g. file:///path/to/file, db://table/row/id).
    postconditions:
      # Evidence: dist/cjs/client/index.js — assertCapabilityForMethod checks for
      # "Server does not support resources (required for resources/read)"
      # Protocol layer throws McpError on timeout (RequestTimeout -32001) and
      # ConnectionClosed (-32000) from dist/cjs/shared/protocol.js
      - id: read-resource-missing-try-catch
        condition: >
          async function calls client.readResource() without try-catch. The server may throw
          McpError for: resource URI not found (MethodNotFound -32601), server-side I/O failure
          (InternalError -32603), or protocol-level failures (timeout RequestTimeout -32001,
          connection closed ConnectionClosed -32000).
        throws: >
          McpError — base class for protocol errors. Key codes:
          - ErrorCode.MethodNotFound (-32601): resource URI does not exist on server
          - ErrorCode.InternalError (-32603): server-side error reading the resource
          - ErrorCode.RequestTimeout (-32001): no response within timeout (default 60s)
          - ErrorCode.ConnectionClosed (-32000): transport disconnected during request
        required_handling: >
          Caller MUST wrap client.readResource() in try-catch and handle McpError.
          Resource URIs can disappear (files deleted, DB rows removed) between listResources()
          and readResource(). TOCTOU pattern is common — always handle MethodNotFound.

          Minimum:
            try {
              const result = await client.readResource({ uri: 'file:///data.json' });
              return result.contents;
            } catch (error) {
              if (error instanceof McpError && error.code === ErrorCode.MethodNotFound) {
                return null; // Resource was removed
              }
              throw error;
            }
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: read-resource-capability-not-advertised
        condition: >
          client.readResource() is called when the connected server has NOT advertised the
          resources capability in its initialization response. The client SDK throws synchronously
          before sending the request: "Server does not support resources (required for resources/read)".
        throws: >
          Error: "Server does not support resources (required for resources/read)"
          Thrown synchronously from assertCapabilityForMethod() in client/index.js.
        required_handling: >
          Callers MUST check server capabilities before calling readResource(). Use
          client.getServerCapabilities() after connect() to verify resources support:
            const caps = client.getServerCapabilities();
            if (!caps?.resources) {
              throw new Error('This MCP server does not support resources');
            }
          Do NOT assume all MCP servers expose resources — it is an optional capability.
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getPrompt
    import_path: '@modelcontextprotocol/sdk'
    description: >
      Retrieves a prompt template from the connected MCP server by name, with optional arguments
      to fill template variables. Used in agentic AI systems to fetch server-managed prompt
      templates that may include dynamic content, context injection, or parameterized instructions.
      Returns a list of messages ready for use in an LLM conversation.
    postconditions:
      # Evidence: dist/cjs/client/index.js — assertCapabilityForMethod checks:
      # "Server does not support prompts (required for prompts/get)"
      # Protocol throws McpError on timeout, connection close, MethodNotFound
      - id: get-prompt-missing-try-catch
        condition: >
          async function calls client.getPrompt() without try-catch. Throws McpError when the
          prompt name does not exist on the server (MethodNotFound -32601), arguments fail
          server-side validation (InvalidParams -32602), transport fails (ConnectionClosed -32000),
          or request times out (RequestTimeout -32001).
        throws: >
          McpError — key codes:
          - ErrorCode.MethodNotFound (-32601): prompt name not found on server
          - ErrorCode.InvalidParams (-32602): invalid or missing required prompt arguments
          - ErrorCode.RequestTimeout (-32001): no response within timeout (default 60s)
          - ErrorCode.ConnectionClosed (-32000): transport disconnected
        required_handling: >
          Caller MUST wrap client.getPrompt() in try-catch. Prompt names and arguments are
          often user-controlled or configured at runtime — validate before calling, and handle
          MethodNotFound gracefully (the prompt may have been removed after listing):

            try {
              const prompt = await client.getPrompt({ name: 'analyze-code', arguments: { lang: 'ts' } });
              return prompt.messages;
            } catch (error) {
              if (error instanceof McpError && error.code === ErrorCode.MethodNotFound) {
                // Prompt was removed, fall back to default
                return getDefaultPrompt();
              }
              throw error;
            }
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: get-prompt-capability-not-advertised
        condition: >
          client.getPrompt() is called when the connected server has NOT advertised the
          prompts capability. SDK throws synchronously:
          "Server does not support prompts (required for prompts/get)"
        throws: >
          Error: "Server does not support prompts (required for prompts/get)"
        required_handling: >
          Callers MUST verify prompts capability via client.getServerCapabilities() after connect().
          Prompts is an optional server capability — not all MCP servers expose prompt templates.
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: createMessage
    import_path: '@modelcontextprotocol/sdk'
    description: >
      Server-to-client sampling request: asks the MCP client to invoke an LLM and return
      the result. Used by MCP servers that need AI capabilities themselves (e.g., server-side
      reasoning, content generation). The server sends this request; the client (which holds
      LLM API keys) executes the sampling and returns the result. This is the "server asking
      the client to do AI" pattern. Only available on Server class instances.
    postconditions:
      # Evidence: dist/cjs/server/index.js — assertCapabilityForMethod:
      # "Client does not support sampling (required for sampling/createMessage)"
      # Also: "Client does not support sampling tools capability."
      # Protocol throws McpError on timeout and connection close.
      - id: create-message-missing-try-catch
        condition: >
          async function calls server.createMessage() without try-catch. The client may reject
          the sampling request (capability not supported, rate limit, model error) via McpError.
          Also throws on transport failure (ConnectionClosed -32000) or timeout (RequestTimeout -32001).
        throws: >
          McpError — key codes:
          - ErrorCode.InvalidParams (-32602): malformed message or invalid model parameters
          - ErrorCode.RequestTimeout (-32001): LLM call timed out (client's LLM API is slow)
          - ErrorCode.ConnectionClosed (-32000): client disconnected before responding
          Additionally: Error "Client does not support sampling (required for sampling/createMessage)"
          when client has no sampling capability.
        required_handling: >
          Caller MUST wrap server.createMessage() in try-catch. LLM API calls are slow (5-60s)
          and can fail at any point. The server's request handler should not crash on sampling failure:

            try {
              const result = await server.createMessage({
                messages: [{ role: 'user', content: { type: 'text', text: prompt } }],
                maxTokens: 1024
              });
              return result.content;
            } catch (error) {
              if (error instanceof McpError && error.code === ErrorCode.RequestTimeout) {
                throw new McpError(ErrorCode.InternalError, 'LLM sampling timed out');
              }
              throw error;
            }
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: create-message-capability-not-advertised
        condition: >
          server.createMessage() is called when the connected client has NOT advertised the
          sampling capability. SDK throws synchronously:
          "Client does not support sampling (required for sampling/createMessage)"
          This is thrown from assertCapabilityForMethod() before any network call.
        throws: >
          Error: "Client does not support sampling (required for sampling/createMessage)"
        required_handling: >
          Server implementations MUST check client capabilities via server.getClientCapabilities()
          before calling createMessage(). Not all MCP clients support sampling. If sampling is
          not available, fall back to static responses or inform the caller via McpError:
            const caps = server.getClientCapabilities();
            if (!caps?.sampling) {
              throw new McpError(ErrorCode.MethodNotFound,
                'This operation requires client-side AI sampling, which is not supported');
            }
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: elicitInput
    import_path: '@modelcontextprotocol/sdk'
    description: >
      Server-to-client interaction request: asks the MCP client (and through it, the user)
      to provide structured input data in response to a prompt. Used by MCP servers that need
      user confirmation, additional parameters, or interactive data collection during a tool
      call. The server pauses execution and waits for the client to present a form or UI to
      the user and return the result. Only available on Server class instances.
    postconditions:
      # Evidence: dist/cjs/server/index.js:
      # "Client does not support elicitation (required for elicitation/create)"
      # "Client does not support URL elicitation (required for ...)"
      # McpError(ErrorCode.InvalidParams) when elicitation response fails schema validation
      # dist/cjs/shared/protocol.js: RequestTimeout, ConnectionClosed
      - id: elicit-input-missing-try-catch
        condition: >
          async function calls server.elicitInput() without try-catch. The client may reject
          the elicitation (user cancels, capability not supported, response validation failure)
          via McpError. Also throws on timeout (RequestTimeout -32001) if the user never responds
          or connection closes (ConnectionClosed -32000).
        throws: >
          McpError — key codes:
          - ErrorCode.InvalidParams (-32602): client's elicitation response does not match the
            requested JSON Schema ("Elicitation response content does not match requested schema")
          - ErrorCode.RequestTimeout (-32001): user did not respond within timeout
          - ErrorCode.ConnectionClosed (-32000): client disconnected before submitting form
          Additionally: Error "Client does not support elicitation (required for elicitation/create)"
          or Error "Client does not support URL elicitation" for mode mismatches.
        required_handling: >
          Caller MUST wrap server.elicitInput() in try-catch. Users can cancel or time out,
          and clients may not support elicitation. Handle cancellation gracefully:

            try {
              const result = await server.elicitInput({
                requestedSchema: { type: 'object', properties: { confirm: { type: 'boolean' } } },
                message: 'Confirm deletion of all records?'
              });
              if (result.action === 'cancel') {
                return { cancelled: true };
              }
              return processUserInput(result.content);
            } catch (error) {
              if (error instanceof McpError && error.code === ErrorCode.RequestTimeout) {
                return { timedOut: true };
              }
              throw error;
            }
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: elicit-input-capability-not-advertised
        condition: >
          server.elicitInput() is called when the connected client has NOT advertised the
          elicitation capability. SDK throws synchronously:
          "Client does not support elicitation (required for elicitation/create)"
          For URL-mode elicitation specifically:
          "Client does not support URL elicitation (required for ...)"
        throws: >
          Error: "Client does not support elicitation (required for elicitation/create)"
          Error: "Client does not support URL elicitation" (for URL-mode params)
        required_handling: >
