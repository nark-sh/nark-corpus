  - name: SSEServerTransport.handlePostMessage
    import_path: '@modelcontextprotocol/sdk/server/sse'
    description: >
      Handles incoming POST requests that send JSON-RPC messages from MCP clients to
      the legacy SSE server transport. In the deprecated SSE transport, the client
      establishes an SSE connection via GET and sends messages via separate POST requests
      routed to this handler. Must be wired into an Express (or similar) route for the
      POST endpoint. Throws or returns HTTP error responses for content-type mismatches
      and DNS rebinding violations. Note: SSEServerTransport is deprecated — prefer
      StreamableHTTPServerTransport for new implementations.
    postconditions:
      # Evidence: dist/cjs/server/sse.js:
      #   Line 93: throw new Error(message) — when SSE connection not yet established
      #   Line 98: res.writeHead(403) + onerror — DNS rebinding validation failure
      #   Line 114: throw new Error('Unsupported content-type: ${ct.type}') — non-JSON POST
      - id: sse-handle-post-content-type-error
        condition: >
          The MCP client sends a POST request to the SSE endpoint with a
          Content-Type other than 'application/json' (e.g., 'text/plain',
          'multipart/form-data', or missing Content-Type). The transport throws an
          error indicating the unsupported content type — this unhandled error can
          crash a raw Node.js HTTP server or bubble as an unhandled rejection.
        throws: >
          Error('Unsupported content-type: <type>') — where <type> is the actual
          Content-Type header value received. Thrown inside handlePostMessage() before
          any JSON parsing is attempted.
        required_handling: >
          Wrap handlePostMessage() in a try-catch inside your POST route handler,
          and return an appropriate HTTP error response:

            app.post('/messages', async (req, res) => {
              try {
                await transport.handlePostMessage(req, res);
              } catch (error) {
                console.error('POST handler error:', error.message);
                if (!res.headersSent) {
                  res.status(400).json({ error: error.message });
                }
              }
            });
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/src/server/sse.ts
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: sse-handle-post-dns-rebinding-blocked
        condition: >
          DNS rebinding protection is enabled (enableDnsRebindingProtection: true) on the
          SSEServerTransport and an incoming POST request has a Host header that does not
          match any entry in allowedHosts. The transport writes HTTP 403 to the response
          and fires the onerror callback — but does NOT throw from handlePostMessage().
          Code that relies on the throw to detect rejections will silently lose requests.
        throws: >
          Does NOT throw — instead writes HTTP 403 response and calls
          this.onerror?.(new Error(validationError)). The onerror callback receives
          an Error with the DNS rebinding rejection message.
        required_handling: >
          Attach an onerror handler to the transport to log DNS rebinding rejections,
          and do NOT rely on try-catch alone for security-rejection detection:

            transport.onerror = (err) => {
              console.error('Transport security rejection:', err.message);
              // Increment security metrics / alert on repeated violations
            };
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/src/server/sse.ts
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low

  - name: StdioServerTransport.start
    import_path: '@modelcontextprotocol/sdk/server/stdio'
    description: >
      Starts the stdio server transport by attaching listeners to stdin. In the MCP
      stdio transport model, the server reads JSON-RPC messages from stdin and writes
      responses to stdout. This transport is used when building MCP servers that are
      launched as subprocesses by an MCP client (e.g., Claude Desktop, Cursor). The
      Server class (and McpServer) calls start() automatically via connect() — do not
      call start() manually. Throws if started more than once.
    postconditions:
      # Evidence: dist/cjs/server/stdio.js:
      #   Line 34: throw new Error('StdioServerTransport already started!')
      #   Line 70: return new Promise(resolve => { ... }) — resolves immediately
      - id: stdio-server-transport-already-started
        condition: >
          async function calls server.connect(transport) (or transport.start()) when the
          StdioServerTransport has already been started. This happens when connect() is
          called twice on the same server instance, or when start() is called manually
          after Server.connect() was already used.
        throws: >
          Error('StdioServerTransport already started! If using Server class, note that
          connect() calls start() automatically.')
        required_handling: >
          Ensure Server.connect() is called exactly once. For subprocess MCP servers,
          the canonical pattern is a single connect() at startup:

            const server = new McpServer({ name: 'my-server', version: '1.0.0' });
            const transport = new StdioServerTransport();

            // At server startup — called once
            await server.connect(transport);

            // Do NOT call again:
            // await server.connect(transport); // throws AlreadyStarted
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/src/server/stdio.ts
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: ProxyOAuthServerProvider.exchangeAuthorizationCode
    import_path: '@modelcontextprotocol/sdk/server/auth/providers/proxyProvider'
    description: >
      Proxies an OAuth authorization code exchange to an upstream authorization server.
      Used when building an MCP server that acts as an OAuth proxy (the MCP server
      receives the authorization code from the MCP client and exchanges it with the
      upstream AS on behalf of the client). The ProxyOAuthServerProvider implements
      OAuthServerProvider by forwarding all OAuth operations to the configured
      upstream endpoints. Throws ServerError if the upstream token endpoint returns
      a non-2xx response.
    postconditions:
      # Evidence: dist/cjs/server/auth/providers/proxyProvider.js:
      #   Line 120: throw new errors_js_1.ServerError(`Token exchange failed: ${response.status}`)
      #   Thrown when upstream returns non-2xx response
      - id: proxy-exchange-code-upstream-error
        condition: >
          async function calls provider.exchangeAuthorizationCode() (called internally by
          the MCP auth token handler) without handling ServerError. The upstream
          authorization server returns a non-2xx HTTP response (e.g., 400 invalid_grant,
          401 invalid_client, 500 server error). ServerError is thrown with the HTTP status
          code in the message.
        throws: >
          ServerError('Token exchange failed: <status>') from
          '@modelcontextprotocol/sdk/server/auth/errors'.
          ServerError extends OAuthError with errorCode 'server_error'.
        required_handling: >
          When implementing custom token handling around ProxyOAuthServerProvider,
          catch ServerError and return an appropriate OAuth error response:

            try {
              const tokens = await provider.exchangeAuthorizationCode(
                client, authorizationCode, codeVerifier, redirectUri
              );
              return tokens;
            } catch (error) {
              if (error instanceof ServerError) {
                // Upstream token endpoint failed — return 502 or OAuth error response
                throw new InvalidGrantError('Upstream authorization failed');
              }
              throw error;
            }

          Note: the mcpAuthRouter() handles this automatically — only custom token
          handlers need to catch ServerError manually.
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: ProxyOAuthServerProvider.exchangeRefreshToken
    import_path: '@modelcontextprotocol/sdk/server/auth/providers/proxyProvider'
    description: >
      Proxies an OAuth refresh token exchange to an upstream authorization server. Called
      when an MCP client presents a refresh token to obtain a new access token. The
      ProxyOAuthServerProvider forwards the refresh request to the upstream token endpoint.
      Throws ServerError if the upstream endpoint returns a non-2xx response (e.g., the
      refresh token is expired, revoked, or the client's credentials are invalid).
    postconditions:
      # Evidence: dist/cjs/server/auth/providers/proxyProvider.js:
      #   Line 149: throw new errors_js_1.ServerError(`Token refresh failed: ${response.status}`)
      - id: proxy-refresh-token-upstream-error
        condition: >
          async function calls provider.exchangeRefreshToken() (called by the MCP auth
          token handler when grant_type is 'refresh_token') without handling ServerError.
          The upstream AS returns non-2xx — the refresh token is expired, revoked, or the
          upstream server is temporarily unavailable (503).
        throws: >
          ServerError('Token refresh failed: <status>') from
          '@modelcontextprotocol/sdk/server/auth/errors'.
        required_handling: >
          When the upstream returns a token refresh error, the MCP client's session is
          effectively expired. Surface this as an authentication failure so the client
          restarts the OAuth flow:

            try {
              const tokens = await provider.exchangeRefreshToken(
                client, refreshToken, scopes
              );
              return tokens;
            } catch (error) {
              if (error instanceof ServerError) {
                // Upstream refresh failed — client must re-authorize from scratch
                throw new InvalidGrantError('Refresh token expired or revoked');
              }
              throw error;
            }
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: McpServer.sendLoggingMessage
    import_path: '@modelcontextprotocol/sdk/server/mcp'
    description: >
      Sends a structured logging message to the connected MCP client via
      notifications/message. The server must be initialized with
      capabilities: { logging: {} } for messages to be delivered; without
      this capability flag the method silently returns undefined without
      sending anything. Additionally the server must be connected (connect()
      called) before invoking, otherwise the underlying notification()
      call throws Error('Not connected').
    postconditions:
      - id: send-logging-message-capability-not-set
        condition: >
          McpServer is created WITHOUT capabilities.logging enabled, and
          sendLoggingMessage() is called. The method silently returns undefined — the log
          message is never delivered to the client. No error is thrown and no warning
          is emitted. Callers have no way to detect the failure without inspecting
          server capabilities at runtime.
          Evidence: dist/cjs/server/index.js — logging guard is falsy, method returns undefined.
        throws: >
          Does NOT throw — returns undefined silently. Messages are silently dropped.
        required_handling: >
          Declare the logging capability at construction time to ensure messages are delivered:

            // ✅ Declare logging capability at construction time
            const server = new McpServer(
              { name: 'my-server', version: '1.0.0' },
              { capabilities: { logging: {} } }
            );
            // Now sendLoggingMessage() will deliver the notification to the client
            await server.sendLoggingMessage({ level: 'error', data: 'critical failure' });
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/server/utilities/logging
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: send-logging-message-not-connected
        condition: >
          sendLoggingMessage() is called before the server is connected to a transport
          (before connect() completes or after close()). The underlying notification()
          method throws Error('Not connected') because this._transport is null.
          Evidence: dist/cjs/shared/protocol.js — notification() checks this._transport.
        throws: >
          Error('Not connected') — thrown by the underlying notification() method
          when this._transport is null.
        required_handling: >
          Only call sendLoggingMessage() after server.connect() has completed:

            const server = new McpServer(
              { name: 'my-server', version: '1.0.0' },
              { capabilities: { logging: {} } }
            );
            const transport = new StdioServerTransport();
            await server.connect(transport);  // connect first

            // ✅ Safe to call after connect()
            await server.sendLoggingMessage({ level: 'info', data: 'server ready' });
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/server/utilities/logging
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

