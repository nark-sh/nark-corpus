          - InvalidRequestError: missing required fields in client metadata
          - OAuthError (base): registration disallowed by server policy or rate limited
          Additionally: Error('OAuth client information must be saveable for dynamic
          registration') when provider.saveClientInformation is not implemented
        required_handling: >
          Caller MUST wrap registerClient() in try-catch:

            try {
              const clientInfo = await registerClient(authServerUrl, {
                metadata, clientMetadata: provider.clientMetadata
              });
              await provider.saveClientInformation(clientInfo);
            } catch (error) {
              if (error instanceof InvalidClientMetadataError) {
                logger.error('Invalid client registration metadata:', error.message);
              }
              throw error; // Registration failure is fatal — cannot proceed
            }
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: StreamableHTTPServerTransport.handleRequest
    import_path: '@modelcontextprotocol/sdk/server/streamableHttp'
    description: >
      Handles incoming HTTP requests for an MCP server using the Streamable HTTP
      transport. Called from an Express or Node.js HTTP server route handler for every
      MCP request. Routes POST requests to JSON-RPC message processing, GET requests to
      SSE stream establishment, and DELETE requests to session termination. Must be
      called for every incoming request to the MCP endpoint.
    postconditions:
      # Evidence: dist/cjs/server/webStandardStreamableHttp.js — handleRequest()
      # throw new Error('Stateless transport cannot be reused across requests...')
      # createJsonErrorResponse(404, -32001, 'Session not found') for invalid session IDs
      # Source: @modelcontextprotocol/sdk/node_modules/.../webStandardStreamableHttp.js
      - id: handle-request-throws-on-stateless-reuse
        condition: >
          async function calls transport.handleRequest() on a stateless
          StreamableHTTPServerTransport (sessionIdGenerator: undefined) after the first
          request has already completed. Stateless transports are single-use — each HTTP
          request requires a new transport instance. Reusing the same instance throws.
        throws: >
          Error: 'Stateless transport cannot be reused across requests. Create a new
          transport per request.' — thrown synchronously at the start of handleRequest().
        required_handling: >
          For stateless Streamable HTTP (serverless/edge functions), create a new
          transport instance per request:

            app.post('/mcp', async (req, res) => {
              const transport = new StreamableHTTPServerTransport({
                sessionIdGenerator: undefined  // stateless mode
              });
              const server = new McpServer(serverInfo);
              await server.connect(transport);
              await transport.handleRequest(req, res, req.body);
              await server.close();
            });

          For stateful deployments with long-lived sessions, use a session ID generator
          and store transports in a session map keyed by Mcp-Session-Id header.
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: handle-request-missing-session-routing
        condition: >
          MCP server uses stateful StreamableHTTPServerTransport (with session IDs) but
          routes all POST requests to a single transport instance instead of routing by
          Mcp-Session-Id header. The transport returns HTTP 404 with 'Session not found'
          for any request whose session ID does not match the transport's session. This
          is the most common mistake when migrating from SSE transport to Streamable HTTP.
        throws: >
          Does NOT throw — returns HTTP 404 JSON response silently:
          { jsonrpc: '2.0', error: { code: -32001, message: 'Session not found' } }
          All client requests fail with 404 until session routing is implemented.
        required_handling: >
          For stateful deployments, maintain a session map and route by Mcp-Session-Id:

            const sessions = new Map();

            app.post('/mcp', async (req, res) => {
              const sessionId = req.headers['mcp-session-id'];
              if (sessionId && sessions.has(sessionId)) {
                await sessions.get(sessionId).handleRequest(req, res, req.body);
              } else {
                const transport = new StreamableHTTPServerTransport({
                  sessionIdGenerator: () => randomUUID()
                });
                transport.onclose = () => sessions.delete(transport.sessionId);
                sessions.set(transport.sessionId, transport);
                const server = new McpServer(serverInfo);
                await server.connect(transport);
                await transport.handleRequest(req, res, req.body);
              }
            });
        sources:
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: StdioClientTransport.start
    import_path: '@modelcontextprotocol/sdk/client/stdio'
    description: >
      Launches the MCP server as a child process and establishes stdin/stdout communication.
      Called automatically by Client.connect(transport) when using StdioClientTransport —
      callers typically do not call start() directly. However, callers who instantiate
      StdioClientTransport and call start() directly must handle spawn failures. Uses
      cross-spawn under the hood; throws if the command is not found, not executable, or
      the transport has already been started.
    postconditions:
      # Evidence: dist/cjs/client/stdio.js — start() rejects promise on 'error' event from child_process.spawn
      # cross-spawn throws ENOENT when command not found, EACCES when not executable
      # Spec: https://modelcontextprotocol.io/specification/2025-03-26/basic/transports#stdio
      - id: stdio-start-throws-on-spawn-failure
        condition: >
          async function constructs StdioClientTransport and calls start() (or calls
          Client.connect() with a StdioClientTransport) without try-catch. The spawn
          fails when: (1) command is not found on PATH — throws ENOENT; (2) command
          exists but is not executable — throws EACCES; (3) transport is already started
          — throws Error('StdioClientTransport already started!'). These failures reject
          the start() promise, propagating through Client.connect() as an uncaught rejection.
        throws: >
          Error from Node.js child_process spawn:
          - ENOENT: command not found on PATH (e.g. 'npx mcp-server-xyz' where package is not installed)
          - EACCES: command found but not executable (permission denied)
          - Error('StdioClientTransport already started!'): transport reuse — call close() first
        required_handling: >
          Wrap Client.connect() (or transport.start()) in try-catch and handle spawn errors:

            import { StdioClientTransport } from '@modelcontextprotocol/sdk/client/stdio';
            import { Client } from '@modelcontextprotocol/sdk/client';

            const transport = new StdioClientTransport({
              command: 'npx',
              args: ['-y', '@modelcontextprotocol/server-filesystem'],
            });
            try {
              await client.connect(transport);
            } catch (error) {
              if (error.code === 'ENOENT') {
                console.error('MCP server binary not found — ensure it is installed');
              } else if (error.code === 'EACCES') {
                console.error('MCP server binary not executable — check file permissions');
              } else {
                throw error;
              }
            }
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/transports#stdio
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: stdio-start-throws-already-started
        condition: >
          Code creates a StdioClientTransport and calls connect() (or start()) twice on the
          same instance without calling close() between connections. This is a common mistake
          when implementing reconnection logic — the old transport instance must be discarded
          and a new one created after each disconnect, not restarted.
        throws: >
          Error('StdioClientTransport already started! If using Client class, note that
          connect() calls start() automatically.')
        required_handling: >
          For reconnection, create a new StdioClientTransport instance rather than reusing
          the old one. Attach onerror/onclose handlers to detect disconnect:

            transport.onclose = async () => {
              // Create a fresh transport — do NOT reuse the old one
              const newTransport = new StdioClientTransport({ command, args });
              await client.connect(newTransport);
            };
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/transports#stdio
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: StreamableHTTPClientTransport.finishAuth
    import_path: '@modelcontextprotocol/sdk/client/streamableHttp'
    description: >
      Completes the OAuth 2.1 authorization flow for StreamableHTTPClientTransport after
      the user returns from the browser authorization page. Exchanges the authorization
      code for tokens by calling the same auth() helper used by the auth skill. Must be
      called with the authorization_code from the redirect URL query parameters before
      retrying client.connect(). This is the HTTP transport's counterpart to the
      top-level auth() function — it handles the final leg of PKCE.
    postconditions:
      # Evidence: dist/cjs/client/streamableHttp.js — finishAuth() calls auth() with authorizationCode
      # Throws UnauthorizedError when authProvider not set or when auth() returns non-AUTHORIZED
      # Spec: https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
      - id: finish-auth-throws-no-provider
        condition: >
          async function calls transport.finishAuth(code) on a StreamableHTTPClientTransport
          that was constructed without an authProvider option. The transport cannot complete
          the OAuth flow because no provider is configured to store tokens or perform the
          exchange.
        throws: >
          UnauthorizedError('No auth provider') from '@modelcontextprotocol/sdk/client/auth'
        required_handling: >
          Only call finishAuth() on a transport that was constructed with an authProvider:

            const transport = new StreamableHTTPClientTransport(serverUrl, {
              authProvider: myOAuthProvider,  // REQUIRED for finishAuth() to work
            });
            // After redirect:
            const code = new URL(window.location.href).searchParams.get('code');
            try {
              await transport.finishAuth(code);
            } catch (error) {
              if (error instanceof UnauthorizedError) {
                // Re-show login flow
              }
            }
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: finish-auth-throws-authorization-failed
        condition: >
          async function calls transport.finishAuth(code) without try-catch. The auth()
          helper returns a non-'AUTHORIZED' result (e.g. 'REDIRECT') when token exchange
          fails — the code may be expired, already used, or the PKCE verifier may be
          stale (e.g. user reloaded the redirect page). The transport throws
          UnauthorizedError('Failed to authorize') in this case.
        throws: >
          UnauthorizedError('Failed to authorize') — token exchange completed but did not
          produce a valid access token. PKCE mismatch, expired code, or re-used code.
        required_handling: >
          Catch UnauthorizedError and restart the full OAuth flow from the beginning:

            try {
              await transport.finishAuth(authorizationCode);
              await client.connect(transport);
            } catch (error) {
              if (error instanceof UnauthorizedError) {
                // Code is stale or already used — restart from authorization URL
                const freshTransport = new StreamableHTTPClientTransport(serverUrl, { authProvider });
                await client.connect(freshTransport); // triggers new redirect
              }
            }
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: StreamableHTTPClientTransport.terminateSession
    import_path: '@modelcontextprotocol/sdk/client/streamableHttp'
    description: >
      Explicitly terminates the MCP session by sending an HTTP DELETE to the MCP endpoint
      with the Mcp-Session-Id header. Per the MCP spec, clients SHOULD call this when they
      no longer need the session (e.g. user navigating away). The server may respond with
      HTTP 405 Method Not Allowed if it does not support explicit session termination —
      this is treated as a valid response (not an error). Any other non-2xx response throws
      StreamableHTTPError. Note: if there is no active sessionId, this method returns
      immediately without making a network request.
    postconditions:
      # Evidence: dist/cjs/client/streamableHttp.js — terminateSession() throws StreamableHTTPError on !ok && status !== 405
      # Spec: https://modelcontextprotocol.io/specification/2025-03-26/basic/transports#session-management
      - id: terminate-session-throws-on-server-error
        condition: >
          async function calls transport.terminateSession() without try-catch. The server
          returns a non-2xx, non-405 HTTP response (e.g. 500 Internal Server Error,
          503 Service Unavailable, or 403 Forbidden). StreamableHTTPError is thrown with
          the HTTP status code and statusText. Note that HTTP 405 Method Not Allowed is
          explicitly handled as success per the MCP spec — only unexpected failures throw.
        throws: >
          StreamableHTTPError(statusCode, 'Failed to terminate session: <statusText>')
          from '@modelcontextprotocol/sdk/client/streamableHttp'.
          HTTP 405 is NOT thrown — it indicates the server doesn't support explicit termination.
        required_handling: >
          Wrap terminateSession() in try-catch. Failure to terminate is non-fatal — the
          session will eventually expire server-side. Treat errors as best-effort cleanup:

            try {
              await transport.terminateSession();
            } catch (error) {
              if (error instanceof StreamableHTTPError) {
                // Non-fatal — session will expire naturally
                console.warn('Session termination failed:', error.message);
              } else {
                throw error; // Re-throw unexpected errors (network failure, etc.)
              }
            }
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/transports#session-management
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: WebStandardStreamableHTTPServerTransport.handleRequest
    import_path: '@modelcontextprotocol/sdk/server/webStandardStreamableHttp'
    description: >
      Handles an incoming HTTP Request object (Web Standards API) and returns a Response
      object. This is the web-standards counterpart to StreamableHTTPServerTransport.handleRequest
      (which uses Node.js IncomingMessage/ServerResponse). Use this transport for runtimes
      that support Web Standards: Cloudflare Workers, Deno, Bun, Next.js edge, or any
      WinterCG-compatible runtime. Handles GET (SSE stream), POST (JSON-RPC messages), and
      DELETE (session termination). In stateless mode, each request MUST use a fresh
      transport instance — reuse throws an error.
    postconditions:
      # Evidence: dist/cjs/server/webStandardStreamableHttp.js
      # Throws Error('Stateless transport cannot be reused') on second call without sessionIdGenerator
      # Returns HTTP 400 on invalid session, HTTP 405 on unsupported methods
      # Spec: https://modelcontextprotocol.io/specification/2025-03-26/basic/transports#streamable-http
      - id: web-transport-stateless-reuse-throws
        condition: >
          Cloudflare Worker or similar serverless handler creates one
          WebStandardStreamableHTTPServerTransport instance (e.g. at module scope or in a
          singleton) in stateless mode (no sessionIdGenerator) and reuses it across multiple
          requests. The second call to handleRequest() throws because stateless transport
          is single-use — message ID counters from the first request would collide with
          the second.
        throws: >
          Error('Stateless transport cannot be reused across requests. Create a new transport per request.')
        required_handling: >
          In stateless mode, create a new transport per request:

            // Cloudflare Worker — CORRECT
            export default {
              async fetch(request: Request): Promise<Response> {
                const transport = new WebStandardStreamableHTTPServerTransport(); // new per request
                const server = new McpServer(serverInfo);
                await server.connect(transport);
                return transport.handleRequest(request);
              }
            };

            // WRONG — singleton transport in stateless mode
            const transport = new WebStandardStreamableHTTPServerTransport(); // reused!
            export default {
              async fetch(request) {
                return transport.handleRequest(request); // throws on 2nd request
              }
            };
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/transports#streamable-http
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: web-transport-missing-session-routing
        condition: >
          MCP server uses stateful WebStandardStreamableHTTPServerTransport (with
          sessionIdGenerator) but routes all requests to a single transport instance.
          The transport returns a JSON error response with HTTP 404 for any request whose
          session ID does not match. This mirrors the same mistake as with
          StreamableHTTPServerTransport but in web-standards environments (Hono, Deno,
          Cloudflare Workers with Durable Objects).
        throws: >
          Does NOT throw — returns Response with HTTP 404 and JSON body:
          { jsonrpc: '2.0', error: { code: -32001, message: 'Session not found' } }
        required_handling: >
          For stateful deployments, maintain a session map and route by Mcp-Session-Id header:

            const sessions = new Map();

            // Hono.js example
            app.all('/mcp', async (c) => {
              const sessionId = c.req.header('mcp-session-id');
              let transport = sessionId ? sessions.get(sessionId) : undefined;
              if (!transport) {
                transport = new WebStandardStreamableHTTPServerTransport({
                  sessionIdGenerator: () => crypto.randomUUID(),
                  onsessionclosed: (id) => sessions.delete(id),
                });
                const server = new McpServer(serverInfo);
                await server.connect(transport);
              }
              const response = await transport.handleRequest(c.req.raw);
              if (transport.sessionId) sessions.set(transport.sessionId, transport);
              return response;
            });
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/transports#session-management
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: WebSocketClientTransport.start
    import_path: '@modelcontextprotocol/sdk/client/websocket'
    description: >
      Connects a WebSocket-based MCP client transport to an MCP server. Uses the 'mcp'
      WebSocket subprotocol. This is a non-deprecated transport alternative to
      StreamableHTTPClientTransport for environments where WebSocket connections are
      preferred (e.g., long-lived agent loops, embedded runtimes). connect() on a Client
      instance calls start() automatically — do not call start() manually when using Client.
    postconditions:
      # Evidence: dist/cjs/client/websocket.js — throws 'WebSocketClientTransport already started!'
      #           on duplicate start(), and rejects with WebSocket onerror event on connection failure
      #           Spec: https://modelcontextprotocol.io/docs/concepts/transports (custom transports)
      - id: websocket-transport-already-started
        condition: >
          async function calls transport.start() when the transport was already started
          (i.e. start() called twice, or called manually when Client.connect() was already
          used). The _socket field is already set, so start() throws synchronously (before
          any await), rejecting the returned Promise.
        throws: >
          Error('WebSocketClientTransport already started! If using Client class, note
          that connect() calls start() automatically.')
        required_handling: >
          Never call transport.start() manually when using the Client class — Client.connect()
          calls it. For manual transport use, ensure start() is called exactly once:

            const transport = new WebSocketClientTransport(new URL('wss://mcp.example.com'));
            // Let Client manage lifecycle:
            const client = new Client(clientInfo);
            await client.connect(transport); // calls start() internally

            // Do NOT also call:
            // await transport.start(); // throws AlreadyStarted
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/src/client/websocket.ts
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: websocket-transport-connection-failed
        condition: >
          async function calls transport.start() (or client.connect()) without try-catch.
          The WebSocket connection fails — the server is unreachable, the URL is wrong,
          TLS verification fails, the server rejects the 'mcp' subprotocol, or the network
          is unavailable. The WebSocket onerror event fires and the Promise rejects with the
          underlying connection error.
        throws: >
          Error from WebSocket onerror — the exact message depends on the runtime and
          network error. Common: ECONNREFUSED, ENOTFOUND, TLS certificate errors, or
          'WebSocket error: ...' with the event JSON.
        required_handling: >
          Wrap connect() in try-catch and handle connection failures as unrecoverable:

            try {
              await client.connect(transport);
            } catch (error) {
              // WebSocket connection failed — server unreachable, bad URL, or TLS error
              console.error('MCP connection failed:', error.message);
              process.exit(1); // or surface error to user
            }
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/src/client/websocket.ts
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: SSEClientTransport.start
    import_path: '@modelcontextprotocol/sdk/client/sse'
    description: >
      Connects an SSE-based MCP client transport to an MCP server (deprecated transport —
      use StreamableHTTPClientTransport for new implementations, but many deployed MCP
      servers still use SSE). Establishes a GET connection for SSE events and uses
      separate POST requests for sending. Throws SseError on connection failure, and
      UnauthorizedError when the server requires OAuth and no auth provider is configured.
      During the SSE-to-StreamableHTTP migration period, clients often need to support
      both transports by falling back from StreamableHTTPClientTransport to SSEClientTransport.
    postconditions:
      # Evidence: dist/cjs/client/sse.js — throws UnauthorizedError('No auth provider') at line 34,
      #           rejects with SseError on SSE connection failure at line 97,
      #           throws 'already started' at line 136
      #           Spec: https://modelcontextprotocol.io/docs/concepts/transports#backwards-compatibility
      - id: sse-transport-no-auth-provider
        condition: >
          async function calls client.connect(sseTransport) without try-catch, and the
          MCP server returns HTTP 401 Unauthorized to the initial SSE GET request.
          The transport attempts OAuth auth flow but no authProvider is configured in
          SSEClientTransportOptions. UnauthorizedError is thrown.
        throws: >
          UnauthorizedError('No auth provider') from '@modelcontextprotocol/sdk/client/auth'.
          Thrown when the server requires authentication but the client transport was
          constructed without an authProvider.
        required_handling: >
          Configure an authProvider when connecting to OAuth-protected MCP servers,
          or catch UnauthorizedError to detect auth requirements:

            try {
              const transport = new SSEClientTransport(serverUrl, { authProvider });
              await client.connect(transport);
            } catch (error) {
              if (error instanceof UnauthorizedError) {
                // Server requires OAuth — configure an authProvider or redirect user
                console.error('Server requires authentication');
              }
              throw error;
            }
        sources:
          - https://modelcontextprotocol.io/specification/2025-03-26/basic/authorization
        severity: error
        evidence_quality: confirmed
        business_impact:
