package: '@modelcontextprotocol/sdk'
semver: ^1.0.0
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-11'
status: draft
evidence_quality: confirmed
detection:
  class_names:
    - Client
    - McpServer
functions:
  - name: connect
    import_path: '@modelcontextprotocol/sdk'
    description: >-
      Establishes connection from MCP client to a transport (Client.connect) or connects MCP server to a transport
      (McpServer.connect)
    postconditions:
      # Evidence: scan-modelcontextprotocol-sdk-2026-04-11.json — 4 repos scanned (limited by cloner errors), 0 violations found
      # FP check: 0/20 type-A FPs confirmed
      - id: connect-success
        condition: when connection is established successfully
        returns: void (connection is ready for use)
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/packages/client/src/client/client.ts
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: connect-throws-on-failure
        condition: when transport fails, spawn fails (stdio), protocol negotiation fails, or transport already connected
        throws: Error — transport error, spawn error, or protocol mismatch
        required_handling: >
          Caller MUST wrap connect() in a try-catch block. Connection failures are unrecoverable and must be surfaced to
          the caller. Log the error and stop further MCP operations on this client/server. For CLI tools, a top-level
          process.catch() on main() is acceptable. For HTTP-embedded servers, missing error handling crashes the request
          handler.
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/packages/client/src/client/client.ts
          - https://modelcontextprotocol.io/docs/concepts/transports
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: callTool
    import_path: '@modelcontextprotocol/sdk'
    description: Calls a tool on the connected MCP server and returns the result
    postconditions:
      - id: call-tool-success
        condition: when the tool executes successfully
        returns: 'CallToolResult with content array and isError: false'
        sources:
          - https://spec.modelcontextprotocol.io/specification/server/tools/
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: call-tool-throws-on-protocol-error
        condition: when the MCP protocol fails (tool not found, transport disconnected, timeout)
        throws: McpError or Error — protocol-level failure
        required_handling: >
          Caller MUST wrap client.callTool() in a try-catch block. Protocol errors are thrown (not returned in-band)
          when the transport is broken or the tool does not exist on the server. These are distinct from in-band tool
          execution errors (result.isError). Both error paths must be handled.
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/packages/client/src/client/client.ts
          - https://spec.modelcontextprotocol.io/specification/server/tools/#error-handling
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: listTools
    import_path: '@modelcontextprotocol/sdk'
    description: Lists all tools available on the connected MCP server
    postconditions:
      - id: list-tools-success
        condition: when request succeeds
        returns: Object with tools array listing available tools
        sources:
          - https://spec.modelcontextprotocol.io/specification/server/tools/
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: list-tools-throws-on-failure
        condition: when transport fails or server is disconnected
        throws: McpError or Error — network or protocol failure
        required_handling: >
          Caller MUST wrap client.listTools() in a try-catch block. Failures indicate the MCP server is unreachable or
          the connection was lost. Handle by reconnecting or disabling MCP features gracefully.
        sources:
          - https://github.com/modelcontextprotocol/typescript-sdk/blob/main/packages/client/src/client/client.ts
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
