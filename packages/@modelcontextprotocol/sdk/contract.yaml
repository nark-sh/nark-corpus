        condition: when the tool executes successfully
        returns: 'CallToolResult with content array and isError: false'
        sources:
          - https://spec.modelcontextprotocol.io/specification/server/tools/
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: call-tool-throws-on-protocol-error
        condition: when the MCP protocol fails (tool not found, transport disconnected, timeout)
        throws: McpError or Error — protocol-level failure
        required_handling: >
          Caller MUST wrap client.callTool() in a try-catch block. Protocol errors are thrown (not returned in-band)
          when the transport is broken or the tool does not exist on the server. These are distinct from in-band tool
          execution errors (result.isError). Both error paths must be handled.
        sources:
