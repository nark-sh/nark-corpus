package: passport-jwt
semver: ">=4.0.0 <5.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-04-20"
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 2 contracted / 2 non-omitted (effective 100% coverage)
# Depth pass 2026-04-20 (deepen-stream-2 pass 6):
# API surface: 8 total exports (1 Strategy class, 7 ExtractJwt factories — was documented as 7,
#   now 8 because versionOneCompatibility() was undocumented legacy fn found in source scan)
# Contracted: 2 (Strategy, ExtractJwt.fromExtractors) — unchanged
# Omitted: 6 (fromHeader, fromBodyField, fromUrlQueryParameter, fromAuthHeaderWithScheme,
#              fromAuthHeaderAsBearerToken, versionOneCompatibility — all sync factories, no throw)
# Coverage raw: 2/8 = 0.25; effective (contracted/non-omitted) = 2/2 = 1.0
# Evidence confirmed from:
#   node_modules/passport-jwt/lib/extract_jwt.js — versionOneCompatibility() lines 106-127,
#     no throw, reads options with defaults (authScheme||LEGACY_AUTH_SCHEME, tokenBodyField||'auth_token')
#   https://www.passportjs.org/packages/passport-jwt/ — official docs confirm only 6 ExtractJwt
#     methods (versionOneCompatibility is NOT documented — undocumented legacy compatibility shim)
#   node_modules/passport-jwt/lib/strategy.js — throw sites lines 37, 45, 50, 55
#   node_modules/passport-jwt/lib/extract_jwt.js — throw site line 77 (fromExtractors only)
# Depth pass 2026-04-17 (deepen-stream-2 pass 1):
# API surface: 7 total exports (1 Strategy class, 6 ExtractJwt factories)
# Contracted before: 1 (Strategy, 4 postconditions)
# Contracted after: 2 (+1 new: ExtractJwt.fromExtractors)
# New postconditions on Strategy: +3 (both-secret-throws, missing-verify-throws, missing-jwt-from-request-throws)
# Omitted: 5 (fromHeader, fromBodyField, fromUrlQueryParameter, fromAuthHeaderWithScheme,
#             fromAuthHeaderAsBearerToken — sync factories, return null on failure, no throw)

functions:
  - name: Strategy
    import_path: "passport-jwt"
    description: >
      Constructor for JWT authentication strategy. Accepts options (secretOrKey or
      secretOrKeyProvider, jwtFromRequest, and optional issuer/audience/algorithms/ignoreExpiration)
      and a verify callback. Throws synchronously on misconfiguration. When used with
      passport.authenticate('jwt'), calls the verify callback on each request with the
      decoded JWT payload. The verify callback MUST call done() to signal authentication
      result.

    preconditions:
      - id: secret-or-key-required
        description: "Options MUST include either secretOrKey (string or Buffer) or secretOrKeyProvider (async function). Omitting both causes the strategy to throw immediately on construction."
        sources:
          - "https://www.passportjs.org/packages/passport-jwt/"
          - "https://github.com/mikenicholson/passport-jwt/issues/206"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: jwt-from-request-required
        description: "Options MUST include jwtFromRequest extractor function. Without it, the strategy cannot extract the token and will fail all requests."
        sources:
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    postconditions:
      # Evidence: 0 violations across 5 repos in scan-passport-jwt-2026-04-03.json
      # FP check: 0/100 false positives — contract is precise, 0% FP rate
      # Note: low violation count due to scanner 2-level property chain limitation and
      # passport-jwt usage patterns being callback-based rather than awaited directly
      - id: missing-secret-throws
        condition: "secretOrKey and secretOrKeyProvider are both absent from options"
        throws: "TypeError: JwtStrategy requires a secret or key"
        required_handling: >
          Caller MUST provide either secretOrKey or secretOrKeyProvider in options.
          This error is thrown synchronously during strategy instantiation.
          Wrap new Strategy() in try-catch during application initialization if using
          dynamic configuration.
        sources:
          - "https://www.passportjs.org/packages/passport-jwt/"
          - "https://github.com/mikenicholson/passport-jwt/issues/206"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/passport-jwt/lib/strategy.js line 37:
      #   throw new TypeError('JwtStrategy has been given both a secretOrKey and a secretOrKeyProvider')
      # This throws synchronously in the constructor. A common mistake when refactoring auth config
      # — the developer adds secretOrKeyProvider for flexibility but forgets to remove the old secretOrKey.
      - id: both-secret-and-provider-throws
        condition: >
          Both secretOrKey and secretOrKeyProvider are provided in options. Only one of
          these is allowed. Providing both indicates a configuration mistake — the strategy
          cannot determine which key source to use.
        throws: "TypeError: JwtStrategy has been given both a secretOrKey and a secretOrKeyProvider"
        required_handling: >
          Use EITHER secretOrKey (for static secrets) OR secretOrKeyProvider (for dynamic key
          lookup, e.g., multi-tenant or JWKS endpoint). Never both at the same time.

            // Correct: static secret only
            new Strategy({ secretOrKey: process.env.JWT_SECRET, jwtFromRequest: ... }, verify);

            // Correct: dynamic provider only
            new Strategy({ secretOrKeyProvider: myProvider, jwtFromRequest: ... }, verify);

            // WRONG: both provided — throws TypeError at startup
            new Strategy({ secretOrKey: 'secret', secretOrKeyProvider: myProvider, jwtFromRequest: ... }, verify);

          This error is thrown synchronously at application startup, so it will crash the
          server process during initialization if not caught.
        sources:
          - "https://github.com/mikenicholson/passport-jwt/blob/master/lib/strategy.js#L37"
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/passport-jwt/lib/strategy.js line 50:
      #   throw new TypeError('JwtStrategy requires a verify callback')
      # Thrown synchronously when Strategy is constructed without a verify function.
      # Less common than missing-secret-throws but occurs when new Strategy(options) is called
      # without the second argument.
      - id: missing-verify-callback-throws
        condition: >
          The verify callback (second argument to new Strategy()) is not provided or is
          undefined/null. The verify callback is required to validate the decoded JWT payload
          and call done() with the authenticated user (or false on failure).
        throws: "TypeError: JwtStrategy requires a verify callback"
        required_handling: >
          Always provide a verify callback as the second argument:

            passport.use(new Strategy(options, function(jwt_payload, done) {
              User.findById(jwt_payload.sub, function(err, user) {
                if (err) return done(err, false);
                if (user) return done(null, user);
                return done(null, false);
              });
            }));

          The verify callback signature is:
            (jwt_payload, done) — when passReqToCallback is false (default)
            (req, jwt_payload, done) — when passReqToCallback is true
        sources:
          - "https://github.com/mikenicholson/passport-jwt/blob/master/lib/strategy.js#L50"
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/passport-jwt/lib/strategy.js line 55:
      #   throw new TypeError('JwtStrategy requires a function to retrieve jwt from requests (see option jwtFromRequest)')
      # Thrown synchronously when jwtFromRequest is missing from options.
      - id: missing-jwt-from-request-throws
        condition: >
          options.jwtFromRequest is not provided. This function tells the strategy where to
          find the JWT in each incoming request. Without it, the strategy cannot extract
          the token from any request and throws synchronously at construction.
        throws: "TypeError: JwtStrategy requires a function to retrieve jwt from requests (see option jwtFromRequest)"
        required_handling: >
          Always include jwtFromRequest in options. Use one of the built-in extractors:

            const { ExtractJwt } = require('passport-jwt');

            // Most common: Bearer token in Authorization header
            opts.jwtFromRequest = ExtractJwt.fromAuthHeaderAsBearerToken();

            // From custom header
            opts.jwtFromRequest = ExtractJwt.fromHeader('x-access-token');

            // From request body
            opts.jwtFromRequest = ExtractJwt.fromBodyField('access_token');

            // Combine multiple extractors (tries each in order)
            opts.jwtFromRequest = ExtractJwt.fromExtractors([
              ExtractJwt.fromAuthHeaderAsBearerToken(),
              ExtractJwt.fromUrlQueryParameter('token'),
            ]);
        sources:
          - "https://github.com/mikenicholson/passport-jwt/blob/master/lib/strategy.js#L55"
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: verify-callback-db-error
        condition: "The verify callback encounters a database or service error during user lookup"
        throws: "Error passed to done(err) callback in the verify function"
        required_handling: >
          The verify callback MUST call done(err) when encountering errors during user lookup.
          Calling done(err) with a non-null first argument causes passport to return a 500 error.
          Pattern: if (err) { return done(err, false); }
        sources:
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: token-invalid-or-expired
        condition: "JWT token signature is invalid, token is expired, or token is malformed"
        throws: "Authentication failure passed to done(null, false, info)"
        required_handling: >
          When token validation fails, passport calls the verify function with null payload.
          The verify callback MUST call done(null, false) to deny authentication.
          Callers using passport.authenticate('jwt') MUST handle 401 responses appropriately.
        sources:
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: token-extraction-fails
        condition: "jwtFromRequest extractor returns null (no token found in request)"
        throws: "Authentication fails with 401 Unauthorized before verify callback is called"
        required_handling: >
          Caller MUST handle 401 responses from protected routes when no token is present.
          The verify callback is NOT invoked when extraction fails.
        sources:
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: secret-or-key-provider-async-error
        description: "If secretOrKeyProvider throws or rejects, the authentication fails. The provider must never throw synchronously and must always call the callback."
        sources:
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: verify-callback-must-call-done
        description: "The verify callback MUST always call done() exactly once. Forgetting to call done() leaves the request hanging indefinitely (no response sent)."
        sources:
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: ExtractJwt.fromExtractors
    import_path: "passport-jwt"
    description: >
      Creates a combinator extractor that tries each provided extractor function in order,
      returning the first non-null token found. Takes an array of extractor functions
      (created by the other ExtractJwt.from* methods). Throws TypeError synchronously
      if the argument is not an array. The returned extractor function is passed to
      options.jwtFromRequest.
    postconditions:
      # Evidence: node_modules/passport-jwt/lib/extract_jwt.js line 77:
      #   throw new TypeError('extractors.fromExtractors expects an array')
      # This is a synchronous throw at the time fromExtractors() is called (during Strategy setup),
      # not at request time. The throw occurs when a non-array (e.g., a single extractor function,
      # or undefined) is passed instead of an array.
      - id: from-extractors-non-array-throws
        condition: >
          ExtractJwt.fromExtractors() is called with a non-array argument. Common mistakes:
          - Passing a single extractor function directly instead of wrapping in an array
          - Passing undefined (e.g., a variable that was not initialized)
          - Passing null or a string
        throws: "TypeError: extractors.fromExtractors expects an array"
        required_handling: >
          Always wrap extractor functions in an array:

            // WRONG — passes function directly, throws TypeError
            opts.jwtFromRequest = ExtractJwt.fromExtractors(
              ExtractJwt.fromAuthHeaderAsBearerToken()
            );

            // CORRECT — array of extractor functions
            opts.jwtFromRequest = ExtractJwt.fromExtractors([
              ExtractJwt.fromAuthHeaderAsBearerToken(),
              ExtractJwt.fromUrlQueryParameter('token'),
            ]);

          This error is thrown synchronously during application initialization
          (when the Strategy is configured), before any requests are processed.
          It will crash the server startup if uncaught.
        sources:
          - "https://github.com/mikenicholson/passport-jwt/blob/master/lib/extract_jwt.js#L77"
          - "https://www.passportjs.org/packages/passport-jwt/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "passport-jwt v4.x is callback-based — the verify function receives a done() callback, not a Promise."
  - "The Strategy.authenticate() method is called internally by passport framework — not called directly by users."
  - "ExtractJwt.fromHeader/fromBodyField/fromUrlQueryParameter/fromAuthHeaderWithScheme/fromAuthHeaderAsBearerToken are sync factories that cannot throw — intentionally omitted."
  - "ExtractJwt.versionOneCompatibility() is an undocumented legacy compatibility shim (not in official docs at passportjs.org/packages/passport-jwt/). It combines fromAuthHeaderWithScheme + fromBodyField + fromUrlQueryParameter into one extractor. It does NOT throw — reads options with safe defaults. Intentionally omitted."
  - "JWT verification is delegated to jsonwebtoken — see the jsonwebtoken contract for verify() error types (JsonWebTokenError, TokenExpiredError, NotBeforeError)."
  - "secretOrKeyProvider pattern is for JWKS (JSON Web Key Set) lookups — the provider receives the raw token to extract the key ID (kid) and fetch the correct public key."
  - "passport-jwt v4 uses jsonwebtoken v8/v9 internally — any algorithms not in the jsonwebtoken supported list will cause a silent failure or error in the verifier."
  - "Async verify callbacks (returning Promise) are NOT natively supported in passport-jwt v4 — async errors in the verify function are caught by the try/catch in authenticate() and passed to self.error(ex)."
