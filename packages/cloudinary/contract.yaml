package: cloudinary
semver: ">=1.0.0 <3.0.0"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.85  # 17 contracted / 20 total async-callable (omitted set tracked in deepen-index.json)
# Intentionally omitted (read-only / narrow-adoption / utility):
#   api.resources, api.resources_by_tag, api.resources_by_ids, api.usage, api.resource_types,
#   api.root_folders, api.sub_folders, api.search_folders, api.rename_folder,
#   api.delete_folder, multi(), explode(), generate_sprite(), upload_tag_params, upload_url,
#   image_upload_tag, api.resources_by_context, api.resources_by_asset_folder,
#   api.resources_by_moderation, api.list_streaming_profiles, api.get_streaming_profile,
#   replace_tag, api.transformation, api.transformations, api.add_context, api.remove_all_context
# Reason: read-only list/GET operations with no distinct error contracts beyond generic HTTP
#   errors, or niche media-processing functions with minimal SaaS adoption
# Added in 2026-06-24 deepen pass 33: remove_all_tags, create_archive, api.create_folder
#   (api.create_folder promoted out of the omitted set — actively used in CMS onboarding flows
#   and carries a distinct HTTP 409 idempotency-conflict contract).

functions:
  - name: upload
    import_path: "cloudinary"
    description: "Upload image or video files to Cloudinary"

    postconditions:
      - id: upload-missing-error-handling
        # Evidence: https://cloudinary.com/documentation/upload_images
        # HTTP codes confirmed: 400 (bad request), 401 (auth), 403 (not allowed), 404, 420 (rate limited), 500
        # Error structure from source: lib/api_client/execute_request.js — rejects with plain object { message, http_code }
        # NOT a standard Error instance — instanceof Error checks will fail
        condition: "network error, validation error, authentication failure, or quota exceeded during upload"
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error instance.
          HTTP 401: Authorization required (invalid/missing api_key, api_secret, or cloud_name).
          HTTP 403: Not allowed (unsigned upload attempt with restricted params).
          HTTP 400: Bad request (invalid file type, transformation params, or public_id format).
          HTTP 420: Rate limited (upload quota exceeded).
          HTTP 500: Internal server error.
          Node.js Error object: network-level failure (ECONNREFUSED, ETIMEDOUT, DNS failure).
        required_handling: >
          MUST wrap cloudinary.v2.uploader.upload() in try-catch (for async/await)
          OR check error parameter in callback: (error, result) => { if (error) ... }
          IMPORTANT: error is a plain object {message, http_code}, not Error instance.
          Check error.http_code to distinguish auth (401), permission (403), rate-limit (420).
        sources:
          - "https://cloudinary.com/documentation/upload_images"
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: upload_large
    import_path: "cloudinary"
    description: "Upload large files (>100MB) in chunks to handle network interruptions"

    postconditions:
      - id: upload-large-missing-error-handling
        # Evidence: https://cloudinary.com/documentation/upload_images
        # Chunk size default 20MB, minimum 5MB. Files >100MB require this method.
        # Same error object structure as upload() — plain { message, http_code }
        condition: "network interruption, chunk upload failure, authentication failure, or file size exceeded"
        throws: >
          Plain object { message: string, http_code: number } on chunk failure.
          HTTP 400: File exceeds account upload limit (>100MB without plan support, or >100GB).
          HTTP 401: Authorization required (invalid credentials).
          HTTP 500: Internal server error during chunk assembly.
          Node.js Error object: network failure between chunks (ETIMEDOUT mid-upload).
          TimeoutError object ({ name: 'TimeoutError' }): request timeout during chunk POST.
        required_handling: >
          MUST wrap cloudinary.v2.uploader.upload_large() in try-catch
          OR check error parameter in callback. Files >100MB require this method.
          Partial uploads are NOT automatically cleaned up on failure.
        sources:
          - "https://cloudinary.com/documentation/upload_images"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: upload_stream
    import_path: "cloudinary"
    description: "Stream-based upload for processing files on-the-fly"

    postconditions:
      - id: upload-stream-missing-error-handling
        # Evidence: https://support.cloudinary.com/hc/en-us/community/posts/360026620212
        # Source: lib/uploader.js — upload_stream returns an UploadStream (Transform stream)
        # Error arrives in the callback, not as a rejected Promise
        # Evidence: 1 firing in scan-cloudinary-2026-04-14.json (FP rate 0/20)
        # Top affected: arihantcodes/spectrum-ui (⭐ 991 stars)
        condition: "stream read error, network interruption, memory issue, or authentication failure"
        throws: >
          Error delivered via callback parameter, NOT as a rejected Promise.
          The callback is the ONLY way to receive errors from upload_stream().
          Error structure: { message: string, http_code: number } (plain object, not Error instance).
          HTTP 401: Authorization required.
          HTTP 400: Invalid transformation parameters or file format rejected.
          Node.js Error: stream read failure or EPIPE on stream pipe.
        required_handling: >
          MUST provide callback with error parameter:
          cloudinary.v2.uploader.upload_stream((error, result) => { if (error) ... })
          Stream uploads REQUIRE callback-based error handling — there is no Promise to catch.
          Piping to the returned stream without a callback will silently swallow errors.
        sources:
          - "https://support.cloudinary.com/hc/en-us/community/posts/360026620212-stream-upload-catching-errors-NODE-JS-"
          - "https://cloudinary.com/documentation/upload_images"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: destroy
    import_path: "cloudinary"
    description: "Delete an asset from Cloudinary by public_id"

    postconditions:
      - id: destroy-missing-error-handling
        # Evidence: https://cloudinary.com/documentation/image_upload_api_reference
        # Source: lib/api_client/execute_request.js — same error shape as upload
        # NOTE: destroy() returns { result: 'ok' } on success or { result: 'not found' } for missing assets
        # It does NOT throw 404 for missing assets — it resolves with result:'not found'
        # Only network errors, auth failures, and unexpected status codes reject the Promise
        condition: "authentication failure, network error, permission denied, or unexpected server error"
        throws: >
          Plain object { message: string, http_code: number } for API errors.
          HTTP 401: Authorization required (invalid credentials).
          HTTP 403: Not allowed (insufficient permissions for this resource type or delivery type).
          HTTP 500: Internal server error.
          Node.js Error: network-level failure (ECONNREFUSED, ETIMEDOUT).
          IMPORTANT: Missing asset does NOT throw — resolves with { result: 'not found' }.
          Callers checking result.result === 'ok' will miss this silent no-op.
        required_handling: >
          MUST wrap cloudinary.v2.uploader.destroy() in try-catch for auth/network errors.
          ALSO check result.result === 'ok' to detect missing assets (not thrown as error).
          Example: if (result.result !== 'ok') { log warning about missing asset }
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: rename
    import_path: "cloudinary"
    description: >
      Renames (moves) an asset from one public_id to another. Used to reorganize
      media assets after upload, implement slug-based asset naming, or move assets
      between folders. By default does NOT overwrite the target if it already exists
      (returns 409 Conflict). Automatically invalidates the old CDN URL on rename.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/image_upload_api_reference
      # HTTP codes from source: 400, 401, 403, 404, 409, 420, 500
      # Error shape: plain object { message, http_code } from lib/api_client/execute_request.js
      - id: rename-missing-error-handling
        severity: error
        condition: >
          source asset not found (HTTP 404), target public_id already exists with overwrite:false (HTTP 409),
          authentication failure (HTTP 401), or permission denied (HTTP 403)
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          Throws (rejects) when the source asset doesn't exist (HTTP 404), when the
          target public_id already exists and overwrite is false (HTTP 409 Conflict),
          when credentials are invalid (HTTP 401), or when the caller lacks permission
          (HTTP 403). A missing source asset is the most common unhandled case —
          callers assume the asset exists but it may have been deleted concurrently.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 404: Source asset not found (from_public_id does not exist).
          HTTP 409: Target public_id already exists and overwrite option is false (default).
          HTTP 401: Authorization required (invalid api_key/api_secret).
          HTTP 403: Not allowed (permission denied for this resource type).
          HTTP 400: Bad request (invalid public_id format).
        required_handling: >
          MUST wrap cloudinary.v2.uploader.rename() in try-catch.
          Check error.http_code: 404 means source missing, 409 means target conflict.
          Pass overwrite: true explicitly if overwrite behavior is intended.
        evidence_quality: confirmed

      - id: rename-silent-conflict
        severity: warning
        condition: >
          rename target public_id already exists and overwrite option is not set to true (HTTP 409)
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          When overwrite is false (the default), renaming to a public_id that already
          exists returns HTTP 409. Callers who do not check error.http_code treat this
          the same as a network failure — losing the context that the target exists
          and the original asset is still at its source location.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        throws: >
          Plain object { message: string, http_code: 409 } — rejected with conflict message.
        required_handling: >
          Check error.http_code === 409 to distinguish "target already exists" from
          other failures. Either use overwrite:true or handle the conflict explicitly.
        evidence_quality: confirmed

  - name: explicit
    import_path: "cloudinary"
    description: >
      Applies transformations, updates tags/metadata, or generates derived versions
      of an asset that was already uploaded. Used for eager transformations, adding
      responsive breakpoints after upload, and updating structured metadata.
      Requires the asset to already exist — does NOT upload new files.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/image_upload_api_reference
      # HTTP codes: 400 (invalid transformation), 401 (auth), 403 (permission), 404 (not found), 420 (rate)
      - id: explicit-missing-error-handling
        severity: error
        condition: >
          asset not found (HTTP 404), invalid transformation parameters (HTTP 400),
          authentication failure (HTTP 401), or rate limit exceeded (HTTP 420)
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          Rejects when the target asset doesn't exist (HTTP 404), when transformation
          parameters are invalid (HTTP 400), when credentials are missing or invalid
          (HTTP 401), or when rate limited (HTTP 420). In pipelines that call explicit()
          after upload() with delay, the asset may not yet be available, causing
          sporadic 404 rejections that are hard to reproduce.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 404: Asset not found (public_id does not exist yet or was deleted).
          HTTP 400: Invalid transformation parameters (bad crop mode, unsupported format).
          HTTP 401: Authorization required (invalid credentials).
          HTTP 420: Rate limited (too many transformation requests in short window).
          HTTP 500: Internal error (transformation pipeline failure for complex operations).
        required_handling: >
          MUST wrap cloudinary.v2.uploader.explicit() in try-catch.
          Check error.http_code: 404 means asset not yet available (consider retry with backoff),
          400 means transformation params are wrong (check transformation options).
        evidence_quality: confirmed

  - name: add_tag
    import_path: "cloudinary"
    description: >
      Adds one or more tags to a list of assets identified by their public_ids.
      Tags are used for bulk operations (delete by tag, search by tag, CDN delivery
      grouping). Batch operation — partial failure is not reported per-asset.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/image_upload_api_reference
      # Same HTTP error codes as all Upload API methods
      - id: add-tag-missing-error-handling
        severity: error
        condition: >
          authentication failure (HTTP 401), permission denied (HTTP 403), invalid tag format (HTTP 400),
          or network failure — add_tag() silently returns empty list for non-existent public_ids
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          Rejects when authentication fails (HTTP 401), when the caller lacks
          permission (HTTP 403), or on network failure. Does NOT return 404 for
          non-existent public_ids — it silently succeeds with an empty public_ids
          list in the response. This makes silent no-ops the most dangerous failure
          mode, not thrown errors.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 401: Authorization required.
          HTTP 403: Not allowed (permission denied).
          HTTP 400: Bad request (invalid tag format, too many public_ids).
          Node.js Error: network failure.
          SILENT: Non-existent public_ids do NOT throw — silently returns empty list.
        required_handling: >
          MUST wrap cloudinary.v2.uploader.add_tag() in try-catch for auth/network errors.
          Check response.public_ids array to verify tags were actually applied.
        evidence_quality: confirmed

  - name: remove_tag
    import_path: "cloudinary"
    description: >
      Removes one or more tags from a list of assets. Used for access control changes,
      CDN delivery group removal, and cleanup of organizational metadata.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/image_upload_api_reference
      - id: remove-tag-missing-error-handling
        severity: error
        condition: >
          authentication failure (HTTP 401), permission denied (HTTP 403), invalid tag or public_id format (HTTP 400),
          or network failure during tag removal operation
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          Rejects on authentication failure (HTTP 401), permission errors (HTTP 403),
          or network failure. Same silent no-op behavior as add_tag() for non-existent
          assets or non-existent tags.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 401: Authorization required.
          HTTP 403: Not allowed.
          HTTP 400: Invalid tag or public_id format.
        required_handling: >
          MUST wrap cloudinary.v2.uploader.remove_tag() in try-catch.
          For access-control use cases, verify the operation succeeded via response.public_ids.
        evidence_quality: confirmed

  - name: api.delete_resources
    import_path: "cloudinary"
    description: >
      Deletes multiple assets by public_id array using the Admin API. A bulk
      destructive operation that cannot be undone (unless backup is enabled).
      Rate-limited by the Admin API plan (unlike the Upload API which is not limited).
    postconditions:
      # Evidence: https://cloudinary.com/documentation/admin_api
      # Admin API rate limit: X-FeatureRateLimit-* headers, HTTP 420 when exceeded
      # Source: lib/api_client/execute_request.js, lib/v2/api.js
      - id: delete-resources-missing-error-handling
        severity: error
        condition: >
          authentication failure (HTTP 401), permission denied (HTTP 403), Admin API rate limit exceeded (HTTP 420),
          or network failure during bulk asset deletion
        sources:
          - "https://cloudinary.com/documentation/admin_api"
        description: >
          Rejects on authentication failure (HTTP 401), when the caller lacks
          permission to delete (HTTP 403), or when the Admin API rate limit is
          exceeded (HTTP 420). Unlike uploader.destroy(), which silently returns
          result:'not found' for missing assets, delete_resources() returns a
          deleted: {}, not_found: [] structure in the success response — partial
          results are returned even when some assets don't exist. Only auth, permission,
          and rate limit errors cause rejection.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 401: Authorization required (invalid api_key/api_secret).
          HTTP 403: Not allowed (insufficient plan or resource-level permission).
          HTTP 420: Rate limited (Admin API hourly quota exceeded).
          HTTP 500: Internal server error.
          Node.js Error: network failure.
        required_handling: >
          MUST wrap cloudinary.v2.api.delete_resources() in try-catch.
          Check error.http_code === 420 for rate limit and implement exponential backoff.
          Monitor X-FeatureRateLimit-Remaining header for proactive throttling.
          Check response.not_found[] array to verify which assets were actually deleted.
        evidence_quality: confirmed
        source: "https://cloudinary.com/documentation/admin_api"

  - name: api.resource
    import_path: "cloudinary"
    description: >
      Fetches detailed metadata for a single asset from the Admin API: dimensions,
      format, tags, context, transformation history, and moderation status.
      Commonly used before transformations, in media management UIs, and for
      validation pipelines.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/admin_api
      # Rate limited via Admin API — same 420 as delete_resources
      - id: api-resource-missing-error-handling
        condition: >
          asset not found (HTTP 404), authentication failure (HTTP 401), permission denied (HTTP 403),
          or Admin API rate limit exceeded (HTTP 420)
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 404: Asset not found (public_id does not exist).
          HTTP 401: Authorization required.
          HTTP 403: Not allowed (insufficient permissions for this resource type).
          HTTP 420: Rate limited (Admin API quota exceeded).
        required_handling: >
          MUST wrap cloudinary.v2.api.resource() in try-catch.
          Check error.http_code === 404 to handle missing assets gracefully (return null).
          Check error.http_code === 420 to implement backoff for high-volume metadata pipelines.
        sources:
          - "https://cloudinary.com/documentation/admin_api"
        severity: error
        evidence_quality: confirmed

  - name: update_metadata
    import_path: "cloudinary"
    description: >
      Batch-updates structured metadata field values on one or more existing assets
      identified by their public_ids. Used after upload to attach categorization,
      workflow status, or custom business fields. Distinct from api.update() (which
      updates tags, context, and moderation) — this targets custom structured metadata
      fields created via the Cloudinary structured metadata API.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/image_upload_api_reference
      # Source: lib/uploader.js exports.update_metadata — calls call_api("metadata", ...)
      # Same execute_request.js error shape as all Upload API methods
      # HTTP codes confirmed: 400 (invalid field_external_id or value), 401 (auth), 403 (permission)
      - id: update-metadata-missing-error-handling
        severity: error
        condition: >
          authentication failure (HTTP 401), invalid metadata field ID (HTTP 400),
          permission denied (HTTP 403), or network failure
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          Rejects when authentication fails (HTTP 401), when a metadata field
          external_id doesn't exist (HTTP 400), or when the caller lacks permission
          (HTTP 403). The most common failure in production: passing a metadata
          field external_id that was renamed or deleted in the Cloudinary dashboard,
          causing the entire batch update to reject with HTTP 400.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 400: Bad request (invalid metadata field external_id, value type mismatch,
          or pipe-encoded metadata string is malformed).
          HTTP 401: Authorization required (invalid api_key/api_secret).
          HTTP 403: Not allowed (insufficient permissions for metadata operations).
          Node.js Error: network failure (ECONNREFUSED, ETIMEDOUT).
        required_handling: >
          MUST wrap cloudinary.v2.uploader.update_metadata() in try-catch.
          Check error.http_code === 400 to detect field ID mismatches (field was renamed/deleted).
          Note: partial success is NOT reported — if any field is invalid, the entire batch rejects.
          Validate metadata field external_ids against your Cloudinary dashboard before batch updates.
        evidence_quality: confirmed

      - id: update-metadata-silent-partial-failure
        severity: warning
        condition: >
          non-existent public_ids silently succeed — update_metadata does NOT throw 404 for
          missing assets but silently omits them from the result
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          When one or more public_ids in the batch do not exist, update_metadata()
          does NOT throw an error — it resolves successfully and silently skips the
          missing assets. The response contains only the public_ids that were actually
          updated. Callers that don't check response.public_ids against their input
          will silently lose metadata updates for deleted or misnamed assets.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        throws: >
          Resolves (does NOT reject) when assets don't exist.
          Response: { public_ids: string[] } — only lists public_ids that were updated.
          Missing assets are silently omitted from response.public_ids.
        required_handling: >
          After awaiting update_metadata(), compare response.public_ids against your input
          public_ids array. If any are missing, log a warning — those assets don't exist
          and their metadata was not updated.
          Example: const missing = input.filter(id => !result.public_ids.includes(id))
        evidence_quality: confirmed

  - name: api.update
    import_path: "cloudinary"
    description: >
      Updates one or more attributes of an existing asset identified by public_id:
      tags, context (key-value metadata), structured metadata, moderation status,
      and access control. This is the Admin API equivalent for post-upload asset
      management, frequently used in content moderation workflows and CMS integrations.
      Requires Admin API credentials (api_key + api_secret).
    postconditions:
      # Evidence: https://cloudinary.com/documentation/admin_api#update_details_of_an_existing_resource
      # Source: lib/v2/api.js — calls execute_request via same shared adapter
      # HTTP codes confirmed: 400, 401, 403, 404, 409, 420 from admin_api docs
      - id: api-update-missing-error-handling
        severity: error
        condition: >
          asset not found (HTTP 404), invalid metadata field or value (HTTP 400),
          authentication failure (HTTP 401), permission denied (HTTP 403),
          or Admin API rate limit exceeded (HTTP 420)
        sources:
          - "https://cloudinary.com/documentation/admin_api"
        description: >
          Rejects when the target asset doesn't exist (HTTP 404), when metadata field
          external_ids are invalid (HTTP 400), when credentials are missing (HTTP 401),
          when permissions are insufficient (HTTP 403), or when the Admin API rate
          limit is exceeded (HTTP 420). In CMS workflows that call api.update() in
          background jobs, all four failure modes are silently swallowed when
          try-catch is missing — moderation decisions or tag updates are lost.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 404: Asset not found (public_id does not exist or was deleted).
          HTTP 400: Invalid metadata field external_id, tag format, or context syntax.
          HTTP 401: Authorization required (Admin API key + secret required).
          HTTP 403: Not allowed (insufficient plan or resource-type permission).
          HTTP 409: Conflict (trying to set access_mode to its current value).
          HTTP 420: Rate limited (Admin API hourly quota exceeded).
          Node.js Error: network failure (ECONNREFUSED, ETIMEDOUT).
        required_handling: >
          MUST wrap cloudinary.v2.api.update() in try-catch.
          Check error.http_code === 404 to handle deleted assets gracefully.
          Check error.http_code === 420 to implement exponential backoff.
          Monitor X-FeatureRateLimit-Remaining in response for proactive throttling.
          Note: unlike delete_resources, api.update() updates a single asset atomically.
        evidence_quality: confirmed

  - name: api.delete_resources_by_tag
    import_path: "cloudinary"
    description: >
      Permanently deletes ALL assets that have a given tag across the entire Cloudinary
      account. This is an irreversible bulk delete operation — there is no recycle bin
      unless Cloudinary backup is explicitly enabled. Commonly used for cleanup
      pipelines, expired content removal, and test environment teardown. A single
      wrong tag value can wipe production media assets.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/admin_api#delete_resources_by_tag
      # Source: lib/v2/api.js — calls execute_request via Admin API
      # Admin API rate limited (HTTP 420) — same limit as all other admin calls
      # NOTE: deleted assets go to backup only if Cloudinary backup feature is enabled on the plan
      - id: delete-resources-by-tag-missing-error-handling
        severity: error
        condition: >
          authentication failure (HTTP 401), permission denied (HTTP 403), Admin API rate limit
          exceeded (HTTP 420), or network failure during bulk tag-based deletion
        sources:
          - "https://cloudinary.com/documentation/admin_api"
        description: >
          Rejects when authentication fails (HTTP 401), when the caller lacks
          permission to delete (HTTP 403), or when the Admin API rate limit is
          exceeded (HTTP 420). The operation is fire-and-forget for the matching
          set — all assets with the tag are queued for deletion. If the call itself
          throws (rate limit, auth failure), the deletion is NOT applied. But if
          it resolves, all matching assets are permanently deleted with no asset-level
          confirmation in the response.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 401: Authorization required (Admin API credentials required).
          HTTP 403: Not allowed (insufficient permissions for bulk delete).
          HTTP 420: Rate limited (Admin API quota exceeded — operation NOT applied).
          Node.js Error: network failure.
        required_handling: >
          MUST wrap cloudinary.v2.api.delete_resources_by_tag() in try-catch.
          CRITICAL: Verify tag scope before calling — this deletes ALL assets with that tag.
          Use api.resources_by_tag() first to preview what will be deleted.
          Check error.http_code === 420 for rate limit and implement exponential backoff.
          Enable Cloudinary backup feature in account settings if data recovery is required.
          Consider using delete_resources() with explicit public_ids for safer targeted deletion.
        evidence_quality: confirmed

      - id: delete-resources-by-tag-catastrophic-misuse
        severity: error
        condition: >
          bulk tag-based deletion applied without prior scope verification — resolves
          successfully but deletes more assets than intended due to shared or generic tag name
        sources:
          - "https://cloudinary.com/documentation/admin_api"
        description: >
          When the supplied tag is broad or shared across unintended assets (e.g.,
          a generic tag like "upload" or "temp" that was also applied to production
          assets), delete_resources_by_tag() will permanently delete ALL matching
          assets without confirmation. The response does not list which assets were
          deleted — only the count. This pattern is particularly dangerous when tag
          values are constructed from user input or environment variables without
          validation.
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: critical
        throws: >
          Resolves (does NOT reject) when the deletion succeeds — even if it deleted
          more assets than intended.
          Response: { deleted: {}, deleted_counts: {}, partial: boolean, rate_limit_... }
          No per-asset confirmation — only aggregate counts.
        required_handling: >
          ALWAYS call api.resources_by_tag(tag) first to preview the asset count and
          verify the tag scope before deletion.
          Use a dedicated deletion-scoped tag (e.g., "to-delete-YYYY-MM-DD") to avoid
          accidental scope bleed.
          Store the list of deleted public_ids from resources_by_tag() before calling
          delete_resources_by_tag() for audit logging.
        evidence_quality: confirmed

  - name: search.execute
    import_path: "cloudinary"
    description: >
      Executes a structured search query against the Cloudinary asset index using
      the Search API. Returns paginated results with asset metadata. Used in
      media libraries, content management systems, and bulk export pipelines.
      Requires Admin API credentials.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/search_api
      # Rate limited via Admin API — HTTP 420 is common in search-heavy workflows
      - id: search-execute-missing-error-handling
        condition: >
          invalid search expression (HTTP 400), missing Admin API credentials (HTTP 401),
          rate limit exceeded (HTTP 420), or network failure
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 400: Bad request (invalid search expression syntax, malformed Lucene query).
          HTTP 401: Authorization required (Admin API credentials required, not just upload key).
          HTTP 420: Rate limited (Admin API quota, search counts against the same limit).
          HTTP 500: Internal error (query too broad, index timeout).
        required_handling: >
          MUST wrap cloudinary.v2.search.expression(...).execute() in try-catch.
          Check error.http_code === 400 to detect expression syntax errors.
          Check error.http_code === 401 — search requires Admin API credentials (api_key + api_secret),
          not just cloud_name. Client-side usage will always return 401.
          Implement pagination with next_cursor for large result sets to avoid timeouts.
        sources:
          - "https://cloudinary.com/documentation/search_api"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: remove_all_tags
    import_path: "cloudinary"
    description: >
      Removes ALL tags from a list of assets identified by their public_ids. Used
      in access-control rollback (clearing tag-based delivery groups), CMS workflow
      resets (post-moderation cleanup), and pre-deletion staging. Unlike remove_tag()
      which targets a single tag, this strips every tag from each asset in one batch
      call — destructive of tag-based grouping with no per-tag report.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/image_upload_api_reference
      # Source: lib/uploader.js exports.remove_all_tags — calls call_tags_api("remove_all", ...)
      # Same execute_request.js error shape as all Upload API methods
      # HTTP code envelope: 200/400/401/403/404/420/500 from Upload API spec
      # Real-world usage: fictionco/fiction (1466 ⭐) calls cloudinary.v2.uploader.remove_all_tags([publicId])
      - id: remove-all-tags-missing-error-handling
        severity: error
        condition: >
          authentication failure (HTTP 401), permission denied (HTTP 403), invalid public_id format (HTTP 400),
          or network failure during bulk tag-clearing operation
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          Rejects on authentication failure (HTTP 401), when the caller lacks
          permission (HTTP 403), or on network failure. Same silent no-op behavior
          as add_tag()/remove_tag() for non-existent assets — the response contains
          only the public_ids that were actually updated. In access-control rollback
          flows, an unthrown failure leaves restricted assets visible because the
          tag-based delivery group was not actually cleared.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 401: Authorization required (invalid api_key/api_secret).
          HTTP 403: Not allowed (permission denied).
          HTTP 400: Bad request (invalid public_id format, too many public_ids).
          HTTP 500: Internal server error.
          Node.js Error: network failure (ECONNREFUSED, ETIMEDOUT).
          SILENT: Non-existent public_ids do NOT throw — silently returns empty list.
        required_handling: >
          MUST wrap cloudinary.v2.uploader.remove_all_tags() in try-catch for auth/network errors.
          For access-control rollback, compare response.public_ids against your input
          array to verify the tag-clearing was actually applied to every asset.
          Missing public_ids in the response indicate assets that no longer exist —
          their access-control state cannot be guaranteed by this call.
        evidence_quality: confirmed

  - name: create_archive
    import_path: "cloudinary"
    description: >
      Creates a downloadable archive (zip or tgz) from a set of Cloudinary assets
      identified by tag, public_id list, or prefix. Used for bulk asset export,
      customer download flows, and archive generation pipelines. The generated
      archive is itself stored in Cloudinary and returned with a secure URL.
      Server-side archive assembly is a long-running operation — partial failures
      (one missing asset in a multi-asset archive) are reported in the response
      rather than thrown.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/image_upload_api_reference
      # Source: lib/uploader.js exports.create_archive — calls call_api("generate_archive", ...)
      # Same execute_request.js error shape as upload — plain { message, http_code }
      # HTTP code envelope: 400/401/403/404/420/500 from Upload API spec
      # create_zip() is a thin wrapper that calls create_archive() with target_format="zip" —
      # both share identical error semantics.
      - id: create-archive-missing-error-handling
        severity: error
        condition: >
          authentication failure (HTTP 401), invalid archive parameters (HTTP 400),
          permission denied (HTTP 403), rate limit exceeded (HTTP 420), or network failure
          during server-side archive assembly
        sources:
          - "https://cloudinary.com/documentation/image_upload_api_reference"
        description: >
          Rejects when authentication fails (HTTP 401), when archive parameters
          are invalid (HTTP 400 — e.g., invalid target_format, conflicting tags+public_ids
          selectors, or too many source assets), when the caller lacks permission
          (HTTP 403), when rate-limited (HTTP 420), or on network failure during
          the long-running archive assembly. Customer-facing download flows that
          await create_archive() without try-catch surface a generic error to the
          user with no recovery path — the customer sees a broken download button
          and an empty file.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 400: Bad request (invalid target_format, too many source assets,
          or conflicting selector params).
          HTTP 401: Authorization required (invalid api_key/api_secret).
          HTTP 403: Not allowed (archive generation not enabled on plan).
          HTTP 420: Rate limited (Upload API archive quota exceeded).
          HTTP 500: Internal error (archive assembly failure for large sets).
          Node.js Error: network failure (ECONNREFUSED, ETIMEDOUT mid-assembly).
        required_handling: >
          MUST wrap cloudinary.v2.uploader.create_archive() (and create_zip())
          in try-catch. Check error.http_code === 400 to detect bad archive params
          (try a smaller selector or different target_format). Check error.http_code === 420
          for rate-limit and implement exponential backoff before retry. For customer-facing
          download flows, present a user-friendly fallback rather than the raw error.message.
          Note: create_zip() delegates to create_archive() with target_format="zip" — the same
          error envelope applies.
        evidence_quality: confirmed

  - name: api.create_folder
    import_path: "cloudinary"
    description: >
      Creates an empty folder in the Cloudinary Media Library via the Admin API.
      Used in CMS onboarding flows (per-tenant folder isolation), bulk upload
      preparation (creating destination folders ahead of asset upload), and
      media-library structure provisioning. The folder is created at the exact
      path string passed — nested folders (e.g. "tenants/acme/photos") are created
      in a single call. Idempotency note: creating an already-existing folder
      returns HTTP 409 Conflict by default.
    postconditions:
      # Evidence: https://cloudinary.com/documentation/admin_api
      # Source: lib/api.js exports.create_folder — calls call_api("post", ["folders", path], ...)
      # Admin API rate limited (HTTP 420) — same quota as resource/update/delete
      # Error shape: plain { message, http_code } via shared execute_request.js
      # HTTP code envelope: 400/401/403/409/420/500 from Admin API spec
      - id: create-folder-missing-error-handling
        severity: error
        condition: >
          authentication failure (HTTP 401), permission denied (HTTP 403), folder already exists
          (HTTP 409 Conflict), invalid folder path (HTTP 400), Admin API rate limit exceeded (HTTP 420),
          or network failure during folder creation
        sources:
          - "https://cloudinary.com/documentation/admin_api"
        description: >
          Rejects on authentication failure (HTTP 401), permission denial (HTTP 403),
          when the folder already exists (HTTP 409 — the most common unhandled case
          in onboarding flows where the same tenant may be re-initialized), when
          the folder path is invalid (HTTP 400 — e.g., contains illegal characters
          or starts with a slash), when the Admin API hourly quota is exceeded
          (HTTP 420), or on network failure. In tenant onboarding flows that don't
          handle HTTP 409, the entire onboarding transaction aborts instead of
          treating an existing folder as a no-op success.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        throws: >
          Plain object { message: string, http_code: number } — NOT a standard Error.
          HTTP 400: Bad request (invalid folder path — leading slash, illegal chars).
          HTTP 401: Authorization required (Admin API credentials required).
          HTTP 403: Not allowed (insufficient permissions for folder ops).
          HTTP 409: Already exists (folder is already present at this path).
          HTTP 420: Rate limited (Admin API hourly quota exceeded — folder ops count against the same limit).
          HTTP 500: Internal server error.
          Node.js Error: network failure (ECONNREFUSED, ETIMEDOUT).
        required_handling: >
          MUST wrap cloudinary.v2.api.create_folder() in try-catch.
          Check error.http_code === 409 to detect idempotent re-creation — treat as
          a no-op success in tenant onboarding flows (the folder is already there).
          Check error.http_code === 420 for rate limit and implement exponential
          backoff. Validate folder path format (no leading slash, no illegal characters)
          before calling to avoid HTTP 400.
        evidence_quality: confirmed
