  - name: v5
    import_path: "uuid"
    description: >
      Generates a deterministic (name-based) UUID v5 using SHA-1 hashing of a name
      within a namespace. Preferred over v3 per RFC 4122 (SHA-1 is stronger than MD5).
      Same input → same UUID, always. Same throw conditions as v3.
      Use for: stable IDs derived from canonical names, URLs, or other namespaced entities.
    postconditions:
      # Evidence: node_modules/uuid/dist/v35.js — same v35() function used by both v3 and v5.
      # Same namespace validation, same TypeError conditions.
      # RFC recommendation: "If backward compatibility is not an issue, SHA-1 [v5] is preferred."
      - id: v5-invalid-namespace
        maturity: stable
        condition: >
          v5() is called with a namespace that is not a valid UUID string or 16-byte array.
          Identical conditions to v3-invalid-namespace — both v3 and v5 use the same
          internal v35() function with the same validation.
          Also: v5() generates different UUIDs than v3() for the same name/namespace pair —
          they are NOT interchangeable. Applications that accidentally swap v3 and v5 in
          different code paths generate different IDs for the same input, breaking ID lookups.
        throws: >
          TypeError('Namespace must be array-like (16 iterable integer values, 0-255)')
          — when namespace byte array is not 16 bytes.
          TypeError('Invalid UUID') — when namespace string is not a valid UUID.
        required_handling: >
          Use v5.DNS or v5.URL namespace constants:

            import { v5 } from 'uuid';

            // Preferred (SHA-1 > MD5 per RFC)
            const stableId = v5('https://example.com/resource/123', v5.URL);

          Custom namespace must be a valid UUID string:
            const NAMESPACE = '6ba7b810-9dad-11d1-80b4-00c04fd430c8';
            const id = v5('entity-name', NAMESPACE);

          Never mix v3 and v5 for the same namespace+name pairs — they produce different UUIDs.
        sources:
          - "https://github.com/uuidjs/uuid#uuidv5name-namespace-buffer-offset"
          - "https://github.com/uuidjs/uuid/blob/main/src/v35.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: uuid@14.0.0 changelog — "v3/v5/v6 now throw RangeError if offset < 0
      # or offset + 16 > buf.length" — security tightening for callers using the
      # explicit buffer/offset API. v5 uses the same internal v35() function as v3,
      # so the same buffer/offset check applies. Source: node_modules/uuid/dist/v35.js
      # lines 27-30 (same as v3).
      - id: v5-buffer-offset-out-of-bounds
        maturity: stable
        condition: >
          v5() is called with an explicit `buf` Uint8Array argument AND an `offset`
          argument that is negative or would write past the buffer end. New in uuid@14.0.0.
          Identical mechanism to v3-buffer-offset-out-of-bounds since both v3 and v5
          route through the same internal v35() function. Common in protocol-level code
          that pre-allocates buffers for many stable IDs (e.g., generating IDs from a
          batch of URLs and packing all 16-byte UUIDs into one Uint8Array).
        throws: >
          RangeError with message 'UUID byte range <offset>:<offset+15> is out of buffer bounds'.
          NOT a TypeError — this is a RangeError. Code that catches only TypeError
          (from the existing v5-invalid-namespace path) will miss this and crash.
        required_handling: >
          When using the explicit buffer API, validate buffer size and offset first:

            import { v5 } from 'uuid';

            const urls = ['https://a.com', 'https://b.com', 'https://c.com'];
            const buf = new Uint8Array(urls.length * 16);

            urls.forEach((url, i) => {
              const offset = i * 16;
              if (offset + 16 > buf.length) {
                throw new Error('Buffer too small for batch');
              }
              v5(url, v5.URL, buf, offset);
            });

          For the common case (no explicit buffer), this postcondition does not apply.
        sources:
          - "https://github.com/uuidjs/uuid#uuidv5name-namespace-buffer-offset"
          - "https://github.com/uuidjs/uuid/blob/main/src/v35.ts"
          - "https://github.com/uuidjs/uuid/blob/main/CHANGELOG.md#1400"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: stringify
    import_path: "uuid"
    description: >
      Converts a 16-byte Uint8Array to a UUID string. Synchronous. The reverse of
      parse(). Validates the resulting string against the UUID regex and throws
      TypeError('Stringified UUID is invalid') if the byte array does not produce
      a valid UUID format. Less commonly called directly — most apps call parse()/v4()
      and never round-trip through bytes. Used by: binary database adapters (storing
      UUIDs as bytes in MySQL BINARY(16) / PostgreSQL bytea then converting back to
      strings for display), protocol-level code that ships raw UUID bytes over the wire.
    postconditions:
      # Evidence: node_modules/uuid/dist/stringify.js (uuid@14.0.0):
      #   function stringify(arr, offset = 0) {
      #     const uuid = unsafeStringify(arr, offset);
      #     if (!validate(uuid)) {
      #       throw TypeError('Stringified UUID is invalid');
      #     }
      #     return uuid;
      #   }
      # The throw fires for byte arrays whose version nibble (byte 6 upper 4 bits)
      # or variant bits (byte 8 upper 2 bits) don't match the RFC 4122 spec — i.e.,
      # raw random bytes will almost certainly fail validate() because they won't
      # have the version=4 and variant=10 markers set.
      - id: stringify-invalid-bytes
        maturity: stable
        condition: >
          stringify() is called with a Uint8Array whose contents do not encode a
          valid RFC 4122 UUID — i.e., the version nibble (high 4 bits of byte 6)
          or variant bits (high 2 bits of byte 8) are not set correctly. Triggers
          on:
          - Reading bytes from a binary DB column that may be corrupted or written
            by a non-UUID-aware writer
          - Receiving bytes over the wire that were not generated by v1/v3/v4/v5/v6/v7
          - Constructing a Uint8Array manually with arbitrary values
          - Passing an offset into a larger buffer where the 16 bytes at that offset
            are not actually a UUID
          - Writing tests with mock UUIDs that don't set the version/variant bits
          Common in: binary protocol parsers, low-level DB drivers reading BINARY(16)
          columns that may contain non-UUID data (legacy migration), test fixtures
          that hand-roll bytes.
        throws: >
          TypeError with exact message 'Stringified UUID is invalid'. Distinct from
          parse()'s 'Invalid UUID' message — when triaging logs, the wording
          discriminates the failure path (stringify vs parse).
        required_handling: >
          For the common case of round-tripping a known-valid UUID, this never fires:

            import { v4, parse, stringify } from 'uuid';
            const id = v4();
            const bytes = parse(id);
            const back = stringify(bytes);  // safe — round-trip from a valid UUID
            console.assert(back === id);

          When reading bytes from an external source (DB column, network, mock
          data), wrap in try-catch:

            try {
              const idStr = stringify(rowBytes);
              return idStr;
            } catch (error) {
              if (error instanceof TypeError && error.message === 'Stringified UUID is invalid') {
                // Bytes are corrupt or not a UUID — log and either skip or hard-fail
                logger.error('Invalid UUID bytes in DB column', { rowId: row.id });
                return null;
              }
              throw error;
            }

          For test fixtures: prefer parse(someUuidString) over hand-rolled byte
          arrays. If you must hand-roll bytes, use the unsafeStringify export (also
          available in the source but not in the public API).
        sources:
          - "https://github.com/uuidjs/uuid#uuidstringifyarr-offset"
          - "https://github.com/uuidjs/uuid/blob/main/src/stringify.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: v1
    import_path: "uuid"
    description: >
      Generates a timestamp-based UUID v1 with MAC-address-like node ID (random per-process,
      not the real hardware MAC in modern versions). Synchronous. Uses crypto.getRandomValues()
      via the same rng() function as v4/v7 for the random node + clockseq bits, then encodes
      the current Date.now() into the time fields. Less common than v4/v7 in modern SaaS but
      still appears in legacy migration code and some database adapters that prefer
      time-sortable IDs without v7's stronger sort guarantees.
    postconditions:
      # Evidence: node_modules/uuid/dist/v1.js (uuid@14.0.1) lines for v1Bytes():
      #   if (rnds.length < 16) { throw new Error('Random bytes length must be >= 16'); }
      #   if (offset < 0 || offset + 16 > buf.length) {
      #     throw new RangeError(`UUID byte range ${offset}:${offset + 15} is out of buffer bounds`);
      #   }
      # rng() comes from rng.js — same crypto.getRandomValues() dependency as v4/v7:
      #   if (typeof crypto === 'undefined' || !crypto.getRandomValues) {
      #     throw new Error('crypto.getRandomValues() not supported. ...')
      #   }
      - id: v1-crypto-unavailable
        maturity: stable
        condition: >
          v1() is called in an environment where crypto.getRandomValues() is not available,
          or a custom options.rng returns fewer than 16 bytes, or a buf argument is provided
          with an out-of-bounds offset. Same crypto dependency as v4 and v7 — all three
          route through the shared rng() function in rng.js.
          Additional v1-specific shape: callers commonly pass `options.msecs` and
          `options.nsecs` to override the embedded timestamp (test fixtures, time-travel
          replay) — these are NOT validated, so a negative or non-finite msecs value
          produces a malformed UUID without throwing, but the resulting string still fails
          validate(). Pair with the user-input-validation edge case.
        throws: >
          Error('crypto.getRandomValues() not supported. ...') — when crypto API is missing.
          Error('Random bytes length must be >= 16') — when custom rng returns short buffer.
          RangeError('UUID byte range <offset>:<offset+15> is out of buffer bounds')
          — when writing to a buf argument with negative offset or offset + 16 > buf.length.
        required_handling: >
          In modern Node.js (14.17+) and browsers with Web Crypto, v1() never throws.
          For edge environments or custom rng, wrap in try-catch:

            import { v1 } from 'uuid';
            try {
              const id = v1();
              return id;
            } catch (error) {
              if (error.message.includes('crypto.getRandomValues')) {
                throw new Error('UUID v1 generation not supported in this environment');
              }
              throw error;
            }

          When using the explicit buffer API, validate offset and size first:
            const buf = new Uint8Array(N * 16);
            for (let i = 0; i < N; i++) {
              const offset = i * 16;
              if (offset + 16 > buf.length) throw new Error('Buffer too small');
              v1(undefined, buf, offset);
            }
        sources:
          - "https://github.com/uuidjs/uuid#uuidv1options-buffer-offset"
          - "https://github.com/uuidjs/uuid/blob/main/src/v1.ts"
          - "https://github.com/uuidjs/uuid#getrandomvalues-not-supported"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: v6
    import_path: "uuid"
    description: >
      Generates a UUID v6, which is v1 with reordered timestamp fields so the resulting
      string is lexicographically sortable by time (similar to v7 but using the v1 clockseq
      and node layout). Synchronous. Internally calls v1() with `_v6: true`, then runs the
      bytes through v1ToV6() to reorder. Same crypto dependency as v1/v4/v7 plus an
      additional buf-offset RangeError check at the v6 layer (new in uuid@14.0.0).
    postconditions:
      # Evidence: node_modules/uuid/dist/v6.js (uuid@14.0.1):
      #   if (buf) {
      #     if (offset < 0 || offset + 16 > buf.length) {
      #       throw new RangeError(`UUID byte range ${offset}:${offset + 15} is out of buffer bounds`);
      #     }
      #     ...
      #   }
      # Plus v6 calls v1({ _v6: true, ...options }) — inherits v1's crypto-unavailable
      # and rng-length errors through the underlying rng() and v1Bytes() functions.
      # The buf-offset RangeError is checked TWICE for v6: once in v1Bytes (inherited)
      # and once at the v6 layer (new in v14). Both throw the same RangeError class.
      - id: v6-crypto-unavailable
        maturity: stable
        condition: >
          v6() is called in an environment where crypto.getRandomValues() is not available,
          OR with a buf argument where offset < 0 or offset + 16 > buf.length, OR with a
          custom options.rng that returns fewer than 16 bytes. v6 inherits all of v1's
          crypto/rng/buf failure modes via its internal v1() call, and adds its own
          buf-offset RangeError check at the v6 wrapper layer (uuid@14.0.0+).
          Less common in production than v4/v7 — v7 is the modern sortable choice. v6
          mostly appears in code that's migrating from v1 to a sortable format while
          preserving v1-shaped node/clockseq fields.
        throws: >
          Error('crypto.getRandomValues() not supported. ...') — crypto API missing.
          Error('Random bytes length must be >= 16') — custom rng too short.
          RangeError('UUID byte range <offset>:<offset+15> is out of buffer bounds')
          — buf/offset out of bounds (thrown at both the v6 wrapper and the inner v1Bytes
          call — catching once is sufficient).
        required_handling: >
          Wrap in try-catch when the environment is uncertain:

            import { v6 } from 'uuid';
            try {
              const id = v6();
              return id;
            } catch (error) {
              if (error instanceof RangeError) {
                throw new Error('Buffer too small for UUID v6');
              }
              if (error.message.includes('crypto.getRandomValues')) {
                throw new Error('UUID v6 generation not supported in this environment');
              }
              throw error;
            }

          When generating batch UUIDs into a pre-allocated buffer:
            const buf = new Uint8Array(N * 16);
            for (let i = 0; i < N; i++) {
              const offset = i * 16;
              if (offset + 16 > buf.length) throw new Error('Buffer too small');
              v6(undefined, buf, offset);
            }

          Prefer v7() over v6() for new code — same sortability guarantee, simpler
          internal model, broader ecosystem support (RFC 9562, postgres uuid_v7
          functions, etc.).
        sources:
          - "https://github.com/uuidjs/uuid#uuidv6options-buffer-offset"
          - "https://github.com/uuidjs/uuid/blob/main/src/v6.ts"
          - "https://github.com/uuidjs/uuid/blob/main/CHANGELOG.md#1400"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: v1ToV6
    import_path: "uuid"
    description: >
      Converts a v1 UUID to a v6 UUID (timestamp-sortable reordering). Synchronous.
      Accepts either a UUID string or a Uint8Array of bytes. When given a string,
      internally calls parse() to convert to bytes — which THROWS TypeError('Invalid UUID')
      if the string is malformed. Used for: migrating legacy v1-based primary keys to
      sortable v6 IDs in a batch migration, or for compatibility shims that accept v1
      input but need v6 output.
    postconditions:
      # Evidence: node_modules/uuid/dist/v1ToV6.js (uuid@14.0.1):
      #   export default function v1ToV6(uuid) {
      #     const v1Bytes = typeof uuid === 'string' ? parse(uuid) : uuid;
      #     ...
      #   }
      # parse() throws TypeError('Invalid UUID') for malformed strings — line 3 of parse.js:
      #   if (!validate(uuid)) { throw TypeError('Invalid UUID'); }
      # When called with a Uint8Array directly, v1ToV6 does NO validation — it will
      # produce a malformed output for non-UUID byte input but won't throw at the
      # v1ToV6 layer (downstream stringify() catches that).
      - id: v1tov6-invalid-uuid
        maturity: stable
        condition: >
          v1ToV6() is called with a string argument that is not a valid UUID format.
          Common in migration code that maps a database column of v1 UUID strings to
          v6 — if the column contains any corrupt/missing/legacy non-UUID values
          (NULL stored as the literal string 'NULL', truncated rows, manual SQL inserts
          with bad data), the conversion throws TypeError on the first bad row.
          Also: passing a v4 or v7 UUID (valid UUID format but wrong version) is NOT
          caught — v1ToV6 will happily produce a garbled v6 from non-v1 input because
          it operates on byte-level field rearrangement, not version-aware logic.
          For the Uint8Array overload, v1ToV6 itself does NOT throw — it produces
          a garbled output for non-v1 bytes, which only fails later if stringified
          via stringify() (which validates the resulting UUID format).
        throws: >
          TypeError('Invalid UUID') — when called with a string that is not a valid
          UUID. Thrown by the internal parse() call. NOT thrown by the Uint8Array
          overload — that path silently produces garbage for non-v1 input.
        required_handling: >
          Validate the input UUID format AND version before calling v1ToV6:

            import { v1ToV6, validate, version } from 'uuid';

            function migrateV1ToV6(legacyId: string): string {
              if (!validate(legacyId)) {
                throw new Error(`Invalid UUID in migration: ${legacyId}`);
              }
              if (version(legacyId) !== 1) {
                throw new Error(`Expected v1 UUID, got v${version(legacyId)}: ${legacyId}`);
              }
              return v1ToV6(legacyId);
            }

          For batch migration with mixed-quality data, wrap in try-catch and
          quarantine failures:
            for (const row of rows) {
              try {
                row.newId = v1ToV6(row.legacyId);
              } catch (error) {
                row.migrationError = error.message;
              }
            }
        sources:
          - "https://github.com/uuidjs/uuid#uuidv1tov6uuid"
          - "https://github.com/uuidjs/uuid/blob/main/src/v1ToV6.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: v6ToV1
    import_path: "uuid"
    description: >
      Converts a v6 UUID back to its v1 representation (reverse of v1ToV6). Synchronous.
      Same shape as v1ToV6: accepts string or Uint8Array, internally calls parse() on
      string input. Used for backward compatibility — exposing v6-generated IDs to
      systems that only understand v1 format, or for round-tripping during migration
      validation (v1 → v6 → v1 should equal the original).
    postconditions:
      # Evidence: node_modules/uuid/dist/v6ToV1.js (uuid@14.0.1):
      #   export default function v6ToV1(uuid) {
      #     const v6Bytes = typeof uuid === 'string' ? parse(uuid) : uuid;
      #     ...
      #   }
      # Same throw shape as v1ToV6 — TypeError('Invalid UUID') from internal parse().
      # Uint8Array overload also silently produces garbage for non-v6 input bytes.
      - id: v6tov1-invalid-uuid
        maturity: stable
        condition: >
          v6ToV1() is called with a string that is not a valid UUID format. Same
          mechanism as v1ToV6-invalid-uuid — the internal parse() call throws
          TypeError on malformed input. Also: passing a non-v6 UUID (v4, v7, etc.)
          is NOT caught — v6ToV1 produces a garbled v1 from non-v6 input because it
          operates on byte-level field rearrangement without version-aware logic.
          For the Uint8Array overload, v6ToV1 itself does NOT throw — garbled
          output is only detected later if the result is stringified.
        throws: >
          TypeError('Invalid UUID') — when called with a string that is not a valid
          UUID. Thrown by the internal parse() call. Uint8Array overload does not
          throw at the v6ToV1 layer.
        required_handling: >
          Validate format AND version before calling v6ToV1:

            import { v6ToV1, validate, version } from 'uuid';

            function downgradeV6ToV1(modernId: string): string {
              if (!validate(modernId)) {
                throw new Error(`Invalid UUID: ${modernId}`);
              }
              if (version(modernId) !== 6) {
                throw new Error(`Expected v6 UUID, got v${version(modernId)}: ${modernId}`);
              }
              return v6ToV1(modernId);
            }

          For round-trip integrity check after v1ToV6 migration:
            const original = v1();
            const v6 = v1ToV6(original);
            const back = v6ToV1(v6);
            console.assert(back === original);
        sources:
          - "https://github.com/uuidjs/uuid#uuidv6tov1uuid"
          - "https://github.com/uuidjs/uuid/blob/main/src/v6ToV1.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

edge_cases:
  - id: user-input-validation
    description: >
      Always call validate() on user-provided UUIDs before passing to parse(), version(),
      or database queries. parse() and version() throw TypeError('Invalid UUID') on invalid
      input — this is the most common uuid error in production request handlers.
    sources:
      - "https://github.com/uuidjs/uuid#uuidvalidatestr"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: v7-for-primary-keys
    description: >
      Prefer v7() over v4() for database primary keys. v7() UUIDs are lexicographically
      sortable and monotonically increasing within the same millisecond, reducing
      B-tree index fragmentation in PostgreSQL and MySQL by 30-50% compared to random v4.
      Both have the same crypto error profile. UUID v7 is supported in uuid >= 9.1.0.
    sources:
      - "https://github.com/uuidjs/uuid#uuidv7options-buffer-offset"
      - "https://www.ietf.org/rfc/rfc9562.html#section-5.7"
    severity: info
    business_impact:
      incident_label: SILENT_FAILURE
      production_behavior: silent_failure
      visibility: silent
      user_experience: degraded_performance
      incident_cost_range: low

notes:
  - "uuid is synchronous — no async/await needed, no Promise returned"
  - "v4 is most common (random), v7 is best for DB primary keys (sortable), v5 is best for deterministic IDs"
  - "parse() throws TypeError('Invalid UUID') — NOT 'Invalid UUID format' or similar variants"
  - "version() also throws TypeError('Invalid UUID') — same message as parse()"
  - "stringify() throws TypeError('Stringified UUID is invalid') — distinct message from parse()"
  - "validate() NEVER throws — safe to call on any input including null/undefined"
  - "v3 and v5 require namespace UUID — use v3.DNS, v3.URL, v5.DNS, v5.URL constants"
  - "v3/v5/v6 added RangeError on buffer-offset bounds in uuid@14.0.0 — was silent before"
  - "v1/v4/v7 share crypto.getRandomValues + rng-length + buf-offset failure modes via rng()"
  - "v6 inherits v1 failure modes plus a dedicated buf-offset RangeError at the v6 wrapper layer (v14.0.0+)"
  - "v1ToV6/v6ToV1 throw TypeError('Invalid UUID') from internal parse() on malformed string input"
  - "v1ToV6/v6ToV1 Uint8Array overload does NOT validate input — silently produces garbage from non-v1/v6 bytes"
  - "MAX/NIL omitted — string constants, not callable functions"

