package: uuid
semver: ">=9.0.0 <14.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed
# Evidence: scan-uuid-2026-04-04.json — 57 repos scanned (clean repos: umami, jitsi-meet, PicGo, reactive-resume)
# 0 violations found across 57 repos. v4 postcondition (validate user-provided UUIDs) is edge-case — not triggered.
# FP check: 0/15 FPs in repos without uuid (0% rate)

detection:
  type_names:
    - V1Options
    - V4Options
    - V5Options

functions:
  - name: v4
    import_path: "uuid"
    description: "Generates a random UUID v4"
    postconditions:
      - id: v4-returns-valid-uuid
        condition: "called with valid or no arguments"
        returns: "string containing valid UUID v4 format"
        required_handling: "When accepting UUID from user input, caller SHOULD use validate() to verify format before using in database queries or business logic. Malformed UUIDs can cause SQL errors or security issues."
        sources:
          - "https://github.com/uuidjs/uuid#uuidvalidatestr"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

edge_cases:
  - id: user-input-validation
    description: "Use validate() to check UUID format when parsing user-provided UUIDs before database queries - prevents SQL injection attempts and invalid data errors"
    sources:
      - "https://github.com/uuidjs/uuid#uuidvalidatestr"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

