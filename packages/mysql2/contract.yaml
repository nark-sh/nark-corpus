package: mysql2
semver: ">=3.9.8"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-04-18"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.79
# Depth pass 2026-04-18 (deepen-stream-1 pass 5):
# API surface: 19 async-callable functions (mysql2/promise API)
# Contracted before: 13 (connect, query, execute, getConnection, beginTransaction,
#   commit, rollback, createConnection, end, prepare, PreparedStatementInfo.execute,
#   changeUser, ping)
# Contracted after: 15 (+2: reset, PreparedStatementInfo.close)
# Intentionally omitted: 4
#   - Connection.[Symbol.asyncDispose]() — just calls end(), same error surface as end()
#   - PoolCluster.end() — PoolCluster is rarely used in SaaS apps
#   - PoolCluster.getConnection() — PoolCluster is rarely used in SaaS apps
#   - Pool.releaseConnection() — synchronous, returns void, no async error contract
# Coverage: 15/19 raw = 0.79; effective (contracted / non-omitted) = 15/15 = 1.0
# Evidence sources confirmed from:
#   node_modules/mysql2/lib/promise/connection.js (lines 121-138: reset())
#   node_modules/mysql2/lib/promise/prepared_statement_info.js (lines 24-28: close())
#   node_modules/mysql2/lib/commands/reset_connection.js (clears _statements cache)
#   node_modules/mysql2/lib/commands/prepare.js (PreparedStatementInfo.close() delegates to CloseStatement)
#   https://sidorares.github.io/node-mysql2/docs/documentation/prepared-statements

# CRITICAL SECURITY NOTE:
# mysql2 has 5 CRITICAL CVEs in versions < 3.9.8:
# - CVE-2024-21508 (CVSS 9.8): RCE via supportBigNumbers validation
# - CVE-2024-21511 (CVSS 9.8): Code injection via timezone parameter
# - CVE-2024-21509 (CVSS 8.1): Prototype poisoning in results
# - CVE-2024-21512 (CVSS 8.2): Prototype pollution via nestTables
# - CVE-2024-21507 (CVSS 6.5): Cache poisoning via keyFromFields
#
# MINIMUM VERSION: 3.9.8 (released May 26, 2024)
# ALL USERS MUST UPGRADE IMMEDIATELY
#
# Common production bugs:
# 1. Connection leaks (forgot connection.release() in finally block) - MOST COMMON
# 2. SQL injection (using query() instead of execute() for params)
# 3. Multiple release() calls causing crashes
# 4. pool.end() called while queries still running

detection:
  class_names: ["Connection", "Pool", "PoolConnection"]
  type_names: ["Connection", "Pool", "PoolConnection", "ConnectionOptions"]
  factory_methods: []
  require_instance_tracking: true

  await_patterns:
    # Connection
    - ".connect("
    - ".getconnection("

    # Query operations
    - ".query("
    - ".execute("

    # Transaction operations
    - ".beginTransaction("
    - ".commit("
    - ".rollback("

functions:
  - name: connect
    import_path: "mysql2/promise"
    description: "Establishes connection to MySQL server"
    postconditions:
      - id: connection-failure
        condition: "Cannot connect (wrong credentials, host unreachable, etc.)"
        throws: "Error with code 'ECONNREFUSED', 'ER_ACCESS_DENIED_ERROR', etc."
        required_handling: >
          Caller MUST catch connection errors.
          Common error codes:
          - ECONNREFUSED: MySQL server not running
          - ER_ACCESS_DENIED_ERROR: Wrong username/password
          - ETIMEDOUT: Network timeout
          Implement retry with exponential backoff for transient issues.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: query
    import_path: "mysql2/promise"
    description: "Executes SQL query without prepared statements"

    postconditions:
      # Evidence: seen in 20 primary firings across 3 repos in scan-mysql2-2026-04-03.json
      # Top affected: cita-777/metapi (⭐ 1176), xpf0000/FlyEnv (⭐ 2574)
      - id: syntax-error
        condition: "SQL syntax error"
        throws: "Error with code 'ER_PARSE_ERROR' or similar"
        required_handling: >
          Caller MUST validate SQL syntax before execution.
          DO NOT retry - indicates SQL syntax error.
          Check error.sqlMessage for details.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: constraint-violation
        condition: "Unique constraint, foreign key, or NOT NULL violation"
        throws: "Error with code 'ER_DUP_ENTRY', 'ER_NO_REFERENCED_ROW', 'ER_BAD_NULL_ERROR'"
        required_handling: >
          Caller MUST handle constraint violations:
          - ER_DUP_ENTRY (1062): Duplicate key violation
          - ER_NO_REFERENCED_ROW_2 (1452): Foreign key constraint
          - ER_BAD_NULL_ERROR (1048): NOT NULL constraint
          Extract details from error.sqlMessage.
          DO NOT retry without fixing data.
        sources:
          - "https://dev.mysql.com/doc/mysql-errors/8.0/en/server-error-reference.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-error
        condition: "Connection lost during query execution"
        throws: "Error with code 'PROTOCOL_CONNECTION_LOST', 'ECONNRESET'"
        required_handling: >
          Caller MUST handle connection errors.
          Connection may be lost due to timeout or server restart.
          Implement retry with exponential backoff.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: table-not-found
        condition: "Table or view does not exist"
        throws: "Error with code 'ER_NO_SUCH_TABLE' (1146)"
        required_handling: >
          Caller MUST verify table exists before querying.
          DO NOT retry - indicates schema mismatch or missing migration.
        sources:
          - "https://dev.mysql.com/doc/mysql-errors/8.0/en/server-error-reference.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: sql-injection-risk
        description: >
          NEVER use query() with string concatenation or template literals for user input.
          Example VULNERABLE code: query(`SELECT * FROM users WHERE id = ${userId}`)
          This creates SQL injection vulnerability. ALWAYS use execute() with parameters
          instead: execute('SELECT * FROM users WHERE id = ?', [userId])
        sources:
          - "https://github.com/sidorares/node-mysql2/discussions/1601"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: execute
    import_path: "mysql2/promise"
    description: "Executes prepared statement (parameterized query)"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error in prepared statement"
        throws: "Error with code 'ER_PARSE_ERROR' or similar"
        required_handling: >
          Caller MUST validate SQL syntax.
          Prepared statements prevent SQL injection but not syntax errors.
          DO NOT retry - fix SQL syntax.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: constraint-violation
        condition: "Unique, foreign key, or NOT NULL constraint violation"
        throws: "Error with code 'ER_DUP_ENTRY', 'ER_NO_REFERENCED_ROW_2', 'ER_BAD_NULL_ERROR'"
        required_handling: >
          Caller MUST handle constraint violations gracefully.
          DO NOT retry without changing violating data.
        sources:
          - "https://dev.mysql.com/doc/mysql-errors/8.0/en/server-error-reference.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-error
        condition: "Connection lost or timeout"
        throws: "Error with code 'PROTOCOL_CONNECTION_LOST', 'ETIMEDOUT'"
        required_handling: >
          Caller MUST handle connection errors.
          May be transient - implement retry logic.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: prepared-statement-safety
        description: >
          execute() uses MySQL prepared statements which prevent SQL injection
          by design. Parameters are sent separately from SQL query, making injection
          impossible. This is the recommended method for all queries with user input.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getConnection
    import_path: "mysql2/promise"
    description: "Gets connection from pool"
    postconditions:
      # Evidence: seen in 5 primary firings across 2 repos in scan-mysql2-2026-04-03.json
      # Top affected: pk910/PoWFaucet (⭐ 5454)
      - id: pool-exhausted
        condition: "All connections in pool are busy and timeout exceeded"
        throws: "Error with message 'Pool is closed' or timeout error"
        required_handling: >
          Caller MUST handle pool exhaustion.
          Root causes:
          1. Connections not released (forgot connection.release())
          2. Pool size too small for load
          3. Queries taking too long
          ALWAYS release connections in finally block.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-failure
        condition: "Cannot establish connection from pool"
        throws: "Error with code 'ECONNREFUSED', 'ETIMEDOUT'"
        required_handling: >
          Caller MUST handle connection failures.
          Implement retry with exponential backoff.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: connection-leak-prevention
        description: >
          MOST COMMON PRODUCTION BUG: Forgetting to call connection.release()
          causes pool exhaustion. ALWAYS use try-finally pattern:
          const conn = await pool.getConnection();
          try {
            await conn.query(...);
          } finally {
            conn.release(); // CRITICAL - must always execute
          }
          Failure to release leads to "Pool is closed" errors and application hangs.
        sources:
          - "https://github.com/sidorares/node-mysql2/issues/1486"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: multiple-release-calls
        description: >
          Calling connection.release() multiple times on the same connection
          causes "Error: connection already released" and crashes. Only call
          release() once per getConnection(). Use boolean flag if needed to
          track release state.
        sources:
          - "https://github.com/sidorares/node-mysql2/issues/1234"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: beginTransaction
    import_path: "mysql2/promise"
    description: "Starts database transaction"
    postconditions:
      - id: transaction-start-failure
        condition: "Cannot start transaction (connection error, etc.)"
        throws: "Error with connection-related codes"
        required_handling: >
          Caller MUST catch transaction start errors.
          Network errors may be transient and retriable.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: commit
    import_path: "mysql2/promise"
    description: "Commits transaction"
    postconditions:
      - id: commit-failure
        condition: "Transaction commit fails (constraint violation, connection lost, etc.)"
        throws: "Error with various codes depending on failure reason"
        required_handling: >
          Caller MUST catch commit errors.
          If commit fails, transaction is rolled back.
          Caller should handle rollback appropriately.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: rollback
    import_path: "mysql2/promise"
    description: "Rolls back transaction"
    postconditions:
      - id: rollback-failure
        condition: "Rollback fails (connection lost, etc.)"
        throws: "Error with connection-related codes"
        required_handling: >
          Caller MUST catch rollback errors.
          Even rollback can fail due to connection issues.
          Log rollback failures for investigation.
        sources:
          - "https://github.com/sidorares/node-mysql2"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: createConnection
    import_path: "mysql2/promise"
    description: >
      Establishes a promise-based MySQL connection. Equivalent to calling createConnection()
      and waiting for the 'connect' event. Returns a PromiseConnection on success, rejects
      if the server is unreachable or credentials are invalid.
    postconditions:
      # Evidence: https://github.com/sidorares/node-mysql2/blob/master/promise.js lines 17-40
      # Source confirmed: coreConnection.once('error', err => reject()) — all connect errors forwarded
      - id: createconnection-host-unreachable
        condition: "MySQL server is not running, host is wrong, or port is unreachable"
        throws: "Promise rejects with Error: ECONNREFUSED (connect ECONNREFUSED 127.0.0.1:3306)"
        required_handling: >
          Wrap await createConnection() in try-catch. Handle ECONNREFUSED at application
          startup and retry with backoff. In containerized deployments, add readiness
          checks before attempting connection.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/promise.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        description: >
          Rejects with ECONNREFUSED when the MySQL server is not running or the host/port
          is wrong. This is an OS-level TCP error — not a MySQL protocol error. Common in
          containerized deployments where the database container is not yet healthy.
        evidence_quality: confirmed

      - id: createconnection-access-denied
        condition: "Username, password, or database name is not authorized on the MySQL server"
        throws: "Promise rejects with Error: ER_ACCESS_DENIED_ERROR (MySQL errno 1045, SQLSTATE 28000)"
        required_handling: >
          Wrap await createConnection() in try-catch. Check err.code === 'ER_ACCESS_DENIED_ERROR'
          and log a clear error message. Verify credentials in environment variables before
          deployment. Do not expose err.message to users.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/promise.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        description: >
          Rejects with ER_ACCESS_DENIED_ERROR (MySQL errno 1045, SQLSTATE 28000) when
          username, password, or host is not authorized. The error includes err.code,
          err.errno, err.sqlState fields. This is the #1 cause of failed DB connections
          in staging environments where credentials differ from production.
        evidence_quality: confirmed

      - id: createconnection-too-many-connections
        condition: "MySQL server has reached its max_connections limit"
        throws: "Promise rejects with Error: ER_CON_COUNT_ERROR (MySQL errno 1040, SQLSTATE 08004)"
        required_handling: >
          Wrap await createConnection() in try-catch. Implement connection pooling (use
          createPool() instead of createConnection() per-request) to avoid exhausting
          the server's connection limit. Retry with exponential backoff when ER_CON_COUNT_ERROR.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/promise.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Rejects with ER_CON_COUNT_ERROR (MySQL errno 1040, SQLSTATE 08004) when the
          MySQL server has reached its max_connections limit. Common under load when
          connection pooling is not used, or when connections are leaked (not released).
        evidence_quality: confirmed

  - name: end
    import_path: "mysql2/promise"
    description: >
      Gracefully terminates a Connection or Pool. For Connection, sends COM_QUIT to
      MySQL server and waits for acknowledgment. For Pool, waits for in-flight queries
      to finish then closes all connections. Used in graceful shutdown handlers.
    postconditions:
      # Evidence: mysql2/lib/promise/pool.js lines 68-82 — pool.end() rejects if connection.end() fails
      # Evidence: mysql2/lib/promise/connection.js lines 64-66 — wraps end in Promise but always resolves
      - id: end-pool-connection-error
        condition: "Pool.end() called while queries are in-flight or connections fail to close"
        throws: "Promise rejects with PROTOCOL_CONNECTION_LOST or connection close error"
        required_handling: >
          Wrap pool.end() or connection.end() in try-catch in shutdown handlers (SIGTERM,
          process.on('exit')). Log the error but do not re-throw — the goal is graceful
          shutdown, not failing on cleanup.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/pool.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Pool.end() rejects if any underlying connection fails to close cleanly (e.g.,
          PROTOCOL_CONNECTION_LOST error during shutdown). A single connection failure
          causes the entire pool.end() to reject. Common in applications that call
          pool.end() while queries are still running.
        evidence_quality: confirmed

      - id: end-called-on-closed-connection
        condition: "pool.end() called while pool.getConnection() calls are still pending"
        throws: "Pending getConnection() calls receive Error: 'Pool is closed.'"
        required_handling: >
          Drain in-flight requests before calling pool.end(). In graceful shutdown,
          stop accepting new requests first, then wait for in-flight handlers to complete,
          then call pool.end(). Wrap pool.end() in try-catch.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/pool.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Calling connection.end() or pool.end() a second time after it has already
          been called is a no-op for the promise wrapper (the Promise always resolves),
          but the underlying callback may receive a 'Connection already closed' error
          which is silently swallowed. The real footgun is calling pool.end() while
          pool.getConnection() calls are still pending — those pending calls will
          receive a 'Pool is closed.' error.
        evidence_quality: confirmed

  - name: prepare
    import_path: "mysql2/promise"
    description: >
      Manually creates a server-side prepared statement for the given SQL template.
      Returns a PreparedStatementInfo that can be executed multiple times with different
      parameters. Unlike execute() which auto-manages a statement LRU cache, prepare()
      gives explicit lifecycle control (caller must call statement.close()).
    postconditions:
      # Evidence: mysql2/lib/promise/connection.js lines 126-147
      # Source: prepare() wraps addCommand(new Commands.Prepare()) — rejects with ER_PARSE_ERROR on bad SQL
      - id: prepare-sql-syntax-error
        condition: "SQL template passed to prepare() has a syntax error"
        throws: "Promise rejects with Error: ER_PARSE_ERROR (MySQL errno 1064)"
        required_handling: >
          Wrap await prepare() in try-catch. Validate SQL templates in CI/CD rather
          than at runtime. Check err.code === 'ER_PARSE_ERROR' to distinguish syntax
          errors from connection failures.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/connection.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Rejects with ER_PARSE_ERROR (MySQL errno 1064) when the SQL template has a
          syntax error. Because prepare() is typically called at startup or module load,
          syntax errors often crash the entire service initialization rather than a
          single request.
        evidence_quality: confirmed

      - id: prepare-connection-error
        condition: "Connection drops between createConnection() and prepare(), or is invalidated by changeUser()"
        throws: "Promise rejects with PROTOCOL_CONNECTION_LOST or ECONNRESET"
        required_handling: >
          Wrap await prepare() in try-catch. Re-prepare statements after any connection
          reset or changeUser(). Do not cache PreparedStatementInfo objects across
          connection lifecycle events.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/connection.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Rejects with PROTOCOL_CONNECTION_LOST or ECONNRESET if the connection drops
          between createConnection() and prepare(). After a changeUser() or reset(),
          all previously prepared statements are invalidated and will throw on execute().
          The documentation notes: "you need to prepare statement for each new connection."
        evidence_quality: confirmed

  - name: PreparedStatementInfo.execute
    import_path: "mysql2/promise"
    description: >
      Executes a manually-prepared statement (returned by connection.prepare()) with
      the given parameter array. Unlike connection.execute() which auto-manages statement
      caching, this executes the already-prepared statement directly.
    postconditions:
      # Evidence: mysql2/lib/promise/prepared_statement_info.js lines 7-16
      # Source: makeDoneCb(resolve, reject) — rejects on MySQL execution errors
      - id: prepared-statement-constraint-violation
        condition: "Bound parameters violate a database constraint (unique, FK, NOT NULL)"
        throws: "Promise rejects with ER_DUP_ENTRY (1062), ER_NO_REFERENCED_ROW_2 (1452), or ER_BAD_NULL_ERROR (1048)"
        required_handling: >
          Wrap await stmt.execute() in try-catch. Check err.code to distinguish constraint
          violations (do not retry without fixing data) from connection errors (may retry).
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/prepared_statement_info.js"
          - "https://dev.mysql.com/doc/mysql-errors/8.0/en/server-error-reference.html"
        severity: error
        description: >
          Rejects with ER_DUP_ENTRY (1062), ER_NO_REFERENCED_ROW_2 (1452), or
          ER_BAD_NULL_ERROR (1048) when the bound parameters violate database
          constraints. Prepared statements prevent SQL injection but do not prevent
          constraint violations — the parameters are still validated against the schema
          at execution time.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: prepared-statement-stale-after-reconnect
        condition: "PreparedStatementInfo used after connection reset, changeUser(), or reconnection"
        throws: "Promise rejects with unknown statement ID error or PROTOCOL_CONNECTION_LOST"
        required_handling: >
          Do not cache PreparedStatementInfo objects across connection lifecycle events.
          Re-call connection.prepare() after any changeUser(), reset(), or reconnection.
          Wrap await stmt.execute() in try-catch.
        sources:
          - "https://sidorares.github.io/node-mysql2/docs/documentation/prepared-statements"
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/prepared_statement_info.js"
        severity: error
        description: >
          Executing a PreparedStatementInfo after the underlying connection has been
          reset via reset(), changeUser(), or reconnected after PROTOCOL_CONNECTION_LOST
          will throw because the statement ID is no longer valid on the server. The
          MySQL documentation states prepared statements are connection-scoped and do
          not survive reconnection.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: changeUser
    import_path: "mysql2/promise"
    description: >
      Changes the currently authenticated user on an existing connection without
      closing and reopening it. Used in multi-tenant apps that share a connection
      pool but need per-tenant database/user context. After changeUser(), all
      previously prepared statements are invalidated.
    postconditions:
      # Evidence: mysql2/lib/base/connection.js lines 874-912 — err.fatal = true on failure
      # Source confirmed: changeUser callback sets err.fatal = true, marking connection unrecoverable
      - id: changeuser-access-denied
        condition: "New user credentials are invalid or not authorized for the target database"
        throws: "Promise rejects with ER_ACCESS_DENIED_ERROR (errno 1045); connection marked fatal (err.fatal = true)"
        required_handling: >
          Wrap await connection.changeUser() in try-catch. On ER_ACCESS_DENIED_ERROR,
          destroy the connection and create a new one — the connection is permanently
          unusable after a fatal changeUser error. Do not return it to the pool.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/base/connection.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        description: >
          Rejects with ER_ACCESS_DENIED_ERROR (errno 1045) when the new user credentials
          are invalid. Critically, the error handler in mysql2 source sets err.fatal = true
          on changeUser failure, which means the connection is marked as permanently
          unusable after a failed changeUser(). The connection must be closed and
          re-established — it cannot be reused for further queries.
        evidence_quality: confirmed

      - id: changeuser-prepared-statements-invalidated
        condition: "changeUser() called on a connection that has cached PreparedStatementInfo objects"
        throws: "Does not throw on changeUser() itself, but subsequent stmt.execute() throws unknown statement ID error"
        required_handling: >
          After calling changeUser(), invalidate all cached PreparedStatementInfo objects
          for that connection. Re-call connection.prepare() before using any statement
          on the connection after changeUser().
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/base/connection.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          After a successful changeUser(), all previously prepared statements on this
          connection are invalidated by the MySQL server. Executing a cached
          PreparedStatementInfo from before the changeUser() will throw with an unknown
          statement ID error. This is documented behavior in MySQL protocol spec.
        evidence_quality: confirmed

  - name: ping
    import_path: "mysql2/promise"
    description: >
      Sends a COM_PING packet to the MySQL server and waits for a response.
      Used to verify that a connection is still alive before use, or as a
      keepalive mechanism to prevent connection timeouts.
    postconditions:
      # Evidence: mysql2/lib/promise/connection.js lines 94-111
      # Source: ping() rejects with error if server doesn't respond — includes code, errno, sqlState
      - id: ping-connection-dead
        condition: "Connection to MySQL is no longer alive (server closed due to wait_timeout or network failure)"
        throws: "Promise rejects with PROTOCOL_CONNECTION_LOST or ECONNRESET"
        required_handling: >
          Wrap await connection.ping() in try-catch. In health check handlers, catch
          the error and return a 503/unhealthy status rather than letting it propagate
          as a 500. After a failed ping, destroy the connection and establish a new one.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/connection.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Rejects with PROTOCOL_CONNECTION_LOST or ECONNRESET when the connection to
          MySQL is no longer alive. This is the expected outcome in keepalive checks
          when the server has closed the connection due to wait_timeout or
          interactive_timeout. The error.code field identifies the specific failure.
        evidence_quality: confirmed

  - name: reset
    import_path: "mysql2/promise"
    description: >
      Sends COM_RESET_CONNECTION to the MySQL server, resetting the connection to
      its initial authenticated state without closing and reopening the TCP connection.
      Resets: temporary tables, session variables, user variables, SET NAMES charset,
      and all server-side prepared statements. Faster than changeUser() for clearing
      session state. Returns the connection to a clean state for reuse.
    postconditions:
      # Evidence: mysql2/lib/promise/connection.js lines 121-138
      # Source: c.reset() wraps coreConnection.reset() which sends COM_RESET_CONNECTION
      # Error path: rejects with err.code, err.errno, err.sqlState, err.sqlMessage copied
      # Evidence: mysql2/lib/commands/reset_connection.js lines 16-19:
      #   if (connection._statements) { connection._statements.clear(); }
      # Documentation: https://sidorares.github.io/node-mysql2/docs/documentation/prepared-statements
      #   "you should not use statement after connection reset (changeUser(), reset() or disconnect)"
      - id: reset-connection-dead
        condition: >
          The connection is no longer alive (server closed due to wait_timeout, network failure,
          or the connection was destroyed) when reset() is called. The COM_RESET_CONNECTION
          packet cannot be sent on a dead socket.
        throws: >
          Promise rejects with PROTOCOL_CONNECTION_LOST, ECONNRESET, or ECONNREFUSED.
          Same error codes as ping() — the connection is permanently unusable after this error.
        required_handling: >
          Wrap await connection.reset() in try-catch. On error, destroy the connection
          and create a new one — do not attempt to reuse. In pool scenarios, call
          connection.destroy() rather than connection.release() when reset() fails.

            const connection = await pool.getConnection();
            try {
              await connection.reset();
              // Use connection...
            } catch (resetErr) {
              connection.destroy(); // NOT release() — this connection is broken
              throw resetErr;
            } finally {
              // Only release if no error (destroy() handles cleanup on error)
            }
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/connection.js"
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/commands/reset_connection.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Rejects with PROTOCOL_CONNECTION_LOST or ECONNRESET when the connection to MySQL
          is no longer alive. After a failed reset(), the connection is unusable and must
          be destroyed (not released back to pool).
        evidence_quality: confirmed

      - id: reset-invalidates-prepared-statements
        condition: >
          reset() is called on a connection that has cached PreparedStatementInfo objects
          (created via connection.prepare()). reset() sends COM_RESET_CONNECTION which
          causes the MySQL server to invalidate all prepared statements for this connection.
          The mysql2 client also clears its local _statements LRU cache on reset.
          Any PreparedStatementInfo objects held by the caller are now stale and will
          fail when execute() is called on them.
        throws: >
          reset() itself succeeds (resolves). Subsequent stmt.execute() on a stale
          PreparedStatementInfo rejects with unknown statement ID error or
          PROTOCOL_CONNECTION_LOST.
        required_handling: >
          After calling reset(), invalidate and discard all PreparedStatementInfo objects
          associated with that connection. Re-call connection.prepare() before executing
          any statements on the connection.

            await connection.reset();
            // All PreparedStatementInfo from before reset() are now invalid.
            // Re-prepare any statements you need.
            const stmt = await connection.prepare('SELECT * FROM users WHERE id = ?');
            const [rows] = await stmt.execute([userId]);
            await stmt.close();

          Note: connection.execute() (not prepare()) uses an auto-managed LRU cache
          that mysql2 clears automatically on reset() — only manually prepared statements
          via connection.prepare() require manual re-preparation.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/commands/reset_connection.js"
          - "https://sidorares.github.io/node-mysql2/docs/documentation/prepared-statements"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          reset() clears both the server-side prepared statement cache and the mysql2
          client-side _statements LRU cache. PreparedStatementInfo objects held in
          application code become stale — executing them after reset() causes an unknown
          statement ID error from the MySQL server.
        evidence_quality: confirmed

  - name: PreparedStatementInfo.close
    import_path: "mysql2/promise"
    description: >
      Explicitly closes a server-side prepared statement created via connection.prepare().
      Sends COM_STMT_CLOSE to the MySQL server. MySQL does not send an acknowledgment
      packet for COM_STMT_CLOSE, so this is fire-and-forget — the Promise always resolves
      regardless of connection state. Must be called when finished with a manually-prepared
      statement to avoid server-side prepared statement resource leaks. MySQL enforces
      a global max_prepared_stmt_count limit (default: 16,382) — failing to close
      statements causes this limit to be reached, preventing new prepared statements
      from being created across all connections.
    postconditions:
      # Evidence: mysql2/lib/promise/prepared_statement_info.js lines 24-28
      # Source: close() always resolves — no reject path in Promise wrapper
      #   return new this.Promise((resolve) => {
      #     this.statement.close();   // sends COM_STMT_CLOSE via addCommand(new CloseStatement(id))
      #     resolve();                // always resolves immediately
      #   });
      # Evidence: mysql2/lib/commands/close_statement.js lines 10-14:
      #   start(packet, connection) {
      #     connection.writePacket(new Packets.CloseStatement(this.id).toPacket(1));
      #     return null;  // no ack expected — MySQL spec: no response for COM_STMT_CLOSE
      #   }
      # Documentation: https://sidorares.github.io/node-mysql2/docs/documentation/prepared-statements
      #   "Manually prepared statements doesn't come with LRU cache and SHOULD be closed using statement.close()"
      - id: prepared-statement-close-missing
        condition: >
          connection.prepare() is called but statement.close() is never called after
          the prepared statement is no longer needed. Each unclosed prepared statement
          occupies a slot on the MySQL server. MySQL's global max_prepared_stmt_count
          (default: 16,382) limits the total number of prepared statements across all
          connections. Long-running services that repeatedly call connection.prepare()
          without close() will eventually exhaust this limit.
        throws: >
          Once max_prepared_stmt_count is reached, new connection.prepare() calls reject
          with ER_MAX_PREPARED_STMT_COUNT_REACHED (MySQL errno 1461):
          "Can't create more than max_prepared_stmt_count statements (current value: 16382)"
        required_handling: >
          Always call statement.close() after finishing with a manually-prepared statement.
          Use try-finally to ensure close() is called even when execute() throws:

            const stmt = await connection.prepare('INSERT INTO events (type, payload) VALUES (?, ?)');
            try {
              await stmt.execute([eventType, JSON.stringify(payload)]);
            } finally {
              await stmt.close(); // Always close — fire-and-forget, always resolves
            }

          Prefer connection.execute() (auto-cached LRU, auto-closes evicted statements)
          over connection.prepare() unless you need explicit statement lifecycle control.
          The auto-cache manages closing evicted statements transparently.

          For batch operations where a statement is reused many times, prepare() +
          close() is more efficient than execute() (which re-parses the statement cache
          on each call). In these cases, always close in finally.
        sources:
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/promise/prepared_statement_info.js"
          - "https://github.com/sidorares/node-mysql2/blob/master/lib/commands/close_statement.js"
          - "https://sidorares.github.io/node-mysql2/docs/documentation/prepared-statements"
          - "https://dev.mysql.com/doc/refman/8.0/en/server-system-variables.html#sysvar_max_prepared_stmt_count"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Failing to call close() on manually-prepared statements is a resource leak.
          Each unclosed PreparedStatementInfo occupies a slot on the MySQL server
          until the connection closes (pool connections persist for a long time).
          When max_prepared_stmt_count (default 16,382) is reached across all connections,
          new prepare() calls fail with ER_MAX_PREPARED_STMT_COUNT_REACHED.
          This causes a gradual service degradation rather than an immediate crash —
          symptoms appear hours or days after the leak begins.
        evidence_quality: confirmed
