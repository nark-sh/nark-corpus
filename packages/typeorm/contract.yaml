package: typeorm
semver: ">=0.3.0 <1.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed
coverage_score: 0.65

detection:
  type_names:
    - Repository
    - EntityManager
    - DataSource
    - QueryRunner

  await_patterns:
    # Query operations
    - ".find("
    - ".findOne("
    - ".findOneBy("
    - ".findOneOrFail("
    - ".findOneByOrFail("
    - ".findBy("
    - ".findAndCount("
    - ".findAndCountBy("

    # Write operations
    - ".save("
    - ".insert("
    - ".update("
    - ".delete("
    - ".upsert("
    - ".remove("
    - ".softRemove("
    - ".recover("

    # Soft delete / restore
    - ".softDelete("
    - ".restore("

    # Aggregate / count
    - ".count("
    - ".countBy("
    - ".exists("
    - ".existsBy("

    # Atomic operations
    - ".increment("
    - ".decrement("

    # Raw SQL
    - ".query("
    - ".clear("

    # DataSource lifecycle
    - ".initialize("
    - ".destroy("

    # Transaction
    - ".transaction("

functions:
  - name: find
    import_path: "typeorm"
    description: "Finds entities matching criteria"
    postconditions:
      # Evidence: 49 primary firings across 7 repos in scan-typeorm-2026-04-03.json
      # Top affected: emqx/MQTTX (⭐ 4834), lujakob/nestjs-realworld-example-app (⭐ 3326)
      - id: find-query-error
        condition: "query fails (connection lost, invalid relation, timeout, syntax error)"
        throws: "QueryFailedError or connection error"
        required_handling: "Caller MUST wrap repository.find() in try-catch to handle database errors. Connection failures and invalid queries crash application if unhandled."
        sources:
          - "https://typeorm.io/find-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: save
    import_path: "typeorm"
    description: "Saves entity to database"
    postconditions:
      # Evidence: 86 primary firings across 7 repos in scan-typeorm-2026-04-03.json
      # Top affected: emqx/MQTTX (⭐ 4834), samanhappy/mcphub (⭐ 1921)
      - id: save-constraint-violation
        condition: "save violates constraint (unique, foreign key, validation, type mismatch)"
        throws: "QueryFailedError with constraint violation details"
        required_handling: "Caller MUST wrap save() in try-catch to handle constraint violations and validation errors. Unique violations, foreign key errors, and validation failures crash application if unhandled."
        sources:
          - "https://typeorm.io/repository-api"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: transaction
    import_path: "typeorm"
    description: "Executes operations within a transaction"
    postconditions:
      - id: transaction-error
        condition: "operation within transaction fails (constraint violation, deadlock, connection lost)"
        throws: "Error causing automatic rollback"
        required_handling: "Caller MUST wrap transaction operations in try-catch to handle errors and ensure rollback. Unhandled errors leave database in inconsistent state if transaction partially commits."
        sources:
          - "https://typeorm.io/transactions"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Repository.findOne - Find a single entity (returns null if not found)
  - name: findOne
    import_path: "typeorm"
    description: >
      Finds first entity matching the given find options.
      Returns null if no entity is found — does NOT throw.
      Use findOneOrFail() if you need to guarantee a result.
    postconditions:
      # Evidence: https://raw.githubusercontent.com/typeorm/typeorm/master/src/entity-manager/EntityManager.ts
      # findOne() delegates to manager.findOne() which executes SQL — can throw on DB failure
      - id: findone-query-failed-error
        condition: "Database query fails (connection lost, invalid relations, timeout)"
        throws: "QueryFailedError (extends TypeORMError) with driverError containing underlying DB error"
        required_handling: >
          Caller MUST wrap in try-catch to handle database errors.
          findOne() returns null when not found — no need to handle EntityNotFoundError here.
          Distinguish null result (not found) from thrown error (DB failure) in caller logic.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Repository.findOneBy - Find by WHERE conditions (returns null if not found)
  - name: findOneBy
    import_path: "typeorm"
    description: >
      Finds first entity matching given WHERE conditions.
      Returns null if no entity is found.
      Shorthand for findOne({ where: ... }).
    postconditions:
      # Evidence: https://raw.githubusercontent.com/typeorm/typeorm/master/src/entity-manager/EntityManager.ts
      - id: findoneby-query-failed-error
        condition: "Database query fails (connection lost, invalid column, timeout)"
        throws: "QueryFailedError with driverError containing underlying DB error"
        required_handling: >
          Caller MUST wrap in try-catch.
          A null return means not found (not an error).
          A thrown QueryFailedError means the DB operation failed.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Repository.findOneOrFail - Find single entity, throw if not found
  - name: findOneOrFail
    import_path: "typeorm"
    description: >
      Finds first entity matching find options.
      Unlike findOne(), THROWS EntityNotFoundError if no result is found.
      This is the preferred method when entity existence is mandatory.
    postconditions:
      # Evidence: EntityManager.findOneOrFail() source throws new EntityNotFoundError(entityClass, options)
      # https://raw.githubusercontent.com/typeorm/typeorm/master/src/entity-manager/EntityManager.ts
      - id: findone-or-fail-entity-not-found
        condition: "No entity matches the given find options"
        throws: "EntityNotFoundError (extends TypeORMError) — message includes entity name and criteria"
        required_handling: >
          Caller MUST wrap in try-catch and handle EntityNotFoundError.
          Import EntityNotFoundError from 'typeorm' for type-safe instanceof checks.
          Distinguish from QueryFailedError (DB failure) vs EntityNotFoundError (not found).
          This is the GUARANTEED throw path — do not use findOneOrFail() without a catch block.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/EntityNotFoundError.ts"
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/entity-manager/EntityManager.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: findone-or-fail-query-failed
        condition: "Database query fails (connection lost, timeout, invalid schema)"
        throws: "QueryFailedError with driverError containing the underlying DB error"
        required_handling: >
          Caller MUST also handle QueryFailedError separately from EntityNotFoundError.
          Two distinct failure modes: entity not found vs DB failure.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Repository.findOneByOrFail - Find by WHERE, throw if not found
  - name: findOneByOrFail
    import_path: "typeorm"
    description: >
      Finds first entity matching given WHERE conditions.
      THROWS EntityNotFoundError if no result is found.
      Use when entity existence is required by business logic.
    postconditions:
      # Evidence: EntityManager.findOneByOrFail() throws new EntityNotFoundError(entityClass, where)
      # https://raw.githubusercontent.com/typeorm/typeorm/master/src/entity-manager/EntityManager.ts
      - id: findonebyorfail-entity-not-found
        condition: "No entity matches the WHERE conditions"
        throws: "EntityNotFoundError (extends TypeORMError) — always thrown when no result found"
        required_handling: >
          Caller MUST wrap in try-catch.
          EntityNotFoundError has entityClass and criteria properties for context.
          This is the preferred pattern over findOneBy() + manual null check when entity MUST exist.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/EntityNotFoundError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Repository.insert - Fast raw INSERT (no cascades)
  - name: insert
    import_path: "typeorm"
    description: >
      Inserts an entity or array of entities. Unlike save(), executes a fast raw INSERT
      without cascade operations, relations, or lifecycle hooks.
      Does NOT check if entity exists — will fail on duplicate primary key.
    postconditions:
      # Evidence: https://raw.githubusercontent.com/typeorm/typeorm/master/src/entity-manager/EntityManager.ts
      # insert() executes SQL INSERT directly — QueryFailedError wraps driver error on failure
      - id: insert-duplicate-key-error
        condition: "Unique constraint or primary key violation (duplicate insert)"
        throws: "QueryFailedError with driverError.code = 'ER_DUP_ENTRY' (MySQL), '23505' (PostgreSQL), 'SQLITE_CONSTRAINT' (SQLite)"
        required_handling: >
          Caller MUST wrap in try-catch.
          Check error.driverError.code for database-specific constraint violation codes.
          insert() is intentionally primitive — no upsert logic. Use upsert() for idempotent inserts.
          Unlike save(), insert() will not merge existing entities — always throws on duplicate PK.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      - id: insert-foreign-key-violation
        condition: "Foreign key constraint violation (referenced entity does not exist)"
        throws: "QueryFailedError with driverError containing FK violation details"
        required_handling: >
          Caller MUST validate referenced entity existence before insert.
          Or wrap in try-catch and handle FK error from driverError.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

  # Repository.update - Fast raw UPDATE (no cascades)
  - name: update
    import_path: "typeorm"
    description: >
      Updates entities matching criteria. Unlike save(), executes a fast raw UPDATE
      without cascades, relations, or lifecycle hooks.
      Does NOT check if entities exist — may update 0 rows silently.
    postconditions:
      # Evidence: https://typeorm.io/docs/working-with-entity-manager/repository-api
      # update() returns UpdateResult — affectedRows may be 0 without error
      - id: update-constraint-violation
        condition: "Update violates unique constraint or type mismatch"
        throws: "QueryFailedError with driverError containing constraint violation details"
        required_handling: >
          Caller MUST wrap in try-catch to handle constraint violations.
          Also check UpdateResult.affected to verify rows were actually updated —
          TypeORM does NOT throw if criteria match 0 rows.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      - id: update-silent-no-op
        condition: "Criteria matches 0 rows — update silently affects nothing"
        throws: "Does not throw — UpdateResult.affected === 0"
        required_handling: >
          Caller SHOULD check UpdateResult.affected after update().
          If affected === 0, entity did not exist — decide whether to create or error.
          Typical bug: assume update succeeded without checking affected count.
        sources:
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  # Repository.delete - Fast raw DELETE (no cascades)
  - name: delete
    import_path: "typeorm"
    description: >
      Deletes entities by criteria. Unlike remove(), executes a fast raw DELETE
      without cascades or lifecycle hooks.
      Does NOT check if entities exist — may delete 0 rows silently.
    postconditions:
      # Evidence: https://typeorm.io/docs/working-with-entity-manager/repository-api
      - id: delete-foreign-key-constraint
        condition: "Delete violates foreign key constraint (other records reference this entity)"
        throws: "QueryFailedError with driverError containing FK constraint details"
        required_handling: >
          Caller MUST wrap in try-catch to handle FK constraint violations.
          Check driverError.code for database-specific FK codes (MySQL: ER_ROW_IS_REFERENCED_2, Postgres: 23503).
          Consider using cascade:true in entity relations or deleting dependent records first.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: delete-silent-no-op
        condition: "Criteria matches 0 rows — delete silently affects nothing"
        throws: "Does not throw — DeleteResult.affected === 0"
        required_handling: >
          Caller SHOULD check DeleteResult.affected after delete().
          If business logic requires entity to exist, use findOneOrFail() first.
        sources:
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  # Repository.upsert - Insert or Update on conflict
  - name: upsert
    import_path: "typeorm"
    description: >
      Inserts entity if not exists, updates if conflict on specified columns.
      Executes INSERT ... ON CONFLICT DO UPDATE (Postgres) or INSERT ... ON DUPLICATE KEY UPDATE (MySQL).
      More efficient than manual find-then-save patterns.
    postconditions:
      # Evidence: https://typeorm.io/docs/working-with-entity-manager/repository-api
      # upsert() internally runs INSERT ... ON CONFLICT — can fail on FK violation or type errors
      - id: upsert-constraint-violation
        condition: "Foreign key violation or non-conflict unique constraint violated by upsert"
        throws: "QueryFailedError with driverError containing constraint violation details"
        required_handling: >
          Caller MUST wrap in try-catch.
          Conflict resolution only handles the specified conflictPaths — other constraints still throw.
          Check driverError.code for database-specific constraint codes.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

  # Repository.query - Raw SQL execution
  - name: query
    import_path: "typeorm"
    description: >
      Executes a raw SQL query against the database.
      Returns raw database results without entity mapping.
      Supports parameterized queries to prevent SQL injection.
    postconditions:
      # Evidence: https://typeorm.io/docs/working-with-entity-manager/repository-api
      # raw query — can throw on syntax error, connection failure, or auth issue
      - id: query-sql-syntax-error
        condition: "SQL query has syntax error or references non-existent table/column"
        throws: "QueryFailedError with driverError containing the SQL error details and the original query"
        required_handling: >
          Caller MUST wrap in try-catch.
          QueryFailedError.query contains the SQL that failed — useful for debugging.
          QueryFailedError.driverError contains database-specific error code and message.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: query-sql-injection-risk
        condition: "User input interpolated directly into SQL string (not using parameterized query)"
        throws: "Does not throw — silently allows SQL injection"
        required_handling: >
          ALWAYS use parameterized queries: repository.query('SELECT * FROM users WHERE id = $1', [userId])
          NEVER concatenate user input into SQL: repository.query(`SELECT * FROM users WHERE id = ${userId}`)
          SQL injection can exfiltrate entire database or destroy all data.
        sources:
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high

  # Repository.softDelete - Record deletion date without removing row
  - name: softDelete
    import_path: "typeorm"
    description: >
      Records the delete date on entity (soft delete) instead of removing the row.
      Entity MUST have a @DeleteDateColumn() annotation — throws if missing.
      Entities with deletedAt set are excluded from future find() queries automatically.
    postconditions:
      # Evidence: MissingDeleteDateColumnError is thrown by TypeORM when entity lacks @DeleteDateColumn
      # https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/MissingDeleteDateColumnError.ts
      - id: softdelete-missing-delete-date-column
        condition: "Entity does not have a @DeleteDateColumn() decorated field"
        throws: "MissingDeleteDateColumnError (extends TypeORMError) — entity name included in message"
        required_handling: >
          Ensure entity class has @DeleteDateColumn() column before calling softDelete().
          Add column: @DeleteDateColumn() deletedAt: Date
          This error occurs at runtime — schema mismatch between entity definition and usage.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/MissingDeleteDateColumnError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: softdelete-silent-no-op
        condition: "Criteria matches 0 rows — softDelete silently affects nothing"
        throws: "Does not throw — UpdateResult.affected === 0"
        required_handling: >
          Check UpdateResult.affected to verify rows were actually soft-deleted.
        sources:
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  # Repository.restore - Restore soft-deleted entities
  - name: restore
    import_path: "typeorm"
    description: >
      Restores soft-deleted entities by clearing the @DeleteDateColumn value.
      Entity MUST have @DeleteDateColumn() — throws if missing.
    postconditions:
      # Evidence: Same MissingDeleteDateColumnError as softDelete
      - id: restore-missing-delete-date-column
        condition: "Entity does not have @DeleteDateColumn() decorated field"
        throws: "MissingDeleteDateColumnError (extends TypeORMError)"
        required_handling: >
          Ensure entity has @DeleteDateColumn() before calling restore().
          Same configuration requirement as softDelete().
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/MissingDeleteDateColumnError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  # Repository.remove - Remove entity (with cascade support)
  - name: remove
    import_path: "typeorm"
    description: >
      Removes given entity or array of entities from the database.
      Unlike delete(), supports cascade operations and lifecycle hooks.
      Entity must be tracked by TypeORM (have been loaded from DB or explicitly created).
    postconditions:
      # Evidence: remove() triggers cascades — can fail on FK violations in child entities
      - id: remove-foreign-key-constraint
        condition: "FK constraint violation on entity or cascaded entities"
        throws: "QueryFailedError with driverError containing FK constraint details"
        required_handling: >
          Caller MUST wrap in try-catch.
          Unlike delete(), remove() processes relations — cascade errors surface here.
          Ensure all dependent records are handled (deleted or reassigned) before removing.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

  # Repository.count - Count matching entities
  - name: count
    import_path: "typeorm"
    description: >
      Counts entities that match given find options.
      Commonly used for pagination. Executes SELECT COUNT() SQL.
    postconditions:
      # Evidence: count() executes SQL — can fail on connection/query error
      - id: count-query-failed-error
        condition: "Database query fails (connection lost, invalid relations, timeout)"
        throws: "QueryFailedError with driverError containing the database error"
        required_handling: >
          Caller MUST wrap in try-catch.
          Pagination logic that depends on count() can expose incorrect totals if errors are swallowed.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  # Repository.findBy - Find entities by WHERE conditions (shorthand)
  - name: findBy
    import_path: "typeorm"
    description: >
      Finds entities that match given WHERE conditions.
      Shorthand for find({ where: ... }). Returns empty array if none found.
    postconditions:
      # Evidence: findBy() delegates to find() — same error profile
      - id: findby-query-failed-error
        condition: "Database query fails (connection lost, invalid column, timeout)"
        throws: "QueryFailedError with driverError"
        required_handling: "Caller MUST wrap in try-catch. Empty array is a valid result — not an error."
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Repository.findAndCount - Find with total count for pagination
  - name: findAndCount
    import_path: "typeorm"
    description: >
      Finds entities and counts total matches (ignoring pagination offset/limit).
      Returns [entities, totalCount] tuple. Core pattern for server-side pagination.
    postconditions:
      # Evidence: findAndCount() executes two SQL queries — can fail on either
      - id: findandcount-query-failed-error
        condition: "Either the find or count query fails (connection lost, timeout)"
        throws: "QueryFailedError with driverError"
        required_handling: >
          Caller MUST wrap in try-catch.
          A failed findAndCount() leaves pagination state undefined — do not cache partial results.
          Common pagination pattern: never silently fall back to page 1 on error.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Repository.increment - Atomic increment a numeric column
  - name: increment
    import_path: "typeorm"
    description: >
      Atomically increments a numeric column by the given value for entities matching conditions.
      Executes UPDATE SET column = column + value — safe for concurrent access.
    postconditions:
      # Evidence: increment() executes UPDATE SQL — QueryFailedError on column type mismatch or connection error
      - id: increment-type-mismatch
        condition: "Column is not numeric or propertyPath does not exist on entity"
        throws: "QueryFailedError or TypeORMError with type mismatch details"
        required_handling: >
          Caller MUST wrap in try-catch.
          Ensure propertyPath is a numeric @Column — calling increment() on a string column throws at runtime.
          Also check UpdateResult.affected — silent no-op if criteria matches 0 rows.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
          - "https://typeorm.io/docs/working-with-entity-manager/repository-api"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low

  # Repository.decrement - Atomic decrement a numeric column
  - name: decrement
    import_path: "typeorm"
    description: >
      Atomically decrements a numeric column by the given value.
      Same error profile as increment(). Can result in negative values if no check constraint.
    postconditions:
      # Evidence: decrement() executes UPDATE SQL — same errors as increment()
      - id: decrement-type-mismatch
        condition: "Column is not numeric, propertyPath does not exist, or check constraint violated"
        throws: "QueryFailedError or TypeORMError"
        required_handling: >
          Caller MUST wrap in try-catch.
          Database-level check constraints (e.g., balance >= 0) will throw QueryFailedError on violation.
          Application-level guard: ensure value is > 0 before decrementing counters/balances.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/QueryFailedError.ts"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low

  # DataSource.initialize - Connect to database at startup
  - name: initialize
    import_path: "typeorm"
    description: >
      Initializes the DataSource and opens a connection pool to the database.
      Must be called once at application startup before any database operations.
      Throws CannotConnectAlreadyConnectedError if called when already initialized.
    postconditions:
      # Evidence: DataSource.ts throws CannotConnectAlreadyConnectedError when isInitialized is true
      # https://raw.githubusercontent.com/typeorm/typeorm/master/src/data-source/DataSource.ts
      - id: initialize-already-connected
        condition: "DataSource.initialize() called when DataSource is already initialized (isInitialized === true)"
        throws: "CannotConnectAlreadyConnectedError (extends TypeORMError)"
        required_handling: >
          Check dataSource.isInitialized before calling initialize().
          Or guard with: if (!dataSource.isInitialized) await dataSource.initialize()
          Common bug: initializing inside request handlers (called on every request).
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/data-source/DataSource.ts"
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/CannotConnectAlreadyConnectedError.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: initialize-connection-failure
        condition: "Cannot connect to database (wrong credentials, host unreachable, invalid connection string)"
        throws: "Error from underlying database driver (propagated through DataSource, destroys partial state)"
        required_handling: >
          Caller MUST wrap in try-catch and handle startup failure gracefully.
          A failed initialize() should stop application startup — log error and exit.
          Re-throwing is acceptable at startup boundary; silently swallowing means no DB access but no visible error.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/data-source/DataSource.ts"
          - "https://typeorm.io/docs/data-source/data-source-api"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  # DataSource.destroy - Close database connections
  - name: destroy
    import_path: "typeorm"
    description: >
      Destroys the DataSource and closes all database connections in the pool.
      Must be called on application shutdown to avoid connection leaks.
      Throws CannotExecuteNotConnectedError if called when not initialized.
    postconditions:
      # Evidence: DataSource.destroy() throws CannotExecuteNotConnectedError when not initialized
      # https://raw.githubusercontent.com/typeorm/typeorm/master/src/data-source/DataSource.ts
      - id: destroy-not-initialized
        condition: "DataSource.destroy() called when DataSource is not initialized"
        throws: "CannotExecuteNotConnectedError (extends TypeORMError)"
        required_handling: >
          Check dataSource.isInitialized before calling destroy().
          Pattern: if (dataSource.isInitialized) await dataSource.destroy()
          Common in test teardown or graceful shutdown handlers.
        sources:
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/data-source/DataSource.ts"
          - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/CannotExecuteNotConnectedError.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

edge_cases:
  - id: datasource-initialization
    description: "DataSource.initialize() must be called before any database operations and can fail - must wrap in try-catch. DataSource.destroy() must be called on shutdown to close connections."
    sources:
      - "https://typeorm.io/data-source"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: optimistic-locking-version-mismatch
    description: >
      When using @VersionColumn() for optimistic locking, save() can throw
      OptimisticLockVersionMismatchError if the entity version in DB was changed
      since it was loaded (concurrent modification). Must wrap save() in try-catch
      and handle this error when using optimistic concurrency control.
    sources:
      - "https://raw.githubusercontent.com/typeorm/typeorm/master/src/error/OptimisticLockVersionMismatchError.ts"
      - "https://typeorm.io/optimistic-and-pessimistic-locking"
    severity: warning
    business_impact:
      incident_label: DATA_LOSS
      production_behavior: immediate_exception
      visibility: visible
      user_experience: lost_data
      incident_cost_range: medium

