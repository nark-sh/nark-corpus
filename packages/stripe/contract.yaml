  - name: markUncollectible
    import_path: "stripe"
    description: >
      Marks a finalized invoice as uncollectible — a bad debt accounting designation
      indicating the invoice is unlikely to be collected. The invoice transitions from
      'open' to 'uncollectible'. This is a bookkeeping operation that affects revenue
      recognition reporting. The invoice can later be voided or marked as paid out-of-band.

    postconditions:
      # Evidence: https://docs.stripe.com/api/invoices/mark_uncollectible
      # https://docs.stripe.com/billing/invoices/workflow — state machine: only open → uncollectible
      # Error code: status_transition_invalid from stripe/cjs/resources/Invoices.d.ts Code union
      - id: mark-uncollectible-invalid-state
        maturity: stable
        condition: >
          Invoice is not in 'open' status. Only open invoices can be marked uncollectible.
          Draft, paid, voided, or already-uncollectible invoices throw this error.
          Common mistake: calling markUncollectible on an invoice that was auto-paid
          by Stripe before the mark operation ran.
        throws: "StripeInvalidRequestError with code 'status_transition_invalid'"
        required_handling: >
          Caller MUST check invoice.status === 'open' before calling markUncollectible.
          If status is 'paid', no further action needed. If status is 'void', skip.
          If status is 'uncollectible', treat as no-op. Re-fetch the invoice if the
          status may have changed since the last read (race condition in webhook handlers).
        sources:
          - "https://docs.stripe.com/api/invoices/mark_uncollectible"
          - "https://docs.stripe.com/billing/invoices/workflow"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: resume
    import_path: "stripe"
    description: >
      Resumes a paused subscription. The subscription must be in 'paused' status
      (set via pause_collection on the subscription). When resumed, Stripe generates
      a prorated invoice for the period since pausing if billing_cycle_anchor='now'.
      If resumption generates an invoice, the subscription stays 'paused' until that
      invoice is paid — it does not immediately become 'active'.

    postconditions:
      # Evidence: https://docs.stripe.com/api/subscriptions/resume
      # https://docs.stripe.com/billing/subscriptions/pause-payment
      # Error codes from stripe/cjs/resources/Subscriptions.d.ts Code union:
      # status_transition_invalid, customer_max_subscriptions
      - id: resume-invalid-state
        maturity: stable
        condition: >
          Subscription is not in 'paused' status. Active, canceled, trialing, or
          past_due subscriptions cannot be resumed. Common mistake: calling resume()
          on a subscription that was never paused via pause_collection, or on a
          subscription that was already resumed by a concurrent request.
        throws: "StripeInvalidRequestError with code 'status_transition_invalid'"
        required_handling: >
          Caller MUST check subscription.status === 'paused' before calling resume().
          If subscription is already 'active', treat as success. If 'canceled', inform
          the customer they must re-subscribe. Use idempotency keys to prevent
          double-resume in concurrent webhook handlers.
        sources:
          - "https://docs.stripe.com/api/subscriptions/resume"
          - "https://docs.stripe.com/billing/subscriptions/pause-payment"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: resume-payment-required
        maturity: stable
        condition: >
          Resuming the subscription generates an invoice (due to billing_cycle_anchor='now'
          or outstanding balance) that fails payment. The subscription does NOT become
          'active' — it stays 'paused' until the generated invoice is paid. Callers
          that don't check subscription.status after resume() assume the subscription
          is active when it's not.
        returns: >
          Subscription with status='paused' (not 'active') when the generated invoice
          has not yet been paid. The subscription only becomes 'active' once the invoice
          is collected.
        required_handling: >
          After calling resume(), re-fetch the subscription and check subscription.status.
          If still 'paused', redirect the customer to pay the outstanding invoice via
          invoice.hosted_invoice_url. Do NOT assume resume() immediately makes the
          subscription active.
        sources:
          - "https://docs.stripe.com/billing/subscriptions/pause-payment"
          - "https://docs.stripe.com/api/subscriptions/resume"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high

  - name: incrementAuthorization
    import_path: "stripe"
    description: >
      Increases the authorized amount on a PaymentIntent that has not yet been captured.
      Used in hotel holds, marketplace flows, or any scenario where the final charge
      amount is higher than the original authorization. The PaymentIntent must be in
      'requires_capture' status and the card must support incremental authorizations
      (incremental_authorization_supported must be true). Maximum 10 increment attempts
      including declines.

    postconditions:
      # Evidence: https://docs.stripe.com/api/payment_intents/increment_authorization
      # Error code: card_declined (on issuer rejection), intent_invalid_state (wrong status)
      # Confirmed from stripe/cjs/resources/PaymentIntents.d.ts Code union
      - id: increment-authorization-card-declined
        maturity: stable
        condition: >
          The card issuer declined the incremental authorization request. This does NOT
          invalidate the original authorization — the PaymentIntent remains capturable
          for the previously authorized amount. The amount is not increased. Common
          reasons: issuer policy, insufficient available credit for the delta amount.
        throws: "StripeCardError with code 'card_declined'"
        required_handling: >
          Caller MUST catch card_declined and NOT cancel the PaymentIntent. The original
          authorization remains valid and the PaymentIntent can still be captured for
          the pre-increment amount. Inform the customer that the additional amount could
          not be authorized and adjust the final charge accordingly.
        sources:
          - "https://docs.stripe.com/api/payment_intents/increment_authorization"
          - "https://docs.stripe.com/payments/incremental-authorization"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: increment-authorization-invalid-state
        maturity: stable
        condition: >
          PaymentIntent is not in 'requires_capture' status, or card does not support
          incremental authorizations (incremental_authorization_supported=false), or the
          10-attempt limit has been reached.
        throws: "StripeInvalidRequestError with code 'intent_invalid_state'"
        required_handling: >
          Check payment_intent.status === 'requires_capture' before calling. Check
          payment_intent.incremental_authorization.status === 'available' to verify
          the card supports incremental auth. If not available, capture for the
          original amount and handle the overage separately.
        sources:
          - "https://docs.stripe.com/payments/incremental-authorization"
          - "https://docs.stripe.com/api/payment_intents/increment_authorization"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: verifyMicrodeposits
    import_path: "stripe"
    description: >
      Verifies a bank account PaymentMethod or SetupIntent via microdeposit confirmation.
      After Stripe sends two small deposits to a bank account (ACH/BACS), the customer
      enters the amounts to verify ownership. Available on PaymentIntents and SetupIntents.
      Time-sensitive: microdeposit amounts expire after a set period and the customer
      has a limited number of verification attempts.

    postconditions:
      # Evidence: stripe/cjs/resources/PaymentIntents.d.ts Code union — microdeposit codes:
      # payment_method_microdeposit_failed, payment_method_microdeposit_verification_amounts_invalid,
      # payment_method_microdeposit_verification_amounts_mismatch,
      # payment_method_microdeposit_verification_attempts_exceeded,
      # payment_method_microdeposit_verification_descriptor_code_mismatch,
      # payment_method_microdeposit_verification_timeout
      - id: verify-microdeposits-amounts-mismatch
        maturity: stable
        condition: >
          The customer entered microdeposit amounts that do not match what Stripe deposited.
          Commonly caused by the customer reading the wrong deposits, entering amounts in
          the wrong currency denomination (cents vs. dollars), or transposing the two amounts.
        throws: "StripeInvalidRequestError with code 'payment_method_microdeposit_verification_amounts_mismatch'"
        required_handling: >
          Caller MUST display the error to the customer and allow them to retry. The
          customer has a limited number of attempts — track attempt count and warn
          the customer before the final attempt. Do NOT retry programmatically; this
          requires human input. Allow the customer to re-enter the deposit amounts.
        sources:
          - "https://docs.stripe.com/payments/ach-debit/accept-a-payment#web-confirm-payment-intent"
          - "https://docs.stripe.com/error-codes"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: verify-microdeposits-attempts-exceeded
        maturity: stable
        condition: >
          The customer has exhausted all verification attempts. Stripe allows a limited
          number of incorrect amount submissions. After this limit, the payment method
          is permanently unverifiable and cannot be used.
        throws: "StripeInvalidRequestError with code 'payment_method_microdeposit_verification_attempts_exceeded'"
        required_handling: >
          Caller MUST NOT allow further retry — the bank account is permanently locked
          for this payment flow. Instruct the customer to add a new bank account and
          start the verification process fresh. Remove the failed payment method from
          the customer's account to prevent future confusion.
        sources:
          - "https://docs.stripe.com/error-codes"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: verify-microdeposits-timeout
        maturity: stable
        condition: >
          The microdeposit verification window has expired. Microdeposits expire after
          a set number of days if not verified. The PaymentIntent or SetupIntent's
          associated bank account becomes unverifiable.
        throws: "StripeInvalidRequestError with code 'payment_method_microdeposit_verification_timeout'"
        required_handling: >
          Caller MUST detect timeout errors and prompt the customer to restart the
          bank account verification flow with a fresh payment method. The expired
          microdeposits cannot be re-sent — a new payment method must be created.
          Send proactive reminders to customers before the verification window closes.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/payments/ach-debit"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

  - name: update
    import_path: "stripe"
    description: >
      Updates a mutable field on a Stripe resource (Customer, PaymentIntent, Subscription,
      Invoice, Charge, etc.). Unlike create, update is constrained by resource state — many
      resources can only be updated while in certain statuses (e.g. an Invoice can only be
      updated while 'draft'; a PaymentIntent's amount can only change before confirm).
      Update is also the most common surface for restricted-API-key permission failures and
      idempotency-key collisions, because update calls are frequently retried by background
      workers that re-use the same idempotency key with mutating payloads.

    postconditions:
      # Evidence: https://docs.stripe.com/error-handling (fetched 2026-06-24)
      # Error class confirmed from node_modules/stripe/types/Errors.d.ts:
      # `class StripePermissionError extends StripeError { readonly type: 'StripePermissionError'; }`
      # And node_modules/stripe/cjs/RequestSender.js: `err = new StripePermissionError(jsonResponse.error)`
      # NOT currently covered by any other postcondition in this contract — first appearance.
      - id: update-permission-error
        maturity: stable
        condition: >
          The API key used for the update request lacks the required permission to mutate
          the target resource. Common with restricted API keys (rak_*) that have read-only
          access to a resource type, with Stripe Connect platform keys attempting to update
          a connected-account-owned object without the correct Stripe-Account header, or
          with team-member API keys whose role does not include update permission for the
          resource type.
        throws: "StripePermissionError with error.type === 'StripePermissionError'"
        required_handling: >
          Caller MUST catch StripePermissionError separately from StripeInvalidRequestError.
          DO NOT retry — permission errors will not resolve on retry. Log the error with
          the restricted key prefix (rak_*) and alert the operations team to widen the
          key's scope or rotate to an unrestricted key. For Connect calls, verify the
          Stripe-Account header is set on the request options.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripePermissionError"
        sources:
          - "https://docs.stripe.com/error-handling"
          - "https://docs.stripe.com/keys#limit-access"
          - "https://docs.stripe.com/connect/authentication"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: https://docs.stripe.com/error-handling (fetched 2026-06-24) — quote:
      # "You used an idempotency key for something unexpected, like replaying a request
      #  but passing different parameters."
      # Error class confirmed from node_modules/stripe/types/Errors.d.ts:
      # `class StripeIdempotencyError extends StripeError { readonly rawType: 'idempotency_error'; }`
      # And node_modules/stripe/cjs/Error.js: `return new StripeIdempotencyError(rawStripeError);`
      # NOT currently covered by any other postcondition in this contract — first appearance.
      - id: update-idempotency-error
        maturity: stable
        condition: >
          The request re-used an Idempotency-Key header value with a different request body
          than the original. Stripe stores the first response for an idempotency key for 24
          hours and rejects subsequent requests that change parameters. Common in retry
          loops where the worker bumps an updated_at timestamp or recalculates an amount
          before retrying, breaking idempotency.
        throws: "StripeIdempotencyError with error.type === 'StripeIdempotencyError'"
        required_handling: >
          Caller MUST either generate a fresh idempotency key for retries that mutate the
          payload, OR ensure the retry sends the exact same body as the original request.
          DO NOT swallow idempotency errors — a swallowed error means the update either
          succeeded with the original payload (caller now has stale state) or never
          executed (caller now has unwritten state). Both branches require manual
          reconciliation.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeIdempotencyError"
        sources:
          - "https://docs.stripe.com/error-handling"
          - "https://docs.stripe.com/api/idempotent_requests"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      # Evidence: stripe/cjs/resources/Invoices.d.ts, Subscriptions.d.ts, PaymentIntents.d.ts
      # all declare update() methods that throw StripeInvalidRequestError for resources
      # in non-updatable status (e.g. Invoice not in 'draft', Subscription in 'canceled',
      # PaymentIntent past 'requires_confirmation').
      # Distinct from create's validation errors — create cannot fail this way (no prior state).
      - id: update-invalid-state-transition
        maturity: stable
        condition: >
          The target resource is in a status that does not permit the requested update.
          For Invoices: only 'draft' invoices are fully editable. For Subscriptions: 'canceled'
          and 'incomplete_expired' subscriptions cannot be updated. For PaymentIntents: most
          fields are immutable after confirm. For Charges: refunded charges cannot have
          metadata mutated in some configurations.
        throws: "StripeInvalidRequestError with error.code in {'resource_already_exists', 'invoice_not_editable', 'subscription_canceled', 'payment_intent_unexpected_state'}"
        required_handling: >
          Caller SHOULD read the resource's current status before calling update and skip
          the update if the resource is already in a terminal state. For idempotent retry
          handlers, treat invalid-state-transition as a no-op (the previous attempt already
          advanced the state) and log for review. Do NOT retry — the underlying state will
          not change without an explicit operation.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/billing/invoices/workflow"
          - "https://docs.stripe.com/api/payment_intents/update"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: stripe/cjs/resources/*.d.ts — Code union on update endpoints includes
      # 'parameter_invalid_empty', 'parameter_invalid_string_blank', 'parameter_unknown',
      # 'metadata_invalid_keys', 'currency_unsupported_for_account' across most resources.
      # Distinct from create's invalid-params because update allows null-to-clear semantics
      # that have their own validation surface.
      - id: update-invalid-parameter
        maturity: stable
        condition: >
          Update payload contains an invalid parameter — unknown field name, empty string
          where a value is required, metadata key exceeding 40 chars, or a value that
          conflicts with the existing resource (e.g. changing currency on a Customer that
          has active subscriptions in a different currency).
        throws: "StripeInvalidRequestError with error.type === 'invalid_request_error'"
        required_handling: >
          Caller MUST validate the update payload before sending. Catch
          StripeInvalidRequestError and surface error.param to the user so they know which
          field caused the failure. Do NOT retry without fixing the payload — invalid
          parameters will fail identically on retry.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/api/errors"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
