      - id: send-invoice-invalid-email
        maturity: stable
        condition: >
          Customer email address is invalid or missing. The invoice cannot be emailed
          if the customer object has no email address or has an improperly formatted
          email (e.g., email stored as a display name rather than an email address).
        throws: "StripeInvalidRequestError with code 'email_invalid'"
        required_handling: >
          Caller MUST validate that customer.email is set and properly formatted before
          calling sendInvoice. Update the customer's email via stripe.customers.update()
