last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
# Depth pass 2026-04-18 (deepen-stream-2 pass 8):
# API surface: 23 async-callable functions (expanded from 13 in prior pass)
# 10 new functions discovered in stripe v22: constructEventAsync, finalizeInvoice, pay,
#   sendInvoice, voidInvoice, markUncollectible, resume, incrementAuthorization,
#   verifyMicrodeposits, reverse (payout)
# Contracted before: 9 (create, confirm, constructEvent, retrieve, capture, cancel, refund, attach, detach)
# Contracted after pass 8: 18 (+9: constructEventAsync, finalizeInvoice, pay, sendInvoice,
#   voidInvoice, markUncollectible, resume, incrementAuthorization, verifyMicrodeposits)
# Depth pass 2026-06-24 (deepen-stream-2 pass 78):
# Added 'update' function with 4 postconditions covering previously-uncovered error classes:
#   StripePermissionError (restricted-key / Connect / role-scoped failures — first time covered)
#   StripeIdempotencyError (idempotency-key collision with different payload — first time covered)
#   plus state-transition errors and update-specific invalid-parameter errors.
# Both StripePermissionError and StripeIdempotencyError were genuine gaps confirmed
# from node_modules/stripe@20.4.1/types/Errors.d.ts and cjs/Error.js: those classes are
# declared and instantiated but no postcondition in the corpus referenced them before
# this pass. https://docs.stripe.com/error-handling (fetched 2026-06-24) lists both
# explicitly.
# Contracted after pass 78: 19 (+1 this pass: update)
# Intentionally omitted (4): list, search, expire, reverse(payout) — all read-only or
#   narrow state-transition operations whose error surface is fully covered by the
#   existing cancel/create/confirm postconditions when they fail.
# Evidence: stripe v20.4.1 TypeScript declarations, https://docs.stripe.com/error-codes,
#   https://docs.stripe.com/billing/invoices/workflow, https://docs.stripe.com/api/invoices/,
#   https://docs.stripe.com/error-handling, https://docs.stripe.com/api/idempotent_requests
# Error codes confirmed from stripe/cjs/resources/*.d.ts Code union types and
#   stripe/cjs/Error.js StripePermissionError / StripeIdempotencyError class declarations.
# coverage_score: 19/23 = 0.826 raw; effective = 19/19 non-omitted = 1.0
coverage_score: 0.826

functions:
  - name: create
    import_path: "stripe"
    description: "Creates a Stripe resource (charge, paymentIntent, customer, refund, etc.)"

    postconditions:
      # Evidence: seen in 50 primary firings across 36 repos in scan-stripe-2026-04-01.json
      # Top affected: nextjs/saas-starter (15534★), ghostfolio/ghostfolio (7985★), sadmann7/skateshop (5493★)
      - id: card-error
        maturity: stable
        condition: "Card was declined or invalid"
        throws: "StripeCardError with error.type === 'card_error'"
        required_handling: >
          Caller MUST catch StripeCardError and handle gracefully.
          Display user-friendly message based on error.decline_code.
          DO NOT retry card_error without user intervention.
        sources:
          - "https://stripe.com/docs/error-handling"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

      # Evidence: seen in 76 primary firings + 115 sub-violation hits across 36 repos in scan-stripe-2026-04-01.json
      # Top affected: shadcn-ui/taxonomy (19179★), nextjs/saas-starter (15534★), Snouzy/workout-cool (7137★)
      - id: rate-limit-error
        maturity: stable
        condition: "Too many API requests"
        throws: "StripeRateLimitError with error.type === 'rate_limit_error'"
        required_handling: >
          Caller SHOULD implement exponential backoff retry logic OR explicitly catch
          Stripe.errors.StripeRateLimitError with instanceof to handle gracefully.
          An explicit instanceof Stripe.errors.StripeRateLimitError check satisfies this postcondition.
          Stripe rate limits are per-account, not per-key.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeRateLimitError"
        sources:
          - "https://stripe.com/docs/rate-limits"
        severity: warning
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium

      # Evidence: seen in 115 sub-violation hits across 36 repos in scan-stripe-2026-04-01.json
      # Top affected: nextjs/saas-starter (15534★), vercel/nextjs-subscription-payments (7713★), antiwork/shortest (5546★)
      - id: authentication-error
        maturity: stable
        condition: "Invalid API key"
        throws: "StripeAuthenticationError with error.type === 'authentication_error'"
        required_handling: >
          Caller MUST NOT retry. This indicates configuration error.
          Log error and alert operations team immediately.
        sources:
          - "https://stripe.com/docs/error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: critical

      # Evidence: seen in 115 sub-violation hits across 36 repos in scan-stripe-2026-04-01.json
      # Top affected: nextjs/saas-starter (15534★), vercel/nextjs-subscription-payments (7713★), antiwork/shortest (5546★)
      - id: network-error
        maturity: stable
        condition: "Network connectivity issue"
        throws: "Error with no error.type (connection error)"
        required_handling: >
          Caller MUST handle network errors separately from Stripe API errors.
          Implement retry with exponential backoff (max 3 attempts).
        sources:
          - "https://stripe.com/docs/error-handling"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium

