  - name: capture
    import_path: "stripe"
    description: >
      Captures an authorized PaymentIntent or Charge. Used in two-step payment flows
      where authorization and capture are separated (e.g., hotel holds, marketplace payouts).
      Must be called within 7 days of authorization or the authorization expires.

    postconditions:
      # Evidence: https://docs.stripe.com/error-codes (capture_charge_authorization_expired, charge_already_captured, charge_expired_for_capture)
      # Error class names confirmed from stripe node_modules/stripe/types/Errors.d.ts
      - id: capture-authorization-expired
        maturity: stable
        condition: "Authorization has expired (not captured within 7 days by default)"
        throws: "StripeInvalidRequestError with code 'charge_expired_for_capture' or 'capture_charge_authorization_expired'"
        required_handling: >
          Caller MUST handle authorization expiry and inform the user that payment
          authorization has expired. A new PaymentIntent must be created. DO NOT retry
          the capture — create a fresh payment flow instead.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/api/payment_intents/capture"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

      - id: capture-already-captured
        maturity: stable
        condition: "PaymentIntent or Charge has already been captured"
        throws: "StripeInvalidRequestError with code 'charge_already_captured'"
        required_handling: >
          Caller MUST check for already-captured errors when using idempotency keys
          or retry logic. Retrying a capture without an idempotency key can result in
          double-capture attempts. Catch and treat as success if payment already captured.
        sources:
          - "https://docs.stripe.com/error-codes"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: capture-invalid-state
        maturity: stable
        condition: "PaymentIntent is not in a capturable state (e.g., already canceled, requires_action)"
        throws: "StripeInvalidRequestError with type 'invalid_request_error'"
        required_handling: >
          Caller MUST handle invalid state errors. Check PaymentIntent status before
          attempting capture. Only PaymentIntents in 'requires_capture' status can be captured.
        sources:
          - "https://docs.stripe.com/api/payment_intents/capture"
          - "https://docs.stripe.com/error-handling"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: capture-rate-limit
        maturity: stable
        condition: "Rate limit exceeded"
        throws: "StripeRateLimitError"
        required_handling: >
          Implement exponential backoff. Use idempotency keys to safely retry captures
          without risk of double-charging.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeRateLimitError"
        sources:
          - "https://docs.stripe.com/rate-limits"
          - "https://docs.stripe.com/error-handling"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: cancel
    import_path: "stripe"
    description: >
      Cancels a subscription or PaymentIntent. For subscriptions, immediately cancels
      billing and sets status to 'canceled'. This is irreversible — a canceled subscription
      cannot be reactivated and the customer must subscribe again.

    postconditions:
      # Evidence: https://docs.stripe.com/error-codes (customer_max_subscriptions, resource_missing)
      # Error class names confirmed from stripe node_modules/stripe/types/Errors.d.ts
      - id: cancel-resource-not-found
        maturity: stable
        condition: "Subscription or PaymentIntent ID does not exist"
        throws: "StripeInvalidRequestError with code 'resource_missing'"
        required_handling: >
          Caller MUST handle missing resource errors. The resource may have been
          deleted already or the ID may be incorrect. Log the error and treat as
          already-canceled where appropriate.
        sources:
          - "https://docs.stripe.com/api/subscriptions/cancel"
          - "https://docs.stripe.com/error-codes"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: cancel-already-canceled
        maturity: stable
        condition: "Subscription is already canceled"
        throws: "StripeInvalidRequestError — subscription is already canceled"
        required_handling: >
          Caller SHOULD handle idempotently. If the subscription is already canceled,
          this is a no-op from a business perspective. Catch and treat as success.
          Avoid surfacing this error to end users.
        sources:
          - "https://docs.stripe.com/api/subscriptions/cancel"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: cancel-authentication-error
        maturity: stable
        condition: "Invalid or revoked API key"
        throws: "StripeAuthenticationError"
        required_handling: >
          DO NOT retry. Log immediately and alert operations — the subscription
          cancellation did not complete. The customer will continue to be billed
          until this is resolved.
        sources:
          - "https://docs.stripe.com/error-handling"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: critical

  - name: refund
    import_path: "stripe"
    description: >
      Creates a refund for a Charge or PaymentIntent. Refunds are irreversible — once
      issued, they cannot be canceled. Partial refunds are supported. Refunds can take
      5-10 business days to appear on a customer's statement.

    postconditions:
      # Evidence: https://docs.stripe.com/error-codes (charge_already_refunded, charge_disputed, refund_disputed_payment)
      # Error class names confirmed from stripe node_modules/stripe/types/Errors.d.ts
      - id: refund-already-refunded
        maturity: stable
        condition: "Charge or PaymentIntent has already been fully refunded"
        throws: "StripeInvalidRequestError with code 'charge_already_refunded'"
        required_handling: >
          Caller MUST check for already-refunded errors. This commonly occurs when
          webhook retry logic or duplicate requests cause a second refund attempt.
          Catch and treat as success if already refunded; do NOT surface to customer
          as an error.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/api/refunds/create"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: refund-disputed-charge
        maturity: stable
        condition: "Charge has been disputed (charged back by the customer's bank)"
        throws: "StripeInvalidRequestError with code 'charge_disputed' or 'refund_disputed_payment'"
        required_handling: >
          Caller MUST handle disputed charges separately from standard refunds.
          Refunding a disputed charge does not automatically close the dispute.
          Respond to the dispute via the Stripe dashboard instead of issuing
          a programmatic refund.
        sources:
          - "https://docs.stripe.com/error-codes"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: refund-invalid-amount
        maturity: stable
        condition: "Refund amount exceeds the remaining unrefunded amount"
        throws: "StripeInvalidRequestError with type 'invalid_request_error'"
        required_handling: >
          Caller MUST validate refund amount against original charge amount and any
          prior partial refunds before issuing. Partial refunds: track the sum of all
          refunds to prevent over-refunding.
        sources:
          - "https://docs.stripe.com/api/refunds/create"
          - "https://docs.stripe.com/error-handling"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: refund-rate-limit
        maturity: stable
        condition: "Rate limit exceeded"
        throws: "StripeRateLimitError"
        required_handling: >
          Implement exponential backoff. Use idempotency keys to safely retry refunds
          without risk of double-refunding.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeRateLimitError"
        sources:
          - "https://docs.stripe.com/rate-limits"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: attach
    import_path: "stripe"
    description: >
      Attaches a PaymentMethod to a Customer, enabling it to be used for future charges
      and subscriptions. A PaymentMethod can only be attached to one Customer at a time.

    postconditions:
      # Evidence: https://docs.stripe.com/error-handling (StripeInvalidRequestError for invalid state)
      # Error class names confirmed from stripe node_modules/stripe/types/Errors.d.ts
      - id: attach-already-attached
        maturity: stable
        condition: "PaymentMethod is already attached to a different Customer"
        throws: "StripeInvalidRequestError — PaymentMethod already attached to another Customer"
        required_handling: >
          Caller MUST handle already-attached errors. Detach the PaymentMethod from
          the current Customer first, or clone it for Connect platforms using the
          payment_method.clone endpoint. Do not surface as a generic error.
        sources:
          - "https://docs.stripe.com/api/payment_methods/attach"
          - "https://docs.stripe.com/error-handling"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: attach-authentication-required
        maturity: stable
        condition: "Card requires additional authentication (3D Secure) before it can be attached"
        throws: "StripeCardError with code 'authentication_required'"
        required_handling: >
          Caller MUST handle authentication_required by initiating a SetupIntent flow
          to authenticate the card before attaching. Do not retry the attach directly.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/payments/3d-secure"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: detach
    import_path: "stripe"
    description: >
      Detaches a PaymentMethod from a Customer. After detachment, the PaymentMethod
      can no longer be used for future charges. If the PaymentMethod is the default
      for a subscription, the subscription will fail to charge on the next billing cycle.

    postconditions:
      # Evidence: https://docs.stripe.com/error-handling (StripeInvalidRequestError)
      # Error class names confirmed from stripe node_modules/stripe/types/Errors.d.ts
      - id: detach-default-payment-method
        maturity: stable
        condition: >
          Detaching the default PaymentMethod from a Customer that has active
          subscriptions will cause those subscriptions to fail on next billing cycle
        throws: >
          No immediate error thrown — but subsequent subscription charges throw
          StripeCardError with code 'payment_method_unactivated' or 'card_declined'
        required_handling: >
          Caller MUST check whether the PaymentMethod being detached is the default
          for any active subscription before detaching. Update the subscription's
          default_payment_method first if needed. Silent subscription failures will
          occur on the next billing cycle if this is not handled.
        sources:
          - "https://docs.stripe.com/api/payment_methods/detach"
          - "https://docs.stripe.com/billing/subscriptions/overview"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: delayed_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

      - id: detach-not-attached
        maturity: stable
        condition: "PaymentMethod is not attached to any Customer"
        throws: "StripeInvalidRequestError — PaymentMethod is not attached to a customer"
        required_handling: >
          Caller SHOULD handle idempotently. If the PaymentMethod is already detached,
          treat as success.
        sources:
          - "https://docs.stripe.com/api/payment_methods/detach"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

  - name: constructEventAsync
    import_path: "stripe"
    description: >
      Async version of constructEvent for webhook signature verification. Added in stripe v14
      for Edge Runtime (Cloudflare Workers, Vercel Edge Functions, Deno) where SubtleCrypto
      is required instead of Node's crypto module. Functionally identical to constructEvent
      but returns a Promise and uses the Web Crypto API. Must be awaited before processing
      the webhook payload.

    postconditions:
      # Evidence: stripe/cjs/Webhooks.d.ts — constructEventAsync returns Promise<Event>
      # stripe/cjs/crypto/SubtleCryptoProvider.d.ts — uses WebCrypto API
      # https://docs.stripe.com/webhooks/signatures — same tolerance/signature verification as constructEvent
      - id: construct-event-async-signature-failed
        maturity: stable
        condition: >
          Webhook signature does not match — payload tampered, wrong secret used, or
          raw body was parsed/re-serialized before verification (common bug: Express
          JSON body-parser consumed the raw buffer before passing to constructEventAsync).
        throws: "StripeSignatureVerificationError — no signatures found matching the expected signature for payload"
        required_handling: >
          Return 400 immediately. DO NOT process the webhook payload. Log for security
          monitoring. In Edge Runtimes, use request.text() (not request.json()) to get
          the raw body — calling request.json() first and then re-serializing causes
          signature mismatch even with a valid signature.
        sources:
          - "https://docs.stripe.com/webhooks/signatures"
          - "https://github.com/stripe/stripe-node/blob/master/src/Webhooks.ts"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

      - id: construct-event-async-timestamp-tolerance
        maturity: stable
        condition: >
          Webhook timestamp is outside the tolerance window (default 300 seconds).
          Used to prevent replay attacks where an attacker captures and re-sends
          a valid webhook payload later.
        throws: "StripeSignatureVerificationError — Timestamp outside the tolerance zone"
        required_handling: >
          Return 400. Do NOT process — this is a replay attack prevention mechanism.
          If webhooks are consistently failing timestamp validation, check server clock
          sync (NTP). Do not increase tolerance beyond 600 seconds.
        sources:
          - "https://docs.stripe.com/webhooks/signatures"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: security_breach
          incident_cost_range: high

  - name: finalizeInvoice
    import_path: "stripe"
    description: >
      Finalizes a draft invoice, moving it from 'draft' to 'open' status. Once finalized,
      the invoice is immutable — line items, amounts, and taxes cannot be changed.
      Stripe auto-sends the invoice to the customer if collection_method is 'send_invoice'.
      Commonly called in billing automation to explicitly advance invoices.

    postconditions:
      # Evidence: https://docs.stripe.com/api/invoices/finalize
      # Error codes confirmed from stripe/cjs/resources/Invoices.d.ts Code union type:
      # invoice_no_payment_method_types, invoice_not_editable, status_transition_invalid
      - id: finalize-no-payment-method-types
        maturity: stable
        condition: >
          Invoice cannot be finalized because the customer has no valid payment method
          or the account has no enabled payment method types. Occurs when the customer's
          card was deleted or expires before finalization, or when no payment method
          types are configured for the subscription's currency.
        throws: "StripeInvalidRequestError with code 'invoice_no_payment_method_types'"
        required_handling: >
          Caller MUST catch and notify the customer to add a valid payment method before
          the invoice can be finalized. Do not silently swallow — the subscription billing
          cycle will not advance until the invoice is finalized.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/api/invoices/finalize"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

      - id: finalize-invoice-not-editable
        maturity: stable
        condition: >
          Invoice is not in 'draft' status — it has already been finalized (open, paid,
          void, or uncollectible). Attempting to finalize a non-draft invoice throws this
          error. Common bug: calling finalizeInvoice from a webhook handler that fires
          multiple times due to retry logic.
        throws: "StripeInvalidRequestError with code 'invoice_not_editable'"
        required_handling: >
          Caller SHOULD check invoice.status before calling finalizeInvoice. Treat
          invoice_not_editable as a no-op (already finalized) and continue normally.
          Use idempotency keys on the finalize call to prevent double-finalization.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/billing/invoices/workflow"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

  - name: pay
    import_path: "stripe"
    description: >
      Manually pays an open invoice immediately, bypassing Stripe's automatic collection.
      Charges the invoice's default payment method. Useful for retrying failed invoices,
      implementing "Pay Now" buttons in customer portals, or charging outside the normal
      billing cycle. Returns the paid invoice object on success.

    postconditions:
      # Evidence: https://docs.stripe.com/api/invoices/pay
      # Error codes from stripe/cjs/resources/Invoices.d.ts Code union:
      # invoice_payment_intent_requires_action, card_declined, invoice_not_editable
      - id: pay-requires-action
        maturity: stable
        condition: >
          The payment requires additional customer authentication (3D Secure / SCA).
          Stripe's auto-collection normally handles this for subscription invoices, but
          when calling pay() manually, the payment may require the customer to complete
          3DS authentication before the invoice can be paid.
        throws: "StripeInvalidRequestError with code 'invoice_payment_intent_requires_action'"
        required_handling: >
          Caller MUST handle this by directing the customer to complete authentication.
          Retrieve the invoice's payment_intent and use its next_action.redirect_to_url
          or client_secret for 3DS confirmation on the frontend. Do NOT retry pay()
          without customer authentication.
        sources:
          - "https://docs.stripe.com/error-codes"
          - "https://docs.stripe.com/billing/migration/strong-customer-authentication"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

      - id: pay-card-declined
        maturity: stable
        condition: >
          The customer's payment method was declined during invoice payment. The invoice
          remains 'open' and the associated PaymentIntent transitions to requires_payment_method.
        throws: "StripeCardError with code 'card_declined'"
        required_handling: >
          Caller MUST catch and notify customer to update their payment method. The
          invoice is NOT paid — it remains open. Query invoice.payment_intent.last_payment_error
          for the specific decline reason to show the customer.
        sources:
          - "https://docs.stripe.com/api/invoices/pay"
          - "https://docs.stripe.com/error-handling"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: pay-invoice-not-payable
        maturity: stable
        condition: >
          Invoice is not in 'open' status — already paid, voided, or uncollectible.
          Attempting to pay a non-open invoice throws this error. Common in retry
          logic that doesn't check invoice status first.
        throws: "StripeInvalidRequestError with code 'invoice_not_editable' or status_transition_invalid"
        required_handling: >
          Check invoice.status before calling pay(). If status is 'paid', treat as
          success. If status is 'void' or 'uncollectible', log and skip. Do not retry.
        sources:
          - "https://docs.stripe.com/api/invoices/pay"
          - "https://docs.stripe.com/billing/invoices/workflow"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

  - name: sendInvoice
    import_path: "stripe"
    description: >
      Sends a finalized invoice to the customer via email. Only applies to invoices
      with collection_method='send_invoice'. Stripe sends the invoice PDF and a payment
      link to the customer's email address on file. Cannot be called on draft invoices
      or invoices with collection_method='charge_automatically'.

    postconditions:
      # Evidence: https://docs.stripe.com/api/invoices/send_invoice (404 — docs moved)
      # Error codes from stripe/cjs/resources/Invoices.d.ts Code union:
      # invoice_not_editable, email_invalid, status_transition_invalid
      - id: send-invoice-not-open
        maturity: stable
        condition: >
          Invoice is not in 'open' status. Draft invoices must be finalized before
          sending. Paid/voided/uncollectible invoices cannot be re-sent.
        throws: "StripeInvalidRequestError with code 'status_transition_invalid' or 'invoice_not_editable'"
        required_handling: >
          Caller MUST ensure invoice is finalized (status='open') before calling
          sendInvoice. For draft invoices, call finalizeInvoice first. For already-sent
          invoices, Stripe's invoice portal allows customers to access past invoices
          without re-sending.
        sources:
          - "https://docs.stripe.com/api/invoices"
          - "https://docs.stripe.com/invoicing/send-email"
