          incident_cost_range: medium

  - name: voidInvoice
    import_path: "stripe"
    description: >
      Voids a finalized invoice, permanently canceling it without charging the customer.
      The invoice transitions from 'open' or 'uncollectible' to 'void'. This is irreversible.
      Use when an invoice was created in error or must be canceled after finalization.
      Note: voiding does NOT refund any partial payments already applied to the invoice.

    postconditions:
      # Evidence: https://docs.stripe.com/api/invoices/void
      # https://docs.stripe.com/billing/invoices/workflow — state machine: open/uncollectible → void
      # Error code: status_transition_invalid from stripe/cjs/resources/Invoices.d.ts Code union
      - id: void-invoice-invalid-state
        maturity: stable
        condition: >
          Invoice is not in 'open' or 'uncollectible' status. Cannot void a draft, paid,
          or already-voided invoice. Draft invoices should be deleted instead of voided.
          Paid invoices must be refunded, not voided.
        throws: "StripeInvalidRequestError with code 'status_transition_invalid'"
        required_handling: >
          Caller MUST check invoice.status before calling voidInvoice. Only call on
          invoices in 'open' or 'uncollectible' status. For draft invoices: use
          stripe.invoices.del(). For paid invoices: use stripe.refunds.create() instead.
          Treat 'already_voided' cases as no-op.
        sources:
          - "https://docs.stripe.com/api/invoices/void"
          - "https://docs.stripe.com/billing/invoices/workflow"
          - "https://docs.stripe.com/error-codes"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: void-invoice-rate-limit
        maturity: stable
        condition: "Rate limit exceeded during void operation"
        throws: "StripeRateLimitError"
        required_handling: >
          Implement exponential backoff. Use idempotency keys to safely retry voids.
          Since voiding is irreversible, confirm the invoice state before retrying.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeRateLimitError"
        sources:
          - "https://docs.stripe.com/rate-limits"
        severity: warning
