  - name: lists.members.createMembers
    import_path: "mailgun.js"
    description: >
      Bulk-adds multiple members to a mailing list. Called as mg.lists.members.createMembers(listAddress, { members, upsert }).
      Used for importing subscriber lists. Throws on authentication failure, list not found (404),
      payload too large, or network errors. With upsert=true, existing members are updated.

    postconditions:
      # Evidence: https://github.com/mailgun/mailgun.js (README + source inspection)
      # Error class: APIError (type: "MailgunAPIError")
      - id: bulk-member-create-auth-error
        condition: >
          API key is invalid or missing. HTTP 401 from Mailgun.
        throws: >
          APIError with { status: 401, type: 'MailgunAPIError' }.
        required_handling: >
          Caller MUST wrap mg.lists.members.createMembers() in try-catch. Bulk import
          failures should trigger a retry mechanism or alert the operator.

          Minimum handling:
            try {
              await mg.lists.members.createMembers(listAddress, { members, upsert: true });
            } catch (error) {
              if (error?.type === 'MailgunAPIError') {
                logger.error('Bulk member import failed', { status: error.status, count: members.length });
              }
              throw error;
            }
        sources:
          - "https://github.com/mailgun/mailgun.js/blob/v10.2.3/README.md"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: bulk-member-create-payload-too-large
        condition: >
          Members array is too large for a single request. HTTP 400 or 413 from Mailgun.
          Mailgun has per-request limits for bulk member imports.
        throws: >
          APIError with { status: 400 | 413, type: 'MailgunAPIError' }.
        required_handling: >
          Chunk large imports into batches of 1000 members or fewer. Handle the error
          by splitting the members array and retrying each chunk.
        sources:
          - "https://github.com/mailgun/mailgun.js/blob/v10.2.3/README.md"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  - name: suppressions.destroy
    import_path: "mailgun.js"
    description: >
      Removes a single address from a suppression list (bounces, unsubscribes, complaints, or whitelists).
      Called as mg.suppressions.destroy(domain, type, address). This is the primary mechanism for
      re-enabling delivery to a previously suppressed address — e.g., when a user reports a false bounce
      or clicks "re-subscribe". Throws on authentication failure (401), domain not found (404), address
      not in suppression list (404), or network errors.
      API Reference: https://documentation.mailgun.com/docs/mailgun/api-reference/send/mailgun/bounces/delete-v3--domainid--bounces--address-

    postconditions:
      # Evidence: README.md from mailgun.js package (installed v12.9.0)
      # API Reference confirmed: https://documentation.mailgun.com/docs/mailgun/api-reference/send/mailgun/bounces/delete-v3--domainid--bounces--address-
      # Error class: APIError with { status: number, type: 'MailgunAPIError', details: string }
      # Confirmed from source: class k extends Error { type = "MailgunAPIError"; static isApiError(e) { return "MailgunAPIError" === e?.type } }
      - id: suppressions-destroy-no-try-catch
        condition: >
          mg.suppressions.destroy() is called without a surrounding try-catch block. Any HTTP error or
          network failure — authentication failure (401), domain not found (404), address not found in
          list (404), or connection errors — will cause an unhandled promise rejection.
        throws: >
          APIError with { status: 401|404|5xx, type: 'MailgunAPIError', details: string }.
          For network errors: generic Error with connection message.
        required_handling: >
          Caller MUST wrap mg.suppressions.destroy() in try-catch. Suppression removal is a compliance
          operation — if the error is silently swallowed, the address remains suppressed and the user
          is never re-enabled, silently breaking the re-subscribe or false-bounce-correction workflow.

          Minimum handling:
            try {
              const result = await mg.suppressions.destroy(domain, 'unsubscribes', address);
              return result; // { message, address, status: 200 }
            } catch (error) {
              if (error?.type === 'MailgunAPIError') {
                if (error.status === 404) {
                  // Address not in list — treat as success (idempotent)
                  return null;
                }
                logger.error('Failed to remove suppression', { status: error.status, address });
              }
              throw error;
            }
        sources:
          - "https://github.com/mailgun/mailgun.js/blob/main/README.md"
          - "https://documentation.mailgun.com/docs/mailgun/api-reference/send/mailgun/bounces/delete-v3--domainid--bounces--address-"
          - "https://documentation.mailgun.com/docs/mailgun/api-reference/send/mailgun/unsubscribe/delete-v3--domainid--unsubscribes--address-"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  - name: suppressions.destroyAll
    import_path: "mailgun.js"
    description: >
      Bulk-removes ALL addresses from a suppression list for a domain. Called as
      mg.suppressions.destroyAll(domain, type) where type is 'bounces', 'unsubscribes', 'complaints',
      or 'whitelists'. This is a catastrophic operation — it permanently removes ALL suppression records
      of the given type for the domain. Added in mailgun.js v12.8.0 (2026-04-14). Throws on authentication
      failure (401), domain not found (404), or network errors.
      API Reference: https://documentation.mailgun.com/docs/mailgun/api-reference/send/mailgun/bounces/delete-v3--domainid--bounces

    postconditions:
      # Evidence: README.md and CHANGELOG.md from mailgun.js package (installed v12.9.0)
      # CHANGELOG v12.8.0: "Add 'destroyAll' method to SuppressionClient"
      # API Reference: https://documentation.mailgun.com/docs/mailgun/api-reference/send/mailgun/bounces/delete-v3--domainid--bounces
      # Error class: APIError with { status: number, type: 'MailgunAPIError', details: string }
      - id: suppressions-destroy-all-no-try-catch
        condition: >
          mg.suppressions.destroyAll() is called without a surrounding try-catch block. Authentication
          failure (401), domain not found (404), or network errors cause an unhandled promise rejection.
        throws: >
          APIError with { status: 401|404|5xx, type: 'MailgunAPIError', details: string }.
          For network errors: generic Error with connection message.
        required_handling: >
          Caller MUST wrap mg.suppressions.destroyAll() in try-catch. This is a destructive bulk
          operation — unhandled errors mean the caller cannot confirm whether the bulk deletion
          succeeded or partially failed.

          Minimum handling:
            try {
              const result = await mg.suppressions.destroyAll(domain, 'bounces');
              logger.info('All bounce suppressions cleared', result);
            } catch (error) {
              if (error?.type === 'MailgunAPIError') {
                logger.error('Failed to clear all suppressions', { status: error.status, domain });
              }
              throw error;
            }
        sources:
          - "https://github.com/mailgun/mailgun.js/blob/main/README.md"
          - "https://github.com/mailgun/mailgun.js/blob/main/CHANGELOG.md"
          - "https://documentation.mailgun.com/docs/mailgun/api-reference/send/mailgun/bounces/delete-v3--domainid--bounces"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: suppressions-destroy-all-catastrophic-misuse
        condition: >
          mg.suppressions.destroyAll() is called without explicit operator confirmation or safeguard.
          Unlike suppressions.destroy (single-address removal), this call irreversibly deletes ALL
          suppression records of the given type for the entire domain. There is no undo.
          A single miscall can re-enable thousands of previously bounced/unsubscribed addresses,
          causing mass resend to dead addresses (bounce rate spike) or opted-out users (CAN-SPAM violation).
        throws: >
          Does NOT throw on success — the danger is that success is silent. The operation
          completes and returns { message: '...addresses for this domain have been removed', status: 200 }.
          The risk is calling this method at all without proper safeguards.
        required_handling: >
          Callers MUST require explicit confirmation before calling destroyAll. This is not a
          routine operation — it should be restricted to admin-only interfaces with a confirmation
          dialog. Never call in automated workflows without a human-in-the-loop check.

          Minimum safeguard:
            // Always confirm intent before calling
            if (!explicitAdminConfirmation) {
              throw new Error('destroyAll requires explicit admin confirmation');
            }
            try {
              const result = await mg.suppressions.destroyAll(domain, type);
              logger.warn('BULK suppression deletion completed', { domain, type, result });
            } catch (error) {
              throw error;
            }
        sources:
          - "https://github.com/mailgun/mailgun.js/blob/main/README.md"
