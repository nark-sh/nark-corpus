package: graphql
semver: ">=16.0.0 <18.0.0"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
# Depth pass 2026-04-16 (deepen-stream-2 pass 2):
# API surface: 8 async-callable exports (graphql, execute, subscribe, createSourceEventStream,
#              parse, validate, buildSchema, + 3 sync-only: executeSync, graphqlSync, buildClientSchema)
# Contracted before: 3 (execute, parse, validate)
# Contracted after: 6 (added graphql, subscribe, buildSchema)
# Omitted: 2 (createSourceEventStream — lower-level primitive covered by subscribe;
#             parseValue/parseType — rarely called directly in app code)
# Coverage: 6/8 = 0.75
# Evidence sources (all confirmed from source inspection):
#   graphql.js lines 19-97: graphqlImpl() behavior — errors returned not thrown
#   execution/subscribe.js lines 153-161: GraphQLError → ExecutionResult, non-GraphQLError → re-thrown
#   utilities/buildASTSchema.js lines 100-116: buildSchema calls parse + assertValidSDL
#   validation/validate.js lines 137-149: assertValidSDL throws Error (not GraphQLError) on invalid SDL
#
# Depth pass 2026-06-18 (deepen-stream-1 pass 3 — v17 partial-result-on-abort follow-up):
# Triggered by the 2026-06-15 drift sweep note: "Future deepen-pass candidate: add
# postconditions for partial-result-on-abort behavior in v17+." Verified against
# graphql@17.0.1 installed in /private/tmp/claude/bc-deepen/graphql/node_modules/graphql.
# +2 functions contracted: experimentalExecuteIncrementally, legacyExecuteIncrementally
#   (the two v17 async incremental-delivery executors, both returning a discriminated
#    union ExecutionResult | IncrementalResults — silent failure when callers don't
#    discriminate, and both honor abortSignal with AbortedGraphQLExecutionError).
# +1 postcondition added to execute(): execute-abort-signal-rejection — v17's
#   AbortedGraphQLExecutionError class wraps the partial result on abortSignal abort.
# +4 postconditions total this pass (2 abort + 2 discrimination).
# API surface (revised): 10 async-callable exports
#   contracted: graphql, execute, subscribe, parse, validate, buildSchema,
#               experimentalExecuteIncrementally, legacyExecuteIncrementally (8)
#   omitted:    createSourceEventStream (lower-level primitive covered by subscribe),
#               parseValue/parseType (sync SDL utilities)
# Coverage: 8/10 = 0.80 (was 6/8 = 0.75); effective contracted/non-omitted = 8/8 = 1.0
# v17 evidence sources (all from installed package, lines confirmed from .d.ts + .js):
#   node_modules/graphql@17.0.1/execution/execute.d.ts lines 56-95
#     (execute signature) + 93 (experimentalExecuteIncrementally return type)
#   node_modules/graphql@17.0.1/execution/legacyIncremental/legacyExecuteIncrementally.d.ts
#     lines 136 (return type) and the SubsequentResults shape difference
#   node_modules/graphql@17.0.1/execution/AbortedGraphQLExecutionError.d.ts lines 7-32
#     (class signature + abortedResult getter)
#   node_modules/graphql@17.0.1/execution/Executor.js lines 159-168
#     (finish() throws AbortedGraphQLExecutionError if this.aborted)
#   node_modules/graphql@17.0.1/execution/ExecutionArgs.d.ts line 34
#     (abortSignal field on ExecutionArgs)
#   node_modules/graphql@17.0.1/execution/incremental/IncrementalPublisher.js lines 14-25
#     (subsequentResults.throw(reason) on abort)
#   https://github.com/graphql/graphql-spec/pull/742 (incremental delivery RFC)
coverage_score: 0.9  # 9 contracted / 10 total callable async exports (1 intentionally omitted: createSourceEventStream)

detection:
  type_names:
    - GraphQLSchema
    - GraphQLObjectType
    - GraphQLError

functions:
  - name: graphql
    import_path: "graphql"
    description: >
      All-in-one convenience function that parses, validates, and executes a GraphQL
      operation in a single call. Returns Promise<ExecutionResult>. Unlike execute(),
      errors from parsing and validation are NOT thrown — they are returned in the
      result.errors array. The promise itself never rejects (resolver errors are captured
      in result.errors). Only invalid schema types (not GraphQLSchema instance) cause rejection.
    postconditions:
      # Evidence: graphql.js lines 55-97 — graphqlImpl() catches parse SyntaxError and
      # returns {errors: [syntaxError]} instead of throwing. Validation errors similarly
      # returned as {errors: validationErrors}. Source: graphql.js:19-22 wraps in Promise.
      - id: graphql-errors-not-thrown
        condition: >
          graphql() is called with a query string that has a syntax error, a schema
          validation violation, or resolvers that throw errors. Caller checks for thrown
          exception but does not check result.errors.
        returns: >
          ExecutionResult with errors array populated — parse errors, schema validation
          errors, and resolver errors are all captured in result.errors[], never thrown.
          result.data will be null or partial depending on which fields errored.
        required_handling: >
          Caller MUST check result.errors after awaiting graphql(). The promise NEVER
          rejects for query/resolver errors — they are captured in result.errors[].
          Pattern: const result = await graphql({...}); if (result.errors) { handle... }
          Only invalid argument types (non-Schema object) will cause rejection.
        sources:
          - "https://github.com/graphql/graphql-js/blob/v16.9.0/src/graphql.ts#L55"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: graphql.js line 60-67: validateSchema() returns errors array which is
      # then returned as {errors: schemaValidationErrors} before any query execution.
      # An invalid schema (e.g., circular type references) causes graphql() to return
      # only errors without executing the query at all.
      - id: graphql-invalid-schema-errors
        condition: >
          graphql() is called with a schema that has validation errors (invalid type
          definitions, circular references, missing root types). The schema object exists
          but fails internal validation.
        returns: >
          ExecutionResult with errors[] containing schema validation GraphQLErrors.
          data will be undefined. No execution occurs.
        required_handling: >
          Validate schema with validateSchema() during application startup. If using
          buildSchema() or buildASTSchema(), call assertValidSchema() immediately after.
          The result of graphql() with an invalid schema looks identical to query errors —
          only the error messages indicate it is a schema problem.
        sources:
          - "https://github.com/graphql/graphql-js/blob/v16.9.0/src/graphql.ts#L60"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: execute
    import_path: "graphql"
    description: "Executes a GraphQL query"
    postconditions:
      - id: execute-resolver-errors
        condition: "resolver throws error or promise rejects (database error, validation error, network error)"
        returns: "{errors: GraphQLError[], data: null | partial} - errors array contains resolver failures"
        required_handling: "Caller MUST check result.errors array before accessing result.data. Resolver errors are returned in errors array, not thrown. Use if (result.errors) to detect failures and handle appropriately."
        sources:
          - "https://graphql.org/graphql-js/execution/#execute"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence (v17): execution/Executor.js lines 159-168 — finish(result) checks
      # this.aborted; if aborted, calls createAbortedExecutionError(result) which throws
      # new AbortedGraphQLExecutionError(this.abortReason, result). The thrown error
      # carries the PARTIAL execution result in error.abortedResult — a v17-new
      # affordance for surfacing partial data on cancellation.
      # Source: node_modules/graphql@17.0.1/execution/AbortedGraphQLExecutionError.d.ts
      # Source: node_modules/graphql@17.0.1/execution/ExecutionArgs.d.ts (abortSignal arg)
      - id: execute-abort-signal-rejection
        condition: >
          execute() is called with args.abortSignal (a v17+ AbortSignal). The signal aborts
          mid-execution — typically because the inbound HTTP request was cancelled, a
          per-request deadline elapsed, or an upstream supervisor cancelled the operation.
          The returned Promise rejects with AbortedGraphQLExecutionError (NOT GraphQLError,
          NOT a generic Error). The error carries `error.abortedResult` containing the
          partial ExecutionResult collected before the abort fired (data + errors collected
          so far). Without try/catch around the awaited execute() call, this rejection
          surfaces as an UnhandledPromiseRejection, the partial result is lost, and the
          calling HTTP handler returns 500 instead of a 499 / partial 200.
        throws: >
          AbortedGraphQLExecutionError (new v17 class — extends Error, name ===
          'AbortedGraphQLExecutionError'). Distinct from GraphQLError. Properties:
          - message / cause: set from the AbortSignal's abort reason
          - abortedResult: PromiseOrValue<ExecutionResult> — the partial result with
            whatever data + errors were collected before the abort took effect
        required_handling: >
          When execute() is called with an abortSignal, wrap the awaited call in
          try/catch and check for AbortedGraphQLExecutionError BEFORE treating the
          rejection as a server error:

            import { execute, AbortedGraphQLExecutionError } from 'graphql';

            try {
              const result = await execute({
                schema, document, rootValue,
                abortSignal: req.signal,
              });
              return reply.send(result);
            } catch (error) {
              if (error instanceof AbortedGraphQLExecutionError) {
                // Cancellation, not failure. Optionally surface the partial result:
                const partial = await error.abortedResult;
                return reply.code(499).send(partial); // 499 Client Closed Request
              }
              throw error; // genuine server error — let the framework handle it
            }

          DO NOT swallow this error silently — losing the partial result discards
          work that already executed (potentially with side effects). DO NOT classify
          it as a 500 — abort-on-cancellation is a normal client behavior, not a
          server failure. For SSR frameworks (Apollo Server, Mercurius, GraphQL Yoga),
          this rejection propagates up through the request handler and MUST be
          recognized at the framework boundary.
        sources:
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/AbortedGraphQLExecutionError.ts"
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/Executor.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  - name: subscribe
    import_path: "graphql"
    description: >
      Creates a GraphQL subscription and returns either an AsyncGenerator of ExecutionResults
      (success) or an ExecutionResult with errors (failure). The return type is a discriminated
      union — callers must check whether the result is an AsyncGenerator or an ExecutionResult
      before iterating. Subscription resolver failures are captured in result.errors, not thrown,
      but system-level errors (non-GraphQLErrors from the subscribe resolver) ARE re-thrown.
    postconditions:
      # Evidence: execution/subscribe.js lines 153-161:
      #   if (error instanceof GraphQLError) { return { errors: [error] }; }
      #   throw error;  // non-GraphQLErrors propagate
      # Evidence: subscribe.d.ts return type: Promise<AsyncGenerator<ExecutionResult, void, void> | ExecutionResult>
      - id: subscribe-result-not-checked
        condition: >
          subscribe() resolves but the caller does not check if the result is an
          AsyncGenerator or an ExecutionResult (error). Caller assumes subscribe always
          returns an async iterator and immediately starts iterating with for-await-of.
        returns: >
          ExecutionResult (not AsyncGenerator) when subscription field is missing,
          subscription resolver fails, schema lacks subscription type, or field is
          not defined. Iterating an ExecutionResult crashes with TypeError.
        required_handling: >
          Caller MUST check the return type before iterating:
            const result = await subscribe({...});
            if ('errors' in result) { handle subscription setup failure; return; }
            for await (const event of result) { handle event; }
          Checking Symbol.asyncIterator is also valid: if (Symbol.asyncIterator in result).
        sources:
          - "https://github.com/graphql/graphql-js/blob/v16.9.0/src/execution/subscribe.ts#L35"
          - "https://github.com/graphql/graphql-js/blob/v16.9.0/src/execution/subscribe.ts#L97"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: execution/subscribe.js lines 159-162:
      #   } catch (error) {
      #     if (error instanceof GraphQLError) { return { errors: [error] }; }
      #     throw error;  // ← non-GraphQLErrors from subscribe resolver propagate as rejections
      - id: subscribe-system-error-thrown
        condition: >
          The subscription field's subscribe() resolver throws a non-GraphQLError (e.g.,
          database connection error, EventEmitter setup failure, pubsub initialization error).
          These are system-level errors distinct from business-logic GraphQLErrors.
        throws: >
          Any non-GraphQLError thrown by the subscription source resolver is re-thrown
          as a Promise rejection. Database errors, pubsub errors, EventEmitter errors
          propagate uncaught if subscribe() is not wrapped in try-catch.
        required_handling: >
          Wrap subscribe() call in try-catch for non-GraphQLError system failures:
            try {
              const result = await subscribe({...});
              if ('errors' in result) { return; } // schema/field errors
              for await (const event of result) { ... }
            } catch (error) {
              // system-level failure from subscribe resolver (DB, pubsub, etc.)
              logger.error('Subscription setup failed:', error);
            }
        sources:
          - "https://github.com/graphql/graphql-js/blob/v16.9.0/src/execution/subscribe.ts#L98"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: subscribe.js: iterates AsyncGenerator from createSourceEventStream and
      # maps each payload through execute(). Each execute() call can return partial results
      # with errors. Callers must check event.errors in each yielded ExecutionResult.
      - id: subscribe-event-errors-unchecked
        condition: >
          In a for-await-of loop over the subscribe() result, each yielded ExecutionResult
          event is used directly without checking event.errors. Database errors, auth
          failures, or resolver errors in individual events silently produce empty data.
        returns: >
          Each yielded ExecutionResult may have errors[] populated for that specific event.
          data may be null or partial. The stream continues yielding subsequent events.
        required_handling: >
          Check errors on EACH event, not just on subscription setup:
            for await (const event of subscriptionResult) {
              if (event.errors) {
                logger.error('Event error:', event.errors);
                // decide whether to continue or break
              }
              processData(event.data);
            }
        sources:
          - "https://github.com/graphql/graphql-js/blob/v16.9.0/src/execution/subscribe.ts#L63"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: parse
    import_path: "graphql"
    description: "Parses GraphQL query string into AST"
    postconditions:
      - id: parse-syntax-error
        condition: "query string has syntax error (invalid GraphQL syntax, malformed query)"
        throws: "GraphQLError with syntax error details and location"
        required_handling: "Caller MUST wrap parse() in try-catch to handle syntax errors. Invalid query syntax throws GraphQLError that crashes application if unhandled."
        sources:
          - "https://graphql.org/graphql-js/language/#parse"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validate
    import_path: "graphql"
    description: "Validates GraphQL query against schema"
    postconditions:
      - id: validate-schema-errors
        condition: "query violates schema rules (unknown field, type mismatch, invalid argument)"
        returns: "GraphQLError[] - array of validation errors (empty array means valid)"
        required_handling: "Caller MUST check if validate() returns non-empty array before executing query. Validation errors indicate query will fail - check if (errors.length > 0) and handle before execution."
        sources:
          - "https://graphql.org/graphql-js/validation/#validate"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: buildSchema
    import_path: "graphql"
    description: >
      Builds a GraphQLSchema from a SDL (Schema Definition Language) string. Called at
      application startup. Internally calls parse() then assertValidSDL(). If the SDL
      string is syntactically invalid, throws GraphQLError (from parse). If the SDL is
      syntactically valid but semantically invalid (unknown types, duplicate definitions,
      missing required fields), throws a generic Error (not GraphQLError) containing
      concatenated validation messages.
    postconditions:
      # Evidence: utilities/buildASTSchema.js line 101: const document = parse(source, ...)
      # parse() throws GraphQLError for syntax errors (unclosed braces, invalid tokens).
      # Evidence: validation/validate.js lines 143-149: assertValidSDL() throws new Error(...)
      # NOT a GraphQLError — it is a plain Error with all validation messages joined by \n\n.
      - id: buildschema-syntax-error
        condition: >
          buildSchema() is called with a SDL string containing syntax errors (unclosed
          braces, misspelled keywords like 'typo Query', invalid characters). The internal
          parse() call throws before schema construction.
        throws: "GraphQLError with syntax error message and location info"
        required_handling: >
          Wrap buildSchema() in try-catch at application startup. Syntax errors in SDL
          indicate a programming mistake — fail fast and log the error with schema source.
          Check err instanceof GraphQLError to identify parse errors.
          These errors should NEVER occur in production if schema is committed to source control.
        sources:
          - "https://github.com/graphql/graphql-js/blob/v16.9.0/src/utilities/buildASTSchema.ts#L100"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: validation/validate.js lines 143-149: assertValidSDL throws new Error(...)
      # with concatenated validation messages. Not a GraphQLError — plain Error instance.
      # Example: duplicate type names, referencing undefined types, invalid directive usage.
      - id: buildschema-semantic-validation-error
        condition: >
          buildSchema() is called with syntactically valid SDL that fails semantic validation:
          duplicate type definitions, fields referencing undefined types, invalid implements
          usage, circular interface references, or using scalar names as object types.
        throws: >
          Error (NOT GraphQLError) with all validation errors joined by '\n\n'.
          Cannot catch with: catch (e) { if (e instanceof GraphQLError) ... } — this check
          will miss semantic validation errors.
        required_handling: >
          Wrap buildSchema() in try-catch without instanceof filtering:
            try {
              const schema = buildSchema(sdlString);
            } catch (error) {
              // catches BOTH GraphQLError (syntax) AND Error (semantic validation)
              logger.error('Invalid schema SDL:', error.message);
              process.exit(1); // or throw — schema is required for server startup
            }
          Do not assume thrown errors are always GraphQLError instances.
        sources:
          - "https://github.com/graphql/graphql-js/blob/v16.9.0/src/validation/validate.ts#L138"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  # Added by bc-deepen-contract 2026-06-18 (pass 3 — deepen-stream-1).
  # Source: graphql@17.0.1 — node_modules/graphql/execution/execute.d.ts lines 56-95,
  # node_modules/graphql/execution/execute.js lines 162-end, the @defer / @stream RFC
  # at https://github.com/graphql/graphql-spec/pull/742, and Apollo Router's incremental
  # delivery docs.
  - name: experimentalExecuteIncrementally
    import_path: "graphql"
    description: >
      Promise-returning variant of execute() that ALSO supports @defer and @stream
      incremental delivery directives. Introduced in graphql-js v17 alongside the
      finalized incremental delivery payload format. Unlike execute(), the resolved
      value is a DISCRIMINATED UNION: either a single ExecutionResult (when the
      operation contains no @defer/@stream fields) OR an
      ExperimentalIncrementalExecutionResults object containing `initialResult` plus
      an async-iterable `subsequentResults`. Production GraphQL servers that ship
      @defer / @stream to clients (Apollo Router, GraphQL Yoga, Mercurius) call this
      function instead of execute().
    postconditions:
      # Evidence (v17): node_modules/graphql@17.0.1/execution/execute.d.ts line 93
      # — returns PromiseOrValue<ExecutionResult | ExperimentalIncrementalExecutionResults>.
      # Source: node_modules/graphql@17.0.1/execution/incremental/IncrementalExecutor.d.ts
      # — ExperimentalIncrementalExecutionResults has { initialResult, subsequentResults }
      # not the flat { errors, data } shape of ExecutionResult.
      - id: experimental-incremental-result-not-discriminated
        condition: >
          experimentalExecuteIncrementally() resolves but the caller treats the result
          as if it were always a plain ExecutionResult — accesses result.errors and
          result.data directly, ships the response body to the HTTP client as JSON, and
          ignores result.initialResult / result.subsequentResults. When the document
          contains @defer or @stream, the result is the INCREMENTAL shape — the JSON
          serializer captures only the (undefined) data field, the subsequent payloads
          never get sent, and the client hangs waiting for deferred fields that the
          server already produced but discarded.
        returns: >
          ExperimentalIncrementalExecutionResults: an object with `initialResult`
          (InitialIncrementalExecutionResult — has data, hasNext, pending) and
          `subsequentResults` (AsyncGenerator<SubsequentIncrementalExecutionResult>).
          The shape is DISTINCT from ExecutionResult — there is no top-level `data` or
          `errors` field. Naive JSON.stringify of the result drops the iterator.
        required_handling: >
          Caller MUST discriminate before serializing. Pattern from the graphql-js
          docs (execute.d.ts example) and Apollo Router's incremental-delivery layer:

            import { experimentalExecuteIncrementally } from 'graphql';

            const result = await experimentalExecuteIncrementally(args);

            if ('initialResult' in result) {
              // Incremental delivery path — use multipart/mixed or SSE transport
              await streamIncrementalResponse(result, reply);
              return;
            }

            // Non-incremental path — single response
            return reply.send(result);

          The `'initialResult' in result` check is the canonical discrimination —
          ExecutionResult never has this key. For HTTP transports, incremental
          delivery requires multipart/mixed or text/event-stream — sending the
          initial result alone is a protocol violation. The `subsequentResults`
          iterator MUST be consumed or explicitly returned (to allow internal
          cleanup) — abandoning it leaks a Publisher subscription and the
          executor's abort cleanup never fires.

          DO NOT call experimentalExecuteIncrementally() for documents you know
          contain no @defer/@stream — use execute() instead, which has the simpler
          return type contract.
        sources:
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/execute.ts"
          - "https://github.com/graphql/graphql-spec/pull/742"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: same AbortedGraphQLExecutionError plumbing as execute(); the Executor
      # base class wraps both paths. See execute-abort-signal-rejection above for the
      # full mechanism. Repeated here because callers who only see the incremental
      # function in their codebase need the contract attached to the function they
      # actually call.
      - id: experimental-incremental-abort-signal-rejection
        condition: >
          experimentalExecuteIncrementally() is called with args.abortSignal and the
          signal aborts before either the initial result OR all subsequent payloads
          have been produced. The returned Promise rejects with
          AbortedGraphQLExecutionError carrying the partial state — for incremental
          delivery, the partial state is BOTH the initial-result-so-far AND the
          stream of payloads emitted prior to the abort. The subsequent iterator is
          also signalled (its `.throw(reason)` is invoked internally per
          IncrementalPublisher.js:17) so an active consumer of `subsequentResults`
          sees a thrown error inside the for-await loop.
        throws: >
          AbortedGraphQLExecutionError on the top-level Promise. Concurrently, if a
          consumer is already iterating `subsequentResults`, the iterator's
          for-await-of loop throws with the abort reason.
        required_handling: >
          Wrap BOTH the awaited call AND the iterator consumption in error handling
          when using abortSignal with incremental delivery:

            const result = await experimentalExecuteIncrementally({
              schema, document, rootValue, abortSignal: req.signal,
            }).catch(err => {
              if (err instanceof AbortedGraphQLExecutionError) {
                return null; // client cancelled — drop the response
              }
              throw err;
            });
            if (!result) return reply.code(499).send();

            if ('initialResult' in result) {
              try {
                for await (const payload of result.subsequentResults) {
                  await reply.sendPayload(payload);
                }
              } catch (err) {
                // abort fired mid-stream — terminate the multipart response
                await reply.endMultipart();
                return;
              }
            }

          Abandoning the iterator without consuming-or-throwing leaks the
          IncrementalPublisher's pending work. For request-scoped servers (Apollo
          Server, Yoga), wire abortSignal to req.signal; for queue-driven workers,
          wire to the job-deadline AbortController.
        sources:
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/AbortedGraphQLExecutionError.ts"
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/incremental/IncrementalPublisher.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  # Added by bc-deepen-contract 2026-06-18 (pass 3 — deepen-stream-1).
  # Source: graphql@17.0.1 — node_modules/graphql/execution/legacyIncremental/legacyExecuteIncrementally.d.ts
  # and the legacyIncremental/BranchingIncrementalExecutor.d.ts type definitions.
  # Used by Relay's incremental-delivery client (which has not yet migrated from the
  # legacy payload format) and by graphql-js consumers that target the pre-finalized
  # @defer/@stream payload shape.
  - name: legacyExecuteIncrementally
    import_path: "graphql"
    description: >
      Legacy-payload-format variant of experimentalExecuteIncrementally(), introduced
      in v17 to provide a migration window for clients (notably Relay) that consume
      the pre-finalized @defer / @stream payload shape. Subsequent payloads identify
      their location via `path` (and optional `label`) instead of by `id` + `completed`.
      Same Promise + iterator shape as experimentalExecuteIncrementally; same
      discrimination requirement; same AbortedGraphQLExecutionError semantics.
    postconditions:
      # Evidence (v17): node_modules/graphql@17.0.1/execution/legacyIncremental/
      # legacyExecuteIncrementally.d.ts line 136 — returns
      # PromiseOrValue<ExecutionResult | LegacyExperimentalIncrementalExecutionResults>.
      # The Legacy variant differs from the experimental variant in payload shape only;
      # the discrimination requirement is identical.
      - id: legacy-incremental-result-not-discriminated
        condition: >
          legacyExecuteIncrementally() resolves but the caller treats the result as a
          plain ExecutionResult. Same failure mode as experimentalExecuteIncrementally
          — incremental payloads silently dropped, client hangs. The legacy format is
          specifically dangerous because callers porting from the experimental
          function may assume the function names indicate same-shape responses with
          only formatting differences; in fact both produce a discriminated union
          with `initialResult` and `subsequentResults`.
        returns: >
          LegacyExperimentalIncrementalExecutionResults: { initialResult,
          subsequentResults } — same top-level shape as the experimental variant,
          but each payload uses `path` instead of `id` for incremental location.
        required_handling: >
          Discriminate exactly as for experimentalExecuteIncrementally:

            const result = await legacyExecuteIncrementally(args);
            if ('initialResult' in result) {
              await streamLegacyIncremental(result, reply);
              return;
            }
            return reply.send(result);

          Choose between experimentalExecuteIncrementally and
          legacyExecuteIncrementally based on the CLIENT — if you control the client
          and it's modern, use the experimental (now-canonical) variant; if you ship
          a public GraphQL API that Relay clients consume, use the legacy variant
          until Relay's incremental layer migrates. DO NOT mix on the same operation
          — the response shape is determined per-request by which function you call.
        sources:
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/legacyIncremental/legacyExecuteIncrementally.ts"
          - "https://github.com/graphql/graphql-spec/pull/742"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: legacyIncremental/BranchingIncrementalPublisher.js lines 13-22 — same
      # abort-signal plumbing as IncrementalPublisher.js (calls subsequentResults.throw
      # with the abort reason). Same AbortedGraphQLExecutionError on top-level Promise.
      - id: legacy-incremental-abort-signal-rejection
        condition: >
          legacyExecuteIncrementally() is called with args.abortSignal and the signal
          aborts during execution. Same mechanism as experimental-incremental-abort-
          signal-rejection: top-level Promise rejects with AbortedGraphQLExecutionError;
          if subsequentResults is being consumed, its for-await-of throws.
        throws: >
          AbortedGraphQLExecutionError on the awaited Promise. The
          subsequentResults iterator throws inside the for-await consumer with the
          abort reason.
        required_handling: >
          Same as experimentalExecuteIncrementally: wrap both the awaited Promise
          AND the iterator consumption. See experimental-incremental-abort-signal-
          rejection for the canonical pattern. For legacy-format servers, the abort
          handling shape is identical — only the payload identifiers (`path` vs.
          `id`) differ in successful payloads.
        sources:
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/AbortedGraphQLExecutionError.ts"
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/legacyIncremental/BranchingIncrementalPublisher.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  # Added by bc-deepen-contract 2026-06-24 (pass 95 — deepen-stream-2).
  # Source: graphql@17.0.1 — node_modules/graphql/execution/execute.d.ts lines 192-230,
  # node_modules/graphql/execution/execute.js lines 120-122 (executeSubscriptionEvent
  # wraps `new ExecutorThrowingOnIncremental(args).executeRootSelectionSet(false)`),
  # node_modules/graphql/execution/ExecutorThrowingOnIncremental.d.ts +
  # ExecutorThrowingOnIncremental.js (the class's executeCollectedRootFields,
  # executeCollectedSubfields, and completeListValue overrides each throw a plain
  # Error with message `Executing this GraphQL operation would unexpectedly produce
  # multiple payloads (due to @defer or @stream directive)` when @defer / @stream
  # is encountered on a subscription operation).
  - name: executeSubscriptionEvent
    import_path: "graphql"
    description: >
      Lower-level subscription primitive introduced in v17. Executes a subscription
      operation once for a single source event, given pre-validated execution args
      (output of validateSubscriptionArgs). Used by frameworks that build their own
      subscription pipeline (custom server transports that manage the source event
      stream manually and feed each event into executeSubscriptionEvent themselves)
      instead of calling subscribe(). Distinct error surface from execute() — the
      v17 implementation is backed by ExecutorThrowingOnIncremental, which throws a
      plain Error (NOT GraphQLError) when the subscription selection contains
      @defer or @stream directives. Resolver errors continue to be collected into
      result.errors (same as execute), and AbortedGraphQLExecutionError still
      applies when args.abortSignal aborts. The @defer/@stream-throwing behavior
      is unique to this function and is what makes it a separate contract surface.
    postconditions:
      # Evidence: node_modules/graphql@17.0.1/execution/execute.js line 120-122
      # function executeSubscriptionEvent(validatedExecutionArgs) {
      #   return new ExecutorThrowingOnIncremental(validatedExecutionArgs)
      #     .executeRootSelectionSet(false);
      # }
      # Evidence: node_modules/graphql@17.0.1/execution/ExecutorThrowingOnIncremental.js
      # The three override methods (executeCollectedRootFields, executeCollectedSubfields,
      # completeListValue) each detect @defer / @stream usage and:
      #   const reason = new Error(UNEXPECTED_MULTIPLE_PAYLOADS);
      #   this.abort(reason);
      #   throw reason;
      # Where UNEXPECTED_MULTIPLE_PAYLOADS = 'Executing this GraphQL operation would
      # unexpectedly produce multiple payloads (due to @defer or @stream directive)'.
      # This is a PLAIN Error instance — not a GraphQLError — and propagates as a
      # Promise rejection from executeSubscriptionEvent (unlike resolver errors which
      # are captured into result.errors).
      - id: execute-subscription-event-defer-stream-rejection
        condition: >
          executeSubscriptionEvent() is called with validatedExecutionArgs whose
          document contains @defer or @stream directives on the subscription
          selection set. The Executor backing executeSubscriptionEvent
          (ExecutorThrowingOnIncremental) does NOT support incremental delivery
          on subscriptions and aborts the operation by throwing a plain Error.
          Without try/catch around the awaited call, the rejection surfaces as
          an UnhandledPromiseRejection and the subscription event is lost.
        throws: >
          A plain Error (NOT GraphQLError, NOT AbortedGraphQLExecutionError) with
          message: 'Executing this GraphQL operation would unexpectedly produce
          multiple payloads (due to @defer or @stream directive)'. The
          ExecutorThrowingOnIncremental's abort() is called internally, which
          also signals any registered AsyncWorkTracker — but the top-level
          rejection is the plain Error.
        required_handling: >
          Wrap the awaited executeSubscriptionEvent() call in try/catch. The
          @defer/@stream-on-subscription error indicates a CLIENT-side bug
          (subscriptions don't accept incremental directives) — surface the
          error to the client as a structured response, do NOT 500. Pattern:

            import { executeSubscriptionEvent, validateSubscriptionArgs } from 'graphql';

            const validated = validateSubscriptionArgs(args);
            if (!('schema' in validated)) {
              return { errors: validated }; // pre-validation failed
            }

            try {
              const eventResult = await executeSubscriptionEvent(validated);
              return eventResult;
            } catch (error) {
              if (error instanceof Error && error.message.includes('unexpectedly produce multiple payloads')) {
                // Client used @defer/@stream on a subscription — protocol error
                return { errors: [new GraphQLError(
                  '@defer and @stream are not supported on subscription operations'
                )] };
              }
              throw error;
            }

          DO NOT assume executeSubscriptionEvent shares execute()'s
          errors-collected-into-result.errors model — the
          @defer/@stream-on-subscription path is THROWN, not collected. This
          is the one place in the graphql-js API where the executor surfaces a
          plain Error as a Promise rejection for a document-shape issue
          (everything else returns errors-in-result).
        sources:
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/ExecutorThrowingOnIncremental.ts"
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/execute.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: ExecutorThrowingOnIncremental extends Executor (same Executor
      # base class as execute() uses). The Executor.finish() implementation
      # (node_modules/graphql@17.0.1/execution/Executor.js lines 159-168) checks
      # this.aborted and throws AbortedGraphQLExecutionError when an abortSignal
      # has fired. The error carries the partial subscription-event result via
      # error.abortedResult — same partial-result-on-abort surface as execute().
      - id: execute-subscription-event-abort-signal-rejection
        condition: >
          executeSubscriptionEvent() is called with validatedExecutionArgs whose
          ExecutionArgs originally included an abortSignal (preserved through
          validateSubscriptionArgs into ValidatedSubscriptionArgs). The signal
          aborts mid-execution of the source event — typically because the
          subscription's underlying transport (WebSocket / SSE / multipart
          response) was closed by the client. The returned Promise rejects with
          AbortedGraphQLExecutionError carrying the partial event result. Without
          try/catch, the subscription event is treated as a server failure and
          the partial data collected before the abort is discarded.
        throws: >
          AbortedGraphQLExecutionError (v17 class — extends Error). The
          error.abortedResult property holds the partial ExecutionResult collected
          for this subscription event before the abort fired. Distinct from the
          plain-Error defer/stream rejection above.
        required_handling: >
          When executeSubscriptionEvent is used in a subscription pipeline that
          honors a per-connection abortSignal (e.g. server tears down the
          subscription when the WebSocket closes), wrap the awaited call in
          try/catch and distinguish AbortedGraphQLExecutionError from other
          errors:

            import { executeSubscriptionEvent, AbortedGraphQLExecutionError } from 'graphql';

            try {
              const eventResult = await executeSubscriptionEvent(validatedArgs);
              await transport.sendEvent(eventResult);
            } catch (error) {
              if (error instanceof AbortedGraphQLExecutionError) {
                // Subscription connection closed mid-event — drop the partial
                // result silently (the consumer is gone). Optionally log:
                logger.debug('Subscription aborted mid-event', { reason: error.cause });
                return; // do NOT propagate as a transport error
              }
              throw error; // genuine error
            }

          The partial result on `error.abortedResult` is generally NOT worth
          sending — the transport is already torn down — but log it for
          debugging if a subscription source has expensive side effects that
          may have partially executed.
        sources:
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/AbortedGraphQLExecutionError.ts"
          - "https://github.com/graphql/graphql-js/blob/main/src/execution/Executor.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

edge_cases:
  - id: resolver-error-masking
    description: "GraphQL resolvers should handle errors and return proper GraphQLError instances - uncaught errors expose internal stack traces to clients unless formatError is configured"
    sources:
      - "https://graphql.org/learn/execution/#handling-errors"
    severity: error
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

