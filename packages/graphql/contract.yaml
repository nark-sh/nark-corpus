package: graphql
semver: ">=16.0.0 <17.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed

detection:
  type_names:
    - GraphQLSchema
    - GraphQLObjectType
    - GraphQLError

functions:
  - name: execute
    import_path: "graphql"
    description: "Executes a GraphQL query"
    postconditions:
      - id: execute-resolver-errors
        condition: "resolver throws error or promise rejects (database error, validation error, network error)"
        returns: "{errors: GraphQLError[], data: null | partial} - errors array contains resolver failures"
        required_handling: "Caller MUST check result.errors array before accessing result.data. Resolver errors are returned in errors array, not thrown. Use if (result.errors) to detect failures and handle appropriately."
        sources:
          - "https://graphql.org/graphql-js/execution/#execute"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: parse
    import_path: "graphql"
    description: "Parses GraphQL query string into AST"
    postconditions:
      - id: parse-syntax-error
        condition: "query string has syntax error (invalid GraphQL syntax, malformed query)"
        throws: "GraphQLError with syntax error details and location"
        required_handling: "Caller MUST wrap parse() in try-catch to handle syntax errors. Invalid query syntax throws GraphQLError that crashes application if unhandled."
        sources:
          - "https://graphql.org/graphql-js/language/#parse"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validate
    import_path: "graphql"
    description: "Validates GraphQL query against schema"
    postconditions:
      - id: validate-schema-errors
        condition: "query violates schema rules (unknown field, type mismatch, invalid argument)"
        returns: "GraphQLError[] - array of validation errors (empty array means valid)"
        required_handling: "Caller MUST check if validate() returns non-empty array before executing query. Validation errors indicate query will fail - check if (errors.length > 0) and handle before execution."
        sources:
          - "https://graphql.org/graphql-js/validation/#validate"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

edge_cases:
  - id: resolver-error-masking
    description: "GraphQL resolvers should handle errors and return proper GraphQLError instances - uncaught errors expose internal stack traces to clients unless formatError is configured"
    sources:
      - "https://graphql.org/learn/execution/#handling-errors"
    severity: error
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

# Category: api
