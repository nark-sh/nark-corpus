package: ofetch
semver: ">=1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed
coverage_score: 0.85

functions:
  - name: ofetch
    import_path: "ofetch"
    description: "Make an HTTP request using ofetch — automatically throws FetchError on non-2xx responses"

    postconditions:
      # Evidence: seen in 31 primary firings across 2 repos in scan-ofetch-2026-04-03.json
      # Top affected: chathub-dev/chathub (⭐ 10571 stars), jln13x/ui.jln.dev (⭐ 1288 stars)
      - id: ofetch-no-try-catch
        condition: "awaited ofetch() call is not wrapped in try/catch"
        throws: "FetchError"
        required_handling: >
          Caller MUST wrap ofetch() in try/catch. Unlike native fetch(), ofetch
          automatically throws FetchError when response.ok is false (any non-2xx status).
          FetchError has .status, .statusCode, .data (parsed response body), .message,
          .request, and .response properties. Without try/catch, any 4xx or 5xx response
          causes an unhandled exception.
        sources:
          - https://github.com/unjs/ofetch
          - https://raw.githubusercontent.com/unjs/ofetch/main/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: $fetch
    import_path: "ofetch"
    description: "Make an HTTP request using $fetch (alias for ofetch) — automatically throws FetchError on non-2xx responses"

    postconditions:
      # Evidence: seen in 4 primary firings across 2 repos in scan-ofetch-2026-04-03.json
      # Top affected: miantiao-me/hacker-podcast (⭐ 2481 stars), unjs/changelogen (⭐ 1229 stars)
      - id: dollar-fetch-no-try-catch
        condition: "awaited $fetch() call is not wrapped in try/catch"
        throws: "FetchError"
        required_handling: >
          Caller MUST wrap $fetch() in try/catch. $fetch is an alias for ofetch and has
          identical behavior: automatically throws FetchError when response.ok is false.
          FetchError has .status, .statusCode, .data, .message, .request, .response properties.
        sources:
          - https://github.com/unjs/ofetch
          - https://raw.githubusercontent.com/unjs/ofetch/main/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
