# Depth pass 2026-06-24 (deepen-stream-2 pass 74):
# API surface: 13 Nark profiles (side-effect-only package — no exported functions; 11 prior + 2 added)
# Contracted before: 11 (2 preconditions + 7 postconditions + 2 edge_cases)
# Contracted after: 13 (+2 new postconditions: callback-based-middleware-not-caught, noop-fallback-silent-swallow)
# Intentionally omitted: 2 (function.length preservation — impl detail, already correct;
#   typescript-no-misused-promises lint — non-runtime concern, not a behavioral contract)
# Evidence confirmed from:
#   https://github.com/davidbanham/express-async-errors/blob/master/index.js (source — wrap() line 14-26, noop fallback line 17)
#   https://github.com/davidbanham/express-async-errors/issues/46 (multer callback middleware)
