  # Evidence: lib/websocket.js line 492-504 (ws@8.21.0) — terminate() behavior:
  #   - readyState === CLOSED  → return (no-op)        (line 493)
  #   - readyState === CONNECTING → abortHandshake()    (lines 494-498)
  #   - else (OPEN/CLOSING) → destroy underlying socket (lines 500-503)
  # Source: https://github.com/websockets/ws/blob/master/lib/websocket.js#L492
  - name: terminate
    import_path: "ws"
    description: >
      Forcibly closes the WebSocket connection by destroying the underlying socket.
      Unlike close() which sends a close frame and waits for acknowledgement,
      terminate() drops the connection immediately. The remote peer sees an
      abnormal close (code 1006). Used in heartbeat-timeout enforcement and in
      shutdown paths where graceful close is unnecessary.
    postconditions:
      # Evidence: lines 494-498 — when CONNECTING, terminate() calls abortHandshake().
      # No 'open' event fires; only a 'close' event with code 1006. Callers awaiting
      # 'open' (e.g. promise-wrapped connect helpers) hang forever unless they also
      # listen for 'close'.
      - id: terminate-during-connecting-silent
        condition: >
          terminate() is called while the WebSocket is in CONNECTING state.
          The handshake is aborted; no 'open' event is emitted; only a 'close'
          event fires with code 1006 (abnormal closure).
        throws: >
          Does NOT throw. The connection is silently aborted — promise-wrapped
          connect helpers that only resolve on 'open' will hang indefinitely if
          they do not also reject on 'close' or 'error' events.
        required_handling: >
          Connect helpers that wrap new WebSocket() in a Promise MUST register
          handlers for BOTH 'open' (resolve) AND 'close'/'error' (reject) so a
          mid-connect terminate() is observable to the caller.

          CORRECT promise-wrapped connect:
            const ws = new WebSocket(url);
            await new Promise((resolve, reject) => {
              ws.once('open', resolve);
              ws.once('error', reject);
              ws.once('close', () => reject(new Error('closed before open')));
            });

          WRONG (hangs forever if terminate() called during CONNECTING):
            await new Promise(resolve => ws.once('open', resolve));
        sources:
          - "https://github.com/websockets/ws/blob/master/lib/websocket.js"
          - "https://github.com/websockets/ws/blob/master/doc/ws.md"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: line 493 — terminate() on a CLOSED socket is a no-op. Callers
      # relying on side effects (e.g. cleanup hooks tied to 'close' event) get
      # no signal if the connection was already closed when terminate() was called.
      - id: terminate-on-closed-no-op
        condition: >
          terminate() is called when the WebSocket is already in CLOSED state.
          The call is a silent no-op — no 'close' event is re-emitted, no
          callback is invoked, no error surfaces.
        throws: "Does NOT throw and produces no observable side effect."
        required_handling: >
          Cleanup logic MUST NOT rely on terminate() to trigger a 'close' event
          if the connection may already be CLOSED. Always perform cleanup
          (clearing intervals, removing entries from connection registries) at
          the 'close' event itself or in finally blocks, not after terminate().

          CORRECT cleanup pattern:
            ws.on('close', () => { connections.delete(ws); });
            ws.terminate();  // may be no-op; cleanup runs from 'close' handler if any

          WRONG (cleanup never runs if already closed):
            ws.terminate();
            connections.delete(ws);  // OK actually but if cleanup runs in close handler, redundant
            // worse: relying on a side effect of terminate() to fire 'close'
        sources:
          - "https://github.com/websockets/ws/blob/master/lib/websocket.js"
        severity: info
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
