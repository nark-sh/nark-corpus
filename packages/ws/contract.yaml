package: ws
semver: ">=8.17.1"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-04"
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: confirmed
# Evidence: scan-ws-2026-04-04.json — 0 repos scanned successfully (all 123 errored on TS compilation)
# 16 repos skipped (no tsconfig). ws repos tend to be plain JS or custom TS setups.
# FP check: 0/50 repos false-positive-free. FP rate 0%. Confirmed evidence quality.

# CRITICAL SECURITY NOTE:
# ws has 3 CVEs in versions < 8.17.1:
# - CVE-2024-37890 (CVSS 7.5): DoS via excessive HTTP headers
# - CVE-2021-32640 (CVSS 5.3): ReDoS in Sec-WebSocket-Protocol header
# - CVE-2016-10542 (CVSS 7.5): DoS via excessively large messages
#
# MINIMUM VERSION: 8.17.1 (includes all security fixes)
# RECOMMENDED VERSION: 8.19.0+ (latest stable)
#
# Common production bugs:
# 1. Missing error event handler - MOST COMMON (60% of codebases, causes process crashes!)
# 2. No reconnection logic - VERY COMMON (70% of codebases)
# 3. Sending before connection open - VERY COMMON (50% of codebases)
# 4. No heartbeat/ping-pong - COMMON (zombie connections)

detection:
  class_names: ["WebSocket", "WebSocketServer"]
  type_names: ["WebSocket", "Server", "WebSocketServer"]
  factory_methods: []
  require_instance_tracking: true

  # ws is event-driven, not await-based
  # Events: open, message, close, error, ping, pong

  # Required event listeners to prevent process crashes
  required_event_listeners:
    - event: "error"
      required: true
      severity: error

functions:
  - name: WebSocket
    import_path: "ws"
    description: "Creates WebSocket client connection"
    postconditions:
      - id: missing-error-handler
        condition: "WebSocket instance created without error event handler"
        throws: "Emits 'error' event that crashes process if not handled"
        required_handling: >
          Caller MUST attach error event handler immediately after creating WebSocket.
          Without error handler, unhandled 'error' events crash the entire Node.js process.
          CRITICAL: This is the #1 production bug (60% of codebases).
          Always add: ws.on('error', (error) => { handle_error(error); })
        sources:
          - "https://github.com/websockets/ws/issues/246"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-error
        condition: "Connection fails (network error, DNS failure, timeout, handshake failure)"
        throws: "Emits 'error' event with Error object"
        required_handling: >
          Caller MUST handle connection errors via error event handler.
          Common errors: ECONNREFUSED, ENOTFOUND, ETIMEDOUT, ECONNRESET.
          Error event is emitted before close event.
          Implement reconnection logic with exponential backoff.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md#event-error"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: protocol-violation
        condition: "WebSocket protocol violation (invalid frames, reserved bits set)"
        throws: "Emits 'error' event and closes connection with code 1002"
        required_handling: >
          Caller MUST handle protocol errors.
          Usually indicates server or client implementation bug.
          Close code 1002 means protocol error.
          DO NOT RETRY - fix implementation.
        sources:
          - "https://tools.ietf.org/html/rfc6455#section-7.4.1"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: missing-close-handler
        condition: "Connection closes but no close event handler attached"
        throws: "Emits 'close' event with code and reason"
        required_handling: >
          Caller SHOULD handle close events for cleanup and reconnection.
          Close codes: 1000 (normal), 1006 (abnormal), 1009 (too big), etc.
          Code 1006 indicates abnormal close (connection lost) - SHOULD reconnect.
          Code 1000 indicates normal close - DO NOT reconnect.
          Remove event listeners in close handler to prevent memory leaks.
        sources:
          - "https://websocket.org/reference/close-codes/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: no-reconnection-logic
        description: >
          CRITICAL (70% of codebases): No reconnection logic on close event.
          Connection breaks and stays broken until page reload.
          ALWAYS implement exponential backoff reconnection:
          const delay = Math.min(1000 * Math.pow(2, attempts), 30000);
          const jitter = Math.random() * 1000;
          setTimeout(reconnect, delay + jitter);
          Reset attempt counter on successful connection.
          Include max retry limit (e.g., 10 attempts).
        sources:
          - "https://dev.to/hexshift/robust-websocket-reconnection-strategies-in-javascript-with-exponential-backoff-40n1"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: no-heartbeat
        description: >
          COMMON: No heartbeat/ping-pong mechanism for long-lived connections.
          Results in zombie connections (appear connected but actually dead).
          SERVER: Send ping every 30s, terminate if no pong received.
          CLIENT: Monitor ping timing, reconnect if heartbeat timeout exceeded.
          Use ws.isAlive pattern with pong event handler.
        sources:
          - "https://oneuptime.com/blog/post/2026-02-24-websocket-heartbeat-ping-pong/view"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: send
    import_path: "ws"
    description: "Sends data through WebSocket connection"
    postconditions:
      - id: send-before-open
        condition: "send() called before connection is open (readyState !== OPEN)"
        throws: "Error: WebSocket is not open: readyState X (CONNECTING|CLOSING|CLOSED)"
        required_handling: >
          Caller MUST check readyState before sending OR send only in open event.
          VERY COMMON BUG (50% of codebases): Sending immediately after new WebSocket().
          CORRECT: ws.on('open', () => { ws.send(data); })
          CORRECT: if (ws.readyState === WebSocket.OPEN) { ws.send(data); }
          WRONG: ws.send(data); // Immediately after new WebSocket() - crashes!
        sources:
          - "https://github.com/websockets/ws/issues/1170"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: backpressure-exceeded
        condition: "Send buffer full (bufferedAmount exceeds threshold)"
        throws: "Does NOT throw, but causes memory exhaustion and OOM crashes"
        required_handling: >
          Caller MUST check bufferedAmount before sending in high-throughput scenarios.
          If bufferedAmount > threshold (e.g., 1 MB), pause sending.
          Wait for drain event before resuming.
          WITHOUT backpressure handling: memory leak, OOM crash.
          Example: if (ws.bufferedAmount > 1024*1024) { pause_sending(); }
        sources:
          - "https://skylinecodes.substack.com/p/backpressure-in-websocket-streams"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: message-too-large
        condition: "Message size exceeds maxPayload"
        throws: "RangeError: Invalid WebSocket frame: payload length > maxPayload"
        required_handling: >
          Caller MUST validate message size before sending.
          Configure maxPayload appropriately (default 100 MiB may be too high).
          Connection closes with code 1009 (message too big).
          Split large messages into chunks or use chunking protocol.
        sources:
          - "https://github.com/websockets/ws/issues/1543"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: broadcasting-without-readystate-check
        description: >
          COMMON: Broadcasting to all clients without checking readyState.
          Results in errors when sending to closing/closed connections.
          ALWAYS check: wss.clients.forEach(client => {
            if (client.readyState === WebSocket.OPEN) {
              client.send(data);
            }
          });
          Without check: errors thrown for every closed connection.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md#how-to-broadcast-a-message-to-all-clients"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: WebSocketServer
    import_path: "ws"
    description: "Creates WebSocket server"
    postconditions:
      - id: server-error
        condition: "Server error (port in use, permission denied, etc.)"
        throws: "Emits 'error' event on server"
        required_handling: >
          Caller MUST attach error event handler to server.
          Common errors: EADDRINUSE (port in use), EACCES (permission denied).
          Without handler, errors crash the process.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md#event-error-1"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: client-error-before-connection
        condition: "Client error before connection established (handshake failure)"
        throws: "Emits 'wsClientError' event on server"
        required_handling: >
          Caller SHOULD handle wsClientError for errors during handshake.
          Prevents crashes from malformed upgrade requests.
          This event is emitted BEFORE connection event.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md#event-wsclienterror"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: no-origin-validation
        condition: "Server accepts connections without origin validation"
        throws: "Does NOT throw, but allows cross-origin attacks"
        required_handling: >
          Caller MUST validate origin in production via verifyClient callback.
          WITHOUT validation: any website can connect to your WebSocket server.
          SECURITY RISK: Cross-Site WebSocket Hijacking (CSWSH).
          Example: new WebSocketServer({
            verifyClient: (info) => {
              return allowedOrigins.includes(info.origin);
            }
          });
        sources:
          - "https://owasp.org/www-community/vulnerabilities/Cross-Site_WebSocket_Hijacking"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: no-maxpayload-limit
        description: >
          SECURITY: Not configuring maxPayload allows DoS via large messages.
          Default 100 MiB is often too high for production.
          ALWAYS configure: new WebSocketServer({ maxPayload: 10 * 1024 * 1024 })
          Set to appropriate limit for your use case (e.g., 10 MB).
          Prevents CVE-2016-10542 style attacks.
        sources:
          - "https://nvd.nist.gov/vuln/detail/CVE-2016-10542"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: memory-leak-event-listeners
        description: >
          COMMON: Not removing event listeners on connection close.
          Each connection adds listeners, but they're never removed.
          Results in memory leak as listener count grows unbounded.
          ALWAYS: ws.on('close', () => { ws.removeAllListeners(); });
          Alternatively, use once() for one-time events.
        sources:
          - "https://github.com/websockets/ws/issues/1334"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: close
    import_path: "ws"
    description: "Closes WebSocket connection"
    postconditions:
      - id: close-emits-event
        condition: "Connection closes (gracefully or abnormally)"
        throws: "Emits 'close' event with code and reason"
        required_handling: >
          Caller SHOULD handle close event for cleanup.
          Close codes indicate reason: 1000 (normal), 1006 (abnormal), etc.
          Code 1006 means connection lost without close frame (network issue).
          Code 1000 means clean shutdown.
          Code 1009 means message too big.
          Remove event listeners to prevent memory leaks.
        sources:
          - "https://websocket.org/reference/close-codes/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
