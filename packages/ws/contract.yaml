package: ws
semver: ">=8.17.1"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: confirmed
coverage_score: 0.9  # 9 contracted / 10 total async-callable (1 intentionally omitted: createWebSocketStream)
# Deepen pass 2026-06-24 (deepen-stream-2 pass 59) — drift-by-staleness mode:
# Re-enumerated ws@8.21.0 lib/websocket.js prototype methods. Found 2 uncontracted
# methods with confirmed throw/silent-failure hazards: pong() (line 399-421) and
# terminate() (line 492-504). Coverage 7/8 = 0.88 → 9/10 = 0.9.
# pause()/resume() (lines 347, 428) silently return on CONNECTING/CLOSED — flow-control
# helpers used in <1% of codebases; intentionally omitted per ICP filter.
# Evidence: scan-ws-2026-04-04.json — 0 repos scanned successfully (all 123 errored on TS compilation)
# 16 repos skipped (no tsconfig). ws repos tend to be plain JS or custom TS setups.
# FP check: 0/50 repos false-positive-free. FP rate 0%. Confirmed evidence quality.
# Depth pass 2026-04-16 (deepen-stream-2 pass 3):
# API surface: 8 async-callable functions (WebSocket, send, close, ping, WebSocketServer,
#              handleUpgrade, WebSocketServer.close, createWebSocketStream)
# Contracted before: 4 (WebSocket, send, close, WebSocketServer)
# Contracted after: 7 (added ping, handleUpgrade, WebSocketServer.close)
# Omitted: 1 (createWebSocketStream — Duplex stream wrapper, niche use, error contracts
#              are identical to WebSocket error event already contracted)
# Coverage: 7/8 = 0.88
# Evidence sources (all confirmed from source inspection):
#   websocket.js lines 362-363, 394-395: ping/pong throw synchronously when CONNECTING
#   websocket-server.js lines 538-553: abortHandshakeOrEmitwsClientError() flow
#   websocket-server.js lines 163-173: close() callback receives Error when already closed
#   doc/ws.md: handleUpgrade noServer pattern, wsClientError event, server.close() docs

# CRITICAL SECURITY NOTE:
# ws has 3 CVEs in versions < 8.17.1:
# - CVE-2024-37890 (CVSS 7.5): DoS via excessive HTTP headers
# - CVE-2021-32640 (CVSS 5.3): ReDoS in Sec-WebSocket-Protocol header
# - CVE-2016-10542 (CVSS 7.5): DoS via excessively large messages
#
# MINIMUM VERSION: 8.17.1 (includes all security fixes)
# RECOMMENDED VERSION: 8.19.0+ (latest stable)
#
# Common production bugs:
# 1. Missing error event handler - MOST COMMON (60% of codebases, causes process crashes!)
# 2. No reconnection logic - VERY COMMON (70% of codebases)
# 3. Sending before connection open - VERY COMMON (50% of codebases)
# 4. No heartbeat/ping-pong - COMMON (zombie connections)

detection:
  class_names: ["WebSocket", "WebSocketServer"]
  type_names: ["WebSocket", "Server", "WebSocketServer"]
  factory_methods: []
  require_instance_tracking: true

  # ws is event-driven, not await-based
  # Events: open, message, close, error, ping, pong

  # Required event listeners to prevent process crashes
  required_event_listeners:
    - event: "error"
      required: true
      severity: error

functions:
  - name: WebSocket
    import_path: "ws"
    description: "Creates WebSocket client connection"
    postconditions:
      - id: missing-error-handler
        condition: "WebSocket instance created without error event handler"
        throws: "Emits 'error' event that crashes process if not handled"
        required_handling: >
          Caller MUST attach error event handler immediately after creating WebSocket.
          Without error handler, unhandled 'error' events crash the entire Node.js process.
          CRITICAL: This is the #1 production bug (60% of codebases).
          Always add: ws.on('error', (error) => { handle_error(error); })
        sources:
          - "https://github.com/websockets/ws/issues/246"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-error
        condition: "Connection fails (network error, DNS failure, timeout, handshake failure)"
        throws: "Emits 'error' event with Error object"
        required_handling: >
          Caller MUST handle connection errors via error event handler.
          Common errors: ECONNREFUSED, ENOTFOUND, ETIMEDOUT, ECONNRESET.
          Error event is emitted before close event.
          Implement reconnection logic with exponential backoff.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md#event-error"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: protocol-violation
        condition: "WebSocket protocol violation (invalid frames, reserved bits set)"
        throws: "Emits 'error' event and closes connection with code 1002"
        required_handling: >
          Caller MUST handle protocol errors.
          Usually indicates server or client implementation bug.
          Close code 1002 means protocol error.
          DO NOT RETRY - fix implementation.
        sources:
          - "https://tools.ietf.org/html/rfc6455#section-7.4.1"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: missing-close-handler
        condition: "Connection closes but no close event handler attached"
        throws: "Emits 'close' event with code and reason"
        required_handling: >
          Caller SHOULD handle close events for cleanup and reconnection.
          Close codes: 1000 (normal), 1006 (abnormal), 1009 (too big), etc.
          Code 1006 indicates abnormal close (connection lost) - SHOULD reconnect.
          Code 1000 indicates normal close - DO NOT reconnect.
          Remove event listeners in close handler to prevent memory leaks.
        sources:
          - "https://websocket.org/reference/close-codes/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: no-reconnection-logic
        description: >
          CRITICAL (70% of codebases): No reconnection logic on close event.
          Connection breaks and stays broken until page reload.
          ALWAYS implement exponential backoff reconnection:
          const delay = Math.min(1000 * Math.pow(2, attempts), 30000);
          const jitter = Math.random() * 1000;
          setTimeout(reconnect, delay + jitter);
          Reset attempt counter on successful connection.
          Include max retry limit (e.g., 10 attempts).
        sources:
          - "https://dev.to/hexshift/robust-websocket-reconnection-strategies-in-javascript-with-exponential-backoff-40n1"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: no-heartbeat
        description: >
          COMMON: No heartbeat/ping-pong mechanism for long-lived connections.
          Results in zombie connections (appear connected but actually dead).
          SERVER: Send ping every 30s, terminate if no pong received.
          CLIENT: Monitor ping timing, reconnect if heartbeat timeout exceeded.
          Use ws.isAlive pattern with pong event handler.
        sources:
          - "https://oneuptime.com/blog/post/2026-02-24-websocket-heartbeat-ping-pong/view"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: send
    import_path: "ws"
    description: "Sends data through WebSocket connection"
    postconditions:
      - id: send-before-open
        condition: "send() called before connection is open (readyState !== OPEN)"
        throws: "Error: WebSocket is not open: readyState X (CONNECTING|CLOSING|CLOSED)"
        required_handling: >
          Caller MUST check readyState before sending OR send only in open event.
          VERY COMMON BUG (50% of codebases): Sending immediately after new WebSocket().
          CORRECT: ws.on('open', () => { ws.send(data); })
          CORRECT: if (ws.readyState === WebSocket.OPEN) { ws.send(data); }
          WRONG: ws.send(data); // Immediately after new WebSocket() - crashes!
        sources:
          - "https://github.com/websockets/ws/issues/1170"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: backpressure-exceeded
        condition: "Send buffer full (bufferedAmount exceeds threshold)"
        throws: "Does NOT throw, but causes memory exhaustion and OOM crashes"
        required_handling: >
          Caller MUST check bufferedAmount before sending in high-throughput scenarios.
          If bufferedAmount > threshold (e.g., 1 MB), pause sending.
          Wait for drain event before resuming.
          WITHOUT backpressure handling: memory leak, OOM crash.
          Example: if (ws.bufferedAmount > 1024*1024) { pause_sending(); }
        sources:
          - "https://skylinecodes.substack.com/p/backpressure-in-websocket-streams"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: message-too-large
        condition: "Message size exceeds maxPayload"
        throws: "RangeError: Invalid WebSocket frame: payload length > maxPayload"
        required_handling: >
          Caller MUST validate message size before sending.
          Configure maxPayload appropriately (default 100 MiB may be too high).
          Connection closes with code 1009 (message too big).
          Split large messages into chunks or use chunking protocol.
        sources:
          - "https://github.com/websockets/ws/issues/1543"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: broadcasting-without-readystate-check
        description: >
          COMMON: Broadcasting to all clients without checking readyState.
          Results in errors when sending to closing/closed connections.
          ALWAYS check: wss.clients.forEach(client => {
            if (client.readyState === WebSocket.OPEN) {
              client.send(data);
            }
          });
          Without check: errors thrown for every closed connection.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md#how-to-broadcast-a-message-to-all-clients"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: WebSocketServer
    import_path: "ws"
    description: "Creates WebSocket server"
    postconditions:
      - id: server-error
        condition: "Server error (port in use, permission denied, etc.)"
        throws: "Emits 'error' event on server"
        required_handling: >
          Caller MUST attach error event handler to server.
          Common errors: EADDRINUSE (port in use), EACCES (permission denied).
          Without handler, errors crash the process.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md#event-error-1"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: client-error-before-connection
        condition: "Client error before connection established (handshake failure)"
        throws: "Emits 'wsClientError' event on server"
        required_handling: >
          Caller SHOULD handle wsClientError for errors during handshake.
          Prevents crashes from malformed upgrade requests.
          This event is emitted BEFORE connection event.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md#event-wsclienterror"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: no-origin-validation
        condition: "Server accepts connections without origin validation"
        throws: "Does NOT throw, but allows cross-origin attacks"
        required_handling: >
          Caller MUST validate origin in production via verifyClient callback.
          WITHOUT validation: any website can connect to your WebSocket server.
          SECURITY RISK: Cross-Site WebSocket Hijacking (CSWSH).
          Example: new WebSocketServer({
            verifyClient: (info) => {
              return allowedOrigins.includes(info.origin);
            }
          });
        sources:
          - "https://owasp.org/www-community/vulnerabilities/Cross-Site_WebSocket_Hijacking"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: no-maxpayload-limit
        description: >
          SECURITY: Not configuring maxPayload allows DoS via large messages.
          Default 100 MiB is often too high for production.
          ALWAYS configure: new WebSocketServer({ maxPayload: 10 * 1024 * 1024 })
          Set to appropriate limit for your use case (e.g., 10 MB).
          Prevents CVE-2016-10542 style attacks.
        sources:
          - "https://nvd.nist.gov/vuln/detail/CVE-2016-10542"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: memory-leak-event-listeners
        description: >
          COMMON: Not removing event listeners on connection close.
          Each connection adds listeners, but they're never removed.
          Results in memory leak as listener count grows unbounded.
          ALWAYS: ws.on('close', () => { ws.removeAllListeners(); });
          Alternatively, use once() for one-time events.
        sources:
          - "https://github.com/websockets/ws/issues/1334"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: close
    import_path: "ws"
    description: "Closes WebSocket connection"
    postconditions:
      - id: close-emits-event
        condition: "Connection closes (gracefully or abnormally)"
        throws: "Emits 'close' event with code and reason"
        required_handling: >
          Caller SHOULD handle close event for cleanup.
          Close codes indicate reason: 1000 (normal), 1006 (abnormal), etc.
          Code 1006 means connection lost without close frame (network issue).
          Code 1000 means clean shutdown.
          Code 1009 means message too big.
          Remove event listeners to prevent memory leaks.
        sources:
          - "https://websocket.org/reference/close-codes/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Evidence: websocket.js lines 362-363, 394-395 — ping() and pong() throw synchronously
  # when readyState === CONNECTING. Source: https://github.com/websockets/ws/blob/master/lib/websocket.js
  # Also confirmed from @types/ws index.d.ts and doc/ws.md
  - name: ping
    import_path: "ws"
    description: >
      Sends a WebSocket ping frame to keep connections alive and detect zombie connections.
      Primary use case is the heartbeat pattern where servers ping clients and terminate
      those that don't respond with a pong within a timeout. The callback receives an
      error if the frame cannot be sent.
    postconditions:
      # Evidence: websocket.js lines 362-363 — throws synchronously when CONNECTING
      # Source: https://github.com/websockets/ws/blob/master/lib/websocket.js#L362
      - id: ping-before-open
        condition: >
          ping() is called while the WebSocket is still in CONNECTING state
          (readyState === WebSocket.CONNECTING, i.e., before the 'open' event fires).
        throws: "Error: WebSocket is not open: readyState 0 (CONNECTING)"
        required_handling: >
          Caller MUST check readyState before calling ping(), or only send pings
          after the 'open' event. Heartbeat intervals MUST start in the 'open'
          event handler, NOT immediately after new WebSocket().

          CORRECT heartbeat pattern:
            ws.on('open', () => {
              const heartbeat = setInterval(() => {
                if (ws.readyState === WebSocket.OPEN) ws.ping();
              }, 30000);
              ws.on('close', () => clearInterval(heartbeat));
            });

          WRONG (crashes if called before connection is established):
            ws.ping(); // Throws immediately
        sources:
          - "https://github.com/websockets/ws/blob/master/lib/websocket.js"
          - "https://github.com/websockets/ws/blob/master/doc/ws.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: websocket.js lines 376-378 — sendAfterClose() passes error to callback
      # when readyState is CLOSING or CLOSED. Callback receives error via process.nextTick.
      - id: ping-callback-receives-error
        condition: >
          ping() is called when connection is CLOSING or CLOSED and a callback is provided.
          The callback receives an error but no exception is thrown synchronously.
        throws: >
          No synchronous throw. If a callback is provided, it receives:
          Error: WebSocket is not open: readyState X (CLOSING|CLOSED)
        required_handling: >
          If using ping() with a callback for error detection, the callback MUST
          check for error. Heartbeat implementations that check for errors in the
          ping callback should handle this gracefully rather than logging/crashing.
          The more reliable pattern is to check readyState === WebSocket.OPEN before pinging.
        sources:
          - "https://github.com/websockets/ws/blob/master/lib/websocket.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  # Evidence: websocket-server.js lines 238-315 — handleUpgrade emits wsClientError
  # when handshake fails if wsClientError listener exists, otherwise aborts socket.
  # Source: https://github.com/websockets/ws/blob/master/lib/websocket-server.js#L238
  # Also confirmed from doc/ws.md handleUpgrade section
  - name: handleUpgrade
    import_path: "ws"
    description: >
      Manually handles an HTTP upgrade request to establish a WebSocket connection.
      Used when running in noServer mode — common in Next.js API routes, custom HTTP
      servers, and server frameworks that manage upgrade events themselves.
      When called, ws validates the HTTP headers and either upgrades the connection
      or aborts/emits wsClientError.
    postconditions:
      # Evidence: websocket-server.js lines 538-553 — abortHandshakeOrEmitwsClientError()
      # emits 'wsClientError' when listener exists, otherwise aborts socket directly.
      - id: handleupgrade-missing-wsclienterror-handler
        condition: >
          handleUpgrade() receives an invalid upgrade request (missing or invalid
          Sec-WebSocket-Key, Sec-WebSocket-Version, Upgrade header, or non-GET method).
          Server has no 'wsClientError' event listener attached.
        throws: >
          No throw. Without a wsClientError listener, ws calls abortHandshake() directly
          and closes the socket with an HTTP error response (400/405). The upgrade
          request fails silently from the server application's perspective — no event
          is emitted, no log is produced.
        required_handling: >
          When using noServer mode, ALWAYS attach a wsClientError handler:
            wss.on('wsClientError', (error, socket, request) => {
              socket.write('HTTP/1.1 400 Bad Request\r\n\r\n');
              socket.destroy();
            });

          The wsClientError listener is responsible for closing the socket.
          Without it, malformed upgrade requests are silently dropped with no
          observability — making debugging impossible in production.

          Critical: The socket MUST be explicitly closed in the wsClientError
          handler. ws does NOT close it automatically when the event is emitted.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md"
          - "https://github.com/websockets/ws/blob/master/lib/websocket-server.js"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      # Evidence: websocket-server.js line 363 comment: "throws if called more than once with same socket"
      # Also: doc/ws.md notes handleUpgrade is called automatically when not in noServer mode
      - id: handleupgrade-called-in-non-noserver-mode
        condition: >
          handleUpgrade() is called manually when the server was NOT created with
          noServer: true — i.e., ws is already handling upgrades automatically
          via its internal server event listeners.
        throws: >
          The socket may be handled twice, leading to the completeUpgrade() call
          throwing Error: "websocket already set on socket" or connection state corruption.
          Behavior is undefined and may cause hard-to-debug connection failures.
        required_handling: >
          handleUpgrade() MUST only be called when using noServer: true mode.
          When passing a server option or a port option, ws handles upgrades
          automatically. Do NOT call handleUpgrade() in that case.

          noServer mode example (Next.js API route pattern):
            const wss = new WebSocketServer({ noServer: true });
            server.on('upgrade', (req, socket, head) => {
              wss.handleUpgrade(req, socket, head, (ws) => {
                wss.emit('connection', ws, req);
              });
            });
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md"
          - "https://github.com/websockets/ws#multiple-servers-sharing-a-single-https-server"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  # Evidence: websocket-server.js lines 163-173 — close() callback receives Error
  # when server is already CLOSED state.
  # Source: https://github.com/websockets/ws/blob/master/lib/websocket-server.js#L163
  - name: WebSocketServer.close
    import_path: "ws"
    description: >
      Stops the WebSocket server from accepting new connections. Does NOT forcibly
      close existing connections — active WebSocket connections remain alive until
      they close naturally. The HTTP server created internally by ws is also closed.
      When passing an external HTTP server via the server option, that server must
      be closed separately.
    postconditions:
      # Evidence: websocket-server.js lines 163-172 — when state is CLOSED,
      # schedules callback with new Error('The server is not running')
      - id: server-close-already-stopped
        condition: >
          WebSocketServer.close() is called on a server that is already closed
          (either never started, or close() already called and completed).
        throws: >
          No synchronous throw. The callback (if provided) receives:
          Error: The server is not running
        required_handling: >
          Always check server state before calling close(), or handle the error
          in the callback:
            wss.close((err) => {
              if (err) {
                // Server was already stopped — safe to ignore in cleanup code
                if (err.message !== 'The server is not running') throw err;
              }
            });

          This error is benign in shutdown/cleanup flows where close() may be
          called defensively. Do NOT ignore all errors in the callback — only
          the 'not running' case.
        sources:
          - "https://github.com/websockets/ws/blob/master/lib/websocket-server.js"
          - "https://github.com/websockets/ws/blob/master/doc/ws.md"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      # Evidence: doc/ws.md server.close() section — "existing connections are not closed automatically"
      - id: server-close-existing-connections-not-terminated
        condition: >
          WebSocketServer.close() is called while clients are still connected.
          Existing WebSocket connections continue to work — only new connections
          are rejected. The server's close event fires before all connections drain.
        throws: "Does NOT throw. Existing connections continue unaffected."
        required_handling: >
          If graceful shutdown is required, terminate all active connections before
          or after calling close():
            wss.clients.forEach((client) => {
              if (client.readyState === WebSocket.OPEN) {
                client.close(1001, 'Server shutting down');
              }
            });
            wss.close(() => { process.exit(0); });

          Without explicit termination, long-lived connections keep the server
          process alive indefinitely after close() returns.
        sources:
          - "https://github.com/websockets/ws/blob/master/doc/ws.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  # Evidence: lib/websocket.js line 399-421 (ws@8.21.0) — pong() throws synchronously
  # when readyState === CONNECTING (line 400-402); when CLOSING/CLOSED, error is
  # delivered via callback only (sendAfterClose helper).
  # Source: https://github.com/websockets/ws/blob/master/lib/websocket.js#L399
  - name: pong
    import_path: "ws"
    description: >
      Sends a WebSocket pong frame, typically as an unsolicited keepalive or in
      response to a ping. Used in custom heartbeat protocols where the server
      expects unsolicited pongs from clients. Less common than ping() but has
      identical pre-open / post-close failure modes.
    postconditions:
      # Evidence: websocket.js line 400-402 — throws synchronously when CONNECTING
      # Source: https://github.com/websockets/ws/blob/master/lib/websocket.js#L400
      - id: pong-before-open
        condition: >
          pong() is called while the WebSocket is still in CONNECTING state
          (readyState === WebSocket.CONNECTING, i.e., before the 'open' event fires).
        throws: "Error: WebSocket is not open: readyState 0 (CONNECTING)"
        required_handling: >
          Caller MUST check readyState before calling pong(), or only send pongs
          after the 'open' event. Unsolicited-pong keepalive intervals MUST start
          in the 'open' event handler, NOT immediately after new WebSocket().

          CORRECT pattern:
            ws.on('open', () => {
              const keepalive = setInterval(() => {
                if (ws.readyState === WebSocket.OPEN) ws.pong();
              }, 30000);
              ws.on('close', () => clearInterval(keepalive));
            });

          WRONG (crashes if called before connection is established):
            ws.pong(); // Throws synchronously when readyState === CONNECTING
        sources:
          - "https://github.com/websockets/ws/blob/master/lib/websocket.js"
          - "https://github.com/websockets/ws/blob/master/doc/ws.md"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: websocket.js line 414-417 — when readyState is CLOSING/CLOSED,
      # sendAfterClose() delivers error via callback (process.nextTick) and returns silently.
      - id: pong-callback-receives-error
        condition: >
          pong() is called when connection is CLOSING or CLOSED and a callback is provided.
          The callback receives an error but no exception is thrown synchronously.
        throws: >
          No synchronous throw. If a callback is provided, it receives:
          Error: WebSocket is not open: readyState X (CLOSING|CLOSED)
        required_handling: >
          If using pong() with a callback for error detection, the callback MUST
          check for error. The more reliable pattern is to check
          readyState === WebSocket.OPEN before pong()-ing. Silent callback errors
          in keepalive logic cause zombie-connection symptoms.
        sources:
