package: uploadthing
semver: ">=6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed
coverage_score: 0.80

functions:
  - name: UTApi.uploadFiles
    import_path: "uploadthing/server"
    description: "Upload files to UploadThing storage via UTApi server-side SDK"

    postconditions:
      # Evidence: 0 primary firings across 16 repos scanned in scan-uploadthing-2026-04-03.json (all errored during scan)
      # FP check: 0/20 FPs in repos without uploadthing (0% rate)
      - id: upload-files-no-try-catch
        condition: "awaited utapi.uploadFiles() call is not wrapped in try/catch"
        throws: "UploadThingError"
        required_handling: >
          Caller MUST wrap utapi.uploadFiles() in try/catch. The method makes HTTP
          requests to UploadThing's servers. UploadThingError is thrown for network
          failures, quota exceeded, invalid file type, and authentication errors.
          Error codes include: UPLOAD_FAILED, TOO_LARGE, TOO_MANY_FILES, MISSING_ENV,
          FORBIDDEN, INTERNAL_SERVER_ERROR.
        sources:
          - https://docs.uploadthing.com/errors
          - https://docs.uploadthing.com/api-reference/ut-api
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: UTApi.deleteFiles
    import_path: "uploadthing/server"
    description: "Delete files from UploadThing storage via UTApi"

    postconditions:
      # Evidence: 0 primary firings in scan-uploadthing-2026-04-03.json
      - id: delete-files-no-try-catch
        condition: "awaited utapi.deleteFiles() call is not wrapped in try/catch"
        throws: "UploadThingError"
        required_handling: >
          Caller MUST wrap utapi.deleteFiles() in try/catch. The method makes HTTP
          requests to UploadThing's API. Network failures or invalid file keys throw
          UploadThingError with codes like NOT_FOUND or INTERNAL_SERVER_ERROR.
        sources:
          - https://docs.uploadthing.com/errors
          - https://docs.uploadthing.com/api-reference/ut-api
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
