# capture(), identify(), alias(), groupIdentify() are fire-and-forget — they queue events internally and NEVER throw. Correct to call without try-catch.
# captureImmediate(), identifyImmediate(), aliasImmediate() are async but catch errors internally — they NEVER throw to the caller.
# reloadFeatureFlags() catches errors internally via .catch() in loadFeatureFlags() — it does NOT propagate errors to the caller.
# waitForLocalEvaluationReady() returns false on timeout (does not throw) — does not need try-catch.
# The async network methods that CAN throw: getFeatureFlag, isFeatureEnabled, getAllFlags, getAllFlagsAndPayloads,
#   getFeatureFlagPayload, getFeatureFlagResult, flush, shutdown, getRemoteConfigPayload, evaluateFlags.
# PostHog SDK v5+ uses PostHogFetchHttpError and PostHogFetchNetworkError from @posthog/core for network errors.
# Feature flag methods also return FeatureFlagError enum values in error state rather than throwing in some paths.
# Local evaluation (with personal API key) still makes an initial network call to fetch flag definitions.
# Drift pass 2026-06-24 (deepen-stream-2 pass 68): posthog-node@5.38.4 added evaluateFlags() as the canonical
#   replacement for getFeatureFlag/isFeatureEnabled/getFeatureFlagPayload (all now @deprecated). evaluateFlags()
#   consolidates flag evaluation into a single /flags request and returns a FeatureFlagEvaluations snapshot.
#   The deprecated methods still ship — the new contract function is additive, not replacing existing entries.
package: posthog-node
semver: ">=3.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0
# Coverage calculation: 10 contracted / 10 non-omitted (18 total - 8 intentionally omitted = 10) = 1.0
# Previously contracted (4 original + 5 pass-11): getFeatureFlag, isFeatureEnabled, getAllFlags, shutdown,
#   getAllFlagsAndPayloads, getFeatureFlagPayload, getFeatureFlagResult, flush, getRemoteConfigPayload
# Added pass 68 (1): evaluateFlags (drift — posthog-node@5.38.4 canonical replacement)
# Intentionally omitted (8): reloadFeatureFlags, waitForLocalEvaluationReady, captureImmediate,
#   identifyImmediate, aliasImmediate, captureExceptionImmediate, enable, disable
# Drift-mode notes: fetch() is marked @internal in client.d.ts — omit. prepareEventMessage() is undocumented
#   and lacks JSDoc/error semantics — omit. _shutdown() is the underscore-prefixed private impl of shutdown().

functions:
  - name: getFeatureFlag
    import_path: "posthog-node"
    # Evidence: 0 primary firings across 13 repos in scan-posthog-node-2026-04-01.json
    # Note: low violation count likely reflects that feature flag calls are often wrapped
    # in try-catch in production code, or repos in corpus don't call getFeatureFlag directly.
    description: >
      Evaluates a feature flag for a given distinct ID. Makes a synchronous network
      call to the PostHog API to retrieve the flag value. Returns string (multivariate),
      boolean (boolean flag), or undefined (flag not found / error).
      NOTE: capture(), identify(), alias(), groupIdentify() are fire-and-forget and
      do NOT require try-catch — only the async network methods need error handling.

    postconditions:
      - id: network-error
        maturity: stable
        condition: >
          Network failure, DNS resolution failure, PostHog API unreachable, API key
          invalid, rate limit exceeded, or any server-side error (5xx)
        throws: >
          Error or unhandled Promise rejection with network/HTTP details.
          PostHog SDK does not define a typed error class for feature flag calls;
          the rejection is a generic Error with message describing the failure.
        required_handling: >
          Caller MUST wrap in try-catch (or use .catch()). Unlike capture()/identify()
          which are fire-and-forget, getFeatureFlag() makes a live network call and
          WILL reject on failure. Uncaught rejections crash the request handler or
          produce unhandled rejection warnings in Node.js.

          Minimum handling:
            try {
              const flag = await posthog.getFeatureFlag('my-flag', userId);
              if (flag === true) { /* feature on */ }
            } catch (err) {
              console.error('Feature flag check failed:', err);
              // Fall back to default behavior
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
          - "https://posthog.com/docs/feature-flags/bootstrapping-and-local-evaluation"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isFeatureEnabled
    import_path: "posthog-node"
    description: >
      Checks whether a boolean feature flag is enabled for a given distinct ID.
      Makes a network call to PostHog API. Returns boolean or undefined.
      This is a convenience wrapper around getFeatureFlag().

    postconditions:
      - id: network-error
        maturity: stable
        condition: >
          Network failure, DNS resolution failure, PostHog API unreachable, or
          server-side error
        throws: >
          Error or unhandled Promise rejection. Same error surface as getFeatureFlag().
        required_handling: >
          Caller MUST wrap in try-catch. isFeatureEnabled() makes a live network call
          and rejects on failure. Missing error handling causes unhandled rejection.

          Minimum handling:
            try {
              const enabled = await posthog.isFeatureEnabled('my-flag', userId);
              if (enabled) { /* ... */ }
            } catch (err) {
              console.error('Feature flag check failed:', err);
              // Fall back to default (disabled)
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getAllFlags
    import_path: "posthog-node"
    description: >
      Retrieves all feature flag values for a given distinct ID in a single network
      call. Returns a Record mapping flag keys to their values (boolean or string).
      Used when multiple flags need to be evaluated at once.

    postconditions:
      - id: network-error
        maturity: stable
        condition: >
          Network failure, PostHog API unreachable, or server-side error
        throws: >
          Error or unhandled Promise rejection.
        required_handling: >
          Caller MUST wrap in try-catch. getAllFlags() makes a live network call and
          rejects on failure. This is the most common source of unhandled PostHog
          rejections in production (confirmed in n8n codebase).

          Minimum handling:
            try {
              const flags = await posthog.getAllFlags(userId);
              return flags;
            } catch (err) {
              console.error('Failed to fetch feature flags:', err);
              return {}; // Safe default: all flags disabled
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: shutdown
    import_path: "posthog-node"
    description: >
      Flushes all pending events from the queue and shuts down the PostHog client.
      Should be called before process exit to ensure events are not lost.
      Takes an optional shutdownTimeoutMs parameter (default: 30000ms). Internally
      calls _shutdown() which races a Promise.race between flushing and a timeout.
      In serverless environments (Lambda, Vercel, Cloudflare Workers) use the
      waitUntil option instead, which wraps the flush promise automatically.

    postconditions:
      # Evidence: posthog-node/src/client.ts _shutdown() source — timeout throws a string rejection:
      # reject('Timeout while shutting down PostHog. Some events may not have been sent.')
      # Network errors (PostHogFetchHttpError, PostHogFetchNetworkError) are caught internally by _shutdown()
      # and only rethrown if they are NOT PostHog fetch errors (non-network errors propagate).
      # Sources: /private/tmp/claude/bc-deepen/posthog-node/node_modules/@posthog/core/dist/posthog-core-stateless.mjs
      - id: shutdown-timeout-error
        maturity: stable
        condition: >
          Flush does not complete within shutdownTimeoutMs (default 30 seconds) — all
          pending events cannot be delivered before the timeout fires.
        throws: >
          String rejection: 'Timeout while shutting down PostHog. Some events may not have been sent.'
          Note: This is a string, not an Error instance — typeof err === 'string'.
          In Node.js, unhandled string rejections still trigger unhandledRejection events.
        required_handling: >
          Caller SHOULD wrap in try-catch. Shutdown timeout means queued analytics events
          are lost — not a business-critical failure, but unhandled rejections interfere with
          process exit in Node.js and signal graceful shutdown success to orchestrators.

          Recommended handling:
            try {
              await posthog.shutdown();
            } catch (err) {
              console.error('PostHog shutdown timed out, some events may be lost:', err);
              // Non-critical — continue with process exit
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: getAllFlagsAndPayloads
    import_path: "posthog-node"
    description: >
      Retrieves all feature flag values AND their JSON payloads for a given distinct ID
      in a single network call. Returns an object with featureFlags (Record) and
      featureFlagPayloads (Record). Used when multiple flags with configuration payloads
      need to be evaluated at once — more efficient than calling getFeatureFlagPayload()
      separately for each flag. getAllFlags() is a thin wrapper around this method.

    postconditions:
      # Evidence: posthog-node/src/client.ts getAllFlagsAndPayloads() source — calls
      # super.getFeatureFlagsAndPayloadsStateless() which makes HTTPS POST to PostHog API.
      # Same network error surface as getAllFlags() which wraps this method.
      # Source: /private/tmp/claude/bc-deepen/posthog-node/node_modules/posthog-node/dist/client.js:428-490
      - id: get-all-flags-and-payloads-network-error
        maturity: stable
        condition: >
          Network failure, DNS resolution failure, PostHog API unreachable, API key
          invalid, rate limit exceeded, or any server-side error (5xx) when fetching
          all flags and payloads in a single batch call.
        throws: >
          PostHogFetchHttpError — thrown on HTTP error responses (non-2xx status codes).
            Properties: .response (Response object), .name === 'PostHogFetchHttpError'.
          PostHogFetchNetworkError — thrown on network/fetch failures.
            Properties: .error (underlying Error), .name === 'PostHogFetchNetworkError'.
          Both are exported from @posthog/core (dependency of posthog-node).
        required_handling: >
          Caller MUST wrap in try-catch. getAllFlagsAndPayloads() makes a live network
          call and rejects on failure. Particularly dangerous in initialization code
          where flag payloads drive configuration — uncaught rejection crashes the
          entire startup flow or request handler.

          Minimum handling:
            try {
              const { featureFlags, featureFlagPayloads } = await posthog.getAllFlagsAndPayloads(userId);
              const config = featureFlagPayloads['ui-config'];
              return { flags: featureFlags, config };
            } catch (err) {
              console.error('Failed to fetch flags and payloads:', err);
              return { flags: {}, config: null }; // Safe default
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getFeatureFlagPayload
    import_path: "posthog-node"
    description: >
      Fetches the JSON payload associated with a feature flag for a given distinct ID.
      Returns the parsed payload (any JSON value) or undefined if the flag has no
      payload or the flag is not found. Delegates to _getFeatureFlagResult() internally —
      same network surface as getFeatureFlag(). Payloads are arbitrary JSON values
      (objects, arrays, strings, numbers) used for remote configuration.

    postconditions:
      # Evidence: posthog-node/src/client.ts getFeatureFlagPayload() source:
      # const result = await this._getFeatureFlagResult(key, distinctId, ...)
      # _getFeatureFlagResult calls the same PostHog API as getFeatureFlag.
      # Source: /private/tmp/claude/bc-deepen/posthog-node/node_modules/posthog-node/dist/client.js:387-398
      - id: get-feature-flag-payload-network-error
        maturity: stable
        condition: >
          Network failure, DNS resolution failure, PostHog API unreachable, API key
          invalid, rate limit exceeded, or server-side error during flag payload fetch.
        throws: >
          PostHogFetchHttpError or PostHogFetchNetworkError (from @posthog/core).
          Same error types as getFeatureFlag(). Note: returns undefined (not throws)
          when the flag exists but has no payload — only network/auth failures throw.
        required_handling: >
          Caller MUST wrap in try-catch. Payload failures are particularly dangerous
          because callers often use payloads for dynamic configuration — an uncaught
          rejection means configuration loading fails entirely, potentially crashing
          the service or leaving it with no configuration at all.

          Minimum handling:
            try {
              const payload = await posthog.getFeatureFlagPayload('ui-config', userId);
              const config = payload as { theme: string } ?? { theme: 'default' };
              return config;
            } catch (err) {
              console.error('Failed to fetch flag payload:', err);
              return { theme: 'default' }; // Fall back to default config
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: getFeatureFlagResult
    import_path: "posthog-node"
    description: >
      Fetches both the feature flag value AND its payload in a single call. Returns a
      FeatureFlagResult object with .enabled (boolean), .value (FeatureFlagValue), and
      .payload (JsonType|null) fields. More efficient than calling getFeatureFlag() and
      getFeatureFlagPayload() separately. Returns undefined if distinctId is missing.

    postconditions:
      # Evidence: posthog-node/src/client.ts getFeatureFlagResult() source:
      # return this._getFeatureFlagResult(key, resolvedDistinctId, ...) — same internal
      # method as getFeatureFlagPayload and getFeatureFlag. Same network error surface.
      # Source: /private/tmp/claude/bc-deepen/posthog-node/node_modules/posthog-node/dist/client.js:396-413
      - id: get-feature-flag-result-network-error
        maturity: stable
        condition: >
          Network failure, PostHog API unreachable, API key invalid, rate limit exceeded,
          or server-side error during the combined flag+payload fetch.
        throws: >
          PostHogFetchHttpError or PostHogFetchNetworkError (from @posthog/core).
          Same error types as getFeatureFlag() and getFeatureFlagPayload().
        required_handling: >
          Caller MUST wrap in try-catch. getFeatureFlagResult() makes a live network call
          when local evaluation is unavailable. The combined nature of the result means
          both feature gating and configuration data are unavailable on failure.

          Minimum handling:
            try {
              const result = await posthog.getFeatureFlagResult('checkout-v2', userId);
              if (result?.enabled) {
                return result.payload as CheckoutConfig ?? defaultConfig;
              }
              return defaultConfig;
            } catch (err) {
              console.error('Feature flag result fetch failed:', err);
              return defaultConfig; // Fall back gracefully
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: flush
    import_path: "posthog-node"
    description: >
      Explicitly flushes all queued events to the PostHog API. Events captured via
      capture()/identify() are queued internally and sent in batches. flush() forces
      immediate delivery. Critical in serverless environments (Lambda, Vercel Edge,
      Cloudflare Workers) where the process may be frozen before the auto-flush timer
      fires. In serverless, prefer the waitUntil option over manual flush() calls.

    postconditions:
      # Evidence: @posthog/core/dist/posthog-core-stateless.mjs _flush() source:
      # Calls fetchWithRetry() which throws PostHogFetchHttpError on non-2xx HTTP responses
      # and PostHogFetchNetworkError on network failures. The outer flush() propagates these.
      # Source: /private/tmp/claude/bc-deepen/posthog-node/node_modules/@posthog/core/dist/posthog-core-stateless.mjs:590-600
      - id: flush-network-error
        maturity: stable
        condition: >
          Network failure during batch send, HTTP error response from PostHog API (non-2xx),
          or event payload too large (413 — triggers automatic batch size reduction and retry,
          but ultimately throws if still failing). After retry exhaustion, error propagates.
        throws: >
          PostHogFetchHttpError — on HTTP error responses from PostHog API.
            Properties: .response (Response), .name === 'PostHogFetchHttpError'.
            Note: 413 errors trigger batch size halving before finally propagating.
          PostHogFetchNetworkError — on network/fetch failures.
            Properties: .error (underlying Error), .name === 'PostHogFetchNetworkError'.
        required_handling: >
          Caller SHOULD wrap in try-catch for serverless flush patterns. Flush failures
          mean analytics events are lost — not business-critical, but unhandled rejections
          crash serverless request handlers or interfere with graceful shutdown.

          Minimum handling:
            try {
              await posthog.flush();
            } catch (err) {
              console.error('PostHog flush failed, events may be lost:', err);
              // Non-critical — continue normal execution
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: getRemoteConfigPayload
    import_path: "posthog-node"
    description: >
      Fetches and decrypts a remote config payload by flag key. Requires a personalApiKey
      to be set in the PostHog client options (throws synchronously if missing).
      Used for server-side configuration that should be kept private from the client.
      Returns the parsed JSON payload or undefined if the flag is not found.

    postconditions:
      # Evidence: posthog-node/src/client.ts getRemoteConfigPayload() source:
      # if (!this.options.personalApiKey) throw new Error('Personal API key is required...')
      # Then: const response = await this._requestRemoteConfigPayload(flagKey) — network call
      # Source: /private/tmp/claude/bc-deepen/posthog-node/node_modules/posthog-node/dist/client.js:404-413
      - id: get-remote-config-missing-personal-api-key
        maturity: stable
        condition: >
          PostHog client is instantiated without a personalApiKey option (or with a
          project API key that starts with 'phc_' rather than a personal key starting
          with 'phx_'). getRemoteConfigPayload() throws synchronously before any network call.
        throws: >
          Error: 'Personal API key is required for remote config payload decryption'
          (synchronous throw — not a Promise rejection, but wrapping in try-catch handles both).
        required_handling: >
          Caller MUST wrap in try-catch AND ensure personalApiKey is configured. Missing
          key configuration causes every getRemoteConfigPayload() call to throw, crashing
          the feature entirely on first use.

          Minimum handling:
            try {
              const config = await posthog.getRemoteConfigPayload('server-config');
              return config as ServerConfig ?? defaultConfig;
            } catch (err) {
              if (err instanceof Error && err.message.includes('Personal API key')) {
                console.error('PostHog misconfiguration: personalApiKey required for remote config');
              } else {
                console.error('Failed to fetch remote config:', err);
              }
              return defaultConfig;
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: get-remote-config-network-error
        maturity: stable
        condition: >
          Network failure, DNS resolution failure, PostHog API unreachable, API key
          unauthorized (403), or server-side error during remote config fetch.
        throws: >
          PostHogFetchHttpError or PostHogFetchNetworkError (from @posthog/core).
          Same network error types as other PostHog async methods.
        required_handling: >
          Caller MUST wrap in try-catch. Remote config fetch failures mean the application
          runs with stale or default configuration — critical if the config controls
          behavior that affects all users.

          Same try-catch block as missing-personal-api-key handles both error cases.
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: evaluateFlags
    import_path: "posthog-node"
    description: >
      Canonical (v5.38+) flag evaluation method. Consolidates getFeatureFlag,
      isFeatureEnabled, getFeatureFlagPayload, and getFeatureFlagResult into a
      single /flags request that returns a FeatureFlagEvaluations snapshot.
      Internally calls super.getFeatureFlagDetailsStateless() — same underlying
      network path as the @deprecated single-flag methods. Throws on auth,
      network, and quota errors. The deprecated single-flag methods emit a
      one-shot console deprecation warning recommending evaluateFlags as the
      replacement (client.js lines 445, 455, 484).

    postconditions:
      # Evidence: posthog-node@5.38.4 dist/client.d.ts lines 810-811, dist/client.js lines 559-668
      # The implementation guards two error-free paths (no distinctId, client disabled — returns empty
      # FeatureFlagEvaluations) but then calls super.getFeatureFlagDetailsStateless() which propagates
      # PostHogFetchHttpError / PostHogFetchNetworkError on auth/network/quota failures.
      # Documented at: https://posthog.com/docs/libraries/node (5.38+ flag evaluation)
      # Source: /private/tmp/claude/bc-deepen/posthog-node/node_modules/posthog-node/dist/client.js:559-668
      - id: evaluate-flags-network-error
        maturity: stable
        condition: >
          Network failure, DNS resolution failure, PostHog API unreachable,
          /flags endpoint timeout, or server-side 5xx error while fetching
          the consolidated flag evaluation response.
        throws: >
          PostHogFetchHttpError or PostHogFetchNetworkError (from @posthog/core).
          Identical error surface to getFeatureFlag/getAllFlags — evaluateFlags
          shares the same underlying getFeatureFlagDetailsStateless() path.
        required_handling: >
          Caller MUST wrap in try-catch (or use .catch()). evaluateFlags() is the
          canonical flag-eval entry point in PostHog v5.38+; failing to handle the
          rejection crashes the request handler that called it (since the typical
          pattern is to await evaluateFlags() early in a handler, then branch on
          flags.isEnabled() throughout).

          Minimum handling:
            try {
              const flags = await posthog.evaluateFlags(userId);
              if (flags.isEnabled('new-dashboard')) {
                renderNewDashboard();
              }
            } catch (err) {
              console.error('Feature flag evaluation failed:', err);
              // Fall back to defaults — render conservative UI
            }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: client.js line 615 sets quotaLimited = details.quotaLimited?.includes('feature_flags')
      # The returned snapshot carries quotaLimited as a property — flags resolve to defaults silently
      # when the project exceeds its feature-flag quota. Callers checking flags.isEnabled() on a
      # quota-limited snapshot get the default-disabled answer without knowing the quota fired.
      - id: evaluate-flags-quota-limited-silent
        maturity: stable
        condition: >
          PostHog project has exceeded its feature-flag quota — the /flags response
          comes back with quotaLimited: ['feature_flags'] and the snapshot's
          flags.isEnabled() returns the default-disabled answer for every flag.
          No exception is thrown — the failure is silent.
        throws: >
          Nothing — the call succeeds and returns a FeatureFlagEvaluations snapshot
          whose .quotaLimited property is true. Callers that branch on
          flags.isEnabled() without checking quotaLimited get the wrong answer.
        required_handling: >
          Callers SHOULD check the returned snapshot's quotaLimited flag before
          trusting flag values. Alternatively, treat all flag evaluations as
          potentially default-only in production code (defensive branching).

          Defensive handling:
            const flags = await posthog.evaluateFlags(userId);
            if (flags.quotaLimited) {
              // Log + alert — flag evaluation is degraded; UI is showing defaults.
              logger.warn('PostHog flag quota exceeded — flags returning defaults');
            }
            if (flags.isEnabled('new-dashboard')) { ... }
        sources:
          - "https://posthog.com/docs/libraries/node"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

intentionally_omitted:
  - name: reloadFeatureFlags
    reason: >
      reloadFeatureFlags() internally calls loadFeatureFlags() which uses .catch() to swallow
      all errors (logs them in debug mode only). The method NEVER propagates errors to the caller
      — confirmed from posthog-node/dist/extensions/feature-flags/feature-flags.js:340-345.
      No try-catch is required or effective.

  - name: waitForLocalEvaluationReady
    reason: >
      waitForLocalEvaluationReady() returns false (boolean) on timeout rather than throwing.
      The Promise resolves to boolean — true if ready within timeoutMs, false if timed out.
      No error propagation — confirmed from posthog-node/dist/client.js:227-240.

  - name: captureImmediate
    reason: >
      captureImmediate() catches its own errors internally via .catch((err) => { if (err) console.error(err); })
      — errors are logged but NEVER thrown to the caller. Same fire-and-forget semantics
      as capture() from the caller's perspective — confirmed from posthog-node/dist/client.js:501-525.

  - name: identifyImmediate
    reason: >
      identifyImmediate() delegates to identifyStatelessImmediate() which handles errors internally.
      No documented error propagation to the caller. Same fire-and-forget pattern as identify().

  - name: aliasImmediate
    reason: >
      aliasImmediate() delegates to aliasStatelessImmediate() which handles errors internally.
      No documented error propagation to the caller. Same fire-and-forget pattern as alias().

  - name: captureExceptionImmediate
    reason: >
      captureExceptionImmediate() is error-tracking infrastructure — a niche use case.
      The SDK documents it as the preferred way to capture exceptions, not a method
      that itself requires try-catch. Adoption in the corpus is minimal.

  - name: enable
    reason: >
      enable() is an admin toggle to enable/disable the PostHog client entirely.
      Used only in test setups or admin flows. No meaningful error contract beyond
      the generic PostHog network error surface already contracted in getFeatureFlag.

  - name: disable
    reason: >
      disable() is the inverse of enable() — same reasoning. No unique error contract.
