coverage_rationale: |
  Client methods return { data, error } result objects (Go-style errors), not throw-based errors. authClient.signIn.email(), signUp.email() etc. never throw — errors are in the returned error field. Current scanner detects missing try-catch around await calls; cannot detect unchecked result objects or ignored return values.
