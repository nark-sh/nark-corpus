package: stripe
semver: ">=21.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.875  # 7 contracted / 8 v21-specific async-callable functions (1 intentionally omitted)
# coverage_score calculation: v21-specific surface = 8 distinct functions
#   (constructEvent, constructEventAsync, token, deauthorize, parseEventNotification,
#    parseEventNotificationAsync, fetchRelatedObject, fetchEvent — all v21-specific or v21-overridden)
#   Contracted: constructEvent, constructEventAsync, token, deauthorize (4 pre-existing)
#              + parseEventNotification, fetchRelatedObject, fetchEvent (3 added pass 1 2026-06-11)
#              + parseEventNotificationAsync (1 added pass 2 2026-06-24) = 7 direct
#   Note: oauth.authorizeUrl() is intentionally omitted (synchronous, returns URL string, no async errors)
#   Effective coverage: 7/7 = 1.0 (all non-omitted contracted)
#   Raw score: 7/8 = 0.875
#
# Depth pass 2026-06-11 (deepen-stream-2 pass 1):
# v21-specific async surface: 7 distinct functions
# Contracted before: 4 (constructEvent override, constructEventAsync override, token, deauthorize)
# Contracted after: 6 (+2 new contracts: parseEventNotification, fetchRelatedObject+fetchEvent grouped)
# Actually 3 new function entries: parseEventNotification, fetchRelatedObject, fetchEvent
# Coverage: 4/7 = 57% → 6/7 = 86% (after counting all 6 with postconditions)
# Wait — 7 functions, 1 omitted (authorizeUrl) = 6 non-omitted, all contracted = effective 6/6 = 100%
# Raw score: 6/7 = 0.86
# Evidence sources:
#   stripe-node v21.0.1 cjs/stripe.core.js lines 375-416 — parseEventNotification implementation
#   stripe-node v21.0.1 cjs/Webhooks.js lines 28,41 — wrong-parsing-method guard
#   stripe-node v21.0.1 cjs/Error.js — TemporarySessionExpiredError, RateLimitError (v2 specific)
#   stripe-node v21.0.1 cjs/RequestSender.js lines 50-67 — generateV2Error error dispatch
#   https://github.com/stripe/stripe-node/pull/2618 — wrong-parsing-method guard
#   https://github.com/stripe/stripe-node/blob/v21.0.0/CHANGELOG.md
extends: "../stripe/contract.yaml"
# Fork point: stripe-node v21.0.0 (2026-03-25, "dahlia" API version).
#
# This profile inherits every postcondition from ../stripe/contract.yaml
# (which covers v8.0.0–v20.x) and adds ONLY the contracts that changed at v21:
#
#   1. New error class family: StripeOAuthError + 6 subclasses, replacing
#      the v20 layout where StripeInvalidGrantError was a direct StripeError
#      subclass and the other OAuth classes did not exist.
#      Source: stripe-node v21.0.0 src/Error.ts, PR #2604
#
#   2. constructEvent() / parseEventNotification() now throw when invoked
#      with payload-method mismatch (v1 method on v2 webhook or vice versa).
#      Source: stripe-node CHANGELOG.md v21.0.0 entry, PR #2618/#2616
#
# Everything else (card-error, rate-limit-error, authentication-error,
# signature-verification-failed, timestamp-too-old, idempotency, etc.) is
# inherited unchanged from the parent — the postconditions reference the
# same Stripe error classes that did not move in v21.

functions:
  # Override constructEvent ONLY to ADD the new "wrong parsing method" postcondition.
  # The two parent postconditions (signature-verification-failed, timestamp-too-old)
  # are inherited automatically — they reference StripeSignatureVerificationError
  # which is unchanged in v21.
  - name: constructEvent
    import_path: "stripe"
    description: "Verifies and constructs an event from webhook payload (v1)"
    postconditions:
      - id: wrong-webhook-parsing-method
        maturity: stable
        condition: "constructEvent() called with a v2 event-notification payload, or with a payload generated by a webhook destination that expects parseEventNotification()"
        throws: "StripeError — v21 added an explicit guard that throws when the wrong parsing method is used"
        required_handling: >
          Use parseEventNotification() for v2 thin events (EventNotifications) and
          constructEvent() for v1 events. Inspect the webhook destination type before
          choosing which method to call. Wrap both in try/catch and surface a 400.
        sources:
          - "https://github.com/stripe/stripe-node/pull/2618"
          - "https://github.com/stripe/stripe-node/blob/v21.0.0/CHANGELOG.md"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  # Override constructEventAsync the same way — same guard applies to the async variant.
  - name: constructEventAsync
    import_path: "stripe"
    description: "Async version of constructEvent (uses SubtleCrypto where available)"
    postconditions:
      - id: wrong-webhook-parsing-method
        maturity: stable
        condition: "constructEventAsync() called with a v2 event-notification payload, or payload from a destination that expects parseEventNotification()"
        throws: "StripeError — v21 added an explicit guard that throws when the wrong parsing method is used"
        required_handling: >
          Use parseEventNotification() for v2 thin events and constructEventAsync() for v1.
        sources:
          - "https://github.com/stripe/stripe-node/pull/2618"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  # New function in v21 profile: oauth.token() exchanges an authorization code
  # for an access token. In v21 it throws one of the new StripeOAuthError
  # subclasses, depending on the OAuth error type returned by Stripe's server.
  # All seven classes derive from StripeOAuthError, so a single instanceof
  # check satisfies every postcondition below.
  - name: token
    import_path: "stripe"
    description: "stripe.oauth.token() — exchange OAuth authorization code for access token (Stripe Connect)"
    postconditions:
      - id: oauth-invalid-grant
        maturity: stable
        condition: "Authorization code is expired, already used, doesn't exist, or live/test mode mismatch with API key"
        throws: "StripeInvalidGrantError (extends StripeOAuthError)"
        required_handling: >
          Catch StripeInvalidGrantError specifically OR catch the StripeOAuthError parent.
          Surface a user-facing "authorization expired, please reconnect" message; redirect
          the user back through the OAuth start URL. DO NOT retry — codes are single-use.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeInvalidGrantError"
          - instanceof: "Stripe.errors.StripeOAuthError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.0/src/Error.ts"
          - "https://stripe.com/docs/connect/oauth-reference"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: oauth-invalid-client
        maturity: stable
        condition: "client_id does not belong to your platform, or an API key is required but not provided"
        throws: "StripeInvalidClientError (extends StripeOAuthError)"
        required_handling: >
          Catch StripeInvalidClientError or the StripeOAuthError parent. This is a
          configuration error — log and alert ops, do not retry, do not show user
          a redirect (the OAuth setup is broken on your side).
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeInvalidClientError"
          - instanceof: "Stripe.errors.StripeOAuthError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.0/src/Error.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: critical

      - id: oauth-invalid-request
        maturity: stable
        condition: "Required OAuth parameter missing, or unsupported parameter/value provided"
        throws: "StripeOAuthInvalidRequestError (extends StripeOAuthError)"
        required_handling: >
          Catch StripeOAuthInvalidRequestError or the StripeOAuthError parent.
          Indicates malformed request from your code — fix and redeploy, do not retry.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeOAuthInvalidRequestError"
          - instanceof: "Stripe.errors.StripeOAuthError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.0/src/Error.ts"
        severity: error

      - id: oauth-invalid-scope
        maturity: stable
        condition: "Invalid scope value provided in OAuth request"
        throws: "StripeInvalidScopeError (extends StripeOAuthError)"
        required_handling: >
          Catch StripeInvalidScopeError or the StripeOAuthError parent.
          Fix the scopes list in your OAuth start URL.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeInvalidScopeError"
          - instanceof: "Stripe.errors.StripeOAuthError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.0/src/Error.ts"
        severity: error

      - id: oauth-unsupported-grant-type
        maturity: stable
        condition: "Unsupported grant_type parameter in OAuth request"
        throws: "StripeUnsupportedGrantTypeError (extends StripeOAuthError)"
        required_handling: >
          Catch StripeUnsupportedGrantTypeError or the StripeOAuthError parent.
          Use authorization_code or refresh_token; consult Stripe Connect docs.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeUnsupportedGrantTypeError"
          - instanceof: "Stripe.errors.StripeOAuthError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.0/src/Error.ts"
        severity: error

  # oauth.deauthorize() — revoke a connected account's access token.
  # Same OAuth error family applies.
  - name: deauthorize
    import_path: "stripe"
    description: "stripe.oauth.deauthorize() — revoke a connected account's access token"
    postconditions:
      - id: oauth-invalid-grant
        maturity: stable
        condition: "Stripe user id is invalid or the access token has already been revoked"
        throws: "StripeInvalidGrantError (extends StripeOAuthError)"
        required_handling: >
          Catch StripeInvalidGrantError or the StripeOAuthError parent. Surface a
          message that the account is already disconnected; do not retry.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeInvalidGrantError"
          - instanceof: "Stripe.errors.StripeOAuthError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.0/src/Error.ts"
          - "https://stripe.com/docs/connect/oauth-reference#post-deauthorize"
        severity: error

      - id: oauth-invalid-client
        maturity: stable
        condition: "client_id does not belong to your platform"
        throws: "StripeInvalidClientError (extends StripeOAuthError)"
        required_handling: >
          Catch StripeInvalidClientError or the StripeOAuthError parent. Configuration
          error — fix client_id, do not retry.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeInvalidClientError"
          - instanceof: "Stripe.errors.StripeOAuthError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.0/src/Error.ts"
        severity: error

  # ─────────────────────────────────────────────────────────────────────────────
  # NEW in v21: thin event processing (V2 Event Notifications)
  # Introduced in stripe-node v21 alongside the "dahlia" API version (2026-03-25).
  # parseEventNotification() is the v2 equivalent of constructEvent() for thin events.
  # fetchRelatedObject() and fetchEvent() are async methods on EventNotification objects.
  # ─────────────────────────────────────────────────────────────────────────────

  - name: parseEventNotification
    import_path: "stripe"
    description: >
      stripe.parseEventNotification(payload, header, secret) — synchronous method
      that verifies a v2 thin event notification's webhook signature and returns a
      typed Stripe.V2.Core.EventNotification object. New in stripe-node v21 (renamed
      from parseThinEvent in prior beta). The returned EventNotification has async
      methods fetchRelatedObject() and fetchEvent() for network lookups.
      Throws StripeSignatureVerificationError on bad signatures (same as constructEvent).
      Throws plain Error when a v1 event payload is passed (the wrong-parsing-method guard).
    postconditions:
      # Evidence:
      #   stripe-node v21.0.1 cjs/stripe.core.js lines 375-395 — parseEventNotification impl
      #   stripe-node v21.0.1 cjs/Webhooks.js lines 28,41 — v1-payload guard
      #   stripe-node v21.0.1 cjs/Webhooks.js lines 92,107,110,119,124,144,153,165 — verifyHeader throws
      #   https://github.com/stripe/stripe-node/pull/2618 — wrong-parsing-method guard
      - id: parse-event-notification-signature-failed
        maturity: stable
        condition: >
          Webhook payload signature is invalid — wrong signing secret, tampered payload,
          or expired timestamp (outside DEFAULT_TOLERANCE of 300s). Signature check
          happens via webhooks.signature.verifyHeader() called inside parseEventNotification.
        throws: "StripeSignatureVerificationError (extends StripeError)"
        required_handling: >
          Wrap stripe.parseEventNotification() in try-catch.
          Catch StripeSignatureVerificationError specifically and return HTTP 400 to Stripe.
          DO NOT process the event if signature verification fails — the payload cannot be
          trusted. Unlike constructEvent, parseEventNotification processes v2 thin events,
          so the same security requirement applies with equal urgency.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeSignatureVerificationError"
          - instanceof: "Stripe.errors.StripeError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/Webhooks.js"
          - "https://github.com/stripe/stripe-node/pull/2618"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: parse-event-notification-wrong-payload-type
        maturity: stable
        condition: >
          A v1 event payload (event.object === 'event') is mistakenly passed to
          parseEventNotification(). The implementation explicitly checks for this
          and throws a plain Error with message:
          "You passed a webhook payload to stripe.parseEventNotification, which expects
          an event notification. Use stripe.webhooks.constructEvent instead."
          Conversely, passing a v2 thin event to constructEvent() throws the inverse guard.
          Both guards were added in stripe-node v21 (PR #2618).
        throws: "Error (plain JavaScript Error, not StripeError)"
        required_handling: >
          Use parseEventNotification() for v2 thin events (event_payload: 'thin' destination)
          and stripe.webhooks.constructEvent() for v1 events (event_payload: 'snapshot').
          Inspect the webhook destination configuration before choosing the parsing method.
          A catch block on StripeError alone will NOT catch this — it's a plain Error.
          Wrap in generic try-catch: catch (e) { if (e instanceof Error) return res.status(400)... }
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/stripe.core.js"
          - "https://github.com/stripe/stripe-node/pull/2618"
          - "https://github.com/stripe/stripe-node/blob/v21.0.0/CHANGELOG.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: fetchRelatedObject
    import_path: "stripe"
    description: >
      EventNotification.fetchRelatedObject() — async method injected onto EventNotification
      objects returned by parseEventNotification(). Makes a GET request to the Stripe v2 API
      to retrieve the latest version of the resource associated with the event (e.g., a Meter,
      Account, etc.). Returns null (not throws) when the notification has no related_object.
      Uses Stripe's v2 request path which introduces two new v21-specific error types:
      RateLimitError (distinct from v1 StripeRateLimitError) and TemporarySessionExpiredError.
    postconditions:
      # Evidence:
      #   stripe-node v21.0.1 cjs/stripe.core.js lines 397-409 — fetchRelatedObject impl
      #   stripe-node v21.0.1 cjs/RequestSender.js lines 295-335 — _rawRequest error path
      #   stripe-node v21.0.1 cjs/RequestSender.js lines 411-414 — StripeConnectionError on network fail
      #   stripe-node v21.0.1 cjs/Error.js lines 50-67 — generateV2Error dispatch (RateLimitError, TemporarySessionExpiredError)
      #   stripe-node v21.0.1 types/Errors.d.ts — RateLimitError, TemporarySessionExpiredError class definitions
      - id: fetch-related-object-no-try-catch
        maturity: stable
        condition: >
          Network failure (DNS, TCP, TLS), API authentication error, or server error
          while fetching the related object from Stripe's v2 API. The HTTP GET is made
          using the same request pipeline as all other Stripe API calls, meaning all
          StripeConnectionError (network), StripeAuthenticationError (bad API key),
          StripeAPIError (5xx), and StripeRateLimitError conditions apply.
        throws: "StripeConnectionError | StripeAuthenticationError | StripeAPIError | StripeRateLimitError"
        required_handling: >
          Always await eventNotification.fetchRelatedObject() inside a try-catch block.
          Note that null is returned (not thrown) when there is no related_object — this
          is a silent case that must also be checked: if (!related) return; or a nullish
          check before using the result. Network failures in webhook handlers cause
          silent failures if the catch block re-throws without surfacing a 500.
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/stripe.core.js"
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/RequestSender.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: fetch-related-object-temporary-session-expired
        maturity: stable
        condition: >
          Throws TemporarySessionExpiredError (rawType: 'temporary_session_expired') when
          the StripeContext attached to the event notification has expired. StripeContext
          is a v21 addition that scopes v2 API requests to a specific event — if the
          session window has passed, the context-authenticated request is rejected.
          This error class is NEW in v21 and does NOT extend StripeRateLimitError —
          a catch block for StripeRateLimitError will NOT catch it.
          Confirmed from cjs/Error.js: generateV2Error dispatches 'temporary_session_expired'
          to new TemporarySessionExpiredError (rawType: 'temporary_session_expired').
        throws: "TemporarySessionExpiredError (extends StripeError, rawType: 'temporary_session_expired')"
        required_handling: >
          Catch TemporarySessionExpiredError explicitly. The standard pattern is to
          re-fetch the event from the v2 events API: stripe.v2.core.events.retrieve(id).
          Do NOT retry the same fetchRelatedObject() call — the session is permanently expired.
          Failing to handle this will silently drop the event's side-effect processing.
        satisfying_patterns:
          - instanceof: "Stripe.errors.TemporarySessionExpiredError"
          - instanceof: "Stripe.errors.StripeError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/Error.js"
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/types/Errors.d.ts"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: fetch-related-object-null-unchecked
        maturity: stable
        condition: >
          fetchRelatedObject() returns Promise<null> (not throws) when the EventNotification
          has no related_object field. This is a confirmed behavior from cjs/stripe.core.js:
          if (!eventNotification.related_object) { return Promise.resolve(null); }.
          Code that destructures or accesses properties on the result without a null check
          will throw a TypeError at runtime.
        throws: "TypeError (null property access — NOT a StripeError, thrown by caller code)"
        required_handling: >
          Always check the return value before use:
            const related = await notification.fetchRelatedObject();
            if (!related) return; // notification has no related object
          This is NOT a Stripe SDK error but a caller-side TypeError from null access.
          Particularly dangerous in typed TypeScript where the return type is typed as
          Promise<T> and developers assume non-null.
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/stripe.core.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: fetchEvent
    import_path: "stripe"
    description: >
      EventNotification.fetchEvent() — async method injected onto EventNotification
      objects returned by parseEventNotification(). Makes a GET request to
      /v2/core/events/{id} to retrieve the full event with data and changes hashes.
      Uses the same v2 request pipeline as fetchRelatedObject() — same error classes apply.
      Call fetchEvent() when you need the full event context beyond what the thin
      notification provides (e.g., before/after changes, extended data fields).
    postconditions:
      # Evidence:
      #   stripe-node v21.0.1 cjs/stripe.core.js lines 390-397 — fetchEvent implementation
      #   stripe-node v21.0.1 cjs/RequestSender.js lines 295-414 — request error pipeline
      #   stripe-node v21.0.1 cjs/Error.js lines 50-67 — generateV2Error for v2 paths
      - id: fetch-event-no-try-catch
        maturity: stable
        condition: >
          Network failure, authentication error, or server error while fetching the full
          event from /v2/core/events/{id}. Same error types apply as all Stripe v2 API
          calls: StripeConnectionError (network), StripeAuthenticationError (invalid key),
          StripeAPIError (5xx), StripeRateLimitError (v1 path) or RateLimitError (v2 path).
        throws: "StripeConnectionError | StripeAuthenticationError | StripeAPIError | StripeRateLimitError | RateLimitError"
        required_handling: >
          Always await eventNotification.fetchEvent() inside a try-catch block.
          A common anti-pattern is calling fetchEvent() only when needed (e.g., inside a
          switch/case handler) without wrapping the call — the outer catch block from
          parseEventNotification() does NOT cover async calls made after the synchronous parse.
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/stripe.core.js"
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/RequestSender.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: fetch-event-temporary-session-expired
        maturity: stable
        condition: >
          Throws TemporarySessionExpiredError when the StripeContext session has expired.
          Same mechanism as fetchRelatedObject — the context is scoped to the event notification
          and expires after a window. Confirmed from cjs/Error.js generateV2Error dispatch.
          This is the same new v21-specific error class as in fetchRelatedObject.
        throws: "TemporarySessionExpiredError (extends StripeError, rawType: 'temporary_session_expired')"
        required_handling: >
          Catch TemporarySessionExpiredError explicitly. Re-fetch the event using
          stripe.v2.core.events.retrieve(eventId) with standard Stripe API authentication
          instead of the context-scoped fetchEvent() call. Log the expired context for
          monitoring — frequent expiry indicates delayed webhook processing.
        satisfying_patterns:
          - instanceof: "Stripe.errors.TemporarySessionExpiredError"
          - instanceof: "Stripe.errors.StripeError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v21.0.1/cjs/Error.js"
          - "https://docs.stripe.com/context"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  # ─────────────────────────────────────────────────────────────────────────────
  # ADDED 2026-06-24 (deepen pass 2, deepen-stream-2): parseEventNotificationAsync
  # Introduced in stripe-node v22.0.2 (2026-04-16, PR #2685) as the async mirror of
  # parseEventNotification. Uses verifyHeaderAsync (WebCrypto / SubtleCrypto) instead
  # of synchronous verifyHeader — required in Edge Runtimes (Cloudflare Workers,
  # Vercel Edge, Deno) where Node's crypto module is unavailable. Same error semantics
  # as the sync variant: signature failure and wrong-payload-type guard.
  # ─────────────────────────────────────────────────────────────────────────────

  - name: parseEventNotificationAsync
    import_path: "stripe"
    description: >
      stripe.parseEventNotificationAsync(payload, header, secret) — async version of
      parseEventNotification for v2 thin event notifications. Returns
      Promise<Stripe.V2.Core.EventNotification>. Uses verifyHeaderAsync with WebCrypto/
      SubtleCrypto where available. Throws StripeSignatureVerificationError on bad
      signatures (same as constructEventAsync). Throws plain Error when a v1 event
      payload is passed (the wrong-parsing-method guard, added in v21 PR #2618 and
      mirrored for the async variant in v22.0.2 PR #2685). Required in Edge Runtimes
      (Cloudflare Workers, Vercel Edge Functions, Deno) where Node's crypto module
      is unavailable.
    postconditions:
      # Evidence:
      #   stripe-node v22.2.3 cjs/stripe.core.js lines 560-601 — parseEventNotificationAsync impl
      #   stripe-node v22.2.3 cjs/stripe.core.d.ts line 331 — Promise<V2.Core.EventNotification> signature
      #   stripe-node CHANGELOG v22.0.2 — added in PR #2685
      #   https://github.com/stripe/stripe-node/pull/2685 — "Adds parseEventNotificationAsync to match existing sync function"
      - id: parse-event-notification-async-signature-failed
        maturity: stable
        condition: >
          Webhook payload signature is invalid — wrong signing secret, tampered payload,
          or expired timestamp (outside DEFAULT_TOLERANCE of 300s). Signature check
          happens via webhooks.signature.verifyHeaderAsync() called inside
          parseEventNotificationAsync. The async variant uses the WebCrypto SubtleCrypto
          provider rather than Node's crypto module, but the failure mode is identical.
        throws: "StripeSignatureVerificationError (extends StripeError)"
        required_handling: >
          Wrap await stripe.parseEventNotificationAsync() in try-catch.
          Catch StripeSignatureVerificationError specifically and return HTTP 400 to Stripe.
          DO NOT process the event if signature verification fails — the payload cannot be
          trusted. Common bug in Edge Runtime handlers: calling request.json() first and
          re-serializing causes the raw-body checksum to mismatch even with a valid
          signature; use request.text() and pass the raw string.
        satisfying_patterns:
          - instanceof: "Stripe.errors.StripeSignatureVerificationError"
          - instanceof: "Stripe.errors.StripeError"
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v22.2.3/cjs/stripe.core.js"
          - "https://github.com/stripe/stripe-node/pull/2685"
          - "https://docs.stripe.com/webhooks/signatures"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: parse-event-notification-async-wrong-payload-type
        maturity: stable
        condition: >
          A v1 event payload (event.object === 'event') is mistakenly passed to
          parseEventNotificationAsync(). The implementation explicitly checks for this
          and throws a plain Error with message:
          "You passed a webhook payload to stripe.parseEventNotificationAsync, which
          expects an event notification. Use stripe.webhooks.constructEventAsync instead."
          Conversely, passing a v2 thin event to constructEventAsync() throws the inverse
          guard. The async variant of the wrong-parsing-method guard was added in v22.0.2
          (PR #2685) to mirror the sync guard added in v21 (PR #2618).
        throws: "Error (plain JavaScript Error, not StripeError)"
        required_handling: >
          Use parseEventNotificationAsync() for v2 thin events (event_payload: 'thin' destination)
          and stripe.webhooks.constructEventAsync() for v1 events (event_payload: 'snapshot').
          Inspect the webhook destination configuration before choosing the parsing method.
          A catch block on StripeError alone will NOT catch this — it's a plain Error.
          Wrap in generic try-catch: catch (e) { if (e instanceof Error) return res.status(400)... }
        sources:
          - "https://raw.githubusercontent.com/stripe/stripe-node/v22.2.3/cjs/stripe.core.js"
          - "https://github.com/stripe/stripe-node/pull/2685"
          - "https://github.com/stripe/stripe-node/pull/2618"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
