      #   }
      - id: getdestination-invalid-id-type
        condition: >
          doc.getDestination(id) is called with an id argument that is not a string.
          Common mistakes: passing undefined (when the destination name is extracted from
          optional annotation fields), passing the destination array directly instead of
          the name string, or passing a page number integer when the intent was to use
          a named destination. PDF annotation objects store the destination as either a
          string (named destination) or an array (explicit destination) — callers who
          do not check the type before calling getDestination() will trigger this error
          when the annotation contains an explicit destination array.
        throws: >
          Returns Promise.reject(Error("Invalid destination request."))
          The promise is immediately rejected without calling the worker.
          This is a plain JavaScript Error, not a pdfjs-dist custom exception class.
          Confirmed from build/pdf.mjs (transport.getDestination) lines 16538-16542.
        required_handling: >
          Caller MUST verify that the destination id is a string before calling
          getDestination(). PDF annotation `dest` fields can be either a string (named
          destination) or an array (explicit destination) — only strings should be passed
          to getDestination():

            // CORRECT: type-guarded navigation
            const dest = annotation.dest;
            if (typeof dest === 'string') {
              // Named destination — look it up
              try {
                const destArray = await doc.getDestination(dest);
                if (destArray) {
                  const pageIndex = await doc.getPageIndex(destArray[0]);
                  navigateToPage(pageIndex + 1);
                }
              } catch (error) {
                console.error('Named destination lookup failed:', error);
              }
            } else if (Array.isArray(dest)) {
              // Explicit destination array — use directly
              const pageIndex = await doc.getPageIndex(dest[0]);
              navigateToPage(pageIndex + 1);
            }

            // WRONG: passing non-string without type check
            const destArray = await doc.getDestination(annotation.dest);  // THROWS if dest is an array

          Note: getDestination() resolving with null is NOT an error — it means the
          named destination doesn't exist in this PDF. Always null-check the resolved value.
        sources:
          - "https://mozilla.github.io/pdf.js/api/draft/module-pdfjsLib-PDFDocumentProxy.html"
          - "https://raw.githubusercontent.com/mozilla/pdf.js/master/src/display/api.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

notes:
  - "getDocument() returns a PDFDocumentLoadingTask — must await .promise to get PDFDocumentProxy"
  - "Pages are 1-indexed: first page = 1, last page = doc.numPages. 0-indexing is a very common bug."
  - "getTextContent() returns empty items array for scanned image-only PDFs — not an error. Check items.length."
  - "stopAtErrors: true in getDocument() causes parsing failures to reject promises (default: false = silent skip)"
  - "render() returns RenderTask — must await .promise. RenderingCancelledException is an intentional cancel signal."
  - "TextLayer.render() returns a Promise directly (not a RenderTask). Cancel via textLayer.cancel()."
  - "In Node.js, pdfjs-dist requires node-canvas for render() — not needed for getTextContent()"
  - "Error classes: InvalidPDFException, PasswordException, ResponseException, AbortException, FormatError, UnknownErrorException, RenderingCancelledException — all extend BaseException (name property set)"
  - "PasswordException.code indicates type: PasswordResponses.NEED_PASSWORD (1) or INCORRECT_PASSWORD (2)"
  - "Leaked workers (no destroy()) cause Node.js process to hang on exit and memory to grow unboundedly"
  - "saveDocument() warns (not errors) when annotationStorage is empty — use getData() for unmodified PDFs"
  - "cleanup() throws if called while a page is rendering — always cancel renders before calling cleanup()"
  - "extractPages() (v6.x) NEVER rejects — resolves with null on failure. Always null-check before using the Uint8Array."
  - "extractPages() does NOT support pure XFA documents — returns null if any source doc is XFA."
  - "getOptionalContentConfig() intent must match the intent passed to render() — mismatches throw at render time."
  - "v6.x new read-only omissions: getStructTree, getMarkInfo, getAnnotationsByType, hasJSActions, getCalculationOrderIds, getDownloadInfo — no unique behavioral contracts beyond generic HTTP/worker errors."
  - "page.getXfa() (added omission 2026-06-24): thin async wrapper around _transport._htmlForXfa?.children[pageIndex] || null. Used internally by getTextContent() for XFA forms. Returns null for non-XFA PDFs (the common case). No worker call, no input validation, no throws."
