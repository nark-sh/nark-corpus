package: discord.js
semver: ">=14.0.0"
contract_version: 1.0.0
maintainer: corpus-team
last_verified: 2026-02-25
description: A powerful JavaScript library for interacting with the Discord API
detection:
  class_names:
    - Client
  type_names:
    - Client
    - Message
    - TextChannel
    - BaseChannel
    - ThreadChannel
    - Guild
    - GuildMember
    - CommandInteraction
    - ButtonInteraction
    - SelectMenuInteraction
    - Role
    - RoleManager
    - GuildMemberManager
  factory_methods: []
  await_patterns:
    - .login(
    - .destroy(
    - .fetchWebhook(
    - .deleteWebhook(
    - .deferReply(
    - .followUp(
    - .editReply(
    - .crosspost(
    - .fetchAuditLogs(
    - .bulkDelete(
    - .startThread(
    - .fetchReference(
    - .fetchOwner(
functions:
  - name: Client.login
    import_path: discord.js
    description: Discord.js Client.login method
    tags:
      - authentication
      - network
    postconditions:
      - id: discord-client-login-no-try-catch
        condition: Client.login called without try-catch
        throws: DiscordAPIError or network errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: Client.login() can fail with invalid token or network errors. Wrap in try-catch to handle authentication failures and prevent crashes.
        detector: If Client.login is awaited without try-catch wrapping
        required_handling: MUST wrap await Client.login in try-catch block
        source: https://discord.js.org/docs
