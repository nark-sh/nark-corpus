# react-hook-form — React form management library with validation.
# The primary async surface is handleSubmit() (which re-throws errors from onValid callbacks),
# trigger() (which awaits async custom validators without try-catch), and the Form component
# (which calls fetch() when the action prop is set).
#
# Depth pass 2026-04-17 (deepen-stream-2 pass 4):
# API surface: 6 async-callable functions/methods
#   handleSubmit — CONTRACTED (3 postconditions)
#   useFormContext — CONTRACTED (2 postconditions)
#   useFieldArray — CONTRACTED (1 postcondition)
#   trigger() — NEW: 2 postconditions
#   Form (action prop) — NEW: 2 postconditions
#   async defaultValues — NEW: 1 postcondition
# Omitted: useController (not async), useFormState (read-only), useWatch (read-only)
# Coverage: 6/6 non-omitted = 100% effective coverage (6/9 total = 0.67)
# Evidence sources confirmed from:
#   dist/index.esm.mjs line 2272-2327 — handleSubmit re-throws onValidError
#   dist/index.esm.mjs line 1996-2036 — trigger() awaits validators without try-catch
#   dist/index.esm.mjs line 709-775 — Form component fetch() with onError callback
#   https://react-hook-form.com/docs/useform/trigger
#   https://react-hook-form.com/docs/useform/handlesubmit
package: react-hook-form
semver: ^7.0.0
contract_version: "1.1.0"
maintainer: behavioral-contracts
last_verified: "2026-04-17"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.67  # 6 contracted / 9 total exports (3 omitted: useController, useFormState, useWatch)
# Note: effective coverage (contracted/non-omitted) = 6/6 = 1.0
description: |
  React Hook Form is a performant, flexible, and extensible forms library with easy-to-use validation.
  This contract focuses on error handling requirements for async form submissions, context usage, and validation errors.
functions:
  - name: handleSubmit
    import_path: react-hook-form
    description: Form submission handler that validates form and executes onSubmit callback
    postconditions:
      # Evidence: 22 primary firings across 7 repos in scan-react-hook-form-2026-04-03.json
      # Top affected: amruthpillai/reactive-resume (⭐ 35930 stars), ixartz/Next-js-Boilerplate (⭐ stars)
      - id: async-submit-unhandled-error
        condition: |
          onSubmit callback is async and contains operations that can throw (API calls, database operations, etc.)
          without try-catch wrapping
        throws: UnhandledPromiseRejection
        required_handling: |
          MUST wrap async operations in try-catch within onSubmit callback.

          handleSubmit does NOT catch errors thrown inside onSubmit - errors will become unhandled promise rejections.

          Correct pattern:
            const onSubmit = async (data) => {
              try {
                await apiCall(data);
                // success handling
              } catch (error) {
                // error handling (toast, setError, etc.)
              }
            };

          Incorrect pattern:
            const onSubmit = async (data) => {
              await apiCall(data);  // ❌ No error handling
            };
        detector: >
          Common FPs:
          - Forms that use React Error Boundaries to catch submission errors at the tree
            level — the boundary catches the rejection, so no inline try-catch is needed.
          - Forms where the async operation propagates the error intentionally to a parent
            component's error handler.
          - Standard boilerplate form components (sign-in, sign-up, reset-password, otp)
            where the form library (or calling framework) normalizes error handling.
          When analyzing, check if the form component is wrapped in an error boundary or
          if the called function has its own error handling. Flag only when the async
          operation's rejection is genuinely unhandled end-to-end.
        source: https://react-hook-form.com/docs/useform/handlesubmit
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/useform/handlesubmit
      - id: empty-catch-block-silent-failure
        condition: |
          WITHIN a handleSubmit onSubmit callback function, try-catch exists but catch block is empty,
          only logs to console, or doesn't call setError/toast/user feedback mechanisms
        throws: N/A (silent failure - users unaware of submission failure)
        required_handling: |
          In form submission handlers (onSubmit callbacks), catch blocks MUST provide user feedback
          about submission failures. This rule ONLY applies to react-hook-form submission contexts.

          Users should be informed when form submission fails through:
          - Toast notifications (toast.error, notification APIs)
          - Form error state via setError()
          - Alert/modal dialogs
          - Form-level error display

          Note: Backend logging code, utility functions, and non-form code should NOT trigger this rule.
          This is specifically for user-facing form submission error handling.

          Incorrect patterns (in onSubmit callbacks):
            catch (error) { }                           // ❌ Empty catch
            catch (error) { console.log(error); }       // ❌ Only logs (no user feedback)
            catch (error) { /* TODO: handle */ }        // ❌ No implementation

          Correct patterns (in onSubmit callbacks):
            catch (error) {
              toast.error('Failed to submit form');     // ✅ User feedback
              setError('root', { message: error.message });
            }

          Acceptable patterns (outside form contexts - should NOT trigger):
            // Logging code
            catch (error) { console.error('Log failed:', error); }  // ✅ OK for loggers

            // Backend/API code
            catch (error) { logger.error(error); }                  // ✅ OK for servers
        source: https://react-hook-form.com/advanced-usage
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/advanced-usage
      - id: server-validation-error-not-displayed
        condition: |
          Server/API returns validation errors but setError() is not called to display them to users
        throws: N/A (validation feedback missing)
        required_handling: |
          MUST use setError() to display server validation errors to users.

          When your API returns field-specific errors:
            const onSubmit = async (data) => {
              try {
                const response = await api.submit(data);
              } catch (error) {
                if (error.validationErrors) {
                  Object.entries(error.validationErrors).forEach(([field, message]) => {
                    setError(field, { type: 'manual', message });
                  });
                }
              }
            };

          For global/form-level errors:
            setError('root.serverError', {
              type: '400',
              message: 'Server validation failed'
            });
        source: https://react-hook-form.com/docs/useform/seterror
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/useform/seterror
  - name: useFormContext
    import_path: react-hook-form
    description: Hook to access form context in deeply nested components
    postconditions:
      - id: missing-form-provider
        condition: useFormContext() called in component tree without FormProvider wrapper
        throws: TypeError
        required_handling: |
          MUST wrap your form with FormProvider component before using useFormContext in child components.

          useFormContext returns null when FormProvider is missing, causing TypeError when accessing properties.

          Correct pattern:
            import { useForm, FormProvider, useFormContext } from 'react-hook-form';

            function ParentForm() {
              const methods = useForm();
              return (
                <FormProvider {...methods}>
                  <form>
                    <NestedComponent />
                  </form>
                </FormProvider>
              );
            }

            function NestedComponent() {
              const { control, formState } = useFormContext(); // ✅ Safe
              return <input />;
            }

          Incorrect pattern:
            function NestedComponent() {
              const { control } = useFormContext(); // ❌ Crashes if no provider
            }
        detector: >
          Common FPs:
          - Reusable form field components (Input.tsx, Textarea.tsx, Select.tsx, FormField.tsx,
            ui/form.tsx) that use useFormContext() by design — these are MEANT to be used inside
            FormProvider and calling useFormContext() is correct. Flag only when the component
            is a standalone page/form component, not a reusable primitive.
          - Components in ui/ directories (shadcn/ui form.tsx, etc.) that are form building
            blocks by definition.
          - Components named *Field, *Input, *Control, *FormItem that are clearly designed
            as form sub-components.
          Only flag when useFormContext() is called in a top-level component that is not
          itself a sub-component of a form, or when the component is rendered outside any
          possible FormProvider context.
        source: https://react-hook-form.com/docs/useformcontext
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/useformcontext
      - id: useformcontext-property-access-error
        condition: |
          Destructuring properties from useFormContext without null check when FormProvider might be missing
        throws: TypeError (Cannot destructure property 'X' of 'Object(...)' as it is null)
        required_handling: |
          Check for null before accessing useFormContext properties, or ensure FormProvider is always present.

          Defensive pattern:
            const methods = useFormContext();
            if (!methods) {
              throw new Error('Component must be used within FormProvider');
            }
            const { control, formState } = methods;

          Or add runtime validation:
            const { control } = useFormContext() ?? {};
            if (!control) return null; // or throw error
        source: https://react-hook-form.com/docs/useformcontext
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/useformcontext
  - name: useFieldArray
    import_path: react-hook-form
    description: Hook to manage dynamic form field arrays
    postconditions:
      # Evidence: 3 primary firings across 1 repo in scan-react-hook-form-2026-04-03.json
      # Top affected: al1abb/invoify
      - id: unhandled-field-array-operations
        condition: |
          Field array operations (append, remove, update) fail due to validation errors but error is not handled
        throws: ValidationError
        required_handling: |
          Handle validation errors when manipulating field arrays.

          Field array operations respect validation rules. If adding/removing fields violates
          validation (e.g., min/max array length), handle appropriately.

          Example:
            const { append, fields } = useFieldArray({ name: 'items', control });

            const handleAdd = () => {
              try {
                append({ name: '', value: '' });
              } catch (error) {
                // Handle validation error
                toast.error('Cannot add more items');
              }
            };
        detector: >
          Common FPs:
          - Field array operations called inside a component that is wrapped in a React
            Error Boundary — the boundary catches unhandled errors from the operation.
          - Operations where the form's onSubmit error handling is sufficient to catch
            validation failures from field array operations.
          Flag only when append/remove/update is called outside any error handling context
          and without a parent error boundary.
        source: https://react-hook-form.com/docs/usefieldarray
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/usefieldarray

  - name: trigger
    import_path: "react-hook-form"
    description: >
      Manually triggers form or input validation. Returns Promise<boolean> — true if all
      validated fields pass, false if any field fails. Used for multi-step forms, dependent
      field validation, or pre-submission validation checks. Critical: if a custom async
      validator function throws an error (e.g., a network call that fails), trigger() rejects
      with that error — there is no try-catch in the validation executor.
    postconditions:
      # Evidence: dist/index.esm.mjs line 1330-1344 — validate functions called with `await`
      # but no surrounding try-catch. If validate() throws, the error propagates up through
      # executeBuiltInValidation → trigger() → causes the Promise returned by trigger() to reject.
      # Source: https://react-hook-form.com/docs/useform/register (validate option)
      # Source: https://react-hook-form.com/docs/useform/trigger
      - id: trigger-async-validator-throws
        condition: >
          A field is registered with a custom async validate function (via register(name, { validate }))
          that throws an error rather than returning a string message. This is common when the validate
          function makes a network call (e.g., checking email uniqueness via API) and that call fails.
          trigger() awaits the validate function but has no try-catch: any thrown error propagates
          directly out of trigger() as an unhandled Promise rejection.
        throws: >
          Whatever the custom validator throws — typically Error, TypeError, or network-related errors.
          Not a react-hook-form specific error type: the thrown value is re-thrown as-is.
        required_handling: >
          When using async custom validators that make network calls, wrap the network call in
          try-catch INSIDE the validator function and return an error message string instead of
          throwing:

            register('email', {
              validate: async (value) => {
                try {
                  const res = await fetch(`/api/check-email?email=${value}`);
                  const { taken } = await res.json();
                  return taken ? 'Email already in use' : true;
                } catch (error) {
                  // ✅ Return message string — do NOT let the error propagate
                  return 'Could not verify email availability';
                }
              }
            });

          If calling trigger() externally and you cannot control all validators:

            try {
              const isValid = await trigger('email');
            } catch (error) {
              // ✅ Catch validator errors at the call site
              console.error('Validation failed:', error);
            }
        sources:
          - "https://react-hook-form.com/docs/useform/trigger"
          - "https://react-hook-form.com/docs/useform/register"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: dist/index.esm.mjs lines 1996-2036 — trigger() returns the boolean result
      # but callers often fail to await it or check the return value.
      # Source: https://react-hook-form.com/docs/useform/trigger
      - id: trigger-result-not-awaited
        condition: >
          trigger() is called but the returned Promise<boolean> is not awaited before using
          the validation result to gate further logic. A common antipattern in multi-step forms:
          trigger the current step's fields, then immediately proceed to the next step without
          waiting for the async validation to complete. Because trigger() is async (it awaits
          schema resolvers and custom validators), calling it synchronously gives undefined,
          not the validation result.
        throws: >
          Does not throw — but the validation result is a pending Promise, so boolean checks
          like `if (trigger('email'))` always evaluate to truthy (a Promise object is truthy)
          even when validation fails.
        required_handling: >
          Always await trigger() before using the result:

            // Multi-step form — validate before advancing step
            const handleNextStep = async () => {
              // ✅ Await the result
              const isValid = await trigger(['firstName', 'email']);
              if (!isValid) return; // validation failed — stay on current step
              setStep(step + 1);
            };

          Incorrect pattern:
            const isValid = trigger('email'); // ❌ Returns Promise, not boolean
            if (isValid) { ... }             // ❌ Always true (Promise is truthy)
        sources:
          - "https://react-hook-form.com/docs/useform/trigger"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: Form
    import_path: "react-hook-form"
    description: >
      The Form component manages form submission including optional network requests. When the
      action prop is provided, Form makes a native fetch() call to submit form data to that URL.
      onError is called when the response status indicates failure (4xx/5xx) OR when the fetch
      itself throws a network error. onSuccess is called on successful responses. If neither
      onError nor onSuccess is provided and the network call fails, the error is silently swallowed
      internally (hasError is set but the component has no visible feedback).
    postconditions:
      # Evidence: dist/index.esm.mjs line 709-775 — Form component submit() function
      # Makes fetch(String(action), {...}) in a try-catch block. Network errors caught at
      # line 762: `catch (error) { hasError = true; onError && onError({ error }); }`
      # HTTP errors detected at line 751: `if (response && (!validateStatus ? response.status < 200 || response.status >= 300 : ...))`
      # Source: https://react-hook-form.com/docs/useform (Form component section)
      - id: form-network-error-no-feedback
        condition: >
          The Form component is used with an action prop (which triggers a fetch() call) but
          without an onError callback. When the network request fails (DNS failure, connection
          refused, timeout) OR returns an HTTP error status (4xx/5xx), the error is caught
          internally and hasError is set, but without onError the user receives no feedback.
          The form's isSubmitSuccessful becomes false and a 'root.server' field error is set,
          but if no UI renders formState.errors.root.server, the failure is invisible.
        throws: >
          Does not throw externally — the Form component internally catches all fetch errors.
          The onError callback receives either { response: Response } for HTTP errors or
          { error: unknown } for network-level failures. Without onError, the error is silently dropped.
        required_handling: >
          Always provide onError when using Form with action prop to handle both network failures
          and HTTP error responses:

            <Form
              action="/api/submit"
              method="post"
              control={control}
              onSuccess={({ response }) => {
                toast.success('Form submitted successfully');
              }}
              onError={({ response, error }) => {
                if (error) {
                  // Network failure (no response)
                  toast.error('Network error — please check your connection');
                } else if (response) {
                  // HTTP error response
                  toast.error(`Submission failed: ${response.status} ${response.statusText}`);
                }
              }}
            >
              {/* fields */}
            </Form>

          Alternatively, render formState.errors.root.server in the UI to show server errors:
            {errors.root?.server && (
              <p className="error">Server error: {errors.root.server.type}</p>
            )}
        sources:
          - "https://react-hook-form.com/docs/useform"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: dist/index.esm.mjs line 712 — Form internally calls control.handleSubmit().
      # The handleSubmit wrapper re-throws errors from the onSubmit callback (line 2327).
      # When Form's onSubmit prop is async and throws, that error propagates through handleSubmit
      # and out of the Form's submit() function — but submit() is the form's onSubmit handler,
      # and React will surface it as an unhandled rejection if not caught at the React event boundary.
      - id: form-onsubmit-unhandled-error
        condition: >
          The Form component's onSubmit prop is an async function that throws (or rejects),
          and the error is not caught. The Form component internally wraps onSubmit in
          control.handleSubmit(), which re-throws errors from the onValid callback at
          source line 2327: `if (onValidError) { throw onValidError; }`.
          This error propagates out of the Form's submit handler and becomes an unhandled
          Promise rejection if React's error boundary or the caller does not catch it.
        throws: >
          Whatever the onSubmit callback throws — network errors, API errors, or any Error
          thrown during async form processing.
        required_handling: >
          Wrap async operations in the onSubmit callback with try-catch:

            <Form
              action="/api"
              control={control}
              onSubmit={async ({ data, event, formData }) => {
                try {
                  await processFormData(data);
                } catch (error) {
                  // ✅ Catch inside onSubmit — don't let it propagate
                  toast.error('Form processing failed');
                }
              }}
            />
        sources:
          - "https://react-hook-form.com/docs/useform"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: useForm
    import_path: "react-hook-form"
    description: >
      The primary hook that initializes the form. When defaultValues is provided as an async
      function (returning a Promise), useForm calls it internally and uses reset() once the
      Promise resolves. The form's formState.isLoading is true while the async defaults are
      loading. If the async defaultValues function throws or rejects, there is no documented
      error callback — the rejection is unhandled and isLoading may remain true indefinitely.
    postconditions:
      # Evidence: https://react-hook-form.com/docs/useform
      # "async defaultValues: async () => fetch('/api-endpoint')" example in docs.
      # The library calls reset() internally once resolved, but does not document error handling
      # for rejected async defaultValues. Source inspection of dist/index.esm.mjs shows no
      # try-catch around the async defaultValues call.
      # Source: https://react-hook-form.com/docs/useform (defaultValues section)
      - id: async-default-values-unhandled-rejection
        condition: >
          useForm is initialized with an async defaultValues function that makes a network call
          (e.g., fetching user profile data from an API), and that call fails. The async
          defaultValues function throws or its Promise rejects. React Hook Form does not
          document an error callback for this case and internally has no try-catch around
          the async defaultValues invocation.
          The result: the form remains in isLoading state, never displays default values,
          and the unhandled rejection may crash the component or produce silent empty form behavior.
        throws: >
          Unhandled Promise rejection propagating from the async defaultValues function.
          Callers see: formState.isLoading stays true, no form defaults are populated,
          and the rejection may surface as React "Unhandled Rejection" in dev mode.
        required_handling: >
          Wrap the async defaultValues fetch in a try-catch and provide fallback values:

            const { register, handleSubmit, formState: { isLoading } } = useForm({
              defaultValues: async () => {
                try {
                  const response = await fetch('/api/user/profile');
                  if (!response.ok) throw new Error('Failed to load profile');
                  return await response.json();
                } catch (error) {
                  // ✅ Return safe fallback values instead of rejecting
                  console.error('Could not load default values:', error);
                  return { name: '', email: '' }; // Fallback defaults
                }
              }
            });

            // Always show loading state to users
            if (isLoading) return <Spinner />;
        sources:
          - "https://react-hook-form.com/docs/useform"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

notes: |
  Common anti-patterns observed in real codebases:

  1. Async onSubmit without try-catch (very common)
     - Found in multiple jake-tennis files
     - Causes unhandled promise rejections

  2. Empty catch blocks (silent failures)
     - Example: profile-form.tsx line 83-85
     - Users don't know if submission succeeded/failed

  3. Fetch/API calls without error handling
     - Example: users-action-dialog.tsx line 397-399
     - Silent failures on network errors

  4. Client-side only validation
     - react-hook-form validation can be bypassed via browser DevTools
     - Server-side validation is mandatory for security

  Key principle: handleSubmit does NOT catch errors from your onSubmit callback.
  You MUST handle async errors yourself with try-catch.
