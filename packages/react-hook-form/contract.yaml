package: react-hook-form
semver: ^7.0.0
contract_version: 1.0.0
maintainer: behavioral-contracts
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed
description: |
  React Hook Form is a performant, flexible, and extensible forms library with easy-to-use validation.
  This contract focuses on error handling requirements for async form submissions, context usage, and validation errors.
functions:
  - name: handleSubmit
    import_path: react-hook-form
    description: Form submission handler that validates form and executes onSubmit callback
    postconditions:
      # Evidence: 22 primary firings across 7 repos in scan-react-hook-form-2026-04-03.json
      # Top affected: amruthpillai/reactive-resume (⭐ 35930 stars), ixartz/Next-js-Boilerplate (⭐ stars)
      - id: async-submit-unhandled-error
        condition: |
          onSubmit callback is async and contains operations that can throw (API calls, database operations, etc.)
          without try-catch wrapping
        throws: UnhandledPromiseRejection
        required_handling: |
          MUST wrap async operations in try-catch within onSubmit callback.

          handleSubmit does NOT catch errors thrown inside onSubmit - errors will become unhandled promise rejections.

          Correct pattern:
            const onSubmit = async (data) => {
              try {
                await apiCall(data);
                // success handling
              } catch (error) {
                // error handling (toast, setError, etc.)
              }
            };

          Incorrect pattern:
            const onSubmit = async (data) => {
              await apiCall(data);  // ❌ No error handling
            };
        source: https://react-hook-form.com/docs/useform/handlesubmit
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/useform/handlesubmit
      - id: empty-catch-block-silent-failure
        condition: |
          WITHIN a handleSubmit onSubmit callback function, try-catch exists but catch block is empty,
          only logs to console, or doesn't call setError/toast/user feedback mechanisms
        throws: N/A (silent failure - users unaware of submission failure)
        required_handling: |
          In form submission handlers (onSubmit callbacks), catch blocks MUST provide user feedback
          about submission failures. This rule ONLY applies to react-hook-form submission contexts.

          Users should be informed when form submission fails through:
          - Toast notifications (toast.error, notification APIs)
          - Form error state via setError()
          - Alert/modal dialogs
          - Form-level error display

          Note: Backend logging code, utility functions, and non-form code should NOT trigger this rule.
          This is specifically for user-facing form submission error handling.

          Incorrect patterns (in onSubmit callbacks):
            catch (error) { }                           // ❌ Empty catch
            catch (error) { console.log(error); }       // ❌ Only logs (no user feedback)
            catch (error) { /* TODO: handle */ }        // ❌ No implementation

          Correct patterns (in onSubmit callbacks):
            catch (error) {
              toast.error('Failed to submit form');     // ✅ User feedback
              setError('root', { message: error.message });
            }

          Acceptable patterns (outside form contexts - should NOT trigger):
            // Logging code
            catch (error) { console.error('Log failed:', error); }  // ✅ OK for loggers

            // Backend/API code
            catch (error) { logger.error(error); }                  // ✅ OK for servers
        source: https://react-hook-form.com/advanced-usage
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/advanced-usage
      - id: server-validation-error-not-displayed
        condition: |
          Server/API returns validation errors but setError() is not called to display them to users
        throws: N/A (validation feedback missing)
        required_handling: |
          MUST use setError() to display server validation errors to users.

          When your API returns field-specific errors:
            const onSubmit = async (data) => {
              try {
                const response = await api.submit(data);
              } catch (error) {
                if (error.validationErrors) {
                  Object.entries(error.validationErrors).forEach(([field, message]) => {
                    setError(field, { type: 'manual', message });
                  });
                }
              }
            };

          For global/form-level errors:
            setError('root.serverError', {
              type: '400',
              message: 'Server validation failed'
            });
        source: https://react-hook-form.com/docs/useform/seterror
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/useform/seterror
  - name: useFormContext
    import_path: react-hook-form
    description: Hook to access form context in deeply nested components
    postconditions:
      - id: missing-form-provider
        condition: useFormContext() called in component tree without FormProvider wrapper
        throws: TypeError
        required_handling: |
          MUST wrap your form with FormProvider component before using useFormContext in child components.

          useFormContext returns null when FormProvider is missing, causing TypeError when accessing properties.

          Correct pattern:
            import { useForm, FormProvider, useFormContext } from 'react-hook-form';

            function ParentForm() {
              const methods = useForm();
              return (
                <FormProvider {...methods}>
                  <form>
                    <NestedComponent />
                  </form>
                </FormProvider>
              );
            }

            function NestedComponent() {
              const { control, formState } = useFormContext(); // ✅ Safe
              return <input />;
            }

          Incorrect pattern:
            function NestedComponent() {
              const { control } = useFormContext(); // ❌ Crashes if no provider
            }
        source: https://react-hook-form.com/docs/useformcontext
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/useformcontext
      - id: useformcontext-property-access-error
        condition: |
          Destructuring properties from useFormContext without null check when FormProvider might be missing
        throws: TypeError (Cannot destructure property 'X' of 'Object(...)' as it is null)
        required_handling: |
          Check for null before accessing useFormContext properties, or ensure FormProvider is always present.

          Defensive pattern:
            const methods = useFormContext();
            if (!methods) {
              throw new Error('Component must be used within FormProvider');
            }
            const { control, formState } = methods;

          Or add runtime validation:
            const { control } = useFormContext() ?? {};
            if (!control) return null; // or throw error
        source: https://react-hook-form.com/docs/useformcontext
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/useformcontext
  - name: useFieldArray
    import_path: react-hook-form
    description: Hook to manage dynamic form field arrays
    postconditions:
      # Evidence: 3 primary firings across 1 repo in scan-react-hook-form-2026-04-03.json
      # Top affected: al1abb/invoify
      - id: unhandled-field-array-operations
        condition: |
          Field array operations (append, remove, update) fail due to validation errors but error is not handled
        throws: ValidationError
        required_handling: |
          Handle validation errors when manipulating field arrays.

          Field array operations respect validation rules. If adding/removing fields violates
          validation (e.g., min/max array length), handle appropriately.

          Example:
            const { append, fields } = useFieldArray({ name: 'items', control });

            const handleAdd = () => {
              try {
                append({ name: '', value: '' });
              } catch (error) {
                // Handle validation error
                toast.error('Cannot add more items');
              }
            };
        source: https://react-hook-form.com/docs/usefieldarray
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://react-hook-form.com/docs/usefieldarray
notes: |
  Common anti-patterns observed in real codebases:

  1. Async onSubmit without try-catch (very common)
     - Found in multiple jake-tennis files
     - Causes unhandled promise rejections

  2. Empty catch blocks (silent failures)
     - Example: profile-form.tsx line 83-85
     - Users don't know if submission succeeded/failed

  3. Fetch/API calls without error handling
     - Example: users-action-dialog.tsx line 397-399
     - Silent failures on network errors

  4. Client-side only validation
     - react-hook-form validation can be bypassed via browser DevTools
     - Server-side validation is mandatory for security

  Key principle: handleSubmit does NOT catch errors from your onSubmit callback.
  You MUST handle async errors yourself with try-catch.
