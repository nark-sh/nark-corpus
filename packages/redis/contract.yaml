package: redis
semver: ">=5.0.0 <6.0.0"
contract_version: 1.0.0
maintainer: corpus-team
last_verified: 2026-04-06
status: production
coverage_score: 1.0
# Evidence: scan-redis-2026-04-01.json — 11 repos scanned, 3 affected (27%), 4 violations
# createClient: 3 violations in zaidmukaddam/scira (⭐11,555), miurla/morphic (⭐8,693)
# connect: 1 violation in afteracademy/nodejs-backend-architecture-typescript (⭐3,052)
# Depth pass 2026-04-02: enumerated full API surface, added hash/list/set/counter/pipeline/pubsub functions
# Error class source: @redis/client/dist/lib/errors.d.ts — confirmed class hierarchy
# Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
# Source: https://redis.io/docs/latest/develop/clients/nodejs/transpipe/
evidence_quality: confirmed
detection:
  factory_methods:
    - createClient
  require_instance_tracking: true
  required_event_listeners:
    - event: error
      required: true
      severity: error
  await_patterns:
    # String operations
    - ".get"
    - ".set"
    - ".del"
    - ".mget"
    - ".mGet"
    - ".mset"
    - ".mSet"
    - ".incr"
    - ".incrby"
    - ".incrBy"
    - ".decr"
    - ".decrby"
    - ".decrBy"
    - ".exists"
    - ".expire"
    # Hash operations
    - ".hset"
    - ".hSet"
    - ".hget"
    - ".hGet"
    - ".hgetall"
    - ".hGetAll"
    - ".hdel"
    - ".hDel"
    - ".hmget"
    - ".hmGet"
    # List operations
    - ".lpush"
    - ".lPush"
    - ".rpush"
    - ".rPush"
    - ".lrange"
    - ".lRange"
    - ".lpop"
    - ".lPop"
    - ".rpop"
    - ".rPop"
    # Set operations
    - ".sadd"
    - ".sAdd"
    - ".smembers"
    - ".sMembers"
    - ".srem"
    - ".sRem"
    - ".sismember"
    - ".sIsMember"
    # Sorted set operations
    - ".zadd"
    - ".zAdd"
    - ".zrange"
    - ".zRange"
    - ".zrem"
    - ".zRem"
    - ".zscore"
    - ".zScore"
    # Lifecycle
    - ".connect"
    - ".quit"
    # Pub/sub
    - ".subscribe"
    - ".publish"
functions:
  - name: createClient
    import_path: redis
    description: Creates a Redis client instance that requires error event listener
    postconditions:
      - id: missing-error-listener
        condition: createClient() called without .on('error', handler) registered
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          Client created without error event listener will crash the Node.js process on any error. Redis documentation explicitly states: "If a client doesn't have at least one error listener registered and an error occurs, that error will be thrown and the Node.js process will exit."
        detector: |
          If createClient() is called and the returned client does not have .on('error', ...) registered within the same function scope, flag as violation.
        required_handling: |
          MUST call client.on('error', handler) immediately after createClient(). Handler should log error details and optionally trigger reconnection logic or graceful shutdown.
        source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
  - name: connect
    import_path: redis
    description: Establishes connection to Redis server
    postconditions:
      - id: connect-no-error-handling
        condition: client.connect() called without try-catch or .catch() handler
        throws: Connection errors (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.connect() without try-catch can throw connection errors causing unhandled promise rejection. Common failures include ECONNREFUSED (Redis not running), ETIMEDOUT (network timeout), ECONNRESET (connection lost), and EAI_AGAIN (DNS resolution failure).
        detector: |
          If await client.connect() or client.connect().then() is not wrapped in try-catch or does not have .catch() handler
        required_handling: |
          MUST wrap await client.connect() in try-catch block. Catch block should check error.code and implement retry logic with exponential backoff for recoverable errors. Non-recoverable errors should trigger graceful shutdown or fallback mode.
        source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
  - name: get
    import_path: redis
    description: Retrieves value for a key from Redis
    postconditions:
      - id: get-no-error-handling
        condition: client.get() called without try-catch or .catch() handler
        throws: Connection errors, timeout errors, or WRONGTYPE errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.get() without try-catch can throw connection errors (ECONNREFUSED, ETIMEDOUT), timeout errors, or command errors (WRONGTYPE when key holds wrong type). Unhandled promise rejection will crash application or cause incorrect behavior.
        detector: |
          If await client.get() is not wrapped in try-catch or does not have .catch() handler
        required_handling: |
          MUST wrap await client.get() in try-catch block. For connection errors, implement graceful degradation (fallback to database). For WRONGTYPE errors, fix data schema. For timeout errors, retry with backoff or return cached/default value.
        source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
  - name: set
    import_path: redis
    description: Sets a key-value pair in Redis
    postconditions:
      - id: set-no-error-handling
        condition: client.set() called without try-catch or .catch() handler
        throws: Connection errors, timeout errors, or command errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.set() without try-catch can throw connection/command errors causing unhandled promise rejection or silent data loss. Write operations must handle errors to ensure data consistency and prevent application state corruption.
        detector: |
          If await client.set() is not wrapped in try-catch or does not have .catch() handler
        required_handling: |
          MUST wrap await client.set() in try-catch block. For connection errors, consider queueing write for retry. For critical writes, re-throw error to caller. For non-critical cache writes, log error and continue without cache.
        source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
  - name: del
    import_path: redis
    description: Deletes one or more keys from Redis
    postconditions:
      - id: del-no-error-handling
        condition: client.del() called without try-catch or .catch() handler
        throws: Connection errors or timeout errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.del() without try-catch can throw connection errors causing unhandled promise rejection. Delete operations affect application state and must handle errors to prevent state inconsistency.
        detector: |
          If await client.del() is not wrapped in try-catch or does not have .catch() handler
        required_handling: |
          MUST wrap await client.del() in try-catch block. For connection errors, log error and decide whether to retry, fail operation, or continue. Critical deletes should re-throw error to caller for proper handling.
        source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/

  # ── HASH OPERATIONS ─────────────────────────────────────────────────────────

  - name: hSet
    import_path: redis
    description: >
      Sets one or more fields of a hash stored at key. Equivalent to HMSET for
      multiple fields. Used for structured object storage, session data, and
      user profiles. Returns the number of fields added.
    postconditions:
      # Evidence: confirmed from @redis/client/dist/lib/errors.d.ts error hierarchy
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: hset-no-error-handling
        condition: client.hSet() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE when key exists as non-hash), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN), SocketClosedUnexpectedlyError
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        description: |
          client.hSet() without try-catch throws ErrorReply with WRONGTYPE when the key
          exists as a non-hash type (string, list, set, etc.). This is a common error
          when migrating data or when key naming collides between different data types.
          Connection errors throw standard system error codes.
        required_handling: |
          MUST wrap await client.hSet() in try-catch. Check err.message.includes('WRONGTYPE')
          to distinguish type errors from connection errors. Type errors indicate a data
          schema bug; connection errors may be retried.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/hset/

  - name: hGet
    import_path: redis
    description: >
      Retrieves the value of a field in a hash. Returns null when the field or
      key does not exist. Used for session lookups, profile reads, and feature flags.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: hget-no-error-handling
        condition: client.hGet() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE if key is not a hash), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.hGet() throws ErrorReply with WRONGTYPE operation when the key exists but
          is not a hash (e.g., a string). Returns null (not throw) when key or field does
          not exist. Connection failures throw standard error codes.
        required_handling: |
          MUST wrap await client.hGet() in try-catch. Return null fallback for missing
          fields is correct — do not confuse this with thrown errors.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/hget/

  - name: hGetAll
    import_path: redis
    description: >
      Returns all fields and values in a hash as a plain object. Returns an empty
      object (not null) when the key does not exist. Very common for session
      deserialization and user profile reads.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: hgetall-no-error-handling
        condition: client.hGetAll() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE if key is not a hash), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.hGetAll() throws ErrorReply on WRONGTYPE. Note: returns {} (empty object)
          when key does not exist — callers must check for empty object, not null.
          Missing {} check is a logic bug that causes silent failures in profile lookups.
        required_handling: |
          MUST wrap in try-catch. Also check if the returned object is empty ({}) to
          detect missing sessions/profiles — returning {} is not an error but often
          indicates "not found" semantics.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/hgetall/

  # ── COUNTER OPERATIONS ──────────────────────────────────────────────────────

  - name: incr
    import_path: redis
    description: >
      Increments the integer stored at key by 1. Creates the key with value 1 if
      it does not exist. Used for rate limiting, counters, and sequence generation.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: incr-no-error-handling
        condition: client.incr() called without try-catch or .catch() handler
        throws: >
          ErrorReply ("ERR value is not an integer or out of range") when key holds
          a non-integer string; connection errors (ECONNREFUSED, ETIMEDOUT)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.incr() throws ErrorReply when the key exists but holds a string that
          cannot be represented as an integer (e.g., a JSON string stored by hGetAll).
          This is a common error in rate-limiting code when the key type is accidentally
          overwritten by a different operation. Connection failures throw standard codes.
        required_handling: |
          MUST wrap await client.incr() in try-catch. Check err.message for "not an integer"
          to distinguish type errors (data schema bug) from connection errors (retriable).
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/incr/

  - name: incrBy
    import_path: redis
    description: >
      Increments the integer stored at key by the given increment. Same semantics
      as incr() but with a configurable step. Common in rate limiting with different
      token costs.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: incrby-no-error-handling
        condition: client.incrBy() called without try-catch or .catch() handler
        throws: >
          ErrorReply ("ERR value is not an integer or out of range") when key holds
          a non-integer; connection errors (ECONNREFUSED, ETIMEDOUT)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          Identical error profile to incr(). Throws ErrorReply for non-integer values.
          Rate limiting code that calls incrBy() without error handling can crash the
          application when a key gets corrupted or shared with a different data type.
        required_handling: |
          MUST wrap await client.incrBy() in try-catch. Same handling as incr().
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/incrby/

  # ── EXPIRE / KEY LIFECYCLE ───────────────────────────────────────────────────

  - name: expire
    import_path: redis
    description: >
      Sets a TTL (time-to-live) in seconds on a key. Returns true if the timeout
      was set, false if key does not exist. Critical for session expiry, cache
      invalidation, and rate limit windows.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: expire-no-error-handling
        condition: client.expire() called without try-catch or .catch() handler
        throws: >
          Connection errors (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN);
          ErrorReply on invalid argument types
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        description: |
          client.expire() failures are especially dangerous because they are often called
          after set() in a non-atomic pattern: set(key, value) + expire(key, ttl). If
          expire() throws without handling, the key persists forever — accumulating
          unexciting sensitive session or rate-limit data in memory indefinitely.
          Silent resource leak rather than visible crash.
        required_handling: |
          MUST wrap await client.expire() in try-catch. Prefer atomic client.set(key,
          value, {EX: ttl}) to avoid the set-then-expire race condition entirely. If
          separate expire() is required, log and alert on failure — persistent keys are a
          security and memory risk.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/expire/

  - name: exists
    import_path: redis
    description: >
      Returns the number of keys that exist from the given list. Returns 0 for
      all missing, or count of found keys. Used for conditional checks before
      operations.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: exists-no-error-handling
        condition: client.exists() called without try-catch or .catch() handler
        throws: Connection errors (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: |
          client.exists() can throw on connection loss. Callers that use exists() as a
          guard before write operations must handle its failure separately — otherwise the
          guard silently fails and control flow proceeds incorrectly.
        required_handling: |
          MUST wrap await client.exists() in try-catch. Distinguish connection errors from
          logic errors. For cache-pattern guards, fail safe (treat as "not exists" and
          proceed to authoritative source).
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/

  # ── LIST OPERATIONS ──────────────────────────────────────────────────────────

  - name: lPush
    import_path: redis
    description: >
      Prepends values to a list stored at key. Creates the key if it does not exist.
      Returns the new list length. Used for task queues, audit logs, and event feeds.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: lpush-no-error-handling
        condition: client.lPush() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE if key is not a list), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        description: |
          client.lPush() throws ErrorReply with WRONGTYPE when the key exists as a
          non-list type. Queue implementations commonly fail here when the queue key
          accidentally collides with a hash or string key. Task queue entries are lost.
        required_handling: |
          MUST wrap await client.lPush() in try-catch. For queue patterns, re-throw so
          callers can handle job failure. Check err.message.includes('WRONGTYPE') to
          detect key type collisions.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/lpush/

  - name: lRange
    import_path: redis
    description: >
      Returns a sublist from index start to stop (inclusive). Returns empty array
      for out-of-range indices. Common for paginated queue reads, activity feeds,
      and recent-activity lists.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: lrange-no-error-handling
        condition: client.lRange() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE if key is not a list), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.lRange() throws ErrorReply on WRONGTYPE and connection errors. Returns []
          (not null) when range is empty or key missing. Callers should not confuse an
          empty array with an error — these are distinct outcomes.
        required_handling: |
          MUST wrap await client.lRange() in try-catch. An empty array is a valid result,
          not an error condition. Check for ErrorReply type to distinguish Redis server
          errors from connection errors.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/lrange/

  # ── SET OPERATIONS ───────────────────────────────────────────────────────────

  - name: sAdd
    import_path: redis
    description: >
      Adds members to a set stored at key. Creates the key if needed. Returns the
      number of new members added (not counting already-existing members). Used for
      tracking unique visitors, online users, and deduplication.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: sadd-no-error-handling
        condition: client.sAdd() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE if key is not a set), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        description: |
          client.sAdd() throws ErrorReply with WRONGTYPE when key exists as a non-set
          type. Deduplication patterns that use sAdd() without error handling silently
          drop unique tracking entries on type collisions or connection loss.
        required_handling: |
          MUST wrap await client.sAdd() in try-catch. For deduplication, re-throw on
          error to prevent silent data loss. Log WRONGTYPE errors — they indicate a
          key namespace collision that requires investigation.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/sadd/

  - name: sMembers
    import_path: redis
    description: >
      Returns all members of a set. Returns empty Set when key does not exist.
      Used for retrieving sets of user IDs, permissions, or feature flags.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: smembers-no-error-handling
        condition: client.sMembers() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE if key is not a set), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.sMembers() throws ErrorReply on WRONGTYPE. Returns empty Set (not null)
          when key is missing. Callers must handle errors separately from the empty-set
          case — they have different implications (error vs. legitimate empty state).
        required_handling: |
          MUST wrap await client.sMembers() in try-catch. An empty Set is a valid result.
          WRONGTYPE errors indicate data schema problems requiring code investigation.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/smembers/

  # ── SORTED SET OPERATIONS ────────────────────────────────────────────────────

  - name: zAdd
    import_path: redis
    description: >
      Adds members with scores to a sorted set. Creates the key if needed. Used
      for leaderboards, priority queues, and rate-limit scoring.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: zadd-no-error-handling
        condition: client.zAdd() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE if key is not a sorted set; "not a float" if score
          is NaN/Infinity), connection errors (ECONNREFUSED, ETIMEDOUT)
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        description: |
          client.zAdd() throws ErrorReply both for WRONGTYPE and for invalid score values
          (NaN, Infinity). Leaderboard writes that use computed scores (e.g., from user
          input or math) can silently fail when scores overflow or become NaN.
        required_handling: |
          MUST wrap await client.zAdd() in try-catch. Validate score is a finite number
          before passing to zAdd(). WRONGTYPE indicates a key collision; score errors
          indicate a computation bug upstream.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/zadd/

  - name: zRange
    import_path: redis
    description: >
      Returns members in a sorted set within the given index range. Returns [] when
      range is empty or key does not exist. Used for leaderboard reads and priority
      queue consumption.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: zrange-no-error-handling
        condition: client.zRange() called without try-catch or .catch() handler
        throws: >
          ErrorReply (WRONGTYPE if key is not a sorted set), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN)
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.zRange() throws ErrorReply on WRONGTYPE. Returns [] (not null) when key
          is missing or range produces no results. Callers must distinguish connection
          errors (retriable) from WRONGTYPE errors (code/data bug).
        required_handling: |
          MUST wrap await client.zRange() in try-catch. An empty array is a valid result.
          Implement fallback for connection errors in leaderboard reads (return cached or
          empty data rather than throwing to the user).
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/zrange/

  # ── MULTI-EXEC TRANSACTIONS ───────────────────────────────────────────────────

  - name: exec
    import_path: redis
    namespace: multi
    description: >
      Executes a queued transaction (MULTI/EXEC). All queued commands run atomically.
      When called via client.multi().exec(), executes as a transaction. When called
      via multi().execAsPipeline(), executes as a pipeline (non-atomic). Used for
      atomic counter+expire pairs, conditional updates, and batch writes.
    postconditions:
      # Evidence: confirmed from @redis/client/dist/lib/errors.d.ts
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/transpipe/
      # WatchError: thrown when WATCH detects key was modified before EXEC
      # MultiErrorReply: thrown in execAsPipeline when one or more commands fail
      - id: multi-exec-watch-error
        condition: >
          client.watch() was used and the watched key was modified by another client
          before exec() was called; or client reconnected after WATCH
        throws: >
          WatchError (from @redis/client) — thrown from exec() when optimistic locking
          fails. The transaction was not executed.
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        description: |
          client.multi().exec() throws WatchError when WATCH was used and the watched key
          changed between WATCH and EXEC. This is the optimistic locking mechanism — the
          transaction must be retried. Callers that do not catch WatchError have no retry
          logic and the update is silently dropped.
        required_handling: |
          MUST wrap exec() in try-catch when WATCH is used. Check err instanceof WatchError
          to implement retry logic. WatchError means the transaction was not executed — not
          a partial execution. Retry the full WATCH+MULTI+EXEC sequence.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/transpipe/
          - https://redis.io/commands/watch/
        evidence_quality: confirmed

      - id: multi-exec-connection-error
        condition: >
          Connection is lost or client is closed before exec() completes
        throws: >
          SocketClosedUnexpectedlyError, ClientClosedError, or connection system errors
          (ECONNREFUSED, ECONNRESET)
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        description: |
          If the connection drops mid-transaction, exec() throws a connection error and
          the entire transaction is aborted (Redis atomicity guarantee). This is typically
          handled at the event listener level, but the exec() call must still be wrapped
          to handle the thrown promise rejection.
        required_handling: |
          MUST wrap exec() in try-catch. On connection error, the transaction state is
          unknown — implement reconciliation logic or re-read state before retrying.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/transpipe/
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
        evidence_quality: confirmed

  # ── PUB/SUB ──────────────────────────────────────────────────────────────────

  - name: subscribe
    import_path: redis
    description: >
      Subscribes a client to one or more channels. Returns Promise<void> — can throw
      on connection failure. The listener callback receives messages; message errors do
      NOT throw but are received as data. Used for real-time notifications, chat, and
      event broadcasting.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      # subscribe() returns Promise<void> in node-redis v5 — confirmed from @redis/client types
      - id: subscribe-no-error-handling
        condition: client.subscribe() called without try-catch or .catch() handler
        throws: >
          ClientClosedError (if client is not connected), connection errors
          (ECONNREFUSED, ETIMEDOUT, ECONNRESET) on network failure during subscription
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          In node-redis v5, subscribe() returns Promise<void> and can throw if the client
          is closed or the connection fails. Unlike ioredis where subscribe is purely
          event-based, node-redis subscribe is awaitable and its rejection must be
          caught. After successful subscription, subsequent message errors are dispatched
          as events (not throws) and require the client .on('error') listener.
        required_handling: |
          MUST wrap await client.subscribe() in try-catch for connection failure. The
          client .on('error') listener handles ongoing connection errors after subscription.
          Both patterns are required: try-catch for subscribe() AND .on('error') on client.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/subscribe/
        evidence_quality: confirmed

  - name: publish
    import_path: redis
    description: >
      Publishes a message to a channel. Returns the number of subscribers that
      received the message. Used to send notifications, trigger workers, and broadcast
      state changes. Note: a return value of 0 means no subscribers received it —
      this is not an error.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: publish-no-error-handling
        condition: client.publish() called without try-catch or .catch() handler
        throws: >
          Connection errors (ECONNREFUSED, ETIMEDOUT, ECONNRESET, EAI_AGAIN);
          ClientClosedError if client is disconnected
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          client.publish() can throw on connection failure. The return value of 0 (zero
          subscribers received the message) is NOT an error — it is a valid response
          when no subscribers are currently active. Callers that confuse 0 with an error
          condition implement incorrect retry logic.
        required_handling: |
          MUST wrap await client.publish() in try-catch. A return value of 0 is NOT an
          error — do not throw or retry based on the count alone. Only throw on
          connection errors or when guaranteed delivery is required (use a different
          pattern such as streams for guaranteed delivery).
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/publish/

  # ── LIFECYCLE: QUIT ───────────────────────────────────────────────────────────

  - name: quit
    import_path: redis
    description: >
      Sends QUIT to Redis and gracefully closes the connection. Returns "OK".
      Pending commands are flushed before disconnect. Preferred over disconnect()
      for graceful server-side shutdown during application teardown.
    postconditions:
      # Source: https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
      - id: quit-no-error-handling
        condition: client.quit() called without try-catch or .catch() handler
        throws: >
          Connection errors if the connection is already closed or lost before QUIT
          completes; SocketClosedUnexpectedlyError
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        description: |
          client.quit() throws if the connection is already closed when quit() is called
          (e.g., in a race condition during app shutdown). Unhandled rejection in shutdown
          paths can prevent clean process exit. Impact is low — application is shutting
          down — but unhandled rejection still produces process warnings.
        required_handling: |
          SHOULD wrap await client.quit() in try-catch in shutdown handlers. Errors during
          quit() can be logged and swallowed — the connection is being torn down anyway.
          Use `client.quit().catch(err => logger.warn('Redis quit error', err))` pattern.
        sources:
          - https://redis.io/docs/latest/develop/clients/nodejs/error-handling/
          - https://redis.io/commands/quit/
