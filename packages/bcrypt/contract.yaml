package: bcrypt
semver: '>=5.0.0 <6.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-13'
status: production
evidence_quality: confirmed
coverage_score: 0.57
functions:
  - name: hash
    import_path: bcrypt
    description: Hashes a password or data string using bcrypt. Returns a Promise if no callback is provided.
    preconditions:
      - id: data-not-null
        description: The data argument must not be null or undefined
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: salt-not-null
        description: The salt argument (string or number of rounds) must not be null or undefined
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    postconditions:
      # Evidence: seen in 13 primary firings across 8 repos in scan-bcrypt-2026-04-14.json
      # Top affected: spacebarchat/server (⭐ 2k+), curveball/a12n-server, afteracademy/nodejs-backend-architecture-typescript
      - id: invalid-args
        condition: data or salt is null/undefined, or data is not a string/Buffer, or salt is not a string or number
        throws: >-
          Error with message 'data and salt arguments required' or 'data must be a string or Buffer and salt must either
          be a salt string or a number of rounds'
        required_handling: >
          Caller MUST validate inputs before calling bcrypt.hash(). Wrap calls in try-catch (synchronous throw path) or
          use .catch() / try-await-catch for the Promise path. Unhandled rejections will crash the process in Node.js.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: hashing-error
        condition: An error occurs during the native bcrypt hashing operation (e.g., native module failure)
        throws: Error — rejected Promise or callback first argument
        required_handling: >
          Caller MUST wrap bcrypt.hash() in try-catch when using async/await, or provide an error-checking callback.
          Unhandled rejections will crash the process.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success
        condition: Hashing completes successfully
        returns: Promise<string> resolving to the bcrypt hash string (60 characters)
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: truncation-at-72-bytes
        description: >-
          bcrypt only uses the first 72 bytes of input. Passwords longer than 72 bytes are silently truncated — two
          different passwords that share the same first 72 bytes will hash to the same value.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: high-rounds-cost
        description: >-
          Using saltRounds above 12 significantly increases hashing time (each increment doubles cost). Values above 14
          can cause HTTP request timeouts in web servers.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: compare
    import_path: bcrypt
    description: Compares a plain-text data value against a bcrypt hash. Returns a Promise if no callback is provided.
    preconditions:
      - id: data-not-null
        description: The data argument must not be null or undefined
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: hash-not-null
        description: The hash argument must not be null or undefined
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    postconditions:
      # Evidence: seen in 16 primary firings across 10 repos in scan-bcrypt-2026-04-14.json
      # Top affected: spacebarchat/server (⭐ 2k+), amruthpillai/reactive-resume (⭐ 35k+), NarHakobyan/awesome-nest-boilerplate
      - id: invalid-args
        condition: data or hash is null/undefined, or data is not a string/Buffer, or hash is not a string
        throws: >-
          Error with message 'data and hash arguments required' or 'data must be a string or Buffer and hash must be a
          string'
        required_handling: >
          Caller MUST validate that both arguments are present and of the correct type. Wrap calls in try-catch or use
          .catch() on the returned Promise.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: comparison-error
        condition: An error occurs during the native bcrypt comparison (e.g., malformed hash string)
        throws: Error — rejected Promise or callback first argument
        required_handling: >
          Caller MUST wrap bcrypt.compare() in try-catch when using async/await. A malformed hash string causes an
          error, not a false return value.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: mismatch
        condition: The plain-text data does not match the hash
        returns: Promise<false> — resolves to boolean false
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: match
        condition: The plain-text data matches the hash
        returns: Promise<true> — resolves to boolean true
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: timing-safe
        description: >-
          bcrypt.compare() is timing-safe by design. Never use string equality (===) to compare hashes — that is not
          timing-safe.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: genSalt
    import_path: bcrypt
    description: >-
      Generates a bcrypt salt with the specified number of rounds. Returns a Promise if no callback is provided.
      Defaults to 10 rounds.
    postconditions:
      - id: invalid-rounds
        condition: rounds parameter is provided but is not a number
        throws: Error with message 'rounds must be a number'
        required_handling: >
          Caller MUST ensure rounds is a number when provided. Wrap in try-catch or use .catch() on the returned
          Promise.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: invalid-minor
        condition: minor version parameter is provided but is not 'a' or 'b'
        throws: Error with message 'minor must be either a or b'
        required_handling: Only pass 'a' or 'b' as the minor version. The default ('b') is recommended for new code.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success
        condition: Salt generation succeeds
        returns: Promise<string> resolving to the generated salt string
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: default-rounds
        description: >-
          Default saltRounds is 10. NIST recommends at least 10 rounds. The bcrypt spec maximum is 31. Most apps should
          use 10-12.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: hashSync
    import_path: bcrypt
    description: >-
      Synchronously hashes a password or data string using bcrypt. Blocks the Node.js event loop
      during hashing — recommended only for scripts and CLI tools, not web server request handlers.
      If salt is a number, genSaltSync() is called internally.
    postconditions:
      # Evidence: https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
      # Evidence: https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
      # Error messages confirmed from source: 'data and salt arguments required' / type-mismatch message
      - id: hash-sync-invalid-args
        condition: data or salt is null/undefined, or data is not a string/Buffer, or salt is not a string or number
        throws: >-
          Error('data and salt arguments required') if either arg is null/undefined;
          Error('data must be a string or Buffer and salt must either be a salt string or a number of rounds')
          for type mismatches. Throws synchronously — not a rejected Promise.
        required_handling: >
          Caller MUST validate inputs before calling bcrypt.hashSync(). Wrap in try-catch since this is a
          synchronous throw (not a rejected Promise). A missing try-catch will propagate the exception up
          the call stack — in Express, this crashes the request handler unless a global error boundary catches it.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: hash-sync-event-loop-block
        condition: Called in a web server request handler with saltRounds >= 10
        throws: Does not throw — but blocks the Node.js event loop for 100ms–1s+ per call
        required_handling: >
          DO NOT call bcrypt.hashSync() inside Express/Fastify/Next.js route handlers or any code
          on the request/response hot path. Use the async bcrypt.hash() instead. Blocking the event loop
          during password hashing causes ALL concurrent HTTP requests to queue, leading to cascading latency
          under load. This is a behavioral correctness issue, not just a performance concern.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: high
    edge_cases:
      - id: hash-sync-truncation-at-72-bytes
        description: >-
          bcrypt silently truncates input at 72 bytes. Passwords longer than 72 bytes that share the same
          first 72 bytes hash to the same value. This is the same behavior as bcrypt.hash().
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
  - name: compareSync
    import_path: bcrypt
    description: >-
      Synchronously compares plain-text data against a bcrypt hash. Returns a boolean.
      Blocks the Node.js event loop during comparison — use bcrypt.compare() in request handlers.
    postconditions:
      # Evidence: https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
      # Evidence: https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
      # Error messages confirmed from source: 'data and hash arguments required' / type-mismatch
      - id: compare-sync-invalid-args
        condition: data or hash is null/undefined, or data is not a string/Buffer, or hash is not a string
        throws: >-
          Error('data and hash arguments required') if either arg is null/undefined;
          Error('data must be a string or Buffer and hash must be a string') for type mismatches.
          Throws synchronously.
        required_handling: >
          Caller MUST validate inputs before calling bcrypt.compareSync(). Wrap in try-catch.
          A malformed hash string (e.g., not a valid bcrypt hash) will cause this function to throw —
          it does NOT return false for an invalid hash format.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: compare-sync-event-loop-block
        condition: Called in a web server request handler
        throws: Does not throw — but blocks the Node.js event loop for 100ms–1s+ per call
        required_handling: >
          DO NOT call bcrypt.compareSync() inside Express/Fastify/Next.js route handlers.
          Use bcrypt.compare() (async) instead. During login endpoints under load, using compareSync
          serializes all auth checks — each login queues behind the previous one, causing login latency
          to multiply linearly with concurrent users.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: high
  - name: genSaltSync
    import_path: bcrypt
    description: >-
      Synchronously generates a bcrypt salt with the specified number of rounds.
      Blocks the event loop. Defaults to 10 rounds if rounds is falsy.
    postconditions:
      # Evidence: https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
      # Error messages confirmed from source
      - id: gen-salt-sync-invalid-rounds
        condition: rounds parameter is provided but is not a number (e.g., a string)
        throws: Error('rounds must be a number'). Throws synchronously.
        required_handling: >
          Caller MUST ensure rounds is a number when provided. Wrap in try-catch.
          Note: falsy values (0, null, undefined) are silently coerced to the default 10 rounds —
          only non-number, truthy values throw.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: gen-salt-sync-invalid-minor
        condition: minor parameter is provided but is not 'a' or 'b'
        throws: Error('minor must be either "a" or "b"'). Throws synchronously.
        required_handling: >
          Only pass 'a' or 'b' as the minor version. Omit the parameter to use the default 'b'.
          Passing any other string causes an immediate synchronous throw.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: getRounds
    import_path: bcrypt
    description: >-
      Extracts the number of salt rounds embedded in a bcrypt hash string.
      Synchronous utility function — does not perform hashing.
      Used for validating whether stored hashes meet current security requirements.
    postconditions:
      # Evidence: https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
      # Error messages confirmed from source
      - id: get-rounds-missing-hash
        condition: hash argument is null or undefined
        throws: Error('hash argument required'). Throws synchronously.
        required_handling: >
          Caller MUST check that the hash argument exists before calling getRounds(). Wrap in try-catch.
          Common failure pattern: calling getRounds() during hash migration/audit over DB rows where
          some rows have null password fields.
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: get-rounds-invalid-type
        condition: hash argument is not a string (e.g., a Buffer or number)
        throws: Error('hash must be a string'). Throws synchronously.
        required_handling: >
          Caller MUST ensure the hash is a string. Wrap in try-catch.
          Common failure pattern: passing a Buffer or TypeScript typed value that hasn't been
          .toString()'d before passing to getRounds().
        sources:
          - https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
