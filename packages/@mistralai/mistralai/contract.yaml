      # Source: /private/tmp/claude/bc-deepen/@mistralai-mistralai/node_modules/@mistralai/mistralai/src/funcs/filesUpload.ts
      - id: files-upload-no-error-handling
        maturity: stable
        condition: >
          client.files.upload() called without try-catch or .catch() handler
        throws: >
          MistralError (.statusCode=413) when file exceeds 512 MB size limit.
