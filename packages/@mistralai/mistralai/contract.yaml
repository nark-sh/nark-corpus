        required_handling: >
          Caller MUST wrap await client.beta.conversations.append() in try-catch or chain .catch().
          Multi-turn chat apps call append() on every user message — an expired conversationId
          (404) must be caught and handled by creating a new conversation rather than propagating
          a 500 to the user. Long conversations may hit token limits (422) that need graceful
          user-facing error messages.

          try {
            const response = await client.beta.conversations.append({
              conversationId: session.mistralConversationId,
              conversationAppendRequest: {
                inputs: [{ role: 'user', content: userMessage }],
              },
            });
            return response.outputs[0]?.content ?? '';
          } catch (error) {
            if (error instanceof MistralError && error.statusCode === 404) {
              // Conversation expired — restart
              throw new Error('Conversation session expired, please start a new chat');
            }
            console.error('Mistral conversation append error:', error);
            throw error;
          }
