                      # datasets.records.judge added pass 12; all non-omitted APIs now contracted
                      # Re-verified 2026-06-24 against @mistralai/mistralai@2.3.0 (deepen-stream-3 pass 49):
                      # SDK grew to 226 standalone funcs but new surface is admin/read-only
                      # (beta.rag.searchIndexes.*, beta.rag.ingestionPipelineConfigurations.*,
