      invalid model, rate limit, or network error.

    postconditions:
      # Evidence: confirmed from source inspection of src/funcs/fimComplete.ts
      # Error types identical to chat.complete (same SDK pattern, same error classes)
      # Source: /private/tmp/claude/bc-deepen/@mistralai-mistralai/node_modules/@mistralai/mistralai/src/funcs/fimComplete.ts
      - id: fim-complete-no-error-handling
        condition: >
          client.fim.complete() called without try-catch or .catch() handler
        throws: >
          MistralError for all HTTP errors (401 invalid key, 422 invalid params, 4XX/5XX).
          HTTPValidationError (.statusCode=422) for malformed prompt/suffix.
          ConnectionError / RequestTimeoutError on network failures.
          SDKValidationError when input fails schema validation before request.
        required_handling: >
          Caller MUST wrap await client.fim.complete() in try-catch or chain .catch().
