      # Evidence: confirmed from source inspection of src/funcs/batchJobsCreate.ts
      # Error types: MistralError (4XX/5XX), ConnectionError, RequestTimeoutError
      # Batch job status enum: QUEUED, RUNNING, SUCCESS, FAILED, TIMEOUT_EXCEEDED,
