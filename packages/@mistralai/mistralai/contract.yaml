  - name: moderate
    import_path: "@mistralai/mistralai"
    description: >
      Classifies content for policy violations and harmful categories. Called as
      client.classifiers.moderate({ model, inputs }) or
      client.classifiers.moderateChat({ model, inputs }). Used in content
      moderation pipelines to screen user-generated content. Makes an HTTPS POST
      to api.mistral.ai/v1/moderations. Throws on auth failure, invalid model,
      or network error.

    postconditions:
      # Evidence: confirmed from source inspection of src/funcs/classifiersModerate.ts
      # Error types: MistralError (4XX/5XX), HTTPValidationError (422), ConnectionError
      # Source: /private/tmp/claude/bc-deepen/@mistralai-mistralai/node_modules/@mistralai/mistralai/src/funcs/classifiersModerate.ts
      - id: classifiers-moderate-no-error-handling
        condition: >
          client.classifiers.moderate() or client.classifiers.moderateChat() called
          without try-catch or .catch() handler
        throws: >
          MistralError (.statusCode=401) when API key is invalid.
          HTTPValidationError (.statusCode=422) for malformed inputs array or invalid classifier model.
          MistralError for other 4XX/5XX server errors.
          ConnectionError on network failures.
        required_handling: >
          Caller MUST wrap await client.classifiers.moderate() in try-catch or chain .catch().
          Content moderation is a safety-critical pipeline — uncaught errors may cause
          unmoderated content to pass through if the catch path allows through on failure.
          Always fail closed: if moderation throws, reject the content.

          try {
            const result = await client.classifiers.moderate({
              model: 'mistral-moderation-latest',
              inputs: [{ text: userContent }],
            });
            const isViolation = result.results[0].categories['hate'];
            return isViolation;
          } catch (error) {
            console.error('Mistral moderation error:', error);
            // Fail closed: reject content if moderation is unavailable
            return true;
          }
        sources:
          - "https://docs.mistral.ai/capabilities/guardrailing/"
          - "https://docs.mistral.ai/api/#tag/classifiers/operation/moderations_v1_moderations_post"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high

  - name: create
    import_path: "@mistralai/mistralai"
    description: >
      Creates an asynchronous batch inference job. Called as
      client.batch.jobs.create({ model, inputFiles, endpoint, metadata }).
      Accepts a list of uploaded file IDs, processes them in batch, and returns
      a BatchJob object with status "QUEUED". Makes an HTTPS POST to
      api.mistral.ai/v1/batch/jobs. Throws on invalid file IDs, auth failure,
      quota exceeded, or network error.

    postconditions:
      # Evidence: confirmed from source inspection of src/funcs/batchJobsCreate.ts
      # Error types: MistralError (4XX/5XX), ConnectionError, RequestTimeoutError
      # Batch job status enum: QUEUED, RUNNING, SUCCESS, FAILED, TIMEOUT_EXCEEDED,
      #   CANCELLATION_REQUESTED, CANCELLED
      # Source: /private/tmp/claude/bc-deepen/@mistralai-mistralai/node_modules/@mistralai/mistralai/src/funcs/batchJobsCreate.ts
      - id: batch-jobs-create-no-error-handling
        condition: >
          client.batch.jobs.create() called without try-catch or .catch() handler
        throws: >
          MistralError (.statusCode=404) when inputFiles contain invalid or deleted file IDs.
          MistralError (.statusCode=401) when API key is invalid.
          MistralError (.statusCode=422) for malformed request (invalid endpoint or metadata).
          MistralError (.statusCode=429) rate limit — auto-retried by SDK before throwing.
          ConnectionError / RequestTimeoutError on network failures.
        required_handling: >
          Caller MUST wrap await client.batch.jobs.create() in try-catch or chain .catch().
          Batch jobs are used in document processing and large-scale inference pipelines —
          uncaught errors during job creation cause the entire batch to be silently dropped.
          Additionally, a successfully created job with status FAILED must be checked
          separately via batch.jobs.get() — this postcondition only covers the creation throw.

          try {
            const job = await client.batch.jobs.create({
              model: 'mistral-large-latest',
              inputFiles: [uploadedFileId],
              endpoint: '/v1/chat/completions',
              metadata: { jobName: 'nightly-batch' },
            });
            console.log(`Batch job created: ${job.id}, status: ${job.status}`);
            return job.id;
          } catch (error) {
            console.error('Mistral batch job creation error:', error);
            throw error;
          }
        sources:
          - "https://docs.mistral.ai/capabilities/batch/"
          - "https://docs.mistral.ai/api/#tag/batch/operation/jobs_api_routes_batch_create_batch_job"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

notes:
  - "Mistral constructor (new Mistral({apiKey})) does NOT make network calls — no try-catch needed there"
  - "client.chat.complete() is a 2-level property chain: client.chat → chat namespace → .complete() method"
  - "client.chat.stream() is detected the same way as complete() via the PropertyChainDetector"
  - "v2.x SDK error classes: MistralError (base HTTP), SDKError, HTTPValidationError (422), ConnectionError, RequestTimeoutError — no specific RateLimitError/UnauthorizedError classes"
  - "429, 500, 502, 503, 504 are auto-retried by SDK with exponential backoff — callers still need try-catch for when retries are exhausted"
  - "v0.x API used client.chat() and client.chatStream() — NOT covered (EOL)"
  - "v1.x+ uses client.chat.complete() and client.chat.stream() — covered by this contract"
  - "cline (59k★) uses client.chat.stream().catch() — proper handling via .catch() chain"
  - "tutor-gpt (891★) uses client.files.upload/ocr.process inside try-catch — proper handling"
  - "classifiers.moderate() is safety-critical — always fail closed (reject content if error thrown)"
  - "batch.jobs.create() throw ≠ job failure — FAILED status must be checked via batch.jobs.get()"
