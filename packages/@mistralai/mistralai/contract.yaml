# @mistralai/mistralai — Mistral AI Node.js SDK
#
# SDK v2.x (current) error class hierarchy (confirmed from source):
#   MistralError (base HTTP error, has .statusCode, .body, .headers, .rawResponse)
#     SDKError — fallback for unmatched status codes / content types
#     HTTPValidationError — thrown for HTTP 422 (Unprocessable Entity), has .detail array
#     ResponseValidationError — response failed SDK schema validation
#   HTTPClientError (base network error)
#     ConnectionError — network unreachable / ECONNREFUSED
#     RequestTimeoutError — timeout via AbortSignal
#     RequestAbortedError — request aborted by caller
#     InvalidRequestError — bad inputs before request sent
#     UnexpectedClientError — unrecognized network error
#   SDKValidationError — input data failed SDK schema validation before request
#
# Retry behavior (default, from source):
#   429, 500, 502, 503, 504 are auto-retried with exponential backoff (max 1hr)
#   ConnectionErrors are also retried by default
#   401, 403, 422, 4XX other — NOT retried (permanent errors)
#
# Primary API (v2.x):
#   const client = new Mistral({ apiKey: '...' })
#   await client.chat.complete({ model, messages })
#   await client.chat.stream({ model, messages })
#   await client.embeddings.create({ model, inputs })
#   await client.ocr.process({ model, document })
#   await client.agents.complete({ agentId, messages })
#   await client.audio.transcriptions.complete({ model, file })
#   await client.audio.speech.complete({ model, input, voice })
#   await client.files.upload({ file, purpose })
#   await client.fim.complete({ model, prompt })
#   await client.classifiers.moderate({ model, inputs })
#   await client.batch.jobs.create({ model, inputFiles, endpoint, metadata })
package: "@mistralai/mistralai"
semver: ">=1.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-16"
status: production
evidence_quality: confirmed
coverage_score: 0.34

detection:
  class_names:
    - "Mistral"

functions:
  - name: complete
    import_path: "@mistralai/mistralai"
    description: >
      Creates a chat completion using Mistral's API. Called as client.chat.complete()
      or client.fim.complete(). Makes an HTTPS POST request to the Mistral API.
      Throws on auth failure, invalid model, rate limit, or network error.

    postconditions:
      - id: complete-no-error-handling
        condition: >
          client.chat.complete() or client.fim.complete() called without try-catch or .catch() handler
        throws: >
          SDKError (base class for all HTTP errors).
          RateLimitError (429 — too many requests).
          UnauthorizedError (401 — invalid API key).
          BadRequestError (400 — invalid parameters, unsupported model).
          ServiceUnavailableError (503) / GatewayTimeoutError (504).
          SDKValidationError (response schema mismatch).
          Network errors: ECONNREFUSED, ETIMEDOUT.
        required_handling: >
          Caller MUST wrap await client.chat.complete() in try-catch or chain .catch().
          Uncaught error causes unhandled promise rejection — API routes return 500,
          chatbot UIs show blank screens, completions silently fail.

          try {
            const response = await client.chat.complete({
              model: 'mistral-large-latest',
              messages: [{ role: 'user', content: 'Hello' }],
            });
            return response.choices[0].message.content;
          } catch (error) {
            console.error('Mistral API error:', error);
            throw error;
          }
        sources:
          - "https://docs.mistral.ai/api/#tag/chat/operation/chat_completion_v1_chat_completions_post"
          - "https://github.com/mistralai/client-ts/blob/main/packages/mistralai/USAGE.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: stream
    import_path: "@mistralai/mistralai"
    description: >
      Creates a streaming chat completion using Mistral's API. Called as
      client.chat.stream(). Returns an async iterable of chunks. Throws on
      auth failure, invalid model, or network error before streaming begins.
      Can also throw mid-stream on connection drop.

    postconditions:
      - id: stream-no-error-handling
        condition: >
          client.chat.stream() called without try-catch or .catch() handler
        throws: >
          Same error types as complete() — thrown before streaming begins.
          Network errors can also throw mid-stream during iteration.
        required_handling: >
          Caller MUST wrap await client.chat.stream() in try-catch or chain .catch().
          Also consider try-catch around the async iteration loop to handle mid-stream errors.

          try {
            const stream = await client.chat.stream({
              model: 'mistral-large-latest',
              messages: [{ role: 'user', content: 'Hello' }],
            });
            for await (const chunk of stream) {
              yield chunk.data.choices[0]?.delta?.content ?? '';
            }
          } catch (error) {
            console.error('Mistral stream error:', error);
            throw error;
          }
        sources:
          - "https://docs.mistral.ai/capabilities/completion/#streaming"
          - "https://github.com/mistralai/client-ts/blob/main/packages/mistralai/USAGE.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: create
    import_path: "@mistralai/mistralai"
    description: >
      Creates vector embeddings for input text using Mistral's embedding models.
      Called as client.embeddings.create({ model, inputs }). Essential for RAG
      pipelines, semantic search, and similarity matching. Makes an HTTPS POST
      to api.mistral.ai/v1/embeddings. Throws on auth failure, invalid model,
      quota exceeded, or network error.

    postconditions:
      # Evidence: confirmed from source inspection of src/funcs/embeddingsCreate.ts
      # Error types: MistralError (4XX/5XX), HTTPValidationError (422),
      # ConnectionError, RequestTimeoutError, SDKValidationError
      # Source: /private/tmp/claude/bc-deepen/@mistralai-mistralai/node_modules/@mistralai/mistralai/src/funcs/embeddingsCreate.ts
      - id: embeddings-create-no-error-handling
        condition: >
          client.embeddings.create() called without try-catch or .catch() handler
        throws: >
          MistralError (base, .statusCode populated) for all HTTP error responses.
          HTTPValidationError (.statusCode=422, .detail[] array) for invalid inputs.
          SDKError for unmatched status codes or unexpected content types.
          ConnectionError when network is unreachable.
          RequestTimeoutError when request exceeds configured timeout.
          SDKValidationError when input fails SDK schema validation before request.
          Note: 429 rate limit is auto-retried by SDK before throwing.
        required_handling: >
          Caller MUST wrap await client.embeddings.create() in try-catch or chain .catch().
          RAG pipelines and embedding jobs often run in background tasks or loops —
          uncaught errors silently halt the entire ingestion pipeline. Search quality
          degrades to zero without alerting.

          try {
            const response = await client.embeddings.create({
              model: 'mistral-embed',
              inputs: ['Hello world', 'Another document'],
            });
            return response.data.map(e => e.embedding);
          } catch (error) {
            console.error('Mistral embeddings error:', error);
            throw error;
          }
        sources:
          - "https://docs.mistral.ai/capabilities/embeddings/"
          - "https://docs.mistral.ai/api/#tag/embeddings/operation/embeddings_v1_embeddings_post"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: process
    import_path: "@mistralai/mistralai"
    description: >
      Performs Optical Character Recognition (OCR) on documents. Called as
      client.ocr.process({ model, document }). Accepts URLs or base64-encoded
      files. Used for document parsing, data extraction, and content indexing.
      Makes an HTTPS POST to api.mistral.ai/v1/ocr. Throws on invalid document
      format, file size limits, auth failure, or network error.

    postconditions:
      # Evidence: confirmed from source inspection of src/funcs/ocrProcess.ts
      # Error types: HTTPValidationError (422), MistralError (4XX/5XX),
      # ConnectionError, RequestTimeoutError
      # Source: /private/tmp/claude/bc-deepen/@mistralai-mistralai/node_modules/@mistralai/mistralai/src/funcs/ocrProcess.ts
      - id: ocr-process-no-error-handling
        condition: >
          client.ocr.process() called without try-catch or .catch() handler
        throws: >
          HTTPValidationError (.statusCode=422) when document URL is invalid,
          base64 encoding is malformed, or document format is unsupported.
          MistralError when API key is invalid (401), quota exhausted, or server fails.
          ConnectionError on network failures.
          RequestTimeoutError if document processing exceeds timeout (large documents).
        required_handling: >
          Caller MUST wrap await client.ocr.process() in try-catch or chain .catch().
          Document processing pipelines often handle user-uploaded content — invalid
          PDFs or unsupported formats throw HTTPValidationError (422) which must be
          caught and returned as a user-readable error, not a 500.

          try {
            const result = await client.ocr.process({
              model: 'mistral-ocr-latest',
              document: {
                type: 'document_url',
                documentUrl: 'https://example.com/document.pdf',
              },
            });
            return result.pages.map(p => p.markdown).join('\n');
          } catch (error) {
            if (error instanceof HTTPValidationError) {
              throw new Error('Invalid document format or URL');
            }
            throw error;
          }
        sources:
          - "https://docs.mistral.ai/capabilities/document/"
          - "https://docs.mistral.ai/api/#tag/ocr/operation/document_understanding_v1_ocr_post"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: upload
    import_path: "@mistralai/mistralai"
    description: >
      Uploads a file for use in fine-tuning, batch jobs, or OCR. Called as
      client.files.upload({ file, purpose }). Accepts JSONL files for fine-tuning
      (max 512 MB per file). Makes an HTTPS multipart/form-data POST to
      api.mistral.ai/v1/files. Throws on auth failure, file too large, invalid
      format, quota exceeded, or network error.

    postconditions:
      # Evidence: confirmed from source inspection of src/funcs/filesUpload.ts
      # Error types: MistralError (4XX/5XX), ConnectionError, RequestTimeoutError
      # File size limit: 512 MB per file (documented in SDK source comments)
      # Source: /private/tmp/claude/bc-deepen/@mistralai-mistralai/node_modules/@mistralai/mistralai/src/funcs/filesUpload.ts
      - id: files-upload-no-error-handling
        condition: >
          client.files.upload() called without try-catch or .catch() handler
        throws: >
          MistralError (.statusCode=413) when file exceeds 512 MB size limit.
          MistralError (.statusCode=401) when API key is invalid.
          MistralError (.statusCode=422) for invalid file format (e.g. non-JSONL for fine-tuning).
          ConnectionError / RequestTimeoutError for large file uploads that timeout.
          SDKValidationError when request object fails SDK schema validation.
        required_handling: >
          Caller MUST wrap await client.files.upload() in try-catch or chain .catch().
          File uploads are commonly used in fine-tuning prep workflows or batch pipelines —
          uncaught size limit errors (413) cause the entire workflow to crash before
          any fine-tuning is enqueued.

          try {
            const fileObj = await client.files.upload({
              file: { name: 'training_data.jsonl', data: fileBlob },
              purpose: 'fine-tune',
            });
            return fileObj.id;
          } catch (error) {
            console.error('Mistral file upload error:', error);
            throw error;
          }
        sources:
          - "https://docs.mistral.ai/api/#tag/files/operation/files_api_routes_upload_file"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low

  - name: complete
    import_path: "@mistralai/mistralai"
    description: >
      Runs a completion via a deployed Mistral agent. Called as
      client.agents.complete({ agentId, messages }). Agents are pre-configured
      Mistral models with system prompts, tools, and knowledge bases. Makes an
      HTTPS POST to api.mistral.ai/v1/agents/completions. Throws on invalid
      agentId, auth failure, rate limit, or network error.

    postconditions:
      # Evidence: confirmed from source inspection of src/funcs/agentsComplete.ts
      # Error types: HTTPValidationError (422), MistralError (4XX/5XX),
      # ConnectionError, RequestTimeoutError
      # Source: /private/tmp/claude/bc-deepen/@mistralai-mistralai/node_modules/@mistralai/mistralai/src/funcs/agentsComplete.ts
      - id: agents-complete-no-error-handling
        condition: >
          client.agents.complete() called without try-catch or .catch() handler
        throws: >
          MistralError (.statusCode=404) when agentId does not exist or is deleted.
          HTTPValidationError (.statusCode=422) when messages array is malformed.
          MistralError (.statusCode=401) when API key is invalid.
          MistralError (.statusCode=429) rate limit — SDK auto-retries before throwing.
          ConnectionError / RequestTimeoutError on network failures.
        required_handling: >
          Caller MUST wrap await client.agents.complete() in try-catch or chain .catch().
          Agent IDs can be revoked or deleted — uncaught 404 MistralError crashes the
          request handler, returning 500 to users. Agent IDs should be validated at startup.

          try {
            const response = await client.agents.complete({
              agentId: process.env.MISTRAL_AGENT_ID,
              messages: [{ role: 'user', content: userMessage }],
            });
            return response.choices[0].message.content;
          } catch (error) {
            console.error('Mistral agent error:', error);
            throw error;
          }
        sources:
          - "https://docs.mistral.ai/api/#tag/agents/operation/agents_api_routes_agent_completion"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

