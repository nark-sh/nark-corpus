package: nock
semver: '>=9.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-18'
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.89
functions:
  - name: nock
    import_path: nock
    description: >
      Creates an HTTP interceptor scope for the given base URL. Subsequent method calls (.get, .post, etc.) on the
      returned scope define the expected requests and their mocked responses.
    postconditions:
      - id: unmatched-request-throws
        condition: >
          An HTTP request is made that does not match any defined interceptor and nock.disableNetConnect() has been
          called
        throws: NetConnectNotAllowedError (error.code === 'ENETUNREACH')
        required_handling: >
          Test assertions MUST account for this error. The most common cause is a URL path, method, query parameter,
          header, or body mismatch between the real request and the mock definition. Fix the mock to match the actual
          request, or allow the specific host with nock.enableNetConnect(host).
        sources:
          - https://github.com/nock/nock#disabling-real-http-requests
          - https://github.com/nock/nock/issues/884
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    edge_cases:
      - id: jest-async-error-timing
        description: >
          In Jest, unmatched-request errors thrown inside async callbacks may surface after the test has already passed.
          Use expect.assertions(n) or nock.disableNetConnect() to force errors to propagate during test execution.
        sources:
          - https://jestjs.io/docs/expect#expectassertionsnumber
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: disableNetConnect
    import_path: nock
    description: >
      Disables all real outbound HTTP connections for the current Node.js process. Any request that does not match a
      defined nock interceptor will throw NetConnectNotAllowedError instead of making a real network call.
    preconditions:
      - id: call-before-tests
        description: |
          Must be called before any HTTP-making code under test executes, typically in a beforeAll or beforeEach hook.
        sources:
          - https://github.com/nock/nock#disabling-real-http-requests
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    postconditions:
      - id: real-requests-blocked
        condition: called without arguments
        returns: undefined; all subsequent unmatched HTTP requests will throw
        sources:
          - https://github.com/nock/nock#disabling-real-http-requests
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: missing-disable-net-connect
        description: >
          Without calling disableNetConnect(), requests that do not match any mock fall through to the real network.
          This allows tests to inadvertently hit production APIs, causing flaky tests and unintended side effects.
          Approximately 55% of projects using nock omit this safeguard.
        sources:
          - https://github.com/nock/nock#disabling-real-http-requests
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: cleanAll
    import_path: nock
    description: >
      Removes all pending interceptors from all scopes. Should be called in afterEach to prevent mock state from leaking
      between tests.
    postconditions:
      - id: all-interceptors-removed
        condition: called at any point
        returns: undefined; all pending interceptors are cleared
        sources:
          - https://github.com/nock/nock#cleanall
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: missing-clean-all
        description: >
          Without calling cleanAll() in afterEach, interceptors defined in one test persist into subsequent tests. This
          causes false positives (tests pass by consuming a previous test's mock) and false negatives (tests fail due to
          stale mocks). Approximately 30-40% of nock projects are missing this cleanup.
        sources:
          - https://github.com/nock/nock/issues/705
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: persist-without-cleanup
        description: >
          Interceptors created with .persist() are reused indefinitely. Without cleanAll() in afterEach, persist() mocks
          remain active across all subsequent tests in the suite, causing cross-test pollution.
        sources:
          - https://github.com/nock/nock/issues/1042
          - https://github.com/nock/nock/issues/1495
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: restore
    import_path: nock
    description: >
      Restores the original http/https module request functions, deactivating all nock interception. Must be called
      after recording sessions and in final teardown.
    preconditions:
      - id: clean-all-first
        description: >
          nock.cleanAll() should be called before nock.restore() to avoid memory leaks from interceptors that were
          removed from routing but not garbage collected.
        sources:
          - https://github.com/nock/nock/issues/2077
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    postconditions:
      - id: interception-deactivated
        condition: called after interception is no longer needed
        returns: undefined; http module is restored to its original state
        sources:
          - https://github.com/nock/nock#restoring-http-intercepting
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
  - name: isDone
    import_path: nock
    description: >
      Returns true if all interceptors defined on this scope have been used (consumed by matching requests) at least
      once.
    postconditions:
      - id: returns-false-for-unused-mocks
        condition: one or more interceptors on the scope have not been matched by any request
        returns: 'false'
        required_handling: >
          Tests SHOULD assert scope.isDone() after the code under test runs. A false return indicates the code did not
          make the expected request, the mock URL/method/body does not match the real request, or there is a bug in the
          test logic.
        sources:
          - https://github.com/nock/nock#asserting-expectations-after-execution
          - https://snyk.io/advisor/npm-package/nock/functions/nock.isDone
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: returns-true-when-all-consumed
        condition: all interceptors on the scope have been matched at least once
        returns: 'true'
        sources:
          - https://github.com/nock/nock#asserting-expectations-after-execution
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
  - name: load
    import_path: nock
    description: >
      Synchronously reads a JSON fixture file from disk and returns an array of Scope objects with
      interceptors defined from the fixture definitions. Used in test setup to replay recorded HTTP
      interactions. Internally calls loadDefs() then define().
    postconditions:
      # Evidence: nock/lib/scope.js loadDefs() source — fs.readFileSync(path) + JSON.parse(contents)
      # Confirmed: throws ENOENT when path does not exist, SyntaxError when file is invalid JSON
      - id: load-file-not-found
        severity: error
        condition: >
          The path argument does not point to an existing file, or the process lacks read
          permission for the file
        throws: >
          Error with code ENOENT from fs.readFileSync — "no such file or directory, open '<path>'"
        required_handling: >
          Wrap nock.load() in a try-catch. A missing fixture file means all interceptors are absent
          and all HTTP calls in the test will fail or hit the real network. Test setup MUST validate
          the fixture path exists before calling load().
        sources:
          - https://github.com/nock/nock#saving-and-loading-interceptors
          - https://nodejs.org/api/fs.html#fsreadfilesyncpath-options
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
      - id: load-invalid-json
        severity: error
        condition: >
          The fixture file exists but contains invalid JSON (e.g. truncated recording, manual
          edit error, encoding issue)
        throws: >
          SyntaxError from JSON.parse — "Unexpected token ... in JSON at position N"
        required_handling: >
          Validate fixture files are well-formed JSON before committing them. A SyntaxError from
          nock.load() crashes the entire test suite setup (beforeAll/beforeEach fails), causing all
          tests in the suite to error rather than fail, making the root cause harder to diagnose.
        sources:
          - https://github.com/nock/nock#saving-and-loading-interceptors
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
  - name: loadDefs
    import_path: nock
    description: >
      Synchronously reads a JSON fixture file and returns raw Definition objects (not Scope objects).
      Used when you need to inspect or transform fixture definitions before replaying them.
      Has the same file-reading error profile as load().
    postconditions:
      # Evidence: nock/lib/scope.js loadDefs() — identical readFileSync+JSON.parse path as load()
      - id: loaddefs-file-not-found
        severity: error
        condition: The path argument does not point to an existing file
        throws: Error with code ENOENT from fs.readFileSync
        required_handling: >
          Same as nock.load() — wrap in try-catch. Missing fixture means all definitions are
          absent. Callers that transform definitions before passing to nock.define() must guard
          against this error in the transformation pipeline.
        sources:
          - https://github.com/nock/nock#saving-and-loading-interceptors
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
  - name: Scope.done
    import_path: nock
    description: >
      Asserts that all interceptors defined on this scope have been consumed (matched by at least
      one real HTTP request). Throws an AssertionError if any mock remains unused. This is the
      strict version of scope.isDone() — use done() to enforce that all expected requests were made.
    postconditions:
      # Evidence: nock/lib/scope.js done() — uses assert.ok(this.isDone(), ...) with pendingMocks()
      # Confirmed: throws AssertionError (from Node assert module) when scope is not done
      - id: scope-done-unused-mocks-throw
        severity: error
        condition: >
          One or more interceptors on the scope have not been matched by a real HTTP request
          when scope.done() is called
        throws: >
          AssertionError: "Mocks not yet satisfied:\n<method> <url>" — lists each pending mock
        required_handling: >
          Call scope.done() only after the code under test has had the opportunity to make all
          expected HTTP calls. If done() throws, the test has a logic error: either the code
          under test did not make the expected request, or the mock URL/method/body does not
          match the actual request. Do not suppress the AssertionError — it is an intentional
          test signal.
        sources:
          - https://github.com/nock/nock#asserting-expectations-after-execution
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
      - id: scope-done-swallowed-in-async-callback
        severity: warning
        condition: >
          scope.done() is called inside an async callback (setTimeout, promise .then, or event
          handler) without the test framework being aware of the async assertion
        description: >
          If done() throws inside an unguarded async callback, the AssertionError propagates as
          an unhandled rejection or uncaught exception rather than a test failure. The test may
          pass while an interceptor remains unused, hiding a real bug.
        required_handling: >
          Always call scope.done() synchronously at the end of the test body, or ensure the test
          framework is awaiting async assertions (use expect.assertions(n) in Jest, or return the
          promise from the test function).
        sources:
          - https://github.com/nock/nock#asserting-expectations-after-execution
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low
  - name: back
    import_path: nock
    description: >
      The nock.back() function provides a record/replay mechanism for HTTP interactions. In
      'record' mode it makes real HTTP calls and saves them to a fixture file. In 'lockdown' or
      'dryrun' mode it replays from the fixture. Returns a Promise resolving to {nockDone, context}
      when called without a callback. nock.back.fixtures must be set before use.
    postconditions:
      # Evidence: nock/lib/back.js — explicit throw when fixtures path not set (line 47-50)
      # Confirmed: throw Error('Back requires nock.back.fixtures to be set') before any async work
      - id: back-fixtures-not-set
        severity: error
        condition: >
          nock.back.fixtures has not been set to a directory path before calling nock.back()
        throws: >
          Error: "Back requires nock.back.fixtures to be set\n\tnock.back.fixtures = '/path/to/fixtures/'"
        required_handling: >
          Set nock.back.fixtures = path.join(__dirname, 'fixtures') in a top-level beforeAll
          hook before any test that uses nock.back(). Missing this causes an immediate throw
          (not a rejected Promise) — the error surfaces synchronously during the call.
        sources:
          - https://github.com/nock/nock#nock-back
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
      - id: back-unknown-mode
        severity: error
        condition: >
          nock.back.setMode() is called with a string that is not one of 'wild', 'dryrun',
          'record', 'update', or 'lockdown'
        throws: 'Error — "Unknown mode: <value>"'
        required_handling: >
          Use only the five documented BackMode values. The mode is typically set from an
          environment variable (process.env.NOCK_BACK_MODE). Validate the env var value against
          the allowed set before passing to setMode().
        sources:
          - https://github.com/nock/nock#nock-back
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
