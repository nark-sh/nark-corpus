package: nock
semver: '>=9.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-03'
status: production
evidence_quality: confirmed
functions:
  - name: nock
    import_path: nock
    description: >
      Creates an HTTP interceptor scope for the given base URL. Subsequent method calls (.get, .post, etc.) on the
      returned scope define the expected requests and their mocked responses.
    postconditions:
      - id: unmatched-request-throws
        condition: >
          An HTTP request is made that does not match any defined interceptor and nock.disableNetConnect() has been
          called
        throws: NetConnectNotAllowedError (error.code === 'ENETUNREACH')
        required_handling: >
          Test assertions MUST account for this error. The most common cause is a URL path, method, query parameter,
          header, or body mismatch between the real request and the mock definition. Fix the mock to match the actual
          request, or allow the specific host with nock.enableNetConnect(host).
        sources:
          - https://github.com/nock/nock#disabling-real-http-requests
          - https://github.com/nock/nock/issues/884
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    edge_cases:
      - id: jest-async-error-timing
        description: >
          In Jest, unmatched-request errors thrown inside async callbacks may surface after the test has already passed.
          Use expect.assertions(n) or nock.disableNetConnect() to force errors to propagate during test execution.
        sources:
          - https://jestjs.io/docs/expect#expectassertionsnumber
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: disableNetConnect
    import_path: nock
    description: >
      Disables all real outbound HTTP connections for the current Node.js process. Any request that does not match a
      defined nock interceptor will throw NetConnectNotAllowedError instead of making a real network call.
    preconditions:
      - id: call-before-tests
        description: |
          Must be called before any HTTP-making code under test executes, typically in a beforeAll or beforeEach hook.
        sources:
          - https://github.com/nock/nock#disabling-real-http-requests
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    postconditions:
      - id: real-requests-blocked
        condition: called without arguments
        returns: undefined; all subsequent unmatched HTTP requests will throw
        sources:
          - https://github.com/nock/nock#disabling-real-http-requests
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: missing-disable-net-connect
        description: >
          Without calling disableNetConnect(), requests that do not match any mock fall through to the real network.
          This allows tests to inadvertently hit production APIs, causing flaky tests and unintended side effects.
          Approximately 55% of projects using nock omit this safeguard.
        sources:
          - https://github.com/nock/nock#disabling-real-http-requests
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: cleanAll
    import_path: nock
    description: >
      Removes all pending interceptors from all scopes. Should be called in afterEach to prevent mock state from leaking
      between tests.
    postconditions:
      - id: all-interceptors-removed
        condition: called at any point
        returns: undefined; all pending interceptors are cleared
        sources:
          - https://github.com/nock/nock#cleanall
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: missing-clean-all
        description: >
          Without calling cleanAll() in afterEach, interceptors defined in one test persist into subsequent tests. This
          causes false positives (tests pass by consuming a previous test's mock) and false negatives (tests fail due to
          stale mocks). Approximately 30-40% of nock projects are missing this cleanup.
        sources:
          - https://github.com/nock/nock/issues/705
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: persist-without-cleanup
        description: >
          Interceptors created with .persist() are reused indefinitely. Without cleanAll() in afterEach, persist() mocks
          remain active across all subsequent tests in the suite, causing cross-test pollution.
        sources:
          - https://github.com/nock/nock/issues/1042
          - https://github.com/nock/nock/issues/1495
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: restore
    import_path: nock
    description: >
      Restores the original http/https module request functions, deactivating all nock interception. Must be called
      after recording sessions and in final teardown.
    preconditions:
      - id: clean-all-first
        description: >
          nock.cleanAll() should be called before nock.restore() to avoid memory leaks from interceptors that were
          removed from routing but not garbage collected.
        sources:
          - https://github.com/nock/nock/issues/2077
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    postconditions:
      - id: interception-deactivated
        condition: called after interception is no longer needed
        returns: undefined; http module is restored to its original state
        sources:
          - https://github.com/nock/nock#restoring-http-intercepting
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
  - name: isDone
    import_path: nock
    description: >
      Returns true if all interceptors defined on this scope have been used (consumed by matching requests) at least
      once.
    postconditions:
      - id: returns-false-for-unused-mocks
        condition: one or more interceptors on the scope have not been matched by any request
        returns: 'false'
        required_handling: >
          Tests SHOULD assert scope.isDone() after the code under test runs. A false return indicates the code did not
          make the expected request, the mock URL/method/body does not match the real request, or there is a bug in the
          test logic.
        sources:
          - https://github.com/nock/nock#asserting-expectations-after-execution
          - https://snyk.io/advisor/npm-package/nock/functions/nock.isDone
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: returns-true-when-all-consumed
        condition: all interceptors on the scope have been matched at least once
        returns: 'true'
        sources:
          - https://github.com/nock/nock#asserting-expectations-after-execution
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
