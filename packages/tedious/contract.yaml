      incident_cost_range: medium

  - id: tls-version-requirements
    description: >
      Node.js 12+ requires TLS 1.2 minimum. Old SQL Servers supporting only TLS 1.0
      will fail to connect. Upgrade server to TLS 1.2 (preferred) or use
      --tls-min-v1.0 flag (NOT recommended, security risk). TLS 1.0 is deprecated.
    sources:
      - "https://tediousjs.github.io/tedious/frequently-encountered-problems.html"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: ntlm-nodejs-17-plus
    description: >
      NTLM authentication fails on Node.js 17+ due to OpenSSL 3.0 deprecating md4
      algorithm. Enable --openssl-legacy-provider flag or use different authentication
      (SQL auth or Azure AD recommended). Security concern with legacy provider.
    sources:
      - "https://tediousjs.github.io/tedious/frequently-encountered-problems.html"
    severity: warning
    business_impact:
