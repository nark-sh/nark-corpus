package: jose
semver: ">=4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed
description: "JWA, JWS, JWE, JWT, JWK, JWKS for Node.js, Browser, Cloudflare Workers, Deno, Bun, and other Web-interoperable runtimes"

functions:
  - name: jwtVerify
    import_path: "jose"
    description: "Verifies the JWT format (JWS Compact), verifies JWS signature, and validates JWT Claims Set. Returns Promise<JWTVerifyResult>."

    postconditions:
      # Evidence: seen in 5 primary firings across 5 repos in scan-jose-2026-04-02.json
      # Top affected: nextjs/saas-starter, cloudflare/moltworker, ethanniser/NextFaster
      - id: verify-no-try-catch
        condition: "await jwtVerify(...) is called without a surrounding try-catch block"
        throws: "JWTExpired | JWTClaimValidationFailed | JWSSignatureVerificationFailed | JWSInvalid | JWTInvalid | JOSEAlgNotAllowed | JWKSNoMatchingKey | JWKSTimeout"
        required_handling: >
          Caller MUST wrap jwtVerify() in a try-catch block. In production, JWT tokens expire
          (JWTExpired), can be tampered with (JWSSignatureVerificationFailed), or be structurally
          invalid (JWTInvalid/JWSInvalid). When using createRemoteJWKSet, network timeouts
          (JWKSTimeout) and key mismatches (JWKSNoMatchingKey) are also possible. Unhandled
          exceptions propagate as 500 errors instead of proper 401 Unauthorized responses.
        sources:
          - "https://github.com/panva/jose"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: SignJWT.sign
    import_path: "jose"
    description: "Builder pattern — new SignJWT(payload).setProtectedHeader(...).sign(key) — signs and returns a JWT string."

    postconditions:
      - id: sign-no-try-catch
        condition: "await signJwtInstance.sign(...) is called without a surrounding try-catch block"
        throws: "JOSENotSupported | JOSEAlgNotAllowed | JWKInvalid | TypeError"
        required_handling: >
          Caller SHOULD wrap SignJWT.sign() in a try-catch block. While less common than
          jwtVerify failures, sign() can throw on invalid key format (JWKInvalid) or
          unsupported algorithm (JOSENotSupported). In auth token generation paths,
          an unhandled exception prevents session creation.
        sources:
          - "https://github.com/panva/jose"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: importJWK
    import_path: "jose"
    description: "Imports a JSON Web Key (JWK) as a CryptoKey or KeyObject. Returns Promise<CryptoKey | KeyObject>."

    postconditions:
      # Evidence: seen in 2 primary firings across 1 repo in scan-jose-2026-04-02.json
      # Top affected: code100x/cms (⭐ 1446)
      - id: import-jwk-no-try-catch
        condition: "await importJWK(...) is called without a surrounding try-catch block"
        throws: "JWKInvalid | JOSENotSupported | TypeError"
        required_handling: >
          Caller MUST wrap importJWK() in a try-catch block. JWK keys received from external
          sources (JWKS endpoints, environment variables) can be malformed, use unsupported
          algorithms, or have invalid key material. JWKInvalid is thrown on any key validation
          failure. Unhandled exceptions crash the auth initialization path.
        sources:
          - "https://github.com/panva/jose"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium
