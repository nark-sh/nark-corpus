package: jose
semver: ">=4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0
description: "JWA, JWS, JWE, JWT, JWK, JWKS for Node.js, Browser, Cloudflare Workers, Deno, Bun, and other Web-interoperable runtimes"

functions:
  - name: jwtVerify
    import_path: "jose"
    description: "Verifies the JWT format (JWS Compact), verifies JWS signature, and validates JWT Claims Set. Returns Promise<JWTVerifyResult>."

    postconditions:
      # Evidence: seen in 5 primary firings across 5 repos in scan-jose-2026-04-02.json
      # Top affected: nextjs/saas-starter, cloudflare/moltworker, ethanniser/NextFaster
      - id: verify-no-try-catch
        condition: "await jwtVerify(...) is called without a surrounding try-catch block"
        throws: "JWTExpired | JWTClaimValidationFailed | JWSSignatureVerificationFailed | JWSInvalid | JWTInvalid | JOSEAlgNotAllowed | JWKSNoMatchingKey | JWKSTimeout"
        required_handling: >
          Caller MUST wrap jwtVerify() in a try-catch block. In production, JWT tokens expire
          (JWTExpired), can be tampered with (JWSSignatureVerificationFailed), or be structurally
          invalid (JWTInvalid/JWSInvalid). When using createRemoteJWKSet, network timeouts
          (JWKSTimeout) and key mismatches (JWKSNoMatchingKey) are also possible. Unhandled
          exceptions propagate as 500 errors instead of proper 401 Unauthorized responses.
        sources:
          - "https://github.com/panva/jose"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: SignJWT.sign
    import_path: "jose"
    description: "Builder pattern — new SignJWT(payload).setProtectedHeader(...).sign(key) — signs and returns a JWT string."

    postconditions:
      - id: sign-no-try-catch
        condition: "await signJwtInstance.sign(...) is called without a surrounding try-catch block"
        throws: "JOSENotSupported | JOSEAlgNotAllowed | JWKInvalid | TypeError"
        required_handling: >
          Caller SHOULD wrap SignJWT.sign() in a try-catch block. While less common than
          jwtVerify failures, sign() can throw on invalid key format (JWKInvalid) or
          unsupported algorithm (JOSENotSupported). In auth token generation paths,
          an unhandled exception prevents session creation.
        sources:
          - "https://github.com/panva/jose"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: importJWK
    import_path: "jose"
    description: "Imports a JSON Web Key (JWK) as a CryptoKey or KeyObject. Returns Promise<CryptoKey | KeyObject>."

    postconditions:
      # Evidence: seen in 2 primary firings across 1 repo in scan-jose-2026-04-02.json
      # Top affected: code100x/cms (⭐ 1446)
      - id: import-jwk-no-try-catch
        condition: "await importJWK(...) is called without a surrounding try-catch block"
        throws: "JWKInvalid | JOSENotSupported | TypeError"
        required_handling: >
          Caller MUST wrap importJWK() in a try-catch block. JWK keys received from external
          sources (JWKS endpoints, environment variables) can be malformed, use unsupported
          algorithms, or have invalid key material. JWKInvalid is thrown on any key validation
          failure. Unhandled exceptions crash the auth initialization path.
        sources:
          - "https://github.com/panva/jose"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: jwtDecrypt
    import_path: "jose"
    description: >
      Verifies a Compact JWE-formatted JWT, decrypts the ciphertext, and validates the
      JWT Claims Set. Used for encrypted JWTs (as opposed to jwtVerify which handles
      signed JWTs). Returns Promise<JWTDecryptResult>.

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/main/src/jwt/decrypt.ts
      # Evidence: https://github.com/panva/jose/blob/main/src/jwe/flattened/decrypt.ts
      # Evidence: https://github.com/panva/jose/blob/main/src/util/errors.ts
      # JWEDecryptionFailed thrown from decryptKeyManagement + verifyTag path
      # JWEInvalid thrown on structural validation (missing fields, bad format)
      # JWTExpired / JWTClaimValidationFailed from validateClaimsSet
      - id: jwt-decrypt-no-try-catch
        condition: "await jwtDecrypt(...) is called without a surrounding try-catch block"
        throws: "JWEDecryptionFailed | JWEInvalid | JWTExpired | JWTClaimValidationFailed | JWTInvalid | JOSEAlgNotAllowed | JOSENotSupported | JWKSNoMatchingKey | JWKSTimeout"
        required_handling: >
          Caller MUST wrap jwtDecrypt() in a try-catch block. JWEDecryptionFailed is thrown
          when the ciphertext cannot be decrypted (wrong key, tampered token). JWTExpired and
          JWTClaimValidationFailed follow from claim set validation. JOSEAlgNotAllowed is thrown
          when the token uses an algorithm not in the allowed list. When using createRemoteJWKSet,
          JWKSTimeout and JWKSNoMatchingKey are also possible. Unhandled exceptions propagate as
          500 errors instead of 401 Unauthorized responses in auth middleware.
        sources:
          - "https://github.com/panva/jose/blob/main/src/jwt/decrypt.ts"
          - "https://github.com/panva/jose/blob/main/src/jwe/flattened/decrypt.ts"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: compactDecrypt
    import_path: "jose"
    description: >
      Decrypts a Compact JWE (JSON Web Encryption). Used for raw JWE decryption without
      JWT claims validation. Returns Promise<CompactDecryptResult> containing plaintext bytes
      and protected header.

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/main/src/jwe/compact/decrypt.ts
      # Evidence: https://github.com/panva/jose/blob/main/src/jwe/flattened/decrypt.ts
      # JWEInvalid thrown on format validation (5-part check, type check)
      # JWEDecryptionFailed thrown on decryption failure (wrong key, tampered ciphertext)
      # JOSEAlgNotAllowed thrown when algorithm not in allowedAlgorithms
      - id: compact-decrypt-no-try-catch
        condition: "await compactDecrypt(...) is called without a surrounding try-catch block"
        throws: "JWEDecryptionFailed | JWEInvalid | JOSEAlgNotAllowed | JOSENotSupported"
        required_handling: >
          Caller MUST wrap compactDecrypt() in a try-catch block. JWEDecryptionFailed is thrown
          when decryption fails (wrong key, tampered Authentication Tag). JWEInvalid is thrown
          when the compact serialization is malformed (not 5 parts, wrong types). JOSEAlgNotAllowed
          is thrown when the 'alg' header uses an algorithm not in keyManagementAlgorithms option.
          In encrypted data pipelines, unhandled exceptions reveal that sensitive data is corrupted
          without allowing graceful recovery.
        sources:
          - "https://github.com/panva/jose/blob/main/src/jwe/compact/decrypt.ts"
          - "https://github.com/panva/jose/blob/main/src/jwe/flattened/decrypt.ts"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: EncryptJWT.encrypt
    import_path: "jose"
    description: >
      Builder pattern — new EncryptJWT(payload).setProtectedHeader({alg, enc}).encrypt(key) —
      encrypts and returns a Compact JWE formatted JWT string. Used for encrypted session tokens
      and encrypted data transport.

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/main/src/jwe/compact/encrypt.ts
      # Evidence: https://github.com/panva/jose/blob/main/src/util/errors.ts
      # JOSENotSupported thrown for unknown alg/enc values
      # JOSEAlgNotAllowed thrown when algorithm not in allowed list
      # TypeError thrown when key format is invalid
      - id: encrypt-jwt-no-try-catch
        condition: "await encryptJwtInstance.encrypt(...) is called without a surrounding try-catch block"
        throws: "JOSENotSupported | JOSEAlgNotAllowed | TypeError"
        required_handling: >
          Caller SHOULD wrap EncryptJWT.encrypt() in a try-catch block. JOSENotSupported is
          thrown when the 'alg' or 'enc' header parameter specifies an algorithm not supported
          by the runtime. JOSEAlgNotAllowed is thrown when keyManagementAlgorithms or
          contentEncryptionAlgorithms allowlists are configured and the algorithm is excluded.
          TypeError is thrown when the key is not a valid CryptoKey, KeyObject, JWK, or Uint8Array.
          In session token creation paths, an unhandled exception prevents login from completing.
        sources:
          - "https://github.com/panva/jose/blob/main/src/jwe/compact/encrypt.ts"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: importSPKI
    import_path: "jose"
    description: >
      Imports a PEM-encoded SPKI string as a CryptoKey. Used to load public keys from
      environment variables or configuration files for JWT verification or encryption.
      Returns Promise<CryptoKey>.

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/main/src/key/import.ts
      # TypeError thrown when input is not a PEM-formatted string beginning with -----BEGIN PUBLIC KEY-----
      - id: import-spki-no-try-catch
        condition: "await importSPKI(...) is called without a surrounding try-catch block"
        throws: "TypeError | JOSENotSupported"
        required_handling: >
          Caller MUST wrap importSPKI() in a try-catch block. TypeError is thrown when the spki
          argument is not a string or does not begin with '-----BEGIN PUBLIC KEY-----'. This is
          a common failure when public keys are loaded from environment variables that are
          missing, truncated, or contain Windows-style line endings that corrupt PEM structure.
          JOSENotSupported is thrown for key algorithms not supported by the runtime's Web
          Cryptography API. Key loading typically occurs at server startup — an unhandled
          exception crashes the service before it can serve any requests.
        sources:
          - "https://github.com/panva/jose/blob/main/src/key/import.ts"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: importPKCS8
    import_path: "jose"
    description: >
      Imports a PEM-encoded PKCS#8 string as a CryptoKey. Used to load private keys from
      environment variables or secrets managers for JWT signing or decryption.
      Returns Promise<CryptoKey>.

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/main/src/key/import.ts
      # TypeError thrown when input is not a PEM string beginning with -----BEGIN PRIVATE KEY-----
      - id: import-pkcs8-no-try-catch
        condition: "await importPKCS8(...) is called without a surrounding try-catch block"
        throws: "TypeError | JOSENotSupported"
        required_handling: >
          Caller MUST wrap importPKCS8() in a try-catch block. TypeError is thrown when the
          pkcs8 argument is not a string or does not begin with '-----BEGIN PRIVATE KEY-----'.
          Private key PEM strings loaded from environment variables or secrets managers are
          especially prone to truncation, escaping issues, or missing newlines that invalidate
          the PEM structure. JOSENotSupported is thrown for key algorithms unsupported by the
          runtime. Private key loading at startup — an unhandled exception leaves the service
          unable to sign any tokens.
        sources:
          - "https://github.com/panva/jose/blob/main/src/key/import.ts"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: importX509
    import_path: "jose"
    description: >
      Imports the SPKI public key from an X.509 certificate string as a CryptoKey.
      Used when verifying tokens signed by certificate-based issuers (e.g., Apple, Google OAuth).
      Returns Promise<CryptoKey>.

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/main/src/key/import.ts
      # TypeError thrown when input does not begin with -----BEGIN CERTIFICATE-----
      - id: import-x509-no-try-catch
        condition: "await importX509(...) is called without a surrounding try-catch block"
        throws: "TypeError | JOSENotSupported"
        required_handling: >
          Caller SHOULD wrap importX509() in a try-catch block. TypeError is thrown when the
          x509 argument is not a string or does not begin with '-----BEGIN CERTIFICATE-----'.
          X.509 certificates fetched from Apple/Google JWKS or stored as environment variables
          can be malformed or have incorrect PEM encoding. JOSENotSupported is thrown when the
          certificate uses an algorithm unsupported by the platform's Web Crypto API.
        sources:
          - "https://github.com/panva/jose/blob/main/src/key/import.ts"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: generateKeyPair
    import_path: "jose"
    description: >
      Generates an asymmetric key pair (private + public) for a given JWA algorithm
      identifier. Used in key rotation flows and test setup. Returns
      Promise<{privateKey, publicKey}>.

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/main/src/key/generate_key_pair.ts
      # JOSENotSupported thrown for invalid modulusLength, unsupported curve, or unknown alg
      - id: generate-key-pair-no-try-catch
        condition: "await generateKeyPair(...) is called without a surrounding try-catch block"
        throws: "JOSENotSupported"
        required_handling: >
          Caller SHOULD wrap generateKeyPair() in a try-catch block. JOSENotSupported is thrown
          when the algorithm identifier is unknown, the modulusLength option is less than 2048
          bits (security requirement), or the crv option specifies an unsupported elliptic curve.
          In key rotation scripts and initialization code, an unhandled JOSENotSupported exception
          leaves the service without a new key pair and unable to sign new tokens.
        sources:
          - "https://github.com/panva/jose/blob/main/src/key/generate_key_pair.ts"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: compactVerify
    import_path: "jose"
    description: >
      Verifies the signature and format of a Compact JWS (JSON Web Signature) and decodes it.
      Lower-level alternative to jwtVerify — does not validate JWT claims, only the signature.
      Returns Promise<CompactVerifyResult>.

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/main/src/jws/compact/verify.ts
      # Evidence: https://github.com/panva/jose/blob/main/src/util/errors.ts
      # JWSSignatureVerificationFailed thrown when signature does not match
      # JWSInvalid thrown on format validation (3-part check, type check)
      # JOSEAlgNotAllowed thrown when algorithm not in allowed set
      - id: compact-verify-no-try-catch
        condition: "await compactVerify(...) is called without a surrounding try-catch block"
        throws: "JWSSignatureVerificationFailed | JWSInvalid | JOSEAlgNotAllowed | JOSENotSupported | JWKSNoMatchingKey | JWKSTimeout"
        required_handling: >
          Caller MUST wrap compactVerify() in a try-catch block. JWSSignatureVerificationFailed
          is thrown when the signature does not match (tampered token, wrong key). JWSInvalid
          is thrown when the compact serialization is malformed (not 3 parts). JOSEAlgNotAllowed
          is thrown when the token's 'alg' is not in the algorithms allowlist. When using
          createRemoteJWKSet, JWKSTimeout and JWKSNoMatchingKey are also possible.
          Unhandled exceptions propagate as 500 errors instead of 401 Unauthorized responses.
        sources:
          - "https://github.com/panva/jose/blob/main/src/jws/compact/verify.ts"
          - "https://github.com/panva/jose/blob/main/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: createRemoteJWKSet.reload
    import_path: "jose"
    description: >
      The reload() method on the object returned by createRemoteJWKSet(). Force-refreshes
      the in-memory JWKS cache by re-fetching the JSON Web Key Set from the remote URL.
      Called directly by application code in OIDC / Auth0 / Cognito / Vercel-OIDC integrations
      when keys are rotated or when the cooldownDuration has elapsed and the caller wants
      to invalidate the cache eagerly. Returns Promise<void>. Source verified at
      node_modules/jose/dist/webapi/jwks/remote.js lines 124-143 (jose@6.2.3).

    postconditions:
      # Evidence: https://github.com/panva/jose/blob/v6.2.3/src/jwks/remote.ts
      # Evidence: https://github.com/panva/jose/blob/v6.2.3/src/util/errors.ts
      # reload() awaits fetchJwks() which throws JWKSTimeout on AbortSignal timeout
      # and JOSEError on non-200 response or unparseable JSON. Any underlying network
      # error (DNS resolution failure, TLS handshake failure, connection reset) also
      # propagates through .catch() as a generic Error.
      - id: remote-jwks-reload-no-try-catch
        condition: "await jwks.reload() is called without a surrounding try-catch block (where jwks is the result of createRemoteJWKSet())"
        throws: "JWKSTimeout | JOSEError | TypeError | Error"
        required_handling: >
          Caller MUST wrap createRemoteJWKSet().reload() in a try-catch block. JWKSTimeout
          is thrown when the JWKS endpoint does not respond within timeoutDuration
          (default 5000ms) — a common failure when the OIDC provider's JWKS endpoint is
          slow or temporarily unreachable. A generic JOSEError is thrown when the JWKS
          endpoint returns a non-200 status code (e.g. 403, 502, 503) or when the response
          body is not valid JSON. Network-layer errors (DNS, TLS, connection reset) are
          re-thrown unwrapped. reload() is typically called from a background task or
          a key-rotation webhook handler — an unhandled exception leaves the JWKS cache
          stale, causing all subsequent jwtVerify() calls to fail with JWKSNoMatchingKey
          once keys actually rotate, locking every user out of the application.
        sources:
          - "https://github.com/panva/jose/blob/v6.2.3/src/jwks/remote.ts"
          - "https://github.com/panva/jose/blob/v6.2.3/src/util/errors.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high
