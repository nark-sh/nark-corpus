#              image.read* methods omitted as internal callbacks used only in custom imageConverter options)
# Contracted before: 2 (convertToHtml, extractRawText)
# Contracted after: 4 (+2 this pass: convertToMarkdown, embedStyleMap)
# Omitted: 1 (readEmbeddedStyleMap — read-only, returns null when absent, same file/zip error profile as others)
# Coverage: 4/5 = 0.80
# Evidence sources confirmed from:
