package: "mammoth"
semver: ">=1.11.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed

functions:
  - name: convertToHtml
    import_path: "mammoth"
    description: "Converts a .docx file to HTML"

    postconditions:
      # Evidence: 0 violations across 16 repos in scan-mammoth-2026-04-03.json
      # FP check: 0/100 false positives — contract is precise, 0% FP rate
      - id: file-read-error
        condition: "File path does not exist, cannot be read, or input options are invalid"
        throws: "Error (ENOENT, EACCES, or 'Could not find file in options')"
        required_handling: "Caller MUST wrap convertToHtml() in try-catch to handle file-not-found and permission errors."
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/unzip.js

      - id: corrupt-docx-error
        condition: "Buffer contains invalid or corrupt docx/zip data"
        throws: "Error (zip parsing error)"
        required_handling: "Caller MUST wrap convertToHtml() in try-catch to handle corrupt or invalid docx files."
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md

  - name: extractRawText
    import_path: "mammoth"
    description: "Extracts raw text from a .docx file"

    postconditions:
      # Evidence: 0 violations across 16 repos in scan-mammoth-2026-04-03.json
      # FP check: 0/100 false positives — contract is precise, 0% FP rate
      - id: file-read-error
        condition: "File path does not exist, cannot be read, or input options are invalid"
        throws: "Error (ENOENT, EACCES, or 'Could not find file in options')"
        required_handling: "Caller MUST wrap extractRawText() in try-catch to handle file-not-found and permission errors."
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/unzip.js

      - id: corrupt-docx-error
        condition: "Buffer contains invalid or corrupt docx/zip data"
        throws: "Error (zip parsing error)"
        required_handling: "Caller MUST wrap extractRawText() in try-catch to handle corrupt or invalid docx files."
        severity: error
        business_impact:
          incident_label: DOWNTIME
