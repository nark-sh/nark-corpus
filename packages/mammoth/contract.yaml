#   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/index.d.ts — TypeScript declarations
#   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/unzip.js — error throw sites
