  - name: convertToMarkdown
    import_path: "mammoth"
    description: >
      Converts a .docx file to Markdown. Deprecated — the official README states:
      "Markdown support is deprecated. Generating HTML and using a separate library
      to convert the HTML to Markdown is recommended, and is likely to produce better results."
      Behaves identically to convertToHtml except value contains Markdown instead of HTML.

    postconditions:
      # Evidence:
      #   https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md — deprecation note
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/index.js — line 28: calls convert()
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/unzip.js — ENOENT/EACCES throw sites
      #   Confirmed: same error profile as convertToHtml (both delegate to internal convert())
      - id: converttomarkdown-file-read-error
        condition: "File path does not exist, cannot be read, or input options are missing"
        throws: "Error (ENOENT, EACCES, or 'Could not find file in options')"
        required_handling: >
          Caller MUST wrap convertToMarkdown() in try-catch. Error propagates from unzip.js
          when the file path does not exist (ENOENT), cannot be accessed (EACCES), or when
          no valid input type is provided. Without handling, a missing upload causes an
          unhandled promise rejection that crashes the processing pipeline.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/unzip.js

      - id: converttomarkdown-corrupt-docx-error
        condition: "Buffer contains invalid or corrupt docx/zip data"
        throws: "Error (zip parsing error from JSZip.loadAsync)"
        required_handling: >
          Caller MUST wrap convertToMarkdown() in try-catch. Corrupt .docx files are common
          when processing user-uploaded documents. JSZip.loadAsync() rejects when the input
          is not a valid ZIP file (all .docx are ZIP archives). The error propagates up through
          unzip.openZip() without transformation.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/zipfile.js

      - id: converttomarkdown-deprecated-use
        condition: >
          convertToMarkdown is called in new code (not legacy maintenance) instead of
          converting to HTML first and using a dedicated HTML-to-Markdown library
        returns: >
          Markdown output in result.value, but the implementation is not maintained.
          The official recommendation is to call convertToHtml() and pipe through
          a dedicated library (e.g. turndown) for better results.
        required_handling: >
          SHOULD migrate to convertToHtml() + turndown pattern. The Mammoth maintainer
          has explicitly deprecated this function. New code should not use it. Existing
          callers should migrate to avoid quality regressions as the Markdown support
          is no longer improved.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md

  - name: embedStyleMap
    import_path: "mammoth"
    description: >
      Given an existing .docx file, generates a new .docx with the passed style map embedded.
      When the new .docx is later processed by Mammoth, it will use the embedded style map
      automatically without needing to pass it as an option. Returns a promise resolving to
      an object with toArrayBuffer() and toBuffer() methods.

    postconditions:
      # Evidence:
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/index.js — lines 89-107
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/unzip.js — file read errors
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/docx/style-map.js — write errors
      #   https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
      - id: embedstylemap-file-read-error
        condition: "Input file path does not exist, is unreadable, or input options are missing"
        throws: "Error (ENOENT, EACCES, or 'Could not find file in options')"
        required_handling: >
          Caller MUST wrap embedStyleMap() in try-catch. The function opens the .docx via
          unzip.openZip(), which throws when the file path is missing or the buffer is invalid.
          Document transformation pipelines that pre-process uploaded .docx files for style
          consistency must handle missing-file scenarios.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/unzip.js

      - id: embedstylemap-corrupt-docx-error
        condition: "Input buffer contains invalid or corrupt docx/zip data"
        throws: "Error (zip parsing error from JSZip.loadAsync)"
        required_handling: >
          Caller MUST wrap embedStyleMap() in try-catch. The function reads the .docx ZIP
          structure to inject the style map. A corrupt archive causes JSZip to reject.
          This is critical in document pre-processing pipelines that modify uploaded docs
          before storage — corrupted inputs must be caught and rejected early.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/zipfile.js

      - id: embedstylemap-result-not-saved
        condition: >
          embedStyleMap() resolves successfully but the caller does not call toBuffer()
          or toArrayBuffer() to persist the modified document, OR does not write the
          returned buffer to storage (file system or object store)
        returns: >
          Promise resolves to {toArrayBuffer(), toBuffer()} — if the result is not
          written to storage, the embedded style map is silently lost. The original
          file is NOT modified in place — a new document must be explicitly saved.
        required_handling: >
          Caller MUST call docx.toBuffer() or docx.toArrayBuffer() on the resolved value
          AND write it to persistent storage. The function does not overwrite the original
          file. If the result is not persisted, the style map embedding is silently lost
          and future conversions will use the original document without the embedded map.
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/index.js

  - name: readAsArrayBuffer
    import_path: "mammoth"
    description: >
      Image.readAsArrayBuffer() — async method on the Image element passed into a custom
      imageConverter callback (created via mammoth.images.imgElement(func)). Reads the
      embedded image file from the underlying .docx zip as an ArrayBuffer. Returns a
      Promise<ArrayBuffer>. Called inside the user's imgElement(func) callback when
      processing each image element in the document.

    postconditions:
      # Evidence:
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/documents.js:174-176
      #     readAsArrayBuffer: function() { return options.readImage(); }
      #     - delegates to options.readImage (bound to docxFile.read.bind(docxFile, path))
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/zipfile.js:14-25
      #     read(name, encoding) → zipFile.file(name).async("uint8array")
      #     - if zipFile.file(name) returns null (image missing from zip), .async() throws
      #       TypeError: Cannot read properties of null (reading 'async')
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/docx/body-reader.js:640-646
      #     findEmbeddedImageFile resolves the zip path from the relationship target;
      #     malformed/missing relationships yield invalid paths that hit the null-file branch above
      #   README documents this as the recommended way to access image bytes:
      #     /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/README.md:493-494
      - id: readasarraybuffer-image-missing-from-zip
        condition: >
          The embedded image referenced in the .docx relationships is missing from the
          underlying zip archive (corrupt or hand-edited .docx where the image part was
          deleted but the relationship/reference remained), OR the relationship resolves
          to an invalid zip path. JSZip's zipFile.file(name) returns null and the
          subsequent .async("uint8array") access throws TypeError.
        throws: "TypeError (Cannot read properties of null (reading 'async')) from JSZip"
        required_handling: >
          Caller MUST wrap image.readAsArrayBuffer() in try-catch inside the imageConverter
          callback (or attach .catch() to the returned Promise). Without handling, the
          rejected Promise propagates up through the imgElement wrapper and surfaces as a
          conversion-level rejection that crashes the entire convertToHtml/convertToMarkdown
          call — one missing image breaks the whole document conversion.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/zipfile.js
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/documents.js

  - name: readAsBase64String
    import_path: "mammoth"
    description: >
      Image.readAsBase64String() — async method on the Image element passed into a custom
      imageConverter callback. Reads the embedded image as a base64-encoded string.
      Returns a Promise<string>. This is the method used by the default mammoth.images.dataUri
      converter, so it is exercised on every document containing images when no custom
      converter is supplied.

    postconditions:
      # Evidence:
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/documents.js:177-179
      #     readAsBase64String: function() { return options.readImage("base64"); }
      #     - delegates to docxFile.read(path, "base64")
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/zipfile.js:14-25
      #     read(name, "base64") → zipFile.file(name).async("uint8array").then(base64js.fromByteArray)
      #     - same null-file branch as readAsArrayBuffer (TypeError on missing image)
      #     - additional surface: base64js.fromByteArray throws on malformed input (very rare;
      #       the input is always a valid Uint8Array from JSZip when the file exists)
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/images.js:25-31
      #     dataUri = imgElement(element => element.readAsBase64String().then(...))
      #     - default converter calls readAsBase64String for every image; an uncaught
      #       rejection here halts the whole document conversion
      #   README documents this as the canonical pattern:
      #     /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/README.md:500-501, 515-521
      - id: readasbase64string-image-missing-from-zip
        condition: >
          The embedded image referenced in the .docx relationships is missing from the
          underlying zip archive, OR the relationship resolves to an invalid zip path.
          JSZip's zipFile.file(name) returns null and the subsequent .async() access throws.
          This is the common failure mode for hand-edited or partially-corrupted .docx files
          and propagates through the default dataUri converter.
        throws: "TypeError (Cannot read properties of null (reading 'async')) from JSZip"
        required_handling: >
          Caller MUST wrap image.readAsBase64String() in try-catch inside the imageConverter
          callback, or attach .catch() to the returned Promise. Custom imgElement callbacks
          that use readAsBase64String to build data-URI src attributes must handle the
          rejection — without handling, one corrupt image embed crashes the entire
          convertToHtml/convertToMarkdown pipeline and the user sees a 500/unhandled
          rejection instead of a partial document with a warning.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/zipfile.js
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/documents.js
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/images.js

  - name: readAsBuffer
    import_path: "mammoth"
    description: >
      Image.readAsBuffer() — async method on the Image element passed into a custom
      imageConverter callback. Reads the embedded image as a Node.js Buffer.
      Returns a Promise<Buffer>. Two failure modes: (1) the same image-missing-from-zip
      branch as the other readAs* methods, and (2) calling this method in a browser
      environment without a Buffer polyfill, where Buffer.from is undefined.

    postconditions:
      # Evidence:
      #   /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/lib/documents.js:180-184
      #     readAsBuffer: function() {
      #         return options.readImage().then(function(arrayBuffer) {
      #             return Buffer.from(arrayBuffer);
      #         });
      #     }
      #     - same readImage() path as readAsArrayBuffer (null-file TypeError surface)
      #     - additional surface: Buffer.from is unavailable in browsers without polyfill
      #       (ReferenceError: Buffer is not defined)
      #   README explicitly documents the browser limitation:
      #     /private/tmp/claude/bc-deepen/mammoth/node_modules/mammoth/README.md:496-498
      #     "This is not supported in browsers unless a `Buffer` polyfill has been used."
      - id: readasbuffer-image-missing-from-zip
        condition: >
          The embedded image referenced in the .docx relationships is missing from the
          underlying zip archive, OR the relationship path is invalid. JSZip's
          zipFile.file(name) returns null and the .async() access throws TypeError
          before Buffer.from is reached.
        throws: "TypeError (Cannot read properties of null (reading 'async')) from JSZip"
        required_handling: >
          Caller MUST wrap image.readAsBuffer() in try-catch inside the imageConverter
          callback, or attach .catch() to the returned Promise. An uncaught rejection
          propagates through the imgElement wrapper and crashes the whole document
          conversion.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/zipfile.js
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/documents.js

      - id: readasbuffer-browser-no-buffer-polyfill
        condition: >
          image.readAsBuffer() is called from browser code without a Buffer polyfill
          (e.g. mammoth bundled into a frontend app without webpack/vite Buffer shim).
          The underlying options.readImage() resolves an ArrayBuffer, then Buffer.from
          throws ReferenceError because Buffer is not a global in browsers.
        throws: "ReferenceError (Buffer is not defined) — browsers without polyfill"
        required_handling: >
          Caller MUST either (a) avoid readAsBuffer() in browser code and use
          readAsArrayBuffer() or readAsBase64String() instead, OR (b) wrap the call
          in try-catch and supply a polyfilled fallback. The mammoth README explicitly
          warns "This is not supported in browsers unless a Buffer polyfill has been
          used." Custom imageConverters shipped in isomorphic libraries must guard
          this method or ship a polyfill.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - https://raw.githubusercontent.com/mwilliamson/mammoth.js/master/README.md
          - https://github.com/mwilliamson/mammoth.js/blob/master/lib/documents.js
