          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: data-sources-query-database-connection-unavailable
        maturity: stable
        condition: >
          dataSources.query() receives 503 service_unavailable specifically with the
          database_connection_unavailable error code (a sub-variant of 503 documented for
          data source queries during "backend datastore timeouts"). Notion documentation
          recommends narrowing filters and adding exponential backoff. SDK auto-retries
          503 for GET/DELETE but dataSources.query is POST — NOT auto-retried.
        throws: >
          APIResponseError with code ServiceUnavailable (HTTP 503), specifically
          database_connection_unavailable for query-time backend datastore timeouts.
        required_handling: >
          Caller MUST wrap notion.dataSources.query() in try-catch. POST is not auto-retried
          on 503 — explicit retry with exponential backoff and narrowed filter is required:
            try {
              const result = await notion.dataSources.query({ data_source_id, filter });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.ServiceUnavailable) {
                // Narrow filter and retry with backoff
                console.error('Data source query timed out — narrow filter and retry');
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/query-a-data-source"
          - "https://developers.notion.com/reference/errors"
        severity: warning
        business_impact:
