        maturity: stable
        condition: >
          dataSources.query() called when the integration lacks "read content" capabilities
          on the parent database, OR when the data source exists but has not been explicitly
          shared with the integration token via the Notion connection settings. For new
          v5 integrations that previously worked against a database in v1.x, the data
          source under the database may require separate sharing.
        throws: >
          APIResponseError with code RestrictedResource (APIErrorCode.RestrictedResource, HTTP 403).
        required_handling: >
          Caller MUST wrap notion.dataSources.query() in try-catch. A 403 on dataSources.query()
          typically indicates the integration needs to be re-shared at the data-source level —
          v5 connection sharing is finer-grained than v1's database-level sharing.
        sources:
          - "https://developers.notion.com/reference/query-a-data-source"
          - "https://developers.notion.com/reference/errors"
        severity: error
