      # Evidence: https://developers.notion.com/reference/update-a-block
      # SDK source: UpdateBlockParameters in Client.d.ts
      # Drift-mode deepen (pass 49, 2026-06-24): blocks.update was in detection list but had
      # no dedicated function entry. v5 API surface explicitly documents block update errors.
      - id: blocks-update-object-not-found
        maturity: stable
        condition: >
          blocks.update() called when block_id refers to a block that has been deleted,
          is in the trash, or the integration cannot access. Per Notion docs, blocks in trash
          return 404 on update — distinct from soft-deleted-but-readable pages. Background
          jobs that update blocks by cached IDs are vulnerable when users delete content.
        throws: >
          APIResponseError with code ObjectNotFound (APIErrorCode.ObjectNotFound, HTTP 404).
        required_handling: >
          Caller MUST wrap notion.blocks.update() in try-catch. In sync flows that update
          blocks by stored IDs, handle ObjectNotFound to avoid crashing on user-deleted content:
            try {
              await notion.blocks.update({ block_id, paragraph: { rich_text: [...] } });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.ObjectNotFound) {
                return null; // Block deleted or trashed — skip this update
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/update-a-block"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: blocks-update-not-retried-on-server-error
        maturity: stable
        condition: >
          blocks.update() (PATCH) receives 500 internal_server_error or 503 service_unavailable.
          PATCH is NOT auto-retried by the SDK — only GET and DELETE are retried on 500/503.
          The block update may be partially applied on the server before the error response,
          leaving the block in an inconsistent state from the application's perspective.
        throws: >
          APIResponseError with code InternalServerError (HTTP 500) or ServiceUnavailable (HTTP 503).
          Unlike GET/DELETE, these are NOT auto-retried for PATCH requests after the SDK's
          default maxRetries.
        required_handling: >
          Caller MUST wrap notion.blocks.update() in try-catch. On 500/503, re-read the block
          with blocks.retrieve() before retrying to detect whether the update was partially applied:
            try {
              await notion.blocks.update({ block_id, ...updates });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  (error.code === APIErrorCode.InternalServerError ||
                   error.code === APIErrorCode.ServiceUnavailable)) {
                const current = await notion.blocks.retrieve({ block_id });
                // Compare current to expected to detect partial apply
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/update-a-block"
          - "https://developers.notion.com/reference/errors"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: blocks-update-child-page-or-database
        maturity: stable
        condition: >
          blocks.update() called on a block whose type is "child_page" or "child_database".
          Per Notion documentation: "Child pages and databases cannot be updated via this
          endpoint; use the Update page or Update database endpoints instead." Callers that
          fetch a block list and update each block uniformly will hit this error on child
          page/db blocks.
        throws: >
          APIResponseError with code ValidationError (APIErrorCode.ValidationError, HTTP 400)
          with a message indicating the block type cannot be updated via this endpoint.
        required_handling: >
          Caller MUST wrap notion.blocks.update() in try-catch. When iterating block children
          for updates, branch on block type to route child_page → pages.update() and
          child_database → databases.update():
            try {
              if (block.type === 'child_page') {
                await notion.pages.update({ page_id: block.id, ...pageUpdates });
              } else if (block.type === 'child_database') {
                await notion.databases.update({ database_id: block.id, ...dbUpdates });
              } else {
                await notion.blocks.update({ block_id: block.id, ...blockUpdates });
              }
            } catch (error) {
              console.error('Block update failed:', error);
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/update-a-block"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low

  - name: update
    import_path: "@notionhq/client"
    namespace: "comments"
    description: >
      Updates an existing comment's body. v5 NEW endpoint. A connection can ONLY update
      comments it created — attempting to update another user's or connection's comment
      returns 404 (not 403, despite the permission-like nature of the restriction).
      Exactly one of rich_text or markdown must be provided. Makes an outbound HTTPS PATCH request.

    postconditions:
      # Evidence: https://developers.notion.com/reference/update-a-comment
      # SDK source: UpdateCommentParameters in Client.d.ts
      # Drift-mode deepen (pass 49, 2026-06-24): comments.update is v5 NEW.
      - id: comments-update-not-author
        maturity: stable
        condition: >
          comments.update() called on a comment that was NOT created by this integration's
          connection. Notion enforces author-only updates and returns 404 (object_not_found)
          rather than 403 (restricted_resource) — making the error indistinguishable from
          a genuinely missing comment. Multi-integration workflows that update comments
          posted by other connections will hit this.
        throws: >
          APIResponseError with code ObjectNotFound (APIErrorCode.ObjectNotFound, HTTP 404).
          Note: 404 is used even when the comment exists but was created by another connection —
          the API conflates "not found" with "not your comment" to avoid leaking existence.
        required_handling: >
          Caller MUST wrap notion.comments.update() in try-catch. Track which connection
          created each comment locally (e.g. in your DB) to avoid attempting updates on
          comments the integration cannot modify:
            try {
              await notion.comments.update({ comment_id, rich_text: [...] });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.ObjectNotFound) {
                console.error('Comment not found or not authored by this connection');
                return;
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/update-a-comment"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

      - id: comments-update-validation-error
        maturity: stable
        condition: >
          comments.update() called with invalid body: missing both rich_text and markdown,
          providing both simultaneously (exactly one is required), rich_text array exceeding
          100 items, or markdown containing unsupported block-level elements (only inline
          formatting is allowed in comments).
        throws: >
          APIResponseError with code ValidationError (APIErrorCode.ValidationError, HTTP 400).
        required_handling: >
          Caller MUST wrap notion.comments.update() in try-catch. Validate exactly-one-of
          rich_text/markdown and array sizes before calling.
        sources:
          - "https://developers.notion.com/reference/update-a-comment"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low

      - id: comments-update-missing-capabilities
        maturity: stable
        condition: >
          comments.update() called when the integration lacks "insert comment" capabilities
          (Notion uses the same capability for comment write operations including update).
          This is a capability flag in the integration settings — distinct from page/data-source
          read/write permissions.
        throws: >
          APIResponseError with code RestrictedResource (APIErrorCode.RestrictedResource, HTTP 403).
        required_handling: >
          Caller MUST wrap notion.comments.update() in try-catch. A 403 here means the
          integration was set up without comment-write capabilities — surface this clearly
          to the developer rather than treating it as a transient error.
        sources:
          - "https://developers.notion.com/reference/update-a-comment"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  - name: delete
    import_path: "@notionhq/client"
    namespace: "comments"
    description: >
      Deletes a comment permanently. v5 NEW endpoint. Like comments.update(), a connection
      can ONLY delete comments it created — attempting to delete another user's or connection's
      comment returns 404. Makes an outbound HTTPS DELETE request. DELETE is idempotent and
      auto-retried by the SDK on 500/503, but 404 is NOT retried.

    postconditions:
      # Evidence: https://developers.notion.com/reference/delete-a-comment
      # SDK source: DeleteCommentParameters in Client.d.ts
      # Drift-mode deepen (pass 49, 2026-06-24): comments.delete is v5 NEW.
      - id: comments-delete-not-author
        maturity: stable
        condition: >
          comments.delete() called on a comment that was NOT created by this integration's
          connection. Notion enforces author-only deletion. Returns 404 — indistinguishable
          from a genuinely missing comment. Cleanup workflows that retry deletions across
          comments from multiple authors will receive 404 on the comments they don't own.
        throws: >
          APIResponseError with code ObjectNotFound (APIErrorCode.ObjectNotFound, HTTP 404).
        required_handling: >
          Caller MUST wrap notion.comments.delete() in try-catch. In cleanup workflows,
          treat 404 as success (already-deleted or not-our-comment — both terminal states):
            try {
              await notion.comments.delete({ comment_id });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.ObjectNotFound) {
                return; // Already deleted or not our comment — treat as success
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/delete-a-comment"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

      - id: comments-delete-missing-capabilities
        maturity: stable
        condition: >
          comments.delete() called when the integration lacks "insert comment" capabilities
          (Notion's comment-write capability covers both create/update/delete). Read-only
          integrations cannot delete comments even ones they previously created during a
          prior capability-grant window.
        throws: >
          APIResponseError with code RestrictedResource (APIErrorCode.RestrictedResource, HTTP 403).
        required_handling: >
          Caller MUST wrap notion.comments.delete() in try-catch. A 403 on delete() typically
          indicates the integration's comment capability was revoked since the comment was
          created — log clearly for diagnostic purposes.
        sources:
          - "https://developers.notion.com/reference/delete-a-comment"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

notes:
  - "All Client methods make HTTPS calls to the Notion API — all require try-catch"
  - "SDK auto-retries: rate_limited (429) for all methods; 500/503 for GET/DELETE only"
  - "After maxRetries (default 2) exhausted, error is thrown to caller"
  - "Use isNotionClientError(error) for type-safe error handling"
  - "Use APIResponseError.isAPIResponseError(error) to narrow to API-specific errors"
  - "error.code is typed as APIErrorCode enum — use switch for exhaustive handling"
  - "object_not_found (404) is extremely common — databases/pages get deleted or unshared"
  - "pages.create / pages.update / blocks.children.append are PATCH/POST — NOT auto-retried on 500/503"
  - "iteratePaginatedAPI() and collectPaginatedAPI() helpers still throw on API errors"
  - "fileUploads is a 3-step flow: create() → send() → complete() — errors at any step require full restart"
  - "oauth.token() authorization codes are single-use and expire quickly — always catch errors in OAuth callback handlers"
  - "databases.update() PATCH is NOT auto-retried on 500/503 — schema may be partially applied on server error"
  - "v5 (2025-09-03) added the data sources API — dataSources.query is the new row-read path"
  - "comments.update/delete enforce author-only modification — returns 404 (not 403) on others' comments"
  - "pages.move() can target either page_id or data_source_id parent — both directions are valid in v5"
  - "blocks.update() rejects child_page/child_database blocks — route those to pages.update / databases.update"
