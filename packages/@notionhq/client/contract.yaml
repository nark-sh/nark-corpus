          cached data_source_id from earlier sessions.
        throws: >
          APIResponseError with code ObjectNotFound (APIErrorCode.ObjectNotFound, HTTP 404).
          SDK auto-retries rate_limited (429) but NOT object_not_found — error thrown immediately
          to the caller after the first POST attempt.
        required_handling: >
          Caller MUST wrap notion.dataSources.query() in try-catch. Handle ObjectNotFound
          to return empty results rather than crash when data sources are deleted/unshared:
            try {
              const result = await notion.dataSources.query({ data_source_id: id });
              return result.results;
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.ObjectNotFound) {
                return []; // Data source deleted or not shared with integration
              }
              throw error;
            }
