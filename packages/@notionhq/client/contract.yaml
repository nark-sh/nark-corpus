  - name: retrieve
    import_path: "@notionhq/client"
    namespace: "databases"
    description: >
      Retrieves a Notion database object including its schema (properties), title, and metadata.
      Used to inspect database structure before querying, or to validate that a database ID is
      valid and accessible. Makes an outbound HTTPS GET request. Auto-retried on 500/503.

    postconditions:
      # Evidence: https://developers.notion.com/reference/retrieve-a-database
      # SDK source: error hierarchy confirmed from errors.d.ts (APIResponseError, RequestTimeoutError)
      - id: databases-retrieve-object-not-found
        maturity: stable
        condition: >
          databases.retrieve() called when database_id refers to a database that has been
          deleted, trashed, or was never shared with the integration. Notion databases are
          frequently shared/unshared by workspace members — code that cached a database_id
          may encounter this error on subsequent calls.
        throws: >
          APIResponseError with code ObjectNotFound (APIErrorCode.ObjectNotFound, HTTP 404).
          SDK auto-retries rate_limited (429) but NOT object_not_found — this error is thrown
          immediately.
        required_handling: >
          Caller MUST wrap notion.databases.retrieve() in try-catch. Handle ObjectNotFound
          to avoid crashing when databases are deleted or unshared:
            try {
              const db = await notion.databases.retrieve({ database_id: id });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.ObjectNotFound) {
                return null; // Database deleted or not shared with integration
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/retrieve-a-database"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: databases-retrieve-restricted-resource
        maturity: stable
        condition: >
          databases.retrieve() called when the integration lacks read content capabilities,
          or when the database exists but has not been explicitly shared with the integration
          token. This is the most common error for new integrations.
        throws: >
          APIResponseError with code RestrictedResource (APIErrorCode.RestrictedResource, HTTP 403).
        required_handling: >
          Caller MUST wrap notion.databases.retrieve() in try-catch. A 403 on retrieve() is
          typically a setup error — the integration must be added to the database via the
          Notion UI. Log clearly to help developers diagnose.
        sources:
          - "https://developers.notion.com/reference/retrieve-a-database"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: create
    import_path: "@notionhq/client"
    namespace: "databases"
    description: >
      Creates a new Notion database as a child of a page or at the workspace level. The database
      includes a title, optional description, and property schema. Used in integrations that
      programmatically provision Notion workspaces. Makes an outbound HTTPS POST request.

    postconditions:
      # Evidence: https://developers.notion.com/reference/create-a-database
      # SDK source: errors.d.ts, Client.d.ts
      - id: databases-create-parent-not-found
        maturity: stable
        condition: >
          databases.create() called with a parent.page_id that does not exist or the
          integration does not have access to it. The database can only be created under
          pages the integration can access.
        throws: >
          APIResponseError with code ObjectNotFound (APIErrorCode.ObjectNotFound, HTTP 404).
        required_handling: >
          Caller MUST wrap notion.databases.create() in try-catch. Database provisioning
          workflows fail if the parent page is deleted or the integration lacks access:
            try {
              const db = await notion.databases.create({ parent: { page_id }, ... });
            } catch (error) {
              if (isNotionClientError(error)) {
                console.error('Failed to create Notion database:', error.code);
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/create-a-database"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: databases-create-missing-capabilities
        maturity: stable
        condition: >
          databases.create() called when the integration lacks "insert content" capabilities.
          This is a capability setting in the integration configuration, distinct from
          page-level permissions. Integration appears functional (auth works) but cannot create.
        throws: >
          APIResponseError with code RestrictedResource (APIErrorCode.RestrictedResource, HTTP 403).
        required_handling: >
          Caller MUST wrap notion.databases.create() in try-catch. Log clearly — a 403 on
          create() usually indicates a missing capability in the integration configuration,
          not a data error.
        sources:
          - "https://developers.notion.com/reference/create-a-database"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: databases-create-validation-error
        maturity: stable
        condition: >
          databases.create() called with malformed request body — invalid property type names,
          invalid parent specification, title/description arrays exceeding 100 items,
          or parent is not a page or wiki database.
        throws: >
          APIResponseError with code ValidationError (APIErrorCode.ValidationError, HTTP 400).
        required_handling: >
          Caller MUST wrap notion.databases.create() in try-catch. Validate property schema
          and parent type before calling to reduce 400 errors at runtime.
        sources:
          - "https://developers.notion.com/reference/create-a-database"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: update
    import_path: "@notionhq/client"
    namespace: "databases"
    description: >
      Updates a Notion database's title, description, or property schema. Used to rename
      properties, add new columns, archive properties, or update database metadata. Makes
      an outbound HTTPS PATCH request. NOT auto-retried on 500/503 (PATCH is not idempotent).

    postconditions:
      # Evidence: https://developers.notion.com/reference/update-a-database
      # SDK source: errors.d.ts, Client.d.ts
      - id: databases-update-schema-too-large
        maturity: stable
        condition: >
          databases.update() called on a database whose schema exceeds 50KB after the update
          is applied. The error message identifies the largest property by name, ID, and byte size.
          Databases with many properties or long property names hit this limit when adding new columns.
        throws: >
          APIResponseError with code ValidationError (APIErrorCode.ValidationError, HTTP 400)
          with a message identifying the oversized property.
        required_handling: >
          Caller MUST wrap notion.databases.update() in try-catch. Monitor schema size when
          programmatically adding properties. On ValidationError, read the error message to
          identify the largest property and consider archiving unused properties:
            try {
              await notion.databases.update({ database_id, properties: newProps });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.ValidationError) {
                console.error('Schema too large — reduce properties:', error.message);
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/update-a-database"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: databases-update-not-retried-on-server-error
        maturity: stable
        condition: >
          databases.update() (PATCH) receives 500 internal_server_error or 503 service_unavailable.
          PATCH is NOT idempotent so the SDK does NOT auto-retry it. The caller receives the
          error after a single attempt. The database schema update may be partially applied.
        throws: >
          APIResponseError with code InternalServerError (500) or ServiceUnavailable (503).
          Unlike GET/DELETE, these are NOT auto-retried for PATCH requests.
        required_handling: >
          Caller MUST wrap notion.databases.update() in try-catch. On 500/503 errors,
          re-read the database to determine if the update was applied before retrying:
            try {
              await notion.databases.update({ database_id, properties: updates });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error)) {
                // Re-read to check if partial update was applied
                const current = await notion.databases.retrieve({ database_id });
                // Compare current.properties to expected state
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/update-a-database"
          - "https://developers.notion.com/reference/errors"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: retrieve
    import_path: "@notionhq/client"
    namespace: "pages"
    description: >
      Retrieves a Notion page object including its properties, metadata, and archived/trashed
      state. The response includes an in_trash boolean — trashed pages return 200 with
      in_trash: true, not 404. Permanently deleted pages return 404.
      Makes an outbound HTTPS GET request. Auto-retried on 500/503.

    postconditions:
      # Evidence: https://developers.notion.com/reference/retrieve-a-page
      # SDK source: errors.d.ts, Client.d.ts
      - id: pages-retrieve-object-not-found
        maturity: stable
        condition: >
          pages.retrieve() called when page_id refers to a permanently deleted page or a page
          the integration cannot access. Note: trashed (soft-deleted) pages return 200 with
          in_trash: true — callers that don't check in_trash may process stale/archived content.
        throws: >
          APIResponseError with code ObjectNotFound (APIErrorCode.ObjectNotFound, HTTP 404)
          for permanently deleted pages or inaccessible pages.
        required_handling: >
          Caller MUST wrap notion.pages.retrieve() in try-catch. Also check page.in_trash
          in the response to detect soft-deleted pages:
            try {
              const page = await notion.pages.retrieve({ page_id: id });
              if (page.object === 'page' && 'in_trash' in page && page.in_trash) {
                return null; // Page is trashed
              }
              return page;
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.ObjectNotFound) {
                return null; // Page permanently deleted or inaccessible
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/retrieve-a-page"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: pages-retrieve-missing-capabilities
        maturity: stable
        condition: >
          pages.retrieve() called when the integration lacks read content capabilities,
          or when the page exists but was not shared with the integration token.
        throws: >
          APIResponseError with code RestrictedResource (APIErrorCode.RestrictedResource, HTTP 403).
        required_handling: >
          Caller MUST wrap notion.pages.retrieve() in try-catch.
        sources:
          - "https://developers.notion.com/reference/retrieve-a-page"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: create
    import_path: "@notionhq/client"
    namespace: "comments"
    description: >
      Creates a new comment on a Notion page, block, or existing discussion thread.
      Requires the "insert comment" capability on the integration. Each comment must contain
      exactly one of rich_text or markdown, and one of parent or discussion_id.
      Makes an outbound HTTPS POST request.

    postconditions:
      # Evidence: https://developers.notion.com/reference/create-a-comment
      # SDK source: errors.d.ts, Client.d.ts
      - id: comments-create-missing-capabilities
        maturity: stable
        condition: >
          comments.create() called when the integration lacks "insert comment" capabilities.
          This is a capability flag in the integration settings, not a page-level permission.
          Callers receive 403 even when the integration has full read/write content access.
        throws: >
          APIResponseError with code RestrictedResource (APIErrorCode.RestrictedResource, HTTP 403).
          Distinct from a page permission 403 — this means the integration was not granted
          comment capabilities during setup.
        required_handling: >
          Caller MUST wrap notion.comments.create() in try-catch. A 403 on comments.create()
          typically indicates a missing "insert comment" capability in the integration settings,
          not a page access error:
            try {
              await notion.comments.create({ parent: { page_id }, rich_text: [...] });
            } catch (error) {
              if (APIResponseError.isAPIResponseError(error) &&
                  error.code === APIErrorCode.RestrictedResource) {
                console.error('Integration lacks insert comment capability');
              }
              throw error;
            }
        sources:
          - "https://developers.notion.com/reference/create-a-comment"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low

      - id: comments-create-parent-not-found
        maturity: stable
        condition: >
          comments.create() called when the referenced parent page, block, or discussion_id
          no longer exists or is not accessible to the integration. Async workflows that post
          comments after a delay are vulnerable to this race condition.
        throws: >
          APIResponseError with code ObjectNotFound (APIErrorCode.ObjectNotFound, HTTP 404).
        required_handling: >
          Caller MUST wrap notion.comments.create() in try-catch. In async/queued workflows,
          check that the parent page still exists before posting the comment.
        sources:
          - "https://developers.notion.com/reference/create-a-comment"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low

      - id: comments-create-validation-error
        maturity: stable
        condition: >
          comments.create() called with invalid body: missing both rich_text and markdown,
          providing both simultaneously, rich_text array exceeds 100 items, attachments
          array exceeds 3 items, or markdown contains unsupported block-level elements.
        throws: >
          APIResponseError with code ValidationError (APIErrorCode.ValidationError, HTTP 400).
        required_handling: >
          Caller MUST wrap notion.comments.create() in try-catch. Validate that exactly one
          of rich_text/markdown is provided and that array sizes are within limits.
        sources:
          - "https://developers.notion.com/reference/create-a-comment"
          - "https://developers.notion.com/reference/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: create
    import_path: "@notionhq/client"
    namespace: "fileUploads"
    description: >
      Initiates a file upload to Notion. For files ≤20MB use single-part mode; for larger files
      use multi-part mode with number_of_parts. Returns a file upload object with an id that
      MUST be used for subsequent fileUploads.send() and fileUploads.complete() calls.
      The upload is NOT attached to any page/block until explicitly referenced in a block.
      Makes an outbound HTTPS POST request.

    postconditions:
      # Evidence: https://developers.notion.com/reference/create-a-file-upload
      # SDK source: errors.d.ts, Client.d.ts (SendFileUploadParameters, CompleteFileUploadParameters)
      - id: file-uploads-create-id-not-used
