      paginated results filtered by property conditions and ordered by sort criteria.
      Makes an outbound HTTPS POST request. All errors are thrown.

    postconditions:
      # Evidence: https://developers.notion.com/reference/query-a-data-source
      # SDK source: errors.d.ts, Client.d.ts (queryDataSource in api-endpoints)
      # Drift-mode deepen (pass 49, 2026-06-24): dataSources.query is v5 NEW, did not exist
