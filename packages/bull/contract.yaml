  - name: Queue.whenCurrentJobsFinished
    import_path: "bull"
    description: >
      Returns a promise that resolves when all currently active jobs have finished
      processing. Forces the blocking Redis client to reconnect to abort pending
      BRPOPLPUSH calls, then waits for all in-flight job promises to settle. Used in
      graceful shutdown sequences before calling Queue.close(). Critical for preventing
      job truncation during process shutdown.
    postconditions:
      # Evidence: bull/lib/queue.js Queue.prototype.whenCurrentJobsFinished + close() interaction
      # Confirmed: close() without whenCurrentJobsFinished() abandons active jobs → stall on restart
      - id: when-current-jobs-not-awaited-before-close
        maturity: stable
        condition: "Queue.close() called without first awaiting Queue.whenCurrentJobsFinished()"
        severity: error
        description: >
          Calling Queue.close() without first awaiting Queue.whenCurrentJobsFinished()
          cuts off active jobs mid-execution. The worker's processing promises are
          abandoned and the jobs end up in a stalled state on the next queue startup,
          triggering Bull's stalled job recovery mechanism which re-queues them for
          duplicate processing. The correct shutdown sequence is:
          await queue.whenCurrentJobsFinished(); await queue.close();
        required_handling: >
          Caller MUST await queue.whenCurrentJobsFinished() before calling queue.close()
          in shutdown handlers:
          process.on('SIGTERM', async () => { await queue.whenCurrentJobsFinished(); await queue.close(); process.exit(0); });
        sources:
          - "https://github.com/OptimalBits/bull/blob/master/lib/queue.js"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

