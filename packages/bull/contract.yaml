        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      # Evidence: lib/worker.js line 28 — utils.isRedisReady(this.client) can reject
      # Connection errors propagate (only CLIENT-unknown errors are caught)
      - id: get-workers-no-try-catch
        maturity: stable
        condition: "await queue.getWorkers() called without try-catch and Redis is unreachable"
        throws: "Error (ioredis connection error from isRedisReady or CLIENT LIST)"
        required_handling: >
          Wrap await queue.getWorkers() in try-catch when called from monitoring
          endpoints or admin UIs. Connection failures should not crash the request:

            app.get('/admin/workers', async (req, res) => {
              try {
                const workers = (await queue.getWorkers()) ?? [];
                res.json({ workers });
              } catch (err) {
                logger.error('getWorkers failed', err);
                res.status(503).json({ error: 'Redis unavailable' });
