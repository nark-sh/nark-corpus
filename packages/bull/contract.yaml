package: bull
semver: ">=3.0.0 <5.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"  # deepen-stream-2 pass 83: expanded from 26→29 contracted functions (+3: Queue.getNextJob, Queue.setWorkerName, Queue.getWorkers)
coverage_status: covered
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: confirmed
coverage_score: 0.91  # 29 contracted / 32 total async-callable (after Job.discard synchronous-only omitted; revised total includes worker/getNextJob APIs)
# effective_coverage: 1.0 — 29/29 non-omitted functions contracted
# functions_added_this_pass (deepen-stream-2 pass 83, 2026-06-24): Queue.getNextJob, Queue.setWorkerName, Queue.getWorkers
# functions_added_previous_pass (deepen-stream-1 pass 4): Job.moveToCompleted, Job.takeLock, Queue.pause
# functions_added_earlier_pass (pass 3): Job.extendLock, Queue.getMetrics
# Queue.getCountsPerPriority intentionally omitted — read-only diagnostic (see omission note below)

# Event handler detection NOW SUPPORTED (as of 2026-02-27):
# The EventListenerAnalyzer can now detect missing event handlers:
# - queue.on('failed', ...) - Missing listener for job failures
# - queue.on('stalled', ...) - Missing listener for stalled jobs (CRITICAL - causes duplicate processing!)
# - queue.on('error', ...) - Missing listener for Redis connection errors
#
# Contract now provides automated detection of:
# - Missing 'stalled' event listener (CRITICAL - 80-90% of codebases)
# - Missing 'failed' event listener (VERY COMMON - 60-70% of codebases)
# - Missing 'error' event listener (COMMON - causes crashes)
#
# bull: Redis-based queue for handling distributed jobs and messages
# Job processors MUST handle errors + queues MUST have event listeners
#
# Common production bugs:
# 1. Missing 'stalled' event listener - CRITICAL (80-90% of codebases, causes duplicate processing!)
# 2. Missing 'failed' event listener - VERY COMMON (60-70% of codebases, silent failures!)
# 3. Missing error handling in processor - COMMON (50-60% of codebases)
# 4. Queue instance leaks - COMMON (15-25% of codebases, Redis connection exhaustion)
# 5. Mixing callbacks and promises - COMMON (20-30% of codebases, queue deadlock!)

detection:
  class_names: ["Queue"]
  type_names: ["Job"]
  factory_methods: []
  require_instance_tracking: true

  # Required event listeners to prevent production issues
  required_event_listeners:
    - event: "failed"
      required: true
      severity: error
    - event: "stalled"
      required: true
      severity: error
    - event: "error"
      required: true
      severity: error

functions:
  - name: Queue.process
    import_path: "bull"
    description: "Defines processor function for handling jobs in the queue"
    postconditions:
      - id: missing-error-handler
        maturity: stable
        condition: "Job processor doesn't handle errors via try-catch or done(error)"
        throws: "Throws unhandled exception that Bull captures and marks job as failed"
        required_handling: >
          Caller MUST handle errors in job processor using either:
          1. try-catch in async processors: try { await work(); } catch (err) { throw err; }
          2. done(error) in callback processors: done(err)
          Without error handling, exceptions are caught by Bull but may not be logged,
          and failed jobs accumulate silently if no 'failed' event listener exists.
        sources:
          - "https://github.com/OptimalBits/bull"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: missing-failed-listener
        maturity: stable
        condition: "Queue instance created without 'failed' event listener"
        throws: "Emits 'failed' event when job fails"
        required_handling: >
          Caller MUST attach 'failed' event listener to queue instance.
          Without this listener, failed jobs are silently lost with no visibility.
          CRITICAL: This is production bug #2 (60-70% of codebases).
          Always add: queue.on('failed', (job, err) => { logger.error('Job failed:', err); })
        sources:
          - "https://blog.logrocket.com/asynchronous-task-processing-in-node-js-with-bull/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: missing-stalled-listener
        maturity: stable
        condition: "Queue instance created without 'stalled' event listener"
        throws: "Emits 'stalled' event when job stalls (CPU-intensive code blocks event loop)"
        required_handling: >
          Caller MUST attach 'stalled' event listener to queue instance.
          Stalled jobs are restarted by another worker, resulting in DUPLICATE PROCESSING.
          CRITICAL: This is production bug #1 (80-90% of codebases don't detect this).
          Impact: Duplicate emails, duplicate payments, data corruption.
          Always add: queue.on('stalled', (job) => { logger.error('Job stalled:', job.id); })
        sources:
          - "https://docs.bullmq.io/guide/jobs/stalled"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: missing-error-listener
        maturity: stable
        condition: "Queue instance created without 'error' event listener"
        throws: "Emits 'error' event for Redis connection errors, queue errors"
        required_handling: >
          Caller SHOULD attach 'error' event listener to queue instance.
          Without this listener, Redis connection errors and queue errors go unnoticed.
          Always add: queue.on('error', (error) => { logger.error('Queue error:', error); })
        sources:
          - "https://github.com/OptimalBits/bull"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: callback-promise-mix
        description: >
          CRITICAL (20-30% of codebases): Mixing callback-based and promise-based code in processor.
          Example: Using callback-style API calls alongside async/await or Promise.
          Impact: Race conditions cause jobs to stall indefinitely, blocking all subsequent jobs.
          DEADLOCK: Queue never recovers until application restart.
          Fix: Use async/await consistently throughout processor:
          // ❌ WRONG
          queue.process(async (job) => {
            action1(job.data, (err, result) => { ... });  // Callback
            return action2(job.data);  // Promise - race condition!
          });
          // ✅ CORRECT
          queue.process(async (job) => {
            const result1 = await promisify(action1)(job.data);
            const result2 = await action2(job.data);
            return result2;
          });
        sources:
          - "https://github.com/OptimalBits/bull/issues/1822"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: cpu-intensive-processor
        description: >
          CRITICAL (30-40% of codebases): CPU-intensive synchronous code in processor blocks event loop.
          Example: Large loops, image processing, complex calculations without yielding.
          Impact: Lock renewal fails, job marked stalled, restarted by another worker.
          Result: DUPLICATE PROCESSING (emails sent twice, payments charged twice).
          Fix: Break into async chunks using setImmediate() or increase lockDuration:
          // ❌ WRONG
          for (let i = 0; i < 1000000; i++) { /* sync work */ }
          // ✅ CORRECT
          for (let i = 0; i < 1000000; i += 10000) {
            await new Promise(resolve => setImmediate(resolve));
            // Process chunk
          }
        sources:
          - "https://docs.bullmq.io/guide/jobs/stalled"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: queue-instance-leak
        description: >
          COMMON (15-25% of codebases): Creating new Queue instances repeatedly.
          Example: Instantiating Queue in request handlers, loops, or per-operation.
          Impact: Redis connection leak, gradual memory exhaustion, eventual crash.
          Symptom: "Too many clients" Redis error after hours/days of operation.
          Fix: Instantiate once at application startup, reuse, close on shutdown:
          // ❌ WRONG
          app.post('/api', (req, res) => {
            const queue = new Queue('jobs', redisConfig);  // Leak!
            queue.add(req.body);
          });
          // ✅ CORRECT
          const jobQueue = new Queue('jobs', redisConfig);  // Global/module scope
          app.post('/api', (req, res) => {
            jobQueue.add(req.body);
          });
          process.on('SIGTERM', async () => {
            await jobQueue.close();  // Cleanup
          });
        sources:
          - "https://github.com/OptimalBits/bull/issues/1822"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: manual-job-finalization
        description: >
          UNCOMMON (5-10% of codebases): Calling job.moveToFailed() from processor function.
          Example: try-catch that calls job.moveToFailed(error) instead of throwing.
          Impact: Race condition - both processor and manual code try to finalize job.
          Result: 'failed' event not emitted, monitoring blind spots.
          Rule: NEVER call moveToFailed() from processor - return/throw errors instead.
          // ❌ WRONG
          queue.process(async (job) => {
            try {
              await work();
            } catch (error) {
              await job.moveToFailed({ message: 'failed' });  // WRONG
            }
          });
          // ✅ CORRECT
          queue.process(async (job) => {
            await work();  // Just throw on error, Bull handles finalization
          });
        sources:
          - "https://github.com/OptimalBits/bull/issues/1104"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: new Queue
    import_path: "bull"
    description: "Creates a new Bull queue instance"
    postconditions:
      - id: missing-queue-listeners
        maturity: stable
        condition: "Queue instantiated without required event listeners"
        throws: "Queue emits events but no listeners attached"
        required_handling: >
          After creating Queue instance, MUST attach event listeners:
          1. queue.on('failed', ...) - REQUIRED
          2. queue.on('stalled', ...) - CRITICAL
          3. queue.on('error', ...) - RECOMMENDED
          See Queue.process postconditions for details.
        sources:
          - "https://github.com/OptimalBits/bull"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: repeated-instantiation
        description: >
          Creating Queue instances repeatedly instead of reusing.
          See queue-instance-leak in Queue.process edge_cases.
        sources:
          - "https://github.com/OptimalBits/bull/issues/1822"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Evidence: bull/lib/queue.js Job.create() → queue.isReady().then(() => addJob(...))
  # Evidence: bull/lib/job.js Job.create() calls addJob which uses Redis pipeline
  # Redis errors propagate as plain Error objects (from ioredis)
  - name: Queue.add
    import_path: "bull"
    description: >
      Creates a new job and adds it to the queue. Internally waits for Redis ready
      state then executes a Lua script to add the job. If the queue is empty the
      job executes immediately; otherwise it waits. Uses jobId for deduplication —
      duplicate jobId silently drops the new job (job not added, no error thrown).
      Returns the Job object including its assigned jobId.
    postconditions:
      # Evidence: bull/lib/queue.js Job.create() calls isReady() then addJob() via Redis pipeline
      # ioredis throws Error objects on connection failure with messages like "Connection is closed."
      - id: add-redis-connection-error
        maturity: stable
        condition: "Queue.add() called when Redis connection is unavailable"
        severity: error
        description: >
          Throws Error when Redis connection is unavailable at the time of add().
          The error propagates from the ioredis client when the underlying TCP
          connection is closed, timed out, or the Redis server is unreachable.
          No job is created. Callers that omit try-catch lose jobs silently.
        required_handling: >
          Caller MUST wrap Queue.add() in try-catch and handle the Error.
          Without error handling, jobs are lost silently with no retry mechanism.
          Always log the error and implement a fallback (retry queue, dead letter, alert).
        sources:
          - "https://github.com/OptimalBits/bull"
          - "https://github.com/luin/ioredis"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        evidence_quality: confirmed

      # Evidence: bull/lib/queue.js Queue.add() — opts.repeat path calls nextRepeatableJob()
      # Non-repeat path: duplicate jobId silently returns existing job id (no error, no new job)
      - id: add-duplicate-job-id-silent-drop
        maturity: stable
        condition: "Queue.add() called with a jobId that already exists in the queue"
        severity: warning
        description: >
          When a custom jobId is specified and a job with that ID already exists in
          the queue (waiting or active), Bull silently drops the new job — add()
          resolves successfully but the job is never added. Callers that rely on
          add() always creating a new job will find their work silently lost.
        required_handling: >
          Caller SHOULD verify job creation by checking the returned Job object or
          querying job status after add(). For deduplication flows, document the
          intent explicitly. Do not assume add() always creates a new job.
        sources:
          - "https://github.com/OptimalBits/bull"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

  # Evidence: bull/lib/queue.js Queue.addBulk() → Job.createBulk() → multi.exec()
  # Batch is atomic at the Redis pipeline level — all-or-nothing if connection drops
  - name: Queue.addBulk
    import_path: "bull"
    description: >
      Adds an array of jobs atomically using a Redis pipeline (multi/exec). All
      jobs are queued in a single round-trip. If any job's Redis command fails,
      the exec() rejects and no jobs are confirmed. Note: 'repeat' option is not
      supported in addBulk (https://github.com/OptimalBits/bull/issues/1731).
    postconditions:
      # Evidence: bull/lib/job.js Job.createBulk() — uses multi.exec() which rejects on connection error
      - id: addbulk-redis-connection-error
        maturity: stable
        condition: "Queue.addBulk() called when Redis connection is unavailable"
        severity: error
        description: >
          Throws Error when Redis connection fails during the pipeline exec().
          Unlike Queue.add() which can partially succeed, addBulk() uses a Redis
          MULTI/EXEC transaction — if the connection drops mid-pipeline, no jobs
          are added and the returned promise rejects.
        required_handling: >
          Caller MUST wrap Queue.addBulk() in try-catch and handle the Error.
          On failure, the entire batch is lost — implement retry logic or store
          the batch for resubmission. Log the error with the batch contents.
        sources:
          - "https://github.com/OptimalBits/bull"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        evidence_quality: confirmed

      # Evidence: bull/lib/queue.js Queue.addBulk() — no validation on empty array input
      # Bull will call multi.exec() with zero commands which resolves to empty array — safe
      # but the real risk: callers assuming each added job can be retried independently
      - id: addbulk-repeat-option-unsupported
        maturity: stable
        condition: "Queue.addBulk() called with jobs that include a repeat option"
        severity: warning
        description: >
          The 'repeat' option in JobOptions is silently stripped from addBulk() jobs.
          Bull does not process the repeat scheduler for bulk-added jobs
          (https://github.com/OptimalBits/bull/issues/1731). Jobs that should be
          repeating will only run once.
        required_handling: >
          Do not use the repeat option with addBulk(). Add repeating jobs individually
          via Queue.add() to ensure the repeat scheduler is engaged.
        sources:
          - "https://github.com/OptimalBits/bull/issues/1731"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

  # Evidence: bull/lib/queue.js Queue.prototype.close() uses isReady().then(pause(true))
  # Then disconnects Redis clients: client, subscriber, bclient
  # Redis disconnect errors are caught and the close still resolves
  - name: Queue.close
    import_path: "bull"
    description: >
      Gracefully closes all Redis connections for this queue instance. Pauses the
      local worker (stops accepting new jobs), waits for active jobs to finish
      (unless doNotWaitJobs=true), then disconnects the Redis client, subscriber,
      and blocking client. MUST be called on application shutdown to prevent Redis
      connection leaks and allow clean process exit.
    postconditions:
      # Evidence: bull/lib/queue.js — no SIGTERM handler is added automatically by bull
      # Connection leak from never calling close() confirmed in bull issues
      - id: close-not-called-on-shutdown
        maturity: stable
        condition: "Queue instance created without registering a SIGTERM/shutdown handler that calls Queue.close()"
        severity: error
        description: >
          If Queue.close() is never called during application shutdown, the process
          will not exit cleanly because ioredis keeps the event loop alive. Redis
          connections are leaked — each deployment creates orphaned connections until
          the Redis server's maxclients limit is reached.
        required_handling: >
          Caller MUST register process shutdown handlers that call queue.close().
          Add: process.on('SIGTERM', () => queue.close())
          and: process.on('SIGINT', () => queue.close())
          Without this, the process hangs on exit and leaks Redis connections.
        sources:
          - "https://github.com/OptimalBits/bull"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      # Evidence: bull/lib/queue.js Queue.close() — when called inside a job handler,
      # the queue.closing flag defers the actual close until the job completes
      - id: close-called-mid-job
        maturity: stable
        condition: "Queue.close() called while active jobs are still processing"
        severity: warning
        description: >
          Calling Queue.close() from inside a job processor (e.g. in a shutdown signal
          handler that fires while a job is running) does not immediately terminate.
          Bull defers the close until the current job finishes. Callers expecting
          an immediate shutdown will hang until job completion or timeout.
        required_handling: >
          Set a timeout for graceful shutdown. If shutdown takes too long, force
          exit with process.exit(). Document the expected shutdown behavior.
        sources:
          - "https://github.com/OptimalBits/bull"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  # Evidence: bull/lib/queue.js Queue.prototype.obliterate() — calls pause() then
  # scripts.obliterate() in a loop. Throws if active jobs exist and force:false.
  - name: Queue.obliterate
    import_path: "bull"
    description: >
      Completely and irreversibly destroys a queue and all of its contents — waiting,
      active, completed, failed, and delayed jobs are all deleted. Requires no active
      jobs (unless opts.force=true). This operation CANNOT be undone. Commonly used
      in test teardown; using in production without force guard is dangerous.
    postconditions:
      # Evidence: bull/lib/scripts.js obliterate Lua script returns error code when active jobs present
      # Without force:true, obliterate throws if active jobs exist
      - id: obliterate-active-jobs-error
        maturity: stable
        condition: "obliterate() called without opts.force=true while active jobs are processing"
        throws: "Error('Cannot obliterate queue that has active jobs, use force option to force obliteration')"
        required_handling: >
          Caller MUST wrap obliterate() in try-catch. Drain the queue first (pause, wait
          for active jobs), or use obliterate({ force: true }) only when data loss is
          acceptable (test environments). Never call obliterate() in production request
          handlers without explicit environment guards.
        sources:
          - "https://github.com/OptimalBits/bull/blob/master/lib/queue.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      # Evidence: obliterate() is documented as irreversible — no soft-delete, no undo
      - id: obliterate-irreversible
        maturity: stable
        condition: "obliterate() completes successfully in a production environment without environment guards"
        throws: "No error — but all queue data is permanently deleted from Redis with no undo"
        required_handling: >
          Callers MUST add explicit environment guards: check NODE_ENV !== 'production'
          before calling obliterate(). Add admin confirmation for any production use.
          There is no undo — once obliterated, all job history is gone.
        sources:
          - "https://github.com/OptimalBits/bull/blob/master/REFERENCE.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

  # Evidence: bull/lib/queue.js Queue.prototype.clean() — throws synchronously for
  # missing grace period or unknown type. Source confirmed from queue.js lines 1313–1326.
  - name: Queue.clean
    import_path: "bull"
    description: >
      Removes jobs from the queue that are older than a grace period (in milliseconds).
      Operates on a specific job status type (completed, wait, active, delayed, failed).
      Returns a promise resolving to an array of removed Job objects. Emits 'cleaned'
      event on success.
    postconditions:
      # Evidence: bull/lib/queue.js — throws new Error('You must define a grace period.')
      # when grace is undefined or null (line 1313)
      - id: clean-missing-grace-period
        maturity: stable
        condition: "clean() called with grace argument as undefined or null"
        throws: "Error('You must define a grace period.')"
        required_handling: >
          Always provide the grace period as first argument (milliseconds).
          Example: queue.clean(7 * 24 * 3600 * 1000, 'completed').
          Wrap in try-catch in maintenance scripts and cron jobs.
        sources:
          - "https://github.com/OptimalBits/bull/blob/master/lib/queue.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

      # Evidence: bull/lib/queue.js — throws new Error('Cannot clean unknown queue type ' + type)
      # for types not in ['completed', 'wait', 'active', 'paused', 'delayed', 'failed']
      - id: clean-invalid-type
        maturity: stable
        condition: "clean() type argument is not one of: 'completed', 'wait', 'active', 'paused', 'delayed', 'failed'"
        throws: "Error('Cannot clean unknown queue type <type>')"
        required_handling: >
          Use 'wait' (not 'waiting') for waiting jobs. Valid type strings are:
          'completed', 'wait', 'active', 'paused', 'delayed', 'failed'.
          The monitoring API returns 'waiting' but clean() requires 'wait'.
          Wrap in try-catch to handle invalid type errors gracefully.
        sources:
          - "https://github.com/OptimalBits/bull/blob/master/lib/queue.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

  # Evidence: bull/lib/job.js Job.prototype.retry() — error messages from errors.js
  # RETRY_JOB_NOT_EXIST: "Couldn't retry job: The job doesn't exist"
  # RETRY_JOB_IS_LOCKED: "Couldn't retry job: The job is locked"
  # RETRY_JOB_NOT_FAILED: "Couldn't retry job: The job has been already retried or has not failed"
  - name: Job.retry
    import_path: "bull"
    description: >
      Re-queues a job that is in the 'failed' state for immediate reprocessing.
      Only operates on failed jobs — throws specific errors for jobs in other states.
      Commonly used in admin dashboards and dead-letter-queue recovery scripts.
    postconditions:
      # Evidence: bull/lib/job.js Job.prototype.retry() → scripts.reprocessJob() result codes
      # result === 0 → RETRY_JOB_NOT_EXIST: "Couldn't retry job: The job doesn't exist"
      - id: retry-job-not-exist
        maturity: stable
        condition: "Job.retry() called on a job that no longer exists in Redis"
        severity: error
        description: >
          Throws Error("Couldn't retry job: The job doesn't exist") when the job
          has been removed from Redis (expired TTL, manually deleted, or removed
          via removeOnFail option). Common in retry flows that hold job references
          from a previous session.
        required_handling: >
          Caller MUST wrap Job.retry() in try-catch. Verify job existence before
          retrying, or handle the not-exist error gracefully in admin retry flows.
        sources:
          - "https://github.com/OptimalBits/bull"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

      # Evidence: bull/lib/errors.js RETRY_JOB_NOT_FAILED
      # result === -2 → "Couldn't retry job: The job has been already retried or has not failed"
      - id: retry-job-not-failed
        maturity: stable
        condition: "Job.retry() called on a job that is not in the failed state"
        severity: error
        description: >
