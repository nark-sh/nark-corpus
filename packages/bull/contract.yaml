        condition: "whenCurrentJobsFinished() not called in SIGTERM/SIGINT handler"
        severity: warning
        description: >
          When a Node.js process receives SIGTERM (e.g., Kubernetes pod eviction, Heroku dyno
          cycling), the default behavior exits immediately. Without a SIGTERM handler that
          calls whenCurrentJobsFinished(), all active jobs are abandoned and will stall.
          Bull's stall detection re-queues them on next restart, causing duplicate
          processing of any jobs that were mid-execution when the process was killed.
        required_handling: >
          Register shutdown handlers that call whenCurrentJobsFinished() before exit:
          process.once('SIGTERM', async () => { await queue.whenCurrentJobsFinished(); await queue.close(); process.exit(0); });
        sources:
          - "https://github.com/OptimalBits/bull/blob/master/lib/queue.js"
        business_impact:
