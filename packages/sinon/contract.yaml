# Depth pass 2026-06-23 (deepen-stream-3 pass 10):
# Re-enumerated API surface against sinon@22.0.0 (released 2026-05-05). Top-level
# surface confirmed via src/create-sinon-api.js (extends Sandbox prototype):
#   API methods exported at sinon.* level:
#     createSandbox, match, restoreObject*, expectation, timers, createStubInstance,
#     addBehavior, promise
#   Plus sandbox-extended methods exposed at sinon.* via extend(sandbox, apiMethods):
#     spy, stub, mock, useFakeTimers, fake, replace, replace.usingAccessor,
#     define*, replaceGetter, replaceSetter, reset, resetBehavior, resetHistory,
#     verify*, verifyAndRestore*, restore, restoreContext, inject
# +4 functions this pass: define, verify, verifyAndRestore, restoreObject
# Coverage: 12 contracted / 15 total = 0.80 (was 8/11 = 0.73)
# Effective coverage (contracted / non-utility / non-omitted): 12/12 = 1.0
# Intentionally omitted (3):
#   - promise (testing utility — only throws on resolve/reject twice)
#   - replaceGetter / replaceSetter (narrow accessor variants, same throw shape as replace)
#
# Depth pass 2026-04-20 (deepen-stream-2 pass 3):
# +2 functions: fake, replace (sandbox.replace with 4 postconditions)
# API surface at that time: 11 callable-with-error-contract functions total
#   Previously contracted (6): stub, spy, mock, useFakeTimers, createSandbox, createStubInstance
#   New (2): fake (2 postconditions), replace (4 postconditions)
#   Intentionally omitted (3): promise, replaceGetter, replaceSetter
# Coverage: 8 contracted / 11 total = 0.73
#
# Scan: scan-sinon-2026-04-03.json — 4 repos scanned, 0 violations found
# sinon is a testing library; most violations (improper restore patterns) occur in
# test files not analyzed by the scanner. 0/20 FP repos, evidence_quality: confirmed.

functions:
  - name: stub
    import_path: "sinon"
    description: "Creates a test stub that can replace functions and track calls"
    postconditions:
      - id: stub-must-restore
        condition: "sinon.stub(obj, 'method') is called"
        throws: "TypeError: Attempted to wrap [method] which is already wrapped"
        required_handling: >
          MUST call stub.restore() in afterEach or finally block to clean up stubs.
          Failure to restore causes "already wrapped" errors in subsequent tests.
          Best practice: Use sandboxes with sandbox.restore() in afterEach.
          Pattern: const sandbox = sinon.createSandbox(); afterEach(() => sandbox.restore());
        sources:
          - "https://github.com/sinonjs/sinon/issues/1673"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: stub-non-existent-property
        condition: "sinon.stub is called on non-existent or non-function property"
        throws: "TypeError: Attempted to wrap undefined property [name]"
        required_handling: >
          MUST verify property exists and is a function before stubbing.
          Pattern: if (typeof obj.method === 'function') { sinon.stub(obj, 'method'); }
        sources:
          - "https://github.com/sinonjs/sinon/issues/1762"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: stub-returns-arg-invalid-index
        condition: "stub.returnsArg(index) is called with index >= argument count"
        throws: "TypeError: index unavailable"
        required_handling: >
          MUST ensure argument index exists before calling stub.returnsArg(index).
          Note: Prior to v6.1.2 returns undefined; v6.1.2+ throws TypeError.
        sources:
          - "https://sinonjs.org/releases/latest/stubs/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: stub-calls-arg-not-function
        condition: "stub.callsArg(index) is called with non-function argument"
        throws: "TypeError: index missing or not a function"
        required_handling: >
          MUST verify argument at index is a function before calling stub.callsArg(index).
        sources:
          - "https://sinonjs.org/releases/latest/stubs/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: stub-yields-no-callback
        condition: "stub.yields() is called but stub was never called with a function argument"
        throws: "Error: stub was never called with a function argument"
        required_handling: >
          MUST ensure stub is called with at least one function argument before using yields().
        sources:
          - "https://sinonjs.org/releases/latest/stubs/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: spy
    import_path: "sinon"
    description: "Creates a spy that wraps a function and tracks calls"
    postconditions:
      - id: spy-first-call-null-access
        condition: "spy.firstCall is accessed when spy was never called"
        throws: "TypeError: Cannot read property 'args' of null"
        required_handling: >
          MUST check spy.called before accessing spy.firstCall, spy.lastCall, or spy.getCall(n).
          Best practice: Use spy.calledWith(arg) instead of direct call access.
          Pattern: if (spy.called) { spy.firstCall.args }
        sources:
          - "https://github.com/sinonjs/sinon/issues/1936"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: spy-must-restore
        condition: "sinon.spy(obj, 'method') is called"
        throws: "TypeError: Attempted to wrap [method] which is already wrapped"
        required_handling: >
          MUST call spy.restore() in afterEach or finally block.
          Use sandboxes for automatic cleanup: sandbox.spy(obj, 'method'); afterEach(() => sandbox.restore());
        sources:
          - "https://github.com/sinonjs/sinon/issues/1775"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: mock
    import_path: "sinon"
    description: "Creates a mock object with pre-programmed expectations"
    postconditions:
      - id: mock-verify-not-called
        condition: "mock.expects() is called but mock.verify() is never called"
        throws: "Silent failure - expectations not enforced"
        required_handling: >
          MUST call mock.verify() or sandbox.verifyAndRestore() to enforce expectations.
          Without verification, tests pass even when expectations are not met.
          Pattern: afterEach(() => { mock.verify(); }) or sandbox.verifyAndRestore()
        sources:
          - "https://sinonjs.org/releases/latest/mocks/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mock-verify-fails
        condition: "mock.verify() is called and expectations are not met"
        throws: "ExpectationError"
        required_handling: >
          This is expected behavior when expectations fail.
          Ensure expectations match actual usage.
        sources:
          - "https://sinonjs.org/releases/latest/mocks/"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: useFakeTimers
    import_path: "sinon"
    description: "Replaces global timer functions with fake implementations"
    postconditions:
      - id: fake-timers-must-restore
        condition: "sinon.useFakeTimers() is called"
        throws: "Test hangs, setTimeout/setInterval never fire in subsequent tests"
        required_handling: >
          MUST call clock.restore() in afterEach or finally block.
          Failure to restore causes timer pollution and test hangs.
          Pattern: let clock; beforeEach(() => clock = sinon.useFakeTimers()); afterEach(() => clock.restore());
        sources:
          - "https://sinonjs.org/releases/latest/fake-timers/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: createSandbox
    import_path: "sinon"
    description: "Creates a sandbox for managing test doubles with automatic cleanup"
    postconditions:
      - id: sandbox-must-restore
        condition: "sinon.createSandbox() is called"
        throws: "Test pollution, 'already wrapped' errors in subsequent tests"
        required_handling: >
          MUST call sandbox.restore() in afterEach or finally block.
          Sandboxes simplify cleanup but still require explicit restoration.
          Pattern: const sandbox = sinon.createSandbox(); afterEach(() => sandbox.restore());
        sources:
          - "https://sinonjs.org/releases/latest/sandbox/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: createStubInstance
    import_path: "sinon"
    description: "Creates a stub instance without invoking constructor"
    postconditions:
      - id: create-stub-instance-double-use
        condition: "sinon.createStubInstance is called twice on same constructor without cleanup"
        throws: "TypeError: Attempted to wrap [method] which is already wrapped"
        required_handling: >
          MUST restore or use different sandbox between createStubInstance calls.
          Pattern: Use sandbox.createStubInstance() and restore sandbox between uses.
        sources:
          - "https://github.com/sinonjs/sinon/issues/852"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: fake
    import_path: "sinon"
    description: >
      Creates a fake that records all calls, arguments, and return values. The modern
      sinon API (since v5) for creating test doubles. When called with a function argument,
      wraps that function and records interactions. When called with no arguments, creates
      a blank fake. Sub-methods (fake.returns, fake.throws, fake.resolves, fake.rejects,
      fake.yields, fake.yieldsAsync) are factories that create fakes with preset behaviors.
    postconditions:
      # Evidence: sinon/lib/sinon/fake.js line 30-32 (source inspection sinon@21.1.2):
      #   if (arguments.length > 0 && typeof f !== "function") {
      #     throw new TypeError("Expected f argument to be a Function");
      # Documentation: https://sinonjs.org/releases/latest/fakes/
      - id: fake-non-function-arg-throws
        condition: >
          sinon.fake(value) is called where value is not a function (e.g. a string,
          number, plain object, or undefined passed explicitly as first argument).
          sinon.fake() with zero arguments is valid; sinon.fake(someString) throws.
        throws: "TypeError: Expected f argument to be a Function"
        required_handling: >
          MUST pass either no argument (blank fake) or a Function when calling sinon.fake().
          Sub-methods (fake.returns, fake.resolves, fake.rejects, etc.) accept non-function
          values and are the correct API when you want a preset return value.

            // Correct: blank fake
            const f = sinon.fake();

            // Correct: wrap an existing function
            const f2 = sinon.fake(myImpl);

            // Correct: preset return value via factory
            const f3 = sinon.fake.returns(42);

            // WRONG: passing a non-function
            const f4 = sinon.fake("not a function"); // TypeError!
        sources:
          - "https://sinonjs.org/releases/latest/fakes/"
          - "https://github.com/sinonjs/sinon/blob/main/lib/sinon/fake.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: sinon/lib/sinon/fake.js fake.yields/yieldsAsync:
      #   throw new TypeError("Expected last argument to be a function");
      # Both fake.yields() and fake.yieldsAsync() throw this when the fake is invoked
      # without a function as the last argument.
      - id: fake-yields-missing-callback
        condition: >
          A fake created with sinon.fake.yields(...values) or sinon.fake.yieldsAsync(...values)
          is invoked at call time without a function as its last argument. The TypeError is
          thrown when the fake is called, not when it is created.
        throws: "TypeError: Expected last argument to be a function"
        required_handling: >
          MUST ensure the last argument passed to a yields/yieldsAsync fake is a function.
          This is the callback convention: the fake expects to invoke its last argument.

            // Correct: caller always passes a callback last
            const fake = sinon.fake.yields("result");
            fake("arg1", (result) => console.log(result)); // ok

            // WRONG: no callback
            fake("arg1"); // TypeError at invocation time!
        sources:
          - "https://sinonjs.org/releases/latest/fakes/"
          - "https://github.com/sinonjs/sinon/blob/main/lib/sinon/fake.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: replace
    import_path: "sinon"
    description: >
      Sandbox method (sandbox.replace) that replaces a non-accessor property on an object
      with a replacement value. The replacement is tracked and restored when sandbox.restore()
      is called. Distinct from stub (which wraps functions) — replace works on any property type
      (values, functions, modules) as long as the type matches. Accessor properties (getters/setters)
      must use replaceGetter/replaceSetter instead.
    postconditions:
      # Evidence: sinon/lib/sinon/sandbox.js (source inspection sinon@21.1.2):
      #   checkForValidArguments: throw TypeError for undefined descriptor (non-existent)
      #   verifyNotReplaced: throw TypeError "Attempted to replace X which is already replaced"
      #   throwOnAccessors: throw Error "Use sandbox.replaceGetter for replacing getters"
      #   verifySameType: throw TypeError "Cannot replace <type> with <type>"
      # Documentation: https://sinonjs.org/releases/latest/sandbox/
      - id: replace-non-existent-property
        condition: >
          sandbox.replace(object, property, replacement) is called where `property` does
          not exist on `object` or its prototype chain. A common mistake when refactoring
          code that removes or renames properties while tests still reference old names.
        throws: "TypeError: Cannot replace non-existent property '<property>'. Perhaps you meant sandbox.define()?"
        required_handling: >
          MUST verify the property exists on the object before calling sandbox.replace().
          If the goal is to add a new property (not replace an existing one), use
          sandbox.define(object, property, value) instead.

            // Correct: property exists
            const obj = { method: () => 'original' };
            sandbox.replace(obj, 'method', sandbox.stub()); // ok

            // WRONG: property doesn't exist
            sandbox.replace(obj, 'nonExistent', sandbox.stub()); // TypeError!
        sources:
          - "https://sinonjs.org/releases/latest/sandbox/"
          - "https://github.com/sinonjs/sinon/blob/main/lib/sinon/sandbox.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: replace-already-replaced-throws
        condition: >
          sandbox.replace(object, property, replacement) is called on a property that
          has already been replaced via sandbox.replace() in the same sandbox without
          an intervening sandbox.restore(). Happens when the same setup code is called
          twice, or two beforeEach hooks both replace the same property.
        throws: "TypeError: Attempted to replace '<property>' which is already replaced"
        required_handling: >
          MUST call sandbox.restore() between replace calls on the same property.
          Use a single sandbox per test scope and restore in afterEach.

            // Correct: one replace per sandbox lifecycle
            beforeEach(() => {
              sandbox.replace(obj, 'method', replacement);
            });
            afterEach(() => {
              sandbox.restore(); // clears the replacement
            });

            // WRONG: replacing twice without restore
            sandbox.replace(obj, 'method', stub1); // ok
            sandbox.replace(obj, 'method', stub2); // TypeError: already replaced!
        sources:
          - "https://sinonjs.org/releases/latest/sandbox/"
          - "https://github.com/sinonjs/sinon/blob/main/lib/sinon/sandbox.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: replace-accessor-property-throws
        condition: >
          sandbox.replace(object, property, replacement) is called on a property that
          is defined as a getter or setter (accessor property). sandbox.replace() only
          works on value properties (data descriptors). Attempting to replace a getter
          or setter throws an Error directing to use replaceGetter/replaceSetter.
        throws: "Error: Use sandbox.replaceGetter for replacing getters"
        required_handling: >
          Use sandbox.replaceGetter() for getter properties, sandbox.replaceSetter() for
          setter properties, or sandbox.replace.usingAccessor() when you need to replace
          the underlying value of an accessor property.

            // Correct: use replaceGetter for getters
            sandbox.replaceGetter(obj, 'computedProp', () => 'test-value');

            // WRONG: using replace() on a getter
            // if 'computedProp' is a getter:
            sandbox.replace(obj, 'computedProp', 'test-value'); // Error!
        sources:
          - "https://sinonjs.org/releases/latest/sandbox/"
          - "https://github.com/sinonjs/sinon/blob/main/lib/sinon/sandbox.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: replace-type-mismatch-throws
        condition: >
          sandbox.replace(object, property, replacement) is called where the replacement
          is a different JavaScript type than the original property value. For example,
          replacing a function property with a plain object, or replacing a string
          property with a number. sinon enforces type consistency to prevent accidental
          misuse.
        throws: "TypeError: Cannot replace <originalType> with <replacementType>"
        required_handling: >
          MUST pass a replacement of the same type as the original property.
          When replacing a function, use a stub/spy/fake (which are functions).
          When replacing a primitive, use the same primitive type.

            const obj = { value: 'original-string' };

            // Correct: same type
            sandbox.replace(obj, 'value', 'replacement-string'); // ok

            // WRONG: different type
            sandbox.replace(obj, 'value', 42); // TypeError: Cannot replace string with number!
        sources:
          - "https://sinonjs.org/releases/latest/sandbox/"
          - "https://github.com/sinonjs/sinon/blob/main/lib/sinon/sandbox.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: define
    import_path: "sinon"
    description: >
      Sandbox method (sandbox.define) that ADDS a new property to an object that does
      NOT already exist. The defined property is tracked and removed when sandbox.restore()
      is called. Complement to sandbox.replace (which mutates an existing property).
      Mistakes are common: callers reach for define() when they meant replace() (or vice
      versa) — sinon enforces the distinction with TypeError throws to surface the
      confusion immediately.
    postconditions:
      # Evidence: sinon@22.0.0 src/sinon/sandbox.js lines 403-432 (verified 2026-06-23):
      #   if (typeof property === "undefined") {
      #     throw new TypeError("Cannot define the already existing property ${property}. Perhaps you meant sandbox.replace()?");
      #   }
      #   if (descriptor && descriptor.isOwn) {
      #     throw new TypeError("Cannot define the already existing property ${property}. Perhaps you meant sandbox.replace()?");
      #   }
      # Documentation: https://sinonjs.org/releases/latest/sandbox/#sandboxdefineobject-property-value
      - id: define-existing-property-throws
        condition: >
          sandbox.define(object, property, value) is called where `property` already exists
          as an own property on `object`. Common mistake when test setup code reuses the
          same property name across tests, or when refactoring stub() → define() without
          checking whether the property pre-exists. Also fires when `property` is undefined
          (e.g. sandbox.define(obj, obj.missingKey, val) where missingKey resolves to undefined).
        throws: "TypeError: Cannot define the already existing property '<property>'. Perhaps you meant sandbox.replace()?"
        required_handling: >
          MUST use sandbox.replace() (or sandbox.stub() for functions) when the property
          already exists on the object. Use sandbox.define() only to add NEW properties
          that need to be tracked for cleanup.

            const obj = { existingMethod: () => 'original' };

            // Correct: define a NEW property (does not exist yet)
            sandbox.define(obj, 'newMethod', sandbox.stub().returns('test'));

            // Correct: replace an EXISTING property
            sandbox.replace(obj, 'existingMethod', sandbox.stub().returns('test'));

            // WRONG: define on an existing property
            sandbox.define(obj, 'existingMethod', sandbox.stub()); // TypeError!
        sources:
          - "https://sinonjs.org/releases/latest/sandbox/"
          - "https://github.com/sinonjs/sinon/blob/v22.0.0/src/sinon/sandbox.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: verify
    import_path: "sinon"
    description: >
      Sandbox method (sandbox.verify) that asserts every mock expectation registered in
      the sandbox has been satisfied. Walks the sandbox collection and invokes verify() on
      each mock, throwing ExpectationError on the first unmet expectation. Unlike
      sandbox.verifyAndRestore(), this does NOT call sandbox.restore() — the sandbox state
      remains. Test code commonly calls this in afterEach to confirm mock contracts;
      production code paths that defensively verify a mock-based mock-DI configuration
      may also invoke it.
    postconditions:
      # Evidence: sinon@22.0.0 src/sinon/sandbox.js sandbox.verify uses applyOnEach(collection, "verify")
      # which calls verify() on each mock; mock.verify() throws ExpectationError (mock-expectation.js)
      # when callCount is outside [minCalls, maxCalls] or when expected args / contexts don't match.
      # Documentation: https://sinonjs.org/releases/latest/mocks/#mockverify
      - id: verify-unmet-expectation-throws
        condition: >
          sandbox.verify() is called and at least one registered mock has an unmet
          expectation (e.g. expects(method).withArgs(X) was set but the method was never
          called with X, or was called fewer/more times than expects(method).once()/atLeast()/exactly()).
          This is the canonical 'mock verification failed' signal — typical in test
          assertions but DANGEROUS in production code or test cleanup hooks that swallow
          the error and let subsequent tests pollute the state.
        throws: "ExpectationError: expected <method> to be called with arguments matching ... but was called <n> times"
        required_handling: >
          When sandbox.verify() is called outside a test framework's explicit assertion
          phase (e.g. in afterEach where the test result has already been reported), the
          caller MUST wrap in try/catch to attach the verification failure to the right
          test, AND MUST still call sandbox.restore() in a finally block to clean up the
          sandbox state. Otherwise the ExpectationError escapes into the test framework,
          subsequent tests run against a polluted sandbox, and the original failing test
          may already be marked passing.

          Best practice: use sandbox.verifyAndRestore() instead — it wraps the verify+
          restore pattern correctly:

            // Correct: verifyAndRestore handles try/finally for you
            afterEach(() => { sandbox.verifyAndRestore(); });

            // Manual verify path requires explicit try/finally
            afterEach(() => {
              try {
                sandbox.verify();
              } finally {
                sandbox.restore();
              }
            });

            // WRONG: bare verify() — if verification fails, restore() is skipped
            afterEach(() => {
              sandbox.verify();
              sandbox.restore(); // never reached if verify throws!
            });
        sources:
          - "https://sinonjs.org/releases/latest/sandbox/"
          - "https://sinonjs.org/releases/latest/mocks/"
          - "https://github.com/sinonjs/sinon/blob/v22.0.0/src/sinon/sandbox.js"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          # ExpectationError without try/finally cleanup pollutes the next test —
          # the failing test may be misattributed and the next test's mocks fight
          # leftover sandbox state, producing flaky failures elsewhere.
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: verifyAndRestore
    import_path: "sinon"
    description: >
      Sandbox method (sandbox.verifyAndRestore) that calls sandbox.verify() and then
      sandbox.restore() in a try/catch sequence: if verify throws ExpectationError, the
      sandbox is still restored before the error propagates. Distinct from verify() in
      that restore is guaranteed; distinct from restore() in that mock expectations are
      enforced. The recommended afterEach pattern when using mocks.
    postconditions:
      # Evidence: sinon@22.0.0 src/sinon/sandbox.js sandbox.verifyAndRestore:
      #   try { sandbox.verify(); } catch (e) { exception = e; }
      #   sandbox.restore();
      #   if (exception) { throw exception; }
      # Documentation: https://sinonjs.org/releases/latest/sandbox/#sandboxverifyandrestore
      - id: verify-and-restore-expectation-throws
        condition: >
          sandbox.verifyAndRestore() is called and at least one registered mock has an
          unmet expectation. Unlike bare verify(), the sandbox IS guaranteed restored
          before ExpectationError propagates — but the test framework still receives the
          throw, so the caller must let it bubble to a test failure or catch it.
        throws: "ExpectationError: expected <method> to be called with arguments matching ... but was called <n> times"
        required_handling: >
          In test afterEach hooks, allow the ExpectationError to propagate so the test
          framework can record the failure. The sandbox is guaranteed restored, so no
          finally block is required.

          Production code calling verifyAndRestore() (e.g. mock-driven integration tests
          run in CI) MUST allow the throw to surface or wrap in try/catch to record the
          assertion failure; swallowing it silently means failing mocks pass the test
          suite undetected.

            // Correct: afterEach lets the error reach the test framework
            afterEach(() => { sandbox.verifyAndRestore(); });

            // Correct: explicit catch records the failure
            try {
              sandbox.verifyAndRestore();
            } catch (e) {
              reporter.recordFailure(e);
              throw e;
            }

            // WRONG: silent swallow — mock failures pass undetected
            try { sandbox.verifyAndRestore(); } catch {}
        sources:
          - "https://sinonjs.org/releases/latest/sandbox/"
          - "https://github.com/sinonjs/sinon/blob/v22.0.0/src/sinon/sandbox.js"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          # A swallowed ExpectationError lets broken mock contracts pass CI — the
          # production behavior they were meant to verify is no longer verified.
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: restoreObject
    import_path: "sinon"
    description: >
      Top-level sinon API that walks every property of the given object and calls
      .restore() on each property whose value was previously stubbed/spied by sinon
      (identified by the .restore.sinon marker). Used to mass-restore an object whose
      multiple methods have been individually stubbed without the sandbox API. Distinct
      from sandbox.restore() in that it operates on a specific object, not on a tracked
      collection.
    postconditions:
      # Evidence: sinon@22.0.0 src/sinon/restore-object.js (verified 2026-06-23):
      #   if (!object) { throw new Error(`Trying to restore object but received ${String(object)}`); }
      # Documentation: https://sinonjs.org/releases/latest/utils/#sinonrestoreobjectobject
      - id: restore-object-falsy-input-throws
        condition: >
          sinon.restoreObject(object) is called with a falsy value: null, undefined, 0,
          false, NaN, or ''. Common in test teardown code that loops over a collection
          of stubbed targets and forgets to filter out already-cleared references, or
          where a teardown helper receives an optional object that is sometimes absent.
        throws: "Error: Trying to restore object but received <stringified-falsy-value>"
        required_handling: >
          MUST guard with a truthy check before calling sinon.restoreObject(), or wrap
          the call in try/catch in cleanup loops that may legitimately encounter
          already-cleared references.

            // Correct: guard
            if (target) {
              sinon.restoreObject(target);
            }

            // Correct: defensive try-catch in a cleanup loop
            for (const target of targets) {
              try { sinon.restoreObject(target); } catch { /* already cleared */ }
            }

            // WRONG: no guard
            sinon.restoreObject(maybeUndefined); // throws Error!
        sources:
          - "https://sinonjs.org/releases/latest/utils/"
          - "https://github.com/sinonjs/sinon/blob/v22.0.0/src/sinon/restore-object.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

