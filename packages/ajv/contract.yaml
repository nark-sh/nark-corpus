package: ajv
semver: ">=8.18.0 <10.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-13"
status: production
evidence_quality: confirmed
# analyzer_limitation: return_value_pattern
# Detection is limited: analyzer cannot reliably detect missing return value checks.
# Historical: False positive rate ~23%, detection rate ~42% on fixtures. Requires dataflow analysis.
# See work-packages/ajv/ for details.
# 2026-04-02 scan: 20 repos scanned, 14 violations (13 compile, 1 validate), 0% FP rate in 30 repos tested.

functions:
  - name: validate
    import_path: "ajv"
    description: "See postconditions for behavioral contract details."
    postconditions:
      - id: validate-returns-false
        # Evidence: seen in 1 primary firing across 1 repo in scan-ajv-2026-04-02.json
        # Top affected: spacebarchat/server (⭐ 2124 stars)
        condition: "data fails validation against the JSON schema"
        returns: "false (errors are stored in ajv.errors property)"
        required_handling: >
          Caller MUST check the return value of validate() and handle the false case.
          When validate() returns false, ajv.errors contains validation error details.
          Without checking the return value, invalid data will pass through, leading to
          data corruption, business logic errors, or security vulnerabilities.
          Use pattern: if (!ajv.validate(schema, data)) { console.error(ajv.errors); }
        sources:
          - "https://ajv.js.org/guide/getting-started.html#basic-data-validation"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: compile
    import_path: "ajv"
    description: "See postconditions for behavioral contract details."
    postconditions:
      - id: compile-invalid-schema
        # Evidence: seen in 13 primary firings across 5 repos in scan-ajv-2026-04-02.json
        # Top affected: deepstreamIO/deepstream.io (⭐ 7186 stars), SteamGridDB/steam-rom-manager (⭐ 2359 stars)
        condition: "schema is invalid or malformed"
        throws: "Error (schema compilation error)"
        required_handling: >
          Caller MUST wrap compile() in try-catch when working with untrusted schemas.
          Invalid schemas cause compilation errors that crash the application.
          Use pattern: try { const validate = ajv.compile(schema); } catch (error) { /* handle */ }
        sources:
          - "https://ajv.js.org/guide/getting-started.html#basic-data-validation"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validateSchema
    import_path: "ajv"
    description: "See postconditions for behavioral contract details."
    postconditions:
      - id: validateschema-returns-false
        condition: "schema is invalid according to meta-schema"
        returns: "false (errors are stored in ajv.errors property)"
        required_handling: >
          Caller MUST check the return value to determine if schema is valid.
          Without checking, invalid schemas may be used, causing unexpected validation behavior.
          Use pattern: if (!ajv.validateSchema(schema)) { console.error(ajv.errors); }
        sources:
          - "https://ajv.js.org/api.html#validateschema-schema-object-boolean"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

# Category: validation
# npm: https://www.npmjs.com/package/ajv
# Repository: https://github.com/ajv-validator/ajv
