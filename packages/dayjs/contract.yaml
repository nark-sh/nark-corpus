package: dayjs
semver: ">=1.10.0 <2.0.0"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.00
priority: medium

functions:
  - name: dayjs
    import_path: "dayjs"
    description: "Parses date strings and creates Day.js objects (moment.js compatible API)"
    postconditions:
      # Evidence: seen in 831 primary firings across 50 repos in scan-dayjs-2026-04-02.json
      # Updated: 18 violations across 7 repos in scan-dayjs-2026-06-29.json (tz and humanize functions active)
      # Top affected: activepieces/activepieces (⭐ 21381), soybeanjs/soybean-admin (⭐ 14051)
      # Note: High FP rate — many violations are dayjs() with no args or known-valid dates
      - id: dayjs-invalid-date
        maturity: stable
        condition: "input string is not a valid date format"
        # NOTE: No 'throws' or 'returns' field — this is a validation-pattern postcondition.
        # Day.js does NOT throw exceptions; it returns an Invalid Date object.
        # The scanner cannot verify .isValid() checks, so including 'returns' here
        # causes 100% false positive rate (e.g., 18 FPs in civitai scan).
        # This postcondition is retained for documentation and AI-assisted fix guidance.
        required_handling: >
          Caller MUST check isValid() before using the Day.js object.
          Invalid Day.js objects can cause incorrect date calculations, display issues,
          or NaN values propagating through the application.
          Use pattern: const d = dayjs(input); if (!d.isValid()) { /* handle error */ }
        sources:
          - "https://day.js.org/docs/en/parse/string"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        notes: |
          This contract detects missing .isValid() checks but has limitations:
          1. Day.js does NOT throw exceptions - it returns invalid objects
          2. The scanner cannot distinguish .isValid() guard presence
          3. This is a documentation/awareness postcondition, not enforced by the scanner
          4. Removed 'returns' field (2026-05-05) to prevent scanner false positives
          Detection rate: ~80% (based on fixture testing)
          Real-world validation: Found 1 violation in typeorm (true positive)

  - name: utc
    import_path: "dayjs"
    description: "Parses date in UTC mode (requires UTC plugin)"
    postconditions:
      # Evidence: seen in 25 primary firings across 4 repos in scan-dayjs-2026-04-02.json
      # Updated: 16 violations across 7 repos in scan-dayjs-2026-06-29.json
      # Top affected: activepieces/activepieces (⭐ 21381), rolling-scopes/rsschool-app (⭐ 10377)
      - id: utc-invalid-date
        maturity: stable
        condition: "input string is not a valid date format"
        # NOTE: No 'throws' or 'returns' field — same as dayjs-invalid-date.
        # dayjs.utc() does NOT throw; it returns an Invalid Date object.
        # Removed 'returns' field (2026-05-05) to prevent scanner false positives.
        required_handling: >
          Caller MUST check isValid() after parsing.
          Invalid UTC dates can cause timezone calculation errors and data corruption.
          Use pattern: const d = dayjs.utc(input); if (!d.isValid()) { /* handle error */ }
        sources:
          - "https://day.js.org/docs/en/plugin/utc"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: format
    import_path: "dayjs"
    description: "Formats dayjs object to string using format tokens"
    postconditions:
      - id: format-string-redos
        maturity: stable
        condition: "format string is user-controlled or very long"
        # NOTE: No 'throws' or 'returns' field — format() never throws.
        # ReDoS causes CPU exhaustion (slow return), not an exception.
        # Removed 'returns' field (2026-05-05) to prevent scanner false positives.
        required_handling: >
          Avoid using user-controlled format strings directly.
          Vulnerable regex patterns in format parsing can cause quadratic time complexity,
          leading to CPU exhaustion and DoS. Validate and limit format string length.
          See GitHub PR #2908 for technical details.
        sources:
          - "https://github.com/iamkun/dayjs/pull/2908"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          ReDoS vulnerability identified in format parsing (unfixed as of 2026-02-27).
          Affected regex patterns:
          - constant.js line 30: /\[([^\]]+)\]|Y{1,4}|M{1,4}|...|SSS/g
          - localizedFormat plugin regex patterns
          Performance degrades quadratically with large inputs (~100k chars → seconds).
          Mitigation: Limit format string length, sanitize user input.

  - name: tz
    import_path: "dayjs/plugin/timezone"
    description: >
      Parses a date string in a specific IANA timezone, or converts an existing
      Day.js object to a different timezone. Provided by the dayjs timezone plugin.
      Uses Intl.DateTimeFormat internally, which throws RangeError for invalid
      timezone identifiers.
    postconditions:
      # Evidence: https://day.js.org/docs/en/plugin/timezone
      # Error type confirmed from Intl.DateTimeFormat spec (MDN):
      #   https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat/DateTimeFormat
      # Confirmed: dayjs timezone plugin (unpkg.com/dayjs/plugin/timezone.js) calls
      #   new Intl.DateTimeFormat("en-US", { timeZone: t, ... }) with NO try-catch.
      #   Intl.DateTimeFormat throws RangeError for unrecognized IANA timezone identifiers
      #   per the ECMAScript Internationalization API Specification.
      - id: tz-invalid-timezone-range-error
        maturity: stable
        condition: "timezone string is not a valid IANA timezone identifier"
        throws: "RangeError: Invalid time zone specified: <timezone>"
        required_handling: >
          Callers MUST wrap dayjs.tz() and Dayjs.tz() calls in try-catch when the
          timezone value comes from user input, database values, or external APIs.
          Valid IANA identifiers include "America/New_York", "UTC", "Europe/London".
          Invalid identifiers like "EST", "PST", or misspelled names throw RangeError.
          Use a validation step: check against Intl.supportedValuesOf('timeZone') or
          wrap in try-catch. Unlike other Day.js operations, this is a REAL exception,
          not a silent invalidity.
          Pattern: try { const d = dayjs.tz(input, timezone); } catch (e) { if (e instanceof RangeError) { /* invalid timezone */ } }
        sources:
          - "https://day.js.org/docs/en/plugin/timezone"
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat/DateTimeFormat"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          This is different from all other Day.js failures: it is a thrown exception,
          not a silent Invalid Date object. Intl.DateTimeFormat throws RangeError when
          given an invalid IANA timezone string. Common invalid inputs:
          - US abbreviations: "EST", "CST", "PST", "MST" (not IANA — use "America/New_York" etc.)
          - Misspelled: "America/New_Yourk", "Europ/London"
          - Custom/legacy: "GMT+5:30" (not the IANA format)
          The dayjs timezone plugin caches DateTimeFormat instances per timezone string
          (verified from source), so the first call with an invalid timezone throws;
          subsequent calls with the same invalid string also throw (no caching of errors).

      - id: tz-setdefault-invalid-timezone
        maturity: stable
        condition: "dayjs.tz.setDefault() called with invalid IANA timezone string"
        throws: "RangeError propagated on next dayjs.tz() call"
        required_handling: >
          When setting a default timezone via dayjs.tz.setDefault(timezone), the
          timezone string is NOT validated at call time. The RangeError is thrown
          lazily on the next dayjs.tz() call that uses the default timezone.
          This makes the failure delayed and harder to trace. Validate the timezone
          before calling setDefault():
          const isValid = (tz: string) => { try { Intl.DateTimeFormat(undefined, { timeZone: tz }); return true; } catch { return false; } };
          if (isValid(tz)) { dayjs.tz.setDefault(tz); }
        sources:
          - "https://day.js.org/docs/en/plugin/timezone"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          setDefault() with an invalid timezone silently accepts the value but
          the error surfaces later on next dayjs.tz() usage. This creates a
          difficult-to-debug situation where app startup succeeds but requests fail.

  - name: toISOString
    import_path: "dayjs"
    description: >
      Serializes a Day.js object to an ISO 8601 string. Delegates directly to the
      native Date.prototype.toISOString() with NO isValid() guard. Unlike format(),
      which returns the string "Invalid Date" for invalid objects, toISOString()
      THROWS a RangeError when called on an invalid Day.js object.
    postconditions:
      # Evidence: dayjs source (dayjs.min.js) — m.toISOString=function(){return this.$d.toISOString()}
      # No isValid() guard before the native Date call. Confirmed: Date.prototype.toISOString()
      # throws RangeError: "Invalid time value" when the Date is Invalid Date.
      # Compare to toJSON() which has the guard: m.toJSON=function(){return this.isValid()?this.toISOString():null}
      # Contrast: format() also has a guard and returns "Invalid Date" string instead of throwing.
      # Source inspection: /node_modules/dayjs/dayjs.min.js lines 1 (minified)
      - id: toisostring-invalid-date-throws
        maturity: stable
        condition: "called on a Day.js object created from an invalid date string or null"
        throws: "RangeError: Invalid time value (thrown by native Date.prototype.toISOString)"
        required_handling: >
          Callers MUST ensure the Day.js object is valid before calling toISOString().
          Always call isValid() first, or use toJSON() (which returns null for invalid
          dates instead of throwing). Common pattern:
          const iso = d.isValid() ? d.toISOString() : null;
          Or use toJSON() as a safe alternative: const iso = d.toJSON();
          This is particularly dangerous when dayjs() parses user-supplied date strings —
          invalid input propagates silently until toISOString() is called and throws.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          This is the hidden exception in Day.js: most methods silently return
          "Invalid Date" or NaN for invalid objects, but toISOString() actually throws.
          Key asymmetry table:
            format()       → returns "Invalid Date" string (no throw)
            toJSON()       → returns null (no throw, has isValid() guard in source)
            toISOString()  → THROWS RangeError (no guard in source)
            valueOf()      → returns NaN (no throw)
          The RangeError message is: "Invalid time value" (Node.js) or similar browser message.
          Common causes of invalid Day.js objects:
            - dayjs("not-a-date")  → isValid() false
            - dayjs(null)          → isValid() false (null → new Date(NaN))
            - dayjs("2024-13-01")  → month 13 → Invalid Date
            - dayjs("")            → empty string → Invalid Date

  - name: humanize
    import_path: "dayjs/plugin/duration"
    description: >
      Duration.humanize() converts a Duration object into a human-readable
      relative-time string (e.g. "a minute", "2 hours", "in 3 days"). Provided
      by the dayjs duration plugin BUT internally calls dayjs(...).fromNow(),
      which is added by the SEPARATE relativeTime plugin. Calling humanize()
      without first loading the relativeTime plugin throws a TypeError because
      fromNow is undefined on the Dayjs prototype.
    postconditions:
      # Evidence: dayjs/plugin/duration.js source — humanize delegates to
      # `t().add(this.$ms,"ms").locale(this.$l).fromNow(!s)`
      # Confirmed: grep -o "humanize=function[^}]*" → calls .fromNow(!s)
      # Empirically reproduced 2026-06-24 (dayjs@1.11.21):
      #   const dayjs = require('dayjs');
      #   const duration = require('dayjs/plugin/duration');
      #   dayjs.extend(duration);
      #   dayjs.duration(60000).humanize();
      #   → TypeError: t(...).add(...).locale(...).fromNow is not a function
      # Documentation source: https://day.js.org/docs/en/durations/humanize
      #   "Requires both the Duration and RelativeTime plugins to function."
      - id: humanize-missing-relativetime-plugin
        maturity: stable
        condition: >
          Duration.humanize() called when only the duration plugin has been
          loaded via dayjs.extend(duration). The relativeTime plugin must
          also be extended before humanize() can succeed.
        throws: "TypeError: dayjs(...).fromNow is not a function"
        required_handling: >
          Always extend BOTH the duration plugin AND the relativeTime plugin
          before calling Duration.humanize(). The Day.js docs document this
          dependency but the dependency is not enforced at extend() time, so
          the error only surfaces on first humanize() call at runtime.
          Correct pattern:
            import dayjs from 'dayjs';
            import duration from 'dayjs/plugin/duration';
            import relativeTime from 'dayjs/plugin/relativeTime';
            dayjs.extend(duration);
            dayjs.extend(relativeTime);
            dayjs.duration(60000).humanize();
          Alternatively, wrap humanize() calls in try-catch when the plugin
          load order is dynamic or controlled by external code.
        sources:
          - "https://day.js.org/docs/en/durations/humanize"
          - "https://day.js.org/docs/en/plugin/relative-time"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        notes: |
          This is a setup-time bug that surfaces at runtime, not a production
          input-handling bug. The TypeError occurs deterministically on the
          first humanize() call when relativeTime is not loaded — so it is
          typically caught in development. However:
            - Conditional plugin loading paths can leave it unloaded in prod
            - Lazy-loaded modules may extend duration first and relativeTime
              later, leaving a window where humanize() throws
            - Server-rendered Next.js / SSR setups can extend on the client
              but miss the server bundle
          The same plugin-dependency pattern applies to the fromNow / from /
          to / toNow methods directly on Dayjs objects — if any of those are
          called before dayjs.extend(relativeTime), they all throw
          "fromNow is not a function" or equivalent.

  - name: duration
    import_path: "dayjs/plugin/duration"
    description: >
      Creates a Day.js Duration object representing a length of time. Accepts
      milliseconds (number), an object of units, or an ISO 8601 duration string
      (e.g. "P1Y2M3DT4H5M6S"). Provided by the dayjs duration plugin.
      This function is synchronous but has a critical silent failure: invalid
      ISO 8601 strings produce a zero-duration object with no error or warning.
    postconditions:
      # Evidence: duration plugin source (dayjs/plugin/duration.js) inspected directly.
      # The ISO 8601 regex is: /^(-|\+)?P(?:([-+]?[0-9,.]*)Y)?(?:([-+]?[0-9,.]*)M)?...$/
      # When a string does NOT match this regex, the code falls through with empty $d={},
      # $ms=0: "if('string'==typeof t){var e=t.match(a);if(e){...return this}} return this"
      # The outer "return this" after the string block means a non-matching string produces
      # Duration with $ms=0 — identical to dayjs.duration(0). Confirmed from source inspection.
      - id: duration-invalid-iso-string-silent-zero
        maturity: stable
        condition: "ISO 8601 duration string is malformed or does not match the expected format"
        # NOTE: No 'throws' or 'returns' field — duration() never throws.
        # Invalid strings silently produce a zero-duration object.
        # Removed 'returns' field (2026-05-05) to prevent scanner false positives.
        # Original returns value preserved in notes for documentation.
        required_handling: >
          Callers MUST validate ISO 8601 duration strings before passing to
          dayjs.duration(). Test the duration after creation:
          const d = dayjs.duration(str); if (d.asMilliseconds() === 0 && str !== 'P0D' && str !== 'PT0S') { /* invalid */ }
          Better: pre-validate with the ISO 8601 duration regex before calling duration().
          Common invalid strings that silently produce zero-duration:
            - "1h30m" (not ISO format — should be "PT1H30M")
            - "1 day" (natural language — should be "P1D")
            - "90 minutes" (should be "PT90M")
            - "" (empty string)
            - "P" (bare P with no values)
        sources:
          - "https://day.js.org/docs/en/plugin/duration"
          - "https://en.wikipedia.org/wiki/ISO_8601#Durations"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        notes: |
          Silent zero-duration is the most common error pattern for this plugin.
          Impact scenarios:
            - Subscription duration stored as natural-language string: "30 days" →
              dayjs.duration("30 days") → 0ms → subscription expires immediately
            - Trial period: dayjs.duration("14d") → 0ms → trial appears expired
            - Rate limiting: interval parsed as "5 mins" → 0ms → rate limit fires continuously
          The ISO 8601 format required: "P[n]Y[n]M[n]DT[n]H[n]M[n]S"
          Examples of valid strings: "P1Y", "P30D", "PT1H30M", "P1Y2M3DT4H5M6S"
          Note: "P" and "-P" alone return "P0D" from toISOString() but have $ms=0.

# Category: utilities

# npm: https://www.npmjs.com/package/dayjs
# Repository: https://github.com/iamkun/dayjs
# Note: Modern alternative to moment.js, 2KB immutable date library
#
# Contract Limitations:
# - Day.js does NOT throw exceptions for invalid dates
# - Uses validation pattern (.isValid()) instead of error handling
# - Current analyzer has ~20% false positive rate on .isValid() detection
# - This is an informational/documentation contract
# - Priority: LOW (validation pattern vs exception pattern mismatch)
#
# Validation Results (2026-02-26):
# - Fixture testing: 80% pass rate (24 violations in 120 calls)
# - Real-world (typeorm): 1 violation found (true positive)
# - Detection: Works but limited by validation pattern vs try-catch pattern
#
# Recommendation: Use for documentation and awareness, not strict enforcement
