package: dayjs
semver: ">=1.10.0 <2.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-04-11"
status: production
evidence_quality: confirmed
coverage_score: 0.71
priority: medium

functions:
  - name: dayjs
    import_path: "dayjs"
    description: "Parses date strings and creates Day.js objects (moment.js compatible API)"
    postconditions:
      # Evidence: seen in 831 primary firings across 50 repos in scan-dayjs-2026-04-02.json
      # Top affected: clash-verge-rev/clash-verge-rev (⭐ 104838), ant-design/ant-design (⭐ 97783)
      # Note: High FP rate — many violations are dayjs() with no args or known-valid dates
      - id: dayjs-invalid-date
        condition: "input string is not a valid date format"
        returns: "Invalid Day.js object (dayjs().isValid() returns false)"
        required_handling: >
          Caller MUST check isValid() before using the Day.js object.
          Invalid Day.js objects can cause incorrect date calculations, display issues,
          or NaN values propagating through the application.
          Use pattern: const d = dayjs(input); if (!d.isValid()) { /* handle error */ }
        sources:
          - "https://day.js.org/docs/en/parse/string"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          This contract detects missing .isValid() checks but has limitations:
          1. Day.js does NOT throw exceptions - it returns invalid objects
          2. Some false positives occur when .isValid() IS checked
          3. This is more documentation than enforcement
          Detection rate: ~80% (based on fixture testing)
          Real-world validation: Found 1 violation in typeorm (true positive)

  - name: utc
    import_path: "dayjs"
    description: "Parses date in UTC mode (requires UTC plugin)"
    postconditions:
      # Evidence: seen in 25 primary firings across 4 repos in scan-dayjs-2026-04-02.json
      # Top affected: rolling-scopes/rsschool-app, civitai/civitai (⭐ large)
      - id: utc-invalid-date
        condition: "input string is not a valid date format"
        returns: "Invalid Day.js object (dayjs().isValid() returns false)"
        required_handling: >
          Caller MUST check isValid() after parsing.
          Invalid UTC dates can cause timezone calculation errors and data corruption.
          Use pattern: const d = dayjs.utc(input); if (!d.isValid()) { /* handle error */ }
        sources:
          - "https://day.js.org/docs/en/plugin/utc"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: format
    import_path: "dayjs"
    description: "Formats dayjs object to string using format tokens"
    postconditions:
      - id: format-string-redos
        condition: "format string is user-controlled or very long"
        returns: "Formatted string (but may cause ReDoS with malicious input)"
        required_handling: >
          Avoid using user-controlled format strings directly.
          Vulnerable regex patterns in format parsing can cause quadratic time complexity,
          leading to CPU exhaustion and DoS. Validate and limit format string length.
          See GitHub PR #2908 for technical details.
        sources:
          - "https://github.com/iamkun/dayjs/pull/2908"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          ReDoS vulnerability identified in format parsing (unfixed as of 2026-02-27).
          Affected regex patterns:
          - constant.js line 30: /\[([^\]]+)\]|Y{1,4}|M{1,4}|...|SSS/g
          - localizedFormat plugin regex patterns
          Performance degrades quadratically with large inputs (~100k chars → seconds).
          Mitigation: Limit format string length, sanitize user input.

  - name: tz
    import_path: "dayjs/plugin/timezone"
    description: >
      Parses a date string in a specific IANA timezone, or converts an existing
      Day.js object to a different timezone. Provided by the dayjs timezone plugin.
      Uses Intl.DateTimeFormat internally, which throws RangeError for invalid
      timezone identifiers.
    postconditions:
      # Evidence: https://day.js.org/docs/en/plugin/timezone
      # Error type confirmed from Intl.DateTimeFormat spec (MDN):
      #   https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat/DateTimeFormat
      # Confirmed: dayjs timezone plugin (unpkg.com/dayjs/plugin/timezone.js) calls
      #   new Intl.DateTimeFormat("en-US", { timeZone: t, ... }) with NO try-catch.
      #   Intl.DateTimeFormat throws RangeError for unrecognized IANA timezone identifiers
      #   per the ECMAScript Internationalization API Specification.
      - id: tz-invalid-timezone-range-error
        condition: "timezone string is not a valid IANA timezone identifier"
        throws: "RangeError: Invalid time zone specified: <timezone>"
        required_handling: >
          Callers MUST wrap dayjs.tz() and Dayjs.tz() calls in try-catch when the
          timezone value comes from user input, database values, or external APIs.
          Valid IANA identifiers include "America/New_York", "UTC", "Europe/London".
          Invalid identifiers like "EST", "PST", or misspelled names throw RangeError.
          Use a validation step: check against Intl.supportedValuesOf('timeZone') or
          wrap in try-catch. Unlike other Day.js operations, this is a REAL exception,
          not a silent invalidity.
          Pattern: try { const d = dayjs.tz(input, timezone); } catch (e) { if (e instanceof RangeError) { /* invalid timezone */ } }
        sources:
          - "https://day.js.org/docs/en/plugin/timezone"
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat/DateTimeFormat"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          This is different from all other Day.js failures: it is a thrown exception,
          not a silent Invalid Date object. Intl.DateTimeFormat throws RangeError when
          given an invalid IANA timezone string. Common invalid inputs:
          - US abbreviations: "EST", "CST", "PST", "MST" (not IANA — use "America/New_York" etc.)
          - Misspelled: "America/New_Yourk", "Europ/London"
          - Custom/legacy: "GMT+5:30" (not the IANA format)
          The dayjs timezone plugin caches DateTimeFormat instances per timezone string
          (verified from source), so the first call with an invalid timezone throws;
          subsequent calls with the same invalid string also throw (no caching of errors).

      - id: tz-setdefault-invalid-timezone
        condition: "dayjs.tz.setDefault() called with invalid IANA timezone string"
        throws: "RangeError propagated on next dayjs.tz() call"
        required_handling: >
          When setting a default timezone via dayjs.tz.setDefault(timezone), the
          timezone string is NOT validated at call time. The RangeError is thrown
          lazily on the next dayjs.tz() call that uses the default timezone.
          This makes the failure delayed and harder to trace. Validate the timezone
          before calling setDefault():
          const isValid = (tz: string) => { try { Intl.DateTimeFormat(undefined, { timeZone: tz }); return true; } catch { return false; } };
          if (isValid(tz)) { dayjs.tz.setDefault(tz); }
        sources:
          - "https://day.js.org/docs/en/plugin/timezone"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: |
          setDefault() with an invalid timezone silently accepts the value but
          the error surfaces later on next dayjs.tz() usage. This creates a
          difficult-to-debug situation where app startup succeeds but requests fail.

# Category: utilities
# npm: https://www.npmjs.com/package/dayjs
# Repository: https://github.com/iamkun/dayjs
# Note: Modern alternative to moment.js, 2KB immutable date library
#
# Contract Limitations:
# - Day.js does NOT throw exceptions for invalid dates
# - Uses validation pattern (.isValid()) instead of error handling
# - Current analyzer has ~20% false positive rate on .isValid() detection
# - This is an informational/documentation contract
# - Priority: LOW (validation pattern vs exception pattern mismatch)
#
# Validation Results (2026-02-26):
# - Fixture testing: 80% pass rate (24 violations in 120 calls)
# - Real-world (typeorm): 1 violation found (true positive)
# - Detection: Works but limited by validation pattern vs try-catch pattern
#
# Recommendation: Use for documentation and awareness, not strict enforcement
