  - name: createProgram
    import_path: "typescript"
    description: "Creates a TypeScript program from source files and compiler options"

    postconditions:
      # Evidence: seen in 3 primary firings across 1 repo in scan-typescript-2026-04-03.json
      # Top affected: TypeStrong/typedoc (⭐ 8383 stars)
      - id: file-not-found
        maturity: stable
        condition: "source file specified in rootNames does not exist"
        throws: "May throw Error or return program with diagnostics"
        required_handling: >
          Caller SHOULD wrap ts.createProgram() in a try-catch AND check
          ts.getPreEmitDiagnostics() for file-not-found errors. The API may
          return a program with errors rather than throwing.
        sources:
          - "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/typescript/lib/typescript.js line 126937-126943
      # createProgram iterates commandLineOptionOfCustomType and checks if any option
      # is a string (meaning it was not parsed from JSON into the enum value):
      #   throw new Error(`${option.name} is a string value; tsconfig JSON must be parsed
      #     with parseJsonSourceFileConfigFileContent or getParsedCommandLineOfConfigFile
      #     before passing to createProgram`)
      # This is a REAL THROW — not a diagnostic. Occurs when raw tsconfig JSON is passed.
      - id: create-program-string-option-throws
        maturity: stable
        condition: >
          A compiler option that requires an enum value (e.g., target, module, moduleResolution,
          jsx, lib) is passed as a raw string (e.g., "ES2020") instead of the TypeScript enum
          value (e.g., ts.ScriptTarget.ES2020). This occurs when tsconfig JSON is passed
          directly to createProgram without parsing via parseJsonConfigFileContent first.
        throws: "Error: '<optionName> is a string value; tsconfig JSON must be parsed with parseJsonSourceFileConfigFileContent or getParsedCommandLineOfConfigFile before passing to createProgram'"
        required_handling: >
          Always parse tsconfig JSON before passing to createProgram:

            import * as ts from 'typescript';
            import * as path from 'path';

            // WRONG — passing raw JSON with string "target" value throws
            const rawConfig = { compilerOptions: { target: 'ES2020', module: 'CommonJS' } };
            ts.createProgram(files, rawConfig.compilerOptions);  // THROWS!

            // CORRECT — parse through parseJsonConfigFileContent first
            const configPath = ts.findConfigFile('./', ts.sys.fileExists, 'tsconfig.json');
            const { config } = ts.readConfigFile(configPath!, ts.sys.readFile);
            const { options, fileNames } = ts.parseJsonConfigFileContent(
              config, ts.sys, path.dirname(configPath!)
            );
            const program = ts.createProgram(fileNames, options);  // options has enum values

          Alternatively, use enum values directly:
            ts.createProgram(files, {
              target: ts.ScriptTarget.ES2020,   // enum value, not string
              module: ts.ModuleKind.CommonJS,   // enum value, not string
            });

        sources:
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/program.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: invalid-compiler-options
        maturity: stable
        condition: "compiler options are invalid or incompatible"
        throws: "May throw Error or return program with diagnostics"
        required_handling: >
          Caller SHOULD validate compiler options before passing to ts.createProgram()
          or check diagnostics after program creation.
        sources:
          - "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: unchecked-diagnostics
        maturity: stable
        condition: "program created successfully but contains compilation errors"
        returns: "Program object with errors accessible via getPreEmitDiagnostics()"
        required_handling: >
          Caller MUST call ts.getPreEmitDiagnostics(program) after creating a program
          to check for compilation errors. Programs can be created even when source
          files have errors, but emitting without checking diagnostics is unsafe.
        sources:
          - "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
