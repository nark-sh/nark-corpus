                `Pass an explicit --project flag or run from inside a TypeScript project.`
              );
            }

            const { config, error } = ts.readConfigFile(configPath, ts.sys.readFile);
            // ... continue with the readConfigFile contract checks

          Do not use the non-null assertion operator (configPath!) — it suppresses
          the TS warning but the runtime TypeError is identical. The check is
          the contract.
