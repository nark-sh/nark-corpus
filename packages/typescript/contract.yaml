  - name: transpileModule
    import_path: "typescript"
    description: >
      Transpiles a single TypeScript source string to JavaScript. Does NOT perform type checking —
      it only performs syntactic transformations. Returns a TranspileOutput with outputText,
      diagnostics, and optionally sourceMapText. This is the function used by ts-jest, ts-node,
      babel-plugin-transform-typescript, and many webpack/rollup transformers. Does NOT throw
      for type errors (they are not checked). However, it will throw if custom transformers
      crash or if internal invariants are violated.
    postconditions:
      # Evidence: node_modules/typescript/lib/typescript.js line 145463+ (transpileWorker)
      # transpileModule calls transpileWorker which calls createProgram + program.emit internally
      # Custom transformers run inside program.emit() — any uncaught throw propagates out
      # The function uses Debug.fail("Output generation failed") if no output was produced,
      # but this is an internal invariant and should not occur with valid input
      # Source: https://raw.githubusercontent.com/microsoft/TypeScript-wiki/main/Using-the-Compiler-API.md
      - id: transpile-custom-transformer-throws
        maturity: stable
        condition: >
          A custom transformer function (passed via transpileOptions.transformers) throws
          an unhandled exception during node visitation. Custom transformers run inside
          program.emit() which does not have a catch-all for transformer errors. Any
          uncaught exception from a transformer propagates directly to the caller.
        throws: "The error thrown by the custom transformer (type depends on transformer implementation)"
        required_handling: >
          Wrap ts.transpileModule() in a try-catch when using custom transformers:

            import * as ts from 'typescript';

            // WRONG — throws if transformer crashes (e.g., on unexpected AST node)
            const result = ts.transpileModule(sourceCode, {
              compilerOptions: { module: ts.ModuleKind.CommonJS },
              transformers: { before: [myCustomTransformer] }
            });

            // CORRECT — wrap when using transformers
            try {
              const result = ts.transpileModule(sourceCode, {
                compilerOptions: { module: ts.ModuleKind.CommonJS },
                transformers: { before: [myCustomTransformer] }
              });
              return result.outputText;
            } catch (error) {
              throw new Error(`Transpilation failed: ${error.message}`);
            }

          For transformers that don't crash on valid input, the result.diagnostics array
          always contains any syntax errors (TypeScript does not type-check during transpileModule).
        sources:
          - "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/transpile.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      # Evidence: The TypeScript Compiler API follows a "diagnostics not throws" pattern for
      # compilation errors. transpileModule collects diagnostics but does NOT throw for type errors.
      # Callers frequently assume that a successful return means valid code — they skip diagnostics.
      - id: transpile-diagnostics-not-checked
        maturity: stable
        condition: >
          The caller does not check result.diagnostics after calling transpileModule with
          reportDiagnostics: true. Syntax errors (not type errors) are captured in diagnostics.
          If diagnostics are not checked, the caller emits JavaScript from invalid TypeScript
          and the downstream runtime behavior is unpredictable.
        returns: >
          TranspileOutput with non-empty diagnostics array containing syntax error Diagnostics.
          The outputText may be empty string, partial code, or JS equivalent of erroneous TS.
        required_handling: >
          Always check result.diagnostics when transpileModule is called with reportDiagnostics:

            const result = ts.transpileModule(input, {
              compilerOptions: options,
              reportDiagnostics: true,
            });

            if (result.diagnostics && result.diagnostics.length > 0) {
              const errorMessages = result.diagnostics.map(d =>
                ts.flattenDiagnosticMessageText(d.messageText, '\n')
              );
              throw new Error(`Transpilation errors: ${errorMessages.join('; ')}`);
            }

            return result.outputText;

          Note: transpileModule does NOT perform type checking. Only syntax errors appear in
          diagnostics. For type safety, use createProgram + getSemanticDiagnostics.
        sources:
          - "https://raw.githubusercontent.com/microsoft/TypeScript-wiki/main/Using-the-Compiler-API.md"
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/transpile.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: program.emit
    import_path: "typescript"
    description: >
      Emits the compiled JavaScript output for the program or a specific source file.
      Returns an EmitResult containing emitSkipped (boolean) and diagnostics. This is
      a fundamental API: callers that ignore emitSkipped or result.diagnostics will
      silently ship broken JavaScript to production. Also throws OperationCanceledException
      if the cancellation token fires during emit.
    postconditions:
      # Evidence: node_modules/typescript/lib/typescript.js line 127893
      # program.emit calls runWithCancellationToken which re-throws OperationCanceledException
      # See: https://raw.githubusercontent.com/microsoft/TypeScript-wiki/main/Using-the-Compiler-API.md
      - id: emit-operation-canceled
        maturity: stable
        condition: >
          A CancellationToken is passed (via the cancellationToken parameter) and the token's
          throwIfCancellationRequested() method throws OperationCanceledException during emit.
          Typically occurs in IDE/LSP contexts where the user triggers a new compilation while
          one is already running. In batch compilation scenarios, cancellation tokens are
          not commonly used, so this is primarily a concern for language service integrations.
        throws: "OperationCanceledException (ts.OperationCanceledException — a class, not extending Error)"
        required_handling: >
          When using a cancellation token with program.emit(), catch OperationCanceledException:

            import * as ts from 'typescript';

            try {
              const emitResult = program.emit(
                undefined, undefined, cancellationToken
              );
            } catch (e) {
              if (e instanceof ts.OperationCanceledException) {
                // User cancelled — clean up and retry or return
                return;
              }
              throw e;  // Re-throw unexpected errors
            }

          Note: OperationCanceledException is NOT a subclass of Error in TypeScript's
          implementation. Use instanceof ts.OperationCanceledException for detection.
        sources:
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/program.ts"
          - "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      # Evidence: https://raw.githubusercontent.com/microsoft/TypeScript-wiki/main/Using-the-Compiler-API.md
      # The wiki shows: "Exit code used by getEmitOutput function to indicate status"
      # and demonstrates pattern: process.exit(emitResult.emitSkipped ? 1 : 0)
      # emitSkipped === true means files were NOT written — callers who ignore this silently succeed
      - id: emit-skipped-not-checked
        maturity: stable
        condition: >
          The caller does not check emitResult.emitSkipped after program.emit(). When compilation
          errors prevent emit (e.g., --noEmitOnError option is set, or declaration emit fails),
          emitSkipped is true and NO output files were written. Callers who skip this check
          believe compilation succeeded and proceed to deploy or use the non-existent output.
        returns: >
          EmitResult with emitSkipped: true and non-empty diagnostics array. No output files
          are written to disk (the writeFile callback is not invoked for the output files).
        required_handling: >
          Always check emitResult.emitSkipped and emitResult.diagnostics after emit:

            import * as ts from 'typescript';

            const emitResult = program.emit();

            // Check for pre-emit errors (type errors)
            const allDiagnostics = ts
              .getPreEmitDiagnostics(program)
              .concat(emitResult.diagnostics);

            if (allDiagnostics.length > 0) {
              allDiagnostics.forEach(diagnostic => {
                if (diagnostic.file) {
                  const { line, character } = ts.getLineAndCharacterOfPosition(
                    diagnostic.file,
                    diagnostic.start!
                  );
                  const message = ts.flattenDiagnosticMessageText(diagnostic.messageText, '\n');
                  console.error(`${diagnostic.file.fileName} (${line + 1},${character + 1}): ${message}`);
                } else {
                  console.error(ts.flattenDiagnosticMessageText(diagnostic.messageText, '\n'));
                }
              });
            }

            process.exit(emitResult.emitSkipped ? 1 : 0);

        sources:
          - "https://raw.githubusercontent.com/microsoft/TypeScript-wiki/main/Using-the-Compiler-API.md"
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/program.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: program.getSemanticDiagnostics
    import_path: "typescript"
    description: >
      Returns semantic (type-checking) diagnostics for the program or a specific source file.
      This is a pure read operation that does NOT emit files. Returns a readonly Diagnostic array.
      Throws OperationCanceledException if a cancellation token fires during type checking.
      The first call initializes the type checker, which can be expensive on large codebases.
      Callers who fail to iterate the returned array assume no type errors exist.
    postconditions:
      # Evidence: node_modules/typescript/lib/typescript.js line 6043
      # getSemanticDiagnostics is on the Program interface; internally runs type checker
      # which calls cancellationToken.throwIfCancellationRequested periodically
      # Source confirmed: typescript.js line 55832-55833
      - id: get-semantic-diagnostics-canceled
        maturity: stable
        condition: >
          A cancellation token is in effect (passed to createProgram or via the compiler host)
          and throwIfCancellationRequested() fires during the type-checking pass.
          This is the same cancellation mechanism as program.emit().
        throws: "OperationCanceledException (ts.OperationCanceledException)"
        required_handling: >
          Wrap getSemanticDiagnostics in try-catch when operating in cancellable contexts:

            try {
              const diagnostics = program.getSemanticDiagnostics();
              // process diagnostics...
            } catch (e) {
              if (e instanceof ts.OperationCanceledException) {
                return; // Type-checking was cancelled; retry or abort
              }
              throw e;
            }

        sources:
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/program.ts"
          - "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
