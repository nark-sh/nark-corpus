  - name: getParsedCommandLineOfConfigFile
    import_path: "typescript"
    description: >
      One-shot wrapper that reads a tsconfig.json file, parses its JSON, and
      converts the result into a ParsedCommandLine ({ options, fileNames,
      projectReferences, errors }). Replaces the manual readConfigFile +
      parseJsonConfigFileContent dance for the common case. Returns undefined
      when the config file cannot be read — but ONLY signals this failure via
      `host.onUnRecoverableConfigFileDiagnostic`, which the caller must
      implement on the ParseConfigFileHost. Two failure modes: (1) host omits
      onUnRecoverableConfigFileDiagnostic and gets a TypeError, (2) host
      provides it but the caller doesn't check the undefined return.
    postconditions:
      # Evidence: node_modules/typescript@6.0.3/lib/typescript.js line 42600-42623
      # function getParsedCommandLineOfConfigFile(configFileName, ..., host, ...) {
      #   const configFileText = tryReadFile(configFileName, (fileName) => host.readFile(fileName));
      #   if (!isString(configFileText)) {
      #     host.onUnRecoverableConfigFileDiagnostic(configFileText);   // host method REQUIRED
      #     return void 0;                                              // silent undefined
      #   }
      #   ...
      # }
      # tryReadFile (line 42644) wraps host.readFile in try/catch and converts
      # exceptions into Diagnostics — they do NOT propagate out as throws.
      - id: getparsedcommandline-undefined-not-checked
        maturity: stable
        condition: >
          The caller invokes ts.getParsedCommandLineOfConfigFile(...) and uses
          result.options or result.fileNames without checking that the result
          itself is non-undefined. The undefined path fires when host.readFile
          returns undefined, throws (caught by tryReadFile), or the file content
          is not a string. The caller then crashes on the next property access.
        returns: >
          undefined when the config file cannot be read. The
          host.onUnRecoverableConfigFileDiagnostic callback fires with a
          ts.Diagnostic describing the read failure (ENOENT, EACCES, throw from
          readFile), but the function still returns void 0 to its caller.
        required_handling: >
          Always check for undefined AND check result.errors when defined:

            import * as ts from 'typescript';

            const host: ts.ParseConfigFileHost = {
              ...ts.sys,
              onUnRecoverableConfigFileDiagnostic: (diagnostic) => {
                const msg = ts.flattenDiagnosticMessageText(diagnostic.messageText, '\n');
                throw new Error(`tsconfig read failed: ${msg}`);
              },
            };

            const parsed = ts.getParsedCommandLineOfConfigFile(
              configFileName,
              /*optionsToExtend*/ undefined,
              host
            );

            if (!parsed) {
              // onUnRecoverableConfigFileDiagnostic already fired if it was
              // wired up to throw; this guard catches the case where it just
              // logged a warning.
              throw new Error(`Failed to parse ${configFileName}`);
            }

            if (parsed.errors.length > 0) {
              parsed.errors.forEach(e =>
                console.error(ts.flattenDiagnosticMessageText(e.messageText, '\n'))
              );
              throw new Error(`tsconfig has invalid options: ${parsed.errors.length} errors`);
            }

            // Safe to use parsed.options and parsed.fileNames
            const program = ts.createProgram(parsed.fileNames, parsed.options);

        sources:
          - "https://raw.githubusercontent.com/microsoft/TypeScript-wiki/main/Using-the-Compiler-API.md"
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/commandLineParser.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

      # Evidence: node_modules/typescript@6.0.3/lib/typescript.js line 42603
      # The function calls host.onUnRecoverableConfigFileDiagnostic UNCONDITIONALLY
      # when the read fails. The ParseConfigFileHost interface declares this method
      # as required (not optional). Hosts that omit it crash with TypeError when
      # the read path triggers (any time the config file is missing or unreadable).
      - id: getparsedcommandline-host-missing-callback
        maturity: stable
        condition: >
          The ParseConfigFileHost passed to ts.getParsedCommandLineOfConfigFile()
          does not define onUnRecoverableConfigFileDiagnostic (or defines it as
          undefined). When the function hits the read-failure path, calling
          undefined as a function raises TypeError. A spread of ts.sys does NOT
          include this method — ts.sys is a System, not a ParseConfigFileHost.
        throws: "TypeError: host.onUnRecoverableConfigFileDiagnostic is not a function"
        required_handling: >
          Explicitly provide onUnRecoverableConfigFileDiagnostic when constructing
          the host — do not rely on object spread to supply it:

            // WRONG — ts.sys does not have onUnRecoverableConfigFileDiagnostic
            const host = { ...ts.sys } as ts.ParseConfigFileHost;
            ts.getParsedCommandLineOfConfigFile(configFileName, undefined, host);
            // Crashes with TypeError on any read failure.

            // CORRECT — explicitly wire the diagnostic callback
            const host: ts.ParseConfigFileHost = {
              ...ts.sys,
              onUnRecoverableConfigFileDiagnostic: (diagnostic) => {
                throw new Error(ts.flattenDiagnosticMessageText(diagnostic.messageText, '\n'));
              },
            };

          The host interface also requires getCurrentDirectory and
          useCaseSensitiveFileNames, both of which ts.sys provides.
        sources:
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/commandLineParser.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: convertCompilerOptionsFromJson
    import_path: "typescript"
    description: >
      Converts a JSON-shaped compilerOptions object (raw values from a tsconfig
      "compilerOptions" field) into a typed CompilerOptions object plus an
      errors[] array. Used when callers have already extracted "compilerOptions"
      from JSON and want to validate / coerce string enum values without running
      the full parseJsonConfigFileContent pipeline. Follows the same
      "errors in result, not throws" pattern as parseJsonConfigFileContent —
      callers who ignore result.errors silently use partial / default options.
    postconditions:
      # Evidence: node_modules/typescript@6.0.3/lib/typescript.js line 43815-43818
      # function convertCompilerOptionsFromJson(jsonOptions, basePath, configFileName) {
      #   const errors = [];
      #   const options = convertCompilerOptionsFromJsonWorker(jsonOptions, basePath, errors, configFileName);
      #   return { options, errors };
      # }
      # The worker (line 43829+) accumulates Diagnostics for unknown options,
      # wrong-type values, invalid enum strings — it never throws. The options
      # object may have valid keys applied and invalid ones silently skipped.
      - id: convertcompileroptions-errors-not-checked
        maturity: stable
        condition: >
          The caller destructures `{ options }` from the result and passes it to
          ts.createProgram or persists it to disk without inspecting
          result.errors. Common failures captured silently in errors[] include:
          unknown option names (typos like "extendend"), string values for enum
          fields outside the valid set (target: "ES2050"), wrong-typed values
          (strict: "true" instead of boolean true), and invalid paths/extends.
          The returned options object has whatever values WERE valid plus
          defaults for the invalid ones — compilation proceeds with silently
          wrong settings.
        returns: >
          { options: CompilerOptions, errors: Diagnostic[] } where errors may be
          non-empty. options contains successfully-converted entries; invalid
          entries are omitted (so missing target → default ES3, missing module →
          default CommonJS, etc.).
        required_handling: >
          Always inspect errors and abort on non-empty:

            import * as ts from 'typescript';

            const raw = JSON.parse(fs.readFileSync(configPath, 'utf8'));
            const { options, errors } = ts.convertCompilerOptionsFromJson(
              raw.compilerOptions,
              path.dirname(configPath),
              configPath
            );

            if (errors.length > 0) {
              errors.forEach(e =>
                console.error(ts.flattenDiagnosticMessageText(e.messageText, '\n'))
              );
              throw new Error(
                `Invalid compilerOptions in ${configPath}: ${errors.length} error(s)`
              );
            }

            // Safe to use options — fully validated
            const program = ts.createProgram(fileNames, options);

          For the common case (load + parse tsconfig.json from disk), prefer
          ts.getParsedCommandLineOfConfigFile, which handles the read + parse +
          extends-resolution in one call. Reach for
          convertCompilerOptionsFromJson only when the JSON object is already
          in memory (e.g. embedded in a parent config schema).
        sources:
          - "https://raw.githubusercontent.com/microsoft/TypeScript-wiki/main/Using-the-Compiler-API.md"
          - "https://github.com/microsoft/TypeScript/blob/main/src/compiler/commandLineParser.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed
