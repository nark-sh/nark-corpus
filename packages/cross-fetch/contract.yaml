package: cross-fetch
semver: ">=3.0.0 <5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed
description: Universal WHATWG Fetch API polyfill for Node, browsers, and React Native

functions:
  - name: fetch
    import_path: "cross-fetch"
    description: "Makes an HTTP request. Throws TypeError on network failure; does not throw on HTTP errors (4xx/5xx)."

    postconditions:
      # Evidence: 0 violations across 6 repos in scan-cross-fetch-2026-04-02.json
      # Note: low repo count (only 6 repos use cross-fetch in active corpus); clean scan confirms no uncaught patterns
      - id: network-error
        condition: "network failure occurs (DNS error, connection refused, socket closed, timeout)"
        throws: "TypeError"
        required_handling: >
          Caller MUST wrap await fetch() in a try-catch block to handle network-level TypeErrors.
          Unlike HTTP 4xx/5xx responses (which resolve normally), network failures throw TypeError
          and will cause unhandled promise rejection if uncaught. Additionally, callers should
          check response.ok for HTTP errors.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch"
          - "https://github.com/lquixada/cross-fetch"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
