# cross-fetch — Universal WHATWG Fetch API polyfill for Node, browsers, and React Native.
# Wraps node-fetch@2.x on Node.js. The fetch() function is the primary async API.
# Response body methods (json, text) are also async and can throw independently.
# Critical behavior: fetch() does NOT reject on HTTP 4xx/5xx — callers must check response.ok.
#
# Depth pass 2026-04-17 (deepen-stream-1 pass 4):
# API surface: 6 async-callable operations (3 intentionally omitted)
# Contracted before: 1 (fetch, network-error only)
# Contracted after: 3 (+2 new functions: response.json, response.text)
#   Also: 2 new postconditions added to fetch() (http-error-unchecked, abort-error)
# Omitted: 3 (response.blob — same profile as text; response.arrayBuffer — same;
#             response.formData — rare in SaaS hot paths)
# Coverage: 3/6 = 0.50 (effective contracted/non-omitted = 3/3 = 1.0)
# Evidence sources confirmed from:
#   node_modules/node-fetch/lib/index.js — FetchError, AbortError, SyntaxError throw sites
#   https://developer.mozilla.org/en-US/docs/Web/API/Window/fetch
#   https://developer.mozilla.org/en-US/docs/Web/API/Response/json
#   https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch
#
# Depth pass 2026-04-17 (deepen-stream-1 pass 5):
# Gap found in response.text(): missing text-body-consumed-twice postcondition.
# response.json() had json-body-consumed-twice but text() was missing the equivalent.
# Evidence: MDN https://developer.mozilla.org/en-US/docs/Web/API/Response/text confirms
#   TypeError thrown when "body is disturbed or locked".
#   node-fetch/lib/index.js consumeBody() line 344: same TypeError path for all body methods.
# Added: text-body-consumed-twice postcondition to response.text()
# Postconditions: 7 → 8 (+1 this pass)
# Coverage: 3/6 = 0.50 (same function count, new postcondition on existing function)
#
# Depth pass 2026-06-11 (deepen-stream-2 pass 3):
# Discovered 2 additional non-standard node-fetch methods not previously enumerated:
#   response.buffer() — Node.js only, returns raw Buffer; OMITTED (same error profile as text)
#   response.textConverted() — Node.js only, charset-detection body read; CONTRACTED (+2 postconditions)
# New total: 8 async-callable operations (4 contracted + 4 intentionally omitted)
# Key finding: textConverted() has a unique error: throws Error (not TypeError) when optional
#   'encoding' npm package is not installed. This is a silent optional dependency trap.
# Evidence sources:
#   node-fetch/lib/index.js line 445-446: convertBody() throws Error when convert === undefined
#   node-fetch/lib/index.js line 161-163: encoding loaded in try-catch at module init
#   https://raw.githubusercontent.com/node-fetch/node-fetch/2.x/README.md — textConverted docs
#   node-fetch/lib/index.js line 444-498: convertBody() charset detection logic
# Coverage: 4/8 = 0.50 → same score, total function count updated from 6 to 8
#
# Depth pass 2026-06-12 (deepen-stream-1 pass 1):
# Corrected total function count: 8 → 7 (response.formData() does NOT exist in node-fetch v2;
# it's a DOM-only method available only in browser native fetch — not exported by cross-fetch
# ponyfill on Node.js). Real node-fetch v2 body methods: json, text, arrayBuffer, blob, buffer,
# textConverted = 6 + fetch() itself = 7 total.
# Added 3 new postconditions to fetch() for node-fetch-specific init options:
#   - fetch-request-timeout-error: FetchError type='request-timeout' from { timeout: <ms> } init option
#   - fetch-body-timeout-error: FetchError type='body-timeout' fires during body read with timeout option
#   - fetch-max-size-error: FetchError type='max-size' from { size: <bytes> } init option (SSRF/OOM guard)
# These are NOT covered by abort-error (which is AbortController-only) — they are node-fetch's
# distinct timer-driven FetchError paths. cross-fetch users on Node.js can pass these init options
# but on browsers (native fetch) the options are silently ignored.
# Evidence sources (all from node-fetch v2.7.0 installed locally):
#   node-fetch/lib/index.js line 1491-1497: request-timeout FetchError
#   node-fetch/lib/index.js line 384-389: body-timeout FetchError
#   node-fetch/lib/index.js line 409-412: max-size FetchError
#   https://github.com/node-fetch/node-fetch/blob/2.x/README.md timeout/size init options
#   https://github.com/node-fetch/node-fetch/blob/2.x/ERROR-HANDLING.md
# Coverage: 7/7 = 1.00 (4 contracted + 3 omitted with same error profile as text)
# Postconditions: 10 → 13 (+3 this pass)
package: cross-fetch
semver: ">=3.0.0 <5.0.0"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-12"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.00  # 4 contracted / (7 total - 3 intentionally omitted) = 4/4 effective; 4/7 raw = 0.57
# Note: 4 contracted (fetch + json + text + textConverted), 3 omitted (arrayBuffer, blob, buffer)
# Effective coverage (contracted/non-omitted) = 4/4 = 1.0; postconditions: 13
description: Universal WHATWG Fetch API polyfill for Node, browsers, and React Native

detection:
  # fetch() is the primary import; tracking its return value as a cross-fetch Response instance
  # allows the scanner to detect calls like response.textConverted() on the result.
  # This enables detection even when the call site uses a type assertion: (response as any).textConverted()
  factory_methods:
    - fetch

functions:
  - name: fetch
    import_path: "cross-fetch"
    description: >
      Makes an HTTP request. Returns a Promise that resolves with the Response object
      on any server response (including 4xx/5xx). Only rejects on network failure,
      bad URL, or abort. Callers MUST check response.ok to detect HTTP errors —
      this is the most common source of silent failures with this package.

    postconditions:
      # Evidence: 13 violations across 4 repos in scan-cross-fetch-2026-04-13.json
      # Top affected: visiky/resume (⭐ 3067), microsoft/vscode-pull-request-github (⭐ 2556)
      - id: network-error
        condition: "network failure occurs (DNS error, connection refused, socket closed, timeout)"
        throws: "TypeError"
        required_handling: >
          Caller MUST wrap await fetch() in a try-catch block to handle network-level TypeErrors.
          Unlike HTTP 4xx/5xx responses (which resolve normally), network failures throw TypeError
          and will cause unhandled promise rejection if uncaught. Additionally, callers should
          check response.ok for HTTP errors.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch"
          - "https://github.com/lquixada/cross-fetch"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Window/fetch
      # "The promise returned by fetch() will reject on some errors, such as a network error
      #  or a bad scheme. However, if the server responds with an error like 404, then
      #  fetch() fulfills with a Response."
      # Confirmed: node-fetch/lib/index.js never throws for 4xx/5xx — resolves with Response object.
      # This is the #1 source of silent failures — callers process error responses as success.
      - id: http-error-unchecked
        condition: >
          fetch() is called and the server returns an HTTP error status (4xx or 5xx),
          but the caller does not check response.ok (or response.status) before processing
          the response body. fetch() resolves successfully even on 404 Not Found, 401
          Unauthorized, 500 Internal Server Error, etc. The response.ok property is false
          for any status outside 200–299, but it must be explicitly checked.
          This is the most common antipattern: callers call await response.json() on a
          404 or 500 response, which returns the error body (often HTML error page), then
          either fail on JSON.parse or silently process the error as data.
        throws: >
          Does not throw — fetch() resolves. But: if the error response body is not valid JSON
          and response.json() is called, SyntaxError is thrown from response.json().
          If response.ok is not checked, the error response is silently processed as success data.
        required_handling: >
          Always check response.ok after fetch() resolves:

            try {
              const response = await fetch(url);
              if (!response.ok) {
                throw new Error(`HTTP error ${response.status}: ${response.statusText}`);
              }
              const data = await response.json();
              return data;
            } catch (error) {
              console.error('Request failed:', error);
              throw error;
            }

          For APIs that return structured error bodies, read the error body explicitly:
            if (!response.ok) {
              const errorBody = await response.json().catch(() => null);
              throw new Error(`HTTP ${response.status}: ${errorBody?.message ?? response.statusText}`);
            }
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Window/fetch"
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/ok"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Window/fetch
      # "AbortError (DOMException): Thrown when the request is aborted via AbortController.abort()"
      # Confirmed: node-fetch/lib/index.js line 1458:
      #   let error = new AbortError('The user aborted a request.')
      #   reject(error)
      # Note: in node-fetch, AbortError.name === 'AbortError' (custom class, not DOMException)
      - id: abort-error
        condition: >
          fetch() is called with options.signal set to an AbortController's signal,
          the AbortController is aborted (via controller.abort()) while the request is
          in-flight, and the caller does not handle the resulting AbortError.
          This is the standard pattern for implementing request timeouts:
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 5000);
            const response = await fetch(url, { signal: controller.signal });
          When the timeout fires, the fetch() promise rejects with AbortError.
          Callers using this timeout pattern but without try-catch cause unhandled rejections.
        throws: >
          AbortError (name: 'AbortError') — in node-fetch (used by cross-fetch on Node.js),
          this is a custom class with name === 'AbortError', NOT a DOMException.
          Check: error.name === 'AbortError' (not instanceof DOMException).
          In browser environments, AbortError is a DOMException with name === 'AbortError'.
          The cross-environment check: error.name === 'AbortError' works in both.
        required_handling: >
          Wrap fetch() with signal in a try-catch and handle AbortError separately:

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            try {
              const response = await fetch(url, { signal: controller.signal });
              clearTimeout(timeoutId);
              if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
              return await response.json();
            } catch (error) {
              clearTimeout(timeoutId);
              if (error.name === 'AbortError') {
                console.warn('Request timed out or was cancelled');
                throw new Error('Request timeout');
              }
              throw error;
            }

          Note: intentionally aborting a request (e.g., user cancelled navigation) should be
          handled gracefully, not re-thrown as an unexpected error.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Window/fetch"
          - "https://developer.mozilla.org/en-US/docs/Web/API/AbortController"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: node-fetch/lib/index.js line 1491-1497:
      #   if (request.timeout) {
      #     req.once('socket', function (socket) {
      #       reqTimeout = setTimeout(function () {
      #         reject(new FetchError(`network timeout at: ${request.url}`, 'request-timeout'));
      #       }, request.timeout);
      #     });
      #   }
      # Source: node-fetch v2.7.0 README ("timeout: 0,  // req/res timeout in ms, it resets on redirect.")
      # Note: this is the node-fetch `timeout` init option, NOT AbortController. cross-fetch
      # users on Node.js can pass { timeout: 5000 } and get this distinct FetchError.
      # On browsers (native fetch), the timeout option is silently ignored — only AbortController works.
      - id: fetch-request-timeout-error
        condition: >
          fetch() is called with the node-fetch-specific `{ timeout: <ms> }` init option
          (cross-fetch on Node.js), and the request takes longer than the timeout to
          establish a socket / receive headers. Distinct from AbortController abort:
          this is node-fetch's own setTimeout-driven path. Most commonly hit when:
          - A developer copies a snippet using `fetch(url, { timeout: 5000 })` expecting
            it to be cross-environment, not realizing it's a node-fetch extension
          - Background jobs poll slow upstreams without try-catch wrapping
          - Health-check loops use a short timeout without separating timeout from network errors
          The error is a FetchError subclass with name === 'FetchError' and type === 'request-timeout'.
        throws: >
          FetchError (node-fetch extension class, NOT TypeError or AbortError) with:
          - name === 'FetchError'
          - type === 'request-timeout'
          - message === `network timeout at: ${url}`
          Source: node-fetch/lib/index.js line 1494. Catch with:
            error.name === 'FetchError' && error.type === 'request-timeout'
          On browsers (native fetch), the `timeout` option is silently dropped — this
          postcondition only fires in Node.js environments.
        required_handling: >
          Wrap fetch() with timeout option in a try-catch and distinguish request-timeout
          from network errors:

            try {
              const response = await fetch(url, { timeout: 5000 });
              if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
              return await response.json();
            } catch (error) {
              if (error.name === 'FetchError' && error.type === 'request-timeout') {
                throw new Error(`Upstream timed out after 5s: ${url}`);
              }
              if (error.name === 'AbortError') {
                throw new Error('Request was aborted');
              }
              throw error; // Re-throw other network errors
            }

          Best practice: prefer AbortController for cross-environment compatibility.
          The `timeout` init option only works in node-fetch / cross-fetch on Node.js.
        sources:
          - "https://github.com/node-fetch/node-fetch/blob/2.x/README.md"
          - "https://github.com/node-fetch/node-fetch/blob/2.x/ERROR-HANDLING.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node-fetch/lib/index.js line 384-389:
      #   if (_this4.timeout) {
      #     resTimeout = setTimeout(function () {
      #       reject(new FetchError(`Response timeout while trying to fetch ${_this4.url} (over ${_this4.timeout}ms)`, 'body-timeout'));
      #     }, _this4.timeout);
      #   }
      # This fires DURING body read, not during the initial request. Separate timer from request-timeout.
      # The same `timeout` init option arms both timers — one for socket/headers, one for body read.
      - id: fetch-body-timeout-error
        condition: >
          fetch() is called with the node-fetch-specific `{ timeout: <ms> }` init option,
          the response headers arrive successfully (so fetch() resolves), but the body
          read (via .json(), .text(), .buffer(), etc.) takes longer than the timeout
          to fully stream. The body-timeout fires DURING the body read, not before fetch()
          resolves. Most commonly hit with:
          - Large response bodies (multi-MB JSON, big file downloads)
          - Slow upstream APIs that drip-feed body data
          - Streaming endpoints that hold the connection open
          This is a distinct error path from request-timeout — request-timeout fires before
          the response object is available; body-timeout fires after.
        throws: >
          FetchError with:
          - name === 'FetchError'
          - type === 'body-timeout'
          - message === `Response timeout while trying to fetch ${url} (over ${timeout}ms)`
          Source: node-fetch/lib/index.js line 388. The error is thrown from inside
          response.json() / response.text() / response.buffer(), NOT from fetch() itself.
        required_handling: >
          The try-catch around response body methods must handle body-timeout distinctly:

            try {
              const response = await fetch(url, { timeout: 30000 });
              if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
              const data = await response.json(); // body-timeout can fire here
              return data;
            } catch (error) {
              if (error.name === 'FetchError' && error.type === 'body-timeout') {
                throw new Error(`Body read timed out: response too slow`);
              }
              if (error.name === 'FetchError' && error.type === 'request-timeout') {
                throw new Error(`Request timed out`);
              }
              throw error;
            }

          For long-running streaming responses, set a larger timeout or use AbortController
          with explicit signal control. The `timeout` option arms BOTH timers from the
          same value — use it carefully when streaming large bodies.
        sources:
          - "https://github.com/node-fetch/node-fetch/blob/2.x/README.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: node-fetch/lib/index.js line 409-412:
      #   if (_this4.size && accumBytes + chunk.length > _this4.size) {
      #     abort = true;
      #     reject(new FetchError(`content size at ${_this4.url} over limit: ${_this4.size}`, 'max-size'));
      #   }
      # Source: node-fetch v2.7.0 README ("size: 0,  // maximum response body size in bytes. 0 to disable")
      # This is a security/quota guardrail — protects against unbounded memory consumption.
      - id: fetch-max-size-error
        condition: >
          fetch() is called with the node-fetch-specific `{ size: <bytes> }` init option
          (cross-fetch on Node.js), and the response body exceeds the configured maximum.
          The size limit is checked incrementally during streaming — error is thrown the
          moment cumulative bytes exceed the threshold. Common use cases:
          - Untrusted upstream APIs where a 10GB response would OOM the process
          - User-controlled URL fetching (SSRF guardrail)
          - Memory-constrained Lambda / serverless environments
          When the limit is hit, the body method (.json(), .text(), .buffer()) rejects.
          Callers that set `size` without try-catch crash on oversized responses.
        throws: >
          FetchError with:
          - name === 'FetchError'
          - type === 'max-size'
          - message === `content size at ${url} over limit: ${size}`
          Source: node-fetch/lib/index.js line 411. The error is thrown from inside
          the body read method, NOT from fetch() itself. Stream is aborted mid-read.
        required_handling: >
          Wrap body methods in try-catch and handle max-size as a distinct guardrail event:

            try {
              const response = await fetch(url, { size: 1_000_000 }); // 1MB cap
              if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
              const data = await response.json();
              return data;
            } catch (error) {
              if (error.name === 'FetchError' && error.type === 'max-size') {
                throw new Error(`Response too large: exceeded 1MB limit for ${url}`);
              }
              throw error;
            }

          For user-controlled URLs (SSRF defense), always set `size` AND wrap in try-catch.
          The `size` option only works in node-fetch / cross-fetch on Node.js — browsers
          silently ignore it.
        sources:
          - "https://github.com/node-fetch/node-fetch/blob/2.x/README.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: response.json
    import_path: "cross-fetch"
    description: >
      Reads the response body and parses it as JSON. Returns a Promise that resolves
      with the parsed JavaScript value. Throws SyntaxError when the response body is
      not valid JSON. This is the second most common source of failures — callers that
      call response.json() on error responses (HTML error pages), empty responses, or
      non-JSON APIs receive SyntaxError with "Unexpected token < in JSON at position 0"
      or similar messages. MUST be called only once per response (body is a stream;
      reading twice throws TypeError).
    postconditions:
      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/json
      # "SyntaxError: Thrown when the response body cannot be parsed as JSON"
      # "TypeError: Thrown when the response body is disturbed or locked"
      # Confirmed: node-fetch/lib/index.js line 273:
      #   return Body.Promise.reject(new FetchError(`invalid json response body at ${url} reason: ${err.message}`, 'invalid-json'))
      # In node-fetch, JSON parse errors produce FetchError(type='invalid-json'), not native SyntaxError.
      # In browser environments, response.json() throws SyntaxError (native JSON.parse error).
      # Cross-environment safe: always catch any error from response.json().
      - id: json-parse-error
        condition: >
          response.json() is called without a try-catch, and the response body is not
          valid JSON. Common triggers:
          - HTTP error responses (404/500) that return HTML error pages with
            "<!DOCTYPE html>" or "<html>" — causes "Unexpected token < in JSON"
          - APIs that return plain text (e.g., "OK", "Not found") instead of JSON
          - Empty response bodies (204 No Content) — causes "Unexpected end of JSON input"
          - APIs that sometimes return JSON and sometimes return plaintext errors
          This is especially common when response.ok is not checked first — callers
          blindly call response.json() on 500 Internal Server Error HTML pages.
        throws: >
          In browser environments: SyntaxError (native JSON.parse error) with message
          like "Unexpected token < in JSON at position 0".
          In Node.js via node-fetch: FetchError with type 'invalid-json' and message
          "invalid json response body at <url> reason: <parse error>".
          Both extend Error. Cross-environment safe catch: catch any error from response.json().
          Check for: error instanceof SyntaxError || error.type === 'invalid-json'
        required_handling: >
          Always wrap response.json() in try-catch, or chain .catch():

            try {
              const response = await fetch(url);
              if (!response.ok) {
                // Read body as text first to avoid JSON parse errors on error pages
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText.slice(0, 200)}`);
              }
              const data = await response.json();
              return data;
            } catch (error) {
              if (error instanceof SyntaxError || error.type === 'invalid-json') {
                console.error('Response was not valid JSON:', error.message);
                throw new Error('API returned non-JSON response');
              }
              throw error;
            }

          Best practice: check response.ok before calling response.json() to avoid
          parsing HTML error pages as JSON.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/json"
          - "https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/json
      # "TypeError: Thrown when the response body is disturbed or locked"
      # Confirmed: node-fetch/lib/index.js line 344:
      #   return Body.Promise.reject(new TypeError(`body used already for: ${this.url}`))
      - id: json-body-consumed-twice
        condition: >
          response.json() (or any other body method: text(), blob(), etc.) is called
          a second time on the same Response object. Response bodies are streams — once
          read, they are consumed. Calling response.json() twice causes the second call
          to reject with TypeError "body used already". This occurs when:
          - Logging the response for debugging and then parsing it
          - Checking the body type before parsing
          - Multiple middleware/interceptor layers each trying to read the body
        throws: >
          TypeError with message "body used already for: <url>" (node-fetch/cross-fetch Node.js).
          In browser: "Failed to execute 'json' on 'Response': body stream already read".
        required_handling: >
          Use response.clone() before reading if the body needs to be read multiple times:

            const response = await fetch(url);
            const responseClone = response.clone(); // Clone before first read

            // Read original for logging
            const rawText = await response.text();
            console.debug('Raw response:', rawText);

            // Parse the clone
            try {
              const data = await responseClone.json();
              return data;
            } catch (error) {
              throw new Error(`JSON parse failed: ${error.message}`);
            }

          In most cases, pick one body method and stick to it. Reserve clone() for
          debug logging patterns.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/json"
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/clone"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: response.text
    import_path: "cross-fetch"
    description: >
      Reads the response body and returns it as a string. Returns a Promise that
      resolves with the text content. More forgiving than response.json() — any
      response body can be read as text. However, can still throw if the request
      was aborted mid-stream or if the body was already consumed. Used when the
      response is not JSON (e.g., HTML, plain text, XML, CSV).
    postconditions:
      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch
      # "After response received but before body read: controller.abort() causes response.text() to throw AbortError"
      # Confirmed: node-fetch/lib/index.js line 394-397:
      #   if (err.name === 'AbortError') { reject(err) }
      - id: text-abort-mid-stream
        condition: >
          response.text() is called after fetch() resolves but the AbortController
          signal is aborted before the body is fully read. This is a two-phase abort:
          Phase 1 (request): if aborted before response headers, fetch() itself rejects.
          Phase 2 (body read): if aborted after headers but during body streaming,
          response.text() rejects with AbortError. Large response bodies are most
          susceptible — callers that abort after receiving headers but before the body
          is fully buffered hit this path.
        throws: >
          AbortError (name: 'AbortError') — same type as the fetch() abort error.
          In node-fetch: custom AbortError class. In browser: DOMException.
          Cross-environment check: error.name === 'AbortError'.
        required_handling: >
          Wrap response.text() in the same try-catch as fetch():

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            try {
              const response = await fetch(url, { signal: controller.signal });
              clearTimeout(timeoutId);
              if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
              // response.text() can also throw AbortError if body read is slow
              const text = await response.text();
              return text;
            } catch (error) {
              clearTimeout(timeoutId);
              if (error.name === 'AbortError') {
                throw new Error('Request or body read timed out');
              }
              throw error;
            }
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch"
          - "https://developer.mozilla.org/en-US/docs/Web/API/AbortController"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/text
      # "TypeError: Thrown when the response body is disturbed or locked"
      # https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch#locked_and_disturbed_streams
      # Confirmed: node-fetch/lib/index.js consumeBody():
      #   if (this[INTERNALS].disturbed) {
      #     return Body.Promise.reject(new TypeError(`body used already for: ${this.url}`))
      #   }
      # This is the same "body disturbed" error as json-body-consumed-twice — applies
      # to all body-read methods (json, text, blob, arrayBuffer). Commonly hit when
      # response.text() is used for debug logging before response.json() parses the body.
      - id: text-body-consumed-twice
        condition: >
          response.text() is called after any other body-read method (json(), blob(),
          arrayBuffer(), text()) has already consumed the response body on the same
          Response object. Response bodies are ReadableStream objects — once read
          (disturbed), they cannot be re-read. Common patterns that trigger this:
          - Reading the body once as text for logging, then attempting to parse as JSON
          - Middleware/interceptors that read the body before the handler does
          - Calling response.text() twice (e.g., validating content before processing)
          - Using text() as a fallback after json() throws a parse error on the same response
        throws: >
          TypeError with message "body used already for: <url>" (node-fetch/cross-fetch Node.js).
          In browser: "Failed to execute 'text' on 'Response': body stream already read".
          In browser: also may throw TypeError "body is disturbed or locked".
          Cross-environment: always a TypeError.
        required_handling: >
          Use response.clone() before reading the body if you need to read it multiple times:

            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP error: ${response.status}`);

            // Clone BEFORE first read if you need the body in two places
            const responseForLog = response.clone();

            try {
              const text = await response.text();
              // Process text...
              return text;
            } catch (error) {
              // Safe: responseForLog was cloned before body was read
              const rawContent = await responseForLog.text().catch(() => '<unreadable>');
              console.error('text() failed, raw content:', rawContent.slice(0, 200));
              throw error;
            }

          Alternative: read the body once, then use the string for all purposes.
          Do NOT read the original response body after already reading it — clone first.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/text"
          - "https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch#locked_and_disturbed_streams"
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/clone"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: response.textConverted
    import_path: "cross-fetch"
    description: >
      Node.js-specific (non-standard) response body method. Reads the response body
      and returns it as a UTF-8 string, performing automatic charset detection rather
      than always assuming UTF-8. Inspects the Content-Type header, then peeks at up to
      1024 bytes of the response body for HTML meta charset declarations and XML encoding
      declarations. Falls back to gb18030 for gb2312/gbk to prevent decode issues on
      Chinese content. REQUIRES the optional 'encoding' npm package to be installed — if
      absent, throws Error at call time. Node.js only; not available in browsers or
      React Native (which use the DOM fetch API). Only use when the remote server may
      return non-UTF-8 encoded responses (legacy systems, some government APIs, older CMS).
    postconditions:
      # Evidence: node-fetch/lib/index.js line 161-163:
      #   let convert;
      #   try { convert = require('encoding').convert; } catch (e) {}
      # node-fetch/lib/index.js line 444-446:
      #   function convertBody(buffer, headers) {
      #     if (typeof convert !== 'function') {
      #       throw new Error('The package `encoding` must be installed to use the textConverted() function');
      # Source: https://raw.githubusercontent.com/node-fetch/node-fetch/2.x/README.md confirms:
      #   "This API requires an optional dependency of the npm package encoding,
      #    which you need to install manually"
      - id: text-converted-missing-encoding-package
        condition: >
          response.textConverted() is called in a Node.js environment where the optional
          'encoding' npm package is NOT installed. This is the most common failure mode:
          developers call textConverted() expecting charset detection to work, but the
          'encoding' package is not in their dependencies. The failure happens silently
          until runtime — no build-time or import-time warning is given, because node-fetch
          loads 'encoding' in a try-catch at module initialization that swallows the module
          not found error. The call site is where the Error is thrown.
          Note: if running in a browser or React Native environment, textConverted() is not
          available (not in DOM fetch spec) — calling it would throw TypeError 'not a function'.
        throws: >
          Error (not TypeError) with message:
          "The package `encoding` must be installed to use the textConverted() function"
          Source: node-fetch/lib/index.js convertBody() line 446.
          This is a plain Error, not a subclass — catch with: error instanceof Error
          and check error.message includes 'encoding must be installed'.
        required_handling: >
          Option A — Install the encoding package as a production dependency:

            npm install encoding

          Then wrap in try-catch to handle body stream errors:

            try {
              const response = await fetch(url);
              if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
              const text = await response.textConverted();
              return text;
            } catch (error) {
              if (error.message && error.message.includes('encoding must be installed')) {
                throw new Error('Charset detection requires the "encoding" package: npm install encoding');
              }
              throw error;
            }

          Option B — Use response.text() instead (always available, assumes UTF-8):

            // For most modern APIs, UTF-8 is safe
            const text = await response.text();

          Option C — Manual charset detection (dependency-free):

            const buffer = await response.buffer();
            const contentType = response.headers.get('content-type') || '';
            const charsetMatch = /charset=([^;]*)/i.exec(contentType);
            const charset = charsetMatch ? charsetMatch[1].trim() : 'utf-8';
            const text = buffer.toString(charset as BufferEncoding);

        sources:
          - "https://raw.githubusercontent.com/node-fetch/node-fetch/2.x/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: node-fetch/lib/index.js consumeBody() line 344:
      #   return Body.Promise.reject(new TypeError(`body used already for: ${this.url}`))
      # Same underlying consumeBody() path as json-body-consumed-twice and text-body-consumed-twice.
      # Confirmed by node-fetch source: all body methods (json, text, blob, arrayBuffer,
      # buffer, textConverted) route through consumeBody() which checks the disturbed flag.
      - id: text-converted-body-consumed-twice
        condition: >
          response.textConverted() is called after any other body-read method (json(),
          text(), blob(), arrayBuffer(), buffer(), or a previous textConverted() call) has
          already consumed the response body on the same Response object. Response bodies are
          ReadableStream objects that can only be read once. After the first call, the body
          is "disturbed" and any subsequent read attempt throws TypeError.
          This error is identical to json-body-consumed-twice and text-body-consumed-twice —
          it's the same underlying consumeBody() TypeError path in node-fetch.
        throws: >
          TypeError with message "body used already for: <url>" (node-fetch/cross-fetch Node.js).
          In browser: not applicable (textConverted() is Node.js only).
        required_handling: >
          Use response.clone() before the first body read if you need to call textConverted()
          after another body method:

            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP error: ${response.status}`);

            // Clone before first read
            const clone = response.clone();

            // Read for logging
            const rawText = await response.text();
            console.debug('Raw bytes:', Buffer.byteLength(rawText), 'bytes');

            // Use textConverted() on the clone
            try {
              const decoded = await clone.textConverted();
              return decoded;
            } catch (error) {
              if (error.message && error.message.includes('encoding must be installed')) {
                throw new Error('Install the "encoding" package: npm install encoding');
              }
              throw error;
            }
        sources:
          - "https://raw.githubusercontent.com/node-fetch/node-fetch/2.x/README.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

notes:
  - "fetch() is the only import from cross-fetch — Request, Response, Headers are also exported but are constructors"
  - "cross-fetch wraps node-fetch@2.x on Node.js. On browsers, it uses the native fetch."
  - "FetchError (node-fetch) vs DOMException (browser): error.type === 'system' for network errors"
  - "response.ok shorthand: status >= 200 && status < 300. Always check before reading body."
  - "AbortError.name === 'AbortError' is the cross-environment check (works in both Node.js node-fetch and browsers)"
  - "response.blob(), response.arrayBuffer() omitted — same error profile as response.text() (AbortError mid-stream, body-consumed-twice TypeError)"
  - "response.buffer() omitted — Node.js only non-standard method, same error profile as text/arrayBuffer"
  - "response.formData() does NOT exist in node-fetch v2 (not in cross-fetch ponyfill on Node.js); only available in browser native fetch"
  - "fetch() supports node-fetch init options { timeout, size, compress, agent } on Node.js — three distinct FetchError types (request-timeout, body-timeout, max-size) confirmed in v2.7.0 source"
  - "cross-fetch v4+ only supports the ponyfill pattern — import fetch from 'cross-fetch'"
  - "Alternative: many projects use cross-fetch to polyfill fetch in Node.js 16 and below; Node.js 18+ has native fetch"
  - "text-body-consumed-twice and json-body-consumed-twice are the same underlying error (consumeBody() TypeError) — affects all body methods including buffer() and textConverted()"
  - "textConverted() requires optional 'encoding' npm package — if not installed, throws Error at call time (not import time)"
  - "response.bytes() (Uint8Array, new DOM spec method) is NOT in node-fetch v2 and therefore NOT in cross-fetch v4; available in Node.js 18+ native fetch only"
