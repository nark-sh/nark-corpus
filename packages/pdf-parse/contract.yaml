package: pdf-parse
semver: ">=2.0.0 <3.0.0"
contract_version: "1.0.0"
maintainer: "agent-batch-wave-16"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed

functions:
  - name: pdf
    import_path: "pdf-parse"
    description: "Default export function for parsing PDF from a Buffer (v1 API). Returns metadata and text content."

    postconditions:
      # Evidence: 3 primary firings across 3 repos in scan-pdf-parse-2026-04-03.json
      # Top affected: cline/cline (⭐ 59274 stars), getomni-ai/zerox (⭐ 12190 stars)
      - id: pdf-func-no-try-catch
        condition: "pdf(buffer) called without try-catch or .catch() handler"
        throws: "InvalidPDFException | PasswordException | FormatError | ResponseException | AbortException | UnknownErrorException"
        required_handling: >
          Caller MUST wrap await pdf(buffer) in try-catch. The function can throw multiple documented
          exception types for malformed PDFs, password-protected files, network failures (when loading
          from URL), and other pdfjs errors. Silent failure means corrupted data is silently swallowed.
        sources:
          - "https://raw.githubusercontent.com/mehmet-kozan/pdf-parse/main/README.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: PDFParse.getText
    import_path: "pdf-parse"
    description: "Instance method to extract text from a PDF. Part of the v2 class-based API."

    postconditions:
      # Evidence: 2 primary firings across 2 repos in scan-pdf-parse-2026-04-03.json
      # Top affected: ItzCrazyKns/Vane (⭐ 33343 stars), p2r3/convert (⭐ 2957 stars)
      - id: get-text-no-try-catch
        condition: "parser.getText() called without try-catch or .catch() handler"
        throws: "InvalidPDFException | PasswordException | FormatError | ResponseException | AbortException | UnknownErrorException"
        required_handling: >
          Caller MUST wrap await parser.getText() in try-catch. Same exception types apply as the
          functional API. Additionally, destroy() should be called in finally block to free memory.
        sources:
          - "https://raw.githubusercontent.com/mehmet-kozan/pdf-parse/main/README.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: get-text-generic-catch
        condition: "parser.getText() in try-catch but catch block doesn't differentiate PasswordException"
        throws: "PasswordException"
        required_handling: >
          When handling user-uploaded PDFs, caller SHOULD check for PasswordException specifically
          to return a user-friendly error (e.g. "PDF is password-protected") rather than a generic
          500 error.
        sources:
          - "https://raw.githubusercontent.com/mehmet-kozan/pdf-parse/main/README.md"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: PDFParse.getInfo
    import_path: "pdf-parse"
    description: "Instance method to extract metadata and document information from a PDF."

    postconditions:
      - id: get-info-no-try-catch
        condition: "parser.getInfo() called without try-catch or .catch() handler"
        throws: "InvalidPDFException | PasswordException | FormatError"
        required_handling: >
          Caller MUST wrap await parser.getInfo() in try-catch. Can throw same exception types as
          getText(). Always call destroy() in finally block.
        sources:
          - "https://raw.githubusercontent.com/mehmet-kozan/pdf-parse/main/README.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
