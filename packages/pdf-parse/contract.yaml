  - name: PDFParse.getImage
    import_path: "pdf-parse"
    description: >
      Instance method to extract embedded images from each page of a PDF document.
      Returns an ImageResult containing per-page arrays of images with optional
      raw buffer and dataUrl output. Internally calls load() which triggers PDF
      parsing, so all PDF-level exceptions apply.

    postconditions:
      # Evidence: PDFParse.js source confirmed — getImage() calls this.load() which throws
      # getException(error) converting pdfjs errors to typed exceptions.
      # Additional: convertToRGBA() throws generic Error for unsupported image kinds.
      # Source: https://github.com/mehmet-kozan/pdf-parse/blob/main/src/PDFParse.ts
      - id: get-image-no-try-catch
        condition: "parser.getImage() called without try-catch or .catch() handler"
        throws: >
          InvalidPDFException | PasswordException | FormatError | ResponseException |
          AbortException | UnknownErrorException (all via load() → getException()).
          Also throws generic Error for unsupported/unrecognizable image pixel formats
          (convertToRGBA: Unsupported image kind / Cannot infer image format).
        required_handling: >
          Caller MUST wrap await parser.getImage() in try-catch. The method calls
          load() internally, so all PDF-level exceptions apply. Additionally, malformed
          embedded image data in otherwise-valid PDFs can trigger internal canvas
          errors that are distinct from PDF parse errors. Always call destroy() in
          finally block to prevent memory leaks.

          try {
            const images = await parser.getImage({ imageDataUrl: true });
            return images.pages;
          } catch (error) {
            if (error instanceof InvalidPDFException) {
              throw new Error('Document is not a valid PDF');
            }
            if (error instanceof PasswordException) {
              throw new Error('PDF is password-protected');
            }
            throw error;
          } finally {
            await parser.destroy();
          }
        sources:
          - "https://github.com/mehmet-kozan/pdf-parse/blob/main/README.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: PDFParse.getScreenshot
    import_path: "pdf-parse"
    description: >
      Instance method to render PDF pages as raster screenshots (PNG). Requires a
      canvas environment (node-canvas in Node.js or browser Canvas API). Returns a
      ScreenshotResult with per-page rendered images. Internally calls load() so all
      PDF-level exceptions apply, plus canvas-specific runtime errors.

    postconditions:
      # Evidence: PDFParse.js source confirmed — getScreenshot() calls this.load(),
      # throws 'PDF document not loaded' if doc is undefined post-load, and relies on
      # doc.canvasFactory which throws if canvas is not available in the environment.
      # Source: https://github.com/mehmet-kozan/pdf-parse/blob/main/src/PDFParse.ts
      - id: get-screenshot-no-try-catch
        condition: "parser.getScreenshot() called without try-catch or .catch() handler"
        throws: >
          InvalidPDFException | PasswordException | FormatError | ResponseException |
          AbortException | UnknownErrorException (via load()).
          Also throws generic Error('PDF document not loaded') if load fails silently,
          and canvas-related errors if node-canvas is not installed in Node.js
          (TypeError: Cannot read properties of undefined — canvasFactory not configured).
        required_handling: >
          Caller MUST wrap await parser.getScreenshot() in try-catch. This method is
          particularly sensitive to the runtime environment — in Node.js, it requires
          node-canvas to be installed and configured. Missing canvas support causes
          runtime errors that are distinct from PDF parse errors. Always call destroy()
          in finally block.

          try {
            const screenshots = await parser.getScreenshot({ scale: 1.5 });
            return screenshots.pages;
          } catch (error) {
            if (error instanceof InvalidPDFException) {
              throw new Error('Cannot render — invalid PDF document');
            }
            throw error;
          } finally {
            await parser.destroy();
          }
        sources:
          - "https://github.com/mehmet-kozan/pdf-parse/blob/main/README.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: PDFParse.getTable
    import_path: "pdf-parse"
    description: >
      Instance method to detect and extract tabular data from PDF pages by analysing
      vector drawing operators (rectangles, lines). Returns a TableResult with per-page
      table arrays. Internally calls load() — all PDF-level exceptions apply.

    postconditions:
      # Evidence: PDFParse.js source confirmed — getTable() calls this.load(),
      # throws 'PDF document not loaded' guard check, then iterates pages.
      # Source: https://github.com/mehmet-kozan/pdf-parse/blob/main/src/PDFParse.ts
      - id: get-table-no-try-catch
        condition: "parser.getTable() called without try-catch or .catch() handler"
        throws: >
          InvalidPDFException | PasswordException | FormatError | ResponseException |
          AbortException | UnknownErrorException (via load()).
          Also throws generic Error('PDF document not loaded') on invalid state.
        required_handling: >
          Caller MUST wrap await parser.getTable() in try-catch. PDFs without vector
          drawing operators return empty table arrays (no error) — but malformed or
          password-protected PDFs throw on load. Always call destroy() in finally block.

          try {
            const tables = await parser.getTable({ partial: [1, 2, 3] });
            return tables.pages;
          } catch (error) {
            if (error instanceof PasswordException) {
              throw new Error('PDF is password-protected — cannot extract tables');
            }
            throw error;
          } finally {
            await parser.destroy();
          }
        sources:
          - "https://github.com/mehmet-kozan/pdf-parse/blob/main/README.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getHeader
    import_path: "pdf-parse/node"
    description: >
      Node.js-only utility function (imported from 'pdf-parse/node') that performs
      an HTTP HEAD request to retrieve headers and optionally validates PDF magic
      bytes via a range request. Returns a HeaderResult object — NEVER throws.
      All errors are caught internally and returned in the result.error field.

    postconditions:
      # Evidence: getHeader.js source confirmed — entire function body is wrapped in
      # try/catch that returns { ok: false, error: new Error(String(error)) } on failure.
      # This means callers who skip .ok check will silently proceed with invalid data.
      # Source: https://github.com/mehmet-kozan/pdf-parse/blob/main/src/node/getHeader.ts
      - id: get-header-ok-not-checked
        condition: >
          getHeader() return value used without checking result.ok before accessing
          result.status, result.size, result.headers, or result.magic
        throws: >
          Never throws — all errors caught internally.
          Returns { ok: false, status: undefined, size: undefined, magic: false,
          headers: {}, error: Error } on any network failure (ECONNREFUSED, ENOTFOUND,
          ETIMEDOUT, invalid URL, HTTP error status).
        required_handling: >
          Caller MUST check result.ok before treating the result as valid. Skipping
          this check means network failures are silently ignored — the PDF URL is
          treated as valid even when unreachable, causing downstream load() calls to
          fail with a harder-to-diagnose error.

          // WRONG — silent failure on network error:
          const result = await getHeader(url, true);
          if (result.magic) { /* assumes ok */ }

          // CORRECT — check ok first:
          const result = await getHeader(url, true);
          if (!result.ok) {
            throw new Error(`PDF URL unreachable: ${result.error?.message}`);
          }
          if (!result.magic) {
            throw new Error('URL does not point to a valid PDF file');
          }
        sources:
          - "https://github.com/mehmet-kozan/pdf-parse/blob/main/src/node/getHeader.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
