# Security-critical JWT library. jwt.verify() is an auth boundary — missing error handling = auth bypass or crash.
# CVE-2015-9235: Always specify algorithms option. CVE-2022-23529, CVE-2022-23540: Fixed in v9.0.0.
# NEVER use jwt.decode() for authentication — does not verify signatures.
package: jsonwebtoken
semver: ">=9.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 3/3 contracted functions (verify, sign, decode)

functions:
  - name: verify
    import_path: "jsonwebtoken"
    description: "Verifies a JWT token signature and returns decoded payload - CRITICAL security boundary"

    postconditions:
      # Evidence: 16 primary firings across 10 repos in scan-jsonwebtoken-2026-04-02.json
      # Top affected: juice-shop/juice-shop, purocean/yn, lujakob/nestjs-realworld-example-app
      - id: verify-token-expired
        condition: "token's exp claim is before current time"
        throws: "TokenExpiredError: jwt expired"
        required_handling: >
          Caller MUST wrap jwt.verify() in try-catch block or use callback error-first pattern.
          TokenExpiredError indicates legitimate expiration - handle gracefully with 401 response
          and prompt user to refresh token or re-authenticate.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#errors--codes"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: verify-token-not-active
        condition: "token's nbf claim is after current time"
        throws: "NotBeforeError: jwt not active"
        required_handling: >
          Caller MUST handle NotBeforeError. Token is valid but not yet active.
          Either reject with 401 or retry after specified date.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#errors--codes"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: verify-invalid-signature
        condition: "token signature does not match expected value"
        throws: "JsonWebTokenError: invalid signature"
        required_handling: >
          Caller MUST handle JsonWebTokenError for invalid signatures.
          This indicates tampering or wrong secret/key. CRITICAL security event -
          log and reject with 403. Never expose error details to client.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#errors--codes"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: verify-malformed-token
        condition: "token structure is invalid (not 3 parts, invalid base64, etc.)"
        throws: "JsonWebTokenError: jwt malformed"
        required_handling: >
          Caller MUST handle JsonWebTokenError for malformed tokens.
          Invalid structure indicates corrupted token or attack. Reject with 400 or 403.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#errors--codes"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: verify-invalid-algorithm
        condition: "token algorithm not in options.algorithms whitelist"
        throws: "JsonWebTokenError: invalid algorithm"
        required_handling: >
          Caller MUST handle algorithm mismatch errors. This prevents CVE-2015-9235
          algorithm confusion attack. Always specify algorithms option in verify().
        sources:
          - "https://nvd.nist.gov/vuln/detail/CVE-2015-9235"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: verify-audience-mismatch
        condition: "token aud claim does not match options.audience"
        throws: "JsonWebTokenError: jwt audience invalid. expected: [expected]"
        required_handling: >
          Caller MUST handle audience validation errors when using options.audience.
          Audience mismatch indicates token intended for different service.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#jwtverifytoken-secretorpublickey-options-callback"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: verify-issuer-mismatch
        condition: "token iss claim does not match options.issuer"
        throws: "JsonWebTokenError: jwt issuer invalid. expected: [expected]"
        required_handling: >
          Caller MUST handle issuer validation errors when using options.issuer.
          Issuer mismatch indicates token from untrusted source.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#jwtverifytoken-secretorpublickey-options-callback"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: verify-missing-secret
        condition: "secretOrPublicKey parameter is undefined or empty"
        throws: "JsonWebTokenError: secret or public key must be provided"
        required_handling: >
          Caller MUST handle missing secret errors. This typically indicates
          configuration error (missing environment variable). Fatal error - should
          fail fast on application startup, not at runtime.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

    edge_cases:
      - id: algorithm-confusion-cve-2015-9235
        description: >
          CRITICAL: Always specify algorithms option in jwt.verify() to prevent
          CVE-2015-9235 algorithm confusion attack. Without algorithms whitelist,
          attacker can change RS256 (asymmetric) to HS256 (symmetric) and use
          public key as HMAC secret, bypassing signature verification.
          Vulnerable: jwt.verify(token, publicKey)
          Secure: jwt.verify(token, publicKey, { algorithms: ['RS256'] })
        sources:
          - "https://nvd.nist.gov/vuln/detail/CVE-2015-9235"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: callback-error-handling
        description: >
          When using callback-style jwt.verify(token, secret, callback), MUST check
          err parameter before using decoded value. Common mistake:
          jwt.verify(token, secret, (err, decoded) => {
            console.log(decoded.userId); // BUG: decoded undefined if error\!
          });
          Correct pattern: Check err first, return early if error exists.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#jwtverifytoken-secretorpublickey-options-callback"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: sign
    import_path: "jsonwebtoken"
    description: "Signs a JWT token with secret or private key"

    postconditions:
      # Evidence: 24 primary firings across 16 repos in scan-jsonwebtoken-2026-04-02.json
      # Top affected: umami-software/umami, iOfficeAI/AionUi, juice-shop/juice-shop
      - id: sign-invalid-payload
        condition: "payload is not a plain object, string, or buffer"
        throws: "Error: Expected 'payload' to be a plain object, Buffer, or string"
        required_handling: >
          Caller MUST validate payload type before calling jwt.sign() or wrap
          in try-catch. Common when payload is null, undefined, or Promise object
          (forgot await on database query).
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#jwtsignpayload-secretorprivatekey-options-callback"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: sign-missing-secret
        condition: "secretOrPrivateKey is undefined, null, or empty"
        throws: "Error: secretOrPrivateKey must have a value"
        required_handling: >
          Caller MUST ensure secret exists before calling jwt.sign().
          Missing secret indicates configuration error. Should fail fast on
          startup, not at runtime during login.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#jwtsignpayload-secretorprivatekey-options-callback"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: sign-invalid-options
        condition: "options.algorithm is invalid or unsupported"
        throws: "Error: 'algorithm' must be a valid string enum value"
        required_handling: >
          Caller MUST validate algorithm option. Common mistake: typo in algorithm
          name (e.g., 'HS-256' instead of 'HS256').
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#jwtsignpayload-secretorprivatekey-options-callback"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: sign-invalid-expiresin
        condition: "options.expiresIn is invalid format"
        throws: "Error: invalid expiresIn option"
        required_handling: >
          Caller MUST validate expiresIn format. Accepts seconds (number) or
          time span string ('1h', '2d', '30s'). Invalid format throws.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#token-expiration-exp-claim"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: sign-claim-conflict
        condition: "options.expiresIn provided but payload already has exp property"
        throws: "Error: Bad 'options.expiresIn' option the payload already has an 'exp' property"
        required_handling: >
          Caller MUST NOT set exp in both payload and options. Choose one method:
          either payload.exp or options.expiresIn, not both.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken#token-expiration-exp-claim"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: decode
    import_path: "jsonwebtoken"
    description: >
      Synchronously decodes a JWT token payload WITHOUT verifying the signature.
      Returns null on invalid/malformed tokens — never throws. This function is
      safe ONLY for non-security purposes such as inspecting token structure,
      extracting header metadata (kid, alg) to select the right key, or
      debugging. NEVER use for authentication or authorization decisions.

    postconditions:
      # Evidence: https://github.com/auth0/node-jsonwebtoken/blob/master/README.md
      # Confirmed via source inspection: decode.js returns null without throwing
      # Confirmed via runtime test: forged token with isAdmin:true accepted by decode()
      # Security anti-pattern documented at https://owasp.org/www-project-web-security-testing-guide/
      # and https://www.invicti.com/blog/web-security/json-web-token-jwt-attacks-vulnerabilities/
      - id: decode-used-for-authentication
        condition: >
          jwt.decode() return value is used to make authentication or authorization
          decisions (e.g., checking role claims, user ID, or admin status) without
          subsequently calling jwt.verify() with the same token.
        returns: "JwtPayload | null | string"
        severity: error
        description: >
          CRITICAL SECURITY VULNERABILITY: jwt.decode() does NOT verify the token
          signature. An attacker can forge any payload (isAdmin: true, userId: 999)
          and decode() will return the tampered values without detecting the forgery.

          Confirmed behavior: jwt.decode('eyJ...tampered.INVALIDSIG') returns the
          full payload including forged claims. The function returns null only on
          completely unparseable input — a syntactically valid JWT with a forged
          signature returns the full payload.

          Official README states explicitly:
          "This will not verify whether the signature is valid. You should not
          use this for untrusted messages."
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical
        required_handling: >
          MUST use jwt.verify() for all authentication and authorization decisions.
          jwt.decode() is only safe for: (1) inspecting the header to select a
          verification key from a JWKS, (2) extracting non-security metadata after
          verification has already succeeded, (3) debugging and logging.
          Never use decode() result to make access control decisions.
        sources:
          - "https://github.com/auth0/node-jsonwebtoken/blob/master/README.md"
          - "https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/10-Testing_JSON_Web_Tokens"
          - "https://www.invicti.com/blog/web-security/json-web-token-jwt-attacks-vulnerabilities/"
        evidence_quality: confirmed

      - id: decode-null-return-not-checked
        condition: >
          jwt.decode() return value is used without checking for null, on input that
          may be untrusted, undefined, or malformed.
        returns: "null | JwtPayload | string"
        severity: warning
        description: >
          jwt.decode() returns null (not an error) when the token is invalid,
          malformed, undefined, or empty. Accessing properties on null causes
          TypeError crashes.

          Confirmed behavior via runtime test:
          - jwt.decode(undefined) → null
          - jwt.decode(null) → null
          - jwt.decode('') → null
          - jwt.decode('not-valid') → null

          Common crash pattern:
            const payload = jwt.decode(req.headers.authorization);
            const userId = payload.sub;  // TypeError: Cannot read property 'sub' of null
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: >
          Always check the return value before accessing properties:
          const payload = jwt.decode(token);
          if (!payload) { return res.status(400).json({ error: 'Invalid token' }); }
        sources:
          - "https://github.com/auth0/node-jsonwebtoken/blob/master/README.md"
        evidence_quality: confirmed

