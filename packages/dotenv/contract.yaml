package: dotenv
semver: '>=1.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-02'
status: production
evidence_quality: confirmed
functions:
  - name: config
    import_path: dotenv
    description: >
      Reads a .env file, parses the contents, and assigns values to process.env. Returns an object with either a
      'parsed' key (success) or an 'error' key (failure).
    postconditions:
      - id: missing-env-file
        condition: .env file does not exist or cannot be read
        returns: Object with 'error' property containing the Error instance
        required_handling: >
          Caller MUST check result.error after calling config(). Silent failures cause the application to run with
          undefined environment variables, leading to runtime crashes in dependent code.
        sources:
          - https://github.com/motdotla/dotenv#config
          - https://www.npmjs.com/package/dotenv
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: parse-error
        condition: .env file exists but contains a syntax error
        returns: Object with 'error' property containing the parse Error instance
        required_handling: >
          Caller MUST check result.error. Unhandled parse errors silently leave process.env in a partially-populated
          state.
        sources:
          - https://github.com/motdotla/dotenv#config
          - https://www.npmjs.com/package/dotenv
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success
        condition: .env file is found and parsed successfully
        returns: Object with 'parsed' key containing the parsed key-value pairs
        sources:
          - https://github.com/motdotla/dotenv#config
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: framework-managed-loading
        description: >
          Frameworks such as Next.js and NestJS ConfigModule manage dotenv loading internally. Calling config() manually
          in these environments may cause duplicate loading or unexpected variable precedence.
        sources:
          - https://nextjs.org/docs/basic-features/environment-variables
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: config-order-matters
        description: >
          config() must be called before any code accesses process.env variables loaded from .env. With ES6 modules,
          static imports are evaluated before module body execution, so top-level process.env accesses in imported
          modules may run before config() is called.
        sources:
          - https://github.com/motdotla/dotenv#how-do-i-use-dotenv-with-import
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: parse
    import_path: dotenv
    description: >
      Parses a .env-format string or Buffer into a key-value object. Does not assign values to process.env. Throws on
      invalid syntax.
    postconditions:
      - id: throws-on-invalid-syntax
        condition: input string contains invalid .env syntax
        throws: Error describing the parse failure
        required_handling: >
          Caller MUST wrap parse() in a try-catch block. Unlike config(), parse() throws exceptions rather than
          returning an error object.
        sources:
          - https://github.com/motdotla/dotenv#parse
          - https://www.npmjs.com/package/dotenv
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success
        condition: input is a valid .env-format string or Buffer
        returns: Plain object with string keys and string values
        sources:
          - https://github.com/motdotla/dotenv#parse
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
  - name: populate
    import_path: dotenv
    description: >
      Assigns parsed key-value pairs onto a target object (typically process.env), respecting the override option. Does
      not read from disk.
    postconditions:
      - id: no-override-by-default
        condition: a key already exists on the target object and override is not set to true
        returns: Existing value is preserved; parsed value is ignored
        required_handling: >
          Callers that intend to force-update existing values MUST pass { override: true }. Omitting this option causes
          pre-existing environment variables (e.g., set by the OS or CI) to silently take precedence.
        sources:
          - https://github.com/motdotla/dotenv#populate
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
