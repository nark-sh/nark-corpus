package: '@elastic/elasticsearch'
semver: '>=7.0.0 <9.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-11'
status: production
evidence_quality: confirmed
coverage_score: 1
detection:
  class_names:
    - Client
  require_instance_tracking: true
  await_patterns:
    - .search(
    - .index(
    - .get(
    - .delete(
    - .update(
    - .bulk(
    - .count(
    - .scroll(
    - .mget(
    - .create(
    - .deleteByQuery(
    - .updateByQuery(
    - .exists(
    - .openPointInTime(
    - .closePointInTime(
    - .clearScroll(
    - .msearch(
    - .reindex(
    - .esql.query(
    - .helpers.bulk(
    - .helpers.scrollSearch(
    - .close(
functions:
  - name: search
    import_path: '@elastic/elasticsearch'
    description: >
      Executes a search query against one or more Elasticsearch indices. Sends an HTTP GET/POST request; always makes a
      network call. Throws on connection failure, timeout, or a non-2xx HTTP response (ResponseError).
    postconditions:
      - id: api-error
        condition: >
          Any network or HTTP failure: connection refused, timeout, 4xx or 5xx response (including 400 bad request, 401
          unauthorized, 403 forbidden, 404 index not found, 429 too many requests, 5xx server error)
        throws: >
          ResponseError (4xx/5xx HTTP response, contains meta.statusCode and meta.body), ConnectionError (TCP failure,
          TLS error), TimeoutError (requestTimeout exceeded), or NoLivingConnectionsError (all pool nodes unreachable)
        required_handling: >
          Caller MUST wrap in try-catch. Elasticsearch network and server errors will propagate and crash the caller if
          uncaught.

          Minimum handling:
            try {
              const result = await client.search({ index: 'my-index', query: { ... } });
            } catch (err) {
              if (err instanceof errors.ResponseError) {
                // HTTP error — check err.meta.statusCode
              } else if (err instanceof errors.ConnectionError) {
                // Network failure
              }
            }

          Import error types: import { errors } from '@elastic/elasticsearch'
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: index
    import_path: '@elastic/elasticsearch'
    description: >
      Creates or replaces a document in an Elasticsearch index. Sends an HTTP PUT/POST request. Throws on connection
      failure, timeout, or a non-2xx HTTP response.
    postconditions:
      - id: api-error
        condition: >
          Any network or HTTP failure: connection refused, timeout, 4xx or 5xx response (including 409 version conflict,
          429 too many requests, 5xx server error)
        throws: >
          ResponseError (4xx/5xx HTTP response), ConnectionError (network failure), TimeoutError (requestTimeout
          exceeded), or NoLivingConnectionsError
        required_handling: >
          Caller MUST wrap in try-catch. Write operations that silently fail will cause data loss. Version conflicts
          (409) and capacity errors (429) require explicit handling for correct behavior.
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: get
    import_path: '@elastic/elasticsearch'
    description: >
      Retrieves a single document by ID from an Elasticsearch index. Sends an HTTP GET request. Throws ResponseError
      with status 404 when the document does not exist (unlike v7's optional ignore: [404] pattern — v8 always throws on
      404).
    postconditions:
      - id: api-error
        condition: |
          Document not found (404), connection failure, timeout, or other HTTP error
        throws: >
          ResponseError with meta.statusCode=404 when document not found; ResponseError for other HTTP errors;
          ConnectionError or TimeoutError for network failures
        required_handling: >
          Caller MUST wrap in try-catch. A missing document throws instead of returning null — callers that skip
          try-catch will crash when any document is absent.

          Handle 404 explicitly:
            try {
              const doc = await client.get({ index: 'my-index', id: '123' });
            } catch (err) {
              if (err instanceof errors.ResponseError && err.meta.statusCode === 404) {
                // Document not found — handle gracefully
              } else {
                throw err;
              }
            }
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: delete
    import_path: '@elastic/elasticsearch'
    description: >
      Deletes a document by ID from an Elasticsearch index. Sends an HTTP DELETE request. Throws ResponseError with 404
      if the document does not exist.
    postconditions:
      - id: api-error
        condition: |
          Document not found (404), connection failure, timeout, or HTTP error
        throws: >
          ResponseError (including 404 when document is absent), ConnectionError, TimeoutError, or
          NoLivingConnectionsError
        required_handling: >
          Caller MUST wrap in try-catch. Deleting a non-existent document throws ResponseError (404) — this must be
          handled or idempotent delete will crash.
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: update
    import_path: '@elastic/elasticsearch'
    description: >
      Partially updates an existing document in an Elasticsearch index using a script or partial document. Throws on 404
      (document not found), 409 (version conflict), or network/HTTP failure.
    postconditions:
      - id: api-error
        condition: |
          Document not found (404), version conflict (409), connection failure, timeout, or other HTTP error
        throws: >
          ResponseError (404 if document absent, 409 on version conflict, 5xx on server error), ConnectionError,
          TimeoutError, or NoLivingConnectionsError
        required_handling: >
          Caller MUST wrap in try-catch. Version conflicts (409) are common under concurrent write load and require
          application-level retry or conflict resolution.
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: bulk
    import_path: '@elastic/elasticsearch'
    description: >
      Performs multiple index/create/update/delete operations in a single HTTP request. The Promise resolves even if
      individual items fail — callers MUST check response.errors and inspect response.items for per-document failures.
    postconditions:
      - id: api-error
        condition: |
          Connection failure, timeout, or HTTP-level failure (the entire request fails)
        throws: >
          ConnectionError, TimeoutError, ResponseError (on HTTP 4xx/5xx for the bulk request itself, not individual item
          failures), or NoLivingConnectionsError
        required_handling: >
          Caller MUST wrap in try-catch for connection/HTTP-level failures, AND check response.errors after a successful
          Promise resolution for per-item failures.

          Full handling:
            try {
              const response = await client.bulk({ operations: [...] });
              if (response.errors) {
                for (const item of response.items) {
                  const op = item.index || item.create || item.update || item.delete;
                  if (op?.error) console.error('Item failed:', op.error);
                }
              }
            } catch (err) {
              // Connection/HTTP failure for the bulk request
            }
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-helpers.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: count
    import_path: '@elastic/elasticsearch'
    description: >
      Returns the number of documents matching a query in an Elasticsearch index. Sends an HTTP GET request; always
      makes a network call. Throws on connection failure, timeout, or non-2xx HTTP response.
    postconditions:
      - id: api-error
        condition: |
          Connection failure, timeout, 4xx or 5xx HTTP response
        throws: >
          ResponseError (4xx/5xx HTTP response), ConnectionError (network failure), TimeoutError (requestTimeout
          exceeded), or NoLivingConnectionsError
        required_handling: >
          Caller MUST wrap in try-catch. Count queries against non-existent indices will throw ResponseError (404).
          Network failures will propagate uncaught.
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: scroll
    import_path: '@elastic/elasticsearch'
    description: >
      Continues scrolling through a paginated search result set using a scroll ID. Used together with a search call that
      includes scroll: '1m'. Throws on connection failure, timeout, expired scroll context, or non-2xx HTTP response.
    postconditions:
      - id: api-error
        condition: |
          Scroll context expired (404), connection failure, timeout, or HTTP error
        throws: >
          ResponseError (including 404 when scroll context expires), ConnectionError, TimeoutError, or
          NoLivingConnectionsError
        required_handling: >
          Caller MUST wrap in try-catch. Scroll contexts expire after the configured TTL — callers that loop without
          try-catch will crash when the scroll expires.
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: mget
    import_path: '@elastic/elasticsearch'
    description: >
      Retrieves multiple documents by ID in a single HTTP request. Unlike client.get(), mget() DOES NOT throw on missing
      documents — missing docs appear in the response with found: false. The Promise still throws on connection failure,
      auth errors, or HTTP-level failure (not per-document 404s).
    postconditions:
      - id: mget-found-not-checked
        severity: warning
        condition: >
          mget() resolves successfully even when requested documents do not exist. Each doc in response.docs[] has a
          found: boolean field — callers that omit this check will silently treat missing documents as present.
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-mget
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        required_handling: Caller MUST handle this condition appropriately.
      - id: mget-api-error
        severity: error
        condition: >
          Connection failure, auth error, or HTTP-level failure (not per-doc 404). The Promise only rejects when the
          entire request fails, not when individual documents are missing.
        required_handling: >
          Caller MUST wrap in try-catch. HTTP-level failures reject the entire Promise with ConnectionError,
          TimeoutError, or ResponseError.
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-mget
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: create
    import_path: '@elastic/elasticsearch'
    description: >
      Creates a new document in an Elasticsearch index, failing if a document with the same ID already exists. Unlike
      index(), create() guarantees "create-if-not-exists" semantics — it throws ResponseError with HTTP 409
      (version_conflict_engine_exception) when the document ID is already present.
    postconditions:
      - id: create-api-error
        severity: error
        condition: >
          Document with same ID already exists (409), or connection failure, auth error, or HTTP-level failure (400,
          401, 403, 5xx).
        required_handling: |
          Caller MUST wrap in try-catch. The 409 conflict is the distinctive error:
            try {
              await client.create({ index: 'my-index', id: docId, document: doc });
            } catch (err) {
              if (err instanceof errors.ResponseError && err.meta.statusCode === 409) {
                // Document already exists — decide whether to update or skip
              } else {
                throw err;
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-create
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
  - name: deleteByQuery
    import_path: '@elastic/elasticsearch'
    description: >
      Deletes all documents matching a query from an Elasticsearch index. The operation is NOT atomic — partial deletion
      can occur. The Promise resolves even when some deletions fail. Callers MUST check response.failures[] for
      per-document errors.
    postconditions:
      - id: deletebyquery-failures-not-checked
        severity: error
        condition: >
          deleteByQuery() resolves successfully even when some documents fail to delete. The response.failures[] array
          contains per-document deletion errors. Callers that omit this check have silent partial deletes — some
          targeted documents remain while others are deleted.
        required_handling: |
          After await, always check response.failures:
            const response = await client.deleteByQuery({ index: 'my-index', query: { ... } });
            if (response.failures && response.failures.length > 0) {
              // Some documents were not deleted
              for (const failure of response.failures) {
                console.error('Delete failed for shard:', failure.shard, failure.reason);
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-delete-by-query
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
      - id: deletebyquery-api-error
        severity: error
        condition: >
          Connection failure, auth error (401/403), or HTTP-level failure. Version conflicts abort the operation by
          default (conflicts: 'abort') — callers on high-concurrency indices may see 409-based aborts.
        required_handling: >
          Caller MUST wrap in try-catch. Network errors and auth failures reject the Promise and must be caught to
          prevent uncaught exception crashes.
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-delete-by-query
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: updateByQuery
    import_path: '@elastic/elasticsearch'
    description: >
      Updates all documents matching a query using a script or partial update. The operation is NOT atomic — partial
      updates can occur. The Promise resolves even when some updates fail. Callers MUST check response.failures[] for
      per-document errors.
    postconditions:
      - id: updatebyquery-failures-not-checked
        severity: error
        condition: >
          updateByQuery() resolves successfully even when some documents fail to update. The response.failures[] array
          contains per-document update errors. Callers that omit this check leave the index in a partially updated,
          inconsistent state.
        required_handling: |
          After await, always check response.failures:
            const response = await client.updateByQuery({
              index: 'my-index',
              script: { source: 'ctx._source.status = "archived"' },
              query: { ... }
            });
            if (response.failures && response.failures.length > 0) {
              // Some documents were not updated — handle inconsistency
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-update-by-query
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
      - id: updatebyquery-api-error
        severity: error
        condition: >
          Connection failure, auth error (401/403), or HTTP-level failure. Version conflicts abort the operation by
          default — callers on high-concurrency indices may see 409-based aborts leaving partial updates in place.
        required_handling: >
          Caller MUST wrap in try-catch. Network errors and auth failures reject the Promise and must be caught to
          prevent uncaught exception crashes.
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-update-by-query
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: helpers.bulk
    import_path: '@elastic/elasticsearch'
    description: >
      High-level bulk indexing helper accessed via client.helpers.bulk(). UNLIKE client.bulk(), this helper handles
      retries internally and routes per-document failures to an onDrop callback instead of throwing. The Promise
      resolves with BulkStats even when documents are dropped. Callers MUST provide an onDrop handler to detect
      per-document failures.
    postconditions:
      - id: helpers-bulk-ondrop-not-provided
        severity: error
        condition: >
          helpers.bulk() calls the onDrop callback (not throw) for documents that exceed maxRetries or fail permanently.
          If no onDrop is provided, it defaults to noop — dropped documents are silently discarded. The Promise resolves
          with BulkStats.failed > 0 but callers have no way to identify which documents were lost.
        required_handling: |
          Always provide an onDrop handler and check BulkStats.failed:
            const stats = await client.helpers.bulk({
              datasource: docs,
              onDocument: (doc) => ({ index: { _index: 'my-index' } }),
              onDrop: (dropped) => {
                console.error('Document dropped:', dropped.document, dropped.error);
                // Re-queue or alert on permanent failures
              }
            });
            if (stats.failed > 0) {
              console.error(`${stats.failed} documents were not indexed`);
            }
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-helpers.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
      - id: helpers-bulk-api-error
        severity: error
        condition: >
          HTTP-level failure (the entire request fails). Per-document failures are routed to onDrop, not thrown. The
          distinction is critical for correct handling.
        required_handling: >
          Caller MUST wrap in try-catch for connection/HTTP-level failures. Per-document failures require a separate
          onDrop callback — both patterns are needed for complete error handling.
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-helpers.html
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: exists
    import_path: '@elastic/elasticsearch'
    description: >
      Checks whether a document exists in an Elasticsearch index. Returns a boolean (true if document exists, false if
      not) instead of throwing ResponseError 404. Throws on connection failure, auth error, or other HTTP errors.
    postconditions:
      - id: exists-api-error
        severity: error
        condition: >
          Connection failure, auth errors (401/403), or malformed index names (400). Unlike get(), exists() does NOT
          throw ResponseError(404) for missing documents — it returns false. But network and auth errors still throw.
        required_handling: |
          Wrap in try-catch for network/auth errors:
            try {
              const docExists = await client.exists({ index: 'my-index', id: docId });
              if (!docExists) {
                // Document does not exist — handle gracefully
              }
            } catch (err) {
              // Connection failure or auth error — not a missing document
              throw err;
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-exists
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
  - name: openPointInTime
    import_path: '@elastic/elasticsearch'
    description: >
      Opens a Point-in-Time (PIT) snapshot for consistent paginated searches. The PIT keeps a consistent view of the
      index for the duration of keep_alive. Returns a pit_id that must be used in subsequent search() calls and closed
      with closePointInTime(). PIT resources must be explicitly closed to prevent resource leaks.
    postconditions:
      - id: openpit-api-error
        severity: error
        condition: >
          ResponseError (403 if missing 'read' index privilege, 404 if index does not exist), ConnectionError, or
          TimeoutError. An uncaught error leaves the caller without a valid pit_id, causing subsequent search calls to
          fail with a malformed request.
        required_handling: >
          Caller MUST wrap in try-catch. A failed openPointInTime() must abort the search workflow gracefully — without
          a valid pit_id, subsequent search calls will fail.
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-open-point-in-time
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: openpit-not-closed
        severity: warning
        condition: >
          PIT IDs that are never closed with closePointInTime() accumulate on the Elasticsearch cluster. Each
          openPointInTime() call creates a server-side resource that prevents garbage collection of index segments and
          consumes file handles.
        required_handling: |
          Always close the PIT in a finally block:
            const { id: pitId } = await client.openPointInTime({ index: 'my-index', keep_alive: '1m' });
            try {
              // paginated searches using pit_id: pitId
            } finally {
              await client.closePointInTime({ id: pitId });
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-open-point-in-time
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
  - name: close
    import_path: '@elastic/elasticsearch'
    description: >
      Closes all connections in the client's connection pool and releases underlying resources. Should be called when
      the client is no longer needed (e.g., at process shutdown or after a one-off operation). Shared connection pools
      with child clients will also be closed.
    postconditions:
      - id: close-api-error
        severity: warning
        condition: >
          close() can throw ConnectionError or transport-level errors if connections fail to close cleanly. In
          long-running processes that create many Client instances (e.g., per-request clients), unclosed clients cause
          connection pool leaks.
        required_handling: |
          Always await close() and handle errors:
            try {
              await client.close();
            } catch (err) {
              console.error('Client close failed:', err);
            }
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/api-reference.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
  - name: msearch
    import_path: '@elastic/elasticsearch'
    description: >
      Executes multiple search requests in a single HTTP call. Returns HTTP 200 with a responses[] array even when
      individual searches fail. Each item in responses[] is either a successful SearchResponse or an ErrorResponseBase
      object (with error.type and status fields). The Promise only rejects on connection failure or HTTP-level request
      failure — not on per-search failures.
    postconditions:
      - id: msearch-per-search-error-not-checked
        severity: error
        condition: >
          msearch() resolves HTTP 200 even when individual searches fail. Each element in response.responses[] is either
          a successful result or an ErrorResponseBase object containing error.type and status. Callers that omit a
          per-response error check silently treat failed searches as empty results.
        required_handling: |
          After await, check each response item for an error field:
            const response = await client.msearch({
              searches: [
                { index: 'products' }, { query: { match: { name: 'shoe' } } },
                { index: 'orders' },  { query: { match: { status: 'pending' } } },
              ]
            });
            for (const result of response.responses) {
              if ('error' in result) {
                // Individual search failed — result.error.type and result.status
                console.error('Search failed:', result.status, result.error.type);
              } else {
                // Success — result.hits.hits contains documents
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-msearch
          - https://github.com/elastic/elasticsearch-js/blob/main/src/api/types.ts
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
      - id: msearch-api-error
        severity: error
        condition: >
          Connection failure, auth error (401/403), or HTTP-level failure causes the entire msearch Promise to reject.
          This is distinct from per-search failures which return HTTP 200 with error objects in responses[].
        required_handling: >
          Caller MUST wrap in try-catch for connection/HTTP-level failures AND check each responses[] item for
          per-search errors:
            try {
              const response = await client.msearch({ searches: [...] });
              // Check individual results for per-search failures
            } catch (err) {
              if (err instanceof errors.ResponseError) {
                // HTTP-level error — the entire msearch request failed
              } else if (err instanceof errors.ConnectionError) {
                // Network failure
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-msearch
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: closePointInTime
    import_path: '@elastic/elasticsearch'
    description: >
      Closes a Point-in-Time (PIT) snapshot previously opened with openPointInTime(). Frees server-side resources (file
      handles, segment locks). Should always be called in a finally block paired with openPointInTime(). Throws on
      connection failure or auth errors. Returns { succeeded: boolean, num_freed: number }.
    postconditions:
      - id: closepit-not-called
        severity: error
        condition: >
          Callers that open a PIT with openPointInTime() but do not call closePointInTime() in a finally block will leak
          PIT resources on the Elasticsearch cluster whenever an exception occurs during the search workflow. Each
          leaked PIT holds segment locks and file handles until the keep_alive TTL expires.
        required_handling: |
          Always call closePointInTime() in a finally block:
            const { id: pitId } = await client.openPointInTime({ index: 'my-index', keep_alive: '1m' });
            try {
              // paginated searches using pit_id: pitId
              let searchAfter;
              while (true) {
                const result = await client.search({
                  pit: { id: pitId, keep_alive: '1m' },
                  search_after: searchAfter,
                  sort: [{ _shard_doc: 'asc' }]
                });
                if (!result.hits.hits.length) break;
                searchAfter = result.hits.hits.at(-1)?.sort;
              }
            } finally {
              await client.closePointInTime({ id: pitId });
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-close-point-in-time
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-open-point-in-time
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
      - id: closepit-api-error
        severity: warning
        condition: >
          closePointInTime() throws on connection failure or auth error. If called with an invalid or already-expired
          PIT ID, the server resolves HTTP 200 with succeeded: false rather than throwing.
        required_handling: >
          Wrap in try-catch when called in finally blocks — a failed close must not suppress the original exception from
          the search workflow:
            } finally {
              try {
                await client.closePointInTime({ id: pitId });
              } catch (closeErr) {
                console.error('Failed to close PIT:', closeErr);
                // Do not rethrow — preserve the original search exception
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-close-point-in-time
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
  - name: clearScroll
    import_path: '@elastic/elasticsearch'
    description: >
      Clears the search context and results for a scrolling search, freeing server-side resources. Must be called after
      a scroll-based pagination loop completes (or when aborting early). Returns { succeeded: boolean, num_freed: number
      }. Does not throw if scroll_id is already expired — returns succeeded: false instead.
    postconditions:
      - id: clearscroll-not-called
        severity: warning
        condition: >
          Callers that use scroll() for pagination without calling clearScroll() when done (or when aborting early) leak
          scroll contexts on the Elasticsearch cluster. Scroll contexts are automatically freed after the TTL expires,
          but accumulating open scroll contexts (especially in high-throughput loops) consumes memory and open
          connections on the ES cluster.
        required_handling: |
          Always clear the scroll in a finally block:
            let scrollId;
            try {
              const initialResponse = await client.search({ index: 'my-index', scroll: '1m', size: 100 });
              scrollId = initialResponse._scroll_id;
              let hits = initialResponse.hits.hits;

              while (hits.length > 0) {
                const response = await client.scroll({ scroll_id: scrollId, scroll: '1m' });
                scrollId = response._scroll_id;
                hits = response.hits.hits;
              }
            } finally {
              if (scrollId) {
                await client.clearScroll({ scroll_id: scrollId });
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-clear-scroll
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
      - id: clearscroll-api-error
        severity: warning
        condition: >
          clearScroll() throws on connection failure or auth error. If called with an invalid or already-expired
          scroll_id, it returns HTTP 200 with succeeded: false rather than throwing — callers need not special-case
          expired IDs.
        required_handling: >
          Wrap in try-catch when called in finally blocks — a failed clearScroll must not suppress the original
          exception from the scroll loop:
            } finally {
              if (scrollId) {
                try {
                  await client.clearScroll({ scroll_id: scrollId });
                } catch (err) {
                  console.error('Failed to clear scroll:', err);
                }
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-clear-scroll
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
  - name: reindex
    import_path: '@elastic/elasticsearch'
    description: >
      Copies documents from a source index to a destination index. By default runs synchronously (wait_for_completion:
      true) until all documents are reindexed. Version conflicts abort the operation by default — set conflicts:
      'proceed' to continue. Per-document failures are collected in response.failures[]. The operation is NOT atomic —
      partial copies can occur on failure.
    postconditions:
      - id: reindex-failures-not-checked
        severity: error
        condition: >
          reindex() resolves successfully even when individual document copies fail. The response.failures[] array
          contains per-document errors. When conflicts occur and conflicts: 'proceed' is set, the operation continues
          and errors accumulate in failures[]. Callers that omit this check leave the destination index in a partially
          populated state without detecting it.
        required_handling: |
          After await, always check response.failures:
            const response = await client.reindex({
              source: { index: 'source-index' },
              dest: { index: 'dest-index' },
              conflicts: 'proceed',  // do not abort on version conflicts
            });
            if (response.failures && response.failures.length > 0) {
              console.error(`Reindex completed with ${response.failures.length} failures`);
              for (const failure of response.failures) {
                console.error('Failed doc:', failure.id, failure.cause?.reason);
              }
            }
            console.log(`Reindexed: ${response.created} created, ${response.updated} updated`);
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-reindex
          - https://github.com/elastic/elasticsearch-js/blob/main/src/api/types.ts
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
      - id: reindex-api-error
        severity: error
        condition: >
          Connection failure, auth error (401/403), or HTTP-level failure rejects the Promise. Version conflicts abort
          the operation by default (conflicts: 'abort') and the response contains the failure count. If
          wait_for_completion: false, a task ID is returned and the task may fail independently.
        required_handling: >
          Caller MUST wrap in try-catch. Reindex runs synchronously by default and can take minutes for large indices —
          connection failures mid-operation leave a partially indexed destination:
            try {
              const response = await client.reindex({
                source: { index: 'old-index' },
                dest: { index: 'new-index' },
              });
              if (response.failures?.length) {
                // Handle partial failures
              }
            } catch (err) {
              if (err instanceof errors.ResponseError) {
                // HTTP error — check err.meta.statusCode and err.meta.body.error.type
              } else if (err instanceof errors.TimeoutError) {
                // Request timed out — check if reindex task completed via tasks API
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-reindex
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
  - name: esql.query
    import_path: '@elastic/elasticsearch'
    description: >
      Executes an ES|QL (Elasticsearch Query Language) query. ES|QL is Elasticsearch's modern query language (introduced
      in v8.11) with a SQL-like pipeline syntax. Returns columnar or row-based results. Throws on syntax errors, missing
      index privileges, or network failures. Use client.helpers.esql() for automatic result transformation.
    postconditions:
      - id: esql-query-syntax-error
        severity: error
        condition: >
          esql.query() throws ResponseError with HTTP 400 when the ES|QL query has a syntax error, references an unknown
          column, or uses an unsupported function. Syntax errors in ES|QL are not detected at build time — they manifest
          at runtime as 400 Bad Request ResponseError.
        required_handling: |
          Caller MUST wrap in try-catch. Syntax errors are programming errors but manifest at runtime:
            try {
              const response = await client.esql.query({
                query: 'FROM logs-* | WHERE @timestamp > NOW() - 1 hour | LIMIT 100'
              });
              // Process response.rows or use helpers.esql() for transformation
            } catch (err) {
              if (err instanceof errors.ResponseError && err.meta.statusCode === 400) {
                // Syntax error or unknown column — check err.meta.body.error.reason
                console.error('ES|QL syntax error:', err.meta.body.error.reason);
              } else {
                throw err;
              }
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-esql-query
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: esql-query-api-error
        severity: error
        condition: >
          esql.query() throws ResponseError with HTTP 403 when the authenticated user lacks read privileges for the
          queried indices. Connection failures throw ConnectionError or TimeoutError.
        required_handling: |
          Caller MUST wrap in try-catch for all network and authorization failures:
            try {
              const response = await client.esql.query({ query: 'FROM my-index | LIMIT 10' });
            } catch (err) {
              if (err instanceof errors.ResponseError) {
                if (err.meta.statusCode === 403) {
                  // Missing read privilege for the queried index
                }
              } else if (err instanceof errors.ConnectionError) {
                // Network failure
              }
              throw err;
            }
        sources:
          - https://www.elastic.co/docs/api/doc/elasticsearch/v9/operation/operation-esql-query
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: helpers.scrollSearch
    import_path: '@elastic/elasticsearch'
    description: >
      High-level helper that runs a scroll search operation and returns an async iterator. Used in a for-await-of loop
      where each iteration receives a full scroll page result. Unlike scroll(), this helper automatically handles scroll
      context management and retries 429 (rate limit) responses. Scroll contexts are cleaned up when the loop completes
      normally. The helper automatically adds filter_path to reduce response size.
    postconditions:
      - id: helpers-scrollsearch-not-in-try-catch
        severity: error
        condition: >
          helpers.scrollSearch() uses an async iterator. Errors thrown during iteration (connection failure, expired
          scroll context, auth error) propagate as exceptions inside the for-await-of loop body and will crash the
          caller if uncaught. Unlike scroll(), the helper automatically retries 429s — but not other errors.
        required_handling: |
          Wrap the entire for-await-of loop in try-catch:
            try {
              for await (const result of client.helpers.scrollSearch({ index: 'my-index', size: 100 })) {
                const documents = result.documents;  // Auto-extracted hits
                // or: result.hits.hits for full hit objects
              }
            } catch (err) {
              if (err instanceof errors.ResponseError) {
                // Scroll context expired or search error
              } else if (err instanceof errors.ConnectionError) {
                // Network failure mid-scroll
              }
              throw err;
            }
        sources:
          - https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-helpers.html
          - https://github.com/elastic/elasticsearch-js/blob/main/src/helpers.ts
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
notes:
  - 'v8 unwraps response body: response.hits.hits (not response.body.hits.hits as in v7)'
  - 'All methods throw synchronously on connection failure after maxRetries (default: 3)'
  - ResponseError.meta.statusCode has the HTTP status; ResponseError.meta.body.error.type has ES error type string
  - bulk() Promise resolves even on partial failures — MUST check response.errors flag
  - 'errors module: import { errors } from ''@elastic/elasticsearch'' for type-narrowing'
  - '404 always throws in v8 — unlike v7 where ignore: [404] suppressed it'
  - scroll() used in pagination loops — scroll context TTL expiry causes ResponseError 404
  - 'count() commonly used without try-catch in real codebases (evidence: erxes/erxes)'
  - mget() does NOT throw on missing docs — found:false per doc — distinct from get()
  - create() throws 409 (version_conflict_engine_exception) when doc ID already exists
  - deleteByQuery()/updateByQuery() — partial ops, MUST check response.failures[]
  - helpers.bulk() routes per-doc failures to onDrop callback, NOT throw — need both patterns
  - openPointInTime() MUST be closed via closePointInTime() — resource leak otherwise
  - msearch() resolves HTTP 200 even for per-search failures — MUST check each responses[] item for error field
  - closePointInTime()/clearScroll() — always call in finally block to prevent resource leaks
  - 'reindex() can produce partial copies — MUST check response.failures[] when conflicts: ''proceed'''
  - esql.query() — throws ResponseError(400) on syntax errors at runtime, not build time
  - helpers.scrollSearch() — wrap for-await loop in try-catch, errors propagate as loop exceptions
