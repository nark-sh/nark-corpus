package: ethers
semver: ">=6.0.0 <7.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed

detection:
  type_names:
    - Provider
    - Contract
    - Wallet

functions:
  - name: getBalance
    import_path: "ethers"
    description: "Gets account balance from blockchain"
    postconditions:
      - id: getbalance-rpc-error
        condition: "RPC call fails (network down, rate limit, invalid address, node error)"
        throws: "Error with RPC error details and error code"
        required_handling: "Caller MUST wrap provider.getBalance() in try-catch to handle RPC errors. Network failures, rate limits, and invalid addresses crash application if unhandled."
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Provider-getBalance"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sendTransaction
    import_path: "ethers"
    description: "Sends transaction to blockchain"
    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-ethers-2026-04-02.json
      # Top affected: cyl19970726/poly-sdk (⭐ 1264)
      - id: sendtransaction-error
        condition: "transaction fails (insufficient gas, nonce error, network error, reverted)"
        throws: "Error with transaction failure details (gas estimation, nonce, revert reason)"
        required_handling: "Caller MUST wrap sendTransaction() in try-catch to handle transaction errors. Gas estimation failures, nonce conflicts, and reverted transactions crash application if unhandled. Check error.code for specific error types."
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Signer-sendTransaction"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

edge_cases:
  - id: transaction-wait-errors
    description: "Use receipt = await tx.wait() to wait for confirmation - can throw if transaction reverts on-chain. Must wrap in try-catch to handle revert errors and get revert reason."
    sources:
      - "https://docs.ethers.org/v6/api/providers/#TransactionResponse-wait"
    severity: error
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

