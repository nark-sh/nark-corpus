maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
# Depth pass 2026-04-16 (deepen-stream-1 pass 2):
# API surface: 20 distinct async-callable operations across Provider, Signer/Wallet, ContractFactory
# Contracted before: 2 (getBalance, sendTransaction)
# Contracted after: 9 (+7 this pass: TransactionResponse.wait, provider.estimateGas, provider.call,
#                       provider.broadcastTransaction, Wallet.fromEncryptedJson,
#                       provider.waitForTransaction, provider.getLogs)
# Omitted: 11 (read-only GETs: getBlock, getTransaction, getTransactionReceipt,
#               getTransactionCount, getCode, getStorage, getNetwork, getFeeData;
#               utility ENS: resolveName, lookupAddress;
#               sync-wrapped-as-async: wallet.signMessage)
# Coverage: 9/20 = 0.45 (-> effective 9/9 = 1.0 of contracted callable surface)
# Evidence sources confirmed from installed package source:
#   lib.esm/providers/provider.js -- wait() TRANSACTION_REPLACED, CALL_EXCEPTION, TIMEOUT
#   lib.esm/providers/abstract-provider.js -- NETWORK_ERROR, TIMEOUT, OFFCHAIN_FAULT
#   lib.esm/providers/provider-jsonrpc.js -- INSUFFICIENT_FUNDS, NONCE_EXPIRED, REPLACEMENT_UNDERPRICED
#   lib.esm/wallet/json-keystore.js -- UNSUPPORTED_OPERATION for invalid cipher
#   https://docs.ethers.org/v6/api/utils/errors/
#
# Depth pass 2026-04-17 (deepen-stream-2 pass 4):
# API surface: 24 distinct async-callable operations (4 more discovered: ContractFactory.deploy,
#                       Contract.waitForDeployment, Contract.queryFilter, wallet.signTypedData)
# Contracted before: 9
# Contracted after: 13 (+4 this pass)
# Coverage: 13/24 = 0.54
# Evidence sources confirmed from installed package source (ethers@6.16.0):
#   lib.esm/contract/factory.js:79 -- UNSUPPORTED_OPERATION when runner lacks sendTransaction
#   lib.esm/providers/provider-jsonrpc.js:677 -- INSUFFICIENT_FUNDS on deploy
#   lib.esm/contract/contract.js:681-713 -- waitForDeployment() wraps deployTx.wait()
#   lib.esm/contract/contract.js:770-798 -- queryFilter() delegates to provider.getLogs()
#   lib.esm/wallet/base-wallet.js:105-124 -- signTypedData UNSUPPORTED_OPERATION, UNCONFIGURED_NAME
#
# Depth pass 2026-06-12 (deepen-stream-1 pass 4):
# API surface: 26 distinct async-callable operations (2 more discovered: BaseWallet.signTransaction,
#                       BaseWallet.authorize — the latter added in ethers v6.16.0 for EIP-7702/Pectra)
# Contracted before: 18
# Contracted after:  20 (+2 this pass: wallet.signTransaction, wallet.authorize)
# Coverage: 20/26 = 0.77
# Evidence sources confirmed from installed package source (ethers@6.16.0):
#   lib.esm/wallet/base-wallet.js:80-103 -- signTransaction() assertArgument on tx.from mismatch,
#     Transaction.from() throws INVALID_ARGUMENT on bad type-1/2/3/4 fields
#   lib.esm/wallet/base-wallet.js:52-72 -- authorize() / authorizeSync() with assertArgument
#     on auth.address; populateAuthorization (abstract-signer.js) uses checkProvider() which
#     throws UNSUPPORTED_OPERATION when wallet has no provider
#   https://docs.ethers.org/v6/api/wallet/#BaseWallet-signTransaction
#   https://docs.ethers.org/v6/api/wallet/#BaseWallet-authorize
#   https://eips.ethereum.org/EIPS/eip-7702
coverage_score: 0.85  # 22 contracted / 26 total async-callable (11 intentionally omitted)

detection:
  type_names:
    - Provider
    - Contract
    - Wallet
    - JsonRpcProvider
    - BrowserProvider
    - InfuraProvider
    - AlchemyProvider
    - BaseWallet
    - HDNodeWallet
    - Signer

functions:
  - name: getBalance
    import_path: "ethers"
    description: >
      Gets the ETH balance of an address at a given block from the blockchain.
      Makes an RPC call to eth_getBalance. Used in wallet UIs, balance checks before
      transactions, and treasury management systems.
    postconditions:
      # Evidence: 0 firings in scan-ethers-2026-06-29.json (19 repos scanned); prior evidence confirmed in scan-ethers-2026-04-02.json
      # Top affected (prior scan): cyl19970726/poly-sdk (stars 1264)
      # Source: provider-jsonrpc.js -- makeError("SERVER_ERROR") for RPC failures
      - id: getbalance-rpc-error
        condition: >
          RPC call fails due to network failure, node unreachable, rate limit exceeded,
          or invalid address format. Throws with error.code one of:
          SERVER_ERROR (HTTP 4xx/5xx from RPC node), NETWORK_ERROR (no connectivity),
          TIMEOUT (request timeout exceeded), or INVALID_ARGUMENT (invalid address).
        throws: "EthersError with error.code = SERVER_ERROR | NETWORK_ERROR | TIMEOUT | INVALID_ARGUMENT"
        required_handling: >
          Caller MUST wrap provider.getBalance() in try-catch. Use isError(error, "SERVER_ERROR")
          to detect RPC node failures, isError(error, "NETWORK_ERROR") for connectivity loss.
          Uncaught errors crash balance-check routes and wallet UI components.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Provider-getBalance"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sendTransaction
    import_path: "ethers"
    description: >
      Sends a signed transaction to the network. The transaction is broadcast immediately;
      call tx.wait() on the returned TransactionResponse to wait for mining confirmation.
      Throws on insufficient funds, nonce conflicts, or if user rejects via wallet.
    postconditions:
      # Evidence: seen in 2 primary firings across 2 repos in scan-ethers-2026-06-29.json
      # Top affected: cyl19970726/poly-sdk, aave/interface (⭐ 496)
      # Source confirmed: provider-jsonrpc.js makeError("INSUFFICIENT_FUNDS"), makeError("NONCE_EXPIRED"),
      #   makeError("REPLACEMENT_UNDERPRICED"), makeError("ACTION_REJECTED")
      - id: sendtransaction-insufficient-funds
        condition: >
          Account has insufficient ETH to cover transaction cost (gas * gasPrice + value).
          Throws InsufficientFundsError before the transaction is broadcast.
        throws: "EthersError with error.code = INSUFFICIENT_FUNDS (InsufficientFundsError)"
        required_handling: >
          Caller MUST wrap sendTransaction() in try-catch. Check isError(error, "INSUFFICIENT_FUNDS")
          to provide user-friendly message about insufficient balance. This is the most common
          sendTransaction error in production -- check balance with getBalance() before sending.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Signer-sendTransaction"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: sendtransaction-nonce-expired
        condition: >
          Transaction nonce has already been used (transaction with same nonce already mined).
          Common when retrying failed transactions or running concurrent transaction senders.
        throws: "EthersError with error.code = NONCE_EXPIRED (NonceExpiredError)"
        required_handling: >
          Caller MUST catch and retry with a fresh nonce from provider.getTransactionCount().
          Common in automated systems that send concurrent transactions or retry on failure.
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: sendtransaction-action-rejected
        condition: >
          User rejected the transaction in their wallet (MetaMask, WalletConnect, etc.).
          Only applies when using BrowserProvider or WalletConnect providers.
        throws: "EthersError with error.code = ACTION_REJECTED (ActionRejectedError)"
        required_handling: >
          Caller MUST catch and handle gracefully -- user rejection is not a bug.
          Use isError(error, "ACTION_REJECTED") to distinguish intentional cancellation
          from infrastructure failures. Provide a "Transaction cancelled" message to users.
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: low

  - name: TransactionResponse.wait
    import_path: "ethers"
    description: >
      Waits for a transaction to be mined and confirmed. CRITICAL: This is separate from
      sendTransaction() -- sendTransaction() only broadcasts, wait() confirms mining.
      Most code that sends financial transactions MUST call tx.wait() to know if the
      transaction actually succeeded on-chain. Can throw on reverts, replacements, or timeouts.
    postconditions:
      # Evidence: source confirmed from lib.esm/providers/provider.js wait() method:
      #   assert(false, "transaction was replaced", "TRANSACTION_REPLACED", {...})
      #   assert(false, "transaction execution reverted", "CALL_EXCEPTION", {...})
      #   makeError("wait for transaction timeout", "TIMEOUT")
      - id: wait-transaction-replaced
        condition: >
          Transaction was replaced by another transaction with the same nonce but higher gas
          (speed-up) or different parameters (cancel). Common during gas price fluctuations
          when users re-submit with higher fees. Throws with the replacement transaction attached.
        throws: "EthersError with error.code = TRANSACTION_REPLACED (TransactionReplacedError)"
        required_handling: >
          Caller MUST catch TRANSACTION_REPLACED from tx.wait(). This is NOT a fatal error --
          the replacement transaction (error.replacement) may have succeeded. Check
          error.receipt.status to verify outcome. Not handling this causes dApps to show
          "transaction failed" for speed-up operations that actually succeeded.
          Pattern: if (isError(e, 'TRANSACTION_REPLACED') && !e.cancelled) { return e.receipt; }
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: wait-call-exception
        condition: >
          Transaction was mined but execution reverted on-chain. The transaction consumed gas
          but had no effect. Common with smart contract require() failures, access control
          rejections, or DeFi slippage violations. This is different from sendTransaction()
          throwing -- the TX was broadcast and mined, but the smart contract rejected it.
        throws: "EthersError with error.code = CALL_EXCEPTION (CallExceptionError)"
        required_handling: >
          Caller MUST catch CALL_EXCEPTION from tx.wait() to detect on-chain reverts.
          Use isError(error, "CALL_EXCEPTION"). Inspect error.revert for decoded revert
          reason if the ABI is known. Critical for token transfers, DeFi operations, and
          any contract interactions -- uncaught reverting transactions appear as silent
          failures (gas consumed, nothing happened, no user notification).
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

      - id: wait-timeout
        condition: >
          Transaction was not mined within the timeout period. The transaction may still be
          pending in the mempool and could be mined later. Throws TimeoutError.
        throws: "EthersError with error.code = TIMEOUT (TimeoutError)"
        required_handling: >
          Caller MUST catch TIMEOUT from tx.wait() and handle pending state explicitly.
          The transaction is NOT failed -- it may still be mined. Store the transaction hash
          and allow users to check status later. Do NOT mark orders/payments as failed on timeout.
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

  - name: provider.estimateGas
    import_path: "ethers"
    description: >
      Estimates the gas required to execute a transaction. Performs a simulation at the
      current block. Throws CALL_EXCEPTION if the transaction would revert, or
      INSUFFICIENT_FUNDS if sender lacks ETH. Called before most sendTransaction calls.
    postconditions:
      # Evidence: source confirmed from abstract-provider.js -- estimateGas calls _perform which
      # delegates to provider-jsonrpc.js where CALL_EXCEPTION and INSUFFICIENT_FUNDS are thrown.
      - id: estimategas-call-exception
        condition: >
          The transaction would revert if executed at the current block state. Common when:
          (1) contract require() conditions are not met, (2) caller lacks permissions,
          (3) token approval is insufficient, (4) slippage exceeds tolerance in DeFi.
        throws: "EthersError with error.code = CALL_EXCEPTION (CallExceptionError)"
        required_handling: >
          Caller MUST wrap estimateGas() in a separate try-catch from sendTransaction().
          Both throw independently. Use isError(error, "CALL_EXCEPTION") and inspect
          error.revert for the decoded revert reason to give users specific feedback.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Provider-estimateGas"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: estimategas-insufficient-funds
        condition: >
          Sender account has insufficient ETH to cover minimum gas cost for the transaction.
          estimateGas fails fast before broadcasting.
        throws: "EthersError with error.code = INSUFFICIENT_FUNDS (InsufficientFundsError)"
        required_handling: >
          Caller MUST catch INSUFFICIENT_FUNDS from estimateGas() separately from
          sendTransaction(). Both can throw it independently.
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: provider.call
    import_path: "ethers"
    description: >
      Executes a read-only smart contract call (eth_call). Used to query contract state,
      decode return values, and simulate write operations without sending a transaction.
      If the call reverts, throws CallExceptionError with the raw revert data.
    postconditions:
      # Evidence: source confirmed -- provider.d.ts: "If the call reverts, it will throw a
      # CallExceptionError which includes the revert data."
      # abstract-provider.js confirms CALL_EXCEPTION thrown on simulation reverts.
      - id: call-revert-exception
        condition: >
          The smart contract execution reverts during eth_call simulation. Common causes:
          (1) view/pure function has a require() that fails, (2) wrong ABI (calling
          non-existent function), (3) calling with unauthorized address. Revert data is
          attached to the error and can be decoded if the ABI is known.
        throws: "EthersError with error.code = CALL_EXCEPTION (CallExceptionError) -- error.data contains raw revert bytes"
        required_handling: >
          Caller MUST wrap provider.call() in try-catch. Use isError(error, "CALL_EXCEPTION").
          Decode revert reason: interface.parseError(error.data). Always wrap contract
          read calls in try-catch -- contracts can revert on reads too. Uncaught revert
          from call() crashes view-layer components displaying contract state.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Provider-call"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: provider.broadcastTransaction
    import_path: "ethers"
    description: >
      Broadcasts a pre-signed raw transaction to the network. Unlike sendTransaction() which
      handles signing, broadcastTransaction() accepts an already-signed hex string. Used when
      signing is done separately (hardware wallets, offline signing, batching).
    postconditions:
      # Evidence: source confirmed from provider-jsonrpc.js -- same error mapping as sendTransaction:
      # INSUFFICIENT_FUNDS, NONCE_EXPIRED, REPLACEMENT_UNDERPRICED are thrown here.
      - id: broadcast-insufficient-funds
        condition: >
          The signed transaction would overdraft the sender's ETH balance. RPC node rejects
          before adding to mempool. Common when broadcasting offline-signed transactions
          where balance changed between signing and broadcasting.
        throws: "EthersError with error.code = INSUFFICIENT_FUNDS (InsufficientFundsError)"
        required_handling: >
          Caller MUST wrap broadcastTransaction() in try-catch. Particularly important in
          batch-signing workflows where balance may change between signing and broadcast.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Provider-broadcastTransaction"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: broadcast-nonce-expired
        condition: >
          The nonce in the signed transaction has already been used. Common in batch-signing
          workflows where some transactions were already sent, or offline-signed transactions
          are broadcast out of order.
        throws: "EthersError with error.code = NONCE_EXPIRED (NonceExpiredError)"
        required_handling: >
          Caller MUST catch NONCE_EXPIRED and re-sign with fresh nonce from getTransactionCount().
          Critical for automated transaction systems that sign and broadcast asynchronously.
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

  - name: Wallet.fromEncryptedJson
    import_path: "ethers"
    description: >
      Asynchronously decrypts a JSON Keystore Wallet (v3 format) using the provided password.
      CPU-intensive (scrypt KDF). Used when loading wallets from file or database in
      server-side Node.js applications or dApp backends.
    postconditions:
      # Evidence: source confirmed from lib.esm/wallet/json-keystore.js:
      #   assert(false, "unsupported cipher", "UNSUPPORTED_OPERATION", {...}) for non-AES-128-CTR
      #   Incorrect password fails MAC verification -- throws before returning
      - id: from-encrypted-json-invalid-password
        condition: >
          Password is incorrect. The scrypt key derivation produces a key that fails MAC
          verification in the keystore. Most common error when loading wallets -- wrong
          passwords, encoding mismatches (UTF-8 vs bytes), or copy-paste errors.
        throws: "Error with message about invalid password / MAC mismatch"
        required_handling: >
          Caller MUST wrap Wallet.fromEncryptedJson() in try-catch. Wrong password throws --
          it does NOT return null. Provide a user-friendly "Incorrect password" message.
          Never log the attempted password. Critical for server-side wallet management.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/#Wallet-fromEncryptedJson"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      - id: from-encrypted-json-corrupt-keystore
        condition: >
          The JSON string is malformed, missing required fields, or uses an unsupported
          cipher (not aes-128-ctr). Throws UNSUPPORTED_OPERATION for unknown ciphers,
          or JSON parse errors for malformed JSON.
        throws: "EthersError with error.code = UNSUPPORTED_OPERATION | JSON.parse SyntaxError"
        required_handling: >
          Caller MUST validate the keystore JSON using isKeystoreJson() before calling
          fromEncryptedJson(). Database corruption or filesystem errors can produce
          truncated keystores that throw on decryption.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: provider.waitForTransaction
    import_path: "ethers"
    description: >
      Waits for a transaction hash to be mined without requiring a TransactionResponse object.
      Alternative to tx.wait() when only the hash is available (e.g., from external sources
      or after process restart). Resolves to TransactionReceipt or null if confirms=0.
    postconditions:
      # Evidence: source confirmed from abstract-provider.js:
      #   makeError("timeout", "TIMEOUT", { reason: "timeout" }) in waitForTransaction timer
      - id: wait-for-transaction-timeout
        condition: >
          The transaction is not mined within the timeout period. If timeout is set and
          expires, throws TIMEOUT. The transaction may still be pending -- it is NOT cancelled.
        throws: "EthersError with error.code = TIMEOUT (TimeoutError)"
        required_handling: >
          Caller MUST catch TIMEOUT and NOT mark the transaction as failed. Store the
          transaction hash and allow users to poll status later. Network congestion can
          delay mining by minutes or hours for low-fee transactions.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Provider-waitForTransaction"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: provider.getLogs
    import_path: "ethers"
    description: >
      Queries the blockchain for event logs matching a filter. Used to read contract events
      (Transfer, Deposit, etc.). RPC nodes commonly reject large block ranges or responses
      with too many logs. Throws SERVER_ERROR for rejected queries.
    postconditions:
      # Evidence: source confirmed from provider-jsonrpc.js -- makeError("SERVER_ERROR") for
      # oversized responses, rate limiting, and RPC rejections.
      # Known production failure: getLogs with large fromBlock..toBlock range is rejected
      # by Infura/Alchemy with "query returned more than 10000 results" SERVER_ERROR.
      - id: getlogs-range-too-large
        condition: >
          The block range (fromBlock..toBlock) is too large for the RPC node. Infura and
          Alchemy reject ranges returning more than 10,000 log entries. Also throws on
          invalid filter parameters or general RPC node errors (SERVER_ERROR).
        throws: "EthersError with error.code = SERVER_ERROR (ServerError)"
        required_handling: >
          Caller MUST wrap getLogs() in try-catch and implement chunked pagination for
          large block ranges. Split queries into chunks (e.g., 2000 blocks at a time).
          Not handling this crashes indexing jobs and event-sync workers that process
          large block ranges at startup.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#Provider-getLogs"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: ContractFactory.deploy
    import_path: "ethers"
    description: >
      Deploys a smart contract to the network by sending a deployment transaction.
      Internally calls runner.sendTransaction() so it inherits all transaction-send
      failure modes. Returns a BaseContract instance before the contract is mined --
      waitForDeployment() must be called before sending transactions to the new contract.
    postconditions:
      # Evidence: lib.esm/contract/factory.js:79 --
      #   assert(this.runner && typeof(this.runner.sendTransaction) === "function",
      #     "factory runner does not support sending transactions", "UNSUPPORTED_OPERATION", ...)
      # Evidence: provider-jsonrpc.js:677 -- makeError("insufficient funds", "INSUFFICIENT_FUNDS")
      #   triggered when deployer account lacks ETH for gas
      # Evidence: factory.js:78 -- async deploy() calls runner.sendTransaction(tx)
      #   which throws all standard sendTransaction errors
      - id: deploy-insufficient-funds
        condition: >
          The deploying account lacks sufficient ETH to cover the deployment gas cost.
          Contract deployments can be expensive (depends on bytecode size + gas price).
          Throws before the transaction is broadcast -- account balance is checked by the RPC node.
        throws: "EthersError with error.code = INSUFFICIENT_FUNDS (InsufficientFundsError)"
        required_handling: >
          Caller MUST wrap ContractFactory.deploy() in try-catch. Check isError(error, "INSUFFICIENT_FUNDS")
          and verify deployer balance before attempting deployment. Consider pre-checking with
          estimateGas() on the deploy transaction. Uncaught errors crash deployment scripts
          and dApp setup flows.
        sources:
          - "https://docs.ethers.org/v6/api/contract/#ContractFactory-deploy"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: deploy-unsupported-operation
        condition: >
          The runner (signer) attached to the ContractFactory does not support sending transactions.
          Common when using a Provider (read-only) instead of a Signer, or when the Signer
          lacks wallet connectivity (e.g., not connected to MetaMask in a browser context).
        throws: "EthersError with error.code = UNSUPPORTED_OPERATION"
        required_handling: >
          Caller MUST ensure the ContractFactory is created with a Signer that has sendTransaction
          capability, not just a Provider. Verify runner type before deployment. Common in
          server-side scripts where Provider and Signer are confused.
        sources:
          - "https://docs.ethers.org/v6/api/contract/#ContractFactory-deploy"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: Contract.waitForDeployment
    import_path: "ethers"
    description: >
      Waits for a deployed contract to be mined and confirmed on-chain. MUST be called
      after ContractFactory.deploy() before sending transactions to the new contract address.
      Internally calls deployTx.wait() which inherits all TransactionResponse.wait() failure modes.
      If no deployment transaction is available (e.g., contract already deployed), polls provider.
    postconditions:
      # Evidence: lib.esm/contract/contract.js:681-713 -- waitForDeployment() calls deployTx.wait()
      #   which throws TRANSACTION_REPLACED, CALL_EXCEPTION, TIMEOUT (from provider.js wait())
      # Evidence: contract.js:695 -- assert(provider != null, ..., "UNSUPPORTED_OPERATION", ...)
      #   when no provider is available for polling block events
      - id: waitfordeployment-constructor-reverted
        condition: >
          The deployment transaction was mined but the contract constructor reverted on-chain.
          This is a CALL_EXCEPTION from deployTx.wait() -- the transaction consumed gas but
          the contract was NOT deployed. The contract address will have no code. Common when
          constructor require() conditions are not met (e.g., invalid initial state, access control).
        throws: "EthersError with error.code = CALL_EXCEPTION (CallExceptionError) from deployTx.wait()"
        required_handling: >
          Caller MUST wrap waitForDeployment() in try-catch. Check isError(error, "CALL_EXCEPTION")
          to detect constructor revert. Inspect error.revert for decoded revert reason if ABI is known.
          Uncaught constructor reverts leave application state inconsistent -- deployment scripts
          assume contract is ready but no code exists at the address.
        sources:
          - "https://docs.ethers.org/v6/api/contract/#BaseContract-waitForDeployment"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

      - id: waitfordeployment-transaction-replaced
        condition: >
          The deployment transaction was replaced (speed-up or cancel) before being mined.
          TRANSACTION_REPLACED from deployTx.wait(). Common in scripts that speed-up slow
          deployments by resubmitting with higher gas, or cancel/retry deployments.
        throws: "EthersError with error.code = TRANSACTION_REPLACED (TransactionReplacedError)"
        required_handling: >
          Caller MUST catch TRANSACTION_REPLACED -- the replacement deployment tx (error.replacement)
          may have succeeded. Check error.cancelled to determine if deployment was actually cancelled
          vs speed-up. If error.receipt.status === 1, the replacement succeeded.
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: waitfordeployment-unsupported-operation
        condition: >
          The contract runner does not have a provider attached. Throws UNSUPPORTED_OPERATION
          with operation="waitForDeployment" when polling for deployment without a deployment
          transaction available (e.g., contract attached to an address without a deploy tx).
        throws: "EthersError with error.code = UNSUPPORTED_OPERATION"
        required_handling: >
          Ensure the Contract instance was returned from ContractFactory.deploy() (which attaches
          the deployment tx) OR that the runner has a provider for block polling.
        sources:
          - "https://docs.ethers.org/v6/api/contract/#BaseContract-waitForDeployment"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Contract.queryFilter
    import_path: "ethers"
    description: >
      Queries historic blockchain event logs for a specific contract event. Delegates to
      provider.getLogs() with the contract address and topic filter applied. Subject to all
      the same RPC node limitations as getLogs -- large block ranges are commonly rejected.
      Used for reading event history (Transfer events, Deposit/Withdrawal, etc.).
    postconditions:
      # Evidence: lib.esm/contract/contract.js:770-798 -- queryFilter() calls provider.getLogs(filter)
      #   which inherits SERVER_ERROR from large range rejections (Infura/Alchemy: 10k log limit)
      # Evidence: contract.js:782 -- assert(provider, ..., "UNSUPPORTED_OPERATION", ...)
      #   when no provider is attached to the contract runner
      - id: queryfilter-range-too-large
        condition: >
          The block range (fromBlock..toBlock) causes getLogs to return more than 10,000 results,
          causing Infura, Alchemy, and most public RPC nodes to reject with SERVER_ERROR.
          Common when querying Transfer events from genesis block or using wide block ranges at startup.
          Default (fromBlock=0, toBlock="latest") is almost always rejected on mainnet.
        throws: "EthersError with error.code = SERVER_ERROR (ServerError)"
        required_handling: >
          Caller MUST wrap Contract.queryFilter() in try-catch and implement chunked pagination.
          Use narrow block ranges (e.g., 2000 blocks at a time). Particularly important for
          indexing flows that process event history at startup -- uncaught errors crash the
          entire indexing job and leave contract state out of sync.
        sources:
          - "https://docs.ethers.org/v6/api/contract/#BaseContract-queryFilter"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: queryfilter-no-provider
        condition: >
          The Contract instance's runner does not have a provider attached. Throws
          UNSUPPORTED_OPERATION with operation="queryFilter". Common when Contract is
          instantiated with a bare Signer that has no provider, or with null runner.
        throws: "EthersError with error.code = UNSUPPORTED_OPERATION"
        required_handling: >
          Ensure the Contract instance has a provider-connected runner before calling queryFilter.
          Use contract.connect(providerOrSigner) to attach a provider.
        sources:
          - "https://docs.ethers.org/v6/api/contract/#BaseContract-queryFilter"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: wallet.signTypedData
    import_path: "ethers"
    description: >
      Signs EIP-712 typed structured data. Used in permit flows (ERC-2612), Uniswap v3 signatures,
      gasless transaction approvals, and any protocol requiring off-chain structured data signatures.
      Throws when the typed data contains ENS names that cannot be resolved (requires provider).
    postconditions:
      # Evidence: lib.esm/wallet/base-wallet.js:105-124 -- signTypedData() calls
      #   TypedDataEncoder.resolveNames() which throws UNSUPPORTED_OPERATION when provider is null
      #   and ENS names appear in domain/types/value.
      #   assert(this.provider != null, "cannot resolve ENS names without a provider",
      #     "UNSUPPORTED_OPERATION", { operation: "resolveName", info: { name } })
      #   assert(address != null, "unconfigured ENS name", "UNCONFIGURED_NAME", { value: name })
      - id: signtypeddata-no-provider-for-ens
        condition: >
          The typed data contains ENS names (e.g., in domain.verifyingContract or value fields)
          but the wallet is not connected to a provider. Throws UNSUPPORTED_OPERATION with
          operation="resolveName". Common in offline signing setups where a bare Wallet is
          used without a JsonRpcProvider, but the typed data schema references ENS names.
        throws: "EthersError with error.code = UNSUPPORTED_OPERATION"
        required_handling: >
          Caller MUST either: (1) ensure the wallet is connected to a provider
          (wallet.connect(provider)), or (2) resolve all ENS names to addresses before passing
          to signTypedData. Safest approach is to always connect a provider when using signTypedData
          with external data that may contain ENS names.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/#BaseWallet-signTypedData"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

      - id: signtypeddata-unconfigured-ens
        condition: >
          The typed data contains an ENS name that resolves to null (unregistered or expired
          ENS domain). Throws UNCONFIGURED_NAME error. Less common than the no-provider case
          but can occur in production when user-supplied domain structs contain ENS names.
        throws: "EthersError with error.code = UNCONFIGURED_NAME"
        required_handling: >
          Caller MUST catch UNCONFIGURED_NAME and surface a user-facing error indicating the
          ENS name is unresolvable. Pre-validate any user-supplied ENS names with provider.resolveName()
          before passing to signTypedData.
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: low

  - name: BrowserProvider.getSigner
    import_path: "ethers"
    description: >
      Requests account access from the browser wallet (MetaMask, WalletConnect, etc.) and
      returns a JsonRpcSigner for the requested address. Internally calls eth_requestAccounts
      which triggers a browser pop-up requiring user authorization. This is the FIRST async
      call in almost every dApp — the entry point to all wallet interactions. User rejection
      or missing wallet throws ACTION_REJECTED.
    postconditions:
      # Evidence: lib.esm/providers/provider-browser.js:getSigner() -- calls eth_requestAccounts
      #   and wraps error with this.getRpcError(payload, {id: payload.id, error}):
      #   provider-jsonrpc.js:698-712 -- if error.message.match(/user denied|ethers-user-denied/i)
      #   → makeError("user rejected action", "ACTION_REJECTED", {action: "requestAccess", reason: "rejected"})
      # Evidence: lib.esm/providers/provider-jsonrpc.js:329-340 -- getSigner() throws "no such account"
      #   when numeric index >= accounts.length, throws "invalid account" when address not in list
      - id: browserprovider-getsigner-action-rejected
        condition: >
          User denies the MetaMask/WalletConnect permission popup triggered by eth_requestAccounts.
          Also fires when the request has expired ("expired" reason) or another pending request
          blocks the new one ("pending" reason). This is the most common wallet interaction error --
          users frequently dismiss the wallet connection popup.
        throws: "EthersError with error.code = ACTION_REJECTED (ActionRejectedError) -- error.action = 'requestAccess', error.reason = 'rejected' | 'expired' | 'pending'"
        required_handling: >
          Caller MUST wrap BrowserProvider.getSigner() in try-catch. Use isError(error, "ACTION_REJECTED")
          to distinguish user rejection from infrastructure failure. Provide a "Please connect your wallet"
          message, NOT a generic "Something went wrong." Not catching ACTION_REJECTED crashes the wallet
          connection flow and leaves the app in an unusable state for the user.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#BrowserProvider-getSigner"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: browserprovider-getsigner-no-wallet
        condition: >
          No Web3 wallet is installed or accessible. BrowserProvider constructor will fail
          if window.ethereum is not available, but getSigner() can additionally throw
          UNSUPPORTED_OPERATION when the wallet lacks eth_requestAccounts support
          (e.g., older wallet versions, restricted browser contexts, mobile WebViews).
        throws: "EthersError with error.code = UNSUPPORTED_OPERATION -- or plain Error('no such account')"
        required_handling: >
          Caller MUST detect missing wallet before calling getSigner(). Check for window.ethereum
          or use BrowserProvider.discover() first. Always provide a "Install MetaMask" or
          "No wallet found" fallback. Uncaught errors leave dApp silently broken for users
          without wallets (which is common on desktop browsers without extensions).
        sources:
          - "https://docs.ethers.org/v6/api/providers/#BrowserProvider-getSigner"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Wallet.encrypt
    import_path: "ethers"
    description: >
      Asynchronously encrypts the wallet's private key into a JSON Keystore Wallet (v3 format)
      using scrypt key derivation (N=131072 by default). CPU and memory intensive — takes
      several seconds on standard hardware. Used server-side to persist wallet credentials
      to disk or database. Returns a JSON string (not a file). The default scrypt parameters
      are intentionally expensive; do NOT lower them in production.
    postconditions:
      # Evidence: lib.esm/wallet/json-keystore.js:180-182 -- getEncryptKdfParams() calls assertArgument
      #   for N (must be power of 2), r, p validity.
      #   assertArgument(..., "invalid scrypt N parameter", "options.N", N)
      # Evidence: lib.esm/wallet/wallet.js -- Wallet.encrypt() calls encryptKeystoreJson()
      #   which calls scrypt() which is CPU/memory intensive; N=131072 default requires ~128MB RAM
      # Evidence: lib.esm/wallet/json-keystore.js:189 -- assertArgument(iv.length === 16,
      #   "invalid options.iv length", "options.iv", options.iv)
      - id: encrypt-invalid-scrypt-options
        condition: >
          Invalid scrypt parameters are passed in options.scrypt. N must be a positive power of 2
          (e.g., 1024, 8192, 131072). r and p must be positive integers. If invalid, throws an
          INVALID_ARGUMENT error with argument name "options.N", "options.r", or "options.p".
          Common when developers accidentally pass non-power-of-2 N values or 0 for r or p.
        throws: "EthersError (INVALID_ARGUMENT) -- assertArgument failure with 'invalid scrypt N parameter'"
        required_handling: >
          Caller MUST validate scrypt options before calling encrypt(). Always use the default
          parameters (omit options.scrypt entirely) in production unless you have specific
          requirements. Never set N below 8192 for production wallets -- lower values are
          insecure. Wrap encrypt() in try-catch to catch INVALID_ARGUMENT from malformed options.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/#Wallet-encrypt"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: encrypt-oom-crash
        condition: >
          The scrypt KDF with default parameters (N=131072, r=8, p=1) requires approximately
          128MB of RAM. In serverless functions (Lambda, Vercel Functions) with memory limits
          below 256MB, or in containers with strict memory cgroups, the underlying WebAssembly
          scrypt implementation can exhaust available memory and cause the process to crash or
          throw an out-of-memory error. The error message varies by runtime (RangeError, ENOMEM,
          or uncaught exception from the scrypt WASM module).
        throws: "RangeError: WebAssembly.Memory.grow(): Out of memory | or process-level OOM crash"
        required_handling: >
          Caller MUST ensure sufficient memory is available when calling Wallet.encrypt() in
          serverless or containerized environments. Either increase memory limits to 512MB+,
          or use reduced scrypt parameters (N=8192 minimum — only for non-production key storage).
          Never call encrypt() in memory-constrained Lambda functions with default parameters.
          Consider offloading key encryption to a dedicated service with adequate memory.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/#Wallet-encrypt"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: JsonRpcProvider.getSigner
    import_path: "ethers"
    description: >
      Returns a JsonRpcSigner for the given address or account index from the JSON-RPC node.
      Only works with managed-account providers (Geth with unlocked account, Hardhat, Anvil,
      local nodes). Does NOT work against Infura, Alchemy, or other public RPC endpoints —
      those have no managed accounts. Throws when the requested account is not available.
    postconditions:
      # Evidence: lib.esm/providers/provider-jsonrpc.js:329-340 -- getSigner() implementation:
      #   if (address >= accounts.length) { throw new Error("no such account"); }
      #   if no address found: throw new Error("invalid account");
      #   calls this.send("eth_accounts", []) which throws SERVER_ERROR on network failure
      - id: jsonrpc-getsigner-no-such-account
        condition: >
          The requested account index or address is not available on the JSON-RPC node.
          Throws a plain Error (not an EthersError) with message "no such account" when numeric
          index >= accounts.length, or "invalid account" when the address is not in the managed
          account list. Common when using Hardhat/Anvil test accounts by index (indices 10+)
          or when the target node has no unlocked accounts (public RPC endpoints).
        throws: "Error with message 'no such account' | 'invalid account' (plain Error, not EthersError)"
        required_handling: >
          Caller MUST wrap JsonRpcProvider.getSigner() in try-catch. Note: throws a plain Error,
          NOT an EthersError, so isError() will not work here. Use standard instanceof Error check.
          In scripts targeting local Hardhat/Anvil nodes, validate the account index before calling
          getSigner(). For production code, always use a Wallet connected to a provider instead of
          getSigner() -- public RPC endpoints never have managed accounts.
        sources:
          - "https://docs.ethers.org/v6/api/providers/jsonrpc/#JsonRpcProvider-getSigner"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Contract.method
    import_path: "ethers"
    description: >
      Direct invocation of a smart contract method via the Contract proxy: `await contract.transfer(to, amount)`.
      This is the most common pattern for state-changing contract interactions (ERC-20 transfers,
      NFT mints, DeFi operations, DAO voting). Returns a ContractTransactionResponse that must
      then be confirmed via .wait(). Two key failure modes: (1) the contract call is rejected by
      the EVM (revert / custom error), and (2) the method is called without a signer attached.
      Both failures are silent if not wrapped in try-catch.
    patterns:
      - 'contract\.'
      - 'await contract\.'
    postconditions:
      # Evidence: lib.esm/contract/contract.js:147-157 -- staticCall path:
      #   assert(canCall(runner), "contract runner does not support calling", "UNSUPPORTED_OPERATION")
      #   catch (error) { if (isCallException(error) && error.data) { throw contract.interface.makeError(error.data, tx); } }
      # Evidence: lib.esm/contract/contract.js:161-168 -- send path:
      #   assert(canSend(runner), "contract runner does not support sending transactions", "UNSUPPORTED_OPERATION")
      # Evidence: https://docs.ethers.org/v6/api/utils/errors/ -- CALL_EXCEPTION, UNSUPPORTED_OPERATION docs
      # Evidence: provider-jsonrpc.js:677-729 -- INSUFFICIENT_FUNDS, NONCE_EXPIRED mapped from eth_sendTransaction
      - id: contract-method-call-exception
        condition: >
          A state-changing contract method (e.g., transfer, mint, approve, vote) is called
          without a try-catch block. The contract reverts due to a custom error or require()
          failure (e.g., insufficient balance, unauthorized caller, invalid state). The EVM
          returns revert data which ethers decodes into a CALL_EXCEPTION EthersError.
          Common in DeFi: transferring more tokens than balance, calling mint() after limit
          reached, voting twice on same proposal.
        throws: "EthersError with code CALL_EXCEPTION (error.code === 'CALL_EXCEPTION')"
        required_handling: >
          Caller MUST wrap contract method calls in try-catch. Use isError(error, 'CALL_EXCEPTION')
          to specifically handle contract reverts. Check error.revert?.name for the custom error
          name and error.reason for the require() message. Distinguish CALL_EXCEPTION (contract
          rejected the operation) from INSUFFICIENT_FUNDS (insufficient ETH for gas) and
          NONCE_EXPIRED (transaction management issue).
        sources:
          - "https://docs.ethers.org/v6/api/utils/errors/"
          - "https://docs.ethers.org/v6/api/contract/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: contract-method-no-signer
        condition: >
          A state-changing contract method is called on a Contract instance connected
          to a read-only Provider (not a Signer). Common pattern: `const contract = new Contract(addr, abi, provider)`
          followed by `await contract.transfer(...)`. The contract runner fails the
          canSend() check and throws immediately before any RPC call is made.
        throws: "EthersError with code UNSUPPORTED_OPERATION (error.code === 'UNSUPPORTED_OPERATION', error.operation === 'sendTransaction')"
        required_handling: >
          Caller MUST ensure the Contract is connected to a Signer, not a Provider, when calling
          state-changing methods. Use `contract.connect(signer)` or pass a Signer to the constructor.
          For read-only calls (view/pure functions), a Provider is sufficient. Add runtime check:
          if (!(contract.runner instanceof ethers.Signer)) throw new Error('signer required').
        sources:
          - "https://docs.ethers.org/v6/api/contract/"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: provider.send
    import_path: "ethers"
    description: >
      Sends a raw JSON-RPC request to the Ethereum node: `await provider.send(method, params)`.
      Used for advanced integrations that need methods not exposed via high-level Provider API,
      such as eth_getProof, trace_transaction, debug_traceTransaction, wallet_addEthereumChain,
      personal_listAccounts, and custom node methods. Bypasses ethers' high-level error mapping
      for most methods — errors propagate as UNSUPPORTED_OPERATION (method not found) or
      UNKNOWN_ERROR. If the provider has been destroyed, throws immediately.
    postconditions:
      # Evidence (scan-ethers-2026-06-29.json): seen in 3 primary firings across 2 repos
      # Top affected: ProjectOpenSea/opensea-js (⭐ large), otterscan/otterscan
      # Evidence: lib.esm/providers/provider-jsonrpc.js:671-744 -- getRpcError():
      #   if (unsupported) { return makeError("unsupported operation", "UNSUPPORTED_OPERATION", ...) }
      #   return makeError("could not coalesce error", "UNKNOWN_ERROR", ...) -- fallthrough
      # Evidence: lib.esm/providers/provider-jsonrpc.js:760-776 -- send():
      #   if (this.destroyed) { return Promise.reject(makeError("provider destroyed", "UNSUPPORTED_OPERATION")) }
      # Evidence: https://docs.ethers.org/v6/api/providers/jsonrpc/#JsonRpcApiProvider-send
      - id: provider-send-unsupported-method
        condition: >
          provider.send() is called without a try-catch and the JSON-RPC method is not
          supported by the connected node (e.g., calling Infura with 'trace_transaction' which
          requires Alchemy's trace API, or calling 'eth_getProof' on a light node). The node
          returns error code -32601 ("Method not found"). ethers maps this to UNSUPPORTED_OPERATION.
          Also thrown when calling send() after the provider is destroyed.
        throws: "EthersError with code UNSUPPORTED_OPERATION (error.code === 'UNSUPPORTED_OPERATION')"
        required_handling: >
          Caller MUST wrap provider.send() in try-catch. Use isError(error, 'UNSUPPORTED_OPERATION')
          to detect unsupported method errors. For provider-capability detection, call a test
          method before deploying to production and fail fast with a clear configuration error.
          Consider falling back to alternative providers if the primary RPC lacks the required method.
        sources:
          - "https://docs.ethers.org/v6/api/providers/jsonrpc/#JsonRpcApiProvider-send"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: provider-send-network-error
        condition: >
          provider.send() is called without a try-catch and the RPC call fails due to
          network connectivity issues (WebSocket disconnect, HTTP timeout, connection refused).
          These propagate as SERVER_ERROR or NETWORK_ERROR from the underlying transport.
          Common in serverless functions with cold start network initialization delays.
        throws: "EthersError with code SERVER_ERROR or NETWORK_ERROR (error.code === 'SERVER_ERROR' | 'NETWORK_ERROR')"
        required_handling: >
          Caller MUST wrap provider.send() in try-catch and handle SERVER_ERROR and NETWORK_ERROR
          separately from UNSUPPORTED_OPERATION. For resilience, implement retry logic with
          exponential backoff for SERVER_ERROR. For NETWORK_ERROR, verify provider connectivity
          before making calls or use a FallbackProvider for automatic failover.
        sources:
          - "https://docs.ethers.org/v6/api/providers/jsonrpc/#JsonRpcApiProvider-send"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: wallet.signTransaction
    import_path: "ethers"
    description: >
      Signs a transaction WITHOUT broadcasting it, returning the serialized signed transaction
      as a hex string (RLP-encoded). Used for offline signing flows: cold wallet workflows,
      hardware wallet integrations, meta-transactions, MEV bundle preparation, transaction
      relayers (gas station / Biconomy / OpenZeppelin Defender), multi-sig propose-then-execute
      flows, and any scenario where the signing entity is separated from the broadcasting entity.
      Distinct from sendTransaction() which signs AND broadcasts. Critically, after signing,
      the application is responsible for transporting the serialized string to a broadcaster
      (often via provider.broadcastTransaction or a custom mempool API).
    postconditions:
      # Evidence: lib.esm/wallet/base-wallet.js:80-103 -- signTransaction():
      #   assertArgument(getAddress((tx.from)) === this.address, "transaction from address mismatch", "tx.from", tx.from);
      #   const btx = Transaction.from(tx);  // throws INVALID_ARGUMENT on invalid fields
      #   btx.signature = this.signingKey.sign(btx.unsignedHash);
      #   return btx.serialized;
      # Evidence: lib.esm/transaction/transaction.js -- Transaction.from() asserts on:
      #   - invalid chainId, invalid gasLimit, invalid type, missing required fields per type
      # Evidence: https://docs.ethers.org/v6/api/wallet/#BaseWallet-signTransaction
      - id: signtransaction-from-address-mismatch
        condition: >
          wallet.signTransaction({ from, ... }) is called without a try-catch and the `from`
          field does not match this wallet's address. ethers refuses to sign a transaction
          that claims to be from a different address than the signing key owns — this is a
          deliberate safety check that prevents accidentally signing transactions intended
          for a different wallet (common in multi-wallet apps and key-rotation flows).
        throws: "EthersError with code INVALID_ARGUMENT and argument 'tx.from' (error.code === 'INVALID_ARGUMENT', error.argument === 'tx.from')"
        required_handling: >
          Caller MUST wrap wallet.signTransaction() in try-catch and handle INVALID_ARGUMENT.
          The typical fix is to either omit `from` from the TransactionRequest (ethers will
          fill it in correctly) or verify it matches `await wallet.getAddress()` before
          calling. Use isError(error, 'INVALID_ARGUMENT') to detect. Silent swallowing here
          causes "stuck transaction" debugging nightmares because the offline-signing flow
          fails before broadcast and the broadcaster has no signed payload to relay.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/#BaseWallet-signTransaction"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: signtransaction-invalid-transaction-fields
        condition: >
          wallet.signTransaction(tx) is called without a try-catch and Transaction.from(tx)
          rejects the TransactionRequest because of invalid or inconsistent fields. Common
          causes: type-2 (EIP-1559) transaction missing maxFeePerGas or maxPriorityFeePerGas,
          type-1 (EIP-2930) missing accessList, type-3 (EIP-4844) blob transactions missing
          blobVersionedHashes, type-4 (EIP-7702) authorizationList rejected on chains that
          have not yet activated Pectra, chainId mismatch with provider, gasLimit out of
          uint64 range, or value/nonce/gasPrice not coercible to bigint.
        throws: "EthersError with code INVALID_ARGUMENT (error.code === 'INVALID_ARGUMENT')"
        required_handling: >
          Caller MUST wrap wallet.signTransaction() in try-catch and handle INVALID_ARGUMENT.
          For type-2 transactions, populate maxFeePerGas/maxPriorityFeePerGas via
          provider.getFeeData() before signing. For type-4 (EIP-7702) flows, verify the
          chain has activated the EIP before constructing the authorizationList. For
          dynamic-fee transactions on legacy chains, fall back to type-0 by setting
          `type: 0` and `gasPrice` explicitly. Surface clear error to UI when a
          transaction is unsignable so the user can adjust parameters.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/#BaseWallet-signTransaction"
          - "https://docs.ethers.org/v6/api/transaction/#Transaction"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: wallet.authorize
    import_path: "ethers"
    description: >
      Signs an EIP-7702 authorization (Pectra hardfork), returning an Authorization object
      that designates an EOA's code to a smart-contract implementation. This is the
      account-abstraction-without-erc-4337 primitive that lets a standard EOA temporarily
      execute as a smart contract for a single transaction. The signed Authorization is
      then bundled into a type-4 (SET_CODE_TX_TYPE) transaction's authorizationList by
      the relayer. Available since ethers v6.16.0 (Pectra support shipped in this version).
      Used in EIP-7702 batching, sponsored gas, session keys, and passkey-based wallets.
    postconditions:
      # Evidence: lib.esm/wallet/base-wallet.js:65-72 -- async authorize(auth):
      #   auth = Object.assign({}, auth, { address: await resolveAddress(auth.address, this) });
      #   return this.authorizeSync(await this.populateAuthorization(auth));
      # Evidence: lib.esm/wallet/base-wallet.js:52-63 -- authorizeSync():
      #   assertArgument(typeof (auth.address) === "string", "invalid address for authorizeSync", "auth.address", auth);
      # Evidence: lib.esm/providers/abstract-signer.js -- populateAuthorization():
      #   if (auth.chainId == null) { auth.chainId = (await checkProvider(this, "getNetwork").getNetwork()).chainId; }
      #   if (auth.nonce == null) { auth.nonce = await this.getNonce(); }
      # Evidence: lib.esm/providers/abstract-signer.js -- checkProvider() throws
      #   UNSUPPORTED_OPERATION when wallet has no provider attached.
      # Evidence: https://docs.ethers.org/v6/api/wallet/#BaseWallet-authorize
      # Evidence: https://eips.ethereum.org/EIPS/eip-7702
      - id: authorize-no-provider-for-auto-fill
        condition: >
          wallet.authorize({ address: '0x...' }) is called without a try-catch and either
          chainId or nonce is omitted from the auth object. ethers needs a provider to fetch
          the missing field — chainId via provider.getNetwork() and nonce via wallet.getNonce()
          which calls provider.getTransactionCount(). A wallet constructed without a provider
          (e.g., `new Wallet(privateKey)` instead of `new Wallet(privateKey, provider)`)
          cannot auto-populate these and will throw UNSUPPORTED_OPERATION.
        throws: "EthersError with code UNSUPPORTED_OPERATION (error.code === 'UNSUPPORTED_OPERATION', error.operation === 'getNetwork' or 'getTransactionCount')"
        required_handling: >
          Caller MUST wrap wallet.authorize() in try-catch and either (a) attach a provider
          via wallet.connect(provider) before calling, or (b) supply both chainId and nonce
          explicitly: `wallet.authorize({ address, chainId: 1, nonce })`. For sponsored-gas
          flows where the sponsor knows the chainId in advance, prefer option (b) to avoid
          unnecessary RPC calls. Use isError(error, 'UNSUPPORTED_OPERATION') to detect.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/#BaseWallet-authorize"
          - "https://docs.ethers.org/v6/api/providers/#Provider-getNetwork"
          - "https://eips.ethereum.org/EIPS/eip-7702"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: authorize-invalid-delegate-address
        condition: >
          wallet.authorize({ address }) is called without a try-catch and `address` is not a
          valid checksummed/lowercased Ethereum address string. authorizeSync runs an
          assertArgument check on typeof address === 'string' and then resolveAddress + getAddress
          validate the format. Passing a Promise, undefined, an empty string, or a malformed
          hex string raises INVALID_ARGUMENT. Common in session-key flows where the delegate
          contract address comes from an API response that may have null fields.
        throws: "EthersError with code INVALID_ARGUMENT and argument 'auth.address' (error.code === 'INVALID_ARGUMENT')"
        required_handling: >
          Caller MUST wrap wallet.authorize() in try-catch and validate the delegate address
          BEFORE calling: use ethers.isAddress(address) to pre-check. Handle INVALID_ARGUMENT
          with a clear error to the UI ("Session key contract address is invalid"). Silent
          swallowing causes the user to see a generic "transaction failed" message with no
          way to recover, because the authorization needed for the type-4 transaction is
          never produced.
        sources:
          - "https://docs.ethers.org/v6/api/wallet/#BaseWallet-authorize"
          - "https://docs.ethers.org/v6/api/utils/#getAddress"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: Signer.populateTransaction
    import_path: "ethers"
    description: >
      Prepares a transaction for sending by populating missing fields: resolves to and
      from addresses, populates nonce via signer.getNonce("pending"), populates gasLimit
      via signer.estimateGas(tx), populates chainId via signer.provider.getNetwork(),
      and populates type plus relevant fee data (gasPrice for legacy, maxFeePerGas /
      maxPriorityFeePerGas for EIP-1559). The canonical pre-signing pipeline used by
      sendTransaction internally, but also called directly in offline-signing flows,
      meta-transaction relayers, MEV bundlers, hardware-wallet workflows, and any
      scenario that constructs a fully-populated transaction object before sign.
      Distinct from populateCall (which only resolves to/from for read-only call /
      estimateGas) — populateTransaction additionally fetches nonce, gasLimit, chainId,
      and fee data, making 3+ RPC roundtrips. AbstractSigner.populateTransaction is
      the base implementation inherited by Wallet, JsonRpcSigner, NonceManager, and
      every concrete Signer/Wallet.
    postconditions:
      # Evidence: lib.esm/providers/abstract-signer.js -- async populateTransaction(tx)
      #   const provider = checkProvider(this, "populateTransaction");
      #     -> throws UNSUPPORTED_OPERATION when this.provider is null
      #   if (pop.chainId != null) {
      #     const chainId = getBigInt(pop.chainId);
      #     assertArgument(chainId === network.chainId, "transaction chainId mismatch", "tx.chainId", tx.chainId);
      #   }
      #   const hasEip1559 = (pop.maxFeePerGas != null || pop.maxPriorityFeePerGas != null);
      #   if (pop.gasPrice != null && (pop.type === 2 || hasEip1559)) {
      #     assertArgument(false, "eip-1559 transaction do not support gasPrice", "tx", tx);
      #   }
      #   else if ((pop.type === 0 || pop.type === 1) && hasEip1559) {
      #     assertArgument(false, "pre-eip-1559 transaction do not support maxFeePerGas/maxPriorityFeePerGas", "tx", tx);
      #   }
      #   assert(feeData.gasPrice != null, "network does not support gasPrice", "UNSUPPORTED_OPERATION", { operation: "getGasPrice" });
      #   assert(!hasEip1559, "network does not support EIP-1559", "UNSUPPORTED_OPERATION", { operation: "populateTransaction" });
      # Evidence: https://docs.ethers.org/v6/api/providers/#AbstractSigner-populateTransaction
      # Evidence: https://docs.ethers.org/v6/api/providers/#Signer
      - id: populatetransaction-no-provider
        condition: >
          signer.populateTransaction(tx) is called without a try-catch and the Signer
          has no provider attached. Internally populateTransaction calls
          checkProvider(this, "populateTransaction") which throws UNSUPPORTED_OPERATION
          when this.provider is null — and it must call provider.getNetwork() to fetch
          chainId, provider.getTransactionCount() for nonce, provider.estimateGas() for
          gasLimit, and provider.getFeeData() for fee fields. All four are unavoidable
          unless every field is pre-populated. Common in cold-wallet flows that
          construct `new Wallet(pk)` without a provider intending to sign offline, then
          accidentally invoke populateTransaction instead of just Transaction.from(...).
        throws: "EthersError with code UNSUPPORTED_OPERATION (error.code === 'UNSUPPORTED_OPERATION', error.operation === 'populateTransaction')"
        required_handling: >
          Caller MUST wrap signer.populateTransaction() in try-catch and either (a)
          attach a provider via signer.connect(provider) or new Wallet(pk, provider)
          before calling, or (b) skip populateTransaction entirely and use
          Transaction.from(tx) directly when every field (nonce, gasLimit, chainId,
          fee data) is already populated by the caller (typical for relayer flows
          where the orchestrator pre-computes everything). Use
          isError(error, 'UNSUPPORTED_OPERATION') to detect.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#AbstractSigner-populateTransaction"
          - "https://docs.ethers.org/v6/api/utils/errors/#UnsupportedOperationError"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: populatetransaction-chainid-mismatch
        condition: >
          signer.populateTransaction({ chainId, ... }) is called without a try-catch
          and the supplied tx.chainId does not match the connected provider's network
          chainId. ethers refuses to populate a transaction that would be signed for
          a different chain than the provider is connected to — a safety check that
          prevents accidentally broadcasting a mainnet-signed transaction to a testnet
          provider (or vice versa) and prevents replay-attack confusion. Common in
          multi-chain dApps that switch providers but forget to clear stale tx.chainId
          values from the request builder.
        throws: "EthersError with code INVALID_ARGUMENT and argument 'tx.chainId' (error.code === 'INVALID_ARGUMENT', error.argument === 'tx.chainId')"
        required_handling: >
          Caller MUST wrap signer.populateTransaction() in try-catch and handle
          INVALID_ARGUMENT. Either omit tx.chainId entirely so ethers fills it from
          provider.getNetwork() (preferred), or verify it matches the active provider's
          chainId before calling: `const network = await signer.provider.getNetwork();
          tx.chainId = network.chainId;`. Use isError(error, 'INVALID_ARGUMENT') and
          check error.argument === 'tx.chainId' to distinguish from other invalid-field
          rejections. Silent swallowing causes wrong-chain transaction attempts that
          fail at broadcast with cryptic "unknown chain" errors.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#AbstractSigner-populateTransaction"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: populatetransaction-mixed-fee-fields
        condition: >
          signer.populateTransaction(tx) is called without a try-catch and tx mixes
          pre-EIP-1559 fee fields (gasPrice) with EIP-1559 fee fields (maxFeePerGas,
          maxPriorityFeePerGas) — or sets tx.type=0/1 alongside maxFeePerGas /
          maxPriorityFeePerGas. ethers raises INVALID_ARGUMENT with one of two
          distinct messages: "eip-1559 transaction do not support gasPrice" when
          gasPrice + (type=2 or any 1559 field) is present, or "pre-eip-1559 transaction
          do not support maxFeePerGas/maxPriorityFeePerGas" when type=0 or type=1 is
          set with a 1559 field. Both are common when copy-pasting tx params across
          legacy and modern chains, or when a UI lets the user toggle fee mode
          without clearing the other mode's fields.
        throws: "EthersError with code INVALID_ARGUMENT and argument 'tx' (error.code === 'INVALID_ARGUMENT')"
        required_handling: >
          Caller MUST wrap signer.populateTransaction() in try-catch and handle
          INVALID_ARGUMENT. Either clear all fee fields and let ethers auto-detect
          (omit gasPrice, maxFeePerGas, maxPriorityFeePerGas, and type — preferred
          for cross-chain code), or explicitly pick one fee mode and clear the other:
          `delete tx.gasPrice; tx.type = 2;` for EIP-1559 chains, or
          `delete tx.maxFeePerGas; delete tx.maxPriorityFeePerGas; tx.type = 0;`
          for legacy chains. Use isError(error, 'INVALID_ARGUMENT') to detect.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#AbstractSigner-populateTransaction"
          - "https://eips.ethereum.org/EIPS/eip-1559"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: populatetransaction-network-fee-model-unsupported
        condition: >
          signer.populateTransaction(tx) is called without a try-catch on a network
          whose fee model does not match the requested transaction type. Two distinct
          UNSUPPORTED_OPERATION assertions fire here: (1) when tx.type is 0 or 1
          (legacy) but provider.getFeeData() returns null gasPrice (an EIP-1559-only
          chain like post-Merge mainnet test fixtures), ethers throws "network does not
          support gasPrice" with operation='getGasPrice'; (2) when the tx requests
          EIP-1559 fee fields but provider.getFeeData() returns null maxFeePerGas
          (legacy chains like BNB Chain or older testnets), ethers throws "network
          does not support EIP-1559" with operation='populateTransaction'. Common
          when a multi-chain dApp assumes EIP-1559 is universal and ships a single
          tx-builder configured for type-2 transactions across all chains.
        throws: "EthersError with code UNSUPPORTED_OPERATION (error.code === 'UNSUPPORTED_OPERATION', error.operation === 'getGasPrice' or 'populateTransaction')"
        required_handling: >
          Caller MUST wrap signer.populateTransaction() in try-catch and handle
          UNSUPPORTED_OPERATION. Branch on error.operation: 'getGasPrice' means
          retry with tx.type=2 and EIP-1559 fee fields; 'populateTransaction' means
          retry with tx.type=0 and gasPrice from provider.getFeeData(). Better,
          query provider.getFeeData() once at startup per chain and configure the
          tx-builder per chain's actual fee model rather than assuming EIP-1559.
          Use isError(error, 'UNSUPPORTED_OPERATION') to detect.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#AbstractSigner-populateTransaction"
          - "https://docs.ethers.org/v6/api/providers/#Provider-getFeeData"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: Signer.populateAuthorization
    import_path: "ethers"
    description: >
      Prepares an EIP-7702 (Pectra) authorization for signing by populating missing
      chainId and nonce fields. Sibling to populateTransaction but for type-4
      (SET_CODE_TX_TYPE) authorization payloads — does NOT touch fee fields or
      gasLimit because authorizations are bundled into someone else's transaction
      (the relayer/sponsor). The pre-signing step inside wallet.authorize(): the
      authorize() implementation calls await this.populateAuthorization(auth)
      before authorizeSync(). Called directly when callers want to inspect or
      mutate the fully-populated auth payload before signing — e.g. relayer flows
      that pre-fetch the chainId and nonce server-side and pass them to the
      end-user wallet, or session-key flows that need to verify the nonce against
      a server-side replay-protection record. Available since ethers v6.16.0
      (EIP-7702 / Pectra). Distinct from authorize() which both populates AND
      signs; populateAuthorization() only populates.
    postconditions:
      # Evidence: lib.esm/providers/abstract-signer.js:172-183 -- async populateAuthorization(_auth):
      #   const auth = Object.assign({}, _auth);
      #   if (auth.chainId == null) {
      #     auth.chainId = (await checkProvider(this, "getNetwork").getNetwork()).chainId;
      #   }
      #   if (auth.nonce == null) {
      #     auth.nonce = await this.getNonce();
      #   }
      #   return auth;
      # Evidence: lib.esm/providers/abstract-signer.js -- checkProvider() throws EthersError
      #   with code UNSUPPORTED_OPERATION when this.provider is null. The error.operation
      #   field is set to the second arg ("getNetwork" when chainId missing) or to
      #   "getTransactionCount" when nonce missing (propagated from getNonce()).
      # Evidence: https://docs.ethers.org/v6/api/providers/#AbstractSigner-populateAuthorization
      # Evidence: https://eips.ethereum.org/EIPS/eip-7702
      - id: populateauthorization-no-provider-for-auto-fill
        condition: >
          signer.populateAuthorization({ address: '0x...' }) is called without a try-catch
          and the Signer has no provider attached, AND either chainId or nonce is omitted
          from the input. populateAuthorization needs a provider for two distinct reasons:
          (1) chainId comes from provider.getNetwork() via checkProvider(this, "getNetwork"),
          (2) nonce comes from this.getNonce() which calls provider.getTransactionCount()
          via the same checkProvider gate. Both throw EthersError with
          code='UNSUPPORTED_OPERATION'. Common in offline / cold-wallet flows that
          construct `new Wallet(pk)` without a provider intending to sign a relayer-
          supplied auth payload, but accidentally call populateAuthorization to "fill in
          defaults" instead of passing the pre-populated auth straight to authorizeSync().
        throws: "EthersError with code UNSUPPORTED_OPERATION (error.code === 'UNSUPPORTED_OPERATION', error.operation === 'getNetwork' or 'getTransactionCount')"
        required_handling: >
          Caller MUST wrap signer.populateAuthorization() in try-catch and either
          (a) attach a provider via signer.connect(provider) or new Wallet(pk, provider)
          before calling, or (b) pre-populate BOTH chainId and nonce in the input auth
          object so populateAuthorization is effectively a no-op: `signer.populateAuthorization({
          address, chainId: knownChainId, nonce: knownNonce })`. For relayer flows where
          the server already knows chainId and nonce, prefer option (b) and skip the
          extra RPC roundtrip entirely. Use isError(error, 'UNSUPPORTED_OPERATION') to
          detect and branch on error.operation to know which field was missing.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#AbstractSigner-populateAuthorization"
          - "https://docs.ethers.org/v6/api/utils/errors/#UnsupportedOperationError"
          - "https://eips.ethereum.org/EIPS/eip-7702"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: populateauthorization-network-rpc-failure
        condition: >
          signer.populateAuthorization(auth) is called without a try-catch on a
          provider whose underlying RPC endpoint is unreachable, rate-limited, or
          returns malformed responses for eth_chainId or eth_getTransactionCount.
          provider.getNetwork() and provider.getTransactionCount() both propagate
          EthersError with code='NETWORK_ERROR' (transient connectivity), 'SERVER_ERROR'
          (4xx/5xx from the JSON-RPC endpoint), or 'TIMEOUT' (request exceeded the
          provider's polling deadline). Unlike no-provider-for-auto-fill (a deployment
          bug caught at startup), these are runtime failures that surface whenever the
          upstream RPC is degraded — Infura/Alchemy outages, regional CDN issues, or
          self-hosted node lag during a chain reorg. Critical in sponsored-gas / Pectra
          relayer pipelines where each request triggers two RPC calls before the
          authorization can even be signed.
        throws: "EthersError with code NETWORK_ERROR, SERVER_ERROR, or TIMEOUT (error.code matches one of three transient-failure ErrorCode values)"
        required_handling: >
          Caller MUST wrap signer.populateAuthorization() in try-catch and treat
          NETWORK_ERROR / SERVER_ERROR / TIMEOUT as transient. Retry with exponential
          backoff against a SECONDARY provider endpoint (FallbackProvider pattern) or
          surface a clear "wallet temporarily unavailable" message to the end user.
          For high-volume relayers, cache the chainId per provider for the lifetime
          of the process (it never changes for a connected provider) and supply
          chainId explicitly in the input auth to eliminate one of the two RPC calls.
          Use isError(error, 'NETWORK_ERROR') and friends to discriminate. Silent
          swallowing causes EIP-7702 batched transactions to disappear from the
          relayer queue with no record of why, producing user-visible "funds stuck"
          incidents that are very hard to debug.
        sources:
          - "https://docs.ethers.org/v6/api/providers/#AbstractSigner-populateAuthorization"
          - "https://docs.ethers.org/v6/api/providers/#FallbackProvider"
          - "https://docs.ethers.org/v6/api/utils/errors/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

edge_cases:
  - id: isError-pattern-required
    description: >
      ethers v6 uses a typed error system with error.code (ErrorCode string). The recommended
      pattern is isError(error, "CALL_EXCEPTION") rather than instanceof checks.
      All 21 error codes are in the ErrorCode union: CALL_EXCEPTION, INSUFFICIENT_FUNDS,
      NONCE_EXPIRED, TRANSACTION_REPLACED, TIMEOUT, SERVER_ERROR, NETWORK_ERROR, ACTION_REJECTED, etc.
    sources:
      - "https://docs.ethers.org/v6/api/utils/errors/"
    severity: info
    business_impact:
      incident_label: SILENT_FAILURE
      production_behavior: silent_failure
      visibility: silent
      user_experience: degraded_performance
      incident_cost_range: low

  - id: wait-is-required-after-send
    description: >
      sendTransaction() only BROADCASTS the transaction. It does NOT wait for mining confirmation.
      Application logic that depends on the transaction succeeding (e.g., updating database,
      releasing inventory, confirming payment) MUST call tx.wait() and handle its errors.
      Not calling tx.wait() is a common silent failure pattern in Web3 applications.
    sources:
      - "https://docs.ethers.org/v6/api/providers/#TransactionResponse-wait"
    severity: error
    business_impact:
      incident_label: SILENT_FAILURE
      production_behavior: silent_failure
      visibility: silent
      user_experience: lost_transaction
      incident_cost_range: high

