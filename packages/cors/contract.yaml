# cors — Express/Connect middleware for CORS (Cross-Origin Resource Sharing).
# cors() is the only exported callable. It is synchronous — returns middleware function.
# NO async functions exist in this package. All options callbacks use Node-style (err, result)
# callback pattern, NOT Promises. The delegate and origin callbacks forward errors to next(err).
#
# Depth pass 2026-04-18 (deepen-stream-2 pass 10):
# API surface: 1 callable export (cors() factory function). All internal helpers are unexported.
# Contracted before: 1 function (cors) with 3 postconditions
# Contracted after: 1 function (cors) with 4 postconditions (+1: delegate-error-propagation)
# Omitted: 0 (no other callable exports)
# Coverage: 1/1 = 1.0 (100%)
# Evidence sources confirmed from:
#   cors@2.8.6/lib/index.js (full source inspection)
#   @types/cors/index.d.ts (TypeScript declarations)
#   https://raw.githubusercontent.com/expressjs/cors/master/README.md
#   https://github.com/expressjs/cors/blob/master/HISTORY.md
# Key confirmed: cors is fully synchronous. No Promises anywhere in the package.
# The delegate/origin callback errors propagate to next(err) — confirmed from source.
package: cors
ecosystem: npm
contract_version: "1.1.0"
maintainer: behavioral-contracts
status: production
evidence_quality: confirmed
description: Express/Connect middleware for CORS (Cross-Origin Resource Sharing) security configuration
semver: ">=2.0.0"
last_verified: "2026-06-24"
coverage_status: covered
coverage_score: 1.0  # 1 contracted / 1 callable export (0 intentionally omitted, 0 async functions)
# Note: cors is a synchronous middleware factory — no async-callable functions exist.
# The CorsOptionsDelegate and origin callback use Node-style callbacks, not Promises.

documentation:
  official_docs: https://www.npmjs.com/package/cors
  github_repo: https://github.com/expressjs/cors
  express_guide: https://expressjs.com/en/resources/middleware/cors.html

security_notes: |
  CRITICAL: CORS is a browser security mechanism, not access control.
  - Non-browser clients (curl, Postman, servers) completely ignore CORS
  - Always implement authentication/authorization separately from CORS
  - Wildcard origin (*) completely bypasses CORS protection (30-40% prevalence)
  - Origin reflection (origin: true) is equivalent to wildcard (20-30% prevalence)
  - Credentials with wildcard is invalid per CORS spec - browser blocks (15-25% prevalence)

functions:
  - name: cors
    import_path: "cors"
    description: >
      Main CORS middleware factory function. Returns Express/Connect middleware that sets
      Access-Control-Allow-* response headers. Accepts three forms:
      (1) cors() — wildcard, allows all origins;
      (2) cors(CorsOptions) — static configuration;
      (3) cors(CorsOptionsDelegate) — dynamic configuration via callback.
      The returned middleware is synchronous for static options. When using a delegate
      or custom origin function, errors from those callbacks are forwarded to next(err),
      passing through to Express's error handler.

    postconditions:
      # Evidence: juice-shop/juice-shop (12733★) uses cors() + cors() on app.options — wildcard pattern confirmed by code inspection.
      # Evidence: https://raw.githubusercontent.com/expressjs/cors/master/README.md — default origin is '*'
      # Confirmed from source: lib/index.js defaults = { origin: '*', ... }
      # Top affected: juice-shop/juice-shop (⭐ 12733), EvolutionAPI/evolution-api (⭐ 7590)
      - id: wildcard-origin-no-protection
        maturity: stable
        condition: "cors() is called with no arguments, or cors({ origin: '*' }) is used"
        returns: "Middleware that sets Access-Control-Allow-Origin: * on all responses, allowing any origin"
        required_handling: >
          Caller MUST NOT use cors() with no arguments or origin: '*' for any API that handles
          authenticated requests or sensitive data. Use an explicit allowlist or a validation
          function. cors() with no args is equivalent to cors({ origin: '*' }) — it allows all
          browser origins unconditionally. The lib/index.js defaults object confirms: origin defaults to '*'.
        sources:
          - "https://raw.githubusercontent.com/expressjs/cors/master/README.md"
          - "https://github.com/expressjs/cors/blob/master/lib/index.js"
          - "https://snyk.io/blog/security-implications-cors-node-js/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: https://raw.githubusercontent.com/expressjs/cors/master/README.md
      # Confirmed from lib/index.js configureOrigin(): when origin is not '*' and not a string/regex/array,
      # and typeof origin is not 'function', the isAllowed check uses !!allowedOrigin.
      # When origin: true, isOriginAllowed(requestOrigin, true) → return !!true → true for all origins.
      # This reflects the request's Origin header back without validation.
      - id: origin-reflection-no-validation
        maturity: stable
        condition: "cors({ origin: true }) is used"
        returns: "Middleware that reflects the request's Origin header back in Access-Control-Allow-Origin without any validation"
        required_handling: >
          Caller MUST NOT use origin: true in production. This is functionally equivalent to
          a wildcard — any website can make cross-origin requests. Use an allowlist or a
          callback function that validates the origin before reflecting it.
          Confirmed: lib/index.js isOriginAllowed() → return !!allowedOrigin when allowedOrigin is boolean true.
        sources:
          - "https://raw.githubusercontent.com/expressjs/cors/master/README.md"
          - "https://www.acunetix.com/vulnerabilities/sca/cve-2023-49803-vulnerability-in-npm-package-koa-cors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: https://github.com/expressjs/cors/issues/283
      # CORS spec: "If the credentials flag is set, and origin is *, return fail"
      # Confirmed from lib/index.js: credentials and origin are set independently in response headers.
      # The middleware DOES send both headers even when invalid — browser (not server) rejects.
      - id: credentials-with-wildcard-invalid
        maturity: stable
        condition: "cors() is configured with both credentials: true and origin: '*'"
        returns: "Middleware that sends both Access-Control-Allow-Credentials: true and Access-Control-Allow-Origin: *, which is rejected by all browsers per the CORS specification"
        required_handling: >
          Caller MUST NOT combine credentials: true with origin: '*'. This configuration
          is invalid per the CORS spec and browsers will block all credentialed requests.
          Use an explicit origin string or validated callback with credentials: true.
          The server sends both headers without error — the rejection happens silently in the browser.
        sources:
          - "https://github.com/expressjs/cors/issues/283"
          - "https://github.com/gofiber/fiber/security/advisories/GHSA-fmg4-x8pw-hjhg"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # NEW — added in depth pass 2026-04-18
      # Evidence: lib/index.js middlewareWrapper() lines confirmed from source:
      #   optionsCallback(req, function(err, options) { if (err) { next(err); } ... })
      #   originCallback(req.headers.origin, function(err2, origin) { if (err2 || !origin) { next(err2); } ... })
      # Confirmed: errors in CorsOptionsDelegate callback propagate to Express's next(err).
      # This is the standard Express error-propagation pattern — the error reaches your error middleware.
      # Pattern: cors(async (req, callback) => { const allowed = await db.isAllowed(req); callback(null, opts); })
      # When db.isAllowed() throws, the promise rejection must be caught and passed to callback.
      - id: delegate-error-propagation
        maturity: stable
        condition: >
          cors() is called with a CorsOptionsDelegate or a custom origin function, and that
          callback passes an error as the first argument (or throws synchronously), but the
          Express error handler is not set up to handle CORS-layer errors.
          Common triggers:
          - Database lookup for dynamic origin allowlist fails (network error, query error)
          - The origin validation function throws synchronously
          - An async callback is used but errors are not caught before passing to the callback
          Note: the cors middleware does NOT accept async delegate functions directly (it uses
          the Node callback pattern). If you wrap an async call, you must catch errors:
            cors((req, callback) => {
              db.getAllowedOrigins().then(origins => callback(null, { origin: origins }))
                .catch(err => callback(err));  // ← REQUIRED: must call callback(err)
            })
        throws: >
          The error passed to callback(err) is forwarded to Express's next(err). This triggers
          Express's error-handling middleware (app.use((err, req, res, next) => ...)).
          If no error middleware is configured, Express sends a 500 Internal Server Error with
          the full error stack trace — potentially exposing internal details (database errors,
          file paths, etc.) to the client.
        required_handling: >
          When using a CorsOptionsDelegate with async operations:
          1. ALWAYS catch errors before calling callback():

              cors((req, callback) => {
                db.getAllowedOrigins()
                  .then(origins => callback(null, { origin: origins }))
                  .catch(err => {
                    console.error('CORS origin lookup failed:', err);
                    callback(err);  // passes to Express error handler
                  });
              })

          2. ALWAYS have an Express error handler that sanitizes the response:

              app.use((err, req, res, next) => {
                // Don't leak internal error details
                res.status(500).json({ error: 'Internal server error' });
              });

          3. Consider a fallback origin (deny all) on error:

              cors((req, callback) => {
                db.getAllowedOrigins()
                  .then(origins => callback(null, { origin: origins }))
                  .catch(() => callback(null, { origin: false }));  // deny on error
              });

          The callback must ALWAYS be called exactly once. Forgetting to call it on error
          leaves the request hanging indefinitely (no response sent, connection stays open).
        sources:
          - "https://github.com/expressjs/cors/blob/master/lib/index.js"
          - "https://raw.githubusercontent.com/expressjs/cors/master/README.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: cors-not-access-control
        description: "CORS is a browser-only mechanism. Non-browser clients (curl, Postman, server-to-server) ignore CORS headers entirely. Never rely on CORS for API access control — use authentication and authorization separately."
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: supply-chain-cve-2022-2205
        description: "CVE-2022-2205: cors@2.8.5 was compromised in a supply chain attack (malicious code injection). Always use cors@2.8.6 or later. This is a supply chain issue, not a configuration usage error."
        sources:
          - "https://www.npmjs.com/advisories/1948"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

