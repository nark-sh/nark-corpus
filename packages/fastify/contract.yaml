package: fastify
semver: ">=5.0.0 <6.0.0"
contract_version: "1.4.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 11 contracted / 11 total async-callable functions (inject + WebDAV verbs + Symbol.asyncDispose omitted as documented below). +1 this pass: route (deepen-stream-3 pass 84, 2026-06-24 — fastify@5.8.5). Previous: setNotFoundHandler (pass 15, 2026-06-18).

detection:
  factory_methods:
    - fastify
  type_names:
    - FastifyInstance
    - FastifyRequest
    - FastifyReply

functions:
  - name: get
    import_path: "fastify"
    description: "Registers GET route handler. Also applies to post, put, delete, patch, options, head, and route() registration methods which have identical error handling behavior."
    postconditions:
      - id: route-handler-timeout
        maturity: stable
        # Evidence: https://fastify.dev/docs/latest/Reference/Server/#handlertimeout
        # Error code confirmed from fastify/lib/errors.js: FST_ERR_HANDLER_TIMEOUT, status 503
        # Source: handlerTimeout option added in Fastify 5. Default 0 (disabled). Per-route override supported.
        condition: "route handler does not send a response within handlerTimeout milliseconds (when handlerTimeout > 0 is configured at server or route level)"
        throws: "FST_ERR_HANDLER_TIMEOUT — 503 Service Unavailable sent through error handler. Handler async work continues running unless request.signal is monitored."
        required_handling: "Use request.signal for cooperative cancellation: pass it to fetch(), database queries, and stream.pipeline() so async work stops when the timeout fires. Override FST_ERR_HANDLER_TIMEOUT in setErrorHandler or route-level errorHandler to return 504 instead of 503 for downstream timeouts. Without signal monitoring, background work leaks resources after the client receives the 503."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/#handlertimeout
          - "https://fastify.dev/docs/latest/Reference/Server/"
          - "https://fastify.dev/docs/latest/Reference/Request/#requestsignal"
        severity: info
        # Downgraded from warning to info (2026-04-21): handlerTimeout defaults to 0 (disabled).
        # This postcondition only applies when handlerTimeout > 0 is explicitly configured, which
        # the scanner cannot detect. Flagging every route handler produced 67 FPs in rybbit.
        # concern-20260421-fastify-route-handler-fp
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: listen
    import_path: "fastify"
    description: "Binds server to a port and starts accepting connections. Returns a Promise<string> resolving to the server address. Must be awaited to detect startup failures."
    postconditions:
      # Evidence: 6 primary firings across 5 repos in scan-fastify-2026-06-29.json
      # Top affected: supabase/storage (⭐1239), cita-777/metapi (⭐1176), Pimzino/claude-code-spec-workflow (⭐3570)
      - id: listen-port-in-use
        maturity: stable
        condition: "port is already bound by another process (listen() called on occupied port)"
        throws: "Error with code EADDRINUSE — Node.js system error"
        required_handling: "Await listen() in try-catch. On EADDRINUSE, either use a different port or check that previous server instances were properly closed before restarting. Port 0 picks a random available port as an alternative."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/ — listen() section
          - "https://fastify.dev/docs/latest/Reference/Server/"
          - "https://nodejs.org/api/errors.html#common-system-errors"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: listen-plugin-timeout
        maturity: stable
        condition: "registered plugins do not call done() / resolve their promises within pluginTimeout ms (default 10000ms) before listen() completes initialization"
        throws: "Error with code ERR_AVVIO_PLUGIN_TIMEOUT — thrown by fastify's avvio plugin system"
        required_handling: "Await listen() in try-catch. Ensure all plugins call their done callback or resolve async. Set pluginTimeout option higher if plugins legitimately take longer (e.g., database connection pools). Log error and exit process cleanly on failure."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/ — pluginTimeout option and avvio docs
          - "https://fastify.dev/docs/latest/Reference/Server/"
          - "https://github.com/fastify/avvio"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: listen-container-binding
        maturity: stable
        condition: "server needs to be reachable from outside its container/VM but listen() is called with '127.0.0.1' (localhost-only)"
        throws: "No error thrown — server starts successfully but is unreachable externally; requests silently time out"
        required_handling: "In containerized environments (Docker, Kubernetes, AWS ECS), call listen({ port: 3000, host: '0.0.0.0' }) to bind all interfaces. '127.0.0.1' is correct only for development where external access is not needed."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Guides/Getting-Started/ — deployment section
          - "https://fastify.dev/docs/latest/Guides/Getting-Started/"
          - "https://fastify.dev/docs/latest/Reference/Server/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: close
    import_path: "fastify"
    description: "Gracefully shuts down the server, stopping new connections and draining existing ones. Returns Promise<undefined>. Must be awaited to ensure complete shutdown."
    postconditions:
      # Evidence: 6 primary firings across 5 repos in scan-fastify-2026-06-29.json
      # Top affected: supabase/storage (⭐1239), cita-777/metapi (⭐1176), Pimzino/spec-workflow-mcp (⭐4054)
      - id: close-websocket-connection-leak
        maturity: stable
        condition: "server has active WebSocket or HTTP upgrade connections when close() is called"
        throws: "close() hangs indefinitely — upgraded connections are not tracked by fastify's connection counter and prevent shutdown from completing"
        required_handling: "Track WebSocket connections manually. In an 'onClose' hook or preClose handler, explicitly call ws.terminate() on all active WebSocket clients before awaiting close(). Without this, process.exit() may be required to force shutdown, risking data loss."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/#close — close() docs
          - "https://fastify.dev/docs/latest/Reference/Server/"
          - "https://github.com/fastify/fastify-websocket"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: close-hook-error
        maturity: stable
        condition: "an onClose or preClose lifecycle hook throws or rejects during server shutdown"
        throws: "Error from the hook propagates as close() promise rejection"
        required_handling: "Await close() in try-catch. Log shutdown errors but still proceed with cleanup. Use finally block to ensure any remaining cleanup code runs even if a hook fails."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Hooks/#onclose"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: ready
    import_path: "fastify"
    description: "Waits for all registered plugins to finish loading. Returns SafePromiseLike. Must be awaited before injecting or if you need plugins fully loaded without calling listen()."
    postconditions:
      - id: ready-plugin-timeout
        maturity: stable
        condition: "a registered plugin does not call done() or resolve its async function within pluginTimeout ms (default 10000ms)"
        throws: "Error with code ERR_AVVIO_PLUGIN_TIMEOUT — thrown by avvio, fastify's plugin loading system"
        required_handling: "Await ready() in try-catch. Identify the slow plugin by checking the error message which includes the plugin name. Fix the plugin to complete initialization or increase pluginTimeout in fastify options. Log the error with full stack trace for debugging."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/#ready
          - "https://fastify.dev/docs/latest/Reference/Server/"
          - "https://github.com/fastify/avvio#ready"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: ready-plugin-init-error
        maturity: stable
        condition: "a plugin's async initializer rejects with an error (e.g., database connection fails during plugin setup)"
        throws: "The plugin's error propagates through ready() promise rejection"
        required_handling: "Await ready() in try-catch. Handle initialization failures explicitly — log details, emit alerts, and exit process with non-zero code so process managers (systemd, k8s, Docker) restart the service."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Plugins/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: register
    import_path: "fastify"
    description: "Registers a plugin (encapsulated scope with routes, hooks, decorators). Internally schedules async plugin initialization via avvio. Errors surface at ready() or listen() time, not at register() call time."
    postconditions:
      - id: register-errors-deferred-to-ready
        maturity: stable
        condition: "a plugin's async initializer throws or rejects (database connection, external service registration failure, missing configuration)"
        throws: "Error is NOT thrown at register() call time — it defers and surfaces when ready() or listen() is awaited"
        required_handling: "Always await ready() or listen() in try-catch after all register() calls. Do not assume that a synchronous register() call means the plugin loaded successfully. Plugin initialization errors will only surface asynchronously."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Plugins/
          - "https://fastify.dev/docs/latest/Reference/Plugins/"
          - "https://fastify.dev/docs/latest/Reference/Server/"
        severity: info
        # Downgraded from error to info (2026-04-21): register() errors surface at listen()/ready() which are
        # already contracted via listen-port-in-use/listen-plugin-timeout/ready-plugin-timeout. Flagging every
        # register() call as an error produced 170 FPs (158 supabase/storage, 12 rybbit-io/rybbit) across
        # well-structured Fastify apps that properly await listen() in try-catch.
        # concern-20260421-fastify-register-fp
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: register-plugin-timeout
        maturity: stable
        condition: "plugin async initializer takes longer than pluginTimeout (default 10000ms) to call done() or resolve"
        throws: "Error with code ERR_AVVIO_PLUGIN_TIMEOUT — surfaces at ready() or listen(), not at register()"
        required_handling: "Use fp-options or fastify-plugin options to set a per-plugin timeout, or increase global pluginTimeout. Ensure async plugin inits complete promptly. Log plugin name from error message to identify the culprit."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Server/"
          - "https://github.com/fastify/avvio"
        severity: info
        # Downgraded from error to info (2026-04-21): register() is synchronous — errors surface
        # at ready()/listen() which are already contracted. Same rationale as register-errors-deferred-to-ready.
        # Flagging every register() call produced 13 FPs in rybbit.
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: after
    import_path: "fastify"
    description: "Registers a callback to run after the previous register() call completes loading its plugin. Used for imperative sequential plugin setup. Callback receives (err) parameter."
    postconditions:
      - id: after-error-parameter-unchecked
        maturity: stable
        condition: "the previous register() call's plugin threw an error during initialization and after() callback ignores the err parameter"
        throws: "Plugin initialization error is silently swallowed — no exception propagates, but the plugin is not loaded"
        required_handling: "Always check the err parameter in after() callback: app.after((err) => { if (err) throw err; }). Re-throwing ensures the error propagates to ready()/listen() where it can be caught."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/#after
          - "https://fastify.dev/docs/latest/Reference/Server/"
          - "https://github.com/fastify/avvio#afterfn"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: addHook
    import_path: "fastify"
    description: >
      Registers a lifecycle hook function that runs during request or application
      events. Async hooks must return a Promise; sync hooks use the done() callback.
      Hook errors affect request handling or shutdown depending on hook type.
    postconditions:
      # Evidence: 10 primary firings across 3 repos in scan-fastify-2026-06-29.json
      # Top affected: Pimzino/spec-workflow-mcp (⭐4054), Peppermint-Lab/peppermint, cita-777/metapi
      # Error behavior confirmed from fastify source and docs
      # FP context (2026-05-17 measurement vs misskey backend, 10 hits):
      #   Every flagged callsite was an `onRequest` hook in a misskey project that
      #   has `setErrorHandler` configured at the global server scope. Fastify
      #   catches the hook throw and routes it through setErrorHandler, so the
      #   user-visible behavior is the formatted error response, not an uncaught
      #   500. Severity downgraded from `error` to `warning` 2026-05-18: the
      #   postcondition still captures a real concern for bare scaffolds (no
      #   setErrorHandler), but in the common case where setErrorHandler is
      #   configured the per-callsite try-catch is redundant. A future scanner
      #   upgrade (§11.C) could detect setErrorHandler project-wide and suppress
      #   this entirely; until then, the warning severity reflects the reduced
      #   blast radius without losing the signal for projects that need it.
      - id: addhook-async-hook-no-try-catch
        maturity: stable
        condition: "async lifecycle hook (onRequest, preParsing, preValidation, preHandler, onSend, preSerialization) throws or rejects without try-catch"
        throws: "Error triggers request error handling chain — passed to setErrorHandler if configured, otherwise returns 500 Internal Server Error"
        required_handling: "EITHER configure setErrorHandler at the server (Fastify routes hook throws through it, formatting the response), OR wrap async hook body in try-catch and return a meaningful response via reply.code(status).send(error). The first path is preferred for projects with cross-cutting error handling."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Hooks/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: addhook-onclose-async-unhandled
        maturity: stable
        condition: "async onClose hook throws or rejects, and close() is called without try-catch (e.g., in a SIGTERM handler)"
        throws: "close() promise rejects — if not caught, becomes an unhandled rejection; database connection pool may not be released"
        required_handling: "Await close() in try-catch in SIGTERM/SIGINT handlers. Wrap onClose hook body in try-catch and log errors. Use finally block to ensure cleanup code runs even if a hook fails."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Hooks/#onclose"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: setErrorHandler
    import_path: "fastify"
    description: >
      Registers a global error handler for all unhandled exceptions in the request lifecycle.
      Must be called before server.listen() or server.ready(). The handler receives
      (error, request, reply) and can be async. Scoped per-plugin via Fastify's encapsulation.
      Does NOT catch onResponse hook errors or 404 errors (use setNotFoundHandler for 404s).
    postconditions:
      # Evidence: https://fastify.dev/docs/latest/Reference/Server/#seterrorhandler
      # Error codes confirmed from fastify/fastify.js and fastify/lib/errors.js
      - id: seterrorhandler-called-after-start
        maturity: stable
        # Source: throwIfAlreadyStarted('Cannot call "setErrorHandler"!') — fastify.js:742
        condition: "setErrorHandler() is called after fastify.listen() or fastify.ready() has been awaited (server already started)"
        throws: "Error: Cannot call \"setErrorHandler\" when fastify instance is already started!"
        required_handling: "Call setErrorHandler() during server setup, before awaiting listen() or ready(). In plugins, setErrorHandler() is always safe to call since plugins execute before server starts."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/#seterrorhandler
          - "https://fastify.dev/docs/latest/Reference/Server/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: seterrorhandler-not-function
        maturity: stable
        # Source: FST_ERR_ERROR_HANDLER_NOT_FN in fastify/lib/errors.js — 'Error Handler must be a function'
        condition: "setErrorHandler() is called with a non-function argument (undefined, null, an object)"
        throws: "FST_ERR_ERROR_HANDLER_NOT_FN — TypeError: Error Handler must be a function"
        required_handling: "Pass a function to setErrorHandler(). This is a programming error that surfaces at startup time, not in production traffic."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Server/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: seterrorhandler-already-set
        maturity: stable
        # Source: FST_ERR_ERROR_HANDLER_ALREADY_SET in fastify/lib/errors.js
        # 'Error Handler already set in this scope. Set allowErrorHandlerOverride: true to allow overriding.'
        condition: "setErrorHandler() is called twice in the same plugin scope without allowErrorHandlerOverride: true"
        throws: "FST_ERR_ERROR_HANDLER_ALREADY_SET — TypeError thrown synchronously"
        required_handling: "Set allowErrorHandlerOverride: true in fastify() options when you need to replace an existing error handler (e.g., during testing or plugin composition). Each encapsulated plugin scope can have its own error handler without this issue."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/#allowerrorhandleroverride
          - "https://fastify.dev/docs/latest/Reference/Server/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: seterrorhandler-handler-itself-throws
        maturity: stable
        # Source: fastify/lib/error-handler.js — handleError() function
        # 'In case the error handler throws, we set the next errorHandler so we can error again'
        # Fastify walks up the prototype chain of error handlers if one throws
        condition: "the registered error handler function itself throws synchronously or its Promise rejects"
        throws: "Error propagates to the parent plugin scope's error handler. If no parent handler exists, the root default handler handles it. A completely broken error handler chain causes an unformatted 500 response from the fallback handler."
        required_handling: "Wrap error handler body in try-catch. Log errors before sending the response. If the error handler throws, Fastify will NOT retry with the same handler — it falls back to the parent scope or root default handler, which may return a different error format than expected by clients."
        sources:
          # Confirmed from fastify/lib/error-handler.js — handleError() kReplyNextErrorHandler pattern
          - "https://fastify.dev/docs/latest/Reference/Server/#seterrorhandler"
          - "https://fastify.dev/docs/latest/Reference/Hooks/#onerror"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: addContentTypeParser
    import_path: "fastify"
    description: >
      Registers a custom body parser for a specific content-type. The parser function
      receives (request, rawBody) and can be synchronous (callback-based with done(err, body))
      or async (returning Promise). Errors from parsers flow through the standard
      setErrorHandler chain with appropriate HTTP status codes.
    postconditions:
      # Evidence: 13 primary firings across 4 repos in scan-fastify-2026-06-29.json
      # Top affected: activepieces/activepieces (⭐21381), supabase/storage (⭐1239)
      # Error codes confirmed from fastify/lib/errors.js
      - id: addcontenttype-body-too-large
        maturity: stable
        # Source: FST_ERR_CTP_BODY_TOO_LARGE in errors.js — 'Request body is too large', status 413 (RangeError)
        condition: "request body size exceeds the bodyLimit configured in fastify options (default 1MB) or per-route bodyLimit"
        throws: "FST_ERR_CTP_BODY_TOO_LARGE — 413 Request Entity Too Large. Thrown before the custom parser is called."
        required_handling: "Handle FST_ERR_CTP_BODY_TOO_LARGE in setErrorHandler to return a user-friendly 413 message. Increase bodyLimit per-route for file upload routes. Do not increase globally as it expands the attack surface for DoS."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/ContentTypeParser/
          - "https://fastify.dev/docs/latest/Reference/ContentTypeParser/"
          - "https://fastify.dev/docs/latest/Reference/Server/#bodylimit"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: addcontenttype-invalid-media-type
        maturity: stable
        # Source: FST_ERR_CTP_INVALID_MEDIA_TYPE in errors.js — 'Unsupported Media Type', status 415
        condition: "client sends a content-type for which no parser is registered (neither default JSON/text parser nor a custom addContentTypeParser)"
        throws: "FST_ERR_CTP_INVALID_MEDIA_TYPE — 415 Unsupported Media Type. Returned before any route handler is called."
        required_handling: "Register parsers for all content-types your API accepts. Add a catch-all parser with '*' or 'application/*' for APIs accepting arbitrary binary payloads. Handle FST_ERR_CTP_INVALID_MEDIA_TYPE in setErrorHandler to return consistent error format."
        sources:
          - "https://fastify.dev/docs/latest/Reference/ContentTypeParser/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: addcontenttype-async-parser-rejects
        maturity: stable
        # Source: content-type-parser.d.ts — FastifyBodyParser supports: (req, body) => Promise<any>
        # Async parsers are documented: https://fastify.dev/docs/latest/Reference/ContentTypeParser/
        condition: "an async custom parser rejects or throws (invalid encoding, decompression error, schema mismatch)"
        throws: "The rejection error propagates to setErrorHandler with the same status code the parser set, or 500 if none was set. The raw error object is passed as-is."
        required_handling: "Wrap async parser body in try-catch and set err.statusCode before throwing to control the HTTP response code. Pass errors to done(err) for callback-based parsers. Without explicit status codes, parsing errors return 500 instead of the semantically correct 400."
        sources:
          - "https://fastify.dev/docs/latest/Reference/ContentTypeParser/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

  - name: setNotFoundHandler
    import_path: "fastify"
    description: >
      Registers a route-handler-style function invoked when no registered route matches
      the incoming request. Distinct from setErrorHandler — setErrorHandler does NOT
      catch 404s. Encapsulated per plugin scope (each prefix can have its own 404
      handler). Optional opts object accepts preValidation / preHandler hooks. Must be
      called before listen()/ready(). The handler itself receives (request, reply) and
      can be async; thrown errors flow through setErrorHandler, not back through the
      404 path.
    postconditions:
      # Evidence: 6 primary firings across 6 repos in scan-fastify-2026-06-29.json
      # Top affected: supabase/storage (⭐1239), cita-777/metapi (⭐1176), Pimzino/spec-workflow-mcp (⭐4054)
      # Error codes confirmed from fastify/fastify.js:694-697 and fastify/lib/four-oh-four.js:93-94
      - id: setnotfoundhandler-called-after-start
        maturity: stable
        # Source: throwIfAlreadyStarted('Cannot call "setNotFoundHandler"!') — fastify.js:695
        condition: "setNotFoundHandler() is called after fastify.listen() or fastify.ready() has been awaited (server already started)"
        throws: "Error: Cannot call \"setNotFoundHandler\" when fastify instance is already started!"
        required_handling: "Call setNotFoundHandler() during server setup, before awaiting listen() or ready(). In plugins, setNotFoundHandler() is always safe to call since plugins execute before server starts. Late registration is a startup-only error — visible immediately on next deploy."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Server/#setnotfoundhandler
          - "https://fastify.dev/docs/latest/Reference/Server/"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: setnotfoundhandler-already-set
        maturity: stable
        # Source: fastify/lib/four-oh-four.js:93-94 — throw new Error("Not found handler already set ...")
        # Each prefix can have at most ONE 404 handler. Encapsulated plugin scopes
        # may each register their own, but registering twice in the same scope throws.
        condition: "setNotFoundHandler() is called twice for the same Fastify instance / plugin prefix"
        throws: "Error: Not found handler already set for Fastify instance with prefix: '<prefix>' — thrown synchronously"
        required_handling: "Register the 404 handler exactly once per encapsulated scope. If you need a different 404 response under a sub-prefix, register the handler inside the corresponding plugin's register() body — the plugin's scope owns its own 404 handler independently of the root."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Server/"
          - "https://fastify.dev/docs/latest/Reference/Plugins/"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: setnotfoundhandler-handler-throws-routes-via-error-handler
        maturity: stable
        # Source: fastify/lib/four-oh-four.js — 404 handler errors are routed through the request lifecycle
        # which means setErrorHandler catches them, NOT the 404 path. A 404 handler that
        # throws bypasses the intended 404 response and may return 500 instead.
        condition: "the registered 404 handler function itself throws synchronously, awaits a rejected promise, or fails to send a response"
        throws: "Error is routed through setErrorHandler (NOT through the 404 path again) — the client receives the formatted error response from setErrorHandler, typically 500 Internal Server Error, NOT the intended 404. If no setErrorHandler is configured, returns an unformatted 500."
        required_handling: "Wrap the 404 handler body in try-catch when it does I/O (e.g., logging unknown-route attempts to a database, fetching analytics). On failure, call reply.code(404).send({ message: 'Not Found' }) explicitly so the response status reflects the real intent. Without this, debugging looks confusing — client logs show 500 from a route that should be 404."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Server/#setnotfoundhandler"
          - "https://fastify.dev/docs/latest/Reference/Hooks/#onerror"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: route
    import_path: "fastify"
    description: >
      Imperative full-route registration. Equivalent in error behavior to the
      shorthand methods (get/post/put/delete/patch/options/head) for the
      handler-runtime contract, but exposes distinct startup-time programming
      errors that the shorthand methods route through their own argument
      shapes. route() accepts an options object — the validation errors below
      are thrown synchronously at registration time, not deferred to
      listen()/ready().
    postconditions:
      # Evidence: https://fastify.dev/docs/latest/Reference/Routes/
      # Error codes confirmed from fastify/lib/errors.js and fastify/lib/route.js
      - id: route-duplicated-route
        maturity: stable
        # Source: fastify/lib/route.js:370 — throw new FST_ERR_DUPLICATED_ROUTE(opts.method, opts.url)
        # Surfaces when find-my-way's underlying router detects an existing handler
        # for the same method:url pair. Detected at registration time, not at request time.
        condition: "route({ method, url }) is called with a method+url pair that was already registered earlier in the same server / plugin scope"
        throws: "FST_ERR_DUPLICATED_ROUTE — Error: Method '<method>' already declared for route '<url>'. Thrown synchronously by route() at registration time."
        required_handling: "This is a startup-time programming error — surfaces immediately on next deploy, before listen() returns. Use distinct URLs per method, or register the route under an encapsulated plugin prefix so each scope owns its own route table. Catch is unnecessary for production hot paths; the failure is caught by the startup process manager (systemd, k8s) restart loop."
        sources:
          # Fetched: https://fastify.dev/docs/latest/Reference/Errors/
          - "https://fastify.dev/docs/latest/Reference/Errors/"
          - "https://fastify.dev/docs/latest/Reference/Routes/"
        severity: info
        # Severity = info (not warning/error): this is a startup-only programming error.
        # If it would fire in production, it already prevented listen() from completing
        # on the previous deploy. Treating it as a per-callsite warning would flag
        # every route registration call in normal Fastify apps — same FP shape as
        # the register() postconditions downgraded 2026-04-21. Kept on the contract
        # for documentation completeness so consumers can ground the FST_ERR_*
        # error code in their own error handlers if they choose.
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: route-handler-not-fn
        maturity: stable
        # Source: fastify/lib/errors.js:389 — FST_ERR_ROUTE_HANDLER_NOT_FN
        # Source: fastify/lib/errors.js:395 — FST_ERR_ROUTE_MISSING_HANDLER
        # Source: fastify/lib/errors.js:384 — FST_ERR_ROUTE_DUPLICATED_HANDLER
        condition: "route() is called without a handler function in opts.handler, with a non-function handler, or with both opts.handler and opts.method[].handler set"
        throws: "FST_ERR_ROUTE_HANDLER_NOT_FN — TypeError, OR FST_ERR_ROUTE_MISSING_HANDLER — Error, OR FST_ERR_ROUTE_DUPLICATED_HANDLER — Error. Thrown synchronously by route() at registration time."
        required_handling: "Pass exactly one handler function via opts.handler. These are programming errors that fail at startup, not in production traffic. No per-callsite try-catch needed — the error fails the deploy."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Errors/"
          - "https://fastify.dev/docs/latest/Reference/Routes/"
        severity: info
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: route-method-not-supported
        maturity: stable
        # Source: fastify/lib/errors.js:400 — FST_ERR_ROUTE_METHOD_INVALID (typeof method !== 'string')
        # Source: fastify/lib/errors.js:406 — FST_ERR_ROUTE_METHOD_NOT_SUPPORTED (unknown method)
        # Source: fastify/lib/route.js normalizeAndValidateMethod() — both throws here
        # Note: Fastify 5 added addHttpMethod() to register custom non-standard methods;
        # without that call, only GET/HEAD/TRACE/DELETE/OPTIONS/PATCH/PUT/POST are accepted.
        condition: "route({ method }) is called with a non-string method (e.g. number, null) or a string that is not a built-in HTTP method and was not registered via addHttpMethod()"
        throws: "FST_ERR_ROUTE_METHOD_INVALID — TypeError: Provided method is invalid! OR FST_ERR_ROUTE_METHOD_NOT_SUPPORTED — Error: <method> method is not supported. Thrown synchronously by route() at registration time."
        required_handling: "Use a standard HTTP method or register custom methods via fastify.addHttpMethod() before calling route(). Startup programming error — fails the deploy, not a runtime contract."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Errors/"
          - "https://fastify.dev/docs/latest/Reference/Routes/"
        severity: info
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

