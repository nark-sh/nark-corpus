package: fastify
semver: ">=5.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed

detection:
  factory_methods:
    - fastify
  type_names:
    - FastifyInstance
    - FastifyRequest
    - FastifyReply

functions:
  - name: get
    import_path: "fastify"
    description: "Registers GET route handler. Also applies to post, put, delete, patch, options, head route registration methods which have identical error handling behavior."
    postconditions:
      - id: route-handler-async-error
        condition: "async route handler throws error or promise rejects (database error, validation error)"
        throws: "Error causing 500 Internal Server Error if no error handler is configured"
        required_handling: "Route handlers MUST handle async errors with try-catch or configure setErrorHandler. Unhandled async errors crash server unless error handler is configured. Use try-catch and reply.code(statusCode).send(error) for controlled error responses."
        sources:
          - "https://fastify.dev/docs/latest/Reference/Routes/"
        severity: error
        # Evidence: seen in 111 primary firings across 6 repos in scan-fastify-2026-04-02.json
        # Top affected: Peppermint-Lab/peppermint (⭐ 3069), Pimzino/spec-workflow-mcp (⭐ 4054), matt1398/claude-devtools (⭐ 2424)
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

edge_cases:
  - id: error-handler-configuration
    description: "Configure setErrorHandler at app or route level for centralized error handling - prevents inconsistent error responses and provides proper error formatting"
    sources:
      - "https://fastify.dev/docs/latest/Reference/Server/#seterrorhandler"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

