package: "@apalchys/pino-cloudwatch"
semver: ">=0.0.0"
contract_version: "1.0.0"
maintainer: "nark-sh"
last_verified: "2026-06-11"
coverage_status: "out-of-scope"
skip_reason: "low-callsite"
researched_at: "2026-06-11"
coverage_rationale: |
  @apalchys/pino-cloudwatch is a pino transport plugin (CloudWatch Logs sink)
  described by its own README as a "simple pino transport that buffers and holds
  pino logs until [conditions are met]". The npm description is "CloudWatch Logs
  transport for pino" with keywords [pino, cloudwatch, logs, logger].

  The package exports a single factory function `CloudWatchStreamFunc(options, errorHandler?)`
  (see index.d.ts) that returns a Node Writable stream. Two real-world usage
  patterns observed in the only consumer found (rolling-scopes/rsschool-app,
  the package's coverage target):

    1. nestjs/src/core/pino.ts — `cloudwatchStream({ ... })` called once at
       startup, returned stream handed to pino-http config as a destination.
       No try/catch, no .on('error') — the value is passed to pino as a config
       option, not awaited.
    2. server/src/logger.ts — `cloudwatch({ ... })` called once at startup,
       returned stream pushed into a streams array consumed by pino-multi-stream.
       No try/catch, no .on('error') in the file.

  Neither call site is a candidate for a behavioral contract postcondition.
  The factory is synchronous, returns a stream, and does not throw a documented
  Promise rejection that application code awaits. Error semantics live on the
  returned stream (via Node's Writable `'error'` event or the optional
  `errorHandler` callback in `CloudWatchStreamFunc(options, errorHandler?)`) —
  an event-listener pattern that nark's "is this await wrapped in try/catch?"
  postcondition model is not designed for.

  Corpus DB query (2026-06-11) for repos depending on @apalchys/pino-cloudwatch:
  0 cloned repos. GitHub code search confirms a single application consumer
  (rolling-scopes/rsschool-app) — which matches the coverage-targets blocking
  target for this entry. The package is also nearly 3 years stale on npm
  (last modified 2023-11-19, version still 0.9.0), strengthening the case
  that no async-throwing surface has been added since onboarding research.

  Decision: skip via gate 0c (callsite viability). Stub written so the corpus
  preserves the research finding and so bc-version-drift can flag if a future
  version introduces an async surface.
