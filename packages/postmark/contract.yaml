  - name: activateBounce
    import_path: "postmark"
    description: >
      Reactivates an email address that was deactivated due to a hard bounce.
      Called as client.activateBounce(bounceId). Requires the bounce to have
      CanActivate: true — not all bounces can be reactivated. Makes a PUT request
      to /bounces/{bounceid}/activate. Throws on auth failure, invalid bounce ID,
      or if the bounce cannot be activated.

    postconditions:
      # Evidence: https://postmarkapp.com/developer/api/bounce-api (fetched 2026-04-16)
      # Error types confirmed from postmark.js source: PostmarkError hierarchy
      # (InvalidAPIKeyError 401, ApiInputError 422, UnknownError for invalid bounce ID)
      - id: activate-bounce-no-try-catch
        severity: error
        throws: "PostmarkError (InvalidAPIKeyError 401, ApiInputError 422, UnknownError)"
        condition: >
          activateBounce() called in async context without surrounding try/catch.
          Throws PostmarkError subclasses on any HTTP or network failure including
          invalid bounce ID (ApiInputError), revoked token (InvalidAPIKeyError),
          or bounce not eligible for reactivation (CanActivate: false).
        description: >
          activateBounce() makes a live API call that throws PostmarkError subclasses
          on any HTTP or network failure. Callers that omit try-catch cause unhandled
          rejections when the bounce ID is invalid, the token is revoked, or the
          bounce cannot be activated (CanActivate: false). Failed bounce reactivation
          silently blocks email delivery to that address — if unhandled in a
          customer-support flow (e.g. "resend verification email"), the request
          handler crashes and the user receives no feedback.
        required_handling: >
          Caller MUST wrap activateBounce() in try-catch:

            try {
              const result = await client.activateBounce(bounceId);
              // result.Bounce.CanActivate tells you if it worked
            } catch (error) {
              if (error instanceof Errors.InvalidAPIKeyError) {
                // Auth token invalid
              }
              console.error('Bounce activation failed:', error.message);
            }
        sources:
          - "https://postmarkapp.com/developer/api/bounce-api"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/errors/Errors.ts"
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: createSuppressions
    import_path: "postmark"
    description: >
      Adds email addresses to the suppression list for a specific message stream.
      Called as client.createSuppressions(messageStream, options). Returns a
      SuppressionStatuses response where each address has a Status of "Suppressed"
      or "Failed" — the API returns 200 OK even on partial failures. Makes a POST
      request to /message-streams/{messageStream}/suppressions.

    postconditions:
      # Evidence: https://postmarkapp.com/developer/api/suppressions-api (fetched 2026-04-16)
      # Key insight: API returns 200 OK with per-address Status: "Suppressed" | "Failed"
      # HTTP errors (401, 429, 5xx) are still thrown as PostmarkError subclasses.
      - id: create-suppressions-no-try-catch
        severity: error
        throws: "PostmarkError (InvalidAPIKeyError 401, InactiveRecipientsError 406, RateLimitExceededError 429)"
        condition: >
          createSuppressions() called in async context without surrounding try/catch,
          OR called without checking per-item Status in the response. The API returns
          200 OK with Status: "Failed" for individual addresses on validation or
          authorization failure — not just on HTTP 4xx/5xx errors.
        description: >
          createSuppressions() throws PostmarkError subclasses on HTTP failures
          (auth failure, rate limit, server error). Callers that omit try-catch
          crash on these errors. Additionally, even on 200 OK, individual addresses
          may have Status: "Failed" — callers that don't check response items miss
          suppression failures silently. Unhandled failures mean recipients stay
          on the active list and continue receiving emails they've opted out of,
          creating legal exposure under CAN-SPAM/GDPR.
        required_handling: >
          Caller MUST wrap createSuppressions() in try-catch AND check item statuses:

            try {
              const result = await client.createSuppressions('outbound', {
                Suppressions: [{ EmailAddress: email }]
              });
              const failed = result.Suppressions.filter(s => s.Status === 'Failed');
              if (failed.length > 0) {
                console.error('Failed to suppress:', failed.map(s => s.EmailAddress));
              }
            } catch (error) {
              console.error('Suppression API failed:', error.message);
            }
        sources:
          - "https://postmarkapp.com/developer/api/suppressions-api"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/ServerClient.ts"
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: deleteSuppressions
    import_path: "postmark"
    description: >
      Removes email addresses from the suppression list for a specific message stream.
      Called as client.deleteSuppressions(messageStream, options). Returns a
      SuppressionStatuses response where each address has Status: "Deleted" or "Failed".
      SpamComplaint suppressions CANNOT be deleted — attempting returns Status: "Failed"
      with message "SpamComplaint suppressions cannot be deleted." API returns 200 OK
      even on partial failures.

    postconditions:
      # Evidence: https://postmarkapp.com/developer/api/suppressions-api (fetched 2026-04-16)
      # Key insight: SpamComplaint suppressions cannot be removed — Status: "Failed" silently
      # HTTP errors still thrown as PostmarkError subclasses (401, 429, 5xx).
      - id: delete-suppressions-no-try-catch
        severity: error
        throws: "PostmarkError (InvalidAPIKeyError 401, RateLimitExceededError 429, ServerError 5xx)"
        condition: >
          deleteSuppressions() called in async context without surrounding try/catch,
          OR called without checking per-item Status in the response. SpamComplaint
          suppressions always return Status: "Failed" with HTTP 200 OK — this is
          not an exception, it is a silent API-level constraint that callers must check.
        description: >
          deleteSuppressions() throws PostmarkError subclasses on HTTP failures.
          Callers without try-catch crash on auth/network failures. Critically,
          SpamComplaint suppressions always return Status: "Failed" — callers
          that don't check item statuses silently fail to remove the suppression,
          causing continued email blocking. A failed deletion means the customer's
          email address remains blocked — in re-engagement flows (e.g. "user wants
          to resubscribe"), this silently breaks email delivery with no alert.
          Legal and business risk if users cannot opt back in.
        required_handling: >
          Caller MUST wrap deleteSuppressions() in try-catch AND check item statuses:

            try {
              const result = await client.deleteSuppressions('outbound', {
                Suppressions: [{ EmailAddress: email }]
              });
              const failed = result.Suppressions.filter(s => s.Status === 'Failed');
              if (failed.length > 0) {
                // SpamComplaint suppressions cannot be deleted
                console.warn('Could not remove suppressions:', failed);
              }
            } catch (error) {
              console.error('Delete suppressions failed:', error.message);
            }
        sources:
          - "https://postmarkapp.com/developer/api/suppressions-api"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/ServerClient.ts"
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: createTemplate
    import_path: "postmark"
    description: >
      Creates a new email template on the server. Called as client.createTemplate(options).
      Requires Name, Subject (for standard templates), and at least HtmlBody or TextBody.
      Alias format restricted to ASCII letters, numbers, '.', '-', '_'.
      Server limit: 100 templates per server — creating beyond this limit fails.
      Returns the created Template object on success.

    postconditions:
      # Evidence: https://postmarkapp.com/developer/api/templates-api (fetched 2026-04-16)
      # Error types: ApiInputError (422 — validation), InvalidAPIKeyError (401),
      # RateLimitExceededError (429), InternalServerError (500)
      # Server 100-template limit returns ApiInputError (422) when exceeded.
      - id: create-template-no-try-catch
        severity: error
        throws: "PostmarkError (ApiInputError 422, InvalidAPIKeyError 401, RateLimitExceededError 429)"
        condition: >
          createTemplate() called in async context without surrounding try/catch.
          Throws ApiInputError (422) for invalid alias format, missing required fields,
          or 100-template server limit exceeded. Throws InvalidAPIKeyError (401) for
          bad server token. Throws RateLimitExceededError (429) under high load.
        description: >
          createTemplate() makes an API call that throws PostmarkError subclasses on
          validation failures (422 ApiInputError — invalid alias format, missing required
          fields, or 100-template server limit exceeded), auth failure (401 InvalidAPIKeyError),
          or network error. Callers without try-catch crash on these errors. Template
          creation is typically called in provisioning/setup flows — an unhandled error
          means the template is never created, breaking all future sendEmailWithTemplate()
          calls for that alias silently.
        required_handling: >
          Caller MUST wrap createTemplate() in try-catch:

            try {
              const template = await client.createTemplate({
                Name: 'Welcome Email',
                Subject: 'Welcome to {{product_name}}',
                HtmlBody: '<p>Hello, {{name}}!</p>',
                TextBody: 'Hello, {{name}}!',
                Alias: 'welcome-v1',
              });
              console.log('Template ID:', template.TemplateId);
            } catch (error) {
              console.error('Template creation failed:', error.message);
              // Check if 100-template limit exceeded
            }
        sources:
          - "https://postmarkapp.com/developer/api/templates-api"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/ServerClient.ts"
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: editTemplate
    import_path: "postmark"
    description: >
      Updates an existing template on the server. Called as client.editTemplate(idOrAlias, options).
      Can update Name, Subject, HtmlBody, TextBody, and Alias. An invalid idOrAlias throws
      ApiInputError (template not found). Updating template content affects ALL future emails
      sent with that template — breaking changes to HtmlBody can silently corrupt outbound emails.

    postconditions:
      # Evidence: https://postmarkapp.com/developer/api/templates-api (fetched 2026-04-16)
      # Error types: ApiInputError (422 — template not found, invalid alias),
      # InvalidAPIKeyError (401), RateLimitExceededError (429), InternalServerError (500)
      - id: edit-template-no-try-catch
        severity: error
        throws: "PostmarkError (ApiInputError 422, InvalidAPIKeyError 401, RateLimitExceededError 429)"
        condition: >
          editTemplate() called in async context without surrounding try/catch.
          Throws ApiInputError (422) when template ID or alias is not found on the server,
          or when the alias format is invalid. Throws InvalidAPIKeyError (401) for auth
          failures. Throws RateLimitExceededError (429) and InternalServerError (500)
          under API failure conditions.
        description: >
          editTemplate() throws PostmarkError subclasses on API and network failures.
          Template-not-found errors (ApiInputError) are thrown when the idOrAlias
          doesn't match any template on the server. Callers without try-catch
          crash on these errors, leaving templates in a partially-updated state
          if multiple updates are batched. Called in deployment/migration scripts —
          an unhandled error leaves old template content in place, causing stale
          email content to be sent. Partial failure in multi-step provisioning flows
          is hard to detect and recover.
        required_handling: >
          Caller MUST wrap editTemplate() in try-catch:

            try {
              const updated = await client.editTemplate('welcome-v1', {
                Subject: 'Welcome to {{company_name}}!',
                HtmlBody: '<p>Hi {{name}}, welcome aboard!</p>',
              });
              console.log('Template updated:', updated.TemplateId);
            } catch (error) {
              if (error instanceof Errors.ApiInputError) {
                console.error('Template not found or validation failed:', error.message);
              } else {
                console.error('Template update failed:', error.message);
              }
              throw error;
            }
        sources:
          - "https://postmarkapp.com/developer/api/templates-api"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/ServerClient.ts"
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteTemplate
    import_path: "postmark"
    description: >
      Permanently deletes an existing template from the server. Called as
      client.deleteTemplate(idOrAlias). Makes a DELETE request to /templates/{idOrAlias}.
      Two destructive-by-design failure modes: (1) the template/idOrAlias does not
      exist — server returns HTTP 404 which the SDK maps to a generic PostmarkError
      (NOT ApiInputError) because no 404 mapping exists in errors/Errors.ts;
      (2) the template is a LAYOUT template with dependent standard templates
      using it — the server returns ErrorCode 1130 ("The layout template cannot
      be deleted because it has dependent templates using it.") on HTTP 422,
      mapped to ApiInputError. Callers that omit try-catch corrupt provisioning
      flows: a thrown 404 on a missing template aborts a "tear down all templates"
      migration mid-run, leaving the server in a half-cleaned state; a thrown
      ErrorCode 1130 silently breaks all standard templates that still depend on
      the layout being deleted.

    postconditions:
      # Evidence: https://postmarkapp.com/developer/api/templates-api (fetched 2026-06-24)
      # Evidence: https://postmarkapp.com/developer/api/overview (fetched 2026-06-24) — ErrorCode 1130 cascade
      # Error types confirmed from postmark@4.0.7 source: errors/ErrorHandler.js
      # 404 → PostmarkError (no specialized class — no 404 entry in buildErrorByHttpStatusCode)
      # 422 → ApiInputError (covers ErrorCode 1130 layout-cascade and invalid-alias-format)
      # 401 → InvalidAPIKeyError, 429 → RateLimitExceededError, 500 → InternalServerError
      - id: delete-template-no-try-catch
        severity: error
        throws: "PostmarkError (404 not-found generic PostmarkError, 422 ApiInputError ErrorCode 1130 layout-cascade, 401 InvalidAPIKeyError, 429 RateLimitExceededError, 500 InternalServerError)"
        condition: >
          deleteTemplate() called in async context without surrounding try/catch.
          Two distinct destructive-failure paths: (1) template not found — server
          returns HTTP 404 mapped to a generic PostmarkError (NOT ApiInputError —
          there is no 404 mapping in errors/ErrorHandler.js, so callers that only
          catch ApiInputError still crash on missing templates); (2) layout
          template with dependent standard templates — server returns ErrorCode
          1130 on HTTP 422 mapped to ApiInputError ("The layout template cannot
          be deleted because it has dependent templates using it.").
        description: >
          deleteTemplate() makes a DELETE request that throws PostmarkError
          subclasses on API or network failure. The most common silent-corruption
          path is the LAYOUT-CASCADE constraint: layout templates cannot be deleted
          while standard templates still reference them — the server returns
          ErrorCode 1130 (HTTP 422) and the SDK maps it to ApiInputError. Callers
          without try-catch crash mid-cleanup, leaving the server with a partial
          deletion of standard templates but the layout intact (or vice-versa,
          depending on iteration order in a migration script). Additionally,
          template-not-found returns HTTP 404 which postmark.js maps to the
          generic PostmarkError — callers that only catch the more specific
          ApiInputError subclass still crash on missing templates. In
          re-provisioning flows (tear-down + recreate), an unhandled 404 mid-script
          aborts the recreate phase, breaking every future
          sendEmailWithTemplate() call for those aliases until manually re-run.
        required_handling: >
          Caller MUST wrap deleteTemplate() in try-catch AND handle both the
          generic PostmarkError (for 404 not-found) and ApiInputError (for the
          ErrorCode 1130 layout-cascade case) explicitly. Tear-down scripts
          must order layout deletion AFTER all dependent standard templates,
          OR catch the 1130 ApiInputError and re-queue the layout for a
          second pass:

            try {
              const result = await client.deleteTemplate('welcome-v1');
              console.log('Deleted:', result.Message);
            } catch (error) {
              if (error instanceof Errors.ApiInputError) {
                // ErrorCode 1130: layout still has dependent standard templates
                console.error('Layout cascade blocked:', error.message);
                // Re-queue or delete dependent templates first
              } else if (error instanceof Errors.PostmarkError) {
                // 404 template-not-found arrives here (no specialized class)
                console.warn('Template already absent:', error.message);
              } else {
                throw error;
              }
            }
        sources:
          - "https://postmarkapp.com/developer/api/templates-api"
          - "https://postmarkapp.com/developer/api/overview"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/errors/ErrorHandler.ts"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/ServerClient.ts"
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "All ServerClient methods make HTTPS calls to the Postmark API — all can throw"
  - "No auto-retry logic — all errors thrown immediately to caller"
  - "InactiveRecipientsError.recipients contains parsed list of bounced addresses"
  - "Rate limit: varies by plan. RateLimitExceededError thrown on 429"
  - "ServiceUnavailablerError has a typo in the SDK (missing 'e') — this is the actual class name"
  - "AccountClient has similar methods but for account-level operations — same error handling"
  - "createSuppressions/deleteSuppressions return 200 OK with per-item Status — check Status field even on success"
  - "SpamComplaint suppressions cannot be deleted — deleteSuppressions returns Status: Failed silently"
  - "Server limit: 100 templates per server — createTemplate throws ApiInputError when exceeded"
  - "deleteTemplate 404 maps to GENERIC PostmarkError (no specialized class — no 404 entry in ErrorHandler.buildErrorByHttpStatusCode)"
  - "deleteTemplate ErrorCode 1130 (layout-cascade) maps to 422 ApiInputError — tear-down order matters"
