# Postmark SDK — all ServerClient methods throw PostmarkError subclasses on HTTP failures.
# Error hierarchy: PostmarkError → HttpError → InvalidAPIKeyError (401), InternalServerError (500),
# ServiceUnavailablerError (503), RateLimitExceededError (429), ApiInputError (422).
# No auto-retry logic — all errors thrown immediately to caller.
# InactiveRecipientsError (422/406) contains parsed recipient list from error message.
package: postmark
semver: ">=2.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-11"
status: production
evidence_quality: confirmed

detection:
  class_names:
    - "ServerClient"
    - "AccountClient"

functions:
  - name: sendEmail
    import_path: "postmark"
    description: >
      Sends a single transactional email via the Postmark API. The most commonly used
      method — called in signup flows, password resets, notifications, receipts.
      Makes an outbound HTTPS POST request. All HTTP errors are thrown.

    postconditions:
      - id: api-error
        condition: >
          Any HTTP or network failure: invalid API token (401 InvalidAPIKeyError),
          validation error (422 ApiInputError — invalid sender, missing fields),
          inactive recipients (422/406 InactiveRecipientsError),
          rate limit exceeded (429 RateLimitExceededError),
          server error (500 InternalServerError),
          service unavailable (503 ServiceUnavailablerError),
          or network/DNS failure.
        throws: >
          InvalidAPIKeyError (401 — bad server token),
          ApiInputError (422 — validation failures),
          InactiveRecipientsError (422/406 — bounced recipients, extends ApiInputError),
          InvalidEmailRequestError (422/300 — malformed email request, extends ApiInputError),
          RateLimitExceededError (429 — too many requests),
          InternalServerError (500 — Postmark server error),
          ServiceUnavailablerError (503 — Postmark unavailable),
          UnknownError (other HTTP status codes).
          All extend PostmarkError with code and statusCode properties.
        required_handling: >
          Caller MUST wrap client.sendEmail() in try-catch. Email delivery failures
          must be detected — users expect confirmation emails, receipts, and notifications
          to arrive. Unhandled rejection crashes the process.

          Minimum handling:
            try {
              await client.sendEmail({ From, To, Subject, TextBody });
            } catch (error) {
              if (error instanceof Errors.InactiveRecipientsError) {
                // Handle bounced recipient
              }
              console.error('Email send failed:', error.message);
              throw error;
            }
        sources:
          - "https://postmarkapp.com/developer/api/email-api"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/errors/Errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sendEmailBatch
    import_path: "postmark"
    description: >
      Sends multiple emails in a single API call (up to 500 per batch).
      Used for bulk notifications, batch processing. All HTTP errors are thrown.

    postconditions:
      - id: api-error
        condition: >
          Any HTTP or network failure: authentication, validation, rate limit,
          server error, or network failure. Partial batch failures may occur
          where some emails succeed and others fail within the response.
        throws: >
          Same error hierarchy as sendEmail. InvalidAPIKeyError (401),
          ApiInputError (422), RateLimitExceededError (429),
          InternalServerError (500), ServiceUnavailablerError (503).
        required_handling: >
          Caller MUST wrap client.sendEmailBatch() in try-catch.
          Batch email failures affect multiple recipients simultaneously.

          try {
            const results = await client.sendEmailBatch(messages);
          } catch (error) {
            console.error('Batch send failed:', error.message);
            throw error;
          }
        sources:
          - "https://postmarkapp.com/developer/api/email-api#send-batch-emails"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/ServerClient.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sendEmailWithTemplate
    import_path: "postmark"
    description: >
      Sends a single email using a Postmark template. Common for transactional emails
      (welcome emails, password resets, order confirmations) where templates are managed
      in the Postmark dashboard. All HTTP errors are thrown.

    postconditions:
      - id: api-error
        condition: >
          Any HTTP or network failure: authentication, template not found,
          validation error (missing template model variables), rate limit,
          server error, or network failure.
        throws: >
          Same error hierarchy as sendEmail. Additionally, ApiInputError (422)
          is thrown when TemplateId/TemplateAlias is invalid or required
          TemplateModel variables are missing.
        required_handling: >
          Caller MUST wrap client.sendEmailWithTemplate() in try-catch.

          try {
            await client.sendEmailWithTemplate({
              TemplateAlias: 'welcome',
              TemplateModel: { name: user.name },
              From: 'hello@example.com',
              To: user.email,
            });
          } catch (error) {
            console.error('Template email failed:', error.message);
            throw error;
          }
        sources:
          - "https://postmarkapp.com/developer/api/templates-api#send-email-with-template"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/ServerClient.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sendEmailBatchWithTemplates
    import_path: "postmark"
    description: >
      Sends multiple template-based emails in a single API call.
      Used for batch transactional emails. All HTTP errors are thrown.

    postconditions:
      - id: api-error
        condition: >
          Any HTTP or network failure: authentication, template not found,
          validation error, rate limit, server error, or network failure.
        throws: >
          Same error hierarchy as sendEmail and sendEmailWithTemplate.
        required_handling: >
          Caller MUST wrap client.sendEmailBatchWithTemplates() in try-catch.

          try {
            const results = await client.sendEmailBatchWithTemplates(messages);
          } catch (error) {
            console.error('Batch template send failed:', error.message);
            throw error;
          }
        sources:
          - "https://postmarkapp.com/developer/api/templates-api#send-batch-with-templates"
          - "https://github.com/ActiveCampaign/postmark.js/blob/main/src/client/ServerClient.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "All ServerClient methods make HTTPS calls to the Postmark API — all can throw"
  - "No auto-retry logic — all errors thrown immediately to caller"
  - "InactiveRecipientsError.recipients contains parsed list of bounced addresses"
  - "Rate limit: varies by plan. RateLimitExceededError thrown on 429"
  - "ServiceUnavailablerError has a typo in the SDK (missing 'e') — this is the actual class name"
  - "AccountClient has similar methods but for account-level operations — same error handling"
