package: multer
semver: ">=2.0.0 <3.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
# Depth pass 2026-04-16 (deepen-stream-1 pass 8):
# API surface: 5 middleware methods (single, array, fields, any, none) + 2 static factories
# Contracted before: 2 (single, array)
# Contracted after: 5 (added fields, any, none) + 1 factory (diskStorage)
# Omitted: 1 (memoryStorage — pure factory returning in-memory engine, no distinct error surface)
# Coverage: 5/5 middleware = 1.0, adjusted total: 6/7 callable exports = 0.86 (omitting memoryStorage)
# Evidence from multer@2.x source:
#   https://raw.githubusercontent.com/expressjs/multer/master/lib/make-middleware.js
#   https://raw.githubusercontent.com/expressjs/multer/master/storage/disk.js
#   https://github.com/expressjs/multer/blob/master/README.md — error handling section
#
# Drift-deepen pass 2026-06-24 (deepen-stream-3 pass 46):
# Re-enumerated multer@2.2.0 API surface — no new functions added since 2026-04-16.
# Confirmed memoryStorage still has no distinct error surface (concat-stream callback never errs).
# Added 1 new postcondition + 1 new edge_case on fields() to cover the full MulterError code set
# enumerated in lib/multer-error.js (MISSING_FIELD_NAME, LIMIT_FIELD_KEY, LIMIT_FIELD_VALUE,
# LIMIT_FIELD_NESTING, LIMIT_PART_COUNT, LIMIT_FIELD_COUNT). LIMIT_FIELD_NESTING is a documented
# anti-DoS security control per README Security section — the original pass missed it.
# Coverage unchanged: 6/7 callable exports = 0.86 (memoryStorage still omitted).
coverage_score: 0.86  # 6 contracted / 7 total callable exports (1 intentionally omitted: memoryStorage)

detection:
  type_names:
    - Multer
    - StorageEngine
    - FileFilterCallback

functions:
  - name: single
    import_path: "multer"
    description: "Middleware for handling single file upload"

    postconditions:
      # Evidence: seen in 32 primary firings across 9 repos in scan-multer-2026-06-29.json
      # Top affected: spacebarchat/server (⭐ 2124), EvolutionAPI/evolution-api (⭐ 7590), codex-team/codex.docs (⭐ 833)
      - id: single-throws-multer-error
        condition: "file upload fails due to size limit, file type, or disk error"
        throws: "MulterError"
        required_handling: "Caller MUST add error handling middleware after multer to catch MulterError. Check error.code for specific failure reason (LIMIT_FILE_SIZE, LIMIT_UNEXPECTED_FILE, etc.)"
        sources:
          - "https://github.com/expressjs/multer#error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: file-size-dos-prevention
        description: "Configure limits option to prevent DoS via large file uploads. Unlimited file sizes can exhaust disk space or memory."
        sources:
          - "https://github.com/expressjs/multer#limits"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: file-filter-validation
        description: "Use fileFilter to validate file types and prevent malicious uploads. Without validation, users can upload executables or scripts."
        sources:
          - "https://github.com/expressjs/multer#filefilter"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: array
    import_path: "multer"
    description: "Middleware for handling multiple file uploads"

    postconditions:
      - id: array-throws-multer-error
        condition: "one or more file uploads fail"
        throws: "MulterError"
        required_handling: "Caller MUST add error handling middleware after multer to catch MulterError. Multiple file uploads can fail individually or collectively."
        sources:
          - "https://github.com/expressjs/multer#error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: fields
    import_path: "multer"
    description: >
      Middleware for handling multiple file uploads across multiple named form fields.
      Accepts an array of Field objects each specifying a field name and optional maxCount.
      Populates req.files as an object mapping field names to arrays of File objects.

    postconditions:
      # Evidence: https://github.com/expressjs/multer/blob/master/README.md#fieldsfields
      # Error types confirmed from multer source: lib/make-middleware.js + lib/multer-error.js
      # MulterError codes: LIMIT_UNEXPECTED_FILE, LIMIT_FILE_COUNT, LIMIT_FILE_SIZE, LIMIT_PART_COUNT
      - id: fields-throws-multer-error-unexpected-file
        condition: >
          A file is received for a field not listed in the fields array, or the number of files
          for a given field exceeds its maxCount. Throws MulterError with code LIMIT_UNEXPECTED_FILE.
        throws: "MulterError (code: LIMIT_UNEXPECTED_FILE)"
        required_handling: >
          Caller MUST add error handling middleware after the multer middleware to catch MulterError.
          Check error.code === 'LIMIT_UNEXPECTED_FILE' and error.field to identify which field caused
          the rejection. Without error middleware, the error is swallowed by Express's default handler
          and returns a generic 500.
        sources:
          - "https://github.com/expressjs/multer/blob/master/README.md#fieldsfields"
          - "https://github.com/expressjs/multer/blob/master/lib/make-middleware.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: fields-throws-multer-error-size-or-count
        condition: >
          Any file in any field exceeds the configured fileSize limit, or the total number of
          files across all fields exceeds the configured limits.files count.
          Throws MulterError with code LIMIT_FILE_SIZE or LIMIT_FILE_COUNT.
        throws: "MulterError (code: LIMIT_FILE_SIZE | LIMIT_FILE_COUNT)"
        required_handling: >
          Caller MUST add error handling middleware and check error.code to differentiate between
          file size (LIMIT_FILE_SIZE) and count (LIMIT_FILE_COUNT) failures. Already-uploaded
          files are cleaned up by multer via storage._removeFile before calling next(err).
        sources:
          - "https://github.com/expressjs/multer/blob/master/README.md#limits"
          - "https://github.com/expressjs/multer/blob/master/lib/make-middleware.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: fields-throws-multer-error-field-limits
        condition: >
          A multipart field name is missing, truncated past fieldNameSize, exceeds the configured
          fieldNestingDepth (e.g. a[b][c][d] when fieldNestingDepth is 2), or the total number of
          parts or non-file fields exceeds the configured limits.parts / limits.fields. Multer
          throws MulterError with codes MISSING_FIELD_NAME, LIMIT_FIELD_KEY, LIMIT_FIELD_VALUE,
          LIMIT_FIELD_NESTING, LIMIT_PART_COUNT, or LIMIT_FIELD_COUNT.
        throws: "MulterError (code: MISSING_FIELD_NAME | LIMIT_FIELD_KEY | LIMIT_FIELD_VALUE | LIMIT_FIELD_NESTING | LIMIT_PART_COUNT | LIMIT_FIELD_COUNT)"
        required_handling: >
          Caller MUST add error handling middleware that maps these MulterError codes to clean
          4xx responses. Without it, a hostile client probing field-name nesting or field-value
          limits receives a generic 500, masking the security signal. LIMIT_FIELD_NESTING and
          LIMIT_PART_COUNT in particular are anti-DoS signals — log + reject, do not let them
          bubble up as 500s.
        sources:
          - "https://github.com/expressjs/multer/blob/master/lib/multer-error.js"
          - "https://github.com/expressjs/multer/blob/master/lib/make-middleware.js"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: fields-nesting-depth-dos-prevention
        description: >
          Configure limits.fieldNestingDepth to the minimum depth your field names require
          (e.g. 3 for "a[b][c]"). Default is Infinity, which allows a malicious client to send
          deeply nested field names like "a[a][a][a]..." that consume CPU during parsing.
          The README's Security section explicitly recommends this limit. When exceeded, multer
          throws MulterError(LIMIT_FIELD_NESTING).
        sources:
          - "https://github.com/expressjs/multer/blob/master/README.md#limits"
          - "https://github.com/expressjs/multer/blob/master/README.md#security"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: any
    import_path: "multer"
    description: >
      Middleware that accepts ALL files from any field in the multipart request with no
      field name restrictions. Files are available in req.files as an array.
      WARNING: This is the most permissive multer method and the most dangerous.
      The official docs warn: 'Never add multer as a global middleware since a malicious
      user could upload files to a route that you did not anticipate.'

    postconditions:
      # Evidence: https://github.com/expressjs/multer/blob/master/README.md#anyoptions
      # Source confirmed: lib/make-middleware.js — any() uses fileFilter: this.fileFilter (default: allowAll)
      - id: any-unrestricted-upload-no-filter
        condition: >
          No fileFilter is configured on the multer instance. Multer's any() method uses allowAll
          as the default fileFilter, accepting every file regardless of type or content.
          Malicious users can upload executables, scripts, or oversized files.
        throws: "No throw — dangerous silent success"
        required_handling: >
          Caller MUST configure fileFilter to validate file types and MUST configure limits.fileSize
          to prevent DoS. Without these, any() is a wide-open file upload endpoint.
          The official docs explicitly warn against using any() as global middleware.
        sources:
          - "https://github.com/expressjs/multer/blob/master/README.md#anyoptions"
          - "https://github.com/expressjs/multer/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high

      - id: any-throws-multer-error-size
        condition: >
          A file exceeds the configured fileSize limit. MulterError with code LIMIT_FILE_SIZE
          is passed to next(err). Without error handling middleware, this returns a 500 error.
        throws: "MulterError (code: LIMIT_FILE_SIZE)"
        required_handling: >
          Caller MUST add error handling middleware to catch MulterError from any() just as
          with single() and array(). The error includes the fieldname of the file that exceeded limits.
        sources:
          - "https://github.com/expressjs/multer/blob/master/lib/make-middleware.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: none
    import_path: "multer"
    description: >
      Middleware that accepts ONLY text fields in multipart form submissions.
      If any file is included in the request, multer immediately throws
      MulterError('LIMIT_UNEXPECTED_FILE') and passes it to next(err).
      Use this to enforce text-only multipart forms.

    postconditions:
      # Evidence: https://github.com/expressjs/multer/blob/master/README.md#noneoptions
      # Source confirmed: index.js line 58 — none() calls _makeMiddleware([], 'NONE')
      # Any file received triggers wrappedFileFilter → filesLeft[fieldname] === 0 → LIMIT_UNEXPECTED_FILE
      - id: none-throws-multer-error-on-file-upload
        condition: >
          A client sends a multipart request that includes any file field when none() is used.
          Multer immediately throws MulterError with code LIMIT_UNEXPECTED_FILE.
          This is by design — none() is a strict text-only enforcer.
        throws: "MulterError (code: LIMIT_UNEXPECTED_FILE)"
        required_handling: >
          Caller MUST add error handling middleware to catch MulterError.
          Without it, a client that accidentally (or maliciously) includes a file
          will receive an unhandled Express 500 error instead of a clean 400 rejection.
          Recommended pattern: check err.code === 'LIMIT_UNEXPECTED_FILE' and return 400
          with a descriptive message.
        sources:
          - "https://github.com/expressjs/multer/blob/master/README.md#noneoptions"
          - "https://github.com/expressjs/multer/blob/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: diskStorage
    import_path: "multer"
    description: >
      Factory function returning a DiskStorage engine that saves uploaded files to the local
      filesystem. Configurable via destination (string or function) and filename (function).
      When destination is a string, multer calls fs.mkdirSync() at startup — this can throw
      EACCES or other fs errors if the process lacks write permission to the target directory.

    postconditions:
      # Evidence: https://github.com/expressjs/multer/blob/master/storage/disk.js
      # fs.mkdirSync called at DiskStorage construction when destination is a string (line 20)
      # getDestination callback errors propagate via _handleFile cb(err) → abortWithError → next(err)
      # getFilename callback errors propagate via _handleFile cb(err) → abortWithError → next(err)
      # outStream.on('error', cb) — write stream errors also propagate to next(err)
      - id: disk-storage-destination-permission-error
        condition: >
          The destination path string is passed to fs.mkdirSync() during DiskStorage construction.
          If the directory cannot be created due to permission errors (EACCES) or invalid path (ENOENT),
          the error is thrown synchronously at multer initialization — before any request is received.
        throws: "Error (code: EACCES | ENOENT | EPERM) — synchronous throw from fs.mkdirSync"
        required_handling: >
          Wrap multer.diskStorage({ destination: '/path' }) in a try-catch at server startup,
          or use a function-form destination callback with proper error handling.
          Using function-form destination: if the callback passes an error as the first argument,
          it propagates to next(err) in the request middleware — catch it with error middleware.
        sources:
          - "https://github.com/expressjs/multer/blob/master/storage/disk.js"
          - "https://nodejs.org/api/fs.html#fsmkdirsyncpath-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: disk-storage-write-error
        condition: >
          The write stream created by fs.createWriteStream() emits an error during file upload
          (e.g., disk full, ENOSPC, EACCES on the file path, or the destination function
          returns an invalid path). The error propagates via storage._handleFile callback
          to multer's abortWithError(), which calls next(err).
        throws: "Error (code: ENOSPC | EACCES | ENOENT) — emitted by write stream"
        required_handling: >
          Caller MUST add error handling middleware to catch filesystem errors from diskStorage.
          Check error.code to distinguish disk full (ENOSPC) from permission errors (EACCES).
          Consider monitoring disk space and implementing alerts before ENOSPC occurs in production.
          Multer does attempt to clean up already-uploaded files via storage._removeFile on error.
        sources:
          - "https://github.com/expressjs/multer/blob/master/storage/disk.js"
          - "https://nodejs.org/api/fs.html#class-fswritestream"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
