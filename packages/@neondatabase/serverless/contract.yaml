package: "@neondatabase/serverless"
semver: ">=0.7.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-11"
status: production
evidence_quality: confirmed
coverage_score: 1.0

# Official Neon serverless driver for JavaScript/TypeScript.
# Carries SQL over HTTP (neon() tagged template) and WebSockets (Pool/Client).
# Designed for serverless environments: Cloudflare Workers, Vercel Edge, Deno, Bun.
# v1.0.0 reached GA on March 25, 2025.

detection:
  class_names:
    - "Pool"
    - "Client"
  type_names:
    - "Pool"
    - "Client"
    - "PoolClient"
  factory_methods:
    - "neon"
  require_instance_tracking: true

  await_patterns:
    - ".connect("
    - ".query("
    - ".end("

functions:
  - name: query
    import_path: "@neondatabase/serverless"
    description: >
      Executes a SQL query. Used as Pool.query(text, values?) for stateless queries
      or client.query(text, values?) on a checked-out PoolClient. Returns a QueryResult
      with rows, rowCount, fields. Throws NeonDbError on any PostgreSQL or network error.

    postconditions:
      - id: neon-db-error
        condition: >
          PostgreSQL error (syntax error, constraint violation, undefined table, permission denied,
          etc.) OR network error (connection refused, timeout, scale-to-zero activation failure)
        throws: >
          NeonDbError extends Error with fields: code (PostgreSQL SQLSTATE 5-char code),
          severity, detail, hint, constraint, table, column, sourceError.
          Common codes: 42601 (syntax), 23505 (unique), 23503 (foreign key), 42P01 (undefined table).
          Network errors include Neon scale-to-zero activation timeouts on first query after idle period.
        required_handling: >
          Caller MUST wrap in try-catch. NeonDbError carries a PostgreSQL SQLSTATE code
          in error.code. Distinguish constraint violations (23505/23503) from network errors
          (sourceError set) from query errors. All uncaught errors crash the request handler.
        sources:
          - "https://neon.tech/docs/serverless/serverless-driver"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: connect
    import_path: "@neondatabase/serverless"
    description: >
      Checks out a client from the Pool (Pool.connect()) or establishes a WebSocket
      connection (Client.connect()). Pool.connect() returns a PoolClient that MUST be
      released via client.release() in a finally block to prevent pool exhaustion.
      Throws NeonDbError on connection failure.

    postconditions:
      - id: connection-error
        condition: >
          Cannot establish WebSocket connection to Neon — database suspended, network error,
          invalid connection string, or pool exhausted (connectionTimeoutMillis exceeded)
        throws: >
          NeonDbError with sourceError set to the underlying network error.
          Pool exhaustion: Error with message containing "timeout" when all pool clients
          are checked out and connectionTimeoutMillis elapses.
        required_handling: >
          Caller MUST wrap in try-catch. For Pool.connect(), use try/finally to ALWAYS
          release the client even if the query throws:
            const client = await pool.connect();
            try { await client.query(...); }
            finally { client.release(); }
          Failure to release causes pool exhaustion and eventual application hang.
        sources:
          - "https://neon.tech/docs/serverless/serverless-driver#pool-and-client"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: end
    import_path: "@neondatabase/serverless"
    description: >
      Closes the Pool (Pool.end()) or Client (Client.end()), draining WebSocket connections.
      Should be called during graceful shutdown to avoid connection leaks.

    postconditions:
      - id: close-error
        condition: "in-flight queries are abandoned or WebSocket close handshake fails"
        throws: "Error wrapping the underlying WebSocket error"
        required_handling: >
          Caller SHOULD wrap in try-catch, especially in shutdown handlers.
          Uncaught errors from pool.end() during SIGTERM handling will crash the process.
        sources:
          - "https://neon.tech/docs/serverless/serverless-driver#pool-and-client"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: neon
    import_path: "@neondatabase/serverless"
    description: >
      HTTP-transport SQL execution function. Call neon(connectionString) to get a tagged-template
      SQL function. Every call to sql`...` is an async HTTP request that can throw NeonDbError on
      query error or network failure. This is the primary transport for serverless environments
      (Vercel Edge, Cloudflare Workers) where WebSocket Pool/Client is not available.

    postconditions:
      # Evidence: seen in 16 primary firings across 13 repos in scan-neondatabase-serverless-2026-04-11.json
      # Note: scanner currently flags neon(connectionString) factory calls in drizzle-orm setups (FP pattern)
      # True positives are direct sql`...` tagged template calls without try-catch
      # Top affected: ahmedkhaleel2004/gitdiagram (⭐7k+), noodle-run/noodle, jnsahaj/tweakcn
      # FP check: 0/20 type-A FPs confirmed across non-user repos
      - id: neon-db-error
        condition: >
          PostgreSQL error (syntax error, constraint violation, undefined table, permission denied,
          etc.) OR network error (connection refused, timeout, scale-to-zero activation failure)
        throws: >
          NeonDbError extends Error with fields: code (PostgreSQL SQLSTATE 5-char code),
          severity, detail, hint, constraint, table, column, sourceError.
          Common codes: 42601 (syntax), 23505 (unique), 23503 (foreign key), 42P01 (undefined table).
          Network errors include Neon scale-to-zero activation timeouts on first query after idle period.
        required_handling: >
          Caller MUST wrap in try-catch. Every sql`...` tagged template call is a live HTTP
          request that can fail. Uncaught errors crash the request handler (Next.js route, etc.).
        sources:
          - "https://neon.tech/docs/serverless/serverless-driver"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: transaction
    import_path: "@neondatabase/serverless"
    description: >
      HTTP-transport batch transaction. Called as sql.transaction([sql`...`, sql`...`])
      or sql.transaction(txn => [...queries]). Wraps multiple SQL statements in a single
      HTTP request with BEGIN/COMMIT. All queries run atomically. Returns an array of
      results. Throws NeonDbError if any statement fails, rolling back the transaction.

    postconditions:
      # Evidence: https://neon.tech/docs/serverless/serverless-driver#transaction-function
      # Error types confirmed from @neondatabase/serverless source: NeonDbError hierarchy
      - id: transaction-statement-error
        condition: >
          Any statement within the transaction fails — constraint violation (23505 unique,
          23503 foreign key), syntax error (42601), serialization failure (40001), or deadlock (40P01).
          The entire transaction is rolled back; no partial commits occur.
        throws: >
          NeonDbError carrying the PostgreSQL SQLSTATE code of the first failing statement.
        required_handling: >
          Caller MUST wrap sql.transaction() in try-catch. Because all statements are
          batched into a single HTTP request, partial results are never returned — on
          any failure the entire array rejects. Uncaught NeonDbError crashes the request
          handler (Next.js route, Cloudflare Worker, etc.).
        sources:
          - "https://neon.tech/docs/serverless/serverless-driver#transaction-function"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: transaction-isolation-conflict
        condition: >
          Transaction isolation level is REPEATABLE READ or SERIALIZABLE and a concurrent
          write conflict is detected (SQLSTATE 40001 serialization_failure or 40P01 deadlock).
        throws: >
          NeonDbError with SQLSTATE 40001 or 40P01. These errors require retry logic —
          they are expected under high concurrency and do not indicate a bug.
        required_handling: >
          Callers using isolationLevel: 'RepeatableRead' or 'Serializable' MUST implement
          retry logic for SQLSTATE 40001/40P01 errors. Treating serialization failures as
          fatal errors causes unnecessary user-visible failures under load.
        sources:
          - "https://neon.tech/docs/serverless/serverless-driver#transaction-function"
          - "https://www.postgresql.org/docs/current/transaction-iso.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: transaction-network-error
        condition: >
          HTTP request to Neon's proxy fails mid-transaction (network timeout, Neon scale-to-zero
          activation delay, connection reset). Transaction state is unknown — may have committed
          or rolled back on the server side.
        throws: >
          NeonDbError with sourceError set to the underlying network error.
        required_handling: >
          Callers MUST handle NeonDbError where sourceError is set (network errors) separately
          from SQLSTATE errors. For idempotent transactions, implement retry with exponential
          backoff. For non-idempotent transactions (e.g. payment processing), do NOT blindly
          retry — implement idempotency keys to safely detect duplicate commits.
        sources:
          - "https://neon.tech/docs/serverless/serverless-driver#transaction-function"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
