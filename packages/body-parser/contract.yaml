      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#stream-is-not-readable
      - id: text-stream-not-readable
        condition: Request stream was already consumed by another middleware.
        throws: Error with err.status === 500 and err.type === 'stream.not.readable'
        required_handling: |
          Error-handling middleware MUST catch this. Only one body parser should run per request.
