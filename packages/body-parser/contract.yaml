package: body-parser
semver: '>=1.20.0 <3.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-06-23'
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.98
functions:
  - name: json
    import_path: body-parser
    description: >
      Returns an Express middleware that parses incoming requests with JSON bodies. Populates req.body with the parsed
      object when the Content-Type header matches 'application/json'.
    postconditions:
      # Evidence: seen in 5 primary firings across 5 repos in scan-body-parser-2026-04-14.json
      # Top affected: andrechristikan/ack-nestjs-boilerplate, artsy/force, CodelyTV/typescript-ddd-skeleton
      - id: malformed-json-throws
        condition: request body is not valid JSON
        throws: SyntaxError with err.status === 400 and err.type === 'entity.parse.failed'
        required_handling: >
          An Express error-handling middleware with the signature (err, req, res, next) MUST be registered after all
          routes. Without it, malformed JSON payloads crash the entire application (DoS). The handler should check err
          instanceof SyntaxError && err.status === 400 && 'body' in err and return a 400 response.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
          - https://github.com/expressjs/body-parser/issues/122
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      - id: payload-too-large
        condition: request body exceeds the configured size limit (default 100kb)
        throws: Error with err.type === 'entity.too.large' and err.status === 413
        required_handling: >
          Error-handling middleware MUST catch this error and return 413. The size limit SHOULD be configured explicitly
          based on application requirements. Values above 5MB increase memory pressure and DoS risk.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
          - https://vulert.com/vuln-db/debian-11-node-body-parser-170959
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      - id: unsupported-charset
        condition: request charset is not supported
        throws: Error with err.type === 'charset.unsupported' and err.status === 415
        required_handling: |
          Error-handling middleware MUST catch this and return 415 Unsupported Media Type to the client.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: content-type-mismatch
        condition: request Content-Type does not match the configured 'type' option
        returns: Middleware calls next() without populating req.body
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      # Evidence: https://github.com/expressjs/body-parser/blob/master/lib/read.js#L65-L73
      # Confirmed from source: createError(403, err, { type: err.type || 'entity.verify.failed' })
      - id: json-verify-failed
        condition: >
          The optional 'verify' function throws an error when inspecting the raw request body
          buffer. This is used for HMAC signature verification (e.g. Stripe webhooks, GitHub webhooks).
        throws: Error with err.status === 403 and err.type === 'entity.verify.failed' (or the custom type thrown by verify)
        required_handling: >
          Error-handling middleware MUST catch 403 errors from this middleware. When verify throws,
          the error propagates as a 403 Forbidden. Applications using webhook signature verification
          MUST handle this error gracefully — typically by returning 403 to the webhook sender.
          Without error handling, the server crashes or leaks unhandled promise rejections.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/lib/read.js
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      # Evidence: node_modules/body-parser/lib/read.js (v2.3.0) lines 188-200 (contentstream fn)
      # createError(415, 'content encoding unsupported', { type: 'encoding.unsupported' }) for inflate=false case
      # createError(415, 'unsupported content encoding "<enc>"', { type: 'encoding.unsupported' }) in createDecompressionStream switch default
      - id: json-encoding-unsupported
        condition: >
          Request has a Content-Encoding header with an unsupported encoding (anything other than
          'gzip', 'deflate', 'br', or 'identity' — note that 'br' / Brotli was added as a supported
          decompression encoding in body-parser v2.0.0), OR the inflate option is set to false but
          the request uses gzip/deflate/br encoding.
        throws: Error with err.status === 415 and err.type === 'encoding.unsupported'
        required_handling: >
          Error-handling middleware MUST catch this and return 415. Common when APIs accept compressed
          requests (e.g. from CDNs or proxies) but inflate is disabled, or when clients send custom
          Content-Encoding headers. Note that v1.x consumers upgrading to v2.x get implicit Brotli
          support — applications that previously rejected 'br' explicitly need to revisit that
          assumption. Without handling, the server returns an unhandled error to the client.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#unsupported-content-encoding-bogus
          - https://github.com/expressjs/body-parser/blob/master/lib/read.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: node_modules/body-parser/lib/types/json.js (v2.3.0) lines 73-89 (createJsonParser strict branch)
      # Source confirmed: when options.strict is omitted or true (the DEFAULT), bodies whose first
      # non-whitespace character is not '{' or '[' throw a strict SyntaxError BEFORE JSON.parse runs.
      # createStrictSyntaxError() returns a SyntaxError with err.status === 400 and err.type === 'entity.parse.failed'
      # via the same normalizeJsonSyntaxError path used by malformed-json-throws.
      - id: json-strict-violation
        condition: >
          The strict option is not explicitly set to false (it defaults to true in v2.x), and the
          request body's first non-whitespace character is not '{' or '['. Common when clients send
          a bare JSON primitive ("hello", 42, true, null) instead of an object or array, or when a
          proxy injects a UTF-8 BOM or leading whitespace-stripped content. RFC 8259 allows any
          JSON value as a top-level body, but body-parser intentionally restricts to object/array
          unless strict:false is set.
        throws: SyntaxError with err.status === 400 and err.type === 'entity.parse.failed' (message contains 'strict violation' or the offending char)
        required_handling: >
          Error-handling middleware MUST catch this. The same Express error handler that catches
          malformed-json-throws will catch this — both surface as 400 with type 'entity.parse.failed'.
          If your API needs to accept bare JSON primitives (numbers, strings, booleans, null) as
          request bodies, you MUST explicitly pass { strict: false } when constructing the json
          middleware. Failing to do so silently rejects valid RFC 8259 bodies that clients in
          other languages (Python's requests with json= param sending a string, Go's json.Marshal
          of a primitive) will produce naturally.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#strict
          - https://github.com/expressjs/body-parser/blob/master/lib/types/json.js
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#request-size-did-not-match-content-length
      # Confirmed from raw-body module: returns 400 with type 'request.size.invalid'
      - id: json-size-invalid
        condition: >
          The request body's actual byte length does not match the value in the Content-Length header.
          Typically caused by malformed proxied requests where Content-Length was calculated using
          character count rather than byte count (e.g. with multibyte Unicode).
        throws: Error with err.status === 400 and err.type === 'request.size.invalid'
        required_handling: >
          Error-handling middleware MUST catch this and return 400. This error typically indicates
          a malformed upstream request or a proxy misconfiguration. Without handling, the middleware
          crashes the request with an unhandled error.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#request-size-did-not-match-content-length
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#stream-encoding-should-not-be-set
      # Source: createError(500, ..., { type: 'stream.encoding.set' })
      - id: json-stream-encoding-set
        condition: >
          req.setEncoding() was called before this middleware ran. body-parser operates on raw bytes
          and is incompatible with stream encoding set at the Node.js level.
        throws: Error with err.status === 500 and err.type === 'stream.encoding.set'
        required_handling: >
          Error-handling middleware MUST catch this. This is a developer configuration error —
          do NOT call req.setEncoding() when using body-parser. If this error appears in production,
          it indicates a middleware ordering bug that must be fixed.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#stream-encoding-should-not-be-set
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#stream-is-not-readable
      # Source: createError(400/500, ..., { type: 'stream.not.readable' })
      - id: json-stream-not-readable
        condition: >
          The request body stream was already consumed before this middleware ran. This happens when
          two body-parser instances are registered for the same route, or when another middleware
          (e.g. busboy, multer) already read the request stream.
        throws: Error with err.status === 500 and err.type === 'stream.not.readable'
        required_handling: >
          Error-handling middleware MUST catch this. This is a middleware ordering bug — each request
          body can only be read once. Ensure only one body-parsing middleware is registered per
          Content-Type. Use express-async-errors or a global error handler to surface this immediately.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#stream-is-not-readable
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
    edge_cases:
      - id: req-body-untrusted
        description: >
          req.body is derived from user-controlled input and MUST be validated before use. Properties may be missing,
          the wrong type, or adversarially crafted. Accessing req.body.foo.toString() without type checks will throw at
          runtime. Use a schema validation library (zod, joi) or explicit type guards.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: route-specific-preferred
        description: >
          The official Express documentation recommends attaching body-parser as route-specific middleware
          (app.post('/route', jsonParser, handler)) rather than globally (app.use(jsonParser)). Route-specific use
          reduces the attack surface by only parsing bodies on routes that need it.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: urlencoded
    import_path: body-parser
    description: >
      Returns an Express middleware that parses incoming requests with URL-encoded bodies. Populates req.body when
      Content-Type is 'application/x-www-form-urlencoded'.
    postconditions:
      # Evidence: seen in 4 primary firings across 4 repos in scan-body-parser-2026-04-14.json
      # Top affected: andrechristikan/ack-nestjs-boilerplate, artsy/force, CodelyTV/typescript-ddd-skeleton
      - id: payload-too-large
        condition: request body exceeds the configured size limit
        throws: Error with err.type === 'entity.too.large' and err.status === 413
        required_handling: |
          Error-handling middleware MUST catch this and return 413.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      - id: too-many-parameters
        condition: number of URL-encoded parameters exceeds parameterLimit (default 1000)
        throws: Error with err.type === 'parameters.too.many' and err.status === 413
        required_handling: >
          Error-handling middleware MUST catch this and return 413. The parameterLimit option SHOULD be reduced from the
          default of 1000 to the minimum required by the application to mitigate CVE-2025-13466 (DoS via parameter
          flooding).
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
          - https://github.com/expressjs/body-parser/security/advisories/GHSA-wqch-xfxh-vrr4
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      - id: parse-failure
        condition: body cannot be parsed as URL-encoded data
        throws: Error with err.type === 'entity.parse.failed' and err.status === 400
        required_handling: |
          Error-handling middleware MUST catch this and return 400.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/lib/read.js#L65-L73
      # Confirmed from source: createError(403, err, { type: err.type || 'entity.verify.failed' })
      - id: urlencoded-verify-failed
        condition: >
          The optional 'verify' function throws when inspecting the raw request body buffer.
          Used for validating HMAC signatures or enforcing custom body policies.
        throws: Error with err.status === 403 and err.type === 'entity.verify.failed' (or custom type)
        required_handling: >
          Error-handling middleware MUST catch this. When verify throws, a 403 Forbidden propagates
          through the middleware chain. Without error handling, the server crashes on the next unhandled
          error path.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/lib/read.js
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      # Evidence: node_modules/body-parser/lib/read.js (v2.3.0) lines 188-200 + 215-230
      # createDecompressionStream switch accepts 'gzip', 'deflate', 'br' (Brotli added v2.0.0); default throws 415.
      - id: urlencoded-encoding-unsupported
        condition: >
          Request has an unsupported Content-Encoding value (anything other than 'gzip', 'deflate',
          'br', or 'identity' — note 'br' / Brotli added in body-parser v2.0.0), OR inflate is false
          and gzip/deflate/br is used.
        throws: Error with err.status === 415 and err.type === 'encoding.unsupported'
        required_handling: |
          Error-handling middleware MUST catch this and return 415. Applications upgrading from v1.x
          may now receive Brotli-encoded form bodies that previously would have been rejected.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#unsupported-content-encoding-bogus
          - https://github.com/expressjs/body-parser/blob/master/lib/read.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#request-size-did-not-match-content-length
      - id: urlencoded-size-invalid
        condition: >
          Actual body byte length does not match Content-Length header value.
        throws: Error with err.status === 400 and err.type === 'request.size.invalid'
        required_handling: |
          Error-handling middleware MUST catch this and return 400.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#request-size-did-not-match-content-length
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#stream-encoding-should-not-be-set
      - id: urlencoded-stream-encoding-set
        condition: req.setEncoding() was called before this middleware ran.
        throws: Error with err.status === 500 and err.type === 'stream.encoding.set'
        required_handling: >
          Error-handling middleware MUST catch this. This is a developer configuration error —
          never call req.setEncoding() when using body-parser.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#stream-encoding-should-not-be-set
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#stream-is-not-readable
      - id: urlencoded-stream-not-readable
        condition: >
          Request stream was already consumed by another middleware before urlencoded parser ran.
        throws: Error with err.status === 500 and err.type === 'stream.not.readable'
        required_handling: >
          Error-handling middleware MUST catch this. Typically caused by duplicate body-parsing
          middleware registrations. Only one body parser should be registered per Content-Type.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#stream-is-not-readable
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#the-input-exceeded-the-depth
      # Source: qs library throws when depth exceeded with extended:true
      - id: urlencoded-qs-depth-exceeded
        condition: >
          The extended option is true (qs parsing) and the nested parameter depth exceeds the
          configured depth option (default 32). For example: a[b][c][d]...[z]=1 with too many levels.
        throws: Error with err.status === 400 (message contains "The input exceeded the depth")
        required_handling: >
          Error-handling middleware MUST catch this and return 400. Reduce the depth option to the
          minimum needed by your application (most apps need depth <= 5). Deep nesting can cause
          exponential memory allocation in older qs versions — set depth explicitly to a low value
          (e.g. { extended: true, depth: 5 }).
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#the-input-exceeded-the-depth
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: node_modules/body-parser/lib/types/urlencoded.js (v2.3.0) lines 38, 72, 76
      # Three sync TypeError throw sites that fire at MIDDLEWARE-CONSTRUCTION time (not per-request):
      #   - defaultCharset !== 'utf-8' && !== 'iso-8859-1' (line 38)
      #   - parameterLimit NaN or < 1 (line 72)
      #   - depth NaN or < 0 (line 76)
      # These are sync throws OUTSIDE the request lifecycle — Express error-handling middleware
      # cannot catch them because they execute during `bodyParser.urlencoded({...})` at app boot.
      - id: urlencoded-config-type-error
        condition: >
          The urlencoded({ ... }) constructor is invoked with an invalid option value: defaultCharset
          set to anything other than 'utf-8' or 'iso-8859-1'; parameterLimit set to a non-numeric
          or non-positive value; depth set to a non-numeric or negative value. In v2.x these checks
          run synchronously at middleware-construction time, NOT at request time. The TypeError
          surfaces during `app.use(bodyParser.urlencoded({...}))` and crashes the Node process
          before the server starts listening.
        throws: TypeError with message 'option defaultCharset must be either utf-8 or iso-8859-1' | 'option parameterLimit must be a positive number' | 'option depth must be a zero or a positive number'
        required_handling: >
          DO NOT rely on Express error-handling middleware for these — they fire BEFORE any request.
          Validate option values at the call site, or wrap the middleware factory in a try/catch
          during boot to surface a clear startup error rather than an uncaught exception. Common
          regression source: passing a string for parameterLimit from process.env without
          parseInt(), or accidentally setting defaultCharset to 'UTF-8' (uppercase).
        sources:
          - https://github.com/expressjs/body-parser/blob/master/lib/types/urlencoded.js
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
    edge_cases:
      - id: extended-depth-limit
        description: >
          When extended is true, the qs library is used to parse nested objects. The default depth limit is 32, which
          allows deeply nested structures that can cause elevated memory usage or stack overflows. The official docs
          recommend keeping this value as low as possible for the application.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: dos-cve-2025-13466
        description: >
          CVE-2025-13466 (CVSS 7.5): body-parser 2.2.0 is vulnerable to DoS via URL-encoded payloads with a very large
          number of parameters within the default 100KB size limit. Mitigate by setting parameterLimit to the minimum
          needed (e.g., 100 instead of the default 1000).
        sources:
          - https://secalerts.co/vulnerability/CVE-2025-13466
          - https://github.com/expressjs/body-parser/security/advisories/GHSA-wqch-xfxh-vrr4
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: req-body-untrusted
        description: |
          req.body is user-controlled and MUST be validated before use. All properties and values are untrusted.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
