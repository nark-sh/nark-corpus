      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#request-size-did-not-match-content-length
      - id: text-size-invalid
        condition: Actual body byte length does not match Content-Length header.
        throws: Error with err.status === 400 and err.type === 'request.size.invalid'
        required_handling: |
          Error-handling middleware MUST catch this and return 400.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#request-size-did-not-match-content-length
