package: body-parser
semver: '>=1.20.0 <3.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-15'
status: production
evidence_quality: confirmed
coverage_score: 0.95
functions:
  - name: json
    import_path: body-parser
    description: >
      Returns an Express middleware that parses incoming requests with JSON bodies. Populates req.body with the parsed
      object when the Content-Type header matches 'application/json'.
    postconditions:
      # Evidence: seen in 5 primary firings across 5 repos in scan-body-parser-2026-04-14.json
      # Top affected: andrechristikan/ack-nestjs-boilerplate, artsy/force, CodelyTV/typescript-ddd-skeleton
      - id: malformed-json-throws
        condition: request body is not valid JSON
        throws: SyntaxError with err.status === 400 and err.type === 'entity.parse.failed'
        required_handling: >
          An Express error-handling middleware with the signature (err, req, res, next) MUST be registered after all
          routes. Without it, malformed JSON payloads crash the entire application (DoS). The handler should check err
          instanceof SyntaxError && err.status === 400 && 'body' in err and return a 400 response.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
          - https://github.com/expressjs/body-parser/issues/122
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      - id: payload-too-large
        condition: request body exceeds the configured size limit (default 100kb)
        throws: Error with err.type === 'entity.too.large' and err.status === 413
        required_handling: >
          Error-handling middleware MUST catch this error and return 413. The size limit SHOULD be configured explicitly
          based on application requirements. Values above 5MB increase memory pressure and DoS risk.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
          - https://vulert.com/vuln-db/debian-11-node-body-parser-170959
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      - id: unsupported-charset
        condition: request charset is not supported
        throws: Error with err.type === 'charset.unsupported' and err.status === 415
        required_handling: |
          Error-handling middleware MUST catch this and return 415 Unsupported Media Type to the client.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: content-type-mismatch
        condition: request Content-Type does not match the configured 'type' option
        returns: Middleware calls next() without populating req.body
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      # Evidence: https://github.com/expressjs/body-parser/blob/master/lib/read.js#L65-L73
      # Confirmed from source: createError(403, err, { type: err.type || 'entity.verify.failed' })
      - id: json-verify-failed
        condition: >
          The optional 'verify' function throws an error when inspecting the raw request body
          buffer. This is used for HMAC signature verification (e.g. Stripe webhooks, GitHub webhooks).
        throws: Error with err.status === 403 and err.type === 'entity.verify.failed' (or the custom type thrown by verify)
        required_handling: >
          Error-handling middleware MUST catch 403 errors from this middleware. When verify throws,
          the error propagates as a 403 Forbidden. Applications using webhook signature verification
          MUST handle this error gracefully — typically by returning 403 to the webhook sender.
          Without error handling, the server crashes or leaks unhandled promise rejections.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/lib/read.js
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      # Evidence: https://github.com/expressjs/body-parser/blob/master/lib/read.js#L96-L103 (contentstream fn)
      # Source confirmed: createError(415, 'content encoding unsupported', { type: 'encoding.unsupported' })
      - id: json-encoding-unsupported
        condition: >
          Request has a Content-Encoding header with an unsupported encoding (not 'gzip', 'deflate',
          or 'identity'), OR inflate option is set to false but request uses gzip or deflate encoding.
        throws: Error with err.status === 415 and err.type === 'encoding.unsupported'
        required_handling: >
          Error-handling middleware MUST catch this and return 415. Common when APIs accept compressed
          requests (e.g. from CDNs or proxies) but inflate is disabled, or when clients send custom
          Content-Encoding headers. Without handling, the server returns an unhandled error to the client.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#unsupported-content-encoding-bogus
          - https://github.com/expressjs/body-parser/blob/master/lib/read.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#request-size-did-not-match-content-length
      # Confirmed from raw-body module: returns 400 with type 'request.size.invalid'
      - id: json-size-invalid
        condition: >
          The request body's actual byte length does not match the value in the Content-Length header.
          Typically caused by malformed proxied requests where Content-Length was calculated using
          character count rather than byte count (e.g. with multibyte Unicode).
        throws: Error with err.status === 400 and err.type === 'request.size.invalid'
        required_handling: >
          Error-handling middleware MUST catch this and return 400. This error typically indicates
          a malformed upstream request or a proxy misconfiguration. Without handling, the middleware
          crashes the request with an unhandled error.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#request-size-did-not-match-content-length
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#stream-encoding-should-not-be-set
      # Source: createError(500, ..., { type: 'stream.encoding.set' })
      - id: json-stream-encoding-set
        condition: >
          req.setEncoding() was called before this middleware ran. body-parser operates on raw bytes
          and is incompatible with stream encoding set at the Node.js level.
        throws: Error with err.status === 500 and err.type === 'stream.encoding.set'
        required_handling: >
          Error-handling middleware MUST catch this. This is a developer configuration error —
          do NOT call req.setEncoding() when using body-parser. If this error appears in production,
          it indicates a middleware ordering bug that must be fixed.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#stream-encoding-should-not-be-set
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#stream-is-not-readable
      # Source: createError(400/500, ..., { type: 'stream.not.readable' })
      - id: json-stream-not-readable
        condition: >
          The request body stream was already consumed before this middleware ran. This happens when
          two body-parser instances are registered for the same route, or when another middleware
          (e.g. busboy, multer) already read the request stream.
        throws: Error with err.status === 500 and err.type === 'stream.not.readable'
        required_handling: >
          Error-handling middleware MUST catch this. This is a middleware ordering bug — each request
          body can only be read once. Ensure only one body-parsing middleware is registered per
          Content-Type. Use express-async-errors or a global error handler to surface this immediately.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#stream-is-not-readable
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium
    edge_cases:
      - id: req-body-untrusted
        description: >
          req.body is derived from user-controlled input and MUST be validated before use. Properties may be missing,
          the wrong type, or adversarially crafted. Accessing req.body.foo.toString() without type checks will throw at
          runtime. Use a schema validation library (zod, joi) or explicit type guards.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: route-specific-preferred
        description: >
          The official Express documentation recommends attaching body-parser as route-specific middleware
          (app.post('/route', jsonParser, handler)) rather than globally (app.use(jsonParser)). Route-specific use
          reduces the attack surface by only parsing bodies on routes that need it.
        sources:
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
