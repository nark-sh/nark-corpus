      # Source: qs library throws when depth exceeded with extended:true
      - id: urlencoded-qs-depth-exceeded
        condition: >
          The extended option is true (qs parsing) and the nested parameter depth exceeds the
          configured depth option (default 32). For example: a[b][c][d]...[z]=1 with too many levels.
        throws: Error with err.status === 400 (message contains "The input exceeded the depth")
        required_handling: >
          Error-handling middleware MUST catch this and return 400. Reduce the depth option to the
          minimum needed by your application (most apps need depth <= 5). Deep nesting can cause
          exponential memory allocation in older qs versions — set depth explicitly to a low value
          (e.g. { extended: true, depth: 5 }).
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#the-input-exceeded-the-depth
        severity: error
        business_impact:
          incident_label: DOWNTIME
