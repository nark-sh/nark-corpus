          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      # Evidence: https://github.com/expressjs/body-parser/blob/master/lib/read.js#L65-L73
      - id: text-verify-failed
        condition: >
          The optional 'verify' function throws when inspecting the raw request body buffer.
        throws: Error with err.status === 403 and err.type === 'entity.verify.failed' (or custom type)
        required_handling: >
          Error-handling middleware MUST catch this. When verify throws, a 403 Forbidden propagates.
          Without error handling, the server crashes.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/lib/read.js
          - https://expressjs.com/en/resources/middleware/body-parser.html
        severity: error
        business_impact:
