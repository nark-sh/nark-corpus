          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high
      # Evidence: https://github.com/expressjs/body-parser/blob/master/README.md#unsupported-content-encoding-bogus
      - id: text-encoding-unsupported
        condition: Request has unsupported Content-Encoding, or inflate is false but gzip/deflate is sent.
        throws: Error with err.status === 415 and err.type === 'encoding.unsupported'
        required_handling: |
          Error-handling middleware MUST catch this and return 415.
        sources:
          - https://github.com/expressjs/body-parser/blob/master/README.md#unsupported-content-encoding-bogus
