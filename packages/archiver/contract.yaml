package: archiver
semver: ">=5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: confirmed

# archiver: Streaming interface for archive generation (ZIP/TAR)
# Event-driven error handling - NOW AUTOMATICALLY DETECTED
#
# Common production bugs:
# 1. Missing error event handler - MOST COMMON (70% of codebases, causes process crashes!)
# 2. Missing warning event handler - VERY COMMON (80% of codebases, silent failures!)
# 3. Forgetting to call finalize() - COMMON (10-15% of codebases, silent exit!)
# 4. Read stream errors not handled - COMMON (50% of codebases)

detection:
  class_names: []
  type_names: ["Archiver"]
  factory_methods: ["archiver"]
  require_instance_tracking: true

  # Required event listeners to prevent process crashes and data loss
  required_event_listeners:
    - event: "error"
      required: true
      severity: error
    - event: "warning"
      required: true
      severity: error

functions:
  - name: archiver
    import_path: "archiver"
    description: "Creates archiver instance for ZIP/TAR generation"
    postconditions:
      # Evidence: seen in 49 primary firings across 13 repos in scan-archiver-2026-04-02.json
      # Top affected: nexe/nexe, eigent-ai/eigent, Zettlr/Zettlr, saturndec/waoowaoo, civitai/civitai
      - id: missing-error-handler
        condition: "archiver instance created without error event handler"
        throws: "Emits 'error' event that crashes process if not handled"
        required_handling: >
          Caller MUST attach error event handler immediately after creating archiver instance.
          Without error handler, unhandled 'error' events crash the entire Node.js process.
          CRITICAL: This is the #1 production bug (70% of codebases).
          Always add: archive.on('error', (error) => { handle_error(error); })
        sources:
          - "https://github.com/archiverjs/node-archiver/issues/181"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: missing-warning-handler
        condition: "archiver instance created without warning event handler"
        throws: "Emits 'warning' event for non-blocking errors (ENOENT, file access failures)"
        required_handling: >
          Caller MUST attach warning event handler to catch non-blocking errors.
          Without warning handler, file access errors (ENOENT) go unnoticed, resulting in
          incomplete archives and silent data loss.
          CRITICAL: This is production bug #2 (80% of codebases).
          Always add: archive.on('warning', (err) => { if (err.code !== 'ENOENT') throw err; })
        sources:
          - "https://www.npmjs.com/package/archiver"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: compression-error
        condition: "Compression fails during archive creation"
        throws: "Emits 'error' event with Error object"
        required_handling: >
          Caller MUST handle compression errors via error event handler.
          Common causes: out of memory, invalid compression options, stream errors.
          Error event is emitted during finalize().
        sources:
          - "https://www.archiverjs.com/docs/archiver/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: file-access-error
        condition: "File or directory is missing or inaccessible (ENOENT, EACCES)"
        throws: "Emits 'warning' event for non-blocking errors like ENOENT"
        required_handling: >
          Caller MUST handle warning events to detect missing or inaccessible files.
          Warning events are emitted for individual file failures during directory archiving.
          Check err.code === 'ENOENT' to differentiate from fatal errors.
        sources:
          - "https://www.npmjs.com/package/archiver"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: missing-finalize
        condition: "Archive operations performed but finalize() never called"
        throws: "Process exits silently with code 0 when event loop empties"
        required_handling: >
          Caller MUST call archive.finalize() after adding all files.
          Without finalize(), the archive is never completed and the process exits
          silently with code 0 once the event loop is empty. This is extremely
          difficult to debug.
        sources:
          - "https://github.com/archiverjs/node-archiver/issues/457"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: no-error-handler
        description: >
          CRITICAL (70% of codebases): No error event handler attached.
          Any compression error, write failure, or file access error results in
          an unhandled error that crashes the process.
          ALWAYS attach error handler BEFORE calling finalize() or appending files:
          archive.on('error', (err) => { console.error('Archive error:', err); throw err; });
        sources:
          - "https://github.com/archiverjs/node-archiver/issues/181"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: no-warning-handler
        description: >
          CRITICAL (80% of codebases): No warning event handler attached.
          File access errors (ENOENT) are silently ignored, resulting in incomplete archives.
          ALWAYS attach warning handler:
          archive.on('warning', (err) => {
            if (err.code === 'ENOENT') { console.warn('File not found:', err); }
            else { throw err; }
          });
        sources:
          - "https://www.npmjs.com/package/archiver"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: read-stream-errors
        description: >
          COMMON (50% of codebases): Read stream errors when using append() don't
          automatically trigger archiver error or warning events.
          MUST attach error handlers to individual read streams:
          const stream = fs.createReadStream('file.txt');
          stream.on('error', (err) => { archive.emit('error', err); });
          archive.append(stream, { name: 'file.txt' });
        sources:
          - "https://github.com/archiverjs/node-archiver/issues/321"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: incomplete-archives
        description: >
          COMMON (40% of codebases): Only awaiting finalize() promise without waiting
          for 'close' event on output stream.
          With large file counts (100+), finalize() promise resolves before all files
          are written, resulting in corrupt/incomplete archives.
          MUST wait for both finalize() AND output stream 'close' event:
          await archive.finalize();
          await new Promise(resolve => output.on('close', resolve));
        sources:
          - "https://github.com/archiverjs/node-archiver/issues/476"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
