      blob does not exist (catches RestError with errorCode BlobNotFound), but
      propagates EVERY OTHER error including 409 SnapshotsPresent — the exact
      silent-bug case covered in blob-delete-snapshots-present. The "If Exists" name
      misleads callers into omitting try-catch on the assumption that the wrapper
      handles all delete failures.
    postconditions:
      - id: blob-deleteifexists-snapshots-present
        maturity: stable
        condition: >
          blob has one or more snapshots and deleteSnapshots option was NOT set —
          deleteIfExists throws RestError statusCode 409 errorCode SnapshotsPresent
          (forwarded from delete()). This is the same critical production bug as
          BlobClient.delete() — succeeds in development without snapshots, fails in
          production after Azure Backup or versioning policy creates snapshots.
        throws: 'RestError with statusCode 409 and errorCode: SnapshotsPresent (not swallowed by the "if exists" wrapper)'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-deleteifexists
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        required_handling: >
          Caller MUST either pass { deleteSnapshots: 'include' } to delete blob and
          snapshots together, or wrap deleteIfExists in try-catch and check
          error.details?.errorCode === 'SnapshotsPresent'. The boolean succeeded
          flag does NOT cover this case — the call throws before returning.

