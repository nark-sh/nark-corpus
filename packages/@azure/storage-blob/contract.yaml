  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobserviceclient#@azure-storage-blob-blobserviceclient-getuserdelegationkey
  # Evidence: https://learn.microsoft.com/en-us/rest/api/storageservices/get-user-delegation-key
  - name: getUserDelegationKey
    import_path: '@azure/storage-blob.BlobServiceClient'
    description: >
