    import_path: '@azure/storage-blob.BlobClient'
    description: >
      Returns true if the blob exists. Internally calls getProperties() and catches
      ONLY the 404 BlobNotFound response (returns false) and the 409 CPK-mismatch
      responses (returns true). Auth errors, throttling, lease conflicts, and network
      errors propagate as RestError. Distinct from ContainerClient.exists() which has
      identical swallow-pattern at container scope.
    postconditions:
      - id: blob-exists-no-try-catch
        maturity: stable
        condition: >
          credential lacks read permission on the blob (statusCode 403), or the
          storage service throttles the request (statusCode 429), or the account
          enforces a network ACL the client violates (statusCode 403
          AuthorizationFailure) — exists() re-throws RestError. The boolean return
          contract misleads callers into omitting try-catch.
        throws: 'RestError (from @azure/core-rest-pipeline) — statusCode 403 (auth/ACL), 429 (throttling), or network error code'
        sources:
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-exists
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: >
          Caller MUST wrap exists() in try-catch and distinguish (a) the boolean false
          result (truly missing) from (b) a thrown RestError (auth / throttling /
          network). Do NOT treat a thrown error as equivalent to "blob does not exist"
          — that produces silent data loss when permissions regress in production.

      - id: blob-exists-race-condition
        maturity: stable
        condition: >
          another writer creates or deletes the blob between the exists() check and
          a subsequent operation (download, delete, copy). exists() is a point-in-time
          read; the result is stale the moment it returns. Time-of-check / time-of-use
          (TOCTOU) bugs in cleanup jobs and migration scripts.
        throws: >
          Does NOT throw on race. The race manifests in the next operation as a
          RestError 404 BlobNotFound on download/delete, or 409 BlobAlreadyExists on
          upload.
        sources:
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-exists
          - https://learn.microsoft.com/en-us/rest/api/storageservices/specifying-conditional-headers-for-blob-service-operations
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        required_handling: >
          Caller SHOULD prefer single-call patterns over check-then-act. For deletes
          use deleteIfExists(); for conditional uploads use If-None-Match or
          If-Match conditional headers (options.conditions.ifMatch); for downloads
          catch the RestError 404 directly. exists() is appropriate ONLY for read-only
          telemetry / dashboards where staleness is acceptable.

  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-deleteifexists
  # Evidence: node_modules/@azure/storage-blob/dist/commonjs/Clients.js lines 476-497 (verified at @azure/storage-blob@12.32.0)
  # The deleteIfExists() implementation swallows ONLY errorCode "BlobNotFound" (returns
