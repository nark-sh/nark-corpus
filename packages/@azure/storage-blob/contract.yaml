    import_path: '@azure/storage-blob.BlobClient'
    description: Downloads a blob from Azure Blob Storage
    postconditions:
      - id: success
        maturity: stable
        condition: blob exists and download succeeds
        returns: BlobDownloadResponse with readableStreamBody and blob metadata
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-download
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: blob-not-found
        maturity: stable
        condition: blob does not exist
        throws: 'RestError with statusCode 404 and x-ms-error-code: BlobNotFound'
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 404 or
          error.response.headers.get('x-ms-error-code') === 'BlobNotFound' to handle missing blobs.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: blob-archived
        maturity: stable
        condition: blob is in archived tier
        throws: 'RestError with statusCode 409 and errorCode: BlobArchived'
        required_handling: >
          Caller MUST catch RestError and handle archived blobs by either rehydrating the blob first or returning
