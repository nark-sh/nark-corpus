  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-delete
  # Evidence: https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
  # Error types confirmed: RestError (from @azure/core-rest-pipeline, re-exported by @azure/storage-blob)
  - name: deleteBlob
    import_path: '@azure/storage-blob.BlobClient'
    description: >
      Marks the specified blob for deletion. The blob is later deleted during
      garbage collection. BlobClient.delete() is the primary blob-deletion API
      called on an individual BlobClient instance. Note: if the blob has snapshots,
      deletion fails unless deleteSnapshots option is provided.
    postconditions:
      - id: blob-delete-snapshots-present
        maturity: stable
        condition: >
          blob has one or more snapshots and deleteSnapshots option was not set —
          throws RestError with statusCode 409 and errorCode SnapshotsPresent.
          A very common silent bug: code that successfully deletes blobs in development
          (no snapshots) fails in production after versioning or backup jobs create snapshots.
        throws: 'RestError with statusCode 409 and errorCode: SnapshotsPresent'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-delete
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        required_handling: >
          Caller MUST either pass { deleteSnapshots: 'include' } to delete blob and all
          snapshots together, or catch RestError with statusCode 409 and errorCode
          SnapshotsPresent to handle the conflict.

      - id: blob-delete-not-found
        maturity: stable
        condition: >
          blob does not exist — throws RestError with statusCode 404 and errorCode BlobNotFound.
          Common in cleanup flows where the blob was already deleted by another process.
        throws: 'RestError with statusCode 404 and errorCode: BlobNotFound'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-delete
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 404 to handle
          already-deleted blobs gracefully. Or use deleteIfExists() which returns
          { succeeded: false } instead of throwing.

      - id: blob-delete-lease-conflict
        maturity: stable
        condition: >
          blob has an active lease but no lease ID was provided — throws RestError
          with statusCode 412 and errorCode LeaseIdMissing or LeaseIdMismatchWithBlobOperation.
        throws: 'RestError with statusCode 412 and errorCode: LeaseIdMissing or LeaseIdMismatchWithBlobOperation'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-delete
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        required_handling: >
          Caller MUST provide the active lease ID via options.conditions.leaseId when
          deleting leased blobs. Catch RestError with statusCode 412 to detect lease
          conflicts.

  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-uploadstream
  # Evidence: https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
  - name: uploadStream
    import_path: '@azure/storage-blob.BlockBlobClient'
    description: >
      Uploads a Node.js Readable stream to Azure Blob Storage using block-by-block
      staging and commit. Unlike upload() (which requires the full body upfront),
      uploadStream() is the correct method for large files, live video streams, and
      any case where the content length is unknown. Internally calls stageBlock for
      each buffer chunk and commitBlockList at the end. bufferSize defaults to 8MB,
      maxConcurrency defaults to 5 concurrent block uploads.
    postconditions:
      - id: uploadstream-no-try-catch
        maturity: stable
        condition: >
          any network failure, auth error, or storage service error during block staging
          or commit — throws RestError. Because uploadStream() makes multiple HTTP requests
          (one stageBlock per bufferSize chunk), any intermediate failure throws and the
          partial upload is left uncommitted.
        throws: 'RestError (from @azure/core-rest-pipeline) with statusCode reflecting the HTTP failure'
        sources:
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-uploadstream
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        required_handling: >
          Caller MUST wrap uploadStream in try-catch. On error, the partially staged
          blocks are automatically cleaned up by Azure after 7 days, but the upload
          must be retried from the beginning.

      - id: uploadstream-container-not-found
        maturity: stable
        condition: >
          the target container does not exist — throws RestError with statusCode 404
          and errorCode ContainerNotFound. Common in multi-tenant apps where containers
          are provisioned lazily and creation fails silently.
        throws: 'RestError with statusCode 404 and errorCode: ContainerNotFound'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-uploadstream
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: >
          Caller MUST ensure container exists before calling uploadStream. Catch
          RestError with statusCode 404 and errorCode ContainerNotFound to detect
          missing containers and provision them via containerClient.createIfNotExists().

  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-uploadblockblob
  # Evidence: https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
  - name: uploadBlockBlob
    import_path: '@azure/storage-blob.ContainerClient'
    description: >
      Convenience method on ContainerClient that creates a BlockBlobClient for
      the given blob name and calls upload() internally. Returns both the
      BlockBlobUploadResponse and the BlockBlobClient for the newly created blob.
      The most common pattern in Next.js API routes and Express handlers that
      upload user files directly without creating a separate BlockBlobClient.
    postconditions:
      - id: uploadblockblob-no-try-catch
        maturity: stable
        condition: >
          any network failure, auth error, or service error — throws RestError.
          Same error profile as BlockBlobClient.upload() since it delegates to that method.
          Commonly called in API route handlers without try-catch because callers assume
          the container already exists.
        throws: 'RestError (from @azure/core-rest-pipeline) on any service or network failure'
        sources:
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-uploadblockblob
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
