  # (returns true). Every other failure mode — auth/403, throttling/429, transient
  # network errors — re-throws. Devs commonly assume "exists() returns boolean so it
  # never throws" and use it without try-catch, which causes 403/429 to bubble as
  # unhandled rejections in higher layers.
