          Local error — no network call is made.
        sources:
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-generatesasurl
          - https://learn.microsoft.com/en-us/rest/api/storageservices/constructing-a-service-sas
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
