        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/constructing-a-service-sas
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-generatesasurl
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        required_handling: >
          Caller MUST set options.expiresOn to an appropriate future time (typically
          15 minutes for upload forms, up to 1 hour for download links). Communicate
          expiry to end users and provide a mechanism to generate fresh URLs.

  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-exists
  # Evidence: node_modules/@azure/storage-blob/dist/commonjs/Clients.js lines 381-401 (verified at @azure/storage-blob@12.32.0)
  # The exists() implementation explicitly swallows ONLY statusCode 404 (returns false)
