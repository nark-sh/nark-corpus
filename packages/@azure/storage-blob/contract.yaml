      BlobServiceClient. The key is used to sign user delegation SAS tokens —
      which are more secure than account key SAS because they're scoped to
      a specific user identity and have a maximum 7-day lifetime. Required
      when the storage account uses Azure AD authentication (no account key)
      and the application needs to generate SAS tokens for end users.
    postconditions:
      - id: getuserdelegationkey-no-try-catch
        maturity: stable
        condition: >
          credential lacks the Microsoft.Storage generateUserDelegationKey permission —
          throws RestError with statusCode 403. Also throws RestError on network failures.
          In production, RBAC permissions are often more restrictive than development
          environments, causing this to fail at runtime.
        throws: 'RestError with statusCode 403 (permission denied) or 401 (unauthenticated)'
        sources:
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobserviceclient#@azure-storage-blob-blobserviceclient-getuserdelegationkey
          - https://learn.microsoft.com/en-us/rest/api/storageservices/get-user-delegation-key
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        required_handling: >
          Caller MUST wrap getUserDelegationKey in try-catch. The calling identity needs
          Storage Blob Delegator role (Microsoft.Storage/storageAccounts/blobServices/
          generateUserDelegationKey). Cache the returned key until its expiresOn time.

      - id: getuserdelegationkey-expired-window
        maturity: stable
        condition: >
          user delegation key is cached past its expiresOn timestamp — SAS tokens
          signed with an expired key return 403 AuthorizationPermissionMismatch
          when clients use them. No error is thrown at key retrieval time.
        throws: >
          Does NOT throw at key retrieval. SAS tokens signed with the expired key return
          HTTP 403 when used. The error surfaces in downstream client operations, not here.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/get-user-delegation-key
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobserviceclient#@azure-storage-blob-blobserviceclient-getuserdelegationkey
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        required_handling: >
          Caller MUST track key.expiresOn and refresh the key before it expires.
          Do NOT cache user delegation keys indefinitely. Cache with TTL of
          expiresOn minus 5 minutes to ensure rotation before expiry.

  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-generatesasurl
