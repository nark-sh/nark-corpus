          throws RestError statusCode 412 errorCode LeaseIdMissing or
          LeaseIdMismatchWithBlobOperation. The wrapper does NOT swallow lease
          errors.
        throws: 'RestError with statusCode 412 and errorCode: LeaseIdMissing or LeaseIdMismatchWithBlobOperation'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-deleteifexists
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        required_handling: >
          Caller MUST provide the active lease ID via options.conditions.leaseId for
          leased blobs. The "if exists" wrapper is NOT a replacement for try-catch
          around the call.

      - id: blob-deleteifexists-auth-and-throttling
        maturity: stable
        condition: >
          credential lacks delete permission on the blob (403), or the storage
          service throttles the request (429 ServerBusy / TimeoutException) — the
          wrapper re-throws RestError. Cleanup batch jobs that iterate large blob
          counts commonly trigger throttling; without try-catch the batch halts
          mid-iteration leaving an inconsistent dataset.
        throws: 'RestError with statusCode 403 (auth) or 429 (throttling — ServerBusy / OperationTimedOut)'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://learn.microsoft.com/en-us/rest/api/storageservices/storage-service-throttle-warnings
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: >
          Caller MUST wrap deleteIfExists in try-catch even though the name implies
          safety. For batch cleanup jobs, implement retry-with-backoff on RestError
          429 and surface 403 to the operator (RBAC regression, not a transient
          fault).

  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-settags
  # Evidence: https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-gettags
  # Evidence: https://learn.microsoft.com/en-us/rest/api/storageservices/blob-tags
  # 12.30.0 (2026-01-16) release added conditional-headers support on getTags() and
  # setTags() — see Azure/azure-sdk-for-js CHANGELOG.md storage-blob entry. This
  # introduced a NEW 412 PreconditionFailed scenario that 12.0-12.29.x callers do
  # not encounter. Profile semver is >=12.0.0 so contract must cover the new modes.
  - name: setTags
    import_path: '@azure/storage-blob.BlobClient'
    description: >
      Sets the user-defined index tags on a blob. Tags are name/value strings used
      for indexed lookup via findBlobsByTags. Each blob can have up to 10 tags; tag
      name length 1-128 chars, value length 0-256 chars. setTags accepts options
      with conditional headers (ifTags / ifMatch / ifNoneMatch — the conditional
      header support on tag ops was added in 12.30.0). Common in compliance /
      retention workflows and multi-tenant data classification.
    postconditions:
      - id: settags-precondition-failed
        maturity: stable
        condition: >
          options.conditions.ifTags or .ifMatch is provided and the current blob
          state does not satisfy the predicate — throws RestError statusCode 412
          errorCode ConditionNotMet (ifMatch) or TagConditionNotMet (ifTags). New
          in 12.30.0; legacy callers pinned to <=12.29.x will not encounter this.
        throws: 'RestError with statusCode 412 and errorCode: ConditionNotMet or TagConditionNotMet'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://github.com/Azure/azure-sdk-for-js/blob/main/sdk/storage/storage-blob/CHANGELOG.md
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        required_handling: >
          Caller MUST catch RestError with statusCode 412 to detect conditional-write
          races. Typical pattern is retry with a fresh ETag or back off and re-read
          tags via getTags() before re-attempting setTags.

      - id: settags-invalid-tag-value
        maturity: stable
        condition: >
          tag name violates the 1-128 char rule, value violates the 0-256 char rule,
          tag name contains disallowed characters, or the blob already has 10 tags
          and a new tag is being added — throws RestError statusCode 400 errorCode
          InvalidXmlNodeValue / InvalidInput. Often triggered by serializing
          user-supplied metadata directly into tags without validation.
        throws: 'RestError with statusCode 400 and errorCode: InvalidInput or InvalidXmlNodeValue'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/set-blob-tags
          - https://learn.microsoft.com/en-us/azure/storage/blobs/storage-manage-find-blobs
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low
        required_handling: >
          Caller MUST validate tag inputs against Azure's rules BEFORE calling
          setTags, or catch RestError 400 and surface the validation error to the
          end user. Storing user-supplied data as tags requires explicit allowlist
          / sanitization.

      - id: settags-blob-not-found
        maturity: stable
        condition: >
          target blob does not exist or is in a deleted state — throws RestError
          statusCode 404 errorCode BlobNotFound. Often encountered after async
          deletion in retention workflows.
        throws: 'RestError with statusCode 404 and errorCode: BlobNotFound'
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
          - https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-settags
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        required_handling: >
          Caller MUST catch RestError statusCode 404 to handle the
          deleted-between-list-and-tag race that retention pipelines hit. Skip
          and log; do not abort the batch.
