package: '@azure/storage-blob'
semver: '>=12.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-11'
status: production
evidence_quality: confirmed
# Evidence: 0 violations across 5 repos scanned in scan-azure-storage-blob-2026-04-11.json
# Repos: remotely-save/remotely-save (⭐ 7025), erxes/erxes (⭐ 3918), unjs/unstorage (⭐ 2536),
#         Scale3-Labs/langtrace (⭐ 1187), zetaloop/desktop (⭐ 743)
# FP check: 0/100 false positives in repos without @azure/storage-blob.
# Note: Detection gap persists for patterns via intermediate variables (e.g. blobClient.download()
#   where blobClient assigned from containerClient.getBlobClient()) — confirmed in 2026-04-01 audit.
functions:
  - name: download
    import_path: '@azure/storage-blob.BlobClient'
    description: Downloads a blob from Azure Blob Storage
    postconditions:
      - id: success
        condition: blob exists and download succeeds
        returns: BlobDownloadResponse with readableStreamBody and blob metadata
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-download
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: blob-not-found
        condition: blob does not exist
        throws: 'RestError with statusCode 404 and x-ms-error-code: BlobNotFound'
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 404 or
          error.response.headers.get('x-ms-error-code') === 'BlobNotFound' to handle missing blobs.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: blob-archived
        condition: blob is in archived tier
        throws: 'RestError with statusCode 409 and errorCode: BlobArchived'
        required_handling: >
          Caller MUST catch RestError and handle archived blobs by either rehydrating the blob first or returning
          appropriate error to user.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: network-error
        condition: network failure, connection timeout, or DNS resolution failure
        throws: Error with code ECONNREFUSED, ETIMEDOUT, or ENOTFOUND
        required_handling: |
          Caller MUST catch errors and implement retry logic with exponential backoff for transient network failures.
        sources:
          - https://github.com/Azure/azure-sdk-for-js/issues/4999
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: getProperties
    import_path: '@azure/storage-blob.BlobClient'
    description: Gets blob properties including metadata, content type, and last modified time
    postconditions:
      - id: success
        condition: blob exists
        returns: BlobGetPropertiesResponse with metadata, contentType, lastModified, etc.
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-getproperties
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: blob-not-found
        condition: blob does not exist
        throws: 'RestError with statusCode 404 and errorCode: BlobNotFound'
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 404 to handle missing blobs. Common pattern is to
          check existence before accessing properties.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: container-not-found
        condition: container does not exist
        throws: 'RestError with statusCode 404 and errorCode: ContainerNotFound'
        required_handling: >
          Caller MUST catch RestError and distinguish between BlobNotFound and ContainerNotFound to provide appropriate
          error messages.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: upload
    import_path: '@azure/storage-blob.BlockBlobClient'
    description: Uploads data to a block blob
    postconditions:
      - id: success
        condition: upload succeeds
        returns: BlockBlobUploadResponse with requestId, version, and ETag
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-upload
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: blob-already-exists
        condition: 'blob exists and If-None-Match: * is set'
        throws: 'RestError with statusCode 409 and errorCode: BlobAlreadyExists'
        required_handling: |
          Caller MUST catch RestError and check error.statusCode === 409 to handle conflicts when blob already exists.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: container-not-found
        condition: container does not exist
        throws: 'RestError with statusCode 404 and errorCode: ContainerNotFound'
        required_handling: >
          Caller MUST catch RestError and either create container first or return appropriate error. Common mistake is
          not checking container existence.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: invalid-blob-type
        condition: blob exists as different type (e.g., page blob)
        throws: 'RestError with statusCode 409 and errorCode: InvalidBlobType'
        required_handling: |
          Caller MUST catch RestError and handle type conflicts appropriately.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: network-error
        condition: network failure during upload
        throws: Error with code ECONNREFUSED, ETIMEDOUT, or ENOTFOUND
        required_handling: |
          Caller MUST catch errors and implement retry logic for transient failures.
        sources:
          - https://github.com/Azure/azure-sdk-for-js/issues/4999
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: uploadFile
    import_path: '@azure/storage-blob.BlockBlobClient'
    description: Uploads a local file to a block blob (Node.js only)
    postconditions:
      - id: success
        condition: file upload succeeds
        returns: BlobUploadCommonResponse with requestId, version, and ETag
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-uploadfile
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: container-not-found
        condition: container does not exist
        throws: 'RestError with statusCode 404 and errorCode: ContainerNotFound'
        required_handling: |
          Caller MUST catch RestError and create container before uploading.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: network-error
        condition: network failure during multipart upload
        throws: Error with network error code
        required_handling: |
          Caller MUST catch errors and retry failed uploads with exponential backoff.
        sources:
          - https://github.com/Azure/azure-sdk-for-js/issues/4999
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: uploadData
    import_path: '@azure/storage-blob.BlockBlobClient'
    description: Uploads a Buffer or Blob to a block blob
    postconditions:
      - id: success
        condition: data upload succeeds
        returns: BlobUploadCommonResponse with requestId, version, and ETag
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-uploaddata
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: container-not-found
        condition: container does not exist
        throws: 'RestError with statusCode 404 and errorCode: ContainerNotFound'
        required_handling: |
          Caller MUST catch RestError and handle missing container appropriately.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: network-error
        condition: network failure
        throws: Error with network error code
        required_handling: |
          Caller MUST catch errors and implement retry logic.
        sources:
          - https://github.com/Azure/azure-sdk-for-js/issues/4999
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: create
    import_path: '@azure/storage-blob.ContainerClient'
    description: Creates a new container in the storage account
    postconditions:
      - id: success
        condition: container creation succeeds
        returns: ContainerCreateResponse with requestId and ETag
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-create
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: container-already-exists
        condition: container with same name already exists
        throws: 'RestError with statusCode 409 and errorCode: ContainerAlreadyExists'
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 409 to handle existing containers. Common pattern
          is to check exists() first or catch and continue.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: container-being-deleted
        condition: container is currently being deleted
        throws: 'RestError with statusCode 409 and errorCode: ContainerBeingDeleted'
        required_handling: |
          Caller MUST catch RestError and wait for deletion to complete before retrying.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: auth-error
        condition: authentication fails or insufficient permissions
        throws: RestError with statusCode 403
        required_handling: |
          Caller MUST catch RestError with statusCode 403 and handle authentication/authorization failures.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: delete
    import_path: '@azure/storage-blob.ContainerClient'
    description: Deletes the container
    postconditions:
      - id: success
        condition: container deletion succeeds
        returns: ContainerDeleteResponse with requestId
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-delete
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: container-not-found
        condition: container does not exist
        throws: 'RestError with statusCode 404 and errorCode: ContainerNotFound'
        required_handling: >
          Caller MUST catch RestError and handle missing containers. Common pattern is to check exists() first or catch
          404 and treat as success.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: lease-id-missing
        condition: container has active lease but lease ID not provided
        throws: 'RestError with statusCode 412 and errorCode: LeaseIdMissing'
        required_handling: |
          Caller MUST catch RestError with statusCode 412 and handle lease conflicts.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: exists
    import_path: '@azure/storage-blob.ContainerClient'
    description: Checks whether the container exists
    postconditions:
      - id: success
        condition: check completes successfully
        returns: boolean indicating whether container exists
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-exists
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: auth-error
        condition: authentication fails
        throws: RestError with statusCode 403
        required_handling: |
          Caller SHOULD catch RestError for permission errors even when checking existence.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: listContainers
    import_path: '@azure/storage-blob.BlobServiceClient'
    description: Lists containers in the storage account
    postconditions:
      - id: success
        condition: listing succeeds
        returns: AsyncIterableIterator of ContainerItem objects
        sources:
          - >-
            https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobserviceclient#@azure-storage-blob-blobserviceclient-listcontainers
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: auth-error
        condition: authentication fails
        throws: RestError with statusCode 403
        required_handling: |
          Caller MUST catch RestError when iterating containers to handle auth failures.
        sources:
          - https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
