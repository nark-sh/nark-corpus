package: undici
semver: ">=5.0.0"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-18"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0
category: http-client
description: Official Node.js HTTP/1.1 client implementing the Fetch API standard

detection:
  factory_methods:
    - request
    - fetch
    - stream
    - connect
    - upgrade
  # WebSocket is a constructor (new WebSocket(url)) imported from undici.
  # It requires an onerror handler — connection failures fire the error event, not a throw.
  # EventSource is a constructor (new EventSource(url)) for Server-Sent Events.
  # It requires an onerror handler for connection failure, and the constructor can throw
  # DOMException(SyntaxError) on invalid URLs (detected via throwing_constructors).
  class_names:
    - WebSocket
    - EventSource
  throwing_constructors:
    - EventSource
  required_event_listeners:
    - event: "error"
      required: true
      severity: error
      # WebSocket uses the first error-severity postcondition (websocket-connection-error-not-handled).
      # EventSource also needs an error listener but fires a DIFFERENT postcondition:
      # eventsource-connection-error-not-handled (not the constructor-syntax-error).
      # The per-class postcondition_id below is per-entry in required_event_listeners;
      # since both WebSocket and EventSource share the same entry, we use postcondition_id
      # only for the EventSource case by letting the EventListenerAbsencePlugin pick
      # the postcondition by factoryMethodName. WebSocket's postcondition is looked up
      # from its function contract (first error-severity: websocket-connection-error-not-handled).
      # EventSource needs explicit routing because its first error-severity postcondition is
      # eventsource-constructor-syntax-error (the constructor-throws case), not the
      # missing-listener case. Use a per-class override via postcondition_id on the EventSource
      # function entry; the absence plugin picks it up via metadata.postconditionId.

functions:
  - name: request
    import_path: "undici"
    description: "Makes HTTP request using undici's low-level API"
    postconditions:
      - id: network-error-handling
        condition: "network failure, DNS error, timeout, connection refused"
        throws: "Promise rejection with Error"
        required_handling: "Use try-catch (async/await) or .catch() (promises)"
        sources:
          - "https://www.npmjs.com/package/undici"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: fetch
    import_path: "undici"
    description: "Makes HTTP request using Fetch API (similar to browser fetch)"
    postconditions:
      - id: network-error-handling
        condition: "network failure, DNS error, timeout, connection refused, certificate errors"
        throws: "TypeError with 'fetch failed' message and cause property containing underlying error (UND_ERR_SOCKET, etc.)"
        required_handling: "Use try-catch (async/await) or .catch() (promises)"
        sources:
          - "https://undici.nodejs.org/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        notes: >
          Per Fetch standard, HTTP error status codes (4xx, 5xx) do NOT throw.
          Only network-level failures throw TypeError. Developers must check response.ok
          for HTTP errors AND wrap in try-catch for network errors.
        cve_references:
          - CVE-2026-22036: Unbounded decompression can cause resource exhaustion
          - CVE-2025-47279: Bad certificate data causes DoS
          - CVE-2024-24750: Resource exhaustion on external URLs

  - name: stream
    import_path: "undici"
    description: >
      Faster alternative to request() that avoids buffering the full response body.
      Calls a factory function with a Readable stream for the response body.
      Returns Promise<StreamData> on success.
    postconditions:
      # Evidence: https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md
      # Error types confirmed from types/errors.d.ts: UndiciError subclasses
      # stream() rejects with the same network errors as request() plus factory errors
      - id: stream-network-error
        condition: "network failure, DNS error, timeout (UND_ERR_CONNECT_TIMEOUT, UND_ERR_HEADERS_TIMEOUT, UND_ERR_BODY_TIMEOUT, UND_ERR_SOCKET) before or during streaming"
        throws: "ConnectTimeoutError (UND_ERR_CONNECT_TIMEOUT), HeadersTimeoutError (UND_ERR_HEADERS_TIMEOUT), BodyTimeoutError (UND_ERR_BODY_TIMEOUT), SocketError (UND_ERR_SOCKET)"
        required_handling: "Wrap await stream() call in try-catch; check error.code for specific timeout vs socket failure"
        sources:
          - "https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md"
          - "https://undici.nodejs.org/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          stream() rejects with typed UndiciError subclasses on network failure.
          Unlike request(), stream() begins writing to the factory stream before the
          full body arrives, so body-phase errors (UND_ERR_BODY_TIMEOUT,
          UND_ERR_SOCKET mid-stream) can be masked if the await is not wrapped in
          try-catch. This is particularly dangerous in file upload/download pipelines
          where partial writes may leave corrupted data on disk.
        evidence_quality: confirmed

      - id: stream-factory-invalid-return
        condition: "factory function returns non-Writable value"
        throws: "InvalidReturnValueError (UND_ERR_INVALID_RETURN_VALUE)"
        required_handling: "Wrap await stream() in try-catch; factory must return a stream.Writable"
        sources:
          - "https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          If the factory function passed to stream() returns something other than a
          Writable stream, undici throws InvalidReturnValueError (UND_ERR_INVALID_RETURN_VALUE).
          This is a programmer error but occurs at runtime in production if factory
          functions are dynamically constructed (e.g., conditional file writes).
        evidence_quality: confirmed

  - name: connect
    import_path: "undici"
    description: >
      Initiates an HTTP CONNECT tunnel (used for HTTPS proxying, SSH over HTTP, etc.).
      Returns Promise<ConnectData> with the raw duplex socket for the tunnel.
    postconditions:
      # Evidence: https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md
      # connect() creates a raw TCP tunnel; all standard network errors apply plus proxy errors
      - id: connect-network-error
        condition: "connection refused, timeout, or proxy authentication failure"
        throws: "ConnectTimeoutError (UND_ERR_CONNECT_TIMEOUT), SocketError (UND_ERR_SOCKET), SecureProxyConnectionError (UND_ERR_PRX_TLS)"
        required_handling: "Wrap await connect() in try-catch; check error.code for UND_ERR_CONNECT_TIMEOUT vs UND_ERR_PRX_TLS"
        sources:
          - "https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md"
          - "https://undici.nodejs.org/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          connect() is used to establish raw TCP tunnels through HTTP proxies. It
          rejects with ConnectTimeoutError if the proxy doesn't respond within the
          timeout, SocketError for network-level failures, or SecureProxyConnectionError
          (UND_ERR_PRX_TLS) when TLS negotiation with the proxy fails. Applications
          using connect() for proxy tunneling must handle all three to avoid crashes
          when proxy infrastructure is unreachable or misconfigured.
        evidence_quality: confirmed

  - name: upgrade
    import_path: "undici"
    description: >
      Upgrades an HTTP connection to a different protocol (e.g., WebSocket via
      HTTP Upgrade header). Returns Promise<UpgradeData> with the raw socket.
    postconditions:
      # Evidence: https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md
      # upgrade() is used for WebSocket and other protocol upgrades — network errors plus socket errors
      - id: upgrade-network-error
        condition: "network failure or server rejects upgrade request"
        throws: "ConnectTimeoutError (UND_ERR_CONNECT_TIMEOUT), SocketError (UND_ERR_SOCKET), HeadersTimeoutError (UND_ERR_HEADERS_TIMEOUT)"
        required_handling: "Wrap await upgrade() in try-catch"
        sources:
          - "https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md"
          - "https://undici.nodejs.org/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          upgrade() is commonly used to establish WebSocket connections via undici's
          low-level HTTP Upgrade mechanism. It rejects if the connection times out,
          the server rejects the upgrade request, or network errors occur before
          the upgrade completes. This is particularly impactful in real-time
          applications where WebSocket connections are established at user login
          time — unhandled rejections crash the Node.js process.
        evidence_quality: confirmed

  - name: json
    import_path: "undici"
    namespace: "response.body"
    description: >
      Parses the response body as JSON. Called as response.json() on a Response
      object (fetch API) or on BodyMixin. Returns Promise<unknown>.
    postconditions:
      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/json
      # fetch() does NOT throw on 4xx/5xx — response.ok must be checked separately.
      # response.json() throws SyntaxError if body is not valid JSON.
      - id: response-json-parse-error
        condition: "server returns non-JSON body (HTML error page, empty body, binary content)"
        throws: "SyntaxError: Unexpected token in JSON"
        required_handling: "Wrap await response.json() in try-catch; always check response.ok before calling .json()"
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/json"
          - "https://undici.nodejs.org/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          This is one of the most common bugs with undici's fetch API. fetch() does
          NOT throw on HTTP 4xx/5xx — it resolves with a Response where response.ok
          is false. If the developer calls response.json() on an error response (e.g.,
          a 404 HTML error page or a 500 with plain text), JSON.parse throws SyntaxError.
          This means two layers of error handling are required: try-catch for network
          errors (on fetch()) AND response.ok check + try-catch for JSON parsing errors
          (on response.json()). Missing either layer causes unhandled rejections.
        evidence_quality: confirmed

      - id: response-ok-not-checked
        condition: "response.json() called without checking response.ok first"
        throws: "SyntaxError when server returns error page instead of JSON"
        required_handling: "Always check response.ok or response.status before calling response.json()"
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/ok"
          - "https://undici.nodejs.org/"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        description: >
          Per the Fetch API standard (implemented by undici), HTTP 4xx and 5xx
          responses do NOT cause fetch() to reject. Instead response.ok is false
          and response.status contains the HTTP error code. Calling response.json()
          on a non-OK response that returns an HTML error page or plain text body
          throws SyntaxError. The correct pattern is: check response.ok (or
          response.status) first, throw a descriptive error if not OK, then call
          response.json() only on success responses.
        evidence_quality: confirmed

  - name: text
    import_path: "undici"
    namespace: "response.body"
    description: >
      Reads the response body and returns it as a UTF-8 string. Called as
      response.text() on a Response object (Fetch API). Returns Promise<string>.
      Commonly used after fetch() to read HTML, plain text, or error responses.
    postconditions:
      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/text
      # Error types confirmed from undici source: lib/web/fetch/body.js
      # body.js line 430: Promise.reject(new TypeError('Body is unusable: Body has already been read'))
      # NOTE: response-text-no-try-catch is listed first because the scanner fires the first
      # error-severity postcondition, and the missing-try-catch case is far more common and
      # statically detectable than double-read.
      - id: response-text-no-try-catch
        condition: >
          response.text() called in async context without try-catch wrapping the await.
          Network failure during body streaming (UND_ERR_SOCKET, UND_ERR_BODY_TIMEOUT)
          after headers arrive causes the body promise to reject.
        throws: >
          BodyTimeoutError (UND_ERR_BODY_TIMEOUT) if body download exceeds bodyTimeout.
          SocketError (UND_ERR_SOCKET) if TCP connection drops mid-body.
          RequestAbortedError (UND_ERR_ABORTED) if AbortSignal fires during body read.
        required_handling: >
          Wrap await response.text() in try-catch. Network can fail AFTER headers
          are received — a successful fetch() does not guarantee the body will arrive
          intact. Critical in streaming scenarios or large response bodies.
        sources:
          - "https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md"
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/text#exceptions"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          HTTP responses are received in two phases: headers and body. fetch() resolves
          when headers arrive (status 200). The body arrives separately and can fail
          independently. Developers who wrap only fetch() in try-catch but not
          response.text() will have unhandled rejections from body timeout or socket
          errors. This is especially common in high-latency APIs or large file downloads.
        evidence_quality: confirmed

      - id: response-text-body-already-read
        condition: >
          response.text() called after the body has already been consumed by a previous
          call to .text(), .json(), .arrayBuffer(), .blob(), .bytes(), or .body.getReader().
        throws: >
          TypeError: 'Body is unusable: Body has already been read'
          (confirmed from undici/lib/web/fetch/body.js source)
        required_handling: >
          Caller MUST call response.text() only once per Response object. If the same
          response body needs to be read multiple times, clone the Response before
          consuming: const cloned = response.clone(); await cloned.text().
          Alternatively, store the result in a variable and reuse it.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/text"
          - "https://github.com/nodejs/undici/blob/main/lib/web/fetch/body.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          A common footgun when reading response bodies: once .json() fails and a
          developer retries with .text() on the same response object (to log the
          raw error body), both .text() and .json() reject because the body stream
          is already disturbed. Pattern: logging middleware that reads the body
          for debugging AND the handler that tries to parse the JSON — both calls
          fail. The fix is response.clone() before any consumption or a single
          consumption path.
        evidence_quality: confirmed

  - name: arrayBuffer
    import_path: "undici"
    namespace: "response.body"
    description: >
      Reads the response body and returns it as an ArrayBuffer. Called as
      response.arrayBuffer() on a Response object. Returns Promise<ArrayBuffer>.
      Used for binary data: images, PDFs, audio, or any non-text response.
    postconditions:
      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/arrayBuffer
      # Error types confirmed from undici source: lib/web/fetch/body.js
      # Same consumeBody() code path as text() and blob()
      # NOTE: response-arraybuffer-no-try-catch is listed first because the scanner fires the
      # first error-severity postcondition, and missing-try-catch is more common and detectable.
      - id: response-arraybuffer-no-try-catch
        condition: >
          response.arrayBuffer() called without try-catch. Body streaming errors
          (timeout, socket drop) cause the promise to reject.
        throws: >
          BodyTimeoutError (UND_ERR_BODY_TIMEOUT), SocketError (UND_ERR_SOCKET),
          RequestAbortedError (UND_ERR_ABORTED), ResponseExceededMaxSizeError
          (UND_ERR_RES_EXCEEDED_MAX_SIZE) when Client configured with maxResponseSize.
        required_handling: >
          Wrap await response.arrayBuffer() in try-catch. Large binary downloads are
          especially vulnerable to BodyTimeoutError. If a maxResponseSize limit is
          configured on the Client, ResponseExceededMaxSizeError will be thrown for
          files that exceed the limit.
        sources:
          - "https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md"
          - "https://github.com/nodejs/undici/blob/main/lib/dispatcher/client-h1.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Binary downloads are more likely to hit body-phase errors than text responses:
          larger payloads hit bodyTimeout (default 300s) or ResponseExceededMaxSizeError
          when a Client is configured with maxResponseSize for memory protection. The
          ResponseExceededMaxSizeError is unique to arrayBuffer/blob/bytes usage since
          they buffer the entire body in memory — unlike stream() which avoids buffering.
          Code that downloads files or binary assets must handle this case.
        evidence_quality: confirmed

      - id: response-arraybuffer-body-already-read
        condition: >
          response.arrayBuffer() called after the body has already been consumed by
          a previous call to any body-reading method or .body.getReader().
        throws: >
          TypeError: 'Body is unusable: Body has already been read'
        required_handling: >
          Use response.clone() before consuming the body if multiple reads are needed.
          Store the ArrayBuffer result in a variable rather than calling arrayBuffer() twice.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/arrayBuffer"
          - "https://github.com/nodejs/undici/blob/main/lib/web/fetch/body.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Binary response handling is particularly prone to double-consumption: logging
          middleware reads the body as text for audit logging, then the handler tries to
          parse it as ArrayBuffer. Both fail. File upload proxies that read the body twice
          for validation then forwarding also hit this error. Use clone() when multiple
          consumers of the same response body are needed.
        evidence_quality: confirmed

  - name: WebSocket
    import_path: "undici"
    description: >
      WebSocket client constructor. Creates a WebSocket connection to the given URL.
      The constructor is synchronous and initiates the connection asynchronously.
      Implements the W3C WebSocket API spec (RFC 6455). Available as undici.WebSocket
      or via globalThis after undici.install().
    postconditions:
      # Evidence: https://github.com/nodejs/undici/blob/main/lib/web/websocket/websocket.js
      # WebSocket constructor throws DOMException(SyntaxError) for invalid URLs/protocols synchronously.
      # Connection failures dispatched as 'error' event (NOT thrown from constructor).
      # MDN: https://developer.mozilla.org/en-US/docs/Web/API/WebSocket/WebSocket
      - id: websocket-constructor-syntax-error
        condition: >
          new WebSocket(url) called with an invalid URL format, non-ws/wss scheme,
          or duplicate/invalid subprotocol strings in the protocols array.
        throws: >
          DOMException with name 'SyntaxError'. Thrown synchronously from the constructor,
          not from an event or promise. Occurs immediately when new WebSocket() is called.
        required_handling: >
          Wrap new WebSocket(url) in try-catch if the URL comes from user input or
          configuration. Static URLs (hardcoded ws://...) are safe to skip try-catch.
          Dynamic URLs from config files or env vars should be validated or wrapped.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/WebSocket/WebSocket#exceptions"
          - "https://github.com/nodejs/undici/blob/main/lib/web/websocket/websocket.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          The WebSocket constructor validates the URL synchronously before initiating
          any network connection. If WEBSOCKET_URL env var is misconfigured (e.g. uses
          http:// instead of ws://, or contains whitespace), the constructor throws
          immediately. In server startup code this crash is visible; in middleware or
          per-request WebSocket creation it causes unhandled exceptions. Env var
          misconfiguration is the most common cause.
        evidence_quality: confirmed

      - id: websocket-connection-error-not-handled
        condition: >
          WebSocket connection failure (server unreachable, TLS handshake failure, server
          rejected upgrade) occurs but no 'onerror' or 'error' event handler is registered.
          Connection errors are dispatched via the error event, NOT thrown from the constructor.
        throws: >
          Does NOT throw. Instead dispatches an ErrorEvent to the 'error' event listener.
          If no error listener is registered, the error is silently swallowed in browsers
          but in Node.js the uncaught error causes process crash (UnhandledErrorEvent).
          After the error event, the 'close' event fires with code 1006 (abnormal closure).
        required_handling: >
          Always register ws.onerror or ws.addEventListener('error', handler) before
          the connection attempt. A missing error handler means connection failures are
          invisible. Example:
            const ws = new WebSocket('wss://api.example.com/ws');
            ws.onerror = (event) => {
              logger.error('WebSocket connection failed', event);
            };
            ws.onclose = (event) => {
              if (!event.wasClean) reconnect();
            };
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/WebSocket#events"
          - "https://github.com/nodejs/undici/blob/main/lib/web/websocket/websocket.js"
          - "https://www.rfc-editor.org/rfc/rfc6455"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Unlike request() and fetch() which reject promises on failure, WebSocket
          connection errors follow the DOM event model. A server that drops the connection,
          rejects the TLS handshake, or returns non-101 status causes the error event to fire.
          In Node.js with undici's WebSocket, missing error handlers can crash the process
          via unhandled error events. Real-time features (chat, live updates, collaborative
          editing) that use WebSocket typically have long-lived connections — a missing
          reconnect + error handler means permanent loss of real-time functionality after
          any network blip.
        evidence_quality: confirmed

  - name: close
    import_path: "undici"
    namespace: "Dispatcher"
    description: >
      Gracefully closes the dispatcher (Client, Pool, or Agent). Waits for all
      in-flight requests to complete before resolving. Called on Client, Pool,
      or Agent instances created with new undici.Client() / new undici.Pool().
      Returns Promise<void>.
    postconditions:
      # Evidence: undici/lib/dispatcher/dispatcher-base.js source
      # close() rejects with ClientDestroyedError if destroy() was called first.
      # Confirmed from source: line 53-55 dispatcher-base.js
      - id: dispatcher-close-already-destroyed
        condition: >
          client.close() / pool.close() called AFTER client.destroy() has already
          been called. The close() promise will reject with ClientDestroyedError.
        throws: >
          ClientDestroyedError (UND_ERR_DESTROYED): 'The client is destroyed'
          Confirmed from undici/lib/dispatcher/dispatcher-base.js source.
        required_handling: >
          Track dispatcher lifecycle state. In graceful shutdown handlers, do not
          call close() if destroy() may have been called on error paths. Use the
          destroyed property to check: if (!client.destroyed) await client.close().
          In finally blocks that attempt cleanup: wrap close() in try-catch.
        sources:
          - "https://github.com/nodejs/undici/blob/main/lib/dispatcher/dispatcher-base.js"
          - "https://undici.nodejs.org/#/docs/api/Dispatcher"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          In server shutdown sequences, both error recovery code paths (which call
          destroy()) and normal shutdown code paths (which call close()) may run.
          If destroy() fires on error first and then the normal shutdown also calls
          close(), the close() call rejects with ClientDestroyedError. This crashes
          graceful shutdown handlers that don't handle the rejection. Check
          client.destroyed before calling close() in shutdown code.
        evidence_quality: confirmed

  - name: blob
    import_path: "undici"
    namespace: "response.body"
    description: >
      Reads the response body and returns it as a Blob. Called as response.blob()
      on a Response object (Fetch API) or BodyMixin. Returns Promise<Blob>.
      Used for binary data destined for file APIs, image manipulation, or browser
      compatibility code paths.
    postconditions:
      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/blob
      # Error types confirmed from undici source: lib/web/fetch/body.js
      # blob() shares the same consumeBody() code path as text/arrayBuffer/bytes/formData.
      # All body-consumer methods reject with 'Body is unusable' TypeError on double-read.
      # NOTE: response-blob-no-try-catch is listed first because the scanner fires the
      # first error-severity postcondition; missing-try-catch is more common and detectable.
      - id: response-blob-no-try-catch
        condition: >
          response.blob() called without try-catch. Body streaming errors (timeout,
          socket drop, exceeded max response size) cause the promise to reject.
        throws: >
          BodyTimeoutError (UND_ERR_BODY_TIMEOUT) if body download exceeds bodyTimeout.
          SocketError (UND_ERR_SOCKET) if TCP connection drops mid-body.
          RequestAbortedError (UND_ERR_ABORTED) if AbortSignal fires during body read.
          ResponseExceededMaxSizeError (UND_ERR_RES_EXCEEDED_MAX_SIZE) when Client is
          configured with maxResponseSize limit.
        required_handling: >
          Wrap await response.blob() in try-catch. Like arrayBuffer(), blob() buffers
          the entire body in memory, so large downloads can hit ResponseExceededMaxSizeError
          when maxResponseSize is configured on the Client. Binary downloads have a higher
          rate of bodyTimeout failures than text responses.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/blob"
          - "https://github.com/nodejs/undici/blob/main/lib/web/fetch/body.js"
          - "https://github.com/nodejs/undici/blob/main/docs/docs/api/Errors.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          response.blob() is commonly used in file upload proxies, browser-compatibility
          code paths, and image-fetching pipelines. Like arrayBuffer/bytes, it buffers the
          entire response body in memory. Body-phase errors (timeouts, socket drops) after
          headers arrive cause the promise to reject — and if the await is not wrapped in
          try-catch, the rejection becomes an unhandled error that crashes the Node.js
          process under default behavior.
        evidence_quality: confirmed

      - id: response-blob-body-already-read
        condition: >
          response.blob() called after the body has already been consumed by any prior
          call to .text(), .json(), .arrayBuffer(), .bytes(), .formData(), .blob(),
          or .body.getReader().
        throws: >
          TypeError: 'Body is unusable: Body has already been read'
          (confirmed from undici/lib/web/fetch/body.js line 467)
        required_handling: >
          Use response.clone() before consuming the body if multiple reads are needed.
          Store the Blob result in a variable rather than calling blob() twice.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/blob"
          - "https://github.com/nodejs/undici/blob/main/lib/web/fetch/body.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Double-consumption of response bodies is a frequent foot-gun when logging
          middleware reads the body for audit purposes and the handler then tries to
          process it. blob() shares the same disturbed-stream guard as text/json/
          arrayBuffer — once any consumer has touched the body, all subsequent reads
          reject with the same TypeError. Always clone() before the first read if a
          second read may be needed.
        evidence_quality: confirmed

  - name: bytes
    import_path: "undici"
    namespace: "response.body"
    description: >
      Reads the response body and returns it as a Uint8Array. Called as response.bytes()
      on a Response object (Fetch API). Returns Promise<Uint8Array>. Modern, ergonomic
      alternative to arrayBuffer() that avoids the .buffer/Uint8Array wrap step. Added
      to the Fetch spec in 2024 and shipped in undici 6.x+.
    postconditions:
      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/bytes
      # Error types confirmed from undici source: lib/web/fetch/body.js line 388-394
      # bytes() shares the same consumeBody() code path as text/arrayBuffer/blob/formData.
      - id: response-bytes-no-try-catch
        condition: >
          response.bytes() called without try-catch. Body-streaming errors (timeout,
          socket drop, exceeded max response size) cause the promise to reject.
        throws: >
          BodyTimeoutError (UND_ERR_BODY_TIMEOUT), SocketError (UND_ERR_SOCKET),
          RequestAbortedError (UND_ERR_ABORTED), ResponseExceededMaxSizeError
          (UND_ERR_RES_EXCEEDED_MAX_SIZE).
        required_handling: >
          Wrap await response.bytes() in try-catch. Behavior matches arrayBuffer() —
          large binary payloads can hit bodyTimeout (default 300s) or ResponseExceededMaxSizeError
          when a Client is configured with maxResponseSize. Unhandled rejections crash
          the Node.js process under default settings.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/bytes"
          - "https://github.com/nodejs/undici/blob/main/lib/web/fetch/body.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          response.bytes() is the modern preferred way to read binary response bodies —
          it avoids the .buffer property dance required with arrayBuffer(). Codebases
          migrating from arrayBuffer() to bytes() can drop the try-catch wrapper if the
          original was tied to the .buffer access; the network-phase errors are unchanged
          and still require a try-catch around the await.
        evidence_quality: confirmed

      - id: response-bytes-body-already-read
        condition: >
          response.bytes() called after the body has already been consumed by a previous
          call to any body-reading method or .body.getReader().
        throws: >
          TypeError: 'Body is unusable: Body has already been read'
        required_handling: >
          Use response.clone() before consuming the body if multiple reads are needed.
          Store the Uint8Array result in a variable rather than calling bytes() twice.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/bytes"
          - "https://github.com/nodejs/undici/blob/main/lib/web/fetch/body.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          bytes() shares the same disturbed-stream guard as other body consumers. The
          double-consumption foot-gun is identical to text/arrayBuffer/blob: any prior
          read of the body marks the underlying ReadableStream as disturbed, and bytes()
          rejects with 'Body is unusable' TypeError. clone() before the first read is
          the canonical fix.
        evidence_quality: confirmed

  - name: formData
    import_path: "undici"
    namespace: "response.body"
    description: >
      Reads the response body and parses it as multipart/form-data or
      application/x-www-form-urlencoded. Returns Promise<FormData>. Used in form
      submission proxies, file upload handling, and webhook payload parsing.
      The spec recommends a streaming parser (e.g. @fastify/busboy) for untrusted
      servers — formData() buffers the entire body in memory.
    postconditions:
      # Evidence: https://developer.mozilla.org/en-US/docs/Web/API/Response/formData
      # Error types confirmed from undici/lib/web/fetch/body.js lines 340-385
      # formData() can throw THREE distinct TypeErrors:
      # 1. consume errors (shared with text/arrayBuffer/blob/bytes)
      # 2. multipart parsing failure (formData-specific)
      # 3. Unsupported Content-Type (formData-specific, line 380-384)
      - id: response-formdata-no-try-catch
        condition: >
          response.formData() called without try-catch. Body-streaming errors AND
          multipart parsing errors AND unsupported Content-Type all cause rejection.
        throws: >
          BodyTimeoutError (UND_ERR_BODY_TIMEOUT), SocketError (UND_ERR_SOCKET),
          RequestAbortedError (UND_ERR_ABORTED).
          TypeError 'Content-Type was not one of "multipart/form-data" or
          "application/x-www-form-urlencoded"' if the server returned a body with
          a non-form Content-Type (e.g. application/json error responses).
          TypeError from multipart parser if multipart boundaries are malformed.
        required_handling: >
          Wrap await response.formData() in try-catch. formData() has the highest
          probability of throwing among body-consumer methods because it can fail
          for THREE distinct reasons: network errors, multipart-parse errors, and
          unsupported Content-Type. Always check response.ok first — error responses
          rarely return form-encoded bodies, so .formData() on an HTTP 500 with a
          JSON error body will throw the Content-Type TypeError.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/formData"
          - "https://github.com/nodejs/undici/blob/main/lib/web/fetch/body.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          formData() is the spec's lowest-confidence body method — it requires the
          server to return either multipart/form-data or application/x-www-form-urlencoded.
          Any other Content-Type throws TypeError. Webhook handlers and form-submission
          proxies that call .formData() without first checking Content-Type will crash
          when upstream services return JSON errors. Wrap in try-catch AND validate
          response.headers.get('content-type') before calling.
        evidence_quality: confirmed

      - id: response-formdata-unsupported-content-type
        condition: >
          response.formData() called on a response whose Content-Type is not
          multipart/form-data or application/x-www-form-urlencoded (e.g. an HTTP 500
          response with application/json or text/html body).
        throws: >
          TypeError: 'Content-Type was not one of "multipart/form-data" or
          "application/x-www-form-urlencoded".'
          Confirmed from undici/lib/web/fetch/body.js line 380-384.
        required_handling: >
          Check response.headers.get('content-type') before calling .formData(),
          OR always wrap the await in try-catch and treat the TypeError as a
          parsing failure (not a network failure). Webhook proxies should validate
          Content-Type explicitly to distinguish bad-payload from network-error.
        sources:
          - "https://github.com/nodejs/undici/blob/main/lib/web/fetch/body.js"
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/formData"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low
        description: >
          Unlike text() and json(), formData() is strict about Content-Type. A common
          bug: a form-submission proxy expects multipart upstream but the upstream
          returns a JSON error body on 4xx/5xx. .formData() throws TypeError that
          looks like a parsing bug rather than the actual HTTP-level upstream failure.
          The fix is to check response.ok first and inspect Content-Type before parsing.
        evidence_quality: confirmed

  - name: pipeline
    import_path: "undici"
    description: >
      Streams an HTTP request through a node:stream pipeline. Unlike request/stream
      which return Promise, pipeline() returns a Duplex stream synchronously and
      emits errors via the 'error' event. Used for proxying request bodies through
      transforms (compression, encryption, line parsing) without fully buffering.
    postconditions:
      # Evidence: undici/lib/api/api-pipeline.js source
      # pipeline() returns a Duplex — error events fire on the duplex stream.
      # Confirmed from source: line 198 'this.res.on('error', noop)' and line 214 '.on('error', ...)'
      # The Duplex stream is destroyed with an error on network failure, abort, or factory error.
      - id: pipeline-missing-error-listener
        condition: >
          undici.pipeline() return value used without registering an 'error' event
          listener on the returned Duplex. Network failures (UND_ERR_SOCKET,
          UND_ERR_CONNECT_TIMEOUT, UND_ERR_BODY_TIMEOUT) are dispatched as 'error'
          events on the Duplex — they do NOT throw synchronously and do NOT reject
          a Promise.
        throws: >
          Does NOT throw synchronously. Error is emitted as 'error' event on the
          returned Duplex stream. If no 'error' listener is registered, Node.js
          treats it as an uncaught exception and crashes the process under default
          configuration.
        required_handling: >
          Always register an 'error' listener on the Duplex returned by pipeline(),
          OR pass the Duplex to stream.pipeline() / pipeline.promisify() which
          handles the error path. Direct usage:
            const duplex = undici.pipeline(url, opts, handler);
            duplex.on('error', (err) => { logger.error(err); });
          Or via stream/promises:
            await pipeline(source, undici.pipeline(url, opts, handler), dest);
        sources:
          - "https://github.com/nodejs/undici/blob/main/lib/api/api-pipeline.js"
          - "https://undici.nodejs.org/#/docs/api/Dispatcher.md?id=dispatcherpipelineoptions-handler"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          pipeline() is the streaming variant of request/stream and is commonly used
          in proxy servers that pipe request/response bodies through transforms. Unlike
          request() and stream() which return Promises and reject on network failure,
          pipeline() returns a Duplex stream synchronously and emits 'error' events.
          Code that wraps pipeline() in try-catch will NOT catch network failures
          because the error fires later as an event. Missing 'error' listeners crash
          the Node.js process under default configuration, making this a high-severity
          gotcha specifically tied to the streaming API surface.
        evidence_quality: confirmed

  - name: destroy
    import_path: "undici"
    namespace: "Dispatcher"
    description: >
      Abruptly destroys the dispatcher (Client, Pool, or Agent). All pending and
      running requests are asynchronously aborted with the given error. Waits until
      the underlying socket is closed before resolving. Returns Promise<void> when
      called without a callback. Used in emergency shutdown paths.
    postconditions:
      # Evidence: undici/lib/dispatcher/dispatcher-base.js lines 102-149
      # destroy() validates the callback type SYNCHRONOUSLY and throws InvalidArgumentError
      # if a non-function callback is passed. The Promise variant (no callback) is safe.
      # Re-destroying an already-destroyed dispatcher is idempotent (line 113-119).
      - id: dispatcher-destroy-no-try-catch
        condition: >
          dispatcher.destroy() called in async context without try-catch wrapping
          the await. Pending request callbacks reject with the destroy error,
          and the destroy() promise itself may reject if invalid arguments are
          passed.
        throws: >
          InvalidArgumentError (UND_ERR_INVALID_ARG) if a non-function callback is
          passed synchronously. The returned Promise resolves successfully in normal
          shutdown, but rejection-handling is required when destroy() is called
          inside finally blocks where errors may already be in flight.
        required_handling: >
          In emergency shutdown paths (process SIGTERM, error recovery), wrap
          await dispatcher.destroy() in try-catch. Destroying a Pool/Agent during
          active request handling can cause request callbacks to fire with the
          destroy error — those handlers must also be try-catched. Pattern:
            try { await client.destroy(new Error('shutdown')); } catch (e) { logger.warn('destroy failed', e); }
        sources:
          - "https://github.com/nodejs/undici/blob/main/lib/dispatcher/dispatcher-base.js"
          - "https://undici.nodejs.org/#/docs/api/Dispatcher.md?id=dispatcherdestroyerror-callback"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          destroy() is the emergency-shutdown counterpart to close(). It aborts in-flight
          requests with a synthesized ClientDestroyedError and waits for socket cleanup.
          In SIGTERM handlers or error-recovery code, destroy() is often called inside a
          finally block where another error is already in flight — failing to handle the
          destroy rejection masks the original error and crashes the process under
          unhandled-rejection settings.
        evidence_quality: confirmed

  - name: EventSource
    import_path: "undici"
    description: >
      W3C EventSource (Server-Sent Events) constructor. Creates an EventSource that
      streams events from the given URL using the SSE protocol. The constructor is
      synchronous and initiates the HTTP connection asynchronously. Implements the
      WHATWG EventSource spec. Available as undici.EventSource or globally after
      undici.install().
    postconditions:
      # Evidence: undici/lib/web/eventsource/eventsource.js
      # Constructor throws DOMException(SyntaxError) on invalid URLs (line 143-144).
      # Connection failures dispatched as 'error' event (lines 243, 264, 299, 326).
      # MDN: https://developer.mozilla.org/en-US/docs/Web/API/EventSource
      - id: eventsource-constructor-syntax-error
        condition: >
          new EventSource(url) called with an invalid URL format that fails URL
          parsing per the WHATWG URL spec.
        throws: >
          DOMException with name 'SyntaxError'. Thrown synchronously from the
          constructor. Confirmed from undici/lib/web/eventsource/eventsource.js
          line 143-144.
        required_handling: >
          Wrap new EventSource(url) in try-catch if the URL comes from user input,
          query strings, env vars, or configuration. Hardcoded URLs are safe to
          skip the try-catch. Dynamic URLs (e.g. SSE endpoint built from request
          params) must be validated or wrapped.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/EventSource/EventSource"
          - "https://github.com/nodejs/undici/blob/main/lib/web/eventsource/eventsource.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          EventSource constructor validates the URL synchronously. Misconfigured SSE
          endpoint URLs (e.g. env vars missing the scheme, whitespace from template
          rendering) throw DOMException SyntaxError immediately. In server startup
          the crash is visible; in per-connection or per-user EventSource creation
          it causes unhandled exceptions in request handlers.
        evidence_quality: confirmed

      - id: eventsource-connection-error-not-handled
        condition: >
          EventSource connection failure (server unreachable, TLS handshake failure,
          non-2xx response, malformed SSE stream) occurs but no 'onerror' or 'error'
          event listener is registered. Connection errors are dispatched via the
          error event, NOT thrown from the constructor.
        required_handling: >
          Always register es.onerror or es.addEventListener('error', handler)
          before the connection attempt. Without it, SSE connection failures are
          invisible AND EventSource silently retries forever — a hung SSE consumer
          that never receives data with no log signal. Example:
            const es = new EventSource('https://api.example.com/events');
            es.onerror = (event) => {
              logger.error('SSE connection failed, readyState=' + es.readyState);
              if (es.readyState === EventSource.CLOSED) es.close();
            };
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/EventSource#events"
          - "https://github.com/nodejs/undici/blob/main/lib/web/eventsource/eventsource.js"
          - "https://html.spec.whatwg.org/multipage/server-sent-events.html"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        description: >
          EventSource is uniquely dangerous because it RETRIES INDEFINITELY on
          connection errors per the SSE spec. A missing error listener means SSE
          consumers silently hang in CONNECTING state with no events arriving and
          no log signal that anything is wrong. Real-time features (notification
          streams, live dashboards, AI streaming responses) that use EventSource
          typically have long-lived connections — a missing error handler causes
          permanent loss of real-time functionality with zero observability, much
          worse than the WebSocket equivalent because EventSource auto-retries
          mask the failure entirely.
        evidence_quality: confirmed
