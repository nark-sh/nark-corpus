  # ============================================================================
  # WEBHOOK OPERATIONS
  # ============================================================================

  - name: Webhook.send
    import_path: "discord.js"
    description: "Sends a message via webhook"
    postconditions:
      # Evidence: @discordjs/rest source confirms DiscordAPIError/RateLimitError hierarchy
      # Source: /node_modules/@discordjs/rest/dist/index.d.ts - DiscordAPIError class
      # Reference: https://discord.js.org/docs/packages/discord.js/main/Webhook:Class#send
      - id: discord-webhook-send-no-try-catch
        condition: "Webhook.send() called without try-catch"
        throws: "DiscordAPIError (10015 Unknown Webhook, 50013 Missing Permissions, 50035 Invalid Form Body) or RateLimitError"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Webhook.send() throws DiscordAPIError when the webhook token is invalid or revoked (10015),
          the webhook lacks SEND_MESSAGES permission, or content is invalid (50035 - e.g., empty message,
          embed exceeds 6000 chars). Throws RateLimitError when rate limits exceeded. Webhook tokens
          expire and can be revoked via the Discord dashboard. Bots storing webhook URLs in databases
          without validating them will crash on send.
        detector: "If webhook.send() is awaited without try-catch wrapping"
        required_handling: "MUST wrap await webhook.send() in try-catch block; check error.code for 10015 to handle expired webhooks gracefully"
        sources:
          - "https://discord.js.org/docs/packages/discord.js/main/Webhook:Class#send"
          - "https://discord.com/developers/docs/resources/webhook#execute-webhook"
      - id: discord-webhook-send-rate-limit
        condition: "Webhook.send() called in rapid succession without rate limit handling"
        throws: "RateLimitError with retryAfter property when webhook rate limits exceeded"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        description: >
          Discord webhooks have per-webhook rate limits (typically 30 requests/minute). High-volume
          webhook senders (notification systems, alerts pipelines) will hit RateLimitError. The error
          exposes retryAfter (ms) for retry scheduling. Unhandled RateLimitError crashes the sender.
        detector: "If webhook.send() is called in a loop or batch without catching RateLimitError"
        required_handling: "MUST catch RateLimitError and implement exponential backoff using error.retryAfter"
        sources:
          - "https://discord.com/developers/docs/topics/rate-limits"
          - "https://github.com/discordjs/discord.js/blob/main/packages/rest/src/lib/errors/RateLimitError.ts"

  - name: Webhook.editMessage
    import_path: "discord.js"
    description: "Edits a previously sent webhook message"
    postconditions:
      # Evidence: @discordjs/rest source confirms DiscordAPIError on unknown message
      # Reference: https://discord.js.org/docs/packages/discord.js/main/Webhook:Class#editMessage
      - id: discord-webhook-editmessage-no-try-catch
        condition: "Webhook.editMessage() called without try-catch"
