package: discord.js
semver: ">=14.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: confirmed
coverage_score: 0.9  # 56 contracted functions / 62 async-callable functions in scoped surface (6 omitted as admin/infrastructure/read-only)
description: "A powerful JavaScript library for interacting with the Discord API"

# Detection rules for analyzer integration
detection:
  # How this package is instantiated
  class_names:
    - Client

  # Type declarations
  type_names:
    - Client
    - Message
    - TextChannel
    - BaseChannel
    - ThreadChannel
    - Guild
    - GuildMember
    - CommandInteraction
    - ButtonInteraction
    - SelectMenuInteraction
    - Role
    - RoleManager
    - GuildMemberManager
    - Webhook
    - WebhookClient
    - GuildChannel
    - User
    - GuildBanManager

  # No factory methods for discord.js
  factory_methods: []
  require_instance_tracking: true

  # Patterns to identify discord.js-specific usage in await expressions
  await_patterns:
    - .login(
    - .destroy(
    - .fetchWebhook(
    - .deleteWebhook(
    - .deferReply(
    - .followUp(
    - .editReply(
    - .crosspost(
    - .fetchAuditLogs(
    - .bulkDelete(
    - .startThread(
    - .fetchReference(
    - .fetchOwner(
    - .createInvite(  # Channel/Guild operations
    - .fetchInvite(
    - .createDM(
    - .setNickname(
    - .setArchived(
    - .editMessage(  # Webhook.editMessage
    - .bulkBan(       # GuildMemberManager / GuildBanManager bulk-create
    - .respond(       # AutocompleteInteraction.respond
    - .consume(       # EntitlementManager.consume (monetization)

  # Required event listeners to prevent process crashes
  required_event_listeners:
    - event: "error"
      required: true
      severity: error
    - event: "warn"
      required: true
      severity: warning

functions:
  # ============================================================================
  # CLIENT OPERATIONS
  # ============================================================================

  - name: Client.login
    import_path: "discord.js"
    description: "Authenticates bot with Discord API using token"
    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-discord.js-2026-04-02.json
      # Top affected: skillrecordings/egghead-next (⭐ 1448)
      - id: discord-client-login-no-try-catch
        condition: "Client.login() called without try-catch"
        throws: "Error on invalid/revoked token, network failure, or rate limiting"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: "Client.login() can fail with invalid token or network errors. Unhandled rejections crash the application."
        detector: "If client.login() is awaited without try-catch wrapping"
        required_handling: "MUST wrap await client.login() in try-catch block"
        sources:
          - "https://discord.js.org/docs/packages/discord.js/main/Client:Class#login"
  - name: Client.destroy
    import_path: "discord.js"
    description: "Destroys client connection and cleans up resources"
