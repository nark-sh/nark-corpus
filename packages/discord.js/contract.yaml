          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Webhook.editMessage() throws DiscordAPIError 10008 if the message was deleted between send
          and edit (common in cleanup flows), or 10015 if the webhook token expired. Bots that send
          then edit (e.g., progress updates) will crash if the original message was deleted by moderation.
