coverage_rationale: |
  Pure SVG React icon component library (Ant Design icon set). All exports are
  React components rendering inline <svg> markup (e.g. SmileOutlined, SmileFilled,
  SmileTwoTone) — no async I/O, no thrown errors, no callable async API surface.
  Confirmed via npm registry metadata (latest 6.2.5, peerDeps react/react-dom,
  main ./lib/index.js, no types entry) and the upstream README at
  github.com/ant-design/ant-design-icons which documents the package as
  "Ant Design Icons for React" with component-only usage patterns
  (`import { SmileOutlined } from '@ant-design/icons'`). Corpus prevalence
  confirms breadth (114 runtime-dep repos in corpus.db) but every callsite
  is JSX component rendering — there is nothing for nark to contract.
  Same class as lucide-react, @heroicons/react, react-icons — all skipped-ui.
