coverage_rationale: |
  @ant-design/plots (v2.6.8 at evaluation, "G2Plot Statistical chart",
  https://github.com/ant-design/ant-design-charts) is a React-component
  chart/visualization library — the statistical-plot subpackage of the same
  ant-design-charts monorepo whose sibling @ant-design/charts is already
  gate-skipped under Phase 0a. Same category as recharts and chart.js, both
  of which are also gate-skipped (UI / client-side visualization).

  peerDependencies are react and react-dom only. Runtime dependencies are
  @antv/event-emitter, @antv/g, @antv/g2, @antv/g2-extension-plot, lodash,
  and @ant-design/charts-util — all in-process visualization/rendering libs,
  no network calls, no external service integrations, no async error
  contracts to enforce. Usage is declarative JSX (`<Line {...config} />`,
  `<Bar {...config} />`, `<Pie {...config} />`, etc.), with data passed in
  as props by the caller.

  Skipped via Phase 0a UI gate. Stub written per the 2026-06-11 rule so the
  skip is browsable from the corpus tree.
