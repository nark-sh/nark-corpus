coverage_rationale: |
  @ant-design/charts (v2.6.7 at evaluation, "AntV upper level visual component
  library", https://github.com/ant-design/ant-design-charts) is a React-component
  chart/visualization library — same category as recharts and chart.js, both of
  which are already gate-skipped under Phase 0a (UI / client-side visualization).
  Peer dependencies are react and react-dom only; there are no network calls,
  no external service integrations, and no async error contracts to enforce.
  Usage is declarative JSX (`<Line {...config} />`, `<Bar {...config} />`,
  `<Pie {...config} />`), with data passed in as props. Skipped via Phase 0a
  UI gate. Stub written per the 2026-06-11 rule so the skip is browsable from
  the corpus tree.
