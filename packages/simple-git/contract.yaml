# simple-git — lightweight Node.js Git interface
# All async methods (push, pull, clone, fetch, merge, raw, etc.) return Promises that
# throw GitError on non-zero git exit codes, or GitResponseError<T> when a parser is
# available (e.g., merge conflicts throw GitResponseError<MergeSummary> even when
# git exits 0). Without try-catch, unhandled errors crash the async call chain.
package: "simple-git"
semver: ">=3.32.3"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-17"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.81  # 17 contracted / (50 total - 29 intentionally omitted) = 17/21
# Depth pass 2026-04-17 (deepen-stream-2 pass 11):
# API surface: ~50 distinct methods on SimpleGit interface; 21 meaningfully worth contracting
#   (read-only list/query methods like log, branch, status, diff, tags, getRemotes, etc omitted)
# Contracted before: 10 (push, pull, clone, merge, fetch, commit, checkout, rebase, raw, clean)
# Contracted after: 17 (+7 this pass: stash, reset, revert, pushTags, deleteLocalBranch, submoduleAdd, submoduleUpdate)
# Omitted: 29 (add, addConfig, addAnnotatedTag, addTag, addRemote, removeRemote, catFile, binaryCatFile,
#   hashObject, checkIgnore, countObjects, firstCommit, getConfig, grep, cwd, env, exec, listRemote,
#   mirror, mv, remote, revparse, rm, rmKeepLocal, show, showBuffer, stashList, subModule, submoduleInit,
#   updateServerInfo, branch, branchLocal, status, diff, diffSummary, log, tags, tag, getRemotes, listConfig,
#   version, checkIsRepo)
# Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
#   node_modules source: /dist/cjs/index.js — GitResponseError, TaskConfigurationError confirmed
#   deleteBranchTask: throws GitResponseError<BranchSingleDeleteResult> on unmerged branch (line 3880)
#   stash: uses straightThroughStringTask (line 3577) — GitError on pop/apply conflicts
#   reset: resetTask uses straightThroughStringTask (line 1084) — GitError on bad ref/mode conflict
#   revert: uses straightThroughStringTask2 (line 4473) — GitError on conflicts (NOT GitResponseError)

detection:
  factory_methods:
    - simpleGit

functions:
  - name: push
    import_path: "simple-git"
    description: >
      Pushes commits to a remote repository. Used as:
      git.push(remote?, branch?, options?) or this.git.push(options?).
      Returns a Promise that throws GitError on network failure, authentication
      failure, or remote rejection (e.g., non-fast-forward push, permission denied).

    postconditions:
      - id: simple-git-push-missing-try-catch
        condition: >
          async function calls git.push() or this.git.push() without wrapping in
          try-catch. Throws GitError on network failures, SSH/HTTPS authentication
          failures, remote rejection (non-fast-forward), or permission denied.
        throws: >
          GitError — base error class exported from simple-git. Has .message (git stderr
          output), .stack. Remote push errors include: "Permission denied (publickey)",
          "remote rejected", "rejected (fetch first)", "could not read Username",
          "fatal: repository not found".
        required_handling: >
          Caller MUST wrap git.push() in try-catch and handle GitError.

          Minimum handling:
            try {
              await git.push('origin', branch);
            } catch (err) {
              console.error('Git push failed:', err.message);
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: pull
    import_path: "simple-git"
    description: >
      Pulls changes from a remote repository. Used as:
      git.pull(remote?, branch?, options?).
      Returns a Promise that throws GitError on network failure, auth failure,
      or GitResponseError<PullResult> when merge conflicts occur during pull.

    postconditions:
      - id: simple-git-pull-missing-try-catch
        condition: >
          async function calls git.pull() without wrapping in try-catch.
          Throws GitError on network failures or auth failures. Throws
          GitResponseError on merge conflicts during pull.
        throws: >
          GitError — on network/auth failures.
          GitResponseError<PullResult> — on merge conflicts, has .git property
          with conflict details.
        required_handling: >
          Caller MUST wrap git.pull() in try-catch.

          Minimum handling:
            try {
              await git.pull('origin', branch);
            } catch (err) {
              console.error('Git pull failed:', err.message);
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: clone
    import_path: "simple-git"
    description: >
      Clones a remote repository. Used as:
      git.clone(repoPath, localPath?, options?).
      Returns a Promise that throws GitError on network failure, invalid URL,
      auth failure, or destination path errors.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-simple-git-2026-04-03.json
      # Top affected: Vinzent03/obsidian-git (⭐ 10135 stars)
      - id: simple-git-clone-missing-try-catch
        condition: >
          async function calls git.clone() without wrapping in try-catch.
          Throws GitError on network failures, auth failures, invalid repository
          URL, or destination path permission errors.
        throws: >
          GitError — on network/auth/path failures. Common messages:
          "Repository not found", "Permission denied (publickey)",
          "fatal: destination path already exists", "could not read Username".
        required_handling: >
          Caller MUST wrap git.clone() in try-catch.

          Minimum handling:
            try {
              await git.clone(repoUrl, localPath);
            } catch (err) {
              console.error('Git clone failed:', err.message);
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: merge
    import_path: "simple-git"
    description: >
      Merges branches. Used as: git.merge(options?).
      SPECIAL CASE: git exits with code 0 on conflicts but simple-git throws
      GitResponseError<MergeSummary> when conflicts are detected by the parser.
      Without try-catch, merge conflicts become unhandled promise rejections.

    postconditions:
      - id: simple-git-merge-missing-try-catch
        condition: >
          async function calls git.merge() without wrapping in try-catch.
          Throws GitResponseError<MergeSummary> on merge conflicts — EVEN WHEN
          the underlying git process exits with code 0. The .git.conflicts[]
          array contains the conflicting file paths.
        throws: >
          GitResponseError<MergeSummary> — on merge conflicts, has .git.conflicts (string[])
          and .git.failed (boolean). Note: git exits 0 but simple-git still throws.
          GitError — on other merge failures (invalid ref, etc.).
        required_handling: >
          Caller MUST wrap git.merge() in try-catch and handle merge conflicts.

          Minimum handling:
            try {
              await git.merge(['sourceBranch', '--no-edit']);
            } catch (err) {
              if (err.git?.conflicts?.length > 0) {
                console.error('Merge conflicts:', err.git.conflicts);
                await git.merge(['--abort']);
              }
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: fetch
    import_path: "simple-git"
    description: >
      Fetches from a remote repository, updating the local object database with
      remote refs. Used as: git.fetch(remote?, branch?, options?) or git.fetch().
      Makes a network connection to the remote — all network and authentication
      failure modes apply. Commonly used in sync workers, CI pipelines, and
      auto-update workflows.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js — fetch uses straightThroughStringTask / makeFetchHandler
      # Network operation confirmed — fetch makes outbound TCP/SSH connection
      - id: simple-git-fetch-missing-try-catch
        condition: >
          async function calls git.fetch() or git.fetch(remote, branch) without
          wrapping in try-catch. Throws GitError on network failure, SSH/HTTPS
          authentication failure, remote not found, or git binary not installed.
          Common in background sync workers that run fetch periodically.
        throws: >
          GitError — on any failure: network error (ECONNREFUSED, ETIMEDOUT),
          SSH auth failure ("Permission denied (publickey)"), HTTPS auth failure
          ("remote: Repository not found", "could not read Username for ..."),
          remote reference not found ("couldn't find remote ref <branch>"),
          or git not installed ("ENOENT: no such file or directory, git").
        required_handling: >
          Caller MUST wrap git.fetch() in try-catch.

          Minimum handling:
            try {
              await git.fetch('origin', 'main');
            } catch (err) {
              if (err instanceof GitError) {
                console.error('Fetch failed:', err.message);
              }
              throw err;
            }

          For background sync workers, consider retry with exponential backoff on
          network errors, but treat auth errors as non-retryable alerts.
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-fetch"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: commit
    import_path: "simple-git"
    description: >
      Commits staged changes with a message. Used as:
      git.commit(message, files?, options?).
      Can fail when: the working tree is clean (nothing to commit), user identity
      is not configured (user.name / user.email not set), pre-commit hooks fail,
      or the commit message is empty (git rejects it).

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js — commit uses straightThroughStringTask, GitError on non-zero exit
      - id: simple-git-commit-missing-try-catch
        condition: >
          async function calls git.commit() without wrapping in try-catch.
          Common failure in CI/CD automation scripts and git-sync workers:
          if there are no staged changes, git exits non-zero and GitError is thrown.
          Also fails when git identity (user.name, user.email) is not configured
          in the environment — common in Docker containers and CI runners.
        throws: >
          GitError — on any failure:
          "nothing to commit" (exit code 1 when nothing staged),
          "Please tell me who you are" (user.name / user.email not configured),
          "Aborting commit due to empty commit message" (empty message string),
          pre-commit hook failure (non-zero exit from .git/hooks/pre-commit).
        required_handling: >
          Caller MUST wrap git.commit() in try-catch.

          Pattern for idempotent commit workflows:
            try {
              const result = await git.commit('chore: automated update');
              if (result.commit) {
                console.log('Committed:', result.commit);
              }
            } catch (err) {
              if (err instanceof GitError && err.message.includes('nothing to commit')) {
                console.log('Nothing to commit, skipping');
                return; // not a fatal error
              }
              throw err; // rethrow unexpected errors
            }

          Also configure git identity before committing in CI:
            await git.addConfig('user.name', 'Bot');
            await git.addConfig('user.email', 'bot@example.com');
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-commit"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: checkout
    import_path: "simple-git"
    description: >
      Checks out a branch, tag, or revision. Used as:
      git.checkout(what, options?), git.checkoutBranch(name, startPoint),
      git.checkoutLocalBranch(name). Fails on: dirty working tree (local
      modifications would be overwritten), branch not found, ref not found.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js — checkout task at line 2051-2082, uses GitError on non-zero
      - id: simple-git-checkout-missing-try-catch
        condition: >
          async function calls git.checkout(), git.checkoutBranch(), or
          git.checkoutLocalBranch() without wrapping in try-catch.
          Fails when working tree has uncommitted changes that would be overwritten,
          when the ref/branch does not exist, or when there are file permission
          issues in the working directory.
        throws: >
          GitError — on any failure:
          "Your local changes to the following files would be overwritten by checkout" (dirty tree),
          "error: pathspec '...' did not match any file(s) known to git" (ref not found),
          "A branch named '...' already exists" (checkoutLocalBranch / checkoutBranch on existing),
          "fatal: reference is not a tree" (invalid commit hash).
        required_handling: >
          Caller MUST wrap git.checkout() in try-catch.

          Minimum handling:
            try {
              await git.checkout(targetBranch);
            } catch (err) {
              if (err instanceof GitError) {
                if (err.message.includes('would be overwritten')) {
                  // Stash first or abort
                  console.error('Dirty working tree, cannot checkout:', err.message);
                }
              }
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-checkout"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: rebase
    import_path: "simple-git"
    description: >
      Rebases the current branch. Used as: git.rebase(options?).
      DANGEROUS: On conflict or failure, git leaves the repo in "rebasing" state
      with a detached HEAD. Without error handling, subsequent git operations fail
      with "You are in the middle of a rebase" until the rebase is aborted or
      continued. Unlike merge conflicts, rebase conflicts do NOT throw
      GitResponseError — they throw GitError with git exit code 1.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js line 4455 — rebase uses straightThroughStringTask2,
      #   non-zero exit → GitError (NOT GitResponseError like merge)
      - id: simple-git-rebase-missing-try-catch
        condition: >
          async function calls git.rebase() without wrapping in try-catch.
          Rebase conflicts leave the repo in a partially-rebased state (detached HEAD,
          .git/rebase-merge/ directory exists). All subsequent git operations on the
          same instance fail with "fatal: It seems that there is already a rebase-merge
          directory, and I wonder if you are in the middle of another rebase."
          This is the most dangerous uncaught error pattern — it corrupts the working
          repo state for all future operations.
        throws: >
          GitError — on rebase conflict (exit code 1), upstream diverged, or any
          git failure. Unlike git.merge(), rebase does NOT throw GitResponseError<T>
          with a structured conflicts array — the conflict details are only in
          err.message (git stderr output). Common messages:
          "CONFLICT (content): Merge conflict in <file>",
          "error: could not apply <sha>... <message>",
          "Cannot rebase: You have unstaged changes" (dirty tree).
        required_handling: >
          Caller MUST wrap git.rebase() in try-catch AND abort on failure to restore
          the repo to a usable state:

            try {
              await git.rebase(['origin/main']);
            } catch (err) {
              if (err instanceof GitError) {
                console.error('Rebase failed, aborting:', err.message);
                // CRITICAL: abort to restore the repo to pre-rebase state
                try {
                  await git.rebase(['--abort']);
                } catch (abortErr) {
                  console.error('Rebase abort also failed:', abortErr.message);
                }
              }
              throw err;
            }

          Always run rebase on a clean working tree (check git.status() first).
          Never use git.rebase() in automated workflows without abort handling.
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-rebase"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: raw
    import_path: "simple-git"
    description: >
      Executes any arbitrary git command. Used as:
      git.raw(commands, options?) or git.raw('command', 'arg1', ...).
      The raw command runs any git subcommand — errors from the git binary
      are propagated as GitError when git exits with non-zero and printed
      to stderr. Used for advanced operations not covered by the structured API
      (bisect, cherry-pick, worktree, sparse-checkout, etc.).

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js — raw() uses straightThroughStringTask;
      #   "When the git process returns a non-zero signal on exit and it printed something
      #   to stderr, the command will be treated as an error"
      - id: simple-git-raw-missing-try-catch
        condition: >
          async function calls git.raw() without wrapping in try-catch.
          Because raw() runs arbitrary git commands, any git failure propagates.
          Commonly used for cherry-pick (can fail on conflicts), worktree operations
          (can fail on path conflicts), bisect, sparse-checkout, and other advanced
          operations — all of which can fail and need explicit handling.
        throws: >
          GitError — when git exits non-zero and printed to stderr. The .message
          property contains git's stderr output verbatim. Unlike structured methods,
          raw() never throws GitResponseError — always GitError.
          Examples: "CONFLICT" from cherry-pick, "fatal: not a git repository",
          "error: unknown switch `z'" from invalid flags.
        required_handling: >
          Caller MUST wrap git.raw() in try-catch.

          Minimum handling:
            try {
              const result = await git.raw(['cherry-pick', commitHash]);
              console.log('Cherry-pick succeeded:', result);
            } catch (err) {
              if (err instanceof GitError) {
                console.error('Git command failed:', err.message);
                // For cherry-pick, may need: await git.raw(['cherry-pick', '--abort'])
              }
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: clean
    import_path: "simple-git"
    description: >
      Removes untracked files from the working tree. Used as:
      git.clean(CleanOptions.FORCE) or git.clean(CleanOptions.FORCE + CleanOptions.RECURSIVE).
      DESTRUCTIVE: deleted files cannot be recovered without external backup.
      SPECIAL: clean() throws TaskConfigurationError (a subclass of GitError) when
      called without the required FORCE or DRY_RUN mode — this is a pre-execution
      validation, not a git process failure.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js — cleanWithOptionsTask throws TaskConfigurationError
      #   CONFIG_ERROR_MODE_REQUIRED: 'Git clean mode parameter ("n" or "f") is required'
      #   CONFIG_ERROR_INTERACTIVE_MODE: "Git clean interactive mode is not supported"
      #   CONFIG_ERROR_UNKNOWN_OPTION: "Git clean unknown option found in: "
      - id: simple-git-clean-missing-try-catch
        condition: >
          async function calls git.clean() without wrapping in try-catch.
          Most common failure: calling git.clean() without the required FORCE or
          DRY_RUN mode — throws TaskConfigurationError synchronously (before git runs).
          Also fails when git exits non-zero (permission errors, path issues).
        throws: >
          TaskConfigurationError (extends GitError) — thrown immediately (before git runs)
          when the mode is missing or invalid:
          'Git clean mode parameter ("n" or "f") is required',
          'Git clean interactive mode is not supported',
          'Git clean unknown option found in: ...'

          GitError — thrown when the underlying git process fails (permission denied,
          path does not exist, etc.).
        required_handling: >
          Caller MUST wrap git.clean() in try-catch AND always specify mode:

            import { simpleGit, CleanOptions } from 'simple-git';

            try {
              // DRY_RUN first to preview what would be deleted
              const preview = await git.clean(CleanOptions.DRY_RUN + CleanOptions.RECURSIVE);
              console.log('Would delete:', preview);

              // Then FORCE to actually delete
              await git.clean(CleanOptions.FORCE + CleanOptions.RECURSIVE);
            } catch (err) {
              if (err instanceof GitError) {
                console.error('Git clean failed:', err.message);
              }
              throw err;
            }

          WARNING: git.clean() permanently deletes untracked files. Always preview
          with CleanOptions.DRY_RUN before running with CleanOptions.FORCE in
          production automation.
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-clean"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: stash
    import_path: "simple-git"
    description: >
      Stashes working directory changes for later retrieval. Used as:
      git.stash() to save, git.stash(['pop']) to restore, git.stash(['apply']) to restore
      without removing from stash stack, git.stash(['drop']) to discard a stash.
      IMPORTANT: git.stash(['pop']) and git.stash(['apply']) can produce conflicts
      when the stashed changes conflict with the current working tree — these throw GitError
      even when the stash was valid. git.stash() on a clean working tree exits non-zero
      and throws GitError ("No local changes to save").

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js — stash() uses straightThroughStringTask (line 3577-3582)
      #   straightThroughStringTask propagates GitError on any non-zero exit code
      #   git stash pop/apply can produce conflict state — git exits 1, simple-git throws GitError
      - id: simple-git-stash-missing-try-catch
        condition: >
          async function calls git.stash(), git.stash(['pop']), git.stash(['apply']),
          or git.stash(['drop']) without wrapping in try-catch. The most dangerous case:
          git.stash(['pop']) and git.stash(['apply']) can throw GitError when conflicts
          occur between stashed changes and the current branch — leaving partial conflict
          markers in the working tree. git.stash() on a clean tree also throws.
        throws: >
          GitError — on any failure:
          "No local changes to save" (stash on clean tree, exit 1),
          "CONFLICT (content): Merge conflict in <file>" (stash pop/apply conflict, exit 1),
          "error: Your local changes to the following files would be overwritten by merge" (dirty tree during pop),
          "fatal: Ref refs/stash is not a stash reference" (drop/apply on empty stash),
          "ENOENT: no such file or directory, git" (git not installed).
        required_handling: >
          Caller MUST wrap git.stash() in try-catch for all stash subcommands.

          For stash save:
            try {
              await git.stash();
            } catch (err) {
              if (err instanceof GitError && err.message.includes('No local changes to save')) {
                // Nothing to stash — not a fatal error
                return;
              }
              throw err;
            }

          For stash pop (most important — conflict handling):
            try {
              await git.stash(['pop']);
            } catch (err) {
              if (err instanceof GitError && err.message.includes('CONFLICT')) {
                // Stash pop produced conflicts — working tree is dirty
                // Must resolve conflicts manually or run: git checkout -- .
                console.error('Stash pop produced conflicts:', err.message);
              }
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-stash"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: reset
    import_path: "simple-git"
    description: >
      Resets the current HEAD to a specified state. Used as:
      git.reset(ResetMode.HARD) — discards ALL uncommitted changes (DESTRUCTIVE),
      git.reset(ResetMode.SOFT) — moves HEAD but keeps staging + working tree,
      git.reset(ResetMode.MIXED) — moves HEAD and clears staging, keeps working tree,
      git.reset(ResetMode.MERGE) — aborts a failed merge,
      git.reset(ResetMode.KEEP) — resets HEAD but keeps working tree changes.
      CRITICAL: ResetMode.HARD permanently and irrecoverably discards all uncommitted
      changes including staged and unstaged files. This is the most destructive git
      operation and has no undo. Without try-catch, failures leave the repo in an
      inconsistent mid-reset state.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js resetTask() lines 1084-1090:
      #   resetTask uses straightThroughStringTask — throws GitError on non-zero exit
      #   ResetMode enum: mixed | soft | hard | merge | keep (lines 1112-1119)
      - id: simple-git-reset-missing-try-catch
        condition: >
          async function calls git.reset() or git.reset(ResetMode.HARD) without wrapping
          in try-catch. Critical failure modes:
          (1) ResetMode.HARD called programmatically — if anything throws before completion,
          partially-reset files may be deleted with no undo path.
          (2) reset() to a specific commit hash fails when the hash does not exist.
          (3) reset() on a bare repository fails ("fatal: Failed to resolve HEAD").
          (4) ResetMode.MERGE fails if there are unmerged paths.
        throws: >
          GitError — on any non-zero git exit:
          "fatal: Failed to resolve 'HEAD'" (empty/bare repo),
          "fatal: ambiguous argument '<hash>': unknown revision or path" (bad commit reference),
          "fatal: Cannot do a hard reset in the middle of a merge" (merge in progress),
          "error: Entry '<file>' not uptodate. Cannot merge" (ResetMode.MERGE with local changes).
        required_handling: >
          Caller MUST wrap git.reset() in try-catch. For hard reset, always verify
          the reset target is valid before calling:

            import { simpleGit, ResetMode } from 'simple-git';

            try {
              // Soft reset: HEAD~1 to uncommit last commit (keeps changes staged)
              await git.reset(ResetMode.SOFT, ['HEAD~1']);
            } catch (err) {
              if (err instanceof GitError) {
                console.error('Reset failed:', err.message);
              }
              throw err;
            }

          For HARD reset (DESTRUCTIVE — use with extreme caution):
            try {
              await git.reset(ResetMode.HARD);
              // All uncommitted changes are now permanently gone
            } catch (err) {
              // Even HARD reset can fail (e.g., merge in progress)
              throw err;
            }

          NEVER call git.reset(ResetMode.HARD) in automated workflows without:
          (1) explicit user confirmation or (2) backup of important changes.
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-reset"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: revert
    import_path: "simple-git"
    description: >
      Creates new commits that undo previous commits. Used as:
      git.revert(commitHash, options?).
      Unlike git.reset(), revert is non-destructive — it creates a new commit that
      undoes the changes of the target commit, preserving history. However, revert can
      fail with conflicts when the changes being reverted overlap with later changes
      (similar to merge conflicts). When conflicts occur, the repo is left in a
      "reverting" state that blocks subsequent git operations.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js Git2.prototype.revert (lines 4467-4476):
      #   Uses straightThroughStringTask2 — throws GitError on non-zero exit
      #   git revert with conflicts exits 1; simple-git throws GitError (NOT GitResponseError)
      #   Source validation: git revert --no-commit vs --no-edit affect conflict behavior
      - id: simple-git-revert-missing-try-catch
        condition: >
          async function calls git.revert(commitHash) without wrapping in try-catch.
          Revert conflicts — where the changes being undone have since been modified —
          leave the repo in "reverting" state (.git/REVERT_HEAD exists). All subsequent
          git operations on that working directory fail with "error: you need to resolve
          your current index first" until the revert is aborted or completed.
          Also throws when the commit hash is invalid or not found.
        throws: >
          GitError — on conflict or invalid ref:
          "CONFLICT (content): Merge conflict in <file>" (conflict during revert, exit 1),
          "error: could not revert <hash>" (conflict in fast path),
          "error: commit <hash> is a merge but no -m option was given" (reverting a merge commit),
          "fatal: bad object <hash>" (invalid commit hash),
          "error: you need to resolve your current index first" (revert in progress).
        required_handling: >
          Caller MUST wrap git.revert() in try-catch AND abort on conflict to restore
          the working directory to a usable state:

            try {
              await git.revert(commitHash);
            } catch (err) {
              if (err instanceof GitError && err.message.includes('CONFLICT')) {
                console.error('Revert produced conflicts, aborting:', err.message);
                // CRITICAL: abort to clear the reverting state
                try {
                  await git.revert(['--abort']);
                } catch (abortErr) {
                  console.error('Revert abort failed:', abortErr.message);
                }
              }
              throw err;
            }

          To revert a merge commit, supply the parent option:
            await git.revert(commitHash, ['-m', '1']);
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-revert"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: pushTags
    import_path: "simple-git"
    description: >
      Pushes local tags to a remote. Used as: git.pushTags(remote?, options?).
      Equivalent to git.push([remote, '--tags']). Makes a network connection to the
      remote — all push failure modes apply. Commonly used in release automation
      workflows after creating a version tag.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js pushTagsTask() (lines 3072-3076):
      #   pushTagsTask appends '--tags' and delegates to pushTask()
      #   Uses same parsePushResult parser as push() — same error profile
      #   Network call confirmed — pushes to remote via git push --tags --verbose --porcelain
      - id: simple-git-push-tags-missing-try-catch
        condition: >
          async function calls git.pushTags() without wrapping in try-catch.
          pushTags() is equivalent to push(['--tags']) — all push failure modes apply:
          network failures, authentication failures, remote rejection (tag already exists
          with different content), and permission denied.
        throws: >
          GitError — on any non-zero exit:
          "Permission denied (publickey)" (SSH auth failure),
          "could not read Username for 'https://...'" (HTTPS auth prompt unavailable),
          "remote: Repository not found" (invalid remote URL),
          "! [rejected]  v1.0.0 -> v1.0.0 (already exists)" (tag already exists),
          "ECONNREFUSED / ETIMEDOUT" (network failure).
        required_handling: >
          Caller MUST wrap git.pushTags() in try-catch.

          Minimum handling:
            try {
              await git.pushTags('origin');
            } catch (err) {
              if (err instanceof GitError) {
                console.error('Tag push failed:', err.message);
              }
              throw err;
            }

          For release automation, always push tags separately from commits so that
          failure to push tags does not block the commit push.
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-push"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteLocalBranch
    import_path: "simple-git"
    description: >
      Deletes a local branch. Used as: git.deleteLocalBranch(branchName, forceDelete?).
      SPECIAL: When deleting an unmerged branch without force (forceDelete=false),
      git exits with error code 1 and simple-git throws GitResponseError<BranchSingleDeleteResult>
      — the parsed result is attached as .git. With forceDelete=true, the deletion
      succeeds even if the branch has unmerged commits.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      #   Documentation: "treats a failed attempt as an error"
      # Source: dist/cjs/index.js deleteBranchTask() (lines 3869-3885):
      #   onError: throws new GitResponseError(parsedResult, String(error))
      #   hasBranchDeletionError checks: exitCode === 1 && deleteErrorRegex matches stderr
      #   deleteErrorRegex = /^error[^']+'([^']+)'/m — matches "error: The branch '...' is not fully merged"
      - id: simple-git-delete-local-branch-missing-try-catch
        condition: >
          async function calls git.deleteLocalBranch(branchName) without wrapping in
          try-catch. The most common failure: deleting a branch with unmerged commits
          without the forceDelete flag throws GitResponseError<BranchSingleDeleteResult>
          with the parsed failure details. Also throws when the branch does not exist
          or when trying to delete the currently checked-out branch.
        throws: >
          GitResponseError<BranchSingleDeleteResult> — when the branch has unmerged
          commits and forceDelete is false (default). The .git property contains the
          parsed BranchSingleDeleteResult with { branch, hash, success: false }.
          Error message from git: "error: The branch '<name>' is not fully merged.
          If you are sure you want to delete it, run 'git branch -D <name>'."

          GitError — for other failures:
          "error: branch '<name>' not found" (branch does not exist),
          "error: Cannot delete branch '<name>' checked out at '<path>'" (current branch).
        required_handling: >
          Caller MUST wrap git.deleteLocalBranch() in try-catch.

          Pattern for safe branch deletion:
            try {
              const result = await git.deleteLocalBranch(branchName);
              // result.success is always true here (GitResponseError thrown otherwise)
              console.log('Deleted branch:', result.branch);
            } catch (err) {
              if (err instanceof GitResponseError) {
                // Unmerged branch — either force-delete or handle gracefully
                const parsed = err.git; // BranchSingleDeleteResult
                console.warn('Branch not fully merged:', parsed?.branch);
                // Option: force delete
                // await git.deleteLocalBranch(branchName, true);
              } else if (err instanceof GitError) {
                console.error('Branch delete failed:', err.message);
              }
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-branch"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: submoduleAdd
    import_path: "simple-git"
    description: >
      Adds a git submodule. Used as: git.submoduleAdd(repo, path).
      Makes a network connection to clone the submodule repository — all clone
      failure modes apply (network errors, authentication failures, invalid URLs).
      Also writes to .gitmodules which must be staged and committed separately.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js addSubModuleTask() (line 4208):
      #   addSubModuleTask runs: git submodule add <repo> <path>
      #   Uses straightThroughStringTask — throws GitError on non-zero exit
      #   git submodule add makes network connection to clone the submodule repo
      - id: simple-git-submodule-add-missing-try-catch
        condition: >
          async function calls git.submoduleAdd(repo, path) without wrapping in try-catch.
          submoduleAdd clones the submodule repository over the network — all clone
          error modes apply. Also fails when the path already exists, when git cannot
          write .gitmodules, or when the local path conflicts with existing files.
        throws: >
          GitError — on any non-zero exit:
          "fatal: repository '<url>' not found" (invalid remote URL or private repo without auth),
          "Permission denied (publickey)" (SSH auth failure),
          "fatal: '<path>' already exists in the index" (path conflict),
          "fatal: A git repository cannot be used as a subdirectory of itself" (nested git repo),
          "ECONNREFUSED / ETIMEDOUT" (network failure during submodule clone).
        required_handling: >
          Caller MUST wrap git.submoduleAdd() in try-catch.

          Minimum handling:
            try {
              await git.submoduleAdd('https://github.com/user/repo.git', 'vendor/repo');
              // Remember to stage and commit .gitmodules after adding
              await git.add('.gitmodules');
              await git.commit('Add vendor/repo submodule');
            } catch (err) {
              if (err instanceof GitError) {
                console.error('Submodule add failed:', err.message);
              }
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-submodule"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: submoduleUpdate
    import_path: "simple-git"
    description: >
      Updates registered submodules to match the committed state. Used as:
      git.submoduleUpdate(options?). With --init flag, also initializes uninitialized
      submodules. Makes network connections to fetch submodule commits — all fetch
      failure modes apply. Commonly run in CI/CD pipelines after git.clone() or git.pull()
      to populate nested submodule directories.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
      # Source: dist/cjs/index.js updateSubModuleTask() (line 4221):
      #   updateSubModuleTask runs: git submodule update <customArgs>
      #   Uses straightThroughStringTask — throws GitError on non-zero exit
      #   git submodule update makes network connections to fetch submodule commits
      - id: simple-git-submodule-update-missing-try-catch
        condition: >
          async function calls git.submoduleUpdate() or git.submoduleUpdate(['--init'])
          without wrapping in try-catch. submoduleUpdate fetches each registered submodule
          from its remote — all fetch/clone failure modes apply. A single failing submodule
          causes the entire update to fail, leaving other submodules un-updated.
          Common in post-clone CI scripts that do: await git.submoduleUpdate(['--init', '--recursive']).
        throws: >
          GitError — on any non-zero exit:
          "fatal: repository '<url>' not found" (submodule remote no longer exists),
          "Permission denied (publickey)" (SSH auth failure for any submodule remote),
          "fatal: No url found for submodule path '<path>'" (.gitmodules not initialized),
          "ECONNREFUSED / ETIMEDOUT" (network failure during submodule fetch),
          "fatal: Needed a single revision" (corrupt submodule reference in parent repo).
        required_handling: >
          Caller MUST wrap git.submoduleUpdate() in try-catch.

          Minimum handling (common CI pattern):
            try {
              // Initialize + update all submodules recursively
              await git.submoduleUpdate(['--init', '--recursive']);
            } catch (err) {
              if (err instanceof GitError) {
                console.error('Submodule update failed:', err.message);
                // Check: are .gitmodules configured? Is the remote accessible?
              }
              throw err;
            }
        sources:
          - "https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md"
          - "https://git-scm.com/docs/git-submodule"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "All SimpleGit async methods can throw GitError (base) or GitResponseError<T> (with parsed git output)"
  - "GitResponseError extends GitError and adds .git property with parsed content"
  - "TaskConfigurationError extends GitError — thrown before git runs, for bad API usage (e.g. clean without mode)"
  - "merge() is special: throws GitResponseError<MergeSummary> even when git exits 0 if conflicts detected"
  - "rebase() is NOT special like merge() — uses straightThroughStringTask, always throws GitError on conflict"
  - "raw() always throws GitError (never GitResponseError) — no structured parser output"
  - "deleteLocalBranch() throws GitResponseError<BranchSingleDeleteResult> when branch has unmerged commits"
  - "revert() uses straightThroughStringTask — throws GitError on conflict (NOT GitResponseError like merge)"
  - "stash(['pop']) can produce conflicts — throws GitError, leaves conflict markers in working tree"
  - "reset(ResetMode.HARD) is irreversibly destructive — always wrap in try-catch, never call without intent"
  - "CVE-2026-28292 (CVSS 9.8): RCE via case-sensitivity bypass in protocol.allow — affected 3.15.0-3.32.2, fixed in 3.32.3"
  - "simpleGit() factory function is synchronous — errors occur on first async call, not at construction"
  - "Real-world evidence: activepieces/git-sync-handler.ts calls git.push() without try-catch"
  - "clean() requires FORCE or DRY_RUN mode — omitting throws TaskConfigurationError (synchronous, before git runs)"
  - "rebase conflicts leave repo in rebasing state — always call git.rebase(['--abort']) in catch block"
