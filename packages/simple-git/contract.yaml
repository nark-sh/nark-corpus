# Evidence: https://raw.githubusercontent.com/steveukx/git-js/refs/heads/main/simple-git/readme.md
#   node_modules source: /dist/cjs/index.js — verified against simple-git@3.36.0
#   applyPatchTask (line 3671): straightThroughStringTask(['apply', ...customArgs, ...patches])
#   cloneMirrorTask (line 3456): appends '--mirror' then delegates to cloneTask
#   mergeFromTo (line 3550): delegates to mergeTask([remote, branch, ...]) which throws
#     GitResponseError(merge) when parser detects conflicts (line 2976)
#   deleteBranchesTask (line 3854): commands ['branch', '-v', '-d'/'-D', ...branches];
