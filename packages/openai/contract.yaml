  # responses.stream()  (via openai.responses.stream())
  # Evidence source: openai-node SDK source at
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/lib/responses/ResponseStream.ts
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/lib/EventStream.ts
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts
  # Streaming helper for the Responses API. Wraps create() or retrieve() in an
  # event-driven stream. Returns ResponseStream<ParsedT> — callers MUST call
  # stream.finalResponse() or await stream.done() to detect errors.
  # Supports two modes:
  #   (1) New response: stream body params same as responses.create()
  #   (2) Continue existing: { response_id, starting_after?, tools? }
  # ─────────────────────────────────────────────────────────────────────────────
  - name: responses.stream
    import_path: "openai"
    description: >
      Streaming helper for the OpenAI Responses API via openai.responses.stream().
      Returns a ResponseStream<ParsedT> that emits server-sent events. Unlike
      responses.create({ stream: true }), this method returns a helper that tracks
      accumulated state and exposes .finalResponse() to get the completed response.
      Also supports streaming an existing response by response_id for resumable
      agent workflows. Callers MUST await stream.finalResponse() or stream.done()
      to handle errors — the stream itself does not throw synchronously.

    postconditions:
      # Evidence: OpenAIError confirmed in ResponseStream.ts finalResponse():
      #   if (!response) throw new OpenAIError('stream ended without producing a ChatCompletion');
      # Occurs when: network drops mid-stream, server closes connection early,
      # or stream receives invalid event sequence.
      - id: responses-stream-premature-termination-error
        condition: >
          The stream terminates before producing a complete response. Causes: network
          interruption mid-stream, server closing the SSE connection early, or
          invalid event sequence (e.g., first event is not 'response.created').
          This error only surfaces when .finalResponse() or .done() is awaited —
          the stream object itself does not throw at creation time.
        throws: "OpenAIError('stream ended without producing a ChatCompletion')"
        required_handling: >
          Caller MUST await stream.finalResponse() inside a try-catch block.
          If only iterating over stream events via 'for await', the loop may
          complete without error even when the response is incomplete — always
          follow iteration with await stream.finalResponse().
          Implement retry logic for transient network errors: create a new stream
          using response_id to resume from where the stream ended.
          Pattern:
            try {
              const response = await stream.finalResponse();
            } catch (err) {
              if (err instanceof OpenAI.OpenAIError) { /* handle */ }
            }
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/lib/responses/ResponseStream.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/lib/EventStream.ts"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        evidence_quality: confirmed

      # Evidence: APIUserAbortError confirmed in EventStream.ts _handleError():
      #   new APIUserAbortError() emitted on 'abort' event when stream.abort() called
      # Common pattern: server-side timeout that calls stream.abort()
      - id: responses-stream-abort-error
        condition: >
          The stream is aborted by calling stream.abort() — either explicitly by the
          caller (e.g., request timeout, user cancellation) or via the AbortController
          passed to the options parameter. Aborted streams do not produce a final response.
        throws: "APIUserAbortError"
        required_handling: >
          Caller MUST handle APIUserAbortError distinctly from other OpenAIError subtypes.
          After aborting, do NOT call finalResponse() as it will throw.
          Common pattern in server-side code: wrap stream in a timeout that calls
          stream.abort() — ensure the abort is caught and surfaced as a user-facing error.
          APIUserAbortError does NOT extend APIError — it extends OpenAIError.
          Pattern:
            stream.on('abort', (err) => { /* handle abort */ });
            // or in try-catch around finalResponse():
            } catch (err) {
              if (err instanceof OpenAI.APIUserAbortError) { /* user cancelled */ }
