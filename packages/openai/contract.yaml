  # ─────────────────────────────────────────────────────────────────────────────
  # responses.create()  (Responses API — structured outputs, tool use)
  # Evidence source: openai-node SDK source at
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/responses/responses.ts
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts
  # ResponseError codes confirmed from responses.ts source:
  #   server_error, rate_limit_exceeded, invalid_prompt, vector_store_timeout,
  #   invalid_image, image_too_large, image_content_policy_violation, etc.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: responses.create
    import_path: "openai"
    description: >
      Generates model responses via openai.responses.create() (Responses API).
      Supports tools, structured outputs, image inputs, and background execution.
      Responses can be incomplete due to token limits or content filtering.
      ResponseError codes are embedded in the response object, not thrown as exceptions.

    postconditions:
      # Evidence: AuthenticationError confirmed in error.ts (status 401)
      - id: responses-authentication-error
        condition: "Invalid or missing API key (401)"
        throws: "AuthenticationError with status 401"
        required_handling: >
          Caller MUST NOT retry with the same API key.
          Alert operations team — this is a configuration error.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: RateLimitError confirmed in error.ts (status 429)
      - id: responses-rate-limit-error
        condition: "Rate limit exceeded (429)"
        throws: "RateLimitError with status 429"
        required_handling: >
          Caller SHOULD implement exponential backoff beyond SDK's 2 automatic retries.
          SDK automatically retries 2 times with exponential backoff.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: ResponseError.status='incomplete' with incomplete_details confirmed
      # in responses.ts source. finish_reason='max_output_tokens' or 'content_filter'.
      - id: responses-incomplete-output
        condition: "Response truncated due to max_output_tokens limit or content filter"
        throws: "Does not throw — response.status === 'incomplete' with incomplete_details field"
        required_handling: >
          Caller MUST check response.status === 'incomplete' before consuming output.
          Check response.incomplete_details.reason: 'max_output_tokens' or 'content_filter'.
          For max_output_tokens: increase max_output_tokens or chunk the prompt.
          For content_filter: adjust the prompt or return user-friendly error.
          Treating incomplete responses as complete causes silent data loss.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/responses/responses.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium

      # Evidence: ResponseError codes 'invalid_image', 'image_too_large',
      # 'image_content_policy_violation' confirmed in responses.ts source.
      - id: responses-image-error
        condition: "Invalid image input — unsupported format, too large, or content policy violation"
        throws: "BadRequestError with status 400 (or embedded in response.error)"
        required_handling: >
          Caller MUST validate image format, size, and content before sending.
          Check error code: invalid_image, invalid_base64_image, image_too_large,
          image_too_small, image_content_policy_violation, unsupported_image_media_type.
          DO NOT retry with the same image without fixing the issue.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/responses/responses.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: low

