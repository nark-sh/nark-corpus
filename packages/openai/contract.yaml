  # ─────────────────────────────────────────────────────────────────────────────
  # embeddings.create()
  # Evidence source: openai-node SDK source at
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/embeddings.ts
  # Used heavily by RAG pipelines, semantic search, and vector indexing workflows.
  # SDK provides no internal error handling — all errors bubble to caller.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: embeddings.create
    import_path: "openai"
    description: >
      Generates vector embeddings for input text via openai.embeddings.create().
      Used in RAG pipelines, semantic search, and similarity matching.
      Errors bubble up to caller — no internal SDK error handling.

    postconditions:
      # Evidence: AuthenticationError class confirmed in openai-node/src/core/error.ts (status 401)
      - id: embeddings-authentication-error
        condition: "Invalid or missing API key (401)"
        throws: "AuthenticationError with status 401"
        required_handling: >
          Caller MUST NOT retry with the same API key.
          Embedding pipelines often run in background batch jobs where auth failures
          are silently swallowed, stopping the entire ingestion pipeline without alerting.
          Alert operations team immediately — this is a configuration error.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high

      # Evidence: RateLimitError class confirmed in openai-node/src/core/error.ts (status 429)
      # Embeddings have separate TPM limits from chat completions.
      - id: embeddings-rate-limit-error
        condition: "Rate limit exceeded (429) — TPM or RPM limits on embeddings endpoint"
        throws: "RateLimitError with status 429"
        required_handling: >
          Caller SHOULD implement exponential backoff beyond the SDK's 2 automatic retries.
          Large batch embedding jobs (e.g., indexing entire document stores) routinely
          hit TPM limits. Without explicit handling, batch jobs fail mid-run and leave
          the vector store in a partially-indexed state.
          SDK automatically retries 2 times with exponential backoff.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: BadRequestError confirmed in openai-node/src/core/error.ts (status 400)
      # text-embedding-ada-002 has 8192 token limit; text-embedding-3-* has higher limits.
      - id: embeddings-token-limit-error
        condition: "Input exceeds model token limit (400) — 8192 tokens for ada-002"
        throws: "BadRequestError with status 400"
        required_handling: >
          Caller MUST truncate or chunk input text before calling.
          DO NOT retry without reducing input size.
          text-embedding-ada-002 limit: 8192 tokens.
          text-embedding-3-small/large: higher limits but still finite.
          Silent swallowing means the document is never added to the index.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/embeddings.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

