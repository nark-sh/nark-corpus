  # ─────────────────────────────────────────────────────────────────────────────
  # responses.compact()  (via openai.responses.compact())
  # Evidence source: openai-node SDK source at
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/responses/responses.ts
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts
  # Compacts a multi-turn conversation thread to reduce context window size and
  # token costs in long-running agent/chat sessions. Produces a CompactedResponse
  # with encrypted summary replacing older context. Used in production RAG and
  # agent flows to manage token budget over many turns.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: responses.compact
    import_path: "openai"
    description: >
      Compacts a multi-turn Responses API conversation by summarising older context
      into a single compaction item (object type 'response.compaction'). Accepts
      previous_response_id to identify the conversation chain to compact.
      Returns a CompactedResponse with output[] (user messages + compaction item)
      and usage token accounting. Used in long-running agent and RAG flows to stay
      within the model's context window and reduce per-request token costs.

    postconditions:
      # Evidence: NotFoundError (HTTP 404) confirmed in error.ts
      # previous_response_id refers to a server-side response object that can be
      # deleted, expired, or invalid — callers must guard against stale IDs
      - id: responses-compact-not-found-error
        condition: "previous_response_id references a non-existent or expired response (404)"
        throws: "NotFoundError with status 404"
        required_handling: >
          Caller MUST catch NotFoundError and handle the missing conversation gracefully.
          DO NOT silently discard the error — the compaction did not occur.
          Options: (1) restart the conversation from scratch, (2) fall back to passing
          full conversation history in the next responses.create() call.
          Log the failed previous_response_id for debugging.
          Agent and chatbot flows that rely on compaction to stay within context limits
          will silently lose the entire conversation history if this error is not caught.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/responses/responses.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

      # Evidence: RateLimitError (HTTP 429) from error.ts — compact() calls the model
      # to generate the compaction summary, consuming tokens and hitting rate limits
      - id: responses-compact-rate-limit-error
        condition: "Rate limit exceeded during compaction model call (429)"
        throws: "RateLimitError with status 429"
        required_handling: >
          Caller MUST catch RateLimitError and implement exponential backoff.
          Compaction consumes tokens (model generates the summary), so it counts
          against the same rate limits as responses.create(). High-frequency agent
          loops that compact every few turns may hit rate limits unexpectedly.
          If compaction fails: fall back to including the full history or reduce
          compaction frequency.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

