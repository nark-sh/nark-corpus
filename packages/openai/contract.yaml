      - id: vector-store-file-batch-partial-failure
        condition: >
          One or more files in the batch fail to process (batch.file_counts.failed_count > 0);
          batch.status may still be 'completed' even with failures
        throws: >
          Does not throw — batch.status is 'completed' but batch.file_counts.failed_count > 0.
          Per-file failure details available via listFiles() filtered to status='failed'.
        required_handling: >
          Caller MUST use createAndPoll() to wait for processing, then check:
          1. batch.status === 'failed' (entire batch failed)
          2. batch.file_counts.failed_count > 0 (partial failure — some files missing from store)
