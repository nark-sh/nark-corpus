      # Evidence: 27 violations across 19 repos in scan-openai-2026-04-01.json
      # Top affected: mfts/papermark (⭐8,147), cline/cline (⭐59,274), Codehagen/Badget (⭐2,728)
      - id: authentication-error
        condition: "Invalid or missing API key (401)"
        throws: "AuthenticationError with status 401"
        required_handling: >
          Caller MUST NOT retry with the same API key.
          Verify API key is correct and not revoked.
          Use environment variables, never hardcode keys.
          Alert operations team - this is a configuration error.
        sources:
          - "https://developers.openai.com/api/docs/guides/error-codes/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: 37 violations across 19 repos in scan-openai-2026-04-01.json
      # Top affected: mckaywrigley/chatbot-ui (⭐33,126), czlonkowski/n8n-mcp (⭐15,902), ItzCrazyKns/Vane (⭐33,343)
      # Severity downgraded error→warning: SDK auto-retries 2× with exponential backoff; caller
      # still SHOULD implement explicit handling for exhausted retries, but a missing explicit
      # handler is not crash-severity since the SDK catches most cases automatically.
      - id: rate-limit-error
        condition: "Rate limit exceeded - RPM, TPM, RPD, TPD, or IPM (429)"
        throws: "RateLimitError with status 429"
        required_handling: >
          Caller SHOULD implement exponential backoff retry logic for retries beyond the SDK's 2 automatic retries.
          Check rate limit headers (x-ratelimit-remaining-requests, x-ratelimit-remaining-tokens).
          Different endpoints have different limits (IPM for images, RPM/TPM for text).
          SDK automatically retries 2 times with exponential backoff.
        sources:
          - "https://developers.openai.com/api/docs/guides/rate-limits/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: server-error
        condition: "OpenAI server error (500, 502, 503)"
        throws: "APIError with status >= 500"
        required_handling: >
          Caller SHOULD treat as transient failure and retry with exponential backoff.
          SDK automatically retries 2 times.
          If errors persist, check OpenAI status page.
        sources:
          - "https://developers.openai.com/api/docs/guides/error-codes/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
