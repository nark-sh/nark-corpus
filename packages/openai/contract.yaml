          or the timestamp in webhook-timestamp header is older than the tolerance
          (default 300 seconds = 5 minutes), or the timestamp is too far in the future
          (replay attack prevention), or the timestamp format is not a valid integer.
        throws: "InvalidWebhookSignatureError (extends Error, NOT APIError)"
