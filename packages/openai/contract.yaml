      - id: speech-rate-limit-error
        condition: "Rate limit exceeded (429) — TTS has separate character-per-day limits"
        throws: "RateLimitError with status 429"
        required_handling: >
          Caller SHOULD implement exponential backoff.
          TTS endpoints have character-per-minute and character-per-day quotas.
          SDK automatically retries 2 times with exponential backoff.
        sources:
