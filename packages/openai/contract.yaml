        condition: "Input text exceeds 4096 character limit (400)"
        throws: "BadRequestError with status 400"
        required_handling: >
          Caller MUST validate input length before calling.
          Split text into chunks of ≤4096 characters and concatenate audio outputs.
          DO NOT retry with the same input without truncation.
        sources:
