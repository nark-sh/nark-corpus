        throws: "LengthFinishReasonError (extends OpenAIError)"
        required_handling: >
          Caller MUST catch LengthFinishReasonError when using chat.completions.parse().
          This is thrown for EVERY choice with finish_reason 'length' — not just the last.
          Unlike completions.create() which silently returns truncated output, parse()
          makes truncation a hard error because JSON schema validation will fail anyway.
          Fix: increase max_tokens, reduce prompt size, or use a model with larger context.
          DO NOT retry with same parameters — the response will be truncated again.
