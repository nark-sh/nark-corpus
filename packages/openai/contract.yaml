          expected value computed from the payload, webhook-id, and webhook-timestamp.
          Also thrown when: timestamp is more than tolerance seconds in the past (default 5 min),
          timestamp is more than tolerance seconds in the future, or timestamp is not a valid integer.
        throws: "InvalidWebhookSignatureError (extends Error, NOT APIError)"
        required_handling: >
          Caller MUST catch InvalidWebhookSignatureError and return HTTP 400 to OpenAI.
          Do NOT swallow this error and process the event — that defeats the security purpose.
          Note: If clock skew causes legitimate events to fail, adjust the tolerance parameter:
            await openai.webhooks.verifySignature(payload, headers, secret, 600);  // 10 minute window
