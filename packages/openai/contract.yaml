      signature in the webhook-signature header against the computed signature using the
      webhook secret. Also validates the webhook-timestamp header to prevent replay attacks
      (rejects events older than tolerance seconds, default 300). Returns Promise<void> on
      success. Does NOT parse the payload — use webhooks.unwrap() to also get the parsed event.

    postconditions:
