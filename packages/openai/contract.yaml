      # The model field is required and must be a supported model ID
      - id: responses-compact-bad-request-error
        condition: "Invalid model ID or unsupported model for compaction (400)"
        throws: "BadRequestError with status 400"
        required_handling: >
          Caller MUST specify a valid model in ResponseCompactParams.model.
          Use the same model that generated the original conversation to ensure
          consistent token counting. BadRequestError is not retryable — fix the
