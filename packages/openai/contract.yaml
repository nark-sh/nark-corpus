  # batches.create()
  # Evidence source: openai-node SDK source at
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/batches.ts
  # Batch limits: 50,000 requests per file, 200 MB max file size, 24h window.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: batches.create
    import_path: "openai"
    description: >
      Creates async batch jobs via openai.batches.create().
      Accepts JSONL file with up to 50,000 requests (200 MB max).
      Jobs run within a 24h completion window.

    postconditions:
      # Evidence: BadRequestError confirmed in error.ts (status 400)
      # Batch file limits confirmed in batches.ts: 50k requests, 200MB, JSONL format
      - id: batches-invalid-file-error
        condition: "Invalid batch file format, exceeds 50,000 requests, or exceeds 200 MB (400)"
        throws: "BadRequestError with status 400"
        required_handling: >
          Caller MUST validate file format (JSONL), request count (≤50,000),
          and file size (≤200 MB) before calling.
          DO NOT retry with the same file without fixing the validation issue.
          Split large jobs into multiple smaller batch files.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/batches.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

