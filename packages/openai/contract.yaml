  # ─────────────────────────────────────────────────────────────────────────────
  # batches.create()
  # Evidence source: openai-node SDK source at
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/batches.ts
  # Batch limits: 50,000 requests per file, 200 MB max file size, 24h window.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: batches.create
    import_path: "openai"
    description: >
      Creates async batch jobs via openai.batches.create().
      Accepts JSONL file with up to 50,000 requests (200 MB max).
      Jobs run within a 24h completion window.

    postconditions:
      # Evidence: BadRequestError confirmed in error.ts (status 400)
      # Batch file limits confirmed in batches.ts: 50k requests, 200MB, JSONL format
      - id: batches-invalid-file-error
        condition: "Invalid batch file format, exceeds 50,000 requests, or exceeds 200 MB (400)"
        throws: "BadRequestError with status 400"
        required_handling: >
          Caller MUST validate file format (JSONL), request count (≤50,000),
          and file size (≤200 MB) before calling.
          DO NOT retry with the same file without fixing the validation issue.
          Split large jobs into multiple smaller batch files.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/batches.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      # Evidence: Batch status 'failed' and 'expired' confirmed in batches.ts source
      - id: batches-async-failure
        condition: "Batch job fails or expires after submission (status: 'failed' or 'expired')"
        throws: "Does not throw — batch.status becomes 'failed' or 'expired'; check batch.errors"
        required_handling: >
          Caller MUST poll batch status via batches.retrieve() until terminal state.
          Terminal states: 'completed', 'failed', 'expired', 'cancelled'.
          On 'failed': inspect batch.errors[] for per-request error codes and messages.
          On 'expired': resubmit the job (24h window passed without completion).
          Treating a 'failed' or 'expired' batch as completed causes silent data loss.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/batches.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

  # ─────────────────────────────────────────────────────────────────────────────
  # fine_tuning.jobs.create()
  # Evidence source: openai-node SDK source at
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/fine-tuning/jobs/jobs.ts
  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts
  # Training file must be uploaded first via files.create() with purpose='fine-tune'.
  # Job failures are reported in FineTuningJob.error, not thrown as exceptions.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: fine_tuning.jobs.create
    import_path: "openai"
    description: >
      Creates a fine-tuning job via openai.fineTuning.jobs.create().
      Requires a pre-uploaded training file (files.create() with purpose='fine-tune').
      Job failure is reported in FineTuningJob.error, not thrown as an exception.

    postconditions:
      # Evidence: BadRequestError confirmed in error.ts (status 400)
      # FineTuningJob.Error.param = 'training_file' when file is invalid
      - id: fine-tuning-invalid-file-error
        condition: "Training file validation failed — invalid JSONL, wrong format, or file not ready (400)"
        throws: "BadRequestError with status 400; or FineTuningJob.error.code with param='training_file'"
        required_handling: >
          Caller MUST validate training file format before submitting.
          Training files must be JSONL with prompt/completion or messages format.
          File must be uploaded with purpose='fine-tune' via files.create().
          File status must be 'processed' before referencing it in fine-tuning.
          Check FineTuningJob.error.code and FineTuningJob.error.message for details.
          DO NOT retry with the same file without fixing the format.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/fine-tuning/jobs/jobs.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      # Evidence: Job status 'failed' confirmed in fine-tuning/jobs/jobs.ts source
      - id: fine-tuning-async-job-failure
        condition: "Fine-tuning job fails during training (status: 'failed')"
        throws: "Does not throw — FineTuningJob.status becomes 'failed'; inspect FineTuningJob.error"
        required_handling: >
          Caller MUST poll job status via fineTuning.jobs.retrieve() until terminal state.
          Terminal states: 'succeeded', 'failed', 'cancelled'.
          On 'failed': inspect FineTuningJob.error.code and FineTuningJob.error.message.
          Common failure causes: insufficient training data, data format errors,
          quota exceeded, model availability.
          Training compute costs are incurred even for failed jobs.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/fine-tuning/jobs/jobs.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
