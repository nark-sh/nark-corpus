        throws: "NotFoundError (404) for expired upload; BadRequestError (400) for size exceeded"
        required_handling: >
          Caller MUST complete the multipart upload within 1 hour of calling uploads.create().
          For large files: start parts.create() calls immediately after create().
          If upload expires, call uploads.create() again and restart from the beginning —
          previously uploaded parts are lost.
          Track the uploadID and byte count; verify total matches declared bytes on complete().
          Max upload size: 8 GB. Use uploads.complete() with md5 checksum for integrity.
