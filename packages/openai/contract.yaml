        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/lib/EventStream.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      # Evidence: AuthenticationError (HTTP 401) confirmed in error.ts
      # HTTP errors from the underlying create/retrieve call bubble up through EventStream
      - id: responses-stream-authentication-error
        condition: >
          The API key is invalid, missing, or revoked (HTTP 401). The error occurs during
          the initial HTTP request that opens the SSE stream — before any events are emitted.
