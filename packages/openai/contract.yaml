    description: >
      Attaches a file to a vector store via openai.vectorStores.files.create().
      File processing is asynchronous — the method returns immediately with status 'in_progress'.
      CRITICAL: Must check file.status and file.last_error after processing completes.
      Method returns even if the file failed to process — callers who skip the status check
      silently add no content to the vector store.

    postconditions:
      # Evidence: last_error.code values confirmed in vector-stores/files.ts source:
      # 'server_error', 'unsupported_file', 'invalid_file'
      # Method returns even if file failed — this is a SILENT failure pattern.
      - id: vector-store-file-processing-failure
        condition: >
          File processing fails after attachment (file.status becomes 'failed');
          file.last_error.code is one of: 'server_error', 'unsupported_file', 'invalid_file'
        throws: >
          Does not throw — file.status becomes 'failed' and file.last_error is populated.
          Must be detected by checking file.status after polling or using createAndPoll().
        required_handling: >
          Caller MUST use createAndPoll() or poll() to wait for processing completion,
          then check file.status === 'failed' and inspect file.last_error.code.
          'unsupported_file': file type not supported — convert to supported format (PDF, DOCX, TXT, etc.).
          'invalid_file': file content is corrupt or empty — re-upload the source file.
          'server_error': transient failure — retry the attachment.
          Skipping the status check means the vector store appears to contain the file
          but search results return no content from it — a silent data loss.
