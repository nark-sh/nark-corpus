  #   https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts
  # Structured outputs helper — calls completions.create() then parses the response.
  # Throws LengthFinishReasonError and ContentFilterFinishReasonError on non-'stop' finish reasons.
  # These are thrown BEFORE any parsing happens, as guards on finish_reason.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: chat.completions.parse
    import_path: "openai"
    description: >
      Creates a structured-output chat completion via openai.chat.completions.parse().
      Internally calls completions.create() then parses the response via parseChatCompletion().
      Throws LengthFinishReasonError if response was truncated due to token limit,
      and ContentFilterFinishReasonError if response was filtered by content policy.
      These are checked per-choice before any JSON parsing.

    postconditions:
      # Evidence: LengthFinishReasonError confirmed in parser.ts source —
      # thrown when choice.finish_reason === 'length' (token limit truncation)
      - id: parse-length-finish-reason-error
        condition: "Response truncated due to max_tokens limit (finish_reason === 'length')"
        throws: "LengthFinishReasonError (extends OpenAIError)"
        required_handling: >
          Caller MUST catch LengthFinishReasonError when using chat.completions.parse().
          This is thrown for EVERY choice with finish_reason 'length' — not just the last.
          Unlike completions.create() which silently returns truncated output, parse()
          makes truncation a hard error because JSON schema validation will fail anyway.
          Fix: increase max_tokens, reduce prompt size, or use a model with larger context.
          DO NOT retry with same parameters — the response will be truncated again.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/lib/parser.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
