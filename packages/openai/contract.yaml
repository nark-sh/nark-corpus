  # ─────────────────────────────────────────────────────────────────────────────
  - name: audio.transcriptions.create
    import_path: "openai"
    description: >
      Transcribes audio files to text via openai.audio.transcriptions.create().
      Supports Whisper and gpt-4o-transcribe models. Max file size 25 MB.
      Accepts: flac, mp3, mp4, mpeg, mpga, m4a, ogg, wav, webm.
      No internal SDK error handling — errors bubble to caller.

    postconditions:
      # Evidence: BadRequestError confirmed in error.ts (status 400).
      # Unsupported formats and files over 25 MB both produce 400 BadRequestError.
      - id: transcription-invalid-file-error
        condition: "Unsupported audio format or file exceeds 25 MB size limit (400)"
        throws: "BadRequestError with status 400"
        required_handling: >
          Caller MUST validate file format and size before upload.
          Supported formats: flac, mp3, mp4, mpeg, mpga, m4a, ogg, wav, webm.
          Maximum file size: 25 MB.
          DO NOT retry with the same file — fix the file first.
          Return user-friendly error indicating the file format or size issue.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/resources/audio/transcriptions.ts"
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: low

      # Evidence: RateLimitError confirmed in error.ts (status 429)
      - id: transcription-rate-limit-error
        condition: "Rate limit exceeded (429) — audio transcription has separate RPM limits"
        throws: "RateLimitError with status 429"
        required_handling: >
          Caller SHOULD implement exponential backoff for batch transcription workflows.
          Whisper has stricter rate limits than text endpoints (measured in audio minutes/day).
          SDK automatically retries 2 times with exponential backoff.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      # Evidence: AuthenticationError confirmed in error.ts (status 401)
      - id: transcription-authentication-error
        condition: "Invalid or missing API key (401)"
        throws: "AuthenticationError with status 401"
        required_handling: >
          Caller MUST NOT retry with the same API key.
          Alert operations team — this is a configuration error.
        sources:
          - "https://raw.githubusercontent.com/openai/openai-node/refs/heads/master/src/core/error.ts"
        severity: error
