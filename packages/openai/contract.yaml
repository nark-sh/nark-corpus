# Expanded coverage from 27→29 contracted functions (+2 this pass).
# API surface total unchanged: 41 async-callable functions.
# Contracted this pass: chat.completions.stream (4 postconditions), chat.completions.runTools (3 postconditions)
# Key insights:
#   chat.completions.stream() is a distinct streaming helper from create({stream:true}) —
#   it converts finish_reason 'length' and 'content_filter' into thrown exceptions
#   (LengthFinishReasonError, ContentFilterFinishReasonError), making truncation visible.
#   APIUserAbortError and OpenAIError('stream ended') also surface via finalChatCompletion().
#   chat.completions.runTools() throws immediately on missing function implementations
#   ('Tool given to .runTools() that does not have an associated function') — this is a
#   runtime programming error that fires when the model invokes a tool with no executor.
#   Also throws on n>1 params (client-side guard before any API call).
#   Tool execution failures (invalid tool names, parse errors) are returned as
#   tool messages for the model to recover — they are NOT thrown.
