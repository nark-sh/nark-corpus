functions:
  - name: firstValueFrom
    import_path: "rxjs"
    description: "Converts an Observable to a Promise that resolves with the first value emitted. Rejects if the Observable errors or completes without emitting a value."

    postconditions:
      - id: observable-error
        condition: "The Observable emits an error notification before any value"
        throws: "The error value from the Observable (re-thrown as Promise rejection)"
        required_handling: >
          Caller MUST wrap in try-catch. Observable errors become Promise rejections.
          If the Observable may error (network requests, microservice calls, HTTP calls),
          the error case must be explicitly handled.
        sources:
          - "https://rxjs.dev/api/index/function/firstValueFrom"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: empty-completion
        condition: "The Observable completes without emitting any value and no defaultValue is provided"
        throws: "EmptyError: no elements in sequence"
        required_handling: >
          Caller MUST either provide a defaultValue option to avoid EmptyError,
          or wrap in try-catch. Use firstValueFrom(obs, { defaultValue: fallback })
          to safely handle Observables that may complete without emitting.
        sources:
          - "https://rxjs.dev/api/index/function/firstValueFrom"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: lastValueFrom
    import_path: "rxjs"
    description: "Converts an Observable to a Promise that resolves with the last value emitted when the Observable completes. Rejects if the Observable errors or completes without emitting a value."

    postconditions:
      - id: observable-error
        condition: "The Observable emits an error notification at any point"
        throws: "The error value from the Observable (re-thrown as Promise rejection)"
        required_handling: >
          Caller MUST wrap in try-catch. Observable errors become Promise rejections.
          NestJS microservice calls (client.send()), Angular HttpClient calls, and other
          Observable-based APIs can error, and those errors propagate as rejections.
        sources:
          - "https://rxjs.dev/api/index/function/lastValueFrom"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: empty-completion
        condition: "The Observable completes without emitting any value and no defaultValue is provided"
        throws: "EmptyError: no elements in sequence"
        required_handling: >
          Caller MUST either provide a defaultValue option to avoid EmptyError,
          or wrap in try-catch. Use lastValueFrom(obs, { defaultValue: fallback })
          to safely handle Observables that may complete without emitting.
        sources:
          - "https://rxjs.dev/api/index/function/lastValueFrom"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: forEach
    import_path: "rxjs"
    description: >
      Observable.prototype.forEach() iterates over each emitted value by calling
      the provided callback, returning a Promise<void> that resolves on Observable
      completion or rejects on Observable error. Unlike subscribe(), forEach() cannot
      be unsubscribed from once started. Confirmed from Observable.js source:
      error callback routes to reject(), complete routes to resolve().
    postconditions:
      # Evidence: rxjs/dist/cjs/internal/Observable.js — forEach() implementation
      # new promiseCtor((resolve, reject) => { subscriber = SafeSubscriber({ error: reject, complete: resolve }) })
      - id: foreach-observable-error
        condition: "The Observable emits an error notification at any point during iteration"
        throws: "The error value from the Observable (re-thrown as Promise rejection)"
        required_handling: >
          Caller MUST wrap forEach() in try-catch. Observable errors become Promise rejections.
          NestJS and Angular code that uses forEach() to process streams (e.g., database cursor
          iteration, microservice response streaming) will throw unhandled rejections if not wrapped.
        sources:
          - "https://rxjs.dev/api/index/class/Observable#forEach"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: foreach-callback-throws
        condition: "The next callback provided to forEach() throws an exception (e.g., JSON.parse failure, type error)"
        throws: >
          The exception thrown by the callback. The Observable is unsubscribed and the Promise rejects
          with the callback's exception. Remaining stream values are silently dropped.
        required_handling: >
          Caller MUST wrap forEach() in try-catch. Callback exceptions unsubscribe the Observable
          mid-stream, dropping remaining values. Partial processing causes data inconsistency if
          the callback had side effects (e.g., DB writes). Ensure the callback itself handles errors
          internally or wrap the entire forEach() call.
        sources:
          - "https://rxjs.dev/api/index/class/Observable#forEach"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: toPromise
    import_path: "rxjs"
    description: >
      Observable.prototype.toPromise() converts an Observable to a Promise that
      resolves with the LAST emitted value on completion, or undefined if no value
      was emitted. Deprecated since rxjs v7 — replaced by lastValueFrom() and
      firstValueFrom(). Still widely used in legacy Angular/NestJS codebases.
      Confirmed from Observable.js source: error callback routes to reject(),
      complete routes to resolve(value) where value is the last seen emission.
    postconditions:
      # Evidence: rxjs/dist/cjs/internal/Observable.js — toPromise() implementation
      # subscribe(x => value = x, err => reject(err), () => resolve(value))
      - id: topromise-observable-error
        condition: "The Observable emits an error notification at any point"
        throws: "The error value from the Observable (re-thrown as Promise rejection)"
        required_handling: >
          Caller MUST wrap toPromise() in try-catch. Despite being deprecated, toPromise() is
          still used in thousands of NestJS and Angular apps via patterns like:
          await httpClient.get(url).toPromise(). Missing try-catch causes unhandled rejections
          that crash the async function or request handler.
        sources:
          - "https://rxjs.dev/api/index/class/Observable#toPromise"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: topromise-undefined-on-empty
        condition: "The Observable completes without emitting any value"
        returns: "undefined (silently resolves to undefined instead of throwing EmptyError)"
        required_handling: >
          Caller MUST null-check the resolved value before use, or migrate to lastValueFrom()
          which explicitly throws EmptyError for empty Observables. Common crash pattern in
          Angular services: const data = await obs$.toPromise(); data.items.forEach() —
          crashes with TypeError when Observable emits nothing.
        sources:
          - "https://rxjs.dev/api/index/class/Observable#toPromise"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: fromFetch
    import_path: "rxjs/fetch"
    description: >
      Wraps the native fetch() API in an Observable. Automatically creates an internal
      AbortController to cancel the in-flight request when the subscription is torn down.
      CRITICAL BEHAVIORAL CONTRACT: Non-2xx HTTP responses (404, 500, etc.) are NOT emitted
      as Observable errors — they are emitted as Observable.next() values with response.ok === false.
      Callers MUST check response.ok explicitly, exactly like the native fetch() API.
      Used in Angular and NestJS apps for HTTP requests via Observable patterns.
    postconditions:
      # Evidence: rxjs/src/internal/observable/dom/fetch.ts (package source, confirmed)
      # fetch().then(response => subscriber.next(response) + subscriber.complete()) for all HTTP statuses
      # .catch(handleError) -> subscriber.error(err) ONLY for network/CORS/abort errors
      # Official JSDoc example: "if (response.ok) { return response.json(); } else { return of({error: true}) }"
      # Confirmed: non-2xx status is NOT an Observable error — it's a next() value
      - id: fromfetch-no-ok-check
        condition: >
          The fromFetch() Observable emits a Response with response.ok === false
          (HTTP 4xx/5xx status codes) but the caller does not check response.ok and
          proceeds to use the response body as if the request succeeded.
          Common pattern: await firstValueFrom(fromFetch('/api/data').pipe(switchMap(r => r.json())))
          without checking r.ok first — a 500 response silently returns error body as data.
        throws: >
          Does NOT throw. The Observable emits the Response as a next() value regardless
          of HTTP status. The error is silent — response.ok is false, response.status is 4xx/5xx,
          but no Observable error notification is raised unless the caller explicitly throws one.
        required_handling: >
          Caller MUST check response.ok before consuming the response body:
            fromFetch('/api/users').pipe(
              switchMap(response => {
                if (response.ok) { return response.json(); }
                throw new Error(`HTTP Error: ${response.status}`);
              })
            )
          Not checking response.ok causes 4xx/5xx errors to silently appear as
          successful data responses, corrupting application state. This is the
          most common fromFetch misuse pattern.
        sources:
          - "https://github.com/ReactiveX/rxjs/blob/master/packages/rxjs/src/internal/observable/dom/fetch.ts"
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response/ok"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: fromfetch-network-error-unhandled
        condition: >
          The underlying native fetch() rejects with a TypeError (network unreachable,
          CORS policy violation, invalid URL, DNS resolution failure). The fromFetch()
          Observable propagates this as an Observable error notification. When subscribed
          via firstValueFrom(fromFetch(...)) without try-catch, it becomes an unhandled
          Promise rejection. Common in Node.js backends using fromFetch for service-to-service calls.
        throws: >
          TypeError: Failed to fetch (browser) or TypeError: fetch failed (Node.js).
          Propagated via subscriber.error(err) from the .catch(handleError) in fromFetch source.
        required_handling: >
          Caller MUST handle network errors via catchError() operator or try-catch:
            try {
              const response = await firstValueFrom(fromFetch('/api/data'));
              if (!response.ok) throw new Error(`HTTP ${response.status}`);
              return await response.json();
            } catch (err) {
              // TypeError for network failures, custom Error for non-2xx
            }
          Network errors cause unhandled promise rejections in async functions
          using await firstValueFrom(fromFetch(...)) without try-catch.
        sources:
          - "https://github.com/ReactiveX/rxjs/blob/master/packages/rxjs/src/internal/observable/dom/fetch.ts"
          - "https://developer.mozilla.org/en-US/docs/Web/API/fetch#exceptions"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

