package: pino
semver: ">=7.0.0 <12.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed
coverage_score: 0.71

detection:
  import_names:
    - "pino"
  await_patterns:
    - "pino("
    - ".child("
    - ".fatal("
    - ".transport("
    - ".destination("
    - ".flush("
    - ".multistream("

functions:
  - name: pino
    import_path: "pino"
    description: "Creates a pino logger instance. Fast, low-overhead JSON logger for Node.js."

    postconditions:
      # Evidence: seen in 36 primary firings across 23 repos in scan-pino-2026-04-03.json
      # Top affected: qwibitai/nanoclaw (⭐ 25025), deepstreamIO/deepstream.io (⭐ 7186)
      - id: destination-error
        condition: "The destination stream emits an error event and no error handler is attached"
        throws: "Unhandled error event crashes the Node.js process"
        required_handling: >
          Caller MUST attach an error handler to custom destination streams.
          Use destination.on('error', handler) before passing to pino.
          pino.destination() streams are async-friendly but still emit errors on disk full, permissions, etc.
        sources:
          - "https://github.com/pinojs/pino/blob/main/docs/api.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high

      - id: invalid-level
        condition: "An invalid log level string is passed to pino() options.level"
        throws: "Error: unknown level value"
        required_handling: >
          Caller MUST use valid level strings: 'trace', 'debug', 'info', 'warn', 'error', 'fatal', 'silent'.
          Invalid levels throw synchronously during logger construction.
        sources:
          - "https://github.com/pinojs/pino/blob/main/docs/api.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: circular-reference-safe
        description: "Pino uses fast-safe-stringify which handles circular references gracefully by replacing the circular reference with '[Circular]' rather than throwing. No special handling needed for circular objects."
        sources:
          - "https://github.com/pinojs/pino/blob/main/docs/api.md"
          - "https://github.com/pinojs/pino/issues/1062"
        severity: info
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      - id: serializer-must-not-throw
        description: "Custom serializer functions in options.serializers MUST NOT throw. A throwing serializer will propagate the error and potentially crash the logger or drop the log line."
        sources:
          - "https://github.com/pinojs/pino/blob/main/docs/api.md"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      - id: async-destination-not-flushed-on-exit
        description: "pino.destination() uses buffered writes. On process exit, buffered logs may be lost. Use pino.final() to flush on process exit events (exit, uncaughtException, SIGTERM)."
        sources:
          - "https://github.com/pinojs/pino/blob/main/docs/api.md"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: child
    import_path: "pino"
    description: "Creates a child logger that inherits parent settings and adds bound fields to every log line."

    postconditions:
      # Evidence: seen in 6 primary firings across 3 repos in scan-pino-2026-04-03.json
      # Top affected: jito-labs/mev-bot (⭐ 1184), mattogodoy/nametag (⭐ 856)
      - id: child-bindings-serializer-error
        condition: "A serializer applied to child bindings throws during child logger creation or first use"
        throws: "Error from the serializer function"
        required_handling: >
          Caller MUST ensure serializers passed in child() bindings do not throw.
          Errors in child binding serializers propagate to the caller of child() or the first log call.
        sources:
          - "https://github.com/pinojs/pino/blob/main/docs/api.md"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

    edge_cases:
      - id: child-inherits-level
        description: "Child loggers inherit the parent's log level but can override it. Changing the parent logger's level does NOT retroactively change child logger levels in some pino versions."
        sources:
          - "https://github.com/pinojs/pino/blob/main/docs/api.md"
        severity: info
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: fatal
    import_path: "pino"
    description: "Logs at the fatal level. By default pino does NOT call process.exit() after fatal — that is the caller's responsibility."

    edge_cases:
      - id: fatal-does-not-exit
        description: "Calling logger.fatal() does NOT automatically terminate the process. Callers are responsible for calling process.exit(1) after logging fatal errors if process termination is desired."
        sources:
          - "https://github.com/pinojs/pino/blob/main/docs/api.md"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: transport
    import_path: "pino"
    description: >
      Creates a pino transport running in a dedicated worker thread via thread-stream.
      Used to route log output to files, remote services, or custom destinations without
      blocking the main thread. Returns a ThreadStream that must be passed to pino() as
      the destination stream.
    postconditions:
      # Evidence: https://raw.githubusercontent.com/pinojs/pino/main/docs/transports.md
      # Quote: "any 'error' event emitted by the transport must be considered a fatal error
      # and the process must be terminated. Error events are not recoverable."
      # Source: https://github.com/pinojs/pino/blob/main/lib/transport.js — throws synchronously
      # for invalid config. thread-stream/index.js:369 — error() emits 'error' event when worker crashes.
      - id: transport-error-event-unhandled
        condition: >
          The transport worker thread emits an 'error' event and no error listener is attached
          to the returned ThreadStream.
        throws: >
          Unhandled 'error' event crashes the Node.js process with an uncaught exception.
          This occurs when: (1) the transport worker thread crashes, (2) the worker process
          exits unexpectedly, (3) an unhandled rejection occurs inside the worker.
        required_handling: >
          Caller MUST attach an error handler to the transport stream before passing it to pino():
            const transport = pino.transport({ target: './my-transport' });
            transport.on('error', (err) => { console.error('transport error:', err); process.exit(1); });
          Per pino documentation: transport errors are NOT recoverable — terminate the process.
        sources:
          - "https://raw.githubusercontent.com/pinojs/pino/main/docs/transports.md"
          - "https://github.com/pinojs/pino/blob/main/lib/transport.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high

      - id: transport-module-not-found
        condition: >
          The transport target module cannot be resolved (module not installed, wrong path,
          or typo in the target string).
        throws: >
          Error thrown synchronously at pino.transport() call time:
          "unable to determine transport target for \"<target-string>\""
          or Node.js MODULE_NOT_FOUND error from require() resolution failure.
        required_handling: >
          Caller MUST ensure the transport target is installed and the path/package name
          is correct. Catch the synchronous throw at startup:
            try {
              const transport = pino.transport({ target: 'pino-pretty' });
            } catch (err) {
              console.error('Failed to start transport:', err.message);
              process.exit(1);
            }
        sources:
          - "https://github.com/pinojs/pino/blob/main/lib/transport.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: transport-target-targets-conflict
        condition: >
          Both 'target' and 'targets' options are provided simultaneously to pino.transport().
        throws: >
          Error: "only one of target or targets can be specified"
          Thrown synchronously at pino.transport() call time.
        required_handling: >
          Use either 'target' (single transport) or 'targets' (multi-transport array), never both.
        sources:
          - "https://github.com/pinojs/pino/blob/main/lib/transport.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: low

  - name: destination
    import_path: "pino"
    description: >
      Creates a SonicBoom high-throughput destination stream for pino. Wraps a file descriptor,
      file path, or stream with buffered async writes for maximum performance. Must be passed
      to pino() as the destination argument. Significantly faster than raw process.stdout.
    postconditions:
      # Evidence: https://github.com/mcollina/sonic-boom source code (sonic-boom/index.js)
      # Line 40,44: emit('error', err) on file open failure
      # Line 196: emit('error', err) on write failure
      # Line 710: emit('error', err) in done() callback
      # The destination object is a SonicBoom EventEmitter — unhandled 'error' events crash process
      - id: destination-write-error-event
        condition: >
          The SonicBoom destination stream encounters a write error (disk full, EACCES, EPERM,
          ENOENT on file path, fd closed) and no error listener is attached.
        throws: >
          Unhandled 'error' event crashes the Node.js process. SonicBoom emits 'error' events
          on file open failure, write failure, and close failure — it never throws synchronously
          on write (to preserve throughput), but unhandled error events crash the process.
        required_handling: >
          Caller MUST attach an error handler to the destination before use:
            const dest = pino.destination({ dest: '/var/log/app.log', sync: false });
            dest.on('error', (err) => {
              console.error('log destination error:', err);
              // decide: fallback to stdout? terminate? alert ops?
            });
            const logger = pino(dest);
        sources:
          - "https://github.com/mcollina/sonic-boom"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high

  - name: flush
    import_path: "pino"
    description: >
      Flushes buffered log writes to the underlying destination stream. Required when using
      pino.destination({ sync: false }) to ensure buffered logs are written before process exit
      or before a test assertion. Can be called with or without a callback.
    postconditions:
      # Evidence: pino/lib/proto.js — flush() delegates to stream.flush(cb || noop)
      # sonic-boom/index.js line 404: throws if cb is not a function
      # sonic-boom flushSync line 414,449: re-throws write errors synchronously
      # The callback form: cb is called with (err?) — err will be the write error from sonic-boom
      - id: flush-callback-error-ignored
        condition: >
          logger.flush(cb) is called with a callback but the callback ignores the error parameter,
          OR flush is called without a callback and the underlying write fails.
        throws: >
          The callback is invoked with an Error object when the underlying stream flush fails
          (e.g., disk full, destination closed, EBADF). If no callback is provided and the
          flush fails, the error is silently swallowed (noop is used as the callback).
        required_handling: >
          When flush correctness matters (e.g., graceful shutdown), always check the callback error:
            logger.flush((err) => {
              if (err) {
                console.error('flush failed:', err.message);
                // handle: retry, alert, or accept log loss
              }
              process.exit(0);
            });
        sources:
          - "https://github.com/pinojs/pino/blob/main/lib/proto.js"
          - "https://github.com/mcollina/sonic-boom"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: multistream
    import_path: "pino"
    description: >
      Creates a multi-destination log stream that fans out to multiple write targets simultaneously.
      Each stream in the array receives every log line at or above its configured level.
      Used for writing to multiple destinations (e.g., file + stdout + remote) simultaneously.
    postconditions:
      # Evidence: pino/lib/multistream.js — write() iterates streams and calls stream.write(data)
      # with no try-catch. A failing stream.write() will propagate the error up to pino's write path.
      # pino/lib/multistream.js line 108-110: throws synchronously for invalid stream entries.
      - id: multistream-invalid-stream-entry
        condition: >
          An entry in the streams array does not implement the DestinationStream interface
          (missing write() method) or is not a valid StreamEntry object.
        throws: >
          Error: "stream object needs to implement either StreamEntry or DestinationStream interface"
          Thrown synchronously when the invalid entry is added via multistream() or add().
        required_handling: >
          Ensure each stream entry has a write(msg: string): void method.
          Use pino.destination(), fs.createWriteStream(), or process.stdout directly.
        sources:
          - "https://github.com/pinojs/pino/blob/main/lib/multistream.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: low

      - id: multistream-individual-stream-failure-silent
        condition: >
          One stream in a multistream configuration throws during write() (e.g., a SonicBoom
          stream destination has become invalid) while other streams are healthy.
        throws: >
          The write error from the failing stream propagates synchronously through multistream's
          write() function, which has no try-catch. This can drop log lines to ALL streams
          (not just the failing one) since write() aborts on first error.
        required_handling: >
          Wrap individual streams with error handling or use streams that emit 'error' events
          rather than throwing. Monitor individual destination health separately.
          Consider using pino.transport() with multiple targets instead — transports run in
          worker threads and isolate write failures from the main thread.
        sources:
          - "https://github.com/pinojs/pino/blob/main/lib/multistream.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
