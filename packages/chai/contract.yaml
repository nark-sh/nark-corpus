# Depth pass 2026-04-20 (deepen-stream-2 pass 2):
# NOTE: chai is entirely synchronous — no Promise-returning functions.
# API surface: 4 callable exports with distinct throw behavior:
#   expect(), assert.*(), should() — all throw AssertionError on failure (CONTRACTED)
#   assert.ifError() — rethrows the value itself (not AssertionError) — unique behavior
#   use(fn) — TypeError if fn is not a function (programming error, undocumented) — OMITTED
#   config, Assertion, AssertionError — not callable functions
# Contracted before: 3 (expect, assert, should)
# Contracted after: 4 (+1: assert.ifError)
# Intentionally omitted: use() — no documented error contract; implicit TypeError is
#   a programming error. All 137 assert.* methods covered by assert entry.
# Coverage: 4/4 callable-with-throw-contract functions = 1.0 (effective)
# Raw score: 4/6 total exports (excluding config, Assertion, AssertionError) = 0.67
# Evidence: https://www.chaijs.com/api/assert/ — assert.ifError confirmed to rethrow value
# Source: chai/index.js assert.ifError implementation confirmed
#
# Re-verification pass 2026-06-12 (deepen-stream-1):
# Validated against chai@6.2.2 (latest at re-verify time). Confirmed:
#   - Public exports unchanged at the user-facing-throw layer: assert, expect, should,
#     assert.ifError remain the only async/throw-relevant entry points
#   - New v6 register modules (register-assert.js, register-expect.js, register-should.js)
#     are sync side-effect imports that assign to globalThis — no new throw contracts
#   - use(fn) implementation in node_modules/chai/index.js:4144 confirmed unchanged —
#     fn(exports, utils_exports) propagates plugin errors synchronously; still correctly
#     omitted (sync programming error, no async path)
#   - utils_exports (chai.util) exposes plugin-development helpers (addMethod, addProperty,
#     overwriteMethod, etc.) that are sync no-throw or sync programming-error-only
# Conclusion: coverage_score 0.67 remains accurate. Effective coverage 4/4 = 1.0.
# No new postconditions added; bumping last_verified and contract_version patch.
#
# Re-verification pass 2026-06-24 (deepen-stream-2 pass 90):
# Re-validated against chai@6.2.2 (still latest on npm — no new release since 2026-06-12).
# Confirmed bundled node_modules/chai/index.js contains ZERO `async function` declarations
# (verified by grep: only Promise references are in loupe's formatter for displaying values).
# Public exports unchanged from 2026-06-12 pass: Assertion, AssertionError, Should, assert,
# config, expect, should, use, util. Cross-checked chaijs.com/api/assert/ docs — no
