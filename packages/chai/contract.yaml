# No new functions added; no postconditions added; no scanner concerns queued.
# Bumped contract_version 1.1.1 → 1.1.2 (re-verification only).
coverage_score: 0.67  # 4 contracted / 6 total callable exports (4/4 effective)

functions:
  - name: expect
    import_path: "chai"
    description: "BDD-style assertion with chainable interface"
    postconditions:
      - id: expect-assertion-failure
        condition: "assertion fails (e.g., expect(value).to.equal(expected) when value !== expected)"
        throws: "AssertionError"
        required_handling: >
          Assertions are EXPECTED to throw in test code, but if used outside tests (e.g., in
          production validation), callers MUST wrap in try-catch.
          Without error handling, failed assertions crash the application.
          Use pattern: try { expect(value).to.equal(expected); } catch (error) { /* handle */ }
        sources:
          - "https://www.chaijs.com/api/bdd/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: assert
    import_path: "chai"
    description: "Classic assert-style assertions"
    postconditions:
      - id: assert-assertion-failure
        condition: "assertion fails (e.g., assert.equal(actual, expected) when actual !== expected)"
        throws: "AssertionError"
        required_handling: >
          Assert-style assertions throw AssertionError on failure. In test code, this is expected.
          If used in production code, MUST wrap in try-catch to prevent crashes.
        sources:
          - "https://www.chaijs.com/api/assert/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: should
    import_path: "chai"
    description: "Should-style chainable assertions"
    postconditions:
      - id: should-assertion-failure
        condition: "assertion fails (e.g., value.should.equal(expected) when value !== expected)"
        throws: "AssertionError"
        required_handling: >
          Should-style assertions throw AssertionError on failure. Primarily for test code.
          If used outside tests, MUST wrap in try-catch.
        sources:
          - "https://www.chaijs.com/api/bdd/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: assert.ifError
    import_path: "chai"
    description: >
      Node.js assert-compatible error propagation method. If val is truthy, throws val
      directly (not wrapped in AssertionError). If val is falsy (null, undefined, 0,
      false, ''), does nothing. Used to propagate errors from callback-style APIs:
      assert.ifError(err) ensures err is not present. Unlike all other chai assert
      methods, this does NOT throw AssertionError — it rethrows the original value.
    postconditions:
      # Evidence: https://www.chaijs.com/api/assert/ — "Rethrows err"
      # Source confirmed: chai/index.js assert.ifError = function(val) { if (val) { throw val; } }
      # Docs example: var err = new Error('I am a custom error'); assert.ifError(err); // Rethrows err!
      - id: assert-iferror-rethrows-value
        condition: >
          val is truthy (non-null, non-undefined, non-zero, non-false, non-empty-string).
          Common usage: assert.ifError(err) in callback-style code where err is an Error.
          Throws val directly — NOT wrapped in AssertionError.
        throws: "val (the original value passed — typically an Error, but any truthy value)"
        required_handling: >
          When assert.ifError(err) is used in production code (not test code), the caller
          must catch the rethrown error with the correct type. A catch block that expects
          AssertionError will NOT catch errors from assert.ifError — it rethrows the
          original value as-is.

          Correct pattern for production use:
            try {
              assert.ifError(err);  // rethrows err if err is truthy
            } catch (e) {
              // e is err itself, not an AssertionError
              console.error('Callback error:', e.message);
              throw e;
            }

          Note: In test code, assert.ifError is typically called at the top of a
          callback to fail the test immediately if err is present. The rethrow
          causes test frameworks to mark the test as failed.
        sources:
          - "https://www.chaijs.com/api/assert/#method_iferror"
          - "https://www.chaijs.com/api/assert/"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          # If assert.ifError(err) is inside a try-catch expecting only AssertionError,
          # the rethrown err (not AssertionError) will NOT be caught — silent failure.
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

# Category: testing
