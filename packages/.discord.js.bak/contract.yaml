package: discord.js
version: ">=14.0.0"
description: "A powerful JavaScript library for interacting with the Discord API"

functions:
  # ============================================================================
  # CLIENT OPERATIONS
  # ============================================================================

  - name: Client.login
    severity: ERROR
    message: "Client.login() can fail with invalid token or network errors. Wrap in try-catch to handle authentication failures and prevent crashes."
    tags: [authentication, network]

  - name: Client.destroy
    severity: ERROR
    message: "Client.destroy() can fail during cleanup. Wrap in try-catch to handle graceful shutdown."
    tags: [lifecycle, network]

  - name: Client.fetchWebhook
    severity: ERROR
    message: "Client.fetchWebhook() can fail with invalid webhook ID, permissions, or network errors. Wrap in try-catch."
    tags: [network, fetch]

  - name: Client.deleteWebhook
    severity: ERROR
    message: "Client.deleteWebhook() can fail with permissions or network errors. Wrap in try-catch."
    tags: [network, modification]

  # ============================================================================
  # MESSAGE OPERATIONS
  # ============================================================================

  - name: Message.delete
    severity: ERROR
    message: "Message.delete() can fail if message is already deleted, bot lacks permissions, or network errors occur. Wrap in try-catch to handle DiscordAPIError."
    tags: [message, permissions, network]

  - name: Message.edit
    severity: ERROR
    message: "Message.edit() can fail if message is not owned by bot, exceeds character limits, or network errors occur. Wrap in try-catch."
    tags: [message, permissions, network]

  - name: Message.reply
    severity: ERROR
    message: "Message.reply() can fail with missing permissions, rate limits, or invalid content. Wrap in try-catch to handle DiscordAPIError."
    tags: [message, permissions, network]

  - name: Message.react
    severity: ERROR
    message: "Message.react() can fail with invalid emoji, missing permissions, or if reactions are disabled. Wrap in try-catch."
    tags: [message, permissions, network]

  - name: Message.pin
    severity: ERROR
    message: "Message.pin() can fail if channel has maximum pins (50), bot lacks permissions, or network errors occur. Wrap in try-catch."
    tags: [message, permissions, network]

  - name: Message.unpin
    severity: ERROR
    message: "Message.unpin() can fail if message is not pinned or bot lacks permissions. Wrap in try-catch."
    tags: [message, permissions, network]

  - name: Message.crosspost
    severity: ERROR
    message: "Message.crosspost() can fail if message is not in announcement channel or bot lacks permissions. Wrap in try-catch."
    tags: [message, permissions, network]

  - name: Message.fetch
    severity: ERROR
    message: "Message.fetch() can fail with unknown message error or network errors. Wrap in try-catch."
    tags: [message, network, fetch]

  - name: Message.fetchReference
    severity: ERROR
    message: "Message.fetchReference() can fail if referenced message is deleted or inaccessible. Wrap in try-catch."
    tags: [message, network, fetch]

  - name: Message.startThread
    severity: ERROR
    message: "Message.startThread() can fail with missing permissions, rate limits, or if message already has thread. Wrap in try-catch."
    tags: [message, permissions, network]

  # ============================================================================
  # CHANNEL OPERATIONS
  # ============================================================================

  - name: TextChannel.send
    severity: ERROR
    message: "TextChannel.send() can fail with missing send permissions, invalid content, rate limits, or network errors. Wrap in try-catch to handle DiscordAPIError."
    tags: [channel, permissions, network]

  - name: BaseChannel.send
    severity: ERROR
    message: "BaseChannel.send() can fail with missing send permissions, invalid content, rate limits, or network errors. Wrap in try-catch to handle DiscordAPIError."
    tags: [channel, permissions, network]

  - name: ThreadChannel.send
    severity: ERROR
    message: "ThreadChannel.send() can fail if thread is archived, bot lacks permissions, or rate limited. Wrap in try-catch."
    tags: [channel, permissions, network]

  - name: TextChannel.bulkDelete
    severity: ERROR
    message: "TextChannel.bulkDelete() can fail if messages are older than 14 days, bot lacks permissions, or network errors occur. Wrap in try-catch."
    tags: [channel, permissions, network]

  - name: TextChannel.createInvite
    severity: ERROR
    message: "TextChannel.createInvite() can fail with missing create invite permissions or network errors. Wrap in try-catch."
    tags: [channel, permissions, network]

  # ============================================================================
  # INTERACTION OPERATIONS
  # ============================================================================

  - name: CommandInteraction.reply
    severity: ERROR
    message: "CommandInteraction.reply() can fail if already replied, token expired (3s limit), or network errors. Wrap in try-catch to handle interaction failures."
    tags: [interaction, timing, network]

  - name: CommandInteraction.deferReply
    severity: ERROR
    message: "CommandInteraction.deferReply() can fail if already replied or token expired. Wrap in try-catch to handle timing constraints."
    tags: [interaction, timing, network]

  - name: CommandInteraction.followUp
    severity: ERROR
    message: "CommandInteraction.followUp() can fail if not replied/deferred first or token expired (15min limit). Wrap in try-catch."
    tags: [interaction, timing, network]

  - name: CommandInteraction.editReply
    severity: ERROR
    message: "CommandInteraction.editReply() can fail if no initial reply exists or token expired. Wrap in try-catch."
    tags: [interaction, timing, network]

  - name: ButtonInteraction.reply
    severity: ERROR
    message: "ButtonInteraction.reply() can fail with token expiration or network errors. Wrap in try-catch."
    tags: [interaction, timing, network]

  - name: SelectMenuInteraction.reply
    severity: ERROR
    message: "SelectMenuInteraction.reply() can fail with token expiration or network errors. Wrap in try-catch."
    tags: [interaction, timing, network]

  # ============================================================================
  # GUILD OPERATIONS
  # ============================================================================

  - name: Guild.fetch
    severity: ERROR
    message: "Guild.fetch() can fail if guild is unavailable or network errors occur. Wrap in try-catch."
    tags: [guild, network, fetch]

  - name: Guild.edit
    severity: ERROR
    message: "Guild.edit() can fail with missing manage guild permissions or invalid options. Wrap in try-catch."
    tags: [guild, permissions, network]

  - name: Guild.leave
    severity: ERROR
    message: "Guild.leave() can fail with network errors. Wrap in try-catch to handle graceful exit."
    tags: [guild, network]

  - name: Guild.fetchAuditLogs
    severity: ERROR
    message: "Guild.fetchAuditLogs() can fail with missing view audit log permissions or network errors. Wrap in try-catch."
    tags: [guild, permissions, network, fetch]

  - name: Guild.fetchOwner
    severity: ERROR
    message: "Guild.fetchOwner() can fail with network errors. Wrap in try-catch."
    tags: [guild, network, fetch]

  - name: Guild.fetchWebhooks
    severity: ERROR
    message: "Guild.fetchWebhooks() can fail with missing manage webhooks permissions or network errors. Wrap in try-catch."
    tags: [guild, permissions, network, fetch]

  # ============================================================================
  # GUILD MEMBER OPERATIONS
  # ============================================================================

  - name: GuildMember.ban
    severity: ERROR
    message: "GuildMember.ban() can fail with missing ban members permissions, role hierarchy issues, or network errors. Wrap in try-catch."
    tags: [member, permissions, network]

  - name: GuildMember.kick
    severity: ERROR
    message: "GuildMember.kick() can fail with missing kick members permissions, role hierarchy issues, or network errors. Wrap in try-catch."
    tags: [member, permissions, network]

  - name: GuildMember.timeout
    severity: ERROR
    message: "GuildMember.timeout() can fail with missing moderate members permissions or role hierarchy issues. Wrap in try-catch."
    tags: [member, permissions, network]

  - name: GuildMember.edit
    severity: ERROR
    message: "GuildMember.edit() can fail with missing permissions or invalid options. Wrap in try-catch."
    tags: [member, permissions, network]

  # ============================================================================
  # ROLE OPERATIONS
  # ============================================================================

  - name: RoleManager.create
    severity: ERROR
    message: "RoleManager.create() can fail with missing manage roles permissions or network errors. Wrap in try-catch."
    tags: [role, permissions, network]

  - name: Role.edit
    severity: ERROR
    message: "Role.edit() can fail with missing manage roles permissions or role hierarchy issues. Wrap in try-catch."
    tags: [role, permissions, network]

  - name: Role.delete
    severity: ERROR
    message: "Role.delete() can fail with missing manage roles permissions or role hierarchy issues. Wrap in try-catch."
    tags: [role, permissions, network]
