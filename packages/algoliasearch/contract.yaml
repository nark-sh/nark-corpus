package: algoliasearch
semver: ">=4.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-11"
status: production
evidence_quality: confirmed
coverage_score: 0.65

detection:
  factory_methods:
    - algoliasearch
    - initIndex
  class_names:
    - "SearchClient"
  require_instance_tracking: true
  await_patterns:
    - ".search("
    - ".searchSingleIndex("
    - ".saveObject("
    - ".saveObjects("
    - ".getObject("
    - ".getObjects("
    - ".deleteObject("
    - ".deleteObjects("
    - ".waitForTask("
    - ".waitTask("
    - ".setSettings("
    - ".replaceAllObjects("
    - ".chunkedBatch("
    - ".partialUpdateObject("
    - ".partialUpdateObjects("
    - ".clearObjects("
    - ".searchForFacetValues("
    - ".deleteBy("

functions:
  - name: search
    import_path: "algoliasearch"
    description: >
      Searches one or more Algolia indices. In v4: called on an index object returned by
      client.initIndex(). In v5: called directly on the client as client.search() or
      client.searchSingleIndex(). Throws ApiError on 4xx responses (invalid key,
      index not found, rate limit) and RetryError when all hosts are unreachable.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-algoliasearch-2026-04-11.json
      # Top affected: skillrecordings/egghead-next
      - id: search-no-try-catch
        condition: >
          search() / searchSingleIndex() called in async context without surrounding try/catch.
          Any network failure, invalid API key (401), missing index (404), or rate limit (429)
          results in an unhandled rejected Promise.
        throws: >
          ApiError (status 401/403/404/429) — thrown immediately, not retried.
          RetryError — thrown when all Algolia hosts are unreachable.
        required_handling: >
          Caller MUST wrap search calls in try/catch. Handle at minimum:
          - ApiError for API-level failures (check err.status or err.name === 'ApiError')
          - RetryError / network errors for connectivity failures
          Return a sensible empty result or error response — do NOT crash the request.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: searchSingleIndex
    import_path: "algoliasearch"
    description: >
      v5 method: searches a single index. Equivalent to v4's index.search().
      Throws ApiError and RetryError on failure.

    postconditions:
      - id: searchsingleindex-no-try-catch
        condition: >
          searchSingleIndex() called without surrounding try/catch.
        throws: >
          ApiError on 4xx responses. RetryError when all hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. Same handling as search().
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: saveObject
    import_path: "algoliasearch"
    description: >
      Indexes or updates a single record in an Algolia index. Throws on API or network errors.
      In v4, also throws MissingObjectIDError when object has no objectID and auto-generation
      is disabled.

    postconditions:
      - id: saveobject-no-try-catch
        condition: >
          saveObject() called without surrounding try/catch. Indexing failure (invalid API key,
          insufficient write ACL, malformed record) is silently swallowed.
        throws: >
          ApiError — 401 (invalid key), 403 (missing write ACL), 400 (malformed record).
          RetryError — network failure.
        required_handling: >
          Caller MUST wrap in try/catch. Indexing failures in production apps (webhooks, API
          routes, background jobs) must be logged and optionally retried. Silent failures
          cause search index to diverge from source of truth.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: saveObjects
    import_path: "algoliasearch"
    description: >
      Indexes or updates multiple records. In v4, returns a WaitablePromise — both the
      initial call and the optional .wait() can throw. In v5, returns a Promise directly.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-algoliasearch-2026-04-11.json
      # Top affected: payloadcms/website
      - id: saveobjects-no-try-catch
        condition: >
          saveObjects() called without surrounding try/catch. Batch indexing failure results
          in entire batch failing silently.
        throws: >
          ApiError — 401, 403, 400 (malformed records), 413 (request too large).
          RetryError — network failure.
        required_handling: >
          Caller MUST wrap in try/catch. For large batches, log the failure with batch size
          for debugging. Consider splitting large batches if 413 errors occur.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getObject
    import_path: "algoliasearch"
    description: >
      Retrieves a single record from an Algolia index by objectID. Throws ApiError with
      status 404 if the object does not exist. In v4, may throw ObjectNotFoundError.

    postconditions:
      - id: getobject-no-try-catch
        condition: >
          getObject() called without surrounding try/catch. Object not found (404)
          crashes the caller.
        throws: >
          ApiError with status 404 when object does not exist.
          ApiError with status 401/403 for auth failures.
          RetryError for network failures.
        required_handling: >
          Caller MUST wrap in try/catch. Handle 404 explicitly — the object may have been
          deleted. Return null or a sensible default rather than crashing.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getObjects
    import_path: "algoliasearch"
    description: >
      Retrieves multiple records by objectID. Missing objects do not throw — they return
      null entries in the results array. Other errors (auth, network) do throw.

    postconditions:
      - id: getobjects-no-try-catch
        condition: >
          getObjects() called without surrounding try/catch. Auth failure or network error
          crashes the caller.
        throws: >
          ApiError on auth failures (401/403).
          RetryError on network failures.
        required_handling: >
          Caller MUST wrap in try/catch. Note: missing individual objects return null results,
          not errors. But API/network errors still throw.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteObject
    import_path: "algoliasearch"
    description: >
      Deletes a single record from an Algolia index. Note: deleting a non-existent object
      does NOT throw — Algolia returns success for idempotent deletes.

    postconditions:
      - id: deleteobject-no-try-catch
        condition: >
          deleteObject() called without surrounding try/catch. Auth or network failure
          silently fails, leaving stale data in the search index.
        throws: >
          ApiError on auth failures (401/403) or invalid index (400).
          RetryError on network failures.
        required_handling: >
          Caller MUST wrap in try/catch. Unhandled delete failures leave stale records
          in the search index, causing deleted items to appear in search results.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteObjects
    import_path: "algoliasearch"
    description: >
      Deletes multiple records by objectID. Idempotent for non-existent objects.
      Throws on auth/network errors.

    postconditions:
      - id: deleteobjects-no-try-catch
        condition: >
          deleteObjects() called without surrounding try/catch.
        throws: >
          ApiError on auth failures (401/403).
          RetryError on network failures.
        required_handling: >
          Caller MUST wrap in try/catch. Failed batch deletes leave stale records in index.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: waitForTask
    import_path: "algoliasearch"
    description: >
      v5 method: waits for an async indexing task to complete. Used after write operations
      to ensure data is indexed before proceeding. Can throw if polling fails or task errors.

    postconditions:
      - id: waitfortask-no-try-catch
        condition: >
          waitForTask() called without surrounding try/catch.
        throws: >
          ApiError — task failed or polling encountered an error.
          RetryError — network failure during polling.
        required_handling: >
          Caller MUST wrap in try/catch. Task failures mean data was not indexed.
          Log task ID for debugging.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: setSettings
    import_path: "algoliasearch"
    description: >
      Updates the settings of an Algolia index (searchable attributes, ranking, facets, etc.).
      Throws on auth errors, invalid settings, or network failures.

    postconditions:
      - id: setsettings-no-try-catch
        condition: >
          setSettings() called without surrounding try/catch. Invalid settings or auth
          failure silently leaves index misconfigured.
        throws: >
          ApiError — 400 (invalid settings), 401/403 (auth), 422 (unprocessable entity).
          RetryError — network failure.
        required_handling: >
          Caller MUST wrap in try/catch. Failed settings updates leave the index with
          incorrect search configuration.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: replaceAllObjects
    import_path: "algoliasearch"
    description: >
      v5 method: atomically replaces all objects in an index (using a temporary index
      internally). Long-running operation that can fail at any stage.

    postconditions:
      - id: replaceall-no-try-catch
        condition: >
          replaceAllObjects() called without surrounding try/catch. Partial failure
          during the atomic swap may leave index in inconsistent state.
        throws: >
          ApiError — auth, invalid objects, rate limit.
          RetryError — network failure.
        required_handling: >
          Caller MUST wrap in try/catch. This is a critical operation — partial failure
          can leave the index empty or in an inconsistent state.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: partialUpdateObject
    import_path: "algoliasearch"
    description: >
      Updates specific attributes of a record without replacing the entire document.
      When createIfNotExists=false and the record does not exist, the call silently
      does nothing (no error). When createIfNotExists=true (default), creates the record
      if missing. Requires addObject ACL. Used frequently in SaaS apps to update cached
      search data (e.g. counters, status fields) without full re-index.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-algoliasearch-2026-04-11.json
      # Top affected: payloadcms/website
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/partial-update-objects/
      # Evidence: @algolia/client-search dist/node.d.ts — partialUpdateObject, partialUpdateObjects methods
      # Error hierarchy: AlgoliaError > ErrorWithStackTrace > ApiError; RetryError extends ErrorWithStackTrace
      # ACL: requires addObject; 403 thrown when ACL missing
      - id: partialupdateobject-no-try-catch
        severity: error
        condition: >
          partialUpdateObject() or partialUpdateObjects() called without surrounding
          try/catch. Auth failure or network error crashes the caller. Common in update
          webhooks and background sync jobs.
        throws: >
          ApiError (status 401/403) — invalid or insufficient API key (missing addObject ACL).
          ApiError (status 400) — malformed attributesToUpdate payload.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. Missing addObject ACL returns 403 and will never
          succeed without a key rotation — log the error and alert, do not silently retry.
          Partial update failures leave search data stale (e.g. status field not updated
          after a payment event).
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/partial-update-objects/"

  - name: clearObjects
    import_path: "algoliasearch"
    description: >
      Deletes all records from an index while preserving settings, synonyms, and rules.
      Used in reindex pipelines to clear stale data before bulk re-populating. Requires
      deleteIndex ACL. Resource-intensive and subject to indexing rate limits.
      Documented error codes: 400, 402 (feature not enabled), 403, 404.

    postconditions:
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/clear-index/
      # Documented errors: 400 (bad request), 402 (feature not enabled on plan),
      #   403 (missing deleteIndex ACL), 404 (index not found)
      # Evidence: @algolia/client-search dist/node.d.ts — clearObjects requires deleteIndex ACL
      - id: clearobjects-no-try-catch
        severity: error
        condition: >
          clearObjects() called without surrounding try/catch. Failure during a reindex
          pipeline leaves the index in an inconsistent state — records may be partially
          cleared or not cleared at all.
        throws: >
          ApiError (status 400) — bad request or invalid arguments.
          ApiError (status 402) — feature not enabled on the current Algolia plan.
          ApiError (status 403) — missing deleteIndex ACL on the API key.
          ApiError (status 404) — index does not exist.
          RetryError — all Algolia hosts unreachable during the operation.
        required_handling: >
          Caller MUST wrap in try/catch. A 402 error indicates a plan limitation that
          will never succeed without a plan upgrade — do not retry. A 404 means the index
          was already deleted or never created. In reindex pipelines, failure here means
          the subsequent saveObjects() will add to stale data, not replace it.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/clear-index/"

  - name: searchForFacetValues
    import_path: "algoliasearch"
    description: >
      Searches for values within a specific facet attribute. Used in autocomplete UIs
      to let users search facet values (e.g. search for brand names within a 'brand'
      facet). Requires search ACL. The facet must be configured as a facetable attribute
      in index settings or the call returns no results without an error.

    postconditions:
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/search-for-facet-values/
      # ACL: requires search — same auth error profile as search()
      # 65-facet limit: when exceeded, behavior is degraded (documented limit)
      # Evidence: @algolia/client-search dist/node.d.ts — searchForFacetValues method signature
      - id: searchforfacetvalues-no-try-catch
        severity: error
        condition: >
          searchForFacetValues() called without surrounding try/catch. Auth failure
          or network error crashes the caller. Common in faceted search UIs where
          a failed autocomplete crashes the search page.
        throws: >
          ApiError (status 401/403) — invalid or insufficient API key (missing search ACL).
          ApiError (status 404) — index not found.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. Return empty array on failure rather than
          crashing — facet search failures should degrade gracefully (e.g. show no
          autocomplete suggestions rather than crashing the search UI).
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/search-for-facet-values/"

  - name: deleteBy
    import_path: "algoliasearch"
    description: >
      Deletes all records matching a set of filter criteria. Documented constraint:
      this operation does NOT accept empty filters — an empty filter object causes an
      error. Resource-intensive and subject to indexing rate limits. Requires deleteIndex
      ACL. Often used to remove expired, soft-deleted, or tenant-specific records.

    postconditions:
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/delete-by/
      # Documented: "This operation doesn't accept empty filters" — ApiError on empty filters
      # ACL: requires deleteIndex ACL
      # Evidence: @algolia/client-search dist/node.d.ts — deleteBy JSDoc explicitly states
      #   "This operation doesn't accept empty filters."
      - id: deleteby-no-try-catch
        severity: error
        condition: >
          deleteBy() called without surrounding try/catch. Empty or invalid filters
          cause an ApiError (the operation explicitly rejects empty filters). Network
          errors cause a RetryError.
        throws: >
          ApiError (status 400) — empty filters object passed; the API explicitly rejects
          empty filters to prevent accidental deletion of all records.
          ApiError (status 403) — missing deleteIndex ACL.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch AND validate that filters are non-empty before
          calling. An empty deleteByParams object throws ApiError 400. This is a common
          bug when filter values come from user input or upstream data that can be empty.
        business_impact:
          incident_label: COMPLIANCE_VIOLATION
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/delete-by/"

notes:
  - "algoliasearch uses throw-based error model — NO result-object pattern (unlike resend)"
  - "v4 errors: plain objects with .name property (not instanceof Error)"
  - "v5 errors: proper class hierarchy, instanceof ApiError works"
  - "ApiError.status: 400=bad request, 401=invalid key, 403=missing ACL, 404=not found, 429=rate limit"
  - "RetryError thrown when all Algolia hosts exhausted — check appId configuration"
  - "Constructor does NOT throw — credential errors only surface at first API call"
  - "Deleting non-existent objects is idempotent (no 404 thrown)"
  - "v4 WaitablePromise: both the write operation AND .wait() can throw independently"
  - "clearObjects documented errors: 400, 402 (feature not enabled), 403 (missing deleteIndex ACL), 404"
  - "deleteBy explicitly rejects empty filters — ApiError 400; always validate filters are non-empty"
  - "searchForFacetValues: facet must be configured as facetable attribute in settings or returns empty results (no error)"
