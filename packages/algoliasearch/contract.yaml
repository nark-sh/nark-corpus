# Depth pass 2026-06-24 (deepen-stream-2 pass 76):
# API surface re-enumerated against @algolia/client-search@5.55.1 dist/node.d.ts (the
# actual published declaration file). The SearchClient instance exposes ~76 Promise-returning
# methods total, but the contractually-meaningful surface — i.e. methods a typical Algolia
# customer calls from app code rather than admin tooling — is the data-path subset of ~28
# methods. The remaining ~48 methods are admin operations (API key CRUD, user-ID mapping,
# cluster mgmt, dictionary entries, sources/IP allowlist, custom HTTP passthrough) used by
# devops / control-plane tooling, not by SaaS request handlers — out-of-scope for the
# data-path error contract.
#
# Data-path surface count: 28 async-callable functions
# Contracted before pass 76: 20  (coverage_score: 0.87 on 23-method historical count)
# Contracted after pass 76:  25  (+5 this pass: batch, multipleBatch, browse, browseObjects, operationIndex)
# Omitted from data-path: 3 (searchForHits/searchForFacets — thin wrappers over search();
#                            saveObjectsWithTransformation already contracted covers
#                            partialUpdateObjectsWithTransformation /
#                            replaceAllObjectsWithTransformation — same configuration-error
#                            profile)
# Coverage: 25/28 = 0.89 (effective contracted / non-omitted = 25/25 = 1.0)
#
# Evidence sources confirmed from:
#   @algolia/client-search@5.55.1/dist/node.d.ts — full method signature enumeration (76 Promise methods)
#   @algolia/client-search/dist/src/searchClient.js — indexExists, waitForAppTask, addOrUpdateObject source
#   algoliasearch/dist/node.js — saveObjectsWithTransformation configuration error
#   @algolia/client-common/dist/common.d.ts — error class hierarchy (ApiError, RetryError, AlgoliaError)
#   https://www.algolia.com/doc/rest-api/search/batch — HTTP error codes confirmed
#   https://www.algolia.com/doc/rest-api/search/multiple-batch — HTTP error codes confirmed
#   https://www.algolia.com/doc/rest-api/search/browse — HTTP error codes confirmed
#   https://www.algolia.com/doc/api-reference/api-methods/copy-index/ — operationIndex constraints
#   https://www.algolia.com/doc/rest-api/search/add-or-update-object — HTTP error codes confirmed
#   https://www.algolia.com/doc/rest-api/search/partial-update-object — HTTP error codes confirmed
package: algoliasearch
semver: ">=4.0.0 <6.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.89  # 25 contracted / 28 data-path async-callable (3 intentionally omitted; ~48 admin methods out of scope)

detection:
  factory_methods:
    - algoliasearch
    - initIndex
  class_names:
    - "SearchClient"
  require_instance_tracking: true
  await_patterns:
    - ".search("
    - ".searchSingleIndex("
    - ".saveObject("
    - ".saveObjects("
    - ".getObject("
    - ".getObjects("
    - ".deleteObject("
    - ".deleteObjects("
    - ".waitForTask("
    - ".waitTask("
    - ".waitForAppTask("
    - ".setSettings("
    - ".replaceAllObjects("
    - ".chunkedBatch("
    - ".partialUpdateObject("
    - ".partialUpdateObjects("
    - ".clearObjects("
    - ".searchForFacetValues("
    - ".deleteBy("
    - ".addOrUpdateObject("
    - ".indexExists("
    - ".saveObjectsWithTransformation("
    - ".partialUpdateObjectsWithTransformation("
    - ".replaceAllObjectsWithTransformation("
    - ".batch("
    - ".multipleBatch("
    - ".browse("
    - ".browseObjects("
    - ".operationIndex("

functions:
  - name: search
    import_path: "algoliasearch"
    description: >
      Searches one or more Algolia indices. In v4: called on an index object returned by
      client.initIndex(). In v5: called directly on the client as client.search() or
      client.searchSingleIndex(). Throws ApiError on 4xx responses (invalid key,
      index not found, rate limit) and RetryError when all hosts are unreachable.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-algoliasearch-2026-04-11.json
      # Top affected: skillrecordings/egghead-next
      - id: search-no-try-catch
        condition: >
          search() / searchSingleIndex() called in async context without surrounding try/catch.
          Any network failure, invalid API key (401), missing index (404), or rate limit (429)
          results in an unhandled rejected Promise.
        throws: >
          ApiError (status 401/403/404/429) — thrown immediately, not retried.
          RetryError — thrown when all Algolia hosts are unreachable.
        required_handling: >
          Caller MUST wrap search calls in try/catch. Handle at minimum:
          - ApiError for API-level failures (check err.status or err.name === 'ApiError')
          - RetryError / network errors for connectivity failures
          Return a sensible empty result or error response — do NOT crash the request.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: searchSingleIndex
    import_path: "algoliasearch"
    description: >
      v5 method: searches a single index. Equivalent to v4's index.search().
      Throws ApiError and RetryError on failure.

    postconditions:
      - id: searchsingleindex-no-try-catch
        condition: >
          searchSingleIndex() called without surrounding try/catch.
        throws: >
          ApiError on 4xx responses. RetryError when all hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. Same handling as search().
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: saveObject
    import_path: "algoliasearch"
    description: >
      Indexes or updates a single record in an Algolia index. Throws on API or network errors.
      In v4, also throws MissingObjectIDError when object has no objectID and auto-generation
      is disabled.

    postconditions:
      - id: saveobject-no-try-catch
        condition: >
          saveObject() called without surrounding try/catch. Indexing failure (invalid API key,
          insufficient write ACL, malformed record) is silently swallowed.
        throws: >
          ApiError — 401 (invalid key), 403 (missing write ACL), 400 (malformed record).
          RetryError — network failure.
        required_handling: >
          Caller MUST wrap in try/catch. Indexing failures in production apps (webhooks, API
          routes, background jobs) must be logged and optionally retried. Silent failures
          cause search index to diverge from source of truth.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: saveObjects
    import_path: "algoliasearch"
    description: >
      Indexes or updates multiple records. In v4, returns a WaitablePromise — both the
      initial call and the optional .wait() can throw. In v5, returns a Promise directly.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-algoliasearch-2026-04-11.json
      # Top affected: payloadcms/website
      - id: saveobjects-no-try-catch
        condition: >
          saveObjects() called without surrounding try/catch. Batch indexing failure results
          in entire batch failing silently.
        throws: >
          ApiError — 401, 403, 400 (malformed records), 413 (request too large).
          RetryError — network failure.
        required_handling: >
          Caller MUST wrap in try/catch. For large batches, log the failure with batch size
          for debugging. Consider splitting large batches if 413 errors occur.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getObject
    import_path: "algoliasearch"
    description: >
      Retrieves a single record from an Algolia index by objectID. Throws ApiError with
      status 404 if the object does not exist. In v4, may throw ObjectNotFoundError.

    postconditions:
      - id: getobject-no-try-catch
        condition: >
          getObject() called without surrounding try/catch. Object not found (404)
          crashes the caller.
        throws: >
          ApiError with status 404 when object does not exist.
          ApiError with status 401/403 for auth failures.
          RetryError for network failures.
        required_handling: >
          Caller MUST wrap in try/catch. Handle 404 explicitly — the object may have been
          deleted. Return null or a sensible default rather than crashing.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getObjects
    import_path: "algoliasearch"
    description: >
      Retrieves multiple records by objectID. Missing objects do not throw — they return
      null entries in the results array. Other errors (auth, network) do throw.

    postconditions:
      - id: getobjects-no-try-catch
        condition: >
          getObjects() called without surrounding try/catch. Auth failure or network error
          crashes the caller.
        throws: >
          ApiError on auth failures (401/403).
          RetryError on network failures.
        required_handling: >
          Caller MUST wrap in try/catch. Note: missing individual objects return null results,
          not errors. But API/network errors still throw.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteObject
    import_path: "algoliasearch"
    description: >
      Deletes a single record from an Algolia index. Note: deleting a non-existent object
      does NOT throw — Algolia returns success for idempotent deletes.

    postconditions:
      - id: deleteobject-no-try-catch
        condition: >
          deleteObject() called without surrounding try/catch. Auth or network failure
          silently fails, leaving stale data in the search index.
        throws: >
          ApiError on auth failures (401/403) or invalid index (400).
          RetryError on network failures.
        required_handling: >
          Caller MUST wrap in try/catch. Unhandled delete failures leave stale records
          in the search index, causing deleted items to appear in search results.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteObjects
    import_path: "algoliasearch"
    description: >
      Deletes multiple records by objectID. Idempotent for non-existent objects.
      Throws on auth/network errors.

    postconditions:
      - id: deleteobjects-no-try-catch
        condition: >
          deleteObjects() called without surrounding try/catch.
        throws: >
          ApiError on auth failures (401/403).
          RetryError on network failures.
        required_handling: >
          Caller MUST wrap in try/catch. Failed batch deletes leave stale records in index.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: waitForTask
    import_path: "algoliasearch"
    description: >
      v5 method: waits for an async indexing task to complete. Used after write operations
      to ensure data is indexed before proceeding. Can throw if polling fails or task errors.

    postconditions:
      - id: waitfortask-no-try-catch
        condition: >
          waitForTask() called without surrounding try/catch.
        throws: >
          ApiError — task failed or polling encountered an error.
          RetryError — network failure during polling.
        required_handling: >
          Caller MUST wrap in try/catch. Task failures mean data was not indexed.
          Log task ID for debugging.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: setSettings
    import_path: "algoliasearch"
    description: >
      Updates the settings of an Algolia index (searchable attributes, ranking, facets, etc.).
      Throws on auth errors, invalid settings, or network failures.

    postconditions:
      - id: setsettings-no-try-catch
        condition: >
          setSettings() called without surrounding try/catch. Invalid settings or auth
          failure silently leaves index misconfigured.
        throws: >
          ApiError — 400 (invalid settings), 401/403 (auth), 422 (unprocessable entity).
          RetryError — network failure.
        required_handling: >
          Caller MUST wrap in try/catch. Failed settings updates leave the index with
          incorrect search configuration.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: replaceAllObjects
    import_path: "algoliasearch"
    description: >
      v5 method: atomically replaces all objects in an index (using a temporary index
      internally). Long-running operation that can fail at any stage.

    postconditions:
      - id: replaceall-no-try-catch
        condition: >
          replaceAllObjects() called without surrounding try/catch. Partial failure
          during the atomic swap may leave index in inconsistent state.
        throws: >
          ApiError — auth, invalid objects, rate limit.
          RetryError — network failure.
        required_handling: >
          Caller MUST wrap in try/catch. This is a critical operation — partial failure
          can leave the index empty or in an inconsistent state.
        sources:
          - "https://www.algolia.com/doc/api-client/advanced/handling-errors/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: partialUpdateObject
    import_path: "algoliasearch"
    description: >
      Updates specific attributes of a record without replacing the entire document.
      When createIfNotExists=false and the record does not exist, the call silently
      does nothing (no error). When createIfNotExists=true (default), creates the record
      if missing. Requires addObject ACL. Used frequently in SaaS apps to update cached
      search data (e.g. counters, status fields) without full re-index.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-algoliasearch-2026-04-11.json
      # Top affected: payloadcms/website
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/partial-update-objects/
      # Evidence: @algolia/client-search dist/node.d.ts — partialUpdateObject, partialUpdateObjects methods
      # Error hierarchy: AlgoliaError > ErrorWithStackTrace > ApiError; RetryError extends ErrorWithStackTrace
      # ACL: requires addObject; 403 thrown when ACL missing
      - id: partialupdateobject-no-try-catch
        severity: error
        condition: >
          partialUpdateObject() or partialUpdateObjects() called without surrounding
          try/catch. Auth failure or network error crashes the caller. Common in update
          webhooks and background sync jobs.
        throws: >
          ApiError (status 401/403) — invalid or insufficient API key (missing addObject ACL).
          ApiError (status 400) — malformed attributesToUpdate payload.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. Missing addObject ACL returns 403 and will never
          succeed without a key rotation — log the error and alert, do not silently retry.
          Partial update failures leave search data stale (e.g. status field not updated
          after a payment event).
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/partial-update-objects/"

  - name: clearObjects
    import_path: "algoliasearch"
    description: >
      Deletes all records from an index while preserving settings, synonyms, and rules.
      Used in reindex pipelines to clear stale data before bulk re-populating. Requires
      deleteIndex ACL. Resource-intensive and subject to indexing rate limits.
      Documented error codes: 400, 402 (feature not enabled), 403, 404.

    postconditions:
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/clear-index/
      # Documented errors: 400 (bad request), 402 (feature not enabled on plan),
      #   403 (missing deleteIndex ACL), 404 (index not found)
      # Evidence: @algolia/client-search dist/node.d.ts — clearObjects requires deleteIndex ACL
      - id: clearobjects-no-try-catch
        severity: error
        condition: >
          clearObjects() called without surrounding try/catch. Failure during a reindex
          pipeline leaves the index in an inconsistent state — records may be partially
          cleared or not cleared at all.
        throws: >
          ApiError (status 400) — bad request or invalid arguments.
          ApiError (status 402) — feature not enabled on the current Algolia plan.
          ApiError (status 403) — missing deleteIndex ACL on the API key.
          ApiError (status 404) — index does not exist.
          RetryError — all Algolia hosts unreachable during the operation.
        required_handling: >
          Caller MUST wrap in try/catch. A 402 error indicates a plan limitation that
          will never succeed without a plan upgrade — do not retry. A 404 means the index
          was already deleted or never created. In reindex pipelines, failure here means
          the subsequent saveObjects() will add to stale data, not replace it.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/clear-index/"

  - name: searchForFacetValues
    import_path: "algoliasearch"
    description: >
      Searches for values within a specific facet attribute. Used in autocomplete UIs
      to let users search facet values (e.g. search for brand names within a 'brand'
      facet). Requires search ACL. The facet must be configured as a facetable attribute
      in index settings or the call returns no results without an error.

    postconditions:
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/search-for-facet-values/
      # ACL: requires search — same auth error profile as search()
      # 65-facet limit: when exceeded, behavior is degraded (documented limit)
      # Evidence: @algolia/client-search dist/node.d.ts — searchForFacetValues method signature
      - id: searchforfacetvalues-no-try-catch
        severity: error
        condition: >
          searchForFacetValues() called without surrounding try/catch. Auth failure
          or network error crashes the caller. Common in faceted search UIs where
          a failed autocomplete crashes the search page.
        throws: >
          ApiError (status 401/403) — invalid or insufficient API key (missing search ACL).
          ApiError (status 404) — index not found.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. Return empty array on failure rather than
          crashing — facet search failures should degrade gracefully (e.g. show no
          autocomplete suggestions rather than crashing the search UI).
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/search-for-facet-values/"

  - name: deleteBy
    import_path: "algoliasearch"
    description: >
      Deletes all records matching a set of filter criteria. Documented constraint:
      this operation does NOT accept empty filters — an empty filter object causes an
      error. Resource-intensive and subject to indexing rate limits. Requires deleteIndex
      ACL. Often used to remove expired, soft-deleted, or tenant-specific records.

    postconditions:
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/delete-by/
      # Documented: "This operation doesn't accept empty filters" — ApiError on empty filters
      # ACL: requires deleteIndex ACL
      # Evidence: @algolia/client-search dist/node.d.ts — deleteBy JSDoc explicitly states
      #   "This operation doesn't accept empty filters."
      - id: deleteby-no-try-catch
        severity: error
        condition: >
          deleteBy() called without surrounding try/catch. Empty or invalid filters
          cause an ApiError (the operation explicitly rejects empty filters). Network
          errors cause a RetryError.
        throws: >
          ApiError (status 400) — empty filters object passed; the API explicitly rejects
          empty filters to prevent accidental deletion of all records.
          ApiError (status 403) — missing deleteIndex ACL.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch AND validate that filters are non-empty before
          calling. An empty deleteByParams object throws ApiError 400. This is a common
          bug when filter values come from user input or upstream data that can be empty.
        business_impact:
          incident_label: COMPLIANCE_VIOLATION
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/delete-by/"

  - name: partialUpdateObjects
    import_path: "algoliasearch"
    description: >
      v5 helper: Updates specific attributes across multiple records in batches. Internally
      calls chunkedBatch() with action "partialUpdateObject" (createIfNotExists=true, default)
      or "partialUpdateObjectNoCreate" (createIfNotExists=false). When createIfNotExists=false
      and an object does not exist, the batch still succeeds but the missing object is silently
      skipped — no error, no indication in the response. Requires addObject ACL.
      Distinct from partialUpdateObject (singular, single-record PUT).

    postconditions:
      # Evidence: https://www.algolia.com/doc/rest-api/search/partial-update-object
      # Documented HTTP errors: 400 (bad request), 402 (feature not enabled), 403 (missing addObject ACL), 404 (index not found)
      # Confirmed from @algolia/client-search/dist/src/searchClient.js:
      #   partialUpdateObjects() calls chunkedBatch() → batch() → transporter.request()
      #   createIfNotExists=false uses "partialUpdateObjectNoCreate" action
      #   Missing objects with partialUpdateObjectNoCreate: silently skipped (no error in BatchResponse)
      - id: partialupdateobjects-no-try-catch
        severity: error
        condition: >
          partialUpdateObjects() called without surrounding try/catch. Common in webhook handlers
          and background sync jobs that update many records (e.g. update search data after
          bulk database events). Auth failure, invalid payload, or rate limits cause all batches
          to fail silently.
        throws: >
          ApiError (status 400) — malformed attributesToUpdate payload.
          ApiError (status 402) — feature not enabled on the current Algolia plan.
          ApiError (status 403) — missing addObject ACL on the API key.
          ApiError (status 404) — index not found.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. For large batch updates, log the object count and
          batch size for debugging. If createIfNotExists=false is used, the response does not
          indicate how many objects were skipped — callers cannot distinguish "updated" from
          "silently skipped" without separate verification.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/rest-api/search/partial-update-object"

      # Evidence: Confirmed from @algolia/client-search/dist/src/searchClient.js
      #   partialUpdateObjects({ createIfNotExists: false }) sends "partialUpdateObjectNoCreate" action
      #   The batch response contains BatchResponse[] — no error field, no count of skipped objects
      #   Missing objects are silently ignored — update does not happen, no signal to caller
      - id: partialupdateobjects-silent-skip-on-missing
        severity: warning
        condition: >
          partialUpdateObjects() is called with createIfNotExists=false (or the default createIfNotExists=true
          is intended to update existing records only), but the objectIDs in the batch do not
          exist in the index. With createIfNotExists=false, missing objects are silently skipped —
          the response is a success (BatchResponse[]) with no indication that objects were not found.
          With createIfNotExists=true (default), missing objects are CREATED, which may also be
          unexpected if the intent was to update-only.
        throws: >
          Does not throw. Returns BatchResponse[] even when all objects were missing.
          No error, no per-object status in the response.
        required_handling: >
          When updating specific records, verify their existence with getObject() or getObjects()
          before calling partialUpdateObjects() if missing-object silencing is unacceptable.
          Or use saveObjects() (which always creates/replaces) when object existence is uncertain.
          If using createIfNotExists=false for "update-only" semantics, log and monitor the case
          where no updates are expected but the call succeeds — silent skips are invisible.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/rest-api/search/partial-update-object"

  - name: addOrUpdateObject
    import_path: "algoliasearch"
    description: >
      v5 method: Upserts a record in the index using a specific objectID. If a record with the
      given objectID exists, it is completely replaced. If it does not exist, it is created.
      Distinct from saveObject (which auto-generates objectID if not provided) and
      partialUpdateObject (which only updates specific attributes). Requires addObject ACL.
      Throws native Error (before network request) if indexName, objectID, or body is missing.

    postconditions:
      # Evidence: https://www.algolia.com/doc/rest-api/search/add-or-update-object
      # Documented HTTP errors: 400 (bad request), 402 (feature not enabled), 403 (missing addObject ACL), 404 (index not found)
      # Confirmed from @algolia/client-search/dist/src/searchClient.js lines 571-577:
      #   throw new Error("Parameter `indexName` is required when calling `addOrUpdateObject`.")
      #   throw new Error("Parameter `objectID` is required when calling `addOrUpdateObject`.")
      #   throw new Error("Parameter `body` is required when calling `addOrUpdateObject`.")
      #   These are synchronous native Error throws BEFORE the network request.
      - id: addorupdateobject-no-try-catch
        severity: error
        condition: >
          addOrUpdateObject() called without surrounding try/catch. Throws synchronous native Error
          if required parameters (indexName, objectID, body) are missing. Also throws ApiError on
          API failures and RetryError on network failures. Common in data synchronization flows
          where external data is mapped to Algolia records by a known objectID (e.g. database ID).
        throws: >
          Error (native, synchronous) — if indexName, objectID, or body is missing/falsy.
          ApiError (status 400) — malformed record body.
          ApiError (status 402) — feature not enabled on plan.
          ApiError (status 403) — missing addObject ACL on the API key.
          ApiError (status 404) — index not found.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. Handle both synchronous parameter validation errors
          (native Error) and asynchronous API errors (ApiError, RetryError). This method
          REPLACES the entire record — ensure the body contains all desired attributes,
          not just the ones being updated (use partialUpdateObject for partial updates).
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/rest-api/search/add-or-update-object"

  - name: indexExists
    import_path: "algoliasearch"
    description: >
      v5 helper: Checks whether an index exists. Returns true if the index exists, false if
      it does not (catches 404 internally). DOES NOT throw on 404. However, it DOES throw
      on auth failures (401/403) and network errors. Callers often assume this method is
      "safe" and omit try/catch, but credential and network failures still propagate.
      Internally calls getSettings() and catches ApiError with status 404.

    postconditions:
      # Evidence: Confirmed from @algolia/client-search/dist/src/searchClient.js:
      #   async indexExists({ indexName }) {
      #     try {
      #       await this.getSettings({ indexName });
      #     } catch (error) {
      #       if (error instanceof ApiError && error.status === 404) { return false; }
      #       throw error;  // ← rethrows non-404 errors including 401, 403, RetryError
      #     }
      #     return true;
      #   }
      - id: indexexists-auth-network-throw
        severity: error
        condition: >
          indexExists() called without surrounding try/catch. Callers commonly omit try/catch
          because the method "returns a boolean" and feels safe. But 401 (invalid API key),
          403 (missing search ACL), and RetryError (network failure) still throw — they are
          not caught internally. Only 404 is caught and converted to false. This is a
          common false-safety assumption.
        throws: >
          ApiError (status 401) — invalid API key.
          ApiError (status 403) — missing search ACL on the API key.
          RetryError — all Algolia hosts unreachable.
          Note: ApiError (status 404) is caught internally and returned as false.
        required_handling: >
          Caller MUST wrap in try/catch even though the method returns a boolean.
          The 404 case is safe (returns false), but auth and network failures still throw:

            try {
              const exists = await client.indexExists({ indexName });
              if (!exists) {
                // Index needs to be created
              }
            } catch (error) {
              if (error instanceof ApiError) {
                console.error('Auth or API error checking index:', error.status, error.message);
              }
              throw error;
            }
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/libraries/javascript/v5/methods/search/"

  - name: waitForAppTask
    import_path: "algoliasearch"
    description: >
      v5 helper: Polls the app-level task status until it reaches "published" state.
      Similar to waitForTask() but for tasks that operate at the application level (not
      index level). Used after operations like dictionary batch updates. Polls with
      exponential backoff (starts at 200ms, max 5000ms per retry). Throws when maxRetries
      (default 50) is exhausted.

    postconditions:
      # Evidence: Confirmed from @algolia/client-search/dist/src/searchClient.js:
      #   error: {
      #     validate: () => retryCount >= maxRetries,
      #     message: () => `The maximum number of retries exceeded. (${retryCount}/${maxRetries})`
      #   }
      # Error is thrown via createIterablePromise which throws native Error (not ApiError).
      - id: waitforapptask-max-retries-exceeded
        severity: error
        condition: >
          waitForAppTask() called without surrounding try/catch. If the app-level task does not
          reach "published" status within maxRetries attempts (default 50 retries × up to 5000ms
          per retry = ~4 minutes total), throws an Error with "The maximum number of retries
          exceeded." This is a native Error, not an ApiError or RetryError.
          Also throws if getAppTask() polling encounters an API or network error.
        throws: >
          Error (native) — "The maximum number of retries exceeded. (50/50)" when polling
          exhausted without task completion.
          ApiError — if getAppTask() returns an API error during polling.
          RetryError — if all Algolia hosts unreachable during polling.
        required_handling: >
          Caller MUST wrap in try/catch. Handle both the timeout Error and API errors:

            try {
              await client.waitForAppTask({ taskID: response.taskID });
            } catch (error) {
              if (error.message?.includes('maximum number of retries')) {
                console.error('App task timed out — check Algolia dashboard:', taskID);
              } else if (error instanceof ApiError) {
                console.error('API error while waiting for task:', error.status);
              }
              throw error;
            }

          To extend the timeout, pass maxRetries or a custom timeout function:
            waitForAppTask({ taskID, maxRetries: 100 })
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/libraries/javascript/v5/methods/search/"

  - name: saveObjectsWithTransformation
    import_path: "algoliasearch"
    description: >
      v5 method (on Algoliasearch, not SearchClient): Saves objects through the Algolia
      Push connector Transformation pipeline. Requires a Push connector to be configured
      in the Algolia dashboard AND the transformation.region option to be passed when
      creating the client. Throws synchronous native Error (not ApiError) when the
      transformation.region was not provided at client initialization. Also throws WatchResponse
      errors from the Ingestion API on pipeline failures.

    postconditions:
      # Evidence: Confirmed from algoliasearch/dist/node.js:
      #   if (!ingestionTransporter) {
      #     throw new Error("`transformation.region` must be provided at client instantiation before calling this method.");
      #   }
      #   if (!(options?.transformation?.region)) {
      #     throw new Error("`region` must be provided when leveraging the transformation pipeline");
      #   }
      - id: saveobjectswithtransformation-missing-region
        severity: error
        condition: >
          saveObjectsWithTransformation() called when the Algoliasearch client was initialized
          WITHOUT the transformation.region option. This is a configuration error — the client
          must be initialized as:
            algoliasearch(appId, apiKey, { transformation: { region: 'eu' } })
          Calling saveObjectsWithTransformation() on a client without transformation.region
          throws synchronously (before any network request). This is distinct from the normal
          SearchClient — only the full Algoliasearch client has this method.
        throws: >
          Error (native, synchronous) — "`transformation.region` must be provided at client
          instantiation before calling this method." or "`region` must be provided when
          leveraging the transformation pipeline".
        required_handling: >
          Ensure the Algoliasearch client is initialized with transformation.region before
          calling this method. Wrap in try/catch to handle both configuration errors and
          Ingestion API (WatchResponse) errors from the pipeline:

            const client = algoliasearch(appId, apiKey, {
              transformation: { region: 'eu' }
            });
            try {
              await client.saveObjectsWithTransformation({ indexName, objects });
            } catch (error) {
              console.error('Transformation pipeline error:', error.message);
              throw error;
            }
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/guides/sending-and-managing-data/send-and-update-your-data/connectors/push/"

  - name: batch
    import_path: "algoliasearch"
    description: >
      v5 method: Adds, updates, or deletes records in a SINGLE index using a single API request.
      Actions are applied in the order specified and are equivalent to individual API requests of the
      same name (addObject, updateObject, partialUpdateObject, deleteObject, etc.). Subject to indexing
      rate limits. Requires addObject ACL. Distinct from the higher-level saveObjects/deleteObjects
      helpers — batch() is the raw single-index batch endpoint and does NOT chunk automatically; the
      caller is responsible for keeping payload size under Algolia's request limits.

    postconditions:
      # Evidence: https://www.algolia.com/doc/rest-api/search/batch
      # Documented HTTP errors: 400 (bad request), 402 (feature not enabled), 403 (missing addObject ACL), 404 (index not found)
      # Confirmed from @algolia/client-search@5.55.1/dist/node.d.ts line 3496:
      #   batch({ indexName, batchWriteParams }: BatchProps, requestOptions?: RequestOptions): Promise<BatchResponse>;
      # JSDoc explicitly states "This operation is subject to indexing rate limits"
      - id: batch-no-try-catch
        severity: error
        condition: >
          batch() called without surrounding try/catch. Auth failure, malformed batch payload, or rate
          limit causes the entire batch to fail. Common in custom indexing pipelines that bypass the
          saveObjects helper to control action ordering (e.g. mixed addObject + deleteObject sequences
          for atomic-ish reindex flows).
        throws: >
          ApiError (status 400) — malformed batch payload (invalid action, missing objectID for
          delete/partial update actions, payload exceeds Algolia size limits).
          ApiError (status 402) — feature not enabled on the current Algolia plan.
          ApiError (status 403) — missing addObject ACL on the API key.
          ApiError (status 404) — index not found.
          ApiError (status 429) — indexing rate limit exceeded.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. Unlike saveObjects/deleteObjects, batch() does NOT chunk —
          a single oversized request fails atomically. Log the action count and total payload size for
          debugging. 429 errors indicate the pipeline is exceeding indexing limits; back off and retry
          with exponential delay rather than re-firing immediately.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/rest-api/search/batch"

  - name: multipleBatch
    import_path: "algoliasearch"
    description: >
      v5 method: Adds, updates, or deletes records across MULTIPLE indices using a single API request.
      Each entry in the request specifies its own indexName, so a single call can write to many indices
      atomically from the network round-trip standpoint (though each index's writes are still queued
      independently on the Algolia side). Subject to indexing rate limits. Requires addObject ACL.
      Used in multi-tenant SaaS apps that maintain per-tenant indices and need to fan out a single
      domain event (e.g. user update) to every affected index.

    postconditions:
      # Evidence: https://www.algolia.com/doc/rest-api/search/multiple-batch
      # Documented HTTP errors: 400 (bad request), 402 (feature not enabled), 403 (missing addObject ACL), 404 (index not found)
      # Confirmed from @algolia/client-search@5.55.1/dist/node.d.ts line 3882:
      #   multipleBatch(batchParams: BatchParams, requestOptions?: RequestOptions): Promise<MultipleBatchResponse>;
      - id: multiplebatch-no-try-catch
        severity: error
        condition: >
          multipleBatch() called without surrounding try/catch. Failure of the entire multi-index batch
          (auth failure, any single 404 for a missing target index, malformed request) leaves the
          caller with no record of which indices were partially written. Common in multi-tenant fan-out
          flows where a missing tenant index causes the entire batch to fail and ALL tenants lose the
          update, not just the missing one.
        throws: >
          ApiError (status 400) — malformed batch payload across any of the target indices.
          ApiError (status 402) — feature not enabled on the current Algolia plan.
          ApiError (status 403) — missing addObject ACL on the API key.
          ApiError (status 404) — at least one referenced index does not exist; the entire batch fails.
          ApiError (status 429) — indexing rate limit exceeded.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. On 404, identify which referenced index is missing (the error
          message includes the index name) and decide whether to create-on-the-fly or skip. On 429,
          consider splitting the batch into per-index calls so a single hot index doesn't block writes
          to cold indices. Log the full list of target indices on every failure — silent failure here
          means an entire fan-out of tenant indices silently diverged from source of truth.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/rest-api/search/multiple-batch"

  - name: browse
    import_path: "algoliasearch"
    description: >
      v5 method: Retrieves records from an index, up to 1,000 per request, returning matching records
      WITHOUT search ranking. Used to export indices, iterate over all records for migration, or build
      offline derivatives of the index. Distinct from search() — browse() does not collect analytics,
      ignores many search-specific parameters, and returns a cursor for pagination. Requires browse
      ACL (separate from search ACL — a search-only key cannot browse).

    postconditions:
      # Evidence: https://www.algolia.com/doc/rest-api/search/browse
      # Documented HTTP errors: 400 (bad request), 402 (feature not enabled), 403 (missing browse ACL), 404 (index not found)
      # Confirmed from @algolia/client-search@5.55.1/dist/node.d.ts line 3531:
      #   browse<T>({ indexName, browseParams }: BrowseProps, requestOptions?: RequestOptions): Promise<BrowseResponse<T>>;
      # JSDoc: "Required API Key ACLs: browse"
      - id: browse-no-try-catch
        severity: error
        condition: >
          browse() called without surrounding try/catch. Common in export and migration scripts that
          assume a long-running operation will complete cleanly. Auth failure (missing browse ACL on
          the key — distinct from search ACL) and network errors crash mid-export, leaving partial
          state. Cursor-driven pagination loops that don't handle errors leak into infinite loops or
          unhandled rejections.
        throws: >
          ApiError (status 400) — malformed browse parameters.
          ApiError (status 402) — feature not enabled on the current Algolia plan.
          ApiError (status 403) — missing browse ACL on the API key (distinct from search ACL).
          ApiError (status 404) — index not found.
          RetryError — all Algolia hosts unreachable.
        required_handling: >
          Caller MUST wrap in try/catch. In paginated export loops, persist the last successful cursor
          to disk or state store so failed exports can resume rather than restart. Document the ACL
          requirement explicitly — a key with search but not browse will throw 403 at the first call,
          which is confusing if the developer assumed search-able implies browse-able.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/rest-api/search/browse"

  - name: browseObjects
    import_path: "algoliasearch"
    description: >
      v5 helper: Iteratively calls browse() to retrieve ALL records in an index by following the cursor
      across pages. Calls the user-supplied aggregator callback after each batch and stops when the
      validate callback returns true (default: stops when no cursor is returned, i.e. last page).
      Convenient wrapper around browse() for full-index exports. Any error during ANY page of the
      iteration propagates — there is no built-in retry across pages.

    postconditions:
      # Evidence: Confirmed from @algolia/client-search@5.55.1/dist/node.d.ts line 3327:
      #   browseObjects<T>({ indexName, browseParams, ...browseObjectsOptions }: BrowseOptions<BrowseResponse<T>> & BrowseProps, requestOptions?: RequestOptions | undefined): Promise<BrowseResponse<T>>;
      # JSDoc: "Helper: Iterate on the browse method of the client to allow aggregating objects of an index."
      # The helper wraps browse() in a createIterablePromise loop — every page makes a fresh browse() call,
      # any of which can throw. The aggregator callback is invoked synchronously after each successful page;
      # if it throws, the iteration rejects with the user's error.
      - id: browseobjects-no-try-catch
        severity: error
        condition: >
          browseObjects() called without surrounding try/catch. A single page failure (auth flake,
          transient 5xx, network drop) aborts the entire iteration. The user-supplied aggregator
          callback is invoked synchronously inside the iteration — if the callback throws, that throw
          propagates as the iteration's rejection, masking whatever progress the aggregator already made.
          Common in full-index export and reindex pipelines where the cost of a mid-export failure is
          a hung migration or partially-written destination.
        throws: >
          ApiError (status 400/402/403/404) — same conditions as browse(), but on ANY page of the
          iteration. A 403 on page 17 of an export looks identical to a 403 on page 1 from the
          caller's perspective.
          ApiError (status 429) — indexing/query rate limit exceeded mid-export.
          RetryError — all Algolia hosts unreachable during any page.
          User-thrown Error — anything the aggregator callback throws propagates out of browseObjects().
        required_handling: >
          Caller MUST wrap in try/catch. For long-running exports, capture the last-seen cursor inside
          the aggregator so a failed iteration can resume from where it stopped rather than restart at
          page 1. Defensive: validate the aggregator does not throw on adversarial record shapes —
          a single malformed record can otherwise abort a 100k-record export.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/libraries/javascript/v5/methods/search/"

  - name: operationIndex
    import_path: "algoliasearch"
    description: >
      v5 method: Copies or moves (renames) an index within the same Algolia application. Resource-intensive
      operation that can take minutes to complete; subject to indexing rate limits. Existing destination
      indices are overwritten (except their analytics data). Copy does NOT include enableReRanking, mode,
      and replicas settings. Cannot copy to a destination index that already has replicas. Requires
      addObject ACL on the API key. Returns a taskID — the caller should typically follow up with
      waitForTask() to ensure the operation actually completed before assuming the destination is ready.

    postconditions:
      # Evidence: https://www.algolia.com/doc/api-reference/api-methods/copy-index/
      # Confirmed from @algolia/client-search@5.55.1/dist/node.d.ts line 3893:
      #   operationIndex({ indexName, operationIndexParams }: OperationIndexProps, requestOptions?: RequestOptions): Promise<UpdatedAtResponse>;
      # JSDoc constraints: "You can't copy to a destination index that already has replicas",
      #   "Be aware of the size limits", "operation is subject to indexing rate limits"
      - id: operationindex-no-try-catch
        severity: error
        condition: >
          operationIndex() called without surrounding try/catch. Common in blue/green index swap flows
          (build new-index, copy old-index settings/rules onto it, atomic swap). A failure mid-copy
          leaves the destination in a partial state — the destination's records may already be
          overwritten with zero rows from a missing source while settings remain from the previous
          contents. The follow-up waitForTask() call also needs error handling (covered by waitForTask
          postcondition) — but the initial operationIndex() throw is a distinct failure mode.
        throws: >
          ApiError (status 400) — invalid operation params, copying to a destination that already has
          replicas, or attempting to copy disallowed settings (enableReRanking, mode, replicas).
          ApiError (status 402) — feature not enabled on the current Algolia plan.
          ApiError (status 403) — missing addObject ACL on the API key.
          ApiError (status 404) — source index does not exist.
          ApiError (status 429) — indexing rate limit exceeded.
          RetryError — all Algolia hosts unreachable.
          Note: per Algolia docs, MOVE with a missing source index is ignored silently (no throw) —
          but COPY with a missing source creates an empty destination, which is a distinct silent
          failure surface the caller should validate after the operation.
        required_handling: >
          Caller MUST wrap in try/catch. For blue/green swaps, validate the source index is non-empty
          BEFORE calling operationIndex(scope=copy) — Algolia silently treats a missing source as a
          0-record copy. Always pair with waitForTask() and confirm taskID reached "published" before
          treating the destination as ready. On 400 errors, the error message includes which constraint
          was violated (replica conflict vs disallowed setting); log it for debugging.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - "https://www.algolia.com/doc/api-reference/api-methods/copy-index/"

notes:
  - "algoliasearch uses throw-based error model — NO result-object pattern (unlike resend)"
  - "v4 errors: plain objects with .name property (not instanceof Error)"
  - "v5 errors: proper class hierarchy, instanceof ApiError works"
  - "ApiError.status: 400=bad request, 401=invalid key, 403=missing ACL, 404=not found, 429=rate limit"
  - "RetryError thrown when all Algolia hosts exhausted — check appId configuration"
  - "Constructor does NOT throw — credential errors only surface at first API call"
  - "Deleting non-existent objects is idempotent (no 404 thrown)"
  - "v4 WaitablePromise: both the write operation AND .wait() can throw independently"
  - "clearObjects documented errors: 400, 402 (feature not enabled), 403 (missing deleteIndex ACL), 404"
  - "deleteBy explicitly rejects empty filters — ApiError 400; always validate filters are non-empty"
  - "searchForFacetValues: facet must be configured as facetable attribute in settings or returns empty results (no error)"
  - "indexExists: returns false for 404, but 401/403/RetryError still throw — NOT a safe unchecked call"
  - "partialUpdateObjects: createIfNotExists=false silently skips missing objects — no error, no count"
  - "addOrUpdateObject: throws synchronous native Error for missing params before network request"
  - "waitForAppTask: max-retries-exceeded throws native Error (not ApiError) — distinct from ApiError handling"
  - "saveObjectsWithTransformation: throws synchronous Error if transformation.region not set at client init"
  - "searchForHits/searchForFacets: thin type-narrowing wrappers over search() — same error profile, omitted"
  - "partialUpdateObjectsWithTransformation/replaceAllObjectsWithTransformation: same error profile as saveObjectsWithTransformation, omitted (duplicate contract)"
  - "batch: SINGLE-index raw batch endpoint; does NOT chunk — caller responsible for payload size limits"
  - "multipleBatch: MULTI-index batch endpoint; single 404 for any referenced index fails the entire batch (all-or-nothing)"
  - "browse: requires browse ACL (distinct from search ACL); search-only key cannot browse — 403 thrown"
  - "browseObjects: iterates browse() across cursor pages; aggregator callback throws propagate; no built-in cross-page retry"
  - "operationIndex: COPY with missing source silently creates 0-record destination (no 404); validate source before copy"
  - "operationIndex: MOVE with missing source is silently ignored per Algolia docs — distinct from COPY behavior"
  - "Admin surface NOT contracted (out-of-scope for data-path): addApiKey/deleteApiKey/updateApiKey/restoreApiKey/getApiKey/listApiKeys/waitForApiKey, assignUserId/batchAssignUserIds/removeUserId/getUserId/getTopUserIds/listUserIds/searchUserIds/hasPendingMappings, listClusters, getLogs, batchDictionaryEntries/searchDictionaryEntries/getDictionarySettings/setDictionarySettings/getDictionaryLanguages, appendSource/replaceSources/deleteSource/getSources, clearRules/clearSynonyms/deleteRule/deleteSynonym/getRule/getSynonym/saveRule/saveRules/saveSynonym/saveSynonyms/searchRules/searchSynonyms/browseRules/browseSynonyms, customGet/customPost/customPut/customDelete, accountCopyIndex (Node-helper, separate-account migration), clearCache (sync-ish cache reset)"
