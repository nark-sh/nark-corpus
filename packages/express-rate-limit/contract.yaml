package: express-rate-limit
semver: '>=6.0.0 <8.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-13'
status: production
evidence_quality: confirmed
functions:
  - name: rateLimit
    import_path: express-rate-limit
    description: >
      Creates Express middleware that limits repeated requests from a client within a time window. Returns a middleware
      function. Sends HTTP 429 when a client exceeds the configured limit. All options have defaults — no configuration
      is required.
    postconditions:
      # Evidence: 24 violations across 14 repos in scan-express-rate-limit-2026-04-13.json
      # Top affected: iOfficeAI/AionUi (⭐ 19789), czlonkowski/n8n-mcp (⭐ 15902), juice-shop/juice-shop (⭐ 12733)
      - id: store-error-fail-closed
        condition: 'The backing store throws an error during hit counting (default passOnStoreError: false)'
        throws: Error forwarded to Express error handler via next(err)
        required_handling: >
          Application MUST register an Express error handler (4-argument middleware) to handle store failures. With
          default settings (fail-closed), a store error will block ALL requests until the error handler responds.
          Consider setting passOnStoreError: true for fail-open behavior in high-availability scenarios.
        sources:
          - https://express-rate-limit.mintlify.app/reference/configuration
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: store-error-fail-open
        condition: 'The backing store throws an error and passOnStoreError: true is configured'
        returns: Request is allowed through without rate limiting; error is logged to console
        sources:
          - https://express-rate-limit.mintlify.app/reference/configuration
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: rate-limit-exceeded
        condition: Client has exceeded the configured limit within the windowMs time window
        returns: >-
          HTTP 429 response with configurable message (default: 'Too many requests, please try again later.') and
          Retry-After header
        sources:
          - https://express-rate-limit.mintlify.app/reference/configuration
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: undefined-ip
        condition: request.ip is undefined (often due to missing trust proxy configuration)
        throws: Logs ERR_ERL_UNDEFINED_IP_ADDRESS warning; may result in incorrect rate limiting behavior
        required_handling: >
          If deploying behind a reverse proxy (nginx, Cloudflare, load balancer), caller MUST set app.set('trust proxy',
          N) in Express before using rateLimit(), where N is the number of trusted proxies. Failure to do so causes
          request.ip to be undefined or incorrect, allowing clients to bypass rate limiting by spoofing headers.
        sources:
          - https://express-rate-limit.mintlify.app/reference/error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: store-reuse
        condition: A single store instance is shared across multiple rateLimit() middleware instances
        throws: Logs ERR_ERL_STORE_REUSE warning at startup
        required_handling: >
          Each call to rateLimit() MUST use a separate store instance. Create a new store instance for each rate limiter
          to avoid shared hit count state between limiters.
        sources:
          - https://express-rate-limit.mintlify.app/reference/error-codes
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: success-within-limit
        condition: Client is within the rate limit
        returns: Request is forwarded to next middleware. X-RateLimit-* headers are added to the response.
        sources:
          - https://express-rate-limit.mintlify.app/reference/configuration
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: memory-store-not-for-clusters
        description: >-
          The default MemoryStore is per-process and does not synchronize across multiple Node.js processes or servers.
          Use an external store (Redis, Memcache) in clustered or multi-server deployments.
        sources:
          - https://express-rate-limit.mintlify.app/reference/configuration
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: window-ms-max
        description: >-
          windowMs is capped at approximately 28.4 days (2^31 - 1 ms) by JavaScript's setInterval() maximum when using
          MemoryStore. External stores support larger windows.
        sources:
          - https://express-rate-limit.mintlify.app/reference/configuration
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: trust-proxy-true-warning
        description: >-
          Setting app.set('trust proxy', true) in Express triggers ERR_ERL_PERMISSIVE_TRUST_PROXY warning because it
          trusts all X-Forwarded-For headers, allowing clients to spoof IP addresses and bypass rate limiting.
        sources:
          - https://express-rate-limit.mintlify.app/reference/error-codes
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
