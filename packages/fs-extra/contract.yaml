package: fs-extra
semver: ">=9.0.0 <12.0.0"
contract_version: "1.2.0"
maintainer: "agent-onboard"
last_verified: "2026-04-06"
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 12 contracted / 12 non-omitted async functions (mkdirp, mkdirs, createFile added)
# Audit 2026-04-06: 46 repos scanned, 18 affected (39%), 291 violations.
# Top violated: remove (80 in 12 repos), ensureDir (60 in 11 repos), copy (50 in 10 repos),
# readJson (32 in 6 repos), writeJson (22 in 4 repos), move (20 in 6 repos).
# FP check: 0/19 FPs (0.0%). All contracted functions confirmed. No contract changes needed.

detection:
  import_names:
    - "fs-extra"
  await_patterns:
    - ".readJson("
    - ".readJSON("
    - ".copy("
    - ".move("
    - ".outputFile("
    - ".writeJson("
    - ".writeJSON("
    - ".ensureDir("
    - ".remove("
    - ".outputJson("
    - ".outputJSON("
    - ".ensureFile("
    - ".mkdirp("
    - ".mkdirs("
    - ".createFile("

functions:
  - name: readJson
    import_path: "fs-extra"
    description: "Reads a JSON file and parses its content. Throws on missing file or invalid JSON."

    postconditions:
      - id: file-not-found
        condition: "File at path does not exist"
        throws: "Error with code ENOENT"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'ENOENT' to handle missing files.
          Consider using pathExists() first or providing a default value in the catch block.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/readJson.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: invalid-json
        condition: "File exists but contains invalid JSON"
        throws: "SyntaxError"
        required_handling: >
          Caller MUST wrap in try-catch. Invalid JSON throws a SyntaxError (not an Error with a code).
          Validate JSON structure after reading if schema compliance is required.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/readJson.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: permission-denied
        condition: "Process lacks read permission for the file"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES' to handle permission errors.
          Ensure the process has appropriate filesystem permissions.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/readJson.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: copy
    import_path: "fs-extra"
    description: "Copies a file or directory recursively. Overwrites destination by default."

    postconditions:
      - id: source-not-found
        condition: "Source path does not exist"
        throws: "Error with code ENOENT"
        required_handling: >
          Caller MUST wrap in try-catch. Verify source exists before copying, or handle ENOENT
          in the catch block. Consider using pathExists() to pre-check source existence.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/copy.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: permission-denied
        condition: "Process lacks read permission on source or write permission on destination"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES' and handle appropriately.
          Ensure the process has read access to source and write access to destination parent.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/copy.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: move
    import_path: "fs-extra"
    description: "Moves a file or directory. Default behavior rejects if destination exists."

    postconditions:
      - id: source-not-found
        condition: "Source path does not exist"
        throws: "Error with code ENOENT"
        required_handling: >
          Caller MUST wrap in try-catch. Handle ENOENT for missing source path.
          Consider using pathExists() to pre-check source existence.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/move.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: destination-exists
        condition: "Destination already exists and overwrite option is not set to true"
        throws: "Error: dest already exists."
        required_handling: >
          Caller MUST either pass { overwrite: true } option to allow overwriting, or wrap in
          try-catch to handle the case where destination already exists. Note: the default for
          move (overwrite: false) differs from copy (overwrite: true) — a common footgun.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/move.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: permission-denied
        condition: "Process lacks write permission on source or destination"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES' and handle appropriately.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/move.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: outputFile
    import_path: "fs-extra"
    description: "Writes data to a file, creating any missing parent directories automatically. Wraps fs.writeFile — all writeFile errors propagate. Unlike writeJson/writeFile, the parent directory is created if missing."

    postconditions:
      # Evidence: source confirmed from lib/output-file/index.js — calls fs.writeFile(file, data, encoding)
      # after mkdir.mkdirs(dir). All underlying fs errors propagate unmodified.
      - id: outputfile-permission-denied
        condition: "Process lacks write permission on the target file or a parent directory component"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES' to handle permission errors.
          SaaS apps often run as restricted users without write access to all paths.
          Particularly dangerous in background jobs where the error is silently discarded.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/outputFile.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/output-file/index.js"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: outputfile-disk-full
        condition: "Filesystem has no remaining space when fs.writeFile is called"
        throws: "Error with code ENOSPC"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'ENOSPC' to detect disk-full conditions.
          Unlike EACCES (predictable at startup), disk-full is a runtime error.
          Monitoring disk space and handling ENOSPC is critical for any app writing user files.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/outputFile.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/output-file/index.js"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: writeJson
    import_path: "fs-extra"
    description: "Writes a JavaScript object to a JSON file. Unlike outputFile/outputJson, writeJson does NOT create missing parent directories — the parent must already exist. This is a common footgun. Wraps jsonfile.writeFile."

    postconditions:
      # Evidence: source confirmed from lib/json/jsonfile.js — calls fs.writeFile(file, str, options).
      # No directory creation step before writeFile. Parent must exist or ENOENT is thrown.
      - id: writejson-parent-not-found
        condition: "Parent directory does not exist (writeJson does not create parent directories)"
        throws: "Error with code ENOENT"
        required_handling: >
          Caller MUST wrap in try-catch. Unlike outputJson/outputFile, writeJson does NOT create
          missing parent directories. Use outputJson() if the parent directory may not exist.
          Handle ENOENT in the catch block to detect missing parent directories.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/writeJson.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/json/jsonfile.js"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: writejson-permission-denied
        condition: "Process lacks write permission on the target file or parent directory"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES' to handle permission errors.
          Propagates directly from fs.writeFile.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/writeJson.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/json/jsonfile.js"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: writejson-circular-reference
        condition: "Data object contains circular references (e.g. ORM model, Express req/res object)"
        throws: "TypeError: Converting circular structure to JSON"
        required_handling: >
          Caller MUST wrap in try-catch. TypeError from circular references does not have a code
          property — check for TypeError or the message text. Avoid serializing ORM model instances,
          class objects with parent references, or Express req/res objects directly.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/json/jsonfile.js"
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/JSON/stringify"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: ensureDir
    import_path: "fs-extra"
    description: "Ensures that the directory exists by calling fs.mkdir({ recursive: true }). Creates the full path if needed. Also exported as mkdirp() and mkdirs(). Throws on permission errors or when a path component is a file."

    postconditions:
      # Evidence: source confirmed from lib/mkdirs/make-dir.js — calls fs.mkdir(dir, { recursive: true }).
      # EACCES thrown when process lacks execute or write permission on parent directory.
      - id: ensuredir-permission-denied
        condition: "Process lacks write or execute permission on a parent directory component"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES' to handle permission errors.
          Directory creation fails — subsequent file writes to that path will also fail with ENOENT.
          Ensure the process has write permission on all parent directory components.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/ensureDir.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/mkdirs/make-dir.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: ensuredir-path-component-is-file
        condition: "A component of the path that should be a directory is actually an existing file"
        throws: "Error with code ENOTDIR"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'ENOTDIR' to detect path conflicts.
          This occurs in misconfigured deployments where a directory path collides with an
          existing file (e.g. '/data/config' is a file but caller expects a directory).
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/ensureDir.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/mkdirs/make-dir.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: remove
    import_path: "fs-extra"
    description: "Removes a file or directory recursively. Wraps fs.rm({ recursive: true, force: true }). The force option silences ENOENT (missing path is OK) but does NOT silence EACCES or EPERM. Permission errors are always thrown."

    postconditions:
      # Evidence: source confirmed from lib/remove/index.js:
      # fs.rm(path, { recursive: true, force: true }, callback)
      # Node.js fs.rm: force=true ignores ENOENT but NOT EACCES or EPERM — confirmed from Node.js docs.
      - id: remove-permission-denied
        condition: "Process lacks write permission on the file or directory, or execute permission on a parent directory"
        throws: "Error with code EACCES (Unix) or EPERM (Windows)"
        required_handling: >
          Caller MUST wrap in try-catch. The force: true option ONLY silences ENOENT — it does NOT
          silence permission errors. Check error.code === 'EACCES' || error.code === 'EPERM'.
          Failed cleanup leaves orphaned files on disk with no alert.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/remove.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/remove/index.js"
          - "https://nodejs.org/api/fs.html#fsrmpath-options-callback"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: outputJson
    import_path: "fs-extra"
    description: "Like writeJson but creates missing parent directories automatically. Combines outputFile + JSON serialization. Also exported as outputJSON. Inherits all outputFile errors plus circular-reference risk from stringify."

    postconditions:
      # Evidence: source confirmed from lib/json/output-json.js — calls stringify(data, options) then outputFile().
      # stringify() from jsonfile/utils throws on circular refs. outputFile inherits all its errors.
      - id: outputjson-circular-reference
        condition: "Data object contains circular references (e.g. ORM model instances, Express objects)"
        throws: "TypeError: Converting circular structure to JSON"
        required_handling: >
          Caller MUST wrap in try-catch. TypeError occurs before any file I/O — no file is created
          or modified. The error has no code property, making it harder to detect in generic
          catch blocks. Avoid serializing class instances or cyclic object graphs.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/json/output-json.js"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/json/jsonfile.js"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: outputjson-permission-denied
        condition: "Process lacks write permission on the target file or any parent directory"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES'.
          Inherits from outputFile → fs.writeFile. Silent failure leaves system in stale state.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/json/output-json.js"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/output-file/index.js"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: ensureFile
    import_path: "fs-extra"
    description: "Ensures a file exists, creating it (empty) if missing. Creates parent directories if needed. Does NOT modify existing files. Also exported as createFile. Throws on permission errors or path collisions."

    postconditions:
      # Evidence: source confirmed from lib/ensure/file.js — calls fs.writeFile(file, '') after
      # mkdir.mkdirs(dir). Throws when dir stat has non-ENOENT error (e.g. EACCES on parent).
      # Also throws ENOTDIR via fs.readdir(dir) when parent path component is a file (explicit).
      - id: ensurefile-permission-denied
        condition: "Process lacks write permission on the target directory or execute permission on a parent"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES'. Parent directory creation
          propagates EACCES unmodified. Common in init scripts that create log or pid files in
          permission-restricted paths.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/ensureFile.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/ensure/file.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: ensurefile-path-component-is-file
        condition: "A component of the path that should be a directory is actually an existing file"
        throws: "Error with code ENOTDIR"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'ENOTDIR'. The source explicitly
          calls fs.readdir(dir) to trigger ENOTDIR when the parent stat shows it is not a directory.
          Common in misconfigured deployments where a path component is a file, not a directory.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/ensure/file.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: mkdirp
    import_path: "fs-extra"
    description: >
      Alias for ensureDir(). Ensures that the directory exists, creating the full path recursively
      if needed. Commonly used as a drop-in replacement for the legacy mkdirp npm package.
      Internally calls the same makeDir function as ensureDir() — identical error profile.
      Also exported as mkdirs().

    postconditions:
      # Evidence: source confirmed from lib/mkdirs/index.js — mkdirs: makeDir, mkdirp: makeDir, ensureDir: makeDir.
      # All three are the same function reference. EACCES thrown when process lacks execute or write
      # permission on parent directory. ENOTDIR thrown by kernel when a non-directory path component blocks
      # directory creation. Source: lib/mkdirs/make-dir.js calls fs.mkdir(dir, { recursive: true }).
      - id: mkdirp-permission-denied
        condition: "Process lacks write or execute permission on a parent directory component"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES' to handle permission errors.
          mkdirp() is identical to ensureDir() — both call fs.mkdir({recursive: true}) via makeDir.
          Directory creation fails — subsequent file writes to that path will also fail with ENOENT.
          Ensure the process has write permission on all parent directory components.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/ensureDir.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/mkdirs/make-dir.js"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/mkdirs/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mkdirp-path-component-is-file
        condition: "A component of the path that should be a directory is actually an existing file"
        throws: "Error with code ENOTDIR"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'ENOTDIR' to detect path conflicts.
          Same behavior as ensureDir() — a path component that exists as a file instead of a directory
          causes ENOTDIR from the underlying fs.mkdir({recursive: true}) call.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/ensureDir.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/mkdirs/make-dir.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: mkdirs
    import_path: "fs-extra"
    description: >
      Alias for ensureDir() and mkdirp(). Ensures that the directory exists, creating the full
      path recursively if needed. All three names (ensureDir, mkdirp, mkdirs) resolve to the
      same makeDir function — identical error profile.

    postconditions:
      # Evidence: source confirmed from lib/mkdirs/index.js — mkdirs: makeDir, mkdirp: makeDir, ensureDir: makeDir.
      # Same function reference as ensureDir and mkdirp. Error behavior is identical.
      - id: mkdirs-permission-denied
        condition: "Process lacks write or execute permission on a parent directory component"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES' to handle permission errors.
          mkdirs() is identical to ensureDir() and mkdirp() — all call fs.mkdir({recursive: true})
          via the same makeDir function. Directory creation failure will block all subsequent I/O
          at that path.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/ensureDir.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/mkdirs/make-dir.js"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/mkdirs/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mkdirs-path-component-is-file
        condition: "A component of the path that should be a directory is actually an existing file"
        throws: "Error with code ENOTDIR"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'ENOTDIR' to detect path conflicts.
          mkdirs() is identical to ensureDir() — same underlying fs.mkdir({recursive: true}) behavior.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/ensureDir.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/mkdirs/make-dir.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: createFile
    import_path: "fs-extra"
    description: >
      Alias for ensureFile(). Ensures a file exists, creating it (empty) if missing. Creates
      parent directories if needed. Does NOT modify existing files. Also exported as ensureFile().
      Internally uses the same async createFile function — identical error profile to ensureFile.

    postconditions:
      # Evidence: source confirmed from lib/ensure/file.js — ensureFile and createFile are the same
      # function (module.exports = { createFile: u(createFile), ... }).
      # lib/ensure/index.js: ensureFile: createFile — same function reference.
      # EACCES thrown via mkdir.mkdirs() or fs.writeFile() when permission denied.
      # ENOTDIR thrown explicitly via fs.readdir(dir) when parent path component is a file.
      - id: createfile-permission-denied
        condition: "Process lacks write permission on the target directory or execute permission on a parent"
        throws: "Error with code EACCES"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'EACCES'. createFile() is the same
          underlying function as ensureFile() — both are exported as the same reference. Parent
          directory creation propagates EACCES from mkdir.mkdirs() unmodified. Common in init
          scripts that create log or pid files in permission-restricted paths.
        sources:
          - "https://github.com/jprichardson/node-fs-extra/blob/master/docs/ensureFile.md"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/ensure/file.js"
          - "https://github.com/jprichardson/node-fs-extra/blob/master/lib/ensure/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: createfile-path-component-is-file
        condition: "A component of the path that should be a directory is actually an existing file"
        throws: "Error with code ENOTDIR"
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code === 'ENOTDIR'. The source explicitly
          calls fs.readdir(dir) to trigger ENOTDIR when the parent stat shows it is not a directory.
          createFile() is the same function as ensureFile() — identical ENOTDIR behavior.
        sources:
