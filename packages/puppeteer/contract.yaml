package: puppeteer
semver: ">=1.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-04"
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 16 contracted / 16 non-omitted async functions (24 intentionally omitted)

detection:
  type_names:
    - Browser
    - Page
    - ElementHandle
  factory_methods:
    - puppeteer
  class_names:
    - Puppeteer
  await_patterns:
    - ".launch("
    - ".goto("
    - ".newPage("
    - ".close("
    - ".waitForSelector("
    - ".click("
    - ".evaluate("
    - ".screenshot("
    - ".pdf("
    - ".setContent("
    - ".waitForNavigation("
    - ".waitForNetworkIdle("
    - ".waitForFunction("
    - ".type("
    - ".$eval("
    - ".connect("

functions:
  - name: launch
    import_path: "puppeteer"
    description: "Launches a browser instance"
    postconditions:
      # Evidence: seen in 6 primary firings across 5 repos in scan-puppeteer-2026-04-03.json
      # Top affected: GoogleChrome/rendertron (⭐ 5955), simonhaenisch/md-to-pdf (⭐ 1723)
      - id: launch-rejects-on-error
        condition: "browser launch fails (timeout, protocol error, missing Chrome)"
        throws: "Promise rejection with TimeoutError, ProtocolError, or Error"
        required_handling: >
          Caller MUST use try-catch to handle Promise rejections from puppeteer.launch().
          Common failures: timeout (default 30s), protocol errors in Docker/containers,
          missing Chrome binary. Browser instance MUST be closed in finally block to
          prevent zombie processes. Use pattern:
          let browser;
          try { browser = await puppeteer.launch(); }
          catch (error) { /* handle */ }
          finally { if (browser) await browser.close(); }
        sources:
          - "https://pptr.dev/api/puppeteer.puppeteernode.launch"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: goto
    import_path: "puppeteer"
    description: "Navigates page to URL"
    postconditions:
      # Evidence: seen in 3 primary firings across 3 repos in scan-puppeteer-2026-04-03.json
      # Top affected: open-wa/wa-automate-nodejs (⭐ 3448), wppconnect-team/wppconnect (⭐ 3230)
      - id: goto-rejects-on-timeout
        condition: "navigation timeout (default 30s) or network error"
        throws: "Promise rejection with TimeoutError"
        required_handling: >
          Caller MUST use try-catch to handle Promise rejections from page.goto().
          This is the #1 cause of production failures. Timeouts occur with slow networks,
          Cloudflare protection, heavy JavaScript pages. CRITICAL: In headless shell mode,
          HTTP 404/500 do NOT throw - must check response.ok(). Use pattern:
          const response = await page.goto(url, { timeout: 60000 });
          if (!response || !response.ok()) throw new Error('Navigation failed');
        sources:
          - "https://pptr.dev/api/puppeteer.page.goto"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: newPage
    import_path: "puppeteer"
    description: "Creates a new browser page"
    postconditions:
      # Evidence: seen in 5 primary firings across 5 repos in scan-puppeteer-2026-04-03.json
      # Top affected: open-wa/wa-automate-nodejs (⭐ 3448), wppconnect-team/wppconnect (⭐ 3230)
      - id: newpage-rejects-on-error
        condition: "page creation timeout or protocol error"
        throws: "Promise rejection with ProtocolError (Target.createTarget timed out)"
        required_handling: >
          Caller MUST use try-catch to handle Promise rejections from browser.newPage().
          Common in Docker/containers with rapid page creation cycles. Increase
          protocolTimeout in launch options for containers. Use pattern:
          try { const page = await browser.newPage(); } catch (error) { /* handle */ }
        sources:
          - "https://pptr.dev/api/puppeteer.browser.newpage"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: close
    import_path: "puppeteer"
    namespace: "browser"
    description: "Closes browser instance"
    postconditions:
      # Evidence: seen in 6 primary firings across 3 repos in scan-puppeteer-2026-04-03.json
      # Top affected: open-wa/wa-automate-nodejs (⭐ 3448), zmzimpl/chrome-power-app (⭐ 1521)
      - id: browser-close-must-run
        condition: "browser instance exists after operations"
        throws: "May throw Error if browser already closed or connection lost"
        required_handling: >
          Browser.close() MUST be called in finally block to prevent zombie Chrome processes.
          Each zombie process consumes 80-90MB. Accumulation causes memory exhaustion and
          server crashes. Close can itself throw errors - wrap in try-catch within finally
          to avoid masking original errors. Use pattern:
          finally { if (browser) { try { await browser.close(); } catch (e) {} } }
        sources:
          - "https://pptr.dev/api/puppeteer.browser.close"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: waitForSelector
    import_path: "puppeteer"
    description: "Waits for element to appear"
    postconditions:
      - id: waitforselector-rejects-on-timeout
        condition: "element not found within timeout (default 30s)"
        throws: "Promise rejection with TimeoutError"
        required_handling: >
          Caller MUST use try-catch to handle TimeoutError from page.waitForSelector().
          Timeouts common when element never appears or takes longer than expected.
          Consider increasing timeout for slow-loading pages. Use pattern:
          try { await page.waitForSelector('selector', { timeout: 10000 }); }
          catch (error) { /* handle */ }
        sources:
          - "https://pptr.dev/api/puppeteer.page.waitforselector"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: click
    import_path: "puppeteer"
    description: "Clicks an element"
    postconditions:
      - id: click-rejects-on-error
        condition: "element not found or not clickable"
        throws: "Promise rejection with Error"
        required_handling: >
          Caller MUST use try-catch to handle errors from page.click().
          Common failures: selector not found, element not clickable, element moved.
          CRITICAL: When click triggers navigation, use Promise.all([page.waitForNavigation(), page.click()])
          to avoid race conditions. Use pattern:
          try { await page.click('button'); } catch (error) { /* handle */ }
        sources:
          - "https://pptr.dev/api/puppeteer.page.click"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: evaluate
    import_path: "puppeteer"
    description: >
      Evaluates a function in the page's context and returns the result.
      Most commonly used Puppeteer method after goto(). Executes arbitrary
      JavaScript in the browser and returns serializable results.
    postconditions:
      # Evidence: puppeteer-core/lib/cjs/puppeteer/api/Page.js — TargetCloseError thrown on page close
      # Error hierarchy: PuppeteerError > ProtocolError > TargetCloseError
      - id: evaluate-execution-error
        condition: "JavaScript execution fails in page context (page closed, navigation during eval, unserializable return)"
        throws: "TargetCloseError if page navigated/closed during evaluation, Error if function throws in browser context"
        required_handling: >
          Caller MUST wrap page.evaluate() in try-catch. Common failures:
          (1) Page navigated away during evaluation — throws TargetCloseError.
          (2) Function throws in browser context — error propagated to Node.js.
          (3) Return value not serializable — throws Error.
          (4) Execution context destroyed (SPA navigation) — throws ProtocolError.
          In scraping/automation pipelines, evaluate() failures are the #1 cause
          of silent data loss — the scrape returns undefined instead of crashing.
        sources:
          - "https://pptr.dev/api/puppeteer.page.evaluate"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: screenshot
    import_path: "puppeteer"
    description: >
      Captures a screenshot of the page. Returns Uint8Array by default
      or base64 string with encoding option. Used heavily in PDF/image
      generation services and visual regression testing.
    postconditions:
      # Evidence: puppeteer-core/lib/cjs/puppeteer/api/Page.js lines 888-923 — validation throws
      # Also: TargetCloseError on page close during screenshot
      - id: screenshot-protocol-error
        condition: "Screenshot capture fails (page closed, protocol error, invalid options)"
        throws: "TargetCloseError if page closed during capture, Error on invalid crop/options, ProtocolError on CDP failure"
        required_handling: >
          Caller MUST wrap page.screenshot() in try-catch. Failures include:
          (1) Page navigated/closed during capture — TargetCloseError.
          (2) Invalid crop dimensions (negative, exceeds viewport) — throws Error.
          (3) fullPage screenshot of infinite-scroll pages — may cause OOM.
          (4) ProtocolError when page is mid-navigation.
          CRITICAL: In image generation services, unhandled screenshot errors
          return empty/corrupt images to users without alerting.
        sources:
          - "https://pptr.dev/api/puppeteer.page.screenshot"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: pdf
    import_path: "puppeteer"
    description: >
      Generates a PDF of the page with the print CSS media type.
      Returns Uint8Array. Only works in headless Chrome — throws in
      headed mode. Common in invoice/report generation services.
    postconditions:
      # Evidence: puppeteer-core source — pdf() calls Page.createPDFStream internally
      # Only works in headless mode per docs
      - id: pdf-headless-only-error
        condition: "pdf() called in headed (non-headless) browser mode"
        throws: "Error indicating PDF generation only works in headless mode"
        required_handling: >
          Caller MUST wrap page.pdf() in try-catch. Key failure modes:
          (1) Called in headed mode — throws immediately.
          (2) Page navigated/closed during generation — TargetCloseError.
          (3) ProtocolError on CDP failure during rendering.
          CRITICAL: PDF generation services that don't catch errors return
          empty PDFs or crash the worker process. Always verify the returned
          buffer has non-zero length before serving to users.
        sources:
          - "https://pptr.dev/api/puppeteer.page.pdf"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high

  - name: setContent
    import_path: "puppeteer"
    description: >
      Sets the HTML content of the page. Accepts WaitForOptions to control
      when the content is considered loaded. Common in HTML-to-PDF/image
      workflows where HTML is rendered server-side then captured.
    postconditions:
      # Evidence: Frame.setContent() delegates to Frame.goto() with data URL semantics
      # Same timeout behavior as goto()
      - id: setcontent-timeout-error
        condition: "Page content loading exceeds timeout (default 30s)"
        throws: "TimeoutError when waitUntil condition not met within timeout"
        required_handling: >
          Caller MUST wrap page.setContent() in try-catch. setContent() waits
          for the page to reach the specified load state (default: 'load').
          Complex HTML with external resources can timeout. In HTML-to-PDF
          pipelines, timeout on setContent silently aborts the generation.
          Set explicit timeout and handle: page.setContent(html, { timeout: 60000 }).
        sources:
          - "https://pptr.dev/api/puppeteer.page.setcontent"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: waitForNavigation
    import_path: "puppeteer"
    description: >
      Waits for the page to navigate to a new URL or to reload. Resolves
      to HTTPResponse or null (for anchor/History API navigation). Critical
      for SPA automation where actions trigger client-side routing.
    postconditions:
      # Evidence: puppeteer-core/lib/cjs/puppeteer/api/Page.js line 647 — TargetCloseError
      # TimeoutError from WaitTask
      - id: waitfornavigation-timeout-error
        condition: "Navigation does not complete within timeout (default 30s)"
        throws: "TimeoutError when navigation exceeds timeout, TargetCloseError if page closes during wait"
        required_handling: >
          Caller MUST wrap page.waitForNavigation() in try-catch. This is the
          most common source of flaky Puppeteer tests and production failures.
          Key patterns: (1) Must be called BEFORE the action that triggers
          navigation — use Promise.all([page.waitForNavigation(), page.click()]).
          (2) SPA route changes may resolve with null response.
          (3) Multiple rapid navigations cause race conditions.
          (4) Timeout in CI/Docker environments due to slow rendering.
        sources:
          - "https://pptr.dev/api/puppeteer.page.waitfornavigation"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: waitForNetworkIdle
    import_path: "puppeteer"
    description: >
      Waits until the network has been idle for the specified duration.
      Used to detect when a page has finished loading all resources,
      including lazy-loaded content and API calls.
    postconditions:
      # Evidence: puppeteer-core source — uses WaitTask with timeout, throws TargetCloseError on close
      - id: waitfornetworkidle-timeout-error
        condition: "Network does not become idle within timeout"
        throws: "TimeoutError when network remains active past timeout, TargetCloseError if page closes"
        required_handling: >
          Caller MUST wrap page.waitForNetworkIdle() in try-catch. Common
          failures: (1) Pages with persistent WebSocket/SSE connections never
          reach idle — timeout guaranteed. (2) Analytics/tracking scripts
          continually fire requests. (3) Long-polling APIs keep network busy.
          Always set an explicit timeout and handle TimeoutError gracefully
          rather than treating it as a hard failure.
        sources:
          - "https://pptr.dev/api/puppeteer.page.waitfornetworkidle"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: waitForFunction
    import_path: "puppeteer"
    description: >
      Waits for the provided function to return a truthy value when evaluated
      in the page's context. Used for complex wait conditions that cannot be
      expressed with waitForSelector.
    postconditions:
      # Evidence: puppeteer-core source — WaitTask timeout, TargetCloseError on page close
      - id: waitforfunction-timeout-error
        condition: "Function does not return truthy value within timeout"
        throws: "TimeoutError when condition not met within timeout, TargetCloseError if page closes during wait"
        required_handling: >
          Caller MUST wrap page.waitForFunction() in try-catch. Timeout
          occurs when the evaluated function never returns truthy. Common
          in scraping when waiting for dynamic content that may not appear.
          The function re-evaluates on every animation frame or on DOM mutation
          (depending on polling option), so infinite loops in the function
          will not throw — they just timeout silently.
        sources:
          - "https://pptr.dev/api/puppeteer.page.waitforfunction"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: type
    import_path: "puppeteer"
    description: >
      Types text into a focused element character by character. Sends
      keydown, keypress/input, and keyup events for each character.
      Used for form automation.
    postconditions:
      # Evidence: Page.type() delegates to Frame.type() which calls page.$(selector)
      # Throws if selector not found
      - id: type-element-not-found
        condition: "Target element selector not found on page"
        throws: "Error when no element matches the provided selector"
        required_handling: >
          Caller MUST wrap page.type() in try-catch. The method throws if
          the selector does not match any element. Common in form automation
          when pages load dynamically — always waitForSelector() before type().
          Also throws TargetCloseError if page navigates during typing
          (e.g., auto-submit forms).
        sources:
          - "https://pptr.dev/api/puppeteer.page.type"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: $eval
    import_path: "puppeteer"
    description: >
      Finds the first element matching selector, then evaluates the
      provided function with that element as the first argument. Throws
      if no element is found — unlike $() which returns null.
    postconditions:
      # Evidence: puppeteer-core types.d.ts — "If no element is found matching selector, the method will throw an error"
      # Source: api/Page.js line 390
      - id: eval-element-not-found
        condition: "No element matches the provided selector"
        throws: "Error indicating no element found for selector"
        required_handling: >
          Caller MUST wrap page.$eval() in try-catch. Unlike page.$() which
          returns null when no element is found, $eval() THROWS an error.
          This is a critical distinction — code that works with $() will crash
          with $eval() on missing elements. Use page.$() first to check
          existence, or wrap in try-catch. Common in scraping when page
          structure varies across different pages.
        sources:
          - "https://pptr.dev/api/puppeteer.page._eval"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: connect
    import_path: "puppeteer"
    description: >
      Connects Puppeteer to an existing browser instance via WebSocket URL
      or transport. Used for remote browser connections (BrowserStack,
      docker containers, browser pools).
    postconditions:
      # Evidence: puppeteer-core/BrowserConnector — connects via WebSocket
      # Connection failure throws Error
      - id: connect-websocket-error
        condition: "WebSocket connection to browser fails (wrong URL, browser not running, network error)"
        throws: "Error on WebSocket connection failure, TimeoutError if connection times out"
        required_handling: >
          Caller MUST wrap puppeteer.connect() in try-catch. Connection
          failures common with: (1) Browser process crashed/exited before
          connect. (2) Wrong WebSocket URL (port changed, container restarted).
          (3) Network partition between Puppeteer and remote browser.
          CRITICAL: In browser pool architectures, connect() failures without
          error handling cause the entire worker to crash instead of gracefully
          acquiring a new browser.
        sources:
          - "https://pptr.dev/api/puppeteer.puppeteer.connect"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

edge_cases:
  - id: zombie-process-prevention
    description: >
      Browser.close() MUST be called in finally blocks. Each zombie Chrome process
      consumes 80-90MB RAM. In serverless/container environments, accumulating zombie
      processes causes OOM kills. Pattern: let browser; try { browser = await
      puppeteer.launch(); ... } finally { if (browser) await browser.close().catch(() => {}); }
    sources:
      - "https://pptr.dev/api/puppeteer.browser.close"
    severity: error
    business_impact:
      incident_label: DOWNTIME
      production_behavior: degraded_service
      visibility: silent
      user_experience: service_unavailable
      incident_cost_range: high

  - id: navigation-race-condition
    description: >
      When click triggers navigation, must use Promise.all([page.waitForNavigation(),
      page.click(selector)]) to avoid race conditions. Calling waitForNavigation after
      click may miss the navigation event entirely, causing a timeout.
    sources:
      - "https://pptr.dev/api/puppeteer.page.waitfornavigation"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: low

