functions:
  - name: request
    import_path: "supertest"
    description: "Creates a supertest agent for making HTTP requests against an Express app or HTTP server in tests."

    postconditions:
      - id: assertion-failure
        maturity: stable
        condition: "A chained assertion fails (e.g., .expect(200) when response status is 404)"
        throws: "AssertionError with expected vs actual values"
        required_handling: >
          In test frameworks (Jest, Mocha), callers MUST either:
          1. await the request chain and let the test framework catch the AssertionError, OR
          2. Pass the error to done() callback if using callback style: .end((err, res) => { if (err) return done(err); })
          Failing to handle AssertionError in callback style causes test timeouts, not failures.
        sources:
          - "https://github.com/ladjs/supertest#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-refused
        maturity: stable
        condition: "Server is not running or connection is refused (ECONNREFUSED)"
        throws: "Error with code ECONNREFUSED"
        required_handling: >
          Caller MUST ensure the server is started before running tests.
          When passing an Express app directly to supertest, it auto-starts on a random port.
          ECONNREFUSED typically means a server was started externally but is not running.
        sources:
          - "https://github.com/ladjs/supertest#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: server-not-closed
        maturity: stable
        condition: "Server bound by supertest is not closed after tests complete"
        throws: "Process hangs (does not exit after test suite finishes)"
        required_handling: >
          Caller MUST close the server after tests when using supertest with a manually created server.
          Use server.close() in afterAll/after hooks.
          When passing an Express app (not a server), supertest handles cleanup automatically.
        sources:
          - "https://github.com/ladjs/supertest#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: async-test-unhandled-rejection
        maturity: stable
        condition: "Test is async and assertion failure is not awaited"
        throws: "UnhandledPromiseRejection warning or test exits without failure"
        required_handling: >
          Caller MUST await the supertest chain in async test functions, or
          return the promise to the test framework. Not awaiting the chain
          means assertion failures are silently swallowed.
        sources:
          - "https://github.com/ladjs/supertest#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: end-callback-error-pattern
        description: "When using .end(fn) callback style, assertion errors are passed as the first argument to fn, not thrown. Callers must propagate: .end((err, res) => { if (err) return done(err); })"
        sources:
          - "https://github.com/ladjs/supertest#readme"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: multiple-assertions-stop-at-first-failure
        description: "When multiple .expect() calls are chained, the request completes before assertions run. All assertions run against the same response, but only the first failure is reported."
        sources:
          - "https://github.com/ladjs/supertest#readme"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: app-listen-side-effect
        description: "supertest calls app.listen() internally when given an Express app. If the app has already called listen(), pass the server object (not the app) to avoid duplicate listeners."
        sources:
          - "https://github.com/ladjs/supertest#readme"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: agent
    import_path: "supertest"
    namespace: "request"
    description: >
      Creates a persistent TestAgent that maintains cookies and session state across multiple
      HTTP requests. Used for testing authentication flows, session-based features, and
      any scenario requiring cookie persistence. Wraps superagent's Agent with supertest
      Test instances for each request.
    # Evidence: node_modules/supertest/lib/agent.js (inspected directly 2026-04-18)
    # Evidence: node_modules/supertest/index.js — agent export confirmed
    # Evidence: node_modules/supertest/README.md — agent usage patterns documented
    # Evidence: https://github.com/ladjs/supertest#readme

    postconditions:
      - id: agent-http2-not-supported
        maturity: stable
        condition: "http2 option passed to request.agent() on a Node.js version without http2 support"
        throws: "Error('supertest: this version of Node.js does not support http2')"
        required_handling: >
          Caller MUST NOT pass { http2: true } unless the runtime Node.js version supports http2.
          Node.js 8.4.0+ supports http2, but it must be explicitly available.
          Confirmed from agent.js source: throws Error synchronously in constructor if http2
          module is unavailable. Guard with try/catch or check Node.js version before use.
        sources:
          - "https://github.com/ladjs/supertest/blob/master/lib/agent.js"
          - "https://github.com/ladjs/supertest#readme"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: agent-cookie-state-leak
        maturity: stable
        condition: "A shared agent instance is reused across separate test suites or test files without resetting state"
        throws: "No exception — silent test pollution: cookies set in one test suite affect subsequent suites"
        required_handling: >
          Caller MUST create a fresh agent per test suite (describe block) or use beforeEach
          to recreate the agent. A shared agent persists Set-Cookie headers across all requests
          made through it. When test A logs in and test B expects an unauthenticated response,
          the shared agent silently sends the auth cookie from test A to test B, causing
          intermittent failures when tests run in a different order.
          Pattern: const agent = request.agent(app); in describe() scope, not module scope.
        sources:
          - "https://github.com/ladjs/supertest#readme"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      - id: agent-server-not-closed
        maturity: stable
        condition: "request.agent(app) used with a manually created http.Server that is not closed after tests"
        throws: "Process hangs — Node.js event loop is kept alive by open server handle"
        required_handling: >
          Caller MUST close the server in afterAll/after hooks when using request.agent()
          with a manually created server object. Unlike request(app) which creates a new
          internal server per Test instance and closes it after each request, the agent
          holds a reference to the server that persists for the lifetime of the agent.
          Use afterAll(() => server.close()) to prevent test suite from hanging.
          When passing an Express app function (not a server), supertest auto-creates and
          auto-closes a server per request — no manual cleanup needed.
        sources:
          - "https://github.com/ladjs/supertest/blob/master/lib/test.js"
          - "https://github.com/ladjs/supertest#readme"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: agent-async-unhandled-rejection
        maturity: stable
        condition: "Agent request chain is not awaited in async test functions"
        throws: "UnhandledPromiseRejection — assertion failures are silently swallowed"
        required_handling: >
          Same pattern as request() — callers MUST await agent chains or return the promise.
          agent.get('/').expect(200) without await or return means assertion errors are
          unhandled. The agent silently succeeds even if the response was 404.
          Correct: await agent.get('/api/user').expect(200)
          Incorrect: agent.get('/api/user').expect(200) // no await — silent failure
        sources:
          - "https://github.com/ladjs/supertest#readme"
          - "https://github.com/ladjs/supertest/blob/master/lib/test.js"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
