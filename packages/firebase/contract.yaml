  - name: signInWithEmailLink
    import_path: "firebase"
    description: >
      Signs in a user with a magic link sent to their email address (passwordless auth).
      The link is single-use and expires. Called as signInWithEmailLink(auth, email, emailLink).
      Very common pattern in modern SaaS for passwordless onboarding.

    postconditions:
      # Evidence: @firebase/auth/dist/auth.d.ts AuthErrorCode enum (confirmed from installed package)
      # Source: https://firebase.google.com/docs/reference/js/auth.md#signinwithemaillink
      # Error codes: EXPIRED_OOB_CODE="expired-action-code", INVALID_OOB_CODE="invalid-action-code"
      - id: email-link-expired-or-invalid
        condition: >
          signInWithEmailLink() called without try-catch. The email link has expired or
          was already used, or the link doesn't match the email address provided.
        throws: >
          FirebaseError with code: auth/expired-action-code (link expired — 10 minute TTL),
          auth/invalid-action-code (link already used or malformed), auth/invalid-email
          (email doesn't match the one the link was sent to), auth/user-disabled (account
          disabled after link was sent), auth/network-request-failed (network failure).
        required_handling: >
          Caller MUST wrap await signInWithEmailLink() in try-catch. Expired and already-used
          links are the most common production failures — users often click links multiple times
          or wait too long. Each link is single-use and has a 10-minute expiration.

          try {
            const result = await signInWithEmailLink(auth, email, window.location.href);
            window.localStorage.removeItem('emailForSignIn');
            return result.user;
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/expired-action-code') {
                throw new Error('Sign-in link has expired. Please request a new one.');
              }
              if (error.code === 'auth/invalid-action-code') {
                throw new Error('Sign-in link already used. Please request a new one.');
              }
              if (error.code === 'auth/invalid-email') {
                throw new Error('Email does not match the sign-in link.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/auth/web/email-link-auth"
          - "https://firebase.google.com/docs/reference/js/auth.md#signinwithemaillink"
        severity: error
