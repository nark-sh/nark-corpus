  # ----- Auth functions (new in depth pass 2026-04-03) -----

  - name: sendPasswordResetEmail
    import_path: "firebase"
    description: >
      Sends a password reset email to the given email address. Called as
      sendPasswordResetEmail(auth, email). Makes an HTTPS request to Firebase Auth API.
      Throws FirebaseError when email is invalid, user not found, or rate limit exceeded.
      Very common in SaaS apps for the "Forgot password" flow.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — confirmed from AuthErrorCode enum
      # Source: https://firebase.google.com/docs/reference/js/auth#sendpasswordresetemail
      - id: auth-send-password-reset-invalid-email
        condition: >
          sendPasswordResetEmail() called without try-catch when email is invalid format
          or the Auth instance is misconfigured.
        throws: >
          FirebaseError with code: auth/invalid-email (malformed email address),
          auth/missing-email (empty email), auth/invalid-api-key (bad Firebase config),
          auth/network-request-failed (network failure),
          auth/too-many-requests (rate limit exceeded).
          Note: auth/user-not-found is NOT thrown when Email Enumeration Protection is enabled
          (the default since 2023) — Firebase returns success silently for unknown emails.
        required_handling: >
          Caller MUST wrap await sendPasswordResetEmail() in try-catch.
          auth/invalid-email means client-side validation should run first.
          auth/too-many-requests means implement rate limiting in the UI.
          NEVER tell users whether the email exists — return generic "if account exists, email was sent".

          try {
            await sendPasswordResetEmail(auth, email);
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/invalid-email') throw new Error('Invalid email format');
              if (error.code === 'auth/too-many-requests') throw new Error('Too many attempts');
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth#sendpasswordresetemail"
          - "https://firebase.google.com/docs/auth/web/manage-users#send_a_password_reset_email"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: sendEmailVerification
    import_path: "firebase"
    description: >
      Sends a verification email to a user. Called as sendEmailVerification(user).
      Requires an authenticated User object. Throws FirebaseError on rate limiting,
      already verified, or network failure. Common after registration.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — AuthErrorCode enum
      # Source: https://firebase.google.com/docs/reference/js/auth#sendemailverification
      - id: auth-send-email-verification-error
        condition: >
          sendEmailVerification() called without try-catch.
        throws: >
          FirebaseError with code: auth/too-many-requests (sending too fast),
          auth/user-token-expired (user session expired — requires re-authentication),
          auth/network-request-failed (network failure),
          auth/user-disabled (account suspended),
          auth/invalid-user-token (user token invalid — session may be stale).
        required_handling: >
          Caller MUST wrap await sendEmailVerification() in try-catch.
          auth/too-many-requests: Firebase limits verification email frequency — handle gracefully
          and inform user to wait before resending.
          auth/user-token-expired: User must sign in again before verification can be sent.

          try {
            await sendEmailVerification(user);
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/too-many-requests') {
                throw new Error('Verification email already sent. Please wait before resending.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth#sendemailverification"
          - "https://firebase.google.com/docs/auth/web/manage-users#send_a_user_a_verification_email"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: authentication_failure
          incident_cost_range: low

  - name: deleteUser
    import_path: "firebase"
    description: >
      Deletes and signs out the user. Called as deleteUser(user). Security-sensitive —
      requires the user to have recently signed in. If not, throws auth/requires-recent-login.
      Critical for GDPR compliance and account deletion flows.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — confirmed from JSDoc comment
      # "this is a security-sensitive operation that requires the user to have recently signed in"
      # Source: https://firebase.google.com/docs/reference/js/auth#deleteuser
      - id: auth-delete-user-requires-recent-login
        condition: >
          deleteUser() called without try-catch when user has not recently authenticated.
        throws: >
          FirebaseError with code: auth/requires-recent-login (user's last sign-in was too long ago —
          must re-authenticate before this security-sensitive operation),
          auth/user-not-found (user was already deleted — race condition),
          auth/network-request-failed (network failure),
          auth/user-disabled (account was suspended).
        required_handling: >
          Caller MUST wrap await deleteUser() in try-catch.
          auth/requires-recent-login is THE most important case: prompt user to sign in again
          using reauthenticateWithCredential() before retrying.
          This is the standard Firebase security pattern for sensitive operations.

          try {
            await deleteUser(user);
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/requires-recent-login') {
                // Prompt re-authentication flow, then retry
                await reauthenticateWithCredential(user, credential);
                await deleteUser(user);
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth#deleteuser"
          - "https://firebase.google.com/docs/auth/web/manage-users#delete_a_user"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: signOut
    import_path: "firebase"
    description: >
      Signs out the current user. Called as signOut(auth). Generally succeeds unless
      there is a network issue. Clears the local auth state regardless of server response.
      Rarely throws in practice but must be handled.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts; confirmed from git-friend scan
      # Source: https://firebase.google.com/docs/reference/js/auth#signout
      - id: auth-sign-out-error
        condition: >
          signOut() called without try-catch.
        throws: >
          FirebaseError with code: auth/network-request-failed (network failure during token revocation),
          auth/internal-error (internal Firebase error, rare).
          Note: signOut() clears local auth state even if the server request fails, so
          users are effectively signed out locally even on error.
        required_handling: >
          Caller MUST wrap await signOut() in try-catch to prevent unhandled rejections.
          Network failures during signOut are rare but possible. The local session is
          cleared regardless, so handle gracefully (log the error, redirect to login page).

          try {
            await signOut(auth);
            router.push('/login');
          } catch (error) {
            // Sign out failed on server, but local session is cleared
            console.error('Sign out error:', error);
            router.push('/login'); // Redirect regardless
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth#signout"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low

  - name: getIdToken
    import_path: "firebase"
    description: >
      Returns the current user's ID token, refreshing it if expired. Called as
      getIdToken(user, forceRefresh?). Makes an HTTPS request to refresh the token
      when it's within 5 minutes of expiry. Used in virtually every authenticated
      API call in Firebase-based SaaS apps.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — JSDoc confirms refresh behavior
      # Source: https://firebase.google.com/docs/reference/js/auth#getidtoken
      - id: auth-get-id-token-expired
        condition: >
          getIdToken() called without try-catch when user session is expired or revoked.
        throws: >
          FirebaseError with code: auth/user-token-expired (token expired and cannot be refreshed —
          user must sign in again), auth/user-disabled (account suspended while token was valid),
          auth/user-not-found (user deleted), auth/network-request-failed (network failure
          during token refresh), auth/invalid-user-token (token is malformed).
        required_handling: >
          Caller MUST wrap await getIdToken() in try-catch.
          auth/user-token-expired is the most common case — user session invalidated
          (password changed, token revoked from console, user deleted).
          On token errors, sign the user out and redirect to login.

          try {
            const token = await getIdToken(user);
            // Use token in Authorization header
            return fetch('/api/...', { headers: { Authorization: `Bearer ${token}` } });
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/user-token-expired' || error.code === 'auth/user-not-found') {
                await signOut(auth);
                router.push('/login');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth#getidtoken"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: updateEmail
    import_path: "firebase"
    description: >
      Updates the email address on a user account. Called as updateEmail(user, newEmail).
      Security-sensitive — requires the user to have recently signed in. Deprecated in
      favor of verifyBeforeUpdateEmail(), but still widely used in existing codebases.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — JSDoc confirms requires-recent-login
      # Source: https://firebase.google.com/docs/reference/js/auth#updateemail
      - id: auth-update-email-requires-recent-login
        condition: >
          updateEmail() called without try-catch when user session is stale.
        throws: >
          FirebaseError with code: auth/requires-recent-login (must re-authenticate before
          changing email — security requirement), auth/email-already-in-use (email taken
          by another account), auth/invalid-email (malformed email),
          auth/operation-not-allowed (Email Enumeration Protection enabled — use verifyBeforeUpdateEmail instead),
          auth/network-request-failed (network failure).
        required_handling: >
          Caller MUST wrap await updateEmail() in try-catch.
          auth/requires-recent-login is the most common error — prompt re-authentication.
          IMPORTANT: auth/operation-not-allowed means Email Enumeration Protection is enabled
          (default since 2023) — migrate to verifyBeforeUpdateEmail() which is the secure alternative.

          try {
            await updateEmail(user, newEmail);
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/requires-recent-login') {
                throw new Error('Please sign in again to change your email');
              }
              if (error.code === 'auth/email-already-in-use') {
                throw new Error('Email already in use');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth#updateemail"
          - "https://firebase.google.com/docs/auth/web/manage-users#update_a_users_email"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: updatePassword
    import_path: "firebase"
    description: >
      Updates the password on a user account. Called as updatePassword(user, newPassword).
      Security-sensitive — requires recent sign-in. Throws on weak password, recent
      login required, or network failure.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — AuthErrorCode enum + JSDoc
      # Source: https://firebase.google.com/docs/reference/js/auth#updatepassword
      - id: auth-update-password-error
        condition: >
          updatePassword() called without try-catch.
        throws: >
          FirebaseError with code: auth/requires-recent-login (must re-authenticate —
          changing passwords is a security-sensitive operation), auth/weak-password
          (password too short, usually < 6 characters), auth/network-request-failed
          (network failure), auth/user-disabled (account suspended).
        required_handling: >
          Caller MUST wrap await updatePassword() in try-catch.
          auth/requires-recent-login requires prompting the user to sign in again.
          auth/weak-password should be caught with client-side validation first.

          try {
            await updatePassword(user, newPassword);
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/requires-recent-login') {
                throw new Error('Please sign in again to change your password');
              }
              if (error.code === 'auth/weak-password') {
                throw new Error('Password must be at least 6 characters');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth#updatepassword"
          - "https://firebase.google.com/docs/auth/web/manage-users#update_a_users_password"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: confirmPasswordReset
    import_path: "firebase"
    description: >
      Completes the password reset process given a confirmation code and new password.
      Called as confirmPasswordReset(auth, oobCode, newPassword). The oobCode comes from
      the password reset email link. Throws on expired/invalid code, weak password.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — AuthErrorCode enum
      # Source: https://firebase.google.com/docs/reference/js/auth#confirmpasswordreset
      - id: auth-confirm-password-reset-error
        condition: >
          confirmPasswordReset() called without try-catch when the reset code is invalid or expired.
        throws: >
          FirebaseError with code: auth/expired-action-code (reset link older than 1 hour —
          user must request a new one), auth/invalid-action-code (malformed or already-used code),
          auth/user-not-found (account deleted since reset was requested),
          auth/user-disabled (account suspended), auth/weak-password (new password too short),
          auth/network-request-failed (network failure).
        required_handling: >
          Caller MUST wrap await confirmPasswordReset() in try-catch.
          auth/expired-action-code is the most common error — reset links expire after 1 hour.
          Prompt the user to request a new reset email.
          auth/invalid-action-code may mean the link was already used (single-use codes).

          try {
            await confirmPasswordReset(auth, oobCode, newPassword);
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/expired-action-code') {
                throw new Error('Reset link has expired. Please request a new one.');
              }
              if (error.code === 'auth/invalid-action-code') {
                throw new Error('Reset link is invalid or has already been used.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth#confirmpasswordreset"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  # ----- Firestore functions (new in depth pass 2026-04-03) -----

  - name: getDoc
    import_path: "firebase"
    description: >
      Reads a single document from Firestore. Called as getDoc(docRef). Makes an HTTPS
      request to Firestore. Returns a DocumentSnapshot — does NOT throw if the document
      doesn't exist (check snapshot.exists()). Throws on permission denied or network failure.

    postconditions:
      # Evidence: seen in 7 primary firings across 2 repos in scan-firebase-2026-04-11.json
      # Top affected: gdg-x/hoverboard (⭐ varied), ccrsxx/twitter-clone (⭐ varied)
      # Evidence: @firebase/firestore/dist/index.d.ts — confirmed FirestoreErrorCode type
      # Source: https://firebase.google.com/docs/reference/js/firestore_#getdoc
      - id: firestore-get-doc-error
        condition: >
          getDoc() called without try-catch.
        throws: >
          FirebaseError (FirestoreError) with code: permission-denied (Firestore Security Rules
          block access), unavailable (network failure or Firebase outage — may resolve after retry),
          unauthenticated (user not signed in when rules require auth),
          not-found (collection or database doesn't exist — not thrown for missing docs).
          IMPORTANT: Returns empty DocumentSnapshot (snapshot.exists() === false) for missing
          documents — does NOT throw. Check snapshot.exists() before accessing snapshot.data().
        required_handling: >
          Caller MUST wrap await getDoc() in try-catch AND check snapshot.exists() before access.
          permission-denied is very common during development (Firestore rules misconfigured).
          Failing to check exists() causes data() to return undefined, causing null reference errors.

          try {
            const snapshot = await getDoc(doc(db, 'users', userId));
            if (!snapshot.exists()) {
              throw new Error('User not found');
            }
            return snapshot.data();
          } catch (error) {
            if (error instanceof FirebaseError) {
              console.error('Firestore read failed:', error.code, error.message);
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/firestore_#getdoc"
          - "https://firebase.google.com/docs/firestore/query-data/get-data"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: runTransaction
    import_path: "firebase"
    description: >
      Executes a Firestore transaction. Called as runTransaction(db, async (t) => {...}).
      Retries automatically up to 5 times on contention. Fails if 5 retries exceeded,
      any read document was modified externally, or the transaction function throws.
      Maximum 500 writes per transaction.

    postconditions:
      # Evidence: @firebase/firestore/dist/index.d.ts — JSDoc confirms retry behavior and error
      # "If it fails to commit after 5 attempts, the transaction fails"
      # Source: https://firebase.google.com/docs/reference/js/firestore_#runtransaction
      - id: firestore-transaction-contention
        condition: >
          runTransaction() called without try-catch when there is high write contention
          or the transaction function throws.
        throws: >
          FirebaseError (FirestoreError) with code: aborted (failed to commit after 5 retries
          due to high write contention), permission-denied (Security Rules block a read or write
          inside the transaction), unavailable (network failure), failed-precondition
          (transaction read document that no longer exists), resource-exhausted (quota exceeded),
          invalid-argument (more than 500 writes in one transaction).
          Also re-throws any error thrown inside the updateFunction.
        required_handling: >
          Caller MUST wrap await runTransaction() in try-catch.
          aborted after 5 retries is the most critical case — indicates hot document (high contention).
          Consider sharding the counter or using FieldValue.increment() instead of transactions for counters.
          Errors thrown inside updateFunction propagate as-is — wrap with custom errors for clarity.

          try {
            const result = await runTransaction(db, async (t) => {
              const docSnap = await t.get(docRef);
              if (!docSnap.exists()) throw new Error('Document not found');
              t.update(docRef, { count: docSnap.data().count + 1 });
              return docSnap.data().count + 1;
            });
            return result;
          } catch (error) {
            if (error instanceof FirebaseError && error.code === 'aborted') {
              throw new Error('Transaction failed after retries — high contention on document');
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/firestore_#runtransaction"
          - "https://firebase.google.com/docs/firestore/manage-data/transactions"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  # ----- Firebase Storage functions (new in depth pass 2026-04-03) -----

  - name: uploadBytes
    import_path: "firebase"
    description: >
      Uploads data to Firebase Storage. Called as uploadBytes(ref, data, metadata?).
      Non-resumable — the entire upload must complete in one request. Throws StorageError
      on unauthorized access, quota exceeded, or network failure.

    postconditions:
      # Evidence: @firebase/storage/dist/storage-public.d.ts — StorageErrorCode enum
      # StorageError extends FirebaseError with code prefixed by 'storage/'
      # Source: https://firebase.google.com/docs/reference/js/storage#uploadbytes
      - id: storage-upload-bytes-error
        condition: >
          uploadBytes() called without try-catch.
        throws: >
          StorageError (extends FirebaseError) with code: storage/unauthorized (Security Rules
          block the upload — user not authenticated or path not allowed), storage/quota-exceeded
          (Firebase Storage quota for the project exceeded), storage/canceled (upload was cancelled),
          storage/retry-limit-exceeded (network too slow or unstable, max retries reached),
          storage/invalid-checksum (data corrupted in transit), storage/unauthenticated
          (no authenticated user). StorageError.code is prefixed with 'storage/'.
        required_handling: >
          Caller MUST wrap await uploadBytes() in try-catch.
          storage/unauthorized is the most common error — check Firebase Storage Security Rules.
          storage/quota-exceeded requires checking Firebase project billing/quota limits.
          storage/retry-limit-exceeded indicates persistent network issues.

          try {
            const result = await uploadBytes(storageRef, file);
            return result.ref.fullPath;
          } catch (error) {
            if (error instanceof StorageError) {
              if (error.code === 'storage/unauthorized') {
                throw new Error('Not authorized to upload files');
              }
              if (error.code === 'storage/quota-exceeded') {
                throw new Error('Storage quota exceeded');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/storage#uploadbytes"
          - "https://firebase.google.com/docs/storage/web/upload-files"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: getDownloadURL
    import_path: "firebase"
    description: >
      Gets the download URL for a file in Firebase Storage. Called as getDownloadURL(ref).
      Makes an HTTPS request to Firebase Storage. Throws StorageError if the object doesn't
      exist or access is denied. Very common in SaaS apps for serving user-uploaded files.

    postconditions:
      # Evidence: @firebase/storage/dist/storage-public.d.ts — StorageErrorCode enum
      # Source: https://firebase.google.com/docs/reference/js/storage#getdownloadurl
      - id: storage-get-download-url-error
        condition: >
          getDownloadURL() called without try-catch.
        throws: >
          StorageError (extends FirebaseError) with code: storage/object-not-found (file was
          deleted or path is wrong — very common bug when referencing stale paths),
          storage/unauthorized (Security Rules deny read access),
          storage/no-download-url (file exists but has no public download URL — requires making
          the bucket public or using signed URLs), storage/bucket-not-found (wrong bucket name
          in Firebase config), storage/unauthenticated (rules require auth).
        required_handling: >
          Caller MUST wrap await getDownloadURL() in try-catch.
          storage/object-not-found is the most common error — file was deleted, moved, or the
          stored path is wrong (race condition between upload and read is common).
          Validate file existence before serving download URLs to users.

          try {
            const url = await getDownloadURL(ref(storage, filePath));
            return url;
          } catch (error) {
            if (error instanceof StorageError) {
              if (error.code === 'storage/object-not-found') {
                throw new Error('File not found');
              }
              if (error.code === 'storage/unauthorized') {
                throw new Error('Not authorized to access this file');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/storage#getdownloadurl"
          - "https://firebase.google.com/docs/storage/web/download-files"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

