  - name: signInAnonymously
    import_path: "firebase"
    description: >
      Signs in as an anonymous user without requiring credentials. Used for guest flows,
      allowing users to use the app before creating an account. Called as signInAnonymously(auth).
      If a current anonymous user is already signed in, returns that user (idempotent).

    postconditions:
      # Evidence: @firebase/auth/dist/auth.d.ts AuthErrorCode enum
      # OPERATION_NOT_ALLOWED="operation-not-allowed", QUOTA_EXCEEDED="quota-exceeded"
      # Source: https://firebase.google.com/docs/auth/web/anonymous-auth
      - id: anonymous-auth-not-enabled-or-quota-exceeded
        condition: >
          signInAnonymously() called without try-catch. Anonymous auth not enabled in
          Firebase Console, or quota for anonymous accounts exceeded.
        throws: >
          FirebaseError with code: auth/operation-not-allowed (anonymous authentication
          not enabled in Firebase Console — frequent misconfiguration in new projects),
          auth/quota-exceeded (new anonymous sign-ups rate-limited, common when deployed
          to production without proper settings), auth/network-request-failed (network failure).
        required_handling: >
          Caller MUST wrap await signInAnonymously() in try-catch.
          auth/operation-not-allowed means Anonymous sign-in is disabled in Firebase Console —
          developers often forget to enable it for new environments (staging, production).
          auth/quota-exceeded means Firebase is rate-limiting new anonymous sign-ups.

          try {
            const result = await signInAnonymously(auth);
            return result.user;
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/operation-not-allowed') {
                throw new Error('Anonymous sign-in is disabled. Enable it in Firebase Console.');
              }
              if (error.code === 'auth/quota-exceeded') {
                throw new Error('Too many anonymous sign-in attempts. Please try again later.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/auth/web/anonymous-auth"
          - "https://firebase.google.com/docs/reference/js/auth.md#signinanonymously"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: updateProfile
    import_path: "firebase"
    description: >
      Updates the current user's displayName and/or photoURL. Called as
      updateProfile(user, { displayName, photoURL }). Makes an HTTPS request to Firebase Auth
      API. Very common in user onboarding flows (set display name after signup).

    postconditions:
      # Evidence: @firebase/auth/dist/auth.d.ts — updateProfile() → Promise<void>
      # Error codes: NETWORK_REQUEST_FAILED, TOKEN_EXPIRED, USER_DELETED
      # Source: https://firebase.google.com/docs/reference/js/auth.md#updateprofile
      - id: update-profile-error
        condition: >
          updateProfile() called without try-catch. User's token expired, user was deleted,
          or network failure.
        throws: >
          FirebaseError with code: auth/network-request-failed (network failure during profile
          update — common in flaky connections), auth/user-token-expired (user's auth token
          has expired, requires re-authentication), auth/user-not-found (user account was
          deleted between sign-in and the profile update call).
        required_handling: >
          Caller MUST wrap await updateProfile() in try-catch.
          auth/user-token-expired requires the user to sign in again.
          This function is commonly called immediately after createUserWithEmailAndPassword()
          in onboarding flows — both should be wrapped together.

          try {
            await updateProfile(auth.currentUser, {
              displayName: name,
              photoURL: avatarUrl
            });
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/network-request-failed') {
                throw new Error('Network error updating profile. Please try again.');
              }
              if (error.code === 'auth/user-token-expired') {
                throw new Error('Session expired. Please sign in again.');
              }
            }
            throw error;
          }
        sources:
