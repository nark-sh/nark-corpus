  - name: updateDoc
    import_path: "firebase"
    description: >
      Updates fields in a Firestore document without overwriting the entire document.
      Throws FirebaseError if the document doesn't exist, permission denied, or network failure.

    postconditions:
      # Evidence: seen in 7 primary firings across 2 repos in scan-firebase-2026-04-11.json
      # Top affected: gdg-x/hoverboard (⭐ varied), ccrsxx/twitter-clone (⭐ varied)
      - id: firestore-error
        condition: >
          Any Firestore failure: document not found (not-found), permission denied,
          invalid data, network failure, or unauthenticated.
        throws: >
          FirebaseError with code. Common codes: not-found, permission-denied,
          invalid-argument, unavailable, unauthenticated.
        required_handling: >
          Caller MUST wrap await updateDoc() in try-catch.
          updateDoc() throws not-found if the document doesn't exist (unlike setDoc).

          try {
            await updateDoc(docRef, { lastUpdated: new Date() });
          } catch (error) {
            console.error('Failed to update document:', error.message);
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/firestore_.md#updatedoc"
          - "https://firebase.google.com/docs/firestore/manage-data/add-data"
        severity: error
        business_impact:
