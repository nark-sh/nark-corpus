  - name: linkWithCredential
    import_path: "firebase"
    description: >
      Links an anonymous account or existing account to an auth credential (email/password,
      OAuth provider, etc.). Called as linkWithCredential(user, credential). Critical for
      anonymous-to-registered account promotion flows and social login linking.

    postconditions:
      # Evidence: @firebase/auth/dist/auth.d.ts AuthErrorCode enum
      # CREDENTIAL_ALREADY_IN_USE="credential-already-in-use", NEED_CONFIRMATION="account-exists-with-different-credential"
      # Source: https://firebase.google.com/docs/reference/js/auth.md#linkwithcredential
      - id: link-credential-conflict
        condition: >
          linkWithCredential() called without try-catch. The credential is already associated
          with another Firebase account, or an account with that email already exists.
        throws: >
          FirebaseError with code: auth/credential-already-in-use (the credential is already
          linked to a different Firebase user account — cannot link the same Google/GitHub account
          to multiple Firebase users), auth/account-exists-with-different-credential (an account
          with the same email already exists but uses a different sign-in method — e.g. user has
          email/password account and tries to link Google with same email), auth/email-already-in-use
          (for email/password credential linking when email is taken), auth/provider-already-linked
          (user already has this provider linked), auth/requires-recent-login (security-sensitive
          operation requires recent sign-in).
        required_handling: >
          Caller MUST wrap await linkWithCredential() in try-catch.
          auth/credential-already-in-use is the most important case — the linked credential's
          user needs to be merged or the conflict resolved.
          auth/account-exists-with-different-credential is very common in social auth flows
          where users try to link an OAuth account that matches an existing email/password account.

          try {
            const result = await linkWithCredential(user, credential);
            return result.user;
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/credential-already-in-use') {
                throw new Error('This account is already linked to another user.');
              }
              if (error.code === 'auth/account-exists-with-different-credential') {
                throw new Error('An account with this email already exists with a different sign-in method.');
              }
              if (error.code === 'auth/requires-recent-login') {
                throw new Error('Please sign in again before linking accounts.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth.md#linkwithcredential"
          - "https://firebase.google.com/docs/auth/web/account-linking"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: reauthenticateWithCredential
    import_path: "firebase"
    description: >
      Re-authenticates a user with a fresh credential before a security-sensitive operation.
      Called as reauthenticateWithCredential(user, credential). Required before deleteUser(),
      updateEmail(), updatePassword() when the user's auth token is too old (requires-recent-login).

    postconditions:
      # Evidence: @firebase/auth/dist/auth.d.ts AuthErrorCode enum
      # INVALID_PASSWORD="wrong-password", CREDENTIAL_TOO_OLD_LOGIN_AGAIN="requires-recent-login"
      # USER_MISMATCH="user-mismatch"
      # Source: https://firebase.google.com/docs/reference/js/auth.md#reauthenticatewithcredential
      - id: reauth-credential-error
        condition: >
          reauthenticateWithCredential() called without try-catch. Wrong password, stale
          credential, or user mismatch.
        throws: >
          FirebaseError with code: auth/wrong-password (incorrect password for email/password
          credential — user mistyped current password), auth/user-mismatch (credential
          does not correspond to the currently signed-in user — wrong account), auth/invalid-credential
          (the auth credential is malformed or has expired — OAuth token expired),
          auth/user-not-found (user account was deleted), auth/network-request-failed
          (network failure during re-auth).
        required_handling: >
          Caller MUST wrap await reauthenticateWithCredential() in try-catch.
          This is required before deleteUser() or updateEmail() — if it fails, the subsequent
          sensitive operation must not proceed. auth/wrong-password is the most common failure.
          auth/user-mismatch means the credentials don't belong to the current user.

          const credential = EmailAuthProvider.credential(email, currentPassword);
          try {
            await reauthenticateWithCredential(auth.currentUser, credential);
            // Now safe to call deleteUser() or updateEmail()
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/wrong-password') {
                throw new Error('Current password is incorrect.');
              }
              if (error.code === 'auth/user-mismatch') {
                throw new Error('Credential does not match the current user.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth.md#reauthenticatewithcredential"
          - "https://firebase.google.com/docs/auth/web/manage-users#re-authenticate_a_user"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: verifyBeforeUpdateEmail
    import_path: "firebase"
    description: >
      Sends a verification email to the new address before updating the user's email.
      The replacement for updateEmail() in projects with Email Enumeration Protection enabled.
      Called as verifyBeforeUpdateEmail(user, newEmail). The email change only takes effect
      after the user clicks the verification link.

    postconditions:
      # Evidence: @firebase/auth/dist/auth.d.ts — EMAIL_CHANGE_NEEDS_VERIFICATION, CREDENTIAL_TOO_OLD_LOGIN_AGAIN
      # Source: https://firebase.google.com/docs/reference/js/auth.md#verifybeforeupdateemail
      - id: verify-before-update-email-error
        condition: >
          verifyBeforeUpdateEmail() called without try-catch. Email already in use,
          requires recent login, or network failure.
        throws: >
          FirebaseError with code: auth/email-already-in-use (new email already registered
          to another account), auth/requires-recent-login (security-sensitive operation —
          user must have signed in within the last few minutes), auth/invalid-email
          (new email address is malformed), auth/network-request-failed (network failure
          during verification email send), auth/operation-not-allowed (email/password
          accounts not enabled — unlikely but possible in Identity Platform configs).
        required_handling: >
          Caller MUST wrap await verifyBeforeUpdateEmail() in try-catch.
          auth/requires-recent-login is the most common failure — the user must reauthenticate
