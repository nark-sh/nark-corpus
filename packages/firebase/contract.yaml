# Firebase JavaScript SDK — auth and Firestore functions throw FirebaseError on failure.
# Firebase uses modular (tree-shakeable) API since v9. Functions imported from subpaths
# (firebase/auth, firebase/firestore) and called directly — all can throw FirebaseError.
# FirebaseError has: code (string like "auth/wrong-password"), message (string).
# Auth errors are expected in production (invalid credentials, suspended accounts).
# Firestore errors occur on permission denial, network failure, or missing documents.
package: firebase
semver: ">=9.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.83  # 35 contracted / 42 total async-callable (after intentional omissions)
# effective_coverage: 0.83 — 35/42 considered functions contracted (+5 this pass: applyActionCode,
#   getRedirectResult, signInWithCustomToken, uploadString, getMetadata)
# intentionally omitted (~7): signInWithPhoneNumber/linkWithPhoneNumber/updatePhoneNumber (SMS-only niche),
#   getDocFromServer/getDocsFromServer (same errors as getDoc/getDocs, already contracted),
#   fetchSignInMethodsForEmail (deprecated), validatePassword (optional policy enforcement)

functions:
  - name: signInWithEmailAndPassword
    import_path: "firebase"
    description: >
      Signs in a user with email and password via Firebase Authentication.
      The most common auth function in SaaS apps. Makes an HTTPS request to
      Firebase Auth API. Throws FirebaseError on invalid credentials, disabled
      accounts, network failure, or rate limiting.

    postconditions:
      - id: auth-error
        condition: >
          Any Firebase auth failure: invalid email (auth/invalid-email),
          wrong password (auth/wrong-password), user not found (auth/user-not-found),
          user disabled (auth/user-disabled), network failure (auth/network-request-failed),
          or too many requests (auth/too-many-requests).
        throws: >
          FirebaseError with code property. Common codes: auth/invalid-email,
          auth/wrong-password, auth/user-not-found, auth/user-disabled,
          auth/network-request-failed, auth/too-many-requests.
          FirebaseError extends Error with code: string and customData: object.
        required_handling: >
          Caller MUST wrap await signInWithEmailAndPassword() in try-catch.
          Auth failures are common in production — invalid credentials, disabled accounts.
          Unhandled rejection crashes the process or returns 500 to the user.

          try {
            const credential = await signInWithEmailAndPassword(auth, email, password);
            return credential.user;
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/wrong-password') throw new Error('Invalid password');
              if (error.code === 'auth/user-not-found') throw new Error('User not found');
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth.md#signinwithemailandpassword"
          - "https://firebase.google.com/docs/auth/web/password-auth"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: createUserWithEmailAndPassword
    import_path: "firebase"
    description: >
      Creates a new user account with email and password. Makes an HTTPS request
      to Firebase Auth API. Throws FirebaseError on weak password, email already
      in use, invalid email format, or network failure.

    postconditions:
      - id: auth-error
        condition: >
          Any Firebase auth failure: email already in use (auth/email-already-in-use),
          invalid email (auth/invalid-email), weak password (auth/weak-password),
          operation not allowed (auth/operation-not-allowed), or network failure.
        throws: >
          FirebaseError with code. Common codes: auth/email-already-in-use,
          auth/invalid-email, auth/weak-password, auth/operation-not-allowed,
          auth/network-request-failed.
        required_handling: >
          Caller MUST wrap await createUserWithEmailAndPassword() in try-catch.
          Registration failures are expected (email conflicts, weak passwords).

          try {
            const credential = await createUserWithEmailAndPassword(auth, email, password);
            return credential.user;
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/email-already-in-use') throw new Error('Email taken');
              if (error.code === 'auth/weak-password') throw new Error('Password too weak');
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth.md#createuserwithemailandpassword"
          - "https://firebase.google.com/docs/auth/web/password-auth"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: signInWithPopup
    import_path: "firebase"
    description: >
      Signs in using a popup window with a third-party provider (Google, GitHub, etc.).
      Makes HTTPS requests to Firebase Auth API. Throws FirebaseError when popup is
      blocked, user cancels sign-in, account conflict, or network failure.

    postconditions:
      - id: auth-error
        condition: >
          Any auth failure: popup blocked (auth/popup-blocked), user cancelled
          (auth/popup-closed-by-user), account exists with different credential
          (auth/account-exists-with-different-credential), network failure,
          or cancelled popup before completion (auth/cancelled-popup-request).
        throws: >
          FirebaseError with code. Common codes: auth/popup-blocked,
          auth/popup-closed-by-user, auth/account-exists-with-different-credential,
          auth/cancelled-popup-request, auth/network-request-failed.
        required_handling: >
          Caller MUST wrap await signInWithPopup() in try-catch.
          Popup blocking is common — adblockers and browser settings frequently
          block popups. User cancellation is also a normal flow.

          try {
            const result = await signInWithPopup(auth, provider);
            return result.user;
          } catch (error) {
            if (error instanceof FirebaseError && error.code === 'auth/popup-blocked') {
              // Fallback to redirect or inform user
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth.md#signinwithpopup"
          - "https://firebase.google.com/docs/auth/web/google-signin"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: getDocs
    import_path: "firebase"
    description: >
      Executes a Firestore query and returns all matching documents. Makes an HTTPS
      request to Firestore. Throws FirebaseError on permission denied, network failure,
      invalid query, or project not found.

    postconditions:
      - id: firestore-error
        condition: >
          Any Firestore failure: permission denied (permission-denied),
          network failure (unavailable), resource not found (not-found),
          invalid query arguments (invalid-argument), or unauthenticated (unauthenticated).
        throws: >
          FirebaseError with code. Common codes: permission-denied, unavailable,
          not-found, invalid-argument, unauthenticated, resource-exhausted (quota).
        required_handling: >
          Caller MUST wrap await getDocs() in try-catch.
          Permission denied errors happen when Firestore Security Rules block access.
          Network failures occur in offline scenarios or during Firebase outages.

          try {
            const snapshot = await getDocs(q);
            return snapshot.docs.map(doc => doc.data());
          } catch (error) {
            console.error('Firestore query failed:', error.message);
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/firestore_.md#getdocs"
          - "https://firebase.google.com/docs/firestore/query-data/get-data"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: addDoc
    import_path: "firebase"
    description: >
      Adds a new document to a Firestore collection with an auto-generated ID.
      Makes an HTTPS request to Firestore. Throws FirebaseError on permission denied,
      invalid data, or network failure.

    postconditions:
      - id: firestore-error
        condition: >
          Any Firestore failure: permission denied, invalid data (undefined values,
          circular references), network failure, or quota exceeded.
        throws: >
          FirebaseError with code. Common codes: permission-denied, invalid-argument,
          unavailable, unauthenticated, resource-exhausted.
        required_handling: >
          Caller MUST wrap await addDoc() in try-catch.
          Permission denied is common when users are not authenticated or Firestore
          Security Rules block writes.

          try {
            const docRef = await addDoc(collection(db, 'items'), data);
            return docRef.id;
          } catch (error) {
            console.error('Failed to add document:', error.message);
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/firestore_.md#adddoc"
          - "https://firebase.google.com/docs/firestore/manage-data/add-data"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

