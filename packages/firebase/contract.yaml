  # ----- Additional Firestore functions (depth pass 2026-04-17, deepen-stream-2 pass 3) -----

  - name: writeBatch.commit
    import_path: "firebase"
    description: >
      Commits a WriteBatch — executes multiple Firestore write operations atomically.
      WriteBatch is created via writeBatch(firestore). Operations (set, update, delete) are
      added via batch.set/update/delete, then committed via batch.commit(). Maximum 500
      operations per batch. The batch will not resolve while offline.

    postconditions:
      # Evidence: @firebase/firestore/dist/index.d.ts — WriteBatch.commit(): Promise<void>
      # FirestoreErrorCode = 'permission-denied' | 'not-found' | 'resource-exhausted' | etc.
      # Source: https://firebase.google.com/docs/reference/js/firestore_.writebatch#writebatchcommit
      - id: batch-commit-permission-denied
        condition: >
          batch.commit() called without try-catch. Firestore Security Rules deny one or more
          writes in the batch, or the batch exceeds 500 operations.
        throws: >
          FirebaseError (FirestoreError) with code: permission-denied (Security Rules block
          one or more write operations in the batch — the entire batch fails atomically),
          not-found (a batch.update() or batch.delete() references a document that does not
          exist), resource-exhausted (batch exceeds 500 operations or rate limits),
          unavailable (Firestore temporarily unavailable — transient network/service issue),
          unauthenticated (user not authenticated and rules require auth).
          The WriteBatch.commit() Promise will never resolve while offline.
        required_handling: >
          Caller MUST wrap await batch.commit() in try-catch.
          A single permission-denied write in the batch fails ALL writes atomically.
          Check that all document paths in the batch pass Security Rules before committing.
          Monitor for resource-exhausted if batches dynamically grow with user-generated content.

          const batch = writeBatch(db);
          batch.set(doc(db, 'users', userId), userData);
          batch.update(doc(db, 'counters', 'users'), { count: increment(1) });

          try {
            await batch.commit();
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'permission-denied') {
                throw new Error('Not authorized to perform this update.');
              }
              if (error.code === 'resource-exhausted') {
                throw new Error('Batch too large or rate limit exceeded. Reduce batch size.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/firestore_.writebatch#writebatchcommit"
          - "https://firebase.google.com/docs/firestore/manage-data/transactions#batched-writes"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: getCountFromServer
    import_path: "firebase"
    description: >
      Counts documents matching a Firestore query by executing the count on the server.
      Called as getCountFromServer(query). Returns an AggregateQuerySnapshot where the
      count is accessed via snapshot.data().count. Requires Spark plan or Blaze plan.
      Common for pagination (total page count) and dashboard metrics.

    postconditions:
      # Evidence: @firebase/firestore/dist/index.d.ts — getCountFromServer returns Promise<AggregateQuerySnapshot>
      # FirestoreErrorCode enum: 'permission-denied', 'resource-exhausted', 'unauthenticated'
      # Source: https://firebase.google.com/docs/reference/js/firestore_.md#getcountfromserver
      - id: count-from-server-error
        condition: >
          getCountFromServer() called without try-catch. Firestore Security Rules deny the
          query, or the underlying index is not ready.
        throws: >
          FirebaseError (FirestoreError) with code: permission-denied (Security Rules deny
          the underlying query the count is based on — common when the query has compound
          filters that require field-level auth), unauthenticated (user not authenticated
          and Security Rules require auth), failed-precondition (composite index not yet
          built for the query — very common during development when adding new queries),
          resource-exhausted (project quota exceeded or too many reads in short window),
          unavailable (Firestore temporarily unavailable).
        required_handling: >
          Caller MUST wrap await getCountFromServer() in try-catch.
          failed-precondition with a message about missing indexes is very common during
          development — Firestore will include the index creation URL in the error message.
          permission-denied occurs when Security Rules don't allow the underlying collection read.

          try {
            const snapshot = await getCountFromServer(query(collection(db, 'orders'),
              where('userId', '==', userId)));
            return snapshot.data().count;
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'permission-denied') {
                throw new Error('Not authorized to count this collection.');
              }
              if (error.code === 'failed-precondition') {
                throw new Error('Missing Firestore index. Check Firebase Console.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/firestore_.md#getcountfromserver"
          - "https://firebase.google.com/docs/firestore/query-data/aggregation-queries"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  # ----- Additional Storage functions (depth pass 2026-04-17, deepen-stream-2 pass 3) -----

  - name: deleteObject
    import_path: "firebase"
    description: >
      Deletes a file from Firebase Storage. Called as deleteObject(ref).
      Common in user profile flows (replace avatar), content management (remove files),
      and cleanup operations. Does NOT delete Firestore documents that reference the file —
      the caller must handle both deletions.

    postconditions:
      # Evidence: @firebase/storage/dist/storage-public.d.ts — deleteObject(ref): Promise<void>
      # StorageErrorCode enum: 'storage/object-not-found', 'storage/unauthorized'
      # Source: https://firebase.google.com/docs/reference/js/storage.md#deleteobject
      - id: delete-object-error
        condition: >
          deleteObject() called without try-catch. File does not exist, or Security Rules
          deny the delete operation.
        throws: >
          StorageError (extends FirebaseError) with code: storage/object-not-found (file
          was already deleted or path is wrong — concurrent deletion is common in user-facing
          apps where users can delete from multiple sessions), storage/unauthorized (Security
          Rules deny the delete — user does not own the file or rules require ownership check),
          storage/unauthenticated (user is not authenticated but rules require auth),
          storage/retry-limit-exceeded (network failure with all retries exhausted).
        required_handling: >
          Caller MUST wrap await deleteObject() in try-catch.
          storage/object-not-found should be treated as a success (idempotent delete is safe)
          or at minimum should not crash the user-facing operation.
          Always check Security Rules: rules must verify file ownership to prevent users
          deleting others' files.

          try {
            await deleteObject(ref(storage, filePath));
          } catch (error) {
            if (error instanceof StorageError) {
              if (error.code === 'storage/object-not-found') {
                // File already deleted — treat as success for idempotent delete
                return;
              }
              if (error.code === 'storage/unauthorized') {
                throw new Error('Not authorized to delete this file.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/storage.md#deleteobject"
          - "https://firebase.google.com/docs/storage/web/delete-files"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  # ----- Firebase Cloud Functions callable (depth pass 2026-04-17, deepen-stream-2 pass 3) -----

  - name: httpsCallable
    import_path: "firebase"
    description: >
      Returns a reference to a callable Firebase Cloud Function, then calls it.
      Used as: const fn = httpsCallable(functions, 'myFunction'); const result = await fn(data).
      The HttpsCallable reference itself does not throw — the error happens when the returned
      function is called. Throws FunctionsError with gRPC-compatible codes. Common in SaaS
      apps for server-side business logic, payment processing, and third-party API calls.

    postconditions:
      # Evidence: @firebase/functions/dist/functions-public.d.ts — FunctionsErrorCode type
      # FunctionsErrorCodeCore: 'unauthenticated' | 'permission-denied' | 'not-found' | 'internal' | etc.
      # FunctionsError extends FirebaseError with code: `functions/${FunctionsErrorCodeCore}`
      # Source: https://firebase.google.com/docs/functions/callable?gen=2nd
      - id: functions-call-unauthenticated-or-permission-denied
        condition: >
          httpsCallable(functions, name) result called without try-catch. User not authenticated,
          permission denied, function not found, or internal server error.
        throws: >
          FunctionsError (extends FirebaseError) with code: functions/unauthenticated (function
          requires Firebase Authentication and user is not signed in), functions/permission-denied
          (user is signed in but does not have permission to call this function — typically
          enforced via Firebase Auth claims check in the function), functions/not-found (function
          does not exist or was not deployed — common during development), functions/internal
          (unhandled exception in the Cloud Function — function threw an error not wrapped in
          HttpsError), functions/unavailable (Cloud Functions temporarily unavailable — transient),
          functions/deadline-exceeded (function execution timeout — 60s default),
          functions/resource-exhausted (quota exceeded — max concurrent calls reached).
        required_handling: >
          Caller MUST wrap await fn(data) in try-catch, NOT await httpsCallable() itself.
          functions/unauthenticated means the user must sign in before calling the function.
          functions/internal means the Cloud Function itself crashed — check server logs.
          functions/permission-denied is an application-level authorization failure.
          Use error.code to distinguish user-facing errors from internal server errors.

          const sendInvite = httpsCallable(functions, 'sendInvite');
          try {
            const result = await sendInvite({ email, organizationId });
            return result.data;
          } catch (error) {
            if (error instanceof FunctionsError) {
              if (error.code === 'functions/unauthenticated') {
                throw new Error('Please sign in to perform this action.');
              }
              if (error.code === 'functions/permission-denied') {
                throw new Error('You do not have permission to perform this action.');
              }
              if (error.code === 'functions/internal') {
                throw new Error('Server error. Please try again later.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/functions/callable?gen=2nd"
          - "https://firebase.google.com/docs/reference/js/functions.md#httpscallable"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: applyActionCode
    import_path: "firebase"
    description: >
      Applies a Firebase Auth out-of-band (OOB) action code — used to complete email
      verification, password reset confirmation, and email change confirmation flows.
      Called from the page the user lands on after clicking an action link in an email.
      Throws FirebaseError on expired, invalid, used, or revoked codes.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — applyActionCode(auth, oobCode): Promise<void>
      # Error codes confirmed from @firebase/auth/dist/index.webworker.js — AuthErrorCode enum:
      # EXPIRED_OOB_CODE='auth/expired-action-code', INVALID_OOB_CODE='auth/invalid-action-code',
      # USER_DISABLED='auth/user-disabled', USER_DELETED='auth/user-not-found'.
      - id: apply-action-code-error
        condition: >
          applyActionCode(auth, oobCode) called without try-catch. Action code is expired,
          invalid (malformed or already used), or the associated user has been disabled or deleted.
        throws: >
          FirebaseError with code property. Common codes: auth/expired-action-code (code has
          passed its TTL — Firebase action codes expire after ~1 hour by default),
          auth/invalid-action-code (code is malformed, used a second time, or revoked),
          auth/user-disabled (the user account associated with the code was disabled by an admin),
          auth/user-not-found (the user account associated with the code was deleted between
          email send and link click).
        required_handling: >
          Caller MUST wrap await applyActionCode() in try-catch. Action codes commonly fail in
          production — users click email links hours later, paste codes into the wrong tab,
          or retry already-applied codes. Unhandled rejection breaks the verification flow
          and leaves the user staring at a generic error page.

          try {
            await applyActionCode(auth, oobCode);
            return { verified: true };
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/expired-action-code') {
                return { error: 'This verification link has expired. Please request a new one.' };
              }
              if (error.code === 'auth/invalid-action-code') {
                return { error: 'This verification link is no longer valid. It may have already been used.' };
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth.md#applyactioncode"
          - "https://firebase.google.com/docs/auth/web/manage-users#send_a_password_reset_email"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: getRedirectResult
    import_path: "firebase"
    description: >
      Returns the UserCredential from a redirect-based sign-in flow (signInWithRedirect,
      linkWithRedirect, reauthenticateWithRedirect). Called on page load after Firebase
      redirects back from the OAuth provider. Returns null if no redirect operation is pending.
      Throws on credential conflicts, account collisions, and provider rejections.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — getRedirectResult(auth, resolver?): Promise<UserCredential | null>
      # AuthErrorCode hierarchy confirmed from @firebase/auth/dist/index.webworker.js:
      # ACCOUNT_EXISTS_WITH_DIFFERENT_CREDENTIAL='auth/account-exists-with-different-credential',
      # CREDENTIAL_ALREADY_IN_USE='auth/credential-already-in-use',
      # POPUP_CLOSED_BY_USER='auth/popup-closed-by-user' (redirect equivalents apply).
      - id: redirect-result-error
        condition: >
          getRedirectResult(auth) called without try-catch on the post-redirect page. OAuth
          provider rejected the sign-in, an account already exists with the same email under
          a different provider, or the credential is already linked to another user.
        throws: >
          FirebaseError with code property. Common codes: auth/account-exists-with-different-credential
          (the email returned by the provider is already linked to another sign-in method —
          common when a user signs up with Google then tries to sign in with Apple using the same
          email), auth/credential-already-in-use (linkWithRedirect: this provider credential is
          already linked to a different Firebase user — must merge or unlink first),
          auth/web-storage-unsupported (browser blocks sessionStorage — third-party cookies disabled,
          Safari ITP, incognito mode), auth/operation-not-supported-in-this-environment
          (called from a non-browser environment), auth/network-request-failed (network error
          during token exchange), auth/internal-error (Firebase Auth backend issue).
        required_handling: >
          Caller MUST wrap await getRedirectResult() in try-catch. This is the FIRST thing
          that runs after a successful OAuth redirect — an unhandled rejection here means
          the user lands on a broken page with no recovery path. Web storage errors are
          especially common in Safari and incognito sessions.

          try {
            const result = await getRedirectResult(auth);
            if (result) {
              return { user: result.user };
            }
            return { user: null };
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/account-exists-with-different-credential') {
                return { error: 'An account with this email exists. Sign in with your original provider.' };
              }
              if (error.code === 'auth/web-storage-unsupported') {
                return { error: 'Your browser blocks the storage needed to sign in. Try a different browser or enable third-party cookies.' };
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth.md#getredirectresult"
          - "https://firebase.google.com/docs/auth/web/redirect-best-practices"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: signInWithCustomToken
    import_path: "firebase"
    description: >
      Signs a user in using a custom JWT minted by the application's backend via the Firebase
      Admin SDK. Used to bridge external identity providers (SSO, legacy auth systems) into
      Firebase Auth. Throws on malformed tokens, wrong audience, expired tokens, or disabled accounts.

    postconditions:
      # Evidence: @firebase/auth/dist/auth-public.d.ts — signInWithCustomToken(auth, customToken): Promise<UserCredential>
      # AuthErrorCode codes confirmed from @firebase/auth/dist/index.webworker.js:
      # INVALID_CUSTOM_TOKEN='auth/invalid-custom-token' ("The custom token format is incorrect"),
      # CREDENTIAL_MISMATCH='auth/custom-token-mismatch' ("The custom token corresponds to a
      # different audience"), USER_DISABLED='auth/user-disabled'.
      - id: custom-token-error
        condition: >
          signInWithCustomToken(auth, token) called without try-catch. Custom token is malformed,
          expired, signed by a different Firebase project (wrong audience), or the user account
          was disabled.
        throws: >
          FirebaseError with code property. Common codes: auth/invalid-custom-token (token is
          not a valid Firebase custom token — usually missing claims, wrong format, or expired),
          auth/custom-token-mismatch (token was signed for a different Firebase project — common
          when staging tokens leak into production or vice versa), auth/user-disabled (the
          target uid is disabled in the Firebase console), auth/network-request-failed
          (network issue during token verification).
        required_handling: >
          Caller MUST wrap await signInWithCustomToken() in try-catch. Custom token sign-in is
          the bridge between a backend auth system and Firebase — failures here lock users out
          of every Firebase feature (Firestore, Storage, Functions). Token-mismatch errors are
          especially insidious because they only surface in production when env vars get swapped.

          try {
            const credential = await signInWithCustomToken(auth, customToken);
            return { user: credential.user };
          } catch (error) {
            if (error instanceof FirebaseError) {
              if (error.code === 'auth/invalid-custom-token' || error.code === 'auth/custom-token-mismatch') {
                console.error('Custom token rejected — check backend token minting:', error.code);
                throw new Error('Authentication failed. Please contact support.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/auth.md#signinwithcustomtoken"
          - "https://firebase.google.com/docs/auth/admin/create-custom-tokens"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: uploadString
    import_path: "firebase"
    description: >
      Uploads a string (raw text, base64, base64url, or data_url) to Firebase Storage.
      Commonly used for serialized JSON, canvas-derived data URIs (screenshots, signatures),
      and small text artifacts. Throws StorageError on permission denial, quota exhaustion,
      or invalid format.

    postconditions:
      # Evidence: @firebase/storage/dist/storage-public.d.ts — uploadString(ref, value, format?, metadata?): Promise<UploadResult>
      # StorageErrorCode confirmed from @firebase/storage/dist/index.cjs.js:
      # OBJECT_NOT_FOUND='storage/object-not-found', UNAUTHORIZED='storage/unauthorized',
      # QUOTA_EXCEEDED='storage/quota-exceeded', RETRY_LIMIT_EXCEEDED='storage/retry-limit-exceeded',
      # UNAUTHORIZED_APP='storage/unauthorized-app', INVALID_URL='storage/invalid-url'.
      - id: upload-string-error
        condition: >
          uploadString(ref, value, format) called without try-catch. Storage security rules
          deny the upload, the bucket quota is exhausted, the network drops mid-upload, or
          the string format is invalid for the declared format type.
        throws: >
          StorageError (extends FirebaseError) with code property. Common codes:
          storage/unauthorized (security rules deny write — common when uid in path doesn't
          match auth.uid), storage/quota-exceeded (bucket free-tier quota exhausted),
          storage/retry-limit-exceeded (network failed all retries — slow connection or
          backend issue), storage/unauthorized-app (App Check failure — common during
          development), storage/invalid-format (string isn't valid for the declared format,
          e.g. malformed base64 or data URL with wrong MIME).
        required_handling: >
          Caller MUST wrap await uploadString() in try-catch. Upload failures must be
          distinguished from success — silently treating a rejection as success leaves
          downstream features (avatar display, document export) referencing nonexistent
          objects.

          try {
            const snapshot = await uploadString(ref, dataUrl, 'data_url');
            return { path: snapshot.ref.fullPath };
          } catch (error) {
            if (error instanceof StorageError) {
              if (error.code === 'storage/unauthorized') {
                throw new Error('You do not have permission to upload here.');
              }
              if (error.code === 'storage/quota-exceeded') {
                throw new Error('Storage quota exceeded. Please contact support.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/storage.md#uploadstring"
          - "https://firebase.google.com/docs/storage/web/handle-errors"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

  - name: getMetadata
    import_path: "firebase"
    description: >
      Retrieves the metadata (size, contentType, customMetadata, timeCreated, etc.) for a
      Firebase Storage object. Commonly used to validate object existence before download,
      check content types before display, and read custom metadata set during upload.
      Throws StorageError on missing objects, permission denial, or network failure.

    postconditions:
      # Evidence: @firebase/storage/dist/storage-public.d.ts — getMetadata(ref): Promise<FullMetadata>
      # StorageErrorCode confirmed from @firebase/storage/dist/index.cjs.js:
      # OBJECT_NOT_FOUND='storage/object-not-found' ("Object '${path}' does not exist."),
      # UNAUTHORIZED='storage/unauthorized' ("User does not have permission to access '${path}'.").
      - id: get-metadata-error
        condition: >
          getMetadata(ref) called without try-catch. Object does not exist at the referenced
          path, the user lacks read permission per Storage rules, or the network request fails.
        throws: >
          StorageError (extends FirebaseError) with code property. Common codes:
          storage/object-not-found (no object at this path — common when checking for
          optional artifacts like profile photos before display), storage/unauthorized
          (Storage rules deny read access — typical when the path encodes a uid different
          from auth.uid), storage/retry-limit-exceeded (network failure exhausted retries),
          storage/unauthorized-app (App Check rejected the request).
        required_handling: >
          Caller MUST wrap await getMetadata() in try-catch. storage/object-not-found is the
          expected path for "does this file exist?" probes — swallowing rejections silently
          can mask permission errors as missing-file errors and vice versa, leading to
          mysteriously broken features.

          try {
            const metadata = await getMetadata(ref);
            return metadata;
          } catch (error) {
            if (error instanceof StorageError) {
              if (error.code === 'storage/object-not-found') {
                return null;
              }
              if (error.code === 'storage/unauthorized') {
                throw new Error('You do not have permission to view this file.');
              }
            }
            throw error;
          }
        sources:
          - "https://firebase.google.com/docs/reference/js/storage.md#getmetadata"
          - "https://firebase.google.com/docs/storage/web/file-metadata"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

