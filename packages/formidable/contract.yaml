package: formidable
semver: ">=3.5.3"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed

functions:
  - name: parse
    import_path: "formidable"
    description: "Parses multipart form data from HTTP request (promise-based, async/await)"

    postconditions:
      # Evidence: seen in 5 primary firings across 5 repos in scan-formidable-2026-04-02.json
      # Top affected: djyde/cusdis (⭐ 2777), notea-org/notea (⭐ 2148), dashpresshq/dashpress (⭐ 1886)
      - id: formidable-parse-error
        condition: "form parsing fails due to invalid data, size limits, or filesystem errors"
        throws: "Error with code and httpCode properties (e.g., maxFieldsExceeded, maxFileSizeExceeded)"
        required_handling: >
          Caller MUST handle parsing errors with try-catch (promise-based) or callback error parameter.
          Without error handling, the server will crash when: maxFileSize exceeded (default 200MB),
          maxFields exceeded (default 1000), invalid multipart data is received, filesystem errors occur,
          or filter function validation fails. Promise-based (v3+): try { const [fields, files] = await form.parse(req); } catch (err) { /* handle */ }
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
