package: formidable
semver: ">=3.5.3"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0
# Audit 2026-06-29: 12 repos scanned, 4 affected (33%), 4 violations. parse() most violated.
# Top affected: djyde/cusdis (⭐2777), dashpresshq/dashpress (⭐1886), semperai/amica (⭐1469)
# FP check: 0 FPs detected — all violations are genuine missing try-catch on form.parse()
# evidence_quality: confirmed — contract well-sourced, scanner correctly detecting violations

functions:
  - name: parse
    import_path: "formidable"
    description: >
      Parses multipart/form-data, urlencoded, JSON, and octet-stream bodies from
      an incoming HTTP request. Returns a Promise resolving to [fields, files] when
      called without a callback (v3+ promise-based usage). The single most critical
      method in the formidable API — all upload handling passes through here.
      Internally emits events and coordinates plugin execution, file writing, and
      content-type detection. Any parsing, size-limit, or filesystem error rejects
      the promise (or delivers err to callback).

    postconditions:
      # Evidence: FormidableError source confirmed at
      # https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js
      # Scan data 2026-04-02: 5 violations across 5 repos
      # Scan data 2026-06-29: 4 violations across 4 repos (12 repos scanned)
      # Top affected: djyde/cusdis (⭐ 2777), dashpresshq/dashpress (⭐ 1886), semperai/amica (⭐ 1469)
      # FP rate: 0% — all violations confirmed genuine missing try-catch

      - id: formidable-parse-error
        maturity: stable
        condition: "form parsing fails due to invalid data, size limits, or filesystem errors"
        throws: "FormidableError (extends Error) with .code (numeric) and .httpCode (HTTP status)"
        required_handling: >
          Caller MUST handle parsing errors with try-catch (promise-based) or callback error parameter.
          Without error handling, the server will crash when: maxFileSize exceeded (default 200MB),
          maxFields exceeded (default 1000), invalid multipart data is received, filesystem errors occur,
          or filter function validation fails.
          Promise-based (v3+): try { const [fields, files] = await form.parse(req); } catch (err) { res.status(err.httpCode || 400).send(err.message); }
          Callback: form.parse(req, (err, fields, files) => { if (err) { res.status(err.httpCode || 400).send(err.message); return; } })
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/README.md"
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: formidable-max-file-size-exceeded
        maturity: stable
        condition: "uploaded file exceeds options.maxFileSize (default: 200MB)"
        throws: "FormidableError with .code === 1016 (biggerThanMaxFileSize) and .httpCode === 413"
        required_handling: >
          Catch the error and return HTTP 413 Payload Too Large to the client.
          If not caught, the server process throws an unhandled rejection.
          Set maxFileSize explicitly in options to enforce your business limits
          rather than relying on the 200MB default.
          Example: if (err.code === errors.biggerThanMaxFileSize) { res.status(413).json({ error: 'File too large' }); }
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: formidable-max-total-file-size-exceeded
        maturity: stable
        condition: "aggregate size of all uploaded files exceeds options.maxTotalFileSize (defaults to maxFileSize value)"
        throws: "FormidableError with .code === 1009 (biggerThanTotalMaxFileSize) and .httpCode === 413"
        required_handling: >
          Catch the error and return HTTP 413 to the client.
          This limit applies to the sum of all files in a multi-file upload.
          Without explicit maxTotalFileSize, it defaults to maxFileSize — meaning
          100 small files each under the per-file limit can still exceed total size.
          Must be caught separately from the per-file limit (different error code).
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: formidable-max-fields-exceeded
        maturity: stable
        condition: "number of submitted fields exceeds options.maxFields (default: 1000)"
        throws: "FormidableError with .code === 1007 (maxFieldsExceeded) and .httpCode === 413"
        required_handling: >
          Catch the error and return HTTP 413. This is a security control to prevent
          hash-collision DoS attacks via crafted field names. Without catching it,
          a malicious client can crash the server by submitting thousands of fields.
          Servers processing user-supplied forms must explicitly handle this to avoid
          being taken down by a single malicious request.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

      - id: formidable-max-fields-size-exceeded
        maturity: stable
        condition: "total size of all form fields exceeds options.maxFieldsSize (default: 20MB)"
        throws: "FormidableError with .code === 1006 (maxFieldsSizeExceeded) and .httpCode === 413"
        required_handling: >
          Catch the error and return HTTP 413. This limit applies to text fields only
          (not file uploads), protecting against memory exhaustion from very large
          text field payloads. Without catching it, a client sending a 20MB+ text
          field causes an unhandled rejection that crashes the server.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: formidable-max-files-exceeded
        maturity: stable
        condition: "number of uploaded files exceeds options.maxFiles (default: Infinity)"
        throws: "FormidableError with .code === 1015 (maxFilesExceeded) and .httpCode === 413"
        required_handling: >
          Catch the error and return HTTP 413. When maxFiles is not set (Infinity default),
          this error never fires — but setting a sane limit (e.g., 10) and not catching
          the resulting error will crash the server when exceeded.
          Always pair maxFiles configuration with proper error handling.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: formidable-missing-content-type
        maturity: stable
        condition: "request has no Content-Type header or an unsupported content type"
        throws: "FormidableError with .code === 1011 (missingContentType) and .httpCode === 400, or .code === 1003 (noParser) with .httpCode === 415"
        required_handling: >
          Catch the error and return the appropriate HTTP status to the client.
          This fires when form.parse() is called on a non-form request (e.g., a JSON
          request without the JSON plugin, or a raw request with no Content-Type).
          Common in API endpoints that receive form data from clients that forget
          the Content-Type header or send the wrong MIME type.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: formidable-malformed-multipart
        maturity: stable
        condition: "multipart body is malformed, corrupted, or missing boundary"
        throws: "FormidableError with .code === 1012 (malformedMultipart) or 1013 (missingMultipartBoundary) and .httpCode === 400"
        required_handling: >
          Catch the error and return HTTP 400 Bad Request.
          This fires when the client sends a Content-Type: multipart/form-data header
          but the body is corrupted, truncated, or missing the required boundary parameter.
          Can occur from client bugs, network corruption, or crafted malicious requests.
          Without catching it, malformed uploads crash the server.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: formidable-request-aborted
        maturity: stable
        condition: "client disconnects mid-upload (request aborted)"
        throws: "FormidableError with .code === 1002 (aborted) and .httpCode === 400"
        required_handling: >
          Catch the error. Request aborts are normal client behavior (user cancels
          upload, network drops, browser navigates away) and should not crash the server.
          Without catching, every cancelled upload causes an unhandled rejection.
          In high-traffic applications with large file uploads, this is a common
          production failure mode.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: formidable-no-empty-files
        maturity: stable
        condition: "options.allowEmptyFiles is false (default) and client sends a 0-byte file"
        throws: "FormidableError with .code === 1010 (noEmptyFiles) and .httpCode === 400"
        required_handling: >
          Catch the error and return HTTP 400 to the client.
          With default settings (allowEmptyFiles: false), any 0-byte file upload
          triggers this error. This catches browsers that submit file inputs without
          selecting a file, resulting in an empty Blob upload.
          The default behavior enforces non-empty files — callers must handle the
          rejection or explicitly set allowEmptyFiles: true.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: formidable-cannot-create-dir
        maturity: stable
        condition: "options.createDirsFromUploads is true and the upload directory cannot be created"
        throws: "FormidableError with .code === 1018 (cannotCreateDir) and .httpCode === 409"
        required_handling: >
          Catch the error and return HTTP 409 or HTTP 500 to the client.
          This error only fires when createDirsFromUploads is explicitly enabled
          (for directory-structured uploads using webkitdirectory). Filesystem permission
          errors or path traversal prevention triggers this. Without catching, the
          server crashes on the first directory-based upload to an unwritable path.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      # Added 2026-06-18 (deepen pass — deepen-stream-6): pluginFailed surfaces
      # whenever a registered plugin's async function rejects during parse().
      # Source: src/Formidable.js:474 — `throw error` after `await plugin(...)`
      # is wrapped in try/catch. Rejection is rethrown from inside the
      # Promise.all over `this._plugins.map(async (plugin, idx) => { ... })`
      # so the parse() promise rejects with this FormidableError. Users who
      # register custom plugins via `form.use(myPlugin)` MUST handle this code
      # — a plugin that throws an unhandled rejection during a form upload will
      # crash the server unless `parse()` is wrapped in try/catch.
      - id: formidable-plugin-failed
        maturity: stable
        condition: "a registered plugin (built-in or via form.use(...)) throws or rejects during parse()"
        throws: "FormidableError with .code === 1017 (pluginFailed) and .httpCode === 500. The error has an .idx property indicating which plugin index failed, and the message includes the inner plugin error's message."
        required_handling: >
          Catch the error from `await form.parse(req)`. On rejection: log the
          error including .idx so you know which plugin failed, return HTTP 500
          to the client. Custom plugins that perform validation or transformation
          should throw FormidableError themselves with a more specific .httpCode
          (e.g. 400 for validation) so the calling code can return an appropriate
          status — the default 500 indicates an internal failure. Most applications
          will hit this only after wiring a custom `form.use(plugin)`; the built-in
          octetstream/querystring/multipart/json plugins do not throw under normal
          input. Inspect error.code === 1017 (or errors.pluginFailed) to distinguish
          plugin failures from parser/limit errors when handling.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js#L466-L481"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Added 2026-06-18 (deepen pass — deepen-stream-6): smallerThanMinFileSize
      # fires when options.minFileSize is explicitly set above the default (1
      # byte) and an uploaded file is below the threshold. Source:
      # src/Formidable.js:415-422 — `if (fileSize < this.options.minFileSize)`
      # then this._error(new FormidableError(..., errors.smallerThanMinFileSize,
      # 400)). The async error flows through the parse() promise rejection path.
      # Production callers who set a non-default minFileSize for business reasons
      # (e.g. enforcing a minimum image resolution by file size) must handle the
      # rejection.
      - id: formidable-smaller-than-min-file-size
        maturity: stable
        condition: "options.minFileSize is explicitly set above 1 and an uploaded file's size is below the threshold"
        throws: "FormidableError with .code === 1008 (smallerThanMinFileSize) and .httpCode === 400. Message: 'options.minFileSize (N bytes) inferior, received M bytes of file data'."
        required_handling: >
          Catch the error and return HTTP 400 with a user-facing message explaining
          the minimum file size requirement. Without catching it, every upload below
          the threshold causes an unhandled rejection that crashes the server.
          Only fires when minFileSize is explicitly configured — at the default
          (1 byte) only truly empty files trigger noEmptyFiles instead. Common in
          image-upload flows that require a minimum resolution/quality, or audio
          upload flows that reject zero-content recordings.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js#L415-L422"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      # Added 2026-06-18 (deepen pass — deepen-stream-6): unknownTransferEncoding
      # is raised by the multipart plugin when a part declares a Content-Transfer-
      # Encoding the parser does not support (7bit/8bit/binary are supported; any
      # other value such as quoted-printable, base64 in non-standard contexts, or
      # malformed values trigger this). Source:
      # src/plugins/multipart.js:154-160 — `new FormidableError('unknown
      # transfer-encoding', errors.unknownTransferEncoding, 501)`. The error
      # propagates through the multipart parser's `error` event and reaches the
      # parse() promise rejection.
      - id: formidable-unknown-transfer-encoding
        maturity: stable
        condition: "multipart request part contains an unrecognized or unsupported Content-Transfer-Encoding header value"
        throws: "FormidableError with .code === 1014 (unknownTransferEncoding) and .httpCode === 501 (Not Implemented). Message: 'unknown transfer-encoding'."
        required_handling: >
          Catch the error and return HTTP 501 (or HTTP 400 with a clearer client-facing
          explanation) — the upload contained encoding the parser cannot process.
          Without catching, the server crashes on malformed/exotic multipart parts.
          Most modern HTTP clients send only `binary`, `7bit`, or `8bit` and never
          trigger this; it surfaces against legacy clients, non-browser uploaders,
          or adversarial requests crafted to probe for parser handling. Treat it as
          a client error in normal flows — do not retry the request.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/plugins/multipart.js#L154-L160"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      # Added 2026-06-24 (deepen pass — deepen-stream-3): uninitializedParser fires
      # from write() when buffered data arrives but `this._parser` is null. This is
      # a defense-in-depth guard against malformed/exotic request flows where
      # _setUpParser() failed silently inside writeHeaders(). In normal operation
      # noParser (1003) or missingContentType (1011) fires first inside writeHeaders
      # and shadows this path, but the guard remains a documented FormidableError
      # code that surfaces via _error() -> 'error' event -> parse() promise rejection.
      # Source: src/Formidable.js:289-295 — `if (!this._parser) this._error(new
      # FormidableError('uninitialized parser', errors.uninitializedParser))`.
      # The error has no explicit httpCode argument so it defaults to 500 per
      # FormidableError constructor (src/FormidableError.js:22).
      - id: formidable-uninitialized-parser
        maturity: stable
        condition: "data arrives but the parser was never initialized (defensive guard inside write(), typically shadowed by noParser/missingContentType during writeHeaders but can surface in race conditions or exotic content-type flows)"
        throws: "FormidableError with .code === 1004 (uninitializedParser) and .httpCode === 500 (default). Message: 'uninitialized parser'."
        required_handling: >
          Catch the error from `await form.parse(req)`. Return HTTP 500 to the
          client and log the request — surfacing this code in production points
          to an upstream content-type handling regression in formidable or a
          monkey-patched plugin that broke parser setup. Treat it as a server-side
          fault, not a client error. Do NOT retry the parse: the request body
          stream has already been drained without producing fields/files, and a
          retry would not re-bind a parser. This is the defensive twin of
          noParser (1003) — handle them in the same catch branch when reacting
          to malformed input, but log uninitializedParser distinctly because
          it indicates an internal inconsistency rather than ordinary client
          input error.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js#L289-L295"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low

      # Added 2026-06-18 (deepen pass — deepen-stream-6): filenameNotString fires
      # when a multipart part advertises a non-string `filename` (typically because
      # an attacker crafted a malformed Content-Disposition header). Source:
      # src/Formidable.js:310-318 — `if (part.originalFilename && typeof
      # part.originalFilename !== 'string') this._error(new FormidableError(...,
      # errors.filenameNotString))`. The error flows through the parse() rejection
      # path. Security-relevant: catches header injection / type-confusion attempts
      # against the parser.
      - id: formidable-filename-not-string
        maturity: stable
        condition: "a multipart part declares a Content-Disposition `filename` that is not a string (e.g. malformed/attacker-crafted header)"
        throws: "FormidableError with .code === 1005 (filenameNotString) and .httpCode === 500. Message: 'the part.originalFilename should be string when it exists'."
        required_handling: >
          Catch the error and return HTTP 400 (treat as a malformed client request,
          NOT a server fault — override the 500 default with a 400 if surfacing to
          the client). Log the request for security review: this error is one of
          formidable's input-validation guardrails against header injection. Most
          legitimate clients never hit it. Without catching, the server crashes
          on the first crafted upload — a denial-of-service vector. Defenders
          should rate-limit endpoints that surface this error code repeatedly from
          the same client.
        sources:
          - "https://github.com/node-formidable/formidable/blob/master/src/FormidableError.js"
          - "https://github.com/node-formidable/formidable/blob/master/src/Formidable.js#L310-L318"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
