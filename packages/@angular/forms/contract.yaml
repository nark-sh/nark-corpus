contract_version: "1.0.0"
maintainer: "nark-sh"
last_verified: "2026-06-12"
coverage_status: "no-async-contract"
skip_reason: "redundant-with-rxjs"
researched_at: "2026-06-12"
coverage_rationale: |
  No first-party async-throwing surface in @angular/forms. The only async hook (AsyncValidator.validate / AsyncValidatorFn) is a user-implemented extension point — not an Angular-exported async function that user code calls and must try-catch. Real-world Angular code that awaits form Observables does so via firstValueFrom/lastValueFrom (already covered by the rxjs profile) or via .pipe(catchError) (not detectable by the current V2 analyzer). The 2 @throws annotations in types/forms.d.ts are on sync strict-mode checks (FormGroup.setValue, ngOnInit lifecycle) — not nark-contractable. Pairs with @angular/common skip rationale (same pattern, same rxjs transitive coverage argument). See work-packages/@angular__forms/SKIP-RATIONALE.md.
