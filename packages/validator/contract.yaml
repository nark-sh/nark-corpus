        required_handling: >
          Validate the locale before passing to isMobilePhone():

            // Safe: use 'any' when locale is unknown or user-provided
            isMobilePhone(phone, 'any')  // tries all 200+ locale patterns

            // Better: validate locale against supported set first
            const SUPPORTED_LOCALES = new Set(require('validator').isMobilePhone.locales);
            const safeLocale = SUPPORTED_LOCALES.has(locale) ? locale : 'any';
            isMobilePhone(phone, safeLocale)

          For international apps: never pass Accept-Language header values directly
          as the locale parameter without normalization.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isMobilePhone.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

