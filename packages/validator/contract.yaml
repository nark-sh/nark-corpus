      - id: base64-empty-string-valid
        condition: "isBase64('') used as truthy guard for non-empty input"
        returns: "true for empty string ''"
        required_handling: >
          isBase64() returns true for empty string '' — an empty string is considered
          a valid (zero-byte) base64 value. Callers using isBase64() as a guard before
          decoding must also check for non-empty input:
          if (str && isBase64(str)) { ... }
          Otherwise, empty string passes the base64 check and atob('') or Buffer.from('', 'base64')
          succeeds silently, resulting in empty output that may not be detected.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isBase64.js"
