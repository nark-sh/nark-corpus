package: validator
semver: ">=13.15.20"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-20"
status: production
evidence_quality: confirmed
coverage_score: 0.301
# deepen-stream-2 pass 5: +2 functions (isByteLength, isWhitelisted)
# Depth pass 2026-04-20 (deepen-stream-2 pass 5):
# +2 functions: isByteLength, isWhitelisted
# isByteLength: bytes vs chars confusion — CJK '你好' (2 chars) = 6 bytes; fails {max:4}
# isWhitelisted: unique TypeError on null CHARS arg (not just str); all other is* only throw on null str
# Total contracted: 31 / 103 raw = 0.301
#   CONTRACTED: isByteLength (byte-vs-char confusion + non-string TypeError)
#               isWhitelisted (null-chars TypeError + unchecked-return-value)
#   INTENTIONALLY OMITTED (this pass): isSemVer (boolean only, assertString TypeError redundant),
#     isTime (returns false for non-string — no throw at all), isHash (returns false for invalid
#     algorithm — no throw; assertString TypeError only), toString (Object.prototype, not validator)
#
# Depth pass 2026-04-20 (deepen-stream-2 pass 1):
# +2 functions: isLicensePlate, isBase32
# isLicensePlate: throws Error (not TypeError) for invalid locale — unique in validator API
# isBase32: Crockford vs standard Base32 confusion (parallel to isBase64 urlSafe issue)
# Total contracted: 19 / 95 raw = 0.200; 7 newly identified functions analyzed:
#   CONTRACTED: isLicensePlate (throws Error on invalid locale), isBase32 (crockford confusion)
#   INTENTIONALLY OMITTED: isMD5 (pure hex regex, no security contract), isBase58 (returns boolean),
#     isMagnetURI (niche BitTorrent format, returns boolean), isMailtoURI (delegates to isEmail,
#     returns boolean, no unique contract), isFreightContainerID/isISO6346 (niche shipping domain)
#
# Depth pass 2026-04-20 (deepen-stream-1 pass 4):
# +10 functions: isMobilePhone, isPostalCode, isTaxID, isVAT, isIdentityCard, unescape,
#                blacklist, whitelist, toBoolean, trim
# Total contracted: 29 / 103 raw = 0.281
# Key findings this pass:
#   - 5 locale/country-throwing functions identified: isMobilePhone, isPostalCode, isTaxID,
#     isVAT (Error "Invalid country code:"), isIdentityCard — all throw Error (not TypeError)
#     for invalid locale/country params, making them harder to catch than assertString's TypeError
#   - unescape(): critical XSS reintroduction risk — unescaping before HTML render negates
#     the protection that escape() provided
#   - blacklist/whitelist: regex injection risk — chars param interpolated directly into
#     RegExp without escaping; '[' + chars + ']' in blacklist, '[^' + chars + ']' in whitelist
#   - toBoolean(): strict vs non-strict mode: non-strict mode treats 'no', 'off', 'disabled',
#     'null' as TRUE — critical for feature flags and auth systems
#   - trim/ltrim/rtrim: unlike blacklist/whitelist, DOES escape chars before RegExp — safe;
#     contracted for TypeError on non-string input (null from optional form fields)
#   INTENTIONALLY OMITTED this pass: isPassportNumber (silently returns false for invalid
#     country code — no throw), isIP/isIPRange/isUUID/isFQDN (return boolean only, no unique
#     error contracts beyond assertString TypeError already covered)
# Scan note: scan-validator-2026-04-03.json — 0 repos successfully scanned (2 skipped, 20 errored)
# FP check: 0/15 FPs in repos without validator (0% rate) — no false positives detected
#
# API Surface: ~95 exported functions (validators + sanitizers)
# Contracted: 17 functions (escape, normalizeEmail, isEmail, isURL, isJSON,
#             isStrongPassword, isJWT, stripLow, toDate, toFloat, toInt, isCreditCard,
#             matches, isCurrency, isBase64, isLength, isISO8601)
# Omitted: ~78 pure-format validators with no unique error contracts
# Coverage: 17/95 raw
#
# CRITICAL CORRECTION (2026-04-17):
# Previous comment stated "validator.js does NOT throw exceptions" — THIS IS WRONG.
# Source inspection of lib/util/assertString.js confirms:
#   assertString() throws TypeError("Expected a string but received a null/undefined/...")
#   when a non-string is passed. This affects ~94 of the ~95 exported functions.
#   Only functions like trim() (which calls ltrim+rtrim) that delegate assertString
#   down may appear to throw from a different frame, but they all throw TypeError
#   on non-string input.
#
# CORRECT behavior:
# - Validators (is*): return boolean; throw TypeError on non-string input
# - Sanitizers (escape, stripLow, trim etc.): return string; throw TypeError on non-string
# - Converters (toDate, toFloat, toInt): return Date|null or NaN; throw TypeError on non-string
# - normalizeEmail: returns string | false; does NOT throw on invalid email (handles internally)
#
# MINIMUM VERSION: 13.15.20
# - CVE-2025-56200: URL validation bypass (< 13.15.20) — isURL() affected
# - CVE-2021-3765: ReDoS in isRTrimmed/ltrim (< 13.7.0)

functions:
  - name: escape
    import_path: "validator"
    description: "Escapes HTML special characters to prevent XSS attacks"

    postconditions:
      - id: escape-xss-prevention
        condition: "user input rendered in HTML without escaping"
        returns: "escaped string (always succeeds)"
        required_handling: >
          Caller MUST use escape() on ALL user input before rendering in HTML.
          Failure to escape allows XSS attacks, session hijacking, and data theft.
          CRITICAL: This is the #1 web security vulnerability.
        sources:
          - "https://owasp.org/www-community/attacks/xss/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: always-escape-user-input
        description: >
          escape() replaces <, >, &, ', ", / with HTML entities. It ALWAYS succeeds
          and returns a string. However, failing to call escape() on user input
          before HTML rendering is the most common XSS vulnerability.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: template-engine-escaping
        description: >
          Many template engines (React, EJS, Handlebars) auto-escape by default.
          Only use escape() when rendering raw HTML or using dangerouslySetInnerHTML.
        sources:
          - "https://reactjs.org/docs/dom-elements.html#dangerouslysetinnerhtml"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: normalizeEmail
    import_path: "validator"
    description: "Normalizes email addresses to prevent spoofing and duplicate accounts"

    postconditions:
      - id: normalize-email-failure
        condition: "email format is invalid"
        returns: "false (boolean)"
        required_handling: >
          Caller MUST check return value. normalizeEmail() returns false for invalid
          emails, not a normalized string. Failing to check allows invalid emails
          to be stored, causing authentication failures.
        sources:
          - "https://github.com/validatorjs/validator.js/issues/1089"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: normalize-email-spoofing
        condition: "email not normalized before storage"
        returns: "normalized email string OR false"
        required_handling: >
          Caller MUST normalize emails before storage. Without normalization,
          users can create duplicate accounts via case differences (User@Example.com
          vs user@example.com) or Gmail +alias bypass (user+1@gmail.com).
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: gmail-alias-removal
        description: >
          normalizeEmail() removes Gmail +alias suffixes by default (user+spam@gmail.com
          becomes user@gmail.com). This prevents duplicate account creation but may
          break legitimate use cases. Use options: { gmail_remove_subaddress: false }
          to preserve aliases.
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isEmail
    import_path: "validator"
    description: "Validates email format (returns boolean, does not throw)"

    postconditions:
      - id: invalid-email
        condition: "email format is invalid"
        returns: "false (boolean)"
        required_handling: >
          Caller MUST check return value. isEmail() returns false for invalid emails,
          it does NOT throw. Failing to check allows invalid emails into the system,
          causing authentication and delivery failures.
        sources:
          - "https://www.npmjs.com/package/validator"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: email-not-validated
        condition: "user email not validated before storage or sending"
        returns: "false for invalid, true for valid"
        required_handling: >
          Caller MUST validate emails before storage or sending. Accepting invalid
          emails causes delivery failures, spam, and phishing attacks.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: email-validation-options
        description: >
          isEmail() has 40+ options for strict validation (allow_display_name,
          require_tld, allow_utf8_local_part, etc.). Default options accept
          most valid emails but may allow edge cases. Use strict options for
          security-critical applications.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isURL
    import_path: "validator"
    description: "Validates URL format (CRITICAL: requires protocol whitelist to prevent XSS)"

    postconditions:
      - id: invalid-url
        condition: "URL format is invalid"
        returns: "false (boolean)"
        required_handling: >
          Caller MUST check return value. isURL() returns false for invalid URLs,
          it does NOT throw. Failing to check allows malformed URLs to pass through.
        sources:
          - "https://www.npmjs.com/package/validator"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: url-protocol-not-whitelisted
        condition: "URL protocol not restricted to safe protocols (https only)"
        returns: "true for valid URL (including javascript:, data:, file: URIs)"
        required_handling: >
          Caller MUST whitelist URL protocols. Default isURL() accepts dangerous
          protocols like javascript:, data:, and file: which enable XSS and phishing.
          ALWAYS use: isURL(url, { protocols: ['https'], require_protocol: true })
        sources:
          - "https://github.com/validatorjs/validator.js/security/advisories/GHSA-9965-vmph-33xx"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: url-validation-bypass-cve
        condition: "validator version < 13.15.20"
        returns: "true (but may incorrectly validate malicious URLs)"
        required_handling: >
          CRITICAL: CVE-2025-56200 affects validator < 13.15.20. The isURL() function
          has a validation bypass allowing XSS and open redirect attacks. Upgrade to
          13.15.20+ immediately. Exploit POC available publicly.
        sources:
          - "https://github.com/advisories/GHSA-9965-vmph-33xx"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: open-redirect-vulnerability
        description: >
          Using isURL() for redirect validation WITHOUT protocol whitelist allows
          attackers to redirect users to phishing sites. Always validate destination
          URLs against an allowlist of trusted domains, not just URL format.
        sources:
          - "https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isJSON
    import_path: "validator"
    description: "Validates JSON format before JSON.parse() to prevent crashes"

    postconditions:
      - id: invalid-json
        condition: "JSON format is invalid"
        returns: "false (boolean)"
        required_handling: >
          Caller SHOULD use isJSON() before JSON.parse(). JSON.parse() throws
          SyntaxError on invalid JSON, crashing the application. isJSON() returns
          false safely, allowing graceful error handling.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: json-parse-without-validation
        condition: "JSON.parse() called on untrusted input without validation"
        returns: "false for invalid JSON"
        required_handling: >
          Caller SHOULD validate JSON before parsing. Without validation, malformed
          JSON from user input or external APIs causes uncaught SyntaxError exceptions,
          crashing the application or API endpoint.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/JSON/parse#exceptions"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: json-parse-dos
        description: >
          Large or deeply nested JSON can cause performance issues even if valid.
          Consider size limits (max 1MB) and depth limits (max 100 levels) before
          parsing user-provided JSON to prevent DoS attacks.
        sources:
          - "https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isStrongPassword
    import_path: "validator"
    description: >
      Evaluates whether a password meets strength requirements. Returns boolean
      (or numeric score when returnScore: true). Calls assertString() internally —
      throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/isStrongPassword.js — confirmed default options
      - id: strong-password-weak-defaults
        condition: "isStrongPassword() called with default options for privileged accounts"
        required_handling: >
          Default options (minLength: 8, minLowercase: 1, minUppercase: 1,
          minNumbers: 1, minSymbols: 1) may be insufficient for high-security
          applications. A password like "Password1!" satisfies all defaults but
          is trivially guessable. Callers accepting passwords for privileged
          accounts (admin, payment) SHOULD increase minLength to 12+ and
          consider minSymbols >= 2. NIST SP 800-63B recommends minimum 8 chars
          for regular accounts, 12+ for privileged accounts.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://pages.nist.gov/800-63-3/sp800-63b.html"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        evidence_quality: confirmed

      - id: strong-password-non-string-throws
        condition: "isStrongPassword() passed null, undefined, or non-string"
        throws: "TypeError: Expected a string but received a null/undefined/..."
        required_handling: >
          Caller MUST ensure the str argument is a string before calling isStrongPassword().
          Common pattern: isStrongPassword(req.body.password) where the body field
          is missing (undefined) throws TypeError, crashing the request handler.
          Guard with: if (typeof password === 'string') { ... }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: strong-password-return-score-misread
        condition: "isStrongPassword() called with returnScore: true, result used as boolean"
        returns: "number (score) when returnScore: true — NOT a boolean"
        required_handling: >
          When returnScore: true is passed, isStrongPassword() returns a NUMBER
          not a boolean. Any non-zero score evaluates as truthy, including scores
          for WEAK passwords. Callers MUST compare the score to an explicit threshold,
          not use it directly in an if() conditional.
          Use: const score = isStrongPassword(pwd, { returnScore: true }); if (score >= 40) { ... }
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        evidence_quality: confirmed

  - name: isJWT
    import_path: "validator"
    description: >
      Validates that a string has JWT format (three base64url-encoded segments
      separated by dots). Does NOT verify the signature or decode the payload.
      Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/isJWT.js — only checks 3-part base64url structure
      - id: jwt-format-only-not-verified
        condition: "isJWT() used for authentication or authorization decisions"
        returns: "true for any syntactically valid JWT (forged, expired, wrong issuer)"
        required_handling: >
          CRITICAL: isJWT() only validates that the string has JWT format (three
          base64url parts separated by dots). It does NOT verify the cryptographic
          signature, expiry (exp), issuer (iss), or audience (aud) claims. A forged
          JWT with valid structure passes isJWT() validation.
          Callers MUST use a proper JWT library (jsonwebtoken, jose) to verify
          the signature and claims. isJWT() is safe ONLY for format pre-screening
          before passing to a cryptographic verifier.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/10-Testing_JSON_Web_Tokens"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: jwt-non-string-throws
        condition: "isJWT() passed null, undefined, or non-string (e.g. missing Authorization header)"
        throws: "TypeError: Expected a string but received a null/undefined/..."
        required_handling: >
          Caller MUST ensure the argument is a string before calling isJWT().
          Common pattern: isJWT(req.headers.authorization) where the header is
          missing returns undefined, which throws TypeError. Guard with:
          if (typeof token === 'string' && isJWT(token)) { ... }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: stripLow
    import_path: "validator"
    description: >
      Removes ASCII control characters (hex 0x00-0x1F and 0x7F) from a string.
      Used as a sanitization defense against terminal injection, log injection,
      and certain protocol injection attacks. Returns the cleaned string.
      Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/stripLow.js — confirmed chars stripped
      - id: strip-low-not-xss-defense
        condition: "stripLow() output rendered in HTML without also calling escape()"
        returns: "string with control chars removed but HTML-active chars intact"
        required_handling: >
          stripLow() removes control characters but does NOT sanitize HTML special
          characters (<, >, &, ", '). It is NOT a substitute for escape() for XSS
          prevention. Callers who use stripLow() in place of escape() for HTML
          rendering remain vulnerable to XSS. ALWAYS also call escape() on any
          output that will be rendered in HTML.
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
          - "https://owasp.org/www-community/attacks/xss/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: strip-low-newline-option
        condition: "stripLow() used on multiline content without keep_new_lines: true"
        returns: "string with newlines removed (default behavior)"
        required_handling: >
          By default (keep_new_lines=false), stripLow() removes newline characters
          (0x0A, 0x0D). Callers processing multiline user content (addresses, notes,
          log entries) SHOULD use stripLow(str, true) to preserve newlines while
          still removing other control characters. Omitting this option silently
          strips line breaks, corrupting multiline content.
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: toDate
    import_path: "validator"
    description: >
      Converts a string to a Date object by calling Date.parse(). Returns null
      if the input string is not a valid date. Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md (sanitizers)
      # Source: node_modules/validator/lib/toDate.js — assertString then Date.parse, returns null on NaN
      - id: to-date-null-unchecked
        condition: "toDate() result used without null check"
        returns: "null for invalid date strings"
        required_handling: >
          Caller MUST check for null before using the returned Date.
          toDate() returns null when the input string is not a valid date.
          Accessing any property on null (e.g., toDate(str).toISOString()) throws
          TypeError: Cannot read properties of null, crashing the handler for
          any invalid user-supplied date string.
          Guard with: const date = toDate(str); if (!date) { handle error }
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: to-date-timezone-ambiguity
        condition: "toDate() used with date strings lacking explicit timezone"
        returns: "Date with ambiguous timezone — UTC or local depending on format"
        required_handling: >
          toDate() calls Date.parse() internally. Date.parse() behavior for dates
          without explicit timezone is implementation-defined (UTC for ISO 8601,
          local time for other formats). Result may differ between Node.js versions.
          Callers SHOULD use explicit ISO 8601 strings with timezone offset
          (e.g., "2024-01-15T10:30:00Z") for deterministic results.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/parse#date_time_string_format"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: toFloat
    import_path: "validator"
    description: >
      Converts a string to a float (parseFloat). Returns NaN if the input string
      is not a valid float. Does NOT call assertString() — returns NaN for non-string.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/toFloat.js — isFloat check then parseFloat, returns NaN
      - id: to-float-nan-unchecked
        condition: "toFloat() result used in arithmetic without isNaN() check"
        returns: "NaN for invalid float strings"
        required_handling: >
          Caller MUST check isNaN() before using the result in arithmetic.
          toFloat() returns NaN for invalid float strings. Any arithmetic with NaN
          produces NaN (NaN propagation). Price calculations, currency conversions,
          and metric computations silently produce incorrect NaN results.
          Guard with: const val = toFloat(str); if (isNaN(val)) { throw new Error(...) }
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed

  - name: toInt
    import_path: "validator"
    description: >
