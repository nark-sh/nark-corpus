  - name: isLength
    import_path: "validator"
    description: >
      Validates string length falls within specified range. Returns boolean. This function
      accounts for surrogate pairs (emoji, some CJK characters) — a single visible
      character may count as 1 despite str.length returning 2. Throws TypeError on
      non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # README states: "Note: this function takes into account surrogate pairs."
      # Source: node_modules/validator/lib/isLength.js — confirmed surrogate pair counting
      - id: length-vs-string-length-mismatch
        condition: "isLength() result compared with str.length for same string"
        returns: "true for strings where isLength(str, {max: N}) === true but str.length > N"
        required_handling: >
          isLength() counts grapheme clusters — surrogate pairs (emoji like 😀, some CJK
          characters) count as 1 character in isLength() but 2 in str.length. A string
          like "Hello😀" passes isLength(str, {max: 6}) but str.length returns 7.
          Callers that enforce database column limits MUST use isLength() (not str.length)
          to avoid truncation on storage. Conversely, callers computing byte sizes for
          binary protocols must use Buffer.byteLength() — isLength() counts visible chars,
          not bytes. Mixing these causes either data truncation or incorrect validation.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://unicode.org/faq/utf_bom.html#utf16-2"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: isISO8601
    import_path: "validator"
    description: >
      Validates ISO 8601 date strings (e.g. "2024-01-15", "2024-01-15T10:30:00Z").
      Returns boolean. Without strict: true, accepts structurally valid but calendar-invalid
      dates like "2009-02-29" (Feb 29 in a non-leap year). Throws TypeError on non-string.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # README states: "If strict is true, date strings with invalid dates like
      # 2009-02-29 will be invalid."
      # Source: node_modules/validator/lib/isISO8601.js — isValidDate() only called when strict=true
      - id: iso8601-non-strict-invalid-dates
        condition: "isISO8601() used without strict: true to validate calendar dates for storage"
        returns: "true for structurally valid but calendar-invalid dates (e.g. '2009-02-29')"
        required_handling: >
          Without { strict: true }, isISO8601() validates the string format only — not
          calendar validity. "2009-02-29" (February 29 in a non-leap year) returns true
          because the format is correct even though the date does not exist. When this
          invalid date is then parsed (Date.parse, new Date()), the result may be rolled
          over to March 1, silently storing incorrect dates. For any application storing
          calendar dates (appointments, birthdays, deadlines), ALWAYS use:
          isISO8601(dateStr, { strict: true })
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: iso8601-strict-separator
        condition: "isISO8601() used for API interoperability without strictSeparator: true"
        returns: "true for '2024-01-15 10:30:00' (space separator) when only T separator required"
        required_handling: >
          Without { strictSeparator: true }, isISO8601() accepts both 'T' and space as
          the date-time separator. RFC 3339 and most REST APIs require the 'T' separator.
          "2024-01-15 10:30:00Z" passes isISO8601() but may be rejected by strict API
          parsers (PostgreSQL TIMESTAMPTZ, Go's time.Parse with RFC3339 layout, Java's
          Instant.parse). For API-to-API data exchange, use:
          isISO8601(str, { strict: true, strictSeparator: true })
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://datatracker.ietf.org/doc/html/rfc3339"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isLicensePlate
    import_path: "validator"
    description: >
