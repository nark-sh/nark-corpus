        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isByteLength
    import_path: "validator"
    description: >
      Validates that a string's length in UTF-8 bytes falls within a given range.
      Measures BYTES not JavaScript characters. For ASCII text, bytes == chars.
      For multi-byte characters (CJK, emoji, accented chars), byte count > char count.
      Throws TypeError on non-string input (assertString pattern). Returns boolean.
      Common use: validating inputs against database column byte limits.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js#validators (isByteLength docs)
      # Source confirmed: lib/isByteLength.js — uses encodeURI(str).split(/%..|./).length - 1
      # encodeURI() encodes non-ASCII chars as %XX%XX sequences; split counts them as 2-3 bytes each.
      - id: isbytelength-byte-vs-char-confusion
        condition: >
          isByteLength() used to validate string length against a limit derived from a
          database column size or API constraint, where the column stores multibyte
          characters (CJK, Arabic, emoji, accented Latin). The max option reflects the
          column's byte capacity, not its character capacity.
          Example: VARCHAR(100) means 100 bytes in some databases (MySQL latin1), or
          100 chars in others (MySQL utf8mb4 stores 1-4 bytes per char). Code that
          passes isByteLength({max: 100}) for a utf8mb4 VARCHAR(100) column will REJECT
          valid CJK strings that fit the column because it conflates bytes and chars.
          Conversely, code that uses isLength({max: 100}) for a VARCHAR(100) byte-limited
          column will ALLOW overlong multibyte strings that EXCEED the DB column's capacity.
        returns: >
          false when the byte length exceeds max — but this can falsely reject valid input
          if the limit was meant as a character limit, or falsely accept overlong input if
          isLength() was used instead for a byte-limited column.
        required_handling: >
          Use isByteLength() only when the constraint is a BYTE limit (e.g. Redis
          key/value byte caps, fixed-width binary fields, HTTP header length limits).
          Use isLength() when the constraint is a CHARACTER limit (e.g. display name
          max characters, tweet length, most UI character counters).
          For database columns: check whether the column type stores length in bytes or
          characters. MySQL utf8mb4 CHAR(n) = n characters; VARCHAR(n) = n bytes.
          PostgreSQL TEXT/VARCHAR(n) = n characters.

            // Wrong: Assumes column limit is characters, not bytes
            if (!validator.isByteLength(name, { max: 100 })) reject('name too long');
            // May reject valid CJK name 'が大切' (3 chars = 9 bytes)

            // Right for byte-limited storage:
            if (!validator.isByteLength(value, { max: 256 })) reject('value too large');

            // Right for character-limited display (most UI use cases):
            if (!validator.isLength(name, { max: 100 })) reject('name too long');
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isByteLength.js"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

      - id: isbytelength-non-string-throws
        condition: >
          isByteLength() called with a non-string first argument. Common when processing
          JSON payload fields that may be null (optional fields), numbers, or objects
          before string validation.
        throws: >
          TypeError with message "Expected a string but received a <type>".
          Thrown by assertString() before the byte count is computed.
        required_handling: >
          Guard or coerce to string before calling:

            // Wrong: may receive null from optional JSON field
            const valid = validator.isByteLength(req.body.description, { max: 255 });

            // Right: guard first
            const desc = req.body.description;
            if (typeof desc !== 'string') return reject('description required');
            const valid = validator.isByteLength(desc, { max: 255 });
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isWhitelisted
    import_path: "validator"
    description: >
      Returns true if every character in `str` is present in the `chars` whitelist string.
      Returns false if any character in `str` is NOT in `chars`. Returns true for empty `str`.
      Throws TypeError if `str` is non-string (assertString pattern). Throws TypeError if
      `chars` is null or undefined (unique: most is* validators only throw for non-string str,
      not for the second parameter). Used as a character-allowlist validator in form processing.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js#validators (isWhitelisted)
      # Source confirmed: lib/isWhitelisted.js — chars.indexOf(str[i]) throws if chars is null
      # assertString(str) called first; then chars.indexOf() called without null-check on chars.
      - id: iswhitelisted-null-chars-throws
        condition: >
          isWhitelisted() called where the `chars` parameter is null, undefined, or a value
          that does not have an indexOf() method. This differs from all other is* validators
          whose only TypeError comes from a null/non-string FIRST argument. Here the SECOND
          argument (chars) can also throw. Occurs when chars is loaded from a config file or
          environment variable that may be absent, or when it's derived from user input
          without validation.
        throws: >
          TypeError: "Cannot read properties of null (reading 'indexOf')" when chars is null.
          TypeError: "Cannot read properties of undefined (reading 'indexOf')" when chars is undefined.
          This is NOT an assertString() error — it originates from the chars.indexOf() call
          inside the loop after assertString(str) has already succeeded.
        required_handling: >
          Always ensure chars is a non-null string before calling isWhitelisted():

            // Wrong: chars from config may be undefined
            const allowed = config.allowedChars;  // may be undefined
            if (!validator.isWhitelisted(input, allowed)) throw new Error('invalid chars');
            // => TypeError: Cannot read properties of undefined (reading 'indexOf')

            // Right: validate or default chars
            const allowed = config.allowedChars ?? 'abcdefghijklmnopqrstuvwxyz0123456789';
            if (!validator.isWhitelisted(input, allowed)) throw new Error('invalid chars');
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isWhitelisted.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: iswhitelisted-unchecked-return
        condition: >
          isWhitelisted() return value not checked, or checked but the application
          proceeds with the unvalidated input when it returns false. Unlike blacklist()
          which REMOVES disallowed chars from the string, isWhitelisted() only REPORTS
          whether disallowed chars are present — it does not sanitize. Callers who
          mistake it for a sanitizer instead of a validator pass through invalid input.
        returns: >
          false when any character in str is not in chars. The string is NOT modified.
          Returning false means the input is INVALID — the caller must reject it.
        required_handling: >
          Always act on the boolean return value. Do not pass the original string
          through after isWhitelisted returns — the string is unchanged:

            // Wrong: confuses validator with sanitizer
            const safe = validator.isWhitelisted(userInput, 'a-z0-9');
            // safe is boolean, NOT a sanitized string — but name implies it "whitelisted" the value
            db.query('INSERT INTO tags VALUES (' + userInput + ')');  // userInput unchanged!

            // Right: check and reject
            if (!validator.isWhitelisted(userInput, 'abcdefghijklmnopqrstuvwxyz0123456789-')) {
              return res.status(400).json({ error: 'Invalid characters in tag name' });
            }
            db.query('INSERT INTO tags VALUES (?)', [userInput]);
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

# SOURCES.md has comprehensive documentation of all error conditions
# See: corpus/packages/validator/SOURCES.md (111 lines)
#
# Research completed 2026-02-26 (initial), deepened 2026-04-17:
# - Phase 1: Research planning
# - Phase 2: Documentation analysis (15+ validators, 12+ sanitizers documented)
# - Phase 3: CVE analysis (9 CVEs found, 2 active: CVE-2025-56200, CVE-2021-3765)
# - Phase 4: Production usage analysis (5 patterns, 80% use express-validator middleware)
# - Deepen pass 2026-04-17: Full API surface enumeration, assertString() discovery,
#     6 new functions added (isStrongPassword, isJWT, stripLow, toDate, toFloat, toInt, isCreditCard)
# - Deepen pass 2026-04-20 (stream-2 pass 1): +2 (isLicensePlate, isBase32), 19 total contracted
# - Deepen pass 2026-04-20 (stream-1 pass 4): +10 (isMobilePhone, isPostalCode, isTaxID, isVAT,
#     isIdentityCard, unescape, blacklist, whitelist, toBoolean, trim), 29 total contracted
# - Deepen pass 2026-04-20 (stream-2 pass 5): +2 (isByteLength, isWhitelisted), 31 total contracted
#
# Key findings (updated 2026-04-20):
# - CORRECTION: validator.js DOES throw TypeError on non-string input (assertString() pattern)
#   affects ~94 of ~95 functions — previous contract incorrectly stated "does NOT throw"
# - Locale-throwing functions (throw Error, NOT TypeError): isMobilePhone, isPostalCode,
#   isTaxID, isIdentityCard, isLicensePlate throw Error("Invalid locale '${locale}'");
#   isVAT throws Error("Invalid country code: '${countryCode}'") — different message format!
# - Regex injection in sanitizers: blacklist() and whitelist() do NOT escape chars param —
#   dynamic chars from user input can cause RegExp SyntaxError or match unintended chars
# - trim/ltrim/rtrim DO escape chars param safely — no regex injection risk
# - toBoolean non-strict mode: 'no', 'off', 'null', '0.0' all return TRUE — use strict mode
#   for config/feature flag parsing
# - unescape() is an XSS vector: unescaping before HTML render defeats escape() protection
# - isByteLength() counts bytes not chars — CJK/emoji inputs may fail or pass unexpectedly
# - isWhitelisted() throws on null CHARS (second arg), unlike all other is* validators
# - Most common mistake: Not checking return values (boolean/null/NaN)
# - #1 security issue: Not escaping user input (XSS)
# - #2 security issue: Not whitelisting URL protocols (open redirects, XSS)
# - #3 security issue: Using isJWT() for auth (format-only check, not signature verification)
# - #4 security issue: Using isCreditCard() as payment authorization
# - Minimum safe version: 13.15.20 (CVE patches)
# - Detection focus: Missing validation on user input before dangerous operations
#
# API surface (2026-04-20 update):
#   Total exported functions: 103 (full README enumeration: 90 validators + 13 sanitizers)
#   Contracted: 31 (escape, normalizeEmail, isEmail, isURL, isJSON, isStrongPassword, isJWT,
#               stripLow, toDate, toFloat, toInt, isCreditCard, matches, isCurrency, isBase64,
#               isLength, isISO8601, isLicensePlate, isBase32, isMobilePhone, isPostalCode,
#               isTaxID, isVAT, isIdentityCard, unescape, blacklist, whitelist, toBoolean, trim,
#               isByteLength, isWhitelisted)
#   Omitted: ~72 pure-format validators (isAlpha, isAlphanumeric, isAscii, isBIC, isIBAN,
#            isISO*, isLatLong, isMACAddress, isIP, isUUID, isFQDN, isBoolean, isInt, isFloat,
#            isAlpha*, isHexColor, isBtcAddress, isEthereumAddress, isSemVer, isTime, isHash,
#            toString (Object.prototype), isByteLength, isWhitelisted now contracted, and similar)
#   Omission reason: Omitted functions return boolean only, throw TypeError only on non-string
#                    (same profile as contracted validators), and have no unique security
#                    contracts beyond the assertString pattern. isPassportNumber specifically
#                    silently returns false for invalid country code (no throw) — no contract needed.
# deepen-stream-1 pass 7: +5 functions (isAlpha, isAlphanumeric, isDecimal, isDate, isIBAN)
# Depth pass 2026-04-20 (deepen-stream-1 pass 7):
# +5 functions: isAlpha, isAlphanumeric, isDecimal, isDate, isIBAN
# isAlpha: locale-throw (76 locales) + ignore option throws for non-string/RegExp type
# isAlphanumeric: same locale-throw pattern (76 locales) + ignore type throw
# isDecimal: locale-throw (68 locales) + force_decimal option confuses callers
# isDate: non-strict mode silently accepts Date OBJECTS (not just strings); strict mode
#         rejects 'YYYY-MM-DD' unless format: 'YYYY-MM-DD' explicitly specified
# isIBAN: validates format AND checksum together — allowWhitespace option affects what
#         formatted IBANs (with spaces) are accepted
# Total contracted: 36 / 103 raw = 0.350
#   CONTRACTED: isAlpha (locale-throw + ignore-type throw)
#               isAlphanumeric (locale-throw + ignore-type throw)
#               isDecimal (locale-throw + force_decimal confusion)
#               isDate (non-strict accepts Date objects; strict format mismatch)
#               isIBAN (checksum validation + allowWhitespace confusion)
#   INTENTIONALLY OMITTED (this pass): isISBN (version confusion is minor — default tries
#     both 10 and 13, only fails if you force wrong version), contains (minOccurrences is
#     nuanced but not a crash/silent-failure risk), isIn (empty array returns false silently
#     but not a meaningful contract), isDataURI (XSS concern is same as isURL protocol
#     whitelisting already contracted), isEmpty (ignore_whitespace option is well-documented)

  - name: isAlpha
    import_path: "validator"
    description: >
      Validates that a string contains only alphabetic characters for a given locale.
      Accepts 76 locales (default 'en-US'). Returns boolean. Throws Error (not TypeError)
      when an unrecognized locale string is passed — same locale-throw pattern as isMobilePhone,
      isPostalCode, isTaxID, isIdentityCard, isLicensePlate. Additionally, the ignore option
      throws Error (not TypeError) when passed a non-string and non-RegExp value.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isAlpha.js
      # Source confirmed: throw new Error(`Invalid locale '${locale}'`) in isAlpha.js
      # throw new Error('ignore should be instance of a String or RegExp') for invalid ignore type
      # isAlpha.locales property lists all 76 supported locale strings.
      - id: alpha-invalid-locale-throws
        condition: >
          isAlpha() called with a locale string not in the supported 76-locale set. Common
          in internationalized form validation: (1) locale derived from req.acceptsLanguages()
          or user profile settings passed directly without normalization, (2) using 'zh-CN'
          when 'zh-CN-Simplified' is the actual key (zh-CN IS supported in isAlpha, but
          similar subtleties exist), (3) using POSIX locale formats ('en_US') instead of
          BCP 47 ('en-US'), (4) adding a new market's locale that isAlpha doesn't yet support.
        throws: >
          Error with message "Invalid locale '<locale>'".
          Plain Error (not TypeError). This fires on valid string input with unrecognized locale
          name — different from assertString()'s TypeError which fires on null/non-string input.
          Callers that catch TypeError will NOT catch this locale error.
        required_handling: >
          Validate the locale before calling isAlpha(), or use a try-catch:

            // Safe: pre-validate using the built-in locales list
            const { isAlpha } = require('validator');
            const supportedLocales = new Set(isAlpha.locales);
            const safeLocale = supportedLocales.has(userLocale) ? userLocale : 'en-US';
            isAlpha(name, safeLocale)

            // Or wrap in try-catch for dynamic locale values
            try {
              const isValid = isAlpha(name, locale);
            } catch (e) {
              if (e.message.startsWith('Invalid locale')) {
                return false; // unsupported locale, skip alpha check
              }
              throw e;
            }

          Never pass Accept-Language header values or user-submitted locale strings directly
          as the locale parameter without normalization.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isAlpha.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: alpha-ignore-type-throws
        condition: >
          isAlpha() called with the ignore option set to a non-string, non-RegExp value.
          The ignore option allows certain characters to be excluded from alpha checking
          (e.g., ignore spaces in 'hello world'). When passed a number, array, or object
          instead of a string or RegExp, isAlpha throws. Common when ignore is built
          dynamically from config or user input.
        throws: >
          Error with message "ignore should be instance of a String or RegExp".
          Plain Error (not TypeError). Occurs when options.ignore is set but is not a
          string or RegExp instance (e.g., ignore: [' ', '-'] passes an array).
        required_handling: >
          Always ensure the ignore option is a string or RegExp before calling isAlpha():

            // Wrong: passing array for multiple chars to ignore
            isAlpha('hello world', 'en-US', { ignore: [' ', '-'] })  // throws!

            // Right: pass a string of chars to ignore
            isAlpha('hello world', 'en-US', { ignore: ' -' })  // ' ' and '-' ignored

            // Right: pass a RegExp
            isAlpha('hello world', 'en-US', { ignore: /[\s-]/g })
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isAlpha.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isAlphanumeric
    import_path: "validator"
    description: >
      Validates that a string contains only alphanumeric characters for a given locale.
      Accepts 76 locales (default 'en-US'). Returns boolean. Throws Error (not TypeError)
      when an unrecognized locale string is passed — same locale-throw pattern as isAlpha.
      The ignore option also throws for non-string, non-RegExp values. Extremely common
      in username, tag, and slug validation.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isAlphanumeric.js
      # Source confirmed: throw new Error(`Invalid locale '${locale}'`) in isAlphanumeric.js
      # throw new Error('ignore should be instance of a String or RegExp') for invalid ignore
      # isAlphanumeric.locales lists all 76 supported locales
      - id: alphanumeric-invalid-locale-throws
        condition: >
          isAlphanumeric() called with a locale string not in the supported 76-locale set.
          More commonly encountered than isAlpha locale errors because username/username
          validation is often locale-aware in globalized apps. A locale added to the frontend
          for display purposes may not match the validator.js locale set, causing the
          username validation handler to throw instead of returning false.
        throws: >
          Error with message "Invalid locale '<locale>'".
          Plain Error (not TypeError). Callers catching only TypeError miss this.
          Fires on valid string input with unrecognized locale — not on null/undefined input.
        required_handling: >
          Pre-validate locale or use try-catch:

            const { isAlphanumeric } = require('validator');
            const supportedLocales = new Set(isAlphanumeric.locales);
            const safeLocale = supportedLocales.has(locale) ? locale : 'en-US';
            const isValid = isAlphanumeric(username, safeLocale);
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isAlphanumeric.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: alphanumeric-ignore-type-throws
        condition: >
          isAlphanumeric() called with ignore option set to a non-string, non-RegExp value.
          Same pattern as isAlpha's ignore option. Thrown when ignore is an array, number,
          object, or other non-string type.
        throws: >
          Error with message "ignore should be instance of a String or RegExp".
          Plain Error (not TypeError). Thrown before the locale check runs.
        required_handling: >
          Pass ignore as a string of characters to exclude or as a RegExp:

            // Wrong
            isAlphanumeric('user-name', 'en-US', { ignore: ['-'] })  // throws!

            // Right
            isAlphanumeric('user-name', 'en-US', { ignore: '-' })
            isAlphanumeric('user.name', 'en-US', { ignore: /[.-]/g })
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isAlphanumeric.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isDecimal
    import_path: "validator"
    description: >
      Validates that a string is a decimal number, optionally with locale-aware decimal
      separator (period for en-US, comma for de-DE). Supports 68 locales. Returns boolean.
      Throws Error (not TypeError) when an unrecognized locale string is passed. The
      force_decimal option requires that a decimal point actually be present — without it,
      integers like '1' pass the decimal check.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isDecimal.js
      # Source confirmed: throw new Error(`Invalid locale '${options.locale}'`) in isDecimal.js
      # force_decimal: false (default) allows integers to pass; true requires decimal point
      - id: decimal-invalid-locale-throws
        condition: >
          isDecimal() called with a locale option not in the 68-locale supported set. The
          locale option controls which decimal separator character is expected (e.g. 'de-DE'
          accepts '1,5' as valid decimal). Passing an unsupported locale string throws instead
          of returning false, crashing the validation handler for financial input.
        throws: >
          Error with message "Invalid locale '<locale>'".
          Plain Error (not TypeError). Thrown when options.locale is not in the supported
          decimal locale set. Note: the locale key in options, not a positional argument.
        required_handling: >
          Validate locale or use try-catch. The decimal locales are accessible as:

            const alpha = require('validator/lib/alpha');
            const supportedDecimalLocales = Object.keys(alpha.decimal);
            // Includes: en-US, de-DE, fr-FR, ar, es-ES, etc. (68 total)

            // Safe pattern
            const safeLocale = supportedDecimalLocales.includes(locale) ? locale : 'en-US';
            isDecimal(priceStr, { locale: safeLocale })
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isDecimal.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: decimal-force-decimal-not-set
        condition: >
          isDecimal() used to validate price or financial input where integers (without
          a decimal point) should be rejected. By default force_decimal is false, meaning
          isDecimal('100') returns true — an integer passes the decimal validator. Financial
          forms that require prices like '100.00' (not just '100') will silently accept
          integers if force_decimal is not set.
        returns: >
          true for integers like '100', '0', '-5' when force_decimal is false (default).
          Returns false for those same strings when force_decimal: true.
        required_handling: >
          When validating monetary amounts that require an explicit decimal component,
          use force_decimal: true:

            // Wrong: accepts integers as valid prices
            isDecimal(price)  // '100' → true, '100.00' → true

            // Right for strict decimal requirement
            isDecimal(price, { force_decimal: true })  // '100' → false, '100.00' → true

          For currency display-only validation (showing prices to users), consider
          isCurrency() which has more financial-specific options.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isDecimal.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: isDate
    import_path: "validator"
    description: >
      Validates that a value is a valid date. In non-strict mode (default), accepts BOTH
      strings AND actual Date objects — this is surprising since all other validator.js
      functions only accept strings. In strict mode, accepts only strings in the format
      specified by the format option (default 'YYYY/MM/DD'). The default format is
      'YYYY/MM/DD' — NOT 'YYYY-MM-DD', which catches many callers off guard. Throws
      TypeError on non-string, non-Date input in strict mode.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isDate.js
      # Source confirmed: !options.strictMode returns true for Date objects via Date.isFinite check
      # strictMode: true only accepts strings matching the format option (default 'YYYY/MM/DD')
      # 2024-01-15 passes isDate() even without strictMode because both '/' and '-' are in default delimiters
      - id: isdate-non-strict-accepts-date-objects
        condition: >
          isDate() used in an API handler where the input may be either a string (from JSON
          body parsing) or a Date object. In non-strict mode, isDate(new Date()) returns true
          even though Date is not a string. This means a pre-parsed Date object silently passes
          string validation, bypassing subsequent string-specific sanitization steps.
          Also occurs when TypeScript's type system is bypassed (e.g., any type, JSON.parse
          output used without type assertion).
        returns: >
          true for actual Date objects when strictMode is false (default). This means
          isDate() does NOT guarantee the input is a string — it may still be a Date object.
          All downstream string operations on the value (trim, split, slice) will then fail
          or produce unexpected results.
        required_handling: >
          Use strictMode: true when you expect only strings:

            // Wrong: accepts both strings and Date objects
            if (!isDate(userInput)) return res.status(400).json({ error: 'Invalid date' });
            const trimmed = userInput.trim();  // TypeError if userInput was a Date object!

            // Right: strict mode rejects Date objects, only accepts formatted strings
            if (!isDate(userInput, { strictMode: true, format: 'YYYY-MM-DD' })) {
              return res.status(400).json({ error: 'Invalid date, expected YYYY-MM-DD' });
            }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isDate.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: isdate-strict-format-mismatch
        condition: >
          isDate() called with strictMode: true but without explicitly specifying format,
          while the expected input format is 'YYYY-MM-DD' (ISO date). The default format
          option is 'YYYY/MM/DD' (slash separator, not dash). In strict mode, 'YYYY-MM-DD'
          strings like '2024-01-15' return FALSE unless format: 'YYYY-MM-DD' is set.
          The mismatch is subtle — the same string returns true in non-strict mode but
          false in strict mode with default format.
        returns: >
          false for '2024-01-15' in strict mode with default format ('YYYY/MM/DD').
          Returns true for '2024/01/15' in strict mode with default format.
          This silently rejects valid ISO dates when callers use strict mode naively.
        required_handling: >
          Always specify the format explicitly when using strict mode:

            // Wrong: strict mode with default format rejects 'YYYY-MM-DD' strings
            isDate('2024-01-15', { strictMode: true })  // → false (unexpected!)

            // Right: specify the format you're validating
            isDate('2024-01-15', { strictMode: true, format: 'YYYY-MM-DD' })  // → true
            isDate('2024/01/15', { strictMode: true })  // → true (matches default)
            isDate('01/15/2024', { strictMode: true, format: 'MM/DD/YYYY' })  // → true

          Note: isISO8601() with { strict: true } is often more appropriate for ISO 8601
          date validation in API contexts.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isDate.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
