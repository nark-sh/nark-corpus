  - name: unescape
    import_path: "validator"
    description: >
      Reverses HTML entity escaping: converts &amp; → &, &lt; → <, &gt; → >,
      &quot; → ", &#x27; → ', &#x2F; → /, &#x5C; → \, &#96; → `.
      Returns string. Throws TypeError on non-string input (assertString pattern).
      This function is the INVERSE of escape() — calling it restores raw characters
      that would be dangerous in HTML contexts.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/unescape.js
      # Source confirmed: sequential string replacements using .replace() chains.
      # assertString() throws TypeError for non-string input.
      # Security risk: unescaping before HTML rendering reintroduces XSS vectors.
      - id: unescape-xss-reintroduction
        condition: >
          unescape() output rendered directly in HTML without re-escaping. Occurs when:
          (1) data is stored escaped in database, retrieved, unescaped, then rendered
          in a template — the unescape call negates the original protection, (2) an
          "unescape for display" step is added to a data pipeline that also renders
          to HTML, (3) using unescape() to "clean up" data before passing to another
          validator that doesn't need HTML-encoded input.
        returns: >
          String with all HTML entities converted back to literal characters.
          The returned string contains raw <, >, &, ", ', / characters that
          are DANGEROUS in HTML rendering contexts.
        required_handling: >
          Never render unescape() output directly in HTML without calling escape() again.
          The canonical safe pattern is to store raw strings (not HTML-encoded) and
          escape only at render time:

            // WRONG: store encoded, unescape for comparison, render without re-escaping
            const stored = validator.escape(userInput);   // stored in DB
            const raw = validator.unescape(stored);       // retrieved later
            template.innerHTML = raw;                      // ← XSS vulnerability!

            // RIGHT: store raw, escape only when rendering HTML
            const stored = userInput;                      // store raw
            template.innerHTML = validator.escape(stored); // escape at render time

          Use unescape() only when the unescaped output will NOT be rendered in HTML
          (e.g., logging, plaintext email body, API response body in JSON).
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/unescape.js"
          - "https://owasp.org/www-community/attacks/xss/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

  - name: blacklist
    import_path: "validator"
    description: >
      Removes all occurrences of characters in the `chars` string from `str`.
      Returns string. Throws TypeError on non-string first argument (assertString pattern).
      Internally constructs a RegExp as `new RegExp('[' + chars + ']+', 'g')` — the
      chars parameter is NOT escaped. If chars contains regex metacharacters, they are
      interpreted as regex syntax rather than literal characters, causing unexpected
      behavior or RegExp errors.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/blacklist.js
      # Source confirmed: str.replace(new RegExp('[' + chars + ']+', 'g'), '')
      # chars is directly interpolated without escaping — regex injection risk.
      - id: blacklist-regex-injection
        condition: >
          blacklist() called where the `chars` argument derives from user input, a
          configuration value, or a database field that may contain regex metacharacters
          (], [, ^, -, \, ., *, +, ?, (, ), {, }, |).
          For example: blacklist(input, userSuppliedCharsToRemove) where the chars value
          contains '-' would be interpreted as a range operator in the character class,
          potentially making the regex match unintended characters or throw a SyntaxError.
        throws: >
          SyntaxError when chars contains invalid regex syntax (e.g., unbalanced brackets,
          invalid character class ranges like 'z-a'). May silently match unintended
          characters when chars contains range operators like '-' or '^'.
        required_handling: >
          Never pass user-controlled values as the `chars` argument. If chars must be
          dynamic, escape regex special characters before passing:

            function safeBlacklist(str, chars) {
              // Escape special regex chars in the character class
              const escapedChars = chars.replace(/[-[\]^\\]/g, '\\$&');
              return validator.blacklist(str, escapedChars);
            }

          For static char lists (hardcoded strings), verify the string contains no
          regex metacharacters. Use whitelist() (or trim/replace) when you know exactly
          which characters to KEEP rather than remove.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/blacklist.js"
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: whitelist
    import_path: "validator"
    description: >
      Removes all characters from `str` EXCEPT those in the `chars` string (inverse
      of blacklist). Returns string. Throws TypeError on non-string first argument.
      Internally constructs RegExp as `new RegExp('[^' + chars + ']+', 'g')` — the
      chars parameter is NOT escaped. Same regex injection vulnerability as blacklist().
      Commonly used as a "allow only alphanumeric" sanitizer in form processing.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/whitelist.js
      # Source confirmed: str.replace(new RegExp('[^' + chars + ']+', 'g'), '')
      # chars interpolated without escaping — same regex injection risk as blacklist.
      - id: whitelist-regex-injection
        condition: >
          whitelist() called where the `chars` argument derives from user input,
          a config file, or a variable that may contain regex metacharacters.
          Same attack surface as blacklist(): '-', '^', ']', '\' in chars cause
          unintended regex behavior. Additionally, '^' at the start of chars
          inverts the logic (already negated in the pattern), potentially passing
          all characters through.
        throws: >
          SyntaxError when chars produces invalid regex syntax. May silently pass
          through characters that should have been removed when chars contains
          range or negation metacharacters.
        required_handling: >
          Always use hardcoded chars strings. For dynamic whitelist characters,
          escape before passing:

            // Wrong: dynamic chars from config
            whitelist(input, allowedCharsFromConfig)

            // Right: hardcoded explicit character set
            whitelist(input, 'a-zA-Z0-9')  // letters and digits only
            whitelist(input, '0-9')          // digits only

            // If dynamic is unavoidable:
            const escaped = chars.replace(/[-[\]^\\]/g, '\\$&');
            whitelist(input, escaped)
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/whitelist.js"
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: toBoolean
    import_path: "validator"
    description: >
      Converts a string to boolean. Throws TypeError on non-string input (assertString).
      Non-strict mode (default): returns false for '0', 'false', '' — everything else
      returns true, including 'no', 'off', 'null', 'undefined'. Strict mode: returns
      true ONLY for '1' and 'true' (case-insensitive) — everything else returns false.
      The distinction between strict and non-strict is critical for authentication
      and feature-flag systems where users control the string value.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/toBoolean.js
      # Non-strict: returns false for '0', 'false', ''; true for everything else.
      # Strict (strict=true): returns true for '1', 'true'; false for everything else.
      # assertString() throws TypeError for non-string input.
      - id: to-boolean-loose-mode-truthy-surprise
        condition: >
          toBoolean() called without strict=true in a security-sensitive context where
          the string value comes from user input, environment variables, or query
          parameters. In non-strict mode, 'no', 'off', 'disabled', 'false' (wrong case
          would still be 'false'), 'null', '0.0', 'FALSE' — all return true because
          only the exact strings '0', 'false', and '' return false.
          Examples: toBoolean('no') → true, toBoolean('off') → true,
          toBoolean('null') → true, toBoolean('0.0') → true.
        returns: >
          true for any string that is not exactly '0', 'false' (case-sensitive), or ''
          in non-strict mode. This is counterintuitive — many strings that humans read
          as "falsy" (like 'no', 'off', 'disabled') return true.
        required_handling: >
          Use strict mode (toBoolean(str, true)) when parsing boolean config values,
          feature flags, or any string that may be 'yes'/'no', 'on'/'off', or
          natural language booleans:

            // Non-strict (default) — only use when you trust the source to be '0'/'false'/''
            toBoolean('no')       // → true (SURPRISE: 'no' is truthy!)
            toBoolean('off')      // → true (SURPRISE: 'off' is truthy!)
            toBoolean('0.0')      // → true (SURPRISE: '0.0' is truthy!)

            // Strict mode — only '1' and 'true' return true
            toBoolean('yes', true)  // → false (as expected)
            toBoolean('1', true)    // → true  (as expected)
            toBoolean('true', true) // → true  (as expected)
            toBoolean('on', true)   // → false

          For environment variables and feature flags, always use strict mode:
            const isFeatureEnabled = toBoolean(process.env.FEATURE_FLAG, true);
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/toBoolean.js"
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: trim
    import_path: "validator"
    description: >
      Removes specified characters from both ends of a string. When chars is omitted,
      removes whitespace. Returns string. Throws TypeError on non-string input.
      Internally calls ltrim() then rtrim(). Unlike blacklist/whitelist, trim() uses
      an escaped regex — special characters in chars are safely handled by ltrim/rtrim.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/trim.js
      # ltrim.js escapes chars: chars.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&')
      # Therefore trim/ltrim/rtrim do NOT have the regex injection issue of blacklist/whitelist.
      # assertString() throws TypeError for non-string input.
      - id: trim-non-string-throws
        condition: >
          trim(), ltrim(), or rtrim() called with a non-string first argument. Common
          in form processing pipelines where fields may be null (optional fields not
          submitted), undefined (object property not set), or numbers (age, price
          parsed from JSON before being passed to trim for "just in case" sanitization).
          Contrast with JavaScript's native String.prototype.trim() which doesn't exist
          on null/undefined.
        throws: >
          TypeError with message "Expected a string but received a <type>".
          Thrown by assertString() before any trimming occurs. Non-string values like
          null, undefined, 0, or objects cause immediate TypeError.
        required_handling: >
          Always ensure the input is a string before calling trim():

            // Wrong: may receive null from optional form field
            const cleanName = validator.trim(req.body.name);

            // Right: coerce or guard first
            const cleanName = validator.trim(String(req.body.name ?? ''));

            // Or use optional chaining with fallback
            const cleanName = req.body.name
              ? validator.trim(req.body.name)
              : '';
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/trim.js"
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/ltrim.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isByteLength
    import_path: "validator"
    description: >
      Validates that a string's length in UTF-8 bytes falls within a given range.
      Measures BYTES not JavaScript characters. For ASCII text, bytes == chars.
      For multi-byte characters (CJK, emoji, accented chars), byte count > char count.
      Throws TypeError on non-string input (assertString pattern). Returns boolean.
      Common use: validating inputs against database column byte limits.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js#validators (isByteLength docs)
      # Source confirmed: lib/isByteLength.js — uses encodeURI(str).split(/%..|./).length - 1
      # encodeURI() encodes non-ASCII chars as %XX%XX sequences; split counts them as 2-3 bytes each.
      - id: isbytelength-byte-vs-char-confusion
        condition: >
          isByteLength() used to validate string length against a limit derived from a
          database column size or API constraint, where the column stores multibyte
          characters (CJK, Arabic, emoji, accented Latin). The max option reflects the
          column's byte capacity, not its character capacity.
          Example: VARCHAR(100) means 100 bytes in some databases (MySQL latin1), or
          100 chars in others (MySQL utf8mb4 stores 1-4 bytes per char). Code that
          passes isByteLength({max: 100}) for a utf8mb4 VARCHAR(100) column will REJECT
          valid CJK strings that fit the column because it conflates bytes and chars.
          Conversely, code that uses isLength({max: 100}) for a VARCHAR(100) byte-limited
          column will ALLOW overlong multibyte strings that EXCEED the DB column's capacity.
        returns: >
          false when the byte length exceeds max — but this can falsely reject valid input
          if the limit was meant as a character limit, or falsely accept overlong input if
          isLength() was used instead for a byte-limited column.
        required_handling: >
          Use isByteLength() only when the constraint is a BYTE limit (e.g. Redis
          key/value byte caps, fixed-width binary fields, HTTP header length limits).
          Use isLength() when the constraint is a CHARACTER limit (e.g. display name
          max characters, tweet length, most UI character counters).
          For database columns: check whether the column type stores length in bytes or
          characters. MySQL utf8mb4 CHAR(n) = n characters; VARCHAR(n) = n bytes.
          PostgreSQL TEXT/VARCHAR(n) = n characters.

            // Wrong: Assumes column limit is characters, not bytes
            if (!validator.isByteLength(name, { max: 100 })) reject('name too long');
            // May reject valid CJK name 'が大切' (3 chars = 9 bytes)

            // Right for byte-limited storage:
            if (!validator.isByteLength(value, { max: 256 })) reject('value too large');

            // Right for character-limited display (most UI use cases):
            if (!validator.isLength(name, { max: 100 })) reject('name too long');
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isByteLength.js"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

      - id: isbytelength-non-string-throws
        condition: >
          isByteLength() called with a non-string first argument. Common when processing
          JSON payload fields that may be null (optional fields), numbers, or objects
          before string validation.
        throws: >
          TypeError with message "Expected a string but received a <type>".
          Thrown by assertString() before the byte count is computed.
        required_handling: >
          Guard or coerce to string before calling:

            // Wrong: may receive null from optional JSON field
            const valid = validator.isByteLength(req.body.description, { max: 255 });

            // Right: guard first
            const desc = req.body.description;
            if (typeof desc !== 'string') return reject('description required');
            const valid = validator.isByteLength(desc, { max: 255 });
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isWhitelisted
    import_path: "validator"
    description: >
      Returns true if every character in `str` is present in the `chars` whitelist string.
      Returns false if any character in `str` is NOT in `chars`. Returns true for empty `str`.
      Throws TypeError if `str` is non-string (assertString pattern). Throws TypeError if
      `chars` is null or undefined (unique: most is* validators only throw for non-string str,
      not for the second parameter). Used as a character-allowlist validator in form processing.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js#validators (isWhitelisted)
      # Source confirmed: lib/isWhitelisted.js — chars.indexOf(str[i]) throws if chars is null
      # assertString(str) called first; then chars.indexOf() called without null-check on chars.
      - id: iswhitelisted-null-chars-throws
        condition: >
          isWhitelisted() called where the `chars` parameter is null, undefined, or a value
          that does not have an indexOf() method. This differs from all other is* validators
          whose only TypeError comes from a null/non-string FIRST argument. Here the SECOND
          argument (chars) can also throw. Occurs when chars is loaded from a config file or
          environment variable that may be absent, or when it's derived from user input
          without validation.
        throws: >
          TypeError: "Cannot read properties of null (reading 'indexOf')" when chars is null.
          TypeError: "Cannot read properties of undefined (reading 'indexOf')" when chars is undefined.
          This is NOT an assertString() error — it originates from the chars.indexOf() call
          inside the loop after assertString(str) has already succeeded.
        required_handling: >
          Always ensure chars is a non-null string before calling isWhitelisted():

            // Wrong: chars from config may be undefined
            const allowed = config.allowedChars;  // may be undefined
            if (!validator.isWhitelisted(input, allowed)) throw new Error('invalid chars');
            // => TypeError: Cannot read properties of undefined (reading 'indexOf')

            // Right: validate or default chars
            const allowed = config.allowedChars ?? 'abcdefghijklmnopqrstuvwxyz0123456789';
            if (!validator.isWhitelisted(input, allowed)) throw new Error('invalid chars');
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isWhitelisted.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: iswhitelisted-unchecked-return
        condition: >
          isWhitelisted() return value not checked, or checked but the application
          proceeds with the unvalidated input when it returns false. Unlike blacklist()
          which REMOVES disallowed chars from the string, isWhitelisted() only REPORTS
          whether disallowed chars are present — it does not sanitize. Callers who
          mistake it for a sanitizer instead of a validator pass through invalid input.
        returns: >
          false when any character in str is not in chars. The string is NOT modified.
          Returning false means the input is INVALID — the caller must reject it.
        required_handling: >
          Always act on the boolean return value. Do not pass the original string
          through after isWhitelisted returns — the string is unchanged:

            // Wrong: confuses validator with sanitizer
            const safe = validator.isWhitelisted(userInput, 'a-z0-9');
            // safe is boolean, NOT a sanitized string — but name implies it "whitelisted" the value
            db.query('INSERT INTO tags VALUES (' + userInput + ')');  // userInput unchanged!

            // Right: check and reject
            if (!validator.isWhitelisted(userInput, 'abcdefghijklmnopqrstuvwxyz0123456789-')) {
              return res.status(400).json({ error: 'Invalid characters in tag name' });
            }
            db.query('INSERT INTO tags VALUES (?)', [userInput]);
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

