  - name: isBase32
    import_path: "validator"
    description: >
      Validates whether a string is valid Base32-encoded data. Returns boolean.
      Throws TypeError on non-string input (assertString pattern). The crockford
      option switches between standard RFC 4648 Base32 (A-Z, 2-7, = padding, length
      must be multiple of 8) and Crockford Base32 (A-Z minus ILOU, 0-9, no padding,
      no length constraint). These are incompatible encodings — standard Base32 and
      Crockford Base32 strings with the same content are different character sequences.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isBase32.js
      # Standard regex: /^[A-Z2-7]+=*$/ with str.length % 8 === 0 check
      # Crockford regex: /^[A-HJKMNP-TV-Z0-9]+$/ with no length constraint
      # Confirmed: default is crockford: false (standard Base32)
      - id: base32-crockford-confusion
        condition: >
          Crockford Base32-encoded data (used by ULID, NanoID, some blockchain identifiers)
          validated without { crockford: true } option. Crockford Base32 excludes
          ambiguous characters (I, L, O, U) and uses digits 0-9 alongside letters.
          Standard Base32 uses only A-Z and 2-7. A valid Crockford Base32 string
          WILL fail isBase32() with default options because:
          (1) Crockford allows digits 0, 1, 3-9 which aren't in [A-Z2-7]
          (2) Crockford strings have no padding (= chars)
          (3) Crockford strings may not be length % 8
        returns: "false for valid Crockford Base32 strings when crockford option is not set"
        required_handling: >
          Determine which encoding standard your data uses before calling isBase32():

          // Standard RFC 4648 Base32 (e.g., TOTP secrets, many crypto keys):
          isBase32(str)  // or { crockford: false }
          // Example valid: 'MFRA====', length must be multiple of 8

          // Crockford Base32 (used by ULID, NanoID, Hashids):
          isBase32(str, { crockford: true })
          // Example valid: '01ARYZ6S41', no padding required

          The two are not interchangeable. A ULID (always Crockford Base32) will
          always fail standard isBase32() — returning false, not throwing, causing
          silent validation failures that reject valid data.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isBase32.js"
          - "https://www.crockford.com/base32.html"
          - "https://github.com/ulid/spec"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

