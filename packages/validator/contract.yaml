  - name: isAfter
    import_path: "validator"
    description: >
      Checks if a date string is after a comparison date. Returns false (not an
      exception) when either date string cannot be parsed by toDate(). This silent
      false return is the primary behavioral contract — callers that treat false as
      "valid but old date" instead of "parse failure" allow invalid dates through.

    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isAfter.js
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/toDate.js
      - id: isafter-unparseable-date-returns-false
        condition: "either date string cannot be parsed (invalid format, null, garbage)"
        returns: "false — no exception thrown"
        required_handling: >
          isAfter(str) returns false both when the date is genuinely before the
          comparison date AND when the date string is unparseable. Code that only
          checks !isAfter(userDate) to enforce a future-date requirement silently
          accepts garbage strings ('not-a-date', '99-99-9999') because they also
          return false. Pair with isDate() or isISO8601() first to confirm the
          string is a valid date, then use isAfter() for the range check.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isAfter.js"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isBefore
    import_path: "validator"
    description: >
      Checks if a date string is before a comparison date. Mirrors isAfter() —
      returns false (not an exception) when either date string cannot be parsed.
      Same behavioral contract: callers cannot distinguish parse failure from
      genuine before-the-deadline result.

    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isBefore.js
      - id: isbefore-unparseable-date-returns-false
        condition: "either date string cannot be parsed"
        returns: "false — no exception thrown"
        required_handling: >
          isBefore(str) returns false both when the date is genuinely after the
          comparison date AND when the date string is invalid. Subscription expiry
          checks that use isBefore(expiryDate) silently treat garbage expiry strings
          as "not yet expired", granting perpetual access. Pair with isDate() or
          isISO8601() before using isBefore() for access-control decisions.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isBefore.js"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: ltrim
    import_path: "validator"
    description: >
      Removes leading characters from a string. Default chars is whitespace.
      Custom chars are safely escaped before being inserted into a RegExp.
      Throws TypeError on non-string input via assertString().

    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/ltrim.js
      - id: ltrim-non-string-typeerror
        condition: "non-string value passed as str argument"
        throws: "TypeError: Expected a string but received a <type>"
        required_handling: >
          Caller MUST ensure str is a string. ltrim() is used in sanitisation
          pipelines where the input may be null/undefined from optional form fields
          or query params. Unlike JavaScript's built-in String.prototype.trimStart(),
          validator's ltrim() throws rather than coercing — passing null crashes.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/ltrim.js"
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
