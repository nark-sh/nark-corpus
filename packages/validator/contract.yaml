  - name: isEmpty
    import_path: "validator"
    description: >
      Checks if the string has a length of zero. Returns boolean. Throws TypeError on
      non-string input (assertString pattern). The default option `ignore_whitespace: false`
      means whitespace-only strings like '  ', '\t', '\n' are NOT considered empty — they
      have non-zero length. Developers expecting whitespace trimming must explicitly set
      ignore_whitespace: true.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isEmpty.js
      # Source confirmed: `options.ignore_whitespace ? str.trim().length : str.length` === 0
      # Default: ignore_whitespace: false — whitespace strings have length > 0 and are NOT empty
      - id: isempty-whitespace-not-empty-by-default
        condition: >
          isEmpty() used to validate required form fields without setting ignore_whitespace: true.
          The default behavior considers '  ' (spaces only), '\t' (tab), '\n\n' (newlines) as
          NON-empty strings because their str.length is > 0. A form field filled with only
          spaces passes isEmpty() check with default options, bypassing required-field
          validation and potentially storing whitespace-only values in the database.
        returns: >
          false for whitespace-only strings like '  ', '\t', '\r\n' with default options
          (ignore_whitespace: false). Returns true only if str.length === 0 — an actual
          empty string with no characters at all.
        required_handling: >
          For required-field validation, always set ignore_whitespace: true or trim first:

            // Wrong: ' ' passes as non-empty (not caught)
            if (isEmpty(userInput)) {
              return res.status(400).json({ error: 'Name is required' });
            }

            // Right: whitespace-only strings caught as empty
            if (isEmpty(userInput, { ignore_whitespace: true })) {
              return res.status(400).json({ error: 'Name is required' });
            }

            // Alternative: trim first, then check
            if (isEmpty(userInput.trim())) {
              return res.status(400).json({ error: 'Name is required' });
            }

          Note: trimming then storing vs storing then trimming are different behaviors.
          The trim-first pattern is usually safer for downstream consumers.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isEmpty.js"
          - "https://github.com/validatorjs/validator.js#validators"
