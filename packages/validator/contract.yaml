    description: >
      Tests a string against a regex pattern. Returns boolean. Accepts string pattern
      (converted to RegExp internally) or RegExp object. Throws TypeError on non-string
      input. CRITICAL: The official README explicitly warns that user-provided patterns
      are NOT checked for ReDoS attacks.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # README explicitly states: "The pattern is not checked for possible ReDoS attacks.
      # We do not recommend that the user can provide their own pattern."
      # Source: node_modules/validator/lib/matches.js — pattern converted via new RegExp(pattern, modifiers)
      - id: matches-redos-user-pattern
        condition: "matches() called with a user-supplied pattern or modifiers"
        returns: "boolean — but string pattern compiled without ReDoS protection"
        required_handling: >
          CRITICAL: The validator README explicitly states matches() patterns are NOT
          checked for ReDoS attacks and user-provided patterns are NOT recommended.
          When the pattern argument is a string (not a RegExp literal), it is compiled
          via new RegExp(pattern, modifiers) at runtime. A malicious user can supply
          a catastrophic backtracking pattern like "(a+)+" that causes exponential
          backtracking, halting the Node.js event loop.
          Callers MUST: (1) never pass user-supplied strings directly as the pattern,
          (2) only use hardcoded RegExp literals as the pattern argument, or (3) use
          a ReDoS-safe regex library (e.g., safe-regex, re2) for user-supplied patterns.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://owasp.org/www-community/attacks/Regular_expression_Denial_of_Service_-_ReDoS"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

