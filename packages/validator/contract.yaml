  - name: isBase58
    import_path: "validator"
    description: >
      Validates that a string uses only the Base58 character set (digits 1-9, uppercase
      A-H/J-N/P-Z, lowercase a-k/m-z — excludes 0, O, I, l to prevent visual confusion).
      Returns boolean. Throws TypeError on non-string input.
      CRITICAL: This is a character-set validator only. It does NOT perform the
      Base58Check checksum verification required by Bitcoin P2PKH/P2SH addresses,
      Litecoin addresses, or other blockchain address formats that embed a 4-byte
      checksum. A corrupted or fabricated address passes isBase58() if it uses the
      correct character set.

    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js#validators
      # Source: node_modules/validator/lib/isBase58.js — regex /^[A-HJ-NP-Za-km-z1-9]*$/ only
      # Confirmed: node -e "const v=require('./isBase58'); console.log(v('3J98t1WpEZ73CNmQviecrnyiWrnqRhWNLZ'))"
      # Output: true — corrupted Bitcoin address (last char changed) still passes
      - id: base58-format-only-not-checksummed
        condition: "isBase58() used to validate Bitcoin, Litecoin, Solana, or IPFS addresses"
        returns: "true for any Base58 character-set string, including corrupted/fabricated addresses"
        required_handling: >
          CRITICAL: isBase58() only checks the character alphabet — it does NOT verify
          the Base58Check 4-byte checksum embedded in Bitcoin P2PKH ('1...') and P2SH ('3...')
          addresses. A typo in a Bitcoin address (e.g. last character changed from 'y' to 'Z')
          still passes isBase58() because both characters are in the Base58 alphabet.
          Do NOT use isBase58() alone to validate cryptocurrency wallet addresses before
          sending funds. Use a chain-specific library (bitcoinjs-lib, ethers, @solana/web3.js)
          that performs full address validation including checksum and checksum-decode steps.
          isBase58() is safe only as a lightweight pre-filter before full validation.
          For IPFS CIDs (content-addressed Base58-encoded multihashes), isBase58() is
          also insufficient — IPFS CIDv0 hashes are 46-char Base58 strings starting with 'Qm';
          character-set checking does not verify the multihash structure.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isBase58.js"
          - "https://en.bitcoin.it/wiki/Base58Check_encoding"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

      - id: base58-empty-string-valid
        condition: "isBase58('') used as truthy guard for non-empty input"
        returns: "true for empty string ''"
        required_handling: >
          isBase58() uses regex /^[A-HJ-NP-Za-km-z1-9]*$/ — the * quantifier means
          empty string passes. An empty wallet address or IPFS CID passes the check.
          Always pair with a length/non-empty guard:
          if (str && str.length > 0 && isBase58(str)) { ... }
          A missing or empty address field silently passes isBase58('') validation.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isBase58.js"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: base58-non-string-typeerror
        condition: "non-string value passed as str argument (null, undefined, number)"
        throws: "TypeError: Expected a string but received a <type>"
        required_handling: >
          isBase58() calls assertString() which throws TypeError for null, undefined,
          or non-string input. Wallet addresses from API responses or form fields may
          be null/undefined when missing. Guard with typeof check:
          if (typeof address === 'string' && isBase58(address)) { ... }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
