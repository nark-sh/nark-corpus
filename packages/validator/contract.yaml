  - name: isFloat
    import_path: "validator"
    description: >
      Validates that a string is a floating-point number. Returns boolean. Throws TypeError
      on non-string input. Supports locale-aware decimal separators (dot for en-US, comma
      for de-DE, Arabic decimal sign for Arabic locales). Unlike isDecimal(), an invalid
      locale does NOT throw — it silently creates a broken regex using 'undefined' as the
      decimal separator character, causing all validations to return false silently.
      The `min`/`max` options use numeric comparison (parseFloat) not string comparison.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isFloat.js
      # Source confirmed: options.locale ? _alpha.decimal[options.locale] : '.'
      # When locale is unsupported, decimal[locale] = undefined, regex uses literal 'undefined'
      # This is different from isDecimal() which throws Error on invalid locale
      # parseFloat(str.replace(',', '.')) always replaces comma with dot for min/max comparison
      - id: isfloat-invalid-locale-silent-false
        condition: >
          isFloat() called with options.locale set to an unsupported locale string (not in
          the supported set of ~46 locales listed in validator.isFloatLocales). Unlike
          isDecimal() which throws an Error for invalid locales, isFloat() silently uses
          'undefined' as the decimal separator character in the regex. The resulting regex
          never matches any real float string, so all validations return false regardless
          of input. There is no error thrown — the function appears to work but silently
          rejects all valid float strings.
        returns: >
          false for ALL input strings when locale is unsupported, because the regex
          `(?:\undefined[0-9]*)` never matches a real decimal point. The function does
          not throw. This is a silent wholesale validation failure.
        required_handling: >
          Validate locale before using it, or use the exported isFloatLocales list:

            import { isFloat, isFloatLocales } from 'validator';

            // Check if locale is supported
            const safeLocale = isFloatLocales.includes(userLocale) ? userLocale : 'en-US';
            isFloat(amountStr, { locale: safeLocale });

            // Or: omit locale and normalize input yourself
            const normalized = amountStr.replace(',', '.');
            isFloat(normalized);  // Uses default '.' separator

          Note: isDecimal() throws on invalid locale (easier to catch) while isFloat()
          silently returns false (harder to detect). If locale detection matters, prefer
          isDecimal() for monetary amounts.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isFloat.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: isfloat-locale-comma-replace-asymmetry
        condition: >
          isFloat() used with a comma-decimal locale (de-DE, fr-FR, ru-RU, etc.) combined
          with thousands-separator formatted numbers. The function calls
          parseFloat(str.replace(',', '.')) to compute the numeric value for min/max range
          comparison — always replacing the FIRST comma with a dot regardless of locale.
          For European-formatted numbers like '1.234,56' (dot thousands + comma decimal),
          replace(',', '.') produces '1.234.56' and parseFloat stops at the second dot,
          returning 1.234 instead of 1234.56. However, the regex test also rejects such
          numbers (it expects exactly one decimal separator), so the bug only matters if
          the caller pre-processes the thousands separator but not the decimal.
        returns: >
          For numbers with thousands separators like '1.234,56' (de-DE format): regex test
          fails → returns false. The caller must strip thousands separators first.
          For '1234,56' with locale 'de-DE': test passes, value = 1234.56 — correct.
          The comma-replace behavior causes incorrect range comparison only when thousands
          separators are removed but decimal comma is kept AND the value exceeds ranges.
        required_handling: >
          Always strip thousands separators before calling isFloat() in locales that use them:

            // Germany: '1.234,56' (thousands dot, decimal comma)
            const stripped = rawInput.replace(/\./g, '');  // remove thousands sep
            isFloat(stripped, { locale: 'de-DE', min: 0 })  // '1234,56' → 1234.56

          Or use isCurrency() which has explicit thousands_separator and decimal_separator
          options designed for locale-aware monetary input validation.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isFloat.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isHash
    import_path: "validator"
    description: >
      Validates that a string matches the expected hex pattern for a specific hash algorithm
      (validates format/length only — not cryptographic validity). Returns boolean. Throws
      TypeError on non-string input. Supported algorithms: md5, md4, sha1, sha256, sha384,
      sha512, ripemd128, ripemd160, tiger128, tiger160, tiger192, crc32, crc32b. An unknown
      or mistyped algorithm name silently makes all validations return false — no throw.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isHash.js
      # Source confirmed: lengths[algorithm] undefined for unknown algo, regex uses {undefined}
      # {undefined} in JS regex is a literal pattern — never matches hex digits
      # Common mistakes: 'sha-256' vs 'sha256', 'SHA256' vs 'sha256' (case-sensitive lookup)
      - id: ishash-unknown-algorithm-silent-false
        condition: >
          isHash() called with an algorithm string not in the supported set of 13 algorithms.
          Common mistakes include using dashes ('sha-256' instead of 'sha256'), wrong casing
          ('SHA256' instead of 'sha256'), or abbreviated names ('sha2'). When the algorithm
          is unknown, lengths[algorithm] is undefined, the regex becomes
          `^[a-fA-F0-9]{undefined}$` which never matches any hex string. All hash validations
          silently return false — allowing any input string (including malicious non-hash
          values) to bypass hash format validation.
        returns: >
          false for ALL input strings (including valid hash strings) when algorithm is
          unknown or misspelled. The function does not throw. Security checks that rely on
          isHash() for input validation are silently bypassed entirely.
        required_handling: >
          Use exact lowercase algorithm names from the documented set:

            // Wrong: common typos
            isHash(value, 'SHA256')      // returns false for all input
            isHash(value, 'sha-256')     // returns false for all input
            isHash(value, 'sha2')        // returns false for all input
            isHash(value, 'ripemd-128')  // returns false for all input

            // Right: exact documented names
            isHash(value, 'sha256')     // validates 64-char hex
            isHash(value, 'sha512')     // validates 128-char hex
            isHash(value, 'md5')        // validates 32-char hex
            isHash(value, 'ripemd128')  // validates 32-char hex

          To defensively validate the algorithm name:
            const VALID_ALGORITHMS = ['md5', 'md4', 'sha1', 'sha256', 'sha384', 'sha512',
              'ripemd128', 'ripemd160', 'tiger128', 'tiger160', 'tiger192', 'crc32', 'crc32b'];
            if (!VALID_ALGORITHMS.includes(algorithm)) {
              throw new Error(`Unsupported hash algorithm: ${algorithm}`);
            }
            if (!isHash(hashValue, algorithm)) {
              return res.status(400).json({ error: 'Invalid hash format' });
            }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isHash.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        evidence_quality: confirmed

  - name: isIn
    import_path: "validator"
    description: >
      Checks if a string is in a set of allowed values (array, object keys, or string).
      Returns boolean. Throws TypeError on non-string first argument (assertString). The
      second argument (values) is NOT validated — if undefined or null is passed as the
      values list, the function returns false silently without throwing. This means
      missing allowlist configurations silently deny all values rather than throwing a
      catchable error, creating hard-to-detect authorization bugs.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isIn.js
      # Source confirmed: all branches (array/object/string) require options to be truthy
      # Final fallback: `return false` when options is null/undefined
      # isIn('admin', undefined) → false (no throw) — silent total denial
      - id: isin-undefined-values-silent-false
        condition: >
          isIn() called where the values/allowlist parameter is undefined, null, or a
          variable that wasn't populated (e.g., permissions array from a failed DB query,
          config not yet loaded, or undefined roles list). When the values argument is
          undefined or null, none of the array/object/string branches execute and the
          function returns false without throwing. Code that uses isIn() for role-based
          access control or input allowlisting will silently deny ALL values when the
          allowlist is missing — either blocking all users (denial of service) or silently
          passing all users through (if the result is negated for "not in blocked list").
        returns: >
          false for ALL str values when values parameter is undefined or null. No TypeError,
          no Error — the function returns as if the string is not in the (missing) set.
          isIn('admin', undefined) === false, isIn('user', null) === false.
        required_handling: >
          Guard against undefined/null allowlists before calling isIn():

            // Wrong: if allowedRoles is undefined, all users are silently denied
            if (!isIn(user.role, allowedRoles)) {
              return res.status(403).json({ error: 'Access denied' });
            }

            // Right: validate the allowlist exists before use
            if (!Array.isArray(allowedRoles) || allowedRoles.length === 0) {
              throw new Error('Permission configuration error: allowedRoles not configured');
            }
            if (!isIn(user.role, allowedRoles)) {
              return res.status(403).json({ error: 'Access denied' });
            }

            // Alternative: use native Array.includes() which throws on null/undefined
            // making misconfiguration visible as an error rather than a silent false
            if (!allowedRoles.includes(user.role)) { ... }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isIn.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        evidence_quality: confirmed

  - name: isBoolean
    import_path: "validator"
    description: >
      Validates that a string is a boolean value. Returns boolean. Throws TypeError on
      non-string input. Default options: { loose: false }. In strict mode (default),
      only 'true', 'false', '1', '0' are valid. In loose mode, also accepts 'yes', 'no',
      and case variants like 'True', 'FALSE', 'YES', 'NO'. Strict mode accepts '0' and '1'
      as valid booleans — this surprises developers who use isBoolean() expecting only
      'true'/'false' to pass. Loose mode does NOT accept 'on', 'off', 'enabled', 'disabled'.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isBoolean.js
      # Source confirmed: strictBooleans = ['true', 'false', '1', '0']
      # looseBooleans = strictBooleans + ['yes', 'no'] — loose mode lowercases input
      # '0' and '1' are valid in BOTH strict and loose mode — not just 'true'/'false'
      - id: isboolean-strict-accepts-zero-one
        condition: >
          isBoolean() used in strict mode (default) to validate that user input is a
          'true'/'false' boolean string, where the downstream consumer converts using
          `value === 'true'` or JSON.parse(). The strict mode accepts '0' and '1' as valid
          boolean strings. If a user submits '1' (a common boolean representation in HTML
          forms, query strings, and some APIs), isBoolean() passes it, but downstream code
          using `value === 'true'` treats '1' as false, silently inverting the boolean
          for feature flags, consent checkboxes, or notification preferences.
        returns: >
          true for '0', '1', 'true', 'false' in strict mode (default).
          true for '0', '1', 'true', 'false', 'yes', 'no', 'YES', 'NO', 'True', 'False' in
          loose mode. Returns false for 'on', 'off', 'enabled', 'disabled', 'y', 'n' — in
          BOTH modes.
        required_handling: >
          Be explicit about the boolean format your API accepts and how you convert it:

            // If you only want 'true'/'false' (e.g., JSON API):
            if (!['true', 'false'].includes(input)) {
              return res.status(400).json({ error: 'Must be "true" or "false"' });
            }
            const boolValue = input === 'true';

            // If you accept HTML checkbox values '0'/'1':
            if (!isBoolean(input)) { ... }  // '0' and '1' accepted
            const boolValue = input === '1' || input === 'true';

            // If you want human-readable ('yes'/'no' from forms):
            if (!isBoolean(input, { loose: true })) { ... }
            const boolValue = ['true', '1', 'yes'].includes(input.toLowerCase());

          Document which boolean format your endpoint accepts — '0'/'1' vs 'true'/'false'
          vs 'yes'/'no' are three different contracts that isBoolean() partially overlaps.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isBoolean.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

