  - name: isBase64
    import_path: "validator"
    description: >
      Validates base64 encoded strings. Returns boolean. Default checks standard base64
      (with padding, using +/= characters). URL-safe base64 (used in JWTs, URL tokens)
      uses different characters (-_) and requires explicit urlSafe: true option.
      Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/isBase64.js — confirmed urlSafe/padding options
      - id: base64-urlsafe-confusion
        condition: "isBase64() used to validate JWT payloads, URL tokens, or OAuth state without urlSafe: true"
        returns: "false for valid base64url strings (- and _ chars fail standard base64 check)"
        required_handling: >
          Standard base64 uses + and / characters. URL-safe base64 (base64url) uses
          - and _ instead. JWT headers and payloads use base64url encoding. Default
          isBase64() with { urlSafe: false } will return false for valid JWT segments
          because they contain - and _ characters. Always use:
          isBase64(str, { urlSafe: true }) when validating JWT parts, OAuth state tokens,
          or any URL-embedded base64. Using wrong encoding causes false rejections of
          valid tokens, breaking authentication flows.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://datatracker.ietf.org/doc/html/rfc4648#section-5"
        severity: warning
        business_impact:
