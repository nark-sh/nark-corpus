    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isMobilePhone.js
      # Source confirmed: throw new Error(`Invalid locale '${locale}'`) in final else clause
      # Fires when locale is not an array, not a key in `phones` object, and not 'any' or falsey.
      - id: mobile-phone-invalid-locale-throws
        condition: >
          isMobilePhone() called with a locale string not in the supported set and not 'any'.
          Common causes: (1) locale derived from user input or Accept-Language header passed
          directly without normalization, (2) using 'en-US' when the library expects 'en-US'
          but with a subtle variation, (3) using a locale like 'en' (must be 'en-US', 'en-GB',
          etc.), (4) configuration file lists an unsupported locale added for a new market.
        throws: >
