package: validator
semver: ">=13.15.20"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-20"
status: production
evidence_quality: confirmed
coverage_score: 0.198
# Depth pass 2026-04-20 (deepen-stream-2 pass 1):
# +2 functions: isLicensePlate, isBase32
# isLicensePlate: throws Error (not TypeError) for invalid locale — unique in validator API
# isBase32: Crockford vs standard Base32 confusion (parallel to isBase64 urlSafe issue)
# Total contracted: 19 / 95 raw = 0.200; 7 newly identified functions analyzed:
#   CONTRACTED: isLicensePlate (throws Error on invalid locale), isBase32 (crockford confusion)
#   INTENTIONALLY OMITTED: isMD5 (pure hex regex, no security contract), isBase58 (returns boolean),
#     isMagnetURI (niche BitTorrent format, returns boolean), isMailtoURI (delegates to isEmail,
#     returns boolean, no unique contract), isFreightContainerID/isISO6346 (niche shipping domain)
# Scan note: scan-validator-2026-04-03.json — 0 repos successfully scanned (2 skipped, 20 errored)
# FP check: 0/15 FPs in repos without validator (0% rate) — no false positives detected
#
# API Surface: ~95 exported functions (validators + sanitizers)
# Contracted: 17 functions (escape, normalizeEmail, isEmail, isURL, isJSON,
#             isStrongPassword, isJWT, stripLow, toDate, toFloat, toInt, isCreditCard,
#             matches, isCurrency, isBase64, isLength, isISO8601)
# Omitted: ~78 pure-format validators with no unique error contracts
# Coverage: 17/95 raw
#
# CRITICAL CORRECTION (2026-04-17):
# Previous comment stated "validator.js does NOT throw exceptions" — THIS IS WRONG.
# Source inspection of lib/util/assertString.js confirms:
#   assertString() throws TypeError("Expected a string but received a null/undefined/...")
#   when a non-string is passed. This affects ~94 of the ~95 exported functions.
#   Only functions like trim() (which calls ltrim+rtrim) that delegate assertString
#   down may appear to throw from a different frame, but they all throw TypeError
#   on non-string input.
#
# CORRECT behavior:
# - Validators (is*): return boolean; throw TypeError on non-string input
# - Sanitizers (escape, stripLow, trim etc.): return string; throw TypeError on non-string
# - Converters (toDate, toFloat, toInt): return Date|null or NaN; throw TypeError on non-string
# - normalizeEmail: returns string | false; does NOT throw on invalid email (handles internally)
#
# MINIMUM VERSION: 13.15.20
# - CVE-2025-56200: URL validation bypass (< 13.15.20) — isURL() affected
# - CVE-2021-3765: ReDoS in isRTrimmed/ltrim (< 13.7.0)

functions:
  - name: escape
    import_path: "validator"
    description: "Escapes HTML special characters to prevent XSS attacks"

    postconditions:
      - id: escape-xss-prevention
        condition: "user input rendered in HTML without escaping"
        returns: "escaped string (always succeeds)"
        required_handling: >
          Caller MUST use escape() on ALL user input before rendering in HTML.
          Failure to escape allows XSS attacks, session hijacking, and data theft.
          CRITICAL: This is the #1 web security vulnerability.
        sources:
          - "https://owasp.org/www-community/attacks/xss/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: always-escape-user-input
        description: >
          escape() replaces <, >, &, ', ", / with HTML entities. It ALWAYS succeeds
          and returns a string. However, failing to call escape() on user input
          before HTML rendering is the most common XSS vulnerability.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: template-engine-escaping
        description: >
          Many template engines (React, EJS, Handlebars) auto-escape by default.
          Only use escape() when rendering raw HTML or using dangerouslySetInnerHTML.
        sources:
          - "https://reactjs.org/docs/dom-elements.html#dangerouslysetinnerhtml"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: normalizeEmail
    import_path: "validator"
    description: "Normalizes email addresses to prevent spoofing and duplicate accounts"

    postconditions:
      - id: normalize-email-failure
        condition: "email format is invalid"
        returns: "false (boolean)"
        required_handling: >
          Caller MUST check return value. normalizeEmail() returns false for invalid
          emails, not a normalized string. Failing to check allows invalid emails
          to be stored, causing authentication failures.
        sources:
          - "https://github.com/validatorjs/validator.js/issues/1089"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: normalize-email-spoofing
        condition: "email not normalized before storage"
        returns: "normalized email string OR false"
        required_handling: >
          Caller MUST normalize emails before storage. Without normalization,
          users can create duplicate accounts via case differences (User@Example.com
          vs user@example.com) or Gmail +alias bypass (user+1@gmail.com).
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: gmail-alias-removal
        description: >
          normalizeEmail() removes Gmail +alias suffixes by default (user+spam@gmail.com
          becomes user@gmail.com). This prevents duplicate account creation but may
          break legitimate use cases. Use options: { gmail_remove_subaddress: false }
          to preserve aliases.
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isEmail
    import_path: "validator"
    description: "Validates email format (returns boolean, does not throw)"

    postconditions:
      - id: invalid-email
        condition: "email format is invalid"
        returns: "false (boolean)"
        required_handling: >
          Caller MUST check return value. isEmail() returns false for invalid emails,
          it does NOT throw. Failing to check allows invalid emails into the system,
          causing authentication and delivery failures.
        sources:
          - "https://www.npmjs.com/package/validator"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: email-not-validated
        condition: "user email not validated before storage or sending"
        returns: "false for invalid, true for valid"
        required_handling: >
          Caller MUST validate emails before storage or sending. Accepting invalid
          emails causes delivery failures, spam, and phishing attacks.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: email-validation-options
        description: >
          isEmail() has 40+ options for strict validation (allow_display_name,
          require_tld, allow_utf8_local_part, etc.). Default options accept
          most valid emails but may allow edge cases. Use strict options for
          security-critical applications.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isURL
    import_path: "validator"
    description: "Validates URL format (CRITICAL: requires protocol whitelist to prevent XSS)"

    postconditions:
      - id: invalid-url
        condition: "URL format is invalid"
        returns: "false (boolean)"
        required_handling: >
          Caller MUST check return value. isURL() returns false for invalid URLs,
          it does NOT throw. Failing to check allows malformed URLs to pass through.
        sources:
          - "https://www.npmjs.com/package/validator"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: url-protocol-not-whitelisted
        condition: "URL protocol not restricted to safe protocols (https only)"
        returns: "true for valid URL (including javascript:, data:, file: URIs)"
        required_handling: >
          Caller MUST whitelist URL protocols. Default isURL() accepts dangerous
          protocols like javascript:, data:, and file: which enable XSS and phishing.
          ALWAYS use: isURL(url, { protocols: ['https'], require_protocol: true })
        sources:
          - "https://github.com/validatorjs/validator.js/security/advisories/GHSA-9965-vmph-33xx"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: url-validation-bypass-cve
        condition: "validator version < 13.15.20"
        returns: "true (but may incorrectly validate malicious URLs)"
        required_handling: >
          CRITICAL: CVE-2025-56200 affects validator < 13.15.20. The isURL() function
          has a validation bypass allowing XSS and open redirect attacks. Upgrade to
          13.15.20+ immediately. Exploit POC available publicly.
        sources:
          - "https://github.com/advisories/GHSA-9965-vmph-33xx"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: open-redirect-vulnerability
        description: >
          Using isURL() for redirect validation WITHOUT protocol whitelist allows
          attackers to redirect users to phishing sites. Always validate destination
          URLs against an allowlist of trusted domains, not just URL format.
        sources:
          - "https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isJSON
    import_path: "validator"
    description: "Validates JSON format before JSON.parse() to prevent crashes"

    postconditions:
      - id: invalid-json
        condition: "JSON format is invalid"
        returns: "false (boolean)"
        required_handling: >
          Caller SHOULD use isJSON() before JSON.parse(). JSON.parse() throws
          SyntaxError on invalid JSON, crashing the application. isJSON() returns
          false safely, allowing graceful error handling.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: json-parse-without-validation
        condition: "JSON.parse() called on untrusted input without validation"
        returns: "false for invalid JSON"
        required_handling: >
          Caller SHOULD validate JSON before parsing. Without validation, malformed
          JSON from user input or external APIs causes uncaught SyntaxError exceptions,
          crashing the application or API endpoint.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/JSON/parse#exceptions"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: json-parse-dos
        description: >
          Large or deeply nested JSON can cause performance issues even if valid.
          Consider size limits (max 1MB) and depth limits (max 100 levels) before
          parsing user-provided JSON to prevent DoS attacks.
        sources:
          - "https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: isStrongPassword
    import_path: "validator"
    description: >
      Evaluates whether a password meets strength requirements. Returns boolean
      (or numeric score when returnScore: true). Calls assertString() internally —
      throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/isStrongPassword.js — confirmed default options
      - id: strong-password-weak-defaults
        condition: "isStrongPassword() called with default options for privileged accounts"
        required_handling: >
          Default options (minLength: 8, minLowercase: 1, minUppercase: 1,
          minNumbers: 1, minSymbols: 1) may be insufficient for high-security
          applications. A password like "Password1!" satisfies all defaults but
          is trivially guessable. Callers accepting passwords for privileged
          accounts (admin, payment) SHOULD increase minLength to 12+ and
          consider minSymbols >= 2. NIST SP 800-63B recommends minimum 8 chars
          for regular accounts, 12+ for privileged accounts.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://pages.nist.gov/800-63-3/sp800-63b.html"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        evidence_quality: confirmed

      - id: strong-password-non-string-throws
        condition: "isStrongPassword() passed null, undefined, or non-string"
        throws: "TypeError: Expected a string but received a null/undefined/..."
        required_handling: >
          Caller MUST ensure the str argument is a string before calling isStrongPassword().
          Common pattern: isStrongPassword(req.body.password) where the body field
          is missing (undefined) throws TypeError, crashing the request handler.
          Guard with: if (typeof password === 'string') { ... }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: strong-password-return-score-misread
        condition: "isStrongPassword() called with returnScore: true, result used as boolean"
        returns: "number (score) when returnScore: true — NOT a boolean"
        required_handling: >
          When returnScore: true is passed, isStrongPassword() returns a NUMBER
          not a boolean. Any non-zero score evaluates as truthy, including scores
          for WEAK passwords. Callers MUST compare the score to an explicit threshold,
          not use it directly in an if() conditional.
          Use: const score = isStrongPassword(pwd, { returnScore: true }); if (score >= 40) { ... }
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        evidence_quality: confirmed

  - name: isJWT
    import_path: "validator"
    description: >
      Validates that a string has JWT format (three base64url-encoded segments
      separated by dots). Does NOT verify the signature or decode the payload.
      Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/isJWT.js — only checks 3-part base64url structure
      - id: jwt-format-only-not-verified
        condition: "isJWT() used for authentication or authorization decisions"
        returns: "true for any syntactically valid JWT (forged, expired, wrong issuer)"
        required_handling: >
          CRITICAL: isJWT() only validates that the string has JWT format (three
          base64url parts separated by dots). It does NOT verify the cryptographic
          signature, expiry (exp), issuer (iss), or audience (aud) claims. A forged
          JWT with valid structure passes isJWT() validation.
          Callers MUST use a proper JWT library (jsonwebtoken, jose) to verify
          the signature and claims. isJWT() is safe ONLY for format pre-screening
          before passing to a cryptographic verifier.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/10-Testing_JSON_Web_Tokens"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: jwt-non-string-throws
        condition: "isJWT() passed null, undefined, or non-string (e.g. missing Authorization header)"
        throws: "TypeError: Expected a string but received a null/undefined/..."
        required_handling: >
          Caller MUST ensure the argument is a string before calling isJWT().
          Common pattern: isJWT(req.headers.authorization) where the header is
          missing returns undefined, which throws TypeError. Guard with:
          if (typeof token === 'string' && isJWT(token)) { ... }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: stripLow
    import_path: "validator"
    description: >
      Removes ASCII control characters (hex 0x00-0x1F and 0x7F) from a string.
      Used as a sanitization defense against terminal injection, log injection,
      and certain protocol injection attacks. Returns the cleaned string.
      Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/stripLow.js — confirmed chars stripped
      - id: strip-low-not-xss-defense
        condition: "stripLow() output rendered in HTML without also calling escape()"
        returns: "string with control chars removed but HTML-active chars intact"
        required_handling: >
          stripLow() removes control characters but does NOT sanitize HTML special
          characters (<, >, &, ", '). It is NOT a substitute for escape() for XSS
          prevention. Callers who use stripLow() in place of escape() for HTML
          rendering remain vulnerable to XSS. ALWAYS also call escape() on any
          output that will be rendered in HTML.
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
          - "https://owasp.org/www-community/attacks/xss/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: strip-low-newline-option
        condition: "stripLow() used on multiline content without keep_new_lines: true"
        returns: "string with newlines removed (default behavior)"
        required_handling: >
          By default (keep_new_lines=false), stripLow() removes newline characters
          (0x0A, 0x0D). Callers processing multiline user content (addresses, notes,
          log entries) SHOULD use stripLow(str, true) to preserve newlines while
          still removing other control characters. Omitting this option silently
          strips line breaks, corrupting multiline content.
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: toDate
    import_path: "validator"
    description: >
      Converts a string to a Date object by calling Date.parse(). Returns null
      if the input string is not a valid date. Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md (sanitizers)
      # Source: node_modules/validator/lib/toDate.js — assertString then Date.parse, returns null on NaN
      - id: to-date-null-unchecked
        condition: "toDate() result used without null check"
        returns: "null for invalid date strings"
        required_handling: >
          Caller MUST check for null before using the returned Date.
          toDate() returns null when the input string is not a valid date.
          Accessing any property on null (e.g., toDate(str).toISOString()) throws
          TypeError: Cannot read properties of null, crashing the handler for
          any invalid user-supplied date string.
          Guard with: const date = toDate(str); if (!date) { handle error }
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: to-date-timezone-ambiguity
        condition: "toDate() used with date strings lacking explicit timezone"
        returns: "Date with ambiguous timezone — UTC or local depending on format"
        required_handling: >
          toDate() calls Date.parse() internally. Date.parse() behavior for dates
          without explicit timezone is implementation-defined (UTC for ISO 8601,
          local time for other formats). Result may differ between Node.js versions.
          Callers SHOULD use explicit ISO 8601 strings with timezone offset
          (e.g., "2024-01-15T10:30:00Z") for deterministic results.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/parse#date_time_string_format"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: toFloat
    import_path: "validator"
    description: >
      Converts a string to a float (parseFloat). Returns NaN if the input string
      is not a valid float. Does NOT call assertString() — returns NaN for non-string.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/toFloat.js — isFloat check then parseFloat, returns NaN
      - id: to-float-nan-unchecked
        condition: "toFloat() result used in arithmetic without isNaN() check"
        returns: "NaN for invalid float strings"
        required_handling: >
          Caller MUST check isNaN() before using the result in arithmetic.
          toFloat() returns NaN for invalid float strings. Any arithmetic with NaN
          produces NaN (NaN propagation). Price calculations, currency conversions,
          and metric computations silently produce incorrect NaN results.
          Guard with: const val = toFloat(str); if (isNaN(val)) { throw new Error(...) }
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed

  - name: toInt
    import_path: "validator"
    description: >
      Converts a string to an integer via parseInt(). Returns NaN for invalid
      integer strings. Throws TypeError on non-string input (calls assertString()).
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/toInt.js — assertString then parseInt with radix
      - id: to-int-nan-unchecked
        condition: "toInt() result used without isNaN() check"
        returns: "NaN for invalid or non-numeric integer strings"
        required_handling: >
          Caller MUST check isNaN() before using the result. toInt() returns NaN
          for invalid integer strings. Common pattern: toInt(req.query.page) returns
          NaN for missing/invalid page parameter, then NaN used as SQL LIMIT/OFFSET
          crashes the query or returns incorrect results.
          Guard with: const page = toInt(str); if (isNaN(page)) { handle error }
        sources:
          - "https://github.com/validatorjs/validator.js#sanitizers"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: to-int-radix-default
        condition: "toInt() used with hex-prefixed strings (0x...) without explicit radix"
        returns: "0 for '0x...' strings when radix defaults to 10"
        required_handling: >
          toInt() defaults to radix 10. If the input string has a leading "0x" prefix
          (e.g., "0x1F"), parseInt() with radix 10 returns 0 (parses only the leading
          digit before "x"). Callers processing hex strings MUST pass radix 16 explicitly:
          toInt(str, 16). Callers processing untrusted input should NOT use toInt()
          for hex values without explicit radix.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/parseInt#radix"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: isCreditCard
    import_path: "validator"
    description: >
      Validates credit card number format using Luhn algorithm and card-type regex.
      Returns boolean. Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/isCreditCard.js — Luhn + regex, confirmed from source
      - id: credit-card-format-only
        condition: "isCreditCard() used as substitute for payment processor authorization"
        returns: "true for Luhn-valid card numbers including test cards (4111111111111111)"
        required_handling: >
          CRITICAL: isCreditCard() validates format and Luhn checksum only — it does
          NOT verify that the card exists, has funds, is not stolen, or is not expired.
          A test card number like "4111111111111111" (Visa test) passes isCreditCard().
          Callers MUST NOT use isCreditCard() as a substitute for payment processor
          authorization. ALWAYS submit cards to a payment processor (Stripe, Braintree)
          for actual authorization. isCreditCard() is only for UX format feedback.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://stripe.com/docs/testing#cards"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed

      - id: credit-card-non-string-throws
        condition: "isCreditCard() passed null, undefined, or non-string"
        throws: "TypeError: Expected a string but received a null/undefined/..."
        required_handling: >
          Caller MUST ensure the argument is a string before calling isCreditCard().
          Pattern: isCreditCard(req.body.cardNumber) where the field is missing
          (undefined) throws TypeError, crashing the payment form handler with HTTP 500.
          Guard with: if (typeof cardNumber === 'string') { ... }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: matches
    import_path: "validator"
    description: >
      Tests a string against a regex pattern. Returns boolean. Accepts string pattern
      (converted to RegExp internally) or RegExp object. Throws TypeError on non-string
      input. CRITICAL: The official README explicitly warns that user-provided patterns
      are NOT checked for ReDoS attacks.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # README explicitly states: "The pattern is not checked for possible ReDoS attacks.
      # We do not recommend that the user can provide their own pattern."
      # Source: node_modules/validator/lib/matches.js — pattern converted via new RegExp(pattern, modifiers)
      - id: matches-redos-user-pattern
        condition: "matches() called with a user-supplied pattern or modifiers"
        returns: "boolean — but string pattern compiled without ReDoS protection"
        required_handling: >
          CRITICAL: The validator README explicitly states matches() patterns are NOT
          checked for ReDoS attacks and user-provided patterns are NOT recommended.
          When the pattern argument is a string (not a RegExp literal), it is compiled
          via new RegExp(pattern, modifiers) at runtime. A malicious user can supply
          a catastrophic backtracking pattern like "(a+)+" that causes exponential
          backtracking, halting the Node.js event loop.
          Callers MUST: (1) never pass user-supplied strings directly as the pattern,
          (2) only use hardcoded RegExp literals as the pattern argument, or (3) use
          a ReDoS-safe regex library (e.g., safe-regex, re2) for user-supplied patterns.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://owasp.org/www-community/attacks/Regular_expression_Denial_of_Service_-_ReDoS"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: matches-non-string-throws
        condition: "matches() passed null, undefined, or non-string as the first argument"
        throws: "TypeError: Expected a string but received a null/undefined/..."
        required_handling: >
          Caller MUST ensure the str argument is a string before calling matches().
          Pattern: matches(req.body.field, /regex/) where the body field is missing
          (undefined) throws TypeError, crashing the request handler.
          Guard with: if (typeof field === 'string' && matches(field, /pattern/)) { ... }
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: isCurrency
    import_path: "validator"
    description: >
      Validates currency amount strings. Returns boolean. Throws TypeError on non-string
      input. Default options assume US format ($ symbol, comma thousands separator, period
      decimal separator). International currencies require explicit options configuration.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/isCurrency.js — confirmed default options
      - id: currency-locale-mismatch
        condition: "isCurrency() used to validate non-US currency without locale options"
        returns: "false for valid non-US currency strings (e.g. EUR '1.234,56' fails)"
        required_handling: >
          isCurrency() defaults to US format: symbol '$', thousands_separator ',',
          decimal_separator '.'. European-format amounts like "1.234,56" (German EUR)
          or "£1,234.56" (GBP) fail validation with default options because the thousands
          and decimal separators are reversed. Multi-currency applications MUST configure:
          isCurrency(amount, { symbol: '€', thousands_separator: '.', decimal_separator: ',' })
          for EU formats. Silently rejecting valid foreign currency amounts causes payment
          form rejection and lost transactions.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: currency-symbol-not-required
        condition: "isCurrency() used for financial input where symbol presence is required"
        returns: "true for bare numbers like '1234.56' (symbol optional by default)"
        required_handling: >
          By default, require_symbol is false — isCurrency() accepts bare numeric strings
          like "1234.56" without a currency symbol. If your application requires a symbol
          to distinguish currency from plain numbers, use:
          isCurrency(amount, { require_symbol: true }).
          Without this, user input lacking a currency symbol passes validation, potentially
          causing incorrect storage or display of amounts in multi-currency contexts.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isBase64
    import_path: "validator"
    description: >
      Validates base64 encoded strings. Returns boolean. Default checks standard base64
      (with padding, using +/= characters). URL-safe base64 (used in JWTs, URL tokens)
      uses different characters (-_) and requires explicit urlSafe: true option.
      Throws TypeError on non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # Source: node_modules/validator/lib/isBase64.js — confirmed urlSafe/padding options
      - id: base64-urlsafe-confusion
        condition: "isBase64() used to validate JWT payloads, URL tokens, or OAuth state without urlSafe: true"
        returns: "false for valid base64url strings (- and _ chars fail standard base64 check)"
        required_handling: >
          Standard base64 uses + and / characters. URL-safe base64 (base64url) uses
          - and _ instead. JWT headers and payloads use base64url encoding. Default
          isBase64() with { urlSafe: false } will return false for valid JWT segments
          because they contain - and _ characters. Always use:
          isBase64(str, { urlSafe: true }) when validating JWT parts, OAuth state tokens,
          or any URL-embedded base64. Using wrong encoding causes false rejections of
          valid tokens, breaking authentication flows.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://datatracker.ietf.org/doc/html/rfc4648#section-5"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: base64-empty-string-valid
        condition: "isBase64('') used as truthy guard for non-empty input"
        returns: "true for empty string ''"
        required_handling: >
          isBase64() returns true for empty string '' — an empty string is considered
          a valid (zero-byte) base64 value. Callers using isBase64() as a guard before
          decoding must also check for non-empty input:
          if (str && isBase64(str)) { ... }
          Otherwise, empty string passes the base64 check and atob('') or Buffer.from('', 'base64')
          succeeds silently, resulting in empty output that may not be detected.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isBase64.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isLength
    import_path: "validator"
    description: >
      Validates string length falls within specified range. Returns boolean. This function
      accounts for surrogate pairs (emoji, some CJK characters) — a single visible
      character may count as 1 despite str.length returning 2. Throws TypeError on
      non-string input.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # README states: "Note: this function takes into account surrogate pairs."
      # Source: node_modules/validator/lib/isLength.js — confirmed surrogate pair counting
      - id: length-vs-string-length-mismatch
        condition: "isLength() result compared with str.length for same string"
        returns: "true for strings where isLength(str, {max: N}) === true but str.length > N"
        required_handling: >
          isLength() counts grapheme clusters — surrogate pairs (emoji like 😀, some CJK
          characters) count as 1 character in isLength() but 2 in str.length. A string
          like "Hello😀" passes isLength(str, {max: 6}) but str.length returns 7.
          Callers that enforce database column limits MUST use isLength() (not str.length)
          to avoid truncation on storage. Conversely, callers computing byte sizes for
          binary protocols must use Buffer.byteLength() — isLength() counts visible chars,
          not bytes. Mixing these causes either data truncation or incorrect validation.
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://unicode.org/faq/utf_bom.html#utf16-2"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: isISO8601
    import_path: "validator"
    description: >
      Validates ISO 8601 date strings (e.g. "2024-01-15", "2024-01-15T10:30:00Z").
      Returns boolean. Without strict: true, accepts structurally valid but calendar-invalid
      dates like "2009-02-29" (Feb 29 in a non-leap year). Throws TypeError on non-string.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/README.md
      # README states: "If strict is true, date strings with invalid dates like
      # 2009-02-29 will be invalid."
      # Source: node_modules/validator/lib/isISO8601.js — isValidDate() only called when strict=true
      - id: iso8601-non-strict-invalid-dates
        condition: "isISO8601() used without strict: true to validate calendar dates for storage"
        returns: "true for structurally valid but calendar-invalid dates (e.g. '2009-02-29')"
        required_handling: >
          Without { strict: true }, isISO8601() validates the string format only — not
          calendar validity. "2009-02-29" (February 29 in a non-leap year) returns true
          because the format is correct even though the date does not exist. When this
          invalid date is then parsed (Date.parse, new Date()), the result may be rolled
          over to March 1, silently storing incorrect dates. For any application storing
          calendar dates (appointments, birthdays, deadlines), ALWAYS use:
          isISO8601(dateStr, { strict: true })
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: iso8601-strict-separator
        condition: "isISO8601() used for API interoperability without strictSeparator: true"
        returns: "true for '2024-01-15 10:30:00' (space separator) when only T separator required"
        required_handling: >
          Without { strictSeparator: true }, isISO8601() accepts both 'T' and space as
          the date-time separator. RFC 3339 and most REST APIs require the 'T' separator.
          "2024-01-15 10:30:00Z" passes isISO8601() but may be rejected by strict API
          parsers (PostgreSQL TIMESTAMPTZ, Go's time.Parse with RFC3339 layout, Java's
          Instant.parse). For API-to-API data exchange, use:
          isISO8601(str, { strict: true, strictSeparator: true })
        sources:
          - "https://github.com/validatorjs/validator.js#validators"
          - "https://datatracker.ietf.org/doc/html/rfc3339"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isLicensePlate
    import_path: "validator"
    description: >
      Validates whether a string matches the license plate format for a given locale.
      Requires an explicit locale argument (e.g. 'en-IN', 'de-DE', 'pt-BR'). Returns
      boolean. Throws Error (not TypeError) when an unrecognized locale is passed —
      this is the only validator function (besides assertString's TypeError) that throws
      a non-TypeError exception. Supports 13 locales plus 'any' (tries all).
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isLicensePlate.js
      # Source confirmed: throw new Error(`Invalid locale '${locale}'`) at line ~150
      # Throws Error (not TypeError, not RangeError) for unrecognized locale string.
      # assertString() throws TypeError for non-string first argument (same as all validator functions).
      - id: license-plate-invalid-locale-throws
        condition: >
          isLicensePlate() called with a locale string not in the supported set
          ('cs-CZ', 'de-DE', 'de-LI', 'en-IN', 'en-SG', 'en-PK', 'es-AR', 'fi-FI',
          'hu-HU', 'pt-BR', 'pt-PT', 'sq-AL', 'sv-SE') and not 'any'.
          This happens when: (1) a locale derived from user input or environment
          variable is passed directly without validation, (2) a newly-added locale from
          the frontend doesn't match validator.js supported set, (3) using 'en-US' (not
          supported — no US state-level logic in validator.js).
        throws: >
          Error with message "Invalid locale '<locale>'".
          Note: This is a plain Error, not TypeError. Unlike the ubiquitous assertString()
          TypeError (which fires on non-string input), this error fires on VALID string
          input with an unrecognized locale name. Callers that catch TypeError only will
          NOT catch this error.
        required_handling: >
          Always validate the locale before calling isLicensePlate():

            const SUPPORTED_LOCALES = new Set([
              'cs-CZ', 'de-DE', 'de-LI', 'en-IN', 'en-SG', 'en-PK', 'es-AR',
              'fi-FI', 'hu-HU', 'pt-BR', 'pt-PT', 'sq-AL', 'sv-SE', 'any'
            ]);
            if (!SUPPORTED_LOCALES.has(locale)) {
              // fall back to 'any' or return false
              locale = 'any';
            }
            const isValid = isLicensePlate(plateStr, locale);

          For international apps that add new locales: upgrade validator.js version or
          use 'any' locale as fallback to avoid hard crashes on unrecognized country codes.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isLicensePlate.js"
          - "https://github.com/validatorjs/validator.js#validators"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: license-plate-any-locale-perf
        condition: >
          isLicensePlate(str, 'any') used in hot paths (request handlers, batch validation loops)
          without awareness that 'any' iterates through ALL supported locales sequentially.
          When str doesn't match any locale, isLicensePlate() tries each of the 13 locale
          validators in turn — each with complex regex — before returning false.
        returns: "true if any locale's regex matches; false after exhausting all 13 validators"
        required_handling: >
          When validation performance matters, pass the specific locale if known:
            isLicensePlate(plateStr, 'en-IN')  // O(1) — single regex check
          instead of:
            isLicensePlate(plateStr, 'any')    // O(n) — iterates all 13 locales

          For user-submitted forms where the locale is unknown, consider adding a
          dropdown or country selector to collect the locale rather than using 'any'.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isLicensePlate.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

  - name: isBase32
    import_path: "validator"
    description: >
      Validates whether a string is valid Base32-encoded data. Returns boolean.
      Throws TypeError on non-string input (assertString pattern). The crockford
      option switches between standard RFC 4648 Base32 (A-Z, 2-7, = padding, length
      must be multiple of 8) and Crockford Base32 (A-Z minus ILOU, 0-9, no padding,
      no length constraint). These are incompatible encodings — standard Base32 and
      Crockford Base32 strings with the same content are different character sequences.
    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isBase32.js
      # Standard regex: /^[A-Z2-7]+=*$/ with str.length % 8 === 0 check
      # Crockford regex: /^[A-HJKMNP-TV-Z0-9]+$/ with no length constraint
      # Confirmed: default is crockford: false (standard Base32)
      - id: base32-crockford-confusion
        condition: >
          Crockford Base32-encoded data (used by ULID, NanoID, some blockchain identifiers)
          validated without { crockford: true } option. Crockford Base32 excludes
          ambiguous characters (I, L, O, U) and uses digits 0-9 alongside letters.
          Standard Base32 uses only A-Z and 2-7. A valid Crockford Base32 string
          WILL fail isBase32() with default options because:
          (1) Crockford allows digits 0, 1, 3-9 which aren't in [A-Z2-7]
          (2) Crockford strings have no padding (= chars)
          (3) Crockford strings may not be length % 8
        returns: "false for valid Crockford Base32 strings when crockford option is not set"
        required_handling: >
          Determine which encoding standard your data uses before calling isBase32():

          // Standard RFC 4648 Base32 (e.g., TOTP secrets, many crypto keys):
          isBase32(str)  // or { crockford: false }
          // Example valid: 'MFRA====', length must be multiple of 8

          // Crockford Base32 (used by ULID, NanoID, Hashids):
          isBase32(str, { crockford: true })
          // Example valid: '01ARYZ6S41', no padding required

          The two are not interchangeable. A ULID (always Crockford Base32) will
          always fail standard isBase32() — returning false, not throwing, causing
          silent validation failures that reject valid data.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/isBase32.js"
          - "https://www.crockford.com/base32.html"
          - "https://github.com/ulid/spec"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

# SOURCES.md has comprehensive documentation of all error conditions
# See: corpus/packages/validator/SOURCES.md (111 lines)
#
# Research completed 2026-02-26 (initial), deepened 2026-04-17:
# - Phase 1: Research planning
# - Phase 2: Documentation analysis (15+ validators, 12+ sanitizers documented)
# - Phase 3: CVE analysis (9 CVEs found, 2 active: CVE-2025-56200, CVE-2021-3765)
# - Phase 4: Production usage analysis (5 patterns, 80% use express-validator middleware)
# - Deepen pass 2026-04-17: Full API surface enumeration, assertString() discovery,
#     6 new functions added (isStrongPassword, isJWT, stripLow, toDate, toFloat, toInt, isCreditCard)
#
# Key findings (corrected 2026-04-17):
# - CORRECTION: validator.js DOES throw TypeError on non-string input (assertString() pattern)
#   affects ~94 of ~95 functions — previous contract incorrectly stated "does NOT throw"
# - Most common mistake: Not checking return values (boolean/null/NaN)
# - #1 security issue: Not escaping user input (XSS)
# - #2 security issue: Not whitelisting URL protocols (open redirects, XSS)
# - #3 security issue: Using isJWT() for auth (format-only check, not signature verification)
# - #4 security issue: Using isCreditCard() as payment authorization
# - Minimum safe version: 13.15.20 (CVE patches)
# - Detection focus: Missing validation on user input before dangerous operations
#
# API surface (2026-04-17):
#   Total exported functions: ~95
#   Contracted: 11 (escape, normalizeEmail, isEmail, isURL, isJSON,
#               isStrongPassword, isJWT, stripLow, toDate, toFloat, toInt, isCreditCard)
#   Omitted: ~84 pure-format validators (isAlpha, isAlphanumeric, isAscii,
#            isAbaRouting, isBIC, isIBAN, isISO*, isLatLong, isMACAddress, etc.)
#   Omission reason: All omitted functions return boolean only, throw TypeError only
#                    on non-string (same profile as contracted validators), and have
#                    no unique security contracts beyond the assertString pattern
#                    documented in contracted functions above.
