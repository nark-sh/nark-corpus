      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/contains.js
      - id: contains-non-string-typeerror
        condition: "non-string value passed as str argument"
        throws: "TypeError: Expected a string but received a <type>"
        required_handling: >
          Caller MUST ensure str is a string. Form fields and query params may be
          null or undefined when optional. Unguarded calls to contains() in
          content-filter middleware crash the request handler.
        sources:
          - "https://github.com/validatorjs/validator.js/blob/master/src/lib/util/assertString.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: contains-unchecked-return-security-bypass
        condition: "return value not checked — used as security or content gate"
        returns: "false when str does not contain seed"
        required_handling: >
          contains() returns false when the substring is absent — it does NOT throw.
          Code that calls contains() for a required security check (e.g. confirming
          a nonce is present in a signed payload) and ignores the return value
          silently passes malformed inputs. Always check the boolean result and
          reject immediately when false.
        sources:
