    postconditions:
      # Evidence: https://github.com/validatorjs/validator.js/blob/master/src/lib/isLicensePlate.js
      # Source confirmed: throw new Error(`Invalid locale '${locale}'`) at line ~150
      # Throws Error (not TypeError, not RangeError) for unrecognized locale string.
      # assertString() throws TypeError for non-string first argument (same as all validator functions).
      - id: license-plate-invalid-locale-throws
        condition: >
          isLicensePlate() called with a locale string not in the supported set
          ('cs-CZ', 'de-DE', 'de-LI', 'en-IN', 'en-SG', 'en-PK', 'es-AR', 'fi-FI',
          'hu-HU', 'pt-BR', 'pt-PT', 'sq-AL', 'sv-SE') and not 'any'.
          This happens when: (1) a locale derived from user input or environment
          variable is passed directly without validation, (2) a newly-added locale from
          the frontend doesn't match validator.js supported set, (3) using 'en-US' (not
          supported — no US state-level logic in validator.js).
        throws: >
          Error with message "Invalid locale '<locale>'".
          Note: This is a plain Error, not TypeError. Unlike the ubiquitous assertString()
          TypeError (which fires on non-string input), this error fires on VALID string
          input with an unrecognized locale name. Callers that catch TypeError only will
          NOT catch this error.
        required_handling: >
          Always validate the locale before calling isLicensePlate():

            const SUPPORTED_LOCALES = new Set([
              'cs-CZ', 'de-DE', 'de-LI', 'en-IN', 'en-SG', 'en-PK', 'es-AR',
              'fi-FI', 'hu-HU', 'pt-BR', 'pt-PT', 'sq-AL', 'sv-SE', 'any'
            ]);
            if (!SUPPORTED_LOCALES.has(locale)) {
              // fall back to 'any' or return false
              locale = 'any';
