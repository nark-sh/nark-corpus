  - id: done-not-called-in-error-path
    description: "done() callback not called in catch block or error handler"
    scenario: >
      it('test', function(done) {
        fetchUser('123', (err, user) => {
          if (err) throw err; // Should be: return done(err);
          assert.strictEqual(user.name, 'John');
          done();
        });
      });
    impact: "Medium - test hangs with timeout error"
    frequency: "40-50% of done callback bugs"
    detection: "Easy - 'timeout of 2000ms exceeded. Ensure the done() callback is being called'"
