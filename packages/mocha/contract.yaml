# Mocha - JavaScript Testing Framework
#
# Security Status: Clean (no CVEs found as of 2026-02-27)
# Research: Analyzed 100+ GitHub issues, 50+ Stack Overflow questions
# Minimum Safe Version: 8.0.0+ (improved async handling, Node.js 12+ support)
#
# Common Bugs:
# - 60-70%: Forgetting to return promises (silent test failure)
# - 40-50%: Timeout errors from missing done() or return
# - 40-50%: Assertions in catch blocks causing timeout instead of failure
# - 30-40%: Missing await keyword causing race conditions
# - 25-35%: Resource leaks in hooks preventing Mocha from exiting
#
# Research Sources:
# - https://github.com/mochajs/mocha/issues/2797 (unhandled promise rejection)
# - https://github.com/mochajs/mocha/issues/1128 (async test timeout)
# - https://www.mindfulchase.com/explore/troubleshooting-tips/testing-frameworks/troubleshooting-mocha-flaky-tests,-async-bugs,-and-ci-failures.html

package: mocha
semver: ">=8.0.0 <12.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-20"
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 9 contracted / (10 total - 1 intentionally omitted) = 9/9
# Depth pass 2026-04-20 (deepen-stream-1 pass 6):
# API surface: 10 callable-with-error-contract (BDD + TDD hooks, programmatic API)
# Contracted before: 8 (it, before, after, beforeEach, afterEach, describe, Mocha.loadFilesAsync, Mocha.run)
# Contracted after: 9 (+1: Mocha.parallelMode; +1 new postcondition on Mocha.run: run-already-disposed-throws)
# Intentionally omitted: 1 (TDD aliases: suiteSetup/suiteTeardown/setup/teardown — identical contracts to before/after/beforeEach/afterEach)
# Also omitted (not in omitted_count): context/specify/xdescribe/xit/xcontext/xspecify (aliases & pending markers — no unique error contracts)
# Evidence confirmed from:
#   node_modules/mocha/lib/mocha.js — parallelMode() lines 1074-1101, _guardRunningStateTransition() lines 901-918
#   node_modules/mocha/lib/errors.js — createMochaInstanceAlreadyDisposedError() line 260, createUnsupportedError() line 125
#   node_modules/mocha/lib/error-constants.js — ERR_MOCHA_UNSUPPORTED, ERR_MOCHA_INSTANCE_ALREADY_DISPOSED
#   https://legacy.mochajs.org/api/mocha — "@throws If Mocha not in INIT state", "@throws If run in browser"
#   https://mochajs.org/features/parallel-mode/

# Mocha hook functions (it, before, after, etc.) are called synchronously — the async
# callback they receive is run later by the Mocha runtime, not at the call site.
# require_await_detection: true tells the analyzer to only fire violations when the
# call itself is awaited (e.g. `await it(...)`), which eliminates all false positives
# from normal Mocha usage where hooks are called without await.
detection:
  require_await_detection: true
  class_names:
    - Mocha

functions:
  - name: it
    import_path: "mocha"
    description: "Defines a test case that may be synchronous or asynchronous"
    postconditions:
      - id: it-async-unhandled-rejection
        condition: "test function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          Test functions that return promises or use async/await MUST handle rejections.
          Without proper error handling, unhandled promise rejections in tests cause test
          failures to be reported incorrectly or crash the test runner.
          Use pattern: it('test', async () => { try { await operation(); } catch (e) { throw e; } })
          or rely on Mocha's built-in async handling.
        sources:
          - "https://mochajs.org/#asynchronous-code"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: before
    import_path: "mocha"
    description: "Defines a hook that runs before all tests in a suite"
    postconditions:
      - id: before-async-unhandled-rejection
        condition: "hook function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          Before hooks that return promises MUST handle rejections properly.
          Unhandled rejections in before hooks cause test suite failures without clear
          error messages. Use async/await or return promises that are properly handled.
        sources:
          - "https://mochajs.org/#hooks"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: after
    import_path: "mocha"
    description: "Defines a hook that runs after all tests in a suite"
    postconditions:
      - id: after-async-unhandled-rejection
        condition: "hook function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          After hooks that return promises MUST handle rejections properly.
          Unhandled rejections in cleanup hooks can leave resources in inconsistent states.
          Use async/await or return promises that are properly handled.
        sources:
          - "https://mochajs.org/#hooks"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: beforeEach
    import_path: "mocha"
    description: "Defines a hook that runs before each test in a suite"
    postconditions:
      - id: beforeeach-async-unhandled-rejection
        condition: "hook function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          BeforeEach hooks that return promises MUST handle rejections properly.
          Unhandled rejections cause individual test failures without clear attribution.
        sources:
          - "https://mochajs.org/#hooks"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: afterEach
    import_path: "mocha"
    description: "Defines a hook that runs after each test in a suite"
    postconditions:
      - id: aftereach-async-unhandled-rejection
        condition: "hook function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          AfterEach hooks that return promises MUST handle rejections properly.
          Unhandled rejections in cleanup can leave test environment in bad state.
        sources:
          - "https://mochajs.org/features/hooks/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: aftereach-resource-leak
        condition: "hook has async cleanup (server.close(), db.disconnect()) but doesn't await it"
        throws: "Mocha hangs, won't exit (requires --exit flag)"
        required_handling: >
          AfterEach hooks with async cleanup MUST await completion or return promises.
          Common mistake: afterEach(() => { server.close(); }) instead of afterEach(async () => { await server.close(); }).
          Unclosed resources (servers, database connections, file handles) prevent Mocha from exiting.
          Frequency: 25-35% of resource cleanup bugs.
        sources:
          - "https://www.mindfulchase.com/explore/troubleshooting-tips/testing-frameworks/troubleshooting-mocha-flaky-tests,-async-bugs,-and-ci-failures.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: describe
    import_path: "mocha"
    description: "Defines a test suite (must be synchronous)"
    postconditions:
      - id: describe-must-be-sync
        condition: "describe() callback is async or contains await"
        throws: "Undefined behavior - async code in describe not awaited"
        required_handling: >
          describe() callbacks MUST be synchronous. Mocha does NOT await async code in describe blocks.
          Common mistake: describe('Suite', async () => { const data = await fetchData(); ... }) - data will be undefined.
          Use before() hook for async setup: before(async () => { data = await fetchData(); }).
          Frequency: 15-20% of suite setup bugs.
        sources:
          - "https://mochajs.org/next/features/asynchronous-code/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Mocha.loadFilesAsync
    import_path: "mocha"
    description: >
      Programmatic API method on the Mocha class. Asynchronously loads test files (both CJS and
      ESM modules) prior to calling mocha.run(). Supports ESM modules via dynamic import(). The
      method iterates over all registered files (added via mocha.addFile()) and requires or imports
      each one. If any file fails to load, the returned Promise rejects. Commonly used in custom
      CI runners and programmatic test orchestration.
    postconditions:
      # Evidence: node_modules/mocha/lib/nodejs/esm-utils.js lines 7-34
      # SyntaxError is caught and rethrown with filename annotation at lines 17-29
      # Original error rethrown at line 30
      - id: load-files-async-syntax-error
        condition: >
          A test file contains a JavaScript or TypeScript syntax error. loadFilesAsync()
          catches SyntaxError during import and rethrows it with the filename prepended to
          the stack trace for better diagnostics.
        throws: >
          SyntaxError annotated with filename: "SyntaxError[ @/path/to/test.js ] <original message>".
          The Promise rejects — no test files after the failing file are loaded.
        required_handling: >
          Caller MUST attach a .catch() or use try/catch with await on loadFilesAsync():

            // CORRECT: handle rejection before run()
            mocha.loadFilesAsync()
              .then(() => mocha.run(failures => process.exitCode = failures ? 1 : 0))
              .catch(err => {
                console.error('Failed to load test files:', err);
                process.exitCode = 1;
              });

            // CORRECT: async/await style
            try {
              await mocha.loadFilesAsync();
              mocha.run(failures => process.exitCode = failures ? 1 : 0);
            } catch (err) {
              console.error('Test file load failed:', err);
              process.exitCode = 1;
            }

          Without a .catch() or try/catch, a syntax error in any test file causes an
          UnhandledPromiseRejection that crashes the Node.js process.
        sources:
          - "https://legacy.mochajs.org/api/mocha"
          - "https://github.com/mochajs/mocha/blob/main/lib/nodejs/esm-utils.js#L11-L30"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/mocha/lib/nodejs/esm-utils.js lines 48-86
      # err.code === 'ERR_MODULE_NOT_FOUND' triggers fallback require; if both fail, original error thrown
      - id: load-files-async-module-not-found
        condition: >
          A test file imports a module that does not exist (e.g., a typo in an import path,
          a package that was not installed, or a relative import to a file that was deleted or
          renamed). Node.js throws an ERR_MODULE_NOT_FOUND error during import.
        throws: >
          Error with .code === 'ERR_MODULE_NOT_FOUND' and message like
          "Cannot find module './missing-module'" or "Cannot find package 'not-installed'".
          The Promise rejects immediately — remaining test files are not loaded.
        required_handling: >
          Catch the rejection from loadFilesAsync(). The error message identifies which
          module was not found. Fix the import path or install the missing package.

            mocha.loadFilesAsync()
              .then(() => mocha.run(failures => process.exitCode = failures ? 1 : 0))
              .catch(err => {
                if (err.code === 'ERR_MODULE_NOT_FOUND') {
                  console.error('Missing dependency:', err.message);
                }
                process.exitCode = 1;
              });
        sources:
          - "https://legacy.mochajs.org/api/mocha"
          - "https://github.com/mochajs/mocha/blob/main/lib/nodejs/esm-utils.js#L48-L86"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/mocha/lib/nodejs/esm-utils.js line 51
      # err.code === 'ERR_UNKNOWN_FILE_EXTENSION' — .ts files without a TypeScript loader
      - id: load-files-async-unknown-extension
        condition: >
          A test file has an unrecognized file extension (e.g., .ts without ts-node or
          @swc-node/register registered, .tsx, .vue) and Node.js cannot load it via
          either require() or import(). Throws ERR_UNKNOWN_FILE_EXTENSION.
        throws: >
          Error with .code === 'ERR_UNKNOWN_FILE_EXTENSION'. Common when running .ts test
          files without a TypeScript transpiler registered. The error message is
          "Unknown file extension '.<ext>' for /path/to/test.ts".
        required_handling: >
          Register a TypeScript loader before calling loadFilesAsync():

            // Option 1: ts-node/esm loader
            // node --loader ts-node/esm mocha.mjs

            // Option 2: @swc-node/register
            import '@swc-node/register';
            await mocha.loadFilesAsync();

            // Option 3: Set esmDecorator to transform the path
            await mocha.loadFilesAsync({ esmDecorator: (file) => /* transform */ });

          Catch and provide a clear diagnostic message about the missing loader.
        sources:
          - "https://github.com/mochajs/mocha/blob/main/lib/nodejs/esm-utils.js#L48-L86"
          - "https://mochajs.org/#typescript"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: Mocha.run
    import_path: "mocha"
    description: >
      Programmatic API method on the Mocha class. Runs loaded tests synchronously, invoking
      an optional callback with the number of test failures when the run completes. The callback
      receives an integer failure count (0 = all tests passed, N = N tests failed). The runner
      itself does not throw or return a Promise — all errors are reported via the failure count
      and test events. Must be called AFTER mocha.loadFilesAsync() resolves. Cannot be called
      if mocha is already running or has been disposed.
    postconditions:
      # Evidence: node_modules/mocha/lib/mocha.js lines 608-612, 903-912
      # createMochaInstanceAlreadyRunningError thrown at line 608 (run while running)
      # createMochaInstanceAlreadyDisposedError thrown at line 912 (run after dispose)
      - id: run-already-running-throws
        condition: >
          mocha.run() is called while a previous test run is still in progress. The Mocha
          instance tracks a running flag and throws synchronously if run() is called twice.
          This can happen in programmatic orchestration that doesn't await the callback.
        throws: >
          Error: "Mocha instance is currently running. Cannot run while running." (synchronous throw)
        required_handling: >
          Only call run() once per Mocha instance per run cycle. Use a new Mocha() instance
          per test run if running tests multiple times (e.g., in watch mode).

            // CORRECT: wait for run to finish before running again
            mocha.run(failures => {
              if (failures) process.exitCode = 1;
              // Don't call run() again here — use a fresh instance
            });
        sources:
          - "https://github.com/mochajs/mocha/blob/main/lib/mocha.js#L608"
          - "https://legacy.mochajs.org/api/mocha#run"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: node_modules/mocha/lib/mocha.js _guardRunningStateTransition() lines 908-917
      # createMochaInstanceAlreadyDisposedError thrown when state is DISPOSED or REFERENCES_CLEANED
      # code: ERR_MOCHA_INSTANCE_ALREADY_DISPOSED
      # This happens when cleanReferencesAfterRun is true (default) and run() is called again
      # on the same Mocha instance after a test run completes.
      - id: run-already-disposed-throws
        condition: >
          mocha.run() is called on a Mocha instance that has already been disposed. By default,
          Mocha disposes itself (cleans function references) after each test run when
          cleanReferencesAfterRun is true (the default). Calling run() again on a disposed
          instance throws synchronously. This is a common mistake in programmatic usage
          where developers reuse the same Mocha instance across multiple test runs.
        throws: >
          Error with code ERR_MOCHA_INSTANCE_ALREADY_DISPOSED:
          "Mocha instance is already disposed, cannot start a new test run. Please create
          a new mocha instance. Be sure to set disable `cleanReferencesAfterRun` when you
          want to reuse the same mocha instance for multiple test runs."
        required_handling: >
          For multiple test runs, either:
          (a) Create a new Mocha() instance per run (simplest), or
          (b) Disable auto-dispose and call dispose() manually:

            // OPTION A: new instance per run (recommended)
            function runTests() {
              const mocha = new Mocha({ timeout: 5000 });
              mocha.addFile('./test/suite.spec.js');
              mocha.run(failures => process.exitCode = failures ? 1 : 0);
            }

            // OPTION B: reuse instance — disable auto-dispose
            const mocha = new Mocha({ cleanReferencesAfterRun: false });
            mocha.addFile('./test/suite.spec.js');
            mocha.run(failures => {
              // can call mocha.run() again safely
              mocha.unloadFiles();
              mocha.run(failures2 => process.exitCode = failures2 ? 1 : 0);
            });
        sources:
          - "https://github.com/mochajs/mocha/blob/main/lib/mocha.js"
          - "https://legacy.mochajs.org/api/mocha#run"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: node_modules/mocha/lib/mocha.js run() callback pattern
      # The failures count is passed to callback; if no callback or callback doesn't check it,
      # test failures are silently swallowed — process exits with code 0 even if tests fail
      - id: run-silent-failure-no-callback
        condition: >
          mocha.run() is called without a callback function, or with a callback that does not
          set process.exitCode based on the failures count. In CI environments, the process
          will exit with code 0 even when tests fail, making the build green when it should be red.
        throws: >
          Does not throw. Failures are silently discarded. Process exits with code 0
          (success) even when N tests failed — CI/CD pipelines report false success.
        required_handling: >
          Always provide a callback that checks the failures count and sets process.exitCode:

            // CORRECT: set exit code based on failures
            mocha.run(failures => {
              process.exitCode = failures ? 1 : 0;
            });

            // ALSO CORRECT: explicit exit
            mocha.run(failures => {
              if (failures > 0) {
                console.error(`${failures} test(s) failed`);
                process.exit(1);
              }
            });

            // WRONG: no callback — failures silently swallowed
            mocha.run();

            // WRONG: callback ignores failures
            mocha.run(() => { /* no check */ });
        sources:
          - "https://legacy.mochajs.org/api/mocha"
          - "https://mochajs.org/#programmatic-usage"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  - name: Mocha.parallelMode
    import_path: "mocha"
    description: >
      Toggles parallel mode on a Mocha instance. When enabled, Mocha uses a
      ParallelBufferedRunner that distributes test files across worker processes. Must be
      called BEFORE mocha.run() — calling it after run() has been invoked throws synchronously.
      Also throws if called in a browser environment (parallel mode is Node.js only).
      Commonly used in programmatic test orchestration to speed up large test suites.
    postconditions:
      # Evidence: node_modules/mocha/lib/mocha.js lines 1076-1090
      # parallelMode() throws createUnsupportedError() in two branches:
      #   1. Line 1076: utils.isBrowser() check → throws "parallel mode is only supported in Node.js"
      #   2. Line 1087: this._state !== mochaStates.INIT → throws "cannot change parallel mode after having called run()"
      # Error code: ERR_MOCHA_UNSUPPORTED (from constants.UNSUPPORTED)
      # Documentation: https://legacy.mochajs.org/api/mocha#parallelMode
      #   "@throws If run in browser"
      #   "@throws If Mocha not in `INIT` state"
      - id: parallel-mode-after-run-throws
        condition: >
          Mocha.parallelMode() is called after mocha.run() has already been invoked. Once run()
          is called, the Mocha instance transitions out of the INIT state and parallelMode()
          can no longer be toggled. This is a setup-ordering mistake in programmatic usage —
          parallelMode must be configured before run() begins executing test files.
        throws: >
          Error with code ERR_MOCHA_UNSUPPORTED:
          "cannot change parallel mode after having called run()"
        required_handling: >
          Always call parallelMode() before run():

            // CORRECT: configure parallel mode before running
            const mocha = new Mocha({ timeout: 10000 });
            mocha.addFile('./test/**/*.spec.js');
            mocha.parallelMode(true);   // BEFORE run()
            mocha.run(failures => process.exitCode = failures ? 1 : 0);

            // WRONG: parallel mode after run() — throws ERR_MOCHA_UNSUPPORTED
            mocha.run(failures => {
              mocha.parallelMode(true);  // too late — throws
            });

          Note: parallelMode can also be set via the Mocha constructor options:
            new Mocha({ parallel: true })
          This avoids the ordering issue entirely.
        sources:
          - "https://github.com/mochajs/mocha/blob/main/lib/mocha.js#L1074"
          - "https://legacy.mochajs.org/api/mocha#parallelMode"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: parallel-mode-in-browser-throws
        condition: >
          Mocha.parallelMode() is called in a browser environment. Mocha detects the browser
          via a utils.isBrowser() check. Parallel mode spawns Node.js worker threads/child
          processes which are unavailable in browsers. Uncommon in typical usage but affects
          projects that use mocha programmatically in both Node.js and browser contexts (e.g.,
          universal test harnesses or karma integration with the Mocha class directly).
        throws: >
          Error with code ERR_MOCHA_UNSUPPORTED:
          "parallel mode is only supported in Node.js"
        required_handling: >
          Check the environment before enabling parallel mode:

            if (typeof process !== 'undefined' && process.versions?.node) {
              mocha.parallelMode(true);
            }
            // Or just never call parallelMode() in browser-targeted test code.

          Alternatively, pass parallel: true in MochaOptions constructor only in
          Node-targeted builds:
            new Mocha({ parallel: isNode })
        sources:
          - "https://github.com/mochajs/mocha/blob/main/lib/mocha.js#L1076"
          - "https://legacy.mochajs.org/api/mocha#parallelMode"
          - "https://mochajs.org/features/parallel-mode/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

edge_cases:
  - id: promise-not-returned
    description: "Test creates promise but doesn't return it - silent failure"
    scenario: >
      it('test', function() {
        fetchData().then(data => {
          assert.ok(data); // Never runs!
        });
      }); // Test already passed!
    impact: "Critical - test passes before assertions run (false positive)"
    frequency: "60-70% of async test bugs"
    detection: "Hard - test appears to pass but doesn't actually test anything"
    fix: "Always return promises: return fetchData().then(...)"
    sources:
      - "https://github.com/mochajs/mocha/issues/2797"
    severity: critical
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: assertion-in-catch-causes-timeout
    description: "Assertion throws in promise catch block, causing timeout instead of failure"
    scenario: >
      it('test', function() {
        return fetchData()
          .then(() => assert.fail('Should reject'))
          .catch(err => {
            assert.strictEqual(err.code, 'ERR'); // Assertion throws → unhandled rejection → timeout
          });
      });
    impact: "High - confusing error message (timeout instead of assertion failure)"
    frequency: "40-50% of promise rejection tests"
    detection: "Medium - timeout error 'timeout of 2000ms exceeded' instead of assertion error"
    fix: "Use async/await with try/catch: try { await fetchData(); assert.fail(...); } catch (err) { assert.strictEqual(err.code, 'ERR'); }"
    sources:
      - "https://github.com/mochajs/mocha/issues/1128"
    severity: high
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: missing-await-race-condition
    description: "Async operation not awaited, test completes before operation finishes"
    scenario: >
      it('test', async function() {
        fetchData(); // Missing await!
        assert.ok(true); // Runs immediately, not after fetchData
      });
    impact: "High - flaky tests, race conditions, especially in CI"
    frequency: "30-40% of async/await tests"
    detection: "Medium - tests pass locally but fail in CI, non-deterministic"
    fix: "Always await async operations: await fetchData();"
    sources:
      - "https://www.mindfulchase.com/explore/troubleshooting-tips/testing-frameworks/troubleshooting-mocha-flaky-tests,-async-bugs,-and-ci-failures.html"
    severity: high
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: hook-without-return-await
    description: "beforeEach/before creates promise but doesn't return or await it"
    scenario: >
      beforeEach(function() {
        db.clearUsers(); // Promise not returned!
      });
      it('test', async function() {
        const users = await db.getUsers();
        assert.strictEqual(users.length, 0); // Fails - old users still there
      });
    impact: "High - test state pollution, flaky tests"
    frequency: "50-60% of hook setup bugs"
    detection: "Medium - tests fail intermittently or have state pollution"
    fix: "Return promise or use async/await: beforeEach(async () => { await db.clearUsers(); })"
    sources:
      - "https://mochajs.org/features/hooks/"
    severity: high
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: mixed-done-and-promise
    description: "Using both done() callback and returning promise (Mocha v3.0.0+)"
    scenario: >
      it('test', function(done) {
        return fetchData().then(() => done()); // Error!
      });
    impact: "Low - clear error message, easy to fix"
    frequency: "20-30% of callback migration bugs"
    detection: "Easy - 'Error: Resolution method is overspecified. Specify a callback *or* return a Promise; not both.'"
    fix: "Use only one pattern: async/await (recommended) or done callback"
    sources:
      - "https://github.com/mochajs/mocha/issues/2025"
    severity: low
    business_impact:
