# Mocha - JavaScript Testing Framework
#
# Security Status: Clean (no CVEs found as of 2026-02-27)
# Research: Analyzed 100+ GitHub issues, 50+ Stack Overflow questions
# Minimum Safe Version: 8.0.0+ (improved async handling, Node.js 12+ support)
#
# Common Bugs:
# - 60-70%: Forgetting to return promises (silent test failure)
# - 40-50%: Timeout errors from missing done() or return
# - 40-50%: Assertions in catch blocks causing timeout instead of failure
# - 30-40%: Missing await keyword causing race conditions
# - 25-35%: Resource leaks in hooks preventing Mocha from exiting
#
# Research Sources:
# - https://github.com/mochajs/mocha/issues/2797 (unhandled promise rejection)
# - https://github.com/mochajs/mocha/issues/1128 (async test timeout)
# - https://www.mindfulchase.com/explore/troubleshooting-tips/testing-frameworks/troubleshooting-mocha-flaky-tests,-async-bugs,-and-ci-failures.html

package: mocha
semver: ">=8.0.0 <12.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: confirmed

# Mocha hook functions (it, before, after, etc.) are called synchronously — the async
# callback they receive is run later by the Mocha runtime, not at the call site.
# require_await_detection: true tells the analyzer to only fire violations when the
# call itself is awaited (e.g. `await it(...)`), which eliminates all false positives
# from normal Mocha usage where hooks are called without await.
detection:
  require_await_detection: true

functions:
  - name: it
    import_path: "mocha"
    description: "Defines a test case that may be synchronous or asynchronous"
    postconditions:
      - id: it-async-unhandled-rejection
        condition: "test function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          Test functions that return promises or use async/await MUST handle rejections.
          Without proper error handling, unhandled promise rejections in tests cause test
          failures to be reported incorrectly or crash the test runner.
          Use pattern: it('test', async () => { try { await operation(); } catch (e) { throw e; } })
          or rely on Mocha's built-in async handling.
        sources:
          - "https://mochajs.org/#asynchronous-code"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: before
    import_path: "mocha"
    description: "Defines a hook that runs before all tests in a suite"
    postconditions:
      - id: before-async-unhandled-rejection
        condition: "hook function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          Before hooks that return promises MUST handle rejections properly.
          Unhandled rejections in before hooks cause test suite failures without clear
          error messages. Use async/await or return promises that are properly handled.
        sources:
          - "https://mochajs.org/#hooks"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: after
    import_path: "mocha"
    description: "Defines a hook that runs after all tests in a suite"
    postconditions:
      - id: after-async-unhandled-rejection
        condition: "hook function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          After hooks that return promises MUST handle rejections properly.
          Unhandled rejections in cleanup hooks can leave resources in inconsistent states.
          Use async/await or return promises that are properly handled.
        sources:
          - "https://mochajs.org/#hooks"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: beforeEach
    import_path: "mocha"
    description: "Defines a hook that runs before each test in a suite"
    postconditions:
      - id: beforeeach-async-unhandled-rejection
        condition: "hook function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          BeforeEach hooks that return promises MUST handle rejections properly.
          Unhandled rejections cause individual test failures without clear attribution.
        sources:
          - "https://mochajs.org/#hooks"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: afterEach
    import_path: "mocha"
    description: "Defines a hook that runs after each test in a suite"
    postconditions:
      - id: aftereach-async-unhandled-rejection
        condition: "hook function is async or returns a Promise that rejects"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          AfterEach hooks that return promises MUST handle rejections properly.
          Unhandled rejections in cleanup can leave test environment in bad state.
        sources:
          - "https://mochajs.org/features/hooks/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: aftereach-resource-leak
        condition: "hook has async cleanup (server.close(), db.disconnect()) but doesn't await it"
        throws: "Mocha hangs, won't exit (requires --exit flag)"
        required_handling: >
          AfterEach hooks with async cleanup MUST await completion or return promises.
          Common mistake: afterEach(() => { server.close(); }) instead of afterEach(async () => { await server.close(); }).
          Unclosed resources (servers, database connections, file handles) prevent Mocha from exiting.
          Frequency: 25-35% of resource cleanup bugs.
        sources:
          - "https://www.mindfulchase.com/explore/troubleshooting-tips/testing-frameworks/troubleshooting-mocha-flaky-tests,-async-bugs,-and-ci-failures.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: describe
    import_path: "mocha"
    description: "Defines a test suite (must be synchronous)"
    postconditions:
      - id: describe-must-be-sync
        condition: "describe() callback is async or contains await"
        throws: "Undefined behavior - async code in describe not awaited"
        required_handling: >
          describe() callbacks MUST be synchronous. Mocha does NOT await async code in describe blocks.
          Common mistake: describe('Suite', async () => { const data = await fetchData(); ... }) - data will be undefined.
          Use before() hook for async setup: before(async () => { data = await fetchData(); }).
          Frequency: 15-20% of suite setup bugs.
        sources:
          - "https://mochajs.org/next/features/asynchronous-code/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

edge_cases:
  - id: promise-not-returned
    description: "Test creates promise but doesn't return it - silent failure"
    scenario: >
      it('test', function() {
        fetchData().then(data => {
          assert.ok(data); // Never runs!
        });
      }); // Test already passed!
    impact: "Critical - test passes before assertions run (false positive)"
    frequency: "60-70% of async test bugs"
    detection: "Hard - test appears to pass but doesn't actually test anything"
    fix: "Always return promises: return fetchData().then(...)"
    sources:
      - "https://github.com/mochajs/mocha/issues/2797"
    severity: critical
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: assertion-in-catch-causes-timeout
    description: "Assertion throws in promise catch block, causing timeout instead of failure"
    scenario: >
      it('test', function() {
        return fetchData()
          .then(() => assert.fail('Should reject'))
          .catch(err => {
            assert.strictEqual(err.code, 'ERR'); // Assertion throws → unhandled rejection → timeout
          });
      });
    impact: "High - confusing error message (timeout instead of assertion failure)"
    frequency: "40-50% of promise rejection tests"
    detection: "Medium - timeout error 'timeout of 2000ms exceeded' instead of assertion error"
    fix: "Use async/await with try/catch: try { await fetchData(); assert.fail(...); } catch (err) { assert.strictEqual(err.code, 'ERR'); }"
    sources:
      - "https://github.com/mochajs/mocha/issues/1128"
    severity: high
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: missing-await-race-condition
    description: "Async operation not awaited, test completes before operation finishes"
    scenario: >
      it('test', async function() {
        fetchData(); // Missing await!
        assert.ok(true); // Runs immediately, not after fetchData
      });
    impact: "High - flaky tests, race conditions, especially in CI"
    frequency: "30-40% of async/await tests"
    detection: "Medium - tests pass locally but fail in CI, non-deterministic"
    fix: "Always await async operations: await fetchData();"
    sources:
      - "https://www.mindfulchase.com/explore/troubleshooting-tips/testing-frameworks/troubleshooting-mocha-flaky-tests,-async-bugs,-and-ci-failures.html"
    severity: high
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: hook-without-return-await
    description: "beforeEach/before creates promise but doesn't return or await it"
    scenario: >
      beforeEach(function() {
        db.clearUsers(); // Promise not returned!
      });
      it('test', async function() {
        const users = await db.getUsers();
        assert.strictEqual(users.length, 0); // Fails - old users still there
      });
    impact: "High - test state pollution, flaky tests"
    frequency: "50-60% of hook setup bugs"
    detection: "Medium - tests fail intermittently or have state pollution"
    fix: "Return promise or use async/await: beforeEach(async () => { await db.clearUsers(); })"
    sources:
      - "https://mochajs.org/features/hooks/"
    severity: high
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: mixed-done-and-promise
    description: "Using both done() callback and returning promise (Mocha v3.0.0+)"
    scenario: >
      it('test', function(done) {
        return fetchData().then(() => done()); // Error!
      });
    impact: "Low - clear error message, easy to fix"
    frequency: "20-30% of callback migration bugs"
    detection: "Easy - 'Error: Resolution method is overspecified. Specify a callback *or* return a Promise; not both.'"
    fix: "Use only one pattern: async/await (recommended) or done callback"
    sources:
      - "https://github.com/mochajs/mocha/issues/2025"
    severity: low
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: timeout-masking-bug
    description: "Increasing timeout to mask real async bug (not returning promise or calling done)"
    scenario: >
      it('test', function() {
        this.timeout(10000); // Hiding the bug!
        fetchData().then(assert.ok); // Not returned!
      });
    impact: "Medium - hides real issues, tests take longer, confusing for maintainers"
    frequency: "30-40% of timeout configuration"
    detection: "Hard - test eventually times out, doesn't reveal root cause"
    fix: "Don't increase timeout - fix the async bug (return promise or await)"
    sources:
      - "https://github.com/mochajs/mocha/issues/2294"
    severity: medium
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: async-hook-error-prevents-tests
    description: "Error in before() hook prevents all tests in suite from running"
    scenario: >
      before(async function() {
        await db.connect(); // Fails!
      });
      it('test 1', async () => { /* Never runs */ });
      it('test 2', async () => { /* Never runs */ });
    impact: "Medium - entire test suite fails from single setup error"
    frequency: "30-35% of suite-level hook errors"
    detection: "Easy - clear error message, all tests skipped"
    fix: "Handle errors in hooks gracefully or split test suites"
    sources:
      - "https://mochajs.org/features/hooks/"
    severity: medium
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: done-not-called-in-error-path
    description: "done() callback not called in catch block or error handler"
    scenario: >
      it('test', function(done) {
        fetchUser('123', (err, user) => {
          if (err) throw err; // Should be: return done(err);
          assert.strictEqual(user.name, 'John');
          done();
        });
      });
    impact: "Medium - test hangs with timeout error"
    frequency: "40-50% of done callback bugs"
    detection: "Easy - 'timeout of 2000ms exceeded. Ensure the done() callback is being called'"
    fix: "Call done(err) in all error paths: if (err) return done(err);"
    sources:
      - "https://mochajs.org/next/features/asynchronous-code/"
    severity: medium
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

