  - name: embedContent
    import_path: "@google/genai"
    description: >
      Calculates embeddings for content. Called as ai.models.embedContent().
      Makes an HTTPS request to the Gemini API and throws ApiError on failure.
      Commonly called without try-catch in real-world code (confirmed antipattern).

    postconditions:
      - id: genai-embed-content-error
        condition: >
          ai.models.embedContent() called without try-catch or .catch() handler
        throws: >
          ApiError (name='ApiError') with .status and .message on HTTP failure.
        required_handling: >
          Caller MUST wrap await ai.models.embedContent() in try-catch.
          This is a common antipattern — seen unprotected in cherry-studio-app (2.9k stars).
        sources:
          - "https://raw.githubusercontent.com/googleapis/js-genai/main/src/models.ts"
        severity: error
        business_impact:
