# @google/genai — Google Gemini AI SDK (new SDK, replaces @google/generative-ai)
#
# The @google/genai SDK makes HTTPS requests to the Gemini API.
# All model methods (generateContent, generateContentStream, generateImages,
# embedContent) can throw ApiError on any HTTP failure.
#
# ApiError properties:
#   .status: HTTP status code (400, 401, 403, 429, 500, 503)
#   .message: error description
#   .name: 'ApiError'
#
# Primary API:
#   const ai = new GoogleGenAI({ apiKey: '...' })
#   await ai.models.generateContent({ model, contents })
#   await ai.models.generateContentStream({ model, contents })
#   await ai.models.generateImages({ model, prompt, config })
#   await ai.models.embedContent({ model, contents })
package: "@google/genai"
semver: ">=0.1.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-16"
status: production
evidence_quality: confirmed

detection:
  class_names:
    - "GoogleGenAI"

functions:
  - name: generateContent
    import_path: "@google/genai"
    description: >
      Generates text content from a prompt. Called as ai.models.generateContent().
      Makes an HTTPS POST request to the Gemini API and throws ApiError on network
      failure, quota exhaustion, authentication errors, or invalid parameters.

    postconditions:
      # Evidence: seen in 8 primary firings across 4 repos in scan-google-genai-2026-04-03.json
      # Top affected: saturndec/waoowaoo, shrimbly/node-banana, hyperbrowserai/HyperAgent, panyanyany/Twocast
      - id: genai-generate-content-error
        condition: >
          ai.models.generateContent() called without try-catch or .catch() handler
        throws: >
          ApiError (name='ApiError') with .status (HTTP status code) and .message.
          Common statuses: 400 (invalid request/model), 401 (missing API key),
          403 (API key invalid/permission denied), 429 (quota exceeded/rate limit),
          500 (internal server error), 503 (service unavailable).
        required_handling: >
          Caller MUST wrap await ai.models.generateContent() in try-catch or chain .catch().
          Uncaught ApiError causes unhandled promise rejection — AI features silently fail
          and users see broken responses or error pages.

          try {
            const response = await ai.models.generateContent({
              model: 'gemini-2.0-flash',
              contents: prompt,
            });
            return response.text;
          } catch (error) {
            if (error instanceof ApiError) {
              if (error.status === 429) throw new Error('Rate limited');
            }
            throw error;
          }
        sources:
          - "https://raw.githubusercontent.com/googleapis/js-genai/main/README.md"
          - "https://raw.githubusercontent.com/googleapis/js-genai/main/src/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: generateContentStream
    import_path: "@google/genai"
    description: >
      Generates streaming text content. Called as ai.models.generateContentStream().
      Makes an HTTPS request to the Gemini API and throws ApiError on failure.

    postconditions:
      # Evidence: seen in 2 primary firings across 1 repo in scan-google-genai-2026-04-03.json
      # Top affected: cubewhy/skid-homework
      - id: genai-generate-content-stream-error
        condition: >
          ai.models.generateContentStream() called without try-catch or .catch() handler
        throws: >
          ApiError (name='ApiError') with .status and .message on HTTP failure.
          The initial await can throw before any chunks arrive.
        required_handling: >
          Caller MUST wrap await ai.models.generateContentStream() in try-catch.
          Errors on the initial call propagate before any stream chunks are yielded.
        sources:
          - "https://raw.githubusercontent.com/googleapis/js-genai/main/README.md"
          - "https://raw.githubusercontent.com/googleapis/js-genai/main/src/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

