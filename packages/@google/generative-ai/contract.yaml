package: "@google/generative-ai"
semver: ">=0.11.0 <1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-01"
status: production
evidence_quality: confirmed

# NOTE: This package reached EOL November 30, 2025 (replaced by @google/genai).
# Still in widespread production use at version 0.11.x–0.24.x.
# Critical quirk: safety blocks do NOT throw at await generateContent() time —
# they throw at response.text() / chunk.text() call time (deferred synchronous throw).

functions:
  - name: generateContent
    import_path: "@google/generative-ai"
    description: >
      Generates text content from a prompt. Called on a GenerativeModel instance
      obtained from GoogleGenerativeAI.getGenerativeModel(). Makes an HTTP request
      to the Gemini API and can throw on network failure, quota exhaustion, auth
      errors, or invalid request parameters.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-google-generative-ai-2026-04-01.json
      # Top affected: xiao-zaiyi/illa-helper (⭐ 2775)
      - id: network-error
        condition: "when the HTTP request fails (network error, timeout, 4xx/5xx response)"
        throws: >
          GoogleGenerativeAIFetchError with .status (HTTP status code) and
          .statusText. Common statuses: 400 (invalid request), 403 (API key invalid),
          429 (quota exceeded), 500 (server error).
        required_handling: >
          Caller MUST wrap generateContent() in try-catch.
          Check error.status to distinguish quota errors (429) from auth errors (403)
          from server errors (500). Quota errors should retry with backoff;
          auth errors should surface to the user.
        sources:
          - "https://github.com/google-gemini/generative-ai-js/blob/main/src/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: subViolation co-fired with network-error in scan-google-generative-ai-2026-04-01.json
      # Top affected: xiao-zaiyi/illa-helper (⭐ 2775)
      - id: safety-block
        condition: "when the response resolves but response.text() is called on a safety-blocked response"
        throws: >
          GoogleGenerativeAIResponseError thrown synchronously from result.response.text()
          when the model blocked the request due to safety filters. The outer
          await generateContent() does NOT throw — the error is deferred to
          the response accessor. A try-catch around generateContent() + response.text()
          also catches this, so the network-error try-catch requirement covers it.
        required_handling: >
          The try-catch required for network-error also handles safety blocks.
          Callers may additionally check result.response.promptFeedback.blockReason
          to provide user-friendly messages when content is blocked.
        sources:
          - "https://ai.google.dev/gemini-api/docs/safety-settings"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: generateContentStream
    import_path: "@google/generative-ai"
    description: >
      Generates streaming text content. Returns a StreamGenerateContentResult with
      a stream (AsyncIterable) and a response promise. Both the initial await call
      and iteration over the stream can throw.

    postconditions:
      # Evidence: 0 primary firings in scan-google-generative-ai-2026-04-01.json (7 repos clean, 3 errored)
      - id: network-error
        condition: "when the HTTP request fails before the stream starts"
        throws: >
          GoogleGenerativeAIFetchError with .status and .statusText.
        required_handling: >
          Caller MUST wrap generateContentStream() in try-catch.
          The await on the initial call can throw before any chunks are yielded.
        sources:
          - "https://github.com/google-gemini/generative-ai-js/blob/main/src/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: 0 primary firings in scan-google-generative-ai-2026-04-01.json
      - id: stream-chunk-safety-block
        condition: "when iterating the stream and chunk.text() is called on a safety-blocked chunk"
        throws: >
          GoogleGenerativeAIResponseError thrown synchronously from chunk.text() during
          stream iteration. The try-catch required for network-error covers this too.
        required_handling: >
          The try-catch required for network-error also handles stream chunk safety blocks.
        sources:
          - "https://ai.google.dev/gemini-api/docs/safety-settings"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sendMessage
    import_path: "@google/generative-ai"
    description: >
      Sends a message in a multi-turn chat session. Called on a ChatSession instance
      obtained from model.startChat(). Makes an HTTP request and can throw on network
      failure, quota exhaustion, or safety blocks.

    postconditions:
      # Evidence: 0 primary firings in scan-google-generative-ai-2026-04-01.json (7 repos clean, 3 errored)
      - id: network-error
        condition: "when the HTTP request fails"
        throws: >
          GoogleGenerativeAIFetchError with .status and .statusText.
        required_handling: >
          Caller MUST wrap sendMessage() in try-catch.
          Same error handling as generateContent(): check .status for 429/403/500.
        sources:
          - "https://github.com/google-gemini/generative-ai-js/blob/main/src/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: 0 primary firings in scan-google-generative-ai-2026-04-01.json
      - id: safety-block
        condition: "when the response resolves but result.response.text() is called on a safety-blocked response"
        throws: >
          GoogleGenerativeAIResponseError thrown synchronously from result.response.text().
          The try-catch required for network-error covers this too.
        required_handling: >
          The try-catch required for network-error also handles safety blocks.
        sources:
          - "https://ai.google.dev/gemini-api/docs/safety-settings"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sendMessageStream
    import_path: "@google/generative-ai"
    description: >
      Sends a message in a multi-turn chat session with streaming response.
      Same error surface as generateContentStream.

    postconditions:
      # Evidence: 0 primary firings in scan-google-generative-ai-2026-04-01.json (7 repos clean, 3 errored)
      - id: network-error
