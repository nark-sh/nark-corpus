        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: 0 primary firings in scan-google-generative-ai-2026-04-01.json
      - id: stream-chunk-safety-block
        condition: "when iterating the stream and chunk.text() is called on a blocked chunk"
        throws: >
          GoogleGenerativeAIResponseError thrown synchronously from chunk.text().
          The try-catch required for network-error covers this too.
        required_handling: >
          The try-catch required for network-error also handles stream chunk safety blocks.
        sources:
          - "https://ai.google.dev/gemini-api/docs/safety-settings"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

