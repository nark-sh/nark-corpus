package: compression
semver: '>=1.7.0 <2.0.0'
contract_version: 1.2.0
maintainer: corpus-team
last_verified: '2026-06-24'
coverage_status: covered
status: production
evidence_quality: confirmed
# Deepen pass 2026-04-16 (deepen-stream-1):
# API surface: compression() factory (1), compression.filter() static (1) = 2 callable exports
# Contracted: compression() fully, compression.filter() intentionally omitted (pure sync bool, no error contract)
# New postconditions added: zlib-stream-unhandled-error, sse-missing-flush
# coverage_score: 0.5 → 1.0 (compression.filter intentionally omitted; both remaining meaningful entries contracted)
#
# Re-verification pass 2026-06-24 (deepen-stream-3, pass 51):
# Verified against compression@1.8.1 (current latest). API surface unchanged: still 2 callable exports.
# Since 1.8.0 (2025-02-10): brotli support and enforceEncoding option were added — both are option fields
# on the existing compression() factory, no new exported functions. The zlib-stream-unhandled-error
# postcondition continues to apply to the brotli code path because zlib.createBrotliCompress() emits
# stream errors through the same uncaught-emit channel as gzip/deflate. Added edge_case
# brotli-encoding-fallback to document the Node-version conditional behavior.
# coverage_score remains 1.0 (no new functions to contract; existing postconditions cover brotli).
coverage_score: 1.0
functions:
  - name: compression
    import_path: compression
    description: >-
      Creates Express/Connect middleware that compresses response bodies using gzip or deflate. Returns a middleware
      function (req, res, next).
    postconditions:
      - id: filter-throws
        condition: The filter option function throws an error when called during a request
        throws: Error propagated to Express error handler via next(err)
        required_handling: >
          If providing a custom filter function, it MUST NOT throw — errors inside filter are not caught internally and
          will crash the request pipeline. Wrap custom filter logic in try-catch and return true/false safely.
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: downstream-error
        condition: An error occurs in the response stream during compression
        throws: Error emitted on the response stream
        required_handling: >
          Caller MUST attach an Express error handler (app.use with 4-argument function) to catch stream errors
          propagated by the middleware.
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: below-threshold
        condition: 'Response body size is below the configured threshold (default: 1kb)'
        returns: Response is sent uncompressed; no compression is applied
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: not-compressible
        condition: Content-Type is not compressible (per compressible module) and no custom filter is set
        returns: Response is passed through uncompressed
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: compression-applied
        condition: Response is compressible, above threshold, and client supports compression
        returns: Response body is compressed (gzip or deflate) and Content-Encoding header is set
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.

      # Evidence: expressjs/compression/blob/master/index.js — stream has stream.on('data') and stream.on('end')
      # but NO stream.on('error') handler. Node.js docs: unhandled 'error' on EventEmitter throws and crashes process.
      # Confirmed via source inspection 2026-04-16 and nodejs.org/api/errors.html EventEmitter error behavior.
      - id: zlib-stream-unhandled-error
        condition: >
          The internal zlib compression stream emits an 'error' event (e.g., memory allocation failure,
          invalid zlib parameters, or a rare compression fault)
        throws: >
          Uncaught exception — the zlib stream error is emitted with no .on('error') listener attached
          by compression middleware, causing the Node.js process to throw an uncaught exception (or
          unhandledRejection) and potentially crash.
        required_handling: >
          Callers using compression() middleware SHOULD attach an Express error handler (app.use with
          4-argument signature) and/or a global process.on('uncaughtException') handler. The middleware
          does not protect against internal zlib stream errors. For production use, a process supervisor
          (pm2, systemd) must restart the process after such a crash.
        sources:
          - https://github.com/expressjs/compression/blob/master/index.js
          - https://nodejs.org/api/errors.html#class-error
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: expressjs/compression/blob/master/README.md — Server-Sent Events section explicitly documents
      # that res.flush() must be called after each write to ensure data reaches the client through the zlib buffer.
      # Without flush, zlib holds chunks until the buffer is full, causing SSE clients to see no events.
      - id: sse-missing-flush
        condition: >
          Server-Sent Events (SSE) or any streaming response uses compression() middleware and writes
          data with res.write() but does NOT call res.flush() after each write
        returns: >
          Compressed data is buffered in the zlib stream and NOT immediately delivered to the client.
          SSE clients receive no events (or very delayed batched events) until the zlib buffer fills.
        required_handling: >
          Any SSE or streaming endpoint using compression() MUST call res.flush() after each
          res.write() call to force zlib to flush its buffer and deliver the compressed chunk immediately.
          Alternative: set Cache-Control: no-transform to bypass compression for SSE endpoints.
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
    edge_cases:
      - id: no-content-length-assumed
        description: >-
          Responses without an explicit Content-Length header are assumed to exceed the threshold and will be compressed
          if the Content-Type is compressible. This can compress unexpectedly small responses.
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: already-compressed
        description: >-
          If the response already has a Content-Encoding header set (e.g., pre-compressed assets), compression
          middleware will skip it. Do not double-compress.
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: streaming-responses
        description: >-
          For streaming responses, compression works but the transfer will use chunked encoding. The final compressed
          size is not known upfront, so Content-Length is not set.
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: level-default
        description: >-
          Default compression level is -1 (zlib.Z_DEFAULT_COMPRESSION, approximately level 6). Level 0 disables
          compression. Level 9 is maximum compression but slowest.
        sources:
          - https://github.com/expressjs/compression/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      # Evidence: expressjs/compression/blob/master/index.js line 37:
      #   var hasBrotliSupport = 'createBrotliCompress' in zlib
      # And line 44-45:
      #   var SUPPORTED_ENCODING = hasBrotliSupport ? ['br', 'gzip', 'deflate', 'identity'] : ['gzip', 'deflate', 'identity']
      #   var PREFERRED_ENCODING = hasBrotliSupport ? ['br', 'gzip'] : ['gzip']
      # Added in compression@1.8.0 (2025-02-10).
      - id: brotli-encoding-fallback
        description: >-
          Brotli compression (`br` encoding) is offered only when the Node.js runtime has zlib.createBrotliCompress
          available (Node >=11.7.0). On older runtimes the middleware silently falls back to gzip/deflate and the
          client never sees `br` in the Content-Encoding negotiation set. No error is thrown — but production
          environments expecting Brotli compression on older Node versions will receive gzip instead. Verify the
          target runtime supports Brotli if explicitly relying on `br` for bandwidth budgets.
        sources:
          - https://github.com/expressjs/compression/blob/master/index.js
          - https://github.com/expressjs/compression/blob/master/HISTORY.md
        severity: info
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  # compression.filter is an exported static function: compression.filter(req, res) → boolean
  # It is the default filter function used internally by the middleware to determine if a response is compressible.
  # It is exported so users can compose custom filters that fall back to the default.
  # The function is SYNCHRONOUS and returns a boolean — it has no async behavior and no documented error throws.
  # Evidence: @types/compression/index.d.ts line 51: "function filter(req: express.Request, res: express.Response): boolean"
  # Evidence: expressjs/compression/blob/master/index.js — shouldCompress() reads Content-Type header via compressible module
  # INTENTIONALLY OMITTED from postconditions: pure synchronous boolean utility, no error contract needed.
  - name: compression.filter
    import_path: compression
    description: >
      Static default filter function exported as compression.filter(req, res). Returns true if the
      response Content-Type is compressible (per the compressible npm module), false otherwise.
      Used to build custom filter functions that extend the default behavior. Synchronous.
    postconditions: []
    coverage: intentionally-omitted
    omission_reason: >
      Pure synchronous boolean utility. Returns true/false based on Content-Type header via the
      compressible module. No throws, no async, no error contract needed. Omitting per ICP filter:
      no Nark profile value for runtime safety.
