      Renders the unauthorized.js UI for a route segment and sets the HTTP status to 401.
      New in Next.js 15 (experimental, gated by experimental.authInterrupts). Sibling
      to forbidden() — distinct status code (401 vs 403). Used when the user is NOT
      authenticated (no session) and must log in to access the resource.
