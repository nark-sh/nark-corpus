          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: authentication_failure
          incident_cost_range: critical

  - name: connection
    import_path: "next/server"
    description: >
      Indicates that the subsequent code requires an actual user Request before
      continuing. During prerendering it never resolves (forces dynamic rendering);
      during rendering it resolves immediately. New in Next.js 15 — replaces
      unstable_noStore() for explicit dynamic opt-in. Returns Promise<void> and
      MUST be awaited.
      Confirmed from next/dist/server/request/connection.js: throws E827 when
      called inside after(), E841 when called inside "use cache", and
      StaticGenBailoutError when called with `dynamic = "error"`.
    postconditions:
      # Evidence: https://nextjs.org/docs/app/api-reference/functions/connection (fetched 2026-06-24)
      # Source: node_modules/next/dist/server/request/connection.js
      - id: connection-missing-await
        maturity: stable
        condition: >
          connection() is called without await. Because connection() returns
          Promise<void>, the function body continues executing immediately without
          waiting for the dynamic-boundary signal. During prerendering this defeats
          the entire purpose of the call — Next.js cannot detect that this code
          must only run for a real request, so it may prerender the route statically
          with stale or incorrect data.

          Forgetting await on connection() is one of the most subtle Next.js bugs
          because it doesn't crash — it silently produces a route that "works"
          locally but renders incorrectly when deployed (e.g. random values appear
          frozen at build time, request-specific data is missing).
        throws: >
          No exception thrown — the Promise is silently dropped. The bug surfaces
          as static prerendering of code that should be dynamic. May produce
          "PrerenderInterruptedError" in newer Next.js versions if the call site
          is in a strict prerender scope.
        required_handling: >
          ALWAYS await connection():

            // CORRECT
            import { connection } from 'next/server';

            export default async function Page() {
              await connection();  // dynamic boundary signal
              const now = Date.now();  // this code only runs for real requests
              return <div>Current time: {now}</div>;
            }

            // WRONG
            export default async function Page() {
              connection();  // returns Promise, never awaited — bug!
              const now = Date.now();  // may run at build time, frozen
              return <div>Current time: {now}</div>;
            }
        sources:
          - "https://nextjs.org/docs/app/api-reference/functions/connection"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: connection-inside-after
        maturity: stable
        condition: >
          connection() is called inside an after() callback. The after() phase
          executes AFTER the request has finished, so the "wait for a real request"
          semantic is contradictory. Next.js throws E827 explicitly to flag this
          mistake at runtime.
        throws: >
          Error with __NEXT_ERROR_CODE = "E827" and message:
          "Route ... used `connection()` inside `after()`. The `connection()`
          function is used to indicate the subsequent code must only run when
          there is an actual Request, but `after()` executes after the request,
          so this function is not allowed in this scope."
        required_handling: >
          Do not call connection() inside after() callbacks. Move connection()
          before the after() schedule, or restructure the code so the dynamic
          opt-in happens during the request, not after it.

            // WRONG
            after(async () => {
              await connection();  // throws E827
              await sendMetric();
            });

            // CORRECT
            await connection();
            after(async () => {
              await sendMetric();
            });
        sources:
          - "https://nextjs.org/docs/app/api-reference/functions/connection"
          - "https://nextjs.org/docs/app/api-reference/functions/after"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: draftMode
    import_path: "next/headers"
    description: >
      Returns the current request's draft mode state (enabled/disabled) and the
      methods to enable/disable it. ASYNC in Next.js 15+ — returns Promise<DraftMode>
      that MUST be awaited. Used for preview environments where editors want to see
      unpublished content. Sibling to cookies() and headers() — same async signature
      change in Next.js 15.
      Confirmed from next/dist/server/request/draft-mode.js: returns
      createOrGetCachedDraftMode(provider, workStore) — a Promise resolving to
      a DraftMode instance with isEnabled getter and enable()/disable() methods.
    postconditions:
      # Evidence: https://nextjs.org/docs/app/api-reference/functions/draft-mode (fetched 2026-06-24)
      # Source: node_modules/next/dist/server/request/draft-mode.d.ts — Promise<DraftMode>
      # Sibling pattern to cookies()/headers() — both are async in v15+
      - id: draft-mode-missing-await
        maturity: stable
        condition: >
          draftMode() is called without await, and the returned Promise object is
          accessed directly (e.g. `draftMode().isEnabled`). The result is reading
          the isEnabled getter on the Promise object itself, which returns undefined
          — every check for "is draft mode on" silently returns false, and the
          editor's preview never displays unpublished content.

          Common buggy upgrade pattern from Next.js 14 → 15:
            // worked in v14 (synchronous), broken in v15 (returns Promise)
            const { isEnabled } = draftMode();  // isEnabled is undefined!
            if (isEnabled) {
