        throws: >
          HTTPAccessFallbackError — Error object with digest: "NEXT_HTTP_ERROR_FALLBACK;401"
          Type: `Error & { digest: string }` where digest = "NEXT_HTTP_ERROR_FALLBACK;401"
          CONSTANT: HTTP_ERROR_FALLBACK_ERROR_CODE = "NEXT_HTTP_ERROR_FALLBACK"
          Use `isHTTPAccessFallbackError(error)` to detect and re-throw.
          Same caveat as forbidden(): without experimental.authInterrupts enabled,
          an experimental-feature-disabled error throws first.
        required_handling: >
          Call unauthorized() OUTSIDE try-catch, OR re-throw fallback errors when caught:

            // CORRECT
            export default async function DashboardPage() {
              const session = await getSession();
              if (!session) {
                unauthorized();  // outside any try-catch
              }
              return <Dashboard userId={session.userId} />;
            }

            // CORRECT if try-catch is required:
            try {
              const session = await getSessionWithRefresh();
              if (!session) unauthorized();
