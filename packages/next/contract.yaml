            }
            return fetchPublished(id);  // ALWAYS hits this branch in v15
        throws: >
          No exception thrown — the bug is silent. TypeScript may catch it in
          strict mode (Promise has no isEnabled property), but JavaScript users
          and projects without strict types ship the bug to production.
        required_handling: >
          ALWAYS await draftMode():

            // CORRECT (Next.js 15+)
            import { draftMode } from 'next/headers';

            export default async function PostPage({ params }) {
              const { isEnabled } = await draftMode();
              const post = isEnabled
                ? await fetchDraft(params.id)
                : await fetchPublished(params.id);
              return <Post post={post} />;
            }

            // WRONG (Next.js 14 syntax still in v15 code)
            const { isEnabled } = draftMode();  // isEnabled === undefined
        sources:
          - "https://nextjs.org/docs/app/api-reference/functions/draft-mode"
          - "https://nextjs.org/docs/app/api-reference/file-conventions/route-segment-config"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: after
    import_path: "next/server"
    description: >
      Schedules a callback to execute after the current request finishes sending
      its response. New in Next.js 15 (stable in 15.1+). Used for analytics,
      logging, and side effects that should not block the response. The task
      runs in a separate phase where most request-bound APIs (cookies, headers,
      connection) are disallowed.
      Confirmed from next/dist/server/after/after.js: throws E468 if called
      outside a request scope. The callback's errors do NOT propagate to the
      caller — they are logged by Next.js and suppressed.
    postconditions:
      # Evidence: https://nextjs.org/docs/app/api-reference/functions/after (fetched 2026-06-24)
      # Source: node_modules/next/dist/server/after/after.js
      - id: after-error-swallowed
        maturity: stable
        condition: >
          An async callback passed to after() throws an error and the caller
          assumes the error will surface in the request handler. It will not.
          Next.js executes after() callbacks in a post-response phase where the
          response has already been sent — there is no way to surface a 5xx to
          the client. Failures in after() callbacks are logged to the server but
          invisible to monitoring that only watches HTTP error rates.

          This breaks observability assumptions: a Stripe webhook send inside
          after() that fails will silently drop the event with no Sentry/Datadog
          alert tied to the originating request.
        throws: >
          No exception propagates to the caller. The after() task's error is
          caught internally and logged to stderr. The original request returns
          200 even when the after() callback fails.
        required_handling: >
          Wrap after() callback bodies in try-catch and forward errors to your
          error tracker explicitly:

            // CORRECT
            import { after } from 'next/server';
            import * as Sentry from '@sentry/nextjs';

            export async function POST(req: Request) {
              const data = await req.json();
              await db.event.create({ data });

              after(async () => {
                try {
                  await analytics.track('event_created', data);
                } catch (err) {
                  Sentry.captureException(err, { tags: { source: 'after' } });
                }
              });

              return Response.json({ ok: true });
            }

            // WRONG — silent failure
            after(async () => {
              await analytics.track('event_created', data);
              // throws? logged to stderr only, no Sentry, no alert
            });
        sources:
          - "https://nextjs.org/docs/app/api-reference/functions/after"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: after-called-outside-request-scope
        maturity: stable
        condition: >
          after() is called from code that runs outside a Next.js request scope
          (e.g. a module-level side effect, a script run during build, or a
          callback that escapes the request lifecycle). Next.js cannot schedule
          the post-response work without a workStore, so it throws E468 at the
          call site.
        throws: >
          Error with __NEXT_ERROR_CODE = "E468" and message:
          "`after` was called outside a request scope."
        required_handling: >
          Only call after() inside a Route Handler, Server Action, or Server
          Component executing during a request. Move module-level side effects
          to instrumentation.ts or use the proper request-scoped API.
        sources:
          - "https://nextjs.org/docs/app/api-reference/functions/after"
          - "https://nextjs.org/docs/messages/next-dynamic-api-wrong-context"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: updateTag
    import_path: "next/cache"
    description: >
      Updates cached data on-demand for a specific cache tag, with read-your-own-writes
      semantics. New in Next.js 16. Stronger than revalidateTag() — guarantees that
      subsequent reads in the same Server Action see the fresh value. Can ONLY be
      called from within a Server Action.
      Confirmed from next/dist/server/web/spec-extension/revalidate.d.ts:
      `updateTag(tag: string): undefined`. Must be called BEFORE redirect() in a
      Server Action (same dead-code constraint as revalidateTag/revalidatePath).
    postconditions:
      # Evidence: https://nextjs.org/docs/app/api-reference/functions/updateTag (fetched 2026-06-24)
      # Source: node_modules/next/dist/server/web/spec-extension/revalidate.d.ts
      - id: update-tag-after-redirect
        maturity: stable
        condition: >
          updateTag() is called after redirect() in a Server Action. redirect()
          throws RedirectError, so any code after it is unreachable. The cache
          tag is never updated and clients receive stale data after the redirect
          completes.

          Same dead-code pattern as revalidateTag() and revalidatePath() — Next.js
          control-flow throws make ordering matter.
        throws: >
          redirect() throws RedirectError — updateTag() never executes. No new
          error; the bug is the silent omission.
        required_handling: >
          Call updateTag() BEFORE redirect():

            // CORRECT
            export async function publishPost(postId: string) {
              'use server';
              await db.post.update({ where: { id: postId }, data: { published: true } });
              updateTag('posts');    // before redirect
              redirect('/posts');
            }

            // WRONG
            export async function publishPost(postId: string) {
              'use server';
              await db.post.update({ ... });
              redirect('/posts');    // throws
              updateTag('posts');    // dead code
            }
        sources:
          - "https://nextjs.org/docs/app/api-reference/functions/updateTag"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: update-tag-outside-server-action
        maturity: stable
        condition: >
          updateTag() is called from a Route Handler or Server Component instead
          of a Server Action. updateTag() is restricted to Server Actions because
          read-your-own-writes semantics require the request to continue executing
          after the cache write — Route Handlers terminate before that opportunity.
          Calling it elsewhere throws or no-ops depending on Next.js version.
        throws: >
          In Next.js 16.x: Error indicating updateTag must be called from a Server
          Action. The exact message and code may evolve — caller MUST handle the
          throw or restructure to use revalidateTag() (which works in any context).
        required_handling: >
          Use updateTag() only inside `'use server'` functions. If you need to
          invalidate cache from a Route Handler or webhook, use revalidateTag()
          instead (no read-your-own-writes guarantee but works anywhere):

            // CORRECT in Server Action
            'use server';
            export async function updatePost(id: string, data: PostData) {
              await db.post.update({ where: { id }, data });
              updateTag(`post-${id}`);  // read-your-own-writes
              return db.post.findUnique({ where: { id } });  // sees fresh value
            }

            // CORRECT in Route Handler (webhook)
            export async function POST(req: Request) {
              const event = await req.json();
              await db.event.create({ data: event });
              revalidateTag('events');  // use revalidateTag, not updateTag
              return Response.json({ ok: true });
            }
        sources:
          - "https://nextjs.org/docs/app/api-reference/functions/updateTag"
          - "https://nextjs.org/docs/app/api-reference/functions/revalidateTag"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

notes:
  - "redirect() and notFound() throw control-flow exceptions — MUST be called outside try-catch, or re-throw when caught"
  - "redirect() digest: 'NEXT_REDIRECT;push|replace;<url>;<statusCode>;' — use isRedirectError() to detect"
  - "notFound() digest: 'NEXT_HTTP_ERROR_FALLBACK;404' — use isHTTPAccessFallbackError() to detect"
  - "cookies() and headers() are async in Next.js 15+ — always await them"
  - "cookies().set() and cookies().delete() require Server Action or Route Handler context (not Server Components)"
  - "headers() and cookies() CANNOT be called inside unstable_cache() callbacks — pass values as arguments"
  - "revalidatePath() and revalidateTag() MUST be called BEFORE redirect() in Server Actions — code after redirect() is unreachable"
  - "Every Server Action that mutates data MUST verify authentication before the mutation"
  - "revalidateTag(tag) single-arg form is deprecated in Next.js 16 — use revalidateTag(tag, 'max') instead"
  - "Server Actions are reachable via direct POST requests — always check auth inside"
