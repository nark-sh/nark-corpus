package: "@auth0/nextjs-auth0"
semver: ">=2.0.0 <4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-04"
status: draft
evidence_quality: partial

functions:
  - name: getAccessToken
    import_path: "@auth0/nextjs-auth0"
    description: >
      Retrieves the access token from the session. If the token is expired and
      a refresh token is available, automatically refreshes it. Throws
      AccessTokenError when refresh fails (expired/revoked refresh token,
      insufficient scope, or no session).

    postconditions:
      - id: access-token-error
        condition: >
          Access token is expired with no refresh token available, refresh
          token is revoked by Auth0 (e.g., user password change, admin action),
          requested scopes are not in the original grant, or no session exists.
          Also throws FAILED_REFRESH_GRANT under concurrent request load
          (refresh token rotation race condition).
        throws: >
          AccessTokenError with error codes:
          - MISSING_SESSION / ERR_EXPIRED_ACCESS_TOKEN: no valid session cookie
          - MISSING_ACCESS_TOKEN / ERR_MISSING_ACCESS_TOKEN: no token in session
          - MISSING_REFRESH_TOKEN / ERR_MISSING_REFRESH_TOKEN: token expired, no refresh token
          - EXPIRED_ACCESS_TOKEN / ERR_EXPIRED_ACCESS_TOKEN: refresh attempt failed
          - INSUFFICIENT_SCOPE / ERR_INSUFFICIENT_SCOPE: requested scopes not available
          - FAILED_REFRESH_GRANT / ERR_FAILED_REFRESH_GRANT: Auth0 rejected refresh request
        required_handling: >
          Caller MUST wrap in try-catch. When the refresh token expires (default
          7-day rotation in Auth0), getAccessToken will throw in production for all
          authenticated users until they re-authenticate. Unhandled = 500 error.

          Minimum handling:
            try {
              const { accessToken } = await getAccessToken(req, res);
            } catch (error) {
              if (error instanceof AccessTokenError) {
                // Redirect user to re-authenticate
                res.status(401).json({ message: 'Please sign in again' });
              } else {
                res.status(500).json({ message: 'Internal server error' });
              }
            }

          Import: import { getAccessToken, AccessTokenError } from '@auth0/nextjs-auth0'
        sources:
          - "https://auth0.github.io/nextjs-auth0/functions/server.getAccessToken.html"
          - "https://github.com/auth0/nextjs-auth0/blob/main/EXAMPLES.md"
          - "https://auth0.com/docs/quickstart/webapp/nextjs"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: handleCallback
    import_path: "@auth0/nextjs-auth0"
    description: >
      Handles the OAuth 2.0 callback by exchanging the authorization code for
      tokens. Used in custom callback handlers inside handleAuth(). Throws
      CallbackHandlerError on any OAuth failure.

    postconditions:
      - id: callback-handler-error
        condition: >
          OAuth callback fails: invalid or expired state parameter, organization
          claim mismatch, PKCE code verifier failure, Auth0 returns error in
          callback URL, or network failure contacting Auth0 token endpoint.
        throws: >
          CallbackHandlerError (extends HandlerError) with code
          ERR_CALLBACK_HANDLER_FAILURE. The .cause property contains the
          underlying error. The .status property contains the HTTP status code.
        required_handling: >
          Caller MUST wrap in try-catch or provide an onError handler in handleAuth().
          Unhandled callback errors crash the auth flow and expose stack traces
          to users.

          Minimum handling:
            export default handleAuth({
              async callback(req, res) {
                try {
                  await handleCallback(req, res, { redirectUri: '/dashboard' });
                } catch (error) {
                  res.writeHead(302, { Location: '/error?message=auth_failed' });
                  res.end();
                }
              }
            });
        sources:
          - "https://auth0.github.io/nextjs-auth0/functions/server.handleCallback.html"
          - "https://github.com/auth0/nextjs-auth0#error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: handleLogin
    import_path: "@auth0/nextjs-auth0"
    description: >
      Handles the login redirect by constructing and sending the Auth0
      authorization URL. Throws LoginHandlerError on configuration errors
      or redirect failures.

    postconditions:
      - id: login-handler-error
        condition: >
          Login redirect fails due to configuration errors (invalid
          authorizationParams, bad redirectUri), or any error in the
          login flow construction.
        throws: >
          LoginHandlerError (extends HandlerError) with code
          ERR_LOGIN_HANDLER_FAILURE. The .cause property contains the
          underlying error.
        required_handling: >
          Caller MUST wrap in try-catch when using handleLogin() directly
          (custom handler pattern). Unhandled errors will propagate as 500.

          Minimum handling:
            try {
              await handleLogin(req, res, { returnTo: '/dashboard' });
            } catch (error) {
              res.status(500).json({ error: 'Login failed' });
            }
        sources:
          - "https://auth0.github.io/nextjs-auth0/functions/server.handleLogin.html"
          - "https://github.com/auth0/nextjs-auth0#error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: handleLogout
    import_path: "@auth0/nextjs-auth0"
    description: >
      Handles the logout flow by clearing the session cookie and optionally
      redirecting to Auth0's logout endpoint. Throws LogoutHandlerError on
      failures such as invalid returnTo URLs.

    postconditions:
      - id: logout-handler-error
        condition: >
          Logout fails due to invalid returnTo URL (not in allowed list),
          session destruction failure, or network error contacting Auth0
          logout endpoint.
        throws: >
          LogoutHandlerError (extends HandlerError) with code
          ERR_LOGOUT_HANDLER_FAILURE.
        required_handling: >
          Caller MUST wrap in try-catch when using handleLogout() directly
          (custom handler pattern). Unhandled errors will leave the user
          on a 500 error page with an intact session.

          Minimum handling:
            try {
              await handleLogout(req, res, { returnTo: '/' });
            } catch (error) {
              res.status(500).json({ error: 'Logout failed' });
            }
        sources:
          - "https://auth0.github.io/nextjs-auth0/functions/server.handleLogout.html"
          - "https://github.com/auth0/nextjs-auth0#error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "v2.x and v3.x share the same standalone function API — this contract covers both"
  - "v4.x uses Auth0Client instance methods (auth0.getAccessToken()) — separate contract needed"
  - "handleAuth() with default handlers does NOT need try-catch — SDK handles errors internally"
  - "withApiAuthRequired() returns 401, does NOT throw — no contract needed for it"
  - "getSession() rarely throws — returns null when no session; null-check errors are out of scope"
  - "getAccessToken 60-second clock skew buffer: tokens expire slightly before their stated time"
  - "Token refresh race condition: concurrent requests can cause FAILED_REFRESH_GRANT even with valid tokens"
