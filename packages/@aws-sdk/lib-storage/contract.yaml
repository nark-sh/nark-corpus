package: "@aws-sdk/lib-storage"
semver: ">=3.0.0 <4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-06"
status: draft
evidence_quality: partial

detection:
  class_names: ["Upload"]
  require_instance_tracking: true

functions:
  - name: done
    import_path: "@aws-sdk/lib-storage"
    description: >
      Executes the multipart upload and waits for completion. Called on an Upload
      instance created with new Upload({...}). Throws on network failures, permission
      errors, bucket-not-found, credentials expiry, or S3 service errors. Returns
      CompleteMultipartUploadCommandOutput on success.

    postconditions:
      # Evidence: scan-@aws-sdk-lib-storage-2026-04-01.json — 1 repo scanned (9 errored), 0 violations
      # Limited scan coverage due to scanner errors. Contract documentation-confirmed from AWS SDK docs.
      - id: upload-done-no-try-catch
        condition: >
          upload.done() called without try-catch: S3 bucket does not exist
          (NoSuchBucket), insufficient permissions (AccessDenied), network failure,
          credentials expired, content-type mismatch, file size limits exceeded,
          or any S3 service error during the multipart upload process.
        throws: >
          S3ServiceException subclass (e.g., NoSuchBucket with error.name 'NoSuchBucket',
          AccessDenied with error.name 'AccessDenied', EntityTooLarge).
          For network failures: generic Error with connection/timeout message.
          For credentials: CredentialsProviderError.
        required_handling: >
          Caller MUST wrap upload.done() in try-catch. Multipart uploads involve
          multiple network requests (initiate, upload parts, complete) and can fail
          at any stage. Unhandled rejections cause silent data loss — the file appears
          to be uploading but never completes.

          Minimum handling:
            try {
              await upload.done();
            } catch (err) {
              console.error('Upload failed:', err);
              await upload.abort(); // Clean up the incomplete multipart upload
              throw err;
            }

          Note: Incomplete multipart uploads incur S3 storage costs. Always abort on failure.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-lib-storage/"
          - "https://docs.aws.amazon.com/AmazonS3/latest/API/API_CreateMultipartUpload.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "Upload is instantiated with new Upload({client, params}) — the actual upload starts on .done()"
  - "upload.on('httpUploadProgress', cb) can be added before .done() for progress tracking"
  - "upload.abort() should be called in the catch block to avoid incomplete multipart upload costs"
  - "For large files, Upload splits into 5MB+ parts by default (queueSize configures parallel parts)"
  - "Upload instance method is 'done', NOT 'send' — unlike other AWS SDK v3 commands"

tags:
  - aws
  - s3
  - storage
  - multipart-upload
  - file-upload
  - error-handling
  - network
  - sdk

related_packages:
  - "@aws-sdk/client-s3"
  - "@aws-sdk/s3-request-presigner"
