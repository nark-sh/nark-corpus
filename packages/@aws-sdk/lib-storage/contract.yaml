package: "@aws-sdk/lib-storage"
semver: ">=3.0.0 <4.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"  # deepen-stream-2 pass 50: drift-by-staleness re-verification + 2 new error postconditions
coverage_status: covered
status: production
evidence_quality: confirmed
# Depth pass 2026-04-16 (deepen-stream-2 pass 1):
# API surface: Upload class has 2 true async-callable functions: done(), abort().
# Previously contracted: done() (1 postcondition).
# This pass added: abort() (3 postconditions: abort-does-not-clean-up, abort-after-done-is-noop,
#   leave-parts-on-error-cost). Also added done() second postcondition: done-already-called.
# Coverage: 2/2 async functions = 100% (constructor sync, on() is sync event registration).
#
# Depth pass 2026-06-24 (deepen-stream-2 pass 50, drift-by-staleness):
# Re-verified API surface against @aws-sdk/lib-storage@3.1075.0 — unchanged from 3.x baseline.
# Upload.d.ts confirms 2 async-callable methods: done() and abort(); on() returns this (sync).
# Surface-coverage remains 100%. This pass DEEPENS the existing done() coverage with two
# evidence-based postconditions for thrown errors that were not previously broken out:
#   done-exceeds-max-parts (Upload.ts: `Exceeded ${MAX_PARTS} parts in multipart upload`)
#   done-missing-etag-cors (Upload.ts: `Part N is missing ETag in UploadPart response.
#     Missing Bucket CORS configuration for ETag header?`)
# Both throws are subsumed by upload-done-no-try-catch (which is generic), but breaking them
# out names the specific error so a downstream scanner upgrade can recognize the message text
# and a fix-bot can route the developer to the right remediation (queueSize/partSize tuning vs
# bucket CORS configuration).
#
# Evidence sources inspected this pass:
#   https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts
#   https://github.com/aws/aws-sdk-js-v3/tree/main/lib/lib-storage (README)
#   https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-lib-storage/
#   Source inspection: dist-cjs/index.js (node_modules, @aws-sdk/lib-storage@3.1075.0)
# Key findings:
#   abort() does NOT directly clean up uploaded parts — it only signals the AbortController.
#   done() must still resolve/reject (via Promise.race) before cleanup via markUploadAsAborted() runs.
#   If done() has not been called yet, abort() is a no-op regarding cleanup — there is nothing to abort.
#   If leavePartsOnError=true, even abort() will NOT send AbortMultipartUploadCommand — S3 costs accumulate.
#   Calling done() twice throws "already executed .done()" error — upload instances are single-use.
#   done() throws if multipart upload would exceed 10,000 parts (S3 hard limit) — file size /
#     partSize must stay under 10k; default 5 MB part size caps total file size at ~50 GB.
#   done() throws "Part N is missing ETag in UploadPart response. Missing Bucket CORS
#     configuration for ETag header?" when the bucket's CORS rules omit ETag from
#     ExposeHeaders — common when using browser uploads to a bucket configured for the
#     server SDK only.
coverage_score: 1.0  # 2/2 async-callable functions contracted

detection:
  class_names: ["Upload"]
  require_instance_tracking: true

functions:
  - name: done
    import_path: "@aws-sdk/lib-storage"
    description: >
      Executes the multipart upload and waits for completion. Called on an Upload
      instance created with new Upload({...}). Throws on network failures, permission
      errors, bucket-not-found, credentials expiry, or S3 service errors. Returns
      CompleteMultipartUploadCommandOutput on success.

    postconditions:
      # Evidence: scan-@aws-sdk-lib-storage-2026-04-01.json — 1 repo scanned (9 errored), 0 violations
      # Limited scan coverage due to scanner errors. Contract documentation-confirmed from AWS SDK docs.
      - id: upload-done-no-try-catch
        condition: >
          upload.done() called without try-catch: S3 bucket does not exist
          (NoSuchBucket), insufficient permissions (AccessDenied), network failure,
          credentials expired, content-type mismatch, file size limits exceeded,
          or any S3 service error during the multipart upload process.
        throws: >
          S3ServiceException subclass (e.g., NoSuchBucket with error.name 'NoSuchBucket',
          AccessDenied with error.name 'AccessDenied', EntityTooLarge).
          For network failures: generic Error with connection/timeout message.
          For credentials: CredentialsProviderError.
        required_handling: >
          Caller MUST wrap upload.done() in try-catch. Multipart uploads involve
          multiple network requests (initiate, upload parts, complete) and can fail
          at any stage. Unhandled rejections cause silent data loss — the file appears
          to be uploading but never completes.

          Minimum handling:
            try {
              await upload.done();
            } catch (err) {
              console.error('Upload failed:', err);
              await upload.abort(); // Clean up the incomplete multipart upload
              throw err;
            }

          Note: Incomplete multipart uploads incur S3 storage costs. Always abort on failure.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-lib-storage/"
          - "https://docs.aws.amazon.com/AmazonS3/latest/API/API_CreateMultipartUpload.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: dist-cjs/index.js lines 232-237: `if (this.sent) { throw new Error("@aws-sdk/lib-storage: this instance of Upload has already executed .done()...") }`
      # Source: https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts
      - id: upload-done-already-called
        condition: >
          upload.done() is called a second time on the same Upload instance. Upload
          instances are single-use — calling done() twice throws immediately regardless
          of whether the first call succeeded or failed.
        throws: >
          Error: "@aws-sdk/lib-storage: this instance of Upload has already executed
          .done(). Create a new instance."
        required_handling: >
          Caller MUST create a new Upload instance for each upload operation.
          Do NOT reuse Upload instances across retries — if done() fails, create a new
          Upload instance with the same parameters and call done() on it instead.

          WRONG — will throw on retry:
            const upload = new Upload({...});
            try { await upload.done(); } catch (e) { await upload.done(); } // THROWS

          CORRECT — create new instance for retry:
            const makeUpload = () => new Upload({client, params});
            try { await makeUpload().done(); } catch (e) { await makeUpload().done(); }
        sources:
          - "https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: dist-cjs/index.js (v3.1075.0) line 330:
      #   `throw new Error("Exceeded ${this.MAX_PARTS} parts in multipart upload to Bucket: ... Key: ...");`
      # MAX_PARTS is the S3-imposed hard cap of 10,000 parts per multipart upload.
      # Source: https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts
      # S3 docs: https://docs.aws.amazon.com/AmazonS3/latest/userguide/qfacts.html
      - id: upload-done-exceeds-max-parts
        condition: >
          The Upload's total body size divided by the configured partSize (default 5 MB)
          exceeds 10,000 parts. With the default partSize this caps the file at ~48.8 GB.
          The error is thrown DURING done() execution after parts have already been
          uploaded — partial cleanup runs only when leavePartsOnError is false (the
          default), otherwise costs accumulate.
        throws: >
          Error: "Exceeded 10000 parts in multipart upload to Bucket: <bucket> Key: <key>."
        required_handling: >
          Caller MUST wrap upload.done() in try-catch (already required by
          upload-done-no-try-catch). For files larger than 48.8 GB, the caller MUST
          also explicitly tune partSize:

          CORRECT — uploading a 1 TB file (must use ≥100 MB parts):
            new Upload({
              client: s3,
              params: { Bucket, Key, Body: stream },
              partSize: 100 * 1024 * 1024, // 100 MB; 1 TB / 100 MB = 10,240 parts → still over
              queueSize: 4,
            });
            // For files near or above 5 TB (S3's per-object limit), use 500 MB+ parts.

          The maximum object size S3 supports is 5 TB. To stay under 10,000 parts:
            minimum partSize = ceil(fileSize / 10000)

          Operationally, the safer pattern is to size partSize from a known maximum
          file size at construction time:
            const partSize = Math.max(5 * 1024 * 1024, Math.ceil(maxBytes / 10000));
        sources:
          - "https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts"
          - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/qfacts.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      # Evidence: dist-cjs/index.js (v3.1075.0) line 385:
      #   `throw new Error("Part ${dataPart.partNumber} is missing ETag in UploadPart response.
      #    Missing Bucket CORS configuration for ETag header?");`
      # Triggered when UploadPart returns no ETag header — almost always a CORS misconfiguration
      # on the destination bucket (ExposeHeaders missing ETag), most visible in browser uploads.
      # Source: https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts
      # CORS docs: https://docs.aws.amazon.com/AmazonS3/latest/userguide/ManageCorsUsing.html
      - id: upload-done-missing-etag-cors
        condition: >
          UploadPart succeeds (HTTP 200) but the response does not include the ETag
          header. This is almost always caused by the destination bucket's CORS
          configuration omitting ETag from ExposeHeaders — the browser strips the
          header before the SDK can read it. The SDK aborts the entire multipart
          upload mid-stream because it cannot send a CompleteMultipartUpload without
          the per-part ETags.
        throws: >
          Error: "Part N is missing ETag in UploadPart response. Missing Bucket CORS
          configuration for ETag header?"
        required_handling: >
          Caller MUST wrap upload.done() in try-catch (already required by
          upload-done-no-try-catch). When this specific error message appears,
          surface a remediation hint pointing at the bucket's CORS configuration —
          the SDK cannot recover automatically.

          Remediation (bucket CORS rules MUST include ETag in ExposeHeaders):
            [
              {
                "AllowedHeaders": ["*"],
                "AllowedMethods": ["PUT", "POST"],
                "AllowedOrigins": ["https://your-app.example.com"],
                "ExposeHeaders": ["ETag"]
              }
            ]

          In a backend-only deployment (no browser uploads) this error is rare
          but possible if a proxy or service worker is stripping response headers.
          Log the full error text so the CORS-vs-proxy distinction can be made
          from logs alone.
        sources:
          - "https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts"
          - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/ManageCorsUsing.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: abort
    import_path: "@aws-sdk/lib-storage"
    description: >
      Signals cancellation of an in-progress multipart upload. Calls abort() on the
      internal AbortController, which causes done() (if currently running) to reject
      with an AbortError. Does NOT directly call AbortMultipartUploadCommand — cleanup
      happens asynchronously inside done()'s Promise.race resolution. If done() has
      not been started, abort() is effectively a no-op (there is nothing to clean up).
    postconditions:
      # Evidence: dist-cjs/index.js lines 229-231: `async abort() { this.abortController.abort(); }`
      # Evidence: dist-cjs/index.js lines 466-471: markUploadAsAborted only runs if uploadId exists
      #   (meaning done() started multipart) AND leavePartsOnError=false AND abort command prepared
      # Source: https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts
      - id: abort-does-not-clean-up-synchronously
        condition: >
          abort() is called on an in-progress upload without waiting for done() to
          resolve or reject. Developers assume abort() immediately stops the upload and
          cleans up parts, but it only signals the AbortController — done() must still
          reject with AbortError before markUploadAsAborted() runs.
        throws: >
          abort() itself throws nothing. done() (the concurrent Promise) rejects with:
          Error("Upload aborted.") with error.name === 'AbortError'.
          The AbortError is thrown from __abortTimeout via Promise.race inside done().
        required_handling: >
          Caller MUST await done() after calling abort() to ensure cleanup completes.
          The pattern is: call abort(), then catch the AbortError from done().

          CORRECT pattern:
            const upload = new Upload({...});
            const donePromise = upload.done(); // Start upload
            // ... later, when cancellation is needed:
            await upload.abort();
            try {
              await donePromise; // Will reject with AbortError
            } catch (err) {
              if (err.name === 'AbortError') {
                // Upload cancelled cleanly — parts already cleaned up (unless leavePartsOnError=true)
              } else {
                throw err; // Re-throw non-abort errors
              }
            }

          WRONG — fire and forget abort:
            upload.abort(); // No await, done() never awaited → cleanup never confirmed
        sources:
          - "https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts"
          - "https://github.com/aws/aws-sdk-js-v3/tree/main/lib/lib-storage"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: dist-cjs/index.js lines 466-470:
      #   if (this.uploadId && !this.leavePartsOnError && null !== this.abortMultipartUploadCommand) {
      #     await this.client.send(this.abortMultipartUploadCommand);
      #   }
      # Source: https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts
      - id: leave-parts-on-error-prevents-cleanup
        condition: >
          Upload is configured with leavePartsOnError: true and the upload fails or
          is aborted. With this flag, markUploadAsAborted() skips the AbortMultipartUploadCommand
          call — uploaded parts remain in S3 indefinitely and incur ongoing storage costs.
        throws: >
          No additional throw — parts are silently left on S3. The original failure error
          is still thrown by done(), but the cleanup is skipped due to the flag.
        required_handling: >
          When leavePartsOnError: true, callers MUST manually clean up orphaned parts
          by listing and aborting multipart uploads or configuring an S3 lifecycle rule.

          leavePartsOnError: true should ONLY be used when you need to inspect uploaded
          parts for debugging. In production, use leavePartsOnError: false (the default).

          To list and abort orphaned multipart uploads manually:
            const { UploadId } = upload; // capture before done() rejects
            await s3Client.send(new AbortMultipartUploadCommand({
              Bucket, Key, UploadId
            }));

          Or configure S3 lifecycle rule to abort incomplete multipart uploads after N days:
            "AbortIncompleteMultipartUpload": { "DaysAfterInitiation": 1 }

          WARNING: Default S3 storage costs for incomplete multipart uploads:
          Each part (5 MB minimum) that is not cleaned up is billed at standard S3 rates.
          A failed 100 MB upload leaves up to 20 parts (5 MB each) billable until aborted.
        sources:
          - "https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts"
          - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/mpuoverview.html#mpu-abort-incomplete-mpu-lifecycle-config"
          - "https://github.com/aws/aws-sdk-js-v3/tree/main/lib/lib-storage"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: dist-cjs/index.js lines 229-231: abort() only calls this.abortController.abort()
      # If done() has never been called, uploadId is undefined, and markUploadAsAborted is a no-op
      # Source: https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts
      - id: abort-before-done-is-noop
        condition: >
          abort() is called before done() has been called. Since the upload has not
          started yet (no multipart upload initiated, no uploadId set), abort() only
          signals the AbortController but there is nothing to clean up. When done() is
          subsequently called, it will immediately reject with AbortError — but no S3
          network requests were ever made.
        throws: >
          abort() itself throws nothing. If done() is called after abort(), done()
          immediately rejects via Promise.race with AbortError (from __abortTimeout).
          No S3 AbortMultipartUploadCommand is sent because uploadId is undefined.
        required_handling: >
          This is generally safe behavior — calling abort() before done() prevents the
          upload from starting at all. However, callers should still catch the AbortError
          from done() when calling done() after abort().

          Example (cancel before start):
            const upload = new Upload({...});
            upload.abort(); // Signal: don't start
            try {
              await upload.done(); // Throws AbortError immediately
            } catch (err) {
              if (err.name !== 'AbortError') throw err;
              // Normal cancellation — no S3 state to clean up
            }
        sources:
          - "https://raw.githubusercontent.com/aws/aws-sdk-js-v3/main/lib/lib-storage/src/Upload.ts"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

notes:
  - "Upload is instantiated with new Upload({client, params}) — the actual upload starts on .done()"
  - "upload.on('httpUploadProgress', cb) can be added before .done() for progress tracking"
  - "upload.abort() should be called in the catch block to avoid incomplete multipart upload costs"
  - "For large files, Upload splits into 5MB+ parts by default (queueSize configures parallel parts)"
  - "Upload instance method is 'done', NOT 'send' — unlike other AWS SDK v3 commands"

tags:
  - aws
  - s3
  - storage
  - multipart-upload
  - file-upload
  - error-handling
  - network
  - sdk

related_packages:
  - "@aws-sdk/client-s3"
  - "@aws-sdk/s3-request-presigner"
