package: "@aws-sdk/client-lambda"
semver: ">=3.0.0 <4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-06"
status: production
evidence_quality: confirmed

functions:
  - name: send
    import_path: "@aws-sdk/client-lambda"
    description: >
      Sends any Lambda command via the LambdaClient. The single entry point for all
      Lambda operations in AWS SDK v3 — invokes functions, creates/updates/deletes
      functions, manages function configurations, and all other Lambda operations.
      Returns a Promise that rejects on any network failure, AWS service error, or
      permission error.

    postconditions:
      # Evidence: 0 violations across 2 repos in scan-aws-sdk-client-lambda-2026-04-06.json
      # FP check: 0/100 FPs (0.0% FP rate) — confirmed no false positives
      - id: aws-lambda-service-error
        condition: >
          Any AWS service error or network failure: function does not exist
          (ResourceNotFoundException), insufficient permissions (EC2AccessDeniedException,
          KMSAccessDeniedException), request throttling (TooManyRequestsException),
          code storage limit exceeded (CodeStorageExceededException), function is
          too large (RequestTooLargeException), EC2 errors (EC2ThrottledException,
          EC2UnexpectedException), KMS errors (KMSDisabledException,
          KMSNotFoundException), ENI limit exceeded (EniLimitReachedException),
          service unavailable, or any network-level failure (DNS, timeout, connection
          refused)
        throws: >
          LambdaServiceException subclass with error.name set to the specific error
          code (e.g., "ResourceNotFoundException", "TooManyRequestsException",
          "EC2ThrottledException"). For network errors, throws a generic Error or
          SdkClientError with a connection/timeout message.
        required_handling: >
          Caller MUST wrap client.send() in try-catch. All Lambda operations can fail
          due to network issues, permission problems, function absence, or AWS service
          outages. Unhandled rejections on InvokeCommand cause silent function invocation
          failures or application crashes.

          Note: For InvokeCommand specifically, AWS Lambda does NOT throw for application
          errors within the invoked function — instead it returns a non-null FunctionError
          field in the response. The try-catch required by this contract covers only
          network/service errors, not function execution errors.

          Minimum handling:
            try {
              const response = await lambdaClient.send(new InvokeCommand({
                FunctionName: functionArn,
                Payload: Buffer.from(JSON.stringify(payload))
              }));
              // Also check response.FunctionError for application errors
              if (response.FunctionError) {
                throw new Error(`Function error: ${response.FunctionError}`);
              }
              return response.Payload;
            } catch (error) {
              if (error instanceof LambdaServiceException) {
                console.error(`Lambda error [${error.name}]: ${error.message}`);
              } else {
                console.error('Network error:', error);
              }
              throw error;
            }
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/lambda/"
          - "https://docs.aws.amazon.com/lambda/latest/api/API_Invoke.html"
          - "https://docs.aws.amazon.com/lambda/latest/dg/troubleshooting-invocation.html"
          - "https://aws.amazon.com/blogs/developer/service-error-handling-modular-aws-sdk-js/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "AWS SDK v3 uses command pattern: client.send(new XxxCommand(params)). All operations use the same send() entry point."
  - "error.name contains the specific AWS error code (e.g., 'ResourceNotFoundException', 'TooManyRequestsException')"
  - "error.$retryable.throttling is true for TooManyRequestsException — implement exponential backoff"
  - "InvokeCommand: FunctionError in response indicates application-level errors inside the function — separate from thrown exceptions"
  - "InvokeCommand with InvocationType='Event' (async invocation) returns StatusCode 202 on success — check this, not FunctionError"
  - "LambdaClient instance is reusable across multiple send() calls — no per-call instantiation needed"
  - "TooManyRequestsException has different sub-codes: Rate, Concurrency, CallerRate, FunctionRate — all retryable"
