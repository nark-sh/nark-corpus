package: "@aws-sdk/s3-request-presigner"
semver: ">=3.0.0 <4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-03-24"
status: production
evidence_quality: partial

functions:
  - name: getSignedUrl
    import_path: "@aws-sdk/s3-request-presigner"
    description: >
      Generates a pre-signed URL for an S3 command (GetObject, PutObject, DeleteObject, etc.).
      Resolves credentials and signs the request. Returns Promise<string>.
      Throws on credential resolution failure, invalid credentials, or network errors.

    postconditions:
      - id: presigner-credential-error
        condition: >
          Credential resolution fails: no credentials configured, IAM role unavailable,
          credentials expired, invalid access key ID, or wrong secret key
        throws: >
          CredentialsProviderError when credentials cannot be resolved (no env vars,
          no IAM role, no credential file). CredentialsError or generic Error on
          expired/invalid credentials. All errors reject the returned Promise.
        required_handling: >
          Caller MUST wrap getSignedUrl() in try-catch. Credential failures are common
          in serverless environments where IAM roles may not be configured, env vars
          may be missing (VERCEL deployment, CI), or tokens may expire.

          Minimum handling:
            try {
              const url = await getSignedUrl(s3Client, command, { expiresIn: 3600 });
              return url;
            } catch (err) {
              console.error('Failed to generate presigned URL:', err);
              throw err;
            }
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-s3-request-presigner/"
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: createPresignedPost
    import_path: "@aws-sdk/s3-request-presigner"
    description: >
      Creates a presigned POST policy for browser-based file uploads to S3.
      Same credential resolution process as getSignedUrl. Returns Promise<PresignedPost>.

    postconditions:
      - id: presigner-post-credential-error
        condition: >
          Credential resolution fails: same conditions as getSignedUrl
        throws: >
          CredentialsProviderError or generic Error. Same error surface as getSignedUrl.
        required_handling: >
          Caller MUST wrap createPresignedPost() in try-catch. Missing credentials
          in serverless deployments cause unhandled rejections.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-s3-request-presigner/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "getSignedUrl is a standalone function, not a method — import { getSignedUrl } from '@aws-sdk/s3-request-presigner'"
  - "Both functions make synchronous credential resolution (no network call in most cases when using env var credentials)"
  - "createPresignedPost is less common than getSignedUrl but has the same error surface"
  - "AWS SDK v3 only — this package does not exist in v2"
  - "S3Client must be initialized with region or it will throw a NoRegionError"

tags:
  - aws
  - s3
  - storage
  - presigned-url
  - file-upload
  - error-handling
  - network
  - sdk

related_packages:
  - "@aws-sdk/client-s3"
  - "@aws-sdk/client-s3-control"
  - "@aws-sdk/lib-storage"
