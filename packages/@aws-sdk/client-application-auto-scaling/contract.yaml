coverage_rationale: |
  Package skipped via bc-npm-package-onboard Phase 0d gate (low-real-world-usage).
  Corpus DB (corpus-builder/.corpus/corpus.db, queried 2026-06-11) reports exactly
  1 repo with @aws-sdk/client-application-auto-scaling as a runtime dependency,
  and 0 of those repos are cloned (no local_path). With < 5 runtime-dep repos and
  no clonable evidence to drive Phase 4 usage analysis or Phase 7 real-world scans,
  this client cannot be onboarded with the evidence-based bar required by the
  Completeness Mandate.

  Application Auto Scaling is a comparatively low-traffic AWS service compared to
  S3, DynamoDB, Lambda, SNS, SQS, SES — which are the AWS SDK v3 clients that ARE
  contracted in the public corpus. Most TypeScript apps that touch Application
  Auto Scaling do so from infrastructure / IaC code (CDK, Terraform CDKTF) rather
  than from application runtime code, so the callsite density per repo is also
  low even in repos that do depend on it.

  Re-evaluate if (a) corpus rescans surface > 5 cloned repos using this client at
  runtime, or (b) a design partner explicitly requests coverage. The AWS SDK v3
  command-pattern + ServiceException error model would make this a straightforward
  onboarding — the gate is real-world evidence density, not contract feasibility.
