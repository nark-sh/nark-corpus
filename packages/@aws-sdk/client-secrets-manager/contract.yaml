detection:
  type_names:
    - SecretsManagerClient
    - SecretsManagerClientResolvedConfig

functions:
  - name: send
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Sends any Secrets Manager command via the SecretsManagerClient. The single
      entry point for all AWS Secrets Manager operations — retrieving secret values,
      creating/updating/deleting secrets, rotating secrets, and managing secret
      metadata. Returns a Promise that rejects on any network failure, AWS service
      error, or permission error.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/secrets-manager/
      # Evidence: https://aws.amazon.com/blogs/developer/service-error-handling-modular-aws-sdk-js/
      # Error hierarchy confirmed: SecretsManagerServiceException extends ServiceException
      - id: aws-secrets-manager-service-error
        maturity: stable
        condition: >
          Any AWS service error or network failure: secret does not exist
          (ResourceNotFoundException), secret already exists when creating
          (ResourceExistsException), invalid request state
          (InvalidRequestException), invalid parameter
          (InvalidParameterException), permission denied
          (AccessDeniedException), KMS errors (DecryptionFailure,
          EncryptionFailure), request throttling (ThrottlingException),
          service unavailable, or any network-level failure (DNS, timeout,
          connection refused)
        throws: >
          SecretsManagerServiceException subclass with error.name set to the
          specific error code (e.g., "ResourceNotFoundException",
          "ResourceExistsException", "InvalidRequestException",
          "AccessDeniedException", "ThrottlingException"). For network errors,
          throws a generic Error or SdkClientError with a connection/timeout
          message.
        required_handling: >
          Caller MUST wrap client.send() in try-catch. All Secrets Manager
          operations can fail due to network issues, permission problems, missing
          secrets, or AWS service outages. Unhandled rejections on
          GetSecretValueCommand cause application crashes when secrets are
          unavailable; unhandled CreateSecretCommand/UpdateSecretCommand failures
          cause silent data loss.

          Minimum handling:
            try {
              const response = await smClient.send(new GetSecretValueCommand({
                SecretId: 'my/secret'
              }));
              return response.SecretString;
            } catch (error) {
              if (error instanceof SecretsManagerServiceException) {
                console.error(`Secrets Manager error [${error.name}]: ${error.message}`);
              } else {
                console.error('Network error:', error);
              }
              throw error;
            }

          For ResourceNotFoundException: consider whether the missing secret
          represents a configuration error (throw) or a valid absent state
          (return null/default).
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/secrets-manager/"
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetSecretValue.html"
          - "https://docs.aws.amazon.com/secretsmanager/latest/userguide/troubleshoot.html"
          - "https://aws.amazon.com/blogs/developer/service-error-handling-modular-aws-sdk-js/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: GetSecretValueCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Retrieves the current value of a secret by name or ARN. Returns either
      SecretString (for text secrets) or SecretBinary (for binary secrets) — not
      both. The most commonly used Secrets Manager operation in application startup
      paths, database connection bootstrapping, and API key retrieval. Because this
      is called at startup, errors cascade into total service unavailability.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetSecretValue.html
      # Error types confirmed from dist-types/commands/GetSecretValueCommand.d.ts @throws annotations
      - id: get-secret-value-not-found
        maturity: stable
        severity: error
        condition: >
          secret does not exist, the ARN references a deleted secret, or the
          secret was created in a different region; throws ResourceNotFoundException
          (error.name === "ResourceNotFoundException")
        throws: ResourceNotFoundException
        required_handling: >
          Catch ResourceNotFoundException and handle missing secret explicitly.
          Check that the secret name matches the environment (dev/staging/prod).
          Either throw with a descriptive message or return a default value if
          the missing secret represents an optional feature.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetSecretValue.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: get-secret-value-decryption-failure
        maturity: stable
        severity: error
        condition: >
          KMS key used to encrypt the secret is unavailable, disabled, deleted, or the
          caller lacks kms:Decrypt permission; throws DecryptionFailure
          (error.name === "DecryptionFailure")
        throws: DecryptionFailure
        required_handling: >
          Catch DecryptionFailure and log the KMS key ARN and error details.
          Alert the on-call team — this indicates a KMS permission or key lifecycle
          issue that requires manual remediation. Do not retry without fixing the
          underlying KMS configuration.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetSecretValue.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: get-secret-value-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new GetSecretValueCommand(...)) without
          a wrapping try-catch
        throws: >
          ResourceNotFoundException, DecryptionFailure, AccessDeniedException, or
          network errors propagate as unhandled rejections
        required_handling: >
          Always wrap in try-catch:
            try {
              const result = await smClient.send(new GetSecretValueCommand({
                SecretId: secretName,
                VersionStage: 'AWSCURRENT'
              }));
              const secret = result.SecretString
                ?? Buffer.from(result.SecretBinary).toString('utf8');
              return JSON.parse(secret);
            } catch (error) {
              if (error instanceof ResourceNotFoundException) {
                throw new Error(`Secret '${secretName}' not found — check region and name`);
              }
              throw error;
            }
          Note: always check both SecretString and SecretBinary — only one is populated.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetSecretValue.html"
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/secrets-manager/"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high

  - name: BatchGetSecretValueCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Retrieves the values of up to 20 secrets in a single API call. Returns a
      response containing both SecretValues (successes) and Errors (per-secret
      failures). CRITICAL BEHAVIORAL DIFFERENCE from GetSecretValueCommand:
      per-secret failures do NOT throw — they appear silently in response.Errors[].
      The overall call succeeds (Promise resolves) even if every secret failed.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_BatchGetSecretValue.html
      # Error types confirmed from dist-types/commands/BatchGetSecretValueCommand.d.ts @throws annotations
      # CRITICAL: response.Errors[] behavior documented in API reference: "If Secrets Manager
      # encounters errors such as AccessDeniedException while attempting to retrieve any of the
      # secrets, you can see the errors in Errors in the response."
      - id: batch-get-secret-partial-failure-unchecked
        maturity: stable
        severity: error
        condition: >
          BatchGetSecretValueCommand returns HTTP 200 (Promise resolves) even when
          individual secrets fail; per-secret errors appear in response.Errors[] but
          caller does not check response.Errors after the call
        required_handling: >
          Always check response.Errors after the call:
            const response = await smClient.send(new BatchGetSecretValueCommand({
              SecretIdList: ['db/prod', 'api/stripe', 'jwt/signing-key']
            }));

            if (response.Errors && response.Errors.length > 0) {
              const failures = response.Errors.map(e =>
                `${e.SecretId}: ${e.ErrorCode} — ${e.Message}`
              ).join('\n');
              throw new Error(`BatchGetSecretValue partial failure:\n${failures}`);
            }

            return response.SecretValues;
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_BatchGetSecretValue.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: batch-get-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new BatchGetSecretValueCommand(...)) without
          a wrapping try-catch; request-level errors (DecryptionFailure for KMS,
          InvalidNextTokenException, InternalServiceError, network failures) still throw
        throws: >
          Request-level errors including DecryptionFailure, InvalidNextTokenException,
          InternalServiceError, and network failures
        required_handling: >
          Wrap the entire call in try-catch to handle request-level failures.
          Also check response.Errors[] for per-secret failures after the call succeeds.
          Both error channels must be handled independently.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_BatchGetSecretValue.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: high

  - name: CreateSecretCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Creates a new secret with an optional initial value. Used during application
      provisioning, infrastructure-as-code bootstrapping, and migration flows.
      Throws ResourceExistsException when a secret with the same name already
      exists — a common failure in idempotent deployment scripts.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_CreateSecret.html
      # Error types confirmed from dist-types/commands/CreateSecretCommand.d.ts @throws annotations
      - id: create-secret-already-exists
        maturity: stable
        severity: error
        condition: >
          a secret with the requested Name already exists in the account and region;
          throws ResourceExistsException (error.name === "ResourceExistsException")
        throws: ResourceExistsException
        required_handling: >
          Handle ResourceExistsException explicitly:
            try {
              await smClient.send(new CreateSecretCommand({ Name, SecretString }));
            } catch (error) {
              if (error instanceof ResourceExistsException) {
                // Secret already exists — update instead
                await smClient.send(new UpdateSecretCommand({ SecretId: Name, SecretString }));
              } else {
                throw error;
              }
            }
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_CreateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: create-secret-kms-encryption-failure
        maturity: stable
        severity: error
        condition: >
          specified KMS key cannot be used to encrypt the secret value — key is disabled,
          deleted, pending deletion, or caller lacks kms:GenerateDataKey and kms:Decrypt
          permissions; throws EncryptionFailure (error.name === "EncryptionFailure")
        throws: EncryptionFailure
        required_handling: >
          Catch EncryptionFailure and verify KMS key status and IAM permissions.
          Log the KMS key ARN and the error. Do not assume the secret was created.
          Alert the on-call team — this requires KMS configuration remediation.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_CreateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: create-secret-limit-exceeded
        maturity: stable
        severity: warning
        condition: >
          request would exceed account-level Secrets Manager quota (default 500,000 secrets
          per account per region) or Tags quota (max 50 tags per secret);
          throws LimitExceededException (error.name === "LimitExceededException")
        throws: LimitExceededException
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_CreateSecret.html"
          - "https://docs.aws.amazon.com/secretsmanager/latest/userguide/reference_limits.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: create-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new CreateSecretCommand(...)) without
          a wrapping try-catch
        throws: >
          ResourceExistsException, EncryptionFailure, LimitExceededException,
          and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. At minimum handle ResourceExistsException to enable
          idempotent provisioning (catch and update instead of failing). Log all
          other errors and re-throw to prevent silent provisioning failures.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_CreateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: PutSecretValueCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Creates a new version of an existing secret by storing a new encrypted value.
      Does NOT create the secret itself — use CreateSecretCommand for that. Used in
      credential rotation flows, configuration updates, and secrets management
      pipelines. Rate limit: do not call more than once per 10 minutes to avoid
      version quota exhaustion (100 versions max, all versions from last 24h kept).
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutSecretValue.html
      # Error types confirmed from dist-types/commands/PutSecretValueCommand.d.ts @throws annotations
      - id: put-secret-value-secret-not-found
        maturity: stable
        severity: error
        condition: >
          specified SecretId does not exist; PutSecretValueCommand requires the secret
          to already exist unlike CreateSecretCommand; throws ResourceNotFoundException
          (error.name === "ResourceNotFoundException")
        throws: ResourceNotFoundException
        required_handling: >
          Catch ResourceNotFoundException and verify the SecretId. Either create
          the secret first with CreateSecretCommand, or check whether the secret name
          differs between environments (dev/staging/prod).
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutSecretValue.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: put-secret-value-version-conflict
        maturity: stable
        severity: error
        condition: >
          ClientRequestToken matches an existing version ID but SecretString or SecretBinary
          values differ from the existing version; throws ResourceExistsException
          (error.name === "ResourceExistsException")
        throws: ResourceExistsException
        required_handling: >
          Catch ResourceExistsException and use a unique ClientRequestToken (e.g., UUID)
          on each rotation attempt, or omit ClientRequestToken to let the SDK generate one.
          Do not reuse deterministic token IDs across calls with different secret values.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutSecretValue.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: put-secret-value-throttling
        maturity: stable
        severity: warning
        condition: >
          PutSecretValue is called more than approximately once per 10 minutes for the
          same secret, exceeding the version quota; throws LimitExceededException
          (error.name === "LimitExceededException")
        throws: LimitExceededException
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutSecretValue.html"
          - "https://docs.aws.amazon.com/secretsmanager/latest/userguide/reference_limits.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: put-secret-value-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new PutSecretValueCommand(...)) without
          a wrapping try-catch
        throws: >
          ResourceNotFoundException, ResourceExistsException, EncryptionFailure,
          LimitExceededException, and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Handle ResourceNotFoundException (secret missing) and
          LimitExceededException (version quota). Log all errors and do not assume
          the rotation succeeded on failure — keep using the old credential until
          rotation is confirmed.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutSecretValue.html"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: UpdateSecretCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Updates the metadata or value of an existing secret. Can update the description,
      KMS key, SecretString, or SecretBinary. When a new value is provided, creates a
      new version (like PutSecretValue). Distinct from PutSecretValueCommand: also
      allows changing the KMS encryption key and description. Throws on the same
      error set as CreateSecretCommand plus version conflicts.
    postconditions:
      # Evidence: confirmed from dist-types/commands/UpdateSecretCommand.d.ts @throws annotations
      # UpdateSecret: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UpdateSecret.html
      - id: update-secret-not-found
        maturity: stable
        severity: error
        condition: >
          specified SecretId does not exist; UpdateSecret cannot create a new secret;
          throws ResourceNotFoundException (error.name === "ResourceNotFoundException")
        throws: ResourceNotFoundException
        required_handling: >
          Catch ResourceNotFoundException and verify the secret exists before updating.
          Either create the secret first with CreateSecretCommand or validate the
          SecretId is correct for the target environment.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UpdateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: update-secret-kms-errors
        maturity: stable
        severity: error
        condition: >
          existing secret cannot be decrypted with the current KMS key (DecryptionFailure),
          or new value cannot be encrypted with specified KMS key (EncryptionFailure);
          common when rotating KMS keys or migrating to customer-managed keys
        throws: DecryptionFailure or EncryptionFailure
        required_handling: >
          Catch DecryptionFailure and EncryptionFailure separately. Log the KMS key ARN
          and alert the on-call team — KMS errors require manual key configuration
          remediation and cannot be resolved by retrying.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UpdateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: update-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new UpdateSecretCommand(...)) without
          a wrapping try-catch
        throws: >
          ResourceNotFoundException, DecryptionFailure, EncryptionFailure,
          LimitExceededException, and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Handle ResourceNotFoundException for missing secrets
          and KMS errors for encryption failures. Log failures and do not assume
          the update succeeded — stale secret values may remain in use silently.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UpdateSecret.html"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: DeleteSecretCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Schedules a secret for deletion with a recovery window (default 30 days,
      minimum 7 days). The secret cannot be retrieved during the recovery window
      but can be restored with RestoreSecretCommand. Optionally, ForceDeleteWithoutRecovery
      permanently deletes the secret immediately — a destructive operation with no
      recovery path. Special behavior: ForceDeleteWithoutRecovery on a
      non-existent or already-deleted secret succeeds without error.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_DeleteSecret.html
      # Error types confirmed from dist-types/commands/DeleteSecretCommand.d.ts @throws annotations
      # CRITICAL behavioral note confirmed from docs: "If you forcibly delete an already deleted
      # or nonexistent secret, the operation does not return ResourceNotFoundException."
      - id: delete-secret-recovery-window-not-immediate
        maturity: stable
        severity: warning
        condition: >
          DeleteSecretCommand with RecoveryWindowInDays (default 30 days) does NOT
          immediately destroy the secret; the secret name cannot be reused until the
          window expires; GetSecretValueCommand on a scheduled-deletion secret throws
          InvalidRequestException, not ResourceNotFoundException
        required_handling: >
          Use RecoveryWindowInDays: 7 for the minimum window, or
          ForceDeleteWithoutRecovery: true for immediate permanent deletion.
          If creating a replacement secret immediately after deletion, use a
          different name or wait for the recovery window to expire.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_DeleteSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: delete-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new DeleteSecretCommand(...)) without
          a wrapping try-catch; ResourceNotFoundException (for normal delete of
          non-existent secret), InvalidRequestException, and network errors propagate;
          note: ForceDeleteWithoutRecovery on a non-existent secret does NOT throw
        throws: >
          ResourceNotFoundException, InvalidRequestException, and network errors
          propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Handle ResourceNotFoundException to make delete idempotent
          (catch and continue if secret doesn't exist). Handle InvalidRequestException
          for secrets managed by other services. Log all other errors.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_DeleteSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: RotateSecretCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Configures rotation and/or triggers an immediate rotation of a secret.
      Rotation is ASYNCHRONOUS — the RotateSecret API call returns immediately
      (with the new VersionId) but the actual secret value change happens later
      when the Lambda rotation function completes. The caller cannot assume the
      rotated value is immediately available after the API call returns.
      Requires a Lambda rotation function ARN unless managed rotation is configured.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_RotateSecret.html
      # Error types confirmed from dist-types/commands/RotateSecretCommand.d.ts @throws annotations
      # CRITICAL: "Rotation is an asynchronous process" — confirmed from docs
      # "any later invocation of RotateSecret assumes that a previous rotation request
      # is still in progress and returns an error" — confirmed from docs
      - id: rotate-secret-async-completion-assumed
        maturity: stable
        severity: warning
        condition: >
          RotateSecretCommand resolves immediately with the new VersionId, but the
          rotation Lambda function runs asynchronously; code reads the secret immediately
          after RotateSecretCommand returns and may read the old AWSCURRENT value or an
          intermediate AWSPENDING value
        required_handling: >
          After calling RotateSecretCommand, poll DescribeSecretCommand until
          response.RotationEnabled === true and response.LastRotatedDate is updated,
          or implement a wait before reading the new value:
            const rotateResult = await smClient.send(new RotateSecretCommand({
              SecretId: secretName,
              RotateImmediately: true
            }));
            // Do NOT immediately read the secret — wait for Lambda to complete
            // Poll DescribeSecret until LastRotatedDate changes, or use SQS notification
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_RotateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: rotate-secret-lambda-not-configured
        maturity: stable
        severity: error
        condition: >
          RotateImmediately is true but no RotationLambdaARN is provided and no rotation
          Lambda has been previously configured, or the Lambda function ARN is invalid
          or deleted; throws InvalidRequestException
          (error.name === "InvalidRequestException")
        throws: InvalidRequestException
        required_handling: >
          Catch InvalidRequestException and check that a rotation Lambda function is
          configured for the secret before calling RotateSecretCommand. Set up the
          Lambda ARN via RotationLambdaARN parameter or via the AWS console first.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_RotateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: rotate-secret-in-progress
        maturity: stable
        severity: warning
        condition: >
          a previous rotation is still in progress (AWSPENDING label is present but not
          yet attached to AWSCURRENT); calling RotateSecret again while rotation is in
          progress always throws InvalidRequestException
          (error.name === "InvalidRequestException")
        throws: InvalidRequestException
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_RotateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: rotate-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new RotateSecretCommand(...)) without
          a wrapping try-catch
        throws: >
          InvalidRequestException (Lambda not configured, rotation in progress),
          ResourceNotFoundException, and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Handle InvalidRequestException to detect rotation-in-progress
          vs Lambda-not-configured cases (check error.message). Log all errors — a failed
          rotation call means credentials were NOT rotated despite the caller expecting
          the rotation to have started.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_RotateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: UpdateSecretVersionStageCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Modifies the staging labels attached to a version of a secret. Used in custom
      rotation Lambda functions to promote a new secret version to AWSCURRENT
      (zero-downtime credential rotation) and in CI/CD pipelines to track deployment
      state via custom staging labels. Moving AWSCURRENT automatically moves the
      AWSPREVIOUS label. Used as the final step in rotation workflows to atomically
      flip active credentials.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UpdateSecretVersionStage.html
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/userguide/reference_limits.html
      # Error types confirmed from dist-types/commands/UpdateSecretVersionStageCommand.d.ts @throws annotations
      - id: update-secret-version-stage-limit-exceeded
        maturity: stable
        severity: error
        condition: >
          total staging labels attached across all versions of the secret reaches
          the hard limit of 20; each custom label added without removing old ones
          exhausts the quota; throws LimitExceededException
          (error.name === "LimitExceededException")
        throws: LimitExceededException
        required_handling: >
          Before adding a new staging label, check existing labels via
          ListSecretVersionIds. Clean up obsolete custom labels to stay under the
          limit of 20 labels across all versions. Rotation Lambdas that accumulate
          custom labels per deployment will hit this limit after 20 deployments if
          labels are never removed.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UpdateSecretVersionStage.html"
          - "https://docs.aws.amazon.com/secretsmanager/latest/userguide/reference_limits.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: update-secret-version-stage-invalid-request
        maturity: stable
        severity: error
        condition: >
          the secret is scheduled for deletion, the label being moved is AWSCURRENT
          but RemoveFromVersionId is missing or mismatched, the secret is managed
          by another AWS service (e.g., RDS managed rotation), or the label is
          already the only label on a version (removing it would deprecate the version
          unexpectedly); throws InvalidRequestException
          (error.name === "InvalidRequestException")
        throws: InvalidRequestException
        required_handling: >
          Handle InvalidRequestException to detect state conflicts. When using
          UpdateSecretVersionStage to promote AWSCURRENT during rotation, always
          provide both MoveToVersionId and RemoveFromVersionId to avoid ambiguous
          state transitions. Check error.message for details on which constraint
          was violated.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UpdateSecretVersionStage.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: update-secret-version-stage-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new UpdateSecretVersionStageCommand(...))
          without a wrapping try-catch
        throws: >
          LimitExceededException, InvalidRequestException, ResourceNotFoundException,
          and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Failed UpdateSecretVersionStage in a rotation Lambda
          means the new secret version was never promoted to AWSCURRENT — the old
          (possibly expired/rotated) credentials remain active while the application
          believes rotation completed. This is a silent security incident.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UpdateSecretVersionStage.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: degraded_performance
          incident_cost_range: high

  - name: CancelRotateSecretCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Turns off automatic rotation and cancels any rotation currently in progress.
      Used in incident response when a rotation is stuck (Lambda failure, network
      timeout) or when rotation needs to be rolled back. Cancelling mid-rotation
      leaves the AWSPENDING label on an incomplete version — callers must manually
      clean up the orphaned version to prevent future rotation failures.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_CancelRotateSecret.html
      # Error types confirmed from dist-types/commands/CancelRotateSecretCommand.d.ts @throws annotations
      - id: cancel-rotate-secret-orphaned-pending-version
        maturity: stable
        severity: warning
        condition: >
          rotation is cancelled mid-flight (AWSPENDING label attached to an incomplete
          version); the response.VersionId field is populated with the incomplete
          version that must be cleaned up; leaving it uncleaned can block future
          rotations from starting (no-try-catch means the caller never sees
          response.VersionId)
        throws: >
          does not throw — response.VersionId contains the orphaned version ID;
          the risk is NOT handling the returned VersionId
        required_handling: >
          After calling CancelRotateSecretCommand, always check response.VersionId.
          If present, call UpdateSecretVersionStage to remove the AWSPENDING label
          from that version. Failing to clean up leaves a partial version that
          blocks re-enabling rotation.

          Example cleanup:
            const result = await smClient.send(new CancelRotateSecretCommand({
              SecretId: 'my/secret'
            }));
            if (result.VersionId) {
              await smClient.send(new UpdateSecretVersionStageCommand({
                SecretId: 'my/secret',
                VersionStage: 'AWSPENDING',
                RemoveFromVersionId: result.VersionId,
              }));
            }
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_CancelRotateSecret.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: cancel-rotate-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new CancelRotateSecretCommand(...))
          without a wrapping try-catch
        throws: >
          InvalidRequestException (secret is managed by another service),
          ResourceNotFoundException, and network errors propagate as unhandled
          rejections
        required_handling: >
          Wrap in try-catch. Incident response scripts that call CancelRotateSecret
          must handle errors — if the cancel fails, rotation continues running
          and the incident response action had no effect.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_CancelRotateSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: PutResourcePolicyCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Attaches a resource-based permission policy to a secret. Used to grant
      cross-account access to secrets (e.g., allowing a different AWS account or
      Lambda function to read a shared secret). The BlockPublicPolicy parameter
      prevents accidentally granting public access. This is a security-critical
      operation — policy mistakes can expose secrets to unintended principals.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutResourcePolicy.html
      # Error types confirmed from dist-types/commands/PutResourcePolicyCommand.d.ts @throws annotations
      - id: put-resource-policy-public-policy-exception
        maturity: stable
        severity: error
        condition: >
          BlockPublicPolicy is true and the provided policy grants overly broad
          access (e.g., principal is "*" or uses wildcards that AWS evaluates as
          public access); throws PublicPolicyException
          (error.name === "PublicPolicyException")
        throws: PublicPolicyException
        required_handling: >
          Catch PublicPolicyException and reject the policy. This exception is
          the guard that prevents accidental secret exposure. Never suppress it
          silently — it means the policy as written would expose the secret to
          the public. Always set BlockPublicPolicy: true in production environments.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutResourcePolicy.html"
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: critical

      - id: put-resource-policy-malformed-policy
        maturity: stable
        severity: error
        condition: >
          the ResourcePolicy JSON string has syntax errors or references invalid
          AWS principals/actions; throws MalformedPolicyDocumentException
          (error.name === "MalformedPolicyDocumentException")
        throws: MalformedPolicyDocumentException
        required_handling: >
          Validate IAM policy JSON before calling PutResourcePolicy. Catch
          MalformedPolicyDocumentException and log error.message which contains
          AWS policy parser details about the specific syntax issue. Use
          ValidateResourcePolicyCommand to pre-validate before applying.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutResourcePolicy.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: put-resource-policy-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new PutResourcePolicyCommand(...))
          without a wrapping try-catch
        throws: >
          PublicPolicyException, MalformedPolicyDocumentException,
          InvalidRequestException, ResourceNotFoundException, and network errors
          propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. A failed PutResourcePolicy in cross-account setup
          scripts means the intended principal cannot access the secret — silent
          failure causes access denials that are difficult to diagnose.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_PutResourcePolicy.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: RestoreSecretCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Cancels the scheduled deletion of a secret, restoring access. Only works
      during the deletion recovery window (1-30 days after DeleteSecretCommand was
      called). Used in disaster recovery scripts when a secret was accidentally
      deleted. The secret cannot be accessed while scheduled for deletion — only
      RestoreSecret can re-enable it.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_RestoreSecret.html
      # Error types confirmed from dist-types/commands/RestoreSecretCommand.d.ts @throws annotations
      - id: restore-secret-invalid-request
        maturity: stable
        severity: error
        condition: >
          the secret is NOT scheduled for deletion (RestoreSecret is called on
          an active, non-deleted secret) or the secret was force-deleted with
          ForceDeleteWithoutRecovery (no recovery window exists); throws
          InvalidRequestException (error.name === "InvalidRequestException")
        throws: InvalidRequestException
        required_handling: >
          Before calling RestoreSecret, verify the secret is in a deleted state
          by calling DescribeSecretCommand and checking response.DeletedDate.
          Catch InvalidRequestException and check error.message to distinguish
          "not in deleted state" from "force-deleted with no recovery window".
          Force-deleted secrets are permanently gone and cannot be restored.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_RestoreSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: restore-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new RestoreSecretCommand(...))
          without a wrapping try-catch
        throws: >
          InvalidRequestException (not in deleted state or force-deleted),
          ResourceNotFoundException (secret name not found), and network errors
          propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Disaster recovery scripts that call RestoreSecret
          must handle errors — an unhandled rejection means the script silently
          failed and the secret remains inaccessible.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_RestoreSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DescribeSecretCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Retrieves the details and metadata of a secret without returning its value.
      Used heavily in rotation status polling (checking response.LastRotatedDate
      and response.RotationEnabled), health-check endpoints, and replication
      status monitoring (response.ReplicationStatus[]). Common in cron jobs and
      observability code paths. Does NOT return the secret value — use
      GetSecretValueCommand for that.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_DescribeSecret.html
      # Error types confirmed from dist-types/commands/DescribeSecretCommand.d.ts @throws annotations:
      #   InternalServiceError, InvalidParameterException, ResourceNotFoundException
      - id: describe-secret-not-found
        maturity: stable
        severity: error
        condition: >
          specified SecretId does not exist, the ARN references a deleted secret,
          or the secret was created in a different region; throws
          ResourceNotFoundException (error.name === "ResourceNotFoundException")
        throws: ResourceNotFoundException
        required_handling: >
          Catch ResourceNotFoundException explicitly. DescribeSecret is often
          called from monitoring code paths where a missing secret should be
          alerted rather than silently swallowed. Either return null/default
          for optional secrets or throw a descriptive error naming the
          environment and region.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_DescribeSecret.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: describe-secret-rotation-status-stale-read
        maturity: stable
        severity: warning
        condition: >
          caller invokes DescribeSecretCommand inside a polling loop (e.g.
          waiting for RotateSecretCommand to complete) but reads response.LastRotatedDate
          or response.NextRotationDate without checking that the rotation Lambda
          actually completed (response.RotationEnabled === true AND
          response.LastRotatedDate is recent); stale rotation status produces
          false "rotation succeeded" signals
        required_handling: >
          When polling DescribeSecret for rotation completion:
            const before = await smClient.send(new DescribeSecretCommand({ SecretId }));
            await smClient.send(new RotateSecretCommand({ SecretId, RotateImmediately: true }));

            // Poll until LastRotatedDate moves forward
            let attempts = 0;
            while (attempts++ < MAX_ATTEMPTS) {
              await sleep(POLL_INTERVAL_MS);
              const status = await smClient.send(new DescribeSecretCommand({ SecretId }));
              if (status.LastRotatedDate
                  && (!before.LastRotatedDate
                      || status.LastRotatedDate > before.LastRotatedDate)) {
                return; // rotation completed
              }
            }
            throw new Error('Rotation polling timed out — Lambda may have failed');
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_DescribeSecret.html"
          - "https://docs.aws.amazon.com/secretsmanager/latest/userguide/rotating-secrets.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: describe-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new DescribeSecretCommand(...)) without
          a wrapping try-catch
        throws: >
          ResourceNotFoundException, InvalidParameterException, InternalServiceError,
          and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. DescribeSecret is often called from health-check
          endpoints and rotation status pollers — unhandled rejections crash
          monitoring jobs and falsely signal that rotation is broken. Distinguish
          ResourceNotFoundException (alert: secret missing) from
          InternalServiceError (alert: AWS issue, retry with backoff).
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_DescribeSecret.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: ReplicateSecretToRegionsCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Replicates an existing secret to one or more secondary AWS regions for
      multi-region disaster recovery. Returns a response containing
      ARN and ReplicationStatus[] — an array of per-region status entries.
      CRITICAL BEHAVIORAL DIFFERENCE: per-region replication failures do NOT
      throw — they appear silently in response.ReplicationStatus[] with
      Status === "Failed" and a StatusMessage. The overall call succeeds
      (Promise resolves with HTTP 200) even when every replica fails. This
      pattern matches BatchGetSecretValueCommand's silent partial-failure
      behavior. Used in cross-region failover setup and compliance pipelines.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_ReplicateSecretToRegions.html
      # Per-region status documented in ReplicationStatusType:
      # "The status can be InProgress, Failed, or InSync" — confirmed from
      # @aws-sdk/client-secrets-manager dist-types/models/models_0.d.ts lines 390-413
      # @throws confirmed from ReplicateSecretToRegionsCommand.d.ts:
      #   InternalServiceError, InvalidParameterException, InvalidRequestException, ResourceNotFoundException
      - id: replicate-secret-per-region-failure-unchecked
        maturity: stable
        severity: error
        condition: >
          ReplicateSecretToRegionsCommand returns HTTP 200 (Promise resolves) even when
          individual region replications fail; per-region errors appear in
          response.ReplicationStatus[] with Status === "Failed" but the caller does
          not iterate response.ReplicationStatus to check each region's status
        required_handling: >
          Always check response.ReplicationStatus after the call:
            const result = await smClient.send(new ReplicateSecretToRegionsCommand({
              SecretId: SECRET_ID,
              AddReplicaRegions: [{ Region: 'us-west-2' }, { Region: 'eu-west-1' }]
            }));

            const failures = (result.ReplicationStatus ?? []).filter(
              s => s.Status === 'Failed'
            );
            if (failures.length > 0) {
              const detail = failures
                .map(f => `${f.Region}: ${f.StatusMessage ?? 'unknown'}`)
                .join('\n');
              throw new Error(`Replication failed in regions:\n${detail}`);
            }

            // Also track InProgress — replication is async per region
            const pending = (result.ReplicationStatus ?? []).filter(
              s => s.Status === 'InProgress'
            );
            return { replicated: result.ReplicationStatus, pending };
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_ReplicateSecretToRegions.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: replicate-secret-async-completion-assumed
        maturity: stable
        severity: warning
        condition: >
          ReplicateSecretToRegionsCommand resolves with Status === "InProgress"
          for some regions; caller assumes replication completed and immediately
          uses the replica in another region, before AWS has finished provisioning
        required_handling: >
          After calling ReplicateSecretToRegionsCommand, do NOT assume the secret
          is immediately available in the target region. Poll DescribeSecretCommand
          (with the region client switched to the replica region) and check
          ReplicationStatus until Status === "InSync" before depending on the
          replica. Document a wait window in disaster-recovery runbooks.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_ReplicateSecretToRegions.html"
          - "https://docs.aws.amazon.com/secretsmanager/latest/userguide/create-manage-multi-region-secrets.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: replicate-secret-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new ReplicateSecretToRegionsCommand(...))
          without a wrapping try-catch; request-level errors (the secret itself
          does not exist, invalid parameters, internal service errors, KMS
          permission failures in the target region) still throw, distinct from
          per-region Failed entries
        throws: >
          ResourceNotFoundException, InvalidParameterException, InvalidRequestException,
          InternalServiceError, and network errors propagate as unhandled rejections
        required_handling: >
          Wrap the entire call in try-catch to handle request-level failures.
          ALSO iterate response.ReplicationStatus to detect per-region Failed
          entries. Both error channels must be handled independently — a
          failed try-catch means no replication started; a Failed entry means
          one specific region's replica is broken while others may have succeeded.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_ReplicateSecretToRegions.html"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: catastrophic
          user_experience: lost_data
          incident_cost_range: high

  - name: ValidateResourcePolicyCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Validates a resource-based policy JSON string against IAM policy syntax
      rules WITHOUT attaching it to a secret. Used as a pre-flight check before
      PutResourcePolicyCommand to catch policy errors early. Like
      BatchGetSecretValueCommand and ReplicateSecretToRegionsCommand, this command
      has a SILENT-FAILURE response pattern — invalid policies do not throw,
      they return response.PolicyValidationPassed === false with per-error
      detail in response.ValidationErrors[]. A caller that ignores
      PolicyValidationPassed believes the policy is valid when it is not.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_ValidateResourcePolicy.html
      # Silent failure shape confirmed from @aws-sdk/client-secrets-manager
      # dist-types/models/models_0.d.ts lines 1930-1957 (ValidateResourcePolicyResponse):
      #   PolicyValidationPassed?: boolean | undefined;
      #   ValidationErrors?: ValidationErrorsEntry[] | undefined;
      # @throws confirmed from ValidateResourcePolicyCommand.d.ts:
      #   InternalServiceError, InvalidParameterException, InvalidRequestException,
      #   MalformedPolicyDocumentException, ResourceNotFoundException
      - id: validate-resource-policy-passed-flag-unchecked
        maturity: stable
        severity: error
        condition: >
          ValidateResourcePolicyCommand returns HTTP 200 (Promise resolves) with
          response.PolicyValidationPassed === false when the policy fails AWS-side
          validation, but the caller does not check PolicyValidationPassed before
          proceeding to call PutResourcePolicyCommand with the same policy;
          a broken policy is attached and the validation pre-flight is rendered
          useless
        required_handling: >
          Always check response.PolicyValidationPassed before applying the policy:
            const validation = await smClient.send(new ValidateResourcePolicyCommand({
              SecretId: SECRET_ID,
              ResourcePolicy: policyJson,
            }));

            if (!validation.PolicyValidationPassed) {
              const detail = (validation.ValidationErrors ?? [])
                .map(e => `[${e.CheckName}] ${e.ErrorMessage}`)
                .join('\n');
              throw new Error(`Resource policy invalid:\n${detail}`);
            }

            // Only NOW apply the policy
            await smClient.send(new PutResourcePolicyCommand({
              SecretId: SECRET_ID,
              ResourcePolicy: policyJson,
              BlockPublicPolicy: true,
            }));
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_ValidateResourcePolicy.html"
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high

      - id: validate-resource-policy-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new ValidateResourcePolicyCommand(...))
          without a wrapping try-catch; request-level errors throw distinct from
          the PolicyValidationPassed === false silent-failure path
        throws: >
          MalformedPolicyDocumentException (JSON syntax error in the policy),
          ResourceNotFoundException (secret name not found), InvalidParameterException,
          InternalServiceError, and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Catch MalformedPolicyDocumentException specifically —
          this means the policy JSON itself is unparseable, distinct from
          PolicyValidationPassed === false (parseable but semantically wrong).
          Both must be handled to make policy validation reliable.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_ValidateResourcePolicy.html"
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: TagResourceCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Attaches up to 50 tags (key-value pairs) to a secret. Tags are used for
      cost allocation, IAM policy conditions (e.g. allowing access only to
      secrets tagged with a specific Environment), and inventory management.
      Hitting the per-secret tag limit (50 tags) throws LimitExceededException.
      Used heavily in infrastructure-as-code provisioning and compliance
      tagging pipelines. Tag failures in CI/CD often go unnoticed and lead to
      cost-allocation reports missing entire categories of secrets.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_TagResource.html
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/userguide/reference_limits.html
      # @throws confirmed from TagResourceCommand.d.ts:
      #   InternalServiceError, InvalidParameterException, InvalidRequestException, ResourceNotFoundException
      # LimitExceededException additionally documented in TagResource API reference
      - id: tag-resource-limit-exceeded
        maturity: stable
        severity: warning
        condition: >
          total tags attached to the secret would exceed the per-secret limit of
          50 tags; throws LimitExceededException
          (error.name === "LimitExceededException")
        throws: LimitExceededException
        required_handling: >
          Before adding tags, count existing tags via DescribeSecretCommand and
          response.Tags.length. Either remove obsolete tags via UntagResourceCommand
          or batch the tagging operation. Compliance scripts that blindly add a
          tag-per-deployment will hit this limit after 50 deployments.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_TagResource.html"
          - "https://docs.aws.amazon.com/secretsmanager/latest/userguide/reference_limits.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

      - id: tag-resource-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new TagResourceCommand(...)) without
          a wrapping try-catch
        throws: >
          ResourceNotFoundException, LimitExceededException, InvalidParameterException,
          InvalidRequestException, and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. CI/CD tagging pipelines that fail silently produce
          cost allocation reports missing entire categories of secrets and break
          IAM policies that use tag conditions for access control. Treat tagging
          failures as deployment failures, not silent warnings.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_TagResource.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: GetRandomPasswordCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Generates a cryptographically random password using AWS infrastructure.
      Primarily used INSIDE rotation Lambda functions to generate the new
      AWSPENDING secret value, and in provisioning scripts to seed initial
      passwords. Returns response.RandomPassword (string). Throws on parameter
      validation errors (negative length, conflicting character class flags) but
      NOT on length=0 or empty exclusion strings — those silently produce
      degenerate output. Rotation Lambdas that catch nothing here may write a
      weak/empty password back via PutSecretValueCommand.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetRandomPassword.html
      # @throws confirmed from GetRandomPasswordCommand.d.ts:
      #   InternalServiceError, InvalidParameterException, InvalidRequestException
      - id: get-random-password-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new GetRandomPasswordCommand(...)) without
          a wrapping try-catch; failures here in rotation Lambdas mean rotation
          stalls AND CloudWatch sees an uncaught exception in the Lambda, marking
          rotation as failed without rolling back any partial state
        throws: >
          InvalidParameterException (invalid PasswordLength, conflicting
          IncludeSpace/ExcludeCharacters), InvalidRequestException,
          InternalServiceError, and network errors propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Inside a rotation Lambda, a GetRandomPassword failure
          must be caught and re-thrown with rotation-specific context so the
          AWSPENDING label is never created with a missing or partial value.
          Outside rotation, log the failure and never fall back to a weak
          deterministic password.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_GetRandomPassword.html"
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: UntagResourceCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Removes specific tags from a secret. This is the parity inverse of
      TagResourceCommand and is documented as idempotent: missing tags do NOT
      throw. The risk surface is NOT the missing-tag case — it is silent loss of
      access when tags are part of an IAM policy condition (the AWS docs warn:
      "If you use tags as part of your security strategy, then removing a tag
      can change permissions. If successfully completing this operation would
      result in you losing your permissions for this secret, then the operation
      is blocked and returns an Access Denied error"). Compliance and
      cost-allocation pipelines that strip stale tags without try-catch
      silently fail when the calling principal's IAM permissions depend on the
      very tag being removed.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UntagResource.html
      # @throws confirmed from UntagResourceCommand.d.ts:
      #   InternalServiceError, InvalidParameterException, InvalidRequestException, ResourceNotFoundException
      # AccessDeniedException additionally documented in the operation description
      # (removing a tag that an IAM policy condition depends on locks the caller
      # out of subsequent operations on the same secret).
      - id: untag-resource-self-lockout
        maturity: stable
        severity: warning
        condition: >
          caller removes a tag whose key appears in an IAM policy condition that
          grants the caller access to the secret; the operation is blocked and
          AWS returns AccessDeniedException; subsequent calls on the same secret
          from the same principal will also fail
        throws: >
          AccessDeniedException (error.name === "AccessDeniedException") when the
          tag removal would strip the calling principal's own access; the secret
          remains tagged but the caller can no longer act on it
        required_handling: >
          Before calling UntagResourceCommand in automated compliance scripts,
          enumerate the IAM policies governing the secret (or maintain a list of
          tag keys that participate in access control) and refuse to remove tags
          whose keys appear in those conditions. Catch AccessDeniedException
          explicitly and surface it as a configuration error, NOT a generic
          retry-able failure — retrying will fail identically and add noise.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UntagResource.html"
          - "https://docs.aws.amazon.com/secretsmanager/latest/userguide/auth-and-access_examples.html"
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

      - id: untag-resource-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new UntagResourceCommand(...)) without
          a wrapping try-catch; while missing tags are idempotent, the operation
          still throws on ResourceNotFoundException (wrong secret ARN),
          InvalidRequestException (secret scheduled for deletion or managed by
          another service), and AccessDeniedException (self-lockout via tag-based
          IAM condition); network errors also propagate
        throws: >
          ResourceNotFoundException, InvalidRequestException, AccessDeniedException,
          InvalidParameterException, InternalServiceError, and network errors
          propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Compliance scripts that strip stale tags from
          hundreds of secrets must surface per-secret failures; an unhandled
          rejection in a batch tag-cleanup job leaves the secret partially
          re-tagged and the report partially populated, which is worse than
          a clean failure because the operator believes the cleanup succeeded.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_UntagResource.html"
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: StopReplicationToReplicaCommand
    import_path: "@aws-sdk/client-secrets-manager"
    description: >
      Removes the link between a replica secret and its primary secret and
      promotes the replica to a primary secret in the replica Region. This is
      an IRREVERSIBLE one-way action — once the replica is promoted, the link
      to the original primary is severed and the new primary diverges
      immediately on the next PutSecretValue. Must be called FROM the Region
      where promotion is desired, not from the primary's Region. Used in
      disaster recovery (the primary Region is unavailable) and in deliberate
      replica-to-primary migrations. Failure to handle errors here can leave
      the replication topology in a half-promoted state where the
      "old primary" and "new primary" both believe they own the secret,
      causing rotation conflicts and data divergence.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_StopReplicationToReplica.html
      # @throws confirmed from StopReplicationToReplicaCommand.d.ts:
      #   InternalServiceError, InvalidParameterException, InvalidRequestException, ResourceNotFoundException
      # The "must be called from the replica Region" constraint is documented in the
      # operation description ("You must call this operation from the Region in which
      # you want to promote the replica to a primary secret").
      - id: stop-replication-wrong-region-invocation
        maturity: stable
        severity: error
        condition: >
          caller invokes StopReplicationToReplicaCommand from the primary
          Region's client (not the replica Region's client); AWS rejects the
          call with InvalidRequestException because the operation only
          succeeds when issued against the replica's own regional endpoint
        throws: >
          InvalidRequestException (error.name === "InvalidRequestException") with
          a message indicating the operation must be invoked from the replica's
          Region; the topology is unchanged but disaster-recovery automation
          believes promotion has begun
        required_handling: >
          Always construct a NEW SecretsManagerClient pinned to the replica
          Region for this call (e.g. `new SecretsManagerClient({ region: replicaRegion })`)
          — do NOT reuse the primary-region client. Catch InvalidRequestException
          and verify the client's resolved region matches the intended replica
          before retrying. Treat this as a programming error, not a transient
          failure; retrying with the same client will fail identically.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_StopReplicationToReplica.html"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: stop-replication-no-try-catch
        maturity: stable
        severity: error
        condition: >
          caller invokes await smClient.send(new StopReplicationToReplicaCommand(...))
          without a wrapping try-catch; this is an IRREVERSIBLE promotion of the
          replica to a primary — any unhandled rejection in disaster-recovery
          automation aborts the failover with no rollback path, leaving the
          original primary still authoritative while operators believe failover
          has begun
        throws: >
          InvalidRequestException (wrong-region call, secret managed by another
          service, secret scheduled for deletion), ResourceNotFoundException,
          InvalidParameterException, InternalServiceError, and network errors
          propagate as unhandled rejections
        required_handling: >
          Wrap in try-catch. Disaster recovery runbooks MUST log the exact
          error before retrying and MUST NOT proceed to dependent steps (e.g.
          updating Route53 to point at the new primary Region) until the
          promotion is confirmed via DescribeSecretCommand showing
          ReplicationStatus is empty / PrimaryRegion is the replica's region.
          Treat StopReplicationToReplica failure as a STOP-THE-LINE event in
          failover automation — silent retries can produce split-brain
          topologies where two regions both believe they own the secret.
        sources:
          - "https://docs.aws.amazon.com/secretsmanager/latest/apireference/API_StopReplicationToReplica.html"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high


notes:
  - "AWS SDK v3 uses command pattern: client.send(new XxxCommand(params)). All operations use the same send() entry point."
  - "error.name contains the specific AWS error code (e.g., 'ResourceNotFoundException', 'AccessDeniedException')"
  - "error.$retryable.throttling is true for ThrottlingException — implement exponential backoff"
  - "GetSecretValueCommand returns SecretString (for text) or SecretBinary (for binary) — check which field is populated, not both"
  - "ResourceNotFoundException on GetSecretValueCommand can mean: wrong name, wrong region, or secret was deleted"
  - "SecretsManagerClient instance is reusable across multiple send() calls — no per-call instantiation needed"
  - "BatchGetSecretValueCommand has SILENT per-secret failures — always check response.Errors[] even on HTTP 200"
  - "DeleteSecretCommand default recovery window: 30 days. Minimum: 7 days. ForceDeleteWithoutRecovery: immediate, no recovery"
  - "RotateSecretCommand is ASYNCHRONOUS — returns before the Lambda function completes rotation"
  - "PutSecretValue rate limit: max once per 10 minutes per secret to avoid version quota exhaustion"
  - "ResourceExistsException on CreateSecretCommand means secret already exists — use UpdateSecretCommand instead"
  - "Intentionally omitted (5 remaining): ListSecretsCommand, ListSecretVersionIdsCommand (read-only/pagination with generic InvalidNextTokenException only), GetResourcePolicyCommand (read-only GET paired with already-contracted PutResourcePolicyCommand), DeleteResourcePolicyCommand (admin delete paired with PutResourcePolicyCommand — revisit if real-world usage emerges), RemoveRegionsFromReplicationCommand (per-region success/failure surfaces in response.ReplicationStatus[] already covered by replicate-secret-per-region-failure-unchecked) - no unique behavioral contracts beyond generic error handling. (Promoted from omitted 2026-06-24: UntagResourceCommand — AccessDeniedException self-lockout when removing tags participating in IAM conditions; StopReplicationToReplicaCommand — irreversible primary promotion, wrong-region invocation hazard. Promoted 2026-06-12: DescribeSecretCommand, ReplicateSecretToRegionsCommand, ValidateResourcePolicyCommand, TagResourceCommand, GetRandomPasswordCommand. Promoted 2026-06-11: CancelRotateSecretCommand, PutResourcePolicyCommand, RestoreSecretCommand, UpdateSecretVersionStageCommand)"
