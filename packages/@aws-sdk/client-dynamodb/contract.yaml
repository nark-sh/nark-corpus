package: "@aws-sdk/client-dynamodb"
semver: ">=3.0.0 <4.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-23"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0

functions:
  - name: send
    import_path: "@aws-sdk/client-dynamodb"
    description: >
      Sends any DynamoDB command via the DynamoDBClient. The single entry point for all DynamoDB
      operations in AWS SDK v3 — reads, writes, deletes, queries, scans, batch operations, and
      transactions. Returns a Promise that rejects on any network failure, capacity exhaustion,
      conditional check failure, transaction cancellation, or AWS service error.

    postconditions:
      - id: aws-dynamodb-service-error
        condition: >
          Any AWS service error or network failure: table does not exist
          (ResourceNotFoundException), throughput exceeded
          (ProvisionedThroughputExceededException), conditional expression failed
          (ConditionalCheckFailedException), transaction cancelled
          (TransactionCanceledException), concurrent transaction conflict
          (TransactionConflictException), account rate limit exceeded
          (RequestLimitExceeded), malformed parameters (ValidationException),
          permission denied (AccessDeniedException), service unavailable
          (ServiceUnavailable), or any network-level failure (DNS, timeout,
          connection refused)
        throws: >
          DynamoDBServiceException subclass with error.name set to the specific error code
          (e.g., "ResourceNotFoundException", "ProvisionedThroughputExceededException",
          "ConditionalCheckFailedException", "TransactionCanceledException").
          For network errors, throws a generic Error or SdkClientError.
        required_handling: >
          Caller MUST wrap client.send() in try-catch. All DynamoDB operations can fail due
          to network issues, throughput limits, conditional check failures, or AWS service
          outages. Unhandled rejections crash API routes, Lambda handlers, and background workers.

          Minimum handling:
            try {
              await dynamoClient.send(new PutItemCommand({ TableName, Item }));
            } catch (error) {
              if (error instanceof DynamoDBServiceException) {
                if (error.name === 'ConditionalCheckFailedException') {
                  // Optimistic lock conflict — handle as business logic
                } else if (error.name === 'ProvisionedThroughputExceededException') {
                  // Throttled — implement exponential backoff with jitter
                } else {
                  console.error(`DynamoDB error [${error.name}]: ${error.message}`);
                }
              } else {
                console.error('Network error:', error);
              }
              throw error;
            }

          For transactional writes, inspect CancellationReasons:
            } catch (error) {
              if (error instanceof TransactionCanceledException) {
                for (const reason of error.CancellationReasons ?? []) {
                  if (reason.Code === 'ConditionalCheckFailed') {
                    throw new OptimisticLockError(reason.Message);
                  }
                }
              }
              throw error;
            }
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/dynamodb/"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Programming.Errors.html"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Transaction.html"
          - "https://aws.amazon.com/blogs/developer/service-error-handling-modular-aws-sdk-js/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: BatchWriteItemCommand
    import_path: "@aws-sdk/client-dynamodb"
    description: >
      Puts or deletes multiple items across one or more tables in a single call.
      Supports up to 25 write operations per call (up to 16 MB total).
      CRITICAL: Uses HTTP 200 for PARTIAL FAILURES — individual item failures are NOT
      thrown as exceptions. Failed items are returned in response.UnprocessedItems.
      Callers who ignore UnprocessedItems silently lose data with no error signal.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchWriteItem.html
      # Confirmed from AWS SDK v3 type declarations: BatchWriteItemOutput.UnprocessedItems
      # AWS docs: "If any requested operations fail because the table's provisioned throughput
      #  is exceeded or an internal processing failure occurs, the failed operations are returned
      #  in the UnprocessedItems response parameter."
      - id: batch-write-unprocessed-items-not-checked
        severity: error
        condition: >
          BatchWriteItemCommand succeeds (no throw) but response.UnprocessedItems is
          non-empty — some items were NOT written due to throughput limits or internal
          AWS processing failures. Caller does not check response.UnprocessedItems.
        description: >
          BatchWriteItemCommand returns HTTP 200 even when some writes FAIL. Failed items
          are placed in response.UnprocessedItems — they are NOT written to DynamoDB, and
          NO exception is thrown. Callers who do not check response.UnprocessedItems after
          every BatchWriteItem call silently drop data with no error signal.

          This is the most dangerous silent failure pattern in DynamoDB. The operation
          succeeds from JavaScript's perspective (no throw, no rejection), but some
          items were never written. Background batch jobs, import scripts, and data
          pipelines are all affected.

          Partial failure causes: provisioned throughput exceeded on specific tables,
          partition-level throttling, internal AWS processing failures. If ALL items
          fail, DynamoDB throws ProvisionedThroughputExceededException instead.
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed
        required_handling: >
          Caller MUST check response.UnprocessedItems after every BatchWriteItem call
          and retry with exponential backoff. AWS strongly recommends exponential backoff.
        sources:
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchWriteItem.html"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Programming.Errors.html#Programming.Errors.BatchOperations"

  - name: BatchGetItemCommand
    import_path: "@aws-sdk/client-dynamodb"
    description: >
      Retrieves multiple items from one or more tables in a single call.
      Supports up to 100 items per call (up to 16 MB response).
      CRITICAL: Uses HTTP 200 for PARTIAL FAILURES — items that could not be read are
      NOT thrown as exceptions. Unread items are silently omitted from response.Responses
      and listed in response.UnprocessedKeys. Callers who ignore UnprocessedKeys receive
      incomplete result sets with no error signal.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchGetItem.html
      # AWS docs: "If at least one of the items is successfully processed, then BatchGetItem
      #  completes successfully, while returning the keys of the unread items in UnprocessedKeys."
      # Confirmed from AWS SDK v3 type declarations: BatchGetItemOutput.UnprocessedKeys
      - id: batch-get-unprocessed-keys-not-checked
        severity: error
        condition: >
          BatchGetItemCommand succeeds (no throw) but response.UnprocessedKeys is
          non-empty — some items could not be read due to throughput limits or 16 MB
          response size limit. Caller does not check response.UnprocessedKeys.
        description: >
          BatchGetItemCommand returns HTTP 200 even when some items CANNOT BE READ.
          Successfully retrieved items appear in response.Responses. Unread items are
          silently omitted from response.Responses and listed in response.UnprocessedKeys.
          NO exception is thrown for partial failures.

          AWS documentation explicitly states: "If at least one of the items is successfully
          processed, then BatchGetItem completes successfully, while returning the keys
          of the unread items in UnprocessedKeys."

          Common partial failure causes: response size exceeds 16 MB (truncation), or
          provisioned throughput exceeded on specific tables. If ALL items fail to read,
          DynamoDB throws ProvisionedThroughputExceededException instead.
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        evidence_quality: confirmed
        required_handling: >
          Caller MUST check response.UnprocessedKeys and retry in a loop until empty,
          using exponential backoff between retries.
        sources:
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchGetItem.html"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Programming.Errors.html#Programming.Errors.BatchOperations"

  - name: TransactWriteItemsCommand
    import_path: "@aws-sdk/client-dynamodb"
    description: >
      Performs up to 100 write operations across multiple tables atomically.
      All items succeed or all fail together. Throws TransactionCanceledException with
      a per-item CancellationReasons array that callers must inspect to determine
      which items failed and why (business conflict vs infrastructure failure).

    postconditions:
      # Evidence: https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_TransactWriteItems.html
      # Confirmed from AWS SDK v3 type declarations: TransactWriteItemsCommand throws
      - id: transact-write-cancellation-reasons-not-inspected
        severity: error
        condition: >
          TransactWriteItemsCommand throws TransactionCanceledException and caller
          catches it but does not inspect CancellationReasons array to distinguish
          ConditionalCheckFailed (business conflict, NOT retryable) from
          ProvisionedThroughputExceeded or TransactionConflict (infrastructure, retryable).
        description: >
          TransactWriteItemsCommand throws TransactionCanceledException when any condition
          expression fails or a conflict occurs. The exception contains a CancellationReasons
          array with one entry per item in the transaction. Each entry has a Code field:
          "ConditionalCheckFailed", "TransactionConflict", "ItemCollectionSizeLimitExceeded",
          "ProvisionedThroughputExceeded", "ThrottlingError", "ValidationError", or "None".

          Callers who catch TransactionCanceledException without inspecting CancellationReasons
          cannot distinguish business-logic conflicts from infrastructure failures.
          Business conflicts must NOT be retried; infrastructure failures SHOULD be retried.

          CancellationReasons is ordered by the TransactItems request order. Entries with
          Code === "None" indicate that item succeeded.
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed
        required_handling: >
          Caller MUST catch TransactionCanceledException and inspect CancellationReasons
          to distinguish ConditionalCheckFailed (not retryable) from TransactionConflict
          and ProvisionedThroughputExceeded (retryable with exponential backoff).
        sources:
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_TransactWriteItems.html"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/transaction-apis.html"

      - id: transact-write-in-progress-exception
        severity: warning
        condition: >
          Caller retries TransactWriteItemsCommand before the previous attempt completes,
          using the same ClientRequestToken, causing TransactionInProgressException.
        description: >
          TransactWriteItemsCommand throws TransactionInProgressException (HTTP 400)
          when the same ClientRequestToken is still being processed by a previous call.
          The SDK's built-in retry logic can trigger this when the first attempt times out
          but DynamoDB is still processing it. Reusing the same token with a different
          payload triggers IdempotentParameterMismatchException.
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          Use unique ClientRequestToken per logical transaction. Do not retry with the
          same token within 10 minutes unless the payload is identical. Implement
          application-level retries only for TransactionCanceledException.
        sources:
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_TransactWriteItems.html"

  - name: ExecuteStatementCommand
    import_path: "@aws-sdk/client-dynamodb"
    description: >
      Executes a PartiQL statement (SQL-like syntax) against a DynamoDB table.
      Supports SELECT, INSERT, UPDATE, DELETE via PartiQL. Unlike PutItemCommand
      which silently overwrites, PartiQL INSERT throws DuplicateItemException when
      the primary key already exists.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_ExecuteStatement.html
      # Confirmed from AWS SDK v3 declarations: ExecuteStatementCommand throws list
      - id: execute-statement-duplicate-item
        severity: error
        condition: >
          PartiQL INSERT statement targets a primary key that already exists in the
          table. DuplicateItemException is thrown. Caller has no try-catch or catches
          generically without checking for DuplicateItemException specifically.
        description: >
          ExecuteStatementCommand throws DuplicateItemException when a PartiQL INSERT
          statement attempts to insert an item with a primary key that already exists.
          This error is unique to ExecuteStatementCommand and BatchExecuteStatementCommand
          — the native PutItemCommand overwrites existing items by default (no error).
          Callers migrating from PutItemCommand to PartiQL INSERT without adding error
          handling will encounter unexpected DuplicateItemException crashes.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          Callers using PartiQL INSERT MUST catch DuplicateItemException specifically
          and return a user-friendly error rather than propagating an unhandled exception.
        sources:
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_ExecuteStatement.html"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/ql-reference.insert.html"

  - name: ExecuteTransactionCommand
    import_path: "@aws-sdk/client-dynamodb"
    description: >
      Executes a batch of PartiQL statements transactionally. Unlike ExecuteStatementCommand
      (single statement) and BatchExecuteStatementCommand (non-transactional batch), this command
      guarantees all-or-nothing atomicity. Throws TransactionCanceledException with
      CancellationReasons when any statement fails. Unique to this command: throws
      IdempotentParameterMismatchException when the same ClientRequestToken is reused
      with different statements, and TransactionInProgressException when a prior transaction
      with the same token is still in flight.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_ExecuteTransaction.html
      # Confirmed from AWS SDK v3 type declarations: ExecuteTransactionCommand throws list
      - id: execute-transaction-cancellation-reasons-not-inspected
        severity: error
        condition: >
          ExecuteTransactionCommand throws TransactionCanceledException and caller catches
          it but does not inspect CancellationReasons array to distinguish ConditionalCheckFailed
          (business conflict, NOT retryable) from ProvisionedThroughputExceeded or
          TransactionConflict (infrastructure failures, retryable).
        description: >
          ExecuteTransactionCommand throws TransactionCanceledException when any PartiQL
          statement in the batch fails a condition check or encounters a conflict. The
          exception carries a CancellationReasons array ordered by statement position.
          Each entry has a Code field: "ConditionalCheckFailed", "TransactionConflict",
          "ItemCollectionSizeLimitExceeded", "ProvisionedThroughputExceeded",
          "ThrottlingError", "ValidationError", or "None" (success).

          Callers who catch TransactionCanceledException without iterating CancellationReasons
          cannot distinguish business-logic conflicts (must NOT be retried) from infrastructure
          failures (SHOULD be retried with exponential backoff).

          This command is often used for atomic checkout flows, inventory reservation, and
          financial operations — precisely the contexts where silent failure is most costly.
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed
        required_handling: >
          Caller MUST catch TransactionCanceledException and inspect CancellationReasons
          to distinguish ConditionalCheckFailed (not retryable — business conflict)
          from TransactionConflict and ProvisionedThroughputExceeded (retryable).
        sources:
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_ExecuteTransaction.html"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/transaction-apis.html"

      - id: execute-transaction-idempotent-parameter-mismatch
        severity: error
        condition: >
          Caller retries ExecuteTransactionCommand with the same ClientRequestToken but
          different PartiQL statements, causing IdempotentParameterMismatchException.
          This occurs when retry logic reuses tokens without matching the original payload.
        description: >
          ExecuteTransactionCommand throws IdempotentParameterMismatchException (HTTP 400)
          when a ClientRequestToken that was already used for a successful call is reused
          with different statements. The token guarantees at-most-once execution for the
          exact same payload — not for different payloads.

          This error is unique to ExecuteTransactionCommand (and TransactWriteItemsCommand).
          It commonly occurs when: (a) error-recovery code constructs a new transaction
          with a previously-used idempotency token, or (b) the same token is accidentally
          shared across different code paths.
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          Generate a unique ClientRequestToken per logical transaction attempt. Never reuse
          a token with a different statement set. Use a UUID v4 per call. Do not retry
          with the same token if the error is IdempotentParameterMismatchException.
        sources:
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_ExecuteTransaction.html"

  - name: BatchExecuteStatementCommand
    import_path: "@aws-sdk/client-dynamodb"
    description: >
      Executes a batch of PartiQL statements (SELECT, INSERT, UPDATE, DELETE) in a single
      non-transactional call. Supports up to 25 statements. CRITICAL: Uses HTTP 200 for
      PARTIAL FAILURES — individual statement failures are NOT thrown as exceptions. Failed
      statements are reported in response.Responses[].Error. Callers who do not iterate
      Responses and check each entry's Error field silently miss failures. This is a DIFFERENT
      failure pattern from BatchWriteItemCommand/BatchGetItemCommand (which use UnprocessedItems)
      — per-item errors here include DuplicateItem and ConditionalCheckFailed, not just throughput.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchExecuteStatement.html
      # AWS docs: "A HTTP 200 response does not mean that all statements in the BatchExecuteStatement
      #  succeeded. Error details for individual statements can be found under the Error field of
      #  the BatchStatementResponse for each statement."
      # BatchStatementError.Code valid values confirmed from:
      # https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchStatementError.html
      - id: batch-execute-statement-response-errors-not-checked
        severity: error
        condition: >
          BatchExecuteStatementCommand succeeds (no throw) but one or more entries in
          response.Responses have a non-null Error field indicating that statement failed.
          Caller does not iterate response.Responses and check each entry's Error field.
        description: >
          BatchExecuteStatementCommand returns HTTP 200 even when individual PartiQL
          statements FAIL. Each statement's result is in response.Responses[], ordered
          by statement position. A failed statement has a non-null Error field containing:
          - Code: one of "ConditionalCheckFailed", "DuplicateItem", "AccessDenied",
            "ResourceNotFound", "ValidationError", "ProvisionedThroughputExceeded",
            "TransactionConflict", "ThrottlingError", "InternalServerError",
            "ItemCollectionSizeLimitExceeded", "RequestLimitExceeded"
          - Message: human-readable description

          This failure pattern differs fundamentally from BatchWriteItemCommand:
          - BatchWriteItemCommand: failed items go to response.UnprocessedItems (can retry same items)
          - BatchExecuteStatementCommand: failed statements go to response.Responses[].Error
            (must check each entry individually; no automatic retry list provided)

          PartiQL INSERT failures (DuplicateItem) and conditional write failures
          (ConditionalCheckFailed) are especially common and silently swallowed
          when the caller ignores per-item errors.
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed
        required_handling: >
          Caller MUST iterate response.Responses after every BatchExecuteStatement call
          and check each entry's Error field. For throughput errors (ProvisionedThroughputExceeded,
          ThrottlingError), retry the failed statements with exponential backoff. For
          DuplicateItem and ConditionalCheckFailed, treat as business-logic errors (not retryable).
        sources:
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchExecuteStatement.html"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/APIReference/API_BatchStatementError.html"

  - name: waitUntilTableExists
    import_path: "@aws-sdk/client-dynamodb"
    description: >
      Polling waiter helper that resolves when a DescribeTable acceptor succeeds (table TableStatus === ACTIVE)
      and rejects with TimeoutError (name === "TimeoutError") when maxWaitTime is exceeded, or AbortError
      (name === "AbortError") when the WaiterConfiguration.abortSignal is signaled. Implementation lives in
      @smithy/util-waiter (checkExceptions). The contract applies identically to the entire waitUntil* family
      exported from @aws-sdk/client-dynamodb's waiters/index: waitUntilTableExists, waitUntilTableNotExists,
      waitUntilContributorInsightsEnabled, waitUntilExportCompleted, waitUntilImportCompleted,
      waitUntilKinesisStreamingDestinationActive — all delegate to the same createWaiter() / checkExceptions()
      machinery in @smithy/core/dist-es/submodules/client/util-waiter/waiter.js. Note the DEPRECATED waitFor*
      siblings (waitForTableExists, etc.) DO NOT throw on non-success — they resolve with WaiterResult.state
      ∈ {ABORTED, TIMEOUT, FAILURE} and are out of scope for this postcondition.

    postconditions:
      # Evidence: @smithy/core/dist-es/submodules/client/util-waiter/waiter.js (lines 14-35) — checkExceptions
      #   throws { name: "AbortError" } on WaiterState.ABORTED and { name: "TimeoutError" } on WaiterState.TIMEOUT.
      # Evidence: @aws-sdk/client-dynamodb/dist-types/waiters/waitForTableExists.d.ts — @deprecated note
      #   "Use waitUntilTableExists instead. waitForTableExists does not throw error in non-success cases."
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-client-dynamodb/Class/DynamoDB/
      #   AWS SDK v3 docs — Waiter API reference, signature WaiterConfiguration<Client>, returns Promise<WaiterResult>.
      - id: aws-dynamodb-wait-until-table-exists-no-try-catch
        severity: error
        condition: >
          Call to waitUntilTableExists (or any waitUntil* waiter from this SDK) is awaited without a
          surrounding try-catch. The waiter rejects with TimeoutError (error.name === "TimeoutError")
          when DescribeTable acceptor never resolves to ACTIVE within WaiterConfiguration.maxWaitTime,
          or with AbortError (error.name === "AbortError") when WaiterConfiguration.abortSignal fires.
        description: >
          waitUntilTableExists is a polling waiter exported from @aws-sdk/client-dynamodb that delegates
          to @smithy/util-waiter's createWaiter() and checkExceptions(). When the underlying poll loop
          exhausts maxWaitTime (e.g. 60 seconds with default minDelay=2/maxDelay=120), checkExceptions
          throws a synthetic Error with .name === "TimeoutError" and a JSON-stringified WaiterResult as
          .message. When the caller passes an abortSignal that fires (e.g. request cancellation, container
          shutdown, parent process SIGTERM), checkExceptions throws a similar Error with .name === "AbortError".

          The dominant production failure mode for this family is COLD-START TIMEOUT in serverless
          handlers: a Lambda function waits for a tenant-provisioning table to become ACTIVE during
          cold start, the wait exceeds the Lambda's 15-min cap (or a custom maxWaitTime), and the
          handler crashes with an uncaught TimeoutError. Without a try-catch, the rejection propagates
          to the runtime and surfaces as a 5xx with no application-level context — the SaaS owner sees
          a generic "Unhandled Promise Rejection" in CloudWatch with no signal that the table wait was
          the cause. AbortError manifests similarly on graceful shutdown paths where the orchestrator
          (e.g. Step Functions, EventBridge Scheduler, or a custom workflow runner) cancels the wait
          mid-flight and the handler does not distinguish "cancelled" from "failed permanently."

          This is a true RUNTIME concern — not infrastructure-only — for two classes of caller:
          (1) Serverless tenant provisioners that create per-tenant tables on first sign-up and wait
          for ACTIVE before issuing the first write, and (2) Export / Import / KinesisStreamingDestination
          workflows triggered from API endpoints where the user-initiated request awaits the waiter
          inline. The previous deepen pass dismissed waiters as "infrastructure waiter — not called in
          SaaS app runtime code." That classification was incomplete: it covered the CI/CD-only path
          but missed the runtime-tenant-provisioning and runtime-export-workflow paths.

          The DEPRECATED waitFor* variants (waitForTableExists, waitForTableNotExists, etc.) do NOT
          throw — they resolve with a WaiterResult whose .state is one of ABORTED/TIMEOUT/FAILURE.
          Calling code that checks result.state is fine; calling code that assumes ACTIVE-success
          without inspecting .state silently misses the failure. AWS marked them @deprecated
          precisely because of this silent-failure footgun.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          Wrap waitUntilTableExists (and any waitUntil* sibling) in try-catch. Inspect error.name to
          distinguish TimeoutError (retry with longer maxWaitTime, or alert on stuck provisioning) from
          AbortError (graceful shutdown — propagate cancellation, do not retry) from any other rejection
          (likely DynamoDBServiceException from the underlying DescribeTable call).

          Minimum handling:
            try {
              await waitUntilTableExists(
                { client: dynamoClient, maxWaitTime: 60 },
                { TableName: 'orders' }
              );
            } catch (error) {
              if (error.name === 'TimeoutError') {
                throw new ProvisioningTimeoutError('Table did not become ACTIVE within 60s');
              }
              if (error.name === 'AbortError') {
                // Graceful cancellation — propagate to caller, do not treat as failure
                throw error;
              }
              throw error;
            }

          For workflows that legitimately retry the wait (e.g. tenant provisioning with longer maxWaitTime
          on TimeoutError), implement bounded retry with exponential backoff. Never swallow TimeoutError
          silently — that hides the SaaS owner's only signal that table provisioning is stuck.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-client-dynamodb/Class/DynamoDB/"
          - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/getting-started-step-1.html"
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-util-waiter/"

      # Evidence: @smithy/types WaiterConfiguration declares optional abortSignal: AbortSignal.
      # Evidence: @smithy/core/dist-es/submodules/client/util-waiter/waiter.js — WaiterState.ABORTED
      #   path in checkExceptions throws with error.name === "AbortError".
      - id: aws-dynamodb-wait-until-abort-not-distinguished
        severity: warning
        condition: >
          Caller wraps waitUntilTableExists (or any waitUntil* waiter) in try-catch but treats AbortError
          the same as TimeoutError or DynamoDBServiceException — does not check error.name === "AbortError"
          and does not propagate cancellation distinctly from failure.
        description: >
          When a caller passes WaiterConfiguration.abortSignal and that signal fires mid-poll (e.g. the
          parent request is cancelled, the Lambda container is being recycled, a Step Functions execution
          is aborted), @smithy/util-waiter's checkExceptions throws an Error with .name === "AbortError"
          — NOT a normal resolved WaiterResult, and NOT a DynamoDBServiceException. Callers that catch
          the rejection but do not check error.name will conflate "cancelled" with "failed permanently"
          and either (a) retry the wait, wasting compute and potentially triggering provisioning twice,
          or (b) surface a misleading "provisioning failed" error to the user when the actual cause was
          graceful cancellation.

          This matters in three concrete production patterns:
          1. Long-running tenant provisioning workflows orchestrated by Step Functions / Temporal /
             custom workflow runners — the orchestrator cancels the wait on workflow abort, and the
             handler should report "cancelled" not "failed."
          2. API endpoints with client-side cancellation (AbortController on the inbound request) that
             forward the signal to the SDK waiter — the API should respond 499 Client Closed Request,
             not 500 Internal Server Error.
          3. Graceful shutdown handlers (SIGTERM in containerized deployments) that fire abortSignal
             on all in-flight waiters — the shutdown sequence should not page on-call for "table
             provisioning failed" when the actual cause was a deploy.

          AbortError handling is the distinguishing axis between "this code is cancellation-aware"
          and "this code silently absorbs cancellations as failures." The latter is one of the
          highest-impact silent-failure modes in serverless deployments.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed
        required_handling: >
          When using waitUntil* with an abortSignal, branch on error.name === "AbortError" in the catch
          and propagate cancellation distinctly (re-throw, return a cancellation result, or set a 499
          status). Never retry an AbortError — the caller explicitly cancelled. Use a separate branch
          for TimeoutError (may retry with longer maxWaitTime) and a third branch for everything else
          (typically DynamoDBServiceException from the underlying DescribeTable / DescribeExport /
          DescribeImport / DescribeContributorInsights / DescribeKinesisStreamingDestination acceptor,
          surfaced as a generic Error wrapping the service exception).

          Recommended pattern:
            const abortSignal = AbortSignal.timeout(60_000);
            try {
              await waitUntilTableExists(
                { client: dynamoClient, maxWaitTime: 60, abortSignal },
                { TableName: 'orders' }
              );
            } catch (error) {
              if (error.name === 'AbortError') {
                // Caller cancelled (signal fired) — propagate cancellation
                throw new CancelledError('Wait cancelled by caller');
              }
              if (error.name === 'TimeoutError') {
                // Bounded retry, then alert
                throw new ProvisioningStuckError(...);
              }
              // Underlying DescribeTable failed — service error
              throw error;
            }
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/Package/-aws-sdk-util-waiter/"
          - "https://developer.mozilla.org/en-US/docs/Web/API/AbortSignal"
          - "https://docs.aws.amazon.com/lambda/latest/dg/runtimes-context.html"

notes:
  - "AWS SDK v3 uses command pattern: client.send(new XxxCommand(params)). All DynamoDB operations use the same send() entry point."
  - "error.name contains the specific AWS error code (e.g., 'ResourceNotFoundException', 'ConditionalCheckFailedException')"
  - "ProvisionedThroughputExceededException is retryable — implement exponential backoff with jitter; error.$retryable.throttling is true"
  - "ConditionalCheckFailedException is NOT retryable — represents a business logic conflict (optimistic locking failure)"
  - "TransactionCanceledException.CancellationReasons is an array — inspect each item's Code for ConditionalCheckFailed vs. TransactionConflict"
  - "BatchWriteItemCommand / BatchGetItemCommand return HTTP 200 for partial failures — check UnprocessedItems/UnprocessedKeys in response (not a thrown error)"
  - "DynamoDBClient instance is reusable across multiple send() calls — no per-call instantiation needed"
  - "DynamoDB also exposes DynamoDBDocumentClient (from @aws-sdk/lib-dynamodb) which wraps DynamoDBClient — same send() contract applies"
  - "ExecuteStatementCommand uses PartiQL syntax — DuplicateItemException is unique to INSERT statements (PutItemCommand silently overwrites)"
  - "TransactGetItemsCommand has the same TransactionCanceledException contract as TransactWriteItemsCommand"
  - "BatchExecuteStatementCommand follows the same silent partial failure pattern as BatchWriteItemCommand/BatchGetItemCommand via UnprocessedItems"
