          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: CreateReceiptRuleSetCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Creates an empty receipt rule set. A receipt rule set is a collection of
      receipt rules that define how Amazon SES handles inbound email for your
      domain. After creating a rule set, you must add receipt rules and then
      call SetActiveReceiptRuleSetCommand to activate it. Used during application
      setup to configure inbound email processing pipelines (support tickets,
      inbound webhook emails, verification callbacks). Rate-limited to 1 call
      per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateReceiptRuleSetCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateReceiptRuleSet.html
      # Error types confirmed from dist-types/commands/CreateReceiptRuleSetCommand.d.ts:
      # AlreadyExistsException, LimitExceededException
      - id: ses-create-receipt-rule-set-already-exists
        condition: >-
          sesClient.send(new CreateReceiptRuleSetCommand({ RuleSetName: name }))
          called with a RuleSetName that already exists in the SES account
        throws: AlreadyExistsException
        required_handling: >-
          MUST wrap in try-catch. AlreadyExistsException is thrown when a receipt
          rule set with the same name already exists. In idempotent deployment
          scripts, catch this and skip (rule set already exists — this is recoverable).
          Do NOT let this exception fail a CI/CD deployment pipeline.
          Pattern: try { create } catch(AlreadyExistsException) { skip or verify rules }.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateReceiptRuleSetCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateReceiptRuleSet.html"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

      - id: ses-create-receipt-rule-set-limit-exceeded
        condition: >-
          sesClient.send(new CreateReceiptRuleSetCommand(...)) called when the
          AWS account has reached the maximum number of receipt rule sets
        throws: LimitExceededException
        required_handling: >-
          MUST wrap in try-catch. LimitExceededException is thrown when the
          account's receipt rule set quota is exhausted. Catch block SHOULD log
          the error and alert operators to review and remove unused rule sets.
          This limit blocks deployment automation and prevents inbound email
          routing from being configured in new environments.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateReceiptRuleSetCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateReceiptRuleSet.html"
