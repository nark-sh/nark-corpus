      - id: ses-create-tracking-options-config-set-not-found
        condition: >-
          sesClient.send(new CreateConfigurationSetTrackingOptionsCommand({
          ConfigurationSetName: name, ... })) where name does not exist
        throws: ConfigurationSetDoesNotExistException
        required_handling: >-
          MUST wrap in try-catch. Deployment scripts that add tracking options
          to a configuration set must ensure the configuration set was created first.
          Catch block SHOULD create the configuration set, then retry.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateConfigurationSetTrackingOptionsCommand/"
        severity: error
