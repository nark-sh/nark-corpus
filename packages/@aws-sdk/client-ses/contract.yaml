  - name: UpdateConfigurationSetSendingEnabledCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Enables or disables email sending for all messages sent using a specific
      configuration set. Used to temporarily pause sending in response to elevated
      bounce or complaint rates (typically triggered by CloudWatch alarms on SES
      reputation metrics). Disabling sending on a configuration set is the primary
      automated reputation protection mechanism — when bounce rate exceeds ~5% or
      complaint rate exceeds ~0.1%, SES may suspend the account unless sending is
      paused. Critical for automated reputation management workflows.
      Rate-limited to 1 call per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/UpdateConfigurationSetSendingEnabledCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_UpdateConfigurationSetSendingEnabled.html
      # Error type confirmed from dist-types/commands/UpdateConfigurationSetSendingEnabledCommand.d.ts:
      # ConfigurationSetDoesNotExistException
      - id: ses-update-config-set-sending-enabled-not-found
        condition: >-
          sesClient.send(new UpdateConfigurationSetSendingEnabledCommand({
          ConfigurationSetName: name, Enabled: false })) where name does not exist,
          typically in an automated CloudWatch → Lambda → SES reputation protection
          pipeline that references a hardcoded or environment-variable-sourced config set name
        throws: ConfigurationSetDoesNotExistException
        required_handling: >-
          MUST wrap in try-catch. ConfigurationSetDoesNotExistException is thrown
          when the named configuration set does not exist. This is critical in
          automated reputation management pipelines — if the exception is unhandled,
          the Lambda function crashes without pausing email sending, allowing bounce
          and complaint rates to continue accumulating and potentially triggering
          an AWS account-level sending suspension.
          Catch block MUST alert on-call — failed reputation protection is a SEV-1
          incident risk. Log the configuration set name and verify it exists in
          the target AWS account/region.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/UpdateConfigurationSetSendingEnabledCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_UpdateConfigurationSetSendingEnabled.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

  - name: PutIdentityPolicyCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Adds or updates a sending authorization policy for a verified SES identity
      (email address or domain). Sending authorization policies enable the identity
      owner to authorize other AWS accounts or IAM principals to send email from
      the identity. Used in multi-tenant SaaS applications where customers send
      email via the platform's verified SES identity, and in cross-account email
      architectures. Policy must be valid JSON conforming to SES authorization
      policy syntax and cannot exceed 4 KB. Rate-limited to 1 call per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/PutIdentityPolicyCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_PutIdentityPolicy.html
      # Error type confirmed from dist-types/commands/PutIdentityPolicyCommand.d.ts:
      # InvalidPolicyException
      - id: ses-put-identity-policy-invalid
        condition: >-
          sesClient.send(new PutIdentityPolicyCommand({ Identity: identity,
          PolicyName: name, Policy: policyJson })) where policyJson is malformed
          JSON, exceeds 4 KB, has invalid IAM principals or actions, or does not
          conform to SES authorization policy syntax
        throws: InvalidPolicyException
        required_handling: >-
          MUST wrap in try-catch. InvalidPolicyException is thrown when the policy
          document is syntactically invalid, structurally invalid, or exceeds the
          4 KB size limit. The policy is NOT applied — the previous policy (if any)
          is preserved. In multi-tenant SaaS applications where customers configure
          sending authorization policies, an unhandled InvalidPolicyException will
          crash the provisioning endpoint, leaving the customer unable to send email
          through the platform.
          Catch block SHOULD extract the specific policy error from the exception
          message (AWS includes details about what is invalid) and return a meaningful
          error to the caller. Validate policy JSON structure and size before calling.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/PutIdentityPolicyCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_PutIdentityPolicy.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: DeleteConfigurationSetEventDestinationCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Deletes an event destination from an existing SES configuration set. Event
      destinations route sending events (bounces, complaints, deliveries) to
      CloudWatch, Kinesis Firehose, or SNS. Called during infrastructure cleanup,
      when rotating monitoring backends, or when removing redundant event destinations.
      Unlike deleting the configuration set itself, this operation removes only one
      destination while preserving others. Not idempotent — deleting a non-existent
      destination throws an exception. Rate-limited to 1 call per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/DeleteConfigurationSetEventDestinationCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_DeleteConfigurationSetEventDestination.html
      # Error types confirmed from dist-types/commands/DeleteConfigurationSetEventDestinationCommand.d.ts:
      # ConfigurationSetDoesNotExistException, EventDestinationDoesNotExistException
      - id: ses-delete-event-dest-not-found
        condition: >-
          sesClient.send(new DeleteConfigurationSetEventDestinationCommand({
          ConfigurationSetName: csName, EventDestinationName: destName }))
          where destName does not exist in the specified configuration set
        throws: EventDestinationDoesNotExistException
        required_handling: >-
          MUST wrap in try-catch. EventDestinationDoesNotExistException is thrown
          when the destination name does not exist in the configuration set.
          Unlike S3 object deletion, SES event destination deletion is NOT idempotent
          — calling it twice throws on the second call. Cleanup scripts and test
          teardown code that unconditionally delete event destinations will throw
          on re-runs.
          Catch block SHOULD either check existence first with DescribeConfigurationSet,
          or catch EventDestinationDoesNotExistException and treat as success (already
          deleted). Log the missing destination name for audit purposes.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/DeleteConfigurationSetEventDestinationCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_DeleteConfigurationSetEventDestination.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: ses-delete-event-dest-config-set-not-found
        condition: >-
          sesClient.send(new DeleteConfigurationSetEventDestinationCommand({
          ConfigurationSetName: csName, ... })) where csName does not exist
        throws: ConfigurationSetDoesNotExistException
        required_handling: >-
          MUST wrap in try-catch. ConfigurationSetDoesNotExistException is thrown
          when the parent configuration set does not exist. Cleanup scripts that
          tear down an entire SES configuration (config set + event destinations)
          must handle both the case where the config set is already gone and where
          only specific destinations are missing.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/DeleteConfigurationSetEventDestinationCommand/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

