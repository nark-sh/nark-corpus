  - name: SendBounceCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Generates and sends a bounce message back to the sender of an email received
      through Amazon SES. Used in inbound email processing pipelines to notify
      senders that their message could not be delivered (e.g., invalid recipient,
      policy violation, content rejection). Can only be called on messages received
      within the last 24 hours. Rate-limited to 1 call per second. The BounceSender
      must be a verified SES identity.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/SendBounceCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_SendBounce.html
      # Error types confirmed from dist-types/commands/SendBounceCommand.d.ts: MessageRejected
      - id: ses-send-bounce-no-try-catch
        condition: >-
          sesClient.send(new SendBounceCommand(...)) called without try-catch in an
          inbound email processing handler
        throws: MessageRejected
        required_handling: >-
          MUST wrap in try-catch. MessageRejected is thrown when the bounce cannot be
          sent — e.g., the BounceSender is not a verified SES identity, the OriginalMessageId
          is invalid or older than 24 hours, or the request fails validation.
          Bounce pipelines commonly omit error handling because SendBounce is a "fire
          and forget" side effect — but an unhandled MessageRejected will crash the
          inbound email handler and stop processing subsequent messages.
          Catch block SHOULD log the failed bounce and continue processing other messages.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/SendBounceCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendBounce.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: ses-send-bounce-stale-message-id
        condition: >-
          sesClient.send(new SendBounceCommand({ OriginalMessageId: staleId, ... }))
          where staleId refers to a message received more than 24 hours ago
        throws: MessageRejected
        required_handling: >-
          MUST validate message age before calling SendBounceCommand. The 24-hour
          constraint is strict — SES rejects bounce requests for messages older than
          24 hours with MessageRejected. Queued bounce jobs that are delayed (e.g.,
          by a slow SQS consumer) will silently lose the ability to send compliant DSNs.
          Catch block SHOULD distinguish stale-message rejections from sender-not-verified
          rejections. Log with the original message timestamp for debugging.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendBounce.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

