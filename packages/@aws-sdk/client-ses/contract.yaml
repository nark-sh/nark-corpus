  - name: DeleteConfigurationSetCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Deletes an SES configuration set and all its associated event destinations
      and tracking options. Typically called in cleanup scripts, test teardown,
      or when rotating configuration sets. This operation is not idempotent —
      deleting a non-existent configuration set throws an exception.
      Rate-limited to 1 call per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/DeleteConfigurationSetCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_DeleteConfigurationSet.html
      # Error types confirmed from dist-types/commands/DeleteConfigurationSetCommand.d.ts:
      # ConfigurationSetDoesNotExistException
      - id: ses-delete-config-set-not-found
        condition: >-
          sesClient.send(new DeleteConfigurationSetCommand({ ConfigurationSetName: name }))
          where name references a configuration set that does not exist
        throws: ConfigurationSetDoesNotExistException
        required_handling: >-
          MUST wrap in try-catch. ConfigurationSetDoesNotExistException is thrown when
          attempting to delete a configuration set that was already deleted or never
          created. Unlike S3 object deletion, SES config set deletion is NOT idempotent
          — calling it twice throws on the second call.
          Cleanup scripts and test teardown code that unconditionally call
          DeleteConfigurationSetCommand will throw on re-runs.
          Catch block SHOULD either check existence first with DescribeConfigurationSet,
          or catch ConfigurationSetDoesNotExistException and treat it as a success
          (already deleted).
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/DeleteConfigurationSetCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_DeleteConfigurationSet.html"
        severity: error
        business_impact:
