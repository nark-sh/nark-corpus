  - name: CreateReceiptRuleCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Creates a receipt rule within an existing receipt rule set. Receipt rules
      define what SES does when an email is received for a matching recipient
      address — save to S3, invoke a Lambda function, forward to SNS, or bounce.
      Most commonly used to build inbound email processing pipelines: support
      ticket ingestion, webhook callbacks, user-generated email parsing.
      The Lambda, S3, and SNS actions require IAM permissions for SES to invoke
      them. Misconfigured actions throw distinct exceptions at rule-creation time
      rather than at email-receipt time. Rate-limited to 1 call per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateReceiptRuleCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateReceiptRule.html
      # Error types confirmed from dist-types/commands/CreateReceiptRuleCommand.d.ts:
      # AlreadyExistsException, InvalidLambdaFunctionException, InvalidS3ConfigurationException,
      # InvalidSnsTopicException, LimitExceededException, RuleDoesNotExistException,
      # RuleSetDoesNotExistException
      - id: ses-create-receipt-rule-invalid-action-config
        condition: >-
          sesClient.send(new CreateReceiptRuleCommand({ ..., Rule: { Actions: [{
          LambdaAction: { FunctionArn: invalidArn }, S3Action: { BucketName: badBucket },
          or SNSAction: { TopicArn: invalidTopic } }] } })) where any action target
          is invalid, does not exist, or lacks the required IAM permissions for SES
        throws: >-
          InvalidLambdaFunctionException — Lambda ARN is invalid, function does not exist,
          or SES lacks invoke permissions on the function;
          InvalidS3ConfigurationException — S3 bucket does not exist, is in a different
          region, lacks a bucket policy granting SES PutObject permission, or the KMS
          key is invalid;
          InvalidSnsTopicException — SNS topic ARN is invalid, topic does not exist,
          or SES lacks Publish permission on the topic.
        required_handling: >-
          MUST wrap in try-catch. These exceptions are thrown at rule-creation time,
          not at email-receipt time — a misconfigured action is rejected before the rule
          takes effect. This is an early-detection safety mechanism.
          Catch block SHOULD log the specific exception type to identify which action
          target (Lambda/S3/SNS) has the configuration problem, and fix IAM permissions
          before retrying. These errors commonly occur when deploying to a new AWS
          account or region where SES resource-based policies have not been set up.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateReceiptRuleCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateReceiptRule.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: ses-create-receipt-rule-ruleset-not-found
        condition: >-
          sesClient.send(new CreateReceiptRuleCommand({ RuleSetName: name, ... }))
          where name references a receipt rule set that does not exist
        throws: RuleSetDoesNotExistException
        required_handling: >-
          MUST wrap in try-catch. RuleSetDoesNotExistException is thrown when
          the specified RuleSetName does not exist. Deployment scripts that add
          rules to a rule set must ensure the rule set was created first
          (via CreateReceiptRuleSetCommand). Catch block SHOULD attempt to create
          the rule set first, then retry adding the rule.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateReceiptRuleCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateReceiptRule.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: ses-create-receipt-rule-already-exists
        condition: >-
          sesClient.send(new CreateReceiptRuleCommand({ ..., Rule: { Name: ruleName } }))
          called with a Rule.Name that already exists in the specified rule set
        throws: AlreadyExistsException
        required_handling: >-
          MUST wrap in try-catch. AlreadyExistsException is thrown when a rule
          with the same name already exists in the rule set. In idempotent deployment
          scripts, catch this and skip or switch to UpdateReceiptRuleCommand to
          update the existing rule. Do NOT fail the deployment — the rule already exists.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateReceiptRuleCommand/"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

  - name: SetActiveReceiptRuleSetCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Activates a specified receipt rule set to make it the active set for inbound
      email processing. Only one receipt rule set can be active at a time. Calling
      with RuleSetName: null disables all inbound email processing entirely. Used
      in deployment pipelines when switching between rule sets (e.g., blue/green
      inbound email routing) or when initially enabling inbound email processing
      after setup. If this call fails, inbound emails are processed by the previously
      active rule set (or not processed if no set was active). Rate-limited to 1
      call per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/SetActiveReceiptRuleSetCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_SetActiveReceiptRuleSet.html
      # Error type confirmed from dist-types/commands/SetActiveReceiptRuleSetCommand.d.ts:
      # RuleSetDoesNotExistException
      - id: ses-set-active-receipt-rule-set-not-found
        condition: >-
          sesClient.send(new SetActiveReceiptRuleSetCommand({ RuleSetName: name }))
          where name references a receipt rule set that does not exist in the account
        throws: RuleSetDoesNotExistException
        required_handling: >-
          MUST wrap in try-catch. RuleSetDoesNotExistException is thrown when the
          specified RuleSetName does not exist. Deployment scripts that activate a
          rule set after creating it must handle this in case the creation step failed
          or the name is misspelled. When this exception is thrown, the previously
          active rule set remains active — inbound email routing is NOT disrupted,
          but the intended new routing is not applied.
          Catch block SHOULD log the missing rule set name and alert operators.
          Never silently swallow this error — it means inbound email routing was
          NOT switched as intended.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/SetActiveReceiptRuleSetCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SetActiveReceiptRuleSet.html"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: CreateConfigurationSetTrackingOptionsCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Adds open and click tracking options to an existing SES configuration set.
      Tracking options configure a custom redirect domain for tracking links (clicks
      and opens are recorded by SES redirecting through a tracking endpoint). Used
      in email marketing and engagement analytics pipelines. The custom redirect
      domain must be verified in SES before it can be used. Rate-limited to 1 call
      per second. Each configuration set can have only one TrackingOptions object.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateConfigurationSetTrackingOptionsCommand/
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateConfigurationSetTrackingOptions.html
      # Error types confirmed from dist-types/commands/CreateConfigurationSetTrackingOptionsCommand.d.ts:
      # ConfigurationSetDoesNotExistException, InvalidTrackingOptionsException,
      # TrackingOptionsAlreadyExistsException
      - id: ses-create-tracking-options-invalid-domain
        condition: >-
          sesClient.send(new CreateConfigurationSetTrackingOptionsCommand({
          ConfigurationSetName: name, TrackingOptions: { CustomRedirectDomain: domain } }))
          where domain is not verified in SES or is not a valid domain/subdomain
        throws: InvalidTrackingOptionsException
        required_handling: >-
          MUST wrap in try-catch. InvalidTrackingOptionsException is thrown when
          the CustomRedirectDomain is not a verified SES identity or is not a valid
          domain format. This error is distinct from the configuration set not existing.
          Catch block SHOULD log the invalid domain and alert operators to verify it
          in SES first (via VerifyDomainIdentityCommand). Email opens and clicks will
          NOT be tracked until tracking options are correctly configured.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateConfigurationSetTrackingOptionsCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateConfigurationSetTrackingOptions.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: ses-create-tracking-options-already-exists
        condition: >-
          sesClient.send(new CreateConfigurationSetTrackingOptionsCommand(...))
          called on a configuration set that already has a TrackingOptions object
        throws: TrackingOptionsAlreadyExistsException
        required_handling: >-
          MUST wrap in try-catch. TrackingOptionsAlreadyExistsException is thrown
          when a TrackingOptions object already exists on the specified configuration
          set — only one is allowed per set. In idempotent deployment scripts, catch
          this and either skip or switch to UpdateConfigurationSetTrackingOptionsCommand
          to modify the existing tracking domain.
          Pattern: try { create } catch(TrackingOptionsAlreadyExistsException) { update instead }.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/CreateConfigurationSetTrackingOptionsCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateConfigurationSetTrackingOptions.html"
