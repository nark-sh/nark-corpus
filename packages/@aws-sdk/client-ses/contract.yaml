package: "@aws-sdk/client-ses"
semver: "^3.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-04-15"
status: production
evidence_quality: confirmed
coverage_score: 0.65
# coverage_score = 13 contracted / 20 total relevant API functions (13 contracted + 7 intentionally omitted)
# Previously contracted (7): send, SendTemplatedEmailCommand, SendBulkTemplatedEmailCommand,
#   SendRawEmailCommand, SendCustomVerificationEmailCommand, CreateTemplateCommand, UpdateTemplateCommand
# Newly contracted this pass (6): SendEmailCommand, TestRenderTemplateCommand,
#   CreateConfigurationSetCommand, CreateConfigurationSetEventDestinationCommand,
#   CreateCustomVerificationEmailTemplateCommand, UpdateCustomVerificationEmailTemplateCommand
# Intentionally omitted (7): VerifyEmailIdentityCommand, VerifyDomainIdentityCommand, DeleteTemplateCommand,
#   GetTemplateCommand, ListTemplatesCommand, GetSendQuotaCommand, GetSendStatisticsCommand
# All omitted functions are either read-only GETs, idempotent deletes, or have no distinct errors
#   beyond generic SESServiceException already covered by the generic send() postcondition.
# Note: The full SDK has 72 commands; the above counts only those relevant for SaaS app runtime code.

functions:
  - name: send
    import_path: "@aws-sdk/client-ses"
    description: >
      Sends a command to Amazon SES using the command-based SDK v3 pattern.
      The SESClient.send() method is the single entry point for all SES API
      operations: SendEmailCommand, SendRawEmailCommand, SendTemplatedEmailCommand,
      SendBulkTemplatedEmailCommand, VerifyEmailIdentityCommand, etc.
      All commands make network requests to AWS and can fail with account-level,
      content-level, or network errors.

    postconditions:
      # Evidence: 0 violations across 1 repo in scan-aws-sdk-client-ses-2026-04-06.json
      # FP check: 0/100 FPs (0.0% FP rate) — confirmed no false positives
      - id: ses-send-no-try-catch
        condition: >
          sesClient.send() called with any SES command without try-catch wrapping
          the await expression
        throws: >
          MessageRejected (400) — content flagged as spam/virus/policy violation;
          MailFromDomainNotVerifiedException (400) — custom MAIL FROM domain has invalid MX record;
          AccountSendingPausedException (403) — SES sending paused at account level;
          ConfigurationSetSendingPaused (400) — sending disabled on the named config set;
          ConfigurationSetDoesNotExist (400) — named configuration set not found;
          LimitExceededException (400) — sending quota or rate limit exceeded;
          InvalidParameterValue (400) — malformed email address or header;
          ThrottlingException (400) — request rate too high (retryable);
          ServiceUnavailable (503) — AWS SES temporarily unavailable;
          NetworkError — connection failure, timeout, DNS resolution failure.
          All errors are subclasses of ServiceException; error name is in error.name.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          SESClient.send() with any Send*Command makes a network request to Amazon SES
          that can fail for content, account, configuration, quota, or network reasons.
          Unhandled promise rejections will crash Node.js workers, break API routes, or
          silently drop emails depending on the runtime context.

          The most dangerous failure mode is silent email loss: when fire-and-forget
          patterns omit await entirely, the rejection is silently swallowed and the
          user never receives the email.

          At minimum, catch and log the error to preserve observability:

            try {
              await sesClient.send(new SendEmailCommand(params));
            } catch (err) {
              if (err instanceof Error && err.name === 'MessageRejected') {
                logger.error('SES rejected message — check content policy', err);
              } else if (err instanceof Error && err.name === 'LimitExceededException') {
                logger.warn('SES rate limit hit — consider exponential backoff', err);
              } else {
                logger.error('SES send failed', err);
                throw err;
              }
            }
        required_handling: >
          MUST wrap await sesClient.send(new Send*Command(...)) in try-catch.
          Catch block SHOULD distinguish MessageRejected (permanent failure — do not retry),
          ThrottlingException / LimitExceededException (retryable — use exponential backoff),
          and AccountSendingPausedException (operational — alert on-call).
          For bulk/transactional email, a failed send should be surfaced to the caller,
          not silently swallowed.
        source: "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/"
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendEmail.html"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/CommonErrors.html"

  - name: SendTemplatedEmailCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Sends an email using a pre-created SES email template. Composes message
      by substituting TemplateData JSON values into the template body. Used for
      transactional emails with personalized content (welcome, password reset,
      notifications). Unlike SendEmailCommand, requires a template to exist in
      SES and all template variables to be present in TemplateData.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_SendTemplatedEmail.html
      # Error types confirmed from @aws-sdk/client-ses dist-types/commands/SendTemplatedEmailCommand.d.ts
      # All @throws annotations verified from TypeScript declarations.
      - id: ses-template-does-not-exist
        condition: >-
          sesClient.send(new SendTemplatedEmailCommand(...)) called with a Template
          name that does not exist in the SES account
        throws: TemplateDoesNotExistException
        required_handling: >
          MUST wrap in try-catch. TemplateDoesNotExistException is thrown immediately
          when the template name is not found — the email is NOT sent.
          Catch block SHOULD log the template name to aid debugging. This error
          commonly occurs when templates are deleted or when code is deployed to a new
          AWS account/region without running the template setup step.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendTemplatedEmail.html"
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/SendTemplatedEmailCommand/"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: ses-template-rendering-failure-silent
        condition: >-
          sesClient.send(new SendTemplatedEmailCommand(...)) returns a MessageId
          successfully but the template contains rendering errors (missing partial,
          malformed Handlebars syntax, undefined helper)
        returns: >-
          AWS SES accepts the message and returns a 200 with a MessageId, but the
          email is NOT sent. Rendering failures are reported only via SNS event
          notifications (RenderingFailure event type) — NOT as an exception.
          This is a silent failure: the caller receives a successful response but
          the recipient never gets the email.
        required_handling: >
          MUST configure SNS event notifications for RenderingFailure events on the
          configuration set. Do NOT assume a returned MessageId means the email was
          delivered — it only means SES accepted the request for processing.
          Validate TemplateData JSON matches all template variable names before sending.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendTemplatedEmail.html"
          - "https://docs.aws.amazon.com/ses/latest/dg/send-personalized-email-api.html"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: ses-template-missing-rendering-attribute
        condition: >-
          sesClient.send(new SendTemplatedEmailCommand(...)) called with TemplateData
          JSON that is missing one or more required template variable values that the
          template references
        throws: MissingRenderingAttributeException
        required_handling: >
          MUST wrap in try-catch. MissingRenderingAttributeException is thrown at
          request time when TemplateData does not include all variables referenced
          in the template. Catch block SHOULD log the template name and the
          missing attribute names. Fix by ensuring TemplateData contains all
          required keys, or make template variables optional with defaults.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendTemplatedEmail.html"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: SendBulkTemplatedEmailCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Sends personalized email messages to multiple recipients in a single API call.
      Each destination receives the same template with per-recipient TemplateData
      substitutions. More efficient than looping SendTemplatedEmailCommand but
      requires careful handling of partial failures: some destinations may succeed
      while others fail within the same request.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_SendBulkTemplatedEmail.html
      # Error types confirmed from dist-types/commands/SendBulkTemplatedEmailCommand.d.ts
      # Partial failure pattern confirmed from API response structure (Status array per destination)
      - id: ses-bulk-template-does-not-exist
        condition: >-
          sesClient.send(new SendBulkTemplatedEmailCommand(...)) called with a
          Template name that does not exist in the SES account
        throws: TemplateDoesNotExistException
        required_handling: >
          MUST wrap in try-catch. TemplateDoesNotExistException fails the entire
          batch — no emails are sent. This is distinct from per-destination failures.
          Ensure the template exists in the target account/region before calling.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendBulkTemplatedEmail.html"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: ses-bulk-partial-destination-failure
        condition: >-
          sesClient.send(new SendBulkTemplatedEmailCommand(...)) succeeds overall
          (no exception thrown) but one or more individual destinations in the
          Destinations array fail (e.g., invalid address, blacklisted recipient,
          per-destination rendering failure)
        returns: >-
          API returns 200 with a SendBulkTemplatedEmailResponse. The response contains
          a Status array with one entry per destination. Each entry has a Status field
          ('Success' or failure message) and a MessageId (only set on success).
          Failed destinations have Status set to the failure reason. If the caller
          does not inspect the Status array, failed recipients are silently dropped.
        required_handling: >
          MUST inspect the response.Status array after a successful API call.
          For each entry: if entry.Status !== 'Success', log the failure and
          consider requeuing that destination. Pattern:
            const response = await sesClient.send(new SendBulkTemplatedEmailCommand(...));
            for (const result of response.Status) {
              if (result.Status !== 'Success') {
                logger.error('Bulk email failed for destination', { status: result.Status });
              }
            }
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendBulkTemplatedEmail.html"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

  - name: SendRawEmailCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Sends raw email with full MIME control. Used when attachments, custom headers,
      inline images, or non-standard MIME structures are required. The caller is
      responsible for constructing a valid RFC 5321-compliant MIME message as a
      base64-encoded string. More flexible than SendEmailCommand but more error-prone
      due to MIME formatting requirements.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_SendRawEmail.html
      # Error types confirmed from dist-types/commands/SendRawEmailCommand.d.ts
      - id: ses-raw-email-size-limit
        condition: >-
          sesClient.send(new SendRawEmailCommand(...)) called with a message
          (including all attachments) that exceeds 10 MB total size
        throws: MessageRejected
        required_handling: >
          MUST enforce a 10 MB total message size limit before calling SendRawEmail.
          The limit includes all headers, body, and attachment data after MIME encoding.
          Note that base64 encoding adds ~33% overhead — a 7.5 MB file becomes ~10 MB
          after encoding. Validate message size in application code before sending.
          For large attachments, use S3 pre-signed URLs in the email body instead.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendRawEmail.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: ses-raw-email-recipient-limit
        condition: >-
          sesClient.send(new SendRawEmailCommand(...)) called with more than 50
          total recipients combined across To:, Cc:, and Bcc: headers
        throws: MessageRejected
        required_handling: >
          MUST split recipient lists exceeding 50 total recipients into separate
          SendRawEmail calls. The 50-recipient limit applies to the total across
          all recipient types combined. This limit is separate from the daily
          sending quota. Enforce this constraint in the caller before invoking.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendRawEmail.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: SendCustomVerificationEmailCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Sends a custom verification email to a new email address using a pre-configured
      custom verification email template. Used to verify recipient email addresses
      before adding them to mailing lists or granting access. Requires the sender
      address to already be verified in SES and the custom verification template to
      exist.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_SendCustomVerificationEmail.html
      # Error types confirmed from dist-types/commands/SendCustomVerificationEmailCommand.d.ts
      - id: ses-custom-verification-template-missing
        condition: >-
          sesClient.send(new SendCustomVerificationEmailCommand(...)) called with a
          TemplateName that does not exist in the SES account
        throws: CustomVerificationEmailTemplateDoesNotExistException
        required_handling: >
          MUST wrap in try-catch. Template must be created via
          CreateCustomVerificationEmailTemplate before this call.
          This error is common in new account setup or when templates are deleted.
          Catch block SHOULD log the template name and alert operators to recreate it.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendCustomVerificationEmail.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: ses-custom-verification-sender-not-verified
        condition: >-
          sesClient.send(new SendCustomVerificationEmailCommand(...)) where the
          sender email address stored in the template is not verified in SES
        throws: FromEmailAddressNotVerifiedException
        required_handling: >
          MUST ensure the sender email address (stored in the custom verification
          template, not the caller's input) is verified in SES before calling.
          This error occurs after template setup if the verified identity is deleted.
          Catch block SHOULD log the unverified sender address and alert operators.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendCustomVerificationEmail.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: ses-custom-verification-sandbox-restriction
        condition: >-
          sesClient.send(new SendCustomVerificationEmailCommand(...)) called on an
          AWS account that has not been granted production access (account is still
          in SES sandbox)
        throws: ProductionAccessNotGrantedException
        required_handling: >
          In sandbox mode, custom verification emails can only be sent to verified
          email addresses. ProductionAccessNotGrantedException is thrown when sending
          to unverified addresses in sandbox. Request production access through
          the AWS console before using this in production. In development/staging,
          either test with verified addresses or mock this call.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendCustomVerificationEmail.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: CreateTemplateCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Creates a new email template in SES. Templates are reusable email structures
      with Handlebars-style variable substitution. Used during application setup
      or deployment to provision transactional email templates. Rate-limited to 1
      call per second. AlreadyExistsException is the most common failure in CI/CD
      pipelines that run template setup on every deployment.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateTemplate.html
      # Error types confirmed from dist-types/commands/CreateTemplateCommand.d.ts
      # Rate limit (1 call/second) confirmed from API docs.
      - id: ses-create-template-already-exists
        condition: >-
          sesClient.send(new CreateTemplateCommand(...)) called with a TemplateName
          that already exists in the SES account
        throws: AlreadyExistsException
        required_handling: >
          MUST wrap in try-catch. In idempotent deployment scripts, catch
          AlreadyExistsException and either skip (template already exists) or
          switch to UpdateTemplateCommand for updates. Do NOT let this exception
          fail a CI/CD deployment pipeline — it is a recoverable condition.
          Pattern: try { create } catch(AlreadyExistsException) { update instead }.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateTemplate.html"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed

      - id: ses-create-template-invalid-syntax
        condition: >-
          sesClient.send(new CreateTemplateCommand(...)) called with a template
          whose HtmlPart/TextPart/SubjectPart contains invalid Handlebars syntax or
          refers to a partial that does not exist
        throws: InvalidTemplateException
        required_handling: >
          MUST wrap in try-catch. InvalidTemplateException is thrown when the
          template syntax is malformed or references undefined partials.
          Catch block SHOULD log the template content to identify the invalid syntax.
          Validate template rendering locally with Handlebars.js before deploying
          to SES. Note: a valid template may still fail at send time if TemplateData
          is missing required variables.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_CreateTemplate.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: UpdateTemplateCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Updates an existing SES email template's content (subject, HTML body, text body).
      Used in deployment scripts to update transactional email templates. Fails if
      the template does not exist. Rate-limited to 1 call per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/ses/latest/APIReference/API_UpdateTemplate.html
      # Error types confirmed from dist-types/commands/UpdateTemplateCommand.d.ts
      - id: ses-update-template-not-found
        condition: >-
          sesClient.send(new UpdateTemplateCommand(...)) called with a TemplateName
          that does not exist in the SES account
        throws: TemplateDoesNotExistException
        required_handling: >
          MUST wrap in try-catch. TemplateDoesNotExistException is thrown when the
          template to update does not exist. In idempotent deployment scripts,
          catch this and switch to CreateTemplateCommand instead.
          Pattern: try { update } catch(TemplateDoesNotExistException) { create instead }.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_UpdateTemplate.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: ses-update-template-invalid-syntax
        condition: >-
          sesClient.send(new UpdateTemplateCommand(...)) called with a template
          whose updated content contains invalid Handlebars syntax
        throws: InvalidTemplateException
        required_handling: >
          MUST wrap in try-catch. InvalidTemplateException is thrown when the new
          template content is syntactically invalid. Previous template content
          is preserved — the update is atomic and does not partially apply.
          Validate template content locally with Handlebars.js before updating.
        sources:
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_UpdateTemplate.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

  - name: SendEmailCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Composes an email message and immediately queues it for sending. This is the
      primary command for sending plain-text and HTML emails to a single set of
      recipients (up to 50 total across To, CC, and BCC). The sender address must
      be verified in SES. Every recipient counts against the 24-hour sending quota.
      Most common command for transactional email (welcome, password reset, notifications).
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/SendEmailCommand/
      # Error types confirmed from dist-types/commands/SendEmailCommand.d.ts @throws annotations
      # AccountSendingPausedException, ConfigurationSetDoesNotExistException, ConfigurationSetSendingPausedException,
      # MailFromDomainNotVerifiedException, MessageRejected all confirmed from SDK v3 type declarations.
      - id: ses-send-email-no-try-catch
        condition: >-
          sesClient.send(new SendEmailCommand(...)) called without a try-catch
          wrapping the await expression
        throws: >-
          MessageRejected (400) — message failed SES content policy, spam scoring, or blocklist;
          MailFromDomainNotVerifiedException (400) — custom MAIL FROM domain has broken DNS/MX record;
          AccountSendingPausedException (400) — sending paused at account level (billing/compliance);
          ConfigurationSetSendingPausedException (400) — sending disabled on the named config set;
          ConfigurationSetDoesNotExistException (400) — named configuration set not found;
          LimitExceededException (400) — 24-hour quota or per-second sending rate exceeded;
          ThrottlingException (400) — request rate too high, retryable.
          All errors are subclasses of SESServiceException; error name is in error.name.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        description: >-
          SendEmailCommand makes a synchronous network request to Amazon SES.
          Unhandled promise rejections crash Node.js workers and break the user-facing
          action that triggered the email (registration, password reset, order confirmation).
          The 50-recipient limit and quota constraints are commonly hit in bulk-send loops.

          Pattern to avoid:
            await sesClient.send(new SendEmailCommand(params)); // no try-catch

          Correct pattern:
            try {
              await sesClient.send(new SendEmailCommand(params));
            } catch (err) {
              if (err.name === 'MessageRejected') {
                logger.error('SES rejected message — check content policy', err);
              } else if (err.name === 'AccountSendingPausedException') {
                logger.error('SES account sending paused — escalate immediately', err);
                throw err;
              } else {
                logger.error('SES SendEmail failed', err);
                throw err;
              }
            }
        required_handling: >-
          MUST wrap await sesClient.send(new SendEmailCommand(...)) in try-catch.
          Catch block SHOULD distinguish MessageRejected (permanent — do not retry),
          AccountSendingPausedException (operational alert required), and
          LimitExceededException / ThrottlingException (retryable with backoff).
          Never silently swallow errors — the user is waiting for the email.
        source: "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/SendEmailCommand/"
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/SendEmailCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_SendEmail.html"
        evidence_quality: confirmed

  - name: TestRenderTemplateCommand
    import_path: "@aws-sdk/client-ses"
    description: >-
      Generates a preview of an email template by substituting the provided
      TemplateData values into the template. Used in deployment scripts and
      CI pipelines to validate templates before production use. If the template
      renders successfully, the output contains the complete MIME content.
      Rate-limited to 1 call per second.
    postconditions:
      # Evidence: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/TestRenderTemplateCommand/
      # Error types confirmed from dist-types/commands/TestRenderTemplateCommand.d.ts @throws annotations:
      # TemplateDoesNotExistException, MissingRenderingAttributeException, InvalidRenderingParameterException
      - id: ses-test-render-template-missing
        condition: >-
          sesClient.send(new TestRenderTemplateCommand(...)) called with a TemplateName
          that does not exist in the SES account
        throws: TemplateDoesNotExistException
        required_handling: >-
          MUST wrap in try-catch. TemplateDoesNotExistException is thrown at request
          time when the template name is not found. This is the first point of failure
          in deployment pipelines that validate templates before sending.
          Catch block SHOULD log the template name to aid debugging.
          Pattern: catch TemplateDoesNotExistException and fail the deployment or alert operators.
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/ses/command/TestRenderTemplateCommand/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference/API_TestRenderTemplate.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed

      - id: ses-test-render-missing-attribute
        condition: >-
          sesClient.send(new TestRenderTemplateCommand(...)) called with TemplateData
          JSON that is missing one or more variable names referenced in the template
        throws: MissingRenderingAttributeException
        required_handling: >-
          MUST wrap in try-catch. MissingRenderingAttributeException is thrown when
          TemplateData does not include all variables the template references.
          Unlike SendTemplatedEmailCommand (which silently fails delivery),
          TestRenderTemplateCommand explicitly throws this error.
          Catch block SHOULD log missing attribute names and fix TemplateData before
          attempting to render or send.
        sources:
