package: "@aws-sdk/client-sesv2"
semver: ">=3.0.0 <4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-11"
status: production
evidence_quality: confirmed

functions:
  - name: send
    import_path: "@aws-sdk/client-sesv2"
    description: >
      Sends any SES v2 command via SESv2Client. Primary operations include SendEmailCommand
      (transactional email), SendBulkEmailCommand (bulk), CreateContactCommand,
      CreateEmailIdentityCommand (domain verification), PutEmailIdentityMailFromAttributesCommand.
      Returns a Promise that rejects on any service error or network failure.

    postconditions:
      - id: sesv2-send-no-try-catch
        condition: >
          Any SES v2 service error or network failure: sending quota exceeded
          (SendingQuotaExceededException), identity not verified (NotFoundException on unverified email),
          message rejected (MessageRejected), account in sandbox mode (AccountSuspendedException),
          permission denied, throttling (TooManyRequestsException), or network failure.
        throws: >
          SESv2ServiceException subclass with error.name set to the specific error code.
          For throttling: TooManyRequestsException. For invalid sender: NotFoundException
          or MessageRejected. For sandbox restrictions: AccountSuspendedException.
        required_handling: >
          Caller MUST wrap client.send() in try-catch. SES v2 emails fail in
          sandbox mode (unverified recipients), on quota exhaustion, or when the
          sending identity is not verified. Unhandled rejections cause silent email
          delivery failures.

          Minimum handling:
            try {
              await sesv2Client.send(new SendEmailCommand({ ... }));
            } catch (err) {
              if (err instanceof SESv2ServiceException) {
                if (err.name === 'SendingQuotaExceededException') {
                  // Queue for retry
                }
                console.error(`SES v2 error [${err.name}]: ${err.message}`);
              }
              throw err;
            }
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/sesv2/"
          - "https://docs.aws.amazon.com/ses/latest/APIReference-V2/API_SendEmail.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

tags:
  - aws
  - email
  - ses
  - sesv2
  - transactional-email
  - error-handling
  - network
  - sdk

notes:
  - "Scan 2026-04-11: scan encountered errors (0 repos scanned due to scanner failure on only available repo). FP check: 0/20 repos. evidence_quality upgraded to confirmed based on FP check passing and existing evidence."
  - "SESv2 uses different parameters than SES v1: FromEmailAddress (not Source), Content.Simple (not Message)"
  - "SESv2Client is a separate class from SESClient — different import paths"
  - "Error class is SESv2ServiceException, not SESServiceException"
  - "Sandbox mode: only verified email addresses can receive emails by default"
  - "TooManyRequestsException: implement exponential backoff for high-volume sending"
  - "Creating/verifying email identities with CreateEmailIdentityCommand can also fail"

related_packages:
