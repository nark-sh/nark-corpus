package: "@aws-sdk/client-sns"
semver: ">=3.0.0 <4.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.86

functions:
  - name: send
    import_path: "@aws-sdk/client-sns"
    description: >
      Sends any SNS command via the SNSClient. The single entry point for all SNS
      operations in AWS SDK v3 — publishes messages, creates/deletes topics, manages
      subscriptions, and all other SNS operations. Returns a Promise that rejects on
      any network failure, AWS service error, or permission error.

    postconditions:
      # Evidence: scan-@aws-sdk-client-sns-2026-04-06.json — 0 repos scanned (3 errored due to corpus loading issue)
      # Scan confirms only 3 repos in active corpus use this package; all errored on scan
      # Contract is documentation-confirmed from AWS SDK v3 official docs
      - id: aws-sns-service-error
        condition: >
          Any AWS service error or network failure: topic does not exist
          (NotFound), insufficient permissions (AuthorizationErrorException),
          request throttling (ThrottlingException), invalid parameter
          (InvalidParameterException), endpoint disabled (EndpointDisabledException),
          KMS key errors (KMSDisabledException, KMSNotFoundException), service
          unavailable, or any network-level failure (DNS, timeout, connection refused)
        throws: >
          SNSServiceException subclass with error.name set to the specific error code
          (e.g., "NotFound", "AuthorizationErrorException", "InvalidParameterException",
          "ThrottlingException", "EndpointDisabledException"). For network errors,
          throws a generic Error or SdkClientError with a connection/timeout message.
        required_handling: >
          Caller MUST wrap client.send() in try-catch. All SNS operations can fail due
          to network issues, permission problems, topic deletion, or AWS service outages.
          Unhandled rejections cause silent message loss (for PublishCommand) or crash
          notification pipelines.

          Minimum handling:
            try {
              await snsClient.send(new PublishCommand({ TopicArn, Message }));
            } catch (error) {
              if (error instanceof SNSServiceException) {
                console.error(`SNS error [${error.name}]: ${error.message}`);
              } else {
                console.error('Network error:', error);
              }
              throw error;
            }

          For PublishBatchCommand, also check for partial failures in
          result.Failed array (HTTP 200 returned even when some messages fail).
        sources:
          - "https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/sns/"
          - "https://docs.aws.amazon.com/sns/latest/api/API_Publish.html"
          - "https://docs.aws.amazon.com/sns/latest/dg/sns-dead-letter-queues.html"
          - "https://aws.amazon.com/blogs/developer/service-error-handling-modular-aws-sdk-js/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: PublishBatchCommand
    import_path: "@aws-sdk/client-sns"
    description: >
      Publishes up to 10 messages to an SNS topic in a single batch call. Maximum total
      payload is 256 KB. Returns HTTP 200 even when some messages fail to publish —
      individual message failures are NOT thrown as exceptions but are placed in
      response.Failed[]. Callers who do not check response.Failed[] silently lose
      messages with no error signal.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/sns/latest/api/API_PublishBatch.html
      # AWS docs: "The result of publishing each message is reported individually in the response.
      #  Because the batch request can result in a combination of successful and unsuccessful
      #  actions, you should check for batch errors even when the call returns an HTTP status
      #  code of 200."
      # Confirmed from dist-types/commands/PublishBatchCommand.d.ts: response.Failed is
      #  BatchResultErrorEntry[] — not thrown, present in response body.
      - id: sns-publish-batch-failed-not-checked
        severity: error
        condition: >
          PublishBatchCommand returns HTTP 200 but response.Failed is non-empty — some
          messages were NOT delivered to topic subscribers due to endpoint disabled,
          KMS errors, authorization errors, or per-message parameter violations. Caller
          does not check response.Failed after the call.
        description: >
          PublishBatchCommand returns HTTP 200 even when individual messages fail to
          publish. Failed messages are placed in response.Failed[] as BatchResultErrorEntry
          objects with Code, Message, Id, and SenderFault fields. No exception is thrown
          for partial failures.

          Common per-message failure codes: AuthorizationError (caller lacks SNS:Publish
          permission for this endpoint), KMSAccessDenied / KMSDisabled / KMSNotFound
          (topic KMS key issues), EndpointDisabled (push notification endpoint deregistered),
          PlatformApplicationDisabled (mobile push app disabled),
          InvalidParameter / ParameterValueInvalid (per-message parameter violations).

          Callers who publish notification batches without checking response.Failed silently
          lose messages — the UI shows "notification sent" but subscribers never receive it.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed
        required_handling: >
          Caller MUST inspect response.Failed after every PublishBatch call and handle or
          alert on any failed entries. Retry SenderFault=false entries (infrastructure
          failures); do not retry SenderFault=true entries (caller-side errors).

          Pattern:
            const response = await snsClient.send(new PublishBatchCommand({ TopicArn, PublishBatchRequestEntries }));
            if (response.Failed && response.Failed.length > 0) {
              const retryable = response.Failed.filter(f => !f.SenderFault);
              const permanent = response.Failed.filter(f => f.SenderFault);
              if (permanent.length > 0) {
                console.error('Permanent batch publish failures:', permanent.map(f => `${f.Id}: ${f.Code}`));
              }
              if (retryable.length > 0) {
                // retry with exponential backoff
              }
            }
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_PublishBatch.html"
          - "https://docs.aws.amazon.com/sns/latest/api/API_BatchResultErrorEntry.html"

      - id: sns-publish-batch-request-level-error
        severity: error
        condition: >
          PublishBatchCommand throws a request-level exception before processing any
          messages: TooManyEntriesInBatchRequestException (>10 messages),
          EmptyBatchRequestException, BatchEntryIdsNotDistinctException (duplicate Id
          fields), InvalidBatchEntryIdException (Id doesn't match [A-Za-z0-9_-]{1,80}),
          or BatchRequestTooLongException (total payload >256KB).
        description: >
          PublishBatchCommand validates the entire request before processing any messages.
          Validation errors throw SNSServiceException subclasses that reject the whole
          batch (no messages are published). These are distinct from per-message failures
          in response.Failed[].

          TooManyEntriesInBatchRequest (HTTP 400): More than 10 messages in one call.
          BatchEntryIdsNotDistinct (HTTP 400): Duplicate Id values within the batch.
          BatchRequestTooLong (HTTP 400): Total size of all messages exceeds 256 KB.
          EmptyBatchRequest (HTTP 400): No entries provided.
          InvalidBatchEntryId (HTTP 400): An Id contains characters outside [A-Za-z0-9_-].
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
        required_handling: >
          Validate batch size (max 10 entries), unique Ids, and total payload size before
          calling PublishBatchCommand. Wrap in try-catch to handle SNSServiceException.
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_PublishBatch.html"

  - name: SubscribeCommand
    import_path: "@aws-sdk/client-sns"
    description: >
      Subscribes an endpoint (HTTP/S URL, email, SQS queue, Lambda, mobile push endpoint,
      SMS phone number, or Kinesis Firehose) to an SNS topic. For HTTP/S, email, and
      cross-account subscriptions, requires a confirmation step. Returns a subscription
      ARN or "pending confirmation" string. Throws account-level limit errors that are
      distinct from any other SNS operation.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/sns/latest/api/API_Subscribe.html
      # Confirmed from dist-types/commands/SubscribeCommand.d.ts: @throws list
      - id: sns-subscribe-subscription-limit-exceeded
        severity: error
        condition: >
          SubscribeCommand throws SubscriptionLimitExceededException when the AWS account
          has reached the maximum allowed number of SNS subscriptions. Default limit is
          account-level and requires AWS Support to increase.
        description: >
          SubscribeCommand throws SubscriptionLimitExceededException (HTTP 403) when the
          caller's AWS account has exceeded the maximum allowed SNS subscriptions. This
          error does not appear in generic SNS operations — it is unique to Subscribe.

          SaaS multi-tenant architectures often create per-customer subscriptions
          (e.g., one SQS queue per tenant subscribed to a shared SNS topic). High-growth
          SaaS apps can hit this limit unexpectedly during rapid customer onboarding, and
          since the error only appears at subscription creation time (not at publish time),
          it is easy to miss in load testing.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          Wrap SubscribeCommand in try-catch and handle SubscriptionLimitExceededException
          separately from other errors. When caught, alert operations team and submit
          AWS Support limit increase request. Do NOT silently swallow the error.

          Pattern:
            try {
              const result = await snsClient.send(new SubscribeCommand({ TopicArn, Protocol, Endpoint }));
            } catch (error) {
              if (error instanceof SNSServiceException) {
                if (error.name === 'SubscriptionLimitExceeded') {
                  // Alert ops team — needs AWS limit increase
                  throw new CapacityError('SNS subscription limit reached', error);
                }
                throw error;
              }
              throw error;
            }
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_Subscribe.html"

      - id: sns-subscribe-filter-policy-limit-exceeded
        severity: warning
        condition: >
          SubscribeCommand throws FilterPolicyLimitExceededException when a subscription
          filter policy is provided and the AWS account has exceeded the maximum number
          of filter policies across all subscriptions. Filter policies enable per-subscription
          message routing but are counted at the account level.
        description: >
          SubscribeCommand throws FilterPolicyLimitExceededException (HTTP 403) when adding
          a FilterPolicy attribute to the subscription would exceed the account-level filter
          policy limit. AWS accounts have a default limit on the total number of filter policy
          operators (conditions) across all subscriptions.

          This error only occurs when the subscription includes a FilterPolicy attribute.
          Subscriptions without filter policies are not affected. Multi-tenant architectures
          that create per-tenant filter policies (to route messages to specific tenant SQS
          queues) are most at risk.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
        required_handling: >
          Catch FilterPolicyLimitExceededException and alert the operations team. Consider
          redesigning to use fewer filter policies (e.g., per-topic message attributes
          instead of per-subscription filtering).
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_Subscribe.html"
          - "https://docs.aws.amazon.com/sns/latest/dg/sns-subscription-filter-policies.html"

      - id: sns-subscribe-pending-confirmation-not-handled
        severity: warning
        condition: >
          SubscribeCommand succeeds but returns "pending confirmation" instead of a real
          subscription ARN. Caller treats the subscription as active and proceeds to
          publish messages assuming delivery, but the endpoint (HTTP/S, email) has not
          yet confirmed the subscription.
        description: >
          For HTTP/S endpoint and email subscriptions, SubscribeCommand returns HTTP 200
          with SubscriptionArn set to "pending confirmation" — NOT the actual subscription
          ARN. No exception is thrown. The endpoint will NOT receive messages until
          ConfirmSubscription is called with the token sent to the endpoint.

          Confirmation tokens expire after 2 days. If the endpoint never calls
          ConfirmSubscription, the subscription remains pending indefinitely and no
          messages are delivered. Callers who check only for exceptions (not the ARN
          value) will incorrectly assume the subscription is active.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          After SubscribeCommand, check if result.SubscriptionArn === 'pending confirmation'.
          If so, inform users to check their email/endpoint for a confirmation request.
          Design subscription confirmation flows for HTTP/S endpoints.

          Pattern:
            const result = await snsClient.send(new SubscribeCommand({ TopicArn, Protocol: 'https', Endpoint: url }));
            if (result.SubscriptionArn === 'pending confirmation') {
              // Endpoint must call ConfirmSubscription — subscription not yet active
              await notifyUser('Please confirm your SNS subscription endpoint');
            }
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_Subscribe.html"
          - "https://docs.aws.amazon.com/sns/latest/dg/SendMessageToHttp.html"

  - name: CreateTopicCommand
    import_path: "@aws-sdk/client-sns"
    description: >
      Creates an SNS topic. Idempotent — calling with an existing topic name returns the
      existing ARN without error. Standard topics support up to 100,000 per account;
      FIFO topics support up to 1,000 per account. FIFO topics require the name to end
      with ".fifo" suffix.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/sns/latest/api/API_CreateTopic.html
      # Confirmed from dist-types/commands/CreateTopicCommand.d.ts: @throws list
      # AWS docs: "This action is idempotent, so if the requester already owns a topic
      #  with the specified name, that topic's ARN is returned without creating a new topic."
      - id: sns-create-topic-limit-exceeded
        severity: error
        condition: >
          CreateTopicCommand throws TopicLimitExceededException when the AWS account
          has reached the maximum number of SNS topics (100,000 standard topics or
          1,000 FIFO topics per account).
        description: >
          CreateTopicCommand throws TopicLimitExceededException (HTTP 403) when the
          account-level topic limit is reached. The default limit is 100,000 standard
          SNS topics or 1,000 FIFO topics per AWS account.

          SaaS architectures that dynamically create per-customer, per-feature, or
          per-environment topics at scale can hit this limit unexpectedly.
          CreateTopicCommand is idempotent for existing topic names, so this error
          only surfaces when genuinely new topics are being created.

          FIFO topic limit (1,000) is especially easy to hit if teams create FIFO topics
          per feature or per region during CI/CD pipelines.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          Catch TopicLimitExceededException and alert the operations team. Audit topic
          usage to identify unused topics that can be deleted. Request an AWS Support
          limit increase if needed.

          Note: CreateTopicCommand is idempotent — calling it with the same topic name
          does NOT hit the limit again. Only new unique topic names consume the quota.
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_CreateTopic.html"
          - "https://docs.aws.amazon.com/general/latest/gr/sns.html"

      - id: sns-create-topic-concurrent-access-exception
        severity: warning
        condition: >
          CreateTopicCommand throws ConcurrentAccessException when multiple callers
          attempt to tag the same topic simultaneously during creation. This is a race
          condition specific to CreateTopic with Tags when concurrent requests arrive.
        description: >
          CreateTopicCommand can throw ConcurrentAccessException (HTTP 400) when the
          same topic ARN is being tagged by concurrent CreateTopic or TagResource calls.
          This is a transient error — retrying with exponential backoff resolves it.

          This error is distinct from the normal idempotency behavior: even though
          CreateTopic is idempotent for topic creation, concurrent tagging on the same
          topic name can still produce this transient conflict.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed
        required_handling: >
          Catch ConcurrentAccessException and retry with exponential backoff (it is
          transient). Do not propagate ConcurrentAccessException to end users.
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_CreateTopic.html"

  - name: PublishCommand
    import_path: "@aws-sdk/client-sns"
    description: >
      Publishes a single message to an SNS topic, phone number (SMS), or mobile push endpoint.
      The most-called SNS command in production SaaS code. Unlike PublishBatchCommand, all
      failures are surfaced as thrown exceptions (no partial-success response pattern).
      Distinguished from the generic send() postcondition by its unique error surface:
      endpoint disabled, platform application disabled, and the full KMS error family for
      encrypted topics.

    postconditions:
      # Evidence: https://docs.aws.amazon.com/sns/latest/api/API_Publish.html
      # @throws list confirmed from dist-types/commands/PublishCommand.d.ts (sdk v3.1075.0):
      # AuthorizationErrorException, EndpointDisabledException, InternalErrorException,
      # InvalidParameterException, InvalidParameterValueException, InvalidSecurityException,
      # KMSAccessDeniedException, KMSDisabledException, KMSInvalidStateException,
      # KMSNotFoundException, KMSOptInRequired, KMSThrottlingException, NotFoundException,
      # PlatformApplicationDisabledException, ValidationException, SNSServiceException
      - id: sns-publish-endpoint-disabled-not-handled
        severity: error
        condition: >
          PublishCommand throws EndpointDisabledException (HTTP 400) when the mobile push
          endpoint (APNs / FCM device token) has been disabled by the push notification
          service — typically because the token was revoked, the app was uninstalled, or
          the provider (Apple/Google) flagged the endpoint as invalid. The endpoint must
          be deleted and re-registered with a fresh token, OR re-enabled via
          SetEndpointAttributes before retry.
        description: >
          EndpointDisabledException surfaces only when publishing to a mobile push endpoint
          (Protocol=application). SNS automatically disables endpoints when the underlying
          push provider returns a permanent-failure feedback (e.g. APNs Feedback Service,
          FCM NotRegistered). Subsequent PublishCommand calls to that endpoint throw —
          they do not silently succeed.

          Naive retry loops that catch and re-throw will hammer SNS with guaranteed-failing
          requests, burning API quota and SMS spend. Production push pipelines must either
          (a) remove the EndpointArn from the user's device list on EndpointDisabled, or
          (b) call SetEndpointAttributes({ Enabled: 'true', Token: <new-token> }) when a
          new token is available from the client app.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          Catch EndpointDisabledException specifically and route to the device-deregistration
          flow. Do NOT propagate to user-facing error UI (the user didn't do anything wrong)
          and do NOT blindly retry.

          Pattern:
            try {
              await snsClient.send(new PublishCommand({ TargetArn: endpointArn, Message }));
            } catch (error) {
              if (error instanceof SNSServiceException) {
                if (error.name === 'EndpointDisabled') {
                  await markEndpointDisabled(endpointArn);
                  return;
                }
                if (error.name === 'PlatformApplicationDisabled') {
                  await alertOps('Platform application disabled — check APNs/FCM credentials');
                  return;
                }
              }
              throw error;
            }
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_Publish.html"
          - "https://docs.aws.amazon.com/sns/latest/dg/sns-mobile-application-as-subscriber.html"
          - "https://docs.aws.amazon.com/sns/latest/api/API_SetEndpointAttributes.html"

      - id: sns-publish-kms-error-not-handled
        severity: error
        condition: >
          PublishCommand throws one of the KMS error family — KMSAccessDeniedException,
          KMSDisabledException, KMSInvalidStateException, KMSNotFoundException,
          KMSOptInRequired, or KMSThrottlingException — when the destination topic is
          encrypted at rest with a KMS customer master key and the key is unavailable to
          the publishing principal. Distinct from generic AuthorizationError because the
          failure is on the KMS key, NOT the SNS topic.
        description: >
          Server-side encryption (SSE) is enabled when a topic's KmsMasterKeyId attribute
          is set. Every PublishCommand to an SSE-enabled topic requires that the publishing
          IAM principal have kms:GenerateDataKey AND kms:Decrypt on that key, AND that the
          key be enabled, in the right state, in the right region, and not throttled.

          KMSDisabledException: customer disabled the key (often during rotation).
          KMSAccessDeniedException: key policy or IAM does not grant kms:GenerateDataKey.
          KMSInvalidStateException: key is PendingDeletion or PendingImport.
          KMSNotFoundException: key was scheduled for deletion and removed.
          KMSOptInRequired: AWS account hasn't opted into the region the key lives in.
          KMSThrottlingException: KMS request rate exceeded (high-volume notification streams).

          These errors are mis-diagnosed as SNS permission errors in postmortems because
          the error message references SNS:Publish, but the underlying cause is the KMS key.
          Production runbooks that only check SNS IAM will spin for hours on a disabled key.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        required_handling: >
          Catch KMS* error names separately from AuthorizationErrorException. Surface the
          KMS error code to operators so they investigate the KMS key, not the SNS topic.
          For KMSThrottlingException specifically, retry with exponential backoff (it is
          transient).

          Pattern:
            try {
              await snsClient.send(new PublishCommand({ TopicArn, Message }));
            } catch (error) {
              if (error instanceof SNSServiceException) {
                if (error.name.startsWith('KMS')) {
                  if (error.name === 'KMSThrottling') {
                    return retryWithBackoff(() => snsClient.send(...));
                  }
                  await alertOps(`SNS topic encrypted with disabled/inaccessible KMS key: ${error.name}`);
                  throw new InfrastructureError('SNS topic KMS key unavailable', error);
                }
              }
              throw error;
            }
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_Publish.html"
          - "https://docs.aws.amazon.com/sns/latest/dg/sns-server-side-encryption.html"
          - "https://docs.aws.amazon.com/kms/latest/developerguide/services-sns.html"

  - name: ConfirmSubscriptionCommand
    import_path: "@aws-sdk/client-sns"
    description: >
      Confirms a pending subscription using a token sent to the endpoint by the prior
      SubscribeCommand call. Required for HTTP/S endpoint and email subscriptions to
      transition from "pending confirmation" to active. Tokens expire after 2 days.
      Unique error: ReplayLimitExceededException (token reused too many times).

    postconditions:
      # Evidence: https://docs.aws.amazon.com/sns/latest/api/API_ConfirmSubscription.html
      # @throws list confirmed from dist-types/commands/ConfirmSubscriptionCommand.d.ts (sdk v3.1075.0):
      # AuthorizationErrorException, FilterPolicyLimitExceededException, InternalErrorException,
      # InvalidParameterException, NotFoundException, ReplayLimitExceededException,
      # SubscriptionLimitExceededException, SNSServiceException
      - id: sns-confirm-subscription-replay-limit-exceeded
        severity: error
        condition: >
          ConfirmSubscriptionCommand throws ReplayLimitExceededException when the same
          confirmation token has been replayed more times than the AWS-imposed limit allows.
          Indicates either a misbehaving client retry loop or an attempted token-replay
          attack. The token becomes permanently unusable; a fresh SubscribeCommand call is
          required to issue a new one.
        description: >
          SNS imposes a per-token replay cap to prevent confirmation-token abuse. When a
          confirmation endpoint repeatedly POSTs the same token (e.g. due to a buggy webhook
          retry that doesn't respect 200 responses), SNS throws ReplayLimitExceededException
          instead of silently accepting the duplicate.

          Once this error fires, the original SubscribeCommand pending state is dead — the
          endpoint will never become active using that token. The subscription flow must
          restart from SubscribeCommand to get a new token. A confirmation webhook that
          catches and ignores this error will leave the subscription permanently pending.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: >
          Catch ReplayLimitExceededException specifically and trigger a re-subscription
          flow rather than retrying ConfirmSubscription. Log the event for security review
          (may indicate token-replay probing) and notify the endpoint owner that
          re-subscription is required.

          Pattern:
            try {
              await snsClient.send(new ConfirmSubscriptionCommand({ TopicArn, Token }));
            } catch (error) {
              if (error instanceof SNSServiceException) {
                if (error.name === 'ReplayLimitExceeded') {
                  await logSecurityEvent('SNS confirmation token replay limit hit', { TopicArn });
                  await triggerResubscriptionFlow(TopicArn);
                  return;
                }
                if (error.name === 'InvalidParameter') {
                  await notifyUser('Confirmation token expired or invalid — please re-subscribe');
                  return;
                }
              }
              throw error;
            }
        sources:
          - "https://docs.aws.amazon.com/sns/latest/api/API_ConfirmSubscription.html"

      - id: sns-confirm-subscription-token-invalid-not-handled
        severity: warning
        condition: >
          ConfirmSubscriptionCommand throws InvalidParameterException when the token is
          malformed, expired (older than 2 days), or does not match the TopicArn. The
          subscription remains in pending state — no exception during SubscribeCommand
          flagged the problem because confirmation is async.
        description: >
          The confirmation token is a short-lived (2-day) opaque value sent to the
          subscription endpoint. Common failure modes that surface as InvalidParameterException
          at confirmation time:

          - Endpoint took longer than 2 days to confirm (user ignored the email).
          - The token was truncated by an intermediate URL handler.
          - The subscription was deleted between SubscribeCommand and ConfirmSubscription.
          - TopicArn mismatch (confirmation routed to wrong topic in multi-topic systems).

          Callers that catch InvalidParameterException generically (alongside auth errors,
          parameter validation, etc.) lose the signal that the user needs to be prompted
          to re-initiate subscription. The webhook returns 200 to SNS, but the subscription
          never becomes active and the user receives nothing.
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed
        required_handling: >
          When InvalidParameterException is thrown by ConfirmSubscriptionCommand
          specifically, surface a clear "your subscription confirmation expired, please
          re-subscribe" message to the end user. Do not retry with the same token.

          Pattern:
            try {
              await snsClient.send(new ConfirmSubscriptionCommand({ TopicArn, Token }));
            } catch (error) {
              if (error instanceof SNSServiceException && error.name === 'InvalidParameter') {
                return { ok: false, reason: 'token_expired_or_invalid' };
              }
              throw error;
            }
