package: "@aws-sdk/client-s3"
semver: ^3.0.0
contract_version: 1.1.0
maintainer: corpus-team
last_verified: 2026-04-06
status: production
evidence_quality: confirmed
coverage_score: 0.88
functions:
  - name: send
    import_path: "@aws-sdk/client-s3"
    description: Sends S3 commands (GetObject, PutObject, DeleteObject, etc.) to AWS S3
    postconditions:
      - id: s3-object-operation-no-try-catch
        condition: s3Client.send() called with object operation commands without try-catch
        throws: NoSuchKey (404), AccessDenied (403), NoSuchBucket (404), network errors
        severity: error
        description: |
          S3 object operations (GetObjectCommand, PutObjectCommand, DeleteObjectCommand, HeadObjectCommand, CopyObjectCommand) are called without try-catch block. These operations make network requests to AWS S3 and can fail with NoSuchKey (object not found), AccessDenied (permission issues), NoSuchBucket (bucket doesn't exist), or network errors. Unhandled promise rejections will crash the application.
        detector: |
          If s3Client.send(new GetObjectCommand(...)) or similar object operation commands are called in an async context without try-catch wrapping the await
        required_handling: |
          MUST wrap await s3Client.send() in try-catch block when using GetObjectCommand, PutObjectCommand, DeleteObjectCommand, HeadObjectCommand, or CopyObjectCommand. Catch block should check error.name for specific error types (NoSuchKey, AccessDenied, NoSuchBucket) and handle appropriately.
        source: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: s3-multipart-no-try-catch
        condition: s3Client.send() called with multipart commands without try-catch
        throws: NoSuchUpload (404), EntityTooSmall (400), InvalidPart (400)
        severity: error
        description: |
          S3 multipart upload operations (CreateMultipartUploadCommand, UploadPartCommand, CompleteMultipartUploadCommand) are called without try-catch block. Multipart uploads are complex multi-step operations that can fail at any stage. Without error handling, failed uploads leave orphaned parts that consume storage and incur costs.
        detector: |
          If s3Client.send(new CreateMultipartUploadCommand(...)) or similar multipart commands are called without try-catch, especially without AbortMultipartUpload in catch block
        required_handling: |
          MUST wrap multipart upload operations in try-catch block. Catch block MUST call AbortMultipartUploadCommand with the uploadId to clean up orphaned parts. This prevents storage charges for incomplete uploads.
        source: https://docs.aws.amazon.com/AmazonS3/latest/userguide/mpuoverview.html
        sources:
          - https://docs.aws.amazon.com/AmazonS3/latest/userguide/mpuoverview.html
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
      - id: s3-bucket-operation-no-try-catch
        condition: s3Client.send() called with bucket operations without try-catch
        throws: BucketAlreadyExists (409), BucketNotEmpty (409), NoSuchBucket (404)
        severity: error
        description: |
          S3 bucket operations (CreateBucketCommand, DeleteBucketCommand, HeadBucketCommand) are called without try-catch block. Bucket names are globally unique across AWS. CreateBucket can fail if name is taken, DeleteBucket fails if bucket not empty, and all operations fail with permission errors.
        detector: |
          If s3Client.send(new CreateBucketCommand(...)) or similar bucket commands are called without try-catch wrapping the await
        required_handling: |
          MUST wrap bucket operations in try-catch block. Handle BucketAlreadyExists/BucketAlreadyOwnedByYou gracefully (may be acceptable), check BucketNotEmpty before deletion, validate permissions.
        source: https://docs.aws.amazon.com/AmazonS3/latest/API/ErrorResponses.html
        sources:
          - https://docs.aws.amazon.com/AmazonS3/latest/API/ErrorResponses.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: s3-list-operation-no-try-catch
        condition: s3Client.send() called with list operations without try-catch
        throws: NoSuchBucket (404), AccessDenied (403), InvalidArgument (400)
        severity: warning
        description: |
          S3 list operations (ListObjectsV2Command, ListBucketsCommand) are called without try-catch block. While less critical than object operations, list operations can still fail if bucket doesn't exist, permissions are insufficient, or pagination parameters are invalid.
        detector: |
          If s3Client.send(new ListObjectsV2Command(...)) or similar list commands are called without try-catch wrapping the await
        required_handling: |
          SHOULD wrap list operations in try-catch block for robustness. Handle NoSuchBucket and AccessDenied errors gracefully. Implement pagination properly with ContinuationToken.
        source: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: S3Client
    import_path: "@aws-sdk/client-s3"
    description: Initializes AWS S3 client
    postconditions:
      - id: s3-client-no-retry-config
        condition: S3Client created without retry configuration
        severity: info
        description: |
          S3Client is instantiated without retry configuration (maxAttempts, retryMode). AWS S3 can return SlowDown (503) errors when request rate is too high. Without retry configuration, requests fail unnecessarily. The SDK provides built-in retry with adaptive or standard modes.
        detector: |
          If 'new S3Client({ region })' is called without maxAttempts or retryMode in config
        required_handling: |
          CONSIDER configuring retry settings: new S3Client({ region, maxAttempts: 3, retryMode: 'adaptive' }). Adaptive mode adjusts retry attempts based on throttling signals from AWS.
        source: https://docs.aws.amazon.com/sdk-for-javascript/v3/developer-guide/error-handling.html
        sources:
          - https://docs.aws.amazon.com/sdk-for-javascript/v3/developer-guide/error-handling.html
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
      - id: s3-client-missing-region
        condition: S3Client created without explicit region
        severity: warning
        description: |
          S3Client is instantiated without explicit region configuration. While SDK falls back to environment variables or default region, explicit region configuration prevents unexpected behavior and makes code more maintainable.
        detector: |
          If 'new S3Client({})' is called with empty config or without region property
        required_handling: |
          SHOULD explicitly set region: new S3Client({ region: 'us-east-1' }) or use environment variable with fallback.
        source: https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
  - name: DeleteObjectsCommand
    import_path: "@aws-sdk/client-s3"
    description: >
      Batch-deletes up to 1000 S3 objects in a single request. Unlike single-object
      delete, this command does NOT throw exceptions for individual object failures —
      failures are reported in the response Errors array. Callers must explicitly
      check response.Errors after every batch delete to detect silent failures.
    postconditions:
      - id: s3-batch-delete-errors-not-checked
        condition: >
          s3Client.send(DeleteObjectsCommand) is called and the response.Errors array
          is not checked after the await resolves
        throws: S3ServiceException (for auth/request failures); individual object errors are in response.Errors[]
        severity: error
        description: >
          s3Client.send(new DeleteObjectsCommand(...)) does not throw when individual
          objects fail to delete — errors are silently returned in response.Errors[].
          If the caller does not check response.Errors after the await, failed deletions
          are silently discarded. The await resolves successfully even when 0 of N
          objects were actually deleted.
        required_handling: >
          MUST check response.Errors after every DeleteObjectsCommand call.
          If response.Errors && response.Errors.length > 0, handle each failed key
          individually. Do not assume all objects were deleted just because the
          command did not throw.
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/command/DeleteObjectsCommand/
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: s3-batch-delete-quiet-mode-unchecked
        condition: >
          DeleteObjectsCommand is called with Delete.Quiet: true and response.Errors
          is not checked after the await
        throws: response.Errors[] contains deletion failures (not thrown)
        severity: warning
        description: >
          When Delete.Quiet is set to true in DeleteObjectsCommand input, the response
          body omits successfully deleted objects and returns only failures in Errors[].
          If Quiet mode is used without checking response.Errors, partial failures are
          completely invisible — the response appears empty on both success and failure.
        required_handling: >
          SHOULD check response.Errors even in Quiet mode. If response.Errors has entries,
          log failed keys and handle appropriately. Consider using verbose mode (Quiet: false)
          in non-performance-critical paths to get full deletion confirmation.
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/command/DeleteObjectsCommand/
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: waitUntilObjectExists
    import_path: "@aws-sdk/client-s3"
    description: >
      Polls HeadObjectCommand until the specified S3 object exists, throws TimeoutError
      if the object doesn't appear within the configured maxWaitTime. Commonly used
      after uploads to confirm object availability before returning a presigned URL.
      Replaces the deprecated waitForObjectExists().
    postconditions:
      - id: s3-waiter-timeout-not-handled
        condition: >
          waitUntilObjectExists() is called without a try-catch block and the object
          does not appear within maxWaitTime seconds
        throws: TimeoutError (error.name === 'TimeoutError') from @smithy/util-waiter
        severity: error
        description: >
          waitUntilObjectExists() throws TimeoutError (error.name === 'TimeoutError')
          when the object does not appear within maxWaitTime seconds. This is a thrown
          exception, not a returned value. Upload confirmation flows that assume the
          object "will eventually appear" without error handling crash with an unhandled
          rejection in serverless/Lambda contexts.
        required_handling: >
          MUST wrap waitUntilObjectExists in try-catch. Check error.name === 'TimeoutError'
          to distinguish timeout from other failures. Return a meaningful error to the
          caller rather than propagating the raw TimeoutError.
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: s3-waiter-abort-not-handled
        condition: >
          waitUntilObjectExists() is called with an AbortSignal and the signal is
          triggered before the waiter completes, without try-catch handling AbortError
        throws: AbortError (error.name === 'AbortError') from @smithy/util-waiter
        severity: warning
        description: >
          waitUntilObjectExists() throws AbortError (error.name === 'AbortError') when
          the waiter is cancelled via an AbortController signal before completion.
          Applications that use AbortController for request cancellation must handle
          this distinct error type separately from TimeoutError.
        required_handling: >
          SHOULD handle AbortError separately from TimeoutError in catch block.
          AbortError means intentional cancellation; TimeoutError means capacity issue.
          Treat AbortError as a clean cancellation, not a failure.
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: waitUntilBucketExists
    import_path: "@aws-sdk/client-s3"
    description: >
      Polls HeadBucketCommand until the specified S3 bucket exists, throws TimeoutError
      if the bucket doesn't appear within maxWaitTime. Used in infrastructure provisioning
      and bucket creation confirmation flows. Replaces deprecated waitForBucketExists().
    postconditions:
      - id: s3-bucket-waiter-timeout-not-handled
        condition: >
          waitUntilBucketExists() is called without a try-catch block and the bucket
          does not become accessible within maxWaitTime seconds
        throws: TimeoutError (error.name === 'TimeoutError') from @smithy/util-waiter
        severity: error
        description: >
          waitUntilBucketExists() throws TimeoutError (error.name === 'TimeoutError')
          when the bucket does not appear within maxWaitTime seconds. Infrastructure
          provisioning code that uses this waiter to confirm bucket creation will crash
          if the bucket doesn't propagate in time (common across AWS regions with
          eventual consistency).
        required_handling: >
          MUST wrap waitUntilBucketExists in try-catch. Handle TimeoutError by retrying
          with increased maxWaitTime or surfacing a meaningful error. Do not assume
          bucket creation is always fast — cross-region propagation adds latency.
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: AbortMultipartUploadCommand
    import_path: "@aws-sdk/client-s3"
    description: >
      Cancels a multipart upload by UploadId, freeing stored parts. Must be called in
      catch blocks of multipart upload flows to prevent orphaned part storage charges.
      The abort itself can throw NoSuchUpload, and may require multiple calls if parts
      are in flight per AWS documentation.
    postconditions:
      - id: s3-abort-multipart-no-try-catch
        condition: >
          s3Client.send(AbortMultipartUploadCommand) is called without try-catch,
          especially inside a catch block of a failed multipart upload flow
        throws: NoSuchUpload (404) when UploadId is invalid, expired, or already completed
        severity: error
        description: >
          s3Client.send(new AbortMultipartUploadCommand(...)) throws NoSuchUpload (404)
          if the UploadId is invalid or the multipart upload already expired/completed.
          AbortMultipartUpload is typically called in catch blocks to clean up failed
          uploads — if the abort itself throws without being wrapped in try-catch,
          the exception masks the original upload error and leaves cleanup state unknown.
        required_handling: >
          MUST wrap AbortMultipartUploadCommand in try-catch when used in cleanup paths.
          Handle NoSuchUpload gracefully (the upload may have already been cleaned up).
          Log the abort failure but do not let it mask the original error.
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/command/AbortMultipartUploadCommand/
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: s3-abort-multipart-in-flight-parts
        condition: >
          AbortMultipartUploadCommand is called once without verifying all parts
          are freed, when concurrent part uploads may still be in flight
        throws: S3 does not throw — parts may remain and incur storage charges silently
        severity: warning
        description: >
          Per AWS documentation: "if any part uploads are currently in progress, those
          part uploads might or might not succeed. It might be necessary to abort a given
          multipart upload multiple times in order to completely free all storage consumed
          by all parts." A single AbortMultipartUploadCommand does not guarantee cleanup.
        required_handling: >
          SHOULD call ListPartsCommand after AbortMultipartUpload to verify all parts
          are freed. If parts remain, retry the abort. This prevents ongoing storage
          charges for abandoned upload parts.
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/command/AbortMultipartUploadCommand/
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: RestoreObjectCommand
    import_path: "@aws-sdk/client-s3"
    description: >
      Initiates restore of a Glacier-archived object to a temporary accessible state.
      Used in download flows for objects stored in S3 Glacier Flexible Retrieval or
      Deep Archive. Throws ObjectAlreadyInActiveTierError if object is already active.
    postconditions:
      - id: s3-restore-object-no-try-catch
        condition: >
          s3Client.send(RestoreObjectCommand) is called without try-catch
        throws: >
          ObjectAlreadyInActiveTierError (409) when object is in active tier;
          RestoreAlreadyInProgress (409) when restore is already running
        severity: error
        description: >
          s3Client.send(new RestoreObjectCommand(...)) throws ObjectAlreadyInActiveTierError
          (HTTP 409) when the object is already in an active storage tier (Standard,
          Intelligent-Tiering active tier). It also throws RestoreAlreadyInProgress (409)
          if a restore is already in flight for the same object. Both are client faults
          that must be handled explicitly — unhandled, they crash the restore flow.
        required_handling: >
          MUST wrap RestoreObjectCommand in try-catch. Handle ObjectAlreadyInActiveTierError
          gracefully (object is already accessible, no restore needed). Handle
          RestoreAlreadyInProgress as informational (check restore status before retrying).
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/command/RestoreObjectCommand/
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: s3-restore-expedited-unavailable
        condition: >
          RestoreObjectCommand is called with GlacierJobParameters.Tier: 'Expedited'
          without fallback handling for capacity unavailability
        throws: GlacierExpeditedRetrievalNotAvailable (503) when expedited capacity is insufficient
        severity: warning
        description: >
          GlacierExpeditedRetrievalNotAvailable (HTTP 503) is thrown when expedited
          Glacier retrieval capacity is insufficient. Applications using Tier: "Expedited"
          must fall back to "Standard" retrieval on this error. Without handling, the
          restore fails permanently when expedited capacity is unavailable.
        required_handling: >
          SHOULD catch GlacierExpeditedRetrievalNotAvailable and retry with
          Tier: "Standard" as fallback. Do not surface expedited-specific errors to
          end users — fall back silently to Standard tier.
        sources:
          - https://docs.aws.amazon.com/AWSJavaScriptSDK/v3/latest/client/s3/command/RestoreObjectCommand/
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

