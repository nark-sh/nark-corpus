package: "@hapi/hapi"
semver: ">=21.0.0 <22.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-01"
status: production
evidence_quality: confirmed

detection:
  type_names:
    - Server
    - ServerRoute
    - Request
    - ResponseToolkit

functions:
  - name: route
    import_path: "@hapi/hapi"
    description: "Registers a route handler on the hapi server. Handlers may throw synchronously or return rejected promises if async operations (DB queries, external calls) fail without error handling."
    postconditions:
      # Evidence: seen in 7 primary firings across 2 repos (graphql__graphql-playground, remult__remult)
      # Top affected: remult/remult (⭐ 3205 stars) — 6 violations in remult-hapi.ts and hapiServer.ts
      #               graphql/graphql-playground (⭐ 8860 stars) — 1 violation in middleware-hapi/src/index.ts
      - id: route-handler-error
        condition: "route handler throws error or promise rejects (database error, validation error)"
        throws: "Error causing 500 Internal Server Error response if not handled - this will crash the application."
        required_handling: "Route handlers MUST handle errors with try-catch or return error via h.response().code() to prevent server crash and provide proper error responses. Use h.response(error).code(statusCode) for controlled error responses."
        sources:
          - "https://hapi.dev/api/?v=21.4.6#-serverrouteroute"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: start
    import_path: "@hapi/hapi"
    description: "Starts the hapi server and begins listening for connections. Throws if the port is already in use, a plugin fails to register, or configuration is invalid."
    postconditions:
      - id: start-error
        condition: "server fails to start (port in use, invalid configuration, plugin error)"
        throws: "Error with startup failure details"
        required_handling: "Caller MUST wrap server.start() in try-catch to handle startup errors. Port conflicts, plugin failures, and configuration errors crash application if unhandled."
        sources:
          - "https://hapi.dev/api/?v=21.4.6#-async-serverstartoptionsoptions"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

edge_cases:
  - id: centralized-error-handling
    description: "Configure onPreResponse extension point for centralized error handling - ensures consistent error responses across all routes and proper error formatting"
    sources:
      - "https://hapi.dev/api/?v=21.4.6#-serverextoptions"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

