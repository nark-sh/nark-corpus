package: square
semver: ">=8.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-25"
status: production
evidence_quality: stub

functions:
  - name: create
    import_path: "square"
    description: "Creates a Square payment via the Payments API"

    postconditions:
      - id: invalid-request-error
        condition: "Invalid request parameters (missing required fields, invalid values)"
        throws: "SquareError with 4xx statusCode"
        required_handling: >
          Caller MUST catch SquareError and validate request parameters.
          Check err.body and err.errors array for specific validation failures.
          DO NOT retry without fixing the request parameters.
        sources:
          - "https://developer.squareup.com/docs/sdks/nodejs/quick-start"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: authentication-error
        condition: "Invalid or expired access token"
        throws: "SquareError with statusCode 401"
        required_handling: >
          Caller MUST NOT retry. This indicates invalid credentials.
          Log error and alert operations team to check API credentials.
        sources:
          - "https://developer.squareup.com/docs/sdks/nodejs"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: rate-limit-error
        condition: "Too many API requests"
        throws: "SquareError with statusCode 429"
        required_handling: >
          Caller MUST implement exponential backoff retry logic.
          SDK automatically retries on 429 (default: 2 attempts).
          For extended rate limiting, implement backoff with longer delays.
        sources:
          - "https://developer.squareup.com/docs/build-basics/common-api-patterns/rate-limiting"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: payment-declined
        condition: "Payment method declined or card verification failed"
        throws: "SquareError with statusCode 422 and payment-specific error codes"
        required_handling: >
          Caller MUST handle payment failures gracefully.
          Check err.errors array for specific decline reasons.
          Display user-friendly message and allow payment method update.
          DO NOT retry declined payments without user intervention.
        sources:
          - "https://developer.squareup.com/docs/payments-api/error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: idempotency-conflict
        condition: "Idempotency key already used with different parameters"
        throws: "SquareError with statusCode 409"
        required_handling: >
          Caller MUST generate a new idempotency key.
          This indicates duplicate request with conflicting data.
          Either retry with new key or retrieve the original result.
        sources:
          - "https://developer.squareup.com/docs/build-basics/common-api-patterns/idempotency"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: server-error
        condition: "Square server error"
        throws: "SquareError with 5xx statusCode"
        required_handling: >
          Caller MUST implement retry with exponential backoff.
          SDK automatically retries 5xx errors (default: 2 attempts).
          Log error and monitor for persistent issues.
        sources:
          - "https://developer.squareup.com/docs/sdks/nodejs"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: network-error
        condition: "Network connectivity issue or timeout"
        throws: "SquareError with statusCode 408 or connection error"
        required_handling: >
          Caller MUST implement retry with exponential backoff.
          SDK automatically retries 408 timeout errors (default: 2 attempts).
          Use idempotency keys to prevent duplicate charges on retry.
        sources:
          - "https://developer.squareup.com/docs/sdks/nodejs"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

