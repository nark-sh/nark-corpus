# Square Node.js SDK v44 — SquareClient-based API
# SDK throws SquareError on all API and network failures. SquareError has:
#   .statusCode — HTTP status code (number | undefined)
#   .body — raw response body (unknown)
#   .errors — Array<{ category, code, detail?, field? }>
#   .rawResponse — raw HTTP response
# SquareTimeoutError is thrown on network timeouts (distinct class from SquareError).
#
# Error categories (ErrorCategory enum — confirmed from square@44.0.1 ErrorCategory.d.ts):
#   API_ERROR — server error, safe to retry
#   AUTHENTICATION_ERROR — bad/expired/revoked token
#   INVALID_REQUEST_ERROR — bad request params
#   RATE_LIMIT_ERROR — too many requests, use backoff
#   PAYMENT_METHOD_ERROR — card declined, CVV failure, etc.
#   REFUND_ERROR — refund-specific failures
#   MERCHANT_SUBSCRIPTION_ERROR — subscription plan issues
#   EXTERNAL_VENDOR_ERROR — third-party processor failure
#
# Evidence sources (all fetched 2026-04-16):
#   square@44.0.1 TypeScript declarations (local npm install)
#   https://developer.squareup.com/reference/square/payments-api/create-payment
#   https://developer.squareup.com/reference/square/refunds-api/refund-payment
#   https://developer.squareup.com/reference/square/subscriptions-api/create-subscription
#   https://developer.squareup.com/reference/square/enums/ErrorCategory
#   https://developer.squareup.com/reference/square/enums/ErrorCode
#   https://developer.squareup.com/docs/build-basics/handling-errors
#
# Depth pass 2026-04-16 (deepen-stream-1 pass 3):
# API surface: 15 async write operations (primary SaaS usage)
# Contracted before: 8 stub functions (wrong method names, no evidence)
# Contracted after: 10 functions (correct v44 namespaced API, confirmed errors)
# Omitted: 5 (read-only GETs: payments.get, payments.list, refunds.get, refunds.list, orders.batchGet)
# Coverage: 10/15 = 0.67
#
# Depth pass 2026-04-16 (deepen-stream-2 pass 4):
# API surface: 20 async write operations (expanded — cards, invoices, orders.update/pay, customers.update)
# Contracted before: 10 (pass 3 total)
# Contracted after: 15 (added: cards.create, invoices.create, invoices.publish, orders.update, orders.pay)
# Omitted: 5 (unchanged: read-only GETs)
# Coverage: 15/20 = 0.75
coverage_score: 0.75

package: square
semver: ">=40.0.0"
contract_version: "2.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-16"  # updated by deepen-stream-2 pass 4
status: production
evidence_quality: confirmed

detection:
  class_names:
    - "SquareClient"
    - "PaymentsClient"
    - "OrdersClient"
    - "CustomersClient"
    - "RefundsClient"
    - "SubscriptionsClient"

functions:
  - name: payments.create
    import_path: "square"
    description: >
      Creates a payment using the provided source. The most critical Square method.
      Usage: await client.payments.create({ sourceId, idempotencyKey, amountMoney }).
      Returns HttpResponsePromise<CreatePaymentResponse>.

    postconditions:
      - id: square-payments-create-auth-error
        condition: >
          Access token is missing, expired (ACCESS_TOKEN_EXPIRED), revoked
          (ACCESS_TOKEN_REVOKED), or lacks required permissions (INSUFFICIENT_SCOPES).
        throws: >
          SquareError with errors[0].category === AUTHENTICATION_ERROR.
          Codes: UNAUTHORIZED, ACCESS_TOKEN_EXPIRED, ACCESS_TOKEN_REVOKED,
          CLIENT_DISABLED, FORBIDDEN, INSUFFICIENT_SCOPES.
        required_handling: >
          Caller MUST wrap in try-catch. Check errors[0].code to distinguish expired
          (rotate token) from revoked (alert ops). Do NOT retry without resolving auth.
        sources:
          - "https://developer.squareup.com/reference/square/enums/ErrorCategory"
          - "https://developer.squareup.com/reference/square/enums/ErrorCode"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: critical

      - id: square-payments-create-card-declined
        condition: >
          Card is declined by the issuer during payment processing.
        throws: >
          SquareError with errors[0].category === PAYMENT_METHOD_ERROR.
          Codes: GENERIC_DECLINE, INSUFFICIENT_FUNDS, CVV_FAILURE, CARD_EXPIRED,
          EXPIRATION_FAILURE, INVALID_CARD, PAN_FAILURE, ADDRESS_VERIFICATION_FAILURE,
          TRANSACTION_LIMIT, CARD_DECLINED_VERIFICATION_REQUIRED,
          CARDHOLDER_INSUFFICIENT_PERMISSIONS, VOICE_FAILURE.
        required_handling: >
          Caller MUST wrap in try-catch and read errors[0].code to show appropriate
          user message. GENERIC_DECLINE means try another card. INSUFFICIENT_FUNDS
          means notify user. CARD_DECLINED_VERIFICATION_REQUIRED triggers 3DS flow.
          Do NOT show raw error codes to users.
        sources:
          - "https://developer.squareup.com/reference/square/payments-api/create-payment"
          - "https://developer.squareup.com/reference/square/enums/ErrorCode"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: square-payments-create-invalid-request
        condition: >
          Required fields missing (sourceId or amountMoney), nonce expired (5 min TTL),
          nonce already used (single-use only), appFeeMoney exceeds payment amount,
          or locationId not found or inactive.
        throws: >
          SquareError with errors[0].category === INVALID_REQUEST_ERROR.
          Codes: MISSING_REQUIRED_PARAMETER, CARD_TOKEN_EXPIRED, CARD_TOKEN_USED,
          INVALID_FEES, INVALID_LOCATION.
        required_handling: >
          Caller MUST wrap in try-catch. CARD_TOKEN_USED is critical: nonces are
          single-use. On network error, do NOT retry with same nonce — generate fresh
          nonce. Check errors[0].code to distinguish token issues from missing fields.
        sources:
          - "https://developer.squareup.com/reference/square/payments-api/create-payment"
          - "https://developer.squareup.com/docs/build-basics/handling-errors"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: square-payments-create-rate-limit
        condition: >
          Request rate exceeds Square API rate limits for the payments endpoint.
        throws: >
          SquareError with errors[0].category === RATE_LIMIT_ERROR. SDK does NOT
          auto-retry. Caller must implement backoff.
        required_handling: >
          Caller MUST implement exponential backoff with jitter before retrying.
          MUST use idempotency_key on all retries to prevent duplicate charges.
        sources:
          - "https://developer.squareup.com/reference/square/enums/ErrorCategory"
          - "https://developer.squareup.com/docs/build-basics/handling-errors"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: square-payments-create-timeout
        condition: >
          Network connection times out before receiving a response from Square servers.
        throws: >
          SquareTimeoutError — a distinct class from SquareError. Catching only
          SquareError does NOT catch SquareTimeoutError. Payment status is UNKNOWN.
        required_handling: >
          Caller MUST catch SquareTimeoutError separately from SquareError. On timeout,
          check payment status via payments.get() with the original idempotency_key
          before retrying. Retrying without checking risks double-charging the customer.
        sources:
          - "https://developer.squareup.com/reference/square/payments-api/create-payment"
        severity: warning
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

  - name: refunds.refundPayment
    import_path: "square"
    description: >
      Refunds a payment fully or partially. Usage: await client.refunds.refundPayment({
      idempotencyKey, amountMoney, paymentId }). Returns HttpResponsePromise<RefundPaymentResponse>.

    postconditions:
      - id: square-refunds-refund-payment-error
        condition: >
          Payment is in non-refundable state (too old, fully refunded, or has active
          dispute), refund amount exceeds available balance, or card issuer declines refund.
        throws: >
          SquareError with errors[0].category === REFUND_ERROR.
          Codes: PAYMENT_NOT_REFUNDABLE, PAYMENT_NOT_REFUNDABLE_DUE_TO_DISPUTE,
          REFUND_AMOUNT_INVALID, REFUND_DECLINED, INSUFFICIENT_PERMISSIONS_FOR_REFUND.
        required_handling: >
          Caller MUST wrap in try-catch and read errors[0].code. Route differently:
          PAYMENT_NOT_REFUNDABLE_DUE_TO_DISPUTE requires escalation to dispute team.
          REFUND_AMOUNT_INVALID requires checking remaining refundable balance.
          Use idempotency_key to prevent duplicate refunds on retry.
        sources:
          - "https://developer.squareup.com/reference/square/refunds-api/refund-payment"
          - "https://developer.squareup.com/reference/square/enums/ErrorCategory"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: square-refunds-auth-or-rate-limit
        condition: >
          Access token is invalid or expired, or refund rate exceeds Square limits
          (common in batch refund jobs processing many orders at once).
        throws: >
          SquareError with category AUTHENTICATION_ERROR or RATE_LIMIT_ERROR.
        required_handling: >
          Caller MUST implement exponential backoff for RATE_LIMIT_ERROR. Track
          per-refund status in batch jobs to resume correctly after interruption.
          Do NOT retry AUTHENTICATION_ERROR without fixing the token.
        sources:
          - "https://developer.squareup.com/reference/square/enums/ErrorCategory"
          - "https://developer.squareup.com/docs/build-basics/handling-errors"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

  - name: payments.complete
    import_path: "square"
    description: >
      Completes (captures) a payment with APPROVED status in two-step payment flows.
      Usage: await client.payments.complete({ paymentId }). Returns HttpResponsePromise<CompletePaymentResponse>.

    postconditions:
      - id: square-payments-complete-error
        condition: >
          Payment is not in APPROVED state (already COMPLETED, CANCELED, or FAILED),
          authorization hold has expired (6 days card-present, 7 days card-not-present),
          or access token is invalid.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (wrong state or expired hold) or
          AUTHENTICATION_ERROR. Expired hold: new payment must be created, not retried.
        required_handling: >
          Caller MUST wrap in try-catch. Monitor time between auth and capture to
          complete before hold expiry. On error, check errors[0].code to determine
          if a new payment is required vs a retryable transient error.
        sources:
          - "https://developer.squareup.com/docs/payments-api/take-payments"
          - "https://developer.squareup.com/reference/square/payments-api/complete-payment"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

  - name: payments.cancel
    import_path: "square"
    description: >
      Cancels (voids) a payment with APPROVED status. Usage: await client.payments.cancel({
      paymentId }). Returns HttpResponsePromise<CancelPaymentResponse>.

    postconditions:
      - id: square-payments-cancel-error
        condition: >
          Payment is already COMPLETED (captured — must refund instead), in FAILED state,
          already CANCELED, or access token is invalid.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (non-cancellable state) or
          AUTHENTICATION_ERROR. COMPLETED payments cannot be voided.
        required_handling: >
          Caller MUST wrap in try-catch. If payment is COMPLETED, route to
          refunds.refundPayment() instead of retrying cancel(). Do not assume
          cancellation succeeded without confirming the API response.
        sources:
          - "https://developer.squareup.com/reference/square/payments-api/cancel-payment"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: subscriptions.create
    import_path: "square"
    description: >
      Enrolls a customer in a subscription plan. Usage: await client.subscriptions.create({
      idempotencyKey, locationId, planVariationId, customerId, cardId? }).
      Returns HttpResponsePromise<CreateSubscriptionResponse>.

    postconditions:
      - id: square-subscriptions-create-customer-error
        condition: >
          Customer ID does not exist in merchant directory, customer has no email
          (required for invoice delivery), or customer has no recorded name.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (400 Bad Request).
          Confirmed codes: CUSTOMER_NOT_FOUND, CUSTOMER_MISSING_EMAIL, CUSTOMER_MISSING_NAME.
        required_handling: >
          Caller MUST wrap in try-catch. CUSTOMER_NOT_FOUND: create customer first.
          CUSTOMER_MISSING_EMAIL: update customer profile before enrolling. Do NOT
          show subscribed state until API confirms status === ACTIVE.
        sources:
          - "https://developer.squareup.com/reference/square/subscriptions-api/create-subscription"
          - "https://developer.squareup.com/reference/square/enums/ErrorCode"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: square-subscriptions-create-card-error
        condition: >
          card_id is invalid or declined, or location is not configured for credit
          card processing (CARD_PROCESSING_NOT_ENABLED, 403 Forbidden). Subscription
          may be created in PENDING state when card payment fails at enrollment.
        throws: >
          SquareError with INVALID_REQUEST_ERROR or PAYMENT_METHOD_ERROR, or 403
          with CARD_PROCESSING_NOT_ENABLED. Subscription may exist in PENDING state.
        required_handling: >
          Caller MUST wrap in try-catch and check response.subscription.status === ACTIVE
          before granting access. PENDING means Square will invoice but has NOT confirmed
          payment. Do NOT grant paid-feature access until status is ACTIVE.
        sources:
          - "https://developer.squareup.com/reference/square/subscriptions-api/create-subscription"
          - "https://developer.squareup.com/docs/subscriptions-api/manage-subscriptions"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

  - name: subscriptions.cancel
    import_path: "square"
    description: >
      Cancels an active subscription. Usage: await client.subscriptions.cancel({
      subscriptionId }). Returns HttpResponsePromise<CancelSubscriptionResponse>.

    postconditions:
      - id: square-subscriptions-cancel-error
        condition: >
          Subscription ID does not exist, subscription is already CANCELLED or
          DEACTIVATED, or access token is invalid.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (not found or not cancellable) or
          AUTHENTICATION_ERROR.
        required_handling: >
          Caller MUST wrap in try-catch. Swallowing this error leaves the subscription
          active while the app assumes it was cancelled — customer continues to be billed.
          Log and alert on all cancellation failures. Verify by checking subscription
          status after the call. Treat NOT_FOUND as possible soft success (already cancelled)
          but log for audit trail.
        sources:
          - "https://developer.squareup.com/reference/square/subscriptions-api/cancel-subscription"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

  - name: orders.create
    import_path: "square"
    description: >
      Creates an order with line items, taxes, and discounts. Usage: await client.orders.create({
      order: { locationId, lineItems }, idempotencyKey }). Returns HttpResponsePromise<CreateOrderResponse>.

    postconditions:
      - id: square-orders-create-error
        condition: >
          Location ID not found or inactive, required order fields missing, line item
          price or quantity invalid, or currency not supported for merchant location.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (400) or 403 for INVALID_LOCATION.
          Codes: INVALID_LOCATION, MISSING_REQUIRED_PARAMETER, INVALID_VALUE,
          UNSUPPORTED_CURRENCY. Also AUTHENTICATION_ERROR for bad token.
        required_handling: >
          Caller MUST wrap in try-catch. INVALID_LOCATION surfaces when merchants
          deactivate locations — app must refresh cached location_id. Use idempotency_key
          to safely retry failed order creation without creating duplicates.
        sources:
          - "https://developer.squareup.com/reference/square/orders-api/create-order"
          - "https://developer.squareup.com/reference/square/enums/ErrorCode"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: customers.create
    import_path: "square"
    description: >
      Creates a customer profile. Usage: await client.customers.create({
      givenName, familyName, emailAddress, phoneNumber }). At least one field required.
      Returns HttpResponsePromise<CreateCustomerResponse>.

    postconditions:
      - id: square-customers-create-error
        condition: >
          No identifying field provided (givenName, familyName, companyName,
          emailAddress, or phoneNumber — at least one required), or email/phone
          format is malformed.
        throws: >
          SquareError with INVALID_REQUEST_ERROR.
          Codes: MISSING_REQUIRED_PARAMETER, INVALID_EMAIL_ADDRESS, INVALID_PHONE_NUMBER.
          Also AUTHENTICATION_ERROR for bad token.
        required_handling: >
          Caller MUST wrap in try-catch. Validate email/phone formats client-side before
          calling. Customer creation failure blocks downstream card-on-file and subscription
          enrollment. Log repeated INVALID_REQUEST_ERROR — may indicate malformed data pipeline.
        sources:
          - "https://developer.squareup.com/reference/square/customers-api/create-customer"
          - "https://developer.squareup.com/reference/square/enums/ErrorCode"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: customers.delete
    import_path: "square"
    description: >
      Permanently deletes a customer profile (GDPR/CCPA deletion). Irreversible.
      Usage: await client.customers.delete({ customerId }).
      Returns HttpResponsePromise<DeleteCustomerResponse>.

    postconditions:
      - id: square-customers-delete-error
        condition: >
          Customer ID does not exist in merchant directory, or access token is invalid.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (CUSTOMER_NOT_FOUND) or
          AUTHENTICATION_ERROR.
        required_handling: >
          Caller MUST wrap in try-catch and verify deletion completed. Operation is
          irreversible — swallowing errors causes app to assume deletion succeeded while
          Square customer data persists. GDPR/CCPA requires confirmed deletion.
          Treat CUSTOMER_NOT_FOUND as soft success (already deleted) but log for audit.
        sources:
          - "https://developer.squareup.com/reference/square/customers-api/delete-customer"
        severity: error
        business_impact:
          incident_label: COMPLIANCE_VIOLATION
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: checkout.paymentLinks.create
    import_path: "square"
    description: >
      Creates a Square-hosted checkout page. Usage: await client.checkout.paymentLinks.create({
      idempotencyKey, quickPay: { name, priceMoney, locationId } }).
      Returns HttpResponsePromise<CreatePaymentLinkResponse>.

    postconditions:
      - id: square-checkout-payment-links-create-error
        condition: >
          quickPay missing required fields (name and priceMoney both required),
          locationId inactive or not found, price data malformed, or access token invalid.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (missing fields, INVALID_LOCATION) or
          AUTHENTICATION_ERROR.
        required_handling: >
          Caller MUST wrap in try-catch. Validate quickPay fields before calling.
          Do NOT cache link URLs long-term — payment links expire and redirect customers
          to Square error page without notifying the application. Regenerate on demand.
        sources:
          - "https://developer.squareup.com/reference/square/checkout-api/create-payment-link"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: cards.create
    import_path: "square"
    description: >
      Stores a card on file for a customer (card-on-file / card vault).
      Usage: await client.cards.create({ idempotencyKey, sourceId, card: { customerId } }).
      Returns HttpResponsePromise<CreateCardResponse>. The stored card id (e.g. "ccof:...")
      is then used in subscriptions.create(cardId) and payments.create(sourceId).
      Cards are reusable and persist until explicitly disabled.

    postconditions:
      # Evidence: https://developer.squareup.com/reference/square/cards-api/create-card (fetched 2026-04-16)
      # Error codes SOURCE_USED, SOURCE_EXPIRED, CUSTOMER_NOT_FOUND, CARD_PROCESSING_NOT_ENABLED
      # confirmed from Square developer reference.
      - id: square-cards-create-source-used
        condition: >
          The sourceId (nonce) provided was already used in a previous cards.create() call.
          Card nonces are single-use. On network error or timeout, retrying with the same
          sourceId always fails with SOURCE_USED — even if the first call never reached Square.
        throws: >
          SquareError with INVALID_REQUEST_ERROR and code SOURCE_USED.
          Code SOURCE_EXPIRED occurs if the nonce exceeded its 5-minute TTL.
        required_handling: >
          Caller MUST wrap in try-catch. On SOURCE_USED or SOURCE_EXPIRED: discard the nonce
          and generate a fresh one from the Square Web Payments SDK. Do NOT retry with the same
          sourceId. Storing the nonce for later re-use causes permanent failure on all
          subsequent calls. This is the #1 mistake in card vaulting flows.
        sources:
          - "https://developer.squareup.com/reference/square/cards-api/create-card"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: square-cards-create-customer-not-found
        condition: >
          The customerId provided in the card object does not exist in the merchant's
          customer directory. Common when customer creation fails silently and the card
          vaulting step is not gated on successful customer creation.
        throws: >
          SquareError with INVALID_REQUEST_ERROR and code CUSTOMER_NOT_FOUND (HTTP 400).
        required_handling: >
          Caller MUST wrap in try-catch and ensure customers.create() succeeded before
          calling cards.create(). Do NOT proceed to subscription enrollment without a
          valid stored card — caller should surface the failure to the user rather than
          silently continuing with no card on file.
        sources:
          - "https://developer.squareup.com/reference/square/cards-api/create-card"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: square-cards-create-processing-not-enabled
        condition: >
          The locationId provided is not enabled for credit card processing.
          Occurs when a merchant's location is newly created or not activated for payments.
        throws: >
          SquareError with HTTP 403 and code CARD_PROCESSING_NOT_ENABLED.
        required_handling: >
          Caller MUST wrap in try-catch. CARD_PROCESSING_NOT_ENABLED is not a transient
          error — retrying will always fail. Alert ops team to activate card processing
          for the location in the Square Dashboard. Do NOT silently swallow this error.
        sources:
          - "https://developer.squareup.com/reference/square/cards-api/create-card"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: invoices.create
    import_path: "square"
    description: >
      Creates a draft invoice linked to an existing order. The invoice stays in DRAFT
      state until invoices.publish() is called. Usage: await client.invoices.create({
      invoice: { locationId, orderId, primaryRecipient: { customerId }, paymentRequests,
      deliveryMethod }, idempotencyKey }).
      Returns HttpResponsePromise<CreateInvoiceResponse>.

    postconditions:
      # Evidence: https://developer.squareup.com/reference/square/invoices-api/create-invoice (fetched 2026-04-16)
      # INVALID_CARD code confirmed; INVALID_REQUEST_ERROR codes inferred from Square general error docs
      # and invoice field requirements.
      - id: square-invoices-create-error
        condition: >
          The linked orderId does not exist or is in a non-invoiceable state (already PAID,
          CANCELED, or has another invoice), primaryRecipient customerId is invalid,
          paymentRequests fields are missing or malformed, or card-on-file specified is
          invalid (INVALID_CARD, PAYMENT_METHOD_ERROR).
        throws: >
          SquareError with INVALID_REQUEST_ERROR (400 — missing order, invalid customer,
          malformed payment schedule) or PAYMENT_METHOD_ERROR with code INVALID_CARD.
        required_handling: >
          Caller MUST wrap in try-catch. Verify the order is in OPEN state before creating
          invoice. Confirm the customer exists and has an email address (required for email
          delivery). A successfully created invoice is in DRAFT state — it will NOT charge
          the customer until invoices.publish() is called. Do NOT assume draft creation
          means the customer has been notified or charged.
        sources:
          - "https://developer.squareup.com/reference/square/invoices-api/create-invoice"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: invoices.publish
    import_path: "square"
    description: >
      Publishes a draft invoice, triggering Square to email it to the customer or charge
      the customer's card on file. Usage: await client.invoices.publish({ invoiceId, version,
      idempotencyKey }). After publishing, status changes from DRAFT to UNPAID (if email
      delivery) or PARTIALLY_PAID (if card charged immediately). Requires INVOICES_WRITE,
      ORDERS_WRITE, and optionally CUSTOMERS_READ + PAYMENTS_WRITE for card payments.
      Returns HttpResponsePromise<PublishInvoiceResponse>.

    postconditions:
      # Evidence: https://developer.squareup.com/reference/square/invoices-api/publish-invoice (fetched 2026-04-16)
      # INVALID_CARD (PAYMENT_METHOD_ERROR) and CARD_DECLINED confirmed from Square reference.
      - id: square-invoices-publish-card-declined
        condition: >
          The invoice is configured for automatic card-on-file payment and the card is declined
          during publish. Occurs if the stored card expired, was reported stolen, or has
          insufficient funds at the moment of publishing.
        throws: >
          SquareError with PAYMENT_METHOD_ERROR and code CARD_DECLINED (HTTP 402), or
          INVALID_CARD if the card data cannot be validated.
        required_handling: >
          Caller MUST wrap in try-catch and check the invoice status after publish failure.
          On CARD_DECLINED: notify the customer to update payment method. The invoice may
          still be created and in an error state — do NOT consider it unpublished without
          confirming via invoices.get(). Do NOT silently swallow this error or show the
          customer a success message.
        sources:
          - "https://developer.squareup.com/reference/square/invoices-api/publish-invoice"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: square-invoices-publish-wrong-version
        condition: >
          The version field does not match the invoice's current version in Square's system.
          This is Square's optimistic concurrency control — two concurrent publish attempts
          for the same invoice, or a publish after an update, will cause a version mismatch.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (400). The version must exactly match the
          current invoice version returned by invoices.get() or invoices.create().
        required_handling: >
          Caller MUST wrap in try-catch. On version mismatch: re-fetch the invoice with
          invoices.get() to get the latest version, then retry publish with the new version.
          Using idempotency_key ensures that if the first publish succeeded, the retry returns
          the same published invoice. Always pass version from the most recent fetch.
        sources:
          - "https://developer.squareup.com/reference/square/invoices-api/publish-invoice"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: orders.update
    import_path: "square"
    description: >
      Updates an open order by adding, replacing, or deleting fields. Orders in COMPLETED
      or CANCELED state cannot be updated. Usage: await client.orders.update({ orderId,
      order: { locationId, lineItems, version }, fieldsToClear?, idempotencyKey? }).
      The version must match the current order version (optimistic locking).
      Returns HttpResponsePromise<UpdateOrderResponse>.

    postconditions:
      # Evidence: https://developer.squareup.com/reference/square/orders-api/update-order
      # Version/state errors confirmed from Square's documented optimistic concurrency pattern.
      - id: square-orders-update-version-conflict
        condition: >
          The version field in the request does not match the current version of the order
          in Square. Concurrent modifications (e.g., POS and API both updating the same order)
          or stale cached order data cause this error. Version is required for all updates.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (400). Must always include the latest
          version from a recent orders.get() call. Cannot be retried without re-fetching.
        required_handling: >
          Caller MUST wrap in try-catch. On version conflict: re-fetch the order with
          orders.get() to get the current version and state, then re-apply changes and retry.
          Do NOT retry the same update request with the same version — it will always fail.
        sources:
          - "https://developer.squareup.com/reference/square/orders-api/update-order"
          - "https://developer.squareup.com/docs/orders-api/manage-orders/update-orders"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: square-orders-update-closed-order
        condition: >
          Attempting to update an order in COMPLETED or CANCELED state. These orders are
          immutable — all fields are read-only after the order reaches a terminal state.
        throws: >
          SquareError with INVALID_REQUEST_ERROR (400). The order state cannot be
          reverted, and updates to completed/canceled orders are not permitted.
        required_handling: >
          Caller MUST wrap in try-catch and check order state before calling update.
          On closed-order error: do NOT retry. If a refund or correction is needed,
          use refunds.refundPayment() for completed orders, not orders.update().
          Log and alert — this often indicates a race condition or UI bug.
        sources:
          - "https://developer.squareup.com/reference/square/orders-api/update-order"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

  - name: orders.pay
    import_path: "square"
    description: >
      Finalizes an order by applying one or more approved payments. The sum of all
      payment_ids must equal the order total. Orders with total of 0 can be paid with
      an empty payment_ids array. Completes any APPROVED delayed-capture payments.
      Usage: await client.orders.pay({ orderId, idempotencyKey, paymentIds }).
      Returns HttpResponsePromise<PayOrderResponse>.

    postconditions:
      # Evidence: https://developer.squareup.com/docs/orders-api/pay-for-orders (fetched 2026-04-16)
      # https://developer.squareup.com/reference/square/orders-api/pay-order
      # Amount mismatch and payment state errors confirmed from Square order-flow documentation.
      - id: square-orders-pay-amount-mismatch
        condition: >
          The sum of all payment_ids does not equal the order total_money. Any partial
          payment coverage or over-payment causes immediate failure. Also fails if a
          payment referenced by payment_id is not in APPROVED state (already COMPLETED,
          CANCELED, or FAILED).
        throws: >
          SquareError with INVALID_REQUEST_ERROR (400). Payments not referenced in
          payment_ids and previously approved for the same order_id are automatically
          CANCELED by Square.
        required_handling: >
          Caller MUST wrap in try-catch. Before calling pay(), verify: (1) sum of
          payment amounts equals order total, (2) all referenced payments are in APPROVED
          state via payments.get(). On failure, check which payments were auto-canceled
          by Square — do NOT attempt to re-complete canceled payments without creating
          new payment authorizations.
        sources:
          - "https://developer.squareup.com/docs/orders-api/pay-for-orders"
          - "https://developer.squareup.com/reference/square/orders-api/pay-order"
        severity: error
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: square-orders-pay-timeout
        condition: >
          Network connection times out while Square is processing the pay-order request.
          Payment status is UNKNOWN — the order may or may not have been marked as COMPLETED.
        throws: >
          SquareTimeoutError — a distinct class from SquareError. Catching only SquareError
          does NOT catch SquareTimeoutError.
        required_handling: >
          Caller MUST catch SquareTimeoutError separately. On timeout: do NOT immediately
          retry pay(). First verify order state via orders.get() — if COMPLETED, the payment
          succeeded. Retrying with the same idempotency_key is safe (returns the same result),
          but retrying without checking may trigger duplicate captures on APPROVED payments.
        sources:
          - "https://developer.squareup.com/docs/orders-api/pay-for-orders"
        severity: warning
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high
