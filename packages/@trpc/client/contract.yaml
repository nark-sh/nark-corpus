# @trpc/client — vanilla RPC client. When procedures are called via .query() or .mutate()
# (non-React context), they throw TRPCClientError on network failures or server-side
# TRPCError (UNAUTHORIZED, NOT_FOUND, INTERNAL_SERVER_ERROR, etc.).
# Without try-catch, unhandled errors crash the async call chain.
# .subscribe() errors are dispatched via optional onError callback — if absent, errors
# are silently dropped (TRPCUntypedClient.ts: opts.onError?.(err)).
package: "@trpc/client"
semver: ">=10.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-16"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0

detection:
  factory_methods:
    - createTRPCClient
    - createTRPCProxyClient
    - createTRPCUntypedClient

functions:
  - name: query
    import_path: "@trpc/client"
    description: >
      Calls a tRPC query procedure on the vanilla client.
      Used as: client.someRoute.query(input) or trpcVanilla.x.y.query(input).
      Returns a Promise that throws TRPCClientError on network failure or
      server-returned TRPCError (UNAUTHORIZED, NOT_FOUND, INTERNAL_SERVER_ERROR, etc.).

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-trpc-client-2026-04-14.json
      # Top affected: ajnart/homarr (no stars data)
      - id: trpc-query-missing-try-catch
        condition: >
          async function calls a tRPC vanilla client .query() method without
          wrapping in try-catch. Throws TRPCClientError on network failures,
          HTTP errors, or server procedure errors (UNAUTHORIZED, NOT_FOUND,
          INTERNAL_SERVER_ERROR, TIMEOUT, TOO_MANY_REQUESTS).
        throws: >
          TRPCClientError — extends Error with shape, data (contains code, httpStatus),
          cause (original Error), and meta (response object).
          Wraps server-thrown TRPCError codes: UNAUTHORIZED (401), FORBIDDEN (403),
          NOT_FOUND (404), INTERNAL_SERVER_ERROR (500), TIMEOUT (408),
          TOO_MANY_REQUESTS (429), BAD_REQUEST (400).
        required_handling: >
          Caller MUST wrap .query() in try-catch and handle TRPCClientError.
          Use isTRPCClientError(cause) to narrow the type.

          Minimum handling:
            try {
              const result = await trpc.someRoute.query(input);
            } catch (cause) {
              if (isTRPCClientError(cause)) {
                console.error('tRPC error:', cause.data?.code, cause.message);
              }
              throw cause;
            }
        sources:
          - "https://trpc.io/docs/client/vanilla/infer-types"
          - "https://trpc.io/docs/server/error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: mutate
    import_path: "@trpc/client"
    description: >
      Calls a tRPC mutation procedure on the vanilla client.
      Used as: client.someRoute.mutate(input).
      Returns a Promise that throws TRPCClientError on network failure or
      server-returned TRPCError.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-trpc-client-2026-04-14.json
      # Top affected: ajnart/homarr (no stars data)
      - id: trpc-mutate-missing-try-catch
        condition: >
          async function calls a tRPC vanilla client .mutate() method without
          wrapping in try-catch. Throws TRPCClientError on network failures,
          HTTP errors, or server procedure errors (UNAUTHORIZED, NOT_FOUND,
          INTERNAL_SERVER_ERROR, CONFLICT, UNPROCESSABLE_CONTENT, etc.).
        throws: >
          TRPCClientError — extends Error with shape, data (contains code, httpStatus),
          cause (original Error), and meta (response object).
          Mutation errors include UNAUTHORIZED (401), CONFLICT (409),
          UNPROCESSABLE_CONTENT (422), INTERNAL_SERVER_ERROR (500),
          BAD_REQUEST (400 — failed input validation).
        required_handling: >
          Caller MUST wrap .mutate() in try-catch and handle TRPCClientError.

          Minimum handling:
            try {
              const result = await trpc.someRoute.mutate(input);
            } catch (cause) {
              if (isTRPCClientError(cause)) {
                if (cause.data?.code === 'UNAUTHORIZED') {
                  // redirect to login
                }
                console.error('Mutation failed:', cause.message);
              }
              throw cause;
            }
        sources:
          - "https://trpc.io/docs/client/vanilla/infer-types"
          - "https://trpc.io/docs/server/error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: subscribe
    import_path: "@trpc/client"
    description: >
      Calls a tRPC subscription procedure on the vanilla client.
      Used as: client.someRoute.subscribe(input, { onData, onError, onComplete }).
      Returns an Unsubscribable handle (not a Promise). Unlike .query()/.mutate(),
      subscription errors do NOT throw into the calling code — they are dispatched
      via the optional onError(err: TRPCClientError) callback. If onError is absent,
      all errors (network failures, server-thrown TRPCError, authentication failures,
      WebSocket disconnects) are silently swallowed via opts.onError?.(err) — the
      optional chaining is a no-op when onError is not provided.

    postconditions:
      # Evidence: TRPCUntypedClient.ts source, line 154-155:
      #   error(err) { opts.onError?.(err); }
      # The ?. means if onError is absent, the error is silently dropped with no exception.
      # Source inspected: /node_modules/@trpc/client/src/internals/TRPCUntypedClient.ts
      # TRPCSubscriptionObserver.onError is typed as (err: TError) => void
      # The opts parameter is Partial<TRPCSubscriptionObserver<...>> — all fields optional.
      # Confirmed via: https://trpc.io/docs/subscriptions
      - id: trpc-subscribe-missing-on-error
        condition: >
          async function calls a tRPC vanilla client .subscribe() method without
          providing an onError callback in the options object. All subscription errors
          (network disconnect, server TRPCError, UNAUTHORIZED, WebSocket close via
          TRPCWebSocketClosedError) are silently dropped — the internal error path
          is opts.onError?.(err), which is a no-op when the callback is absent.
        throws: >
          TRPCClientError — dispatched via onError callback, NOT thrown into calling code.
          Error is silently dropped when onError is absent.
          Error codes covered: UNAUTHORIZED (401), FORBIDDEN (403),
          INTERNAL_SERVER_ERROR (500), TIMEOUT (408), SERVICE_UNAVAILABLE (503),
          BAD_REQUEST (400), and TRPCWebSocketClosedError when the underlying
          WebSocket connection closes during an active subscription.
        required_handling: >
          Caller MUST provide onError in the subscribe() options object.

          Minimum handling:
            const sub = trpc.liveUpdates.subscribe(input, {
              onData(data) {
                // handle incoming data
              },
              onError(cause) {
                if (isTRPCClientError(cause)) {
                  if (cause.data?.code === 'UNAUTHORIZED') {
                    // redirect to login or refresh auth
                  }
                  console.error('Subscription error:', cause.message);
                }
              },
              onComplete() {
                // subscription ended normally
              },
            });
        sources:
          - "https://github.com/trpc/trpc/blob/main/packages/client/src/internals/TRPCUntypedClient.ts"
          - "https://trpc.io/docs/subscriptions"
          - "https://trpc.io/docs/server/error-handling"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: https://trpc.io/docs/subscriptions — "5xx errors trigger automatic
      # reconnection, other errors cancel the subscription entirely"
      # Auth failures (UNAUTHORIZED/FORBIDDEN) cancel the subscription server-side.
      # Without onError, client sees only that onData stops — no failure signal.
      - id: trpc-subscribe-auth-error-silent
        condition: >
          tRPC subscription receives UNAUTHORIZED (401) or FORBIDDEN (403) from
          the server (token expired, session revoked, or permission change during
          an active real-time connection) but caller has no onError callback to detect
          the auth failure. The subscription is cancelled server-side and the client
          silently stops receiving data without any error signal.
        throws: >
          TRPCClientError with data.code = 'UNAUTHORIZED' or 'FORBIDDEN'.
          Dispatched via optional onError callback — silently dropped if absent.
        required_handling: >
          Check cause.data?.code in onError handler and redirect to login or
          refresh the auth token when 'UNAUTHORIZED' or 'FORBIDDEN' is received.
        sources:
          - "https://trpc.io/docs/subscriptions"
          - "https://trpc.io/docs/server/error-handling"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: authentication_failure
          incident_cost_range: medium

notes:
  - "This contract covers the vanilla @trpc/client direct calls (.query(), .mutate(), .subscribe())"
  - "React hook usage via @trpc/react-query (trpc.x.useQuery()) has different error handling"
  - "isTRPCClientError() is a type guard helper exported from @trpc/client"
  - "Vanilla client used in: server-side code, Zustand stores, utility functions"
  - "Real-world evidence: civitai/civitai uses trpcVanilla.x.query() without try-catch"
  - "subscribe() errors are dispatched via optional onError callback — NOT thrown. Missing onError = silent drop."
  - "createWSClient() errors surface via WebSocketClientOptions.onError callback (sync, not awaited)"
