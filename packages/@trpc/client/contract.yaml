# @trpc/client — vanilla RPC client. When procedures are called via .query() or .mutate()
# (non-React context), they throw TRPCClientError on network failures or server-side
# TRPCError (UNAUTHORIZED, NOT_FOUND, INTERNAL_SERVER_ERROR, etc.).
# Without try-catch, unhandled errors crash the async call chain.
package: "@trpc/client"
semver: ">=10.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-14"
status: production
evidence_quality: confirmed

detection:
  factory_methods:
    - createTRPCClient
    - createTRPCProxyClient
    - createTRPCUntypedClient

functions:
  - name: query
    import_path: "@trpc/client"
    description: >
      Calls a tRPC query procedure on the vanilla client.
      Used as: client.someRoute.query(input) or trpcVanilla.x.y.query(input).
      Returns a Promise that throws TRPCClientError on network failure or
      server-returned TRPCError (UNAUTHORIZED, NOT_FOUND, INTERNAL_SERVER_ERROR, etc.).

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-trpc-client-2026-04-14.json
      # Top affected: ajnart/homarr (no stars data)
      - id: trpc-query-missing-try-catch
        condition: >
          async function calls a tRPC vanilla client .query() method without
          wrapping in try-catch. Throws TRPCClientError on network failures,
          HTTP errors, or server procedure errors (UNAUTHORIZED, NOT_FOUND,
          INTERNAL_SERVER_ERROR, TIMEOUT, TOO_MANY_REQUESTS).
        throws: >
          TRPCClientError — extends Error with shape, data (contains code, httpStatus),
          cause (original Error), and meta (response object).
          Wraps server-thrown TRPCError codes: UNAUTHORIZED (401), FORBIDDEN (403),
          NOT_FOUND (404), INTERNAL_SERVER_ERROR (500), TIMEOUT (408),
          TOO_MANY_REQUESTS (429), BAD_REQUEST (400).
        required_handling: >
          Caller MUST wrap .query() in try-catch and handle TRPCClientError.
          Use isTRPCClientError(cause) to narrow the type.

          Minimum handling:
            try {
              const result = await trpc.someRoute.query(input);
            } catch (cause) {
              if (isTRPCClientError(cause)) {
                console.error('tRPC error:', cause.data?.code, cause.message);
              }
              throw cause;
            }
        sources:
          - "https://trpc.io/docs/client/vanilla/infer-types"
          - "https://trpc.io/docs/server/error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: mutate
    import_path: "@trpc/client"
    description: >
      Calls a tRPC mutation procedure on the vanilla client.
      Used as: client.someRoute.mutate(input).
      Returns a Promise that throws TRPCClientError on network failure or
      server-returned TRPCError.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-trpc-client-2026-04-14.json
      # Top affected: ajnart/homarr (no stars data)
      - id: trpc-mutate-missing-try-catch
        condition: >
          async function calls a tRPC vanilla client .mutate() method without
          wrapping in try-catch. Throws TRPCClientError on network failures,
          HTTP errors, or server procedure errors (UNAUTHORIZED, NOT_FOUND,
          INTERNAL_SERVER_ERROR, CONFLICT, UNPROCESSABLE_CONTENT, etc.).
        throws: >
          TRPCClientError — extends Error with shape, data (contains code, httpStatus),
          cause (original Error), and meta (response object).
          Mutation errors include UNAUTHORIZED (401), CONFLICT (409),
          UNPROCESSABLE_CONTENT (422), INTERNAL_SERVER_ERROR (500),
          BAD_REQUEST (400 — failed input validation).
        required_handling: >
          Caller MUST wrap .mutate() in try-catch and handle TRPCClientError.

          Minimum handling:
            try {
              const result = await trpc.someRoute.mutate(input);
            } catch (cause) {
              if (isTRPCClientError(cause)) {
                if (cause.data?.code === 'UNAUTHORIZED') {
                  // redirect to login
                }
                console.error('Mutation failed:', cause.message);
              }
              throw cause;
            }
        sources:
          - "https://trpc.io/docs/client/vanilla/infer-types"
          - "https://trpc.io/docs/server/error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "This contract covers ONLY the vanilla @trpc/client direct calls (.query(), .mutate())"
  - "React hook usage via @trpc/react-query (trpc.x.useQuery()) has different error handling"
  - "isTRPCClientError() is a type guard helper exported from @trpc/client"
  - "Vanilla client used in: server-side code, Zustand stores, utility functions"
  - "Real-world evidence: civitai/civitai uses trpcVanilla.x.query() without try-catch"
