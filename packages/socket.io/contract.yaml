package: socket.io
semver: ^4.0.0
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: confirmed
coverage_score: 1.0  # 10 contracted / 10 contractable (effective). API surface (v4.8.3): 15 async-callable, 5 intentionally omitted — see below
# Async API surface enumerated 2026-06-18 against socket.io@4.8.3 (.d.ts):
#   Contracted (10): Server.close, Server.serverSideEmitWithAck, Server.fetchSockets,
#                    Socket.emitWithAck, Socket.join, BroadcastOperator.emitWithAck,
#                    Server.use, socket.use, emit (Server/Socket event-contract),
#                    on (Server/Socket event-contract)
#   Intentionally omitted (5):
#     - Socket.leave: inverse of join; idempotent; no documented error paths beyond
#       what Socket.join already covers (same adapter.delAll() path)
#     - Namespace.serverSideEmitWithAck: identical behavior to Server.serverSideEmitWithAck
#       — Namespace is the parent class; postcondition flows via class hierarchy
#     - Server.allSockets: @deprecated in v4.8.3 src — "this method will be removed in
#       the next major release, please use serverSideEmit or fetchSockets instead"
#     - Namespace.allSockets: @deprecated, same removal warning
#     - BroadcastOperator.allSockets: @deprecated, same removal warning
#   Effective coverage = contracted / (total - intentionally-omitted) = 10/10 = 1.0

detection:
  class_names:
    - Server
    - Socket
  type_names:
    - Server
    - Socket
  require_instance_tracking: true

  # Required event listeners to prevent server crashes
  required_event_listeners:
    - event: "error"
      required: true
      severity: error

# Scan: scan-socket.io-2026-06-30.json — 21 repos scanned, 10 affected (48%), 33 violations
# on: 19 violations in 9 repos (activepieces/activepieces ⭐21381, juice-shop/juice-shop ⭐12733, EvolutionAPI/evolution-api ⭐7590 + 6 more)
# emit: 8 violations in 4 repos (nestjs/nest ⭐75011, EvolutionAPI/evolution-api ⭐7590, gommzystudio/device-activity-tracker ⭐4804 + 1 more)
# join: 3 violations in 1 repo (activepieces/activepieces ⭐21381) — scanner alias for socket.join postcondition
# close: 2 violations in 1 repo (activepieces/activepieces ⭐21381) — scanner alias for Server.close postcondition
# use: 1 violation in 1 repo (thomasnordquist/MQTT-Explorer ⭐3835) — scanner alias for Server.use postcondition
# FP check: 0/20 repos with FPs, evidence_quality: confirmed

functions:
  - name: emit
    import_path: "socket.io"
    description: "Emits an event to connected clients"
    postconditions:
      # Evidence: seen in 8 primary firings across 4 repos in scan-socket.io-2026-06-30.json
      # Top affected: nestjs/nest (⭐ 75011), EvolutionAPI/evolution-api (⭐ 7590), gommzystudio/device-activity-tracker (⭐ 4804)
      - id: emit-no-error-handling
        condition: "emit fails due to disconnected client or serialization error"
        throws: "Error may be thrown or silently fail"
        description: "Should handle emit errors in error event listeners"
        required_handling: "Register 'error' event listener or wrap emit in try-catch when using acknowledgement callbacks"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        rationale: "Emit can fail if client disconnected or data serialization fails"
        sources:
          - "https://socket.io/docs/v4/emitting-events/"
  - name: "on"
    import_path: "socket.io"
    description: "Registers event handler"
    postconditions:
      # Evidence: seen in 19 primary firings across 9 repos in scan-socket.io-2026-06-30.json
      # Top affected: activepieces/activepieces (⭐ 21381), juice-shop/juice-shop (⭐ 12733), EvolutionAPI/evolution-api (⭐ 7590), gommzystudio/device-activity-tracker (⭐ 4804)
      - id: on-handler-no-error-handling
        condition: "async operation within event handler throws"
        throws: "Unhandled promise rejection crashes server"
        description: "Event handlers must wrap async operations in try-catch"
        required_handling: "Wrap all async operations inside event handlers with try-catch blocks"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        rationale: "Unhandled errors in event handlers crash the server"
        sources:
          - "https://socket.io/docs/v4/listening-to-events/"

  - name: emitWithAck
    import_path: "socket.io"
    description: >
      Emits an event and returns a Promise that resolves with the client's acknowledgement.
      Requires the caller to first chain .timeout(ms) to set a deadline; without a timeout,
      the promise will never reject (it hangs indefinitely if the client never acks).
      When combined with .timeout(), throws Error("operation has timed out") after the
      deadline passes without acknowledgement. Used for reliable request/response over WebSocket.
    postconditions:
      # Evidence: source confirmed — socket.js registerAckCallback():
      #   ack.call(this, new Error("operation has timed out"))
      # Documentation: https://socket.io/docs/v4/server-api/#socketemitwithacheck
      - id: emit-with-ack-no-timeout-hangs
        condition: >
          socket.emitWithAck() called without a prior .timeout(ms) call, and the client
          never sends an acknowledgement (disconnects, ignores the event, or crashes).
        throws: >
          The Promise NEVER rejects — it hangs indefinitely until the server process exits
          or the socket is garbage collected. There is no built-in deadline.
        required_handling: >
          Caller MUST chain .timeout(ms) before .emitWithAck() in production code:
            const response = await socket.timeout(5000).emitWithAck("my-event", payload);
          Without timeout(), a missed acknowledgement leaks the Promise and its registered
          ack callback permanently. In high-traffic servers, this causes memory exhaustion.
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        sources:
          - "https://socket.io/docs/v4/server-api/#socketemitwithacheck"
          - "https://socket.io/docs/v4/emitting-events/#acknowledgements"

      - id: emit-with-ack-timeout-unhandled
        condition: >
          socket.timeout(ms).emitWithAck() called but the returned Promise is not wrapped
          in try-catch, and the client fails to acknowledge within the timeout window.
        throws: >
          Error with message "operation has timed out" — thrown as an unhandled promise
          rejection, confirmed from socket.js source: new Error("operation has timed out").
        required_handling: >
          Caller MUST wrap in try-catch when using timeout:
            try {
              const response = await socket.timeout(5000).emitWithAck("confirm", data);
            } catch (err) {
              // err.message === "operation has timed out"
              // Client did not acknowledge — handle timeout (retry, fallback, log)
            }
          Unhandled rejection crashes the server process in Node.js versions < 15,
          or exits the process with unhandledRejection in Node.js >= 15 depending on config.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://socket.io/docs/v4/server-api/#socketemitwithacheck"
          - "https://socket.io/docs/v4/emitting-events/#acknowledgements"

  - name: socket.join
    import_path: "socket.io"
    description: >
      Joins the socket to one or more rooms. Internally delegates to adapter.addAll().
      With the default in-memory adapter, this is synchronous and always succeeds.
      With distributed adapters (Redis, MongoDB, Postgres), this is async and can fail
      if the adapter's backend is unavailable. The return type is Promise<void> | void
      depending on the adapter — callers that await it with a Redis adapter can observe failures.
    postconditions:
      # Evidence: socket.js source — join() calls this.adapter.addAll()
      # Redis adapter propagates network errors from ioredis as rejected Promises.
      # Documentation: https://socket.io/docs/v4/rooms/
      - id: socket-join-adapter-error
        condition: >
          socket.join() called with a distributed adapter (e.g., @socket.io/redis-adapter,
          @socket.io/mongo-adapter) and the adapter's backend is unreachable or returns an error.
        throws: >
          Promise rejects with the adapter's error — for Redis adapter this is an IORedisError
          or generic Error from ioredis when Redis is unavailable. With in-memory adapter, join()
          is synchronous and never throws.
        required_handling: >
          When using distributed adapters, MUST wrap await socket.join() in try-catch:
            try {
              await socket.join(roomName);
            } catch (err) {
              // Adapter (Redis/Mongo) failed — socket not in room
              // Log error and decide: disconnect socket, retry, or proceed without room
            }
          A failed join means the socket is NOT in the room — any subsequent room broadcasts
          will miss this client, causing silent message delivery failures.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        sources:
          - "https://socket.io/docs/v4/rooms/"
          - "https://socket.io/docs/v4/redis-adapter/"

  - name: fetchSockets
    import_path: "socket.io"
    description: >
      Returns all Socket instances matching the current filter (rooms, namespace).
      In single-server deployments, fetches from in-memory adapter synchronously.
      In clustered deployments with a distributed adapter, queries all servers in the
      cluster and returns RemoteSocket proxies. Relies on adapter.fetchSockets() which
      is async and can fail with distributed backends.
    postconditions:
      # Evidence: broadcast-operator.js — fetchSockets() calls this.adapter.fetchSockets()
      # and maps results to RemoteSocket instances. Adapter errors propagate as rejections.
      # Documentation: https://socket.io/docs/v4/server-api/#serverfetchsockets
      - id: fetch-sockets-adapter-error
        condition: >
          io.fetchSockets() called in a clustered deployment with a distributed adapter
          (Redis, Postgres, etc.) and the adapter's backend is unavailable or times out.
        throws: >
          Promise rejects with the adapter-specific error. For Redis adapter: IORedisError
          or connection-related Error from ioredis. For Postgres adapter: database Error.
          With in-memory adapter, fetchSockets() does not fail.
        required_handling: >
          Caller MUST wrap in try-catch in clustered deployments:
            try {
              const sockets = await io.fetchSockets();
            } catch (err) {
              // Adapter failed — socket list is unavailable
              // Return partial data or 503 to API caller
            }
          Unhandled rejection in an HTTP handler or cron job crashes the handler.
          Common use case: admin endpoint listing connected users — if unhandled,
          entire admin API returns 500.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://socket.io/docs/v4/server-api/#serverfetchsockets"
          - "https://socket.io/docs/v4/redis-adapter/"

      - id: fetch-sockets-dynamic-namespace
        condition: >
          io.fetchSockets() called on a dynamic namespace (created via io.of(regex) pattern)
          which has no adapter assigned.
        throws: >
          Error("No adapter for this namespace, are you trying to get the list of clients
          of a dynamic namespace?") — thrown synchronously from broadcast-operator.js.
        required_handling: >
          Do not call fetchSockets() on dynamic parent namespaces. Call it on specific
          namespace instances or on the default namespace (io). If unsure which namespace
          to query, use the specific namespace reference:
            const nsp = io.of("/my-namespace");
            const sockets = await nsp.fetchSockets(); // correct
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - "https://socket.io/docs/v4/namespaces/#dynamic-namespaces"

  - name: Server.close
    import_path: "socket.io"
    description: >
      Gracefully closes the Socket.IO server. Disconnects all sockets across all namespaces,
      closes the adapter on each namespace, stops the engine.io server, then closes the
      underlying HTTP server. Returns a Promise<void>. The optional callback receives any
      error from httpServer.close() (e.g., if the HTTP server was not running).
    postconditions:
      # Evidence: index.js close() source — uses Promise.allSettled for adapter close,
      # then httpServer.close(err => { fn && fn(err); }). Error is passed via callback.
      # Documentation: https://socket.io/docs/v4/server-api/#serverclose
      - id: server-close-http-server-error
        condition: >
          io.close() called and the underlying HTTP server was not running or has already
          been closed (e.g., calling close() twice).
        throws: >
          The Promise resolves regardless (never rejects). However, the optional callback
          receives an Error: the HTTP server error is passed to fn(err) where err is
          "Server is not running." or similar Node.js http.Server close error.
          If close() is called without a callback, HTTP server errors are silently swallowed.
        required_handling: >
          Always pass a callback to detect HTTP server close failures:
            await io.close((err) => {
              if (err) {
                console.error('HTTP server close error:', err.message);
              }
            });
          Or use the Promise return value for sequencing, but note that errors from the HTTP
          layer are only surfaced via the callback, not via Promise rejection.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        sources:
          - "https://socket.io/docs/v4/server-api/#serverclose"

  - name: Server.use
    import_path: "socket.io"
    description: >
      Registers a global middleware that executes for every incoming socket connection
      (before the "connection" event fires). Used for authentication, authorization, and
      connection validation. Middleware MUST call next() in all code paths — calling
      next(err) rejects the connection and emits connect_error on the client side.
      Not calling next() at all leaves the connection hanging until timeout.
    postconditions:
      # Evidence: https://socket.io/docs/v4/middlewares/
      # Confirmed: "If the next method is called with an Error object, the connection will be refused"
      # "The client will receive a connect_error event"
      - id: server-use-middleware-missing-next
        condition: >
          Middleware registered via io.use() has a code path that does not call next()
          (e.g., early return without calling next, thrown error not caught before next).
        throws: >
          Connection hangs — no error is thrown to the caller. The socket connection
          stays in connecting state until it times out (connectTimeout, default 45000ms).
          During this time the socket consumes resources but cannot communicate.
        required_handling: >
          MUST call next() in every code path within middleware:
            io.use((socket, next) => {
              if (!isAuthenticated(socket)) {
                return next(new Error("unauthorized"));  // reject
              }
              next();  // allow
            });
          Async middleware MUST handle all error paths:
            io.use(async (socket, next) => {
              try {
                await authenticate(socket.handshake.auth.token);
                next();
              } catch (err) {
                next(new Error("authentication failed"));  // MUST catch and next(err)
              }
            });
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        sources:
          - "https://socket.io/docs/v4/middlewares/"

      - id: server-use-middleware-async-unhandled-error
        condition: >
          Async middleware registered via io.use() throws or rejects without catching the
          error and calling next(err). The middleware uses async/await but has no try-catch.
        throws: >
          Unhandled promise rejection — Node.js emits an unhandledRejection event.
          In Node.js >= 15 with default settings, process exits. The connection hangs
          until timeout because next() was never called.
        required_handling: >
          Async middleware MUST use try-catch:
            io.use(async (socket, next) => {
              try {
                const user = await verifyToken(socket.handshake.auth.token);
                socket.data.user = user;
                next();
              } catch (err) {
                next(new Error("authentication failed"));
              }
            });
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        sources:
          - "https://socket.io/docs/v4/middlewares/"

  - name: serverSideEmitWithAck
    import_path: "socket.io"
    description: >
      Sends an event to all other Socket.IO servers in the cluster and waits for
      acknowledgements from all of them. Used for cluster-wide coordination (e.g.,
      invalidating caches, broadcasting configuration changes). Returns a Promise that
      resolves with an array of responses (one per server) or rejects if any server
      fails to acknowledge within the timeout window set by the adapter.
    postconditions:
      # Evidence: namespace.js source — serverSideEmitWithAck() wraps serverSideEmit
      # in a Promise that rejects via callback(err) when adapter timeout fires.
      # Documentation: https://socket.io/docs/v4/server-api/#serverserversideemitwithack
      - id: server-side-emit-with-ack-timeout
        condition: >
          io.serverSideEmitWithAck() called in a multi-server deployment and one or more
          servers fail to acknowledge within the adapter's default timeout window.
        throws: >
          Promise rejects with an Error. The error object has an additional .responses
          property containing the acknowledgements received before the timeout:
            err.responses = [...responses from servers that did respond...]
          The default timeout is set by the adapter (varies by adapter implementation).
        required_handling: >
          Caller MUST wrap in try-catch:
            try {
              const responses = await io.serverSideEmitWithAck("invalidate-cache", key);
              // all servers acknowledged
            } catch (err) {
              // err.responses contains partial responses
              // Some servers may have processed the event even though we got an error
              // Log err.responses for reconciliation
            }
          Partial responses (err.responses) are important — some servers may have already
          processed the event. This is especially critical for cache invalidation or
          configuration changes where partial application causes inconsistency.
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        sources:
          - "https://socket.io/docs/v4/server-api/#serverserversideemitwithack"

  - name: socket.use
    import_path: "socket.io"
    description: >
      Registers per-socket middleware that executes for every incoming packet on a specific socket.
      Unlike Server.use() which gates the connection itself, socket.use() gates individual packets
      after the socket is connected. Middleware receives ([eventName, ...args], next) and MUST call
      next() in every code path. Errors passed to next(err) are emitted as 'error' events on the
      socket via socket._onerror(err) — confirmed from socket.js source. If no 'error' listener
      is registered on the socket, Node.js emits an uncaughtException or the socket silently breaks.
    postconditions:
      # Evidence: socket.js source lines 520-526, 691-703, 739-752
      # socket.run() calls fn(err) which calls this._onerror(err) which calls this.emitReserved("error", err)
      # Documentation: https://socket.io/docs/v4/middlewares/
      - id: socket-use-middleware-error-no-listener
        condition: >
          socket.use() middleware calls next(err) with an Error, but no 'error' event listener
          is registered on the socket instance. This is distinct from Server.use() — per-socket
          middleware errors emit on the socket, not as a process-level unhandled rejection.
        throws: >
          socket._onerror(err) calls this.emitReserved("error", err). If no 'error' listener exists
          on the socket, EventEmitter throws the error synchronously, crashing the connection handler.
          In Node.js, an EventEmitter 'error' event with no listener throws the error — confirmed
          from Node.js EventEmitter docs. The process may crash or the unhandledRejection fires.
        required_handling: >
          MUST register an 'error' listener on every socket that uses socket.use() middleware:
            io.on("connection", (socket) => {
              socket.use(([event, ...args], next) => {
                if (isUnauthorized(event)) {
                  return next(new Error("unauthorized event"));
                }
                next();
              });

              // REQUIRED: handle middleware errors
              socket.on("error", (err) => {
                console.error("Socket middleware error:", err.message);
                socket.disconnect(); // or other remediation
              });
            });
          Without the 'error' listener, any next(err) call crashes the socket handler and
          potentially the server process.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        sources:
          - "https://socket.io/docs/v4/middlewares/"

      - id: socket-use-middleware-async-unhandled
        condition: >
          Async middleware registered via socket.use() throws or rejects without a try-catch,
          causing next() to never be called and the error to propagate as an unhandled rejection.
        throws: >
          Unhandled promise rejection — Node.js emits an 'unhandledRejection' event.
          In Node.js >= 15, process exits. The packet that triggered the middleware is silently
          dropped, causing the client to miss the expected response.
        required_handling: >
          Async socket.use() middleware MUST use try-catch:
            socket.use(async ([event, ...args], next) => {
              try {
                await validateEvent(event, args);
                next();
              } catch (err) {
                next(new Error("event validation failed"));
              }
            });
            socket.on("error", (err) => {
              socket.disconnect();
            });
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://socket.io/docs/v4/middlewares/"

  - name: BroadcastOperator.emitWithAck
    import_path: "socket.io"
    description: >
      Emits an event to all matching clients and waits for acknowledgements from all of them.
      Accessed via io.timeout(ms).emitWithAck() or io.to(room).timeout(ms).emitWithAck().
      This is the broadcast version — it waits for ALL targeted clients to acknowledge.
      Unlike socket.emitWithAck() (contracted separately), this targets multiple clients and
      accumulates all responses. REQUIRES .timeout(ms) to be chained — without a timeout the
      Promise hangs indefinitely if any single client does not acknowledge.
    postconditions:
      # Evidence: broadcast-operator.js lines 177-185, 233-245
      #   timer = setTimeout(() => { ack(new Error("operation has timed out"), responses) }, timeout)
      #   emitWithAck: return new Promise((resolve, reject) => { args.push((err, responses) => {
      #     if (err) { err.responses = responses; return reject(err); } ...
      # Documentation: https://socket.io/docs/v4/server-api/#broadcastoperatoremitwithacheck
      - id: broadcast-emit-with-ack-timeout-unhandled
        condition: >
          io.timeout(ms).emitWithAck() called but the returned Promise is not wrapped in try-catch,
          and one or more targeted clients fail to acknowledge within the timeout window.
        throws: >
          Error with message "operation has timed out" — confirmed from broadcast-operator.js source.
          The error object has an additional .responses property containing all acknowledgements
          received before the timeout expired:
            err.responses = [...responses from clients that did ack in time...]
          This Promise rejects — unhandled rejection crashes the server in Node.js >= 15.
        required_handling: >
          MUST wrap in try-catch. Also check .responses for partial acknowledgements:
            try {
              const responses = await io.timeout(5000).emitWithAck("confirm", payload);
              // all targeted clients acknowledged
            } catch (err) {
              // err.message === "operation has timed out"
              // err.responses contains partial responses from clients that did ack
              console.error(`${err.responses.length} clients acked before timeout`);
              // decide: retry, proceed with partial, or fail the operation
            }
          Partial responses (err.responses) are critical for idempotency — some clients may
          have already processed the event before the timeout. Do NOT retry blindly.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://socket.io/docs/v4/server-api/#broadcastoperatoremitwithacheck"
          - "https://socket.io/docs/v4/emitting-events/#acknowledgements"

      - id: broadcast-emit-with-ack-no-timeout
        condition: >
          io.to(room).emitWithAck() called WITHOUT first chaining .timeout(ms), and one or more
          targeted clients never send an acknowledgement (disconnect, ignore, or crash).
        throws: >
          The Promise NEVER resolves or rejects — it hangs indefinitely. There is no built-in
          deadline for BroadcastOperator.emitWithAck() when .timeout() is not chained.
          Each disconnected or unresponsive client holds the Promise open permanently.
          In high-traffic servers handling many rooms, this causes Promise accumulation,
          memory leak, and eventual OOM crash.
        required_handling: >
          ALWAYS chain .timeout(ms) before .emitWithAck() in broadcast contexts:
            // WRONG - hangs forever if any client disconnects:
            const responses = await io.to("room-101").emitWithAck("sync", data);

            // RIGHT - rejects with "operation has timed out" after 5s:
            const responses = await io.to("room-101").timeout(5000).emitWithAck("sync", data);
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        sources:
          - "https://socket.io/docs/v4/server-api/#broadcastoperatoremitwithacheck"