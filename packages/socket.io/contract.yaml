package: socket.io
semver: ^4.0.0
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: confirmed

detection:
  class_names:
    - Server
    - Socket
  type_names:
    - Server
    - Socket
  require_instance_tracking: true

  # Required event listeners to prevent server crashes
  required_event_listeners:
    - event: "error"
      required: true
      severity: error

# Scan: scan-socket.io-2026-04-03.json — 16 repos scanned, 5 affected (31%), 16 violations
# on: 9 violations in 5 repos (juice-shop/juice-shop ⭐12733, EvolutionAPI/evolution-api ⭐7590, gommzystudio/device-activity-tracker ⭐4804 + 2 more)
# emit: 7 violations in 4 repos (nestjs/nest ⭐75011, EvolutionAPI/evolution-api ⭐7590 + 2 more)
# FP check: 0/20 repos with FPs, evidence_quality: confirmed

functions:
  - name: emit
    import_path: "socket.io"
    description: "Emits an event to connected clients"
    postconditions:
      # Evidence: seen in 7 primary firings across 4 repos in scan-socket.io-2026-04-03.json
      # Top affected: nestjs/nest (⭐ 75011), EvolutionAPI/evolution-api (⭐ 7590)
      - id: emit-no-error-handling
        condition: "emit fails due to disconnected client or serialization error"
        throws: "Error may be thrown or silently fail"
        description: "Should handle emit errors in error event listeners"
        required_handling: "Register 'error' event listener or wrap emit in try-catch when using acknowledgement callbacks"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        rationale: "Emit can fail if client disconnected or data serialization fails"
        sources:
          - "https://socket.io/docs/v4/emitting-events/"
  - name: on
    import_path: "socket.io"
    description: "Registers event handler"
    postconditions:
      # Evidence: seen in 9 primary firings across 5 repos in scan-socket.io-2026-04-03.json
      # Top affected: juice-shop/juice-shop (⭐ 12733), EvolutionAPI/evolution-api (⭐ 7590), gommzystudio/device-activity-tracker (⭐ 4804)
      - id: on-handler-no-error-handling
        condition: "async operation within event handler throws"
        throws: "Unhandled promise rejection crashes server"
        description: "Event handlers must wrap async operations in try-catch"
        required_handling: "Wrap all async operations inside event handlers with try-catch blocks"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        rationale: "Unhandled errors in event handlers crash the server"
        sources:
          - "https://socket.io/docs/v4/listening-to-events/"