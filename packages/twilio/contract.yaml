package: twilio
semver: ">=3.0.0 <6.0.0"
contract_version: 1.0.0
maintainer: corpus-team
last_verified: 2026-04-03
status: production
evidence_quality: confirmed
functions:
  - name: create
    import_path: twilio
    namespace: messages
    description: Sends SMS or MMS messages via Twilio API
    postconditions:
      # Evidence: 3 repos scanned in scan-twilio-2026-04-03.json, 0 violations found.
      # FP check: 0/20 repos (0% FP rate). All repos used twilio safely with try-catch.
      # Top scanned: a16z-infra/companion-app (⭐ 5943), adrianhajdin/healthcare (⭐ 2664)
      - id: messages-create-no-try-catch
        condition: messages.create() called without try-catch or .catch() handler
        throws: RestException with error.code, error.status, and error.message
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          messages.create() is called without try-catch block. This function makes HTTP requests to Twilio's API and can fail with various errors: authentication (20003, 20005), rate limiting (14107, 20429), invalid phone numbers (21211, 21212), or network errors. Unhandled promise rejections will crash the application.
        detector: |
          If client.messages.create() is called in an async context without try-catch wrapping the await, or without .catch() in promise chain
        required_handling: |
          MUST wrap await client.messages.create() in try-catch block. Catch block should check error instanceof RestException and handle specific error codes (14107 for rate limiting, 20003 for invalid credentials, 21211 for invalid phone numbers) appropriately.
        source: https://www.twilio.com/docs/api/errors
        sources:
          - https://www.twilio.com/docs/api/errors
      - id: messages-create-generic-catch
        condition: messages.create() in try-catch but doesn't check RestException
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          Catch block uses generic error handling without checking RestException type or error.code. Twilio SDK provides RestException class with specific error codes that should be differentiated for proper error recovery. Rate limit errors (14107) need retry logic, auth errors (20003) need credential fixes, and validation errors (21xxx) need input fixes.
        detector: |
          If try-catch block wraps messages.create() but catch block does not check 'error instanceof RestException' or access 'error.code'
        required_handling: |
          SHOULD check error type using instanceof RestException and inspect error.code. Handle rate limiting (14107) with retry logic, authentication errors (20003/20005) by validating credentials, and validation errors (21211/21212) with user feedback.
        source: https://github.com/twilio/twilio-node
        sources:
          - https://github.com/twilio/twilio-node
      - id: messages-create-rate-limit-not-handled
        condition: Bulk SMS operations without rate limit handling
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          messages.create() is called in loop or batch operation without handling error code 14107 (SMS send rate limit exceeded). Twilio free tier has 40k messages/day limit. Bulk operations should implement retry logic with backoff when rate limited.
        detector: |
          If messages.create() appears in loop/array iteration without checking error.code === 14107 in catch block
        required_handling: |
          SHOULD check for error.code === 14107 and implement exponential backoff retry logic. Consider using retry-after information if available.
        source: https://www.twilio.com/docs/api/errors
        sources:
          - https://www.twilio.com/docs/api/errors
  - name: create
    import_path: twilio
    namespace: calls
    description: Initiates voice calls via Twilio API
    postconditions:
      - id: calls-create-no-try-catch
        condition: calls.create() called without try-catch or .catch() handler
        throws: RestException with error.code, error.status, and error.message
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          calls.create() is called without try-catch block. Voice API requests can fail due to invalid phone numbers, insufficient account permissions, or network errors. Unhandled promise rejections will crash the application.
        detector: |
          If client.calls.create() is called in an async context without try-catch wrapping the await, or without .catch() in promise chain
        required_handling: |
          MUST wrap await client.calls.create() in try-catch block. Catch block should check error instanceof RestException for detailed error information.
        source: https://www.twilio.com/docs/api/errors
        sources:
          - https://www.twilio.com/docs/api/errors
  - name: create
    import_path: twilio
    namespace: verifications
    description: Sends verification codes for two-factor authentication
    postconditions:
      - id: verifications-create-no-try-catch
        condition: verifications.create() called without try-catch
        throws: RestException with error.code, error.status, and error.message
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          verify.services().verifications.create() is called without try-catch block. Verification requests can fail due to invalid phone numbers, service configuration issues, rate limiting, or network errors. Unhandled rejections crash the application.
        detector: |
          If client.verify.services().verifications.create() is called in async context without try-catch wrapping the await
        required_handling: |
          MUST wrap verification create call in try-catch block. Handle specific error codes for better user experience.
        source: https://www.twilio.com/docs/verify/api/verification
        sources:
          - https://www.twilio.com/docs/verify/api/verification
  - name: twilio
    import_path: twilio
    description: Initializes Twilio REST API client with credentials
    postconditions:
      - id: hardcoded-credentials
        condition: Twilio client initialized with hardcoded credentials
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          twilio() function is called with string literal credentials instead of environment variables. Hardcoded Account SID and Auth Token pose severe security risk if code is committed to version control or exposed in logs. Credentials grant full API access.
        detector: |
          If twilio() is called with string literals for accountSid or authToken parameters instead of process.env.TWILIO_ACCOUNT_SID and process.env.TWILIO_AUTH_TOKEN
        required_handling: |
          MUST use environment variables for credentials. Use process.env.TWILIO_ACCOUNT_SID and process.env.TWILIO_AUTH_TOKEN. Never commit credentials to version control.
        source: https://www.twilio.com/docs/usage/secure-credentials
        sources:
          - https://www.twilio.com/docs/usage/secure-credentials
      - id: missing-auth-error-early-detection
        condition: Initial API call doesn't check for authentication errors
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          First API call after client initialization doesn't check for authentication error codes 20003 (invalid credentials) or 20005 (account suspended). Early detection of auth issues provides better error messages and faster failure than waiting for production usage.
        detector: |
          If first API call after twilio() initialization doesn't check error.code === 20003 or error.code === 20005 in catch block
        required_handling: |
          SHOULD validate credentials with test API call during initialization. Check for error codes 20003 and 20005 to fail fast with clear error messages.
        source: https://www.twilio.com/docs/api/errors
        sources:
          - https://www.twilio.com/docs/api/errors
  - name: validateRequest
    import_path: twilio
    description: Validates incoming webhook request signatures
    postconditions:
      - id: webhook-no-signature-validation
        condition: Webhook endpoint doesn't validate request signature
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: |
          Express/Next.js route handler receives Twilio webhooks without calling validateRequest() or validateExpressRequest(). Webhook endpoints without signature validation are vulnerable to spoofing attacks where malicious actors forge webhook requests to trigger actions.
        detector: |
          If HTTP route handler processes req.body for Twilio webhook data (Body, From, etc.) without calling twilio.validateRequest() or checking x-twilio-signature header
        required_handling: |
          MUST validate webhook signatures using twilio.validateRequest() or twilio.validateExpressRequest(). Reject requests with invalid signatures (return 403).
        source: https://www.twilio.com/docs/usage/webhooks/webhooks-security
        sources:
          - https://www.twilio.com/docs/usage/webhooks/webhooks-security
