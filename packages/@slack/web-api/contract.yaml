  # ── NEW FUNCTIONS — added in depth pass 2026-04-03 ────────────────────────

  # Chat update function
  - name: "chat.update"
    import_path: "@slack/web-api"
    description: "Updates a message in a channel. Used to edit bot messages after posting."

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/chat.update
      # Error types confirmed from docs: message_not_found, cant_update_message, edit_window_closed
      - id: chat-update-no-trycatch
        condition: "chat.update() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          chat.update() is called without try-catch. Can throw WebAPIPlatformError with
          message_not_found (message deleted or wrong ts), cant_update_message (app
          did not post the message so cannot edit it), edit_window_closed (team setting
          restricts editing after N minutes), channel_not_found (archived or deleted),
          or WebAPIRateLimitedError (429 rate limiting). Unhandled rejections crash Node.
        detector: >
          If client.chat.update() is called in an async context without try-catch
          wrapping the await, or without .catch() in promise chain
        required_handling: >
          MUST wrap await client.chat.update() in try-catch. Handle message_not_found
          (skip or log — message was deleted), cant_update_message (log — bot didn't
          post original), edit_window_closed (log — past edit window), and
          RateLimitedError (wait retryAfter seconds).
        sources:
          - "https://docs.slack.dev/reference/methods/chat.update"
        evidence_quality: confirmed

  # Chat postEphemeral function
  - name: "chat.postEphemeral"
    import_path: "@slack/web-api"
    description: >
      Posts an ephemeral message visible only to the specified user in a channel.
      Used for bot feedback that only the command initiator should see.

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/chat.postEphemeral
      # Error types confirmed from docs: channel_not_found, user_not_in_channel
      - id: chat-postephemeral-no-trycatch
        condition: "chat.postEphemeral() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          chat.postEphemeral() is called without try-catch. Can throw WebAPIPlatformError
          with channel_not_found (invalid channel ID), user_not_in_channel (target user
          left the channel), restricted_action (workspace prevents posting), or
          WebAPIRateLimitedError (429). Common in slash command handlers where errors
          are silently swallowed, leaving users with no feedback.
        detector: >
          If client.chat.postEphemeral() is called without try-catch or .catch()
        required_handling: >
          MUST wrap await client.chat.postEphemeral() in try-catch. Handle
          user_not_in_channel (user left — log and skip), channel_not_found
          (invalid channel — log), and RateLimitedError (retry after delay).
        sources:
          - "https://docs.slack.dev/reference/methods/chat.postEphemeral"
        evidence_quality: confirmed

  # Chat delete function
  - name: "chat.delete"
    import_path: "@slack/web-api"
    description: >
      Deletes a message from a channel. Used in cleanup flows and message lifecycle
      management (e.g., delete approval prompt after user responds).

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/chat.delete
      # Error types confirmed from docs: message_not_found, cant_delete_message
      - id: chat-delete-no-trycatch
        condition: "chat.delete() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          chat.delete() is called without try-catch. Can throw WebAPIPlatformError with
          message_not_found (message already deleted or wrong ts — common in race
          conditions), cant_delete_message (app did not post the original message),
          channel_not_found (archived channel), or WebAPIRateLimitedError (429).
          In interactive workflows (buttons, actions), double-click or retry logic
          causes race conditions that produce message_not_found.
        detector: >
          If client.chat.delete() is called without try-catch or .catch()
        required_handling: >
          MUST wrap await client.chat.delete() in try-catch. Treat message_not_found
          as a safe no-op (already deleted). Handle cant_delete_message with a log
          (wrong bot identity). Handle RateLimitedError with retry-after backoff.
        sources:
          - "https://docs.slack.dev/reference/methods/chat.delete"
        evidence_quality: confirmed

  # Chat scheduleMessage function
  - name: "chat.scheduleMessage"
    import_path: "@slack/web-api"
    description: >
      Schedules a message for delivery at a future time. Used for reminders, digests,
      and scheduled notifications. Has a 120-day scheduling limit.

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/chat.scheduleMessage
      # Error types confirmed from docs: time_in_past, time_too_far
      - id: chat-schedulemessage-no-trycatch
        condition: "chat.scheduleMessage() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        description: >
          chat.scheduleMessage() is called without try-catch. Can throw WebAPIPlatformError
          with time_in_past (scheduled time already elapsed — common when post_time is
          computed from relative input), time_too_far (exceeds 120-day limit),
          channel_not_found (invalid or archived channel), restricted_too_many
          (too many messages scheduled in channel), or WebAPIRateLimitedError (429).
          Silent failures cause scheduled notifications to silently disappear.
        detector: >
          If client.chat.scheduleMessage() is called without try-catch or .catch()
        required_handling: >
          MUST wrap await client.chat.scheduleMessage() in try-catch. Handle time_in_past
          (revalidate scheduling logic, notify user), time_too_far (cap at 120 days),
          channel_not_found (validate channel before scheduling), and RateLimitedError
          (retry after delay).
        sources:
          - "https://docs.slack.dev/reference/methods/chat.scheduleMessage"
        evidence_quality: confirmed

  # Conversations create function
  - name: "conversations.create"
    import_path: "@slack/web-api"
    description: >
      Creates a new channel in a workspace. Used in SaaS apps that automatically
      provision Slack channels for new users, projects, or incidents.

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/conversations.create
      # Error types confirmed from docs: name_taken, invalid_name, restricted_action
      - id: conversations-create-no-trycatch
        condition: "conversations.create() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          conversations.create() is called without try-catch. Can throw WebAPIPlatformError
          with name_taken (channel already exists with that name — very common in
          provisioning workflows that retry), invalid_name (special chars or uppercase),
          invalid_name_maxlength (name > 80 chars), restricted_action (workspace admin
          restricted channel creation), or WebAPIRateLimitedError (429).
          Provisioning flows that silently swallow errors leave users without channels
          while assuming success.
        detector: >
          If client.conversations.create() is called without try-catch or .catch()
        required_handling: >
          MUST wrap await client.conversations.create() in try-catch. Handle name_taken
          (append suffix or look up existing), invalid_name (sanitize name before
          calling), restricted_action (check workspace settings, surface to admin),
          and RateLimitedError (exponential backoff).
        sources:
          - "https://docs.slack.dev/reference/methods/conversations.create"
        evidence_quality: confirmed

  # Conversations history function
  - name: "conversations.history"
    import_path: "@slack/web-api"
    description: >
      Fetches message history for a channel. Used in bots that need to analyze,
      summarize, or moderate recent channel messages.

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/conversations.history
      # Error types confirmed from docs: not_in_channel, channel_not_found, invalid_cursor
      - id: conversations-history-no-trycatch
        condition: "conversations.history() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          conversations.history() is called without try-catch. Can throw WebAPIPlatformError
          with not_in_channel (bot was kicked from channel), channel_not_found (channel
          archived or deleted), invalid_cursor (pagination cursor expired — common
          in long-running pagination loops), or WebAPIRateLimitedError (429, especially
          when paginating large channels). Bots that paginate without error handling
          crash mid-page when the bot is removed or rate-limited.
        detector: >
          If client.conversations.history() is called without try-catch or .catch()
        required_handling: >
          MUST wrap await client.conversations.history() in try-catch. Handle
          not_in_channel (bot was removed — stop polling), channel_not_found
          (channel gone — remove from watch list), invalid_cursor (restart pagination
          from beginning), and RateLimitedError (wait retryAfter seconds before
          continuing pagination).
        sources:
          - "https://docs.slack.dev/reference/methods/conversations.history"
        evidence_quality: confirmed

  # Conversations open (DM) function
  - name: "conversations.open"
    import_path: "@slack/web-api"
    description: >
      Opens or resumes a direct message channel with one or more users. Required
      before calling chat.postMessage to send a DM — opening a DM returns the
      channel ID to post to.

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/conversations.open
      # Error types confirmed from docs: user_disabled, user_not_found, too_many_users
      - id: conversations-open-no-trycatch
        condition: "conversations.open() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        description: >
          conversations.open() is called without try-catch. Can throw WebAPIPlatformError
          with user_disabled (user account deactivated — very common in churn or
          off-boarding flows), user_not_found (invalid user ID), too_many_users
          (DM group limit exceeded), user_not_visible (cross-workspace visibility
          restrictions), or WebAPIRateLimitedError (429). Notification pipelines
          that silently swallow user_disabled errors continue sending to inactive
          accounts while logging confusing errors.
        detector: >
          If client.conversations.open() is called without try-catch or .catch()
        required_handling: >
          MUST wrap await client.conversations.open() in try-catch. Handle user_disabled
          (mark user as inactive, stop sending notifications), user_not_found (validate
          user ID before calling), too_many_users (reduce group size to ≤8), and
          RateLimitedError (retry after delay).
        sources:
          - "https://docs.slack.dev/reference/methods/conversations.open"
        evidence_quality: confirmed

  # Views open (modal) function
  - name: "views.open"
    import_path: "@slack/web-api"
    description: >
      Opens a Slack modal view using a trigger_id from an interaction payload.
      Trigger IDs expire after 3 seconds — must be called immediately in the
      interaction handler.

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/views.open
      # Error types confirmed from docs: expired_trigger_id, invalid_trigger_id, view_too_large
      - id: views-open-no-trycatch
        condition: "views.open() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          views.open() is called without try-catch. Can throw WebAPIPlatformError with
          expired_trigger_id (trigger_id older than 3 seconds — common when any async
          work precedes the call, such as DB queries or API calls), invalid_trigger_id
          (trigger was already used), exchanged_trigger_id (trigger_id already used in
          a previous call), view_too_large (view payload exceeds 250KB), or
          WebAPIRateLimitedError (429). Middleware that performs authentication or
          DB lookups before views.open commonly causes expired_trigger_id failures.
        detector: >
          If client.views.open() is called without try-catch or .catch()
        required_handling: >
          MUST wrap await client.views.open() in try-catch. Handle expired_trigger_id
          (send ephemeral fallback message to user), invalid_trigger_id/exchanged_trigger_id
          (log and skip — already handled), view_too_large (reduce block count),
          and RateLimitedError (retry after delay). IMPORTANT: call views.open
          immediately after receiving the trigger_id — no async work between receiving
          the payload and calling views.open.
        sources:
          - "https://docs.slack.dev/reference/methods/views.open"
        evidence_quality: confirmed

  # Reactions add function
  - name: "reactions.add"
    import_path: "@slack/web-api"
    description: >
      Adds an emoji reaction to a message. Used by bots to acknowledge messages,
      signal processing status, or provide feedback on user actions.

    postconditions:
      # Evidence: https://docs.slack.dev/reference/methods/reactions.add
      # Error types confirmed from docs: already_reacted, too_many_emoji, not_reactable
      - id: reactions-add-no-trycatch
        condition: "reactions.add() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          reactions.add() is called without try-catch. Can throw WebAPIPlatformError with
          already_reacted (bot already added this reaction — common in retry logic or
          duplicate event processing), too_many_emoji (workspace emoji reaction limit
          on the message reached), too_many_reactions (user/bot reaction limit reached),
          message_not_found (message deleted), invalid_name (emoji name invalid), or
          WebAPIRateLimitedError (429). Bots that use reactions as processing flags
          crash when retrying on already-processed messages.
        detector: >
          If client.reactions.add() is called without try-catch or .catch()
        required_handling: >
          MUST wrap await client.reactions.add() in try-catch. Treat already_reacted
          as safe no-op (idempotent — reaction already present). Handle message_not_found
          (message was deleted — skip), too_many_emoji (workspace limit reached — log),
          and RateLimitedError (retry with backoff).
        sources:
          - "https://docs.slack.dev/reference/methods/reactions.add"
        evidence_quality: confirmed

  # filesUploadV2 (new preferred file upload API)
  - name: "filesUploadV2"
    import_path: "@slack/web-api"
    description: >
      The new preferred file upload method (v7.3+) replacing deprecated files.upload.
      Internally calls files.getUploadURLExternal, uploads to the URL, then calls
