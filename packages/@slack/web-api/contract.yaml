maintainer: "corpus-team"
last_verified: "2026-06-23"
coverage_status: covered
status: production
# Evidence: 5 repos scanned, 0 violations found in scan-slack-web-api-2026-04-02.json
# Small sample (5 repos) but FP check 0/49 — confirmed
# Depth pass 2026-04-03: 18 functions total (8 prev + 10 new), 9 intentionally omitted
# Depth pass 2026-06-23 (re-verify against @slack/web-api@7.17.0): added 3 new
#   Slack AI streaming methods that did not exist on 2026-04-03 (chat.startStream,
#   chat.appendStream, chat.stopStream — shipped in v7.13+). 21 functions total now.
#   Same 9 read-only/duplicate-profile functions remain intentionally omitted.
# coverage_score: 1.0 (21 contracted / 21 total-minus-omitted SaaS-relevant functions)
evidence_quality: confirmed
coverage_score: 1.0

detection:
  class_names:
    - WebClient
  import_names:
    - "@slack/web-api"
  await_patterns:
    # Chat methods
    - ".chat.postMessage("
    - ".chat.update("
    - ".chat.postEphemeral("
    - ".chat.delete("
    - ".chat.scheduleMessage("

    # Chat streaming methods (v7.13+ — Slack AI streaming surface)
    - ".chat.startStream("
    - ".chat.appendStream("
    - ".chat.stopStream("

    # Conversations methods
    - ".conversations.create("
    - ".conversations.history("
    - ".conversations.open("
    - ".conversations.invite("
    - ".conversations.archive("

    # Views methods
    - ".views.open("
    - ".views.update("
    - ".views.push("

    # Reactions methods
    - ".reactions.add("

    # File methods
    - ".filesUploadV2("
    - ".files.uploadV2("

    # User methods
    - ".users.lookupByEmail("
    - ".users.info("

functions:
  # Main message posting function
  - name: "chat.postMessage"
    import_path: "@slack/web-api"
    description: "Posts a message to a Slack channel"

    postconditions:
      - id: chat-postmessage-no-trycatch
        condition: "chat.postMessage() called without try-catch or .catch() handler"
        severity: error
        throws: "WebAPIPlatformError or WebAPIRateLimitedError"
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          chat.postMessage() is called without try-catch block. This async function can throw
          RequestError (network failures), RateLimitedError (429 rate limiting), or HTTPError
          (unexpected status codes). Unhandled promise rejections will crash the application.
        detector: >
          If client.chat.postMessage() or slack.chat.postMessage() is called in an async context
          without try-catch wrapping the await, or without .catch() in promise chain
        required_handling: >
          MUST wrap await client.chat.postMessage() in try-catch block. Catch block should handle
          RequestError (network failures), RateLimitedError (check retryAfter property), and
          HTTPError. Also check response.ok === false for API-level errors (invalid_auth,
          channel_not_found, rate_limited).
        sources:
          - "https://tessl.io/registry/tessl/npm-slack--web-api/7.10.0/files/docs/error-handling.md"
