      # Evidence: node_modules/date-fns/formatRFC3339.js line 40: throw new RangeError("Invalid time value")
      # Source: formatRFC3339.js — validates date with isNaN(+date_) and throws on invalid
      # @throws annotation: "@throws `date` must not be Invalid Date"
      - id: format-rfc3339-invalid-date
        condition: >
          The date argument is an Invalid Date (NaN timestamp). Critical in API serialization
          pipelines — any unvalidated date field from a database record or external API response
          that reaches formatRFC3339() will cause a 500 error. Common in REST APIs that
          serialize nullable timestamp columns without null/isValid checks.
        throws: >
          RangeError with message "Invalid time value".
        required_handling: >
          Validate with isValid() before calling formatRFC3339():

            import { formatRFC3339, isValid } from 'date-fns';

            // In API response builder:
            function serializeTimestamp(date: Date | null | undefined): string | null {
              if (!date || !isValid(date)) return null;
              return formatRFC3339(date);
            }
