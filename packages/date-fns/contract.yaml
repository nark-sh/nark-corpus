      - id: intl-format-invalid-date
        condition: >
          The date argument is an Invalid Date (NaN timestamp). Intl.DateTimeFormat.format()
          propagates the error for invalid date values. The exact error type may vary by JS engine
          but in V8 (Node.js, Chrome) it throws RangeError. Used in locale-aware SaaS UIs
          that format dates from API responses — unvalidated null dates reach this function
          through rendering pipelines and crash the component/route.
        throws: >
          RangeError (in V8/Node.js) when the date is Invalid Date. Error message varies by
          JS engine; do not rely on specific message text.
        required_handling: >
          Validate with isValid() before calling intlFormat():

            import { intlFormat, isValid } from 'date-fns';

            function formatLocalized(date: Date, locale: string): string {
              if (!isValid(date)) return 'Invalid date';
              return intlFormat(date, {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
              }, { locale });
            }
        sources:
