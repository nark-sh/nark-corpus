      #   "@throws `options.unit` must not be invalid Unit"
      #   "@throws `options.locale` must not be invalid locale"
      - id: intl-format-distance-invalid-date
        condition: >
          Either the laterDate or earlierDate argument is an Invalid Date. The function
          computes differenceInSeconds() internally — when either date is Invalid, the
          difference is NaN, causing Intl.RelativeTimeFormat.format(NaN, unit) to throw.
          Common in SaaS notification systems or activity feeds that display "X ago" for
