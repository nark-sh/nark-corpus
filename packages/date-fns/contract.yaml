          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: format
    import_path: "date-fns"
    description: "Formats Date object as string"
    postconditions:
      # Evidence: seen in 0 primary firings across 0 repos in scan-date-fns-2026-04-02.json
      - id: format-invalid-date
        condition: "input Date object is Invalid Date (isNaN returns true)"
        returns: "string 'Invalid Date'"
        required_handling: "Caller SHOULD check if date is valid with isValid() before formatting to avoid returning 'Invalid Date' string to users. Use isValid(date) before format() to ensure proper output."
        sources:
          - "https://date-fns.org/docs/format"
        severity: warning
