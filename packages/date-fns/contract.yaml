  - name: formatRFC7231
    import_path: "date-fns"
    description: >
      Formats a Date as an RFC 7231 string (e.g., "Wed, 18 Sep 2019 19:00:52 GMT"), the format
      used for HTTP headers (Last-Modified, Expires, Date). THROWS RangeError if the date is
      Invalid Date. Used when generating HTTP response headers from dates stored in databases
      or received from external APIs. Less common than formatISO/RFC3339 but same throw behavior.
    postconditions:
      # Evidence: node_modules/date-fns/formatRFC7231.js line 46: throw new RangeError("Invalid time value")
      # @throws annotation: "@throws `date` must not be Invalid Date"
      - id: format-rfc7231-invalid-date
        condition: >
          The date argument is an Invalid Date (NaN timestamp). This surfaces in HTTP caching
          middleware that sets Last-Modified or Expires headers from database timestamps. If the
          database record has a null date field that's passed without validation, the header
          generation throws and typically causes a 500 response before headers are sent.
        throws: >
          RangeError with message "Invalid time value".
        required_handling: >
          Validate with isValid() before calling formatRFC7231():

            import { formatRFC7231, isValid } from 'date-fns';

            // In HTTP middleware:
            const lastModified = record.updatedAt && isValid(record.updatedAt)
              ? formatRFC7231(record.updatedAt)
              : undefined;
            if (lastModified) {
              res.setHeader('Last-Modified', lastModified);
            }
