            formatRelative(parse(slot.startTime, 'HH:mm', new Date()), new Date())
          — if parse() returns Invalid Date (malformed slot.startTime), formatRelative throws.
          Also triggered when either argument comes from an API response without null/isValid checks.
        throws: >
          RangeError with message "Invalid time value".
        required_handling: >
