  - name: interval
    import_path: "date-fns"
    description: >
      Creates and validates a normalized interval object from a start and end date. THROWS
      TypeError (not RangeError) when either date is invalid, and throws TypeError when end is
      before start with assertPositive: true. This is a constructor-like function used to
      create interval objects for use with other date-fns functions (areIntervalsOverlapping,
      isWithinInterval, eachDayOfInterval, etc.). If called with invalid dates, it throws
      immediately — the TypeError will propagate to any caller that doesn't handle it.
      Note: throws TypeError, not RangeError (unlike other date-fns functions).
    postconditions:
      # Evidence: node_modules/date-fns/interval.js line 39:
      #   if (isNaN(+_start)) throw new TypeError("Start date is invalid");
      #   if (isNaN(+_end)) throw new TypeError("End date is invalid");
      # line 43: if (options?.assertPositive && compareAsc(_start, _end) !== -1)
      #           throw new TypeError("End date must be after start date");
      # @throws annotations in interval.d.ts confirm these three throw conditions
      - id: interval-invalid-start-date
        condition: >
          The start argument is an Invalid Date (NaN timestamp) or cannot be parsed to a valid date.
          This happens when building intervals from API response timestamps without validation:
            const range = interval(new Date(event.startTime), new Date(event.endTime));
          If startTime is null or malformed, interval() throws TypeError immediately.
          Unlike most date-fns functions that throw RangeError, interval() throws TypeError.
        throws: >
          TypeError with message "Start date is invalid".
        required_handling: >
          Validate start date before calling interval():

            import { interval, isValid } from 'date-fns';

            function safeInterval(start: Date, end: Date) {
              if (!isValid(start)) throw new Error('Invalid start date');
              if (!isValid(end)) throw new Error('Invalid end date');
              return interval(start, end);
            }
        sources:
          - "https://github.com/date-fns/date-fns/blob/main/src/interval/index.ts"
          - "https://date-fns.org/docs/interval"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: interval-invalid-end-date
        condition: >
          The end argument is an Invalid Date (NaN timestamp). Same pattern as interval-invalid-start-date
          but triggered by the end date. Both start and end must be valid. Note: interval() throws
          for the first invalid date it encounters — if both are invalid, only "Start date is invalid"
          is thrown (start is validated first).
        throws: >
          TypeError with message "End date is invalid".
        required_handling: >
          Validate both dates before calling interval(). See interval-invalid-start-date for
          the recommended safe wrapper pattern.
        sources:
          - "https://github.com/date-fns/date-fns/blob/main/src/interval/index.ts"
          - "https://date-fns.org/docs/interval"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: interval-end-before-start
        condition: >
          options.assertPositive is true and end is before or equal to start. This is a validation
          feature — when assertPositive is passed, the caller asserts the interval must be
          forward-in-time. Useful for validating user-entered date ranges (start before end).
          However, if the error is not caught, it crashes any code that relies on the interval
          being valid (booking systems, scheduling apps, report generators).
        throws: >
          TypeError with message "End date must be after start date".
        required_handling: >
          When using assertPositive, wrap in try-catch or validate order before calling:

            import { interval, isValid, isBefore } from 'date-fns';

            function createRange(start: Date, end: Date) {
              if (!isValid(start) || !isValid(end)) {
                throw new Error('Invalid date in range');
              }
              if (!isBefore(start, end)) {
                return { error: 'End date must be after start date' };
              }
              return interval(start, end, { assertPositive: true });
            }
        sources:
          - "https://github.com/date-fns/date-fns/blob/main/src/interval/index.ts"
          - "https://date-fns.org/docs/interval"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: intlFormat
    import_path: "date-fns"
    description: >
      Formats a date using the native Intl.DateTimeFormat API for locale-aware formatting.
      THROWS if the date is Invalid Date (Intl.DateTimeFormat.format() propagates the invalid
      date error). Also may throw if invalid locale options are passed. Unlike other date-fns
      formatters that throw RangeError with "Invalid time value", intlFormat() delegates to
      the native Intl API whose error behavior depends on the JavaScript engine. Used in
      internationalized SaaS apps for locale-sensitive date display.
