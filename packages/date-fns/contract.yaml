      - id: parse-returns-invalid-date
        condition: "input string is malformed or doesn't match format string"
        returns: "Invalid Date object (isNaN(date) returns true)"
        required_handling: "Caller MUST use isValid() to check if parsed date is valid before using in calculations or formatting. Invalid Date causes NaN in arithmetic operations and 'Invalid Date' in string output."
