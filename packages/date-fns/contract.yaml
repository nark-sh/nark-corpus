  - name: lightFormat
    import_path: "date-fns"
    description: >
      A lightweight version of format() that supports only the most common tokens and no
      localization. THROWS RangeError if the date is Invalid Date. Also THROWS RangeError
      for unescaped latin alphabet characters in the format string (same as format()).
      Unlike format(), lightFormat() only supports a subset of tokens (no YYYY/DD protected
      tokens, no locale-specific tokens). Used when minimal bundle size matters and only
      basic date formatting is needed. Same crash patterns as format() for invalid dates.
    postconditions:
      # Evidence: node_modules/date-fns/lightFormat.js
      #   line 89: throw new RangeError("Invalid time value") — when date is Invalid
      #   line 115: throw new RangeError(...) — for unescaped latin characters
      # @throws annotations:
      #   "@throws `Invalid time value` if the date is invalid"
      #   "@throws format string contains an unescaped latin alphabet character"
      - id: light-format-invalid-date
        condition: >
          The date argument is an Invalid Date (NaN timestamp). Same trigger as format-invalid-date:
          unvalidated parse() results, null API response dates, or date arithmetic on null values.
          lightFormat() is often used as a "drop-in" replacement for format() in performance-sensitive
          paths — developers familiar with format() may not realize lightFormat() has identical
          throw behavior on Invalid Date.
        throws: >
          RangeError with message "Invalid time value".
        required_handling: >
          Validate with isValid() before calling lightFormat():

            import { lightFormat, isValid } from 'date-fns';

            function formatDate(date: Date): string {
              if (!isValid(date)) throw new Error('Invalid date');
              return lightFormat(date, 'yyyy-MM-dd HH:mm:ss');
            }
        sources:
          - "https://github.com/date-fns/date-fns/blob/main/src/lightFormat/index.ts"
          - "https://date-fns.org/docs/lightFormat"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: light-format-bad-token
        condition: >
          The format string contains an unescaped latin alphabet character that is not a valid
          lightFormat token. lightFormat() supports only a limited token set (y, M, d, H, h, m, s, S, a)
          — attempting to use format() tokens like G (era), Q (quarter), w (week), or locale tokens
          (MMMM for full month name) throws RangeError. Developers switching from format() to
          lightFormat() for bundle size reduction may unknowingly use unsupported tokens.
        throws: >
          RangeError with message "Format string contains an unescaped latin alphabet character `X`"
          where X is the invalid token character.
        required_handling: >
          Use only lightFormat's supported tokens: y, M, d, H, h, m, s, S, a.
          For locale-aware or advanced tokens (era, quarter, week number, month names),
          use format() instead. Escape literal text in single quotes: lightFormat(date, "yyyy-MM-dd'T'HH:mm").
        sources:
          - "https://github.com/date-fns/date-fns/blob/main/src/lightFormat/index.ts"
          - "https://date-fns.org/docs/lightFormat"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

edge_cases:
  - id: invalid-date-propagation
    description: >
      Invalid Date objects propagate silently through date-fns arithmetic functions (addDays,
      subDays, differenceInDays, etc.) — these return Invalid Date rather than throwing.
      The crash happens downstream when a formatting function (format, formatDistance, formatISO)
      receives the propagated Invalid Date. Always validate with isValid() after parse() and
      after receiving dates from external sources (API, database, user input).
    sources:
      - "https://date-fns.org/docs/isValid"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: moment-token-migration
    description: >
      Developers migrating from moment.js commonly use moment.js format tokens with date-fns.
      The critical difference: moment uses 'YYYY' for calendar year, date-fns uses 'yyyy'.
      Using 'YYYY' in date-fns throws a RangeError at runtime directing you to use 'yyyy'.
      Similarly, 'DD' in moment means day-of-month, but in date-fns 'DD' is day-of-year.
      These crashes only appear at runtime when those code paths execute, not at compile time.
    sources:
      - "https://github.com/date-fns/date-fns/blob/main/docs/unicodeTokens.md"
    severity: error
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

notes:
  - "date-fns is entirely synchronous — no Promise-returning functions"
  - "format() THROWS RangeError on Invalid Date (does NOT return fallback string)"
  - "parse() RETURNS Invalid Date on failed parse (does NOT throw for input mismatch)"
  - "formatDistance*, formatISO THROW on Invalid Date — same RangeError('Invalid time value')"
  - "The pattern: parse() → formatDistance()/format() without isValid() is the #1 source of crashes"
  - "isMatch() is safe for validating user input strings; only throws on developer format token errors"
  - "interval() throws TypeError (not RangeError) — unique error type in date-fns"
  - "intlFormat() and intlFormatDistance() delegate to Intl API — error messages are JS-engine-dependent"
  - "lightFormat() is a subset of format() with same throw behavior but fewer supported tokens"
  - "formatISO9075, formatRFC3339, formatRFC7231, formatRelative all throw RangeError('Invalid time value') on Invalid Date"
  - "Effective coverage: 16 throwing functions contracted / 16 throwing functions total = 100%"
  - "242 arithmetic/utility functions intentionally omitted (addDays, subDays, differenceInDays, etc.)"

