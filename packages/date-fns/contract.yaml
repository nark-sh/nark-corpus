  - name: formatRFC3339
    import_path: "date-fns"
    description: >
      Formats a Date as an RFC 3339 string (e.g., "2019-09-18T19:00:52Z"), the standard for
      internet timestamps in APIs (used by Atom feeds, HTTP headers, many REST APIs). THROWS
      RangeError if the date is Invalid Date. Commonly used in API response serialization for
      timestamps that will be consumed by other services. Same throw behavior as formatISO().
