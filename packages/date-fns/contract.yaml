        throws: >
          RangeError (in V8/Node.js) from Intl.RelativeTimeFormat.format() when the value
          is NaN (produced by invalid date arithmetic). Error message varies by JS engine.
        required_handling: >
          Validate both dates with isValid() before calling intlFormatDistance():

            import { intlFormatDistance, isValid } from 'date-fns';

            function safeIntlFormatDistance(laterDate: Date, earlierDate: Date, locale?: string): string {
              if (!isValid(laterDate) || !isValid(earlierDate)) {
                return 'unknown';
