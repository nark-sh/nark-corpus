      # Evidence: node_modules/date-fns/intlFormat.js — delegates to Intl.DateTimeFormat.format(toDate(date))
      # Intl.DateTimeFormat.format() throws RangeError for invalid dates in V8 (Node.js/Chrome)
      # @throws annotation: "@throws `date` must not be Invalid Date"
