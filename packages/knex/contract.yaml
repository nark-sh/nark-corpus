package: knex
semver: '>=3.0.0 <4.0.0'
contract_version: 1.1.0
maintainer: corpus-team
last_verified: '2026-06-29'
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.862   # 25 contracted / 29 total async-callable (24 → 25 this pass: +upsert). Effective coverage 25/(29-4) = 25/25 = 100% — 4 additional omitted (truncate, renameTable, createTableIfNotExists-deprecated, asCallback-deprecated). Pass 2026-06-26 deepen-stream-5.
# Evidence: 226 violations across 14 repos in scan-knex-2026-06-29.json (wave-17 audit 2026-06-29).
# Top affected: odota/core, supabase/storage, frappe/books, dashpresshq/dashpress, curveball/a12n-server.
# All scan functions (run→seed.run, latest→migrate.latest) map to existing contract entries — no gaps.
detection:
  type_names:
    - Knex
    - QueryBuilder
    - Transaction
functions:
  - name: select
    import_path: knex
    description: Executes SELECT query
    postconditions:
      - id: select-query-error
        maturity: stable
        condition: query fails (syntax error, connection lost, timeout, invalid table/column)
        throws: Error with query details and database-specific error code
        required_handling: >-
          Caller MUST wrap select() in try-catch to handle SQL errors, connection failures, and timeouts. Query errors
          crash application if unhandled.
        sources:
          - https://knexjs.org/guide/query-builder.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: insert
    import_path: knex
    description: Executes INSERT query
    postconditions:
      - id: insert-constraint-violation
        maturity: stable
        condition: insert violates constraint (unique, foreign key, not null, type mismatch)
        throws: Error with constraint violation details and database error code
        required_handling: >-
          Caller MUST wrap insert() in try-catch to handle constraint violations. Unique violations, foreign key errors,
          and type mismatches crash application if unhandled.
        sources:
          - https://knexjs.org/guide/query-builder.html#insert
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: update
    import_path: knex
    description: >
      Executes UPDATE query to modify existing rows. Returns the number of affected rows (or updated records with
      RETURNING on PostgreSQL). Unlike insert(), update() silently succeeds with 0 affected rows when WHERE clause
      matches nothing — a common silent data-loss bug.
    postconditions:
      - id: update-no-try-catch
        maturity: stable
        condition: |
          update() called in async context without try-catch or .catch() handler
        throws: Error with database-specific error code and query details
        severity: error
        description: >
          update() makes a network call to the database and can throw on connection failure, query timeout
          (KnexTimeoutError after acquireConnectionTimeout ms, default 60s), invalid column names, type mismatches, and
          check constraint violations. Unhandled rejection crashes the application or hangs the request.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html#update
        required_handling: Caller MUST handle this condition appropriately.
      - id: update-zero-rows-not-checked
        maturity: stable
        condition: >
          update() result (number of affected rows) is not checked after execution — caller assumes update succeeded
          when WHERE matched nothing
        throws: does not throw — returns 0 silently
        severity: warning
        description: >
          update() returns the number of affected rows (integer). When the WHERE clause matches no rows, it returns 0
          without throwing. This is a silent no-op: the caller's data was not updated, but no error is raised. Common
          bug: updating a record by ID after it was deleted by another process — the update silently succeeds with 0
          rows, leaving the caller believing the update succeeded.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html#update
        required_handling: Caller MUST handle this condition appropriately.
  - name: delete
    import_path: knex
    description: >
      Executes DELETE query to remove rows. Aliased as del() in JavaScript since delete is a reserved keyword. Returns
      the number of deleted rows. Like update(), silently succeeds with 0 when WHERE matches nothing.
    postconditions:
      - id: delete-no-try-catch
        maturity: stable
        condition: |
          del()/delete() called in async context without try-catch or .catch() handler
        throws: Error with database-specific error code; KnexTimeoutError on connection timeout
        severity: error
        description: >
          del()/delete() makes a network call to the database and can throw on connection failure, foreign key violation
          (deleting parent of existing child rows), query timeout (KnexTimeoutError), and trigger errors. Unhandled
          rejection crashes the application.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html#del-delete
        required_handling: Caller MUST handle this condition appropriately.
      - id: delete-foreign-key-violation
        maturity: stable
        condition: >
          delete() called on a parent row that has child rows in another table with a foreign key constraint, without
          CASCADE
        throws: Error with foreign key constraint violation from database driver
        severity: error
        description: >
          Deleting a parent record when child records reference it via foreign key (without ON DELETE CASCADE) throws a
          database-native error. The error message varies by driver: PostgreSQL throws "violates foreign key
          constraint", MySQL throws "Cannot delete or update a parent row: a foreign key constraint fails". This is
          distinct from the generic query error and requires specific handling to provide meaningful user feedback.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html#del-delete
        required_handling: Caller MUST handle this condition appropriately.
  - name: first
    import_path: knex
    description: >
      Executes SELECT with LIMIT 1 and returns the first matching row, or undefined when no rows match. Unlike select()
      which returns an array, first() returns a single object or undefined. The undefined return on no match is a
      distinct failure mode — callers that don't null-check first() before accessing properties will throw TypeError at
      runtime.
    postconditions:
      - id: first-no-try-catch
        maturity: stable
        condition: |
          first() called in async context without try-catch
        throws: Error with database-specific error code on query failure
        severity: error
        description: >
          first() executes a SELECT LIMIT 1 and throws on connection failure, timeout, invalid column, or syntax error.
          Same error types as select() — KnexTimeoutError on connection pool exhaustion.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html#first
        required_handling: Caller MUST handle this condition appropriately.
      - id: first-undefined-not-checked
        maturity: stable
        condition: >
          first() result used directly without null/undefined check before accessing properties (e.g. result.id,
          result.name)
        throws: 'TypeError: Cannot read properties of undefined at runtime'
        severity: error
        description: >
          first() returns undefined when no rows match the WHERE clause. Callers that immediately destructure or access
          properties on the result without checking for undefined throw TypeError at runtime. This is the most common
          knex first() bug: fetching a user by ID and accessing user.email without checking if user exists. The database
          call succeeds, but the property access crashes.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html#first
        required_handling: Caller MUST handle this condition appropriately.
  - name: raw
    import_path: knex
    description: >
      Executes raw SQL with optional parameter binding. The primary escape hatch for complex queries not expressible via
      query builder. Has two distinct error modes: binding errors (thrown synchronously before query execution) and SQL
      execution errors (thrown async after database execution).
    postconditions:
      - id: raw-no-try-catch
        maturity: stable
        condition: |
          knex.raw() called in async context without try-catch
        throws: Error with SQL error details from database; or binding Error synchronously on undefined binding
        severity: error
        description: >
          raw() can throw in two ways: (1) synchronously with "Undefined binding(s) detected" when a named binding
          references undefined — thrown before any network call from knex/lib/raw.js; (2) asynchronously with
          database-native error on SQL execution failure (syntax error, permission denied, invalid table). Both must be
          handled. The synchronous throw is particularly dangerous — it propagates as an unhandled rejection in async
          contexts when the await is missing.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/raw.html
        required_handling: Caller MUST handle this condition appropriately.
      - id: raw-sql-injection-risk
        maturity: stable
        condition: >
          knex.raw() called with user-provided input interpolated directly into the SQL string (template literal or
          string concatenation) instead of using binding parameters
        throws: does not throw — silently executes malicious SQL
        severity: error
        description: >
          knex.raw('SELECT * FROM users WHERE id = ' + userId) is vulnerable to SQL injection. The knex docs explicitly
          warn: "Avoid interpolating raw strings for lists when values come from users." The safe pattern is
          knex.raw('SELECT * FROM users WHERE id = ?', [userId]) which passes values as bound parameters. Direct
          interpolation allows attackers to exfiltrate or modify the entire database.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/raw.html#sql-injection
        required_handling: Caller MUST handle this condition appropriately.
  - name: destroy
    import_path: knex
    description: >
      Closes all connections in the connection pool and terminates the pool. Must be called during graceful shutdown.
      Failure to call destroy() causes the process to hang indefinitely (the pool's event loop reference prevents exit).
      Returns a Promise.
    postconditions:
      - id: destroy-not-called-on-shutdown
        maturity: stable
        condition: >
          knex instance is created but destroy() is never called — process exits (or tries to exit) without closing the
          connection pool
        throws: does not throw — process hangs indefinitely, never exits
        severity: warning
        description: >
          The knex connection pool (backed by tarn) holds open database connections. These connections hold open the
          Node.js event loop. If destroy() is not called before process exit, the event loop never drains and the
          process hangs indefinitely. This is documented at https://knexjs.org/guide/#destroy. The pattern is especially
          common in: CLI scripts, test files that spin up knex, and background workers that don't hook SIGTERM/SIGINT.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/#destroy
        required_handling: Caller MUST handle this condition appropriately.
      - id: destroy-no-try-catch
        maturity: stable
        condition: |
          await knex.destroy() called without try-catch
        throws: Error on pool teardown failure (rare but possible on network error)
        severity: warning
        description: >
          knex.destroy() is async and can throw if pool teardown encounters an error (e.g., connection is mid-query
          during forced shutdown). Typically used in finally blocks during graceful shutdown — if it throws and is
          unhandled, the finally block exits abnormally.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/#destroy
        required_handling: Caller MUST handle this condition appropriately.
  - name: batchInsert
    import_path: knex
    description: >
      Inserts a large array of records in chunks within an automatic transaction. If no external transaction is
      provided, knex.batchInsert() creates its own transaction wrapping all chunks. A failure in any chunk rolls back
      all previously inserted chunks. chunk size defaults to 1000 rows.
    postconditions:
      - id: batch-insert-no-try-catch
        maturity: stable
        condition: |
          batchInsert() called without try-catch around the await
        throws: >
          Error on constraint violation or connection failure (same as insert()); TypeError for invalid chunkSize or
          non-array batch input
        severity: error
        description: >
          batchInsert() wraps all chunks in a transaction. If any chunk's insert fails (unique constraint, FK violation,
          type mismatch), the entire batch is rolled back and an error is thrown. Constraint errors from individual rows
          propagate as-is. Additionally, passing a non-array or invalid chunkSize throws TypeError synchronously before
          any database call (confirmed: batch-insert.js lines 9-14).
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/utility.html#batch-insert
        required_handling: Caller MUST handle this condition appropriately.
  - name: migrate.latest
    import_path: knex
    description: >
      Runs all pending migrations in sequence. Acquires a migration lock (stored in the `_lock` table) to prevent
      concurrent migration runs. Returns [batchNo, log] array. If the lock cannot be acquired (another process is
      migrating), throws LockError. If any migration script throws, the error propagates and the lock is released.
    postconditions:
      - id: migrate-latest-no-try-catch
        maturity: stable
        condition: |
          await knex.migrate.latest() called without try-catch in server startup or deployment scripts
        throws: >
          LockError if migration table is already locked by another process; Error from migration scripts that throw;
          KnexTimeoutError on database connection failure
        severity: error
        description: >
          migrate.latest() acquires a migration lock using SELECT FOR UPDATE. If another process is already migrating
          (common in multi-instance deployments), it throws LockError with message "Migration table is already locked".
          If any migration script itself throws, the error propagates and the lock is released. If the process crashes
          DURING migration (before lock release), the lock remains and must be manually released with `knex
          migrate:unlock`. Unhandled errors in startup scripts cause the service to fail to boot.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/migrations.html
        required_handling: Caller MUST handle this condition appropriately.
      - id: migrate-latest-lock-not-released-on-crash
        maturity: stable
        condition: >
          Process crashes during migrate.latest() execution (SIGKILL, OOM, power failure) leaving migration lock in
          locked state
        throws: LockError('Migration table is already locked') on all subsequent migrate.latest() calls
        severity: error
        description: >
          If the process is killed during migration (not graceful shutdown), the migration lock row remains is_locked=1
          in the database. ALL subsequent calls to migrate.latest() will throw LockError. This prevents the service from
          ever starting again until an operator manually runs `knex migrate:unlock` or directly updates the lock table.
          Documented explicitly at https://knexjs.org/guide/migrations.html: "if your process unfortunately crashes, the
          lock will have to be manually removed with `knex migrate:unlock`".
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/migrations.html
        required_handling: Caller MUST handle this condition appropriately.
  - name: migrate.rollback
    import_path: knex
    description: >
      Rolls back the last batch of migrations. Takes the same lock as migrate.latest(). Throws LockError if lock cannot
      be acquired. Returns [batchNo, log]. In production, rollbacks are typically run manually — the same lock and error
      contracts as migrate.latest() apply.
    postconditions:
      - id: migrate-rollback-no-try-catch
        maturity: stable
        condition: |
          await knex.migrate.rollback() called without try-catch
        throws: >
          LockError if migration table is already locked; Error from down() migration scripts that throw; Error if named
          migration not found
        severity: error
        description: >
          migrate.rollback() acquires the same migration lock as latest(). LockError can occur if another process holds
          the lock. Individual migration down() functions that throw propagate the error. If a specific migration name
          is requested (knex.migrate.down({name})) but the migration was not run, throws Error("Migration X was not
          run"). Unhandled rollback errors leave the database in a partially rolled-back state.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/migrations.html
        required_handling: Caller MUST handle this condition appropriately.
  - name: transaction
    import_path: knex
    description: Executes queries within a transaction
    postconditions:
      - id: transaction-error
        maturity: stable
        condition: query within transaction fails (constraint violation, deadlock, connection lost)
        throws: Error causing automatic rollback if unhandled
        required_handling: >-
          Caller MUST wrap transaction callback in try-catch to handle errors and ensure proper rollback. Unhandled
          errors may leave database in inconsistent state if transaction partially commits.
        sources:
          - https://knexjs.org/guide/transactions.html
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: increment
    import_path: knex
    description: >
      Executes an atomic UPDATE that increments a column value by a given amount (default 1).
      Compiles to UPDATE table SET col = col + amount WHERE .... Returns the number of affected
      rows, NOT the new value. When the WHERE clause matches no rows, returns 0 silently — the
      counter is not incremented, but no error is thrown. This silent-zero behavior is the primary
      footgun: incrementing a non-existent row appears to succeed.
    postconditions:
      # Evidence: https://knexjs.org/guide/query-builder.html
      # Source confirmed: querybuilder.js line 1111-1121 — increment internally calls _counter()
      # which sets _method = 'update'. All update() error types apply.
      - id: increment-no-try-catch
        maturity: stable
        condition: |
          increment() called in async context without try-catch or .catch() handler
        throws: >
          Error with database-specific error code on connection failure, invalid column name,
          or type mismatch (e.g. incrementing a non-numeric column);
          KnexTimeoutError after acquireConnectionTimeout on pool exhaustion
        severity: error
        description: >
          increment() compiles to an UPDATE statement and makes a database network call.
          It can throw on connection failure, invalid column name (database throws "column does
          not exist" or similar), and KnexTimeoutError when the connection pool is exhausted.
          Unhandled rejections crash the application.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html
          - https://github.com/knex/knex/blob/master/lib/query/querybuilder.js#L1111-L1121
        required_handling: Caller MUST wrap await knex(table).where({...}).increment() in try-catch.
      - id: increment-zero-rows-not-checked
        maturity: stable
        condition: >
          increment() result (number of affected rows) is not checked after execution — caller
          assumes counter was incremented when WHERE matched nothing (row does not exist)
        throws: does not throw — returns 0 silently
        severity: warning
        description: >
          increment() returns the number of rows updated (same as update()). When the WHERE
          clause matches no rows — for example, incrementing a counter for a deleted or
          non-existent record — it returns 0 without throwing. This is a silent no-op that is
          easy to miss. Common bug pattern: incrementing a page_views counter for a post_id
          after the post was deleted — the increment silently reports 0 rows and the caller
          continues unaware. For rate-limiting counters this can cause incorrect billing or
          quota enforcement.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html
          - https://github.com/knex/knex/blob/master/lib/query/querybuilder.js#L1640
        required_handling: >
          Caller SHOULD check the return value of increment(). If the returned count is 0,
          either the WHERE condition matched nothing or the row was deleted. For counter
          semantics that require the row to exist, verify count > 0 or use an upsert pattern.

  - name: decrement
    import_path: knex
    description: >
      Executes an atomic UPDATE that decrements a column value by a given amount (default 1).
      Compiles to UPDATE table SET col = col - amount WHERE .... Shares all error contracts
      with increment() — identical error surface. Returns number of affected rows, not the
      new value. Common in rate-limiting, seat counters, inventory systems.
    postconditions:
      # Evidence: https://knexjs.org/guide/query-builder.html
      # Source confirmed: querybuilder.js line 1124-1134 — decrement calls _counter with negated amount
      # Identical implementation path to increment.
      - id: decrement-no-try-catch
        maturity: stable
        condition: |
          decrement() called in async context without try-catch or .catch() handler
        throws: >
          Error with database-specific error code on connection failure, invalid column name,
          or type mismatch; KnexTimeoutError on pool exhaustion
        severity: error
        description: >
          decrement() compiles to an UPDATE statement and makes a database network call.
          Same error surface as increment() and update(). Can throw on connection failure,
          invalid column name, type errors, and KnexTimeoutError on pool exhaustion.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html
          - https://github.com/knex/knex/blob/master/lib/query/querybuilder.js#L1124-L1134
        required_handling: Caller MUST wrap await knex(table).where({...}).decrement() in try-catch.
      - id: decrement-zero-rows-not-checked
        maturity: stable
        condition: >
          decrement() result (number of affected rows) is not checked after execution —
          caller assumes counter was decremented when WHERE matched nothing
        throws: does not throw — returns 0 silently
        severity: warning
        description: >
          Same silent-zero behavior as increment(). If the WHERE clause matches no rows,
          decrement() returns 0 without throwing. Particularly dangerous in seat-counting
          or inventory-reduction flows: decrementing available_seats for a deleted booking
          silently does nothing, causing inventory count to drift. For subscription seat
          management, this can allow over-provisioning without any error signal.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/query-builder.html
        required_handling: >
          Caller SHOULD check the returned row count. If 0, the target row was not found.
          For inventory/seat management, treat 0-row decrement as a precondition failure.

  - name: transactionProvider
    import_path: knex
    description: >
      Returns a factory function (not a transaction itself) that lazily creates and reuses a
      single transaction. The returned factory, when called, returns Promise<Transaction> that
      resolves to the same transaction on all subsequent calls. Used in dependency injection
      containers where transaction lifecycle must span multiple services without passing trx
      explicitly. The connection is acquired on the first factory invocation, not when
      transactionProvider() is called.
    postconditions:
      # Evidence: https://knexjs.org/guide/transactions.html
      # Source confirmed: make-knex.js lines 156-164 — transactionProvider returns a closure
      # that calls this.transaction(undefined, config) on first invocation.
      - id: transaction-provider-factory-no-try-catch
        maturity: stable
        condition: |
          await trxProvider() called without try-catch around the factory invocation
        throws: >
          KnexTimeoutError if connection pool is exhausted when the factory is first called;
          Error on any database-level failure during transaction initialization
        severity: error
        description: >
          transactionProvider() itself is synchronous and does not throw. But the returned
          factory function returns a Promise — calling `await trxProvider()` acquires a
          database connection. If the connection pool is exhausted (KnexTimeoutError after
          acquireConnectionTimeout ms, default 60s), the factory call throws. This is easy
          to miss because `transactionProvider()` appears to be a sync config call.
          The connection is held open until commit() or rollback() is called on the returned
          transaction.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/transactions.html
          - https://github.com/knex/knex/blob/master/lib/knex-builder/make-knex.js#L156-L164
        required_handling: >
          Caller MUST wrap await trxProvider() in try-catch, especially in high-concurrency
          contexts where connection pool exhaustion is possible.
      - id: transaction-provider-connection-not-released
        maturity: stable
        condition: >
          Factory invocation succeeds but neither trx.commit() nor trx.rollback() is ever
          called — transaction is left open indefinitely
        throws: does not throw — connection silently hangs
        severity: error
        description: >
          Unlike knex.transaction(scope => ...) which auto-rolls-back on error, the
          transactionProvider pattern requires manual lifecycle management. If the consuming
          code path throws an exception before calling trx.commit() or trx.rollback(), the
          database connection is permanently held open (no auto-rollback). In long-running
          services, leaked connections accumulate until the pool is exhausted, causing
          KnexTimeoutError on all subsequent database operations. Documented at
          https://knexjs.org/guide/transactions.html: "if the handler doesn't return a
          promise you must explicitly call commit/rollback otherwise the transaction
          connection will hang".
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/transactions.html
          - https://github.com/knex/knex/blob/master/lib/knex-builder/make-knex.js#L156-L164
        required_handling: >
          MUST ensure trx.commit() or trx.rollback() is called in all code paths.
          Use try/finally: const trx = await trxProvider(); try { ...; await trx.commit(); }
          catch (err) { await trx.rollback(err); throw err; }

  - name: schema.createTable
    import_path: knex
    description: >
      Executes a CREATE TABLE DDL statement. Returns a SchemaBuilder (which implements
      ChainableInterface<void> → awaitable). Throws if the table already exists (on databases
      that don't support IF NOT EXISTS in this mode). Requires the connected user to have
      CREATE privilege. Commonly called in migration scripts during deployment.
    postconditions:
      # Evidence: https://knexjs.org/guide/schema-builder.html
      # Source confirmed: schema/builder.js lines 46-88 — createTable added to _sequence array,
      # executed via SchemaBuilder.then() which calls client.schemaCompiler(this).generateDdlCommands()
      - id: schema-create-table-no-try-catch
        maturity: stable
        condition: |
          await knex.schema.createTable(...) called without try-catch
        throws: >
          Error if table already exists (database-native: "relation already exists" in PostgreSQL,
          "Table already exists" in MySQL/SQLite);
          Error if the connected user lacks CREATE TABLE privileges;
          KnexTimeoutError on connection pool exhaustion during DDL
        severity: error
        description: >
          createTable() sends a DDL statement to the database. If the table already exists and
          the IF NOT EXISTS form is not used, the database throws an error. If the migration
          runs concurrently (two instances deploying at the same time), one will fail with
          "relation already exists". Additionally, permission errors (user lacks CREATE rights)
          throw immediately. Unhandled errors in migration startup code prevent the service
          from starting. Note: use createTableIfNotExists() is deprecated — the recommended
          pattern is to check with knex.schema.hasTable() first or rely on the migration
          system's idempotency.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/schema-builder.html
          - https://github.com/knex/knex/blob/master/lib/schema/builder.js#L46-L88
        required_handling: >
          Caller MUST wrap await knex.schema.createTable() in try-catch in migration scripts.
          In deployment automation, check for "already exists" errors to handle idempotent
          re-deployments. Use knex migration system (migrate.latest) rather than manually
          calling createTable() for idempotent DDL management.

  - name: schema.dropTable
    import_path: knex
    description: >
      Executes a DROP TABLE DDL statement. Returns a SchemaBuilder (awaitable). Throws if
      the table does not exist (unless dropTableIfExists is used), if the table is referenced
      by foreign keys from other tables (without CASCADE), or if the connected user lacks
      DROP privilege. Common in down() migrations and test teardown.
    postconditions:
      # Evidence: https://knexjs.org/guide/schema-builder.html
      # Source: lib/schema/builder.js — dropTable pushed into _sequence, run via SchemaBuilder.then()
      - id: schema-drop-table-no-try-catch
        maturity: stable
        condition: |
          await knex.schema.dropTable(...) called without try-catch
        throws: >
          Error if table does not exist ("relation does not exist" in PostgreSQL,
          "Unknown table" in MySQL);
          Error if FK constraints reference the table from another table without CASCADE
          ("cannot drop table X because other objects depend on it" in PostgreSQL);
          Error if user lacks DROP privilege;
          KnexTimeoutError on pool exhaustion
        severity: error
        description: >
          dropTable() sends a DROP TABLE DDL statement. Three documented failure modes:
          (1) table-does-not-exist when a previous migration already dropped it or the
          down() runs against a fresh database; (2) foreign-key-violation when another
          table still references the target via FK without CASCADE; (3) permission denied.
          In down() migrations called during a failed deploy rollback, unhandled errors
          leave the database in a partially-rolled-back state.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/schema-builder.html
        required_handling: >
          Caller MUST wrap await knex.schema.dropTable() in try-catch. Prefer
          dropTableIfExists() for idempotent down() migrations to avoid the
          "does-not-exist" error on re-runs.

  - name: schema.alterTable
    import_path: knex
    description: >
      Executes one or more ALTER TABLE DDL statements. Returns a SchemaBuilder (awaitable).
      Often the highest-risk DDL: type changes can fail on existing data, ADD COLUMN NOT NULL
      without a default fails on non-empty tables, and ALTER acquires an ACCESS EXCLUSIVE
      lock on PostgreSQL that blocks all reads/writes for the duration. Common deploy outage
      source.
    postconditions:
      # Evidence: https://knexjs.org/guide/schema-builder.html
      - id: schema-alter-table-no-try-catch
        maturity: stable
        condition: |
          await knex.schema.alterTable(...) called without try-catch
        throws: >
          Error on type-incompatible conversions ("cannot cast type X to type Y" in PostgreSQL,
          "Incorrect integer value" in MySQL);
          Error when ADD COLUMN NOT NULL without default is applied to a non-empty table
          ("column contains null values");
          Error on lock timeout when another transaction holds a conflicting lock on the
          target table (PostgreSQL lock_timeout setting, MySQL lock_wait_timeout);
          Error on duplicate column name when ADD COLUMN targets an existing column;
          KnexTimeoutError on pool exhaustion
        severity: error
        description: >
          alterTable() applies the requested column/index/constraint changes via ALTER TABLE
          DDL. It can throw on: type-conversion failures (data does not fit the new type),
          NOT NULL additions on non-empty tables without a default, lock acquisition timeout
          (PostgreSQL ACCESS EXCLUSIVE blocks all concurrent queries), duplicate column on
          ADD COLUMN, and FK validation errors when adding a FOREIGN KEY constraint to a
          table with existing orphan rows. Unhandled errors in migration scripts halt the
          deployment with the database in a partially-altered state.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/schema-builder.html
        required_handling: >
          Caller MUST wrap await knex.schema.alterTable() in try-catch. For production
          deploys against a live table, set a lock_timeout (PostgreSQL) or
          innodb_lock_wait_timeout (MySQL) and handle the timeout error explicitly rather
          than blocking writes indefinitely.

  - name: schema.hasTable
    import_path: knex
    description: >
      Executes a metadata query against the database catalog (information_schema or
      sqlite_master) to check whether a named table exists. Returns Promise<boolean>.
      Commonly used in idempotent migrations and bootstrap code. Despite being read-only,
      it can still throw on connection failure, pool exhaustion, and permission denied
      against the system catalog.
    postconditions:
      # Evidence: https://knexjs.org/guide/schema-builder.html
      # The method is declared `hasTable(tableName: string): Promise<boolean>` in
      # types/index.d.ts line 2406 — returns boolean, no schema mutation.
      - id: schema-has-table-no-try-catch
        maturity: stable
        condition: |
          await knex.schema.hasTable(...) called without try-catch
        throws: >
          KnexTimeoutError on connection pool exhaustion (60s default);
          Error on connection failure to the database;
          Error on permission denied if the connected user lacks SELECT on the system catalog
        severity: warning
        description: >
          hasTable() runs a metadata SELECT against the catalog. While safer than DDL, it
          still acquires a pool connection and can throw KnexTimeoutError under pool
          pressure. In bootstrap code that runs before the app accepts traffic, an
          unhandled rejection here crashes the startup process. Failure to handle this
          error in idempotent-migration helper code (if (!(await knex.schema.hasTable(...)))
          ...) prevents the migration from running and the service from starting.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/schema-builder.html
        required_handling: >
          Caller MUST wrap await knex.schema.hasTable() in try-catch in bootstrap and
          migration code. Treat connection failures as a startup error and surface them
          before the app starts accepting traffic.

  - name: schema.hasColumn
    import_path: knex
    description: >
      Executes a metadata query to check whether a column exists on a named table. Returns
      Promise<boolean>. Same error surface as hasTable(). Commonly used to make
      additive ALTER TABLE migrations idempotent.
    postconditions:
      # Evidence: https://knexjs.org/guide/schema-builder.html
      # types/index.d.ts line 2421 — `hasColumn(tableName, columnName): Promise<boolean>`.
      - id: schema-has-column-no-try-catch
        maturity: stable
        condition: |
          await knex.schema.hasColumn(...) called without try-catch
        throws: >
          KnexTimeoutError on pool exhaustion;
          Error on connection failure;
          Error on permission denied against the system catalog
        severity: warning
        description: >
          hasColumn() runs a SELECT against the catalog (information_schema.columns or
          PRAGMA on SQLite). Identical error contract to hasTable(): connection failures,
          pool exhaustion, and permission errors. Used inside idempotent ALTER TABLE
          migrations — unhandled errors prevent the migration from progressing.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/schema-builder.html
        required_handling: >
          Caller MUST wrap await knex.schema.hasColumn() in try-catch in migration
          guard-code.

  - name: migrate.up
    import_path: knex
    description: >
      Runs the next chronological pending migration (or a specific migration when
      config.name is passed). Takes the same migration lock as migrate.latest() —
      LockError is thrown if another process is migrating. Single-step variant of
      migrate.latest() commonly used in development and dry-run workflows.
    postconditions:
      # Evidence: https://knexjs.org/guide/migrations.html — "Runs the specified (by
      # config.name parameter) or the next chronological migration that has not yet be run".
      # types/index.d.ts line 3210 — `up(config?: ...): Promise<any>`.
      - id: migrate-up-no-try-catch
        maturity: stable
        condition: |
          await knex.migrate.up(...) called without try-catch
        throws: >
          LockError("Migration table is already locked") if another process holds the lock;
          Error from the migration script's up() function;
          Error("Migration X was not found") if config.name references a missing migration;
          KnexTimeoutError on connection pool exhaustion
        severity: error
        description: >
          migrate.up() acquires the same migration lock as migrate.latest() and runs a
          single pending migration. Identical failure modes to migrate.latest():
          LockError on concurrent migration attempts, propagated errors from the
          migration script, KnexTimeoutError on connection issues. Additionally throws if
          config.name references a migration that doesn't exist on disk. Unhandled errors
          in CI/CD pipelines fail the deploy step silently if the error is swallowed.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/migrations.html
        required_handling: >
          Caller MUST wrap await knex.migrate.up() in try-catch in deploy scripts.
          Distinguish LockError (concurrent deploy — retry/wait) from script errors
          (genuine migration failure — alert and rollback).

  - name: migrate.down
    import_path: knex
    description: >
      Rolls back the most recently run migration (or a specific migration when config.name
      is passed). Takes the same migration lock as migrate.latest() and migrate.up().
      Single-step variant of migrate.rollback() commonly used to revert exactly one
      problematic migration.
    postconditions:
      # Evidence: https://knexjs.org/guide/migrations.html — "Will undo the specified (by
      # config.name parameter) or the last migration that was run".
      # types/index.d.ts line 3211 — `down(config?: ...): Promise<any>`.
      - id: migrate-down-no-try-catch
        maturity: stable
        condition: |
          await knex.migrate.down(...) called without try-catch
        throws: >
          LockError("Migration table is already locked");
          Error from the migration script's down() function;
          Error("Migration X was not run") if the specified name refers to a migration that
          was never applied;
          KnexTimeoutError on pool exhaustion
        severity: error
        description: >
          migrate.down() acquires the migration lock and runs a single migration's down()
          step. Failure modes include LockError on concurrent runs, errors propagated from
          the migration script's down() function (especially if the down() logic was never
          actually exercised against production data), and "Migration was not run" if the
          named migration is unknown to the migration table. Unhandled errors during a
          rollback procedure leave the database in a half-rolled-back state.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/migrations.html
        required_handling: >
          Caller MUST wrap await knex.migrate.down() in try-catch. In rollback automation,
          surface the underlying script error rather than retrying — a failing down() step
          usually indicates the migration's down() logic is broken or the data has drifted.

  - name: migrate.forceFreeMigrationsLock
    import_path: knex
    description: >
      Forcibly clears the migration lock table, leaving exactly one row with is_locked=0.
      The escape hatch when a previous migration process crashed and left the lock acquired
      indefinitely. Dangerous in production because it can race against an actually-running
      migration; intended for operator recovery, not routine use.
    postconditions:
      # Evidence: https://knexjs.org/guide/migrations.html — "Forcibly unlocks the
      # migrations lock table, and ensures that there is only one row in it".
      # types/index.d.ts line 3212 — `forceFreeMigrationsLock(...): Promise<any>`.
      - id: migrate-force-free-lock-no-try-catch
        maturity: stable
        condition: |
          await knex.migrate.forceFreeMigrationsLock(...) called without try-catch
        throws: >
          Error on UPDATE failure against the lock table;
          KnexTimeoutError on pool exhaustion;
          Error on permission denied against the migration lock table
        severity: warning
        description: >
          forceFreeMigrationsLock() runs an UPDATE/DELETE against the migration lock table
          to clear is_locked. It can throw on connection failure, pool exhaustion, or
          permission denied (the migration user must have UPDATE on the lock table).
          Unhandled errors in recovery scripts leave the service stuck in a "migration
          already locked" state until an operator intervenes manually.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/migrations.html
        required_handling: >
          Caller MUST wrap await knex.migrate.forceFreeMigrationsLock() in try-catch.
          Surface failures loudly — a failed unlock means the service cannot recover its
          ability to migrate.
      - id: migrate-force-free-lock-races-active-migration
        maturity: stable
        condition: >
          forceFreeMigrationsLock() called while another process is actively running a
          migration (rather than the documented recovery case of a crashed migration)
        throws: does not throw — silently clears the lock and allows a concurrent migration
        severity: error
        description: >
          The documented use case is recovery from a crashed migration. If an operator
          mistakenly runs forceFreeMigrationsLock() while a healthy migration is still in
          progress, the lock is cleared and a second migration process can begin running
          the same migrations concurrently. This violates the lock's whole purpose
          (preventing duplicate migration runs) and can corrupt the migration state and
          schema. The function does not detect or refuse to clear an actively-held lock.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/migrations.html
        required_handling: >
          Operator MUST verify no other migration process is running before calling
          forceFreeMigrationsLock(). Treat this function as a manual operator tool, never
          wire it into automated deploy scripts that run unconditionally.

  - name: seed.run
    import_path: knex
    description: >
      Runs all seed files (or a specific one via config.specific) in alphabetical order.
      Each seed file is invoked sequentially — there is no transaction wrapping. If a seed
      throws, execution halts immediately and the error is re-thrown with context. Commonly
      used in test setup and local-environment bootstrapping.
    postconditions:
      # Evidence: https://github.com/knex/knex/blob/master/lib/migrations/seed/Seeder.js —
      # Seeder._waterfallBatch wraps each seed call in try/catch and re-throws with
      # "Error while executing \"${seedPath}\" seed: ${originalError.message}".
      # The original error is attached as `.original` on the wrapper.
      # types/index.d.ts line 3240 — `run(config?: SeederConfig): Promise<[string[]]>`.
      - id: seed-run-no-try-catch
        maturity: stable
        condition: |
          await knex.seed.run(...) called without try-catch
        throws: >
          Error("Invalid seed file: <path> must have a seed function") if a file is
          missing the seed export;
          Error("Error while executing \"<path>\" seed: <original-message>") wrapping any
          error thrown from inside the seed function (including all knex query errors:
          insert constraint violations, connection failures, KnexTimeoutError);
          Error if the seed directory does not exist
        severity: error
        description: >
          seed.run() iterates seed files sequentially and catches per-file errors to
          re-throw with the file path attached. The wrapped error carries the original
          via .original. Because seeds are NOT wrapped in a transaction by knex itself,
          a failure halfway through leaves the database in a partially-seeded state. In
          CI test setup, an unhandled rejection from seed.run() typically aborts the test
          run with an unclear error message unless the wrapper is caught and the
          .original error is inspected.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://github.com/knex/knex/blob/master/lib/migrations/seed/Seeder.js
        required_handling: >
          Caller MUST wrap await knex.seed.run() in try-catch in test setup hooks and
          bootstrap scripts. Inspect err.original to recover the underlying knex error
          when reporting failures.
      - id: seed-run-partial-state-on-failure
        maturity: stable
        condition: >
          seed.run() throws partway through a multi-file seed sequence without the caller
          rolling back already-inserted rows or truncating the affected tables
        throws: does not throw — leaves database in partially-seeded state
        severity: warning
        description: >
          Seeds run sequentially without an enclosing transaction (knex does not wrap them
          for the user). When seed file 3 of 5 throws, files 1 and 2 have already
          committed their inserts. The next test run that re-seeds will hit unique
          constraint violations on rows already inserted. The safe pattern in test setup
          is to TRUNCATE the relevant tables (or knex.migrate.rollback + latest) before
          re-running seeds, OR to wrap seed.run() in an explicit transaction so a failure
          rolls everything back.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - https://github.com/knex/knex/blob/master/lib/migrations/seed/Seeder.js
        required_handling: >
          Caller SHOULD wrap seed.run() in an explicit transaction (or truncate-and-retry
          on failure) when partial-state recovery matters. At minimum, treat a failed
          seed.run() as a signal that the database needs cleanup before the next attempt.

  - name: stream
    import_path: knex
    description: >
      Returns a readable Node.js stream (PassThrough) for a query. Used to iterate large
      result sets without loading them all into memory. Errors during stream consumption
      (mid-stream connection drop, malformed row, downstream backpressure) are emitted as
      'error' events on the stream — they do NOT throw from the original .stream() call.
      Silent failure mode if the caller does not register an 'error' listener.
    postconditions:
      # Evidence: https://knexjs.org/guide/interfaces.html — "If called with a callback,
      # the callback is passed the stream and a promise is returned. Otherwise, the
      # readable stream is returned." Also: "On an HTTP server, make sure to manually
      # close your streams if a request is aborted."
      # types/index.d.ts line 2299-2306 — three overloads, callback form returns
      # Promise<any> and pure form returns PassThrough.
      - id: stream-error-event-not-registered
        maturity: stable
        condition: >
          knex(...).stream() (or chained .stream()) consumed without registering an
          'error' listener on the returned stream (or without try/catch around a
          for-await-of loop consuming it)
        throws: >
          does not throw from the .stream() call — errors are emitted asynchronously
          on the stream's 'error' event; an unhandled 'error' event terminates the
          Node.js process with an uncaught exception
        severity: error
        description: >
          knex streams emit query errors (mid-stream connection drop, driver-level
          parse errors, query cancellation) as 'error' events on the returned readable
          stream rather than rejecting the original Promise. If the caller pipes the
          stream into a writable destination without registering a stream.on('error', ...)
          handler, an emitted 'error' event becomes an uncaught exception and crashes
          the Node process. The for-await-of consumption form bridges the error into
          the for-loop's rejection (so try/catch around the loop works), but the
          callback and raw-pipe forms do not.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/interfaces.html
        required_handling: >
          Caller MUST either (1) consume the stream with for-await-of inside try/catch,
          OR (2) register stream.on('error', handler) before piping, OR (3) use the
          callback form which returns a Promise that rejects on stream errors. Never
          .pipe() a knex stream without an 'error' listener.
      - id: stream-not-destroyed-on-request-abort
        maturity: stable
        condition: >
          knex stream piped into an HTTP response is not explicitly destroyed when the
          HTTP request is aborted by the client
        throws: >
          does not throw — the database connection is held open and remains in the pool
          as in-use until either query completion or KnexTimeoutError
        severity: warning
        description: >
          The knex docs explicitly warn: "On an HTTP server, make sure to manually close
          your streams if a request is aborted." When a client disconnects mid-stream
          (closes the browser, mobile request times out), the underlying database query
          continues running and the connection stays checked out of the pool. Under load,
          this leaks pool connections rapidly and triggers KnexTimeoutError on every
          subsequent request. Documented at https://knexjs.org/guide/interfaces.html.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - https://knexjs.org/guide/interfaces.html
        required_handling: >
          Caller MUST listen for the HTTP request's 'aborted' / 'close' event and call
          stream.destroy() to release the pooled connection. The for-await-of consumption
          form handles this automatically (the docs state: "if the loop terminates with a
          break, return, or a throw, the stream will be destroyed"). The raw-pipe form
          does not.

  - name: upsert
    import_path: knex
    description: >
      Executes a dialect-specific upsert operation. Implemented ONLY for MySQL and CockroachDB.
      MySQL compiles to REPLACE INTO (which deletes the existing row and inserts a new one, not
      a true UPDATE — AUTO_INCREMENT IDs change and unspecified columns are reset to DEFAULT).
      Calling upsert() on any other dialect (PostgreSQL, MSSQL, Oracle, SQLite, Redshift) throws
      a synchronous Error before any database call is made.
      PostgreSQL/SQLite users should use insert().onConflict().merge() instead.
    postconditions:
      # Evidence: https://knexjs.org/guide/query-builder.html#upsert
      # Source confirmed: knex/lib/query/querybuilder.js — base upsert() throws synchronously;
      # knex/lib/dialects/mysql/query/mysql-querybuilder.js — MySQL override uses REPLACE INTO via
      # knex/lib/dialects/mysql/query/mysql-querycompiler.js upsert() method.
      # Warning confirmed: mysql-querycompiler.js constructor — `.returning()` on MySQL upsert logs
      # warning and has no effect.
      - id: upsert-unsupported-dialect
        maturity: stable
        condition: >
          upsert() called when the knex instance is configured for PostgreSQL, MSSQL, Oracle,
          SQLite, or Redshift (any dialect other than MySQL and CockroachDB)
        throws: >
          Error("Upsert is not yet supported for dialect <name>") — thrown synchronously from
          knex/lib/query/querybuilder.js upsert() base method before any network call is made
        required_handling: >
          Caller MUST check the configured dialect before calling upsert(), or catch the Error.
          For PostgreSQL/SQLite, use insert().onConflict(column).merge() instead.
          For MSSQL, Oracle: no native upsert — use raw SQL MERGE or INSERT ... WHERE NOT EXISTS.
          A try-catch is required if the dialect may change across environments (e.g., SQLite in
          test, PostgreSQL in production).
        sources:
          - https://knexjs.org/guide/query-builder.html#upsert
          - https://github.com/knex/knex/blob/master/lib/query/querybuilder.js
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: upsert-mysql-replace-into-data-loss
        maturity: stable
        condition: >
          upsert() called on a MySQL knex instance on a table where a row with the same PRIMARY
          KEY already exists, and the caller expects UPDATE semantics (preserving unspecified
          columns, preserving the existing primary key ID)
        throws: does not throw — executes REPLACE INTO which deletes then re-inserts the row
        required_handling: >
          Caller MUST understand that MySQL upsert() uses REPLACE INTO, NOT INSERT ... ON
          DUPLICATE KEY UPDATE. REPLACE INTO: (1) deletes the existing row (including its
          AUTO_INCREMENT ID), (2) inserts a new row with a new AUTO_INCREMENT ID, (3) silently
          resets any column not present in the upsert values to its DEFAULT. Foreign keys
          referencing the old ID are broken. Any columns the caller expected to retain unchanged
          (e.g. created_at, soft-delete flags, column not in the upsert payload) are lost.
          Use insert().onConflict().merge() for true upsert semantics on MySQL.
        sources:
          - https://knexjs.org/guide/query-builder.html#upsert
          - https://knexjs.org/guide/query-builder.html#on-conflict
          - https://github.com/knex/knex/blob/master/lib/dialects/mysql/query/mysql-querycompiler.js
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: upsert-mysql-returning-ignored
        maturity: stable
        condition: >
          upsert() called on a MySQL knex instance with a .returning() modifier to get the
          inserted/updated row back
        throws: does not throw — .returning() is silently ignored on MySQL; upsert returns number
        required_handling: >
          Caller MUST NOT rely on .returning() with MySQL upsert(). The knex MySQL driver logs a
          warning ("'.returning()' is not supported by mysql") but continues execution, returning
          the count instead of the row. To get the row back after a MySQL upsert, run a follow-up
          SELECT. On PostgreSQL/SQLite, use insert().onConflict().merge().returning() instead.
        sources:
          - https://knexjs.org/guide/query-builder.html#upsert
          - https://github.com/knex/knex/blob/master/lib/dialects/mysql/query/mysql-querycompiler.js
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

edge_cases:
  - id: connection-pool-exhaustion
    description: >
      When all pool connections are in use by long-running transactions and a new query tries to acquire a connection,
      knex throws KnexTimeoutError after acquireConnectionTimeout (default 60000ms). Common cause: queries that call
      knex() inside a transaction callback without using the trx object — they acquire a separate connection from the
      pool, leading to deadlock when the pool is fully in use by transactions. Must call destroy() on knex instance
      during graceful shutdown to close connection pool — unclosed connections prevent process exit.
    sources:
      - https://knexjs.org/guide/#destroy
      - knex/lib/client.js line 425 — KnexTimeoutError wrapping tarn TimeoutError
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium
