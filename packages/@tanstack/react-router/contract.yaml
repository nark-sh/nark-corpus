    postconditions:
      # Evidence: source inspection — useLoaderDeps.d.cts and useLoaderData behavior
      # Same StrictOrFrom type constraint as useLoaderData — same throw pattern applies.
      # router-core matchRoutes enforces strict route matching when strict: true (default).
      - id: loader-deps-route-mismatch-strict
        condition: "strict: true (default) and current route does not match the 'from' parameter"
        severity: error
        required_handling: >
          Caller MUST either: (1) use the correct 'from' route ID matching the current route,
          (2) set strict: false when using in shared components rendered across multiple routes,
          or (3) wrap in error boundary. TypeScript strict route types catch most cases at
          compile time when using file-based routing.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/useLoaderDepsHook"
          - "https://tanstack.com/router/latest/docs/guide/type-safety"

  - name: RouterProvider
    import_path: "@tanstack/react-router"
    description: >
      Top-level component that renders the active route matches and provides the
      router instance to the React tree via context. Must receive a router instance
      created with createRouter(). Calls router.load() on mount to execute initial
      route loading. Router initialization errors surface as render-time throws.

    postconditions:
      # Evidence: source inspection — RouterProvider.cjs and router.cjs load() implementation
      # router.load() runs beforeLoad hooks and route loaders. If a loader throws non-redirect/notFound,
      # the error propagates to the route's errorComponent or crashes the app.
      - id: router-provider-loader-initialization-error
        condition: "Root route loader or beforeLoad hook throws a non-redirect, non-notFound error during app initialization"
        severity: error
        required_handling: >
          Caller MUST define errorComponent on the root route or wrap RouterProvider in
          a top-level React ErrorBoundary to catch initialization failures. Root-level
          loaders (e.g., auth checks in beforeLoad) that throw will crash the app if
          no error boundary exists at or above RouterProvider.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
