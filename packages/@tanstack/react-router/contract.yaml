  - name: useBlocker
    import_path: "@tanstack/react-router"
    description: >
      Hook that registers a navigation blocker. Accepts a shouldBlockFn callback
      (which may be async) that returns true to block navigation or false to allow
      it. When withResolver: true, returns a BlockerResolver object with proceed/reset
      controls for custom confirmation UIs.

    postconditions:
      # Evidence: source inspection — packages/@tanstack/react-router/dist/cjs/useBlocker.cjs
      # shouldBlockFn is called inside `await shouldBlockFn({...})` with no try-catch wrapper.
      # The blockerFnComposed is passed to history.block() which does not catch async errors.
      - id: blocker-shouldblock-fn-uncaught-rejection
        condition: "shouldBlockFn is async and its returned Promise rejects (network call or other async operation fails inside shouldBlockFn)"
        severity: error
        required_handling: >
          Caller MUST wrap shouldBlockFn body in try-catch and resolve to a boolean
          even on error. Do not let shouldBlockFn reject — catch errors internally
          and return false (allow navigation) or true (block) as a safe default.
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        sources:
          - "https://github.com/TanStack/router/blob/main/packages/react-router/src/useBlocker.tsx"

      # Evidence: source inspection — router.cjs navigate() implementation
      # navigate() calls blocker.blockerFn() for external/reloadDocument navigations.
      # shouldBlockFn returning true causes navigate() to return early (allows partial navigation).
      - id: blocker-external-navigation-bypass
        condition: "Multiple navigation blockers registered and one throws an error before others can run"
        severity: warning
        required_handling: >
          Caller SHOULD ensure only one navigation blocker is active per component to avoid
          ordering dependencies. Defensive shouldBlockFn implementations should never throw.
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        sources:
          - "https://github.com/TanStack/router/blob/main/packages/react-router-core/src/router.ts"

  - name: useAwaited
    import_path: "@tanstack/react-router"
    description: >
      Hook that suspends the component until a deferred promise (created with defer())
      resolves. Uses React Suspense protocol — throws the pending promise to suspend,
      throws the rejection error when the deferred promise fails. The Await component
      is a wrapper around useAwaited with optional Suspense fallback.

    postconditions:
      # Evidence: source inspection — packages/@tanstack/react-router/dist/cjs/awaited.cjs
      # `if (promise[TSR_DEFERRED_PROMISE].status === "error") throw promise[TSR_DEFERRED_PROMISE].error`
      # The thrown error is the raw rejection value from the deferred promise.
      - id: awaited-deferred-rejection-no-error-boundary
        condition: "Deferred Promise passed to useAwaited rejects and no error boundary wraps the component"
        severity: error
        required_handling: >
          Caller MUST wrap useAwaited/Await usage in either: (1) a route errorComponent
          defined on the route that passes loader data, (2) a React Suspense + ErrorBoundary
          pair, or (3) the CatchBoundary component from @tanstack/react-router.
          Without an error boundary, deferred data loading failures crash the UI.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://github.com/TanStack/router/blob/main/packages/react-router/src/awaited.tsx"

      # Evidence: source inspection — awaited.cjs line: "if (status === 'pending') throw promise"
      # React 18 use() hook is used when available; otherwise Suspense throw protocol is used.
      - id: awaited-missing-suspense-boundary
        condition: "useAwaited called with a pending deferred promise and no React Suspense boundary in the ancestor tree"
        severity: error
        required_handling: >
          Caller MUST either: (1) use Await with a fallback prop to auto-wrap in Suspense,
          (2) wrap useAwaited calls in a React.Suspense boundary, or (3) use within a
          route that has pendingComponent defined. Every deferred data access point needs
          a Suspense boundary.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://github.com/TanStack/router/blob/main/packages/react-router/src/awaited.tsx"

  - name: lazyRouteComponent
    import_path: "@tanstack/react-router"
    description: >
      Wraps a dynamic import function to create a lazy-loaded route component that
      supports .preload() and handles module-not-found errors with automatic page
      reload (once per session). When the component has not yet loaded, throws a
      Promise for Suspense. When the import fails and is not a module-not-found error,
      throws the error directly into the render tree.

    postconditions:
      # Evidence: source inspection — lazyRouteComponent.cjs
      # `if (error) throw error` — any non-ModuleNotFound import error is thrown into React render
      # For ModuleNotFoundError: sessionStorage-gated auto-reload, then throws indefinitely
      - id: lazy-route-component-import-failure
        condition: "Dynamic import fails due to network error, wrong path, or non-ModuleNotFound error"
        severity: error
        required_handling: >
          Caller MUST define an errorComponent on the route that uses lazyRouteComponent,
          or wrap the route in a CatchBoundary. Without an error boundary, import failures
          permanently crash the route subtree. Additionally, the parent route should define
          errorComponent to catch lazy load failures during navigation.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        sources:
          - "https://github.com/TanStack/router/blob/main/packages/react-router/src/lazyRouteComponent.tsx"
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/lazyRouteComponentFunction"

      # Evidence: source inspection — lazyRouteComponent.cjs
      # ModuleNotFoundError detection: checks for browser-specific "Failed to fetch dynamically imported module" etc.
      # Auto-reload fires once (sessionStorage gate), then if reload doesn't fix it, the error is thrown.
      - id: lazy-route-component-chunk-hash-mismatch-loop
        condition: "Chunk hash mismatch after new deploy: single auto-reload fires but module still not found (CDN cache serving old assets)"
        severity: warning
        required_handling: >
          Caller SHOULD implement errorComponent on routes using lazy components to display
          a user-friendly "Please refresh the page" message when the auto-reload cannot
          resolve the chunk. This catches the post-reload throw loop.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://github.com/TanStack/router/blob/main/packages/react-router/src/lazyRouteComponent.tsx"

  - name: useLoaderDeps
    import_path: "@tanstack/react-router"
    description: >
      Hook that returns the current route's loader dependency object — the values
