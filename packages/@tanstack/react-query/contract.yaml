package: "@tanstack/react-query"
semver: ">=5.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "behavioral-contracts"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed

functions:
  - name: useQuery
    import_path: "@tanstack/react-query"
    description: "Hook that fetches data and manages query state, caching, and refetching"

    postconditions:
      # Evidence: seen in 280 primary firings across 41 repos in scan-tanstack-react-query-2026-04-02.json
      # Top affected: amruthpillai/reactive-resume (⭐ top), bigint/hey (⭐ top), getmaxun/maxun (⭐ top)
      - id: query-error-unhandled
        condition: "queryFn throws an error and error state is not checked"
        throws: "Error (type specified by TError generic, defaults to Error)"
        required_handling: |
          Caller SHOULD handle query errors using one of these methods:
          1. Check the `error` property and `isError` state returned by useQuery, OR
          2. Wrap the component in an ErrorBoundary with throwOnError: true, OR
          3. Configure global QueryCache.onError handler in QueryClient (React Query v5 recommended pattern).

          Query errors are NOT thrown - they are returned in the error property.
          Ignoring the error state leaves users with broken UI and no feedback.
          Global QueryCache error handlers (configured in QueryClient) satisfy this requirement.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/query-functions"
          - "https://tkdodo.eu/blog/breaking-react-querys-api-on-purpose"
        # Downgraded from error: scanner cannot detect global QueryCache.onError handlers.
        # 25 FP reports in 2026-04-02 dashboard feedback — global handlers satisfy this postcondition.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: query-retry-client-errors
        condition: "retry is configured without checking error type (retries on 4xx)"
        throws: "N/A"
        required_handling: |
          When configuring custom retry logic, MUST NOT retry on client errors (400, 401, 403, 404).

          Bad: retry: 3 (retries all errors including 4xx)
          Good: retry: (failureCount, error) => {
            if (error.response?.status >= 400 && error.response?.status < 500) return false;
            return failureCount < 3;
          }

          Retrying client errors wastes resources and delays user feedback.
          Only server errors (5xx) and network errors should trigger retries.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/query-retries"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: stale-query-refetch-error
        condition: "stale query refetches in background and new fetch fails"
        throws: "Error from queryFn"
        required_handling: |
          When staleTime expires and background refetch fails, the error property will be populated.
          Previous cached data remains available via the `data` property.

          Caller MUST either:
          1. Check `isError` state and show error UI/toast, OR
          2. Configure global error handler via QueryCache onError, OR
          3. Use `failureReason` to track errors without entering error state.

          Silent failures leave users viewing stale data with no indication of problems.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/caching"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: network-error-handling
        condition: "network failure prevents query from executing"
        throws: "Network error (TypeError, fetch errors, etc.)"
        required_handling: |
          Network errors (DNS failures, timeouts, connection refused) are treated as query errors.

          Caller MUST handle network errors separately from HTTP errors:
          1. Check error type/message to distinguish network vs HTTP errors
          2. Show appropriate user feedback ("No internet connection" vs "Server error")
          3. Consider different retry strategies (network errors may need exponential backoff)

          Treating all errors the same provides poor user experience.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/query-functions"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: query-fn-returns-error
        description: "If queryFn returns an error object instead of throwing, React Query treats it as successful data"
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/query-functions"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: concurrent-query-errors
        description: "Multiple components using same query key share error state. Error in one affects all."
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/queries"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: useMutation
    import_path: "@tanstack/react-query"
    description: "Hook that performs mutations (POST, PUT, DELETE) and manages mutation state"

    postconditions:
      # Evidence: seen in 190 primary firings across 19 repos in scan-tanstack-react-query-2026-04-02.json
      # Top affected: amruthpillai/reactive-resume (⭐ top), zaidmukaddam/scira (⭐ top), saturndec/waoowaoo (⭐ top)
      - id: mutation-error-unhandled
        condition: "mutationFn throws an error and error is not handled"
        throws: "Error (type specified by TError generic, defaults to Error)"
        required_handling: |
          Caller SHOULD handle mutation errors using one of these methods:
          1. Check the `error` property and `isError` state returned by useMutation, OR
          2. Provide onError callback in mutation options, OR
          3. Handle errors in the .catch() when calling mutate/mutateAsync, OR
          4. Configure global mutation error handler via QueryClient mutationCache.onError (v5 recommended pattern).

          Mutations modify server state - users MUST know if they failed.
          Silent failures lead to data inconsistency and user confusion.
          Global MutationCache error handlers satisfy this requirement.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/mutations"
        # Downgraded from error: scanner cannot detect global MutationCache.onError handlers.
        # 2 FP reports in 2026-04-02 dashboard feedback — global handlers satisfy this postcondition.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mutation-optimistic-update-rollback
        condition: "optimistic update is performed and mutation fails"
        throws: "Error from mutationFn"
        required_handling: |
          When using optimistic updates, the onError callback MUST roll back the optimistic changes.

          Required pattern:
          ```
          onMutate: async (newData) => {
            await queryClient.cancelQueries({ queryKey })
            const previousData = queryClient.getQueryData(queryKey)
            queryClient.setQueryData(queryKey, newData) // optimistic update
            return { previousData } // context for rollback
          },
          onError: (err, newData, context) => {
            queryClient.setQueryData(queryKey, context.previousData) // ROLLBACK
          }
          ```

          Without rollback, failed mutations leave UI showing incorrect data.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/optimistic-updates"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mutation-default-no-retry
        condition: "mutation fails and caller expects retry behavior"
        throws: "N/A"
        required_handling: |
          Mutations do NOT retry by default (unlike queries).

          If retry is needed for idempotent mutations:
          1. Explicitly configure retry option
          2. Ensure mutation is idempotent or uses idempotency keys
          3. Only retry on network/server errors, NOT client errors

          Bad: retry: 3 (may duplicate non-idempotent operations)
          Good: retry: false (default, explicit)
          Acceptable: retry: (failureCount, error) => {
            // Only retry GET-like mutations or with idempotency keys
            return error.response?.status >= 500 && failureCount < 2
          }
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/mutations"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mutation-parallel-execution
        condition: "multiple mutations executing concurrently cause race conditions"
        throws: "N/A"
        required_handling: |
          By default, mutations execute in parallel which can cause race conditions.

          For sequential mutations, caller MUST:
          1. Use mutateAsync with await for sequential execution, OR
          2. Use onSuccess callback to chain mutations, OR
          3. Configure mutation queue in QueryClient.

          Parallel mutations can cause: last-write-wins conflicts, data inconsistency, incorrect UI state.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/mutations"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: mutate-vs-mutateasync
        description: "mutate() doesn't return a Promise. Use mutateAsync() if you need to await the result."
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/reference/useMutation"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: mutation-context-type-safety
        description: "Context returned from onMutate must match type expected in onError/onSuccess"
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/optimistic-updates"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: useInfiniteQuery
    import_path: "@tanstack/react-query"
    description: "Hook for infinite scrolling/pagination that manages multiple pages of data"

    postconditions:
      # Evidence: seen in 32 primary firings across 9 repos in scan-tanstack-react-query-2026-04-02.json
      # Top affected: zaidmukaddam/scira (⭐ top), jnsahaj/tweakcn (⭐ top), Crossbell-Box/xLog (⭐ top)
      - id: infinite-query-error-unhandled
        condition: "fetchNextPage fails and error is not handled"
        throws: "Error from queryFn for failed page"
        required_handling: |
          Caller SHOULD handle errors when fetching additional pages:
          1. Check `error` and `isError` state, OR
          2. Check `fetchNextPageError` for page-specific errors, OR
          3. Configure global QueryCache.onError handler (v5 recommended pattern).

          When fetchNextPage fails, previously loaded pages remain accessible via `data`.
          User must be informed that loading more failed.
          Global QueryCache error handlers satisfy this requirement.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/infinite-queries"
        # Downgraded from error: scanner cannot detect global QueryCache.onError handlers.
        # 3 FP reports in 2026-04-02 dashboard feedback — global handlers satisfy this postcondition.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: infinite-query-refetch-all-pages
        condition: "query is refetched and middle pages fail"
        throws: "Error from queryFn"
        required_handling: |
          When refetching infinite query, ALL pages are refetched by default.
          If any page fails, the entire query enters error state.

          Caller MUST either:
          1. Handle errors gracefully (show toast, retry button), OR
          2. Configure refetchPages to only refetch first page: refetchPages: 'first', OR
          3. Use refetchOnWindowFocus: false to prevent automatic refetches.

          Refetch failures can lose all previously loaded pages if not handled.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/infinite-queries"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: getnextpageparam-undefined
        description: "If getNextPageParam returns undefined, hasNextPage becomes false. Ensure this is intentional."
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/infinite-queries"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: infinite-query-memory
        description: "Infinite queries accumulate pages in memory. Consider gcTime for cleanup or limit max pages."
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/infinite-queries"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: QueryClient
    import_path: "@tanstack/react-query"
    description: "Main client for managing queries, mutations, and cache configuration"

    preconditions:
      - id: missing-global-error-handlers
        description: "QueryClient created without global error handlers in production"
        required_handling: |
          Production applications SHOULD configure global error handlers for better UX:

          ```typescript
          new QueryClient({
            queryCache: new QueryCache({
              onError: (error) => {
                // Global query error handling: toasts, logging, navigation
                if (error.response?.status === 401) {
                  router.navigate('/login')
                }
                toast.error('Something went wrong')
              }
            }),
            mutationCache: new MutationCache({
              onError: (error) => {
                // Global mutation error handling
              }
            })
          })
          ```

          Without global handlers, developers must handle errors in every hook usage.
          Global handlers ensure consistent error UX across the application.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/query-functions"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: default-retry-strategy-production
        description: "Using default retry strategy (3 retries for all errors) in production"
        required_handling: |
          Default retry behavior retries ALL errors 3 times, including client errors (4xx).

          Production apps SHOULD configure smarter retry logic:
          ```typescript
          new QueryClient({
            defaultOptions: {
              queries: {
                retry: (failureCount, error) => {
                  // Don't retry client errors
                  if (error?.response?.status >= 400 && error?.response?.status < 500) {
                    return false
                  }
                  // Retry server/network errors up to 3 times
                  return failureCount < 3
                }
              }
            }
          })
          ```

          Smart retry prevents wasted API calls and provides faster user feedback.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/query-retries"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: staletime-vs-gctime
        description: "staleTime (data freshness) and gcTime (memory cleanup) serve different purposes. Understand the difference."
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/caching"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
