  - name: QueryClient
    import_path: "@tanstack/react-query"
    description: "Main client for managing queries, mutations, and cache configuration"

    preconditions:
      - id: missing-global-error-handlers
        description: "QueryClient created without global error handlers in production"
        required_handling: |
          Production applications SHOULD configure global error handlers for better UX:

          ```typescript
          new QueryClient({
            queryCache: new QueryCache({
              onError: (error) => {
                // Global query error handling: toasts, logging, navigation
                if (error.response?.status === 401) {
                  router.navigate('/login')
                }
                toast.error('Something went wrong')
              }
            }),
            mutationCache: new MutationCache({
              onError: (error) => {
                // Global mutation error handling
              }
            })
          })
          ```

          Without global handlers, developers must handle errors in every hook usage.
          Global handlers ensure consistent error UX across the application.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/query-functions"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: default-retry-strategy-production
        description: "Using default retry strategy (3 retries for all errors) in production"
        required_handling: |
          Default retry behavior retries ALL errors 3 times, including client errors (4xx).

          Production apps SHOULD configure smarter retry logic:
          ```typescript
          new QueryClient({
            defaultOptions: {
              queries: {
                retry: (failureCount, error) => {
                  // Don't retry client errors
                  if (error?.response?.status >= 400 && error?.response?.status < 500) {
                    return false
                  }
                  // Retry server/network errors up to 3 times
                  return failureCount < 3
                }
              }
            }
          })
          ```

          Smart retry prevents wasted API calls and provides faster user feedback.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/query-retries"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: staletime-vs-gctime
        description: "staleTime (data freshness) and gcTime (memory cleanup) serve different purposes. Understand the difference."
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/caching"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Evidence: https://tanstack.com/query/latest/docs/framework/react/reference/useSuspenseQuery
  # Evidence: https://tanstack.com/query/latest/docs/framework/react/guides/suspense
  - name: useSuspenseQuery
    import_path: "@tanstack/react-query"
    description: >
      Suspense-enabled variant of useQuery. Instead of returning error/loading state, it
      suspends the component (throws a Promise) while loading and throws errors to the
      nearest ErrorBoundary when the query fails. data is always defined on success — no
      undefined checks needed. Status is either 'success' or 'error', never 'pending'.

    postconditions:
      # Evidence: https://tanstack.com/query/latest/docs/framework/react/reference/useSuspenseQuery
      # Evidence: https://tanstack.com/query/latest/docs/framework/react/guides/suspense
      # Error types: whatever queryFn throws (re-thrown to ErrorBoundary)
      - id: suspense-query-error-boundary-required
        condition: "queryFn throws any error"
        throws: "Error thrown by queryFn — propagated to nearest ErrorBoundary (not returned in result)"
        required_handling: |
          Unlike useQuery, useSuspenseQuery does NOT return errors in the result object.
          All errors are thrown to the nearest ErrorBoundary.

          Caller MUST:
          1. Wrap the component tree in a React ErrorBoundary to catch thrown errors, AND
          2. Wrap with QueryErrorResetBoundary (or use useQueryErrorResetBoundary) to allow retry.

          Required pattern:
          ```tsx
          <QueryErrorResetBoundary>
            {({ reset }) => (
              <ErrorBoundary onReset={reset} fallback={<ErrorUI />}>
                <ComponentUsingSuspenseQuery />
              </ErrorBoundary>
            )}
          </QueryErrorResetBoundary>
          ```

          Without ErrorBoundary, errors propagate unhandled and crash the component tree.
          Without QueryErrorResetBoundary, users cannot retry failed queries.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/suspense"
          - "https://tanstack.com/query/latest/docs/framework/react/reference/useSuspenseQuery"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: suspense-query-stale-cache-hides-errors
        condition: "background refetch fails but stale cached data exists"
        throws: "Error is NOT thrown to ErrorBoundary when cached data exists (even if stale)"
        required_handling: |
          When cached data exists and a background refetch fails, React Query does NOT
          throw the error to the ErrorBoundary — it continues showing stale data silently.

          To catch all errors regardless of cache state:
          ```tsx
          const { data, error, isFetching } = useSuspenseQuery(...)
          if (error && !isFetching) {
            throw error // Manually propagate to ErrorBoundary
          }
          ```

          Or use throwOnError: true in query options to always throw.
          Silent background failures leave users viewing stale data with no indication.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/suspense"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: suspense-cancellation-not-supported
        condition: "component unmounts while query is in-flight"
        throws: "CancelledError may not propagate as expected — cancellation does not work with Suspense hooks"
        required_handling: |
          Cancellation via AbortSignal does not function correctly with useSuspenseQuery.
          Do not rely on query cancellation patterns when using Suspense variants.

          If cancellation on unmount is required, use standard useQuery instead.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/reference/useSuspenseQuery"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  # Evidence: https://tanstack.com/query/latest/docs/framework/react/reference/useSuspenseInfiniteQuery
  - name: useSuspenseInfiniteQuery
    import_path: "@tanstack/react-query"
    description: >
      Suspense-enabled variant of useInfiniteQuery. Like useSuspenseQuery, it suspends on
      loading and throws errors to the nearest ErrorBoundary. Used for infinite scroll/
      pagination with Suspense support. data is always defined on success.

    postconditions:
      # Evidence: https://tanstack.com/query/latest/docs/framework/react/reference/useSuspenseInfiniteQuery
      - id: suspense-infinite-error-boundary-required
        condition: "any page fetch throws an error"
        throws: "Error thrown by queryFn — propagated to nearest ErrorBoundary"
        required_handling: |
          All errors from page fetches are thrown to the nearest ErrorBoundary.
          throwOnError cannot be configured (always true).

          Caller MUST wrap in QueryErrorResetBoundary + ErrorBoundary:
          ```tsx
          <QueryErrorResetBoundary>
            {({ reset }) => (
              <ErrorBoundary onReset={reset} fallback={<ErrorUI />}>
                <InfiniteList />
              </ErrorBoundary>
            )}
          </QueryErrorResetBoundary>
          ```

          Without this, any pagination error crashes the entire component tree.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/reference/useSuspenseInfiniteQuery"
          - "https://tanstack.com/query/latest/docs/framework/react/guides/suspense"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  # Evidence: https://tanstack.com/query/latest/docs/framework/react/reference/useQueries
  - name: useQueries
    import_path: "@tanstack/react-query"
    description: >
      Runs multiple queries in parallel and returns an array of results. Each result has
      independent status, data, and error properties. The combine option can aggregate
      results but loses access to individual error states if not explicitly included.

    postconditions:
      # Evidence: https://tanstack.com/query/latest/docs/framework/react/reference/useQueries
      - id: parallel-query-partial-failure
        condition: "one or more queries in the array fail while others succeed"
        throws: "Individual errors are returned in each result's error property (not thrown)"
        required_handling: |
          When some queries fail and others succeed, the results array contains mixed states.
          Errors are NOT thrown — they are in result[i].error for each failed query.

          Caller MUST check each result independently:
          ```tsx
          const results = useQueries({ queries: [...] })
          const errors = results.filter(r => r.isError).map(r => r.error)
          const allLoaded = results.every(r => !r.isPending)
          ```

          Ignoring per-query error states means some data silently fails while UI renders
          partial results — a hard-to-debug data consistency problem.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/reference/useQueries"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: combine-loses-error-info
        condition: "combine option is used and error properties are not explicitly forwarded"
        throws: "N/A — errors become inaccessible if combine does not include error properties"
        required_handling: |
          The combine function transforms results into a single value. If error properties
          are not explicitly included in the combine output, they are lost.

          Bad (errors lost):
          ```tsx
          combine: (results) => results.map(r => r.data)  // error info discarded
          ```

          Good (errors preserved):
          ```tsx
          combine: (results) => ({
            data: results.map(r => r.data),
            errors: results.filter(r => r.isError).map(r => r.error),
            hasError: results.some(r => r.isError),
          })
          ```

          Dropped errors create invisible failures — queries fail silently, users see
          incomplete data with no error indication.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/reference/useQueries"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  # Evidence: https://tanstack.com/query/latest/docs/reference/QueryClient
  # Evidence: https://tanstack.com/query/latest/docs/framework/react/guides/ssr
  - name: fetchQuery
    import_path: "@tanstack/react-query"
    description: >
      Imperative QueryClient method that fetches query data and returns it directly.
      Unlike prefetchQuery, fetchQuery THROWS on error. Used in server-side rendering
      (Next.js getServerSideProps/RSC), route loaders, and imperative data fetching.
      Must be called on a QueryClient instance (queryClient.fetchQuery(...)).

    postconditions:
      # Evidence: https://tanstack.com/query/latest/docs/reference/QueryClient
      # Evidence: https://tanstack.com/query/latest/docs/framework/react/guides/ssr
      # "will either resolve with the data or throw with the error" — official docs
      - id: fetchquery-throws-on-error
        condition: "queryFn throws an error (network failure, HTTP error, etc.)"
        throws: "Error from queryFn — thrown directly (not returned in result object)"
        required_handling: |
          fetchQuery THROWS on error. Unlike useQuery, there is no .error property.

          Caller MUST wrap in try-catch:
          ```typescript
          try {
            const data = await queryClient.fetchQuery({ queryKey, queryFn })
            return { props: { data } }
          } catch (error) {
            // Handle appropriately for context:
            // SSR: return { notFound: true } or { redirect: { destination: '/error' } }
            // Route loader: throw new Response('Not Found', { status: 404 })
            // Component: propagate or show error state
          }
          ```

          In SSR contexts (Next.js getServerSideProps), uncaught fetchQuery errors cause
          500 responses and crash the server-side render. Users see blank pages or generic
          error pages.
