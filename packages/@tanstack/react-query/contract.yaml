          // This resolves with stale data — background error is NOT thrown
          const data = await queryClient.ensureInfiniteQueryData({
            queryKey: ['posts'],
            queryFn: fetchPosts,
            initialPageParam: 0,
            getNextPageParam: (lastPage) => lastPage.nextCursor,
            revalidateIfStale: true,  // background refetch; error silently discarded
