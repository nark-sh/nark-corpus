  # Evidence: https://tanstack.com/query/latest/docs/framework/react/guides/prefetching
  - name: prefetchQuery
    import_path: "@tanstack/react-query"
    description: >
      Prefetches a query and populates the cache. Unlike fetchQuery, prefetchQuery
      NEVER throws errors — failures are silently swallowed with the expectation that
      useQuery will retry on the client. Returns Promise<void>.

    postconditions:
      # Evidence: https://tanstack.com/query/latest/docs/framework/react/guides/prefetching
      # "The prefetch functions never throw errors" — official docs
      - id: prefetchquery-silently-swallows-errors
        condition: "queryFn throws an error during prefetch"
        throws: "No error thrown — error is silently discarded"
        required_handling: |
          prefetchQuery intentionally swallows all errors. This is by design.
          The query will be retried by useQuery when the component mounts on the client.

          If you NEED to handle prefetch failures (e.g., for critical SSR content where
          a missing resource should return 404), use fetchQuery instead:
          ```typescript
          // Use fetchQuery when failure requires an error response:
          try {
            await queryClient.fetchQuery({ queryKey, queryFn })
          } catch (error) {
            return { notFound: true }
          }

          // Use prefetchQuery when graceful degradation is acceptable:
          await queryClient.prefetchQuery({ queryKey, queryFn }) // never throws
          ```

          Misusing prefetchQuery for critical data means SSR silently serves incomplete
          pages while clients retry, causing flash of missing content.
        sources:
          - "https://tanstack.com/query/latest/docs/framework/react/guides/prefetching"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

