package: better-sqlite3
semver: ">=7.0.0 <13.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-13"
status: production
evidence_quality: confirmed
# Audit 2026-04-13: 12 repos scanned, 4 affected (33%), 12 violations. exec(4), all(4), get(3), run(1).
# Top affected: cline/cline (⭐ 59274), ItzCrazyKns/Vane (⭐ 33343), Anarkh-Lee/universal-db-mcp (⭐ 675)
# FP rate: 0% (prior audit data; contracts unchanged)

description: >
  Synchronous SQLite database library for Node.js. All statement methods
  (run, get, all) are synchronous and throw SqliteError on failure.
  Error handling requires try/catch — not Promise .catch().

sources:
  - https://raw.githubusercontent.com/WiseLibs/better-sqlite3/master/docs/api.md
  - https://github.com/WiseLibs/better-sqlite3

functions:
  - name: Statement.run
    import_path: "better-sqlite3"
    description: >
      Execute a prepared statement that modifies data (INSERT, UPDATE, DELETE).
      Synchronous. Throws SqliteError on constraint violation, disk full, or
      database locked.
    patterns:
      - 'stmt.run('
      - '.run('
    postconditions:
      # Evidence: 1 primary firing across 1 repo in scan-better-sqlite3-2026-04-14.json
      # Top affected: yorkeccak/finance (⭐ 815)
      - id: run-constraint-error
        condition: >
          Statement.run() is called without a try/catch block and the SQL
          operation may violate a unique constraint, foreign key, or other
          database constraint.
        throws: SqliteError
        required_handling: >
          Wrap Statement.run() in a try/catch block.
          Check err.code for SQLITE_CONSTRAINT to handle constraint violations gracefully.
        error_code: SQLITE_CONSTRAINT
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        sources:
          - https://raw.githubusercontent.com/WiseLibs/better-sqlite3/master/docs/api.md

  - name: Statement.get
    import_path: "better-sqlite3"
    description: >
      Execute a prepared SELECT statement returning one row. Synchronous.
      Throws SqliteError if execution fails (e.g., locked database, invalid query).
    patterns:
      - 'stmt.get('
      - '.get('
    postconditions:
      # Evidence: 3 primary firings across 3 repos in scan-better-sqlite3-2026-04-14.json
      # Top affected: ItzCrazyKns/Vane (⭐ 33343), yorkeccak/finance (⭐ 815), Anarkh-Lee/universal-db-mcp (⭐ 675)
      - id: get-execution-error
        condition: >
          Statement.get() is called without a try/catch block in a context
          where database errors (locked, constraint) could occur.
        throws: SqliteError
        required_handling: >
          Wrap Statement.get() in a try/catch block.
          Handle SqliteError to prevent unhandled crashes on database errors.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://raw.githubusercontent.com/WiseLibs/better-sqlite3/master/docs/api.md

  - name: Statement.all
    import_path: "better-sqlite3"
    description: >
      Execute a prepared SELECT statement returning all rows. Synchronous.
      Throws SqliteError if execution fails.
    patterns:
      - 'stmt.all('
      - '.all('
    postconditions:
      # Evidence: 4 primary firings across 1 repo in scan-better-sqlite3-2026-04-14.json
      # Top affected: Anarkh-Lee/universal-db-mcp (⭐ 675)
      - id: all-execution-error
        condition: >
          Statement.all() is called without a try/catch block in a context
          where database errors could occur.
        throws: SqliteError
        required_handling: >
          Wrap Statement.all() in a try/catch block.
          Handle SqliteError to prevent unhandled crashes on database errors.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://raw.githubusercontent.com/WiseLibs/better-sqlite3/master/docs/api.md

  - name: Database.exec
    import_path: "better-sqlite3"
    description: >
      Execute one or more SQL statements directly on the database. Synchronous.
      Throws SqliteError on any failure. Unlike transactions, does NOT roll back
      prior statements on error.
    patterns:
      - 'db.exec('
      - '.exec('
    postconditions:
      # Evidence: 4 primary firings across 3 repos in scan-better-sqlite3-2026-04-14.json
      # Top affected: cline/cline (⭐ 59274), ItzCrazyKns/Vane (⭐ 33343), yorkeccak/finance (⭐ 815)
      - id: exec-no-rollback-error
        condition: >
          Database.exec() is called without a try/catch block. If an error
          occurs mid-execution, prior statements are NOT rolled back.
        throws: SqliteError
        required_handling: >
          Wrap Database.exec() in a try/catch block.
          Be aware that partial execution cannot be rolled back — use transactions for atomicity.
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        sources:
          - https://raw.githubusercontent.com/WiseLibs/better-sqlite3/master/docs/api.md
