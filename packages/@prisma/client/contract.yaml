        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/aggregation-grouping-summarizing#groupby"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
