        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: createMany
    import_path: "@prisma/client"
    description: "Creates multiple records in a single database operation"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#createmany
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # createMany throws P2002 on unique violations unless skipDuplicates is true.
      # skipDuplicates is NOT supported by MongoDB, SQL Server, or SQLite.
      - id: createmany-unique-constraint-violation
        maturity: stable
        condition: "One or more records in the batch violate a unique constraint"
        throws: "PrismaClientKnownRequestError with code 'P2002'"
        required_handling: >
          Caller MUST either:
          1. Use skipDuplicates: true to silently skip conflicting records (where supported), OR
          2. Catch P2002 and report which records failed.
          Note: skipDuplicates is NOT supported on MongoDB, SQL Server, or SQLite —
          on those databases, a unique violation fails the entire batch.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#createmany"
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2002"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: createmany-foreign-key-constraint
        maturity: stable
        condition: "One or more records reference a non-existent foreign key"
        throws: "PrismaClientKnownRequestError with code 'P2003'"
        required_handling: >
          Entire batch is rejected on the first foreign key violation.
          Caller MUST validate all referenced IDs exist before calling createMany.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2003"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: createmany-connection-error
        maturity: stable
        condition: "Database connection failed during batch insert"
        throws: "PrismaClientInitializationError"
        required_handling: >
          Entire batch fails on connection loss. Implement retry with idempotency
          checks (e.g., use skipDuplicates or pre-check which records were already inserted).
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: createmany-no-relations
        description: >
          createMany does NOT support nested create/connect of relations.
          Attempting to nest relation creates inside createMany throws a validation error.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#createmany"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: updateMany
    import_path: "@prisma/client"
    description: "Updates multiple records matching a filter condition"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#updatemany
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # updateMany returns {count: N} — does NOT throw P2025 if 0 rows match.
      # Unique constraint violations on bulk update do throw P2002.
      - id: updatemany-unique-constraint-violation
        maturity: stable
        condition: "Update would cause a unique constraint violation across the matched batch"
        throws: "PrismaClientKnownRequestError with code 'P2002'"
        required_handling: >
          If setting a field to a value that conflicts with existing unique records,
          updateMany throws P2002. Caller MUST validate uniqueness or catch P2002
          and roll back dependent changes.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2002"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: updatemany-zero-rows-affected-not-error
        maturity: stable
        condition: "No records match the where clause"
        returns: "{ count: 0 } — does NOT throw"
        required_handling: >
          Unlike update(), updateMany does NOT throw P2025 when zero records match.
          It returns { count: 0 }. Caller MUST check the returned count if zero-match
          is an unexpected business condition that should be treated as an error.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#updatemany"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: updatemany-connection-error
        maturity: stable
        condition: "Database connection failed during bulk update"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff."
        sources:
