        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: $queryRaw
    import_path: "@prisma/client"
    description: "Executes a raw SQL SELECT query, returning typed results"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # $queryRaw uses tagged template literals to prevent SQL injection.
      # Type mismatches cause runtime errors not caught at compile time.
      - id: queryraw-sql-injection-via-unsafe-interpolation
        maturity: stable
        condition: "User input interpolated into query using Prisma.raw() or string concatenation"
        throws: "PrismaClientKnownRequestError (malformed query) or silent data exfiltration"
        required_handling: >
          ALWAYS use tagged template literal syntax: prisma.$queryRaw`SELECT * FROM ...`
          NEVER use string concatenation or Prisma.raw() with user-supplied input.
          Unsafe interpolation bypasses Prisma's parameterization and enables SQL injection.
          Use $queryRawUnsafe ONLY when you control 100% of the query string.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#sql-injection-prevention"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: critical

      - id: queryraw-type-mismatch
        maturity: stable
        condition: "SQL return columns do not match the TypeScript generic type T"
        throws: "Runtime type error at property access — TypeScript does not validate raw results"
        required_handling: >
          Validate raw query results at runtime (e.g. with Zod) before using them.
          TypeScript generics on $queryRaw<T> are not enforced — the cast is unsafe.
          Extra columns, null columns, or type differences cause runtime errors elsewhere.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#typing-queryraw-results"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: queryraw-connection-error
        maturity: stable
        condition: "Database connection failed during raw query"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff for transient connection failures."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: queryraw-no-multiple-statements
        description: >
          $queryRaw does not support multiple SQL statements in a single call.
          Split queries into separate $queryRaw calls or use $transaction.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: $executeRaw
    import_path: "@prisma/client"
    description: "Executes a raw SQL mutation (INSERT/UPDATE/DELETE), returns number of affected rows"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # $executeRaw uses tagged template literals to prevent SQL injection.
      # Returns affected row count — 0 rows affected is NOT an error (same as updateMany/deleteMany).
      - id: executeraw-sql-injection-via-unsafe-interpolation
        maturity: stable
        condition: "User input interpolated into mutation using Prisma.raw() or string concatenation"
        throws: "Silent data corruption or PrismaClientKnownRequestError"
        required_handling: >
          ALWAYS use tagged template literal syntax: prisma.$executeRaw`UPDATE ...`
          NEVER pass user input through Prisma.raw() or string interpolation.
          Use $executeRawUnsafe ONLY when the SQL string is fully developer-controlled.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#sql-injection-prevention"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: critical

      - id: executeraw-zero-rows-not-error
        maturity: stable
        condition: "SQL mutation affects zero rows"
        returns: "0 — does NOT throw"
        required_handling: >
          $executeRaw returns the number of affected rows. A return value of 0 is NOT
          an error condition by default. Caller MUST check the return value if zero-affected
          rows indicates a business logic failure (e.g., updating a record that should exist).
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#executeraw"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: executeraw-prepared-statement-restriction
        maturity: stable
        condition: "DDL statements (ALTER TABLE, CREATE TABLE, etc.) attempted via $executeRaw"
        throws: "PrismaClientKnownRequestError — database rejects DDL in prepared statement context"
        required_handling: >
          $executeRaw uses prepared statements which cannot execute DDL statements on most
          databases. Use $executeRawUnsafe for DDL, or run migrations through Prisma Migrate
          instead. Never attempt schema changes via $executeRaw in application code.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: executeraw-connection-error
        maturity: stable
        condition: "Database connection failed during raw mutation"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff. Ensure idempotency before retrying mutations."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: findMany
    import_path: "@prisma/client"
    description: "Finds all records matching the filter, returns array (empty if no match)"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/reference/prisma-client-reference#findmany
      # Evidence: https://www.prisma.io/docs/orm/reference/prisma-client-reference#error-reference
      # findMany returns [] when no records match — does NOT throw.
      # Silent-empty-array is a common source of "logic looks fine but UI is empty" bugs.
      - id: findmany-empty-array-not-checked
        maturity: stable
        condition: "No records match the filter"
        returns: "[] (empty array) — does NOT throw"
        required_handling: >
          findMany returns an empty array when no records match — it does NOT throw.
          Caller MUST check result.length if zero results indicate a business error
          (e.g. listing a tenant's records that should always have >=1 row).
          Silent-empty results often manifest as blank UI rather than visible errors.
        sources:
          - "https://www.prisma.io/docs/orm/reference/prisma-client-reference#findmany"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: findmany-connection-error
        maturity: stable
        condition: "Database connection failed during query"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff for transient connection errors."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: findmany-pagination-unbounded
        maturity: stable
        condition: "findMany called without take/skip pagination on large tables"
        returns: "All matching rows — can be unbounded"
        required_handling: >
          Without `take` and `skip` (or `cursor`-based pagination), findMany loads the
          entire result set into memory and across the wire. On large tables this can
          cause OOM in the app process and database client buffer overflows.
          ALWAYS paginate user-facing queries.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/pagination"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

    edge_cases:
      - id: findmany-orderby-non-indexed
        description: >
          Using orderBy on a non-indexed column triggers a full table sort.
          On large tables this causes query timeouts. Verify the orderBy column
          has a database index before deploying.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/filtering-and-sorting"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: count
    import_path: "@prisma/client"
    description: "Counts records matching the filter"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/reference/prisma-client-reference#count
      # count returns 0 silently when no records match — never throws on zero-match.
      - id: count-zero-result-silent
        maturity: stable
        condition: "No records match the where clause"
        returns: "0 — does NOT throw"
        required_handling: >
          count() returns 0 silently when no rows match. If zero-count indicates a
          business condition (e.g. tenant has no records but should), caller MUST
          treat 0 as an alert condition explicitly. Don't pass count() result
          directly into business logic without a zero-check.
        sources:
          - "https://www.prisma.io/docs/orm/reference/prisma-client-reference#count"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: count-connection-error
        maturity: stable
        condition: "Database connection failed during count query"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff for transient connection errors."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: count-on-large-tables
        description: >
          count() on multi-million-row tables can be slow (full table scan on Postgres
          unless using approximate counts). Use approximate counts (e.g. pg_class.reltuples)
          for dashboards on huge tables.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/aggregation-grouping-summarizing#count"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: aggregate
    import_path: "@prisma/client"
    description: "Aggregates values across records (_count, _sum, _min, _max, _avg)"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/reference/prisma-client-reference#aggregate
      # Evidence: https://www.prisma.io/docs/orm/prisma-client/queries/aggregation-grouping-summarizing
      # aggregate returns null for _min/_max/_avg/_sum when no rows match — silent failure pattern.
      - id: aggregate-null-when-no-rows
        maturity: stable
        condition: "No records match the where clause"
        returns: "{ _min: { field: null }, _max: { field: null }, _avg: { field: null }, _sum: { field: null }, _count: 0 }"
        required_handling: >
          When no rows match, aggregate returns null for _min/_max/_avg/_sum fields
          (not 0, not undefined — null). Code that does `result._sum.amount + tax`
          will crash with "Cannot read properties of null". Caller MUST null-check
          every aggregate field before arithmetic or comparison.
          The _count field returns 0 (not null) when no rows match.
        sources:
          - "https://www.prisma.io/docs/orm/reference/prisma-client-reference#aggregate"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: aggregate-connection-error
        maturity: stable
        condition: "Database connection failed during aggregation"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff for transient connection errors."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: aggregate-decimal-precision
        description: >
          _avg on Decimal/Float fields may lose precision. For financial calculations
          requiring exact precision, fetch raw values and aggregate in application
          code using a decimal library.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/aggregation-grouping-summarizing"
        severity: warning
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: groupBy
    import_path: "@prisma/client"
    description: "Groups records by field(s) and aggregates within each group"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/reference/prisma-client-reference#groupby
      # groupBy returns [] when no records match — silent zero-result pattern.
      # having clause requires by/orderBy alignment — type errors at compile time but runtime errors if dynamically built.
      - id: groupby-empty-array-not-checked
        maturity: stable
        condition: "No records match the filter"
        returns: "[] (empty array) — does NOT throw"
        required_handling: >
          groupBy returns an empty array when no records match. Code that assumes
          at least one group exists (e.g. dashboard charts) MUST handle empty arrays.
          Empty groupBy results often manifest as blank charts rather than visible errors.
        sources:
          - "https://www.prisma.io/docs/orm/reference/prisma-client-reference#groupby"
        severity: warning
        business_impact:
