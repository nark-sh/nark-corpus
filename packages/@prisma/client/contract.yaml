  - name: $transaction
    import_path: "@prisma/client"
    description: "Executes multiple operations in a database transaction"

    postconditions:
      # Evidence: seen in 1 violation across 1 repo in scan-prisma-client-2026-03-23.json
      # Top affected: IgorShadurin/app.yumcut.com (⭐ 719)
      - id: transaction-failed
        condition: "Any operation in transaction fails"
        throws: "PrismaClientKnownRequestError (various codes) or PrismaClientUnknownRequestError"
        required_handling: >
          Caller MUST handle transaction failures. All operations are rolled back.
          Identify which operation failed using error.code and error.meta.
          Consider retry strategy for transient errors (connection issues).
        sources:
          - "https://www.prisma.io/docs/concepts/components/prisma-client/transactions"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: deadlock-error
        condition: "Transaction deadlock detected by database"
        throws: "PrismaClientKnownRequestError with code 'P2034'"
        required_handling: >
          Caller SHOULD implement retry logic for deadlock errors.
          Use exponential backoff with jitter to reduce contention.
          Consider redesigning transaction to reduce lock duration.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2034"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: connection-error-in-transaction
        condition: "Connection lost during transaction"
        throws: "PrismaClientInitializationError"
        required_handling: >
          Transaction is automatically rolled back. Retry entire transaction.
          Implement idempotency if retrying critical transactions (payments, etc).
        sources:
          - "https://www.prisma.io/docs/concepts/components/prisma-client/transactions#transaction-timeouts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: transaction-timeout
        condition: "Transaction exceeded max duration"
        throws: "PrismaClientKnownRequestError with code 'P2024'"
        required_handling: >
          Break transaction into smaller units or increase timeout.
          Long transactions hold locks and can cause performance issues.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2024"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

    edge_cases:
      - id: nested-transactions
        description: "Prisma does not support nested transactions. Use a single top-level transaction."
        sources:
