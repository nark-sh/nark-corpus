  - name: createManyAndReturn
    import_path: "@prisma/client"
    description: "Creates multiple records and returns the created rows (added in v5.14.0)"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/reference/prisma-client-reference#createmanyandreturn
      # createManyAndReturn is PostgreSQL/CockroachDB/SQLite only — MySQL/MongoDB/SQLServer throw.
      # Otherwise behaves like createMany but returns the created rows.
      - id: createmanyandreturn-unsupported-provider
        maturity: stable
        condition: "Called on MySQL, MongoDB, or SQL Server"
        throws: "PrismaClientValidationError or runtime error — provider does not support RETURNING"
        required_handling: >
          createManyAndReturn is supported only on PostgreSQL, CockroachDB, and SQLite.
          On unsupported providers, calls throw at runtime. Detect the provider via
          schema introspection or use createMany + a separate findMany on the unique
          keys when targeting MySQL/MongoDB/SQL Server.
        sources:
          - "https://www.prisma.io/docs/orm/reference/prisma-client-reference#createmanyandreturn"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: createmanyandreturn-unique-constraint-violation
        maturity: stable
        condition: "One or more records violate a unique constraint"
        throws: "PrismaClientKnownRequestError with code 'P2002'"
        required_handling: >
          Identical to createMany: caller MUST either use skipDuplicates: true OR
          catch P2002. When P2002 fires, the entire batch is rolled back and
          NO rows are returned. Idempotency requires inspecting which rows were
          already present before retry.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2002"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: createmanyandreturn-foreign-key-constraint
        maturity: stable
        condition: "One or more records reference a non-existent foreign key"
        throws: "PrismaClientKnownRequestError with code 'P2003'"
        required_handling: >
          Entire batch is rejected on the first foreign key violation.
          Caller MUST validate all referenced IDs exist before calling.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2003"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: createmanyandreturn-connection-error
        maturity: stable
        condition: "Database connection failed during batch insert"
        throws: "PrismaClientInitializationError"
        required_handling: "Entire batch fails on connection loss. Implement retry with idempotency checks."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: updateManyAndReturn
    import_path: "@prisma/client"
    description: "Updates multiple records matching a filter and returns the updated rows (added in v6.2.0)"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/reference/prisma-client-reference#updatemanyandreturn
      # updateManyAndReturn is PostgreSQL/CockroachDB/SQLite only — MySQL/MongoDB/SQLServer throw.
      # Returns array of updated rows (may be empty if no rows matched — does NOT throw).
      - id: updatemanyandreturn-unsupported-provider
        maturity: stable
        condition: "Called on MySQL, MongoDB, or SQL Server"
        throws: "PrismaClientValidationError or runtime error — provider does not support RETURNING"
        required_handling: >
          updateManyAndReturn is supported only on PostgreSQL, CockroachDB, and SQLite.
          On unsupported providers, calls throw at runtime. Use updateMany + a separate
          findMany when targeting MySQL/MongoDB/SQL Server.
        sources:
          - "https://www.prisma.io/docs/orm/reference/prisma-client-reference#updatemanyandreturn"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: updatemanyandreturn-zero-rows-empty-array
        maturity: stable
        condition: "No records match the where clause"
        returns: "[] (empty array) — does NOT throw P2025"
        required_handling: >
          Unlike update(), updateManyAndReturn does NOT throw when zero records match —
          it returns []. Caller MUST check result.length if zero-match indicates a
          business error (e.g. updating a record that should exist).
        sources:
          - "https://www.prisma.io/docs/orm/reference/prisma-client-reference#updatemanyandreturn"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: updatemanyandreturn-unique-constraint-violation
        maturity: stable
        condition: "Update would cause a unique constraint violation"
        throws: "PrismaClientKnownRequestError with code 'P2002'"
        required_handling: >
          If setting a field to a value that conflicts with existing unique records,
          updateManyAndReturn throws P2002. Caller MUST validate uniqueness or catch P2002.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2002"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: updatemanyandreturn-connection-error
        maturity: stable
        condition: "Database connection failed during bulk update"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: $queryRawUnsafe
    import_path: "@prisma/client"
    description: "Executes a raw SQL SELECT query with string interpolation — UNSAFE for user input"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#queryrawunsafe
      # $queryRawUnsafe bypasses tagged template parameterization — direct SQL injection vector
      # if any user input reaches the query string.
      - id: queryrawunsafe-sql-injection
        maturity: stable
        condition: "User input concatenated into the SQL string"
        throws: "Silent data exfiltration, data corruption, or PrismaClientKnownRequestError on malformed SQL"
        required_handling: >
          $queryRawUnsafe is documented as UNSAFE and bypasses Prisma's parameterization.
          NEVER pass user-supplied strings directly. Either:
          1. Use $queryRaw with tagged template literals (parameterized), OR
          2. Pass values as the second-arg array: $queryRawUnsafe(sql, ...params) — the
             ...params arguments ARE parameterized; only the SQL string is unsafe.
          Auditors will flag any $queryRawUnsafe call. Document why it was necessary
          and prove the SQL string contains no user input.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#queryrawunsafe"
          - "https://owasp.org/www-community/attacks/SQL_Injection"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

      - id: queryrawunsafe-connection-error
        maturity: stable
        condition: "Database connection failed during raw query"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff for transient connection failures."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: queryrawunsafe-type-mismatch
        maturity: stable
        condition: "SQL return columns do not match the TypeScript generic type T"
        throws: "Runtime type error at property access — TypeScript does not validate raw results"
        required_handling: >
          Validate raw query results at runtime (e.g. with Zod) before using them.
          TypeScript generics on $queryRawUnsafe<T> are not enforced — the cast is unsafe.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: $executeRawUnsafe
    import_path: "@prisma/client"
    description: "Executes a raw SQL mutation with string interpolation — UNSAFE for user input"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#executerawunsafe
      # $executeRawUnsafe is the mutation counterpart to $queryRawUnsafe — same SQL injection risk
      # but with the additional risk of data corruption rather than just exfiltration.
      - id: executerawunsafe-sql-injection
        maturity: stable
        condition: "User input concatenated into the SQL string"
        throws: "Silent data corruption, unauthorized writes, or PrismaClientKnownRequestError"
        required_handling: >
          $executeRawUnsafe is documented as UNSAFE for the SQL string. Mutation
          equivalent of $queryRawUnsafe — same SQL injection risk PLUS write/delete impact.
          NEVER concatenate user input into the SQL. Either:
          1. Use $executeRaw with tagged template literals (parameterized), OR
          2. Pass values via the ...params second-arg array: $executeRawUnsafe(sql, ...params).
          Audit every call site and document why a parameterized $executeRaw is insufficient.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#executerawunsafe"
          - "https://owasp.org/www-community/attacks/SQL_Injection"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

      - id: executerawunsafe-zero-rows-not-error
        maturity: stable
        condition: "SQL mutation affects zero rows"
        returns: "0 — does NOT throw"
        required_handling: >
          Returns the number of affected rows. 0 is NOT an error condition by default.
          Caller MUST check the return value if zero-affected rows indicates a business
          logic failure.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: executerawunsafe-connection-error
        maturity: stable
        condition: "Database connection failed during raw mutation"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff. Ensure idempotency before retrying mutations."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

