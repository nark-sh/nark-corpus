  - name: upsert
    import_path: "@prisma/client"
    description: "Creates a record if it does not exist, or updates it if it does"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#upsert
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # Prisma docs explicitly document P2002 race condition on concurrent upserts.
      - id: upsert-race-condition-unique-constraint
        condition: "Concurrent upserts targeting the same non-existent record"
        throws: "PrismaClientKnownRequestError with code 'P2002'"
        required_handling: >
          When multiple upsert operations run concurrently for the same record, one may
          throw P2002 (unique constraint violation) because another operation created
          the record first. Caller MUST catch P2002 and retry the upsert to trigger
          the update branch.
          DO NOT treat P2002 on upsert as an unrecoverable error.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#upsert"
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2002"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: upsert-foreign-key-constraint
        condition: "Upsert violates a foreign key constraint (referenced record does not exist)"
        throws: "PrismaClientKnownRequestError with code 'P2003'"
        required_handling: >
          Caller MUST verify all referenced (foreign key) records exist before upserting.
          A P2003 on upsert indicates referential integrity would be violated.
          DO NOT retry — fix the data before retrying.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2003"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: upsert-connection-error
        condition: "Database connection failed during upsert"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff for transient connection errors."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: createMany
    import_path: "@prisma/client"
    description: "Creates multiple records in a single database operation"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#createmany
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # createMany throws P2002 on unique violations unless skipDuplicates is true.
      # skipDuplicates is NOT supported by MongoDB, SQL Server, or SQLite.
      - id: createmany-unique-constraint-violation
        condition: "One or more records in the batch violate a unique constraint"
        throws: "PrismaClientKnownRequestError with code 'P2002'"
        required_handling: >
          Caller MUST either:
          1. Use skipDuplicates: true to silently skip conflicting records (where supported), OR
          2. Catch P2002 and report which records failed.
          Note: skipDuplicates is NOT supported on MongoDB, SQL Server, or SQLite —
          on those databases, a unique violation fails the entire batch.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#createmany"
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2002"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: createmany-foreign-key-constraint
        condition: "One or more records reference a non-existent foreign key"
        throws: "PrismaClientKnownRequestError with code 'P2003'"
        required_handling: >
          Entire batch is rejected on the first foreign key violation.
          Caller MUST validate all referenced IDs exist before calling createMany.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2003"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: createmany-connection-error
        condition: "Database connection failed during batch insert"
        throws: "PrismaClientInitializationError"
        required_handling: >
          Entire batch fails on connection loss. Implement retry with idempotency
          checks (e.g., use skipDuplicates or pre-check which records were already inserted).
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: createmany-no-relations
        description: >
          createMany does NOT support nested create/connect of relations.
          Attempting to nest relation creates inside createMany throws a validation error.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#createmany"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: updateMany
    import_path: "@prisma/client"
    description: "Updates multiple records matching a filter condition"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#updatemany
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # updateMany returns {count: N} — does NOT throw P2025 if 0 rows match.
      # Unique constraint violations on bulk update do throw P2002.
      - id: updatemany-unique-constraint-violation
        condition: "Update would cause a unique constraint violation across the matched batch"
        throws: "PrismaClientKnownRequestError with code 'P2002'"
        required_handling: >
          If setting a field to a value that conflicts with existing unique records,
          updateMany throws P2002. Caller MUST validate uniqueness or catch P2002
          and roll back dependent changes.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2002"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: updatemany-zero-rows-affected-not-error
        condition: "No records match the where clause"
        returns: "{ count: 0 } — does NOT throw"
        required_handling: >
          Unlike update(), updateMany does NOT throw P2025 when zero records match.
          It returns { count: 0 }. Caller MUST check the returned count if zero-match
          is an unexpected business condition that should be treated as an error.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#updatemany"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: updatemany-connection-error
        condition: "Database connection failed during bulk update"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: deleteMany
    import_path: "@prisma/client"
    description: "Deletes multiple records matching a filter condition"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#deletemany
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # deleteMany returns {count: N} — does NOT throw when 0 rows match.
      # Foreign key violations throw P2003 if dependent records exist.
      - id: deletemany-foreign-key-constraint
        condition: "Records to delete are referenced by other tables via foreign keys"
        throws: "PrismaClientKnownRequestError with code 'P2003' or 'P2014'"
        required_handling: >
          Caller MUST delete or nullify dependent records before calling deleteMany,
          OR rely on cascade delete rules configured in the schema.
          A partial batch failure rolls back all deletes.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2003"
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2014"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: deletemany-zero-rows-not-error
        condition: "No records match the where clause"
        returns: "{ count: 0 } — does NOT throw"
        required_handling: >
          Unlike delete(), deleteMany does NOT throw P2025 when zero records match.
          It returns { count: 0 }. If zero-match indicates a logic error (e.g., deleting
          a user's data that should exist), caller MUST check the count.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#deletemany"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: deletemany-connection-error
        condition: "Database connection failed during bulk delete"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with idempotency check (verify records still exist before retrying)."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: findFirst
    import_path: "@prisma/client"
    description: "Finds the first record matching the filter, returns null if not found"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findFirst
      # findFirst returns null when no record matches (unlike findFirstOrThrow).
      # The null-check bug pattern is identical to findUnique.
      - id: findfirst-null-not-checked
        condition: "No record matches the filter"
        returns: "null"
        required_handling: >
          Caller MUST check if result is null before accessing properties.
          Code that assumes findFirst always returns a record will crash with
          "Cannot read properties of null" at the property access site, not at
          the findFirst call — making bugs hard to trace.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findFirst"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: findfirst-connection-error
        condition: "Database connection failed"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: findfirst-vs-findunique
        description: >
          findFirst does not require a unique field and accepts orderBy.
          If you need a strict unique lookup, use findUnique to guarantee
          uniqueness enforcement at the Prisma level.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findFirst"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: findFirstOrThrow
    import_path: "@prisma/client"
    description: "Finds the first matching record, throws P2025 if not found"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findfirstorthrow
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference#p2025
      # Throws P2025 when no record matches — identical behavior to findUniqueOrThrow.
      - id: findfirstorthrow-record-not-found
        condition: "No record matches the filter"
        throws: "PrismaClientKnownRequestError with code 'P2025'"
        required_handling: >
          Caller MUST catch P2025 when using findFirstOrThrow.
          This method is designed for lookups where a missing record is an error condition.
          Unhandled P2025 crashes the request.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findfirstorthrow"
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2025"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: findfirstorthrow-connection-error
        condition: "Database connection failed"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: $queryRaw
    import_path: "@prisma/client"
    description: "Executes a raw SQL SELECT query, returning typed results"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # $queryRaw uses tagged template literals to prevent SQL injection.
      # Type mismatches cause runtime errors not caught at compile time.
      - id: queryraw-sql-injection-via-unsafe-interpolation
        condition: "User input interpolated into query using Prisma.raw() or string concatenation"
        throws: "PrismaClientKnownRequestError (malformed query) or silent data exfiltration"
        required_handling: >
          ALWAYS use tagged template literal syntax: prisma.$queryRaw`SELECT * FROM ...`
          NEVER use string concatenation or Prisma.raw() with user-supplied input.
          Unsafe interpolation bypasses Prisma's parameterization and enables SQL injection.
          Use $queryRawUnsafe ONLY when you control 100% of the query string.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#sql-injection-prevention"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: critical

      - id: queryraw-type-mismatch
        condition: "SQL return columns do not match the TypeScript generic type T"
        throws: "Runtime type error at property access — TypeScript does not validate raw results"
        required_handling: >
          Validate raw query results at runtime (e.g. with Zod) before using them.
          TypeScript generics on $queryRaw<T> are not enforced — the cast is unsafe.
          Extra columns, null columns, or type differences cause runtime errors elsewhere.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#typing-queryraw-results"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: queryraw-connection-error
        condition: "Database connection failed during raw query"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff for transient connection failures."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: queryraw-no-multiple-statements
        description: >
          $queryRaw does not support multiple SQL statements in a single call.
          Split queries into separate $queryRaw calls or use $transaction.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: $executeRaw
    import_path: "@prisma/client"
    description: "Executes a raw SQL mutation (INSERT/UPDATE/DELETE), returns number of affected rows"

    postconditions:
      # Evidence: https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # $executeRaw uses tagged template literals to prevent SQL injection.
      # Returns affected row count — 0 rows affected is NOT an error (same as updateMany/deleteMany).
      - id: executeraw-sql-injection-via-unsafe-interpolation
        condition: "User input interpolated into mutation using Prisma.raw() or string concatenation"
        throws: "Silent data corruption or PrismaClientKnownRequestError"
        required_handling: >
          ALWAYS use tagged template literal syntax: prisma.$executeRaw`UPDATE ...`
          NEVER pass user input through Prisma.raw() or string interpolation.
          Use $executeRawUnsafe ONLY when the SQL string is fully developer-controlled.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#sql-injection-prevention"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: critical

      - id: executeraw-zero-rows-not-error
        condition: "SQL mutation affects zero rows"
        returns: "0 — does NOT throw"
        required_handling: >
          $executeRaw returns the number of affected rows. A return value of 0 is NOT
          an error condition by default. Caller MUST check the return value if zero-affected
          rows indicates a business logic failure (e.g., updating a record that should exist).
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries#executeraw"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: executeraw-prepared-statement-restriction
        condition: "DDL statements (ALTER TABLE, CREATE TABLE, etc.) attempted via $executeRaw"
        throws: "PrismaClientKnownRequestError — database rejects DDL in prepared statement context"
        required_handling: >
          $executeRaw uses prepared statements which cannot execute DDL statements on most
          databases. Use $executeRawUnsafe for DDL, or run migrations through Prisma Migrate
          instead. Never attempt schema changes via $executeRaw in application code.
        sources:
          - "https://www.prisma.io/docs/orm/prisma-client/queries/raw-database-access/raw-queries"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: executeraw-connection-error
        condition: "Database connection failed during raw mutation"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff. Ensure idempotency before retrying mutations."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

