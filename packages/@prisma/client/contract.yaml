  - name: upsert
    import_path: "@prisma/client"
    description: "Creates a record if it does not exist, or updates it if it does"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#upsert
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # Prisma docs explicitly document P2002 race condition on concurrent upserts.
      - id: upsert-race-condition-unique-constraint
        maturity: stable
        condition: "Concurrent upserts targeting the same non-existent record"
        throws: "PrismaClientKnownRequestError with code 'P2002'"
        required_handling: >
          When multiple upsert operations run concurrently for the same record, one may
          throw P2002 (unique constraint violation) because another operation created
          the record first. Caller MUST catch P2002 and retry the upsert to trigger
          the update branch.
          DO NOT treat P2002 on upsert as an unrecoverable error.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#upsert"
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2002"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: upsert-foreign-key-constraint
        maturity: stable
        condition: "Upsert violates a foreign key constraint (referenced record does not exist)"
        throws: "PrismaClientKnownRequestError with code 'P2003'"
        required_handling: >
          Caller MUST verify all referenced (foreign key) records exist before upserting.
          A P2003 on upsert indicates referential integrity would be violated.
          DO NOT retry — fix the data before retrying.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2003"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: medium

      - id: upsert-connection-error
        maturity: stable
        condition: "Database connection failed during upsert"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff for transient connection errors."
        sources:
