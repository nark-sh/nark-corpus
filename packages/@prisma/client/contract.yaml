        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: deleteMany
    import_path: "@prisma/client"
    description: "Deletes multiple records matching a filter condition"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#deletemany
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference
      # deleteMany returns {count: N} — does NOT throw when 0 rows match.
      # Foreign key violations throw P2003 if dependent records exist.
      - id: deletemany-foreign-key-constraint
        maturity: stable
        condition: "Records to delete are referenced by other tables via foreign keys"
        throws: "PrismaClientKnownRequestError with code 'P2003' or 'P2014'"
        required_handling: >
          Caller MUST delete or nullify dependent records before calling deleteMany,
          OR rely on cascade delete rules configured in the schema.
          A partial batch failure rolls back all deletes.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2003"
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2014"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high

      - id: deletemany-zero-rows-not-error
        maturity: stable
        condition: "No records match the where clause"
        returns: "{ count: 0 } — does NOT throw"
        required_handling: >
          Unlike delete(), deleteMany does NOT throw P2025 when zero records match.
          It returns { count: 0 }. If zero-match indicates a logic error (e.g., deleting
          a user's data that should exist), caller MUST check the count.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#deletemany"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: deletemany-connection-error
        maturity: stable
        condition: "Database connection failed during bulk delete"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with idempotency check (verify records still exist before retrying)."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: findFirst
    import_path: "@prisma/client"
    description: "Finds the first record matching the filter, returns null if not found"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findFirst
      # findFirst returns null when no record matches (unlike findFirstOrThrow).
      # The null-check bug pattern is identical to findUnique.
      - id: findfirst-null-not-checked
        maturity: stable
        condition: "No record matches the filter"
        returns: "null"
        required_handling: >
          Caller MUST check if result is null before accessing properties.
          Code that assumes findFirst always returns a record will crash with
          "Cannot read properties of null" at the property access site, not at
          the findFirst call — making bugs hard to trace.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findFirst"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: findfirst-connection-error
        maturity: stable
        condition: "Database connection failed"
        throws: "PrismaClientInitializationError"
        required_handling: "Implement retry with exponential backoff."
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/error-reference"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

    edge_cases:
      - id: findfirst-vs-findunique
        description: >
          findFirst does not require a unique field and accepts orderBy.
          If you need a strict unique lookup, use findUnique to guarantee
          uniqueness enforcement at the Prisma level.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findFirst"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: findFirstOrThrow
    import_path: "@prisma/client"
    description: "Finds the first matching record, throws P2025 if not found"

    postconditions:
      # Evidence: https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findfirstorthrow
      # Evidence: https://www.prisma.io/docs/reference/api-reference/error-reference#p2025
      # Throws P2025 when no record matches — identical behavior to findUniqueOrThrow.
      - id: findfirstorthrow-record-not-found
        maturity: stable
        condition: "No record matches the filter"
        throws: "PrismaClientKnownRequestError with code 'P2025'"
        required_handling: >
          Caller MUST catch P2025 when using findFirstOrThrow.
          This method is designed for lookups where a missing record is an error condition.
          Unhandled P2025 crashes the request.
        sources:
          - "https://www.prisma.io/docs/reference/api-reference/prisma-client-reference#findfirstorthrow"
          - "https://www.prisma.io/docs/reference/api-reference/error-reference#p2025"
