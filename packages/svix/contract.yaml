detection:
  type_names:
    - Svix
    - Webhook

functions:
  - name: create
    namespace: "message"
    import_path: "svix"
    description: "Enqueues an outbound webhook event for delivery to all endpoints subscribed to that event type."

    postconditions:
      - id: api-error
        condition: "svix-server rejected the message — invalid app ID, malformed payload, unauthorized API key, or rate-limited"
        throws: "ApiException (svix.ApiException) with statusCode and body"
        required_handling: >
          Caller MUST catch ApiException around message.create(). 4xx errors
          (400 validation, 401 auth, 404 unknown app, 429 rate limit) require
          distinct handling — DO NOT blindly retry on auth or validation
          errors. For rate-limit (429), respect Retry-After if present and
          back off. The webhook is NOT delivered when create() throws — so a
          swallowed exception equals a silently-lost integration message.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: network-error
        condition: "Network failure reaching api.svix.com — DNS, TLS, timeout"
        throws: "Error (Node.js network error) or ApiException with no body"
        required_handling: >
          Caller MUST catch and either retry with exponential backoff or
          enqueue locally for later replay. svix-server does NOT see the
          message at all when network errors hit before request lands — your
          system is the only one that knows it was supposed to fire. For
          critical integrations (billing, compliance), pair create() with a
          local outbox table so failed sends can be replayed.
        sources:
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: verify
    namespace: "Webhook"
    import_path: "svix"
    description: "Verifies the signature of an inbound webhook payload. Returns the parsed payload on success, throws on signature mismatch or expired timestamp."

    postconditions:
      - id: signature-mismatch
        condition: "Webhook signature did not validate against the provided secret"
        throws: "WebhookVerificationError"
        required_handling: >
          Caller MUST catch WebhookVerificationError and respond with HTTP
          401 (or 400) WITHOUT processing the payload body. A swallowed
          signature error is an authentication bypass — the caller would
          then process attacker-controlled webhook events as if they came
          from a trusted sender. NEVER fall back to "trust the body anyway."
          Constant-time signature comparison is handled by svix internally;
          the caller's only job is to not ignore the throw.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

      - id: timestamp-expired
        condition: "Webhook timestamp is outside the tolerance window (default 5 minutes) — likely a replay attack"
        throws: "WebhookVerificationError"
        required_handling: >
          Caller MUST catch and reject with HTTP 401. svix's verify() rejects
          messages older than the tolerance window to prevent replay attacks
          against the webhook endpoint. Do NOT extend the tolerance window
          to "be lenient" — that defeats the protection. If clock skew is a
          real concern, sync NTP rather than widening the window.
        sources:
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

      - id: missing-required-headers
        # Evidence: standardwebhooks/dist/index.js verify() line:
        #   if (!msgSignature || !msgId || !msgTimestamp) {
        #     throw new WebhookVerificationError("Missing required headers");
        #   }
        # Required headers: svix-id, svix-timestamp, svix-signature (or webhook-id/timestamp/signature)
        condition: "One or more required svix headers are absent from the request (svix-id, svix-timestamp, svix-signature)"
        throws: "WebhookVerificationError"
        required_handling: >
          Caller MUST catch WebhookVerificationError and return HTTP 400.
          Missing headers indicate a request that was NOT sent by svix — either
          a probe, a misconfigured sender, or a programming error in the caller's
          header extraction. Never attempt to process the payload body without
          all three headers present. This error is distinct from a bad signature —
          it means the request is not a well-formed webhook at all.
        sources:
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

  - name: create
    namespace: "application"
    import_path: "svix"
    description: >
      Creates a new svix Application object. Applications map 1:1 to your
      tenants or customers — each app holds its own endpoints and receives
      its own messages. Called during customer onboarding or tenant provisioning.
      Returns ApplicationOut with id, name, uid, and createdAt.

    postconditions:
      # Evidence: svix/dist/request.js — filterResponseForErrors()
      #   Any 4xx or 5xx → throws ApiException(status, body, headers)
      #   4xx body is parsed JSON (HttpErrorOut with code + detail fields)
      #   5xx body is raw text (auto-retried 2x before throw)
      # Evidence: svix/dist/util.js — ApiException class: code (HTTP status), body, headers
      - id: application-create-api-error
        condition: "svix API rejected the create request — invalid payload, auth failure, or rate limit"
        throws: "ApiException (svix.ApiException) with code (HTTP status) and body"
        required_handling: >
          Caller MUST catch ApiException. Key cases: 401/403 = invalid auth
          token (bad SVIX_AUTH_TOKEN env); 422 = validation error on
          ApplicationIn payload (body is HTTPValidationError); 429 = rate
          limit exceeded. A swallowed exception leaves the customer without an
          application — subsequent message.create() calls will fail with 404
          (app not found) and webhook delivery will silently fail.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: application-create-network-error
        condition: "Network failure reaching api.svix.com before or during the request"
        throws: "Error (native fetch error after 2 automatic retries)"
        required_handling: >
          Caller MUST catch Error (not just ApiException). svix's SDK retries
          5xx and network failures twice before throwing. If still failing,
          the application was NOT created and the customer's tenant has no svix
          app — retry with idempotency key. For critical onboarding paths, treat
          this as a blocking error that must block the signup flow or queue for
          later retry with exponential backoff.
        sources:
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: getOrCreate
    namespace: "application"
    import_path: "svix"
    description: >
      Creates a new Application, or returns the existing one if an app with
      the same uid already exists. Idempotent alternative to application.create()
      for onboarding flows that may run multiple times (e.g. webhook handler,
      retry queue). Returns ApplicationOut. Uses the same error profile as create().

    postconditions:
      # Evidence: svix/dist/request.js — same filterResponseForErrors() path as create()
      # getOrCreate() sends POST with getIfExists=true query param — 200 on existing, 201 on new
      # Both paths throw on the same ApiException conditions
      - id: application-get-or-create-api-error
        condition: "svix API rejected the getOrCreate request — auth failure, validation error, or rate limit"
        throws: "ApiException (svix.ApiException) with code (HTTP status) and body"
        required_handling: >
          Caller MUST catch ApiException. Same error profile as application.create().
          Common in retry-safe onboarding flows — do not assume getOrCreate()
          is "safe to ignore on error" because an application already exists.
          On auth failure (401/403), all subsequent webhook operations for this
          customer will also fail silently.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: create
    namespace: "endpoint"
    import_path: "svix"
    description: >
      Registers a new webhook endpoint URL for an application. Endpoints receive
      the webhook events published via message.create(). Called when a customer
      sets up their first webhook destination or adds a new one. Returns EndpointOut.
      If not called after application.create(), no messages will be delivered to
      the customer — the integration silently does nothing.

    postconditions:
      # Evidence: svix/dist/request.js — filterResponseForErrors()
      # Additional: endpoint.create validates URL format (422), checks for duplicate UIDs,
      # enforces HTTPS-only URLs in production svix accounts
      - id: endpoint-create-api-error
        condition: "svix API rejected endpoint creation — invalid URL, auth failure, app not found, validation error"
        throws: "ApiException (svix.ApiException) with code and body"
        required_handling: >
          Caller MUST catch ApiException. Critical cases: 404 = app not found
          (application was not created first, or wrong appId); 422 = URL failed
          validation (non-HTTPS URL in production, malformed URL, invalid filter
          event types); 401/403 = bad auth token. A silently-swallowed failure
          here means the customer's webhook URL is never registered — message.create()
          will succeed but deliver to zero endpoints.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: recover
    namespace: "endpoint"
    import_path: "svix"
    description: >
      Replays all failed messages for an endpoint since a given timestamp.
      Used for incident recovery after an endpoint was down. Returns RecoverOut
      immediately — the actual message resending happens asynchronously in the
      background. Callers must check backgroundTask status separately to
      confirm replay completion.

    postconditions:
      # Evidence: svix/dist/api/endpoint.d.ts — recover(appId, endpointId, recoverIn) returns RecoverOut
      # RecoverIn has since: Date, until: Date? fields
      # svix/dist/request.js — same ApiException throw path
      - id: endpoint-recover-api-error
        condition: "svix API rejected the recover request — invalid endpoint, auth failure, or validation error"
        throws: "ApiException (svix.ApiException) with code and body"
        required_handling: >
          Caller MUST catch ApiException. Critical: 404 = endpointId or appId
          not found; 422 = invalid date range in RecoverIn (e.g. since > until,
          or since too far in past). recover() returns immediately with a
          background task ID — a successful HTTP 202 only means the task was
          queued, NOT that messages were replayed. Callers using this for SLA
          recovery MUST poll backgroundTask.get(taskId) to confirm completion.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: endpoint-recover-async-not-polled
        condition: "recover() returns RecoverOut with a background task ID, but caller does not poll task status"
        throws: "No throw — RecoverOut.id is silently discarded"
        required_handling: >
          recover() is ASYNCHRONOUS. A 200 response means the replay job was
          queued, not completed. Callers MUST use the returned taskId to poll
          backgroundTask.get(taskId) until status is 'finished'. Treating a
          successful recover() response as confirmation that messages were
          replayed is incorrect — the replay may be still in progress or may
          have partially failed.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: rotateSecret
    namespace: "endpoint"
    import_path: "svix"
    description: >
      Rotates the signing secret for a specific endpoint. Used during security
      incidents or planned secret rotation. After rotation, the new secret takes
      effect immediately — the old secret is no longer valid. Returns void.
      Any consumer still using the old secret will fail verification until updated.

    postconditions:
      # Evidence: svix/dist/api/endpoint.d.ts — rotateSecret(appId, endpointId, secretIn) returns void
      # EndpointSecretRotateIn has key?: string (optional — auto-generates if absent)
      # svix/dist/request.js — same ApiException throw path
      - id: endpoint-rotate-secret-api-error
        condition: "svix API rejected the rotateSecret request — auth failure, endpoint not found, or invalid key format"
        throws: "ApiException (svix.ApiException) with code and body"
        required_handling: >
          Caller MUST catch ApiException. 404 = endpointId or appId not found;
          422 = supplied key does not meet svix's format requirements (if providing
          a custom key). Critically: if this call is NOT wrapped in try-catch and
          fails silently, the secret rotation event is lost — the caller may believe
          rotation succeeded and stop using the old secret, but svix still has the
          old secret, causing all subsequent webhook verifications to fail.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: appPortalAccess
    namespace: "authentication"
    import_path: "svix"
    description: >
      Generates a short-lived magic link token granting a specific user access
      to the svix Consumer App Portal for their application. The returned URL
      is a single-use authentication token valid for several days. Called server-side
      to generate a portal URL before redirecting the customer. Returns AppPortalAccessOut
      with url and token fields.

    postconditions:
      # Evidence: svix/dist/api/authentication.d.ts — appPortalAccess(appId, appPortalAccessIn) returns AppPortalAccessOut
      # AppPortalAccessIn has featureFlags?, expiresIn?, sessionId?, capabilities? fields
      # svix/dist/request.js — same ApiException throw path
      # https://docs.svix.com/app-portal — appPortalAccess is the core method for portal access
      - id: app-portal-access-api-error
        condition: "svix API rejected the portal access request — auth failure, app not found, or invalid parameters"
        throws: "ApiException (svix.ApiException) with code and body"
        required_handling: >
          Caller MUST catch ApiException. 404 = appId not found (customer's
          svix application does not exist — onboarding may have failed silently);
          401/403 = bad auth token; 422 = invalid AppPortalAccessIn (e.g.
          invalid featureFlags). A swallowed exception here results in the caller
          redirecting the customer to a null/undefined URL — typically a broken
          redirect or a blank page. This is directly user-visible as a failed
          portal access attempt.
        sources:
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
          - https://docs.svix.com/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: resend
    namespace: "messageAttempt"
    import_path: "svix"
    description: >
      Resends a specific failed message delivery attempt to a specific endpoint.
      Used for targeted retry of individual failed deliveries, as opposed to
      endpoint.recover() which replays all failures in bulk. Returns EmptyResponse.
      Useful in admin UIs or support tooling where you need to replay one
      specific message for a specific customer endpoint.

    postconditions:
      # Evidence: svix/dist/api/messageAttempt.d.ts — resend(appId, msgId, endpointId) returns EmptyResponse
      # EmptyResponse is an empty object — void equivalent
      # svix/dist/request.js — same ApiException throw path
      - id: message-attempt-resend-api-error
        condition: "svix API rejected the resend request — invalid IDs, app/message/endpoint not found, or auth failure"
        throws: "ApiException (svix.ApiException) with code and body"
        required_handling: >
          Caller MUST catch ApiException. 404 = one of appId, msgId, or
          endpointId not found — the attempt does not exist in svix's system
          (possibly already expired or from the wrong environment). 401/403 =
          auth failure. A swallowed exception means the admin/support operator
          believes the message was resent when it was not — the customer's
          integration remains broken without any indication.
        sources:
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/api/messageAttempt.ts
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/request.ts
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

  - name: expireAll
    namespace: "authentication"
    import_path: "svix"
    description: >
      Revokes all active portal access tokens for a specific application. Used
      during security incidents to immediately invalidate all outstanding magic
      links and sessions for a customer's svix app. Can optionally target
      specific sessionIds to revoke individual sessions. Returns void.
      Critical security response path — callers rely on this to prevent
      unauthorized portal access after a security event.

    postconditions:
      # Evidence: svix@1.84.1/dist/api/authentication.js — expireAll() confirmed
      #   POST /api/v1/auth/app/{app_id}/expire-all
      #   Uses sendNoResponseBody() — returns void on success
      # svix@1.84.1/dist/request.js — filterResponseForErrors():
      #   4xx → ApiException(status, JSON.parse(body), headers)
      #   5xx → ApiException(status, rawBody, headers) after 2 retries
      #   Network failure → Error (native fetch) after 2 retries
      # svix@1.84.1/dist/models/applicationTokenExpireIn.d.ts — expiry?: number | null, sessionIds?: string[]
      - id: authentication-expire-all-api-error
        condition: "svix API rejected the expireAll request — app not found, auth failure, or invalid parameters"
        throws: "ApiException (svix.ApiException) with code (HTTP status) and body"
        required_handling: >
          Caller MUST catch ApiException around expireAll(). Critical cases:
          404 = appId not found (customer's svix application was never created
          or was already deleted); 401/403 = bad SVIX_AUTH_TOKEN (expired or
          revoked server token). A swallowed exception during a security
          incident means ALL outstanding portal magic links remain valid —
          the customer's webhook management portal is still accessible to
          unauthorized parties. This is a security regression. Never treat
          a void return from this method as success without a surrounding try-catch.
        sources:
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/api/authentication.ts
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/request.ts
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

      - id: authentication-expire-all-network-error
        condition: "Network failure reaching api.svix.com after 2 automatic retries"
        throws: "Error (native fetch network error after retry exhaustion)"
        required_handling: >
          Caller MUST catch Error (not just ApiException). svix retries 5xx
          and network failures twice before propagating the error. If still
          failing after retries, the token revocation was NOT applied — all
          outstanding portal sessions remain valid. Security incident handlers
          MUST treat this as a blocking failure, not a best-effort call.
          Retry with backoff, or notify the security team that revocation
          failed so they can revoke the SVIX_AUTH_TOKEN itself as a last resort.
        sources:
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/request.ts
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

  - name: replayMissing
    namespace: "endpoint"
    import_path: "svix"
    description: >
      Replays all messages that were missed by an endpoint within a given time
      window. Unlike endpoint.recover() (which replays FAILED deliveries),
      replayMissing replays messages where the endpoint did not even receive
      a delivery attempt — e.g. when the endpoint was created after messages
      were published, or when the endpoint's filter event types were updated.
      Returns ReplayOut immediately — the actual replay is asynchronous in the
      background. Callers must poll backgroundTask.get(id) to confirm completion.

    postconditions:
      # Evidence: svix@1.84.1/dist/api/endpoint.js — replayMissing() confirmed
      #   POST /api/v1/app/{app_id}/endpoint/{endpoint_id}/replay-missing
      #   Uses ReplayIn model (same structure as RecoverIn — since: Date)
      #   Returns ReplayOut via ReplayOutSerializer
      # svix@1.84.1/dist/models/replayOut.d.ts — ReplayOut: { id: string, status: BackgroundTaskStatus, task: BackgroundTaskType }
      # svix@1.84.1/dist/models/backgroundTaskStatus.d.ts — BackgroundTaskStatus: "running" | "finished" | "failed"
      # Error path: same filterResponseForErrors() as all other endpoints
      - id: endpoint-replay-missing-api-error
        condition: "svix API rejected the replayMissing request — endpoint not found, auth failure, or invalid time range"
        throws: "ApiException (svix.ApiException) with code and body"
        required_handling: >
          Caller MUST catch ApiException. 404 = endpointId or appId not found;
          422 = invalid ReplayIn (e.g. invalid date range, since > until, or
          since too far in the past beyond svix's retention window). 401/403 =
          auth failure. A swallowed exception means the endpoint backfill was
          silently skipped — new endpoints onboarded into an existing event
          stream will never receive historical messages they missed, and the
          customer sees incomplete webhook history.
        sources:
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/api/endpoint.ts
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/request.ts
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      - id: endpoint-replay-missing-async-not-polled
        condition: "replayMissing() returns ReplayOut with a background task ID, but caller does not poll task status"
        throws: "No throw — ReplayOut.id is silently discarded"
        required_handling: >
          replayMissing() is ASYNCHRONOUS. A 200 response means the replay job
          was queued (ReplayOut.status will initially be "running"), NOT that
          messages were delivered. Callers MUST use the returned ReplayOut.id
          to poll backgroundTask.get(taskId) until status is "finished" or
          "failed". Treating a successful replayMissing() response as
          confirmation that the endpoint is caught up is incorrect. This is
          the same async pitfall as endpoint.recover() — both return a
          background task reference that must be tracked, not discarded.
        sources:
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/api/endpoint.ts
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/models/replayOut.ts
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: sendExample
    namespace: "endpoint"
    import_path: "svix"
    description: >
      Sends a synthesized test event of a specific event type to an endpoint.
      Used to verify webhook delivery is working during endpoint setup or
      troubleshooting. Requires an EventExampleIn with eventType (and optional
      exampleIndex). Returns MessageOut — the created test message record.
      Commonly called in onboarding flows or webhook management UIs where the
      customer can click "Send Test Event" to verify their endpoint responds
      correctly.

    postconditions:
      # Evidence: svix@1.84.1/dist/api/endpoint.js — sendExample() confirmed
      #   POST /api/v1/app/{app_id}/endpoint/{endpoint_id}/send-example
      #   EventExampleIn: { eventType: string, exampleIndex?: number }
      #   Returns MessageOut via MessageOutSerializer
      # svix@1.84.1/dist/request.js — same filterResponseForErrors() path
      # Note: Returns MessageOut (test message queued) — does NOT confirm the
      # endpoint received it. Delivery is asynchronous.
      - id: endpoint-send-example-api-error
        condition: "svix API rejected the sendExample request — unknown event type, endpoint not found, or auth failure"
        throws: "ApiException (svix.ApiException) with code and body"
        required_handling: >
          Caller MUST catch ApiException. 404 = endpointId or appId not found;
          422 = eventType does not exist in svix's registered event types for
          this app (the event schema must be pre-registered before examples can
          be sent); 401/403 = auth failure. A swallowed exception in a
          "Send Test Event" UI means the user receives no feedback that the
          test failed — they believe their endpoint is configured correctly
          when it is not, leading to missed production events.
        sources:
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/api/endpoint.ts
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/request.ts
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: endpoint-send-example-delivery-not-confirmed
        condition: "sendExample() returns MessageOut successfully but the endpoint URL did not receive the payload"
        throws: "No throw — MessageOut is returned but delivery is asynchronous"
        required_handling: >
          sendExample() returns MessageOut when the TEST MESSAGE WAS QUEUED —
          NOT when the endpoint received it. The actual HTTP delivery to the
          customer's URL is asynchronous and happens after this call returns.
          Callers that treat a successful MessageOut response as confirmation
          that the endpoint is working are incorrect. To confirm delivery,
          check messageAttempt.listByMsg(appId, msg.id) and verify that at
          least one attempt has status "success". A "Send Test Event" UI that
          only checks the sendExample() return without checking delivery
          attempts will give false assurance to customers with misconfigured
          endpoints.
        sources:
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/api/endpoint.ts
          - https://github.com/svix/svix-webhooks/blob/main/javascript/src/api/messageAttempt.ts
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium
