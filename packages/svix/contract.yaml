# API surface: 13 distinct async-callable runtime-critical function groups (svix@1.84.1)
#   Core send path: message.create — CONTRACTED (prior pass)
#   Inbound verification: Webhook.verify — CONTRACTED (prior pass)
#   Customer onboarding: application.create, application.getOrCreate — CONTRACTED (pass 1)
#   Endpoint management: endpoint.create, endpoint.recover, endpoint.rotateSecret — CONTRACTED (pass 1)
#   Portal access: authentication.appPortalAccess — CONTRACTED (pass 1)
#   Retry/resend: messageAttempt.resend — CONTRACTED (pass 1)
#   Token revocation: authentication.expireAll — CONTRACTED (this pass)
#   Missed message replay: endpoint.replayMissing — CONTRACTED (this pass)
#   Test delivery: endpoint.sendExample — CONTRACTED (this pass)
