#   svix@1.84.1/dist/api/authentication.js — expireAll() implementation
#   svix@1.84.1/dist/api/endpoint.js — replayMissing(), sendExample() implementations
#   svix@1.84.1/dist/models/replayOut.d.ts — ReplayOut structure
