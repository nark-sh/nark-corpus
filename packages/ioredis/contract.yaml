package: ioredis
semver: ">=4.27.8"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: confirmed  # All postconditions cite Redis docs or ioredis source
coverage_score: 1.0  # 29 contracted / 29 covered async-callable functions after pass-15 (transactions: exec; presence: exists; Redis 6.2 atomic string ops: getex, getdel). Intentionally omitted: 4 scanStream wrappers (sync, return Streams), xadd/xread (Redis Streams, niche SaaS adoption), select/watch (state-changing utility commands not directly user-driven).

# CRITICAL SECURITY NOTE:
# ioredis has prototype pollution vulnerability in versions < 4.27.8:
# - SNYK-JS-IOREDIS-1567196: Prototype Pollution
# - Multiple high severity CVEs (7-8.9 CVSS)
#
# MINIMUM VERSION: 4.27.8 (prototype pollution fix)
# RECOMMENDED VERSION: 5.9.3+ (latest stable)
#
# Common production bugs:
# 1. Missing error event handler - VERY COMMON (causes process crashes)
# 2. No reconnection logic for pub/sub - COMMON (broken subscriptions)
# 3. Pipeline errors not checked - COMMON (silent failures)
# 4. Generic catch blocks - VERY COMMON (wrong retry logic)

detection:
  class_names: ["Redis", "Cluster", "Command"]
  type_names: ["Redis", "Cluster", "RedisOptions", "ClusterOptions"]
  factory_methods: []
  require_instance_tracking: true
  import_source: "ioredis"   # Scope to ioredis imports only — prevents false positives on @upstash/redis (HTTP-based, no EventEmitter)

  await_patterns:
    # Connection
    - ".connect("

    # String operations
    - ".get("
    - ".set("
    - ".del("
    - ".incr("
    - ".decr("
    - ".exists("
    - ".getex("
    - ".getdel("

    # Hash operations
    - ".hget("
    - ".hset("
    - ".hgetall("
    - ".hdel("

    # List operations
    - ".lpush("
    - ".rpush("
    - ".lpop("
    - ".rpop("
    - ".lrange("
    - ".brpop("
    - ".blpop("

    # Set operations
    - ".sadd("
    - ".smembers("
    - ".srem("

    # Sorted set operations
    - ".zadd("
    - ".zrange("
    - ".zrem("

    # Pub/Sub
    - ".subscribe("
    - ".publish("
    - ".unsubscribe("

    # Transactions and pipelines
    - ".exec("
    - ".eval("

  # Required event listeners to prevent process crashes
  required_event_listeners:
    - event: "error"
      required: true
      severity: error

functions:
  - name: Redis
    import_path: "ioredis"
    description: "Redis client constructor - Creates a Redis connection instance"

    postconditions:
      # Evidence: seen in 24 primary firings across 11 repos in scan-ioredis-2026-06-29.json (prev: 12/7 repos 2026-04-02)
      # Top affected: velopert/velog-client (⭐745), activepieces/activepieces (⭐21381), soketi/soketi (⭐5565)
      # Note: ~2/7 repos attach error handler via helper fn — scanner FP pattern
      - id: missing-error-listener
        maturity: stable
        condition: "Redis instance created without error event listener"
        throws: "Errors emitted as events, not exceptions - silent failures"
        required_handling: >
          Caller MUST attach an error listener immediately after creating Redis instance:
          `redis.on('error', (err) => logger.error(err))`.
          Without this listener, connection errors are silently logged to console and may crash the application.
        sources:
          - "https://github.com/redis/ioredis#error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: connection-errors-not-handled
        maturity: stable
        condition: "Connection fails (ECONNREFUSED, ETIMEDOUT, ECONNRESET, ENOTFOUND, EPIPE, EAI_AGAIN)"
        throws: "Error event emitted with connection error"
        required_handling: >
          Caller MUST handle connection errors in the error event listener.
          Common errors: ECONNREFUSED (Redis not running), ETIMEDOUT (network timeout),
          ECONNRESET (connection dropped), ENOTFOUND (DNS failure).
        sources:
          - "https://github.com/redis/ioredis/issues/321"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: lazy-connection
        description: "Connection is lazy by default - errors may occur after constructor returns"
        sources:
          - "https://github.com/redis/ioredis#connect-to-redis"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: get
    import_path: "ioredis"
    description: "Get value of key from Redis"

    postconditions:
      # Evidence: seen in 17 primary firings across 12 repos in scan-ioredis-2026-06-29.json (prev: 9/7 repos 2026-04-02)
      # Top affected: velopert/velog-client (⭐745), activepieces/activepieces (⭐21381), quirrel-dev/quirrel (⭐929)
      - id: unhandled-promise-rejection
        maturity: stable
        condition: "Command promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning - will crash in future Node.js versions"
        required_handling: >
          Caller MUST use try-catch (async/await) or .catch() on all Redis commands.
          Commands return promises that may reject due to: connection errors, WRONGTYPE,
          timeout, or serialization failures.
        sources:
          - "https://github.com/redis/ioredis/issues/433"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: command-timeout
        maturity: stable
        condition: "Command exceeds timeout (default: no timeout)"
        throws: "MaxRetriesPerRequestError or CommandTimeoutError"
        required_handling: >
          Caller SHOULD set commandTimeout option to prevent hanging operations.
          Without timeout, commands may hang indefinitely on network issues.
        sources:
          - "https://github.com/redis/ioredis#command-timeout"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

