  - name: quit
    import_path: "ioredis"
    description: "Send QUIT command and gracefully close the Redis connection"

    postconditions:
      # Evidence: 12 primary firings across 7 repos in scan-ioredis-2026-06-29.json
      # Top affected: activepieces/activepieces (⭐21381), soketi/soketi (⭐5565), campfirein/cipher
      # Confirmed from ioredis source — quit() returns Promise<'OK'>
      - id: quit-promise-unhandled
        maturity: stable
        condition: "quit() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning if connection already closed or network error"
        required_handling: >
          Caller MUST use try-catch or .catch() on quit().
          quit() sends QUIT to server and waits for pending commands to complete.
          May reject if connection is already closed or broken before quit completes.
          Use disconnect() for immediate close if quit() is not available.
        sources:
          - "https://github.com/redis/ioredis#connection-events"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: quit-pending-commands-lost
        maturity: stable
        condition: "quit() called while commands are still queued"
        throws: "AbortError for queued commands that won't be executed"
        required_handling: >
          Caller MUST be aware that quit() waits for pending replies but new commands
          added after quit() is called will receive AbortError.
          Do not enqueue commands after calling quit().
          Pattern: await all pending operations before calling quit() in shutdown handlers.
        sources:
          - "https://github.com/redis/ioredis#basic-usage"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: del
    import_path: "ioredis"
    description: "Delete one or more keys from Redis"

    postconditions:
      # Evidence: 9 primary firings across 8 repos in scan-ioredis-2026-06-29.json
      # Top affected: Crossbell-Box/xLog, surgioproject/surgio, code100x/cms
      # Source: https://redis.io/docs/latest/develop/clients/error-handling/
      - id: del-unhandled-promise-rejection
        maturity: stable
        condition: "del() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning on connection error"
        required_handling: >
          Caller MUST use try-catch or .catch() on del() calls.
          del() returns the count of deleted keys (0 if key doesn't exist — not an error).
          Returns Promise<number> — check return value only if you need to verify deletion.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: expire
    import_path: "ioredis"
    description: "Set a timeout in seconds on a key (TTL expiry)"

    postconditions:
      # Evidence: extremely common in SaaS for session management, rate limiting, cache invalidation
      # Source: https://redis.io/docs/latest/develop/clients/error-handling/
      - id: expire-unhandled-promise-rejection
        maturity: stable
        condition: "expire() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning on connection error"
        required_handling: >
          Caller MUST use try-catch or .catch() on expire() calls.
          expire() returns 1 if timeout was set, 0 if key doesn't exist — 0 is NOT an error.
          Silent expiry failures leave data in Redis indefinitely, causing memory leaks
          and stale data bugs in session management and rate limiting.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: expire-returns-zero-not-checked
        maturity: stable
        condition: "expire() called on non-existent key and return value not checked"
        throws: "N/A (returns 0, not an error)"
        required_handling: >
          Caller SHOULD check expire() return value when setting TTL on critical keys.
          Returns 0 if key does not exist — the set+expire pattern can fail silently
          if the key was never written or was already deleted between set() and expire() calls.
          Use SET with EX option (atomic) instead of separate set()+expire() calls:
          `redis.set(key, value, 'EX', ttlSeconds)` to avoid the race condition.
        sources:
          - "https://redis.io/commands/expire/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
