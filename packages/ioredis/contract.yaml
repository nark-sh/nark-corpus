      - id: getdel-unhandled-promise-rejection
        maturity: stable
        condition: "getdel() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning on connection error or server <6.2"
        required_handling: >
          Caller MUST use try-catch or .catch() on getdel() calls.
          Rejects on connection errors and on 'ERR unknown command' for Redis
          servers older than 6.2.0. Silent rejection in a one-time-token flow
          leaves the token in Redis (because the DELETE side never ran) AND
          returns undefined to the caller — the user sees "invalid token" but
          the token is still valid, blocking subsequent legitimate attempts.
          For magic-link flows this manifests as users unable to complete
          login after a transient Redis hiccup.
        sources:
          - "https://redis.io/commands/getdel/"
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
