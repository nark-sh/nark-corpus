          incident_cost_range: high

      - id: getdel-null-return-not-distinguished-from-error
        maturity: stable
        condition: "getdel() returns null and the application treats null as 'consumed by another worker' without distinguishing from connection failure"
        throws: "N/A — null is the documented 'key did not exist' return; error case is a thrown rejection"
        required_handling: >
          Caller SHOULD log/metric the null-return case separately from the
          rejection case in token-consumption flows. A null return means 'key
          was never set OR was already consumed' — a legitimate outcome. A
          rejection means 'we don't know whether the key was consumed' — an
          ambiguous failure that needs operator visibility. Conflating them
          in logs (`if (!token) reject('invalid')`) hides connection issues
          behind a flood of legitimate-looking 'invalid token' errors.
