          incident_cost_range: medium

  - name: pipeline
    import_path: "ioredis"
    description: "Create pipeline for batch command execution"

    postconditions:
      - id: pipeline-results-not-checked
        condition: "Pipeline exec() results not checked for errors"
        throws: "Individual command errors silently included in results array"
        required_handling: >
          Caller MUST check each result in pipeline.exec() return value.
          Format: [[null, 'OK'], [Error, undefined], ...].
          Pipeline does NOT reject on individual command failures.
        sources:
          - "https://github.com/redis/ioredis#pipelines"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: pipeline-exec-unhandled
        condition: "Pipeline exec() promise rejected without catch"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          Caller MUST use try-catch or .catch() on pipeline.exec().
        sources:
          - "https://github.com/redis/ioredis/issues/753"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: multi
    import_path: "ioredis"
    description: "Create transaction (MULTI/EXEC block)"

    postconditions:
      - id: watch-null-not-checked
        condition: "WATCH violation causes exec() to return null, not checked"
        throws: "null return value indicates transaction was aborted"
        required_handling: >
          Caller MUST check if exec() returns null after using WATCH.
          Null indicates a watched key was modified, transaction aborted.
          This is NOT an error/rejection - it's a null return value.
        sources:
          - "https://github.com/redis/ioredis/issues/883"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: exec-abort-not-handled
        condition: "EXECABORT error in transaction not handled"
        throws: "EXECABORT error if queued command fails validation"
        required_handling: >
          Caller MUST check exec() results for EXECABORT errors.
          Happens when queued commands fail validation (WRONGTYPE, etc.).
        sources:
          - "https://github.com/redis/ioredis#transactions"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: subscribe
    import_path: "ioredis"
    description: "Subscribe to Redis pub/sub channel"

    postconditions:
      - id: subscriber-mode-violation
        condition: "Non-pub/sub commands used on subscriber connection"
        throws: "Error: Connection in subscriber mode, only subscriber commands allowed"
        required_handling: >
          Caller MUST use separate Redis connection for pub/sub.
          After subscribe(), only subscribe/unsubscribe/psubscribe/punsubscribe/quit/ping allowed.
          Use redis.duplicate() to create separate connection for normal commands.
        sources:
          - "https://github.com/redis/ioredis#pub/sub"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: duplicate-for-commands
        description: "Must use redis.duplicate() to create separate connection for normal commands while subscribed"
        sources:
          - "https://github.com/redis/ioredis/issues/944"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: brpop
    import_path: "ioredis"
    description: "Blocking pop from list (right side)"

    postconditions:
      - id: blocking-without-timeout
        condition: "Blocking command without timeout parameter"
        throws: "Command may block indefinitely, causing resource leak"
        required_handling: >
          Caller SHOULD provide timeout parameter to blocking commands (BRPOP, BLPOP, BZPOPMIN, BZPOPMAX).
          Without timeout (or timeout=0), command blocks until data available, potentially forever.
          Recommended: Set reasonable timeout (e.g., 5-30 seconds).
        sources:
          - "https://redis.io/commands/brpop/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: connect
    import_path: "ioredis"
    description: "Explicitly connect to Redis (usually automatic)"

    postconditions:
      - id: connect-promise-unhandled
        condition: "connect() promise rejected without catch"
        throws: "UnhandledPromiseRejectionWarning on connection failure"
        required_handling: >
          Caller MUST use try-catch or .catch() on explicit connect() calls.
        sources:
          - "https://github.com/redis/ioredis#connect-to-redis"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: hget
    import_path: "ioredis"
    description: "Get hash field value"

    postconditions:
      - id: wrong-type-error
        condition: "Key exists but is not a hash"
        throws: "ReplyError with message containing 'WRONGTYPE'"
        required_handling: >
          Caller MUST catch WRONGTYPE errors for hash operations.
          This indicates key is not a hash - DO NOT retry.
          Fix data model or use correct command for key type.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: unhandled-promise-rejection
        condition: "Command promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          Caller MUST use try-catch or .catch() on all Redis commands.
        sources:
          - "https://github.com/redis/ioredis/issues/433"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: hset
    import_path: "ioredis"
    description: "Set hash field value"

    postconditions:
      - id: wrong-type-error
        condition: "Key exists but is not a hash"
        throws: "ReplyError with message containing 'WRONGTYPE'"
        required_handling: >
          Caller MUST catch WRONGTYPE errors.
          Key exists with different type - DO NOT retry.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: unhandled-promise-rejection
        condition: "Command promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          Caller MUST use try-catch or .catch() on all Redis commands.
        sources:
          - "https://github.com/redis/ioredis/issues/433"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: hgetall
    import_path: "ioredis"
    description: "Get all hash fields and values"

    postconditions:
      - id: wrong-type-error
        condition: "Key exists but is not a hash"
        throws: "ReplyError with message containing 'WRONGTYPE'"
        required_handling: >
          Caller MUST catch WRONGTYPE errors.
          Key is not a hash - DO NOT retry.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: unhandled-promise-rejection
        condition: "Command promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning"
        required_handling: >
          Caller MUST use try-catch or .catch() on all Redis commands.
        sources:
          - "https://github.com/redis/ioredis/issues/433"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: lpush
    import_path: "ioredis"
    description: "Push value to head of list"

    postconditions:
      - id: wrong-type-error
        condition: "Key exists but is not a list"
        throws: "ReplyError with message containing 'WRONGTYPE'"
        required_handling: >
          Caller MUST catch WRONGTYPE errors.
          Key exists with different type - DO NOT retry.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
