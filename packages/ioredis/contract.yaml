      - id: getdel-wrong-type-error
        maturity: stable
        condition: "Key exists but holds a non-string value"
        throws: "ReplyError with 'WRONGTYPE Operation against a key holding the wrong kind of value'"
        required_handling: >
          Caller MUST catch WRONGTYPE errors on getdel().
          Like GET and GETEX, getdel() is string-only — calling it on a hash,
          list, set, or sorted set throws WRONGTYPE. Do NOT retry. Fix the
          data model or use the correct command (HDEL/SPOP/LPOP) for the
          actual key type.
