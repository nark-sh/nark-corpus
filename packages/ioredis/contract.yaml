    postconditions:
      - id: publish-error
        maturity: stable
        condition: "Publish fails (connection lost, etc.)"
        throws: "Network error or UnhandledPromiseRejectionWarning"
        required_handling: >
          Caller MUST catch publish errors with try-catch or .catch().
          Network errors may be transient - implement retry logic.
          Returns number of subscribers that received the message (may be 0).
        sources:
          - "https://dev.to/franciscomendes10866/using-redis-pub-sub-with-node-js-13k3"
        severity: error
        business_impact:
