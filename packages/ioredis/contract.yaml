  - name: publish
    import_path: "ioredis"
    description: "Publish message to Redis channel"

    postconditions:
      - id: publish-error
        condition: "Publish fails (connection lost, etc.)"
        throws: "Network error or UnhandledPromiseRejectionWarning"
        required_handling: >
          Caller MUST catch publish errors with try-catch or .catch().
          Network errors may be transient - implement retry logic.
          Returns number of subscribers that received the message (may be 0).
        sources:
          - "https://dev.to/franciscomendes10866/using-redis-pub-sub-with-node-js-13k3"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: eval
    import_path: "ioredis"
    description: "Execute Lua script on Redis server"

    postconditions:
      - id: script-error
        condition: "Lua script has syntax or runtime error"
        throws: "ReplyError with script error details"
        required_handling: >
          Caller MUST catch Lua script errors.
          Script syntax errors should NOT be retried - fix script.
          Script runtime errors depend on logic - may or may not be retriable.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: script-timeout
        condition: "Lua script exceeds execution time limit"
        throws: "ReplyError with timeout message"
        required_handling: >
          Caller MUST catch script timeout errors.
          Redis has lua-time-limit configuration (default 5 seconds).
          Optimize script or increase limit if needed.
          DO NOT retry immediately - may cause cascading timeouts.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: quit
    import_path: "ioredis"
    description: "Send QUIT command and gracefully close the Redis connection"

    postconditions:
      # Evidence: confirmed from ioredis source — quit() returns Promise<'OK'>
      # Source: https://github.com/redis/ioredis/blob/main/README.md#connection-events
      - id: quit-promise-unhandled
        condition: "quit() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning if connection already closed or network error"
        required_handling: >
          Caller MUST use try-catch or .catch() on quit().
          quit() sends QUIT to server and waits for pending commands to complete.
          May reject if connection is already closed or broken before quit completes.
          Use disconnect() for immediate close if quit() is not available.
        sources:
          - "https://github.com/redis/ioredis#connection-events"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: quit-pending-commands-lost
        condition: "quit() called while commands are still queued"
        throws: "AbortError for queued commands that won't be executed"
        required_handling: >
          Caller MUST be aware that quit() waits for pending replies but new commands
          added after quit() is called will receive AbortError.
          Do not enqueue commands after calling quit().
          Pattern: await all pending operations before calling quit() in shutdown handlers.
        sources:
          - "https://github.com/redis/ioredis#basic-usage"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: del
    import_path: "ioredis"
    description: "Delete one or more keys from Redis"

    postconditions:
      # Evidence: del is in the detection await_patterns — extremely common in SaaS apps
      # Source: https://redis.io/docs/latest/develop/clients/error-handling/
      - id: del-unhandled-promise-rejection
        condition: "del() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning on connection error"
        required_handling: >
          Caller MUST use try-catch or .catch() on del() calls.
          del() returns the count of deleted keys (0 if key doesn't exist — not an error).
          Returns Promise<number> — check return value only if you need to verify deletion.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: expire
    import_path: "ioredis"
    description: "Set a timeout in seconds on a key (TTL expiry)"

    postconditions:
      # Evidence: extremely common in SaaS for session management, rate limiting, cache invalidation
      # Source: https://redis.io/docs/latest/develop/clients/error-handling/
      - id: expire-unhandled-promise-rejection
        condition: "expire() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning on connection error"
        required_handling: >
          Caller MUST use try-catch or .catch() on expire() calls.
          expire() returns 1 if timeout was set, 0 if key doesn't exist — 0 is NOT an error.
          Silent expiry failures leave data in Redis indefinitely, causing memory leaks
          and stale data bugs in session management and rate limiting.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: expire-returns-zero-not-checked
        condition: "expire() called on non-existent key and return value not checked"
        throws: "N/A (returns 0, not an error)"
        required_handling: >
          Caller SHOULD check expire() return value when setting TTL on critical keys.
          Returns 0 if key does not exist — the set+expire pattern can fail silently
          if the key was never written or was already deleted between set() and expire() calls.
          Use SET with EX option (atomic) instead of separate set()+expire() calls:
          `redis.set(key, value, 'EX', ttlSeconds)` to avoid the race condition.
        sources:
          - "https://redis.io/commands/expire/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: incr
    import_path: "ioredis"
    description: "Atomically increment integer value of key by 1 — common for rate limiting and counters"

    postconditions:
      # Evidence: extremely common in SaaS for rate limiting, request counting, ID generation
      # Source: https://redis.io/docs/latest/develop/clients/error-handling/
      - id: incr-wrong-type-error
        condition: "Key exists but is not a string or integer"
        throws: "ReplyError with 'ERR value is not an integer or out of range'"
        required_handling: >
          Caller MUST catch WRONGTYPE/value-not-integer errors.
          Happens when key holds a non-integer string (e.g., JSON blob) and incr() is called.
          This is a programming error — do NOT retry. Fix the data model.
        sources:
          - "https://redis.io/commands/incr/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: incr-unhandled-promise-rejection
        condition: "incr() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning on connection error"
        required_handling: >
