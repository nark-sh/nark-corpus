  - name: blpop
    import_path: "ioredis"
    description: "Blocking pop from list (left side) — used for job queue consumption"

    postconditions:
      # Evidence: listed in detection await_patterns, used for job queues in SaaS
      # Source: https://redis.io/commands/blpop/
      - id: blpop-blocking-without-timeout
        condition: "blpop() called without timeout parameter or with timeout=0"
        throws: "Command may block indefinitely, causing resource exhaustion"
        required_handling: >
          Caller SHOULD always provide a non-zero timeout to blpop().
          With timeout=0, command blocks until data is available — may be indefinite.
          In SaaS apps, this can exhaust connection pool and cause other commands to queue.
          Recommended: use a reasonable timeout (5-30 seconds) and loop to re-poll.
          Pattern: while (running) { const result = await redis.blpop('queue', 5); ... }
        sources:
          - "https://redis.io/commands/blpop/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: blpop-unhandled-promise-rejection
        condition: "blpop() promise rejected without catch handler"
        throws: "UnhandledPromiseRejectionWarning on connection error or MaxRetriesPerRequestError"
        required_handling: >
          Caller MUST use try-catch or .catch() on blpop() calls.
          Connection errors during blocking commands return MaxRetriesPerRequestError.
          Implement retry loop with backoff for job queue consumers.
        sources:
          - "https://redis.io/docs/latest/develop/clients/error-handling/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: blpop-subscriber-mode-conflict
        condition: "blpop() called on a connection in subscriber mode"
        throws: "ReplyError: Connection in subscriber mode, only subscriber commands allowed"
        required_handling: >
          Caller MUST NOT mix blpop() with pub/sub subscriptions on the same connection.
          Use a dedicated connection (redis.duplicate()) for job queue operations.
        sources:
          - "https://github.com/redis/ioredis#pub/sub"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
