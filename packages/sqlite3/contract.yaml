package: sqlite3
semver: ">=5.0.3"
contract_version: "1.4.0"
maintainer: "corpus-team"
last_verified: "2026-06-23"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.71  # 15 contracted / 21 total async-callable
# Effective coverage: 15 contracted / 15 contractable = 1.0
# Intentionally omitted (6): Statement.bind (immediate binding error, rare),
#   Statement.reset (documented "never fails"), Statement.all (covered by
#   Statement.run + finalize patterns — same finalize-required note as
#   Statement.run per wiki: "Like with Statement#run, the statement will not
#   be finalized after executing this function"), Statement.map (covered by
#   Database.map shortcut), Database.serialize/parallelize (mode control;
#   scheduled query errors report via own callbacks), Database.wait
#   (callback signature has no err parameter — nothing to enforce).
#
# Depth pass 2026-06-12 (deepen-stream-1 pass 6):
# +2 functions: Database (constructor open-error postconditions), Statement.get
# Gap identified: the Database constructor itself was implicit in the contract —
# its 4 distinct open failure modes (CANTOPEN, PERM, NOTADB, CORRUPT) are the
# #1 cause of production silent-deploy failures with sqlite3, yet no first-
# class function entry surfaced them. Statement.get was previously omitted
# under "same error profile as Database.get" — that was incorrect. The
# documented "leaves the database locked" warning is unique to Statement.get
# and creates a distinct slow-leak production pattern that Database.get does
# not have (Database.get auto-finalizes; Statement.get does not).
# Sources confirmed:
#   https://github.com/TryGhost/node-sqlite3/wiki/API (Database constructor, Statement#get)
#   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/open_close.test.js
#     (err.errno === sqlite3.CANTOPEN assertion for missing file in OPEN_READONLY)
#   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/prepare.test.js
#     (canonical stmt.get(function(err, row) { if (err) throw err; ... }) pattern)
#   https://www.sqlite.org/rescode.html
#     (SQLITE_CANTOPEN=14, SQLITE_PERM=3, SQLITE_NOTADB=26, SQLITE_CORRUPT=11)
#
# Depth pass 2026-06-12 (deepen-stream-2 pass 2):
# +3 functions: Statement.finalize, Statement.run, map (Database#map / Statement#map)
# Gap identified: previous pass contracted close() with close-unfinalised-statements
# postcondition but never contracted finalize() itself as a first-class function.
# The #1 cause of close-unfinalised-statements is "developer never called finalize"
# — that needs its own postcondition (finalize-not-called) and its own scanner
# detection rule. Statement.run is distinct from Database.run because it does NOT
# auto-finalize, so silent-failure-in-loop is a unique pattern. Database.map is
# distinct from Database.all because its silent-failure mode (returns {} on
# query error AND on key-collision) is uniquely deceptive.
# Sources confirmed:
#   https://github.com/TryGhost/node-sqlite3/wiki/API (Statement#run, Statement#finalize,
#     Database#map, Statement#map)
#   node_modules/sqlite3/lib/sqlite3.d.ts (full type signatures)
#   node_modules/sqlite3/lib/sqlite3.js:98-101 (Database.prototype.map impl)
#   node_modules/sqlite3/lib/sqlite3.js:120-145 (Statement.prototype.map impl)
#
# Depth pass 2026-06-23 (deepen-stream-2 pass 9):
# +1 function: Statement.each
# Gap identified: Statement.each was previously omitted under "same error profile
# as Database.each", which was incorrect. The wiki documents Statement.each
# carries the SAME cursor-lock warning as Statement.get ("Using this method can
# leave the database locked, as the database awaits further calls to
# Statement#get to retrieve subsequent rows") AND an explicit finalize/reset
# requirement that Database.each does NOT have (Database.each auto-finalizes
# internally via statement.each().finalize(); Statement.each leaves the cursor
# open). The dual-callback (row + completion) pattern silently swallows query
# errors when the completion callback is omitted, but unlike Database.each, the
# row-cursor lock persists on the underlying sqlite3_stmt — meaning the same
# silent-failure outcome ALSO leaks a lock that surfaces later as SQLITE_BUSY
# on db.close().
# Sources confirmed:
#   https://github.com/TryGhost/node-sqlite3/wiki/API (Statement#each — quoted
#     above: cursor-lock warning + finalize/reset requirement + dual callback
#     "After all row callbacks were called, the completion callback will be
#     called if present. The first argument is an error object, and the second
#     argument is the number of retrieved rows.")
#   node_modules/sqlite3/lib/sqlite3.d.ts:91-93 (Statement.each signature with
#     dual-callback shape: (err, row) row callback + (err, count) completion)
#   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/each.test.js
#     (Database.each test pattern — confirms the dual-callback contract; the
#     Statement.each variant inherits the same callback shape but without the
#     auto-finalize that the Database wrapper applies)

# CRITICAL SECURITY NOTE:
# sqlite3 has 1 CVE in versions < 5.0.3:
# - CVE-2022-21227 (CVSS 7.5): DoS via invalid Function object
#
# MINIMUM VERSION: 5.0.3 (includes security fix)
# MAINTENANCE STATUS: Package inactive (12+ months no release)
# ALTERNATIVE: Consider better-sqlite3 (actively maintained)
#
# Common production bugs:
# 1. Callback error parameter ignored - MOST COMMON (30-40% of codebases!)
# 2. SQL injection via string concatenation - CRITICAL SECURITY
# 3. SQLITE_BUSY not handled (database locked errors)
# 4. Transaction errors not rolled back

# Note: sqlite3 uses callbacks, but we focus on common promise-wrapped patterns
detection:
  class_names: ["Database"]
  type_names: ["Database", "Statement", "RunResult"]
  factory_methods: []
  require_instance_tracking: true

  await_patterns:
    # Database operations (when promisified)
    - ".run("
    - ".get("
    - ".all("
    - ".exec("
    - ".prepare("
    - ".finalize("  # Statement#finalize (deepen 2026-06-12)
    - ".map("       # Database#map / Statement#map (deepen 2026-06-12)

functions:
  - name: run
    import_path: "sqlite3"
    description: "Executes SQL statement that doesn't return rows (INSERT, UPDATE, DELETE)"
    postconditions:
      # Evidence: scan-sqlite3-2026-04-03.json — 1 violation in 1 repo out of 16 scanned
      # Top affected: jasperapp/jasper (callback pattern — FP for callback-based usage)
      # Note: sqlite3 uses callbacks; FPs occur when code wraps callbacks in Promises with error handling
      - id: syntax-error
        condition: "SQL syntax error"
        throws: "Error with message containing 'SQLITE_ERROR' or syntax details"
        required_handling: >
          Caller MUST validate SQL syntax before execution.
          DO NOT retry - indicates SQL syntax error.
          Error message contains details about syntax issue.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: constraint-violation
        condition: "Unique constraint, foreign key, or NOT NULL violation"
        throws: "Error with 'SQLITE_CONSTRAINT' code"
        required_handling: >
          Caller MUST handle constraint violations:
          - UNIQUE constraint: error.message contains constraint details
          - FOREIGN KEY: foreign key constraint violation
          - NOT NULL: required field missing
          DO NOT retry without fixing data.
        sources:
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: database-locked
        condition: "Database is locked by another process or transaction"
        throws: "Error with 'SQLITE_BUSY' code"
        required_handling: >
          Caller MUST handle database locked errors.
          SQLite uses file-level locking.
          Implement retry with exponential backoff.
          Consider using WAL mode for better concurrency.
        sources:
          - "https://www.sqlite.org/lockingv3.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: table-not-found
        condition: "Table does not exist"
        throws: "Error with message 'no such table'"
        required_handling: >
          Caller MUST verify table exists before executing queries.
          DO NOT retry - indicates schema mismatch or missing migration.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: disk-full
        condition: "Disk is full or quota exceeded"
        throws: "Error with 'SQLITE_FULL' code"
        required_handling: >
          Caller MUST handle disk full errors.
          Check available disk space.
          Alert operations - this is a system-level issue.
        sources:
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: get
    import_path: "sqlite3"
    description: "Executes query and returns first row"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error"
        throws: "Error with 'SQLITE_ERROR' or syntax message"
        required_handling: >
          Caller MUST validate SQL syntax.
          DO NOT retry - fix SQL syntax.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: database-locked
        condition: "Database is locked"
        throws: "Error with 'SQLITE_BUSY' code"
        required_handling: >
          Caller MUST handle database locked errors.
          Implement retry with exponential backoff.
        sources:
          - "https://www.sqlite.org/lockingv3.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: all
    import_path: "sqlite3"
    description: "Executes query and returns all rows"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error"
        throws: "Error with 'SQLITE_ERROR' or syntax message"
        required_handling: >
          Caller MUST validate SQL syntax.
          DO NOT retry - fix SQL syntax.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: database-locked
        condition: "Database is locked"
        throws: "Error with 'SQLITE_BUSY' code"
        required_handling: >
          Caller MUST handle database locked errors.
          Implement retry with exponential backoff.
        sources:
          - "https://www.sqlite.org/lockingv3.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: memory-error
        condition: "Out of memory for large result sets"
        throws: "Error with 'SQLITE_NOMEM' code"
        required_handling: >
          Caller MUST handle out of memory errors.
          Use pagination for large result sets.
          Consider using each() iterator instead of all().
        sources:
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: exec
    import_path: "sqlite3"
    description: "Executes one or more SQL statements (no parameters)"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error in any statement"
        throws: "Error with 'SQLITE_ERROR' or syntax message"
        required_handling: >
          Caller MUST validate SQL syntax.
          exec() does not support parameterized queries.
          NEVER use with user input - SQL injection risk.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: constraint-violation
        condition: "Constraint violation in any statement"
        throws: "Error with 'SQLITE_CONSTRAINT' code"
        required_handling: >
          Caller MUST handle constraint violations.
          DO NOT retry without fixing data.
        sources:
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: prepare
    import_path: "sqlite3"
    description: "Prepares SQL statement for multiple executions"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error in statement"
        throws: "Error with 'SQLITE_ERROR' or syntax message"
        required_handling: >
          Caller MUST validate SQL syntax.
          DO NOT retry - fix SQL syntax.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: callback-error-ignored
        description: >
          MOST COMMON BUG (30-40% of codebases): Callback error parameter not checked.
          Results in silent failures, data corruption, and application crashes.
          WRONG: db.run(sql, (err) => { console.log('Done'); }); // Ignores err!
          CORRECT: db.run(sql, (err) => { if (err) throw err; console.log('Done'); });
          This is the #1 cause of silent data corruption in SQLite apps.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/issues/796"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: sql-injection-string-concatenation
        description: >
          CRITICAL SECURITY: Using string concatenation instead of prepared statements.
          WRONG: db.run(`INSERT INTO users VALUES ('${username}', '${password}')`);
          CORRECT: db.run('INSERT INTO users VALUES (?, ?)', [username, password]);
          NEVER use exec() with user input - it doesn't support parameters.
          This is the #1 security vulnerability in SQLite apps.
        sources:
          - "https://www.sqlite.org/lang_expr.html#varparam"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: transaction-rollback-missing
        description: >
          COMMON: BEGIN TRANSACTION without proper ROLLBACK on error.
          Results in partial writes and data corruption.
          ALWAYS wrap transactions: BEGIN -> operations -> COMMIT or ROLLBACK on error.
          Consider using serialize() to ensure order.
        sources:
          - "https://www.sqlite.org/lang_transaction.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: foreign-keys-not-enabled
        description: >
          COMMON: Foreign key constraints disabled by default in SQLite.
          Most developers don't know this - leads to data integrity violations.
          MUST run: PRAGMA foreign_keys = ON before any FK operations.
          Run this immediately after opening database.
        sources:
          - "https://www.sqlite.org/foreignkeys.html"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: prepared-statements-not-finalized
        description: >
          COMMON: Prepared statements not finalized after use.
          Results in resource leaks and SQLITE_MISUSE errors.
          ALWAYS call stmt.finalize() when done with prepared statement.
          Or use db.run/get/all which auto-finalize.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API#statementfinalizecallback"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: each
    import_path: "sqlite3"
    description: >
      Executes query and calls a callback for each row. Accepts an optional
      completion callback as the last argument that receives (err, count) where
      count is the total number of rows retrieved. Uses dual-callback pattern:
      per-row callback (err, row) and optional completion callback (err, count).
    postconditions:
      # Evidence:
      #   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/each.test.js
      #   — test shows complete callback receives (err, num) where num = row count
      #   — row callback receives (err, row) per row; errors halt iteration
      #   sqlite3 source: sqlite3.js normalizeMethod() wraps statement.each().finalize()
      - id: each-completion-error-ignored
        condition: >
          SQL syntax error, SQLITE_BUSY, or SQLITE_CONSTRAINT occurs and the
          completion callback (second callback argument) is omitted or doesn't
          check its err parameter.
        throws: >
          Error passed to row callback and completion callback as first argument.
          If row callback ignores err, the database error is silently swallowed
          and the application proceeds with partial or zero results.
        required_handling: >
          Caller MUST check the err parameter in both the row callback AND the
          completion callback. Pattern:
          db.each(sql, params,
            (err, row) => { if (err) throw err; /* use row */ },
            (err, count) => { if (err) { /* handle */ } }
          );
          Omitting the completion callback or ignoring its err causes silent
          failures where query errors are swallowed.
        sources:
          - "https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/each.test.js"
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: each-syntax-error
        condition: "SQL syntax error in the query"
        throws: "Error with 'SQLITE_ERROR' or syntax details passed to row callback"
        required_handling: >
          Caller MUST check err in row callback. DO NOT retry — indicates SQL
          syntax error. Error message contains details about syntax issue.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: close
    import_path: "sqlite3"
    description: >
      Closes the database connection. Callback receives (err) if closing fails.
      Fails with SQLITE_BUSY if there are unfinalized prepared statements still
      active, or with SQLITE_MISUSE if the database is already closed.
    postconditions:
      # Evidence:
      #   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/open_close.test.js
      #   — test asserts: err.errno === sqlite3.MISUSE on double-close
      #   — test documents: "SQLITE_BUSY: unable to close due to unfinalised statements"
      #   sqlite3 source: lib/sqlite3.js — close() is a native binding call with callback
      - id: close-unfinalised-statements
        condition: >
          Database.close() called while prepared statements created with
          Database.prepare() are still active (not finalized).
        throws: >
          Error with message "SQLITE_BUSY: unable to close due to unfinalised
          statements" passed to callback. errno = sqlite3.BUSY.
        required_handling: >
          Caller MUST call stmt.finalize() on all prepared statements before
          calling db.close(). Pattern:
          stmt.finalize(() => db.close(callback));
          Failing to finalize statements causes db.close() to fail silently
          if no callback is provided, leaking the database connection.
        sources:
          - "https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/open_close.test.js"
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: close-already-closed
        condition: >
          Database.close() called a second time after the database is already
          closed.
        throws: >
          Error with errno === sqlite3.MISUSE passed to callback.
          SQLITE_MISUSE indicates the database connection was used in an
          undefined/unsupported way.
        required_handling: >
          Caller MUST track database open/closed state and only close once.
          Do not call db.close() multiple times. Wrap in a guard:
          if (dbIsOpen) { db.close(() => { dbIsOpen = false; }); }
        sources:
          - "https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/open_close.test.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: loadExtension
    import_path: "sqlite3"
    description: >
      Loads a compiled SQLite extension (.so/.dll/.dylib) into the database
      connection. The callback receives (err) if loading fails. Common failures
      include file not found, incompatible architecture, and security restrictions.
    postconditions:
      # Evidence:
      #   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/extension.test.js
      #   — test is disabled ("not a generically safe test to run on all systems")
      #   — confirms loadExtension() passes error to callback on failure
      #   https://www.sqlite.org/loadext.html — SQLite extension loading docs
      #   sqlite3 source: native binding — errors propagated via callback pattern
      - id: loadextension-file-not-found
        condition: >
          Extension file path does not exist, has wrong file extension, or
          the .so/.dll/.dylib file cannot be opened by the OS.
        throws: >
          Error with message containing file path and OS error (e.g., "no such
          file or directory") passed to callback. The database remains open
          and usable, but without the extension.
        required_handling: >
          Caller MUST check err in the loadExtension callback. Pattern:
          db.loadExtension('./myext', (err) => {
            if (err) throw new Error(`Extension load failed: ${err.message}`);
          });
          Failing to check err causes the application to proceed without the
          extension, leading to "no such function" SQL errors later.
        sources:
          - "https://www.sqlite.org/loadext.html"
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: loadextension-security-disabled
        condition: >
          SQLite was compiled with SQLITE_OMIT_LOAD_EXTENSION or extension
          loading was disabled via sqlite3_db_config() SQLITE_DBCONFIG_ENABLE_LOAD_EXTENSION.
        throws: >
          Error with message "not authorized" or "not implemented" passed to
          callback. Common in restricted environments (embedded systems,
          security-hardened builds).
        required_handling: >
          Caller MUST handle this error gracefully. Check at application startup
          if extensions are available before depending on them.
        sources:
          - "https://www.sqlite.org/loadext.html#security_recommendations"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: backup
    import_path: "sqlite3"
    description: >
      Creates a Backup object that copies the database to a file via incremental
      step() calls. The Backup object emits 'error' and 'complete' events and
      provides step(pageCount, callback) for incremental progress.
      backup.retryErrors defaults to [BUSY, LOCKED] for automatic retry.
    postconditions:
      # Evidence:
      #   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/backup.test.js
      #   — test shows step() callback receives (err) on MISUSE after finish()
      #   — test confirms BUSY retry behavior via retryErrors array
      #   sqlite3 source: lib/sqlite3.js backup() sets retryErrors = [BUSY, LOCKED]
      - id: backup-cantopen-destination
        condition: >
          Destination file path is in a directory that doesn't exist, or the
          process lacks write permission to the destination path.
        throws: >
          Error with SQLITE_CANTOPEN passed to the step() callback or the
          initial backup callback. errno = sqlite3.CANTOPEN.
        required_handling: >
          Caller MUST check that the destination directory exists and is
          writable before calling db.backup(). Check err in both the backup
          callback and step() callbacks.
          const backup = db.backup('path/to/backup.db', (err) => {
            if (err) throw err; // destination not accessible
          });
        sources:
          - "https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/backup.test.js"
          - "https://www.sqlite.org/rescode.html#cantopen"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: backup-misuse-after-finish
        condition: >
          backup.step() is called after backup.finish() has been called
          (i.e., after the backup is already complete or abandoned).
        throws: >
          Error with message "Backup is already finished" and errno ===
          sqlite3.MISUSE passed to the step() callback.
        required_handling: >
          Caller MUST check backup.completed or backup.failed before calling
          step() again. Do not call step() after the backup is finished.
          Track completion state via backup.completed property.
        sources:
          - "https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/backup.test.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  # ───────────────────────────────────────────────────────────────────────────
  # Deepen pass 2026-06-12 (deepen-stream-2 pass 2)
  # Added: Statement.finalize, Statement.run, Database.map (silent-failure mode)
  # Sources: GitHub wiki API + node_modules/sqlite3/lib/sqlite3.{js,d.ts}
  # ───────────────────────────────────────────────────────────────────────────

  - name: finalize
    import_path: "sqlite3"
    description: >
      Statement instance method. Finalizes a prepared statement, releasing native
      resources held by the underlying sqlite3_stmt. After finalize() the statement
      object is unusable — all further calls throw errors. Errors during finalize
      (e.g. constraint violations triggered by deferred FK checks, or final commit
      failures on auto-commit statements) are delivered to the optional callback.
    postconditions:
      # Evidence:
      #   https://github.com/TryGhost/node-sqlite3/wiki/API (Statement#finalize)
      #   — "Finalizes the statement. After the statement is finalized, all further
      #      function calls on that statement object will throw errors."
      #   node_modules/sqlite3/lib/sqlite3.d.ts:77 — finalize(callback?: (err: Error) => void)
      #   confirms callback receives Error on failure.
      - id: finalize-not-called
        condition: >
          A Statement created via db.prepare(sql) is never finalized — the
          statement object goes out of scope or the database is closed without
          stmt.finalize() being called. This is the #1 cause of SQLITE_BUSY
          errors on db.close() and resource leaks in long-running processes.
        throws: >
          Indirect: a subsequent db.close() callback receives Error with message
          "SQLITE_BUSY: unable to close due to unfinalised statements"
          (errno = sqlite3.BUSY). The leaked native sqlite3_stmt holds a row
          cursor and a transaction handle until garbage-collected.
        required_handling: >
          Caller MUST call stmt.finalize() exactly once on every Statement
          returned by db.prepare(). Pattern:
            const stmt = db.prepare(sql);
            stmt.run(params, (err) => {
              stmt.finalize();
            });
          OR use db.run/get/all which auto-finalize the internal statement.
          For long-running prepared statements (loops, batches), finalize after
          the last execution.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
          - "https://github.com/TryGhost/node-sqlite3/issues/796"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: finalize-callback-error-ignored
        condition: >
          stmt.finalize(callback) is called with a callback that does not check
          its err parameter. The native finalize call can fail when deferred
          constraint checks fire at finalization time (e.g. FK constraint that
          was deferred to end-of-statement) or when the statement is finalized
          mid-transaction and the rollback path itself errors.
        throws: >
          Error passed to callback as first argument. The Error.message contains
          the SQLITE_* error code and message. The most common cases are
          SQLITE_CONSTRAINT (deferred constraint failure) and SQLITE_MISUSE
          (double-finalize on an already-finalized statement).
        required_handling: >
          Caller MUST check the err parameter in finalize's callback. Pattern:
            stmt.finalize((err) => {
              if (err) {
                // Deferred constraint failed OR statement already finalized
                throw new Error(`Finalize failed: ${err.message}`);
              }
            });
          Without this check, deferred constraint violations corrupt data
          silently and double-finalize bugs go undetected.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: Statement.run
    import_path: "sqlite3"
    description: >
      Statement instance method (NOT Database#run). Binds parameters and executes
      a prepared statement without finalizing it, enabling repeated execution.
      The statement remains active and reusable. On success the callback's `this`
      is a RunResult exposing lastID and changes. Errors during parameter binding
      or SQL execution are delivered to the callback's err argument.
    postconditions:
      # Evidence:
      #   https://github.com/TryGhost/node-sqlite3/wiki/API (Statement#run)
      #   — "Binds parameters and executes the statement... Errors during parameter
      #     binding or execution trigger the callback with a non-null err object."
      #   node_modules/sqlite3/lib/sqlite3.d.ts:79-81 — confirms callback type
      #   includes Error | null as first argument.
      - id: statement-run-callback-error-ignored
        condition: >
          stmt.run([params,] callback) where the callback does not check its
          err parameter. Unlike db.run (which auto-finalizes a one-off statement),
          a prepared Statement is reused — a swallowed error leaves stale binding
          state and produces wrong results on subsequent calls.
        throws: >
          Error passed to callback as first argument. Includes binding errors
          (SQLITE_RANGE for too many params, SQLITE_MISMATCH for type errors),
          constraint violations (SQLITE_CONSTRAINT), and database-locked errors
          (SQLITE_BUSY). On error, `this.lastID` and `this.changes` are undefined.
        required_handling: >
          Caller MUST check the err parameter. Pattern:
            const stmt = db.prepare('INSERT INTO users VALUES (?, ?)');
            for (const user of users) {
              stmt.run([user.id, user.name], function(err) {
                if (err) {
                  stmt.finalize();
                  throw new Error(`Insert ${user.id} failed: ${err.message}`);
                }
                // this.lastID, this.changes available here
              });
            }
            stmt.finalize();
          Ignoring err in a batch loop silently skips failed inserts and produces
          incomplete writes — a classic silent-data-loss bug.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: statement-run-without-finalize-in-loop
        condition: >
          A prepared statement is run in a loop or repeatedly via stmt.run() but
          never finalized. Each iteration leaves the statement bound to the
          latest params; the underlying sqlite3_stmt accumulates state and
          eventually triggers SQLITE_BUSY on db.close.
        throws: >
          Indirect: leaked sqlite3_stmt holds a transaction handle. db.close()
          callback receives "SQLITE_BUSY: unable to close due to unfinalised
          statements". On a long-running server, this leaks native memory.
        required_handling: >
          Always finalize after the last run(). Pattern:
            const stmt = db.prepare(sql);
            try {
              for (const row of rows) {
                await new Promise((resolve, reject) =>
                  stmt.run(row, err => err ? reject(err) : resolve(null))
                );
              }
            } finally {
              stmt.finalize();
            }
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: map
    import_path: "sqlite3"
    description: >
      Database#map (and the underlying Statement#map). Executes a query and
      returns rows as an object keyed by the first column instead of an array.
      Documented as "Shortcut to Statement#map" and "Returns results as an
      object instead of an array." Internally calls statement.all() and
      transforms rows — meaning execution errors are delivered to the callback's
      err argument, but EMPTY/MISSING data is silently returned as {} with no
      error.
    postconditions:
      # Evidence:
      #   https://github.com/TryGhost/node-sqlite3/wiki/API (Database#map, Statement#map)
      #   — "Returns results as an object instead of an array."
      #   node_modules/sqlite3/lib/sqlite3.js:98-101 (Database.prototype.map):
      #     statement.map.apply(statement, params).finalize();
      #   node_modules/sqlite3/lib/sqlite3.js:120-145 (Statement.prototype.map):
      #     wraps .all() — if rows.length === 0 returns empty {} to callback.
      #     If first column is duplicated across rows, later rows OVERWRITE
      #     earlier ones (the map key collides) — silently lossy.
      - id: map-callback-error-ignored
        condition: >
          db.map(sql, [params,] callback) where callback does not check err.
          Underlying .all() can fail on SQL syntax, SQLITE_BUSY, or SQLITE_NOMEM
          for large result sets — these errors are delivered to map's callback
          but the failure mode (silent {} result) is visually indistinguishable
          from "query succeeded but returned no rows".
        throws: >
          Error passed to callback's first argument. Same error profile as
          Database#all (SQLITE_ERROR, SQLITE_BUSY, SQLITE_NOMEM). On error the
          second argument (result object) is undefined.
        required_handling: >
          Caller MUST check err. Pattern:
            db.map('SELECT id, name FROM users', (err, usersById) => {
              if (err) throw new Error(`Map query failed: ${err.message}`);
              // usersById is { 1: 'alice', 2: 'bob' }
            });
          Ignoring err means a failed query is indistinguishable from a query
          returning no rows — a downstream lookup against `usersById[id]` will
          return undefined and the caller will conclude "user not found"
          instead of surfacing the database error.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: map-key-collision-silent-overwrite
        condition: >
          The first column of the SELECT returns duplicate values across rows.
          Statement#map keys the result object by the first column; later rows
          OVERWRITE earlier rows that share the same key. The callback receives
          err=null and a result object with fewer entries than the row count,
          and no error or warning is logged.
        throws: >
          No error — this is silent data loss by design of the .map() transform.
          The result object contains a subset of rows; the caller has no signal
          that overwrites occurred.
        required_handling: >
          Caller MUST guarantee the first column is unique for the query, OR
          use db.all() to get a row array and group manually. Pattern (safe):
            // BAD — map silently collides:
            db.map('SELECT user_id, action FROM events', (err, actionsByUser) => {
              // Last action per user only — other actions silently lost
            });
            // GOOD — use .all() and group explicitly:
            db.all('SELECT user_id, action FROM events', (err, rows) => {
              if (err) throw err;
              const actionsByUser = {};
              for (const r of rows) {
                (actionsByUser[r.user_id] ||= []).push(r.action);
              }
            });
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  # ───────────────────────────────────────────────────────────────────────────
  # Deepen pass 2026-06-12 (deepen-stream-1 pass 6)
  # Added: Database (constructor open errors), Statement.get
  # Sources: GitHub wiki API + open_close.test.js + prepare.test.js + sqlite.org rescode.html
  # ───────────────────────────────────────────────────────────────────────────

  - name: Database
    import_path: "sqlite3"
    description: >
      Constructor for opening a SQLite database connection. The callback receives
      `(err)` — the err is null on success and a populated Error on open failure.
      Most-frequently-triggered failure modes are SQLITE_CANTOPEN (file not found
      in OPEN_READONLY without OPEN_CREATE; directory doesn't exist; file is a
      directory; symlink with OPEN_NOFOLLOW), SQLITE_PERM (no read/write
      permission on the target file or its parent directory), SQLITE_NOTADB
      (target file is not a SQLite database — common for accidentally pointed
      at a binary, text, or truncated/corrupted file), and SQLITE_CORRUPT (the
      file is a SQLite database but its internal structure has been damaged).
      Critically, on failure the Database object is still returned but is
      unusable — every subsequent run/get/all/exec/prepare on it will emit
      another error event.
    postconditions:
      # Evidence:
      #   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/open_close.test.js
      #     — test: "if (err && err.errno === sqlite3.CANTOPEN)" for missing file
      #       in OPEN_READONLY mode.
      #   https://github.com/TryGhost/node-sqlite3/wiki/API
      #     — "If provided, this function will be called when the database was
      #        opened successfully or when an error occurred. The first argument
      #        is an error object. When it is null, opening succeeded."
      #   https://www.sqlite.org/rescode.html
      #     — SQLITE_CANTOPEN (14), SQLITE_PERM (3), SQLITE_NOTADB (26), SQLITE_CORRUPT (11)
      - id: database-open-cantopen
        condition: >
          Constructor called with a filename that does not exist when mode does
          NOT include OPEN_CREATE, OR filename points to a directory, OR filename
          path is a broken symlink with OPEN_NOFOLLOW, OR the parent directory
          does not exist, OR the process lacks search permission on an ancestor
          directory.
        throws: >
          Error with errno === sqlite3.CANTOPEN (14) passed to the constructor
          callback. The Database object is returned but is unusable — subsequent
          operations will fail with the same error or emit "error" events.
        required_handling: >
          Caller MUST check err in the constructor callback. Pattern:
            const db = new sqlite3.Database('/path/to/data.db', sqlite3.OPEN_READWRITE, (err) => {
              if (err) {
                // err.errno === sqlite3.CANTOPEN means file missing / inaccessible
                throw new Error(`Failed to open database at /path/to/data.db: ${err.message}`);
              }
            });
          Failing to check err is catastrophic: the application proceeds with
          an unusable db handle. Every subsequent db.run/get/all silently emits
          its own error event, and unless an 'error' listener is registered the
          process crashes via the EventEmitter "error" default behavior. This is
          one of the most common production silent-deploy failures with sqlite3
          — a missing data file in production with no clear error chain.
        sources:
          - "https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/open_close.test.js"
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

      - id: database-open-perm
        condition: >
          Constructor called with a filename whose owning user/group lacks the
          requested mode permissions (READONLY needs read; READWRITE needs both
          read and write). Most common when application runs as a non-root user
          but the data file was created by a different user or has restrictive
          umask, or when the parent directory lacks write permission and
          OPEN_CREATE is requested.
        throws: >
          Error with errno === sqlite3.PERM (3) passed to the constructor
          callback. Message typically contains "SQLITE_PERM: access permission
          denied".
        required_handling: >
          Caller MUST check err and surface a clear permission error. Pattern:
            const db = new sqlite3.Database(file, (err) => {
              if (err && err.errno === sqlite3.PERM) {
                throw new Error(`No permission to open ${file} — check file ownership and process user`);
              }
              if (err) throw err;
            });
          In containerized deployments (Docker, Kubernetes), this is one of the
          most common errors at first startup when the data volume is mounted
          with a different uid/gid than the app container's user.
        sources:
          - "https://www.sqlite.org/rescode.html"
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

      - id: database-open-notadb
        condition: >
          Constructor called with a filename that exists and is readable but is
          not a SQLite database file. The file's first 16 bytes do not match the
          SQLite magic header ("SQLite format 3\0"). Common when an application
          accidentally points at a backup .tar.gz, a text file, a truncated
          download, or a previous-format SQLite file (SQLite 2.x).
        throws: >
          Error with errno === sqlite3.NOTADB (26) passed to constructor
          callback. Message contains "SQLITE_NOTADB: file is not a database".
        required_handling: >
          Caller MUST check err in the constructor callback. Pattern:
            const db = new sqlite3.Database(file, (err) => {
              if (err && err.errno === sqlite3.NOTADB) {
                // File exists but is not a SQLite database — wrong path or corrupted download
                throw new Error(`${file} is not a SQLite database file`);
              }
              if (err) throw err;
            });
          DO NOT retry — NOTADB is deterministic; the file content needs to
          change before this will succeed.
        sources:
          - "https://www.sqlite.org/rescode.html"
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: database-open-corrupt
        condition: >
          Constructor called with a filename that IS a SQLite database but whose
          internal pages have been damaged. Typically caused by partial writes
          (process killed during a write), filesystem corruption, copying a hot
          database file without proper backup API, or running out of disk space
          mid-write. The error may surface either at open time or on the first
          read/write that touches the corrupted page.
        throws: >
          Error with errno === sqlite3.CORRUPT (11) passed to the constructor
          callback OR to a subsequent operation's callback. Message contains
          "SQLITE_CORRUPT: database disk image is malformed".
        required_handling: >
          Caller MUST check err in the constructor callback AND treat CORRUPT
          as unrecoverable for the affected database. Pattern:
            const db = new sqlite3.Database(file, (err) => {
              if (err && err.errno === sqlite3.CORRUPT) {
                // Database is damaged — restore from backup, do NOT continue writing
                throw new Error(`Database ${file} is corrupt; restore from backup`);
              }
              if (err) throw err;
            });
          DO NOT continue writing to a CORRUPT database — subsequent writes
          can amplify the damage. Application should fail fast and alert
          operators to restore from a backup or rebuild the database. This is
          why production systems should run `PRAGMA integrity_check` periodically
          and use WAL mode + sqlite_backup() for hot backups.
        sources:
          - "https://www.sqlite.org/rescode.html"
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: Statement.get
    import_path: "sqlite3"
    import_class: "Statement"
    description: >
      Statement instance method (NOT Database#get). Binds parameters to a
      prepared statement and retrieves the next row, calling the callback
      `(err, row)`. Unlike Database#get (which auto-finalizes the underlying
      one-off statement), a prepared Statement is REUSABLE — repeated calls to
      stmt.get() advance the row cursor and keep the underlying sqlite3_stmt
      open. If the callback ignores err, every iteration silently proceeds
      with an undefined row, and the underlying database may be left locked.
    postconditions:
      # Evidence:
      #   https://github.com/TryGhost/node-sqlite3/wiki/API (Statement#get)
      #     — "The signature of the callback is function(err, row) {}"
      #     — "Using this method can leave the database locked, as the database
      #        awaits further calls to Statement#get to retrieve subsequent rows."
      #   node_modules/sqlite3/lib/sqlite3.d.ts:83-85
      #     — get<T>(callback?: (err: Error | null, row?: T) => void): this
      #     — get<T>(params: any, callback?: ..., row?: T) => void): this
      #   https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/prepare.test.js
      #     — canonical pattern: stmt.get(function(err, row) { if (err) throw err; ... })
      - id: statement-get-callback-error-ignored
        condition: >
          stmt.get([params,] callback) where the callback does not check its
          err parameter. Same error profile as Database#get (SQLITE_ERROR for
          syntax, SQLITE_BUSY for lock contention, SQLITE_RANGE for bad
          parameter binding, SQLITE_MISMATCH for type mismatch) BUT the row
          parameter is undefined on error — accessing properties of undefined
          throws TypeError downstream and corrupts the loop state of a long-
          lived prepared statement.
        throws: >
          Error passed to callback as first argument. On error the second
          argument (row) is undefined. The statement is NOT automatically
          finalized — the row cursor remains in an indeterminate state.
        required_handling: >
          Caller MUST check err before using row. Pattern:
            const stmt = db.prepare('SELECT * FROM users WHERE id = ?');
            for (const id of ids) {
              await new Promise((resolve, reject) => {
                stmt.get([id], (err, row) => {
                  if (err) {
                    stmt.finalize();
                    return reject(err);
                  }
                  if (!row) {
                    // No row matched — distinct from error
                    return resolve(null);
                  }
                  resolve(row);
                });
              });
            }
            stmt.finalize();
          Ignoring err in a lookup loop both silently swallows the actual
          database error AND fails to distinguish "row not found" (row ===
          undefined, err === null) from "query failed" (row === undefined,
          err !== null) — they're indistinguishable to a caller that ignores
          err.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
          - "https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/prepare.test.js"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: statement-get-leaves-database-locked
        condition: >
          stmt.get() is called once on a prepared statement and the underlying
          sqlite3_stmt is left mid-cursor (not finalized, not reset, not iterated
          to completion). The Statement#get documentation explicitly warns:
          "Using this method can leave the database locked, as the database
          awaits further calls to Statement#get to retrieve subsequent rows."
        throws: >
          Indirect: the underlying database connection holds a row cursor lock.
          Subsequent writes from the same connection may proceed, but ANOTHER
          process attempting to write to the same database file receives
          SQLITE_BUSY. db.close() will fail with "SQLITE_BUSY: unable to close
          due to unfinalised statements".
        required_handling: >
          Caller MUST either finalize the statement after the last get(), reset
          it for reuse, or iterate to completion. Pattern (single lookup):
            const stmt = db.prepare('SELECT * FROM users WHERE id = ?');
            stmt.get([id], (err, row) => {
              stmt.finalize();   // Release the cursor before exiting
              if (err) throw err;
              handleRow(row);
            });
          Or for reuse across many lookups, finalize once after the last call.
          Long-lived servers that prepare-and-leak statements eventually fail
          to write or close the database.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  # ───────────────────────────────────────────────────────────────────────────
  # Deepen pass 2026-06-23 (deepen-stream-2 pass 9)
  # Added: Statement.each
  # Sources: GitHub wiki API (Statement#each) + sqlite3.d.ts dual-callback shape
  # ───────────────────────────────────────────────────────────────────────────

  - name: Statement.each
    import_path: "sqlite3"
    import_class: "Statement"
    description: >
      Statement instance method (NOT Database#each). Binds parameters to a
      prepared statement and calls the row callback for each result row, then
      optionally calls a completion callback with (err, count) after all rows
      have been delivered. Unlike Database#each — which internally calls
      statement.each().finalize() — the prepared Statement is NOT auto-finalized.
      The wiki explicitly documents two unique requirements that Database#each
      does not have: (1) a cursor-lock warning ("Using this method can leave
      the database locked, as the database awaits further calls to Statement#get
      to retrieve subsequent rows"), and (2) an explicit "you should either
      finalize (with Statement#finalize) or reset (with Statement#reset) the
      statement" requirement. Together these make Statement.each a distinct
      contractual surface from Database.each.
    postconditions:
      # Evidence:
      #   https://github.com/TryGhost/node-sqlite3/wiki/API (Statement#each)
      #     — "Binds parameters, executes the statement and calls the callback
      #        for each result row. The function returns the Statement object
      #        to allow for function chaining."
      #     — Callback signature: function(err, row) {}
      #     — "Using this method can leave the database locked, as the database
      #        awaits further calls to Statement#get to retrieve subsequent rows."
      #     — "To inform the database that you are finished retrieving rows, you
      #        should either finalize (with Statement#finalize) or reset (with
      #        Statement#reset) the statement."
      #     — "After all row callbacks were called, the completion callback will
      #        be called if present. The first argument is an error object, and
      #        the second argument is the number of retrieved rows."
      #   node_modules/sqlite3/lib/sqlite3.d.ts:91-93 — Statement.each signature
      #     confirms dual callback: (err, row) row cb + (err, count) completion cb.
      - id: statement-each-completion-error-ignored
        condition: >
          stmt.each([params,] rowCallback [, completionCallback]) is invoked
          where either (a) the completion callback is omitted entirely, or
          (b) the completion callback's err parameter is not checked. Unlike
          Database#each — which auto-finalizes the underlying one-off statement
          — a prepared Statement is reused, so a swallowed error leaves the
          cursor mid-iteration AND silently drops query errors. The row
          callback also receives err on per-row failures; if it ignores err
          while accessing row.<field>, downstream code corrupts on undefined.
        throws: >
          Error passed to row callback as first argument on per-row failures
          AND passed to completion callback as first argument on overall query
          failures (SQLITE_ERROR for syntax, SQLITE_BUSY for lock contention,
          SQLITE_CONSTRAINT for constraint violations during read locks,
          SQLITE_NOMEM for large result sets). On error the row argument is
          undefined and the count argument in the completion callback is also
          undefined or partial.
        required_handling: >
          Caller MUST check err in BOTH callbacks AND always finalize after
          iteration completes. Pattern:
            const stmt = db.prepare('SELECT id, name FROM users WHERE active = ?');
            stmt.each([true],
              (err, row) => {
                if (err) throw new Error(`Row read failed: ${err.message}`);
                processUser(row);
              },
              (err, count) => {
                stmt.finalize();   // ALWAYS finalize after iteration
                if (err) throw new Error(`Query failed after ${count} rows: ${err.message}`);
              }
            );
          Omitting the completion callback is the most common bug: the query
          error is delivered nowhere and the caller proceeds as if iteration
          completed cleanly. This is structurally identical to the each-
          completion-error-ignored pattern on Database#each (id:
          each-completion-error-ignored on the `each` function), EXCEPT that
          Statement.each ALSO leaks the cursor lock — see the companion
          postcondition statement-each-cursor-not-released.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
          - "https://raw.githubusercontent.com/TryGhost/node-sqlite3/master/test/each.test.js"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: statement-each-cursor-not-released
        condition: >
          stmt.each() is invoked but the underlying sqlite3_stmt is never
          finalized or reset after iteration completes (or aborts on error).
          The wiki is explicit: "Using this method can leave the database
          locked... To inform the database that you are finished retrieving
          rows, you should either finalize (with Statement#finalize) or reset
          (with Statement#reset) the statement." Unlike Database.each (which
          finalizes the auto-created statement internally), a developer-prepared
          Statement holds the row cursor until explicitly released. In a long-
          running server this leaks native sqlite3_stmt handles and eventually
          fails db.close() with SQLITE_BUSY.
        throws: >
          Indirect: the underlying database connection holds a row cursor lock.
          Other connections to the same database file receive SQLITE_BUSY on
          write attempts. db.close() will fail with "SQLITE_BUSY: unable to
          close due to unfinalised statements". The native sqlite3_stmt
          accumulates in the process address space until garbage-collected.
        required_handling: >
          Caller MUST call stmt.finalize() or stmt.reset() after iteration.
          Pattern (single-shot iteration):
            const stmt = db.prepare('SELECT * FROM logs WHERE level = ?');
            stmt.each(
              ['error'],
              (err, row) => {
                if (err) {
                  stmt.finalize();   // Release on error
                  throw err;
                }
                handleRow(row);
              },
              (err, count) => {
                stmt.finalize();     // Release on completion
                if (err) throw err;
              }
            );
          Pattern (reuse across multiple param sets):
            const stmt = db.prepare(sql);
            try {
              for (const params of paramSets) {
                await iterateOnce(stmt, params);   // wraps each + reset
              }
            } finally {
              stmt.finalize();
            }
          Failure to release the cursor is the most common cause of the
          "SQLITE_BUSY: unable to close" error on graceful shutdown.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

