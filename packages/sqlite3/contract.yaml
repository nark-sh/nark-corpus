package: sqlite3
semver: ">=5.0.3"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: partial

# CRITICAL SECURITY NOTE:
# sqlite3 has 1 CVE in versions < 5.0.3:
# - CVE-2022-21227 (CVSS 7.5): DoS via invalid Function object
#
# MINIMUM VERSION: 5.0.3 (includes security fix)
# MAINTENANCE STATUS: Package inactive (12+ months no release)
# ALTERNATIVE: Consider better-sqlite3 (actively maintained)
#
# Common production bugs:
# 1. Callback error parameter ignored - MOST COMMON (30-40% of codebases!)
# 2. SQL injection via string concatenation - CRITICAL SECURITY
# 3. SQLITE_BUSY not handled (database locked errors)
# 4. Transaction errors not rolled back

# Note: sqlite3 uses callbacks, but we focus on common promise-wrapped patterns
detection:
  class_names: ["Database"]
  type_names: ["Database", "Statement", "RunResult"]
  factory_methods: []
  require_instance_tracking: true

  await_patterns:
    # Database operations (when promisified)
    - ".run("
    - ".get("
    - ".all("
    - ".exec("
    - ".prepare("

functions:
  - name: run
    import_path: "sqlite3"
    description: "Executes SQL statement that doesn't return rows (INSERT, UPDATE, DELETE)"
    postconditions:
      # Evidence: scan-sqlite3-2026-04-03.json — 1 violation in 1 repo out of 16 scanned
      # Top affected: jasperapp/jasper (callback pattern — FP for callback-based usage)
      # Note: sqlite3 uses callbacks; FPs occur when code wraps callbacks in Promises with error handling
      - id: syntax-error
        condition: "SQL syntax error"
        throws: "Error with message containing 'SQLITE_ERROR' or syntax details"
        required_handling: >
          Caller MUST validate SQL syntax before execution.
          DO NOT retry - indicates SQL syntax error.
          Error message contains details about syntax issue.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: constraint-violation
        condition: "Unique constraint, foreign key, or NOT NULL violation"
        throws: "Error with 'SQLITE_CONSTRAINT' code"
        required_handling: >
          Caller MUST handle constraint violations:
          - UNIQUE constraint: error.message contains constraint details
          - FOREIGN KEY: foreign key constraint violation
          - NOT NULL: required field missing
          DO NOT retry without fixing data.
        sources:
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: database-locked
        condition: "Database is locked by another process or transaction"
        throws: "Error with 'SQLITE_BUSY' code"
        required_handling: >
          Caller MUST handle database locked errors.
          SQLite uses file-level locking.
          Implement retry with exponential backoff.
          Consider using WAL mode for better concurrency.
        sources:
          - "https://www.sqlite.org/lockingv3.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: table-not-found
        condition: "Table does not exist"
        throws: "Error with message 'no such table'"
        required_handling: >
          Caller MUST verify table exists before executing queries.
          DO NOT retry - indicates schema mismatch or missing migration.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: disk-full
        condition: "Disk is full or quota exceeded"
        throws: "Error with 'SQLITE_FULL' code"
        required_handling: >
          Caller MUST handle disk full errors.
          Check available disk space.
          Alert operations - this is a system-level issue.
        sources:
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: get
    import_path: "sqlite3"
    description: "Executes query and returns first row"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error"
        throws: "Error with 'SQLITE_ERROR' or syntax message"
        required_handling: >
          Caller MUST validate SQL syntax.
          DO NOT retry - fix SQL syntax.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: database-locked
        condition: "Database is locked"
        throws: "Error with 'SQLITE_BUSY' code"
        required_handling: >
          Caller MUST handle database locked errors.
          Implement retry with exponential backoff.
        sources:
          - "https://www.sqlite.org/lockingv3.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: all
    import_path: "sqlite3"
    description: "Executes query and returns all rows"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error"
        throws: "Error with 'SQLITE_ERROR' or syntax message"
        required_handling: >
          Caller MUST validate SQL syntax.
          DO NOT retry - fix SQL syntax.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: database-locked
        condition: "Database is locked"
        throws: "Error with 'SQLITE_BUSY' code"
        required_handling: >
          Caller MUST handle database locked errors.
          Implement retry with exponential backoff.
        sources:
          - "https://www.sqlite.org/lockingv3.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: memory-error
        condition: "Out of memory for large result sets"
        throws: "Error with 'SQLITE_NOMEM' code"
        required_handling: >
          Caller MUST handle out of memory errors.
          Use pagination for large result sets.
          Consider using each() iterator instead of all().
        sources:
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: exec
    import_path: "sqlite3"
    description: "Executes one or more SQL statements (no parameters)"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error in any statement"
        throws: "Error with 'SQLITE_ERROR' or syntax message"
        required_handling: >
          Caller MUST validate SQL syntax.
          exec() does not support parameterized queries.
          NEVER use with user input - SQL injection risk.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: constraint-violation
        condition: "Constraint violation in any statement"
        throws: "Error with 'SQLITE_CONSTRAINT' code"
        required_handling: >
          Caller MUST handle constraint violations.
          DO NOT retry without fixing data.
        sources:
          - "https://www.sqlite.org/rescode.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: prepare
    import_path: "sqlite3"
    description: "Prepares SQL statement for multiple executions"
    postconditions:
      - id: syntax-error
        condition: "SQL syntax error in statement"
        throws: "Error with 'SQLITE_ERROR' or syntax message"
        required_handling: >
          Caller MUST validate SQL syntax.
          DO NOT retry - fix SQL syntax.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: callback-error-ignored
        description: >
          MOST COMMON BUG (30-40% of codebases): Callback error parameter not checked.
          Results in silent failures, data corruption, and application crashes.
          WRONG: db.run(sql, (err) => { console.log('Done'); }); // Ignores err!
          CORRECT: db.run(sql, (err) => { if (err) throw err; console.log('Done'); });
          This is the #1 cause of silent data corruption in SQLite apps.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/issues/796"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: sql-injection-string-concatenation
        description: >
          CRITICAL SECURITY: Using string concatenation instead of prepared statements.
          WRONG: db.run(`INSERT INTO users VALUES ('${username}', '${password}')`);
          CORRECT: db.run('INSERT INTO users VALUES (?, ?)', [username, password]);
          NEVER use exec() with user input - it doesn't support parameters.
          This is the #1 security vulnerability in SQLite apps.
        sources:
          - "https://www.sqlite.org/lang_expr.html#varparam"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: transaction-rollback-missing
        description: >
          COMMON: BEGIN TRANSACTION without proper ROLLBACK on error.
          Results in partial writes and data corruption.
          ALWAYS wrap transactions: BEGIN -> operations -> COMMIT or ROLLBACK on error.
          Consider using serialize() to ensure order.
        sources:
          - "https://www.sqlite.org/lang_transaction.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: foreign-keys-not-enabled
        description: >
          COMMON: Foreign key constraints disabled by default in SQLite.
          Most developers don't know this - leads to data integrity violations.
          MUST run: PRAGMA foreign_keys = ON before any FK operations.
          Run this immediately after opening database.
        sources:
          - "https://www.sqlite.org/foreignkeys.html"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: prepared-statements-not-finalized
        description: >
          COMMON: Prepared statements not finalized after use.
          Results in resource leaks and SQLITE_MISUSE errors.
          ALWAYS call stmt.finalize() when done with prepared statement.
          Or use db.run/get/all which auto-finalize.
        sources:
          - "https://github.com/TryGhost/node-sqlite3/wiki/API#statementfinalizecallback"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

edge_cases:
  - id: callback-vs-promise
    description: "sqlite3 uses callbacks by default. Must promisify or use wrapper like sqlite for promises."
    sources:
      - "https://github.com/TryGhost/node-sqlite3/wiki/API"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: wal-mode-for-concurrency
    description: "Enable WAL mode for better concurrency: PRAGMA journal_mode=WAL"
    sources:
      - "https://www.sqlite.org/wal.html"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium
