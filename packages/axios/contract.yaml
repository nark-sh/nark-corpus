package: axios
semver: '>=1.0.0 <2.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-06'
status: production
evidence_quality: confirmed
coverage_score: 0.91
functions:
  - name: get
    import_path: axios
    description: Makes an HTTP GET request to the specified URL
    preconditions:
      - id: absolute-url-node
        description: URL must be absolute when running in Node.js environments
        sources:
          - https://axios-http.com/docs/req_config
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    postconditions:
      - id: success-2xx
        condition: response status is 2xx
        returns: AxiosResponse object with data, status, statusText, headers, config, and request fields
        sources:
          - https://axios-http.com/docs/res_schema
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: error-4xx-5xx
        condition: response status is 4xx or 5xx and validateStatus is default
        throws: AxiosError with error.response containing the error response
        required_handling: >
          Caller MUST catch AxiosError and check error.response.status to distinguish between client errors (4xx) and
          server errors (5xx).
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: rate-limited-429
        condition: response status is 429 (Too Many Requests)
        throws: AxiosError with error.response.status === 429
        required_handling: >
          Caller MUST either: 1. Implement exponential backoff retry logic with the Retry-After header, OR 2. Explicitly
          handle 429 as a terminal error and surface to the user, OR 3. Use a request queue that respects rate limits.
          Silently catching and ignoring 429 without retry logic is a violation.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
      - id: network-failure
        condition: network error, connection timeout, or DNS resolution failure
        throws: AxiosError with error.request populated but error.response === undefined
        required_handling: >
          Caller MUST check if error.response exists before accessing error.response.status. Network errors have
          error.request but NO error.response property. Code that assumes error.response is always present will crash.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: request-setup-error
        condition: error during request setup (before request is sent)
        throws: AxiosError with both error.request === undefined and error.response === undefined
        required_handling: >
          Caller MUST handle errors where neither error.request nor error.response exist. These are configuration or
          setup errors.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
    edge_cases:
      - id: relative-url-node
        description: Passing relative URLs (e.g., '/api/users') throws error in Node.js but works in browsers
        sources:
          - https://github.com/axios/axios/issues/1212
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: timeout-default-zero
        description: Default timeout is 0 (no timeout). Production code should set explicit timeout values.
        sources:
          - https://axios-http.com/docs/req_config
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: request-cancellation
        description: Cancelled requests throw AxiosError with error.code === 'ERR_CANCELED'
        sources:
          - https://axios-http.com/docs/cancellation
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: post
    import_path: axios
    description: Makes an HTTP POST request to the specified URL with request body
    postconditions:
      - id: success-2xx
        condition: response status is 2xx
        returns: AxiosResponse object
        sources:
          - https://axios-http.com/docs/res_schema
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: error-4xx-5xx
        condition: response status is 4xx or 5xx
        throws: AxiosError with error.response
        required_handling: Caller MUST catch AxiosError and inspect error.response.status
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: rate-limited-429
        condition: response status is 429
        throws: AxiosError with error.response.status === 429
        required_handling: >
          For POST requests, retry logic MUST be idempotency-aware. Either use idempotency keys or handle 429 as
          terminal error.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
      - id: network-failure
        condition: network error, timeout, or DNS failure
        throws: AxiosError with error.response === undefined
        required_handling: Check error.response exists before accessing error.response.status
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
    edge_cases:
      - id: retry-post-idempotency
        description: Retrying POST requests can cause duplicate operations. Use idempotency keys for unsafe operations.
        sources:
          - https://axios-http.com/docs/req_config
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: put
    import_path: axios
    description: Makes an HTTP PUT request to the specified URL
    postconditions:
      - id: error-4xx-5xx
        condition: response status is 4xx or 5xx
        throws: AxiosError
        required_handling: Caller MUST catch AxiosError and inspect error.response.status
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: network-failure
        condition: network error or timeout
        throws: AxiosError with error.response === undefined
        required_handling: Check error.response exists before accessing error.response.status
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
  - name: delete
    import_path: axios
    description: Makes an HTTP DELETE request to the specified URL
    postconditions:
      - id: error-4xx-5xx
        condition: response status is 4xx or 5xx
        throws: AxiosError
        required_handling: Caller MUST catch AxiosError and inspect error.response.status
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: network-failure
        condition: network error or timeout
        throws: AxiosError with error.response === undefined
        required_handling: Check error.response exists before accessing error.response.status
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
    edge_cases:
      - id: retry-delete-idempotency
        description: DELETE is idempotent by HTTP spec, but implementations may vary. Verify your API's behavior.
        sources:
          - https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/DELETE
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: request
    import_path: axios
    description: Makes an HTTP request with full config object (generic method)
    postconditions:
      - id: error-4xx-5xx
        condition: response status is 4xx or 5xx
        throws: AxiosError with error.response
        required_handling: >-
          Caller MUST catch AxiosError and check error.response.status to distinguish between client errors (4xx) and
          server errors (5xx)
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: rate-limited-429
        condition: response status is 429 (Too Many Requests)
        throws: AxiosError with error.response.status === 429
        required_handling: >
          Caller MUST either: 1. Implement exponential backoff retry logic with the Retry-After header, OR 2. Explicitly
          handle 429 as a terminal error and surface to the user, OR 3. Use a request queue that respects rate limits.
          For non-idempotent methods (POST), ensure retry safety with idempotency keys.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
      - id: network-failure
        condition: network error or timeout
        throws: AxiosError with error.response === undefined
        required_handling: >-
          Caller MUST check if error.response exists before accessing properties. Network errors have error.request but
          NO error.response property.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: request-setup-error
        condition: error during request setup (before request is sent)
        throws: AxiosError with both error.request === undefined and error.response === undefined
        required_handling: >
          Caller MUST handle errors where neither error.request nor error.response exist. These are configuration or
          setup errors (e.g., invalid URL, unsupported protocol).
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
  - name: patch
    import_path: axios
    description: >
      Makes an HTTP PATCH request to the specified URL. Used for partial updates to a resource. Internally delegates to
      axios.request() with method:'patch'. Error behavior is identical to post/put. NOTE: axios does NOT automatically
      retry PATCH requests (only GET, PUT, HEAD, DELETE, OPTIONS, TRACE are retried by default interceptor-based retry
      libraries).
    postconditions:
      - id: patch-error-4xx-5xx
        condition: response status is 4xx or 5xx and validateStatus is default
        throws: AxiosError with error.response containing status, headers, and body
        required_handling: >
          Caller MUST catch AxiosError and check error.response.status to distinguish client errors (4xx) from server
          errors (5xx). Do not retry 4xx without user intervention (except 408, 413, 429).
        sources:
          - https://axios-http.com/docs/handling_errors
          - https://axios-http.com/docs/api_intro
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
      - id: patch-rate-limited-429
        condition: response status is 429 (Too Many Requests)
        throws: AxiosError with error.response.status === 429
        required_handling: >
          Caller MUST implement exponential backoff with the Retry-After header. For PATCH (partial updates), retrying
          is often safe if the operation is idempotent, but verify with the API's idempotency guarantees. Silently
          catching and ignoring 429 without retry is a violation.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: degraded_service
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
      - id: patch-network-failure
        condition: network error, timeout (ETIMEDOUT/ECONNABORTED), or DNS failure (ERR_NETWORK)
        throws: >-
          AxiosError with error.request populated but error.response === undefined; error.code is ETIMEDOUT,
          ECONNABORTED, or ERR_NETWORK
        required_handling: >
          Caller MUST check if error.response exists before accessing error.response.status. Network errors populate
          error.request (the raw http.ClientRequest) but NOT error.response. Code that assumes error.response is always
          present will crash with TypeError.
        sources:
          - https://axios-http.com/docs/handling_errors
          - https://github.com/axios/axios/blob/v1.x/lib/core/AxiosError.js
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
    edge_cases:
      - id: patch-no-auto-retry
        description: >
          axios does NOT automatically retry PATCH requests. Only GET, PUT, HEAD, DELETE, OPTIONS, and TRACE are
          included in default retry configurations used by axios-retry and similar libraries. PATCH failures must be
          retried manually if needed.
        sources:
          - https://github.com/softonic/axios-retry#readme
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: patch-idempotency
        description: >
          PATCH is NOT idempotent by HTTP spec (RFC 5789). Each PATCH may produce different results if applied multiple
          times (e.g., JSON Patch operations like increment). Use idempotency keys if retrying is required.
        sources:
          - https://datatracker.ietf.org/doc/html/rfc5789
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: head
    import_path: axios
    description: >
      Makes an HTTP HEAD request to the specified URL. Identical to GET but the server MUST NOT include a response body.
      Used to check resource existence, get headers (Content-Length, Content-Type, Last-Modified, ETag) without
      downloading the body, and validate cache freshness. Returns AxiosResponse with data === ''.
    postconditions:
      - id: head-error-4xx-5xx
        condition: server responds with 4xx or 5xx and validateStatus is default
        throws: AxiosError with error.response (status, headers) but error.response.data === ''
        required_handling: >
          Caller MUST catch AxiosError and check error.response.status. NOTE: error.response.data is always an empty
          string for HEAD responses (the server sends no body). Do not attempt to parse error body for HEAD requests.
        sources:
          - https://axios-http.com/docs/handling_errors
          - https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/HEAD
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: head-network-failure
        condition: network error, connection timeout, or DNS failure
        throws: AxiosError with error.request populated but error.response === undefined
        required_handling: >
          Caller MUST check error.response exists before accessing it. Network errors do not populate error.response —
          accessing error.response.status will throw TypeError: Cannot read properties of undefined.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    edge_cases:
      - id: head-empty-response-body
        description: >
          axios.head() always returns AxiosResponse with data === '' (empty string). This is correct per RFC 9110: the
          server MUST NOT send a body in HEAD responses. Callers checking response.data for error messages will always
          get empty string; inspect response.headers instead (e.g., x-error-code, x-error-message).
        sources:
          - https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/HEAD
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: head-use-case-existence-check
        description: >
          Common pattern: use HEAD to check resource existence (404 = not found) before fetching with GET. If the HEAD
          request fails for any reason, do not assume the resource doesn't exist — catch the error and handle
          explicitly.
        sources:
          - https://axios-http.com/docs/api_intro
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: postForm
    import_path: axios
    description: >
      Shorthand for POST with Content-Type preset to multipart/form-data. Automatically serializes plain JavaScript
      objects and File/Blob/Buffer values into FormData format. Identical error behavior to axios.post() with additional
      serialization-specific failure modes. Used for file uploads and form submissions.
    postconditions:
      - id: postform-error-4xx-5xx
        condition: server responds with 4xx or 5xx and validateStatus is default
        throws: AxiosError with error.response containing status and body
        required_handling: >
          Caller MUST catch AxiosError and inspect error.response.status. File upload failures (413 Payload Too Large,
          415 Unsupported Media Type, 422 Unprocessable Entity) are common and must be handled explicitly.
        sources:
          - https://axios-http.com/docs/handling_errors
          - https://axios-http.com/docs/multipart
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
      - id: postform-payload-too-large-413
        condition: server responds with 413 Payload Too Large
        throws: AxiosError with error.response.status === 413
        required_handling: >
          Caller MUST handle 413 explicitly for file upload flows. Options: 1. Check file size before upload and reject
          files exceeding the limit. 2. Split large files into chunks and upload in parts. 3. Surface a specific error
          to the user ("File too large, max 10MB"). Silently catching 413 causes silent upload failure with no user
          feedback.
        sources:
          - https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/413
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
      - id: postform-network-failure
        condition: network error, connection timeout, or DNS failure during upload
        throws: AxiosError with error.request populated but error.response === undefined
        required_handling: >
          Caller MUST check error.response exists before accessing it. File uploads are more susceptible to network
          timeouts (large payloads). Consider setting an explicit timeout and implementing retry with resume capability.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
      - id: postform-serialization-error
        condition: FormData serialization fails due to incompatible or circular data
        throws: AxiosError with error.code === 'ERR_BAD_REQUEST' or native TypeError from serializer
        required_handling: >
          Caller SHOULD validate data before passing to postForm. Circular references in nested objects will throw
          during serialization (before any network request). Custom visitor functions (config.formSerializer) that throw
          will surface as unhandled exceptions if not wrapped in try-catch.
        sources:
          - https://axios-http.com/docs/multipart
          - https://github.com/axios/axios/blob/v1.x/lib/core/AxiosError.js
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
    edge_cases:
      - id: postform-content-type-override
        description: >
          axios.postForm() presets Content-Type: multipart/form-data. The browser (or Node.js form-data library)
          automatically appends the multipart boundary string. Manually overriding Content-Type in headers will break
          multipart parsing on the server because the boundary won't be included. Let axios set this header.
        sources:
          - https://axios-http.com/docs/multipart
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: putForm
    import_path: axios
    description: >
      Shorthand for PUT with Content-Type preset to multipart/form-data. Automatically serializes data into FormData.
      Semantically: replace the entire resource (idempotent). Error behavior is identical to postForm — see postForm for
      detailed error docs.
    postconditions:
      - id: putform-error-4xx-5xx
        condition: server responds with 4xx or 5xx
        throws: AxiosError with error.response
        required_handling: >
          Caller MUST catch AxiosError. For file replacement flows, handle 413 (file too large) and 415 (unsupported
          media type) explicitly. PUT is idempotent, so retrying is safe for network failures but will replace the
          resource again.
        sources:
          - https://axios-http.com/docs/handling_errors
          - https://axios-http.com/docs/multipart
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
      - id: putform-network-failure
        condition: network error or timeout
        throws: AxiosError with error.response === undefined
        required_handling: >
          Caller MUST check error.response exists. PUT is idempotent — retrying after network failure is safe and
          recommended, but verify the server has not already processed the request (check with HEAD or GET before
          retrying).
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
  - name: patchForm
    import_path: axios
    description: >
      Shorthand for PATCH with Content-Type preset to multipart/form-data. Used for partial resource updates that
      include file fields. Error behavior is identical to postForm. NOTE: PATCH is NOT idempotent — retrying may cause
      duplicate operations.
    postconditions:
      - id: patchform-error-4xx-5xx
        condition: server responds with 4xx or 5xx
        throws: AxiosError with error.response
        required_handling: >
          Caller MUST catch AxiosError. Handle 413 (file too large) and 415 (unsupported media type) explicitly. PATCH
          is not guaranteed idempotent — do not blindly retry without understanding the server's idempotency semantics.
        sources:
          - https://axios-http.com/docs/handling_errors
          - https://axios-http.com/docs/multipart
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
      - id: patchform-network-failure
        condition: network error or timeout
        throws: AxiosError with error.response === undefined
        required_handling: >
          Caller MUST check error.response exists before accessing. Do not blindly retry patchForm on network failure —
          PATCH may not be idempotent. Use idempotency keys or check state before retrying.
        sources:
          - https://axios-http.com/docs/handling_errors
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
