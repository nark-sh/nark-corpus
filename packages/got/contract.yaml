package: got
semver: ">=12.0.0"
contract_version: "2.0.0"
maintainer: corpus-team
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed

# Error class hierarchy (all extend RequestError which extends Error):
#   RequestError         — base: any request failure (code = ECONNREFUSED, ETIMEDOUT, etc.)
#     HTTPError          — non-2xx/3xx response (code = ERR_NON_2XX_3XX_RESPONSE)
#     MaxRedirectsError  — >10 redirects (code = ERR_TOO_MANY_REDIRECTS)
#     TimeoutError       — request aborted due to timeout (event = 'connect'|'request'|etc.)
#     ReadError          — failure reading from response stream
#     CacheError         — cache adapter failure
#     UploadError        — failure reading from request body stream
#     RetryError         — manual retry trigger (always triggers a new retry)
#     AbortError         — aborted via AbortController (code = ERR_ABORTED)
#   CancelError          — promise cancelled via .cancel() (Promise API only)
#
# throwHttpErrors (default: true):
#   When true:  4xx/5xx → throws HTTPError
#   When false: 4xx/5xx → resolves with response (no throw)
#
# Retry defaults: limit=2, methods=[GET,PUT,HEAD,DELETE,OPTIONS,TRACE], NOT POST/PATCH
#   Status codes retried: 408, 413, 429, 500, 502, 503, 504, 521, 522, 524
#   Network codes retried: ETIMEDOUT, ECONNRESET, EADDRINUSE, ECONNREFUSED, EPIPE, ENOTFOUND, ENETUNREACH, EAI_AGAIN
#   After retries exhausted → throws RequestError or HTTPError
#
# Stream API (got.stream()): Returns a Duplex stream, NOT a Promise.
#   Errors are emitted as 'error' events, not Promise rejections.
#   Requires .on('error', handler) — not try-catch on await.
#
# got.extend(): Creates new Got instance inheriting all defaults. Identical error behavior.
#   Extended instances (and instances of extended instances) throw the same error types.

detection:
  factory_methods:
    - default
    - extend

functions:
  - name: default
    import_path: got
    description: >
      Makes an HTTP request (default method GET). Returns a CancelableRequest (Promise).
      Throws on network failures, timeouts, and HTTP errors (4xx/5xx) by default.
    postconditions:
      - id: http-error
        condition: >
          Server responds with a non-2xx, non-3xx status code and throwHttpErrors is true (default).
        throws: HTTPError with code ERR_NON_2XX_3XX_RESPONSE; error.response contains the full response
        required_handling: >
          Caller MUST wrap in try-catch (async/await) or .catch() (promise chain).
          Inspect error.response.statusCode to distinguish client vs server errors.
          Do not retry 4xx errors without user intervention (except 408, 413, 429).
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: network-error
        condition: >
          Network-level failure: DNS resolution failure (ENOTFOUND, EAI_AGAIN), connection refused
          (ECONNREFUSED), connection reset (ECONNRESET), timeout (ETIMEDOUT), no route (ENETUNREACH),
          or pipe broken (EPIPE). This is thrown after all retries are exhausted.
        throws: RequestError with a POSIX error code (e.g. ECONNREFUSED, ETIMEDOUT, ENOTFOUND)
        required_handling: >
          Caller MUST wrap in try-catch. Check error.code for specific network condition.
          Got retries these automatically (limit=2 by default) before throwing — the thrown error
          is from the final attempt. Implement additional retry logic only if default retry is disabled.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: timeout-error
        condition: One of the timeout limits (connect, send, response, request, etc.) was exceeded.
        throws: >
          TimeoutError (subclass of RequestError) with error.event indicating which phase timed out
          (e.g. 'connect', 'request', 'response'). Code is ETIMEDOUT.
        required_handling: >
          Caller MUST wrap in try-catch. Check error.event to understand which phase timed out.
          ETIMEDOUT is in the default retry error codes — Got will retry before throwing.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: max-redirects-error
        condition: "The server redirected more than maxRedirects times (default: 10)."
        throws: "MaxRedirectsError (subclass of RequestError) with code ERR_TOO_MANY_REDIRECTS"
        required_handling: >
          Caller MUST wrap in try-catch. This indicates a redirect loop or misconfigured server.
          Do not retry automatically.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: throw-http-errors-false
        description: >
          When throwHttpErrors: false is set, 4xx and 5xx responses do NOT throw HTTPError.
          Instead the promise resolves with the response object. Callers must check
          response.statusCode manually. Network errors (RequestError, TimeoutError, etc.)
          still throw regardless of this setting.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/2-options.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: retry-does-not-cover-post
        description: >
          By default, got does NOT retry POST or PATCH requests. Only GET, PUT, HEAD, DELETE,
          OPTIONS, and TRACE are retried. The final error from a failed POST is thrown immediately
          after the first failure (no automatic retry).
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/7-retry.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: get
    import_path: got
    description: Makes an HTTP GET request. Returns a CancelableRequest (Promise).
    postconditions:
      - id: http-error
        condition: Server responds with non-2xx/3xx status and throwHttpErrors is true (default).
        throws: HTTPError with error.response containing status code and body
        required_handling: Caller MUST wrap in try-catch or .catch(). Check error.response.statusCode.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: network-error
        condition: DNS failure, connection refused, connection reset, timeout, or unreachable network (after retries).
        throws: RequestError (or subclass TimeoutError) with a POSIX error code
        required_handling: >
          Caller MUST wrap in try-catch. GET is in the default retry methods list — got will
          retry up to 2 times before throwing.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

