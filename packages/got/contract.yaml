  - name: stream
    import_path: got
    description: >
      Returns a Duplex stream (NOT a Promise). Sets isStream: true internally.
      Errors are emitted as 'error' events on the stream — they do NOT reject a Promise.
      The stream also emits 'request', 'response', 'redirect', 'uploadProgress', 'downloadProgress'.
    postconditions:
      - id: stream-error-event
        condition: >
          Any error occurs during the request: network failure, timeout, HTTP error (when
          throwHttpErrors is true), read error, or upload error.
        throws: >
          RequestError or subclass is emitted as an 'error' event on the stream.
          This is NOT a Promise rejection. Without an error listener, Node.js will
          throw an uncaught exception and crash the process.
        required_handling: >
          Caller MUST attach an 'error' event listener: stream.on('error', handler).
          Using try-catch around got.stream() does NOT catch these errors.
          When piping, the error listener must be on the got stream itself, not just the
          destination stream.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/3-streams.md
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: stream-no-retry
        description: >
          When using the Stream API, the beforeRetry hook is ignored. Retries do not
          apply to the Stream API in the same way as the Promise API.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/3-streams.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: stream-http-errors
        description: >
          HTTPError (non-2xx/3xx response) is still emitted as an 'error' event on the stream
          when throwHttpErrors is true (default). Set throwHttpErrors: false to suppress this
          and receive the error response body through the stream.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/3-streams.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: paginate
    import_path: got
    description: >
      Returns an AsyncIterableIterator that yields items across paginated responses.
      Internally makes multiple got() requests. Also has got.paginate.all() which returns
      Promise<T[]>. Errors propagate from the underlying got() requests.
    postconditions:
      - id: paginate-http-error
        condition: >
          Any paginated request receives a non-2xx/3xx response and throwHttpErrors is true (default).
        throws: HTTPError from the failing request; iteration stops immediately
        required_handling: >
          Caller MUST wrap the for-await-of loop in try-catch.
          got.paginate.all() returns a Promise and must be wrapped in try-catch.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/4-pagination.md
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: paginate-network-error
        condition: Any paginated request fails with a network error (after retries).
        throws: RequestError or subclass; iteration stops immediately
        required_handling: >
          Caller MUST wrap the for-await-of loop (or got.paginate.all() await) in try-catch.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/4-pagination.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: extend
    import_path: got
    description: >
      Creates a new Got instance with merged default options. The returned instance has
      identical method signatures (get, post, put, patch, delete, head, stream, paginate, extend).
      All error behavior is identical to the base got instance.
    postconditions:
      - id: inherited-http-error
        condition: >
          Any request on the extended instance receives a non-2xx/3xx response
          and throwHttpErrors is true (default, unless overridden in extend options).
        throws: HTTPError — same as base got
        required_handling: >
          Caller MUST wrap in try-catch or .catch(). Extended instances inherit all retry
          and error-throwing behavior from their parent. Check error.response.statusCode.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/10-instances.md
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: inherited-network-error
        condition: Any request on the extended instance fails with a network error (after retries).
        throws: RequestError or subclass — same as base got
        required_handling: Caller MUST wrap in try-catch. Error behavior is identical to base got.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/10-instances.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
