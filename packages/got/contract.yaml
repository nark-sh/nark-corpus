      - id: upload-error
        condition: The request body is a stream and an error occurs reading from that stream.
        throws: UploadError (subclass of RequestError)
        required_handling: Caller MUST wrap in try-catch. Validate body stream before sending.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
