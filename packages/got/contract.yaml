      - id: network-error
        condition: DNS failure, connection refused, connection reset, timeout, or unreachable network.
        throws: RequestError or TimeoutError with POSIX error code
        required_handling: >
          Caller MUST wrap in try-catch. NOTE: POST is NOT in got's default retry methods list,
          so the error is thrown after the first failure with no automatic retry.
        sources:
          - https://github.com/sindresorhus/got/blob/main/documentation/8-errors.md
        severity: error
        business_impact:
