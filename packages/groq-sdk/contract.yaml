        condition: >
          groq.files.list() called without try-catch
        throws: >
          Groq.APIError subclasses: AuthenticationError (401), RateLimitError (429),
          InternalServerError (5xx), APIConnectionError (network)
        required_handling: >
          Caller MUST wrap in try-catch. Listing failures in cleanup/audit cron jobs
          should be surfaced rather than swallowed — silent failures leave orphaned
          batch files accumulating against the 100MB-per-file storage limit.
        sources:
          - "https://console.groq.com/docs/batch"
          - "https://console.groq.com/docs/errors"
        severity: error
        evidence_quality: confirmed
