  - name: create
    import_path: "groq-sdk"
    namespace: "batches"
    description: >
      Submits a batch of chat completion requests for asynchronous processing.
      Requires a file_id referencing an uploaded JSONL file (via files.create).
      Batch jobs run asynchronously — results are not returned immediately.
      Used via groq.batches.create(). Groq's batch API is structurally identical
      to OpenAI's batch API.

    postconditions:
      # Evidence: https://console.groq.com/docs/batch
      # Error types confirmed from groq-sdk source: Groq.APIError hierarchy
      - id: groq-batches-no-try-catch
        condition: >
          groq.batches.create() called without try-catch
        throws: >
          Groq.APIError subclasses: BadRequestError (400, invalid file_id or params),
          AuthenticationError (401), RateLimitError (429), InternalServerError (5xx),
          APIConnectionError (network)
        required_handling: >
          Caller MUST wrap in try-catch. File validation failures (malformed JSONL,
          wrong content-type, non-existent file_id) throw immediately. Network errors
          also throw. Unhandled rejections crash the caller.
        sources:
          - "https://console.groq.com/docs/batch"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: groq-batches-result-not-checked
        condition: >
          Batch submitted but result status not polled or individual request_counts.failed
          not checked after completion
        throws: >
          Does not throw — errors are returned as per-item error objects in the JSONL
          results file. The batch itself may "complete" with individual failures silently
          buried in the results file.
        required_handling: >
          After batch completion, caller MUST retrieve results via files.content() and
          parse each line. Each line has a response.status_code — non-200 lines are
          individual failures that MUST be handled. Checking only that the batch
          completed (status == "completed") is insufficient.
        sources:
          - "https://console.groq.com/docs/batch"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: create
    import_path: "groq-sdk"
    namespace: "files"
    description: >
      Uploads a file to Groq for use in batch inference. Accepts JSONL files
      containing batch completion requests. File is stored server-side and
      referenced by file_id in subsequent batches.create() calls.
      Used via groq.files.create().

    postconditions:
      # Evidence: https://console.groq.com/docs/batch
      # Error types confirmed from groq-sdk source: Groq.APIError hierarchy
      - id: groq-files-upload-no-try-catch
        condition: >
          groq.files.create() called without try-catch
        throws: >
          Groq.APIError subclasses: BadRequestError (400, invalid file format or
          JSONL content errors), AuthenticationError (401), RateLimitError (429),
          InternalServerError (5xx), APIConnectionError (network)
        required_handling: >
          Caller MUST wrap in try-catch. JSONL validation errors (malformed lines,
          wrong format) and network errors both throw. File creation returns a
          FileCreateResponse with an id field — callers must capture this id for
          subsequent batches.create() calls.
        sources:
          - "https://console.groq.com/docs/batch"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: groq-files-id-not-used
        condition: >
          files.create() result file id not stored or passed to batches.create()
        throws: >
          Does not throw at files.create() time. Downstream batches.create() will
          throw BadRequestError (400) with an invalid file_id.
        required_handling: >
          Caller MUST capture the returned FileCreateResponse.id and use it as
          the input_file_id in the subsequent batches.create() call. Discarding
          the return value makes the upload useless and the batch will fail.
        sources:
          - "https://console.groq.com/docs/batch"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: cancel
    import_path: "groq-sdk"
    namespace: "batches"
    description: >
      Cancels a running batch job by batchID. Returns the updated batch object
      with status "cancelling" or "cancelled". Used via groq.batches.cancel().
      Useful for cost control — cancelling a large batch before completion avoids
      processing charges for remaining requests.

    postconditions:
      # Evidence: https://console.groq.com/docs/batch
      - id: groq-batches-cancel-no-try-catch
        condition: >
          groq.batches.cancel() called without try-catch
        throws: >
          Groq.APIError subclasses: NotFoundError (404, invalid or expired batchID),
          AuthenticationError (401), InternalServerError (5xx), APIConnectionError
        required_handling: >
          Caller MUST wrap in try-catch. NotFoundError is common when the batch has
          already completed or expired. Cancellation during webhook/callback flows
          should handle the "already completed" case explicitly.
        sources:
          - "https://console.groq.com/docs/batch"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: retrieve
    import_path: "groq-sdk"
    namespace: "batches"
    description: >
      Retrieves a batch by batchID. Returns the current BatchRetrieveResponse with
      status, request_counts, and error_file_id when applicable. Used to poll batch
      progress after batches.create(). Used via groq.batches.retrieve(batchID).
      Added in v0.3.x; surface unchanged through v1.3.0.

    postconditions:
      # Evidence: package/resources/batches.d.ts (groq-sdk@1.3.0):
      #   retrieve(batchID: string, options?: RequestOptions): APIPromise<BatchRetrieveResponse>
      # Error surface from package/core/error.d.ts — every API method on Groq throws
      # APIError subclasses on non-2xx responses (see makeStatusError in client.d.ts:133).
      - id: groq-batches-retrieve-no-try-catch
        condition: >
          groq.batches.retrieve() called without try-catch
        throws: >
          Groq.APIError subclasses: NotFoundError (404, invalid or expired batchID),
          AuthenticationError (401), RateLimitError (429), InternalServerError (5xx),
          APIConnectionError (network)
        required_handling: >
          Caller MUST wrap in try-catch. Poll loops are the dominant usage pattern —
          unhandled NotFoundError on a batchID that has expired (Groq batches expire
          after 7 days per docs) crashes the polling worker. RateLimitError on a tight
          polling loop is also common; back off using err.headers['retry-after'].
        sources:
          - "https://console.groq.com/docs/batch"
          - "https://console.groq.com/docs/errors"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

