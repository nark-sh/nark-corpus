  - name: delete
    import_path: "groq-sdk"
    namespace: "files"
    description: >
      Deletes a file by fileID. Returns a FileDeleteResponse indicating success.
      Used via groq.files.delete(fileID). Common in batch-cleanup workflows after
      batches.retrieve() shows status="completed".

    postconditions:
      # Evidence: package/resources/files.d.ts (groq-sdk@1.3.0):
      #   delete(fileID: string, options?: RequestOptions): APIPromise<FileDeleteResponse>
      - id: groq-files-delete-no-try-catch
        condition: >
          groq.files.delete() called without try-catch
        throws: >
          Groq.APIError subclasses: NotFoundError (404, fileID already deleted or
          never existed), AuthenticationError (401), ConflictError (409, file is
          referenced by an active batch), InternalServerError (5xx), APIConnectionError
        required_handling: >
          Caller MUST wrap in try-catch. NotFoundError on idempotent delete loops
          (deleting a file already removed by an earlier cleanup) is common — handle
          it explicitly as a success-equivalent rather than swallowing all errors.
          ConflictError indicates the file is still in use by a batch — block deletion
          until batches.list() confirms no active batch references it.
        sources:
          - "https://console.groq.com/docs/batch"
          - "https://console.groq.com/docs/errors"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low

  - name: content
    import_path: "groq-sdk"
    namespace: "files"
    description: >
      Returns the binary contents of a file as a fetch Response. Used via
      groq.files.content(fileID) to retrieve batch-output JSONL after a batch
      completes (output_file_id from the BatchRetrieveResponse). The return type
      is a raw Response — callers MUST call .text() or .body stream to read content,
      which itself can fail.

    postconditions:
      # Evidence: package/resources/files.d.ts (groq-sdk@1.3.0):
      #   content(fileID: string, options?: RequestOptions): APIPromise<Response>
      - id: groq-files-content-no-try-catch
        condition: >
          groq.files.content() called without try-catch
        throws: >
          Groq.APIError subclasses: NotFoundError (404, invalid fileID),
          AuthenticationError (401), RateLimitError (429), InternalServerError (5xx),
          APIConnectionError (network), APIConnectionTimeoutError (timeout on large
          batch-output downloads)
        required_handling: >
          Caller MUST wrap in try-catch. Batch-output files can be large (up to
          100MB) and downloads time out under poor network conditions — wrap the
          entire .content() call AND the subsequent .text()/.body stream consumption
          in the same try-catch since stream errors can also throw mid-read. Failure
          to retrieve batch output means the batch results are LOST until the file
          expires, even though the batch itself completed successfully.
        sources:
          - "https://console.groq.com/docs/batch"
          - "https://console.groq.com/docs/errors"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      - id: groq-files-content-response-not-consumed
        condition: >
          files.content() Response not consumed via .text(), .json(), or .body
          stream — return value discarded or only checked for .ok / .status
        throws: >
          Does not throw. The Response body is left unconsumed, leading to
          memory leaks and (in some fetch implementations) keeping the connection
          open until the abort signal fires.
        required_handling: >
          Caller MUST consume the Response body (await .text(), .json(), or read
          .body as a stream). Discarding the return value of files.content() means
          the batch-output JSONL never reaches the caller — silent data loss.
          Even on error paths (response.ok === false), call .text() to read the
          error body before discarding.
        sources:
          - "https://developer.mozilla.org/en-US/docs/Web/API/Response"
          - "https://console.groq.com/docs/batch"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  - name: info
    import_path: "groq-sdk"
    namespace: "files"
    description: >
      Returns file metadata (id, bytes, created_at, filename, purpose) for the
      given fileID. Used via groq.files.info(fileID). Useful for verifying upload
      size before submitting a batch.

    postconditions:
      # Evidence: package/resources/files.d.ts (groq-sdk@1.3.0):
      #   info(fileID: string, options?: RequestOptions): APIPromise<FileInfoResponse>
      - id: groq-files-info-no-try-catch
        condition: >
          groq.files.info() called without try-catch
        throws: >
          Groq.APIError subclasses: NotFoundError (404, invalid fileID),
          AuthenticationError (401), RateLimitError (429), InternalServerError (5xx),
          APIConnectionError (network)
        required_handling: >
          Caller MUST wrap in try-catch. NotFoundError on a fileID that the upstream
          code thought existed indicates a race condition (file deleted between
          create and info call) — surface as a user-visible error rather than
          swallowing.
        sources:
          - "https://console.groq.com/docs/batch"
          - "https://console.groq.com/docs/errors"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: retrieve
    import_path: "groq-sdk"
    namespace: "models"
    description: >
      Retrieves a model by its id. Returns a Model object with id, created,
      object, and owned_by. Used via groq.models.retrieve(modelID). Common in
      model-availability check flows before submitting a chat completion.

    postconditions:
      # Evidence: package/resources/models.d.ts (groq-sdk@1.3.0):
      #   retrieve(model: string, options?: RequestOptions): APIPromise<Model>
      - id: groq-models-retrieve-no-try-catch
        condition: >
          groq.models.retrieve() called without try-catch
        throws: >
          Groq.APIError subclasses: NotFoundError (404, model id does not exist
          or has been deprecated by Groq), AuthenticationError (401),
          RateLimitError (429), InternalServerError (5xx), APIConnectionError
        required_handling: >
          Caller MUST wrap in try-catch. Groq deprecates models on a rolling
          basis — NotFoundError on a hardcoded model id is the dominant
          production failure mode for long-lived deployments. Handle it as
          "model unavailable, fall back to default" rather than crashing.
        sources:
          - "https://console.groq.com/docs/models"
          - "https://console.groq.com/docs/deprecations"
          - "https://console.groq.com/docs/errors"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: list
    import_path: "groq-sdk"
    namespace: "models"
    description: >
      Lists all available models. Returns a ModelListResponse with data array of
      Model objects. Used via groq.models.list(). Common in dynamic model-picker
      UIs and at startup to discover currently-available models (Groq deprecates
      models on rolling basis).

    postconditions:
      # Evidence: package/resources/models.d.ts (groq-sdk@1.3.0):
      #   list(options?: RequestOptions): APIPromise<ModelListResponse>
      - id: groq-models-list-no-try-catch
        condition: >
          groq.models.list() called without try-catch
        throws: >
          Groq.APIError subclasses: AuthenticationError (401), RateLimitError (429),
          InternalServerError (5xx), APIConnectionError (network)
        required_handling: >
          Caller MUST wrap in try-catch. Models-list failures at startup should
          fall back to a hardcoded known-good list rather than crashing the app —
