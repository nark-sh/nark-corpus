notes:
  - "groq-sdk throws exceptions on API failures (unlike Resend which uses { data, error } pattern)"
  - "SDK auto-retries: maxRetries=2 by default — error thrown only after retries exhausted"
  - "Streaming (stream: true) errors can be thrown mid-iteration in for-await loops"
  - "Groq does NOT charge for 5xx errors — safe to retry with exponential backoff"
  - "RateLimitError includes retry-after header in err.headers for backoff timing"
  - "AuthenticationError (401) should never be retried — configuration error"
  - "groq-sdk API is structurally identical to openai SDK — same deep chain patterns"
  - "Batch API requires two-step workflow: files.create() then batches.create()"
  - "Batch results are per-item JSONL — batch 'completed' status does not mean all items succeeded"
  - "v1.3.0 (2026-06-17): full v1.x surface covered — adds batches.retrieve/list, files.list/delete/content/info, models.retrieve/list/delete to the previously contracted set"
  - "models.retrieve / models.list: Groq deprecates models on rolling basis — production code should not hardcode model ids without fallback"
  - "files.content returns a raw fetch Response — callers must consume the body (.text()/.json()/.body stream) or the batch results are lost"
  - "files.delete: ConflictError (409) when file is still referenced by an active batch — block delete until batches.list() confirms no active refs"
