# Top affected: nbonamy/witsy (⭐ 1916), okisdev/ChatChat (⭐ 1275)

functions:
  - name: create
    import_path: "groq-sdk"
    description: >
      Creates a chat completion via the Groq inference API. Supports both standard and
      streaming responses. Used via groq.chat.completions.create(). All network/API
      errors are thrown — the SDK does NOT swallow them.

    postconditions:
      # Evidence: seen in 4 primary firings across 2 repos in scan-groq-sdk-2026-04-02.json
      # Top affected: nbonamy/witsy (⭐ 1916), okisdev/ChatChat (⭐ 1275)
      - id: api-error
        condition: >
          Any API or network failure: rate limit (429), auth error (401), bad request (400),
          server error (5xx), network timeout, or connection failure
        throws: >
          Groq.APIError subclass: RateLimitError (429), AuthenticationError (401),
          BadRequestError (400), InternalServerError (5xx), APIConnectionError (network),
          APIConnectionTimeoutError (timeout)
        required_handling: >
          Caller MUST wrap in try-catch. The SDK retries automatically (default maxRetries=2)
          but throws on final failure. Uncaught errors will crash the caller or produce
          unhandled promise rejections in production.

          Minimum handling:
            try {
              const completion = await groq.chat.completions.create({ ... });
            } catch (err) {
              if (err instanceof Groq.RateLimitError) { /* backoff */ }
              else if (err instanceof Groq.APIError) { /* log and surface */ }
              else throw err;
            }

          For streaming (stream: true), the try-catch must wrap the entire for-await loop
          as errors can be thrown mid-stream.
        sources:
          - "https://console.groq.com/docs/errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: create
    import_path: "groq-sdk"
    namespace: "audio.transcriptions"
    description: >
      Transcribes audio to text using Whisper models. Requires file upload + model selection.
      Used via groq.audio.transcriptions.create(). Combines I/O (file read) with network call.

    postconditions:
      - id: api-error
        condition: >
          Network failure, invalid file format, unsupported model, or API error
        throws: >
          Groq.APIError or subclass (BadRequestError for invalid format/model,
          InternalServerError for server-side failures, APIConnectionError for network)
        required_handling: >
          Caller MUST wrap in try-catch. File format errors (e.g., wrong extension,
          corrupt audio) and network errors both surface as thrown exceptions.
          Log error with file metadata for debugging.
        sources:
          - "https://console.groq.com/docs/speech-text"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: create
