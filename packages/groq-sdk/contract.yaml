  - name: delete
    import_path: "groq-sdk"
    namespace: "models"
    description: >
      Deletes a fine-tuned model owned by the organization. Returns a ModelDeleted
      response. Used via groq.models.delete(modelID). Only applicable to
      organization-owned fine-tuned models (cannot delete Groq's built-in models).

    postconditions:
      # Evidence: package/resources/models.d.ts (groq-sdk@1.3.0):
      #   delete(model: string, options?: RequestOptions): APIPromise<ModelDeleted>
      - id: groq-models-delete-no-try-catch
        condition: >
          groq.models.delete() called without try-catch
        throws: >
          Groq.APIError subclasses: NotFoundError (404, model id does not exist
          or already deleted), PermissionDeniedError (403, attempting to delete a
          Groq-owned built-in model), AuthenticationError (401),
          InternalServerError (5xx), APIConnectionError (network)
        required_handling: >
          Caller MUST wrap in try-catch. PermissionDeniedError on a built-in model
          id (e.g. attempting to delete "llama-3.3-70b-versatile") indicates a bug
          in the calling code — surface as a hard error, do NOT silently swallow.
          NotFoundError on idempotent delete loops is success-equivalent.
        sources:
          - "https://console.groq.com/docs/models"
          - "https://console.groq.com/docs/errors"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

