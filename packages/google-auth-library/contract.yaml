package: google-auth-library
semver: ">=8.0.0 <11.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-16"
coverage_status: covered
status: production
evidence_quality: confirmed

# Detection rules for analyzer integration
detection:
  # How this package is instantiated
  class_names:
    - OAuth2Client
    - GoogleAuth
    - JWT
    - UserRefreshClient
    - IdTokenClient

  # Type declarations that indicate a variable holds a google-auth-library instance
  type_names:
    - OAuth2Client
    - GoogleAuth
    - IdTokenClient
    - JWT
    - AuthClient
    - Credentials
    - GetTokenResponse

functions:
  - name: OAuth2Client.getToken
    import_path: "google-auth-library"
    description: >
      Exchanges an OAuth2 authorization code for access/refresh tokens.
      Throws GaxiosError on network failure, invalid_grant, invalid_client,
      or any HTTP error from the Google OAuth2 endpoint.

    postconditions:
      - id: get-token-unprotected
        condition: >
          Async call to getToken() is not wrapped in a try-catch block.
          A GaxiosError will be thrown if the authorization code is invalid,
          expired, already used, or if there is a network failure.
        throws: GaxiosError
        required_handling: >
          Caller MUST wrap await client.getToken() in a try-catch block.
          GaxiosError is thrown on invalid_grant (expired/already used code),
          invalid_client (bad credentials), network failures, and 5xx errors.
          Uncaught errors will crash the OAuth callback route and leave the
          user unable to authenticate.
        sources:
          - "https://raw.githubusercontent.com/googleapis/google-auth-library-nodejs/main/README.md"
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html"
        severity: error
        # Evidence: seen in 1 primary firing across 1 repo in scan-google-auth-library-2026-04-02.json
        # Top affected: google/clasp (⭐ 5545)
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: OAuth2Client.getTokenInfo
    import_path: "google-auth-library"
    description: >
      Validates an access token and returns token metadata.
      Documentation explicitly states: "This method will throw if the token is invalid."
      Also throws GaxiosError on network failure.

    postconditions:
      - id: get-token-info-unprotected
        condition: >
          Async call to getTokenInfo() is not wrapped in a try-catch block.
          Documentation states this method will throw if the token is invalid.
          Also throws GaxiosError on network failure.
        throws: Error
        required_handling: >
          Caller MUST wrap await client.getTokenInfo() in a try-catch block.
          The documentation explicitly states the method throws if the token is invalid.
          This is commonly called immediately after getToken() to validate scopes,
          and missing error handling means an invalid token crashes the auth flow.
        sources:
          - "https://raw.githubusercontent.com/googleapis/google-auth-library-nodejs/main/README.md"
        severity: error
        # Evidence: Called without try-catch in gitroomhq/postiz-app (⭐ 27,547) — from prior research
        # Not seen in scan-google-auth-library-2026-04-02.json (low repo coverage)
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: GoogleAuth.getClient
    import_path: "google-auth-library"
    description: >
      Loads application default credentials (ADC) from environment, keyfile,
      or metadata server. Throws Error if no credentials are found.

    postconditions:
      - id: get-client-unprotected
        condition: >
          Async call to auth.getClient() is not wrapped in a try-catch.
          Throws Error('Could not load the default credentials') when no ADC
          is available. Common in server-side code that assumes credentials
          are configured.
        throws: Error
        required_handling: >
          Caller MUST wrap await auth.getClient() in a try-catch block.
          Throws with message 'Could not load the default credentials' when
          GOOGLE_APPLICATION_CREDENTIALS is not set and the server is not
          running on GCP. Missing error handling causes unhandled exceptions
          at server startup or request time.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html"
        severity: warning
        # Evidence: seen in 5 primary firings across 1 repo in scan-google-auth-library-2026-04-02.json
        # Top affected: firebase/firebase-admin-node (⭐ 1726)
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: OAuth2Client.verifyIdToken
    import_path: "google-auth-library"
    description: >
      Verifies a Google ID token (from Google Sign-In, Google One Tap, or
      Firebase Auth) by fetching Google's signing certificates and checking
      the signature, expiry, issuer, and audience. Called in OAuth callback
      routes to validate tokens from the frontend. Throws synchronously
      on invalid token structure and asynchronously on network failure or
      token verification errors.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/OAuth2Client.html
      # Source confirmed: oauth2client.js lines 527-787 (throw statements)
      - id: verify-id-token-unprotected
        condition: >
          Async call to client.verifyIdToken() is not wrapped in a try-catch.
          Throws on: (1) missing/empty idToken — Error('The verifyIdToken method
          requires an ID Token'); (2) cert fetch failure — GaxiosError on network
          error fetching Google certs; (3) signature mismatch — Error('Invalid
          token signature: ...'); (4) token expiry — Error('Token used too late,
          ...'); (5) audience mismatch — Error('Wrong recipient, payload audience
          != requiredAudience'); (6) invalid issuer — Error('Invalid issuer,
          expected one of [...]').
        throws: "Error | GaxiosError"
        required_handling: >
          Caller MUST wrap await client.verifyIdToken({ idToken, audience }) in a
          try-catch block. Common in Google Sign-In routes where the frontend sends
          an ID token for server-side validation. An uncaught exception means the
          user cannot log in and the route crashes. Distinguish token validation
          errors (user-facing: 'Invalid token') from network errors (retry-able).
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/OAuth2Client.html"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

  - name: OAuth2Client.refreshAccessToken
    import_path: "google-auth-library"
    description: >
      Refreshes an expired OAuth2 access token using the stored refresh token.
      Called in background jobs, cron tasks, and server-side API proxies to
      ensure tokens stay valid. Throws immediately if no refresh token is set
      (before any network call), or GaxiosError if Google's token endpoint
      rejects the refresh.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/OAuth2Client.html
      # Source confirmed: oauth2client.js line 240 ('No refresh token is set.')
      # and line 262 (GaxiosError re-throw on refresh failure)
      - id: refresh-access-token-unprotected
        condition: >
          Async call to client.refreshAccessToken() is not wrapped in a try-catch.
          Throws Error('No refresh token is set.') when client.credentials.refresh_token
          is absent — common when users authenticate with access_type:'online' (default)
          instead of 'offline'. Also throws GaxiosError when Google's token endpoint
          returns invalid_grant (refresh token expired/revoked), invalid_client
          (bad client credentials), or network failure.
        throws: "Error | GaxiosError"
        required_handling: >
          Caller MUST wrap await client.refreshAccessToken() in a try-catch block.
          Handle Error message 'No refresh token is set.' as a configuration error
          (offline access was not requested). Handle GaxiosError.response.data.error
          === 'invalid_grant' as a revoked/expired refresh token requiring user to
          re-authenticate. Unhandled exceptions in token refresh background tasks
          cause cascading API call failures without alerting.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/OAuth2Client.html"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: OAuth2Client.getAccessToken
    import_path: "google-auth-library"
    description: >
      Returns the current access token, automatically refreshing if it is
      expired. Unlike refreshAccessToken(), getAccessToken() handles the
      expiry check internally. Throws when no credentials are available
      (neither access token nor refresh token/handler), or propagates
      errors from the underlying refresh operation.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/OAuth2Client.html
      # Source confirmed: oauth2client.js line 314 ('No refresh token or refresh handler callback is set.')
      # and line 319 ('Could not refresh access token.')
      - id: get-access-token-unprotected
        condition: >
          Async call to client.getAccessToken() is not wrapped in a try-catch.
          Throws Error('No refresh token or refresh handler callback is set.') when
          neither credentials.refresh_token nor refreshHandler callback is configured.
          Also throws Error('Could not refresh access token.') when the underlying
          refresh attempt fails. Commonly called in middleware and API proxy helpers
          where missing error handling causes every downstream API request to fail.
        throws: "Error | GaxiosError"
        required_handling: >
          Caller MUST wrap await client.getAccessToken() in a try-catch block.
          The Error message 'No refresh token or refresh handler callback is set.'
          indicates incomplete OAuth configuration — the user must re-authenticate
          with access_type:'offline'. The error 'Could not refresh access token.'
          wraps GaxiosError and should be retried or re-authenticated.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/OAuth2Client.html"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: GoogleAuth.getApplicationDefault
    import_path: "google-auth-library"
    description: >
      Retrieves Application Default Credentials (ADC) along with the project ID.
      Alternative to getClient() — returns both credential and projectId in one
      call. Throws the same 'Could not load the default credentials' error as
      getClient() when no ADC is available. Commonly used in middleware and
      initialization code outside Google infrastructure.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html
      # Source confirmed: googleauth.js line 284 (NO_ADC_FOUND constant message)
      - id: get-application-default-unprotected
        condition: >
          Async call to auth.getApplicationDefault() is not wrapped in a try-catch.
          Throws Error with message 'Could not load the default credentials. Browse
          to https://cloud.google.com/docs/authentication/getting-started for more
          information.' when (1) GOOGLE_APPLICATION_CREDENTIALS env var is not set,
          (2) no well-known credentials file exists (~/.config/gcloud/), and (3) the
          server is not running on GCP. Also throws RangeError when API keys and
          credentials are combined (mutually exclusive).
        throws: "Error | RangeError"
        required_handling: >
          Caller MUST wrap await auth.getApplicationDefault() in a try-catch block.
          Distinguish Error('Could not load the default credentials') — configuration
          error requiring GOOGLE_APPLICATION_CREDENTIALS — from network errors during
          GCE metadata server checks. Commonly uncaught in server initialization code,
          causing crash-on-startup rather than a startup-time warning.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: GoogleAuth.getIdTokenClient
    import_path: "google-auth-library"
    description: >
      Creates an IdTokenClient that fetches Google ID tokens for service-to-service
      authentication (e.g., calling Cloud Run, Cloud Functions with audience-based
      auth). Throws an Error when the underlying credential type does not support
      ID tokens — specifically when running outside GCP and using user credentials
      (OAuth2) instead of service account credentials.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html
      # Source confirmed: googleauth.js line 776 ('Cannot fetch ID token in this environment...')
      - id: get-id-token-client-unprotected
        condition: >
          Async call to auth.getIdTokenClient(targetAudience) is not wrapped in a
          try-catch. Throws Error('Cannot fetch ID token in this environment, use
          GCE or set the GOOGLE_APPLICATION_CREDENTIALS environment variable to a
          service account credentials JSON file.') when the current credentials are
          user credentials (OAuth2) rather than service account or Compute Engine
          credentials. Common pattern: code works in production on GCP but crashes
          locally where developers use user credentials from gcloud auth login.
        throws: Error
        required_handling: >
          Caller MUST wrap await auth.getIdTokenClient(audience) in a try-catch.
          Error message 'Cannot fetch ID token in this environment' indicates the
          credential type is wrong — check that GOOGLE_APPLICATION_CREDENTIALS points
          to a service account key file or that the runtime is GCP Compute Engine.
          This error commonly surfaces in CI environments where gcloud user credentials
          are active but the app expects service account credentials.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: GoogleAuth.getProjectId
    import_path: "google-auth-library"
    description: >
      Retrieves the Google Cloud project ID from environment variables, credentials
      file, gcloud config, or GCE metadata server. Throws when no project ID can
      be found — common in non-GCP environments and CI/CD pipelines that omit
      project configuration.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html
      # Source confirmed: googleauth.js line 168 (NO_PROJECT_ID_FOUND constant)
      - id: get-project-id-unprotected
        condition: >
          Async call to auth.getProjectId() is not wrapped in a try-catch.
          Throws Error with message 'Unable to detect a Project Id in the current
          environment. To fix this, include the project ID when creating the
          GoogleAuth constructor or set the GCLOUD_PROJECT or GOOGLE_CLOUD_PROJECT
          environment variables.' when project ID cannot be found from any source.
          Common in local development, Docker containers, and CI environments where
          GCLOUD_PROJECT env var is not set.
        throws: Error
        required_handling: >
          Caller MUST wrap await auth.getProjectId() in a try-catch block.
          Set GOOGLE_CLOUD_PROJECT environment variable or pass projectId to
          GoogleAuth constructor. The error message includes a URL to documentation.
          Missing handling causes unhandled exceptions in initialization flows
          that assume GCP context is available.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: GoogleAuth.sign
    import_path: "google-auth-library"
    description: >
      Signs data using the current service account's private key, or calls the
      IAM API to sign if running on GCE. Used for creating signed URLs, verifying
      webhook signatures, and custom authentication flows. Throws immediately when
      no client_email is available in the credentials (i.e., user credentials
      instead of service account credentials).

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html
      # Source confirmed: googleauth.js line 878 ('Cannot sign data without `client_email`.')
      - id: sign-unprotected
        condition: >
          Async call to auth.sign(data) is not wrapped in a try-catch.
          Throws Error('Cannot sign data without `client_email`.') when the current
          credentials are user credentials (OAuth2) or missing client_email — common
          when using Application Default Credentials in environments where gcloud auth
          login (user credentials) is active instead of a service account key file.
          Also throws GaxiosError when the IAM signBlob API call fails (on GCE).
        throws: "Error | GaxiosError"
        required_handling: >
          Caller MUST wrap await auth.sign(data) in a try-catch block.
          Error('Cannot sign data without client_email') requires using service account
          credentials rather than user credentials. For GCE environments, ensure the
          service account has roles/iam.serviceAccountTokenCreator permission to use
          signBlob API. Unhandled errors in signed URL generation break file uploads
          and download flows silently.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: JWT.authorize
    import_path: "google-auth-library"
    description: >
      Explicitly fetches an access token for a JWT (service account) client by
      signing a JWT assertion and exchanging it at Google's OAuth2 token endpoint.
      Throws GaxiosError when the token endpoint rejects the request — caused by
      invalid private key, wrong scopes, or permission denied. Also throws if the
      service account email or private key is missing from the JSON credentials.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/JWT.html
      # Source confirmed: jwtclient.js + gtoken/getToken.js — GaxiosError re-thrown
      # with formatted error message from Google token endpoint response
      - id: jwt-authorize-unprotected
        condition: >
          Async call to jwtClient.authorize() is not wrapped in a try-catch.
          Throws GaxiosError when Google's token endpoint (https://oauth2.googleapis.com/token)
          returns an error — e.g. invalid_grant (wrong service account email), unauthorized_client
          (service account not authorized for domain-wide delegation), or access_denied (API not
          enabled in project). Error message is reformatted to include 'error: error_description'
          from the response body. Also throws Error('A key or a keyFile must be provided')
          from JWT.getCredentials() if key material is missing.
        throws: "GaxiosError | Error"
        required_handling: >
          Caller MUST wrap await jwtClient.authorize() in a try-catch block.
          Parse error.message for token endpoint error codes — 'invalid_grant' indicates
          service account does not exist, 'unauthorized_client' indicates missing IAM
          permission, 'access_denied' indicates the API is not enabled. Unhandled errors
          in service account initialization silently fail all downstream Google API calls.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/JWT.html"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: JWT.fetchIdToken
    import_path: "google-auth-library"
    description: >
      Fetches a Google ID token for a specific target audience using a JWT service
      account client. Used for service-to-service authentication when calling Cloud
      Run, Cloud Functions, or other Google Cloud services that require identity
      verification. Unlike JWT.authorize() which fetches an access token for Google
      APIs, fetchIdToken() fetches an audience-scoped ID token. Throws GaxiosError
      when the token endpoint rejects the request, and Error when the token cannot
      be derived from the response.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/JWT.html
      # Source confirmed: jwtclient.js fetchIdToken() — calls gtoken.getToken({forceRefresh:true})
      # getToken.js: GaxiosError re-thrown with reformatted message 'error: error_description'
      # jwtclient.js line: throw new Error('Unknown error: Failed to fetch ID token')
      - id: jwt-fetch-id-token-unprotected
        condition: >
          Async call to jwtClient.fetchIdToken(targetAudience) is not wrapped in a
          try-catch block. Throws GaxiosError when Google's token endpoint
          (https://oauth2.googleapis.com/token) rejects the JWT assertion — e.g.,
          invalid_grant (service account does not exist or key is revoked), access_denied
          (API not enabled in project), or network failure. Error message is reformatted
          to include 'error: error_description' from the OAuth response. Also throws
          Error('Unknown error: Failed to fetch ID token') when the token endpoint
          responds but does not return an idToken field.
        throws: "GaxiosError | Error"
        required_handling: >
          Caller MUST wrap await jwtClient.fetchIdToken(audience) in a try-catch block.
          This is commonly used in service-to-service authentication middleware where
          unhandled token fetch failures silently break all downstream calls to Cloud
          Run or Cloud Functions. Parse error.message for OAuth error codes —
          'invalid_grant' indicates the service account key is invalid or revoked,
          'access_denied' indicates a missing IAM permission. Retry GaxiosError network
          failures; treat invalid_grant as a credential configuration error requiring
          key rotation.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/JWT.html"
          - "https://github.com/googleapis/google-auth-library-nodejs/blob/main/samples/idtokens-serverless.js"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: GoogleAuth.fromStream
    import_path: "google-auth-library"
    description: >
      Creates a credential client by reading and parsing a JSON credentials file
      from a readable stream. Used to load service account keys from strings,
      buffers, or secret manager responses in cloud environments where credentials
      are delivered as streams rather than files. Throws immediately when no stream
      is provided, and propagates stream read errors and JSON parse failures.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html
      # Source confirmed: googleauth.js fromStreamAsync() — line 543:
      #   throw new Error('Must pass in a stream containing the Google auth settings.')
      #   .on('error', reject) propagates stream read errors
      #   JSON.parse() failure propagates if keyFilename fallback is also absent
      - id: from-stream-unprotected
        condition: >
          Async call to auth.fromStream(inputStream) is not wrapped in a try-catch block.
          Throws Error('Must pass in a stream containing the Google auth settings.') when
          null or undefined is passed as the stream argument. Also propagates any stream
          read errors (e.g., network stream dropped mid-read) via the .on('error') handler.
          JSON.parse() failures propagate as SyntaxError if keyFilename fallback is absent.
          Commonly used in initialization code that loads credentials from Google Secret
          Manager or AWS Secrets Manager, where stream errors are often silently swallowed.
        throws: "Error | SyntaxError"
        required_handling: >
          Caller MUST wrap await auth.fromStream(stream) in a try-catch block.
          Validate that the stream argument is non-null before calling. Handle SyntaxError
          for invalid JSON credentials (common when secrets are rotated to an unexpected
          format). Handle stream read errors separately — these are often transient network
          errors that warrant retry. Unhandled errors in credential loading cause all
          downstream Google API calls to fail with 'No credentials found'.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: GoogleAuth.getCredentials
    import_path: "google-auth-library"
    description: >
      Returns the credential body (client_email, private_key, universe_domain) for
      the current auth client. On GCE, fetches the service account email from the
      metadata server. Throws when credentials cannot be found in any source —
      neither jsonContent, nor the metadata server, nor an external credential client.
      Commonly used to get the service account email for IAM operations, logging, or
      token verification.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html
      # Source confirmed: googleauth.js getCredentialsAsync() line 726:
      #   throw new Error(GoogleAuthExceptionMessages.NO_CREDENTIALS_FOUND)
      #   where NO_CREDENTIALS_FOUND = 'Unable to find credentials in current environment...'
      #   Also propagates GaxiosError from _checkIsGCE() metadata server call on GCE
      - id: get-credentials-unprotected
        condition: >
          Async call to auth.getCredentials() is not wrapped in a try-catch block.
          Throws Error('Unable to find credentials in current environment. To learn more
          about authentication and Google APIs, visit: https://cloud.google.com/docs/authentication/getting-started')
          when (1) no JSON credentials are loaded, (2) not running on GCE, and (3) no
          external account client is configured. Also propagates GaxiosError from the
          GCE metadata server call if running in a restricted environment where metadata
          server access is blocked.
        throws: "Error | GaxiosError"
        required_handling: >
          Caller MUST wrap await auth.getCredentials() in a try-catch block.
          Error('Unable to find credentials in current environment') indicates the auth
          client has no credentials loaded — ensure GOOGLE_APPLICATION_CREDENTIALS is set
          or credentials were loaded via fromStream()/fromJSON(). The GaxiosError from
          metadata server access is typically a network error in locked-down environments.
          Commonly used in logging/monitoring code where missing credentials is silently
          ignored, causing NullPointerError-style failures downstream.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/GoogleAuth.html"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Impersonated.fetchIdToken
    import_path: "google-auth-library"
    description: >
      Fetches a Google ID token for an impersonated service account using the IAM
      Credentials API (generateIdToken endpoint). Used in multi-tenant architectures
      where a primary service account impersonates secondary accounts to call Cloud
      Run, Cloud Functions, or other audience-restricted services. Calls both
      sourceClient.getAccessToken() and then the IAM Credentials API — both can fail.
      Error messages are reformatted to include IAM status codes and messages.

    postconditions:
      # Evidence: https://googleapis.dev/nodejs/google-auth-library/latest/classes/Impersonated.html
      # Source confirmed: impersonated.js fetchIdToken() — calls:
      #   1. await this.sourceClient.getAccessToken()  [throws if source token fails]
      #   2. await this.sourceClient.request(POST iamcredentials.googleapis.com/v1/.../generateIdToken)
      # refreshToken() error handler reformats: error.message = `${status}: unable to impersonate: ${message}`
      # Common IAM errors: PERMISSION_DENIED (roles/iam.serviceAccountTokenCreator missing),
      #   NOT_FOUND (target SA doesn't exist), INVALID_ARGUMENT (audience format invalid)
      - id: impersonated-fetch-id-token-unprotected
        condition: >
          Async call to impersonatedClient.fetchIdToken(targetAudience) is not wrapped in
          a try-catch block. Makes two network calls: (1) sourceClient.getAccessToken()
          which throws GaxiosError on source credential failure; (2) IAM Credentials API
          POST to generateIdToken which throws GaxiosError with reformatted message
          'PERMISSION_DENIED: unable to impersonate: ...' when the source SA lacks
          roles/iam.serviceAccountTokenCreator on the target SA, 'NOT_FOUND: unable to
          impersonate: ...' when targetPrincipal does not exist, or 'INVALID_ARGUMENT'
          for malformed audience URLs.
        throws: GaxiosError
        required_handling: >
          Caller MUST wrap await impersonatedClient.fetchIdToken(audience) in a try-catch
          block. Check error.message for IAM status prefix ('PERMISSION_DENIED', 'NOT_FOUND',
          'INVALID_ARGUMENT') to distinguish misconfigured IAM roles from nonexistent service
          accounts. PERMISSION_DENIED requires granting roles/iam.serviceAccountTokenCreator
          on the target service account. This is commonly used in cross-service auth middleware
          where a single uncaught error blocks all requests to impersonated services.
        sources:
          - "https://googleapis.dev/nodejs/google-auth-library/latest/classes/Impersonated.html"
          - "https://cloud.google.com/iam/docs/reference/credentials/rest/v1/projects.serviceAccounts/generateIdToken"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

