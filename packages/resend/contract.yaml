  # Deepen pass 2026-06-12 (deepen-stream-2 pass 3)
  # API surface expanded from Resend v3 (~10 methods) to v6.12.4 (~70+ methods)
  # across 17 sub-clients. Added 6 high-impact send/create/update/verify methods.
  # Sources: node_modules/resend/dist/index.d.mts (v6.12.4 type declarations)
