# Resend SDK v2+ returns { data, error } — does NOT throw exceptions for API failures.
# Unlike Stripe/Twilio, try-catch alone is insufficient — must check result.error.
# Network errors are caught by SDK and returned as error.name = 'application_error'.
# Rate limit: 5 req/sec per team across all API keys. Returns error.name='rate_limit_exceeded', statusCode=429.
# Domain verification required: unverified from address returns error.name = 'invalid_from_address'.
# Idempotency: re-sending same email creates a new email_id — no built-in deduplication.
# EXCEPTION: webhooks.verify() is the ONLY method that THROWS (WebhookVerificationError from standardwebhooks).
# All other Resend methods return { data, error } — webhooks.verify() is categorically different.
package: resend
semver: ">=3.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 15 contracted / 15 high-impact contractable (after 2026-06-24 deepen-stream-3 pass 74)
# Effective coverage: 15 contracted / 15 contractable = 1.0
# Raw coverage against 73-method surface = 15/73 = 0.21 — but 58 admin/read-only
# methods are intentionally omitted (their generic { data, error } silent-failure
# mode is fully covered by the generic postcondition pattern).
# API surface re-enumerated 2026-06-24 against resend@6.14.0 (v6.13.0 added the
# new ContactImports class — 3 methods: create/list/get; v6.14.0 added no new
# public API surface beyond v6.13.0). Originally enumerated against v3.x with
# ~10 methods; v6 now exposes 73+ methods across 18 sub-clients.
#
# Depth pass 2026-06-24 (deepen-stream-3 pass 74):
# +1 function: contacts.imports.create (new in resend@6.13.0 — bulk CSV
# contact ingest; HIGH-impact silent-failure risk because a failed import
# means the marketing list silently never populates). contacts.imports.list
# and contacts.imports.get added to the omitted read-only list.
# Coverage: 14/14 -> 15/15 = 1.0 (effective). Raw surface grew from 70 to 73.
#
# Depth pass 2026-06-11 (deepen-stream-1 pass 7):
# +2 functions: events.send, automations.stop
# Rationale: these were the 2 high-impact functions identified but not written
# during the 2026-06-12 pass (which left coverage at 12/14 = 0.86). Both are
# control-plane mutations where silent failure is uniquely dangerous because
# the downstream signal is absent (events.send: missed automation triggers
# leave contacts silently dropped from drip funnels; automations.stop: failed
# stop during incident response leaves the offending automation spamming
# customers while the operator believes it is halted).
#
# Depth pass 2026-06-12 (deepen-stream-2 pass 3):
# +6 functions: emails.create, emails.update, batch.create, domains.verify,
#               broadcasts.create, webhooks.create
# Rationale: v6.x SDK expansion added create() aliases for send()-style methods
# (REST naming convention) and exposed 3 new high-impact admin operations
# (emails.update for scheduled-email rescheduling, domains.verify for domain
# verification gating, webhooks.create for webhook subscription management).
# All 6 return { data, error } and have the same silent-failure mode as the
# previously-contracted methods.
# Intentionally omitted (~50+ admin/read-only methods): GET/list operations
# across all sub-clients (apiKeys.list/remove, automations.list/get/update/remove,
# automationRuns.*, contactProperties.*, contactSegments.*, contactTopics.*,
# contactImports.list/get (added 2026-06-24 pass 74 — read-only inspection of
# the import job created by contacts.imports.create), domains.list/get/update/remove,
# segments.*, templates.list/get/update/remove,
# topics.*, events.list/get/remove, logs.*, broadcasts.list/get/update/remove,
# webhooks.list/get/update/remove, receiving.*, attachments.*) — admin/management
# ops with no unique error contract beyond the generic { data, error } pattern
# already documented under emails-cancel-no-error-check.
# Sources confirmed:
#   package/dist/index.d.mts (resend@6.14.0 type declarations — re-inspected 2026-06-24)
#   https://github.com/resend/resend-node/releases/tag/v6.13.0 (ContactImports added)
#   https://resend.com/docs/api-reference/errors (full error code table)
#   https://resend.com/docs/api-reference/emails/update-email
#   https://resend.com/docs/api-reference/domains/verify-domain
