  - name: emails.create
    import_path: "resend"
    description: >
      Alias for emails.send() — added in Resend SDK v5.x as a more REST-conventional
      method name. Identical behavior, identical signature, identical return shape
      ({ data, error }). Same silent-failure mode: returns { data: null, error: ErrorResponse }
      on API failure. Common in newer codebases that prefer .create() over .send()
      naming for consistency with other resources (contacts.create, broadcasts.create).
    postconditions:
      # Evidence: node_modules/resend/dist/index.d.mts:1610 — declares
      #   create(payload: CreateEmailOptions, options?: CreateEmailRequestOptions): Promise<CreateEmailResponse>
      # CreateEmailResponse type confirms same { data, error } shape as send().
      # Source: https://resend.com/docs/api-reference/emails/send-email
      - id: emails-create-no-error-check
        condition: >
          emails.create() called without checking result.error — API failure, rate
          limit, unverified domain, or network error returns { data: null, error:
          ErrorResponse } silently. Behaviorally identical to emails.send() — the
          underlying HTTP POST /emails endpoint is the same.
        throws: >
          Does not throw. Returns { data: null, error: { name, message, statusCode } } on failure.
          Same error vocabulary as emails.send(): invalid_from_address (422),
          validation_error (400/403), monthly_quota_exceeded (429), rate_limit_exceeded (429),
          missing_required_field (422), restricted_api_key (401), application_error (500).
        required_handling: >
          Caller MUST check result.error after every emails.create() call. Same
          patterns as emails.send():
            const { data, error } = await resend.emails.create({...});
            if (error) { handle error; }
          OR wrap in try-catch as defensive double-check.
          DO NOT return result.data without checking result.error first.
        sources:
          - "https://resend.com/docs/api-reference/emails/send-email"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: emails.update
    import_path: "resend"
    description: >
      Updates a scheduled email (modifies scheduled_at timestamp before send). Only
      works on emails with status='scheduled'. Returns { data, error } — does NOT
      throw. Returns error if the email ID is not found, the email was already sent,
      or the API key lacks permission. Used in workflows that reschedule reminders
      or delay drip campaigns based on user activity. Silent failure here means
      the schedule update is silently ignored and the original send time is used.
    postconditions:
      # Evidence: node_modules/resend/dist/index.d.mts:1613 — declares
      #   update(payload: UpdateEmailOptions): Promise<UpdateEmailResponse>
      # UpdateEmailOptions accepts { id, scheduledAt }; UpdateEmailResponse is Response<UpdateEmailResponseSuccess>
      # (the standard { data, error } envelope).
      # Source: https://resend.com/docs/api-reference/emails/update-email
      # Error vocabulary from https://resend.com/docs/api-reference/errors
      - id: emails-update-no-error-check
        condition: >
          emails.update() called without checking result.error — silent failure if
          email_id not found (404 not_found), email already sent (validation_error 400),
          API key restricted (401 restricted_api_key), or scheduled_at format invalid
          (422 validation_error).
        throws: >
          Does not throw. Returns { data: null, error: { name, message, statusCode } } on failure.
          Common errors:
          - name='not_found' (404) — email_id does not exist or was already sent
          - name='validation_error' (400) — email is not in scheduled state (already sent/queued/canceled)
          - name='restricted_api_key' (401) — API key only has sending_access, not full_access
          - name='validation_error' (422) — scheduled_at not a valid ISO timestamp
        required_handling: >
          Caller MUST check result.error after every emails.update() call:
            const { data, error } = await resend.emails.update({
              id: emailId,
              scheduledAt: newTime.toISOString(),
            });
            if (error) {
              if (error.name === 'not_found') {
                // Email already sent or never scheduled — log + treat as no-op
              } else if (error.name === 'validation_error') {
                throw new Error(`Cannot reschedule: ${error.message}`);
              } else {
                throw new Error(`Failed to update scheduled email: ${error.message}`);
              }
            }
          DO NOT assume update succeeded without checking result.error.
          Silent failures here cause drip campaigns to fire at the wrong time and
          reminder emails to land before the rescheduled window.
        sources:
          - "https://resend.com/docs/api-reference/emails/update-email"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: batch.create
    import_path: "resend"
    description: >
      Alias for batch.send() — added in Resend SDK v5.x to align with REST naming
      conventions. Identical signature, identical return shape ({ data, error }).
      Sends multiple emails in a single API request; atomic on the request side
      (entire batch fails if request fails) but each email in data.data[] can have
      its own delivery outcome. Same silent-failure mode as batch.send.
    postconditions:
      # Evidence: node_modules/resend/dist/index.d.mts:1506 — declares
      #   create<Options extends CreateBatchRequestOptions>(payload: CreateBatchOptions, options?: Options): Promise<CreateBatchResponse<Options>>
      # CreateBatchResponse uses the same Response<T> envelope as send().
      # Source: https://resend.com/docs/api-reference/emails/send-batch-emails
      - id: batch-create-no-error-check
        condition: >
          batch.create() called without checking result.error — entire batch silently
          fails if request returns an error. Same risk profile as batch.send().
        throws: >
          Does not throw. Returns { data: null, error: ErrorResponse } on failure.
          All emails in batch are unsent if error is unchecked.
        required_handling: >
          Caller MUST check result.error after every batch.create() call:
            const { data, error } = await resend.batch.create([...]);
            if (error) {
              logger.error('Batch send failed', { batchSize: emails.length, error });
              throw new Error(`Batch failed: ${error.message}`);
            }
          Batch failures affect all emails — no partial success at the request layer.
          Log error with batch size for debugging.
        sources:
          - "https://resend.com/docs/api-reference/emails/send-batch-emails"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: domains.verify
    import_path: "resend"
    description: >
      Triggers a verification check for a domain after the user has added the
      required DNS records (SPF, DKIM, DMARC). Returns { data, error } — does NOT
      throw. The verification is asynchronous — a successful response only means
      "verification triggered", not "domain verified". Used in onboarding flows
      that gate email sending on domain verification. Silent failure here means
      the verification was never triggered and downstream send attempts will fail
      with invalid_from_address.
    postconditions:
      # Evidence: node_modules/resend/dist/index.d.mts:1572 — declares
      #   verify(id: string): Promise<VerifyDomainsResponse>
      # VerifyDomainsResponse is Response<VerifyDomainsResponseSuccess>.
      # Source: https://resend.com/docs/api-reference/domains/verify-domain
      # Error vocabulary from https://resend.com/docs/api-reference/errors
      - id: domains-verify-no-error-check
        condition: >
          domains.verify() called without checking result.error — silent failure
          if domain_id not found (404), API key restricted (401), or backend
          verification trigger errored (500).
        throws: >
          Does not throw. Returns { data: null, error: { name, message, statusCode } } on failure.
          Common errors:
          - name='not_found' (404) — domain_id does not exist in the team
          - name='restricted_api_key' (401) — API key only has sending_access, not domain management
          - name='validation_error' (400) — domain in wrong status (already verified, or not_started)
          - name='internal_server_error' (500) — verification trigger failed at backend
        required_handling: >
          Caller MUST check result.error after every domains.verify() call:
            const { data, error } = await resend.domains.verify(domainId);
            if (error) {
              logger.error('Domain verification trigger failed', { domainId, error });
              throw new Error(`Cannot verify domain: ${error.message}`);
            }
            // NOTE: success here means "verification triggered" — poll domains.get(id)
            // for status until status === 'verified' before allowing sends from this domain.
          Silent failure means the user thinks verification is in progress but it
          never started — downstream emails.send() calls fail with invalid_from_address
          and the user has no signal that the verify call itself silently failed.
        sources:
          - "https://resend.com/docs/api-reference/domains/verify-domain"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: broadcasts.create
    import_path: "resend"
    description: >
      Creates a broadcast (mass email draft) in the team's account. Returns
      { data, error } — does NOT throw. The created broadcast must subsequently
      be sent via broadcasts.send(). Silent failure here means the broadcast was
      never created and the subsequent broadcasts.send(broadcastId) call fails
      with not_found, masking the original creation failure.
    postconditions:
      # Evidence: node_modules/resend/dist/index.d.mts:1513 — declares
      #   create(payload: CreateBroadcastOptions, options?: CreateBroadcastRequestOptions): Promise<SendBroadcastResponse>
      # Returns the standard { data, error } envelope.
      # Source: https://resend.com/docs/api-reference/broadcasts/create-broadcast
      - id: broadcasts-create-no-error-check
        condition: >
          broadcasts.create() called without checking result.error — silent failure
          if domain unverified (422 invalid_from_address), segment_id not found
          (404 not_found), API key restricted (401), or required fields missing
          (422 missing_required_field).
        throws: >
          Does not throw. Returns { data: null, error: { name, message, statusCode } } on failure.
          Common errors:
          - name='invalid_from_address' (422) — sender domain not verified
          - name='not_found' (404) — segment_id does not exist
          - name='restricted_api_key' (401) — API key only has sending_access, not broadcast management
          - name='missing_required_field' (422) — name, subject, or audience missing
          - name='validation_error' (400/403) — template_id invalid or unpublished
        required_handling: >
          Caller MUST check result.error after every broadcasts.create() call:
            const { data, error } = await resend.broadcasts.create({
              name, subject, from, segmentId, html,
            });
            if (error) {
              logger.error('Broadcast create failed', { name, error });
              throw new Error(`Failed to create broadcast: ${error.message}`);
            }
            const broadcastId = data!.id;
            // Now broadcasts.send(broadcastId) can be called.
          Silent create failures cascade — the subsequent broadcasts.send(undefined)
          throws a different error (TypeError or not_found) that obscures the root
          cause and wastes engineering time during incident response.
        sources:
          - "https://resend.com/docs/api-reference/broadcasts/create-broadcast"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: webhooks.create
    import_path: "resend"
    description: >
      Creates a webhook subscription to receive email events (delivered, bounced,
      complained, etc) at a caller-supplied URL. Returns { data, error } — does NOT
      throw. The response includes a signing_secret that the caller MUST persist
      (e.g. to environment variables or vault) because it is required by
      webhooks.verify() at every incoming-webhook handler. Silent failure here is
      doubly dangerous: (1) the webhook subscription is never created, so no events
      are ever received, AND (2) if the create response is not checked, the caller
      may use an undefined signing_secret in their handler, causing every webhook
      to fail verification with "Secret can't be empty."
    postconditions:
      # Evidence: node_modules/resend/dist/index.d.mts:2107 — declares
      #   create(payload: CreateWebhookOptions, options?: CreateWebhookRequestOptions): Promise<CreateWebhookResponse>
      # CreateWebhookResponse includes signing_secret as documented at
      # https://resend.com/docs/api-reference/webhooks/create-webhook
      # Source: https://resend.com/docs/api-reference/webhooks/create-webhook
      # Source: https://resend.com/docs/api-reference/errors
      - id: webhooks-create-no-error-check
        condition: >
          webhooks.create() called without checking result.error — silent failure
          on validation errors (invalid URL, unsupported events), restricted API key,
          or quota errors (max webhooks per team).
        throws: >
          Does not throw. Returns { data: null, error: { name, message, statusCode } } on failure.
          Common errors:
          - name='validation_error' (400) — endpoint URL invalid or not https
          - name='restricted_api_key' (401) — API key only has sending_access, not webhook management
          - name='missing_required_field' (422) — endpoint URL or events array missing
        required_handling: >
          Caller MUST check result.error AND persist data.signing_secret:
            const { data, error } = await resend.webhooks.create({
              endpoint: 'https://my-app.com/webhooks/resend',
              events: ['email.delivered', 'email.bounced'],
            });
            if (error) {
              throw new Error(`Failed to create webhook: ${error.message}`);
            }
            // CRITICAL: persist data.signing_secret BEFORE deploying the handler
            await secrets.set('RESEND_WEBHOOK_SECRET', data!.signing_secret);
          Silent failure here cascades to webhooks.verify() failures in production
          because the handler is deployed against an undefined RESEND_WEBHOOK_SECRET.
          See webhooks-verify-missing-secret postcondition for the downstream impact.
        sources:
          - "https://resend.com/docs/api-reference/webhooks/create-webhook"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: events.send
    import_path: "resend"
    description: >
      Sends a named product engagement event to Resend's automation engine to
      trigger any matching automations. Added in Resend SDK v6.x as part of the
      Automations product. Returns { data, error } — does NOT throw. The event
      is the trigger that fires customer-facing drip campaigns, transactional
      sequences, and onboarding flows. Silent failure here means the automation
      never fires — customers stop receiving the welcome/onboarding/reactivation
      emails that the application thinks were dispatched. Because automations
      are asynchronous and event-driven, there is no downstream signal that the
      trigger was lost; the only evidence is the absence of follow-up email
      activity, which typically goes unnoticed for days.
    postconditions:
      # Evidence: node_modules/resend/dist/index.d.mts — declares
      #   class Events { send(payload: SendEventOptions): Promise<SendEventResponse>; ... }
      # SendEventResponse uses the same Response<T> envelope as every other Resend method.
      # Source: https://resend.com/docs/api-reference/events/send-event
      # Error vocabulary from https://resend.com/docs/api-reference/errors
      - id: events-send-no-error-check
        condition: >
          events.send() called without checking result.error — silent failure
          on contact not found (404), restricted API key (401), missing required
          field (event name / contact_id|email) (422), validation error on
          payload schema mismatch (400), or rate limit exceeded (429).
        throws: >
          Does not throw. Returns { data: null, error: { name, message, statusCode } } on failure.
          Common errors:
          - name='not_found' (404) — contact_id does not exist in the team's contacts
          - name='restricted_api_key' (401) — API key is restricted to email-only and cannot trigger automations
          - name='missing_required_field' (422) — event name, contact_id/email, or payload missing
          - name='validation_error' (400) — payload does not match the automation's defined event schema
          - name='rate_limit_exceeded' (429) — burst exceeded team rate limit (5 req/sec)
          - name='application_error' (500) — backend automation engine errored
        required_handling: >
          Caller MUST check result.error after every events.send() call. The
          subscribed automations downstream are stateful (they advance the
          contact through an automation funnel), so a missed event silently
          drops the contact out of the funnel:
            const { data, error } = await resend.events.send({
              event: 'user.signed_up',
              contact_id: contactId,
              payload: { plan: 'pro', referrer },
            });
            if (error) {
              logger.error('Automation trigger failed', { event: 'user.signed_up', contactId, error });
              if (error.name === 'rate_limit_exceeded') {
                // Queue + retry — losing the trigger means the customer never gets
                // onboarding emails; this is worse than a normal email send failure
                // because we cannot observe the downstream impact.
                await queue.enqueue({ kind: 'resend.events.send', event, contactId, payload });
              } else if (error.name === 'not_found') {
                // Contact not yet created — call contacts.create first, then retry.
                throw new Error(`Cannot trigger automation: contact ${contactId} not found`);
              } else {
                throw new Error(`Automation trigger failed: ${error.message}`);
              }
            }
          DO NOT fire-and-forget events.send(). The "no downstream evidence"
          property of automation triggers means silent failures are invisible
          for days/weeks — by the time the missing drip campaigns are noticed,
          the affected contacts have already churned without receiving any
          onboarding nurture.
        sources:
          - "https://resend.com/docs/api-reference/events/send-event"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high

  - name: automations.stop
    import_path: "resend"
    description: >
      Stops a running automation by disabling it. Once stopped, no new contacts
      enter the automation and no further emails are dispatched from it. Used
      for incident response (a misconfigured automation is spamming customers),
      seasonal pause (holiday silence on marketing automations), and decommission
      (replacing one automation with another). Returns { data, error } — does
      NOT throw. The response includes status='disabled' on success. Silent
      failure here is a control-plane risk: the automation continues to fire,
      emails continue to send, and the operator believes the automation is
      stopped — exactly the wrong outcome during an incident.
    postconditions:
      # Evidence: node_modules/resend/dist/index.d.mts — declares
      #   class Automations { stop(id: string): Promise<StopAutomationResponse>; ... }
      # StopAutomationResponse uses the standard Response<T> envelope.
      # Source: https://resend.com/docs/api-reference/automations/stop-automation
      # Error vocabulary from https://resend.com/docs/api-reference/errors
      - id: automations-stop-no-error-check
        condition: >
          automations.stop() called without checking result.error — silent
          failure if automation_id not found (404), API key restricted (401),
          automation already disabled (validation_error / 400), or backend
          error (500). Operator believes automation is stopped; it is not.
        throws: >
          Does not throw. Returns { data: null, error: { name, message, statusCode } } on failure.
          Common errors:
          - name='not_found' (404) — automation_id does not exist or belongs to another team
          - name='restricted_api_key' (401) — API key is restricted to sending and cannot manage automations
          - name='validation_error' (400) — automation is in a state that cannot be stopped (already disabled, archived, etc)
          - name='application_error' (500) — backend control-plane errored
        required_handling: >
          Caller MUST check result.error after every automations.stop() call.
          Because stop is a control-plane action — the caller intends to halt
          customer-facing email dispatch — silent failure leaves the automation
          running against the operator's intent:
            const { data, error } = await resend.automations.stop(automationId);
            if (error) {
              logger.error('Automation stop failed', { automationId, error });
              if (error.name === 'not_found') {
                // Automation deleted under us — confirm via automations.get() and treat as no-op
                throw new Error(`Automation ${automationId} not found — cannot stop`);
              } else if (error.name === 'validation_error') {
                // Already disabled — log and treat as no-op (idempotent intent)
                logger.warn('Automation already in stopped state', { automationId });
              } else {
                // Backend error during incident response — page on-call immediately
                throw new Error(`Automation stop failed: ${error.message}`);
              }
            } else {
              // CRITICAL: verify data.status === 'disabled' — successful HTTP does not guarantee state change
              if (data!.status !== 'disabled') {
                throw new Error(`Automation stop returned unexpected status: ${data!.status}`);
              }
            }
          DO NOT call automations.stop() and assume success without inspecting
          both result.error AND result.data.status. During incident response,
          a silently-failed stop call means the offending automation continues
          spamming customers while the operator's runbook claims it is halted.
        sources:
          - "https://resend.com/docs/api-reference/automations/stop-automation"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  # ───────────────────────────────────────────────────────────────────────────
  # Deepen pass 2026-06-24 (deepen-stream-3 pass 74)
  # Resend SDK v6.13.0 added the ContactImports class (3 public methods:
  # create, list, get). create() is a bulk CSV ingest operation — high-impact
  # silent-failure risk because a failed import means the marketing list is
  # never populated and there is no downstream visible signal. list/get are
  # read-only and fit the existing omitted-admin-ops policy. v6.14.0 followed
  # with no new public API surface beyond v6.13.0.
  # Sources: package/dist/index.d.mts:1655-1664 (resend@6.14.0)
  #          https://github.com/resend/resend-node/releases/tag/v6.13.0
  #          https://resend.com/docs/api-reference/errors (error vocabulary)
  # ───────────────────────────────────────────────────────────────────────────

  - name: contacts.imports.create
    import_path: "resend"
    description: >
      Bulk-imports a CSV file of contacts into one or more segments/topics in a
      single API request. Added in Resend SDK v6.13.0 as part of the new
      ContactImports class. Accepts a Blob (the CSV file), an optional column
      map, an onConflict strategy, and target segments/topics. Returns
      { data, error } — does NOT throw. Same silent-failure mode as every
      other Resend method, but the blast radius is large: a single failed call
      can leave the entire imported contact set unsynced. Because the import
      is asynchronous on the backend (status transitions: pending → processing
      → completed/failed), a successful response only confirms "import job
      created", not "contacts imported" — the caller must additionally poll
      contacts.imports.get(id) to observe the terminal status.
    postconditions:
      # Evidence: package/dist/index.d.mts:1658 (resend@6.14.0) declares
      #   create(payload: CreateContactImportOptions, options?: CreateContactImportRequestOptions): Promise<CreateContactImportResponse>
      # CreateContactImportResponse = Response<CreateContactImportResponseSuccess>
      # i.e. the standard { data, error } envelope shared by every other Resend method.
      # ContactImports class introduced in resend-node PR #963 (released in v6.13.0).
      # Error vocabulary inherited from https://resend.com/docs/api-reference/errors.
      - id: contacts-imports-create-no-error-check
        condition: >
          contacts.imports.create() called without checking result.error —
          silent failure on invalid CSV format (422 validation_error), missing
          segment/topic (404 not_found), restricted API key (401), quota
          exceeded (429), or backend ingest error (500). Caller believes the
          bulk import succeeded; the contacts list is silently never populated.
        throws: >
          Does not throw. Returns { data: null, error: { name, message, statusCode } } on failure.
          Common errors:
          - name='validation_error' (400/422) — CSV columnMap references missing columns, or unsupported file MIME type
          - name='missing_required_field' (422) — file blob is empty or required header column missing
          - name='not_found' (404) — referenced segment_id or topic_id does not exist
          - name='restricted_api_key' (401) — API key only has sending_access, not contact-management permission
          - name='rate_limit_exceeded' (429) — burst exceeded team rate limit (5 req/sec)
          - name='application_error' (500) — backend ingest pipeline errored
        required_handling: >
          Caller MUST check result.error after every contacts.imports.create() call.
          Because the call enqueues an asynchronous import job, even a clean
          response only means "job created" — the caller must also poll
          contacts.imports.get(data!.id) until status terminalizes:

            const file = new Blob([csvBuffer], { type: 'text/csv' });
            const { data, error } = await resend.contacts.imports.create({
              file,
              columnMap: { email: 'Email', firstName: 'First Name' },
              segments: [{ id: process.env.RESEND_SEGMENT_ID! }],
            });
            if (error) {
              logger.error('Contact import create failed', {
                contactCount: estimatedRowCount,
                error,
              });
              throw new Error(`Contact import failed: ${error.message}`);
            }
            // Poll for terminal status — "job created" is not "contacts imported".
            const importId = data!.id;

          Silent failure here corrupts marketing/lifecycle email pipelines:
          downstream broadcasts target an empty or partial segment, drip
          campaigns never receive the imported cohort, and the application
          surfaces no signal that the import itself failed.
        sources:
          - "https://github.com/resend/resend-node/releases/tag/v6.13.0"
          - "https://resend.com/docs/api-reference/errors"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
