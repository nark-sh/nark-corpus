package: yup
semver: ">=0.32.0 <2.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-04"
status: production
evidence_quality: confirmed
# analyzer_limitation: Current analyzer cannot detect validation calls on schema instances created by Yup.object(), Yup.string(), etc. Detection requires tracking methods on objects returned from factory functions. Contract is accurate but not enforceable with current analyzer capabilities. Expected detection rate: 0%.

functions:
  - name: validate
    import_path: "yup"
    description: "Validates data against a Yup schema asynchronously"
    postconditions:
      # Evidence: seen in 10 primary firings across 1 repo in scan-yup-2026-04-04.json
      # Top affected: getguesstimate/guesstimate-app
      - id: validate-rejects
        condition: "data fails validation against the schema"
        throws: "Promise rejection with ValidationError"
        required_handling: >
          Caller MUST wrap validate() in try-catch or use .catch() handler.
          Without error handling, validation failures cause unhandled promise rejections
          that crash the application or lead to silent failures.
          Use pattern: try { const value = await schema.validate(data); } catch (error) { /* handle */ }
        sources:
          - "https://github.com/jquense/yup#schemavalidatevalue-options-promise"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validateSync
    import_path: "yup"
    description: "Validates data against a Yup schema synchronously"
    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-yup-2026-04-04.json
      # Top affected: gmpetrov/ultimate-saas-ts
      - id: validatesync-throws
        condition: "data fails validation against the schema"
        throws: "ValidationError"
        required_handling: >
          Caller MUST wrap validateSync() in try-catch block.
          Without error handling, validation failures throw uncaught exceptions that crash
          the application. Invalid data will not be caught, leading to data corruption or
          security vulnerabilities.
          Use pattern: try { const value = schema.validateSync(data); } catch (error) { /* handle */ }
        sources:
          - "https://github.com/jquense/yup#schemavalidatesyncvalue-options-any"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validateAt
    import_path: "yup"
    description: "Validates a specific path in the data against the schema asynchronously"
    postconditions:
      - id: validateat-rejects
        condition: "data at the specified path fails validation"
        throws: "Promise rejection with ValidationError"
        required_handling: >
          Caller MUST wrap validateAt() in try-catch or use .catch() handler.
          Without error handling, validation failures cause unhandled promise rejections.
        sources:
          - "https://github.com/jquense/yup#schemavalidateatpath-string-value-any-options-object-promise"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validateSyncAt
    import_path: "yup"
    description: "Validates a specific path in the data against the schema synchronously"
    postconditions:
      - id: validatesyncat-throws
        condition: "data at the specified path fails validation"
        throws: "ValidationError"
        required_handling: >
          Caller MUST wrap validateSyncAt() in try-catch block.
          Without error handling, validation failures throw uncaught exceptions.
        sources:
          - "https://github.com/jquense/yup#schemavalidatesyncat-path-string-value-any-options-object-any"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

