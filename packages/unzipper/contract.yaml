package: unzipper
semver: ">=0.9.0 <0.13.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-03"
status: production
evidence_quality: partial

functions:
  - name: Parse
    import_path: "unzipper"
    description: "Transform stream that parses a zip file piped into it, emitting 'entry' events for each file/directory inside the zip."

    postconditions:
      - id: corrupt-zip-error
        condition: "Input stream contains a corrupt or invalid zip file"
        throws: "Error emitted on the Parse stream (e.g., 'end of file' or Zlib Z_BUF_ERROR)"
        required_handling: >
          Caller MUST attach an error handler to the Parse stream.
          Use parseStream.on('error', handler) or handle in the pipe chain.
          Without an error handler, corrupt zip errors will crash the process as unhandled stream errors.
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
          - "https://github.com/ZJONSSON/node-unzipper/issues/213"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: entry-not-consumed
        condition: "An entry stream emitted by Parse is not read or drained"
        throws: "The entire parse stream backs up and hangs indefinitely"
        required_handling: >
          Caller MUST either consume each entry's stream data or call entry.autodrain()
          on entries that are not needed. Failure to drain entries causes the stream to stall.
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
          - "https://github.com/ZJONSSON/node-unzipper/issues/98"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: streaming-zip-format-limitations
        description: "ZIP format is not designed for streaming. Parse works in most cases but may fail on ZIP64 files, encrypted archives, or non-standard ZIP variants."
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: autodrain-error-handling
        description: "entry.autodrain() returns a promise. To handle autodrain errors, use .autodrain().promise().catch(handler) or .autodrain().on('error', handler). Silent autodrain failures can cause incomplete processing."
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Extract
    import_path: "unzipper"
    description: "Transform stream that extracts all zip entries to a specified directory on disk."

    postconditions:
      - id: extraction-io-error
        condition: "File system error during extraction (permission denied, disk full, invalid path)"
        throws: "Error emitted on the Extract stream"
        required_handling: >
          Caller MUST attach an error handler or use promise-based .promise() method.
          Example: fs.createReadStream(zipFile).pipe(unzipper.Extract({path})).promise()
          The promise form rejects with the IO error allowing try-catch handling.
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: corrupt-zip-extract-error
        condition: "Input contains a corrupt zip file during Extract"
        throws: "Error emitted on the Extract stream"
        required_handling: >
          Caller MUST handle stream errors when using Extract. Use .promise() for
          await-able error handling or attach an error listener to the stream.
          Files partially extracted before the error are NOT automatically cleaned up.
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
          - "https://github.com/ZJONSSON/node-unzipper/issues/286"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: large-zip-memory-use-open
        description: "For large zip files (>1GB), Extract can run into memory issues due to streaming limitations of the ZIP format. Use Open.file() with concurrency option for large archives instead."
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
          - "https://github.com/ZJONSSON/node-unzipper/issues/202"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: Open
    import_path: "unzipper"
    description: "Opens a zip file for random-access reading without streaming. Provides directory() method to list entries and extract selectively."

    postconditions:
      - id: file-not-found
        condition: "The file path passed to Open.file() does not exist or cannot be read"
        throws: "Error with ENOENT or EACCES code"
        required_handling: >
          Caller MUST wrap Open.file() in try-catch or handle promise rejection.
          Open.file() returns a promise that rejects with filesystem errors.
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: invalid-zip-open-error
        condition: "File exists but is not a valid zip file (wrong magic bytes or corrupt central directory)"
        throws: "Error indicating invalid zip format"
        required_handling: >
          Caller MUST wrap Open.file() in try-catch. Invalid zip files cause rejection
          when the central directory cannot be parsed. Validate the file is a zip before processing.
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: entry-extraction-error
        condition: "A specific entry within the zip cannot be extracted (corrupt entry, unsupported compression)"
        throws: "Error emitted on the entry extraction stream"
        required_handling: >
          Caller MUST handle errors on individual entry streams.
          attach .on('error', handler) to each entry's stream, or use
          entry.buffer() in a try-catch block. Entry errors do not propagate
          to the parent directory stream automatically.
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: concurrency-option
        description: "Open.file().then(d => d.extract({path, concurrency})) supports concurrent extraction. High concurrency on large zips may exhaust file descriptors. Default concurrency is 1."
        sources:
          - "https://github.com/ZJONSSON/node-unzipper#readme"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
