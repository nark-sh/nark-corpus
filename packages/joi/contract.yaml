package: joi
semver: ">=17.0.0 <19.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-17"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.83

functions:
  - name: validate
    import_path: "joi"
    description: "Validates data against a Joi schema synchronously"
    postconditions:
      # Evidence: seen in 4 primary firings across 1 repo in scan-joi-2026-04-02.json
      # Top affected: MiningCattiva/x-spider (⭐ 1226)
      - id: validate-returns-error
        condition: "data fails validation against the schema"
        returns: "{error: ValidationError, value: any} where error contains validation failure details"
        required_handling: >
          Caller MUST check result.error property before using result.value.
          Without checking error, invalid data will pass through silently, leading to data
          corruption, business logic errors, or security vulnerabilities.
          Use pattern: const { error, value } = schema.validate(data); if (error) { /* handle */ }
        sources:
          - "https://joi.dev/api/#anyvalidatevalue-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validateAsync
    import_path: "joi"
    description: "Validates data against a Joi schema asynchronously"
    postconditions:
      - id: validateasync-rejects
        condition: "data fails validation against the schema"
        throws: "Promise rejection with ValidationError"
        required_handling: >
          Caller MUST wrap validateAsync() in try-catch or use .catch() handler.
          Without error handling, validation failures cause unhandled promise rejections
          that crash the application.
          Use pattern: try { const value = await schema.validateAsync(data); } catch (error) { /* handle */ }
        sources:
          - "https://joi.dev/api/#anyvalidateasyncvalue-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: assert
    import_path: "joi"
    description: "Asserts that a value matches a schema, throwing on failure"
    postconditions:
      - id: assert-throws
        condition: "data fails validation against the schema"
        throws: "ValidationError"
        required_handling: >
          Caller MUST wrap Joi.assert() in try-catch block.
          Without error handling, validation failures throw uncaught exceptions that crash
          the application.
          Use pattern: try { Joi.assert(value, schema); } catch (error) { /* handle */ }
        sources:
          - "https://joi.dev/api/#assertvalue-schema-message-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: attempt
    import_path: "joi"
    description: "Validates data and returns the validated value or throws"
    postconditions:
      - id: attempt-throws
        condition: "data fails validation against the schema"
        throws: "ValidationError"
        required_handling: >
          Caller MUST wrap Joi.attempt() in try-catch block.
          Without error handling, validation failures throw uncaught exceptions that crash
          the application.
          Use pattern: try { const validated = Joi.attempt(value, schema); } catch (error) { /* handle */ }
        sources:
          - "https://joi.dev/api/#attemptvalue-schema-message-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: compile
    import_path: "joi"
    description: >
      Converts a literal schema definition (plain object, string, number, array) into a joi
      Schema object. Called at module load time or in schema factory functions to pre-compile
      reusable schemas. Also validates that schema objects are not mixing different joi versions.
    postconditions:
      # Evidence: https://raw.githubusercontent.com/hapijs/joi/master/API.md
      # Source confirmed: joi/lib/compile.js — assert() from @hapi/hoek throws AssertError
      # on invalid schema input (undefined, empty array, non-plain-object)
      - id: compile-invalid-schema-throws
        condition: "schema argument is undefined, an empty array, or contains non-plain objects"
        throws: "AssertError (extends Error) from @hapi/hoek — message: 'Invalid undefined schema' or 'Invalid empty array schema' or 'Schema can only contain plain objects'"
        required_handling: >
          Caller MUST wrap Joi.compile() in try-catch when schema is built dynamically
          (e.g. from user input, config files, or database). Static schema definitions
          compiled at module load are safe if the schema literal is correct.
          Without error handling, invalid schema definitions throw at runtime and crash
          the request handler or service startup.
          Use pattern: try { const schema = Joi.compile(rawSchema); } catch (err) { /* handle */ }
        sources:
          - "https://raw.githubusercontent.com/hapijs/joi/master/API.md"
          - "https://github.com/hapijs/joi/blob/master/lib/compile.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: compile-version-mismatch-throws
        condition: "schema was compiled with a different version of joi (legacy: false, default)"
        throws: "AssertError — message: 'Cannot mix different versions of joi schemas: <version> <version>'"
        required_handling: >
          When using Joi.compile() with dynamically loaded schemas from external sources
          (plugins, serialized schemas), version mismatches throw AssertError.
          Use Joi.compile(schema, { legacy: true }) to allow older schema versions,
          or ensure all schemas are compiled with the same joi version.
        sources:
          - "https://raw.githubusercontent.com/hapijs/joi/master/API.md"
          - "https://github.com/hapijs/joi/blob/master/lib/compile.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

