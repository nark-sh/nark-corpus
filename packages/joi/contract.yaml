package: joi
semver: ">=17.0.0 <19.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed

functions:
  - name: validate
    import_path: "joi"
    description: "Validates data against a Joi schema synchronously"
    postconditions:
      # Evidence: seen in 4 primary firings across 1 repo in scan-joi-2026-04-02.json
      # Top affected: MiningCattiva/x-spider (⭐ 1226)
      - id: validate-returns-error
        condition: "data fails validation against the schema"
        returns: "{error: ValidationError, value: any} where error contains validation failure details"
        required_handling: >
          Caller MUST check result.error property before using result.value.
          Without checking error, invalid data will pass through silently, leading to data
          corruption, business logic errors, or security vulnerabilities.
          Use pattern: const { error, value } = schema.validate(data); if (error) { /* handle */ }
        sources:
          - "https://joi.dev/api/#anyvalidatevalue-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: validateAsync
    import_path: "joi"
    description: "Validates data against a Joi schema asynchronously"
    postconditions:
      - id: validateasync-rejects
        condition: "data fails validation against the schema"
        throws: "Promise rejection with ValidationError"
        required_handling: >
          Caller MUST wrap validateAsync() in try-catch or use .catch() handler.
          Without error handling, validation failures cause unhandled promise rejections
          that crash the application.
          Use pattern: try { const value = await schema.validateAsync(data); } catch (error) { /* handle */ }
        sources:
          - "https://joi.dev/api/#anyvalidateasyncvalue-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: assert
    import_path: "joi"
    description: "Asserts that a value matches a schema, throwing on failure"
    postconditions:
      - id: assert-throws
        condition: "data fails validation against the schema"
        throws: "ValidationError"
        required_handling: >
          Caller MUST wrap Joi.assert() in try-catch block.
          Without error handling, validation failures throw uncaught exceptions that crash
          the application.
          Use pattern: try { Joi.assert(value, schema); } catch (error) { /* handle */ }
        sources:
          - "https://joi.dev/api/#assertvalue-schema-message-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: attempt
    import_path: "joi"
    description: "Validates data and returns the validated value or throws"
    postconditions:
      - id: attempt-throws
        condition: "data fails validation against the schema"
        throws: "ValidationError"
        required_handling: >
          Caller MUST wrap Joi.attempt() in try-catch block.
          Without error handling, validation failures throw uncaught exceptions that crash
          the application.
          Use pattern: try { const validated = Joi.attempt(value, schema); } catch (error) { /* handle */ }
        sources:
          - "https://joi.dev/api/#attemptvalue-schema-message-options"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

