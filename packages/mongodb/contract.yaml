      # Top affected: talyssonoc/node-api-boilerplate (⭐ 3361), unjs/unstorage (⭐ 2536), Nutlope/pdftochat
      - id: collection-access-failure
        maturity: stable
        condition: "Invalid collection name or database not connected"
        throws: "MongoError"
        required_handling: >
