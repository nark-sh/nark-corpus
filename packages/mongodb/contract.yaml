  - name: close
    import_path: "mongodb"
    description: >
      Closes the MongoClient and all underlying connections, releasing all pooled connections
      back to the server and draining in-progress operations. Must be called on application
      shutdown. Returns Promise<void>.
    postconditions:
      # Evidence: confirmed from mongodb source (MongoClient.close() in mongo_client.js)
      # close() is in edge_cases as a pattern but not as a contracted function
      - id: close-not-called-resource-leak
        maturity: stable
        condition: "MongoClient.close() never called before process exit"
        throws: "Does not throw — process exits with open connections"
        required_handling: >
          Caller MUST call client.close() in a finally block or process shutdown handler.
          Open connections at exit cause connection pool exhaustion on the MongoDB server
          (connections are not returned to the pool on abrupt exit).
          Pattern: process.on('SIGTERM', async () => { await client.close(); process.exit(0); });
          Or: try { await operations(); } finally { await client.close(); }
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
          - "https://github.com/mongodb/node-mongodb-native"
        evidence_quality: confirmed
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: close-operations-in-flight
        maturity: stable
        condition: "close() called while operations are still in progress"
        throws: "In-progress operations throw MongoClientClosedError"
        required_handling: >
          Caller MUST ensure all in-progress operations complete (or are cancelled) before
          calling close(). Use await to drain operation promises before calling close().
          In graceful shutdown: stop accepting new requests, wait for current requests to
          complete, then close.
        sources:
