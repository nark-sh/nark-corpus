        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: createcollection-validation-schema-error
        maturity: stable
        condition: >
          The validator option specifies an invalid JSON schema — syntax errors, unknown
          keywords, or invalid $jsonSchema values. Also thrown when schema contains
          Queryable Encryption (FLE2) fields but the MongoDB server version is below
          the minimum required for encrypted collections (< 7.0 wire protocol version 21).
        throws: >
          MongoServerError with codeName: 'BadValue' for invalid schema syntax.
          MongoCompatibilityError (extends MongoDriverError) with message:
          "Driver support of Queryable Encryption is incompatible with server..." when
          FLE2 encrypted fields are used against an older server. Confirmed from
          create_collection.js: 'throw new MongoCompatibilityError(INVALID_QE_VERSION)'.
        required_handling: >
          Caller MUST catch both MongoServerError (schema syntax) and MongoCompatibilityError
          (FLE2 version mismatch) in startup/migration paths. A schema validation error in
          startup silently skips collection configuration in some frameworks (Next.js
          swallows module-load errors) — always log and halt.

            try {
              await db.createCollection('products', {
                validator: { $jsonSchema: { bsonType: 'object', required: ['name'] } }
              });
            } catch (error) {
              if (error instanceof MongoCompatibilityError) {
                console.error('Server too old for encrypted collections:', error.message);
                process.exit(1);
              }
              if (error instanceof MongoServerError && error.code === 48) {
                // Already exists — acceptable in idempotent migrations
              } else if (error instanceof MongoServerError) {
                console.error('Invalid collection config:', error.message);
                throw error;
              }
            }
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/fundamentals/schema-validation/"
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/create_collection.ts"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: distinct
    import_path: "mongodb"
    description: >
      Returns an array of distinct values for the specified field across a collection.
      Commonly used for faceted navigation, tag aggregation, and deduplication queries.
      The field parameter is a string key path (dot-notation for nested fields).
      Called on a Collection instance.
    postconditions:
      # Evidence: confirmed from mongodb source (distinct.js DistinctOperation class)
      # distinct wraps the server 'distinct' command — MongoServerError on command errors
      # https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/distinct.ts
      - id: distinct-no-try-catch
        maturity: stable
        condition: >
          distinct() is called without try-catch. If the collection or database is unavailable
          (network failure, server selection timeout), or if the key field path is invalid
          according to server-side rules, the Promise rejects. Common in API endpoints that
          return facet values for UI dropdowns — an uncaught error returns a 500 instead of
          an empty facet list.
        throws: >
          MongoServerError (invalid field path or server-side validation failure),
          MongoNetworkError (network failure — connection dropped),
          MongoServerSelectionError (no server available within serverSelectionTimeoutMS),
          MongoError (catch-all base class for all MongoDB errors).
          Returns empty array [] when no documents match — does NOT throw.
        required_handling: >
          Caller MUST wrap distinct() in try-catch. Returning [] on error is often acceptable
          for non-critical facet endpoints:

            try {
              const categories = await collection.distinct('category', { status: 'active' });
              return categories;
            } catch (error) {
              if (error instanceof MongoNetworkError) {
                // Transient — retry or return stale cached values
                throw error;
              }
              if (error instanceof MongoServerError) {
                // Field path invalid or server error — log and return empty
                console.error('distinct failed:', error.message, error.code);
                return [];
              }
              throw error;
            }

          Note: distinct() returns [] when the query matches no documents. An empty result
          is NOT an error and must not be confused with a failed query.
        sources:
          - "https://www.mongodb.com/docs/manual/reference/command/distinct/"
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/distinct.ts"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: createIndexes
    import_path: "mongodb"
    description: >
      Creates multiple indexes on a collection in a single command. More efficient than
      calling createIndex() in a loop. Commonly used in startup migration scripts to
      set up all required indexes at once. Returns an array of created index names.
    postconditions:
      # Evidence: confirmed from mongodb source (indexes.js CreateIndexesOperation class)
      # IndexOptionsConflict (code 85) and IndexKeySpecsConflict (code 86) confirmed from
      # MongoDB server error codes + node-mongodb-native source
      # https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/indexes.ts
      - id: createindexes-options-conflict
        maturity: stable
        condition: >
          An index with the same key spec already exists but with different options (e.g., same
          fields but different unique/sparse/collation settings). MongoDB rejects index
          creation when the name or key spec conflicts with an existing index definition.
          Common in deployments where index options are changed between app versions.
        throws: >
          MongoServerError with code 85 (IndexOptionsConflict) when an existing index has
          the same name but different options, or code 86 (IndexKeySpecsConflict) when
          the same key spec exists under a different index name. Neither is idempotent-safe.
          Confirmed from MongoDB server error codes reference.
        required_handling: >
          Caller MUST catch MongoServerError and check the code. createIndexes() is idempotent
          for identical index definitions (same key + same options), but throws on conflicting
          definitions. In migration code:

            try {
              await collection.createIndexes([
                { key: { email: 1 }, name: 'email_unique', unique: true },
                { key: { createdAt: -1 }, name: 'created_at_desc', expireAfterSeconds: 86400 }
              ]);
            } catch (error) {
              if (error instanceof MongoServerError && (error.code === 85 || error.code === 86)) {
                // Index conflict — need to drop and recreate, or update migration script
                console.error('Index conflict — cannot create:', error.message);
                throw error;
              }
              throw error;
            }

          To safely update an existing index, call dropIndex() with the conflicting name
          before calling createIndexes() in the same migration transaction.
        sources:
          - "https://www.mongodb.com/docs/manual/reference/error-codes/"
          - "https://www.mongodb.com/docs/manual/reference/command/createIndexes/"
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/indexes.ts"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

