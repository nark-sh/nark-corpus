        maturity: stable
        condition: "Collection does not exist, insufficient permissions, or network error"
        throws: "MongoServerError or MongoError"
        required_handling: >
          Caller MUST catch drop errors.
          Dropping non-existent collection throws error.
          Use dropCollection with ifExists option to avoid errors.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
