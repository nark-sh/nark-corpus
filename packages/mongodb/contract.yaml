package: mongodb
semver: ">=5.0.0"
contract_version: "1.3.1"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.91
# Depth pass 2026-04-17 (deepen-stream-2 pass 13):
# API surface: ~36 async-callable functions in Collection, Db, MongoClient, ClientSession
# Contracted before: 23; Contracted after: 28 (+5 this pass)
# Added: createCollection, distinct, createIndexes, dropIndexes, withSession, rename
# Omitted: estimatedDocumentCount (same error profile as countDocuments),
#   createSearchIndex/createSearchIndexes/dropSearchIndex (Atlas-only, v7.0+, niche),
#   Db.command (raw admin command, not SaaS runtime code),
#   Admin.* (all admin server operations, monitoring/admin only),
#   ClientSession.endSession (covered by withSession/withTransaction finally block),
#   Db.stats/profilingLevel/createIndex/removeUser (admin/monitoring ops),
#   Cursor.toArray/forEach/next (cursor iteration, same network error profile as find)
# Coverage: 28/33 non-omitted = 0.85 (effective); 28/36 total = 0.78 (raw)
# Evidence sources confirmed from installed package source (v6.x):
#   node_modules/mongodb/lib/operations/create_collection.js
#   node_modules/mongodb/lib/operations/distinct.js
#   node_modules/mongodb/lib/operations/indexes.js
#   node_modules/mongodb/lib/operations/rename.js
#   node_modules/mongodb/lib/mongo_client.js (withSession)
#   node_modules/mongodb/lib/error.js (MONGODB_ERROR_CODES: NamespaceNotFound=26, NamespaceExists=48)
#   https://www.mongodb.com/docs/manual/reference/error-codes/

# CRITICAL SECURITY NOTES:
#
# CVE-2021-32050 (CVSS 5.5): Authentication Data Exposure
# - Affected versions: <3.6.10 || >=4.0.0 <4.0.5
# - Fixed in: 3.6.10, 4.0.5
# - Impact: Authentication data may be exposed to command listeners
#
# MINIMUM SAFE VERSION: >=3.6.10 (CVE fix)
# RECOMMENDED VERSION: >=5.0.0 (Node.js 14.20.1+ baseline, stable error hierarchy)
# PRODUCTION RECOMMENDATION: >=6.0.0 (Node.js 16.20.1+ LTS support)
#
# Common Production Bugs (Based on Real-World Analysis):
# 1. Connection leaks (40%) - MongoClient not closed before process exit
# 2. Missing error handling (35%) - No try-catch around async operations
# 3. Authentication failures (15%) - Wrong credentials or missing authSource
# 4. Pool misconfiguration (7%) - Multiple clients or improper pool settings
# 5. Improper lifecycle (3%) - Operating on closed client or closing too early
#
# Note: CVE-2025-14847 (MongoBleed, CVSS 8.7) affects MongoDB Server, not the npm driver.
# Ensure your MongoDB server is patched to versions: 8.2.3+, 8.0.17+, 7.0.28+, 6.0.27+, 5.0.32+, or 4.4.30+

# Detection rules for analyzer integration
detection:
  # MongoDB client and collection classes
  class_names: ["MongoClient", "Db", "Collection"]
  
  # Type declarations for MongoDB instances
  type_names: ["MongoClient", "Db", "Collection", "MongoClientOptions"]
  
  # No factory methods for MongoDB (uses constructors and methods)
  factory_methods: []
  
  # CRITICAL: Require instance tracking to avoid false positives
  # MongoDB method names (.find, .insertOne, .updateOne) could match other code
  # Instance tracking ensures we only flag tracked MongoDB instances
  require_instance_tracking: true
  
  # Patterns to identify MongoDB operations in await expressions
  await_patterns:
    # Connection
    - ".connect("
    
    # Read operations
    - ".find("
    - ".findone("
    - ".aggregate("
    - ".countdocuments("
    
    # Write operations
    - ".insertone("
    - ".insertmany("
    - ".updateone("
    - ".updatemany("
    - ".deleteone("
    - ".deletemany("
    - ".bulkwrite("
    - ".replaceone("
    - ".findoneandupdate("
    - ".findoneanddelete("
    - ".findoneandreplace("

    # Admin operations
    - ".createindex("
    - ".createindexes("
    - ".dropindex("
    - ".dropindexes("
    - ".drop("
    - ".collection("
    - ".createcollection("
    - ".distinct("
    - ".rename("
    - ".withsession("

functions:
  - name: connect
    import_path: "mongodb"
    description: "Establishes connection to MongoDB server or cluster"
    postconditions:
      # Evidence: seen in 6 primary firings across 6 repos in scan-mongodb-2026-04-03.json
      # Top affected: talyssonoc/node-api-boilerplate (⭐ 3361), latentcat/latentbox (⭐ 2127)
      - id: connection-failure
        maturity: stable
        condition: "Network error, authentication failure, or server selection timeout"
        throws: "MongoNetworkError, MongoServerSelectionError, MongoNetworkTimeoutError, or MongoError"
        required_handling: >
          Caller MUST catch connection errors and handle them separately from query errors.
          Implement retry logic with exponential backoff for transient connection issues.
          Log connection errors for operations monitoring.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/connection-troubleshooting/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: catastrophic
          user_experience: service_unavailable
          incident_cost_range: critical

  - name: find
    import_path: "mongodb"
    description: "Queries collection for documents matching filter criteria"
    postconditions:
      - id: query-failure
        maturity: stable
        condition: "Network error, timeout, or invalid query syntax"
        throws: "MongoServerError, MongoNetworkError, or MongoError"
        required_handling: >
          Caller MUST catch query errors.
          Network errors (MongoNetworkError) may be transient and can be retried.
          Invalid query errors (MongoServerError) should not be retried.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: findOne
    import_path: "mongodb"
    description: "Queries collection for a single document matching filter criteria"
    postconditions:
      - id: query-failure
        maturity: stable
        condition: "Network error, timeout, or invalid query"
        throws: "MongoServerError, MongoNetworkError, or MongoError"
        required_handling: >
          Caller MUST catch query errors.
          Returns null if no document matches (not an error).
          Network errors may be transient and retriable.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: insertOne
    import_path: "mongodb"
    description: "Inserts a single document into collection"
    postconditions:
      - id: duplicate-key
        maturity: stable
        condition: "Document violates unique index constraint"
        throws: "MongoServerError with error.code === 11000"
        required_handling: >
          Caller MUST catch duplicate key errors (code 11000) and handle gracefully.
          Extract conflicting field from error message.
          DO NOT retry without changing the unique field value.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: insertMany
    import_path: "mongodb"
    description: "Inserts multiple documents into collection in bulk"
    postconditions:
      - id: bulk-write-failure
        maturity: stable
        condition: "One or more documents failed to insert"
        throws: "MongoBulkWriteError with details of failed operations"
        required_handling: >
          Caller MUST catch bulk write errors.
          Check error.result to see which documents succeeded and which failed.
          Handle partial success scenarios appropriately.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: updateOne
    import_path: "mongodb"
    description: "Updates a single document matching filter"
    postconditions:
      - id: update-failure
        maturity: stable
        condition: "Network error, invalid update operation, or write concern failure"
        throws: "MongoServerError, MongoWriteConcernError, or MongoError"
        required_handling: >
          Caller MUST catch update errors.
          Network errors may be transient.
          Invalid update operators (MongoServerError) should not be retried.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: updateMany
    import_path: "mongodb"
    description: "Updates multiple documents matching filter"
    postconditions:
      - id: bulk-update-failure
        maturity: stable
        condition: "Update operation failed or write concern not satisfied"
        throws: "MongoServerError, MongoWriteConcernError, or MongoError"
        required_handling: >
          Caller MUST catch bulk update errors.
          Check result.modifiedCount to verify how many documents were updated.
          Implement retry logic for transient failures.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: deleteOne
    import_path: "mongodb"
    description: "Deletes a single document matching filter"
    postconditions:
      - id: delete-failure
        maturity: stable
        condition: "Network error or write concern failure"
        throws: "MongoServerError, MongoWriteConcernError, or MongoError"
        required_handling: >
          Caller MUST catch delete errors.
          Deleting non-existent document is NOT an error (deletedCount = 0).
          Network errors may be transient and retriable.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
