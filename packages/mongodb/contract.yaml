  - name: aggregate
    import_path: "mongodb"
    description: "Executes aggregation pipeline on collection"
    postconditions:
      - id: aggregation-failure
        maturity: stable
        condition: "Invalid pipeline stage, network error, or timeout"
        throws: "MongoServerError, MongoNetworkError, or MongoError"
        required_handling: >
          Caller MUST catch aggregation errors.
          Pipeline syntax errors (MongoServerError) should not be retried.
          Network errors may be transient and retriable.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: countDocuments
    import_path: "mongodb"
    description: "Counts documents in collection matching filter"
    postconditions:
      - id: count-failure
        maturity: stable
        condition: "Network error, timeout, or invalid filter"
        throws: "MongoServerError, MongoNetworkError, or MongoError"
        required_handling: >
          Caller MUST catch count errors.
          Network errors may be transient.
          Invalid filters should not be retried.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
