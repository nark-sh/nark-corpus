  - name: bulkWrite
    import_path: "mongodb"
    description: "Executes multiple write operations in bulk"
    postconditions:
      - id: bulk-write-failure
        maturity: stable
        condition: "One or more operations failed"
        throws: "MongoBulkWriteError with details of failed operations"
        required_handling: >
          Caller MUST catch bulk write errors.
          Check error.result for success/failure details of each operation.
          Handle partial success appropriately.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: findOneAndUpdate
    import_path: "mongodb"
    description: >
      Finds a single document matching the filter, applies an update, and returns either the
      pre-update or post-update document. Returns null when no document matches (not an error).
      Used for atomic read-modify-write operations and optimistic concurrency patterns.
    postconditions:
      # Evidence: confirmed from mongodb source (find_and_modify.js) + TypeScript declarations
      # Error hierarchy: MongoServerError → MongoError; MongoWriteConcernError, MongoNetworkError
      - id: findoneandupdate-null-not-found
        maturity: stable
        condition: "No document matches the filter (default behavior without upsert)"
        throws: "Returns null — does NOT throw"
        required_handling: >
          Caller MUST check for null return. Treating null as success is the most common production
          bug with findOneAndUpdate. When the document is expected to exist (e.g., optimistic lock
          update), null return means another process deleted it. Use returnDocument: 'after' and
          check result before proceeding. If existence is mandatory, use findOneAndUpdateOrThrow
          pattern or assert null explicitly.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/fundamentals/crud/write-operations/"
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/find_and_modify.ts"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: findoneandupdate-write-concern-error
        maturity: stable
        condition: "Write concern requirements not met (replica set not acknowledging)"
        throws: "MongoWriteConcernError"
        required_handling: >
          Caller MUST catch MongoWriteConcernError. The write may or may not have been applied —
          write concern error means acknowledgment failed, not necessarily that the write failed.
          Implement retry with idempotency checks.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/error.ts"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: delayed_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: findoneandupdate-duplicate-key-upsert
        maturity: stable
        condition: "upsert:true and unique index conflict when inserting new document"
        throws: "MongoServerError with error.code === 11000"
        required_handling: >
          Caller MUST catch MongoServerError with code 11000 when using upsert:true.
          This happens in high-concurrency scenarios when two requests both try to upsert
          the same document simultaneously. The second upsert fails with duplicate key error.
        sources:
          - "https://www.mongodb.com/docs/manual/reference/operator/update/setOnInsert/"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

  - name: findOneAndDelete
    import_path: "mongodb"
    description: >
      Finds a single document matching the filter, deletes it, and returns the deleted document.
      Returns null when no document matches. Used for dequeue operations and atomic pop patterns.
    postconditions:
      # Evidence: confirmed from mongodb source (find_and_modify.js FindOneAndDeleteOperation class)
      - id: findoneanddelete-null-not-found
        maturity: stable
        condition: "No document matches the filter"
        throws: "Returns null — does NOT throw"
        required_handling: >
          Caller MUST check for null return. A null return means no document was deleted.
          In queue/dequeue patterns (popping tasks from a queue), null means the queue is empty —
          must be handled explicitly. Do not attempt to access properties of the null result.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/find_and_modify.ts"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: findoneanddelete-network-error
        maturity: stable
        condition: "Network error or server unavailable during delete"
        throws: "MongoNetworkError or MongoServerSelectionError"
        required_handling: >
          Caller MUST catch network errors. After a network error during findOneAndDelete,
          the delete state is unknown — the document may or may not have been deleted.
          Do not retry without checking current state first.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: delayed_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high

  - name: findOneAndReplace
    import_path: "mongodb"
    description: >
      Finds a single document matching the filter, replaces it entirely with the replacement
      document, and returns the pre-replace or post-replace document. Returns null when no
      document matches.
    postconditions:
      # Evidence: confirmed from mongodb source (find_and_modify.js FindOneAndReplaceOperation)
      - id: findoneandreplace-null-not-found
        maturity: stable
        condition: "No document matches the filter (and upsert is not set)"
        throws: "Returns null — does NOT throw"
        required_handling: >
          Caller MUST check for null return. Null means no document was found and replaced.
          Unlike updateOne which returns matchedCount:0, findOneAndReplace returns null.
          Check result before proceeding with any logic that depends on the replaced document.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: findoneandreplace-validation-error
        maturity: stable
        condition: "Replacement document violates schema validation rules"
        throws: "MongoServerError with codeName: 'DocumentValidationFailure'"
        required_handling: >
          Caller MUST catch MongoServerError. Unlike findOneAndUpdate (which applies an update
          operator), findOneAndReplace replaces the entire document — schema validation applies
          to the full replacement document. Check schema validation rules before replacing.
        sources:
          - "https://www.mongodb.com/docs/manual/core/schema-validation/"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

  - name: withTransaction
    import_path: "mongodb"
    description: >
      Executes a callback function within a MongoDB transaction, automatically handling
      commit and abort. Internally retries transient errors (TransientTransactionError) and
      unknown commit results (UnknownTransactionCommitResult) for up to 120 seconds.
      Called on a ClientSession obtained from client.startSession().
    postconditions:
      # Evidence: confirmed from mongodb source (sessions.js withTransaction implementation)
      # TransientTransactionError and UnknownTransactionCommitResult confirmed from error.js MongoErrorLabel
      - id: withtransaction-transient-error-not-retried-externally
        maturity: stable
        condition: "Non-transient error thrown by callback operation"
        throws: "MongoServerError, MongoNetworkError, or MongoError — propagated from callback"
        required_handling: >
          Caller MUST wrap withTransaction in try-catch. withTransaction automatically retries
          TransientTransactionError and UnknownTransactionCommitResult. Any other error propagates
          to caller. Do NOT wrap callback operations in their own try-catch unless you re-throw —
          swallowing errors inside the callback prevents withTransaction's retry logic from firing.
        sources:
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/sessions.ts"
          - "https://www.mongodb.com/docs/manual/core/transactions/"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: critical

      - id: withtransaction-write-conflict
        maturity: stable
        condition: "Two concurrent transactions modify the same document (WriteConflict)"
        throws: "MongoServerError with code 112 (WriteConflict) — labeled TransientTransactionError"
        required_handling: >
          withTransaction automatically retries WriteConflict errors when labeled
          TransientTransactionError. However if the total elapsed time exceeds 120 seconds,
          the error propagates. Caller MUST handle the propagated error. Keep transactions
          short to minimize conflict window.
        sources:
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/sessions.ts"
          - "https://www.mongodb.com/docs/manual/core/transactions/"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high

      - id: withtransaction-session-required
        maturity: stable
        condition: "All operations inside callback must use the session parameter"
        throws: "Operations without session bypass transaction — no error thrown, silent data corruption"
        required_handling: >
          CRITICAL: Every MongoDB operation inside the withTransaction callback MUST pass the
          session object (e.g., collection.insertOne(doc, { session })). Operations without
          the session parameter run outside the transaction — they commit immediately regardless
          of whether the overall transaction commits or aborts. This is a logic error, not an
          exception.
        sources:
          - "https://www.mongodb.com/docs/manual/core/transactions/"
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/sessions.ts"
        evidence_quality: confirmed
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: critical

  - name: watch
    import_path: "mongodb"
    description: >
      Opens a MongoDB Change Stream to receive real-time change notifications for a collection,
      database, or entire deployment. Returns a ChangeStream event emitter — errors are NOT
      thrown synchronously; they are emitted via the 'error' event.
    postconditions:
      # Evidence: confirmed from mongodb source (change_stream.js) — errors emitted via ChangeStream.ERROR event
      - id: watch-error-event-not-thrown
        maturity: stable
        condition: "Network disconnection, resume token expiration, or oplog rollover"
        throws: "Emits 'error' event on the ChangeStream — does NOT throw"
        required_handling: >
