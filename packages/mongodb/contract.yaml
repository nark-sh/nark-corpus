  - name: createCollection
    import_path: "mongodb"
    description: >
      Creates a new collection in the database with optional configuration (capped collections,
      schema validation, collation, time series, etc.). Called on a Db instance. Commonly used
      in startup initialization and migration scripts. Returns the Collection object on success.
    postconditions:
      # Evidence: confirmed from mongodb source (create_collection.js, error.js MONGODB_ERROR_CODES)
      # NamespaceExists error code 48 confirmed from MongoDB server error code reference
      # https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/create_collection.ts
      - id: createcollection-namespace-exists
        maturity: stable
        condition: >
          A collection with the same name already exists in the database. This is the most
          common error for createCollection() in migration/startup code. If the collection
          was created by a previous migration run, a second call throws instead of being idempotent.
        throws: >
          MongoServerError with code 48 (NamespaceExists) and codeName: 'NamespaceExists'.
          The error message is: "Collection <dbname>.<name> already exists."
        required_handling: >
          Caller MUST catch MongoServerError code 48 and handle idempotently. Two patterns:

          Option 1 (recommended): Use Db.listCollections() to check first, or catch and ignore:
            try {
              await db.createCollection('users', {
                validator: { $jsonSchema: { ... } }
              });
            } catch (error) {
              if (error instanceof MongoServerError && error.code === 48) {
                // Collection already exists — safe to ignore in idempotent migrations
              } else {
                throw error;
              }
            }

          Option 2: Pass { checkExistingFieldNames: false } if using schema validation and
          collection may already exist.

          CRITICAL: Do NOT ignore all MongoServerError — code 48 is idempotent-safe,
          but other codes (schema validation syntax errors, permission denied) must propagate.
        sources:
          - "https://www.mongodb.com/docs/manual/reference/error-codes/"
          - "https://github.com/mongodb/node-mongodb-native/blob/main/src/operations/create_collection.ts"
          - "https://www.mongodb.com/docs/drivers/node/current/fundamentals/schema-validation/"
        evidence_quality: confirmed
