package: morgan
semver: ">=1.0.0 <2.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-16"
status: production
evidence_quality: confirmed
# Depth pass 2026-04-16 (deepen-stream-1 pass 1):
# API surface: 4 callable exports (morgan, morgan.token, morgan.format, morgan.compile)
# Contracted before: 1 (morgan factory with 2 postconditions + 3 edge cases)
# Contracted after: 3 (added morgan.compile, morgan.token)
# Omitted: 1 (morgan.format — pure name registry, no distinct error surface)
# Coverage: 3/4 = 0.75 (up from 0.25)
# Evidence from morgan@1.10.1 source:
#   https://raw.githubusercontent.com/expressjs/morgan/master/index.js — line 395: throw new TypeError
#   https://raw.githubusercontent.com/expressjs/morgan/master/README.md — token overwrite behavior documented
coverage_score: 0.75  # 3 contracted / 4 total callable exports (1 intentionally omitted)

functions:
  - name: morgan
    import_path: "morgan"
    description: "HTTP request logger middleware factory. Returns Express middleware that logs HTTP requests."

    preconditions:
      - id: stream-writable
        description: "If a custom stream is provided via options.stream, it must be a writable stream. If the stream is closed or errored, log writes will silently fail or throw."
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    postconditions:
      # Evidence: seen in 10 primary firings across 7 repos in scan-morgan-2026-04-03.json
      # Top affected: juice-shop/juice-shop (⭐ 12733), NarHakobyan/awesome-nest-boilerplate (⭐ 2775), spacebarchat/server (⭐ 2124)
      - id: stream-write-error
        condition: "The output stream (default process.stdout or custom stream) throws or emits an error during log line write"
        throws: "Error from the underlying stream write operation"
        required_handling: >
          Caller MUST attach an error handler to custom streams before passing them to morgan.
          Unhandled stream errors will propagate and crash the process.
          Use stream.on('error', handler) before passing stream to morgan options.
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
          - "https://nodejs.org/api/stream.html#stream_writable_write_chunk_encoding_callback"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: next-called-with-error
        condition: "An error occurs within morgan middleware execution (e.g., token function throws)"
        throws: "Error passed to next(err) in Express middleware chain"
        required_handling: >
          Caller MUST have an Express error-handling middleware registered (4-argument middleware).
          Morgan calls next(err) on internal errors; without error middleware the default Express
          handler will respond with 500 and the error stack trace.
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
          - "https://expressjs.com/en/guide/error-handling.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: immediate-option-missing-response-data
        description: "With immediate: true, logs are written on request before response. Response fields (status code, response time, content-length) will be undefined in the log output."
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: skip-function-throws
        description: "If the skip(req, res) function throws, the error propagates as an unhandled exception. The skip function must never throw."
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: custom-token-throws
        description: "Custom tokens registered with morgan.token() that throw will cause the middleware to call next(err). Token functions must handle their own errors."
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: compile
    import_path: "morgan"
    description: >
      Compiles a morgan format string (containing :token-name references) into a reusable
      format function. Called internally by the morgan middleware factory, but also exported
      for app code that needs to pre-compile format strings before passing them to morgan()
      or for use in custom logging pipelines.

    preconditions:
      # Evidence: https://raw.githubusercontent.com/expressjs/morgan/master/index.js line 395
      # Source confirms: if (typeof format !== 'string') { throw new TypeError('argument format must be a string') }
      # Moved to preconditions: fires only when argument is non-string (not detectable statically for all calls)
      - id: compile-non-string-throws
        description: "format argument is not a string (e.g., undefined, null, number, object)"
        sources:
          - "https://raw.githubusercontent.com/expressjs/morgan/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    postconditions:
      # Evidence: https://raw.githubusercontent.com/expressjs/morgan/master/index.js line 399-411
      # compile() uses new Function() internally — format strings with invalid token syntax
      # produce format functions that silently return "-" for unresolved tokens, not errors.
      # However, the new Function() call itself can throw SyntaxError for extremely malformed input.
      - id: compile-invalid-token-syntax-silent
        condition: "Format string contains valid syntax but references undefined token names (e.g., ':nonexistent-token')"
        throws: "No error thrown — undefined tokens silently resolve to '-' in log output"
        required_handling: >
          Caller SHOULD verify that all token names used in format strings are registered
          via morgan.token() before the format is compiled. Unregistered tokens resolve to
          '-' silently, producing misleading log output without any runtime error.
          Validate token names during integration testing.
        sources:
          - "https://raw.githubusercontent.com/expressjs/morgan/master/index.js"
          - "https://github.com/expressjs/morgan#readme"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: token
    import_path: "morgan"
    description: >
      Registers a custom token function with the given name. The token becomes available
      in format strings as :token-name. Called at application startup to extend morgan's
      built-in token set. Returns the morgan instance for chaining.

    postconditions:
      # Evidence: https://github.com/expressjs/morgan#readme
      # "Calling morgan.token() using the same name as an existing token will overwrite that token definition."
      # Source confirmed: morgan.token() sets morgan[name] = fn directly, no guard against overwrite.
      - id: token-name-overwrite-silent
        condition: "morgan.token() is called with a name that matches a built-in token (e.g., 'status', 'method', 'url', 'response-time') or a previously registered custom token"
        throws: "No error thrown — existing token definition is silently replaced"
        required_handling: >
          Caller MUST avoid reusing built-in token names unless intentionally overriding
          built-in behavior. Built-in tokens: 'date', 'http-version', 'method', 'referrer',
          'remote-addr', 'remote-user', 'req', 'res', 'response-time', 'status',
          'total-time', 'url', 'user-agent'.
          Overwriting 'status' or 'response-time' silently changes log output for ALL
          morgan middleware instances in the same process, including third-party middleware.
          Use namespaced token names (e.g., 'x-request-id', 'app-user-id') to avoid collisions.
        sources:
          - "https://github.com/expressjs/morgan#readme"
          - "https://raw.githubusercontent.com/expressjs/morgan/master/index.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
