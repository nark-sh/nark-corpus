package: morgan
semver: ">=1.0.0 <2.0.0"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
# Depth pass 2026-04-16 (deepen-stream-1 pass 1):
# API surface: 4 callable exports (morgan, morgan.token, morgan.format, morgan.compile)
# Contracted before: 1 (morgan factory with 2 postconditions + 3 edge cases)
# Contracted after: 3 (added morgan.compile, morgan.token)
# Omitted: 1 (morgan.format — pure name registry, no distinct error surface)
# Coverage: 3/4 = 0.75 (up from 0.25)
# Evidence from morgan@1.10.1 source:
#   https://raw.githubusercontent.com/expressjs/morgan/master/index.js — line 395: throw new TypeError
#   https://raw.githubusercontent.com/expressjs/morgan/master/README.md — token overwrite behavior documented
#
# Depth pass 2026-06-12 (deepen-stream-2 pass 4):
# Re-enumerated against morgan@1.11.0 + @types/morgan — same 4 exports (no new
# functions added in 1.11). Revisited the prior decision to omit morgan.format()
# and found it has the same silent-overwrite hazard as morgan.token(): the body
# is `morgan[name] = fmt; return this` (lib/index.js lines 488-491), with no guard
# against overwriting the built-in named formats ('combined', 'common', 'dev',
# 'short', 'tiny', 'default'). Calling morgan.format('combined', myCustomFn)
# silently replaces the Apache combined log shape for ALL morgan middleware
# instances in the same process, including third-party middleware. Distinct
# postcondition because the format names and their meanings differ from the
# token names, even though the failure mode is structurally identical.
# After this pass: 4/4 callable exports contracted, 0 omitted.
# Evidence:
#   node_modules/morgan/index.js lines 488-491 (function format body)
#   node_modules/morgan/index.js lines 178-209 (built-in formats registered via morgan.format)
#   https://github.com/expressjs/morgan#readme  (morgan.format(name, fmt) docs)
#
# Depth pass 2026-06-24 (deepen-stream-2 pass 88):
# Re-enumerated against morgan@1.11.0 + @types/morgan@1.9.10 — same 4 exports,
# no new exports introduced. Added one new postcondition on morgan.format() —
# format-non-string-non-function-delayed-throw — covering a delayed-throw
# hazard previously left implicit. morgan.format(name, fmt) does NOT type-check
# fmt before assigning to morgan[name] (lib/index.js lines 488-491: no guard
# beyond direct assignment). If fmt is neither a string nor a function (e.g.
# undefined, null, number, plain object), it is stored without error. The
# delayed-throw fires later inside the morgan() factory: getFormatFunction()
# at lines 501-509 reads morgan[name] and passes non-function values to
# compile(), which at lines 427-430 throws TypeError("argument format must
# be a string") only for non-string values. For object/array/number values,
# compile() silently produces a format function returning the JSON-encoded
# representation, causing garbled log lines instead of an exception.
# Hazard: factory-time vs registration-time error separation makes the bug
# surface in a different stack frame than its cause, hard to diagnose at
# scale. Distinct from compile-non-string-throws (which fires when caller
# passes the bad value directly to compile()) — here the bad value is
# parked in morgan[name] state and the throw is decoupled in time and
# call site.
# After this pass: 4/4 callable exports contracted, 5 postconditions total
# (stream-write-error, next-called-with-error on factory; compile-non-string-throws
# precondition + compile-invalid-token-syntax-silent on compile; token-name-overwrite-silent
# on token; format-name-overwrite-silent + format-non-string-non-function-delayed-throw
# on format).
# Evidence:
#   node_modules/morgan/index.js lines 488-491 (function format — no type guard)
#   node_modules/morgan/index.js lines 501-509 (getFormatFunction — late dispatch)
#   node_modules/morgan/index.js lines 427-430 (compile — string check throws TypeError)
#   node_modules/@types/morgan/index.d.ts lines 107-112, 135-151 (format() type overloads accept string|FormatFn — runtime is laxer than the types)
coverage_score: 1.0  # 4 contracted / 4 total callable exports (0 omitted)

functions:
  - name: morgan
    import_path: "morgan"
    description: "HTTP request logger middleware factory. Returns Express middleware that logs HTTP requests."

    preconditions:
      - id: stream-writable
        description: "If a custom stream is provided via options.stream, it must be a writable stream. If the stream is closed or errored, log writes will silently fail or throw."
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    postconditions:
      # Evidence: seen in 19 primary firings across 13 repos in scan-morgan-2026-06-29.json
      # Top affected: Azure/Azurite (⭐ 2141), spacebarchat/server (⭐ 2124), aiko-chan-ai/DiscordBotClient (⭐ 1309)
      - id: stream-write-error
        maturity: stable
        condition: "The output stream (default process.stdout or custom stream) throws or emits an error during log line write"
        throws: "Error from the underlying stream write operation"
        required_handling: >
          Caller MUST attach an error handler to custom streams before passing them to morgan.
          Unhandled stream errors will propagate and crash the process.
          Use stream.on('error', handler) before passing stream to morgan options.
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
          - "https://nodejs.org/api/stream.html#stream_writable_write_chunk_encoding_callback"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: next-called-with-error
        maturity: stable
        condition: "An error occurs within morgan middleware execution (e.g., token function throws)"
        throws: "Error passed to next(err) in Express middleware chain"
        required_handling: >
          Caller MUST have an Express error-handling middleware registered (4-argument middleware).
          Morgan calls next(err) on internal errors; without error middleware the default Express
          handler will respond with 500 and the error stack trace.
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
          - "https://expressjs.com/en/guide/error-handling.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: immediate-option-missing-response-data
        description: "With immediate: true, logs are written on request before response. Response fields (status code, response time, content-length) will be undefined in the log output."
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: skip-function-throws
        description: "If the skip(req, res) function throws, the error propagates as an unhandled exception. The skip function must never throw."
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: custom-token-throws
        description: "Custom tokens registered with morgan.token() that throw will cause the middleware to call next(err). Token functions must handle their own errors."
        sources:
          - "https://expressjs.com/en/resources/middleware/morgan.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: compile
    import_path: "morgan"
    description: >
      Compiles a morgan format string (containing :token-name references) into a reusable
      format function. Called internally by the morgan middleware factory, but also exported
      for app code that needs to pre-compile format strings before passing them to morgan()
      or for use in custom logging pipelines.

    preconditions:
      # Evidence: https://raw.githubusercontent.com/expressjs/morgan/master/index.js line 395
      # Source confirms: if (typeof format !== 'string') { throw new TypeError('argument format must be a string') }
      # Moved to preconditions: fires only when argument is non-string (not detectable statically for all calls)
      - id: compile-non-string-throws
        description: "format argument is not a string (e.g., undefined, null, number, object)"
        sources:
          - "https://raw.githubusercontent.com/expressjs/morgan/master/index.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    postconditions:
      # Evidence: https://raw.githubusercontent.com/expressjs/morgan/master/index.js line 399-411
      # compile() uses new Function() internally — format strings with invalid token syntax
      # produce format functions that silently return "-" for unresolved tokens, not errors.
      # However, the new Function() call itself can throw SyntaxError for extremely malformed input.
      - id: compile-invalid-token-syntax-silent
        maturity: stable
        condition: "Format string contains valid syntax but references undefined token names (e.g., ':nonexistent-token')"
        throws: "No error thrown — undefined tokens silently resolve to '-' in log output"
        required_handling: >
          Caller SHOULD verify that all token names used in format strings are registered
          via morgan.token() before the format is compiled. Unregistered tokens resolve to
          '-' silently, producing misleading log output without any runtime error.
          Validate token names during integration testing.
        sources:
          - "https://raw.githubusercontent.com/expressjs/morgan/master/index.js"
          - "https://github.com/expressjs/morgan#readme"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: token
    import_path: "morgan"
    description: >
      Registers a custom token function with the given name. The token becomes available
      in format strings as :token-name. Called at application startup to extend morgan's
      built-in token set. Returns the morgan instance for chaining.

    postconditions:
      # Evidence: https://github.com/expressjs/morgan#readme
      # "Calling morgan.token() using the same name as an existing token will overwrite that token definition."
      # Source confirmed: morgan.token() sets morgan[name] = fn directly, no guard against overwrite.
      - id: token-name-overwrite-silent
        maturity: stable
        condition: "morgan.token() is called with a name that matches a built-in token (e.g., 'status', 'method', 'url', 'response-time') or a previously registered custom token"
        throws: "No error thrown — existing token definition is silently replaced"
        required_handling: >
          Caller MUST avoid reusing built-in token names unless intentionally overriding
          built-in behavior. Built-in tokens: 'date', 'http-version', 'method', 'referrer',
          'remote-addr', 'remote-user', 'req', 'res', 'response-time', 'status',
          'total-time', 'url', 'user-agent'.
          Overwriting 'status' or 'response-time' silently changes log output for ALL
          morgan middleware instances in the same process, including third-party middleware.
          Use namespaced token names (e.g., 'x-request-id', 'app-user-id') to avoid collisions.
        sources:
          - "https://github.com/expressjs/morgan#readme"
          - "https://raw.githubusercontent.com/expressjs/morgan/master/index.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

  - name: format
    import_path: "morgan"
    description: >
      Registers a named format by associating a format string or format function with
      a name. The name becomes usable as the first argument to morgan() — e.g. after
      morgan.format('access-log', ':method :url :status'), code can call
      morgan('access-log'). Called at application startup to define reusable format
      shapes. Returns the morgan instance for chaining.

    postconditions:
      # Evidence: node_modules/morgan/index.js lines 488-491 (morgan@1.11.0):
      #   function format (name, fmt) {
      #     morgan[name] = fmt
      #     return this
      #   }
      # No guard against overwriting. The built-in formats ('combined', 'common',
      # 'default', 'dev', 'short', 'tiny') are themselves registered via internal
      # morgan.format() calls at module load (lines 178-209) — they live on the same
      # morgan[name] slots that user code writes to. Calling morgan.format with a
      # built-in name silently replaces the format used by every morgan() call that
      # references that name, including in third-party middleware loaded in the same
      # process. Failure mode is structurally identical to token-name-overwrite-silent
      # but distinct in surface (format names != token names) and consequence (entire
      # log-line shape changes vs. a single field rendering).
      # Source: https://github.com/expressjs/morgan#readme
      # Source: https://raw.githubusercontent.com/expressjs/morgan/master/index.js
      - id: format-name-overwrite-silent
        maturity: stable
        condition: "morgan.format() is called with a name that matches a built-in format ('combined', 'common', 'default', 'dev', 'short', 'tiny') or a previously registered custom format"
        throws: "No error thrown — existing format definition is silently replaced"
        required_handling: >
          Caller MUST avoid reusing built-in format names unless intentionally
          overriding built-in behavior. Built-in formats registered by morgan itself:
          'combined', 'common', 'default', 'dev', 'short', 'tiny'.
          Overwriting 'combined' (Apache combined log shape, used by the most common
          morgan('combined') invocation) silently changes log line structure for ALL
          morgan middleware instances in the same process, including third-party
          middleware. Downstream log parsers (Logstash, Datadog, Fluentd) break when
          field positions shift. Use namespaced format names (e.g., 'app-access',
          'audit-log') to avoid collisions with the built-in set.
        sources:
          - "https://github.com/expressjs/morgan#readme"
          - "https://raw.githubusercontent.com/expressjs/morgan/master/index.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

      # Evidence: node_modules/morgan/index.js lines 488-491 (function format body — direct assignment, no type guard)
      # Evidence: node_modules/morgan/index.js lines 501-509 (getFormatFunction — late dispatch on stored value)
      # Evidence: node_modules/morgan/index.js lines 427-430 (compile — TypeError thrown only for non-string)
      # Source confirmed at morgan@1.11.0: format(name, fmt) writes morgan[name] = fmt with NO check
      # that fmt is string|function. The runtime is laxer than the TypeScript types in @types/morgan,
      # which constrain fmt to `string | FormatFn`. Non-string non-function values (number, object,
      # array, undefined, null) reach the storage slot. Failure surfaces later when morgan(name)
      # is called and getFormatFunction passes the bad value to compile() — a different stack frame.
      - id: format-non-string-non-function-delayed-throw
        maturity: stable
        condition: "morgan.format() is called with fmt argument that is neither a string nor a function (e.g., number, plain object, undefined, null)"
        throws: >
          No error thrown at format() call site. Later, when morgan(name) is invoked for that format,
          getFormatFunction passes the stored value to compile(), which throws TypeError 'argument
          format must be a string' for non-string values. For object/array values, compile() may
          silently produce a format function that returns the JSON-encoded representation,
          causing garbled log lines instead of an exception.
        required_handling: >
          Caller MUST ensure the second argument to morgan.format() is a non-empty format string
          (using :token-name syntax) or a FormatFn ((tokens, req, res) => string|undefined|null).
          The TypeScript declarations in @types/morgan enforce this at compile time, but plain
          JavaScript callers, dynamic-typed wrappers, and config-loaded format values can defeat
          the type check. Validate format values at the integration boundary where they enter
          the morgan registration call. Do not register a format from untrusted config without
          verifying its type.
        sources:
          - "https://raw.githubusercontent.com/expressjs/morgan/master/index.js"
          - "https://github.com/expressjs/morgan#readme"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: low
