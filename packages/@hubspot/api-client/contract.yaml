  - name: oauth.tokensApi.create
    import_path: "@hubspot/api-client"
    description: >
      Exchanges an OAuth 2.0 authorization code for an access token and refresh token.
      Called as client.oauth.tokensApi.create(grantType, code, redirectUri, clientId,
      clientSecret). Makes an HTTP POST to /oauth/v1/token. Used in OAuth app installation
      flows. Also used for refreshing tokens (grantType='refresh_token'). Throws ApiException
      on invalid, expired, or already-used authorization codes.
    patterns:
      - 'oauth.tokensApi.create('
      - 'tokensApi.create('

    postconditions:
      # Evidence: lib/codegen/oauth/apis/TokensApi.js — createWithHttpInfo confirmed
      #   ApiException thrown on non-200 responses
      # Docs: https://developers.hubspot.com/docs/api/oauth/tokens
      #   "invalid_grant" error for expired/used codes documented in HubSpot OAuth error spec
      #   HubSpot conforms to RFC 6749 OAuth 2.0 standard for error responses
      - id: oauth-tokens-create-no-try-catch
        condition: >
          client.oauth.tokensApi.create() called in async context without surrounding
          try/catch. OAuth authorization codes are single-use and expire within minutes.
          Expired, already-used, or redirectUri-mismatched codes throw ApiException.
        throws: >
          ApiException<ErrorBody> (extends Error) with code (HTTP status).
          status 400: invalid_grant — authorization code expired (codes expire quickly after
                      user grants access), already exchanged, or redirectUri does not match
                      the value used in the authorization URL.
          status 400: invalid_client — clientId or clientSecret is invalid.
          status 400: invalid_request — missing required parameters (code, redirectUri, etc.).
          status 401: Unauthorized — credentials rejected by HubSpot.
          Error body conforms to RFC 6749: { error: "invalid_grant", error_description: "...",
            status: "BAD_REFRESH_TOKEN" } for refresh token failures.
        required_handling: >
          Caller MUST wrap tokensApi.create() in try/catch.
          Authorization codes expire within minutes — implement the OAuth callback handler to
          exchange the code immediately; do not queue it for later processing.
          On invalid_grant, the user must restart the OAuth flow — do not retry with the same code.
          Store returned access_token and refresh_token securely; handle the refresh flow
          (grantType='refresh_token') with the same try/catch pattern when the access token expires.
        sources:
          - "https://developers.hubspot.com/docs/api/oauth/tokens"
          - "https://developers.hubspot.com/docs/api/error-handling"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high
