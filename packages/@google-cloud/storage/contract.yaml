    postconditions:
      - id: deletefiles-partial-failure
        condition: "Some files fail to delete while others succeed"
        throws: "PartialFailureError containing array of failed operations"
        required_handling: >
          Caller MUST handle PartialFailureError separately from ApiError. Inspect
          error.errors array to determine which files failed and why. Consider retry
          logic for failed operations.
        sources:
