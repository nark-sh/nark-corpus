  - name: copy
    import_path: "@google-cloud/storage"
    description: >
      Copies a file to a new location within the same bucket or to a different bucket.
      Called as file.copy(destination, options). Uses the GCS Objects.rewrite API under
      the hood, which supports cross-bucket, cross-region, and cross-project copies.
    postconditions:
      # Evidence: source confirmed from file.js implementation; GCS Objects.rewrite API
      # file.js line 804: throws Error(FileExceptionMessages.DESTINATION_NO_NAME) if destination missing
      # GCS API returns 404 for missing source, 403 for insufficient permissions
      - id: copy-source-not-found
        condition: "Source file does not exist in the bucket"
        throws: "ApiError with HTTP 404 Not Found"
        required_handling: >
          Caller MUST handle not found errors. Verify source file exists before copying,
          or catch 404 and handle gracefully. Common when copying files from user-uploaded
          content that may have been deleted concurrently.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#copy"
          - "https://cloud.google.com/storage/docs/json_api/v1/objects/rewrite"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: copy-permission-error
        condition: "Insufficient IAM permissions to read source or write to destination"
        throws: "ApiError with HTTP 403 Forbidden"
        required_handling: >
          Caller MUST handle permission errors. Requires storage.objects.get on source
          and storage.objects.create on destination bucket. Cross-bucket copies also
          require the service account to have permissions on the destination project.
          This error is NOT automatically retried.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#copy"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: copy-precondition-failed
        condition: "Generation or metageneration precondition check fails"
        throws: "ApiError with HTTP 412 Precondition Failed"
        required_handling: >
          Caller MUST handle precondition failures when using ifGenerationMatch or
          ifMetagenerationMatch options. This error indicates the object was modified
          between the time the caller last read it and the copy attempt. Retry with
          updated preconditions or handle as a conflict.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#copy"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low

  - name: move
    import_path: "@google-cloud/storage"
    description: >
      Moves a file to a new location. Called as file.move(destination, options).
      IMPORTANT: This operation is NOT atomic — it is implemented as a copy() followed
      by delete(). If the delete fails after a successful copy, both the source and
      destination files will exist, leaving a duplicate. This non-atomicity is a key
      Nark profile callers must handle.
    postconditions:
      # Evidence: source confirmed from file.js — move() is copy() + delete()
      # File.html#move explicitly documents: "not an atomic move method...a composition of copy and delete"
      # "an error returned to your callback could be triggered from either one of these API calls failing,
      # which could leave a duplicate file lingering"
      - id: move-non-atomic-duplicate-risk
        condition: "Copy succeeds but delete of source fails, leaving duplicate files"
        throws: "ApiError from the delete phase — source file still exists alongside copied destination"
        required_handling: >
          Caller MUST handle move() errors by checking whether the destination was
          successfully created before treating the error as a full failure. If delete
          fails with 404 (already deleted by another process), treat as success.
          Consider using moveFileAtomic() for same-bucket moves that require atomicity.
          The file.move() non-atomicity is explicitly documented: "a composition of File#copy
          and File#delete... which could leave a duplicate file lingering."
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#move"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: move-source-not-found
        condition: "Source file does not exist"
        throws: "ApiError with HTTP 404 Not Found (from copy phase)"
        required_handling: >
          Caller MUST handle not found errors. Verify source file exists before moving.
          404 errors occur in the copy phase (source doesn't exist) or delete phase
          (source was deleted between copy and delete, which is safe to ignore).
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#move"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: rename
    import_path: "@google-cloud/storage"
    description: >
      Renames a file within the same bucket. Called as file.rename(newName, options).
      Internally calls move() — inherits all non-atomic behavior of move().
      Destination must be a string (file name within the same bucket only).
    postconditions:
      # Evidence: source confirmed from file.js — rename() wraps move() for same-bucket renaming
      # Inherits non-atomic behavior from move()
      - id: rename-non-atomic-duplicate-risk
        condition: "Underlying move() operation leaves duplicate files if delete fails"
        throws: "ApiError — inherits from move() non-atomic behavior"
        required_handling: >
          Caller MUST handle rename() errors the same way as move() errors. If an error
          is thrown, the file may have been copied to the new name but the original not
          deleted, resulting in duplicates. Check destination existence before retrying.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#rename"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: rename-not-found
