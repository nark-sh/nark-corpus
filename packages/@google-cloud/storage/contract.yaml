  - name: createBucket
    import_path: "@google-cloud/storage"
    description: "Creates a new Google Cloud Storage bucket; called as storage.createBucket(name, options)"

    postconditions:
      - id: createbucket-already-exists
        condition: "Bucket with same name already exists"
        throws: "ApiError with HTTP 409 Conflict"
        required_handling: >
          Caller SHOULD handle bucket already exists errors. If idempotent create
          is desired, catch 409 and retrieve existing bucket.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/Storage.html#createBucket"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: createbucket-invalid-name
        condition: "Bucket name violates naming requirements"
        throws: "ApiError with HTTP 400 Bad Request"
        required_handling: >
          Caller MUST validate bucket names before creation. Names must be globally
          unique, lowercase, 3-63 characters, and follow DNS naming conventions.
        sources:
          - "https://cloud.google.com/storage/docs/naming-buckets"
        severity: error
        business_impact:
