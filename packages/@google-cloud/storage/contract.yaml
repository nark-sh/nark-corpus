  - name: TransferManager.uploadManyFiles
    import_path: "@google-cloud/storage"
    description: >
      Uploads multiple files in parallel to a GCS bucket. Called as
      transferManager.uploadManyFiles(filePathsOrDirectory, options). Uses p-limit
      for concurrency control. Internally calls bucket.upload() for each file.
      Returns Promise.all() — ALL individual errors will cause the entire operation to fail.
    postconditions:
      # Evidence: source confirmed from transfer-manager.js
      # Lines 380-410: uses Promise.all(promises) — first failure rejects the entire promise
      # No partial failure handling — if one file fails, all in-progress uploads may be abandoned
      - id: transfer-upload-many-all-or-nothing
        condition: "Any single file upload fails — the entire batch fails with Promise.all rejection"
        throws: "ApiError from the first failing upload — other in-flight uploads are NOT cancelled"
        required_handling: >
          Caller MUST handle errors as a batch failure. uploadManyFiles() uses Promise.all()
          internally, so the first file failure throws, but other concurrent uploads continue
          to their natural completion (they are NOT cancelled). Some files may have been
          uploaded successfully before the error is surfaced. To identify which files
          succeeded, check GCS for the uploaded objects after the error.
          For resilient batch uploads, use individual bucket.upload() calls with your own
          error tracking, or wrap each upload in a try-catch before using Promise.all.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: transfer-upload-many-permission-error
        condition: "Service account lacks write permissions on the bucket"
        throws: "ApiError with HTTP 403 Forbidden from the first file that encounters the permission error"
        required_handling: >
          Caller MUST handle permission errors. Verify service account has
          storage.objects.create permission before starting a batch upload.
          Permission errors will typically affect ALL files in the batch.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: TransferManager.downloadManyFiles
    import_path: "@google-cloud/storage"
    description: >
      Downloads multiple files in parallel from a GCS bucket to the local filesystem.
      Called as transferManager.downloadManyFiles(filesOrFolder, options). Uses
      Promise.all() — first failure rejects the entire batch operation.
    postconditions:
      # Evidence: source confirmed from transfer-manager.js lines 456-504
      # Promise.all(promises) — batch failure semantics same as uploadManyFiles
      - id: transfer-download-many-all-or-nothing
        condition: "Any single file download fails — the entire batch fails"
        throws: "ApiError from the first failing download"
        required_handling: >
          Caller MUST handle errors as a batch failure. downloadManyFiles() uses
          Promise.all() — the first file failure throws and surfaces as the batch error,
          but other concurrent downloads continue running. Some files may be written
          to disk while others are missing. Check local filesystem for which files
          were successfully downloaded before retrying.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: transfer-download-many-file-not-found
        condition: "One or more requested files do not exist in the bucket"
        throws: "ApiError with HTTP 404 Not Found from the first missing file"
        required_handling: >
          Caller MUST handle not found errors. Verify all files exist before starting
          a batch download, or use skipIfExists option to avoid overwriting local files.
          A single missing file will fail the entire batch.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: TransferManager.downloadFileInChunks
    import_path: "@google-cloud/storage"
    description: >
      Downloads a large file in parallel chunks to the local filesystem.
      Called as transferManager.downloadFileInChunks(fileOrName, options).
      Calls file.get() to get metadata, then splits the download into parallel ranges.
      Supports CRC32C validation of the fully assembled file.
    postconditions:
      # Evidence: source confirmed from transfer-manager.js lines 539-600
      # Line 584: throws RequestError with code 'CONTENT_DOWNLOAD_MISMATCH' on CRC32C validation failure
      # Line 549: fileInfo = await file.get() — throws ApiError if file not found
      - id: transfer-download-chunks-crc32c-mismatch
        condition: "CRC32C validation enabled and assembled file does not match stored checksum"
        throws: "RequestError with code 'CONTENT_DOWNLOAD_MISMATCH'"
        required_handling: >
          Caller MUST handle CONTENT_DOWNLOAD_MISMATCH errors when using validation: 'crc32c'.
          This error means data was corrupted in transit — some downloaded chunks did not
          assemble correctly. The local file is incomplete or corrupted. Delete the local
          file and retry the download. Use err.code === 'CONTENT_DOWNLOAD_MISMATCH' to
          detect this specific error type.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

      - id: transfer-download-chunks-file-not-found
        condition: "File does not exist in the bucket (fails at metadata fetch stage)"
        throws: "ApiError with HTTP 404 Not Found (from file.get() call)"
        required_handling: >
          Caller MUST handle not found errors. The download fails at the metadata
          retrieval stage (before any chunks are downloaded) if the file doesn't exist.
          No partial files are written to disk at this stage.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: transfer-download-chunks-partial-chunk-failure
        condition: "One or more chunk downloads fail mid-transfer after file is opened for writing"
        throws: "ApiError from the first failed chunk download"
        required_handling: >
          Caller MUST handle chunk failures. When a chunk fails, the local file handle
          is still closed (finally block), but the file on disk will be partially written
          with missing or corrupted byte ranges. Delete the partially written file before
          retrying. Do not rely on a partially downloaded file.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: TransferManager.uploadFileInChunks
    import_path: "@google-cloud/storage"
    description: >
      Uploads a large file in parallel chunks using GCS XML API multipart upload.
      Called as transferManager.uploadFileInChunks(filePath, options).
      Throws MultiPartUploadError on failure — this error contains the uploadId and
      partsMap needed to resume the upload. If autoAbortFailure is true (default),
      the partial upload is automatically aborted on failure.
    postconditions:
      # Evidence: source confirmed from transfer-manager.js lines 637-681
      # Lines 675-679: throws MultiPartUploadError(e.message, mpuHelper.uploadId, mpuHelper.partsMap)
      # This is a UNIQUE error class — not ApiError. Callers must handle MultiPartUploadError specifically.
      - id: transfer-upload-chunks-multipart-error
        condition: "Any chunk upload or upload initiation fails"
        throws: "MultiPartUploadError with uploadId and partsMap properties (NOT a standard ApiError)"
        required_handling: >
          Caller MUST catch MultiPartUploadError specifically — it is NOT a subclass of ApiError.
          The error contains two critical properties for resuming:
          - err.uploadId: the GCS multipart upload ID (to resume the upload later)
          - err.partsMap: Map of successfully uploaded part numbers to ETags
          Store these values to resume the upload. Pass them back as options.uploadId and
          options.partsMap to resume from the last successful chunk.
          If autoAbortFailure is true (default), the upload is automatically aborted on failure
          and these fields contain the aborted session — the upload cannot be resumed.
          Set autoAbortFailure: false to enable resumable failures.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: transfer-upload-chunks-permission-error
        condition: "Service account lacks permission to initiate or complete multipart upload"
        throws: "MultiPartUploadError wrapping an underlying 403 Forbidden from GCS XML API"
        required_handling: >
          Caller MUST handle permission errors from uploadFileInChunks(). The underlying
          403 is wrapped in MultiPartUploadError. Verify service account has
          storage.objects.create permission. The uploadId in the error will be empty/null
          if the failure occurred during upload initiation (before any parts were uploaded).
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/TransferManager.html"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: combine
    import_path: "@google-cloud/storage"
    description: >
      Composes (concatenates) up to 32 source objects in a single bucket into one destination
      object using the GCS compose API. Called as bucket.combine(sources, destination, options).
      Common SaaS uses: assembling parallel chunked uploads into one final file, building
      log archives, joining sharded report exports. Source files are NOT deleted after
      compose — caller must clean up source objects separately if desired.
    postconditions:
      # Evidence: source confirmed from bucket.js line 1094-1175 (combine() implementation).
      # The 32-source limit is documented in the GCS compose REST API:
      # https://cloud.google.com/storage/docs/json_api/v1/objects/compose
      # combine() synchronously throws Error before the request when:
      # - sources is not an array or is empty (line 1096-1098, PROVIDE_SOURCE_FILE)
      # - destination is falsy (line 1099-1101, DESTINATION_FILE_NOT_SPECIFIED)
      # Async API errors come back through the request callback (line 1168-1173).
      - id: combine-source-limit-exceeded
        condition: "More than 32 source objects passed in a single compose request"
        throws: "ApiError with HTTP 400 Bad Request from GCS — compose API rejects sources.length > 32"
        required_handling: >
          Caller MUST handle the 32-source cap. The GCS compose REST API limits a single
          request to 32 source components. For larger composes, caller must do a multi-level
          compose: combine 32 sources into intermediate objects, then combine the intermediates.
          Without try-catch, the rejection surfaces as an unhandled promise rejection and the
          partial workflow (e.g. chunked upload assembly) stalls with no remediation hint.
        sources:
          - "https://cloud.google.com/storage/docs/json_api/v1/objects/compose"
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#combine"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: combine-source-not-found
        condition: "One or more source files referenced in sources[] do not exist (HTTP 404)"
        throws: "ApiError with HTTP 404 Not Found — naming the missing source object in the message"
        required_handling: >
          Caller MUST handle source-missing errors. Compose fails atomically — if any one
          source object is missing, no destination object is created. This is common when
          a parallel upload path (e.g. chunked uploadFileInChunks or TransferManager) had
          a partial failure and the missing chunk was retried under a different name.
          Distinguish 404 from 403 to avoid silently retrying a request that will always
          fail.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#combine"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium

      - id: combine-precondition-failed
        condition: "ifGenerationMatch on the destination does not match — concurrent compose conflict"
        throws: "ApiError with HTTP 412 Precondition Failed"
        required_handling: >
          Caller MUST handle 412 precondition failures. When ifGenerationMatch is set on
          the destination (or via instancePreconditionOpts), a concurrent writer may have
          updated the destination object since the caller read its generation. Compose
          becomes a no-op and the caller must re-read destination state and retry — or
          treat the conflict as a write-loss event. Without explicit handling, a parallel
          assembly job will silently produce stale output or duplicate the work.
        sources:
          - "https://cloud.google.com/storage/docs/json_api/v1/objects/compose"
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#combine"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

  - name: moveFileAtomic
    import_path: "@google-cloud/storage"
    description: >
      Atomically moves a file within the same hierarchical-namespace (HNS) bucket using
      the GCS `objects.moveTo` API. Called as file.moveFileAtomic(destination, options).
      Distinct from file.move() (which is a non-atomic copy+delete) — moveFileAtomic is
      a single server-side rename with no possibility of duplicate files lingering.
      Requires the bucket to have hierarchical namespace enabled and is same-bucket only.
    postconditions:
      # Evidence: source confirmed from file.js line 2766-2824 (moveFileAtomic() implementation).
      # Synchronous throw on no destination (line 2768-2770). Asynchronous errors via the
      # underlying request callback at line 2818-2820. The `moveTo` REST endpoint requires
      # HNS-enabled buckets — calling on a flat bucket fails with HTTP 400.
      - id: move-file-atomic-non-hns-bucket
        condition: "Called on a bucket without hierarchical namespace enabled"
        throws: "ApiError with HTTP 400 Bad Request — moveTo endpoint rejects non-HNS buckets"
        required_handling: >
          Caller MUST handle non-HNS errors with a fallback path. moveFileAtomic only works
          on HNS buckets — most existing GCS buckets are flat. Catch the 400 and either
          fall back to file.move() (and accept the non-atomic semantics), or surface a
          configuration error to operators so they enable HNS at bucket-creation time
          (HNS cannot be enabled retroactively). Without try-catch, callers silently
          assume atomicity they do not have.
        sources:
          - "https://cloud.google.com/storage/docs/json_api/v1/objects/move"
          - "https://googleapis.dev/nodejs/storage/latest/File.html#moveFileAtomic"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: move-file-atomic-precondition-failed
        condition: "ifGenerationMatch precondition does not match the destination's current generation"
        throws: "ApiError with HTTP 412 Precondition Failed"
        required_handling: >
          Caller MUST handle 412 precondition failures. When preconditionOpts.ifGenerationMatch
          is set, a concurrent writer may have created or updated the destination since the
          caller's last read. moveFileAtomic does not overwrite — it fails. Without explicit
          412 handling, retrying with the same precondition will loop indefinitely; the
          caller must re-read the destination, decide whether to overwrite, and resubmit.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#moveFileAtomic"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      - id: move-file-atomic-source-not-found
        condition: "Source file does not exist or was deleted before the move request landed"
        throws: "ApiError with HTTP 404 Not Found"
        required_handling: >
          Caller MUST handle source-not-found errors. Unlike file.move() (where a 404 in
          the delete phase is benign), a 404 from moveFileAtomic always means the source
          never moved — the destination was not created. Treat as a hard failure and
          investigate whether another worker raced the move or the source was cleaned up
          prematurely.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#moveFileAtomic"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: lock
    import_path: "@google-cloud/storage"
    description: >
      Permanently locks the bucket's retention policy via POST /lockRetentionPolicy.
      Called as bucket.lock(metageneration). This action is IRREVERSIBLE — once locked,
      the retention policy can never be reduced or removed, even by the bucket owner.
      Used for compliance/regulatory holds (SEC, HIPAA, GDPR archival). Mistakes here
      have permanent blast radius: a too-long retention period cannot be shortened.
    postconditions:
      # Evidence: source confirmed from bucket.js line 2529-2541 (lock() implementation).
      # Synchronous throw if metageneration is not number|string (line 2530-2533).
      # The /lockRetentionPolicy REST endpoint requires ifMetagenerationMatch — if the
      # bucket metadata has changed since the caller read it, the lock fails with 412.
      # Lock is irreversible per GCS docs: "Once you lock a retention policy, you cannot
      # remove the retention period or unlock the policy."
      - id: lock-precondition-failed
        condition: "ifMetagenerationMatch does not match — bucket metadata changed since caller read it"
        throws: "ApiError with HTTP 412 Precondition Failed"
        required_handling: >
          Caller MUST handle 412 precondition failures. The lock request includes the
          metageneration the caller observed; if any other writer mutated bucket metadata
          between the read and the lock call, the lock is rejected. Without try-catch,
          the operator sees a generic promise rejection and may retry the lock against
          stale state — locking the WRONG retention period permanently. Re-fetch
          getMetadata(), re-confirm the retention period is the intended value, and only
          then resubmit.
        sources:
          - "https://cloud.google.com/storage/docs/json_api/v1/buckets/lockRetentionPolicy"
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#lock"
        severity: error
        business_impact:
          incident_label: COMPLIANCE_VIOLATION
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: critical

      - id: lock-no-retention-policy
        condition: "Bucket has no retention policy to lock — nothing to lock"
        throws: "ApiError with HTTP 400 Bad Request — lockRetentionPolicy on bucket without policy"
        required_handling: >
          Caller MUST handle the no-policy case. lock() only works when a retention
          policy is already set via setRetentionPeriod(). If called on a bucket with no
          policy, the API returns 400. Without try-catch, the deployment scripts that
          enforce compliance posture silently believe they locked the bucket — but the
          bucket has no retention enforcement at all. This is a compliance-audit time
          bomb. Verify getMetadata().retentionPolicy exists before calling lock().
        sources:
          - "https://cloud.google.com/storage/docs/json_api/v1/buckets/lockRetentionPolicy"
        severity: error
        business_impact:
          incident_label: COMPLIANCE_VIOLATION
          production_behavior: immediate_exception
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical

      - id: lock-permission-error
        condition: "Service account lacks storage.buckets.update or the role required to lock retention"
        throws: "ApiError with HTTP 403 Forbidden"
        required_handling: >
          Caller MUST handle permission errors on lock(). Locking a retention policy
          requires elevated permissions (typically Storage Admin or a custom role with
          storage.buckets.update). A silently-swallowed 403 means compliance automation
          believes locking succeeded but the policy remains mutable. Verify the service
          account role at deployment time and surface 403s as a hard failure to the
          compliance owner.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#lock"
        severity: error
        business_impact:
          incident_label: COMPLIANCE_VIOLATION
          production_behavior: immediate_exception
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
