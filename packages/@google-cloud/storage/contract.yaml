package: "@google-cloud/storage"
semver: ">=5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-11"
status: production
evidence_quality: confirmed

functions:
  # Bucket Operations
  - name: upload
    import_path: "@google-cloud/storage"
    description: "Uploads a file to Google Cloud Storage bucket; commonly called as bucket.upload(filePath, options)"

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-google-cloud-storage-2026-04-11.json
      # bucket.upload() inside Promise.all with no error handling — confirmed violation pattern
      # Top affected: electron/forge (⭐ 7015)
      - id: upload-network-error
        condition: "Network connection fails or times out"
        throws: "ApiError with code ECONNRESET, ETIMEDOUT, or HTTP 408/504"
        required_handling: >
          Caller MUST wrap bucket.upload() in try-catch block. Network errors can occur
          due to internet connectivity issues, DNS failures, or Cloud Storage service downtime.
          The library automatically retries (default: 3 attempts with exponential backoff),
          but will throw after max retries exhausted.
        sources:
          - "https://github.com/googleapis/nodejs-storage/issues/833"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: upload-permission-error
        condition: "IAM permissions insufficient for bucket write"
        throws: "ApiError with HTTP 403 Forbidden"
        required_handling: >
          Caller MUST handle permission errors. Verify service account has
          storage.objects.create permission on the target bucket. This error is NOT
          automatically retried.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#upload"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: upload-bucket-not-found
        condition: "Bucket does not exist"
        throws: "ApiError with HTTP 404 Not Found"
        required_handling: >
          Caller MUST handle bucket not found errors. Create bucket first using
          storage.createBucket() or verify bucket name is correct.
        sources:
          - "https://github.com/googleapis/nodejs-storage/issues/813"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: upload-file-not-found
        condition: "Local file path does not exist"
        throws: "Error: ENOENT: no such file or directory"
        required_handling: >
          Caller MUST validate local file exists before calling upload(). Check with
          fs.existsSync() or handle file not found errors gracefully.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#upload"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: download
    import_path: "@google-cloud/storage"
    description: "Downloads a file from Google Cloud Storage; called as file.download(options)"

    postconditions:
      # Evidence: file.download() called without try-catch in erxes/erxes (3918★) read.ts:163
      # const [contents] = await file.download({}) — no error handling for 404/403/network
      # Top affected: erxes/erxes (⭐ 3918)
      - id: download-file-not-found
        condition: "File does not exist in bucket"
        throws: "ApiError with HTTP 404 Not Found"
        required_handling: >
          Caller MUST handle file not found errors. Check if file exists using
          file.exists() before downloading, or handle 404 gracefully.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#download"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: download-permission-error
        condition: "IAM permissions insufficient for file read"
        throws: "ApiError with HTTP 403 Forbidden"
        required_handling: >
          Caller MUST handle permission errors. Verify service account has
          storage.objects.get permission. This error is NOT automatically retried.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#download"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: download-network-error
        condition: "Network connection fails during download"
        throws: "ApiError with code ECONNRESET, ETIMEDOUT"
        required_handling: >
          Caller MUST handle network errors. Large file downloads are more susceptible
          to connection timeouts. The library automatically retries, but will throw after
          max retries exhausted.
        sources:
          - "https://github.com/googleapis/nodejs-storage/issues/2482"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: download-corruption-error
        condition: "Downloaded file hash does not match expected checksum"
        throws: "Error with code CONTENT_DOWNLOAD_MISMATCH"
        required_handling: >
          Caller MUST retry download when corruption detected. This error indicates
          the downloaded content differs from what was stored. Retry the download operation.
        sources:
          - "https://github.com/googleapis/nodejs-storage/issues/709"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: delete
    import_path: "@google-cloud/storage"
    description: "Deletes a file or bucket from Google Cloud Storage; called as file.delete(options)"

    postconditions:
      # Evidence: blob.delete() called without try-catch in Oneirocom/Magick (835★) gcs-storage-manager.ts:47
      # await blob.delete() with no error handling — confirmed violation pattern
      # Top affected: Oneirocom/Magick (⭐ 835)
      - id: delete-not-found
        condition: "File or bucket does not exist"
        throws: "ApiError with HTTP 404 Not Found"
        required_handling: >
          Caller SHOULD handle 404 errors gracefully. If idempotent delete is desired,
          catch 404 and treat as success. Otherwise, throw error to caller.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#delete"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: delete-permission-error
        condition: "IAM permissions insufficient for delete"
        throws: "ApiError with HTTP 403 Forbidden"
        required_handling: >
          Caller MUST handle permission errors. Verify service account has
          storage.objects.delete or storage.buckets.delete permission.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#delete"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: delete-bucket-not-empty
        condition: "Attempting to delete bucket that contains files"
        throws: "ApiError with HTTP 409 Conflict"
        required_handling: >
          Caller MUST delete all files first using bucket.deleteFiles() before deleting
          bucket, or handle conflict error.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#delete"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

