  - name: getSignedUrl
    import_path: "@google-cloud/storage"
    description: "Generates a signed URL for temporary file access; called as file.getSignedUrl(options)"

    postconditions:
      # Evidence: blob.getSignedUrl() called without try-catch in Oneirocom/Magick (835★) gcs-storage-manager.ts:35
      # const [url] = await blob.getSignedUrl({...}) — no error handling in getFileUrl method
      # Correct usage also observed in upload-presigner.ts (wrapped in try-catch) — confirms mixed pattern
      # Top affected: Oneirocom/Magick (⭐ 835)
      - id: getsignedurl-invalid-credentials
        condition: "Service account credentials are invalid or missing"
        throws: "ApiError with authentication failure"
        required_handling: >
          Caller MUST handle credential errors. Signed URLs require service account
          with private key. Verify GOOGLE_APPLICATION_CREDENTIALS is set correctly.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#getSignedUrl"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: getsignedurl-file-not-found
        condition: "File does not exist (for read operations)"
        throws: "ApiError with HTTP 404 Not Found"
        required_handling: >
          Caller SHOULD handle file not found errors. For read URLs, file must exist.
          For write URLs, file will be created on upload.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/File.html#getSignedUrl"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
