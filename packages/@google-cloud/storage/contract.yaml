functions:
  # Bucket Operations
  - name: upload
    import_path: "@google-cloud/storage"
    description: "Uploads a file to Google Cloud Storage bucket; commonly called as bucket.upload(filePath, options)"

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-google-cloud-storage-2026-04-11.json
      # bucket.upload() inside Promise.all with no error handling — confirmed violation pattern
      # Top affected: electron/forge (⭐ 7015)
      - id: upload-network-error
        condition: "Network connection fails or times out"
        throws: "ApiError with code ECONNRESET, ETIMEDOUT, or HTTP 408/504"
        required_handling: >
          Caller MUST wrap bucket.upload() in try-catch block. Network errors can occur
          due to internet connectivity issues, DNS failures, or Cloud Storage service downtime.
          The library automatically retries (default: 3 attempts with exponential backoff),
          but will throw after max retries exhausted.
        sources:
          - "https://github.com/googleapis/nodejs-storage/issues/833"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: upload-permission-error
        condition: "IAM permissions insufficient for bucket write"
        throws: "ApiError with HTTP 403 Forbidden"
        required_handling: >
          Caller MUST handle permission errors. Verify service account has
          storage.objects.create permission on the target bucket. This error is NOT
          automatically retried.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#upload"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: upload-bucket-not-found
        condition: "Bucket does not exist"
        throws: "ApiError with HTTP 404 Not Found"
        required_handling: >
          Caller MUST handle bucket not found errors. Create bucket first using
          storage.createBucket() or verify bucket name is correct.
        sources:
          - "https://github.com/googleapis/nodejs-storage/issues/813"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: upload-file-not-found
        condition: "Local file path does not exist"
        throws: "Error: ENOENT: no such file or directory"
        required_handling: >
          Caller MUST validate local file exists before calling upload(). Check with
          fs.existsSync() or handle file not found errors gracefully.
        sources:
          - "https://googleapis.dev/nodejs/storage/latest/Bucket.html#upload"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

