  - name: update
    import_path: "@pinecone-database/pinecone"
    description: >
      Updates a vector's values, sparse values, or metadata by ID (or by metadata filter).
      Makes an HTTPS PATCH request to the Pinecone data-plane API.
      CRITICAL: Returns HTTP 200 even when the record ID does not exist — the operation
      silently succeeds with no indication that the targeted record was not found.
      Throws on auth failure, bad request, or network error.

    postconditions:
      # Evidence: confirmed from https://docs.pinecone.io/guides/manage-data/update-data
      # SDK source: dist/data/vectors/update.d.ts + dist/errors/http.js
      - id: update-no-error-handling
        maturity: stable
        condition: >
          index.update() called without try-catch or .catch() handler
        throws: >
          PineconeAuthorizationError (HTTP 401 — bad API key).
          PineconeBadRequestError (HTTP 400 — invalid params, or HTTP 403 — quota exceeded).
          PineconeConnectionError (network failures: ECONNREFUSED, ETIMEDOUT).
          PineconeInternalServerError (HTTP 500 — Pinecone server error).
        required_handling: >
          Caller MUST wrap await index.update() in try-catch.
          Network and auth failures throw — metadata pipelines that update
          records fail silently if exceptions are swallowed.

          try {
            await index.update({ id: 'doc-1', metadata: { status: 'processed' } });
          } catch (error) {
            console.error('Pinecone update failed:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/guides/manage-data/update-data"
          - "https://docs.pinecone.io/reference/api/data-plane/update"
          - "https://github.com/pinecone-io/pinecone-ts-client (dist/errors/http.js)"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: update-silent-missing-id
        maturity: stable
        condition: >
          index.update() called with an id that does not exist in the index,
          and the caller assumes a returned success means the record was updated.
        throws: >
          Does NOT throw. Returns HTTP 200 (success) even when no record matched
          the provided ID. The Pinecone API silently ignores updates to non-existent
          records per documented behavior.
        required_handling: >
          Callers that require confirmation of the update MUST call
          index.fetch({ ids: [id] }) after the update to verify the record exists
          and contains the updated values. Do not assume update success implies
          the record exists.

          // Pattern: verify update actually landed
          await index.update({ id: recordId, metadata: newMeta });
          const verify = await index.fetch({ ids: [recordId] });
          if (!verify.records[recordId]) {
            throw new Error(`Record ${recordId} not found — update had no effect`);
          }
        sources:
          - "https://docs.pinecone.io/guides/manage-data/update-data"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: createIndex
    import_path: "@pinecone-database/pinecone"
    description: >
      Creates a new Pinecone vector index. Called on the Pinecone client directly.
      Makes an HTTPS POST request to the control-plane API. Can fail due to quota
      limits (403→PineconeBadRequestError), name conflicts (409→PineconeConflictError),
      invalid parameters (400→PineconeBadRequestError), or network failures.
      Used in admin routes, startup scripts, and provisioning workflows.

    postconditions:
      # Evidence: confirmed from https://docs.pinecone.io/reference/api/control-plane/create_index
      # HTTP status codes verified from pinecone-ts-client source: dist/errors/http.js
      # 400/403 both map to PineconeBadRequestError (403 = quota exceeded)
      - id: createindex-no-error-handling
        maturity: stable
        condition: >
          pinecone.createIndex() called without try-catch or .catch() handler
        throws: >
          PineconeBadRequestError (HTTP 400 — invalid params: bad metric, invalid name;
            or HTTP 403 — project quota exceeded, "Increase your quota or upgrade").
          PineconeConflictError (HTTP 409 — index name already exists in project).
          PineconeNotFoundError (HTTP 404 — invalid cloud/region combination for serverless).
          PineconeConnectionError (network failures).
          PineconeInternalServerError (HTTP 500 — Pinecone server error).
        required_handling: >
          Caller MUST wrap await pinecone.createIndex() in try-catch.
          Quota errors (PineconeBadRequestError with 403 body) require account upgrade.
          Conflict errors (PineconeConflictError) are often handled by using
          suppressConflicts: true option, which skips creation when index exists.

          try {
            await pinecone.createIndex({
              name: 'my-index',
              dimension: 1536,
              spec: { serverless: { cloud: 'aws', region: 'us-east-1' } },
              suppressConflicts: true,
            });
          } catch (error) {
            if (error instanceof Errors.PineconeBadRequestError) {
              // Check error.message: may be quota exceeded (403) or bad params (400)
              console.error('Index creation failed:', error.message);
            }
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/reference/api/control-plane/create_index"
          - "https://github.com/pinecone-io/pinecone-ts-client (dist/errors/http.js)"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: deleteIndex
    import_path: "@pinecone-database/pinecone"
    description: >
      Deletes a Pinecone vector index permanently. Called on the Pinecone client directly.
      Makes an HTTPS DELETE request to the control-plane API.
      CRITICAL: Irreversible operation — all vectors and metadata are permanently lost.
      Can fail if deletion protection is enabled (403→PineconeBadRequestError), index
      not found (404→PineconeNotFoundError), or pending collections exist (412).
      Used in cleanup scripts, test teardown, and admin routes.

    postconditions:
      # Evidence: confirmed from https://docs.pinecone.io/reference/api/control-plane/delete_index
      # 403 (deletion protection enabled) maps to PineconeBadRequestError per dist/errors/http.js
      # 412 (FAILED_PRECONDITION) maps to PineconeUnmappedHttpError
      - id: deleteindex-no-error-handling
        maturity: stable
        condition: >
          pinecone.deleteIndex() called without try-catch or .catch() handler
        throws: >
          PineconeBadRequestError (HTTP 403 — "Deletion protection is enabled for this index.
            Disable deletion protection before retrying.").
          PineconeNotFoundError (HTTP 404 — index name not found in project).
          PineconeUnmappedHttpError (HTTP 412 FAILED_PRECONDITION — pending collections
            exist for the index; must delete collections first).
          PineconeAuthorizationError (HTTP 401 — bad API key).
          PineconeConnectionError (network failures).
        required_handling: >
          Caller MUST wrap await pinecone.deleteIndex() in try-catch.
          Deletion protection errors require explicitly disabling protection first.
          Not-found errors may be expected in idempotent teardown flows — catch and
          handle PineconeNotFoundError separately.

          try {
            await pinecone.deleteIndex('my-index');
          } catch (error) {
            if (error instanceof Errors.PineconeNotFoundError) {
              // Index already gone — idempotent, continue
              return;
            }
            if (error instanceof Errors.PineconeBadRequestError) {
              // Likely deletion protection enabled — disable first
              console.error('Cannot delete index:', error.message);
            }
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/reference/api/control-plane/delete_index"
          - "https://github.com/pinecone-io/pinecone-ts-client (dist/errors/http.js)"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: inference.embed
    import_path: "@pinecone-database/pinecone"
    description: >
      Generates vector embeddings using Pinecone's hosted inference models.
      Called as pc.inference.embed(). Makes an HTTPS POST request to the
      Pinecone inference API. Used in RAG pipelines to convert text/documents
      into vectors before upsert or query. Throws on auth failure, invalid model
      name, invalid params, or network failure.

    postconditions:
      # Evidence: confirmed from https://docs.pinecone.io/guides/inference/generate-embeddings
      # HTTP status codes verified from SDK source: dist/errors/http.js
      # API errors: 400 (invalid params/model), 401 (bad API key), 500 (server error)
      - id: inference-embed-no-error-handling
        maturity: stable
        condition: >
          pc.inference.embed() called without try-catch or .catch() handler
        throws: >
          PineconeAuthorizationError (HTTP 401 — "Invalid API key.").
          PineconeBadRequestError (HTTP 400 — invalid model name, unsupported parameters,
            or input_type not supported by the selected model;
            HTTP 403 — inference quota exceeded for account tier).
          PineconeInternalServerError (HTTP 500 — Pinecone inference server error).
          PineconeUnavailableError (HTTP 503 — Pinecone inference service down).
          PineconeConnectionError (network failures: ECONNREFUSED, ETIMEDOUT).
        required_handling: >
          Caller MUST wrap await pc.inference.embed() in try-catch.
          In RAG pipelines, uncaught embed() failure silently breaks the entire
          ingestion pipeline — documents are not stored in Pinecone and search
          quality degrades to zero without alerting.

          try {
            const embeddings = await pc.inference.embed({
              model: 'multilingual-e5-large',
              inputs: ['Hello world'],
              parameters: { inputType: 'passage', truncate: 'END' },
            });
            return embeddings.data[0].values;
          } catch (error) {
            console.error('Embedding generation failed:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/guides/inference/generate-embeddings"
          - "https://github.com/pinecone-io/pinecone-ts-client (dist/inference/inference.d.ts)"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: listPaginated
    import_path: "@pinecone-database/pinecone"
    description: >
      Lists vectors by ID prefix within a namespace, returning paginated results
      with a pagination token for continuation. Supported only for serverless indexes.
      Makes an HTTPS GET request to the data-plane API. Used for bulk export,
      deletion by prefix pattern, or audit workflows.

    postconditions:
      # Evidence: confirmed from https://docs.pinecone.io/docs/get-record-ids
      # SDK source: dist/data/index.d.ts listPaginated() → Promise<ListResponse>
      - id: listpaginated-no-error-handling
        maturity: stable
        condition: >
          index.listPaginated() called without try-catch or .catch() handler
        throws: >
          PineconeAuthorizationError (HTTP 401 — bad API key).
          PineconeBadRequestError (HTTP 400 — unsupported on pod-based indexes;
            or HTTP 403 — quota exceeded).
          PineconeConnectionError (network failures).
          PineconeArgumentError (runtime validation — invalid arguments).
        required_handling: >
          Caller MUST wrap await index.listPaginated() in try-catch.
          Pod-based index callers receive PineconeBadRequestError (400) since
          listPaginated is only supported for serverless indexes.

          try {
            const results = await index.listPaginated({ prefix: 'doc1#' });
            return results.vectors?.map(v => v.id) ?? [];
          } catch (error) {
            console.error('Pinecone listPaginated failed:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/docs/get-record-ids"
          - "https://docs.pinecone.io/reference/api/data-plane/list"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low

