  - name: inference.rerank
    import_path: "@pinecone-database/pinecone"
    description: >
      Reranks a candidate document set against a query using a hosted Pinecone
      cross-encoder model (e.g. bge-reranker-v2-m3, cohere-rerank-3.5). Called
      as pc.inference.rerank(). Makes an HTTPS POST request to the Pinecone
      inference API. Reranking is the second-stage refinement step in modern
      RAG pipelines — first-stage vector search returns top-K candidates, then
      rerank() reorders by precise semantic relevance. As of 2026, reranking
      is a standard component of production RAG and is now equally important
      to embed() (revised from the 2026-04-16 deepen note that classified it
      as "less adoption").

    postconditions:
      # Evidence: https://docs.pinecone.io/guides/search/rerank-results
      # SDK source: dist/inference/rerank.js (v8.0.0) — throws PineconeArgumentError
      # on empty documents, missing query, or missing model BEFORE the HTTPS call.
      # HTTP error mapping identical to inference.embed via shared InferenceApi.
      - id: inference-rerank-no-error-handling
        maturity: stable
        condition: >
          pc.inference.rerank() called without try-catch or .catch() handler
        throws: >
          PineconeArgumentError (runtime validation BEFORE network call —
            empty documents array, missing query, or missing/unsupported model name).
          PineconeAuthorizationError (HTTP 401 — bad API key).
          PineconeBadRequestError (HTTP 400 — unsupported rerank model, invalid
            rankFields, or document field mismatch with rankFields;
            HTTP 403 — inference quota exceeded).
          PineconeInternalServerError (HTTP 500 — Pinecone inference server error).
          PineconeUnavailableError (HTTP 503 — inference service down).
          PineconeConnectionError (network failures: ECONNREFUSED, ETIMEDOUT).
          PineconeTimeoutError (request exceeded client-configured timeout).
        required_handling: >
          Caller MUST wrap await pc.inference.rerank() in try-catch.
          In two-stage RAG (vector search + rerank), uncaught rerank failures
          either crash the API route or, if the caller falls back to the
          un-reranked candidate list, silently degrade answer quality without
          any signal to the user or operator. Catch and either retry with
          backoff (for 5xx/timeout) or fall back to un-reranked top-K with
          explicit logging so the degraded mode is observable.

          try {
            const reranked = await pc.inference.rerank({
              model: 'bge-reranker-v2-m3',
              query: userQuery,
              documents: candidateDocs,
              topN: 5,
              returnDocuments: true,
            });
            return reranked.data;
          } catch (error) {
            console.error('Rerank failed:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/guides/search/rerank-results"
          - "https://docs.pinecone.io/reference/api/inference/rerank"
          - "https://github.com/pinecone-io/pinecone-ts-client (dist/inference/rerank.js v8.0.0)"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

notes:
  - "Pinecone client (new Pinecone({apiKey})) constructor does NOT make network calls — no try-catch needed there"
  - "pinecone.index('name') does NOT make a network call — returns a local Index client object"
  - "All Index instance methods (upsert, query, fetch, deleteOne, deleteMany, update, listPaginated, upsertRecords, searchRecords, startImport) make HTTPS requests"
  - "Error class mapping confirmed from SDK source dist/errors/http.js: 400→PineconeBadRequestError, 401→PineconeAuthorizationError, 403→PineconeBadRequestError, 404→PineconeNotFoundError, 409→PineconeConflictError, 500→PineconeInternalServerError, 503→PineconeUnavailableError"
  - "NOTE: 403 (quota/forbidden) maps to PineconeBadRequestError — NOT a separate class"
  - "v0.x API used PineconeClient class with async init() — NOT covered by this contract (EOL)"
  - "Namespace operations (index.namespace('ns').upsert()) have the same error behavior as index operations"
  - "update() has critical silent behavior: missing record ID returns HTTP 200 (success), not an error"
  - "deleteAll() deletes all vectors in a namespace — same error characteristics as deleteMany"
  - "listPaginated() is supported only for serverless indexes — pod-based indexes throw PineconeBadRequestError (400)"
  - "upsertRecords() and searchRecords() require indexes created with createIndexForModel() (integrated inference)"
  - "startImport() is async — returns import ID immediately; poll with describeImport() for completion"
  - "configureIndex(), createCollection(), deleteCollection(), describeIndex(), describeCollection() intentionally omitted — admin/config operations not typical app code"
  - "createAssistant(), listAssistants() etc. intentionally omitted — assistant feature, separate from core vector ops"
  - "pc.inference.rerank() CONTRACTED 2026-06-24 (drift-by-staleness pass) — rerank is now a standard 2-stage RAG component; throws PineconeArgumentError on empty documents/query/model before network call, same HTTP error contract as embed"
  - "pc.inference.listModels(), pc.inference.getModel() omitted — read-only, no write or destructive behavior"
  - "describeIndexStats() omitted — read-only stats query, no destructive behavior, same error contract as fetch()"
  - "describeImport() omitted — read-only GET polling, documented in startImport() notes, same error contract"
  - "listNamespaces() omitted — read-only listing, same error contract as listIndexes()"
  - "describeNamespace() omitted — read-only GET, same error contract as listIndexes()"
  - "createBackup(), createIndexFromBackup(), describeBackup(), deleteBackup(), listBackups(), describeRestoreJob(), listRestoreJobs() omitted — admin/infrastructure backup and restore ops, not typical SaaS app code"
