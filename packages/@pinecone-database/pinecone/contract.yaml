        condition: >
          index.listImports() called without try-catch or .catch() handler
        throws: >
          PineconeAuthorizationError (HTTP 401 — bad API key).
          PineconeBadRequestError (HTTP 400 — invalid params).
          PineconeConnectionError (network failures: ECONNREFUSED, ETIMEDOUT).
          PineconeInternalServerError (HTTP 500 — Pinecone server error).
        required_handling: >
