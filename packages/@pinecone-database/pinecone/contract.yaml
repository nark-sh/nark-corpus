# @pinecone-database/pinecone — Pinecone Vector Database Node.js SDK
#
# All index operations (upsert, query, fetch, deleteOne, deleteMany, update) make
# HTTPS requests to the Pinecone API. They can throw PineconeConnectionError,
# PineconeApiError (non-2xx responses including 401 auth, 404 not found, 429 rate
# limit, 5xx server errors), or network errors (ECONNREFUSED, ETIMEDOUT).
# listIndexes() and createIndex() on the Pinecone client have the same behavior.
#
# v1.x API: new Pinecone({ apiKey }) + pinecone.index('name').<method>()
# v0.x API: new PineconeClient() + await client.init({}) — NOT covered here (EOL)
# Both APIs require try-catch around index operations.
package: "@pinecone-database/pinecone"
semver: ">=1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-03-24"
status: production
evidence_quality: partial

detection:
  class_names:
    - "Pinecone"
  factory_methods:
    - "index"
    - "Index"
    - "namespace"

functions:
  - name: upsert
    import_path: "@pinecone-database/pinecone"
    description: >
      Upserts (insert or update) vectors into the index. Makes an HTTPS request
      to the Pinecone API. Throws on auth failure (401), invalid namespace (400),
      rate limit (429), server error (5xx), or network failure.

    postconditions:
      - id: upsert-no-error-handling
        condition: >
          index.upsert() called without try-catch or .catch() handler
        throws: >
          PineconeApiError (non-2xx responses: 401 auth, 400 bad request,
          429 rate limit, 5xx server error). PineconeConnectionError (network
          failures: ECONNREFUSED, ETIMEDOUT). Error on malformed input.
        required_handling: >
          Caller MUST wrap await index.upsert() in try-catch.
          Failure to catch means vectors are silently not stored — RAG pipelines
          degrade with no feedback. Check error type: auth errors need config fix,
          rate limit needs retry with backoff, 5xx needs retry or circuit breaker.

          try {
            await index.upsert([{ id: 'doc-1', values: embedding }]);
          } catch (error) {
            console.error('Failed to upsert vectors:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/reference/api/data-plane/upsert"
          - "https://github.com/pinecone-io/pinecone-ts-client"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: query
    import_path: "@pinecone-database/pinecone"
    description: >
      Queries the index for nearest-neighbor vectors. Makes an HTTPS request to
      the Pinecone API. Core operation for semantic search and RAG retrieval.
      Throws on auth failure, namespace not found, rate limit, or network error.

    postconditions:
      - id: query-no-error-handling
        condition: >
          index.query() called without try-catch or .catch() handler
        throws: >
          PineconeApiError (401 auth, 400 bad namespace, 429 rate limit, 5xx).
          PineconeConnectionError (network failure). Error on mismatched vector
          dimension (query vector dimension must match index dimension).
        required_handling: >
          Caller MUST wrap await index.query() in try-catch.
          Uncaught error in query path causes unhandled rejection — API routes
          return 500, RAG answers become unavailable. Log the error and return
          a safe fallback (empty results, cached response, or error to user).

          try {
            const results = await index.query({
              vector: queryEmbedding,
              topK: 10,
              includeMetadata: true,
            });
            return results.matches;
          } catch (error) {
            console.error('Pinecone query failed:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/reference/api/data-plane/query"
          - "https://docs.pinecone.io/guides/index-data/query-an-index"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteOne
    import_path: "@pinecone-database/pinecone"
    description: >
      Deletes a single vector by ID from the index. Makes an HTTPS DELETE request.
      Throws on auth failure, namespace not found, or network error.

    postconditions:
      - id: deleteone-no-error-handling
        condition: >
          index.deleteOne() called without try-catch or .catch() handler
        throws: >
          PineconeApiError (401 auth, 404 namespace not found, 429 rate limit, 5xx).
          PineconeConnectionError (network failure).
        required_handling: >
          Caller MUST wrap await index.deleteOne() in try-catch.
          Silent delete failures leave stale vectors in the index, causing
          incorrect semantic search results and privacy/consistency issues.
        sources:
          - "https://docs.pinecone.io/reference/api/data-plane/deleteone"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: deleteMany
    import_path: "@pinecone-database/pinecone"
    description: >
      Deletes multiple vectors by IDs or metadata filter. Makes an HTTPS request.
      Bulk delete failures can silently leave stale data in the index.

    postconditions:
      - id: deletemany-no-error-handling
        condition: >
          index.deleteMany() called without try-catch or .catch() handler
        throws: >
          PineconeApiError (401 auth, 400 invalid filter, 429 rate limit, 5xx).
          PineconeConnectionError (network failure).
        required_handling: >
          Caller MUST wrap await index.deleteMany() in try-catch.
        sources:
          - "https://docs.pinecone.io/reference/api/data-plane/deletevectors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: fetch
    import_path: "@pinecone-database/pinecone"
    description: >
      Fetches vectors by their IDs from the index. Makes an HTTPS GET request.
      Used to retrieve stored embeddings and metadata. Throws on auth failure
      or network error.

    postconditions:
      - id: fetch-no-error-handling
        condition: >
          index.fetch() called without try-catch or .catch() handler
        throws: >
          PineconeApiError (401 auth, 429 rate limit, 5xx server error).
          PineconeConnectionError (network failure).
        required_handling: >
          Caller MUST wrap await index.fetch() in try-catch.
        sources:
          - "https://docs.pinecone.io/reference/api/data-plane/fetch"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: listIndexes
    import_path: "@pinecone-database/pinecone"
    description: >
      Lists all indexes in the Pinecone project. Called on the Pinecone client
      directly (not on an Index instance). Makes an HTTPS request to the control
      plane API. Throws on auth failure or network error.

    postconditions:
      - id: listindexes-no-error-handling
        condition: >
          pinecone.listIndexes() called without try-catch or .catch() handler
        throws: >
          PineconeApiError (401 invalid API key, 429 rate limit, 5xx).
          PineconeConnectionError (network failure).
        required_handling: >
          Caller MUST wrap await pinecone.listIndexes() in try-catch.
          Failure during index listing (e.g., in admin routes or startup checks)
          causes the caller to crash with an unhandled rejection.
        sources:
          - "https://docs.pinecone.io/reference/api/control-plane/list_indexes"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

notes:
  - "Pinecone client (new Pinecone({apiKey})) constructor does NOT make network calls — no try-catch needed there"
  - "pinecone.index('name') does NOT make a network call — returns a local Index client object"
  - "All Index instance methods (upsert, query, fetch, deleteOne, deleteMany, update, describeIndexStats) make HTTPS requests"
  - "PineconeApiError is thrown for non-2xx responses; PineconeConnectionError for network failures"
  - "Rate limit (429) should be handled with exponential backoff"
  - "v0.x API used PineconeClient class with async init() — NOT covered by this contract (EOL)"
  - "Namespace operations (index.namespace('ns').upsert()) have the same error behavior as index operations"
  - "deleteAll() deletes all vectors in a namespace — same error characteristics as deleteMany"
  - "update() and listPaginated() not included — less common in application code but have same behavior"
