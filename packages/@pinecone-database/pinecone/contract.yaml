  - name: startImport
    import_path: "@pinecone-database/pinecone"
    description: >
      Starts an asynchronous bulk import of vectors from object storage (S3) into
      a Pinecone serverless index. The import runs in the background — startImport()
      returns an import ID that must be polled for completion status.
      Makes an HTTPS POST request to the data-plane API.
      Used in data migration and large-scale ingestion workflows.

    postconditions:
      # Evidence: confirmed from SDK source dist/data/index.d.ts startImport()
      # → Promise<StartImportResponse>
      - id: startimport-no-error-handling
        maturity: stable
        condition: >
          index.startImport() called without try-catch or .catch() handler
        throws: >
          PineconeAuthorizationError (HTTP 401 — bad API key).
          PineconeBadRequestError (HTTP 400 — invalid S3 URI, unsupported storage type,
            or index is not serverless;
            HTTP 403 — insufficient permissions to access the S3 bucket,
            or storage import quota exceeded).
          PineconeConnectionError (network failures).
          PineconeInternalServerError (HTTP 500 — Pinecone server error).
          PineconeArgumentError (runtime validation — missing uri parameter).
        required_handling: >
          Caller MUST wrap await index.startImport() in try-catch.
          Errors here mean no import was started — the S3 data was not ingested.
          For 403 errors, verify S3 bucket permissions include Pinecone's service
          account. Store the returned id to poll status.

          try {
            const { id } = await index.startImport({
              uri: 's3://my-bucket/embeddings/',
              errorMode: 'CONTINUE',
            });
            console.log(`Import started: ${id}`);
          } catch (error) {
            console.error('startImport failed:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/guides/data-management/import-data"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
