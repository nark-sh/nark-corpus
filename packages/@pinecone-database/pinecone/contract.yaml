# @pinecone-database/pinecone — Pinecone Vector Database Node.js SDK
#
# All index operations (upsert, query, fetch, deleteOne, deleteMany, update,
# listPaginated, upsertRecords, searchRecords) make HTTPS requests to the
# Pinecone API. They throw specific error classes from the @pinecone-database/pinecone
# errors module (confirmed from SDK source at dist/errors/http.js):
#   PineconeAuthorizationError  — HTTP 401 (bad/revoked API key)
#   PineconeBadRequestError     — HTTP 400 (invalid params) OR HTTP 403 (quota exceeded)
#   PineconeNotFoundError       — HTTP 404 (index/collection/record not found)
#   PineconeConflictError       — HTTP 409 (name already exists)
#   PineconeInternalServerError — HTTP 500 (Pinecone server error)
#   PineconeUnavailableError    — HTTP 503 (Pinecone down)
#   PineconeConnectionError     — Network failures (ECONNREFUSED, ETIMEDOUT)
#   PineconeArgumentError       — Runtime validation failure (bad args)
#
# IMPORTANT: 403 (quota/forbidden) maps to PineconeBadRequestError, NOT a separate class.
# update() has a silent success behavior: missing record IDs return HTTP 200, NOT an error.
#
# v1.x API: new Pinecone({ apiKey }) + pinecone.index('name').<method>()
# v0.x API: new PineconeClient() + await client.init({}) — NOT covered here (EOL)
package: "@pinecone-database/pinecone"
semver: ">=1.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 22 contracted / 58 total async-callable / 36 intentionally omitted (drift-by-staleness re-verify 2026-06-24 against v8.0.0; v8 added Assistant vertical + backup family which are intentionally omitted)

detection:
  class_names:
    - "Pinecone"
  factory_methods:
    - "index"
    - "Index"
    - "namespace"

functions:
  - name: upsert
    import_path: "@pinecone-database/pinecone"
    description: >
      Upserts (insert or update) vectors into the index. Makes an HTTPS request
      to the Pinecone API. Throws on auth failure (401), invalid namespace (400),
      rate limit (429), server error (5xx), or network failure.

    postconditions:
      # Evidence: seen in 2 primary firings across 2 repos in scan-pinecone-database-pinecone-2026-04-13.json
      # Top affected: miurla/babyagi-ui (⭐ 1331 stars), dabit3/semantic-search-nextjs-pinecone-langchain-chatgpt
      - id: upsert-no-error-handling
        maturity: stable
        condition: >
          index.upsert() called without try-catch or .catch() handler
        throws: >
          PineconeApiError (non-2xx responses: 401 auth, 400 bad request,
          429 rate limit, 5xx server error). PineconeConnectionError (network
          failures: ECONNREFUSED, ETIMEDOUT). Error on malformed input.
        required_handling: >
          Caller MUST wrap await index.upsert() in try-catch.
          Failure to catch means vectors are silently not stored — RAG pipelines
          degrade with no feedback. Check error type: auth errors need config fix,
          rate limit needs retry with backoff, 5xx needs retry or circuit breaker.

          try {
            await index.upsert([{ id: 'doc-1', values: embedding }]);
          } catch (error) {
            console.error('Failed to upsert vectors:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/reference/api/data-plane/upsert"
          - "https://github.com/pinecone-io/pinecone-ts-client"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: query
    import_path: "@pinecone-database/pinecone"
    description: >
      Queries the index for nearest-neighbor vectors. Makes an HTTPS request to
      the Pinecone API. Core operation for semantic search and RAG retrieval.
      Throws on auth failure, namespace not found, rate limit, or network error.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-pinecone-database-pinecone-2026-04-13.json
      # Top affected: dabit3/semantic-search-nextjs-pinecone-langchain-chatgpt
      - id: query-no-error-handling
        maturity: stable
        condition: >
          index.query() called without try-catch or .catch() handler
        throws: >
          PineconeApiError (401 auth, 400 bad namespace, 429 rate limit, 5xx).
          PineconeConnectionError (network failure). Error on mismatched vector
          dimension (query vector dimension must match index dimension).
        required_handling: >
          Caller MUST wrap await index.query() in try-catch.
          Uncaught error in query path causes unhandled rejection — API routes
          return 500, RAG answers become unavailable. Log the error and return
          a safe fallback (empty results, cached response, or error to user).

          try {
            const results = await index.query({
              vector: queryEmbedding,
              topK: 10,
              includeMetadata: true,
            });
            return results.matches;
          } catch (error) {
            console.error('Pinecone query failed:', error);
            throw error;
          }
        sources:
          - "https://docs.pinecone.io/reference/api/data-plane/query"
          - "https://docs.pinecone.io/guides/index-data/query-an-index"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

