  - name: transaction
    import_path: "drizzle-orm"
    description: >
      Executes multiple database operations atomically inside a PostgreSQL transaction.
      The callback receives a `tx` object with the same API as `db`. If the callback
      throws (or calls `tx.rollback()`), all changes are rolled back automatically.
    postconditions:
      # Evidence: drizzle-orm source — errors.ts confirms TransactionRollbackError class
      # Source: https://orm.drizzle.team/docs/transactions
      # Source: https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/errors.ts
      - id: transaction-rollback-error
        maturity: stable
        condition: "tx.rollback() is called inside the transaction callback"
        throws: "TransactionRollbackError (extends DrizzleError) with message 'Rollback'"
        required_handling: >
          Caller wrapping db.transaction() MUST catch TransactionRollbackError to distinguish
          intentional rollbacks (business logic rejected the transaction) from actual database
          failures. If TransactionRollbackError is swallowed silently, the caller has no way
          to tell whether the transaction committed or was intentionally aborted.
          Pattern: catch (err) { if (err instanceof TransactionRollbackError) { /* intentional */ } else { throw err; } }
        sources:
          - "https://orm.drizzle.team/docs/transactions"
          - "https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/errors.ts"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

      - id: transaction-db-error-no-try-catch
        maturity: stable
        condition: "db.transaction() called without try-catch, and an operation inside throws"
        throws: "Database-specific error (e.g. PostgreSQL error code 23505, 23503, ECONNRESET) that propagates through transaction() after automatic rollback"
        required_handling: >
          Caller MUST wrap db.transaction() in try-catch. When any operation inside the
          callback throws, drizzle automatically rolls back the entire transaction and
          re-throws the original error. Without try-catch at the call site, the error
          propagates as an unhandled rejection, crashing the application while the
          transaction is correctly rolled back — but the caller has no chance to retry
          or return a meaningful error to the user.
        sources:
          - "https://orm.drizzle.team/docs/transactions"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: transaction-nested-savepoint
        maturity: stable
        condition: "db.transaction() called inside another transaction (nested transaction via PgTransaction.transaction())"
        throws: "Uses SAVEPOINT semantics — inner rollback only affects savepoint, not outer transaction; outer tx.rollback() affects everything"
        required_handling: >
          Caller using nested transactions MUST understand savepoint semantics. A rollback
          in an inner transaction only rolls back to the savepoint, not the entire outer
          transaction. The outer transaction continues and MUST be explicitly committed or
          rolled back. Missing this distinction causes partial data writes that appear
          as correct commits to the application but only committed a subset of the intended work.
        sources:
          - "https://orm.drizzle.team/docs/transactions"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: execute
    import_path: "drizzle-orm"
    description: >
      Executes a raw SQL query (db.execute(sql`...`)) or runs a prepared statement
      (preparedQuery.execute({...})). For raw SQL: accepts a parameterized SQL template
      literal from drizzle's `sql` tag. Returns raw result rows without ORM mapping.
    postconditions:
      # Evidence: drizzle-orm source — DrizzleQueryError wraps driver errors
      # Source: https://orm.drizzle.team/docs/sql
      # Source: https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/errors.ts
      - id: execute-query-error
        maturity: stable
        condition: "raw SQL fails — syntax error, table not found, type mismatch, constraint violation"
        throws: "DrizzleQueryError with message 'Failed query: <sql>\\nparams: <params>', wrapping the original driver error as .cause"
        required_handling: >
          Caller MUST wrap db.execute() in try-catch. DrizzleQueryError includes the
          executed query and params in the error message — NEVER log these unredacted
          to external services (they may contain PII). Check err.cause for the underlying
          PostgreSQL error code. Common codes: 42601 (syntax error), 42P01 (table not
          found), 23505 (unique violation), 23503 (foreign key violation).
        sources:
          - "https://orm.drizzle.team/docs/sql"
          - "https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/errors.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      - id: execute-type-mismatch-no-runtime-check
        maturity: stable
        condition: "sql<T> generic parameter does not match actual result shape at runtime"
        throws: "No error thrown — TypeScript type is a lie; runtime data is wrong shape silently"
        required_handling: >
          Caller MUST NOT rely on TypeScript generic type T for runtime validation.
          Drizzle documentation explicitly states: 'sql<T> does not perform any runtime
          mapping.' If the SQL result does not match the expected shape, TypeScript will
          not catch this at runtime — you will get silent type mismatches causing
          undefined property access or wrong data returned to users.
          Validate with zod or manual shape checks after db.execute().
        sources:
          - "https://orm.drizzle.team/docs/sql"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  # ─────────────────────────────────────────────────────────────────────────────
  # Depth pass 2026-06-12 (deepen-stream-2 pass 8)
  # API surface expansion: relational queries (db.query.<table>.findFirst/findMany)
  # and the batch API (D1/LibSQL/Neon).
  # Evidence sources:
  #   /private/tmp/claude/bc-deepen/drizzle-orm/node_modules/drizzle-orm/pg-core/query-builders/query.d.ts (lines 20-21)
  #   /private/tmp/claude/bc-deepen/drizzle-orm/node_modules/drizzle-orm/pg-core/query-builders/query.js (mode === "first" returns rows[0])
  #   /private/tmp/claude/bc-deepen/drizzle-orm/node_modules/drizzle-orm/d1/driver.d.ts (batch signature)
  #   /private/tmp/claude/bc-deepen/drizzle-orm/node_modules/drizzle-orm/d1/session.js (lines 35-52)
  #   https://orm.drizzle.team/docs/rqb (relational queries)
  #   https://orm.drizzle.team/docs/batch-api (batch API)
  #   https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/pg-core/query-builders/query.ts
  # ─────────────────────────────────────────────────────────────────────────────

  - name: findFirst
    import_path: "drizzle-orm"
    description: >
      The relational query API method accessed via db.query.<table>.findFirst().
      Built on top of the schema's `relations` config and returns a single result
      (with related data joined) or `undefined` when no row matches the filter.
      Internally PgRelationalQuery sets `mode === 'first'` and returns `rows[0]`,
      which is `undefined` when the prepared statement yielded zero rows. This is
      the most common silent-failure surface in drizzle code: a missing record
      looks identical to a successful lookup at the type level because TypeScript
      types it as `T | undefined` and callers routinely access `.id`/`.email` on
      the result without checking for undefined.
    postconditions:
      # Evidence: pg-core/query-builders/query.d.ts line 21 — return type is
      # PgRelationalQuery<BuildQueryResult<...> | undefined>
      # Evidence: pg-core/query-builders/query.js (_prepare callback) —
      # if (this.mode === "first") return rows[0];  // undefined when rows is empty
      - id: findfirst-undefined-on-missing-row
        maturity: stable
        condition: >
          db.query.<table>.findFirst({ where: ... }) is called and the filter
          matches zero rows. The promise resolves with `undefined`, not a thrown
          error.
        throws: "No error thrown — returns undefined when no row matches the filter"
        required_handling: >
          Caller MUST check the result for undefined before accessing any property.
          findFirst() returns `T | undefined` — the TypeScript type is honest, but
          a missing row looks identical to a successful lookup at runtime. Common
          anti-pattern:
            const user = await db.query.users.findFirst({ where: eq(users.id, id) });
            return user.email;  // TypeError if user is undefined
          Correct pattern:
            const user = await db.query.users.findFirst({ where: eq(users.id, id) });
            if (!user) throw new NotFoundError(`User ${id} not found`);
            return user.email;
          This is the most common drizzle bug pattern in production — it surfaces
          as `Cannot read properties of undefined (reading 'X')` in request logs,
          usually triggered by stale IDs in URL params, deleted records, or
          permission-filtered lookups.
        sources:
          - "https://orm.drizzle.team/docs/rqb"
          - "https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/pg-core/query-builders/query.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      # Evidence: pg-core/query-builders/query.js execute() calls
      # this._prepare().execute() which delegates to session.prepareQuery and the
      # underlying driver (pg/postgres-js/etc). Driver errors propagate unchanged.
      - id: findfirst-driver-error
        maturity: stable
        condition: >
          db.query.<table>.findFirst() is called and the underlying driver
          throws — connection lost (ECONNRESET, ETIMEDOUT), table missing
          (42P01), invalid relation config (the schema's `relations` object
          references a column that does not exist on the target table), or
          query syntax error in the generated SQL.
        throws: "Driver error (pg.DatabaseError / postgres.PostgresError / etc.) propagates as a Promise rejection"
        required_handling: >
          Caller MUST wrap db.query.<table>.findFirst() in try-catch. Connection
          failures during read paths crash the request handler. Invalid relations
          configs (a `with: { posts: true }` referencing a relation that was not
          declared in the schema) surface here at runtime, not at compile time —
          these are common after schema refactors where relations were removed
          but query call sites were not updated. The same try-catch should
          handle both the driver error and (separately) the undefined-row case
          covered by findfirst-undefined-on-missing-row.
        sources:
          - "https://orm.drizzle.team/docs/rqb"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

  - name: findMany
    import_path: "drizzle-orm"
    description: >
      The relational query API method accessed via db.query.<table>.findMany().
      Returns an array of results (with related data joined). Unlike findFirst,
      findMany returns `T[]` — an empty array when no rows match, never
      undefined. The silent-failure pattern is different: code that loops over
      the result silently does nothing when the array is empty, masking
      configuration errors and stale filters. The driver-error surface is the
      same as findFirst — connection errors and invalid relations propagate.
    postconditions:
      # Evidence: pg-core/query-builders/query.d.ts line 20 — return type is
      # PgRelationalQuery<BuildQueryResult<...>[]>
      - id: findmany-driver-error
        maturity: stable
        condition: >
          db.query.<table>.findMany() is called and the underlying driver
          throws — connection lost, table missing, invalid relation config in
          the `with:` option referencing an undefined relation, or query
          syntax error.
        throws: "Driver error (pg.DatabaseError / postgres.PostgresError / etc.) propagates as a Promise rejection"
        required_handling: >
          Caller MUST wrap db.query.<table>.findMany() in try-catch. Connection
          failures during list endpoints (paginated reads, dashboard data
          loads) crash the request handler. Invalid `with:` configs that
          reference removed/renamed relations surface here at runtime — they
          do not produce TypeScript errors because the schema's relations
          object is checked structurally and a missing key falls back to
          `unknown`. The error message includes the SQL fragment but NOT the
          variable name in the application code, so the call site is hard to
          locate without a stack trace.
        sources:
          - "https://orm.drizzle.team/docs/rqb"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      # Evidence: pg-core/query-builders/query.js — return rows (the full array)
      # when mode !== "first". Empty filter result returns [] silently.
      # This is a behavioral contract on EMPTY-vs-EXPECTED rows, not on throws.
      - id: findmany-empty-array-on-stale-filter
        maturity: stable
        condition: >
          db.query.<table>.findMany() is called with a `where:` filter that no
          rows satisfy (deleted records, wrong organization scope, stale enum
          value after a schema migration, etc.). The promise resolves with an
          empty array.
        throws: "No error thrown — returns [] silently when filter matches zero rows"
        required_handling: >
          Caller SHOULD distinguish empty-result-by-design from
          empty-result-by-mistake. For endpoints that paginate user data, an
          empty array is a valid response. For endpoints that expect at least
          one row (e.g. fetching an organization's billing records during a
          renewal job), the empty array is a silent indicator of misconfigured
          filters or stale state and MUST be checked:
            const rows = await db.query.invoices.findMany({ where: eq(invoices.orgId, orgId) });
            if (rows.length === 0) {
              logger.warn('No invoices found for org', { orgId });
              // decide: throw, fallback, or return early
            }
          Without this check, downstream code that aggregates or averages over
          the array silently produces zeros, NaN, or misleading dashboard
          metrics — a common drizzle production-data bug.
        sources:
          - "https://orm.drizzle.team/docs/rqb"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

  - name: batch
    import_path: "drizzle-orm"
    description: >
      Atomically executes multiple Drizzle statements in a single call. Available
      on LibSQL, Neon, and Cloudflare D1 driver wrappers (NOT on node-postgres /
      postgres-js / better-sqlite3). The wrapped client's `.batch()` method is
      called with prepared queries; the database executes them in an implicit
      transaction. Per docs: "If a statement in the sequence fails, then an
      error is returned for that specific statement, and it aborts or rolls
      back the entire sequence." Returns a typed tuple of results matching the
      input statements.
    postconditions:
      # Evidence: d1/driver.d.ts line 9 — batch<U extends BatchItem<'sqlite'>>
      #   returns Promise<BatchResponse<T>>
      # Evidence: d1/session.js lines 35-52 — calls await this.client.batch(builtQueries)
      #   which propagates the driver's error (D1 / LibSQL / Neon all throw on failure)
      # Evidence: https://orm.drizzle.team/docs/batch-api — "the entire sequence is rolled back"
      - id: batch-statement-failure-rolls-back-all
        maturity: stable
        condition: >
          db.batch([...]) is called and any statement in the batch fails
          (constraint violation, syntax error, connection drop mid-batch). The
          driver throws — the entire batch is rolled back, none of the
          statements committed.
        throws: >
          Driver-specific error from the failing statement (D1Error,
          LibsqlError, or NeonDbError). The error message names the failing
          statement but the typed BatchResponse you expected to receive is
          NEVER returned — the rejection replaces it.
        required_handling: >
          Caller MUST wrap db.batch() in try-catch. The atomic semantics mean
          either all statements commit and you get the typed BatchResponse, or
          NONE commit and you get a rejection. Application code that builds
          on partial success (e.g. "if step 3 fails, statements 1 and 2 should
          still be applied") MUST NOT use batch() — use sequential awaits
          inside individual try-catch blocks instead.

          Common silent-failure pattern: developers assume batch() returns a
          per-statement result object indicating which statements succeeded.
          It does NOT — the success path returns one typed tuple, the failure
          path throws. Code that destructures the response without try-catch
          crashes the entire request handler on any single-row constraint
          violation buried in the batch.
        sources:
          - "https://orm.drizzle.team/docs/batch-api"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

      # Evidence: batch only supported on D1/LibSQL/Neon drivers. Calling
      # `.batch()` on a node-postgres or postgres-js db has no method — TS
      # catches the obvious case but the runtime crash happens when developers
      # have a generic `db: any` type or pass the wrong client to a shared
      # function expecting batch support.
      - id: batch-unsupported-on-non-batchable-driver
        maturity: stable
        condition: >
          db.batch([...]) is called on a driver wrapper that does not implement
          batch — node-postgres (drizzle-orm/node-postgres), postgres-js
          (drizzle-orm/postgres-js), better-sqlite3, mysql2, planetscale.
          This occurs when shared code receives a db instance typed as a union
          or `any`, and the user passed the wrong driver.
        throws: "TypeError: db.batch is not a function (runtime) — TypeScript catches it if the type is precise, but `any`-typed code reaches runtime"
        required_handling: >
          Code that uses db.batch() MUST be invoked only with a D1, LibSQL, or
          Neon db instance. When writing shared utility functions, either
          parameterize the db type precisely (DrizzleD1Database, LibsqlDatabase,
          NeonHttpDatabase) or feature-detect:
            if (typeof db.batch === 'function') {
              await db.batch([...]);
            } else {
              // fallback to db.transaction() for pg/sqlite drivers
            }
          A surprising number of drizzle batch() crashes in production come
          from code that was written assuming D1 in dev/preview environments
          but ran against postgres-js in production.
        sources:
          - "https://orm.drizzle.team/docs/batch-api"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

  # ─────────────────────────────────────────────────────────────────────────────
  # Depth pass 2026-06-24 (deepen-stream-3 pass 76)
  # Package version verified: drizzle-orm@0.45.2 (latest at time of pass)
  # API surface expansion:
  #   migrate()              — applies pending SQL migration files; wrapped in
  #                            session.transaction(); propagates fs and driver errors.
  #   db.$cache.invalidate() — new cache feature (Cache abstract class + Upstash
  #                            implementation); propagates cache-backend errors and
  #                            silently no-ops when no cache is configured.
  # Evidence sources:
  #   /tmp/claude/deepen-stream3-pass76/node_modules/drizzle-orm/node-postgres/migrator.d.ts
  #   /tmp/claude/deepen-stream3-pass76/node_modules/drizzle-orm/pg-core/db.d.ts (line 70: $cache.invalidate)
  #   /tmp/claude/deepen-stream3-pass76/node_modules/drizzle-orm/cache/core/cache.d.ts
  #   /tmp/claude/deepen-stream3-pass76/node_modules/drizzle-orm/cache/upstash/cache.d.ts
  #   https://orm.drizzle.team/docs/migrations
  #   https://orm.drizzle.team/docs/cache
  #   https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/migrator.ts
  #   https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/pg-core/dialect.ts (PgDialect.migrate wraps in session.transaction)
  #   https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/cache/upstash/cache.ts (Redis errors propagate)
  # ─────────────────────────────────────────────────────────────────────────────

  - name: migrate
    import_path: "drizzle-orm/node-postgres/migrator"
    description: >
      Applies pending SQL migration files to the connected database. Reads
      meta/_journal.json + each referenced .sql file from the migrations
      folder, fetches the migration history from the database, and applies
      every migration newer than the last recorded one. PgDialect.migrate
      (and equivalent per-dialect implementations) wraps the entire pending
      sequence in session.transaction(), so any single failure rolls back
      every migration applied during that call. Available under each driver
      entry point: drizzle-orm/node-postgres/migrator, drizzle-orm/postgres-js/migrator,
      drizzle-orm/neon-http/migrator, drizzle-orm/better-sqlite3/migrator, etc.
      All variants share the same readMigrationFiles + dialect.migrate flow,
      so the error contract is identical across drivers.
    postconditions:
      # Evidence (scan-drizzle-orm-2026-06-29.json): seen in 17 primary firings across 16 repos
      # Top affected: vercel/chatbot (⭐ 19951), nickscamara/open-deep-research (⭐ 6196), sadmann7/tablecn (⭐ 6025)
      # Evidence: drizzle-orm/src/migrator.ts readMigrationFiles —
      #   `throw new Error("Can't find meta/_journal.json file")`
      #   `throw new Error(\`No file ${migrationPath}.sql found in ${migrationFolderTo} folder\`)`
      # Common cause: drizzle.config.ts `out:` path mismatch between drizzle-kit
      # generate (writes the journal) and migrate() (reads it). Containerized
      # deploys that COPY only the app source and miss the drizzle/ folder also
      # surface here at first startup.
      - id: migrate-missing-journal-or-sql-file
        maturity: stable
        condition: >
          migrate(db, { migrationsFolder }) is called and either
          meta/_journal.json is missing from migrationsFolder, or the journal
          references a .sql file that does not exist on disk.
        throws: "Error with message \"Can't find meta/_journal.json file\" or \"No file <path> found in <folder> folder\""
        required_handling: >
          Caller MUST wrap migrate() in try-catch. The fs-missing errors are
          generic Error instances (no custom class) — match on message text
          or rely on the absence of any other plausible failure surface at
          the call site. Surface these failures loudly (process exit /
          startup alert) — a server that boots without applying its
          migrations will throw schema errors on the first user request
          instead of failing fast.
        sources:
          - "https://orm.drizzle.team/docs/migrations"
          - "https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/migrator.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      # Evidence: PgDialect.migrate wraps in `session.transaction(async (tx) => { ... })`.
      # Driver errors from session.execute() propagate unchanged. Common causes:
      # invalid SQL in a generated migration (drizzle-kit can produce DDL that the
      # specific dialect rejects — e.g. unsupported column type, missing CONCURRENTLY
      # qualifier for index on a busy table), constraint violation against existing
      # data (NOT NULL added to a column with NULLs, UNIQUE added to a column with
      # duplicates), or connection drop mid-migration.
      - id: migrate-driver-error-rolls-back-pending
        maturity: stable
        condition: >
          migrate() is called and a SQL statement in one of the pending
          migrations fails — invalid DDL, constraint violation against
          existing data, lock timeout, connection drop, permission denied
          on the migrations schema.
        throws: "Driver-specific error (pg.DatabaseError / postgres.PostgresError / D1Error / LibsqlError / etc.) propagates as a Promise rejection. All pending migrations in this call are rolled back atomically."
        required_handling: >
          Caller MUST wrap migrate() in try-catch and treat any rejection as
          fatal — the migrations table state will not advance, so the next
          process startup will retry the same migrations from the same point.
          Do NOT catch-and-continue: a server that proceeds past a migration
          failure runs against a partially-migrated schema and produces
          inconsistent reads/writes. Log the underlying error code
          (err.code or err.cause?.code) so on-call can distinguish data
          conflicts (require backfill before retry) from transient
          infrastructure errors (safe to retry).
        sources:
          - "https://orm.drizzle.team/docs/migrations"
          - "https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/pg-core/dialect.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

      # Evidence: there is NO built-in lock for migrate() — concurrent calls in
      # different processes (e.g. multi-instance Kubernetes rollouts that all
      # run migrate() on startup) race the SELECT-from-__drizzle_migrations
      # + INSERT-into-__drizzle_migrations sequence. Both transactions see the
      # same "last applied" row, both try to apply the same next migration,
      # and one of them collides on an already-created table/index. The error
      # surface is a generic driver error ("relation X already exists",
      # "duplicate key"), so it is easy to misread as a real bug rather than
      # a concurrent-startup race.
      - id: migrate-no-built-in-lock-concurrent-startup-race
        maturity: stable
        condition: >
          migrate() is called from multiple processes simultaneously against
          the same database (rolling deploys, multi-replica startup, CI
          parallelism) and a new migration is pending. The processes race
          and one of them sees a duplicate-object error mid-migration.
        throws: "Driver error such as \"relation \\\"X\\\" already exists\", \"duplicate key value violates unique constraint __drizzle_migrations_pkey\", or a lock timeout from the migrations table"
        required_handling: >
          Caller MUST either (a) ensure migrate() runs from exactly one
          process before traffic is sent to the new replicas (sidecar /
          initContainer / release-phase command), or (b) wrap migrate() in
          an application-level advisory lock (pg_advisory_lock() or an
          equivalent for the chosen driver) to serialize concurrent
          startups. Catching and retrying on duplicate-object errors is
          NOT safe — the colliding migration may have partially applied
          before the constraint violation, leaving the schema in a state
          neither process knows how to resume from.
        sources:
          - "https://orm.drizzle.team/docs/migrations"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high
        evidence_quality: confirmed

  - name: invalidate
    import_path: "drizzle-orm"
    description: >
      The db.$cache.invalidate() method clears cached query results when the
      DrizzleConfig.cache option is supplied with a Cache implementation
      (e.g. upstashCache()). Accepts { tables?: ... , tags?: ... }. Internally
      delegates to Cache.onMutate(params) which the implementation maps to
      backend operations — for UpstashCache this means redis.hset/hdel +
      Lua script execution against the Upstash REST API. The cache backend
      can fail (Redis unreachable, auth failure, Lua script error,
      rate-limited) and those failures propagate unchanged to the caller.
      A surprising silent-failure pattern: when DrizzleConfig.cache is
      omitted, $cache is wired to NoopCache and invalidate() resolves to
      undefined regardless of what was passed — callers that depend on
      invalidation to reflect a write at the read side will see stale data
      for the lifetime of the wrong-environment process.
    postconditions:
      # Evidence: drizzle-orm/src/cache/upstash/cache.ts —
      #   onMutate calls redis.hset(), redis.sadd(), redis.hdel(), and
      #   luaScripts.onMutateScript.exec(). NO try/catch around these calls.
      #   Errors propagate unchanged.
      # Common in production: Upstash region outage, expired auth token,
      # rate-limit (429) on the REST endpoint, timeout during a
      # high-cardinality tag invalidation (Lua script iterating many tables).
      - id: cache-invalidate-backend-error
        maturity: stable
        condition: >
          db.$cache.invalidate({ tables: ... } | { tags: ... }) is called
          and the underlying Cache implementation throws — Redis connection
          lost, Upstash REST 401/429/500, Lua script timeout, invalid tag
          mapping in the composite-table set.
        throws: "Cache-backend-specific error (UpstashError / TypeError / generic Error from @upstash/redis) propagates as a Promise rejection"
        required_handling: >
          Caller MUST wrap db.$cache.invalidate() in try-catch. Invalidate
          is typically called immediately after a write that the next read
          must see — if the invalidate rejects and the caller does not
          handle it, the write succeeds but downstream reads continue to
          serve the stale cached value until TTL expiry. Recommended
          pattern: catch the cache error, log it with the table/tag that
          failed to invalidate, and either (a) extend the read-after-write
          window by busting the cache key directly through the backend
          client, or (b) accept the stale-read window and surface the
          metric to ops. NEVER swallow the error silently — silent
          invalidate failures are the dominant cause of "I updated the
          row but the API still returns the old value" bugs in
          cache-enabled drizzle apps.
        sources:
          - "https://orm.drizzle.team/docs/cache"
          - "https://raw.githubusercontent.com/drizzle-team/drizzle-orm/main/drizzle-orm/src/cache/upstash/cache.ts"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

      # Evidence: drizzle-orm/src/cache/core/cache.ts —
      #   NoopCache.onMutate is `async (_params) => {}`. When DrizzleConfig.cache
      #   is omitted (or set to NoopCache explicitly), invalidate resolves to
      #   undefined without ever touching the cache. Production code that
      #   uses cache: in one environment and forgets it in another sees this
      #   pattern.
      - id: cache-invalidate-silent-noop-when-cache-not-configured
        maturity: stable
        condition: >
          db.$cache.invalidate(...) is called against a db that was
          constructed WITHOUT the cache: option in DrizzleConfig. invalidate
          resolves to undefined — no error, no warning, no log line.
        throws: "No error thrown — silently no-ops (NoopCache.onMutate returns immediately)"
        required_handling: >
          Calling code MUST NOT rely on invalidate() as a proof that
          downstream reads will reflect the latest write. Either (a) require
          the cache: option to be present (assert in app bootstrap and
          fail fast if missing), or (b) make read paths tolerant to stale
          values within a known TTL. In review, treat any code that calls
          $cache.invalidate as a tripwire — every caller MUST have a
          corresponding boot-time assertion that the cache is actually
          configured for the current environment. Otherwise the
          invalidate is dead code masquerading as correctness.
        sources:
          - "https://orm.drizzle.team/docs/cache"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

edge_cases:
  - id: transaction-handling
    description: "Use db.transaction() to wrap multiple operations - must handle transaction errors to ensure rollback and prevent partial commits"
    sources:
      - "https://orm.drizzle.team/docs/transactions"
    severity: warning
    business_impact:
      incident_label: DATA_LOSS
      production_behavior: immediate_exception
      visibility: visible
      user_experience: lost_data
      incident_cost_range: high

