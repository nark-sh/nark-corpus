  - name: delete
    import_path: "drizzle-orm"
    description: "Executes a DELETE query"
    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-drizzle-orm-2026-04-02.json
      # Top affected: vercel/nextjs-postgres-nextauth-tailwindcss-template (⭐ 1589)
      - id: delete-constraint-violation
        condition: "delete violates foreign key constraint (referenced by other tables)"
        throws: "Error with foreign key constraint violation details"
        required_handling: "Caller MUST wrap delete operations in try-catch to handle foreign key constraint violations. Cascade deletes and constraint errors crash application if unhandled."
        sources:
          - "https://orm.drizzle.team/docs/delete"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
