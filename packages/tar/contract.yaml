package: tar
semver: ">=6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-13"
status: production
evidence_quality: confirmed
# Audit 2026-04-13: 17 repos scanned, 10 violations across 7 repos (x: 5, extract: 3, create: 1, c: 1).
# scan-tar-2026-04-13.json. FP check: 0/20 type-A FPs (0% rate). Confirmed.

# tar for Node.js — extract and create tar archives.
# Both extract() and create() return Promise<void> when called with a file: option.
# The Promise rejects on: corrupt archives (TAR_BAD_ARCHIVE), filesystem errors
# (ENOENT, EACCES, ENOSPC), invalid cwd (CwdError), gzip errors (TAR_ABORT),
# and symlink traversal violations (SymlinkError).
# Source: https://github.com/isaacs/node-tar#readme — "Warnings and Errors" section.

functions:
  - name: extract
    import_path: "tar"
    description: >
      Extract a tar archive to disk. When called with a file: option, returns Promise<void>
      that rejects for unrecoverable conditions: corrupt archives (TAR_BAD_ARCHIVE),
      filesystem errors (ENOENT, EACCES, ENOSPC), invalid cwd (CwdError),
      gzip decompression errors (TAR_ABORT), and symlink traversal (SymlinkError).

    postconditions:
      # Evidence: seen in 3 primary firings across 2 repos in scan-tar-2026-04-13.json
      # Top affected: luckjiawei/frpc-desktop, vercel/fun
      - id: extract-error-handling
        condition: >
          async call to tar.extract() or extract() with a file: option is awaited without
          a try-catch block. Rejects with Error where error.code is one of:
          TAR_BAD_ARCHIVE, TAR_ENTRY_ERROR, TAR_ABORT, CwdError, SymlinkError,
          ENOENT, EACCES, or ENOSPC.
        throws: "Error (code: TAR_BAD_ARCHIVE | TAR_ENTRY_ERROR | TAR_ABORT | CwdError | SymlinkError | ENOENT | EACCES | ENOSPC)"
        required_handling: >
          Caller MUST wrap tar.extract() in try-catch and handle extraction errors.

          Minimum handling:
            try {
              await tar.extract({ file: archivePath, cwd: targetDir });
            } catch (error) {
              console.error('Extraction failed:', error.message, error.code);
              throw error;
            }
        sources:
          - "https://github.com/isaacs/node-tar#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: x
    import_path: "tar"
    description: >
      Alias for tar.extract. Used as tar.x({file, cwd, ...}) in namespace imports.
      Same error contract as extract: rejects on corrupt archives, filesystem errors,
      gzip errors, and symlink violations.

    postconditions:
      # Evidence: seen in 5 primary firings across 4 repos in scan-tar-2026-04-13.json
      # Top affected: ferdium/ferdium-app, observablehq/framework, OpenWhispr/openwhispr, mongodb-js/boxednode
      - id: extract-error-handling
        condition: >
          async call to tar.x() with a file: option is awaited without a try-catch block.
          Rejects with Error where error.code is one of: TAR_BAD_ARCHIVE, TAR_ENTRY_ERROR,
          TAR_ABORT, CwdError, SymlinkError, ENOENT, EACCES, ENOSPC.
        throws: "Error (code: TAR_BAD_ARCHIVE | TAR_ENTRY_ERROR | TAR_ABORT | CwdError | SymlinkError | ENOENT | EACCES | ENOSPC)"
        required_handling: >
          Caller MUST wrap tar.x() in try-catch and handle extraction errors.

          Minimum handling:
            try {
              await tar.x({ file: archivePath, cwd: targetDir });
            } catch (error) {
              console.error('Extraction failed:', error.message, error.code);
              throw error;
            }
        sources:
          - "https://github.com/isaacs/node-tar#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: create
    import_path: "tar"
    description: >
      Create a tar archive from files on disk. When called with a file: option, returns
      Promise<void> that rejects on filesystem errors (ENOENT, EACCES), invalid cwd
      (CwdError), or entry errors (TAR_ENTRY_ERROR).

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-tar-2026-04-13.json
      # Top affected: C4illin/ConvertX
      - id: create-error-handling
        condition: >
          async call to tar.create() or create() with a file: option is awaited without
          a try-catch block. Rejects with filesystem errors (ENOENT, EACCES, ENOSPC),
          CwdError, or TAR_ENTRY_ERROR.
        throws: "Error (code: TAR_ENTRY_ERROR | CwdError | ENOENT | EACCES | ENOSPC)"
        required_handling: >
          Caller MUST wrap tar.create() in try-catch and handle creation errors.

          Minimum handling:
            try {
              await tar.create({ file: outputPath, gzip: true }, files);
            } catch (error) {
              console.error('Archive creation failed:', error.message, error.code);
              throw error;
            }
        sources:
          - "https://github.com/isaacs/node-tar#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: c
    import_path: "tar"
    description: >
      Alias for tar.create. Used as tar.c({file, ...}, files) in namespace imports.
      Same error contract as create: rejects on filesystem errors, CwdError, or entry errors.

    postconditions:
      # Evidence: seen in 1 primary firing across 1 repo in scan-tar-2026-04-13.json
      # Top affected: mongodb-js/boxednode
      - id: create-error-handling
        condition: >
          async call to tar.c() with a file: option is awaited without a try-catch block.
          Rejects with filesystem errors (ENOENT, EACCES, ENOSPC), CwdError, or TAR_ENTRY_ERROR.
        throws: "Error (code: TAR_ENTRY_ERROR | CwdError | ENOENT | EACCES | ENOSPC)"
        required_handling: >
          Caller MUST wrap tar.c() in try-catch and handle creation errors.

          Minimum handling:
            try {
              await tar.c({ file: outputPath }, files);
            } catch (error) {
              console.error('Archive creation failed:', error.message, error.code);
              throw error;
            }
        sources:
          - "https://github.com/isaacs/node-tar#readme"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
