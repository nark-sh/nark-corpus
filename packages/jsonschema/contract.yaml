package: jsonschema
semver: ">=1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: partial

functions:
  - name: validate
    import_path: "jsonschema"
    description: "Validates data against a JSON Schema. Throws when throwFirst, throwAll, or throwError options are set."

    postconditions:
      # Evidence: 5 primary firings across 1 repo in scan-jsonschema-2026-04-02.json
      # Top affected: EvolutionAPI/evolution-api (⭐ 7590 stars)
      # Note: scanner flags all validate() calls regardless of throw options; FP rate high when options not set
      - id: validate-throw-first
        condition: "options.throwFirst is set and validation fails"
        throws: "ValidatorResultError with validation errors"
        required_handling: >
          Caller MUST wrap validate() calls with throwFirst option in try-catch.
          When throwFirst is set, the validator will throw ValidatorResultError at the first validation error.
          Without try-catch, invalid data causes unhandled exceptions and application crashes.
        sources:
          - "https://github.com/tdegrunt/jsonschema/blob/master/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: validate-throw-all
        condition: "options.throwAll is set and validation fails"
        throws: "ValidatorResultError with all validation errors"
        required_handling: >
          Caller MUST wrap validate() calls with throwAll option in try-catch.
          When throwAll is set, the validator will collect all validation errors and then throw ValidatorResultError.
          Without try-catch, invalid data causes unhandled exceptions.
        sources:
          - "https://github.com/tdegrunt/jsonschema/blob/master/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: validate-throw-error
        condition: "options.throwError is set and validation fails"
        throws: "ValidationError at first validation failure"
        required_handling: >
          Caller MUST wrap validate() calls with throwError option in try-catch.
          When throwError is set, the validator will throw ValidationError immediately at the first failure.
          Without try-catch, invalid data causes unhandled exceptions.
        sources:
          - "https://github.com/tdegrunt/jsonschema/blob/master/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: "Validator.validate"
    import_path: "jsonschema"
    description: "Instance method that validates data against a JSON Schema. Same throwing behavior as standalone validate()."

    postconditions:
      - id: validator-validate-throw
        condition: "throw options are set and validation fails"
        throws: "ValidatorResultError or ValidationError depending on options"
        required_handling: >
          Caller MUST wrap Validator.validate() calls with throw options in try-catch.
          Same behavior as standalone validate() - throws when throwFirst, throwAll, or throwError options are enabled.
        sources:
          - "https://github.com/tdegrunt/jsonschema/blob/master/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: addSchema
    import_path: "jsonschema"
    description: "Registers a schema for reference resolution. Throws if schema is invalid or undefined."

    postconditions:
      - id: add-schema-invalid
        condition: "schema is invalid or undefined"
        throws: "SchemaError when schema definition is invalid"
        required_handling: >
          Caller MUST wrap addSchema() calls in try-catch, especially when loading schemas from external sources.
          Invalid or undefined schemas cause SchemaError, common when loading from databases or HTTP endpoints.
        sources:
          - "https://github.com/tdegrunt/jsonschema/issues/290"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: undefined-schema-property
        description: "Setting a schema property to undefined causes TypeError during validation"
        sources:
          - "https://github.com/tdegrunt/jsonschema/issues/60"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
