  # Connection.transaction - Atomic multi-document operations
  - name: transaction
    import_path: "mongoose"
    description: >
      Executes a function containing multiple database operations within a
      MongoDB transaction. Commits automatically on success, aborts and retries
      on transient errors, and rejects with the error if the transaction cannot
      be committed. Requires MongoDB replica set or sharded cluster.

    postconditions:
      # Evidence: https://mongoosejs.com/docs/api/connection.html#Connection.prototype.transaction()
      # Evidence: https://mongoosejs.com/docs/transactions.html
      # Source confirmed: lib/connection.js Connection.prototype.transaction()
      - id: transaction-abort-error-no-try-catch
        maturity: stable
        condition: >
          The transaction function throws a non-transient error, or MongoDB
          cannot commit the transaction (network partition, write conflict,
          session timeout). The promise rejects with the error. Mongoose
          automatically resets all document state (isNew flags, modified paths)
          when a transaction aborts, but the caller is responsible for handling
          the rejection.
        throws: "MongoError or any error thrown by the transaction function"
        required_handling: >
          Caller MUST wrap in try-catch or use .catch().
          After catching a transaction error, do NOT assume any document
          writes succeeded — the entire transaction was rolled back.
          Do NOT manually call session.abortTransaction() — connection.transaction()
          handles abort automatically via withTransaction().
          Re-check document.isNew after an aborted transaction as Mongoose
          resets it to true.
        sources:
          - "https://mongoosejs.com/docs/transactions.html"
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.transaction()"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

      - id: transaction-parallel-operations-undefined-behavior
        maturity: stable
        condition: >
          Using Promise.all(), Promise.allSettled(), or Promise.race() to run
          operations in parallel within a single transaction. The Mongoose
          documentation explicitly states this is "undefined behaviour and
          should be avoided."
        throws: "Undefined — may succeed, may corrupt data, may throw intermittently"
        required_handling: >
          ALL operations within a transaction MUST be sequential (await each
          one individually). Do NOT use Promise.all() inside a transaction
          function. Parallel operations on the same session cause undefined
          behavior that is non-deterministic and environment-specific.
        sources:
          - "https://mongoosejs.com/docs/transactions.html"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

  # mongoose.disconnect - Close all connections
  - name: disconnect
    import_path: "mongoose"
    description: >
      Closes all open Mongoose connections. Returns a promise that resolves
