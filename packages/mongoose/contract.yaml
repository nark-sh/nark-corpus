  # Connection.startSession - Create a MongoDB session for transactions
  - name: startSession
    import_path: "mongoose"
    description: >
      Creates a MongoDB driver ClientSession for causal consistency, retryable
      writes, and transactions. Requires MongoDB >= 3.6.0 and a replica set
      or sharded cluster. Returns the raw driver ClientSession — the caller
      is responsible for ending the session (session.endSession()).

    postconditions:
      # Evidence: https://mongoosejs.com/docs/api/connection.html#Connection.prototype.startSession()
      # Evidence: https://mongoosejs.com/docs/transactions.html
      # Source confirmed: lib/connection.js Connection.prototype.startSession()
      # calls this._waitForConnect() then this.client.startSession(options)
      - id: startsession-connection-not-ready-no-try-catch
        maturity: stable
        condition: >
          The Mongoose connection is not open when startSession() is called.
          startSession() calls _waitForConnect() which rejects if the
          connection is in a failed or disconnected state.
        throws: "MongooseServerSelectionError or MongooseError"
        required_handling: >
          Caller MUST wrap in try-catch.
          Ensure mongoose.connect() has resolved before calling startSession().
          In serverless environments, check connection state with
          mongoose.connection.readyState === 1 before attempting to start a session.
        sources:
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.startSession()"
          - "https://mongoosejs.com/docs/connections.html"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

      - id: startsession-session-not-ended-resource-leak
        maturity: stable
        condition: >
          startSession() resolves successfully but the returned ClientSession
          is never ended (session.endSession() not called in a finally block).
          Sessions consume server resources and are subject to server-side
          timeout (default 30 minutes). In serverless or high-throughput
          environments, session leaks cause server connection pool exhaustion.
        throws: "Does not throw — silent resource leak"
        required_handling: >
          ALWAYS call session.endSession() in a finally block after using
          a session obtained via startSession(). Prefer connection.withSession()
          which handles session lifecycle automatically.
          Use connection.transaction() for transactional workflows — it
          manages session creation, commit, abort, and endSession.
        sources:
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.startSession()"
          - "https://mongoosejs.com/docs/transactions.html"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        evidence_quality: confirmed

  # Connection.withSession - Execute a function within a managed session
  - name: withSession
    import_path: "mongoose"
    description: >
      Convenience wrapper around the MongoDB driver's client.withSession().
      Executes an async executor function with a ClientSession, automatically
      managing session lifecycle. The session is ended when the executor
      resolves or rejects. Does NOT automatically create a transaction —
      use connection.transaction() for transactional workflows.

    postconditions:
      # Evidence: https://mongoosejs.com/docs/api/connection.html#Connection.prototype.withSession()
      # Source confirmed: lib/connection.js Connection.prototype.withSession()
      # delegates to this.client.withSession(executor) — MongoDB driver handles
      # session cleanup but does NOT handle transaction abort on error
      - id: withsession-executor-error-propagates-no-try-catch
        maturity: stable
        condition: >
          The executor function throws an error or rejects. withSession()
          propagates the error to the caller after ending the session, but
          does NOT abort any in-flight transaction. If the executor started
          a transaction manually (session.startTransaction()), the caller must
          abort it before the error propagates or the transaction will be
          left dangling.
        throws: "Whatever the executor function throws — MongoError, MongooseError, or application error"
        required_handling: >
          Caller MUST wrap withSession() in try-catch.
          If the executor manually manages transactions (session.startTransaction()),
          use a try/finally inside the executor to call session.abortTransaction()
          on error rather than letting the error propagate with an open transaction.
          Prefer connection.transaction() which handles transaction abort automatically.
        sources:
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.withSession()"
          - "https://mongoosejs.com/docs/transactions.html"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

      - id: withsession-no-executor-throws-immediately
        maturity: stable
        condition: >
          withSession() is called without an executor function argument.
          Throws MongooseError immediately: 'Please provide an executor function'.
        throws: "MongooseError"
        required_handling: >
          Always provide an executor function. This is a programmer error,
          not a runtime error — it should be caught during development.
        sources:
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.withSession()"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed

  # Model.init - Wait for index builds and collection creation
  - name: init
    import_path: "mongoose"
    description: >
      Waits for Mongoose to finish building indexes (ensureIndexes) and
      creating collections (createCollection) for this model. Called
      automatically by mongoose.model() in the background — explicit calls
      are only needed when you must wait for indexes before proceeding
      (e.g., test setup, migration scripts). Returns a Promise that resolves
      when all auto-initialization is complete.

    postconditions:
      # Evidence: https://mongoosejs.com/docs/api/model.html#Model.init()
      # Source confirmed: lib/model.js Model.init() — calls ensureIndexes() and createCollection()
      # which can fail if MongoDB is unavailable or index creation conflicts
      - id: init-index-build-error-no-try-catch
        maturity: stable
        condition: >
          Index creation fails due to an incompatible existing index (different
          options on same field), insufficient privileges, or a connection error
          during the index build. init() rejects with a MongoError from the
          driver. In production environments, unique index creation on large
          collections is particularly prone to this.
        throws: "MongoError (from driver) or MongooseServerSelectionError"
        required_handling: >
          If explicitly awaiting Model.init(), wrap in try-catch.
          In production: NEVER rely on autoIndex for live databases — run
          index creation as a separate deployment step with ensureIndexes()
          or via the MongoDB shell. Set autoIndex: false in production
          and call Model.ensureIndexes() or Model.syncIndexes() explicitly.
          Index build failure does NOT prevent the model from being used —
          it only means the index may not exist.
        sources:
          - "https://mongoosejs.com/docs/api/model.html#Model.init()"
          - "https://mongoosejs.com/docs/guide.html#autoIndex"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: init-connection-error-no-try-catch
        maturity: stable
        condition: >
          The MongoDB connection is unavailable when init() attempts to create
          the collection or build indexes. init() calls _waitForConnect()
          internally but rejects if the server is unreachable.
        throws: "MongooseServerSelectionError"
        required_handling: >
          Wrap explicit Model.init() calls in try-catch.
          In application startup, use mongoose.connect().then(() => Model.init())
          to ensure the connection is established first.
          Log init() failures at startup — silent init failures mean your
          indexes were never built and queries may be doing full collection scans.
        sources:
          - "https://mongoosejs.com/docs/api/model.html#Model.init()"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        evidence_quality: confirmed

  # Model.syncIndexes - Sync schema indexes with MongoDB
  - name: syncIndexes
    import_path: "mongoose"
    description: >
      Drops indexes that exist in MongoDB but not in the schema, and creates
      indexes that are in the schema but not in MongoDB. DESTRUCTIVE — will
      drop production indexes without warning if they are not defined in the
      schema. Recommended only during deployments, never in hot-path code.

    postconditions:
      # Evidence: https://mongoosejs.com/docs/api/model.html#Model.syncIndexes()
      # Source confirmed: lib/model.js Model.syncIndexes() — throws SyncIndexesError
      # defined in lib/error/syncIndexes.js when partial failure occurs
      # createIndexes() and cleanIndexes() can both throw MongoError
      - id: syncindexes-partial-failure-no-try-catch
        maturity: stable
        condition: >
          One or more index operations (creation or deletion) fail during
          syncIndexes(). Mongoose throws a SyncIndexesError that contains
          an errors map detailing which indexes failed and why. The operation
          is NOT atomic — some indexes may have been dropped or created before
          the failure occurred.
        throws: "SyncIndexesError (extends MongooseError), with .errors property as a map"
        required_handling: >
          Caller MUST wrap in try-catch.
          Check error.name === 'SyncIndexesError' and inspect error.errors
          to determine which indexes failed.
          Since the operation is non-atomic, inspect the database state with
          Model.listIndexes() after a partial failure to understand what was
          applied. Roll back by re-running syncIndexes() or manually
          creating/dropping the failed index.
        sources:
          - "https://mongoosejs.com/docs/api/model.html#Model.syncIndexes()"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: high
        evidence_quality: confirmed

      - id: syncindexes-irreversible-drop-no-confirmation
        maturity: stable
        condition: >
          syncIndexes() drops indexes that are not in the current schema,
          including manually-created performance indexes not tracked by
          Mongoose. There is no confirmation prompt, dry-run mode is only
          available via diffIndexes(). Dropped indexes on large collections
          cause immediate query performance degradation.
        throws: "Does not throw — silent irreversible index drop"
        required_handling: >
          ALWAYS call Model.diffIndexes() first to preview what will be
          dropped and created. Review the toDrop array carefully — any
          custom performance index not in the schema will be permanently
          deleted. In CI/CD pipelines, fail the deployment if toDrop
          contains unexpected indexes. Never run syncIndexes() in
          hot-path application code.
        sources:
          - "https://mongoosejs.com/docs/api/model.html#Model.syncIndexes()"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        evidence_quality: confirmed

  # ─────────────────────────────────────────────────────────────────────────
  # New in pass 17 (2026-06-23) — drift-by-staleness re-enumeration against
  # mongoose@9.7.2 surface. Adds Connection-level bulk/destroy/createCollections,
  # Document.deleteOne, Model.createSearchIndexes (plural), Query.cursor.eachAsync.
  # ─────────────────────────────────────────────────────────────────────────

  # Connection.bulkWrite() — client-level bulk write across multiple collections.
  # Added in mongoose 8.x (lib/connection.js bulkWrite method, types/connection.d.ts:87-91).
  # Distinct from Model.bulkWrite — operates on the Connection (MongoClient) and
  # accepts a `models` array tagging each op with a `namespace`.
  - name: bulkWrite
    import_path: "mongoose"
    description: >
      Connection-level bulk write — sends multiple writes across multiple
      collections in a single round-trip. Returns mongodb.ClientBulkWriteResult
      with optional `mongoose.validationErrors` and `mongoose.results` arrays.

    postconditions:
      # Evidence: types/connection.d.ts:85-91 — Promise<ClientBulkWriteResult
      # & { mongoose?: { validationErrors: Error[], results: Array<Error | WriteError | null> } }>
      # Error class: lib/error/bulkWriteError.js — MongooseBulkWriteError thrown
      # when throwOnValidationError: true and any validation fails.
      - id: connection-bulkwrite-mongoose-bulkwrite-error-no-try-catch
        maturity: stable
        condition: >
          Connection.bulkWrite() with `throwOnValidationError: true` (the
          default in Mongoose 8.x+) throws MongooseBulkWriteError when ANY
          op fails Mongoose schema validation (cast error, required field
          missing, validator returns false). Valid ops in the same batch
          still execute and persist — the error contains a `results` array
          of {success: true | error} per op and a `validationErrors` array
          of just the failures. Without try-catch the caller doesn't know
          which writes landed and which didn't.
        throws: "MongooseBulkWriteError (extends MongooseError) with .validationErrors, .results, .rawResult, .operation"
        required_handling: >
          Caller MUST wrap in try-catch.
          Catch MongooseBulkWriteError and inspect err.validationErrors to
          enumerate which ops failed validation; inspect err.results to
          determine which ops succeeded on the server. Do NOT assume the
          entire bulkWrite was a no-op on failure — partial application is
          the normal case. To opt out of throwing, pass
          { throwOnValidationError: false } and inspect
          result.mongoose.validationErrors after the call.
        sources:
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.bulkWrite()"
          - "https://github.com/Automattic/mongoose/blob/master/lib/error/bulkWriteError.js"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed

      - id: connection-bulkwrite-write-error-partial-application
        maturity: stable
        condition: >
          Mongo-side write errors (E11000 duplicate key, document validation
          failure, server timeouts mid-batch) reject the returned Promise
          with the underlying mongodb driver's MongoBulkWriteError. Earlier
          ops in the batch may have already been applied. The error's
          .writeErrors array identifies which ops failed and .insertedCount /
          .modifiedCount / .deletedCount say how many succeeded before the
          batch aborted.
        throws: "MongoBulkWriteError (from mongodb driver) — propagates as Promise rejection"
        required_handling: >
          Caller MUST wrap in try-catch.
          Catch MongoBulkWriteError and reconcile state: read err.result for
          per-op success counts. The order ops execute in is implementation-
          defined when `ordered: false`; when `ordered: true` (default), all
          ops AFTER the first failure are skipped. Always log err.writeErrors
          before deciding whether to retry — duplicate key errors are not
          retryable but server-selection errors are.
        sources:
          - "https://www.mongodb.com/docs/manual/reference/method/db.collection.bulkWrite/"
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.bulkWrite()"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed

  # Connection.destroy() — force-shutdown variant of Connection.close()
  # Added in mongoose 8.x (types/connection.d.ts:97). Differs from close():
  # destroy aborts any in-flight operations immediately and tears down the
  # MongoClient without waiting for pending writes to drain.
  - name: destroy
    import_path: "mongoose"
    description: >
      Force-closes the connection without waiting for pending operations.
      Pass force=true to close even when operations are mid-flight.
      Unlike close(), in-flight writes are not given a chance to complete.

    postconditions:
      # Evidence: types/connection.d.ts:97 — destroy(force?: boolean): Promise<void>
      # lib/connection.js destroy() — does NOT call collection.drainOps; cancels
      # outstanding work via this.client.close(true) which fails inflight cursors.
      - id: connection-destroy-pending-writes-discarded
        maturity: stable
        condition: >
          Connection.destroy() force-closes the underlying MongoClient without
          waiting for pending operations to drain. Writes mid-flight that have
          been sent to the server but whose acknowledgement hasn't returned
          may or may not have been applied — the Promise resolves to void
          regardless. There is no API to enumerate which ops were aborted.
          Calling destroy() in a graceful-shutdown handler before draining
          writes loses commit acks.
        throws: "Resolves void on success; rejects only on internal MongoClient close errors"
        required_handling: >
          PREFER Connection.close() over destroy() in graceful shutdown
          handlers — close() waits for in-flight ops to complete. Use
          destroy() only when shutting down a process that is already
          failing (uncaughtException, SIGKILL pending) and you cannot
          afford to wait. If you must use destroy(), drain critical writes
          first (await Promise.all(pendingWrites)) before calling it.
          Wrap in try-catch defensively — internal close errors are rare
          but possible.
        sources:
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.destroy()"
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_transaction
          incident_cost_range: high
        evidence_quality: confirmed

  # Connection.createCollections() — plural variant of createCollection.
  # Added in mongoose 8.x (types/connection.d.ts:121). Continues on per-collection
  # errors when continueOnError=true and aggregates them in CreateCollectionsError.
  - name: createCollections
    import_path: "mongoose"
    description: >
      Creates all collections defined by the connection's registered models.
      With continueOnError=true, individual collection-creation failures do
      NOT abort the batch — they are collected and re-thrown as a single
      CreateCollectionsError whose .errors property maps collectionName → Error.

    postconditions:
      # Evidence: types/connection.d.ts:121 — createCollections(continueOnError?: boolean):
      # Promise<Record<string, Error | mongodb.Collection<any>>>
      # Error class: lib/error/createCollectionsError.js — CreateCollectionsError(message, errorsMap)
      - id: createcollections-create-collections-error-no-try-catch
        maturity: stable
        condition: >
          createCollections(true) aggregates per-collection failures into a
          CreateCollectionsError thrown after the batch completes. The
          .errors property is a Record mapping each failed collection name
          to its underlying error. Without try-catch, the partial-success
          state (which collections WERE created) is lost — the caller can't
          tell whether to retry only the failed names or assume all failed.
        throws: "CreateCollectionsError (extends MongooseError) with .errors map"
        required_handling: >
          Caller MUST wrap in try-catch.
          Catch CreateCollectionsError and inspect err.errors (Record<string,
          Error>) to enumerate which specific collections failed. Successfully-
          created collections are NOT rolled back — retry by passing only the
          failed names back into a follow-up createCollection() loop. If
          continueOnError is false (default), the first failure rejects
          immediately and the remaining collections in the batch are not
          attempted; partial creation still occurred for collections before
          the failure.
        sources:
          - "https://mongoosejs.com/docs/api/connection.html#Connection.prototype.createCollections()"
          - "https://github.com/Automattic/mongoose/blob/master/lib/error/createCollectionsError.js"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

  # Document.deleteOne() — instance method returning Query. Distinct from
  # Model.deleteOne() (static, filter-based). Document.deleteOne() deletes the
  # current document by its _id. Awaitable via Query.then.
  - name: documentDeleteOne
    import_path: "mongoose"
    description: >
      Document instance method — deletes the document from the database by
      its _id. Returns a Query that resolves to a DeleteResult with
      .deletedCount. Runs pre/post `deleteOne` document middleware.
      DATA_LOSS hazard: this is the canonical "delete this exact doc" API
      and silent failures (auth issues, transient connection errors) mean
      the doc remains in the DB while the caller thinks it's gone.

    postconditions:
      # Evidence: types/document.d.ts:139-144 — deleteOne(options?: QueryOptions):
      # QueryWithHelpers<...> — the returned Query is then-able and rejects on
      # connection / cast / middleware failure.
      - id: document-deleteone-middleware-error-no-try-catch
        maturity: stable
        condition: >
          Document.deleteOne() runs pre('deleteOne', { document: true,
          query: false }) middleware. Any pre-hook that throws or rejects
          (auth check failing, business rule blocking the delete) propagates
          out of the await. Without try-catch the caller assumes deletion
          succeeded — the document remains in the database while application
          state moves on as if it were gone.
        throws: "MongooseError or middleware-thrown error (any Error subclass thrown in pre('deleteOne') hook)"
        required_handling: >
          Caller MUST wrap in try-catch.
          After catching, treat the deletion as NOT having occurred — re-read
          the document by _id to confirm its state before retrying. Do not
          update dependent state (cache invalidation, downstream notifications)
          on the assumption that deleteOne succeeded.
        sources:
          - "https://mongoosejs.com/docs/api/document.html#Document.prototype.deleteOne()"
          - "https://mongoosejs.com/docs/middleware.html#types-of-middleware"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

      - id: document-deleteone-zero-deletedcount-silent-noop
        maturity: stable
        condition: >
          Document.deleteOne() resolves to a DeleteResult with
          deletedCount=0 when the document no longer exists in the database
          (race with another delete) or when a query-level filter eliminates
          it. The Promise does NOT reject — it resolves successfully with
          a "did nothing" result. Without inspecting deletedCount the caller
          believes the delete succeeded.
        throws: "Does not throw — silent zero-deletedCount on race or stale doc"
        required_handling: >
          ALWAYS inspect result.deletedCount after await. If 0, treat the
          delete as a no-op and decide whether to surface a 404 to the caller,
          retry, or proceed (idempotent delete semantics). Do NOT assume
          deletedCount > 0 just because the await did not throw.
        sources:
          - "https://mongoosejs.com/docs/api/document.html#Document.prototype.deleteOne()"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed

  # Model.createSearchIndexes() — plural Atlas Search variant.
  # Added in mongoose 8.x (types/models.d.ts:372). Creates ALL Atlas Search
  # indexes declared on the schema. Atlas-only; throws on connection failure
  # or invalid index description.
  - name: createSearchIndexes
    import_path: "mongoose"
    description: >
      Creates every Atlas Search index declared on the schema in a single
      batch. Returns Promise<string[]> with the created index names. Atlas-only —
      the underlying $listSearchIndexes admin command is unavailable on
      community-edition MongoDB and rejects the Promise with a command-
      not-supported error.

    postconditions:
      # Evidence: types/models.d.ts:372 — createSearchIndexes(): Promise<string[]>
      # lib/model.js createSearchIndexes — wraps mongodb driver's
      # collection.createSearchIndexes; throws on non-Atlas deployments.
      - id: createsearchindexes-not-atlas-command-error-no-try-catch
        maturity: stable
        condition: >
          createSearchIndexes() requires MongoDB Atlas (or Atlas Search Local).
          Running it against a self-hosted community-edition deployment
          rejects with a command-not-supported error (server reports
          $listSearchIndexes is not recognized). Without try-catch the
          deployment pipeline aborts silently on local-dev environments
          that don't have Atlas configured.
        throws: "MongoServerError (code 40324 or similar, 'Unrecognized pipeline stage name: $listSearchIndexes')"
        required_handling: >
          Caller MUST wrap in try-catch.
          Inspect err.codeName / err.code — if the cluster is non-Atlas,
          gracefully skip search index creation rather than crashing the
          startup sequence. In multi-environment deployments (Atlas in
          prod, community-edition in dev), conditionally call this only
          when process.env.MONGODB_ATLAS === 'true' to avoid the error
          entirely.
        sources:
          - "https://mongoosejs.com/docs/api/model.html#Model.createSearchIndexes()"
          - "https://www.mongodb.com/docs/atlas/atlas-search/manage-indexes/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed

      - id: createsearchindexes-partial-creation-no-rollback
        maturity: stable
        condition: >
          createSearchIndexes() iterates the schema's searchIndexes array and
          creates them sequentially. If the 3rd of 5 indexes fails (invalid
          definition, duplicate name, quota), the first 2 are already
          created and remain in the cluster after the Promise rejects.
          There is no automatic rollback.
        throws: "MongoServerError on first-failed index — earlier indexes remain"
        required_handling: >
          After catching, call Model.listSearchIndexes() to enumerate what
          WAS created and decide whether to drop the partial set and retry
          from scratch (atomic-like behavior) or accept the partial state.
          In CI/CD pipelines treat partial creation as a deployment
          failure and roll forward with explicit cleanup.
        sources:
          - "https://mongoosejs.com/docs/api/model.html#Model.createSearchIndexes()"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed

  # Query.cursor().eachAsync() — async iteration helper. Added in mongoose 5.x
  # but gained EachAsyncMultiError support in mongoose 8.x (continueOnError).
  - name: eachAsync
    import_path: "mongoose"
    description: >
      Iterates a Query cursor asynchronously, invoking the callback for
      each document. With continueOnError=true, per-document errors are
      collected and re-thrown as a single EachAsyncMultiError after
      iteration completes (added in mongoose 8.x).

    postconditions:
      # Evidence: lib/error/eachAsyncMultiError.js — EachAsyncMultiError(errors)
      # extends MongooseError with .errors: Error[]
      - id: eachasync-multi-error-no-try-catch
        maturity: stable
        condition: >
          eachAsync(fn, { continueOnError: true }) collects errors thrown
          by fn() across all documents and rejects the final Promise with
          an EachAsyncMultiError whose .errors array contains all failures.
          Without try-catch the caller cannot enumerate which documents
          were processed successfully and which failed — partial-success
          state is silently dropped.
        throws: "EachAsyncMultiError (extends MongooseError) with .errors: Error[]"
        required_handling: >
          Caller MUST wrap in try-catch.
          Inspect err.errors to enumerate per-document failures. Each
          element retains the original error message; correlate by index
          if the iteration order is deterministic. Without continueOnError,
          the FIRST per-document error rejects immediately and remaining
          documents in the cursor are not visited — wrap that case as well.
        sources:
          - "https://mongoosejs.com/docs/api/query.html#Query.prototype.cursor()"
          - "https://github.com/Automattic/mongoose/blob/master/lib/error/eachAsyncMultiError.js"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed
