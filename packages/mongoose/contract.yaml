  # Model.bulkSave - Batch save multiple documents via a single bulkWrite
  - name: bulkSave
    import_path: "mongoose"
    description: >
      Saves multiple documents in a single bulkWrite() round trip. Faster than
      calling save() on each document individually. Has unique error semantics:
      it throws on pre-flight validation errors and on total failure, but
      silently continues if only SOME operations succeed.

    postconditions:
      # Evidence: https://mongoosejs.com/docs/api/model.html#Model.bulkSave()
      # Source confirmed: lib/model.js lines 3530-3536 document exact throw conditions
      - id: bulksave-validation-error-no-try-catch
        maturity: stable
        condition: >
          Any provided document fails Mongoose schema validation. bulkSave()
          halts BEFORE sending the bulkWrite() to MongoDB and throws the FIRST
          validation error encountered. No documents are written.
        throws: "ValidationError with errors object (same structure as Document.validate())"
        required_handling: >
          Caller MUST wrap in try-catch.
          Validate all documents before calling bulkSave() if partial-write is
          unacceptable — bulkSave() aborts on first validation error without
          writing any documents.
          Check error.name === 'ValidationError' and inspect error.errors.
        sources:
          - "https://mongoosejs.com/docs/api/model.html#Model.bulkSave()"
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed

      - id: bulksave-document-not-found-no-try-catch
        maturity: stable
        condition: >
          bulkWrite() completes but inserts or updates ZERO documents (all
          operations were no-ops). Throws MongooseBulkSaveIncompleteError
          (a subclass of DocumentNotFoundError). Does NOT throw if only some
          operations succeeded.
        throws: "MongooseBulkSaveIncompleteError (extends DocumentNotFoundError)"
        required_handling: >
          Caller MUST wrap in try-catch.
          This is a silent-failure trap: if you update 10 documents and none
          match, bulkSave() throws. If 5 of 10 match, it silently returns
          without error. Use countDocuments() afterward to verify expected
          write counts if partial write correctness is critical.
        sources:
          - "https://mongoosejs.com/docs/api/model.html#Model.bulkSave()"
        severity: error
