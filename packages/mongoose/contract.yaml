          during close, driver error). The promise rejects with the first
          error encountered. Remaining connections may or may not be closed.
        throws: "MongooseError or MongoError"
        required_handling: >
          Caller MUST wrap in try-catch or use .catch() during graceful shutdown.
          In process shutdown handlers (SIGTERM/SIGINT), ensure disconnect()
          errors are logged even if ignored — silent disconnect failures can
          leave connections open and cause process hang.
          Always call disconnect() in a finally block to ensure it runs even
          if other shutdown steps fail.
