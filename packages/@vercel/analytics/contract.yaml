coverage_rationale: |
  Config-only / fire-and-forget analytics. Real call sites grepped in 5 cloned repos (NextChat, qwerty-learner, worldmonitor) show only: <Analytics /> JSX component (NextChat:app/page.tsx, qwerty-learner:src/index.tsx), inject() init (worldmonitor:src/main.ts), track() fire-and-forget event tracking (qwerty-learner:src/utils/trackEvent.ts). None of these are awaited async operations with throws callers must handle. Phase 0c gate failure: no application-level error contract to enforce.
