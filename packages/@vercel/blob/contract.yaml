package: '@vercel/blob'
semver: '>=0.19.0'
contract_version: 1.1.0
maintainer: corpus-team
last_verified: '2026-04-06'
status: production
evidence_quality: confirmed
coverage_score: 0.79
functions:
  - name: put
    import_path: '@vercel/blob'
    description: >
      Uploads a blob (file, string, Buffer, ReadableStream) to Vercel Blob storage. Requires BLOB_READ_WRITE_TOKEN env
      var. Returns BlobObject with url, pathname, contentType, contentDisposition. Throws on auth failure, quota
      exceeded, or network error.
    postconditions:
      - id: blob-put-no-try-catch
        condition: >
          Missing BLOB_READ_WRITE_TOKEN (BlobAccessError), content-type not allowed (BlobContentTypeNotAllowedError),
          storage quota exceeded (BlobStoreLimitReachedError), network failure, or Vercel API unavailable
          (BlobUnknownError).
        throws: >
          BlobAccessError, BlobContentTypeNotAllowedError, BlobStoreLimitReachedError, or BlobUnknownError. All extend
          BlobError which extends Error.
        required_handling: >
          Caller MUST wrap put() in try-catch. Missing BLOB_READ_WRITE_TOKEN causes immediate BlobAccessError (common in
          deployments that forgot to set the env var). Storage quota errors are hard to predict and will crash file
          upload endpoints if unhandled.

          Minimum handling:
            try {
              const blob = await put('file.pdf', content, { access: 'public' });
              return blob.url;
            } catch (err) {
              if (err instanceof BlobAccessError) {
                throw new Error('Blob storage not configured');
              }
              throw err;
            }
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
          - https://vercel.com/docs/storage/vercel-blob/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: del
    import_path: '@vercel/blob'
    description: >
      Deletes one or more blobs by URL. Can delete a single URL or array of URLs. Throws on auth failure or network
      error.
    postconditions:
      - id: blob-del-no-try-catch
        condition: |
          Missing auth token, network failure, or Vercel API unavailable.
        throws: |
          BlobAccessError or BlobUnknownError.
        required_handling: |
          Caller MUST wrap del() in try-catch. Failed deletions leave orphaned blobs that incur storage costs.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: list
    import_path: '@vercel/blob'
    description: >
      Lists blobs in the store, with optional prefix filtering and pagination. Returns { blobs, cursor, hasMore }.
      Throws on auth failure or network error.
    postconditions:
      - id: blob-list-no-try-catch
        condition: |
          Missing auth token or network failure.
        throws: |
          BlobAccessError or BlobUnknownError.
        required_handling: |
          Caller MUST wrap list() in try-catch.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/api-reference
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
  - name: head
    import_path: '@vercel/blob'
    description: >
      Fetches metadata of a blob object (size, uploadedAt, pathname, contentType, contentDisposition, url, downloadUrl,
      cacheControl, etag). Unlike get(), head() does NOT return null on missing blobs — it throws BlobNotFoundError.
      This is a common footgun when developers assume head() behaves like a safe existence check.
    postconditions:
      - id: blob-head-no-try-catch
        severity: error
        description: >
          head() THROWS BlobNotFoundError when the blob does not exist — it does NOT return null. This is distinct from
          get() which returns null on 404. Code that calls head() without try-catch will crash with an unhandled
          exception if the blob was deleted or the pathname is wrong.
        throws: BlobNotFoundError, BlobAccessError, BlobStoreNotFoundError, or BlobUnknownError.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: head() THROWS BlobNotFoundError when the blob does not exist — it does NOT return null.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
      - id: blob-head-access-error
        severity: error
        description: >
          head() throws BlobAccessError when BLOB_READ_WRITE_TOKEN is missing, invalid, or the token does not have
          access to the requested store. BlobStoreNotFoundError is thrown when the store ID in the token references a
          deleted or nonexistent store.
        throws: BlobAccessError or BlobStoreNotFoundError.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: >-
          head() throws BlobAccessError when BLOB_READ_WRITE_TOKEN is missing, invalid, or the token does not have
          access to the requested store.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
  - name: copy
    import_path: '@vercel/blob'
    description: >
      Copies a blob to a new pathname in the same store. Does NOT copy contentType or cacheControlMaxAge from the source
      — these must be explicitly specified if preservation is required. addRandomSuffix defaults to false (unlike
      put()). Throws on auth failure, source not found, precondition mismatch, or network error.
    postconditions:
      - id: blob-copy-no-try-catch
        severity: error
        description: >
          copy() throws on any error: BlobAccessError (auth failure), BlobNotFoundError (source blob doesn't exist),
          BlobUnknownError (network failure), or BlobPreconditionFailedError (ETag mismatch when ifMatch is used). No
          try-catch causes immediate exception.
        throws: BlobAccessError, BlobNotFoundError, BlobUnknownError, or BlobPreconditionFailedError.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: >-
          copy() throws on any error: BlobAccessError (auth failure), BlobNotFoundError (source blob doesn't exist),
          BlobUnknownError (network failure), or BlobPreconditionFailedError (ETag mismatch when ifMatch is used).
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
      - id: blob-copy-source-not-found
        severity: error
        description: >
          copy() throws BlobNotFoundError when the source blob (fromUrlOrPathname) does not exist. This is a common race
          condition: the source was deleted between when it was listed/referenced and when the copy is attempted.
        throws: BlobNotFoundError.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: copy() throws BlobNotFoundError when the source blob (fromUrlOrPathname) does not exist.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
  - name: get
    import_path: '@vercel/blob'
    description: >
      Fetches the content of a blob as a ReadableStream. Returns GetBlobResult with { statusCode, stream, headers, blob
      } or NULL if the blob is not found (HTTP 404). Unlike head(), get() returns null on not-found instead of throwing.
      Callers MUST check for null before using the stream. Also throws on auth failure or service unavailability.
    postconditions:
      - id: blob-get-null-not-checked
        severity: error
        description: >
          get() returns null when the blob is not found (HTTP 404) — it does NOT throw. Code that accesses result.stream
          or result.blob without null-checking will throw "Cannot read properties of null" at runtime. This is a silent
          crash disguised as a TypeError instead of a domain error.
        returns: GetBlobResult | null (null when blob not found — callers must null-check before accessing stream or blob).
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: get() returns null when the blob is not found (HTTP 404) — it does NOT throw.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
      - id: blob-get-no-try-catch
        severity: error
        description: >
          get() throws BlobAccessError (auth failure), BlobServiceRateLimited (HTTP 429, retryAfter seconds available on
          error), or BlobServiceNotAvailable (Vercel API down). These must be caught separately from the null check for
          not-found. A null check alone does not protect against thrown errors.
        throws: BlobAccessError, BlobServiceRateLimited, or BlobServiceNotAvailable.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: >-
          get() throws BlobAccessError (auth failure), BlobServiceRateLimited (HTTP 429, retryAfter seconds available on
          error), or BlobServiceNotAvailable (Vercel API down).
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
  - name: handleUpload
    import_path: '@vercel/blob/client'
    description: >
      Server-side route handler for client uploads (browser-to-blob). Has two responsibilities: (1) generate client
      tokens before upload (onBeforeGenerateToken), (2) receive completion callbacks (onUploadCompleted). The
      onBeforeGenerateToken callback MUST authenticate the user — if skipped, anonymous users can upload to your store.
      handleUpload() itself throws BlobAccessError if the server-side BLOB_READ_WRITE_TOKEN is missing.
    postconditions:
      - id: blob-handle-upload-missing-auth-check
        severity: error
        description: >
          onBeforeGenerateToken must authenticate the user before returning token options. If onBeforeGenerateToken
          returns without verifying session/auth, any unauthenticated client can generate upload tokens and write to
          your Blob store. This is an open upload endpoint vulnerability.
        throws: BlobAccessError or any error thrown from onBeforeGenerateToken/onUploadCompleted callbacks.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: onBeforeGenerateToken must authenticate the user before returning token options.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
      - id: blob-handle-upload-no-try-catch
        severity: error
        description: >
          handleUpload() itself throws BlobAccessError when BLOB_READ_WRITE_TOKEN is missing or invalid. It also
          re-throws any error thrown from onBeforeGenerateToken or onUploadCompleted callbacks. The outer route handler
          must wrap handleUpload() in try-catch and return an HTTP error response, not let the exception propagate.
        throws: BlobAccessError when BLOB_READ_WRITE_TOKEN is missing or invalid, or re-throws from callbacks.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: handleUpload() itself throws BlobAccessError when BLOB_READ_WRITE_TOKEN is missing or invalid.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
  - name: createMultipartUpload
    import_path: '@vercel/blob'
    description: >
      Creates a multipart upload session. Returns { key, uploadId } needed for subsequent uploadPart() and
      completeMultipartUpload() calls. Part of the manual three-phase multipart upload API. Throws same error types as
      put().
    postconditions:
      - id: blob-create-multipart-no-try-catch
        severity: error
        description: >
          createMultipartUpload() throws BlobAccessError (auth failure), BlobServiceRateLimited (rate limit with
          retryAfter), or BlobUnknownError (network failure). An uncaught failure in Phase 1 of the multipart upload
          leaves no orphaned state (upload session was never created) but the caller must handle the error to surface
          the failure to the user.
        throws: BlobAccessError, BlobServiceRateLimited, or BlobUnknownError.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: >-
          createMultipartUpload() throws BlobAccessError (auth failure), BlobServiceRateLimited (rate limit with
          retryAfter), or BlobUnknownError (network failure).
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
  - name: uploadPart
    import_path: '@vercel/blob'
    description: >
      Uploads a single part of a multipart upload. Each part must be at least 5MB except the last part. Parts can be
      uploaded in parallel. Returns { etag, partNumber } needed for completeMultipartUpload(). Throws on auth failure,
      network error, or part size violation.
    postconditions:
      - id: blob-upload-part-no-try-catch
        severity: error
        description: >
          uploadPart() throws BlobAccessError, BlobFileTooLargeError, BlobUnknownError, or BlobServiceRateLimited. When
          uploading parts in parallel (the recommended pattern), a single failed part rejection in a Promise.all() will
          cancel the entire batch. The uploadId and key are now in an incomplete state — the caller must either retry
          the failed part or abandon the upload entirely.
        throws: BlobAccessError, BlobFileTooLargeError, BlobUnknownError, or BlobServiceRateLimited.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: uploadPart() throws BlobAccessError, BlobFileTooLargeError, BlobUnknownError, or BlobServiceRateLimited.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
      - id: blob-upload-part-minimum-size
        severity: warning
        description: >
          Each part (except the last) must be at least 5MB. Passing parts smaller than 5MB will cause
          BlobFileTooLargeError (despite the misleading name — it's actually a "too small" violation). Common mistake:
          splitting files by count instead of by byte size, or passing the last chunk as part N-1 when another chunk
          follows.
        throws: BlobFileTooLargeError when a part is smaller than 5MB (except the last part).
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: Each part (except the last) must be at least 5MB.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
  - name: completeMultipartUpload
    import_path: '@vercel/blob'
    description: >
      Finalizes a multipart upload by assembling all parts. Requires the uploadId and key from createMultipartUpload(),
      and the array of Part objects from uploadPart() calls. Returns PutBlobResult with url, pathname, etc. Parts must
      be provided in order (by partNumber). Throws on auth failure, invalid parts array, or network error.
    postconditions:
      - id: blob-complete-multipart-no-try-catch
        severity: error
        description: >
          completeMultipartUpload() throws BlobAccessError (auth failure), BlobUnknownError (network failure or invalid
          parts), or BlobServiceNotAvailable. If called with missing or corrupted parts (e.g., some parts failed and
          weren't retried), the API returns a bad_request error mapped to BlobError. The blob is NOT created if
          completeMultipartUpload() fails — no partial blob is persisted.
        throws: BlobAccessError, BlobUnknownError, or BlobServiceNotAvailable.
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        required_handling: Caller MUST handle this condition appropriately.
        condition: >-
          completeMultipartUpload() throws BlobAccessError (auth failure), BlobUnknownError (network failure or invalid
          parts), or BlobServiceNotAvailable.
        sources:
          - https://vercel.com/docs/storage/vercel-blob/using-blob-sdk
notes:
  - All functions require BLOB_READ_WRITE_TOKEN env var (set automatically on Vercel, must be set manually in dev)
  - 'BlobAccessError: missing/invalid token. BlobUnknownError: network/API failures.'
  - 'put() accepts: string, Buffer, ReadableStream, File, Blob'
  - del() accepts single URL string or array of URL strings
  - list() supports prefix, cursor, limit for pagination
  - head() THROWS on not-found (BlobNotFoundError), unlike get() which returns null
  - get() returns null on 404, throws on auth/network errors — callers must check both
  - handleUpload() MUST authenticate user in onBeforeGenerateToken — anonymous uploads otherwise
  - 'Multipart upload: createMultipartUpload → uploadPart (5MB min per part) → completeMultipartUpload'
  - BlobServiceRateLimited includes retryAfter property (seconds) from Retry-After header
  - copy() does NOT preserve contentType or cacheControlMaxAge from source blob
