      - id: postgresconnectionstring-invalid-type
        condition: >
          An invalid type string (anything other than 'pool' or 'direct') is passed to
          postgresConnectionString(). This is a programming error — the TypeScript type
          system prevents it at compile time, but JavaScript callers or poorly typed code
          can still trigger it.
        throws: >
          VercelPostgresError with code 'invalid_connection_type':
          "Unhandled type: <type>"
        description: >
          The function uses a switch statement with an exhaustive check. Passing an invalid
