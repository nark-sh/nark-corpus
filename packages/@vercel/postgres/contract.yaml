functions:
  - name: sql
    import_path: "@vercel/postgres"
    description: "Tagged template function for executing SQL queries"
    postconditions:
      - id: sql-query-no-error-handling
        # Evidence: seen in 0 primary firings across 0 repos in scan-vercel-postgres-2026-04-02.json (7 repos scanned, no violations)
        # Top affected: (none in this scan)
        condition: "SQL query fails due to syntax error, connection issue, or constraint violation"
        throws: "Database error with error code and message"
        description: "Must wrap sql queries in try-catch to handle SQL errors"
        required_handling: "Wrap sql queries in try-catch blocks to handle database errors appropriately"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        rationale: "SQL queries can fail due to syntax errors, connection issues, or constraint violations"
        sources:
          - "https://vercel.com/docs/storage/vercel-postgres"

      # Evidence: dist/chunk-BZ4XJVIW.cjs — sqlTemplate() function throws VercelPostgresError
      # when strings is not a TemplateStringsArray. Code: isTemplateStringsArray() check.
      # Confirmed from archived source:
      # https://github.com/vercel/storage/blob/vercel-kv-vercel-postgres-archive/packages/postgres/src/sql-template.ts
      - id: sql-incorrect-template-call
        condition: >
          sql() is called as a regular function with a string argument instead of as a
          tagged template literal. Example: sql('SELECT * FROM users') instead of
          sql`SELECT * FROM users`.
        throws: >
          VercelPostgresError with code 'incorrect_tagged_template_call':
          "It looks like you tried to call `sql` as a function. Make sure to use it as
          a tagged template.\n\tExample: sql`SELECT * FROM users`, not sql('SELECT * FROM users')"
        description: >
          The sql global and pool.sql method use the sqlTemplate() helper which validates
          that the first argument is a TemplateStringsArray. Calling with a plain string
          throws immediately — synchronously — before any network request is made.
        required_handling: >
          Always use sql as a tagged template literal:
            const result = await sql`SELECT * FROM users WHERE id = ${userId}`;

          NOT as a function call:
            const result = await sql('SELECT * FROM users WHERE id = ' + userId);  // THROWS

          The eslint-plugin-sql (or eslint-plugin-no-unsafe-queries) can catch this
          pattern at lint time. For dynamic queries, use pool.query() or client.query().
        sources:
          - "https://github.com/vercel/storage/blob/vercel-kv-vercel-postgres-archive/packages/postgres/src/sql-template.ts"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: dist/chunk-BZ4XJVIW.cjs — sql is a Proxy that calls createPool() lazily.
      # createPool() throws VercelPostgresError('missing_connection_string') when POSTGRES_URL is not set.
      # Source: https://github.com/vercel/storage/blob/vercel-kv-vercel-postgres-archive/packages/postgres/src/index.ts
      - id: sql-missing-connection-string-on-first-use
        condition: >
          The global sql template (or db alias) is used for the first time and the
          POSTGRES_URL environment variable is not set. The sql global lazily calls
          createPool() on first use — the error is deferred from initialization time
          to first query time, making it easy to miss in development.
        throws: >
          VercelPostgresError with code 'missing_connection_string':
          "You did not supply a 'connectionString' and no 'POSTGRES_URL' env var was found."
        description: >
          Unlike createPool(), which throws synchronously when called explicitly, the
          global sql object defers pool creation to the first access. Code that "works"
          in development (where POSTGRES_URL is in .env.local) silently breaks in
          environments where the variable is not injected. The error only surfaces
          when the first query executes, not at module load time.
        required_handling: >
          Validate POSTGRES_URL at app startup before relying on the global sql tag:

          if (!process.env.POSTGRES_URL) {
            throw new Error('POSTGRES_URL is required but not set');
          }

          Or use createPool() explicitly with error handling:

          const pool = createPool();  // throws if POSTGRES_URL is missing
          try {
            const { rows } = await pool.sql`SELECT * FROM users`;
          } catch (error) {
            if (error instanceof VercelPostgresError && error.code === 'missing_connection_string') {
              console.error('Database not configured:', error.message);
            }
            throw error;
          }

          In Vercel deployments, POSTGRES_URL is injected automatically. In local
          development, add it to .env.local. In CI, add it to environment secrets.
        sources:
          - "https://github.com/vercel/storage/blob/vercel-kv-vercel-postgres-archive/packages/postgres/src/index.ts"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: query
    import_path: "@vercel/postgres"
    description: "Executes a SQL query on database connection"
    postconditions:
      - id: query-no-error-handling
        condition: "Query fails due to connection issue or SQL error"
        throws: "Database error"
        description: "Must wrap query() in try-catch to handle database errors"
        required_handling: "Wrap query() calls in try-catch blocks to handle connection and SQL errors"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        rationale: "Query operations can fail due to connection issues or SQL errors"
        sources:
          - "https://vercel.com/docs/storage/vercel-postgres"
  - name: connect
    import_path: "@vercel/postgres"
    description: "Obtains a client from the connection pool (pool.connect()) or establishes a direct connection (VercelClient.connect())"
    postconditions:
      - id: connect-no-cleanup
        condition: "Client obtained from pool is not released"
        throws: "Connection pool exhaustion on subsequent queries"
        description: "Must release client in finally block after connect()"
        required_handling: "Call client.release() in a finally block to ensure connection is returned to pool"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        rationale: "Unreleased clients cause connection pool exhaustion"
        sources:
          - "https://vercel.com/kb/guide/connection-pooling-with-functions"
          - "https://node-postgres.com/features/pooling"

      # Evidence: dist/chunk-7IR77QAQ.js — VercelPool.connect(callback) override at line 150
      # `connect(callback) { return super.connect(callback); }`
      # Delegates to node-postgres Pool.connect, which uses the callback-form
      # contract: (err, client, done) => void. The done() function is the ONLY
      # way to release the client back to the pool in callback form — there is
      # no Promise to await, no implicit cleanup. Forgetting to call done() is
      # a silent connection leak indistinguishable from a slow query.
      # Source: https://node-postgres.com/apis/pool#poolconnect (callback overload)
      - id: pool-connect-callback-form-no-done-call
        condition: >
          pool.connect() is called with a callback argument (legacy form):
          pool.connect((err, client, done) => {...}) and the callback body does
          not call done() on all exit paths (including the error path and any
          early returns). Unlike the Promise form (where the returned client
          has a .release() method), the callback form provides done() as the
          ONLY release mechanism — failing to call it leaks the connection
          for the lifetime of the pool.
        throws: >
          No exception is thrown. The callback returns normally; the client is
          checked out indefinitely. Subsequent pool.connect() calls eventually
          stall waiting for a free client when max connections is reached.
          On Vercel serverless this manifests as request timeouts (504s),
          not stack-traceable errors.
        description: >
          The callback form of pool.connect() exists for backward compatibility
          with pre-Promise node-postgres. It is rarely the right choice in
          modern @vercel/postgres code — the Promise form is safer because
          `await pool.connect()` returns a VercelPoolClient with a .release()
          method that the developer is more likely to remember (and ESLint
          rules can enforce). The callback form's done() is easy to miss in
          error branches.
        required_handling: >
          Prefer the Promise form over the callback form:

          // ✅ PROMISE FORM — release() is on the returned client
          const client = await pool.connect();
          try {
            const { rows } = await client.query('SELECT 1');
            return rows;
          } finally {
            client.release();
          }

          If you MUST use the callback form (e.g. integrating with legacy
          callback-driven middleware), call done() in every exit path:

          // ✅ CALLBACK FORM — done() in every branch
          pool.connect((err, client, done) => {
            if (err) {
              done();  // MUST be called even on connect error
              return reject(err);
            }
            client.query('SELECT 1', (queryErr, result) => {
              done(queryErr);  // done(err) releases AND destroys on error
              if (queryErr) return reject(queryErr);
              resolve(result.rows);
            });
          });

          // ❌ MISSING done() ON ERROR — silent connection leak
          pool.connect((err, client, done) => {
            if (err) return reject(err);  // leaked: done() never called
            client.query('SELECT 1', (queryErr, result) => {
              if (queryErr) return reject(queryErr);  // leaked again
              done();
              resolve(result.rows);
            });
          });
        sources:
          - "https://node-postgres.com/apis/pool"
          - "https://github.com/vercel/storage/blob/vercel-kv-vercel-postgres-archive/packages/postgres/src/create-pool.ts"
        severity: error
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: VercelPool
    import_path: "@vercel/postgres"
    description: >
      Direct constructor for VercelPool. Exported as a class — callers can
      bypass createPool() and instantiate the pool directly with
      `new VercelPool(config)`. This skips createPool's validation: empty
      connection strings are accepted silently (defaulted to "") and the
      direct-vs-pooled hostname check is not enforced. Failures are deferred
      from construction time to first query time, making the root cause
      harder to diagnose. EdgeRuntime overrides for `maxUses` and `max`
      that createPool() applies are also skipped — direct instantiation
      under EdgeRuntime gets the raw config without warnings.
    postconditions:
      # Evidence: dist/chunk-7IR77QAQ.js lines 123-130 (VercelPool constructor):
      #   constructor(config) {
      #     super(config);
      #     this.Client = VercelClient;
      #     this.connectionString = config.connectionString ?? "";
      #   }
      # The constructor accepts config.connectionString = "" without throwing.
      # createPool() (lines 157-180) does the validation — direct construction
      # bypasses it entirely.
      # Source: https://github.com/vercel/storage/blob/vercel-kv-vercel-postgres-archive/packages/postgres/src/create-pool.ts
      - id: vercelpool-direct-constructor-skips-validation
        condition: >
          `new VercelPool(config)` is invoked directly instead of via the
          createPool() factory. The constructor accepts the config without
          checking that `config.connectionString` is present, non-empty, or
          of the pooled (`-pooler.`) form. An empty or wrong-type connection
          string is silently stored; the first query then fails with a
          confusing low-level error from @neondatabase/serverless rather than
          the clear VercelPostgresError that createPool() would throw at
          construction time.
        throws: >
          No exception at construction. First query produces an opaque
          connection error from the underlying neon driver, often presenting
          as "fetch failed" or "ECONNREFUSED" rather than the descriptive
          VercelPostgresError('missing_connection_string') / ('invalid_connection_string')
          that createPool() raises.
        description: >
          The VercelPool class is exported, so TypeScript users can write
          `new VercelPool({ connectionString: someEnvVar })` without going
          through createPool(). When someEnvVar is undefined or empty,
          the pool is constructed successfully but is dead-on-arrival.
          This pattern shows up in test harnesses, mocks, and DI containers
          where the factory's environment-coupled validation is undesirable —
          but the developer rarely re-implements the validation themselves.

          Additionally, EdgeRuntime overrides (maxUses=1, max=10000) are NOT
          applied for direct construction — under EdgeRuntime, a direct
          pool will reuse connections in violation of the runtime's
          stateless contract, causing intermittent query failures across
          invocations.
        required_handling: >
          Prefer createPool() over direct construction in application code:

          // ✅ Factory — validates connection string + applies EdgeRuntime overrides
          const pool = createPool({ connectionString: process.env.POSTGRES_URL });

          // ❌ Direct constructor — skips validation
          const pool = new VercelPool({ connectionString: process.env.POSTGRES_URL });
          // If POSTGRES_URL is undefined, this constructs a dead pool that
          // fails opaquely on first query.

          If direct construction is required (e.g. for testing), validate the
          connection string yourself before instantiating:

          if (!config.connectionString) {
            throw new Error('VercelPool requires a connectionString');
          }
          if (!config.connectionString.includes('-pooler.')) {
            throw new Error('VercelPool requires a pooled connection string');
          }
          const pool = new VercelPool(config);
        sources:
          - "https://github.com/vercel/storage/blob/vercel-kv-vercel-postgres-archive/packages/postgres/src/create-pool.ts"
        severity: warning
        evidence_quality: confirmed
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: createPool
    import_path: "@vercel/postgres"
    description: >
      Creates a VercelPool instance backed by @neondatabase/serverless. Reads the
      POSTGRES_URL environment variable by default. Throws VercelPostgresError
      synchronously if the connection string is missing or of the wrong type
      (direct vs. pooled). Must be called with the pooled connection string
      (contains '-pooler.' in hostname), not the direct connection string.
    postconditions:
      # Evidence: source confirmed from @vercel/postgres@0.10.0 dist/chunk-BZ4XJVIW.cjs
      # VercelPostgresError codes: 'missing_connection_string', 'invalid_connection_string'
      # Source: https://github.com/vercel/storage/tree/main/packages/postgres
      - id: createpool-missing-connection-string
        condition: >
          POSTGRES_URL environment variable is not set (undefined or the literal
          string "undefined") and no connectionString is passed in config.
        throws: >
          VercelPostgresError with code 'missing_connection_string':
          "You did not supply a 'connectionString' and no 'POSTGRES_URL' env var was found."
        required_handling: >
          Caller MUST ensure POSTGRES_URL is set in the environment before calling
          createPool(). In Vercel deployments this is injected automatically; in local
          development it must be in .env.local. Missing connection string causes
          VercelPostgresError at call time — it will not throw at query time.

          Pattern: call createPool() inside a try-catch at module initialization, or
          validate env vars at app startup before any database access.
        sources:
          - "https://github.com/vercel/storage/tree/main/packages/postgres"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: createpool-wrong-connection-string-type
        condition: >
          A direct (non-pooled) connection string is passed to createPool(). The
          direct connection string uses the standard host format; pooled strings
          contain '-pooler.' in the hostname. Using a direct connection string with
          createPool() triggers an explicit validation error.
        throws: >
          VercelPostgresError with code 'invalid_connection_string':
          "This connection string is meant to be used with a direct connection.
          Make sure to use a pooled connection string or try createClient() instead."
        required_handling: >
          Use POSTGRES_URL (pooled) with createPool() and POSTGRES_URL_NON_POOLING
          (direct) with createClient(). Mixing them causes VercelPostgresError at
          call time. This is a common mistake when manually setting connection strings.
        sources:
          - "https://github.com/vercel/storage/tree/main/packages/postgres"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: createClient
    import_path: "@vercel/postgres"
    description: >
      Creates a VercelClient for a direct (non-pooled) PostgreSQL connection.
      Reads POSTGRES_URL_NON_POOLING by default. Throws VercelPostgresError
      synchronously if the connection string is missing or of the wrong type.
      Requires calling client.connect() before issuing queries and client.end()
      after use to release the connection.
    postconditions:
      # Evidence: source confirmed from @vercel/postgres@0.10.0 dist/chunk-BZ4XJVIW.cjs
      # VercelPostgresError codes: 'missing_connection_string', 'invalid_connection_string'
      - id: createclient-missing-connection-string
        condition: >
          POSTGRES_URL_NON_POOLING environment variable is not set and no
          connectionString is passed in config.
        throws: >
          VercelPostgresError with code 'missing_connection_string':
          "You did not supply a 'connectionString' and no 'POSTGRES_URL_NON_POOLING' env var was found."
        required_handling: >
          Ensure POSTGRES_URL_NON_POOLING is set before calling createClient().
          In Vercel deployments, both POSTGRES_URL and POSTGRES_URL_NON_POOLING are
          injected automatically. In local development, both must be in .env.local.
        sources:
          - "https://github.com/vercel/storage/tree/main/packages/postgres"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: createclient-pooled-connection-string
        condition: >
          A pooled connection string (containing '-pooler.' in hostname) is passed
          to createClient() instead of a direct connection string.
        throws: >
          VercelPostgresError with code 'invalid_connection_string':
          "This connection string is meant to be used with a pooled connection.
          Try createPool() instead."
        required_handling: >
          Use POSTGRES_URL_NON_POOLING (direct connection) with createClient().
          Use POSTGRES_URL (pooled) with createPool() or the global sql/db template.
          In serverless environments, prefer createPool() (or the global sql tag)
          over createClient() to benefit from connection pooling.
        sources:
          - "https://github.com/vercel/storage/tree/main/packages/postgres"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      - id: createclient-query-before-connect
        condition: >
          client.query() or client.sql`` is called on a VercelClient before
          calling client.connect().
        throws: >
          Error: query is called on a client that is not connected. The underlying
          pg Client rejects with a connection error.
        required_handling: >
          Always call await client.connect() before issuing any queries on a
          VercelClient. Wrap the entire client lifecycle in try-catch-finally:

          const client = createClient();
          try {
            await client.connect();
            const result = await client.sql`SELECT * FROM users`;
            return result.rows;
          } catch (error) {
            console.error('Database error:', error);
            throw error;
          } finally {
            await client.end();  // always release the connection
          }
        sources:
          - "https://node-postgres.com/apis/client"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: pool.end
    import_path: "@vercel/postgres"
    description: >
      Shuts down all clients in the pool and clears pool timers. Returns
      Promise<void>. After pool.end() is called, any attempt to check out a
      client from the pool will receive an error. Should be called during
      graceful shutdown. The global sql/db object lazily creates a pool —
      calling pool.end() on that pool prevents future queries from succeeding.
    postconditions:
      # Evidence: node-postgres Pool.end() documentation + pool behavior confirmed
      # Source: https://node-postgres.com/apis/pool
      - id: pool-end-no-error-handling
        condition: >
          pool.end() is called but not awaited, or the Promise is not handled.
          Clients may not be fully released before the process exits.
        throws: >
          Pool.end() returns a Promise<void>. If not awaited, the shutdown is
          fire-and-forget and connections may not close cleanly before process exit.
        required_handling: >
          Always await pool.end() in shutdown handlers:

          process.on('SIGTERM', async () => {
            try {
              await pool.end();
            } catch (error) {
              console.error('Error closing pool:', error);
            } finally {
              process.exit(0);
            }
          });
        sources:
          - "https://node-postgres.com/apis/pool"
          - "https://node-postgres.com/features/pooling"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      - id: pool-end-queries-after-shutdown
        condition: >
          Any query (sql`...`, pool.query(), pool.connect()) is attempted after
          pool.end() has been called.
        throws: >
          Error: pool has been shut down — the pool refuses new client checkouts
          after end() is called.
        required_handling: >
          Do not issue queries after calling pool.end(). In serverless environments
          (Vercel Edge/Lambda), pool lifecycle is managed per-invocation — do not
          call pool.end() in the middle of request handling.
        sources:
          - "https://node-postgres.com/features/pooling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: client.end
    import_path: "@vercel/postgres"
    description: >
      Closes the direct PostgreSQL connection established by VercelClient.connect().
      Returns Promise<void>. If not called after queries complete, the connection
      is leaked — it remains open until the server forcibly closes it due to idle
      timeout. In Lambda/Edge functions, leaked connections accumulate across
      invocations until max_connections is reached.
    postconditions:
      # Evidence: node-postgres Client.end() documentation
      # Source: https://node-postgres.com/apis/client
      - id: client-end-not-called
        condition: >
          createClient() is used to run queries but client.end() is never called,
          or is called in a code path that can be skipped when an error occurs
          (not in a finally block).
        throws: >
          No immediate exception — connection leak is silent. The PostgreSQL server
          will eventually close idle connections based on idle_in_transaction_session_timeout
          and tcp_keepalives settings. In the meantime, each invocation creates a
          new connection that is never returned.
        required_handling: >
          ALWAYS call client.end() in a finally block to guarantee connection cleanup
          regardless of query success or failure:

          const client = createClient();
          try {
            await client.connect();
            const { rows } = await client.query('SELECT * FROM users');
            return rows;
          } catch (error) {
            console.error('Query failed:', error);
            throw error;
          } finally {
            await client.end();  // MUST be in finally — not try
          }

          Failure pattern (DO NOT DO THIS):
          const client = createClient();
          await client.connect();
          const { rows } = await client.query('...');  // if this throws, end() is never called
          await client.end();  // unreachable on error
        sources:
          - "https://node-postgres.com/apis/client"
          - "https://node-postgres.com/features/transactions"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: silent_failure
          visibility: silent
          user_experience: service_unavailable
          incident_cost_range: high

  - name: postgresConnectionString
    import_path: "@vercel/postgres"
    description: >
      Utility function that reads the POSTGRES_URL (pooled) or POSTGRES_URL_NON_POOLING
      (direct) environment variable and returns the connection string, or undefined if
      the variable is not set. Accepts 'pool' (default) or 'direct' as the type argument.
      Throws VercelPostgresError synchronously if an invalid type is passed. Primarily
      used for manual connection string construction or debugging — rarely called in
      application code since createPool/createClient handle this automatically.
    postconditions:
      # Evidence: dist/chunk-BZ4XJVIW.cjs — postgresConnectionString() switch statement
      # throws VercelPostgresError('invalid_connection_type') for unknown types.
      # Confirmed from archived source:
