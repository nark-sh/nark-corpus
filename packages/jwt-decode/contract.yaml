package: jwt-decode
semver: ">=3.0.0 <5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-06-29"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 1/1 contracted functions (jwtDecode) — 2 postconditions (invalid-token, no-signature-validation)
description: Decode JWT tokens. Does not validate signatures.

functions:
  - name: jwtDecode
    import_path: "jwt-decode"
    description: "Decodes a JWT token string. Throws InvalidTokenError on malformed or non-string input. Does NOT validate signature, expiry, or any claims — only decodes the base64url-encoded payload."

    postconditions:
      # Evidence: seen in 7 primary firings across 6 repos in scan-jwt-decode-2026-06-29.json
      # Top affected: jitsi/jitsi-meet (28860★), activepieces/activepieces (21381★), triggerdotdev/jsonhero-web (10648★)
      - id: invalid-token
        maturity: stable
        condition: "token is not a string, missing dot separators, has invalid base64 encoding, or has invalid JSON after decoding"
        throws: "InvalidTokenError"
        required_handling: >
          Caller MUST wrap jwtDecode() in a try-catch block. JWT tokens received from auth
          systems can be malformed, truncated, expired, or tampered with. Any malformed token
          throws InvalidTokenError synchronously. Missing try-catch causes an unhandled exception
          that crashes the current request or renders the auth flow broken.
        sources:
          - "https://github.com/auth0/jwt-decode"
          - "https://github.com/auth0/jwt-decode/blob/main/lib/index.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high

      # Evidence: https://github.com/auth0/jwt-decode/blob/main/README.md
      # Quote: "This library doesn't validate the token, any well-formed JWT can be decoded."
      # Source inspection: no signature check, no exp validation, no algorithm verification.
      # Security misuse pattern: callers treat jwtDecode() output as authoritative for access control.
      - id: no-signature-validation
        maturity: stable
        condition: >
          caller uses decoded payload fields (sub, role, exp, permissions, etc.) to make
          authorization or authentication decisions without independent server-side JWT verification.
          jwtDecode() performs ONLY base64url decoding — it does not verify the HMAC or RSA
          signature, does not check exp expiry, does not validate iss or aud claims, and accepts
          any structurally valid JWT regardless of whether it was signed by a trusted key.
        throws: "no exception — returns decoded payload from forged or tampered tokens silently"
        required_handling: >
          Callers MUST NOT rely solely on jwtDecode() for security-critical decisions.
          Any claim read from jwtDecode() output (sub, role, exp, permissions) MUST be
          independently validated server-side using a signature-verifying library such as
          jsonwebtoken.verify(), jose.jwtVerify(), or equivalent. Use jwtDecode() only
          for non-security purposes such as reading display metadata (e.g., user display name)
          or logging, never for access control. If exp is read to check token freshness,
          the actual token must still be server-validated on each request.
        sources:
          - "https://github.com/auth0/jwt-decode"
          - "https://github.com/auth0/jwt-decode/blob/main/README.md"
        severity: warning
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: critical
