package: jwt-decode
semver: ">=3.0.0 <5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed
description: Decode JWT tokens. Does not validate signatures.

functions:
  - name: jwtDecode
    import_path: "jwt-decode"
    description: "Decodes a JWT token string. Throws InvalidTokenError on malformed or non-string input."

    postconditions:
      # Evidence: seen in 4 primary firings across 3 repos in scan-jwt-decode-2026-04-02.json
      # Top affected: jitsi/jitsi-meet (⭐ 28860), triggerdotdev/jsonhero-web (⭐ stars), nuxt-community/auth-module (⭐ stars)
      - id: invalid-token
        condition: "token is not a string, missing dot separators, has invalid base64 encoding, or has invalid JSON after decoding"
        throws: "InvalidTokenError"
        required_handling: >
          Caller MUST wrap jwtDecode() in a try-catch block. JWT tokens received from auth
          systems can be malformed, truncated, expired, or tampered with. Any malformed token
          throws InvalidTokenError synchronously. Missing try-catch causes an unhandled exception
          that crashes the current request or renders the auth flow broken.
        sources:
          - "https://github.com/auth0/jwt-decode"
          - "https://github.com/auth0/jwt-decode/blob/main/lib/index.ts"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: high
