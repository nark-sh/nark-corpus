coverage_rationale: |
  langchain v1.x is a meta-package (re-exports @langchain/core, @langchain/openai, etc.). All 31 corpus repos using langchain v1.x import from @langchain/core, @langchain/classic, etc. — not from langchain directly. repos using v0.x (a16z-infra, chatbot-ui) use a legacy API (LLMChain, OpenAI from langchain/llms/openai) that is effectively superseded. Behavioral contracts should target @langchain/core or specific @langchain/* sub-packages where error contracts are meaningful.
