        maturity: stable
        condition: >
          getSubagentMessages() returns an empty array when the subagent
          transcript is missing, OR throws on corrupted JSONL / store load
          failure (same dual-mode error contract as getSessionMessages).
          Callers that read `messages.length === 0` without a try/catch
          silently swallow real corruption as "no history."
        throws: Error (corrupted JSONL line, store load failure) | Returns [] (subagent not found)
        required_handling: >
          Wrap in try/catch and treat empty-array as the only successful
          "no history" signal:
            try {
              const messages = await getSubagentMessages(sessionId, agentId, {
                dir: projectDir,
              });
              if (messages.length === 0) {
                return [];
              }
              return messages;
            } catch (err) {
              console.error('Subagent transcript unreadable:', err);
              throw err;
            }
          Subagent transcripts are often inspected in debugging UIs;
          conflating "missing" with "unreadable" hides corruption bugs
          from the developer.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: low
        sources:
          # Evidence: sdk.d.ts line 725-735 — getSubagentMessages JSDoc explicitly returns empty array on not-found
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.187/sdk.d.ts
