package: "@anthropic-ai/claude-agent-sdk"
semver: ">=0.1.0"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-12"  # deepen-stream-2 pass: added deleteSession + importSessionToStore + resolveSettings (v0.3.174 surface)
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.75  # 12 contracted / 16 total async-callable (4 omitted read-only) — +3 this pass (deleteSession, importSessionToStore, resolveSettings)
# effective_coverage: 1.00 — 12/12 non-omitted functions contracted
# V2 SDKSession methods (send/stream) treated as variants of SDKSession interface, subsumed by unstable_v2_prompt contract
# Surface grew from 13 (v0.2.91) → 16 (v0.3.174) — Anthropic added deleteSession, importSessionToStore, resolveSettings, bridge module (skipped — @alpha, narrow adoption), assistant module (skipped — @alpha)

description: >
  SDK for building AI agents with Claude Code's capabilities.
  The primary function `query()` returns an async iterable (Query object).
  Iterating via `for await` can throw `AbortError` when the query is aborted
  via an AbortController. The stream also emits result messages with error
  subtypes (billing_error, rate_limit, etc.) that must be checked in message handlers.
  startup() pre-warms the subprocess but rejects on timeout.
  Session management functions (forkSession, renameSession, tagSession, etc.)
  operate on local JSONL transcript files and throw filesystem errors.
  V2 API (unstable/alpha): unstable_v2_prompt() is a one-shot convenience that
  returns SDKResultMessage (must check subtype before reading result field).
  SDKSession.send() + SDKSession.stream() underlie unstable_v2_prompt() and share
  the same error profile as query() (AbortError, process errors, session-ended errors).

sources:
  - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts
  - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/README.md
  - https://code.claude.com/docs/en/agent-sdk/overview
  - https://code.claude.com/docs/en/agent-sdk/typescript
  - https://code.claude.com/docs/en/agent-sdk/sessions
  - https://code.claude.com/docs/en/agent-sdk/typescript-v2-preview

functions:
  - name: query
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Programmatically runs a Claude agent session. Returns a Query async iterable.
      Callers use `for await (const message of query({...}))` to process messages.
      Throws AbortError when the operation is cancelled via AbortController signal.
      The stream itself may emit result messages with error subtypes.
    patterns:
      - 'query({'
      - 'query({ prompt'
      - 'for await.*query('
    postconditions:
      # Evidence: cherry-studio/index.ts lines 609-641, 21st-dev__1code/claude.ts lines 2018-2031
      # Both repos explicitly catch errors from query() and check error.name === 'AbortError'
      # Evidence: scan-anthropic-ai-claude-agent-sdk-2026-04-03.json — 2 violations in 2 repos out of 14 scanned
      # Top affected: op7418/CodePilot, zed-industries/claude-agent-acp (for await loop missing try-catch)
      - id: query-abort-error
        condition: >
          query() is called with an abortController option and the controller is
          aborted during execution (e.g., user cancels the session), but the
          `for await` loop is not wrapped in a try/catch block.
        throws: AbortError
        required_handling: >
          Wrap the `for await (const message of query(...))` loop in a try/catch block.
          Check if the error is an AbortError (error.name === 'AbortError' or
          error instanceof AbortError) to distinguish intentional cancellation
          from unexpected failures. Intentional aborts should be handled gracefully,
          not re-thrown as errors.
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.2.91/sdk.d.ts

      - id: query-network-process-error
        condition: >
          query() is called without a try/catch around the `for await` loop,
          and the underlying Claude process fails to start or encounters a
          network/process error during execution.
        throws: Error
        required_handling: >
          Wrap both the query() call itself AND the `for await` loop in separate
          try/catch blocks. The query() call can throw synchronously if configuration
          is invalid. The `for await` loop can throw on process-level failures.
          Log errors with context (duration, stderr) for debugging.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.2.91/sdk.d.ts

      - id: query-result-error-subtype-unchecked
        condition: >
          The `for await` loop processes messages from query() but only reads
          `message.result` without checking `message.subtype`. When the agent
          hits max turns, exhausts the budget, or encounters execution errors,
          the loop emits an SDKResultError (type: 'result', subtype:
          'error_during_execution' | 'error_max_turns' | 'error_max_budget_usd' |
          'error_max_structured_output_retries') — but `message.result` is
          undefined on the error variant, and `message.errors` contains the
          actual failure reason. Code that accesses `message.result` directly
          reads undefined, silently returning no output.
        throws: "SDKResultError (type: 'result', subtype: 'error_*') — not thrown but emitted as a message"
        required_handling: >
          Always check message.subtype before accessing message.result:
            if (message.type === 'result') {
              if (message.subtype === 'success') {
                console.log(message.result);
              } else {
                // error_during_execution | error_max_turns | error_max_budget_usd
                console.error('Agent failed:', message.errors);
                throw new Error(`Agent error: ${message.subtype}: ${message.errors.join('; ')}`);
              }
            }
          The SDKResultError shape has no `result` field — only `errors: string[]`.
          Callers that do `if ('result' in message) ...` will silently skip the error.
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        sources:
          # Evidence: sdk.d.ts SDKResultError type confirmed — no `result` field on error variant
          # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript SDKResultMessage type reference
          - https://code.claude.com/docs/en/agent-sdk/typescript

      - id: query-assistant-message-error-unchecked
        condition: >
          The `for await` loop processes SDKAssistantMessage objects but does not
          check the optional `error` field. When the Anthropic API returns an
          error mid-stream (authentication_failed, billing_error, rate_limit,
          server_error, max_output_tokens), the assistant message's `error` field
          is set to one of those string literals. The message is still emitted
          with an empty/partial content block — callers that don't check `error`
          display corrupt output and continue as if the turn succeeded.
        throws: "SDKAssistantMessageError: 'authentication_failed' | 'billing_error' | 'rate_limit' | 'invalid_request' | 'server_error' | 'unknown' | 'max_output_tokens'"
        required_handling: >
          Check the error field on assistant messages:
            if (message.type === 'assistant' && message.error) {
              switch (message.error) {
                case 'authentication_failed':
                  throw new Error('API key invalid or revoked');
                case 'billing_error':
                  throw new Error('Account billing issue — check Anthropic Console');
                case 'rate_limit':
                  // Implement backoff and retry
                  break;
                case 'max_output_tokens':
                  // Increase maxTokens or break the task into smaller subtasks
                  break;
                default:
                  throw new Error(`API error: ${message.error}`);
              }
            }
          Without this check, a billing_error or auth failure silently produces
          empty agent output that looks like a successful empty response.
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        sources:
          # Evidence: sdk.d.ts SDKAssistantMessage.error?: SDKAssistantMessageError (line ~2038)
          # Evidence: sdk.d.ts SDKAssistantMessageError = 'authentication_failed' | 'billing_error' | ... (line ~2043)
          - https://code.claude.com/docs/en/agent-sdk/typescript

  - name: startup
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Pre-warms the Claude CLI subprocess so the first query() resolves immediately.
      Returns a WarmQuery handle. Resolves once the subprocess spawns and completes
      the initialize handshake. Rejects if initialization takes longer than
      initializeTimeoutMs (default: 60,000ms / 60 seconds).
      Use to eliminate cold-start latency in interactive or latency-sensitive agents.
    patterns:
      - 'startup('
      - 'await startup('
    postconditions:
      # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript — startup() documented
      # "If initialization does not complete in time, the promise rejects with a timeout error"
      # Evidence: sdk.d.ts — startup(): Promise<WarmQuery>, initializeTimeoutMs?: number (default 60000)
      - id: startup-timeout-uncaught
        condition: >
          startup() is called without a try/catch or .catch() handler, and the
          Claude CLI subprocess fails to initialize within initializeTimeoutMs
          (default 60 seconds). This happens when the CLI binary is missing,
          the process cannot be spawned (permissions, PATH issues), or the
          machine is under heavy load.
        throws: Error (timeout — "initialization did not complete in time")
        required_handling: >
          Wrap startup() in a try/catch and handle the timeout explicitly:
            try {
              const warm = await startup({ initializeTimeoutMs: 30000 });
              const result = warm.query(prompt);
              // ... process result
            } catch (err) {
              if (err.message?.includes('timeout') || err.message?.includes('initialization')) {
                // Fall back to cold-start query() or surface error to user
                console.error('Agent startup timed out:', err.message);
              }
              throw err;
            }
          If startup() is called once at application start in a background job,
          an unhandled rejection crashes the Node.js process silently.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript
          # "initializeTimeoutMs: defaults to 60000. If initialization does not complete in time,
          #  the promise rejects with a timeout error."
          - https://code.claude.com/docs/en/agent-sdk/typescript

      - id: startup-warm-query-not-disposed
        condition: >
          startup() resolves successfully, but the WarmQuery handle is never
          used (warm.query() is never called) and is also never closed via
          warm.close() or `using warm = await startup(...)`. WarmQuery implements
          AsyncDisposable. An unclosed WarmQuery leaves the subprocess running
          and blocks clean process exit.
        throws: "No thrown error — subprocess leak, process hangs on exit"
        required_handling: >
          Always either use or close the WarmQuery:
            // Option 1: Use it immediately
            const warm = await startup();
            const result = warm.query(prompt); // consumes the warm query

            // Option 2: Use `using` for automatic disposal (TypeScript 5.2+)
            await using warm = await startup();
            const result = warm.query(prompt);

            // Option 3: Close explicitly if not needed
            const warm = await startup();
            if (!needsAgent) { warm.close(); return; }
          A leaked WarmQuery in a serverless function prevents the invocation
          from completing — the function times out and incurs full execution cost.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: delayed_failure
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          # Evidence: sdk.d.ts — WarmQuery extends AsyncDisposable (line ~4796)
          # interface WarmQuery extends AsyncDisposable { query(), close() }
          - https://code.claude.com/docs/en/agent-sdk/typescript

  - name: forkSession
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Forks an existing session by copying its JSONL transcript into a new session file.
      Returns the new fork's sessionId. The original session is not modified.
      Reads from and writes to the local filesystem (~/.claude/projects/).
      Forking branches the conversation history only — filesystem changes made
      in the original session remain visible to both sessions.
    patterns:
      - 'forkSession('
      - 'await forkSession('
    postconditions:
      # Evidence: sdk.d.ts — forkSession(_sessionId, _options?): Promise<ForkSessionResult>
      # Evidence: https://code.claude.com/docs/en/agent-sdk/sessions — fork documentation
      - id: fork-session-not-found
        condition: >
          forkSession() is called with a sessionId that doesn't exist in the
          project directory. The session file may have been deleted, or the
          calling process is using a different cwd than the process that created
          the session. Sessions are stored at:
          ~/.claude/projects/<encoded-cwd>/<sessionId>.jsonl
          where encoded-cwd replaces non-alphanumeric chars with '-'.
          A cwd mismatch causes a "session not found" failure.
        throws: Error (session file not found / ENOENT)
        required_handling: >
          Wrap forkSession() in a try/catch and verify the sessionId before
          calling:
            try {
              const { sessionId: forkId } = await forkSession(originalSessionId);
            } catch (err) {
              if (err.code === 'ENOENT' || err.message?.includes('not found')) {
                console.error('Session not found — cwd mismatch or file deleted:', err);
                // Cannot fork; start a fresh session instead
              } else {
                throw err;
              }
            }
          The docs explicitly warn: if a resume call returns a fresh session, the
          most common cause is a cwd mismatch. The same applies to forkSession.
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          # Evidence: https://code.claude.com/docs/en/agent-sdk/sessions
          # "Sessions are stored under ~/.claude/projects/<encoded-cwd>/*.jsonl"
          # "If a resume call returns a fresh session instead of the expected history,
          #  the most common cause is a mismatched cwd."
          - https://code.claude.com/docs/en/agent-sdk/sessions

  - name: renameSession
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Renames a session by appending a custom-title entry to the session's JSONL
      transcript file. Requires the title to be non-empty after trimming whitespace.
      Writes to ~/.claude/projects/<encoded-cwd>/<sessionId>.jsonl.
    patterns:
      - 'renameSession('
      - 'await renameSession('
    postconditions:
      # Evidence: sdk.d.ts — renameSession(_sessionId, _title, _options?): Promise<void>
      # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript
      # "title: must be non-empty after trimming"
      - id: rename-session-empty-title
        condition: >
          renameSession() is called with a title that is empty or whitespace-only
          (e.g., '', '   '). The documentation states the title "must be non-empty
          after trimming whitespace." An empty title throws a validation error.
          This commonly occurs when user input is passed directly without validation.
        throws: Error (validation — title must be non-empty after trimming)
        required_handling: >
          Validate the title before calling renameSession():
            const trimmedTitle = title.trim();
            if (!trimmedTitle) {
              throw new Error('Session title cannot be empty');
            }
            await renameSession(sessionId, trimmedTitle);
          Without this guard, passing an empty string from a UI form throws an
          unhandled error that surfaces to the user as an unhandled rejection.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript
          # "title: New title, must be non-empty after trimming (required)"
          - https://code.claude.com/docs/en/agent-sdk/typescript

  - name: tagSession
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Tags a session. Pass null to clear the tag. Appends a tag entry to the
      session's JSONL transcript file. Writes to the local filesystem.
      Sessions are tagged per-session and can be used to organize/filter sessions.
    patterns:
      - 'tagSession('
      - 'await tagSession('
    postconditions:
      # Evidence: sdk.d.ts — tagSession(_sessionId, _tag: string | null, _options?): Promise<void>
      # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript
      - id: tag-session-not-found
        condition: >
          tagSession() is called with a sessionId that does not exist on the
          local filesystem, or the cwd doesn't match the directory where the
          session was created. The function writes to the session's JSONL file
          and will throw a filesystem error if the file is not found.
        throws: Error (ENOENT — session file not found)
        required_handling: >
          Verify the session exists before tagging, or catch the error:
            try {
              await tagSession(sessionId, tag);
            } catch (err) {
              if (err.code === 'ENOENT') {
                console.warn('Session not found for tagging:', sessionId);
              } else {
                throw err;
              }
            }
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          # Evidence: sdk.d.ts — tagSession returns Promise<void>, writes to session file
          # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript
          - https://code.claude.com/docs/en/agent-sdk/typescript

  - name: unstable_v2_prompt
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      V2 Alpha one-shot convenience function for single-turn queries.
      Creates an SDKSession internally, sends the prompt, iterates the response
      stream until a 'result' message, then returns SDKResultMessage.
      SDKResultMessage is a discriminated union: SDKResultSuccess (subtype: 'success',
      has result field) or SDKResultError (subtype: 'error_*', has errors[] field).
      Callers MUST check result.subtype before accessing result.result or result.errors.
      Throws if the underlying subprocess fails to produce a result message.
      Annotated @alpha — API may change before stable release.
    patterns:
      - 'unstable_v2_prompt('
      - 'await unstable_v2_prompt('
    postconditions:
      # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript-v2-preview
      # Official docs show: if (result.subtype === "success") { console.log(result.result); }
      # This means callers who skip the subtype check silently get undefined from result.result
      # Evidence: sdk.d.ts — SDKResultMessage = SDKResultSuccess | SDKResultError
      # SDKResultError has: subtype: 'error_during_execution' | 'error_max_turns' | 'error_max_budget_usd' | 'error_max_structured_output_retries'
      # Evidence: sdk.mjs source: async function k$$($,X){... for await(let U of J.stream()) if(U.type==="result")return U; throw Error("Session ended without result message")}
      - id: v2-prompt-result-error-unchecked
        condition: >
          unstable_v2_prompt() is called and the returned SDKResultMessage is accessed
          directly without checking result.subtype. SDKResultMessage is a discriminated
          union: SDKResultSuccess (subtype: 'success', has result: string field) and
          SDKResultError (subtype: 'error_during_execution' | 'error_max_turns' |
          'error_max_budget_usd' | 'error_max_structured_output_retries', no result
          field, has errors: string[] field). When Claude hits max turns, budget limits,
          or execution errors, the promise resolves with SDKResultError — not rejected.
          Code that reads result.result directly gets undefined silently.
        throws: >
          SDKResultError (type: 'result', subtype: 'error_*') — promise resolves (not
          rejected) with an error-variant result. result.result is undefined on error variant.
        required_handling: >
          Always check result.subtype before reading result.result:
            const result = await unstable_v2_prompt("prompt", { model: '...' });
            if (result.subtype === 'success') {
              console.log(result.result);
            } else {
              // result.subtype is 'error_during_execution', 'error_max_turns',
              // 'error_max_budget_usd', or 'error_max_structured_output_retries'
              console.error('Agent failed:', result.errors);
            }
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        sources:
          # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript-v2-preview
          # "if (result.subtype === 'success') { console.log(result.result); }"
          - https://code.claude.com/docs/en/agent-sdk/typescript-v2-preview

      - id: v2-prompt-no-try-catch
        condition: >
          unstable_v2_prompt() is called without a try/catch block, and the underlying
          Claude subprocess fails to start (e.g., native binary missing, process crash)
          or the response stream terminates without a result message. The SDK source
          throws Error("Session ended without result message") if the stream ends without
          a result-type message. AbortError is thrown if the operation is aborted.
          Native binary missing throws Error("Native CLI binary for <platform>-<arch>
          not found. Reinstall @anthropic-ai/claude-agent-sdk without --omit=optional").
        throws: >
          Error (session ended without result) | AbortError (if aborted) |
          Error (native binary missing)
        required_handling: >
          Wrap unstable_v2_prompt() in a try/catch:
            try {
              const result = await unstable_v2_prompt("prompt", { model: '...' });
              if (result.subtype === 'success') {
                return result.result;
              } else {
                throw new Error(`Agent failed: ${result.errors.join(', ')}`);
              }
            } catch (error) {
              if (error.name === 'AbortError') {
                // Handle intentional cancellation
              } else {
                // Handle subprocess/process errors
                throw error;
              }
            }
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          # Evidence: sdk.mjs source line: throw Error("Session ended without result message")
          # Evidence: sdk.mjs KW constructor: throw Error("Native CLI binary for ${process.platform}-${process.arch} not found...")
          # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript-v2-preview
          - https://code.claude.com/docs/en/agent-sdk/typescript-v2-preview

      - id: v2-session-not-closed
        condition: >
          An SDKSession created by unstable_v2_createSession() is used without closing it
          via session.close(), `await using`, or Symbol.asyncDispose. SDKSession wraps a
          Claude subprocess — if not closed, the subprocess continues running until the
          Node.js process exits. In long-running services, each unclosed session leaks a
          subprocess. The V2 docs explicitly recommend `await using` (TypeScript 5.2+)
          for automatic cleanup.
        throws: >
          No throw — leaked subprocess runs silently in background. Visible as process
          accumulation in `ps aux` or resource exhaustion on the host.
        required_handling: >
          Use `await using` for automatic cleanup (TypeScript 5.2+):
            await using session = unstable_v2_createSession({ model: '...' });
            // session.close() called automatically on scope exit

          Or call session.close() explicitly in a finally block:
            const session = unstable_v2_createSession({ model: '...' });
            try {
              await session.send("Hello");
              for await (const msg of session.stream()) { ... }
            } finally {
              session.close();
            }
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: degraded_service
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        sources:
          # Evidence: https://code.claude.com/docs/en/agent-sdk/typescript-v2-preview
          # "Sessions can be closed manually or automatically using await using"
          # Evidence: sdk.mjs KW.close() — sets closed=true, calls inputStream.done(), abortController.abort() after timeout
          # Evidence: sdk.mjs KW[Symbol.asyncDispose]() — delegates to close()
          - https://code.claude.com/docs/en/agent-sdk/typescript-v2-preview

  - name: deleteSession
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Deletes a session. With `sessionStore`: calls `sessionStore.delete()` if
      implemented; no-op otherwise (per the SessionStore contract — appropriate
      for WORM/append-only backends). Without `sessionStore`: removes
      `{sessionId}.jsonl` and the `{sessionId}/` subagent-transcript subdirectory
      from the local projects dir. Throws if the session is not found, if the
      sessionId is not a valid UUID, or if the underlying SessionStore.delete()
      implementation throws.
    patterns:
      - 'deleteSession('
      - 'await deleteSession('
    postconditions:
      # Evidence: sdk.d.ts line 533 — deleteSession(_sessionId, _options?): Promise<void>
      # Evidence: sdk.d.ts JSDoc (line 527) — "Throws if the session is not found"
      # Evidence: sdk.mjs throws: `Invalid sessionId: ${e}`
      # Evidence: sdk.mjs throws: `Session ${e} not found in project directory for ${t.dir}`
      # Evidence: sdk.mjs throws: `Session ${e} not found in any project directory`
      - id: delete-session-not-found
        condition: >
          deleteSession() is called without a try/catch and the sessionId does
          not exist in the configured project directory. This happens routinely
          in cleanup paths (UI delete button, retention sweeper, test teardown)
          when the session was already deleted by another process, when the
          caller is using a different cwd than the session creator (so the
          encoded project key doesn't match), or when the session id was
          stored as state but the underlying JSONL was manually purged.
        throws: 'Error (message: "Session {sessionId} not found in project directory for {dir}" / "Session {sessionId} not found in any project directory")'
        required_handling: >
          Wrap deleteSession() in try/catch and treat "not found" as a benign
          terminal state (idempotent delete), rejecting only on truly
          unexpected errors:
            try {
              await deleteSession(sessionId, { dir: projectDir });
            } catch (err) {
              if (err.message?.includes('not found')) {
                // Already gone — idempotent delete succeeded
                return;
              }
              throw err;
            }
          Without this guard, a "delete" button that runs twice (double-click,
          retry on transient error) surfaces a confusing "session not found"
          error to the user despite the delete having actually succeeded the
          first time.
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          # Evidence: sdk.d.ts line 520-533 — deleteSession JSDoc + signature
          # Evidence: sdk.mjs minified source: throw Error(`Session ${e} not found in any project directory`)
          - https://code.claude.com/docs/en/agent-sdk/sessions
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts

      - id: delete-session-invalid-uuid
        condition: >
          deleteSession() is called with a sessionId that is not a valid UUID.
          The SDK validates sessionId format before touching the filesystem and
          throws `Error("Invalid sessionId: ${e}")`. Commonly happens when a
          truncated id, a placeholder string ("undefined", ""), or an id from a
          different SDK (claude-code CLI vs claude-agent-sdk) is passed through.
        throws: 'Error (message: "Invalid sessionId: {value}")'
        required_handling: >
          Validate the sessionId before calling deleteSession(), or treat the
          UUID validation error as a non-retryable input error:
            const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
            if (!UUID_RE.test(sessionId)) {
              throw new BadRequest(`Invalid sessionId: ${sessionId}`);
            }
            try {
              await deleteSession(sessionId);
            } catch (err) {
              if (err.message?.startsWith('Invalid sessionId')) {
                throw new BadRequest(err.message);
              }
              throw err;
            }
          Unhandled, this surfaces as a 500 error on a delete endpoint when it
          should be a 400 — confusing operators who think the SDK is broken.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          # Evidence: sdk.mjs minified source: throw Error(`Invalid sessionId: ${e}`)
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts

  - name: importSessionToStore
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Copies a local JSONL session into a SessionStore by reading the session
      file (and optionally subagent transcripts) from disk and calling
      `store.append()` for each entry. Entries are appended in batches of
      `batchSize` to avoid backend payload limits — `append()` is called
      multiple times per session. Annotated @alpha. Used for migrating
      existing local sessions to a remote backend (e.g. Postgres-backed
      SessionStore for multi-device session sync). Throws if the session
      file is missing on disk, if the sessionId is invalid, or if the
      SessionStore.append() implementation rejects.
    patterns:
      - 'importSessionToStore('
      - 'await importSessionToStore('
    postconditions:
      # Evidence: sdk.d.ts line 843 — importSessionToStore(_sessionId, _store, _options?): Promise<void>
      # Evidence: sdk.d.ts JSDoc (line 829-841) — describes batch-append behavior
      # Evidence: sdk.mjs throws: `Invalid sessionId: ${e}` (shared validator)
      # Evidence: sdk.mjs throws: `Session ${e} not found in project directory for ${t.dir}`
      - id: import-session-partial-failure
        condition: >
          importSessionToStore() is called without a try/catch, and the
          SessionStore.append() implementation throws partway through the
          batch upload. Because entries are appended in batches (default
          batchSize), an error on batch N leaves entries from batches 1..N-1
          successfully written to the store while batches N..end are not.
          The function rejects with the underlying store error, but the
          partial state in the store is NOT rolled back.
        throws: Error (whatever the SessionStore.append() implementation throws — network error, auth failure, quota exceeded, etc.)
        required_handling: >
          Wrap importSessionToStore() in try/catch AND track which sessions
          have been fully migrated vs partially migrated. Do NOT assume a
          retry will be idempotent unless the store's append() is
          idempotent on duplicate entry ids:
            const migrated: string[] = [];
            const partial: { sessionId: string; error: string }[] = [];
            for (const sessionId of toMigrate) {
              try {
                await importSessionToStore(sessionId, store, { batchSize: 100 });
                migrated.push(sessionId);
              } catch (err) {
                partial.push({ sessionId, error: err.message });
                // Mark as partial — needs cleanup before retry
              }
            }
          Without this guard, a migration script that retries on failure
          will append duplicate entries to the store, corrupting the
          session transcript.
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        sources:
          # Evidence: sdk.d.ts line 829-843 — importSessionToStore JSDoc + signature
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts

      - id: import-session-source-missing
        condition: >
          importSessionToStore() is called without a try/catch and the source
          JSONL session file does not exist on disk in the (resolved or
          searched) project directory. The session file may have been deleted
          by an earlier deleteSession() call, the calling process may be
          running with a different cwd, or the sessionId may be wrong.
          The SDK throws the same "Session not found" error class as
          deleteSession()/getSessionInfo().
        throws: 'Error (message: "Session {sessionId} not found in project directory for {dir}" / "Session {sessionId} not found in any project directory")'
        required_handling: >
          Wrap importSessionToStore() in try/catch and either (a) skip
          missing sessions in a migration loop, or (b) surface the missing
          session as a data integrity warning to the operator:
            try {
              await importSessionToStore(sessionId, store, { dir: projectDir });
            } catch (err) {
              if (err.message?.includes('not found')) {
                // Source session was deleted between listSessions() and import
                console.warn(`Skipping missing session ${sessionId}`);
                continue;
              }
              throw err;
            }
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: low
        sources:
          # Evidence: sdk.mjs minified source: throw Error(`Session ${e} not found in any project directory`)
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts

  - name: resolveSettings
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Resolves the effective Claude Code settings by reading and merging
      managed policy (MDM), user (~/.claude/settings.json), project
      (.claude/settings.json), and local (.claude/settings.local.json)
      settings tiers. Annotated @alpha. On macOS, MDM resolution may invoke
      `plutil` (when an MDM plist exists); on Windows/WSL, may invoke
      `reg.exe`. This means resolveSettings() can subprocess and is subject
      to PATH issues, permission-denied errors, and slow filesystem reads.
      Returns ResolvedSettings, but `permissions.defaultMode` requires
      passing through `filterEscalatingDefaultMode()` before acting on it
      (separate trust filter for repo-committed escalating modes).
    patterns:
      - 'resolveSettings('
      - 'await resolveSettings('
    postconditions:
      # Evidence: sdk.d.ts line 2554 — resolveSettings(_opts?): Promise<ResolvedSettings>
      # Evidence: sdk.d.ts JSDoc (line 2540-2553) — describes plutil / reg.exe subprocess behavior
      - id: resolve-settings-subprocess-failure
        condition: >
          resolveSettings() is called without a try/catch in an environment
          where the MDM subprocess (`plutil` on macOS, `reg.exe` on Windows)
          fails to spawn or returns an error. This happens in sandboxed
          environments (containers, AppArmor, SELinux), in CI runners that
          strip $PATH, on macOS with locked-down configurations, and when
          the user lacks permission to read the MDM plist. The SDK propagates
          the underlying spawn / non-zero-exit error.
        throws: Error (subprocess spawn failure / non-zero exit from plutil or reg.exe)
        required_handling: >
          Wrap resolveSettings() in try/catch and fall back to a sensible
          default settings object when MDM resolution fails:
            let settings;
            try {
              settings = await resolveSettings({ cwd, sources: ['user', 'project', 'local'] });
            } catch (err) {
              console.warn('Settings resolution failed, using defaults:', err.message);
              settings = DEFAULT_SETTINGS;
            }
          Or skip MDM by passing `sources: []` or an explicit subset to
          avoid the subprocess paths entirely. Without this guard,
          self-hosted CI pipelines running the SDK crash on
          startup with an inscrutable spawn error.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          # Evidence: sdk.d.ts line 2540-2554 — resolveSettings JSDoc + signature
          # JSDoc explicitly notes: "MDM resolution may invoke plutil (macOS) or reg.exe (Windows/WSL)"
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts

      - id: resolve-settings-default-mode-not-filtered
        condition: >
          resolveSettings() succeeds and the caller reads
          `settings.permissions.defaultMode` directly without first passing
          it through `filterEscalatingDefaultMode()`. The SDK explicitly
          documents that `permissions.defaultMode` is reported as-is across
          all tiers including project — but the CLI applies a separate trust
          filter before honoring escalating modes (`bypassPermissions`,
          `auto`, `acceptEdits`) from repo-committed files. Acting on the
          raw value gives a malicious .claude/settings.json in a cloned repo
          the ability to escalate permissions silently.
        throws: "No throw — silent security bypass. A repo-committed defaultMode of 'bypassPermissions' is honored by the caller despite the trust filter."
        required_handling: >
          Always pass the resolved settings through filterEscalatingDefaultMode()
          before reading defaultMode:
            const resolved = await resolveSettings({ cwd });
            const safe = filterEscalatingDefaultMode(resolved);
            const mode = safe.permissions?.defaultMode ?? 'default';
            // Use `mode` — guaranteed not to be a repo-injected escalation
          The CLI does this filtering internally; SDK consumers that
          replicate the resolution path MUST replicate the filter too.
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        sources:
          # Evidence: sdk.d.ts JSDoc on resolveSettings (line 2546-2550):
          # "permissions.defaultMode is reported as-is across all tiers including project.
          #  The CLI applies a separate trust filter before honoring escalating modes
          #  ('bypassPermissions', 'auto', 'acceptEdits') from repo-committed files;
          #  pass the result through filterEscalatingDefaultMode before acting on defaultMode."
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts
