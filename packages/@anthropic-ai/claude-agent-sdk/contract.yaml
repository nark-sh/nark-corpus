      - id: delete-session-not-found
        maturity: stable
        condition: >
          deleteSession() is called without a try/catch and the sessionId does
          not exist in the configured project directory. This happens routinely
          in cleanup paths (UI delete button, retention sweeper, test teardown)
          when the session was already deleted by another process, when the
          caller is using a different cwd than the session creator (so the
          encoded project key doesn't match), or when the session id was
          stored as state but the underlying JSONL was manually purged.
        throws: 'Error (message: "Session {sessionId} not found in project directory for {dir}" / "Session {sessionId} not found in any project directory")'
        required_handling: >
          Wrap deleteSession() in try/catch and treat "not found" as a benign
          terminal state (idempotent delete), rejecting only on truly
          unexpected errors:
            try {
              await deleteSession(sessionId, { dir: projectDir });
            } catch (err) {
              if (err.message?.includes('not found')) {
                // Already gone — idempotent delete succeeded
                return;
              }
              throw err;
            }
