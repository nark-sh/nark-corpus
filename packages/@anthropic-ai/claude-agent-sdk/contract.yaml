          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts

  - name: resolveSettings
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Resolves the effective Claude Code settings by reading and merging
      managed policy (MDM), user (~/.claude/settings.json), project
      (.claude/settings.json), and local (.claude/settings.local.json)
      settings tiers. Annotated @alpha. On macOS, MDM resolution may invoke
      `plutil` (when an MDM plist exists); on Windows/WSL, may invoke
      `reg.exe`. This means resolveSettings() can subprocess and is subject
      to PATH issues, permission-denied errors, and slow filesystem reads.
      Returns ResolvedSettings, but `permissions.defaultMode` requires
      passing through `filterEscalatingDefaultMode()` before acting on it
      (separate trust filter for repo-committed escalating modes).
    patterns:
      - 'resolveSettings('
      - 'await resolveSettings('
    postconditions:
      # Evidence: sdk.d.ts line 2554 — resolveSettings(_opts?): Promise<ResolvedSettings>
      # Evidence: sdk.d.ts JSDoc (line 2540-2553) — describes plutil / reg.exe subprocess behavior
      - id: resolve-settings-subprocess-failure
        maturity: stable
        condition: >
          resolveSettings() is called without a try/catch in an environment
          where the MDM subprocess (`plutil` on macOS, `reg.exe` on Windows)
          fails to spawn or returns an error. This happens in sandboxed
          environments (containers, AppArmor, SELinux), in CI runners that
          strip $PATH, on macOS with locked-down configurations, and when
          the user lacks permission to read the MDM plist. The SDK propagates
          the underlying spawn / non-zero-exit error.
        throws: Error (subprocess spawn failure / non-zero exit from plutil or reg.exe)
        required_handling: >
          Wrap resolveSettings() in try/catch and fall back to a sensible
          default settings object when MDM resolution fails:
            let settings;
            try {
              settings = await resolveSettings({ cwd, sources: ['user', 'project', 'local'] });
            } catch (err) {
              console.warn('Settings resolution failed, using defaults:', err.message);
              settings = DEFAULT_SETTINGS;
            }
          Or skip MDM by passing `sources: []` or an explicit subset to
          avoid the subprocess paths entirely. Without this guard,
          self-hosted CI pipelines running the SDK crash on
          startup with an inscrutable spawn error.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          # Evidence: sdk.d.ts line 2540-2554 — resolveSettings JSDoc + signature
          # JSDoc explicitly notes: "MDM resolution may invoke plutil (macOS) or reg.exe (Windows/WSL)"
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts

      - id: resolve-settings-default-mode-not-filtered
        maturity: stable
        condition: >
          resolveSettings() succeeds and the caller reads
          `settings.permissions.defaultMode` directly without first passing
          it through `filterEscalatingDefaultMode()`. The SDK explicitly
          documents that `permissions.defaultMode` is reported as-is across
          all tiers including project — but the CLI applies a separate trust
          filter before honoring escalating modes (`bypassPermissions`,
          `auto`, `acceptEdits`) from repo-committed files. Acting on the
          raw value gives a malicious .claude/settings.json in a cloned repo
          the ability to escalate permissions silently.
        throws: "No throw — silent security bypass. A repo-committed defaultMode of 'bypassPermissions' is honored by the caller despite the trust filter."
        required_handling: >
          Always pass the resolved settings through filterEscalatingDefaultMode()
          before reading defaultMode:
            const resolved = await resolveSettings({ cwd });
            const safe = filterEscalatingDefaultMode(resolved);
            const mode = safe.permissions?.defaultMode ?? 'default';
            // Use `mode` — guaranteed not to be a repo-injected escalation
          The CLI does this filtering internally; SDK consumers that
          replicate the resolution path MUST replicate the filter too.
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high
        sources:
          # Evidence: sdk.d.ts JSDoc on resolveSettings (line 2546-2550):
          # "permissions.defaultMode is reported as-is across all tiers including project.
          #  The CLI applies a separate trust filter before honoring escalating modes
          #  ('bypassPermissions', 'auto', 'acceptEdits') from repo-committed files;
          #  pass the result through filterEscalatingDefaultMode before acting on defaultMode."
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.174/sdk.d.ts

  - name: listSessions
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Lists session metadata across one project directory or all projects.
      Returns SDKSessionInfo[] sorted by lastModified descending. Supports
      pagination via `limit` and `offset`. When `dir` is inside a git repo,
      sessions from all worktrees are included by default (toggle with
      `includeWorktrees: false`). When `sessionStore` is provided, the
      function delegates to `store.listSessions(projectKey)` — and REQUIRES
      that the store implement `listSessions` (otherwise throws). On the
      local-filesystem path, missing directories return an empty array
      rather than throwing.
    patterns:
      - 'listSessions('
      - 'await listSessions('
    postconditions:
      # Evidence: sdk.d.ts line 893 — listSessions(_options?): Promise<SDKSessionInfo[]>
      # Evidence: sdk.d.ts JSDoc (line 919-924) — "Requires store.listSessions to be defined"
      # Evidence: sdk.mjs — SessionStore.listSessions optional method; calling it when undefined throws
      - id: list-sessions-store-method-missing
        maturity: stable
        condition: >
          listSessions() is called with a `sessionStore` option but the
          provided store does NOT implement the optional `listSessions(projectKey)`
          method. The SessionStore interface declares `listSessions?` as
          optional — many partial implementations (especially append-only
          or WORM stores) omit it. Without the method, listSessions() rejects
          with a TypeError or "store does not support listing" error.
        throws: TypeError ("store.listSessions is not a function") | Error (store-specific "not supported")
        required_handling: >
          Either feature-detect the store before calling, or wrap the call
          in try/catch:
            if (typeof store.listSessions === 'function') {
              const sessions = await listSessions({ sessionStore: store, dir: cwd });
            } else {
              // Fall back to filesystem path or surface a clear error
              const sessions = await listSessions({ dir: cwd });
            }
          Or:
            try {
              const sessions = await listSessions({ sessionStore: store });
            } catch (err) {
              if (err instanceof TypeError && err.message.includes('listSessions')) {
                // store does not support listing — degrade gracefully
                return [];
              }
              throw err;
            }
          Without this guard, swapping in a partial SessionStore implementation
          (common during migration from local FS to a remote backend) crashes
          every list-sessions call with an unhandled rejection.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          # Evidence: sdk.d.ts line 919-924 — "Requires store.listSessions to be defined"
          # Evidence: sdk.d.ts SessionStore interface — listSessions is marked optional (?)
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.187/sdk.d.ts

      - id: list-sessions-empty-result-unchecked
        maturity: stable
        condition: >
          listSessions() returns an empty array when the project directory
          contains no session files, when the cwd doesn't match the
          encoded-project-key the SDK derives, or when the
          `~/.claude/projects/` root doesn't exist yet. Callers that index
          the result directly (`sessions[0].sessionId`, `sessions.length > 0`
          short-circuit removed) read undefined silently. This commonly
          breaks "resume last session" UX where the caller assumes at least
          one session exists.
        throws: "No throw — silent empty-result. Caller reading sessions[0].sessionId throws TypeError downstream."
        required_handling: >
          Always check the length before indexing, and provide a fallback
          for the empty case:
            const sessions = await listSessions({ dir: cwd, limit: 1 });
            if (sessions.length === 0) {
              // Start a fresh session instead of resuming
              return startFreshSession();
            }
            const latest = sessions[0];
          A "resume last session" CLI that crashes on first-run (no sessions
          yet) instead of starting fresh is a common reported bug.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          # Evidence: sdk.d.ts JSDoc (line 873-892) — pagination + sorted return; no throw on empty
          # Evidence: sdk.mjs — local-filesystem path returns [] when projects/<encoded>/ is missing
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.187/sdk.d.ts

  - name: getSessionInfo
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Reads metadata for a single session by ID. Unlike listSessions, only
      touches the single session file. Returns undefined if the session
      file is not found, is a sidechain session, or has no extractable
      summary. With `sessionStore`, delegates to `store.load(key)` — a
      throwing store implementation propagates the error. Without a store,
      filesystem read errors propagate (EACCES, EISDIR, etc.) — only ENOENT
      is converted to undefined.
    patterns:
      - 'getSessionInfo('
      - 'await getSessionInfo('
    postconditions:
      # Evidence: sdk.d.ts line 659-668 — getSessionInfo JSDoc + signature
      # Evidence: sdk.d.ts JSDoc: "Returns undefined if the session file is not found..."
      # Evidence: sdk.mjs — wraps ENOENT into undefined; rethrows other fs errors
      - id: get-session-info-undefined-unchecked
        maturity: stable
        condition: >
          getSessionInfo() is called and the returned value is dereferenced
          directly without a null/undefined check. Per the JSDoc, undefined
          is returned in three cases: (1) session file not found, (2)
          session is a sidechain session, (3) no extractable summary. Code
          like `(await getSessionInfo(id)).summary` throws TypeError
          ("Cannot read properties of undefined") at runtime.
        throws: "TypeError (downstream) — reading a property of undefined"
        required_handling: >
          Always guard the result before accessing fields:
            const info = await getSessionInfo(sessionId, { dir: projectDir });
            if (!info) {
              // Session missing, sidechain, or no summary — fall back
              return null;
            }
            return info.summary;
          Or use optional chaining:
            const summary = (await getSessionInfo(sessionId))?.summary;
          Treating undefined as "session unavailable" is the documented contract.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          # Evidence: sdk.d.ts line 659-668 — getSessionInfo JSDoc explicitly notes undefined return cases
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.187/sdk.d.ts

      - id: get-session-info-store-load-failure
        maturity: stable
        condition: >
          getSessionInfo() is called with a `sessionStore` option and the
          store's `load(key)` rejects. Reasons include: network failure
          (remote store), auth/quota error, corrupted entry, store-specific
          schema-version mismatch. The SDK does not catch — the rejection
          propagates to the caller. Treating this as benign (like the
          undefined ENOENT case) is incorrect: a store load failure means
          the session MAY exist but cannot currently be read.
        throws: Error (whatever SessionStore.load() implementation throws — network, auth, etc.)
        required_handling: >
          Wrap in try/catch and distinguish "not found" (undefined) from
          "could not load" (thrown):
            try {
              const info = await getSessionInfo(sessionId, { sessionStore: store });
              if (!info) {
                // Truly absent — start fresh
                return null;
              }
              return info;
            } catch (err) {
              // Transient store failure — retry, don't start fresh
              console.error('Session lookup failed (transient):', err);
              throw err;
            }
          Conflating "store unreachable" with "session deleted" silently
          discards user history when callers fall back to "start fresh"
          on any error.
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: high
        sources:
          # Evidence: sdk.d.ts SessionStore.load signature — Promise<SessionStoreEntry[] | null>
          # Evidence: sdk.d.ts GetSessionInfoOptions.sessionStore — @alpha; load failures propagate
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.187/sdk.d.ts

  - name: getSessionMessages
    import_path: "@anthropic-ai/claude-agent-sdk"
    description: >
      Reads a session's conversation messages from its JSONL transcript
      file. Builds the conversation chain via parentUuid links and returns
      user/assistant messages in chronological order. Returns an empty
      array if the session is not found. Set `includeSystemMessages: true`
      to include system messages (compact boundaries, informational notices).
      With `sessionStore`, delegates to `store.load(key)` — load failures
      propagate just as in getSessionInfo. Supports pagination via `limit`
      and `offset`.
    patterns:
      - 'getSessionMessages('
      - 'await getSessionMessages('
    postconditions:
      # Evidence: sdk.d.ts line 686-698 — getSessionMessages JSDoc + signature
      # Evidence: sdk.d.ts JSDoc: "Array of messages, or empty array if session not found"
      - id: get-session-messages-empty-vs-thrown
        maturity: stable
        condition: >
          getSessionMessages() returns an empty array when the session file
          is missing on disk, OR throws when the underlying transcript is
          corrupted (malformed JSON line, unparseable timestamp) or when a
          configured `sessionStore.load()` rejects. Callers that assume
          "empty means no messages" without a try/catch swallow corruption
          errors as crashes instead of distinguishing "no history" from
          "history unreadable."
        throws: Error (corrupted JSONL line, store load failure) | Returns [] (session not found, sidechain)
        required_handling: >
          Wrap in try/catch and treat empty-array as the only successful
          "no history" signal:
            try {
              const messages = await getSessionMessages(sessionId, {
                dir: projectDir,
                limit: 100,
              });
              if (messages.length === 0) {
                // Session truly empty / missing — fall back
                return [];
              }
              return messages;
            } catch (err) {
              // Corruption or store failure — DO NOT pretend the session is empty
              console.error('Session transcript unreadable:', err);
              throw err;
            }
          Treating a thrown error as "no messages" silently discards real
          user history in a UI — far worse than surfacing the error.
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: lost_data
          incident_cost_range: medium
        sources:
          # Evidence: sdk.d.ts line 686-698 — getSessionMessages JSDoc explicitly returns empty array on not-found
          # Evidence: sdk.mjs — JSON.parse on each transcript line throws on malformed data
          - https://unpkg.com/@anthropic-ai/claude-agent-sdk@0.3.187/sdk.d.ts

