  # ───────────────────────────────────────────────────────────────────────────

  - name: beta.messages.toolRunner
    import_path: "@anthropic-ai/sdk"
    description: >
      Auto-runs the conversation loop between Claude and tools. Returns a
      BetaToolRunner that is async-iterable, awaitable (via .then() →
      runUntilDone()), and exposes helpers generateToolResponse(), done(),
      runUntilDone(), pushMessages(), setMessagesParams(). Each iteration
      makes a messages.create() call AND executes registered tool callbacks.
      Errors can originate from (a) the underlying API call (full APIError
      hierarchy), (b) the user's tool callback throwing, or (c) the runner
      itself (AnthropicError on consumed-stream / no-message-from-server).
      Common in agentic loops, autonomous tool-use pipelines, and Claude
      computer-use workflows.
    postconditions:
      # Evidence:
      #   node_modules/@anthropic-ai/sdk@0.105.0/lib/tools/BetaToolRunner.d.ts
      #     — class BetaToolRunner<Stream extends boolean>
      #     — [Symbol.asyncIterator](), done(), runUntilDone(),
      #       generateToolResponse(), then()
      #   node_modules/@anthropic-ai/sdk@0.105.0/lib/tools/BetaToolRunner.js
      #     — throws AnthropicError('Cannot iterate over a consumed stream')
      #     — throws AnthropicError('ToolRunner concluded without a message from the server')
      #     — throws AnthropicError('Expected text response for compaction')
      #     — re-throws API errors and tool-callback errors
      #   resources/beta/messages/messages.d.ts overloads (stream true/false/boolean)
      - id: tool-runner-no-try-catch
        condition: >
          client.beta.messages.toolRunner() result is awaited or iterated
          without try-catch wrapping the await OR the for-await loop.
        throws: >
          APIError hierarchy on each underlying messages.create() call
          (BadRequestError, AuthenticationError, RateLimitError,
          InternalServerError, APIConnectionError); AnthropicError thrown by
          the runner itself ('ToolRunner concluded without a message from
          the server', 'Cannot iterate over a consumed stream'); whatever
          error the user's tool callback throws (re-thrown by the runner).
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        description: |
          beta.messages.toolRunner() is the high-level auto-loop helper for
          agentic tool-use workflows. A single toolRunner invocation issues
          MULTIPLE messages.create() requests (one per iteration, up to
          max_iterations) and also executes the user's tool callbacks
          between each request. Errors can surface from any of those calls.
          Unhandled rejections crash the worker holding the runner — which
          in agentic loops typically holds significant in-memory state
          (conversation history, tool intermediate state). Worse, partial
          completion is undetectable: the runner may have completed 5 of 10
          iterations before failing, but the caller has no way to know
          unless the await/iteration is wrapped.
        detector: |
          If client.beta.messages.toolRunner({...}) is awaited (await runner,
          await runner.runUntilDone(), await runner.done(),
          await runner.generateToolResponse()) without try-catch wrapping
          the await, OR if `for await (const msg of runner)` iterates the
          runner without try-catch wrapping the loop body.
        required_handling: |
          MUST wrap the await OR the for-await iteration in try-catch:
            try {
              const runner = client.beta.messages.toolRunner({
                model: 'claude-opus-4-6',
                max_tokens: 1024,
                max_iterations: 10,
                tools: [...],
                messages: [...],
              });
              for await (const msg of runner) {
                process(msg);
              }
              // OR: const final = await runner.runUntilDone();
            } catch (err) {
              if (err instanceof Anthropic.APIError) {
                // Underlying messages.create() failed mid-loop
              } else if (err instanceof Anthropic.AnthropicError) {
                // Runner-level error (consumed stream, no message returned)
              } else {
                // User tool-callback threw — re-raised by runner
              }
              throw err;
            }
          Treat partial completion as lost work — the runner does not
          checkpoint, so a mid-loop failure requires the caller to re-seed
          the conversation history.
        evidence_quality: confirmed
        sources:
          - https://github.com/anthropics/anthropic-sdk-typescript
          - https://platform.claude.com/docs/en/api/errors
          - https://docs.claude.com/en/docs/agents-and-tools/tool-use/overview

      - id: tool-runner-max-iterations-not-set
        condition: >
          beta.messages.toolRunner() is called without max_iterations set,
          relying on the SDK default or no termination guard. The model can
          stay in tool_use → tool_result → tool_use loops indefinitely if
          tool callbacks always succeed and the model never returns a
          text-only final message.
        throws: >
          No exception directly. The runner consumes tokens (and dollars)
          until the API itself throws (RateLimitError 429, or context
          window InternalServerError) or the surrounding worker times out.
          Silent runaway cost is the dominant failure mode.
        severity: warning
        business_impact:
          incident_label: PAYMENT_RISK
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: high
        description: |
          BetaToolRunnerParams.max_iterations is documented as "Maximum
          number of iterations (API requests) to make in the tool execution
          loop. Each iteration consists of: assistant response → tool
          execution → tool results. When exceeded, the loop will terminate
          even if tools are still being requested." Code that omits
          max_iterations is vulnerable to runaway loops: a model that
          repeatedly emits tool_use blocks for tools that always succeed
          can run indefinitely. Each iteration costs input tokens (the
          growing conversation history is re-billed each turn) plus output
          tokens. A 50-iteration runaway on Opus-4 costs roughly 15x more
          than the intended single iteration. Production agentic pipelines
          have hit four-figure overnight bills from a single un-bounded
          runner.
        detector: |
          If beta.messages.toolRunner({...}) is called and the params object
          does not include max_iterations, AND the call site does not
          provide an AbortSignal via { signal: ... } RequestOptions.
        required_handling: |
          SHOULD set max_iterations explicitly:
            const runner = client.beta.messages.toolRunner({
              model: 'claude-opus-4-6',
              max_tokens: 1024,
              max_iterations: 10,  // hard cap
              tools: [...],
              messages: [...],
            });
          OR provide an AbortSignal with a timeout:
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 60_000);
            const runner = client.beta.messages.toolRunner(
              { ... },
              { signal: controller.signal },
            );
          For untrusted-input agentic loops, both should be set.
        evidence_quality: confirmed
        sources:
          - https://github.com/anthropics/anthropic-sdk-typescript
          - https://docs.claude.com/en/docs/agents-and-tools/tool-use/overview

