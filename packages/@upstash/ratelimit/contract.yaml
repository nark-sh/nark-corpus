package: "@upstash/ratelimit"
semver: ">=1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed
# Evidence: scan-upstash-ratelimit-2026-04-02.json — 27 repos scanned, 12 affected (44%), 22 violations
# Top affected: zaidmukaddam/scira (⭐ 11555), e2b-dev/fragments (⭐ 6217), nickscamara/open-deep-research (⭐ 6196)

functions:
  - name: limit
    import_path: "@upstash/ratelimit"
    description: >
      Check if the given identifier has exceeded the rate limit.
      Makes an HTTP call to Upstash Redis. Can throw if Redis is unreachable
      when no timeout is configured, or if authentication credentials are invalid.

    postconditions:
      # Evidence: seen in 22 primary firings across 12 repos in scan-upstash-ratelimit-2026-04-02.json
      # Top affected: zaidmukaddam/scira (⭐ 11555), e2b-dev/fragments (⭐ 6217)
      - id: ratelimit-limit-no-try-catch
        condition: >
          Network failure to Redis OR invalid Upstash credentials — Redis HTTP call
          throws when the connection fails before the timeout logic resolves.
        throws: "Error (network failure or auth error from @upstash/redis HTTP client)"
        required_handling: >
          Caller MUST wrap ratelimit.limit() in try-catch. If Redis is unreachable,
          the underlying HTTP client throws. In most serverless API routes, this unhandled
          error crashes the entire request. Fail open (return true/allow) on Redis errors
          to avoid blocking all users when the rate limiter is unavailable.
        sources:
          - "https://raw.githubusercontent.com/upstash/ratelimit-js/main/src/ratelimit.ts"
          - "https://upstash.com/docs/redis/sdks/ratelimit-ts/features"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: blockUntilReady
    import_path: "@upstash/ratelimit"
    description: >
      Block execution until the rate limit allows the request, or until timeout.
      Throws immediately if timeout parameter is <= 0. Can also throw from
      underlying Redis calls on network failure.

    postconditions:
      - id: ratelimit-blockuntilready-no-try-catch
        condition: >
          timeout parameter is <= 0 OR underlying Redis network failure throws
          Error before blockUntilReady can resolve
        throws: "Error('timeout must be positive') | Error (network failure from Redis)"
        required_handling: >
          Caller MUST wrap ratelimit.blockUntilReady() in try-catch. The method
          throws synchronously if timeout <= 0, and can propagate Redis network errors.
        sources:
          - "https://raw.githubusercontent.com/upstash/ratelimit-js/main/src/ratelimit.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
