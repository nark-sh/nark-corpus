  - name: subscribe
    import_path: "@upstash/redis"
    description: "Subscribe to one or more Redis pub/sub channels. Returns a Subscriber object that emits messages via event listeners, not via a Promise return value."

    postconditions:
      - id: subscriber-error-not-thrown
        condition: "subscription fails or a message cannot be received (network error, auth failure, parse failure)"
        throws: "does NOT throw to the calling context — errors are dispatched via Subscriber.on('error', handler) event"
        required_handling: >
          Callers MUST attach an error listener: subscriber.on('error', (err) => { ... })
          before the subscription begins processing messages. This is not optional. Without it,
          network interruptions and auth failures are silently swallowed (or crash the process).
          Additionally attach a 'message' listener to receive data. subscribe() itself need not
          be awaited for error handling — the returned Subscriber object is the error surface.
        evidence_quality: confirmed
        # Evidence: chunk-IH7W44G6.mjs uses this.dispatchToListeners("error", error) inside
        # the polling loop — errors go to event listeners, they are never thrown to the caller.
        # Source: compiled @upstash/redis package source.
        sources:
