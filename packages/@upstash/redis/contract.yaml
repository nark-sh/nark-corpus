  - name: exec
    import_path: "@upstash/redis"
    description: "Execute a pipeline of batched Redis commands. Called as pipeline.exec() after building a pipeline via redis.pipeline()."

    postconditions:
      - id: network-or-api-error
        condition: "network failure after retries OR any pipeline command returns an error"
        throws: "UpstashError or Error — individual command errors throw UpstashError with message 'Command failed: <error>'"
        required_handling: >
          The pipeline.exec() call MUST be wrapped in try-catch. The entire pipeline
          fails if the HTTP request fails or any batched command returns an error.
        sources:
          - "https://github.com/upstash/upstash-redis"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: pipeline-keep-errors-silent-failure
        condition: "pipeline built with pipeline({ keepErrors: true }) executes and individual commands fail"
        throws: "does NOT throw — returns array of {error, result} objects; errors are silent if caller does not inspect each element"
        required_handling: >
          If using pipeline({ keepErrors: true }), the returned array MUST be iterated
          and each element.error checked. Do NOT assume that a resolved promise means
          all commands succeeded. Pattern: results.forEach((r, i) => { if (r.error)
          handleError(r.error, commands[i]); });
        evidence_quality: confirmed
        # Evidence: chunk-IH7W44G6.mjs keepErrors branch returns {error, result} per
        # command instead of throwing. Source: compiled @upstash/redis package source.
        sources:
          - "https://github.com/upstash/upstash-redis"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: subscribe
    import_path: "@upstash/redis"
    description: "Subscribe to one or more Redis pub/sub channels. Returns a Subscriber object that emits messages via event listeners, not via a Promise return value."

    postconditions:
      - id: subscriber-error-not-thrown
        condition: "subscription fails or a message cannot be received (network error, auth failure, parse failure)"
        throws: "does NOT throw to the calling context — errors are dispatched via Subscriber.on('error', handler) event"
        required_handling: >
          Callers MUST attach an error listener: subscriber.on('error', (err) => { ... })
          before the subscription begins processing messages. This is not optional. Without it,
          network interruptions and auth failures are silently swallowed (or crash the process).
          Additionally attach a 'message' listener to receive data. subscribe() itself need not
          be awaited for error handling — the returned Subscriber object is the error surface.
        evidence_quality: confirmed
        # Evidence: chunk-IH7W44G6.mjs uses this.dispatchToListeners("error", error) inside
        # the polling loop — errors go to event listeners, they are never thrown to the caller.
        # Source: compiled @upstash/redis package source.
        sources:
          - "https://github.com/upstash/upstash-redis"
        severity: error
        business_impact:
          incident_label: DOWNTIME
