  - name: evalsha
    import_path: "@upstash/redis"
    description: "Execute a previously-loaded Lua script by its SHA1 hash. More efficient than eval() for repeated script execution."

    postconditions:
      - id: noscript-error
        condition: "SHA1 hash does not match any script loaded on the server (server restarted, wrong SHA)"
        throws: "UpstashError with NOSCRIPT error code — 'NOSCRIPT No matching script. Please use EVAL.'"
        required_handling: >
          Caller MUST catch UpstashError and check for NOSCRIPT in the message, then retry
          using eval() with the full Lua script source. Pattern:
          try { await redis.evalsha(sha, ...) } catch (e) {
            if (e instanceof UpstashError && e.message.includes('NOSCRIPT'))
              await redis.eval(script, ...);
            else throw e;
          }
        evidence_quality: confirmed
        sources:
          - "https://github.com/upstash/upstash-redis"
        severity: error
        business_impact:
