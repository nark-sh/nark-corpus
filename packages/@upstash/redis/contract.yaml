    import_path: "@upstash/redis"
    # Evidence: seen in 8 primary firings across 3 repos in scan-upstash-redis-2026-04-01.json
    # Top affected: 3 repos showing missing try-catch on redis.get() calls
    description: "Retrieve a value from Redis by key. Returns null if key does not exist."

    postconditions:
      - id: network-or-api-error
        condition: "network failure after retries OR Upstash API returns an error response"
        throws: "UpstashError (for API errors) or Error (for network exhaustion)"
        required_handling: >
          Caller MUST wrap in try-catch. Uncaught UpstashError or network errors will
          propagate and crash the caller. Common API errors include: invalid auth token,
          quota exceeded, wrong key type. Network errors occur when Upstash is unreachable
          after the default 5 retry attempts.
        sources:
          - "https://github.com/upstash/upstash-redis"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

