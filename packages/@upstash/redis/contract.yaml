      - id: pipeline-keep-errors-silent-failure
        condition: "pipeline built with pipeline({ keepErrors: true }) executes and individual commands fail"
        throws: "does NOT throw — returns array of {error, result} objects; errors are silent if caller does not inspect each element"
        required_handling: >
          If using pipeline({ keepErrors: true }), the returned array MUST be iterated
          and each element.error checked. Do NOT assume that a resolved promise means
          all commands succeeded. Pattern: results.forEach((r, i) => { if (r.error)
          handleError(r.error, commands[i]); });
        evidence_quality: confirmed
        # Evidence: chunk-IH7W44G6.mjs keepErrors branch returns {error, result} per
        # command instead of throwing. Source: compiled @upstash/redis package source.
        sources:
