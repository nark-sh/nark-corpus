        throws: >
          QstashError on HTTP failure. QstashRatelimitError (429 burst).
        required_handling: >
          Caller MUST wrap client.schedules.pause() in try/catch. If uncaught, the schedule
          is not paused — the cron job continues running during maintenance, and scheduled tasks
          execute against a system that may be down or being updated.
        sources:
          - "https://github.com/upstash/qstash-js/blob/main/src/client/schedules.ts"
        severity: error
