        maturity: stable
        condition: >
          Any HTTP failure: invalid token (401), queue not found (404), rate limit (429),
          or server error (5xx). Also throws synchronously if queueName was not provided
          to the Queue constructor.
        throws: >
          QstashError on HTTP failure (non-2xx responses). QstashRatelimitError (429 burst).
          Error("Please provide a queue name to the Queue constructor") if queueName missing.
