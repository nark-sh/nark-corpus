    postconditions:
      # Evidence: https://github.com/upstash/qstash-js/blob/main/src/client/schedules.ts
      # Error types confirmed from http.ts error hierarchy
      - id: schedules-resume-api-error
        condition: >
          HTTP failure: invalid token (401), schedule not found (404), rate limit (429),
          or server error (5xx).
        throws: >
          QstashError on HTTP failure. QstashRatelimitError (429 burst).
        required_handling: >
          Caller MUST wrap client.schedules.resume() in try/catch. If uncaught, the schedule
          remains paused after the maintenance window — recurring tasks silently stop executing.
          Daily digests, cleanup jobs, and sync crons never run. Users notice absence of
          scheduled features rather than an explicit error.
        sources:
          - "https://github.com/upstash/qstash-js/blob/main/src/client/schedules.ts"
        severity: error
        business_impact:
