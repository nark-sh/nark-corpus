          incident-response flow that pins rate to protect a downstream service, the pin
          silently fails and delivery proceeds at publisher-specified rates — typically
          higher than the downstream can handle. The protection the operator intended
          never took effect.
        sources:
          - "https://raw.githubusercontent.com/upstash/qstash-js/main/src/client/flow-control.ts"
          - "https://upstash.com/docs/qstash/features/flow-control"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: flowControl.unpin
    import_path: "@upstash/qstash"
    description: >
      Removes a pinned parallelism or rate configuration from a flow-control key.
      After unpinning, QStash resumes updating configuration based on incoming
      messages. Complement to flowControl.pin(). Must be called after incident
      resolution to restore dynamic flow control. Makes an HTTPS POST to
      /v2/flowControl/{key}/unpin.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/upstash/qstash-js/main/src/client/flow-control.ts
      # Source confirmed in index.js (line 1373): unpin() awaits http.request() — throws on non-2xx
      - id: flowcontrol-unpin-api-error
        maturity: stable
        condition: >
          Any HTTP failure: invalid token (401), flow-control key not found (404),
          rate limit (429), or server error (5xx). Network errors on connection failure.
        throws: >
          QstashError on HTTP failure (non-2xx responses). QstashRatelimitError (429 burst).
          QstashDailyRatelimitError (429 daily limit). Network errors on connection failure.
        required_handling: >
          Caller MUST wrap client.flowControl.unpin() in try/catch. If uncaught after an
          incident is resolved, the flow-control key remains pinned to the incident-time
          configuration. Delivery continues at the restricted rate long after the
          underlying issue is fixed — capacity is wasted and SLAs may be missed because
          the pinned restriction is silently still in force.
        sources:
          - "https://raw.githubusercontent.com/upstash/qstash-js/main/src/client/flow-control.ts"
          - "https://upstash.com/docs/qstash/features/flow-control"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: flowControl.resetRate
    import_path: "@upstash/qstash"
    description: >
      Resets the rate configuration state for a flow-control key. Clears the
      current rate count and ends the current period immediately — the current
      timestamp becomes the start of a new rate period. Called on
      client.flowControl. Used in ops tooling to release accumulated rate-counter
      state without changing the rate configuration itself. Makes an HTTPS POST
      to /v2/flowControl/{key}/resetRate.

    postconditions:
      # Evidence: https://raw.githubusercontent.com/upstash/qstash-js/main/src/client/flow-control.ts
      # Source confirmed in index.js (line 1390): resetRate() awaits http.request() — throws on non-2xx
      - id: flowcontrol-resetrate-api-error
        maturity: stable
        condition: >
          Any HTTP failure: invalid token (401), flow-control key not found (404),
          rate limit (429), or server error (5xx). Network errors on connection failure.
        throws: >
          QstashError on HTTP failure (non-2xx responses). QstashRatelimitError (429 burst).
          QstashDailyRatelimitError (429 daily limit). Network errors on connection failure.
        required_handling: >
          Caller MUST wrap client.flowControl.resetRate() in try/catch. If uncaught in
          an ops tool that resets rate state after an incident, the reset silently fails
          and accumulated counter state continues to throttle delivery. Operators may
          conclude their reset worked when it did not — leading to repeated, ineffective
          reset attempts while the queue continues to be throttled.
        sources:
          - "https://raw.githubusercontent.com/upstash/qstash-js/main/src/client/flow-control.ts"
          - "https://upstash.com/docs/qstash/features/flow-control"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low

notes:
  - "publishJSON/publish make HTTPS calls to QStash API at publish time — always need try-catch"
  - "QStash's retry config (retries: N) applies to MESSAGE DELIVERY, not the publish call itself"
  - "QstashRatelimitError and QstashDailyRatelimitError extend QstashError — catch QstashError to catch all"
  - "receiver.verify() throws SignatureError — should be caught and result in 401 Unauthorized response"
  - "batch() and batchJSON() have the same error characteristics as publish/publishJSON"
  - "Default retries: 0 (no auto-retry at publish time). Configure RetryConfig in Client constructor for retries."
  - "enqueue() is the non-JSON version of enqueueJSON() — same error behavior"
  - "QSTASH_TOKEN env var is the standard name; missing token causes immediate auth error on first call"
  - "All Queue methods (upsert/pause/resume/delete) throw synchronous Error if queueName is missing from constructor"
  - "schedules.create() schedules may take up to 60 seconds to activate after creation"
  - "verify() result (true/false) should be checked — returning false without throwing is not a SignatureError"
  - "queue.delete() is IRREVERSIBLE — all pending messages are permanently lost without warning"
  - "dlq.delete() and dlq.retry() return cursor when more messages remain — must loop until cursor is undefined"
  - "messages.cancel() returns {cancelled: 0} for empty arrays, not an exception"
  - "logs() is paginated — max 1000 per page; must loop on cursor for complete log retrieval"
  - "urlGroups.addEndpoints()/removeEndpoints()/delete() all share the same QstashError path via http.request()"
  - "flowControl.pause/resume/pin/unpin/resetRate all share the same QstashError path — pause/pin failures silently leave the system unprotected"
  - "dlq.listMessages() is paginated like dlq.delete()/retry() — must loop on cursor for full DLQ inspection"
  - "Deprecated and intentionally omitted (no postconditions): Client.events (alias of logs); Messages.delete/deleteMany/deleteAll (use cancel); DLQ.deleteMany; Chat.create/Chat.prompt (chat() removed in qstash-js 3.0)"
  - "GETs intentionally omitted from depth pass 2026-06-24 (low-impact, generic HTTP error surface): Messages.get; Queue.get/list; Schedules.get/list; UrlGroups.get/list; FlowControlApi.get/getGlobalParallelism"
