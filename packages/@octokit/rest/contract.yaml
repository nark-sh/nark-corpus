  - name: search.repos
    import_path: "@octokit/rest"
    description: >
      Searches GitHub repositories by query string. Rate-limited to 30 requests/min
      (authenticated) or 10/min (unauthenticated). Returns up to 1000 results total
      (100 per page). Very commonly called in GitHub Apps, analytics tools, and
      repository discovery features.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/search/search — confirmed rate limits, 422/503 status codes
      # RequestError from @octokit/request-error: .status, .message, .request, .response
      - id: search-repos-rate-limit
        maturity: stable
        condition: >
          octokit.search.repos() called without try-catch and rate limit (HTTP 403/429)
          is hit from exceeding 30 authenticated or 10 unauthenticated requests/minute
        throws: >
          RequestError with status 403 (rate limit exceeded) or 429 (secondary rate limit).
          Response headers include x-ratelimit-remaining: 0 and x-ratelimit-reset.
          Secondary rate limits are undocumented but trigger at rapid burst patterns.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Search API has custom rate limits separate from the core API (30/min vs 5000/min).
          Apps that search repos in response to user actions easily hit this limit.
          Without try-catch, unhandled promise rejections crash the request handler.
        detector: >
          If octokit.search.repos() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap await octokit.search.repos() in try-catch. Check error.status === 403
          and error.response?.headers['x-ratelimit-remaining'] === '0' for rate limit.
          Implement exponential backoff. Consider @octokit/plugin-throttling plugin.
        source: https://docs.github.com/en/rest/search/search
        sources:
          - https://docs.github.com/en/rest/search/search

      - id: search-repos-validation-error
        maturity: stable
        condition: >
          octokit.search.repos() called with query exceeding 256 characters or more
          than 5 AND/OR/NOT operators, or querying inaccessible resources
        throws: >
          RequestError with status 422 (Validation failed). Also 503 (Service Unavailable)
          when query times out server-side.
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Search queries with invalid syntax, overly complex operators, or access to
          private resources the token cannot read return 422. Server-side timeouts
          return 503 with partial results flag. User-supplied search terms can trigger
          these errors unexpectedly.
        detector: >
          If octokit.search.repos() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Validate query length (<256 chars) before calling.
          Handle 422 (invalid query — show user a helpful error), 503 (search timeout
          — retry with simpler query).
        source: https://docs.github.com/en/rest/search/search
        sources:
          - https://docs.github.com/en/rest/search/search

  - name: search.code
    import_path: "@octokit/rest"
    description: >
      Searches code across GitHub repositories. Most restrictive rate limit: 9 requests/min
      (requires authentication — unauthenticated requests are blocked entirely).
      Returns up to 1000 results. Used in code analysis tools, dependency scanners,
      and GitHub integrations.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/search/search — 9/min limit, auth required, 401 on unauth
      - id: search-code-auth-required
        maturity: stable
        condition: >
          octokit.search.code() called without authentication or with invalid token
        throws: >
          RequestError with status 401 (Requires authentication) for unauthenticated requests.
          Code search requires authentication — unlike other search endpoints.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Code search is authentication-required. If the Octokit instance is created
          without a valid token, every search.code() call fails with 401. This often
          happens in misconfigured GitHub Apps or when tokens are not injected correctly.
        detector: >
          If octokit.search.code() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 401 (missing/invalid auth — check token configuration),
          403 (rate limit — 9/min limit is easy to hit), 422 (invalid query syntax).
          Verify octokit instance has auth token before calling.
        source: https://docs.github.com/en/rest/search/search
        sources:
          - https://docs.github.com/en/rest/search/search

  - name: search.issuesAndPullRequests
    import_path: "@octokit/rest"
    description: >
      Searches issues and pull requests across GitHub. Rate-limited to 30/min (authenticated).
      Supports semantic/hybrid search (10/min limit). Used in issue tracking integrations,
      automation tools, and GitHub Apps for cross-repository issue management.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/search/search — confirmed rate limit, 422/503 status
      - id: search-issues-rate-limit
        maturity: stable
        condition: >
          octokit.search.issuesAndPullRequests() called without try-catch and hits
          30/min rate limit or 10/min semantic search limit
        throws: >
          RequestError with status 403 or 429 (rate limit exceeded).
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Issue/PR search shares the 30/min rate limit pool with other search endpoints.
          Apps that poll for issues or sync state frequently hit this limit. Without
          error handling, unhandled rejections crash the calling function.
        detector: >
          If octokit.search.issuesAndPullRequests() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Implement exponential backoff on 403/429. Check
          x-ratelimit-remaining headers. Consider using octokit.paginate() with
          throttling plugin for bulk operations.
        source: https://docs.github.com/en/rest/search/search
        sources:
          - https://docs.github.com/en/rest/search/search

  - name: git.createCommit
    import_path: "@octokit/rest"
    description: >
      Creates a git commit object in a repository. Used in GitHub Apps and automation
      that programmatically push changes (bots, CI tools, file editors). Requires a
      valid tree SHA and parent commit SHAs. Fundamental step in the "git commit flow":
      createBlob → createTree → createCommit → updateRef.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/git/commits — confirmed 404, 409, 422 status codes
      - id: git-create-commit-not-found
        maturity: stable
        condition: >
          octokit.git.createCommit() called without try-catch and the repo, tree SHA,
          or parent commit SHA does not exist
        throws: >
          RequestError with status 404 (Not Found) when owner/repo does not exist or
          the token lacks access. RequestError with status 409 (Conflict) when parent
          commit references are invalid or SHA collision.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Creating a commit in the wrong repo, with an invalid tree SHA, or with
          non-existent parent SHAs fails with 404 or 409. GitHub Apps that perform
          automated commits crash without error handling when repository state changes
          concurrently (another commit pushed between tree creation and commit creation).
        detector: >
          If octokit.git.createCommit() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 404 (repo not found or no access), 409 (conflict
          — re-fetch latest commit SHA and retry), 422 (validation — check tree SHA is valid).
          Always use the latest commit SHA as parent to avoid conflicts.
        source: https://docs.github.com/en/rest/git/commits
        sources:
          - https://docs.github.com/en/rest/git/commits

  - name: git.createTree
    import_path: "@octokit/rest"
    description: >
      Creates a git tree object, which defines the file structure for a commit.
      Used in automated commit flows alongside createBlob and createCommit. Must
      reference valid blob SHAs returned by createBlob(). Part of every programmatic
      commit workflow in GitHub Apps.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/git/trees — confirmed 404, 409, 422 status codes
      - id: git-create-tree-invalid-sha
        maturity: stable
        condition: >
          octokit.git.createTree() called without try-catch when base_tree SHA or
          blob SHAs in tree items are invalid or not found in the repository
        throws: >
          RequestError with status 404 (Not Found) when repo or base_tree SHA not found.
          RequestError with status 422 (Validation Failed) when tree items contain
          invalid modes, invalid SHAs, or exceed GitHub's file size limits.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Tree creation with invalid blob SHAs (e.g., blobs from a different repo),
          invalid file modes, or invalid base_tree references fails silently unless
          errors are caught. Common failure in automated file update pipelines.
        detector: >
          If octokit.git.createTree() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Validate blob SHAs come from the same repository.
          Handle 404 (base_tree not found — use current HEAD SHA), 422 (invalid tree
          items — check file modes: 100644, 100755, 040000, 160000, 120000).
        source: https://docs.github.com/en/rest/git/trees
        sources:
          - https://docs.github.com/en/rest/git/trees

  - name: git.createBlob
    import_path: "@octokit/rest"
    description: >
      Creates a git blob object (file content) in a repository. First step in
      programmatic commit flow. Content can be base64-encoded or utf-8. Returns
      SHA for use in createTree(). Used in every GitHub App that writes files.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/git/blobs — confirmed 403, 404, 409, 422 codes
      - id: git-create-blob-error
        maturity: stable
        condition: >
          octokit.git.createBlob() called without try-catch when repo not found,
          token lacks write access, or content exceeds file size limits
        throws: >
          RequestError with status 403 (Forbidden — no write access or file too large
          for blob API — use uploads for files > 100MB). Status 404 (Not Found — repo
          or owner not found). Status 422 (Validation Failed).
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Blob creation fails if the token lacks write access (contents:write permission),
          if the repo doesn't exist, or if base64 encoding is invalid. GitHub limits
          blobs to 100MB — larger files must use the Git LFS or uploads API. Uncaught
          errors halt the entire automated commit pipeline.
        detector: >
          If octokit.git.createBlob() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 403 (check token has contents:write scope),
          404 (verify repo owner/name), 422 (validate base64 encoding and file size).
        source: https://docs.github.com/en/rest/git/blobs
        sources:
          - https://docs.github.com/en/rest/git/blobs

  - name: git.updateRef
    import_path: "@octokit/rest"
    description: >
      Updates a git reference (branch HEAD) to point to a new commit SHA. Final step
      in the programmatic commit flow. By default, requires the update to be a
      fast-forward (non-force). Used in all GitHub Apps that push commits programmatically.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/git/refs — confirmed 404, 422, 409 codes
      - id: git-update-ref-non-fast-forward
        maturity: stable
        condition: >
          octokit.git.updateRef() called without try-catch when the ref has been
          updated by another process (non-fast-forward update) or ref doesn't exist
        throws: >
          RequestError with status 422 (Unprocessable Entity) for non-fast-forward
          updates when force is not set. Status 404 (Not Found) when ref doesn't exist.
          Status 409 (Conflict) in some concurrency scenarios.
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          The most common failure in automated commit flows: another commit is pushed
          between createCommit() and updateRef() calls, making the update non-fast-forward.
          Without error handling, the commit object is created but the branch is not
          updated — leaving orphaned objects and silently failing the operation.
        detector: >
          If octokit.git.updateRef() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 422 (non-fast-forward — re-fetch HEAD,
          re-create tree/commit on top of new HEAD, retry). Handle 404 (ref not found
          — check branch name). This function MUST be wrapped or commit pipelines lose data.
        source: https://docs.github.com/en/rest/git/refs
        sources:
          - https://docs.github.com/en/rest/git/refs

  - name: checks.create
    import_path: "@octokit/rest"
    description: >
      Creates a check run for a commit. Used exclusively by GitHub Apps (not OAuth apps
      or PATs — they cannot use this endpoint). Fundamental for CI/CD integrations
      that report build status via GitHub's Checks API. Requires checks:write permission.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/checks/runs — confirmed 403 for non-Apps, 201 success
      - id: checks-create-not-github-app
        maturity: stable
        condition: >
          octokit.checks.create() called without try-catch and the octokit instance
          uses OAuth token or PAT instead of GitHub App authentication
        throws: >
          RequestError with status 403 (Forbidden). OAuth apps and personal access
          tokens (classic) cannot use this endpoint — only GitHub App installations
          can create check runs. GitHub Apps need the checks:write permission.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          The Checks API is GitHub App-only. Calling checks.create() with a PAT or
          OAuth token fails with 403. This is a common mistake when migrating from
          Status API (repos.createCommitStatus) to Checks API. The error is not
          obvious from the 403 message alone.
        detector: >
          If octokit.checks.create() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 403 (verify using GitHub App installation token,
          not PAT/OAuth — check authentication method and checks:write permission).
          Handle 404 (repo not found), 422 (invalid check run parameters: invalid
          conclusion value, missing name/head_sha).
        source: https://docs.github.com/en/rest/checks/runs
        sources:
          - https://docs.github.com/en/rest/checks/runs

  - name: checks.update
    import_path: "@octokit/rest"
    description: >
      Updates an existing check run (status, conclusion, output). Used by GitHub Apps
      to report CI progress: in_progress → completed with success/failure conclusion.
      Requires checks:write permission and GitHub App authentication.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/checks/runs — same auth restriction as create
      - id: checks-update-invalid-transition
        maturity: stable
        condition: >
          octokit.checks.update() called without try-catch with an invalid status
          transition or conclusion value, or non-App authentication
        throws: >
          RequestError with status 403 (non-App auth) or 422 (invalid conclusion/status
          combination — e.g., setting status to "waiting"/"pending"/"requested" which
          is only allowed for GitHub Actions, not Apps).
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          GitHub limits certain status values (waiting, pending, requested) to GitHub
          Actions only. GitHub Apps trying to set these statuses receive 422. Also,
          updating a completed check run's conclusion is restricted. Missing try-catch
          prevents CI pipelines from reporting completion status.
        detector: >
          If octokit.checks.update() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 403 (App auth required), 404 (check run not found
          — verify check_run_id), 422 (invalid status for App context — only use queued/
          in_progress/completed with valid conclusion values like success/failure/neutral).
        source: https://docs.github.com/en/rest/checks/runs
        sources:
          - https://docs.github.com/en/rest/checks/runs

  - name: actions.createWorkflowDispatch
    import_path: "@octokit/rest"
    description: >
      Triggers a workflow_dispatch event to manually run a GitHub Actions workflow.
      Requires the workflow to have a workflow_dispatch trigger. Used in release
      automation, deployment pipelines, and any tool that triggers GitHub Actions
      workflows programmatically. Requires actions:write permission.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/actions/workflows — 404 when workflow lacks dispatch trigger
      - id: workflow-dispatch-no-trigger
        maturity: stable
        condition: >
          octokit.actions.createWorkflowDispatch() called without try-catch when the
          workflow file lacks a workflow_dispatch: trigger or when repo/workflow not found
        throws: >
          RequestError with status 404 (Not Found) when the workflow file does not
          exist or does not have a workflow_dispatch trigger defined. Also 422 when
          the ref (branch/tag) does not exist.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Workflow dispatch fails silently without error handling. The most common case:
          workflow_dispatch trigger is missing from the workflow YAML (404), or the
          target branch doesn't contain the workflow (404), or the inputs object
          has keys not defined in the workflow's inputs schema (422). Deployment
          automation that relies on this fails completely.
        detector: >
          If octokit.actions.createWorkflowDispatch() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 404 (workflow not found or lacks workflow_dispatch
          trigger — verify .github/workflows/<file>.yml has workflow_dispatch: trigger),
          422 (invalid ref or input keys not defined in workflow), 403 (no actions:write
          permission).
        source: https://docs.github.com/en/rest/actions/workflows
        sources:
          - https://docs.github.com/en/rest/actions/workflows

  - name: repos.createRelease
    import_path: "@octokit/rest"
    description: >
      Creates a GitHub Release for a tag. Can create the tag if it doesn't exist.
      Used in release automation tools, changelog generators, and deployment pipelines.
      Returns release ID and upload_url for attaching release assets.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/releases/releases — 404/422 confirmed, secondary rate limit note
      - id: create-release-tag-not-found
        maturity: stable
        condition: >
          octokit.repos.createRelease() called without try-catch when tag doesn't exist,
          discussion_category_name is invalid, or secondary rate limit triggered
        throws: >
          RequestError with status 404 (Not Found) when discussion_category_name is
          invalid. Status 422 (Validation Failed) when tag_name conflicts or validation
          fails. Secondary rate limit (403) from creating content too quickly.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Release creation fails when the discussion category doesn't exist (404),
          or when tag names conflict with existing releases (422). Release automation
          pipelines that create releases rapidly hit secondary rate limits (403).
          Without error handling, release artifacts are not published.
        detector: >
          If octokit.repos.createRelease() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 404 (invalid discussion category — validate or
          omit discussion_category_name), 422 (tag conflict — check if release already
          exists for tag), 403 secondary rate limit (add delay between release creation
          and asset upload steps).
        source: https://docs.github.com/en/rest/releases/releases
        sources:
          - https://docs.github.com/en/rest/releases/releases

  - name: repos.createDeployment
    import_path: "@octokit/rest"
    description: >
      Creates a deployment record for a ref (branch, tag, or SHA). Used in
      deployment pipeline automation. GitHub may auto-merge the base branch first.
      Returns 202 when auto-merge is triggered instead of 201.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/deployments/deployments — 409 confirmed (merge conflict/status checks)
      - id: create-deployment-conflict
        maturity: stable
        condition: >
          octokit.repos.createDeployment() called without try-catch when required
          status checks have not passed or a merge conflict exists
        throws: >
          RequestError with status 409 (Conflict) when required status check contexts
          haven't succeeded or there's a merge conflict preventing the deployment.
          Status 422 (Validation Failed) when endpoint is spammed.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        description: >
          The most critical deployment failure: required_contexts (CI checks) haven't
          passed and the deployment is blocked (409). Deployment pipelines that don't
          handle this crash without reporting the failure reason. The 409 status is
          counterintuitive — it means "deployment blocked by status checks" not a
          data conflict. Deployment automation must handle this gracefully.
        detector: >
          If octokit.repos.createDeployment() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 409 (check error.message — "required contexts"
          haven't passed: either set required_contexts: [] to bypass or wait for CI),
          422 (validation), 202 response (not an error — auto-merge in progress, poll
          for completion). Always check error.message for actionable info on 409.
        source: https://docs.github.com/en/rest/deployments/deployments
        sources:
          - https://docs.github.com/en/rest/deployments/deployments

  - name: repos.createDeploymentStatus
    import_path: "@octokit/rest"
    description: >
      Creates a status update for an existing deployment. Used to transition
      deployment state: pending → in_progress → success/failure/error. Required
      by deployment pipelines to report outcome back to GitHub and external services.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/deployments/statuses — 404 when deployment not found
      - id: create-deployment-status-not-found
        maturity: stable
        condition: >
          octokit.repos.createDeploymentStatus() called without try-catch when the
          deployment_id doesn't exist in the repository
        throws: >
          RequestError with status 404 (Not Found) when deployment_id is invalid,
          or the deployment was deleted. Status 422 (Validation Failed) for invalid
          state values.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Deployment status updates fail if the deployment was already deleted, or if
          deployment_id came from a different repository. Invalid state values (only
          error/failure/inactive/in_progress/queued/pending/success are valid) cause
          422. Without error handling, deployment state tracking breaks silently.
        detector: >
          If octokit.repos.createDeploymentStatus() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Store deployment_id immediately after createDeployment().
          Handle 404 (deployment deleted — log and skip status update), 422 (invalid state
          — only use: error/failure/inactive/in_progress/queued/pending/success).
        source: https://docs.github.com/en/rest/deployments/statuses
        sources:
          - https://docs.github.com/en/rest/deployments/statuses

  - name: repos.createCommitStatus
    import_path: "@octokit/rest"
    description: >
      Creates a commit status (legacy Status API, predates Checks API). Sets
      pending/success/failure/error status on a commit SHA with optional target_url.
      Still widely used despite Checks API — simpler to use with PATs/OAuth tokens
      because it doesn't require GitHub App. Used in CI integrations and deployment gates.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/commits/statuses — 404 on sha not found, 422 validation
      - id: create-commit-status-not-found
        maturity: stable
        condition: >
          octokit.repos.createCommitStatus() called without try-catch when the commit
          SHA doesn't exist or token lacks repo:status scope
        throws: >
          RequestError with status 404 (Not Found) when owner/repo doesn't exist or
          commit SHA is not found. Status 422 (Validation Failed) when state is not
          one of pending/success/failure/error.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Status creation with an invalid SHA (truncated, wrong repo, not pushed yet)
          fails with 404. Token must have repo:status scope (not just repo). Status
          value must be exactly one of pending/success/failure/error. Without error
          handling, CI integrations silently fail to report build status.
        detector: >
          If octokit.repos.createCommitStatus() is awaited without try-catch wrapping
        required_handling: >
          SHOULD wrap in try-catch. Handle 404 (invalid SHA — use full 40-char SHA,
          verify commit exists), 422 (invalid state — only use pending/success/failure/error),
          403 (token lacks repo:status scope).
        source: https://docs.github.com/en/rest/commits/statuses
        sources:
          - https://docs.github.com/en/rest/commits/statuses

  - name: pulls.get
    import_path: "@octokit/rest"
    description: >
      Fetches details of a single pull request by number. Extremely common in
      GitHub Apps and CI tools — used to check PR state (open/closed/merged),
      merge status, labels, and review requirements before taking action.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/pulls/pulls — 404 on not found
      - id: pulls-get-not-found
        maturity: stable
        condition: >
          octokit.pulls.get() called without try-catch when pull_number doesn't
          exist or token lacks repo access
        throws: >
          RequestError with status 404 (Not Found) when PR doesn't exist, was
          converted to draft, or token lacks access to the private repository.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          PR lookup by number fails when the PR has been deleted (rare but possible)
          or when the PR belongs to a private fork. Common in webhook handlers that
          process PR events — the PR may have been deleted between event dispatch and
          the API call. Without error handling, webhook handlers crash.
        detector: >
          If octokit.pulls.get() is awaited without try-catch wrapping
        required_handling: >
          SHOULD wrap in try-catch. Handle 404 (PR not found — may be normal in
          webhook processors if PR was deleted), 403 (no access to private repo).
        source: https://docs.github.com/en/rest/pulls/pulls
        sources:
          - https://docs.github.com/en/rest/pulls/pulls

  - name: pulls.requestReviewers
    import_path: "@octokit/rest"
    description: >
      Requests specific reviewers or teams for a pull request. Used in review
      automation, code ownership enforcement, and automated PR triage workflows.
      Commonly fails when reviewers are not repo collaborators.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/pulls/review-requests — 422 for invalid reviewers confirmed
      - id: pulls-request-reviewers-invalid
        maturity: stable
        condition: >
          octokit.pulls.requestReviewers() called without try-catch when reviewers
          are not collaborators, team doesn't exist, or PR is already closed/merged
        throws: >
          RequestError with status 422 (Unprocessable Entity) when a requested reviewer
          is not a collaborator on the repo, or team_slugs contains a non-existent team.
          Also 422 when requesting review from the PR author.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Review requests fail silently when reviewer usernames come from user-supplied
          data or when team membership has changed. The 422 error message identifies
          which reviewer is invalid. Without error handling, PR automation crashes
          and review assignments are never made.
        detector: >
          If octokit.pulls.requestReviewers() is awaited without try-catch wrapping
        required_handling: >
          SHOULD wrap in try-catch. Handle 422 (invalid reviewer — check error.message
          for which user/team is invalid, verify collaborator status before requesting),
          404 (PR not found), 403 (no write access).
        source: https://docs.github.com/en/rest/pulls/review-requests
        sources:
          - https://docs.github.com/en/rest/pulls/review-requests

  - name: issues.createComment
    import_path: "@octokit/rest"
    description: >
      Creates a comment on an issue or pull request. Extremely common in GitHub
      Apps that provide automated feedback, code review bots, and CI status reporters.
      Also used for PR/issue bots. Issues and PRs share the same comment API.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/issues/comments — 404/410/403 confirmed
      - id: issues-create-comment-not-found
        maturity: stable
        condition: >
          octokit.issues.createComment() called without try-catch when issue/PR doesn't
          exist, is locked, or issues are disabled for the repository
        throws: >
          RequestError with status 404 (Not Found) when issue_number doesn't exist.
          Status 403 (Forbidden) when issue is locked. Status 410 (Gone) when
          issues are disabled for the repository.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          The most common failure for comment bots: trying to comment on a locked issue
          (403) or one in a repo with issues disabled (410). PR-triggered bots receive
          webhook events but may try to comment on issues that were locked by maintainers.
          Without error handling, the bot crashes and the comment is never posted.
        detector: >
          If octokit.issues.createComment() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 403 (issue locked — log and skip silently),
          404 (issue/PR not found — may have been deleted), 410 (issues disabled for
          repo — fallback to PR comment API for PRs). Check error.status and handle
          each case gracefully.
        source: https://docs.github.com/en/rest/issues/comments
        sources:
          - https://docs.github.com/en/rest/issues/comments

  - name: issues.addLabels
    import_path: "@octokit/rest"
    description: >
      Adds labels to an issue or pull request. Used in triage automation, CI bots,
      and issue management workflows. Labels must already exist in the repository
      before they can be applied — this is a common source of failures.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/issues/labels — 404 on missing labels/issue confirmed
      - id: issues-add-labels-not-found
        maturity: stable
        condition: >
          octokit.issues.addLabels() called without try-catch when a label doesn't
          exist in the repository or the issue doesn't exist
        throws: >
          RequestError with status 404 (Not Found) when the issue_number doesn't exist
          or when a label in the labels array doesn't exist in the repository.
          Status 410 (Gone) when issues are disabled.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Label automation fails when label names are wrong or the repository doesn't
          have the label pre-created. This is very common when deploying bots to new
          repositories that don't have the expected label set up yet. Without error
          handling, the entire label assignment step crashes silently.
        detector: >
          If octokit.issues.addLabels() is awaited without try-catch wrapping
        required_handling: >
          SHOULD wrap in try-catch. Handle 404 (label not found — create the label first
          with issues.createLabel(), or verify label exists), 410 (issues disabled),
          403 (no write access). Consider creating required labels as part of repo setup.
        source: https://docs.github.com/en/rest/issues/labels
        sources:
          - https://docs.github.com/en/rest/issues/labels

  - name: users.getAuthenticated
    import_path: "@octokit/rest"
    description: >
      Fetches the authenticated user's profile. Used to verify token validity,
      get the authenticated user's login (for PR/issue ownership checks), and
      validate GitHub App installation token permissions. Commonly called at
      startup to validate credentials.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/users/users — 401 on invalid auth confirmed
      - id: users-get-authenticated-no-auth
        maturity: stable
        condition: >
          octokit.users.getAuthenticated() called without try-catch when the token
          is invalid, expired, or revoked
        throws: >
          RequestError with status 401 (Requires authentication) when called without
          an auth token. Status 403 (Forbidden) when the token has insufficient scope
          (fine-grained tokens without user read permission).
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Token validation at startup fails if the token is expired or revoked. Applications
          that call users.getAuthenticated() to "validate" their token at boot will crash
          without error handling when the token has been rotated or revoked. This is
          the intended use case — but requires robust error handling.
        detector: >
          If octokit.users.getAuthenticated() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 401 (no/invalid token — check GITHUB_TOKEN
          env var or token rotation), 403 (insufficient scope — verify token has
          required scopes for your use case). Log the error and exit gracefully.
        source: https://docs.github.com/en/rest/users/users
        sources:
          - https://docs.github.com/en/rest/users/users

  - name: orgs.getMembershipForUser
    import_path: "@octokit/rest"
    description: >
      Checks a user's membership status in an organization. Used for authorization
      gates in GitHub Apps — verifying a user is an org member before granting
      access to private resources. Returns membership state: active/pending.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/orgs/members — 404/403 confirmed
      - id: org-membership-not-found
        maturity: stable
        condition: >
          octokit.orgs.getMembershipForUser() called without try-catch when the user
          is not a member, org doesn't exist, or token lacks org:read permission
        throws: >
          RequestError with status 404 (Not Found) when the user is not a member of
          the organization. Status 403 (Forbidden) when the token lacks permission
          to view organization membership.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Org membership checks crash authorization flows without error handling. The
          404 status means "user is not a member" — this is the expected result for
          non-members, not an error. Apps that use this as an authorization gate
          must treat 404 as "access denied" not "something broke".
        detector: >
          If octokit.orgs.getMembershipForUser() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Treat 404 as "user is not a member" (not an error).
          Handle 403 (token lacks org read permission — request read:org scope), 404
          (not a member — return false/deny access). Do NOT re-throw 404 errors from
          membership checks — they are expected non-member responses.
        source: https://docs.github.com/en/rest/orgs/members
        sources:
          - https://docs.github.com/en/rest/orgs/members

  - name: paginate
    import_path: "@octokit/rest"
    description: >
      The paginate plugin method that wraps any list endpoint and automatically
      fetches all pages. Used with repos.listForOrg, issues.listForRepo, pulls.list,
      etc. Returns all results as a flat array. Can make dozens of API requests for
      large repositories.
    postconditions:
      # Evidence: https://github.com/octokit/plugin-paginate-rest.js — rate limit on pagination confirmed
      - id: paginate-rate-limit
        maturity: stable
        condition: >
          octokit.paginate() called without try-catch on a large list that requires
          many pages, hitting the rate limit mid-pagination
        throws: >
          RequestError with status 403 (Forbidden) or 429 (Too Many Requests) when
          the pagination exceeds the rate limit mid-traversal. The partial results
          accumulated so far are lost when the error is thrown.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Paginating large organizations (1000+ repos, 10000+ issues) makes many
          API requests and will hit rate limits. The error is thrown mid-pagination,
          losing all previously fetched pages. Without error handling, the entire
          operation fails and the calling code receives no data.
        detector: >
          If octokit.paginate() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Use @octokit/plugin-throttling to automatically
          handle rate limits during pagination. Handle 403 (rate limit — check
          x-ratelimit-remaining, back off and resume). Consider using
          octokit.paginate.iterator() for streaming to process pages as they arrive.
        source: https://github.com/octokit/plugin-paginate-rest.js
        sources:
          - https://github.com/octokit/plugin-paginate-rest.js

  - name: pulls.createReview
    import_path: "@octokit/rest"
    description: >
      Creates a review on a pull request. Can create a pending review (PENDING event),
      approve (APPROVE), request changes (REQUEST_CHANGES), or comment (COMMENT).
      Fundamental to code review automation, GitHub Apps that auto-review PRs, and
      security scanning tools that post review comments. Requires pull-requests:write scope.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/pulls/reviews — confirmed 403, 422 status codes
      # RequestError class from @octokit/request-error — status field contains HTTP code
      - id: pulls-create-review-no-try-catch
        maturity: stable
        condition: >
          octokit.pulls.createReview() called without try-catch when the PR is not found,
          the review body violates spam detection, or permission is insufficient
        throws: >
          RequestError with status 403 (Forbidden — insufficient permissions or non-collaborator
          attempting to review), 404 (Not Found — PR or repo not found), 422 (Validation
          Failed — invalid event type, comment body violates spam detection, or endpoint
          has been spammed too rapidly).
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Automated review posting fails silently without error handling. A 422 is common
          when the review body is too long, uses disallowed patterns, or when multiple
          automated reviews are posted too rapidly (spam detection). A 403 occurs when
          the token lacks pull-requests:write permission. Without try-catch, CI pipelines
          that create reviews crash and leave PRs without required review status.
        detector: >
          If octokit.pulls.createReview() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 403 (check token has pull-requests:write scope),
          404 (verify PR number and repo owner/name), 422 (invalid event type — only
          PENDING/APPROVE/REQUEST_CHANGES/COMMENT are valid; backoff if spam detection hit).
        source: https://docs.github.com/en/rest/pulls/reviews
        sources:
          - https://docs.github.com/en/rest/pulls/reviews

  - name: pulls.submitReview
    import_path: "@octokit/rest"
    description: >
      Submits a pending pull request review that was created with the PENDING event.
      Converts a draft review to an official APPROVE, REQUEST_CHANGES, or COMMENT review.
      Used in multi-step review automation where comments are staged before submission.
      Requires the review to be in PENDING state — submitting a non-pending review fails.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/pulls/reviews — confirmed 422 on wrong state, 404 missing review
      - id: pulls-submit-review-wrong-state
        maturity: stable
        condition: >
          octokit.pulls.submitReview() called without try-catch when the review is not
          in PENDING state, the review ID is invalid, or event parameter is missing
        throws: >
          RequestError with status 422 (Validation Failed — review is not PENDING, event
          parameter is blank/invalid, or endpoint has been spammed), 404 (Not Found —
          review_id or pull_number not found in repository).
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Attempting to submit a review that was already submitted (APPROVED/CHANGES_REQUESTED
          state instead of PENDING) throws 422. This happens in automation where the review
          lifecycle is not tracked — the code creates a review and then tries to submit it
          again on retry. The event parameter (APPROVE/REQUEST_CHANGES/COMMENT) is required;
          omitting it causes 422. Without try-catch, the entire review pipeline crashes.
        detector: >
          If octokit.pulls.submitReview() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 422 (verify review is in PENDING state before
          submitting — use pulls.getReview() to check; ensure event parameter is provided).
          Handle 404 (verify review_id and pull_number exist). Track review state to
          avoid double-submit on retry.
        source: https://docs.github.com/en/rest/pulls/reviews
        sources:
          - https://docs.github.com/en/rest/pulls/reviews

  - name: repos.uploadReleaseAsset
    import_path: "@octokit/rest"
    description: >
      Uploads a binary asset (file) to a GitHub Release. Used in release automation
      pipelines to attach build artifacts, binaries, checksums, and release packages.
      Returns the uploaded asset object with browser_download_url. The upload_url
      is obtained from repos.createRelease() response. Unique among GitHub API calls
      in that it sends raw binary data, not JSON.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/releases/assets — 422 on duplicate filename confirmed
      - id: release-asset-duplicate-filename
        maturity: stable
        condition: >
          octokit.repos.uploadReleaseAsset() called without try-catch when an asset
          with the same filename already exists on the release
        throws: >
          RequestError with status 422 (Unprocessable Entity) when a file with the
          same name is already attached to the release. GitHub does not overwrite —
          the duplicate upload fails. Must delete the existing asset first.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Release CI pipelines that re-run on failure will attempt to re-upload assets
          that were already uploaded in the first run. GitHub returns 422 instead of
          overwriting. Without error handling, the re-run crashes and the release is
          left with partial assets. The fix is to check for existing assets and delete
          them before re-uploading.
        detector: >
          If octokit.repos.uploadReleaseAsset() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 422 (check if asset already exists with
          repos.listReleaseAssets(), delete it with repos.deleteReleaseAsset() before
          re-uploading). Handle 404 (verify release_id from createRelease response).
          Note: filename must match the Content-Type header; GitHub renames files with
          special characters automatically.
        source: https://docs.github.com/en/rest/releases/assets
        sources:
          - https://docs.github.com/en/rest/releases/assets

  - name: repos.addCollaborator
    import_path: "@octokit/rest"
    description: >
      Adds a user as a collaborator to a repository with a specified permission level.
      Returns 201 (invitation created) for new collaborators, 204 (already a collaborator)
      for existing ones. Used in team management automation, onboarding flows, and
      GitHub Apps that provision repository access. Requires admin access to the repo.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/collaborators/collaborators — 422, 403 confirmed
      - id: add-collaborator-emu-account
        maturity: stable
        condition: >
          octokit.repos.addCollaborator() called without try-catch when the target user
          is an Enterprise Managed User (EMU) being added to a non-enterprise repository,
          or validation fails due to invalid permission level
        throws: >
          RequestError with status 422 (Validation Failed) when an EMU account is invited
          to a repository in an enterprise with personal user accounts, or when the assigned
          permission level is below the organization's base permission. Status 403 (Forbidden)
          when the authenticated user lacks admin access to the repository.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Collaborator invitation flows in GitHub Apps fail when organizations mix EMU and
          personal accounts. The 422 error on EMU accounts is non-obvious from the error
          message alone. Additionally, assigning a permission role lower than the org's
          base permission fails with 422. Without error handling, provisioning automation
          crashes silently.
        detector: >
          If octokit.repos.addCollaborator() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 422 (check for EMU constraints if your org uses
          GitHub Enterprise; verify permission level is not below org base permission).
          Handle 403 (verify authenticated user has admin role on the repository).
          Note: 201 means invitation sent; 204 means user was already a collaborator.
          Check the response status to distinguish.
        source: https://docs.github.com/en/rest/collaborators/collaborators
        sources:
          - https://docs.github.com/en/rest/collaborators/collaborators

  - name: repos.createWebhook
    import_path: "@octokit/rest"
    description: >
      Creates a webhook on a repository to receive HTTP POST callbacks for specified events.
      Used by GitHub Apps to register event subscriptions for push, pull_request, issues,
      and other events. Requires admin access to the repository. The webhook config
      includes the payload URL, content type, and secret for HMAC verification.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/repos/webhooks — 403, 404, 422 confirmed
      - id: create-webhook-invalid-config
        maturity: stable
        condition: >
          octokit.repos.createWebhook() called without try-catch when the webhook URL
          is unreachable/malformed, or the repository does not exist
        throws: >
          RequestError with status 422 (Validation Failed) when the webhook URL is
          malformed, uses a disallowed scheme, or points to a GitHub-internal address.
          Status 403 (Forbidden) when the authenticated user lacks admin access to
          the repository. Status 404 (Not Found) when the repository doesn't exist.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          GitHub App installation flows that register webhooks crash without error handling.
          The 422 occurs when the URL scheme is not https, when it points to localhost/
          internal addresses (not allowed in production), or when the content_type is
          invalid. The 403 is common when the GitHub App installation token lacks the
          admin:repo_hook permission scope. Without try-catch, the entire installation
          flow fails.
        detector: >
          If octokit.repos.createWebhook() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 422 (validate URL is publicly reachable HTTPS
          endpoint; check for localhost/private IP disqualifiers). Handle 403 (verify token
          has admin:repo_hook scope or the GitHub App has the Webhooks read-write permission).
          Handle 404 (verify repo owner and name before attempting webhook creation).
        source: https://docs.github.com/en/rest/repos/webhooks
        sources:
          - https://docs.github.com/en/rest/repos/webhooks

  - name: repos.createFork
    import_path: "@octokit/rest"
    description: >
      Creates a fork of a repository. Returns immediately (202) but the fork is created
      asynchronously — git objects may not be available for several seconds after the
      response. Used in fork-based contribution workflows, template instantiation,
      and automated repository provisioning. The fork is always created under the
      authenticated user's account unless an organization is specified.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/repos/forks — 202 async, 400, 403, 422 confirmed
      - id: create-fork-async-not-awaited
        maturity: stable
        condition: >
          octokit.repos.createFork() response is used immediately after the call without
          waiting for the async fork process to complete
        throws: >
          Does not throw, but the fork's git objects are not immediately available.
          Subsequent git operations on the fork (clone, push) within seconds of the
          202 response may fail. For forks taking > 5 minutes, GitHub Support must
          be contacted.
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
        description: >
          A 202 response means the fork was accepted, not completed. Automation that
          immediately tries to use the fork (push a branch, add collaborators) fails
          because git objects are not yet available. This is a silent failure pattern —
          the createFork() call succeeds but subsequent operations fail with confusing
          errors. Must implement a polling/retry mechanism after fork creation.
        detector: >
          If octokit.repos.createFork() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 403 (permission denied or forking disabled for org),
          422 (fork already exists for this user — check if target fork already exists),
          400 (invalid parameters). After successful 202, wait before using the fork:
          implement exponential backoff polling of repos.get() on the fork to confirm
          availability before proceeding.
        source: https://docs.github.com/en/rest/repos/forks
        sources:
          - https://docs.github.com/en/rest/repos/forks

  - name: git.createTag
    import_path: "@octokit/rest"
    description: >
      Creates a tag object in the git database. Note: this creates the git tag object
      (annotated tag), NOT the reference — a separate git.createRef() call is needed
      to make the tag visible. Used in release automation pipelines to create annotated
      tags with messages, GPG signatures, and tagger metadata. Distinct from
      lightweight tags (created with git.createRef alone).
    postconditions:
      # Evidence: https://docs.github.com/en/rest/git/tags — 409, 422 confirmed
      - id: git-create-tag-without-create-ref
        maturity: stable
        condition: >
          octokit.git.createTag() called without a subsequent git.createRef() call to
          make the tag reference visible, or called without try-catch
        throws: >
          RequestError with status 422 (Validation Failed) when the SHA of the tagged
          object is invalid or references a non-existent object. Status 409 (Conflict)
          for concurrency issues during tag creation.
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium
        description: >
          git.createTag() creates the tag OBJECT but does NOT make it visible in the
          repository. A separate git.createRef('refs/tags/<name>', sha) call is required.
          Omitting this second call results in an orphaned tag object that exists in the
          git database but is invisible to users (doesn't appear in 'git tag' output,
          not shown in GitHub UI). This is a two-step operation that is frequently
          implemented with only the first step.
        detector: >
          If octokit.git.createTag() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 422 (invalid SHA — verify the object SHA exists
          in the repo before tagging), 409 (retry with backoff for concurrency conflicts).
          IMPORTANT: Always follow createTag() with git.createRef('refs/tags/<name>',
          sha) using the sha from the createTag response to make the tag visible.
        source: https://docs.github.com/en/rest/git/tags
        sources:
          - https://docs.github.com/en/rest/git/tags

  - name: git.deleteRef
    import_path: "@octokit/rest"
    description: >
      Deletes a git reference (branch or tag). Used in branch cleanup automation,
      post-merge branch deletion, and release management. The ref format must be
      'heads/<branch>' for branches and 'tags/<name>' for tags. Attempting to delete
      the repository's default branch fails with 422.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/git/refs — 422 on default branch, 409 conflict confirmed
      - id: git-delete-ref-default-branch
        maturity: stable
        condition: >
          octokit.git.deleteRef() called without try-catch when the ref is the default
          branch, the ref format is invalid, or concurrency conflict occurs
        throws: >
          RequestError with status 422 (Validation Failed) when attempting to delete the
          repository's default branch (GitHub blocks this), when the ref format is wrong
          (must be 'heads/<name>' not 'refs/heads/<name>'), or spam detection triggers.
          Status 409 (Conflict) for concurrent deletion attempts.
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Post-merge branch cleanup automation crashes without error handling when the
          branch happens to be the default branch (e.g., a renamed default branch), or
          when the ref format is wrong. The ref parameter must use 'heads/<branch>'
          NOT 'refs/heads/<branch>' — the full ref path causes 422 validation failure.
          Branch cleanup on merged PRs should check if the branch is the default before
          deleting.
        detector: >
          If octokit.git.deleteRef() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 422 (check ref is not default branch — compare
          with repos.get().default_branch before deleting; ensure ref format is
          'heads/<name>' not 'refs/heads/<name>'). Handle 409 (retry with backoff).
          Note: 404 is NOT returned for missing refs — use git.getRef() first to
          verify existence if needed.
        source: https://docs.github.com/en/rest/git/refs
        sources:
          - https://docs.github.com/en/rest/git/refs

  - name: actions.cancelWorkflowRun
    import_path: "@octokit/rest"
    description: >
      Cancels a workflow run that is in a cancellable state (queued or in_progress).
      Returns 202 (Accepted) — the cancellation is asynchronous. Used in CI management
      tools, automated cost controls, and workflow orchestration. Cannot cancel runs
      in terminal states (completed, cancelled, failed, skipped, timed_out).
    postconditions:
      # Evidence: https://docs.github.com/en/rest/actions/workflow-runs — 409 on terminal state confirmed
      - id: cancel-workflow-run-terminal-state
        maturity: stable
        condition: >
          octokit.actions.cancelWorkflowRun() called without try-catch when the workflow
          run is already in a terminal state (completed, cancelled, failed, timed_out)
        throws: >
          RequestError with status 409 (Conflict) when the workflow run cannot be
          cancelled because it has already reached a terminal state. The 202 success
          response means cancellation was ACCEPTED, not that it has completed.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Workflow cancellation in automated CI tools fails when the workflow completes
          between the trigger check and the cancel call (race condition). Without error
          handling, CI orchestration tools crash with 409 when trying to cancel already-
          finished runs. The 202 response means accepted-for-cancellation, not cancelled —
          subsequent status checks are needed to confirm the run reached cancelled state.
        detector: >
          If octokit.actions.cancelWorkflowRun() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 409 (workflow is already in a terminal state —
          check run status with actions.getWorkflowRun() before cancelling; treat 409
          as success if the goal is to ensure the run is not running). Handle 404
          (run_id not found — verify run exists). Poll actions.getWorkflowRun() after
          202 to confirm cancellation completes.
        source: https://docs.github.com/en/rest/actions/workflow-runs
        sources:
          - https://docs.github.com/en/rest/actions/workflow-runs

  - name: pulls.update
    import_path: "@octokit/rest"
    description: >
      Updates a pull request's title, body, base branch, or state (open/closed).
      Used in automation to update PR descriptions with generated content, retarget
      PRs to different base branches, or close stale PRs programmatically. Changing
      the base branch can cause merge conflicts. Closing a merged PR has no effect.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/pulls/pulls — 403, 422 confirmed for state/base updates
      - id: pulls-update-invalid-base
        maturity: stable
        condition: >
          octokit.pulls.update() called without try-catch when setting the base to a
          non-existent branch, updating a merged PR's state, or lacking write permissions
        throws: >
          RequestError with status 422 (Validation Failed) when the new base branch does
          not exist in the repository, when attempting to reopen a merged PR (merged PRs
          cannot be reopened), or when validation fails on the body/title parameters.
          Status 403 (Forbidden) when the token lacks pull-requests:write permission.
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        description: >
          Automated PR management tools fail silently without error handling. Attempting
          to reopen a merged PR returns 422 (not 422 — actually GitHub silently ignores
          state:open on merged PRs). Changing the base branch to a deleted branch fails
          with 422. Bulk PR update automations that close PRs by branch name can hit
          this when operating on already-merged PRs.
        detector: >
          If octokit.pulls.update() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 422 (verify base branch exists before retargeting;
          check PR is not in merged state before changing state). Handle 403 (verify
          token has pull-requests:write scope). Handle 404 (verify PR number and repo).
        source: https://docs.github.com/en/rest/pulls/pulls
        sources:
          - https://docs.github.com/en/rest/pulls/pulls
  - name: apps.createInstallationAccessToken
    import_path: "@octokit/rest"
    description: >
      Mints a short-lived (1 hour) installation access token for a GitHub App
      installation. Required for any GitHub App to act on behalf of an
      installation. Token must be requested with a JWT signed by the App's
      private key. Used by every GitHub App backend that makes per-install
      API calls (CI bots, code-review bots, scanner integrations, deploy
      automation).
    postconditions:
      # Evidence: https://docs.github.com/en/rest/apps/apps#create-an-installation-access-token-for-an-app
      # Error model confirmed from @octokit/request-error: status 401/403/404/422 surfaced as RequestError.
      - id: apps-create-installation-token-no-try-catch
        maturity: stable
        condition: >
          octokit.apps.createInstallationAccessToken() called without try-catch when the
          JWT used to authenticate is expired, the App's private key has been rotated,
          the installation has been suspended, or the installation_id is invalid.
        throws: >
          RequestError with status 401 (Bad credentials) when the JWT is expired
          (JWTs are valid for 10 minutes max), malformed, or signed with a rotated
          private key. Status 403 (Forbidden) when the installation has been suspended
          or the App has been blocked by the org. Status 404 (Not Found) when the
          installation_id does not exist or is no longer accessible to this App.
          Status 422 when requested permissions exceed those granted to the installation.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high
        description: >
          GitHub App backends cannot make ANY per-installation API call without a
          fresh installation access token. An unhandled failure here cascades into
          every downstream API call failing. JWT expiry is the most common cause
          in production: long-running workers cache a JWT past its 10-minute window
          and silently lose access. Suspended installations (often after billing
          lapses or admin action) return 403 and require user-facing notification
          rather than a silent retry loop.
        detector: >
          If octokit.apps.createInstallationAccessToken() is awaited without try-catch
          wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 401 (mint a fresh JWT and retry once;
          if it persists, surface a config error to alert that the App private
          key is invalid or rotated). Handle 403 (do NOT retry; surface to the
          customer that their installation is suspended). Handle 404 (treat as
          uninstall; remove the org from the database and stop scheduled jobs
          against it). Handle 422 (surface as a permissions mismatch; do not
          loop). Never silently swallow.
        source: https://docs.github.com/en/rest/apps/apps#create-an-installation-access-token-for-an-app
        sources:
          - https://docs.github.com/en/rest/apps/apps#create-an-installation-access-token-for-an-app
          - https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/generating-an-installation-access-token-for-a-github-app
  - name: repos.compareCommitsWithBasehead
    import_path: "@octokit/rest"
    description: >
      Compares two commits (or refs) and returns the diff, list of commits,
      and merge-base. Replaces the deprecated repos.compareCommits().
      Used heavily by CI tooling, code review bots, deploy preview generators,
      and changelog automation to derive what changed between two refs.
      Subject to pagination on very large diffs and rate-limit constraints on
      mono-repos.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/commits/commits#compare-two-commits
      # Status codes from the REST reference and observed in @octokit/request-error production traces.
      - id: repos-compare-commits-basehead-no-try-catch
        maturity: stable
        condition: >
          octokit.repos.compareCommitsWithBasehead() called without try-catch when
          either ref does not exist, the diff exceeds GitHub's response limits, or
          the token lacks read access to the repository.
        throws: >
          RequestError with status 404 (Not Found) when one of the refs in the
          basehead parameter (format "{base}...{head}") does not exist in the repo,
          when the repo is private and the token lacks access, or when the repo
          was renamed/transferred. Status 422 (Unprocessable Entity) when the
          basehead format is invalid or the two refs are not comparable (different
          unrelated history). Status 403 with a rate-limit message when the diff
          is too large; GitHub caps the response at 300 files / 1MB and very
          large monorepo diffs can hit this.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        description: >
          Deploy preview generators, changelog tooling, and code-review bots
          depend on a successful diff fetch. A 404 from a force-pushed or
          deleted branch breaks the bot's run silently if uncaught. A 422
          from comparing unrelated histories (cherry-picks across forks) is
          common in fork-based workflows. Large-diff 403s are not retriable
          and must be paginated explicitly via the page/per_page params.
        detector: >
          If octokit.repos.compareCommitsWithBasehead() is awaited without try-catch
          wrapping
        required_handling: >
          MUST wrap in try-catch. Handle 404 (verify both refs still exist;
          a deleted or force-pushed branch will not be re-fetchable, so surface
          a clean error to the bot rather than retrying). Handle 422 (verify
          basehead is "{base}...{head}" and both refs share history). Handle
          large-diff 403 by falling back to paginated fetch with per_page=100
          and assembling the file list across pages.
        source: https://docs.github.com/en/rest/commits/commits#compare-two-commits
        sources:
          - https://docs.github.com/en/rest/commits/commits#compare-two-commits
  - name: issues.removeLabel
    import_path: "@octokit/rest"
    description: >
      Removes a single label from an issue or pull request. Heavily used by
      automation that transitions issues through labelled state machines
      (e.g. removing "needs-triage" once triaged, removing "blocked" once
      unblocked, removing "stale" once a stale-bot detects activity).
      The "single label" variant is distinct from removeAllLabels and is
      subject to a 404 when the label was already removed by a concurrent
      automation.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/issues/labels#remove-a-label-from-an-issue
      # 404 race confirmed in @octokit/rest issue tracker and observed in stale-bot deployments.
      - id: issues-remove-label-no-try-catch
        maturity: stable
        condition: >
          octokit.issues.removeLabel() called without try-catch when the label is
          not currently attached to the issue (race with concurrent automations),
          when the issue has been locked or moved, or when the token lacks
          issues:write.
        throws: >
          RequestError with status 404 (Not Found) when the named label is not
          currently applied to the issue. This is the dominant failure mode in
          multi-bot environments where two automations race to remove the same
          label. Status 410 (Gone) when the issue has been deleted. Status 403
          (Forbidden) when the token lacks issues:write scope or the repository
          has issues disabled. Status 301 (Moved Permanently) when the repo has
          been renamed and the client did not follow the redirect.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: low
        description: >
          Label-transition automation (triage bots, stale bots, project-board
          syncs) hits a 404 here whenever a concurrent automation has already
          removed the same label. Uncaught, the worker crashes mid-loop and
          subsequent issues are not processed. The 404 race is the most common
          incident shape in stale-bot deployments at scale.
        detector: >
          If octokit.issues.removeLabel() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Treat 404 as a no-op (the label is already
          gone; the desired end state is satisfied). Handle 410 by removing the
          issue from the work queue (it is deleted). Handle 403 by surfacing a
          permissions error rather than retrying. Never silently swallow 5xx.
        source: https://docs.github.com/en/rest/issues/labels#remove-a-label-from-an-issue
        sources:
          - https://docs.github.com/en/rest/issues/labels#remove-a-label-from-an-issue
  - name: pulls.dismissReview
    import_path: "@octokit/rest"
    description: >
      Dismisses an existing pull request review (changes a CHANGES_REQUESTED
      or APPROVED review to DISMISSED). Used by automation that auto-dismisses
      stale reviews after pushes, by branch-protection bots that need to clear
      blocking reviews from rotated reviewers, and by enterprise compliance
      tools that reset reviews when CODEOWNERS change.
    postconditions:
      # Evidence: https://docs.github.com/en/rest/pulls/reviews#dismiss-a-review-for-a-pull-request
      # Status codes confirmed in the REST reference and the @octokit/request-error production trace set.
      - id: pulls-dismiss-review-no-try-catch
        maturity: stable
        condition: >
          octokit.pulls.dismissReview() called without try-catch when the review
          is not in a dismissable state (already dismissed, or is a PENDING
          review by another reviewer), the PR is closed/merged, or the token
          lacks pull-requests:write.
        throws: >
          RequestError with status 422 (Unprocessable Entity) when the review is
          already in DISMISSED state, is PENDING (only the author can dismiss
          their own pending review), or when dismissing would violate branch
          protection rules that require a re-review. Status 403 (Forbidden) when
          the token lacks pull-requests:write or when branch protection prohibits
          dismissals from non-admins. Status 404 (Not Found) when the review_id
          does not exist or the PR has been deleted from a force-deleted branch.
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        description: >
          Auto-dismiss-on-push automation breaks silently when the review was
          already dismissed by a prior push (422 race) or when branch protection
          requires admin-only dismissals (403). Compliance tooling that resets
          reviews on CODEOWNERS changes will silently fail to reset blocking
          reviews if the 403 is swallowed, leaving the PR mergeable when policy
          required a fresh review.
        detector: >
          If octokit.pulls.dismissReview() is awaited without try-catch wrapping
        required_handling: >
          MUST wrap in try-catch. Treat 422 as a no-op when the review is
          already DISMISSED (desired state reached). Surface 403 to the
          operator rather than retrying; it indicates a branch-protection
          policy mismatch that needs manual review. Handle 404 by skipping
          the PR. Never silently swallow.
        source: https://docs.github.com/en/rest/pulls/reviews#dismiss-a-review-for-a-pull-request
        sources:
          - https://docs.github.com/en/rest/pulls/reviews#dismiss-a-review-for-a-pull-request

