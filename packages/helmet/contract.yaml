package: helmet
semver: ">=7.0.0 <9.0.0"
contract_version: "1.2.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0
# Evidence: scan-helmet-2026-06-29.json — 30 repos scanned, 20 affected (67%), 21 violations
# Top affected: ghostfolio/ghostfolio (⭐ 7985), taniarascia/takenote (⭐ 7112), thomasnordquist/MQTT-Explorer (⭐ 3835)
# Deepen pass 2026-04-13 (deepen-stream-2, pass 17): Added 8 new function entries covering
# contentSecurityPolicy (5 postconditions), strictTransportSecurity (3), crossOriginEmbedderPolicy (2),
# crossOriginOpenerPolicy (2), crossOriginResourcePolicy (2), referrerPolicy (3), xFrameOptions (1),
# xPermittedCrossDomainPolicies (1). Coverage: 0.0 → 0.89 (8/9 error-throwing functions contracted).
# Intentionally omitted: originAgentCluster, xContentTypeOptions, xDnsPrefetchControl, xDownloadOptions,
# xPoweredBy, xXssProtection — all no-arg functions with no error-throwing behavior.
#
# Deepen pass 2026-06-18 (deepen-stream-2, pass 12): Verified against helmet@8.2.0 dist source.
# Added 6 net new postconditions on existing functions (no new function entries needed since
# all error-throwing functions are already contracted):
#   helmet():                 +2 (helmet-passed-as-middleware-not-factory, helmet-duplicate-option-pair)
#   contentSecurityPolicy():  +4 (csp-invalid-directive-value-chars, csp-unquoted-special-keyword,
#                                 csp-dangerously-disable-on-non-default-src, csp-falsy-directive-value)
#   crossOriginOpenerPolicy: updated coop-invalid-policy to include noopener-allow-popups (helmet 8.x)
# Coverage: 0.89 → 1.0 — all 9 contracted error-throwing functions now have their full source-confirmed
# error contract enumerated (factory-time validation paths). 6 originally-omitted no-arg functions
# remain correctly omitted (originAgentCluster, xContentTypeOptions, xDnsPrefetchControl/dnsPrefetchControl,
# xDownloadOptions/ieNoOpen, xPoweredBy/hidePoweredBy, xXssProtection/xssFilter) — none throw.
# xDnsPrefetchControl accepts options but reads only the truthy/falsy state of .allow with no validation,
# so it cannot throw on any input.

functions:
  - name: helmet
    import_path: "helmet"
    description: "Main helmet function that sets 13 HTTP security headers to protect against common web vulnerabilities"

    postconditions:
      # Evidence: seen in 12 primary firings across 12 repos in scan-helmet-2026-04-02.json
      # Top affected: ghostfolio/ghostfolio (⭐ 7985), taniarascia/takenote (⭐ 7112)
      - id: config-validation-error
        condition: "configuration object is invalid"
        throws: "TypeError for malformed configuration (e.g., invalid CSP directives, misspelled options)"
        required_handling: >
          Caller MUST wrap helmet() calls in try-catch to prevent server crash on invalid configuration.
          Common causes: missing quotes on CSP keywords, invalid directive names, misspelled HSTS options.
        sources:
          - "https://helmetjs.github.io/"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: csp-keyword-quoting
        condition: "CSP directive contains unquoted special keywords"
        throws: "TypeError for keywords like 'self', 'none', 'unsafe-inline' without quotes"
        required_handling: >
          CSP keywords MUST be wrapped in single quotes: "'self'", "'none'", "'unsafe-inline'", "'unsafe-eval'".
          Example: scriptSrc: ["'self'"] not scriptSrc: ['self']
        sources:
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: invalid-csp-directive
        condition: "contentSecurityPolicy contains invalid directive name"
        throws: "TypeError or silent failure for invalid directive names"
        required_handling: >
          Only use valid CSP directive names: defaultSrc, scriptSrc, styleSrc, imgSrc, connectSrc, fontSrc,
          objectSrc, mediaSrc, frameSrc, baseUri, formAction, frameAncestors, etc.
        sources:
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/README.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hsts-option-misspelling
        condition: "strictTransportSecurity contains misspelled 'includeSubDomains' option"
        throws: "TypeError for 'includeSubdomains' (lowercase d), 'include_sub_domains' (snake_case), etc."
        required_handling: >
          HSTS option MUST be spelled exactly as 'includeSubDomains' (camelCase with capital D).
          Common typos: includeSubdomains, include_sub_domains, includesubdomains
        sources:
          - "https://github.com/helmetjs/helmet/issues/415"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: module-import-error
        condition: "helmet is imported incorrectly (CommonJS/ESM mismatch)"
        throws: "TypeError: helmet is not a function"
        required_handling: >
          Use correct import syntax:
          ESM: import helmet from 'helmet'
          CommonJS: const helmet = require('helmet') or require('helmet').default
          Incorrect: import * as helmet from 'helmet'
        sources:
          - "https://github.com/helmetjs/helmet/issues/415"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: nark-dev/nark-corpus/packages/helmet (verified against helmet@8.2.0 dist source)
      # node_modules/helmet/index.cjs line 515-516 — explicit IncomingMessage detection in factory
      - id: helmet-passed-as-middleware-not-factory
        condition: "helmet is passed directly to app.use without invoking it"
        throws: "Error: It appears you have done something like `app.use(helmet)`, but it should be `app.use(helmet())`."
        required_handling: >
          The helmet() factory MUST be invoked to produce the middleware function.
          The factory detects when its first argument is an IncomingMessage (i.e., when
          Express called it as middleware) and throws synchronously on the FIRST request,
          which crashes the request-handling pipeline.

          Correct: app.use(helmet())
          Wrong:   app.use(helmet)
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/helmet/index.cjs lines 384-385, 399-400, 415-416, 430-431,
      # 446-447, 461-462, 476-477, 492-493 — 8 distinct option-pair conflict checks
      - id: helmet-duplicate-option-pair
        condition: "helmet options object specifies both a modern and a legacy alias for the same header"
        throws: |
          Error: <Header-Name> option was specified twice. Remove the `<legacy-alias>` option to fix this error.
          Affected pairs: strictTransportSecurity/hsts, xContentTypeOptions/noSniff,
          xDnsPrefetchControl/dnsPrefetchControl, xDownloadOptions/ieNoOpen,
          xFrameOptions/frameguard, xPermittedCrossDomainPolicies/permittedCrossDomainPolicies,
          xPoweredBy/hidePoweredBy, xXssProtection/xssFilter.
        required_handling: >
          Each helmet option has a modern name (e.g. strictTransportSecurity) and a legacy
          alias (e.g. hsts). Passing both throws synchronously at helmet() factory invocation
          time, crashing app startup.
          Pick exactly one alias per header. The modern names are preferred; legacy aliases
          are kept for backward compatibility with helmet@4.x and earlier.

          Wrong:   helmet({ strictTransportSecurity: true, hsts: false })
          Correct: helmet({ strictTransportSecurity: true })
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

    edge_cases:
      - id: unsafe-inline-weakens-xss-protection
        description: "Using 'unsafe-inline' in CSP scriptSrc defeats XSS protection"
        sources:
          - "https://helmetjs.github.io/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: unsafe-eval-weakens-xss-protection
        description: "Using 'unsafe-eval' in CSP scriptSrc allows eval() and weakens XSS protection"
        sources:
          - "https://helmetjs.github.io/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: short-hsts-maxage
        description: "HSTS maxAge less than 1 year (31536000 seconds) provides insufficient HTTPS enforcement"
        sources:
          - "https://helmetjs.github.io/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: upgrade-insecure-requests-localhost
        description: "upgradeInsecureRequests directive causes Safari to redirect localhost to HTTPS, breaking development"
        sources:
          - "https://helmetjs.github.io/"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: deprecated-api-v4-to-v5
        description: "helmet 5.x+ changed API - individual middleware functions must be called through main helmet() function"
        sources:
          - "https://github.com/helmetjs/helmet/blob/main/CHANGELOG.md"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: disabled-headers-production
        description: "Setting security middleware to false removes protection entirely"
        sources:
          - "https://helmetjs.github.io/"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: contentSecurityPolicy
    import_path: "helmet"
    description: "Sets Content-Security-Policy header to prevent XSS attacks. Can be used standalone as helmet.contentSecurityPolicy() or configured via the main helmet({ contentSecurityPolicy }) call."

    postconditions:
      # Evidence: https://helmetjs.github.io/
      # Error types confirmed from helmet source: Error (not TypeError) thrown synchronously at factory call time
      - id: csp-invalid-directive-name
        condition: "contentSecurityPolicy directives contain an invalid directive name"
        throws: "Error: Content-Security-Policy received an invalid directive name"
        required_handling: >
          Only use valid CSP directive names (camelCase or kebab-case both accepted):
          default-src (defaultSrc), script-src (scriptSrc), style-src (styleSrc),
          img-src (imgSrc), connect-src (connectSrc), font-src (fontSrc),
          object-src (objectSrc), media-src (mediaSrc), frame-src (frameSrc),
          base-uri (baseUri), form-action (formAction), frame-ancestors (frameAncestors).
          Invalid directive names throw synchronously before the server starts.
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: csp-duplicate-directive
        condition: "contentSecurityPolicy directives contain the same directive name twice"
        throws: "Error: Content-Security-Policy received a duplicate directive"
        required_handling: >
          Each CSP directive name may appear only once in the directives object.
          If using both camelCase and kebab-case aliases for the same directive,
          only one will be used — the other is a duplicate. Deduplication must be done
          by the caller before passing to contentSecurityPolicy().
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: csp-missing-default-src
        condition: "contentSecurityPolicy directives omit default-src entirely when useDefaults is false"
        throws: "Error: Content-Security-Policy needs a default-src but none was provided"
        required_handling: >
          When useDefaults is false, the directives object MUST include a defaultSrc
          (or default-src) key. If intentionally omitting it, set it to
          contentSecurityPolicy.dangerouslyDisableDefaultSrc symbol.
          Example: { defaultSrc: contentSecurityPolicy.dangerouslyDisableDefaultSrc }
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: csp-null-default-src
        condition: "contentSecurityPolicy sets defaultSrc to null"
        throws: "Error: Content-Security-Policy needs a default-src but it was set to null"
        required_handling: >
          Setting defaultSrc: null is not valid. To disable default-src, use the
          special dangerouslyDisableDefaultSrc symbol:
          { defaultSrc: contentSecurityPolicy.dangerouslyDisableDefaultSrc }
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: csp-no-directives
        condition: "contentSecurityPolicy called with empty directives object and useDefaults false"
        throws: "Error: Content-Security-Policy has no directives"
        required_handling: >
          When contentSecurityPolicy is called with useDefaults: false and an empty
          directives object, it throws because a CSP header with no directives is invalid.
          Either enable useDefaults (the default) or provide at least a defaultSrc directive.
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/helmet/index.cjs lines 22-25, 100 — assertDirectiveValueIsValid
      # Helmet 8.x added validation that rejects directive values containing ; or , characters
      # at both factory time (for string entries) AND request time (for function-returned values).
      - id: csp-invalid-directive-value-chars
        condition: "contentSecurityPolicy directive value contains a semicolon or comma character"
        throws: "Error: Content-Security-Policy received an invalid directive value for <directive-name>"
        required_handling: >
          CSP directive values MUST NOT contain `;` or `,` because those characters are
          structural separators in the header. Helmet rejects them to prevent header
          injection vulnerabilities.

          Wrong:   scriptSrc: ["'self' https://cdn.example.com;"]   (trailing semicolon)
          Wrong:   styleSrc: ["https://a.com, https://b.com"]       (comma-separated)
          Correct: scriptSrc: ["'self'", "https://cdn.example.com"]
          Correct: styleSrc: ["https://a.com", "https://b.com"]

          Note: this check ALSO runs at request time for function-typed directive values
          (e.g. `(req, res) => generateNonce()`). A function returning a value with `;`
          or `,` will throw on every request, breaking response delivery silently from
          the perspective of the caller (the error goes to Express error middleware).
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/helmet/index.cjs lines 26-30 — SHOULD_BE_QUOTED set
      - id: csp-unquoted-special-keyword
        condition: "contentSecurityPolicy directive value contains an unquoted CSP special keyword or hash/nonce prefix"
        throws: "Error: Content-Security-Policy received an invalid directive value for <directive-name>. <value> should be quoted"
        required_handling: >
          CSP special keywords MUST be wrapped in single quotes inside the array string:
            'none', 'self', 'strict-dynamic', 'report-sample', 'inline-speculation-rules',
            'unsafe-inline', 'unsafe-eval', 'unsafe-hashes', 'wasm-unsafe-eval'
          Hash/nonce prefixes also need quoting: 'nonce-...', 'sha256-...', 'sha384-...', 'sha512-...'
          Helmet 8.x throws synchronously when an unquoted form is detected, catching the
          most common CSP misconfiguration that silently weakens security.

          Wrong:   scriptSrc: ["self", "unsafe-inline"]
          Correct: scriptSrc: ["'self'", "'unsafe-inline'"]
          Wrong:   scriptSrc: ["nonce-abc123"]
          Correct: scriptSrc: ["'nonce-abc123'"]
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/helmet/index.cjs lines 61-67 — symbol misuse path
      - id: csp-dangerously-disable-on-non-default-src
        condition: "contentSecurityPolicy.dangerouslyDisableDefaultSrc symbol passed as the value of a directive other than default-src"
        throws: "Error: Content-Security-Policy: tried to disable <directive-name> as if it were default-src; simply omit the key"
        required_handling: >
          The dangerouslyDisableDefaultSrc symbol is meant ONLY for the defaultSrc key
          to opt out of the default-src requirement. Passing it to any other directive
          (e.g. scriptSrc, styleSrc) is a misuse and throws synchronously.

          Wrong:   { scriptSrc: contentSecurityPolicy.dangerouslyDisableDefaultSrc }
          Correct: { defaultSrc: contentSecurityPolicy.dangerouslyDisableDefaultSrc }
                   (or simply omit scriptSrc — defaults fill it in if useDefaults is true)
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: node_modules/helmet/index.cjs lines 58-60 — falsy-not-string-not-symbol path
      - id: csp-falsy-directive-value
        condition: "contentSecurityPolicy directive value is falsy but not null, string, or the dangerouslyDisableDefaultSrc symbol (e.g. undefined, 0, empty string '')"
        throws: "Error: Content-Security-Policy received an invalid directive value for <directive-name>"
        required_handling: >
          Each directive value MUST be one of:
            - a string (single value)
            - an iterable of strings/functions (multiple values)
            - `null` (treats as "explicitly disabled")
            - the contentSecurityPolicy.dangerouslyDisableDefaultSrc symbol (default-src only)
          Passing `undefined`, `0`, `''`, `false`, or any other falsy value throws.
          A common cause is constructing CSP directives from environment variables without
          checking for absence:

          Wrong:   { scriptSrc: process.env.CSP_SCRIPT_SRC || undefined }
          Correct: process.env.CSP_SCRIPT_SRC
                     ? { scriptSrc: process.env.CSP_SCRIPT_SRC.split(' ') }
                     : { /* omit scriptSrc; defaults fill in */ }
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/content-security-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: strictTransportSecurity
    import_path: "helmet"
    description: "Sets Strict-Transport-Security header to enforce HTTPS. Can be used standalone as helmet.strictTransportSecurity() or configured via helmet({ strictTransportSecurity }). Also exported as helmet.hsts() legacy alias."

    postconditions:
      # Evidence: https://helmetjs.github.io/
      # Error types confirmed from helmet source: Error thrown synchronously at factory call time
      - id: hsts-invalid-maxage
        condition: "strictTransportSecurity maxAge is negative, Infinity, NaN, or non-finite"
        throws: "Error: Strict-Transport-Security: <value> is not a valid value for maxAge. Please choose a positive integer."
        required_handling: >
          maxAge MUST be a non-negative finite integer (in seconds). Common mistakes:
          - Passing Infinity (valid in math, invalid for HSTS)
          - Passing a negative number
          - Passing NaN or undefined from an environment variable without parsing
          Valid minimum: 0 (disables HSTS for the browsing session)
          Recommended minimum: 31536000 (1 year, required for HSTS preload list)
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/strict-transport-security/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hsts-maxage-typo
        condition: "strictTransportSecurity options contain 'maxage' (lowercase a) instead of 'maxAge'"
        throws: "Error: Strict-Transport-Security received an unsupported property, maxage. Did you mean to pass maxAge?"
        required_handling: >
          The option key is 'maxAge' (camelCase with capital A), not 'maxage'.
          Helmet detects this common typo and throws a descriptive error.
          Correct: { maxAge: 31536000 }
          Wrong:   { maxage: 31536000 }
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/strict-transport-security/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: hsts-includesubdomains-typo
        condition: "strictTransportSecurity options contain 'includeSubdomains' (lowercase d)"
        throws: "Error: Strict-Transport-Security middleware should use includeSubDomains instead of includeSubdomains"
        required_handling: >
          The option key is 'includeSubDomains' (capital D), not 'includeSubdomains'.
          Helmet detects this common case error and throws a descriptive error.
          Correct: { includeSubDomains: true }
          Wrong:   { includeSubdomains: true }
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/strict-transport-security/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: crossOriginEmbedderPolicy
    import_path: "helmet"
    description: "Sets Cross-Origin-Embedder-Policy header. Controls what resources can be loaded cross-origin. Not enabled by default in helmet() — must be explicitly set to true or configured."

    postconditions:
      # Evidence: https://helmetjs.github.io/
      # Error types confirmed from helmet source: Error thrown synchronously at factory call time
      - id: coep-invalid-policy
        condition: "crossOriginEmbedderPolicy called with an unsupported policy value"
        throws: "Error: Cross-Origin-Embedder-Policy does not support the <policy> policy"
        required_handling: >
          The policy option MUST be one of: "require-corp", "credentialless", "unsafe-none".
          Any other string throws synchronously.
          Default (if omitted): "require-corp"
          Note: Enabling require-corp blocks cross-origin resources that don't include
          CORP headers, which can break CDN-hosted assets, iframes, and third-party scripts.
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/cross-origin-embedder-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: coep-breaks-cross-origin-resources
        condition: "crossOriginEmbedderPolicy is enabled with require-corp when the app embeds cross-origin resources without CORP headers"
        throws: "No exception — but cross-origin resources (images, scripts, iframes) silently fail to load"
        required_handling: >
          Enabling COEP require-corp blocks all cross-origin resources that do not
          include a Cross-Origin-Resource-Policy response header. This breaks:
          - CDN-hosted images (e.g., Cloudinary, S3) without explicit CORP headers
          - Third-party iframes (Google Maps, Stripe Checkout)
          - External scripts without CORP headers
          Use "unsafe-none" for apps with cross-origin dependencies, or ensure all
          external resources include Cross-Origin-Resource-Policy: cross-origin.
        sources:
          - "https://helmetjs.github.io/"
          - "https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cross-Origin-Embedder-Policy"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: crossOriginOpenerPolicy
    import_path: "helmet"
    description: "Sets Cross-Origin-Opener-Policy header to process-isolate pages. Enabled by default in helmet() with 'same-origin' policy."

    postconditions:
      # Evidence: https://helmetjs.github.io/
      # Error types confirmed from helmet source: Error thrown synchronously at factory call time
      - id: coop-invalid-policy
        condition: "crossOriginOpenerPolicy called with an unsupported policy value"
        throws: "Error: Cross-Origin-Opener-Policy does not support the <policy> policy"
        required_handling: >
          The policy option MUST be one of: "same-origin", "same-origin-allow-popups",
          "noopener-allow-popups" (added helmet 8.x), or "unsafe-none".
          Any other string throws synchronously.
          Default (if omitted): "same-origin"
          Note: "same-origin" breaks popup-based OAuth flows and payment windows.
          Use "same-origin-allow-popups" if the app uses window.open() for auth flows.
          Use "noopener-allow-popups" if the app needs popups without window.opener access.
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/cross-origin-opener-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: coop-breaks-popup-auth
        condition: "crossOriginOpenerPolicy is 'same-origin' and the app uses popup-based OAuth (e.g., Google Sign-In, GitHub OAuth via window.open)"
        throws: "No exception — but window.opener is null, breaking postMessage-based auth callbacks"
        required_handling: >
          When COOP is "same-origin", popup windows opened from the page lose access to
          window.opener, breaking OAuth flows that rely on postMessage from the popup back
          to the opener. Use "same-origin-allow-popups" if the app uses OAuth popups.
        sources:
          - "https://helmetjs.github.io/"
          - "https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cross-Origin-Opener-Policy"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: authentication_failure
          incident_cost_range: medium

  - name: crossOriginResourcePolicy
    import_path: "helmet"
    description: "Sets Cross-Origin-Resource-Policy header to control which origins can load resources from this server. Enabled by default in helmet() with 'same-origin' policy."

    postconditions:
      # Evidence: https://helmetjs.github.io/
      # Error types confirmed from helmet source: Error thrown synchronously at factory call time
      - id: corp-invalid-policy
        condition: "crossOriginResourcePolicy called with an unsupported policy value"
        throws: "Error: Cross-Origin-Resource-Policy does not support the <policy> policy"
        required_handling: >
          The policy option MUST be one of: "same-origin", "same-site", "cross-origin".
          Any other string throws synchronously.
          Default (if omitted): "same-origin"
          Note: "same-origin" prevents cross-origin no-cors requests from loading resources.
          Use "cross-origin" for APIs or CDN assets that must be accessible cross-origin.
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/cross-origin-resource-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: corp-blocks-public-api
        condition: "crossOriginResourcePolicy is 'same-origin' on a public API server that expects cross-origin no-cors requests"
        throws: "No exception — but cross-origin no-cors fetch requests are blocked by the browser"
        required_handling: >
          helmet()'s default CORP "same-origin" blocks cross-origin no-cors requests.
          Public REST APIs consumed by browsers MUST override to "cross-origin":
          helmet({ crossOriginResourcePolicy: { policy: 'cross-origin' } })
          This is one of the most common helmet misconfiguration issues for public APIs.
        sources:
          - "https://helmetjs.github.io/"
          - "https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cross-Origin-Resource-Policy"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: visible
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: referrerPolicy
    import_path: "helmet"
    description: "Sets Referrer-Policy header to control what information is sent in the Referer request header. Enabled by default in helmet() with 'no-referrer' policy."

    postconditions:
      # Evidence: https://helmetjs.github.io/
      # Error types confirmed from helmet source: Error thrown synchronously at factory call time
      - id: referrer-invalid-policy-token
        condition: "referrerPolicy called with an unrecognized policy string"
        throws: "Error: Referrer-Policy received an unexpected policy token <token>"
        required_handling: >
          The policy option MUST be one of (or an array of):
          "no-referrer", "no-referrer-when-downgrade", "same-origin", "origin",
          "strict-origin", "origin-when-cross-origin", "strict-origin-when-cross-origin",
          "unsafe-url", or "" (empty string for no policy).
          Any unrecognized string throws synchronously.
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/referrer-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: referrer-empty-policy-array
        condition: "referrerPolicy called with an empty array []"
        throws: "Error: Referrer-Policy received no policy tokens"
        required_handling: >
          The policy option MUST NOT be an empty array. Either pass a string, a non-empty
          array, or omit the option entirely (defaults to "no-referrer").
          Incorrect: helmet.referrerPolicy({ policy: [] })
          Correct:   helmet.referrerPolicy({ policy: "no-referrer" })
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/referrer-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      - id: referrer-duplicate-policy-token
        condition: "referrerPolicy called with an array containing duplicate policy tokens"
        throws: "Error: Referrer-Policy received a duplicate policy token <token>"
        required_handling: >
          When passing an array of policy tokens for fallback ordering, each token
          must appear at most once. Remove duplicates before passing to referrerPolicy().
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/referrer-policy/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: xFrameOptions
    import_path: "helmet"
    description: "Sets X-Frame-Options header to control whether the page can be embedded in iframes. Enabled by default in helmet() with 'SAMEORIGIN'. Also exported as helmet.frameguard() legacy alias."

    postconditions:
      # Evidence: https://helmetjs.github.io/
      # Error types confirmed from helmet source: Error thrown synchronously at factory call time
      - id: xfo-invalid-action
        condition: "xFrameOptions called with an unsupported action value"
        throws: "Error: X-Frame-Options received an invalid action <action>"
        required_handling: >
          The action option MUST be one of: "deny", "sameorigin" (case-insensitive).
          "ALLOW-FROM" is NOT supported in modern helmet (removed in v5+).
          Any other string throws synchronously.
          Valid: { action: "deny" } or { action: "sameorigin" }
          Invalid: { action: "allow-from" } (removed), { action: "allowfrom" }
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/x-frame-options/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: xPermittedCrossDomainPolicies
    import_path: "helmet"
    description: "Sets X-Permitted-Cross-Domain-Policies header for Adobe products (Flash, Acrobat). Enabled by default in helmet() with 'none'. Also exported as helmet.permittedCrossDomainPolicies() legacy alias."

    postconditions:
      # Evidence: https://helmetjs.github.io/
      # Error types confirmed from helmet source: Error thrown synchronously at factory call time
      - id: xpcdp-invalid-policy
        condition: "xPermittedCrossDomainPolicies called with an unsupported permittedPolicies value"
        throws: "Error: X-Permitted-Cross-Domain-Policies does not support <permittedPolicies>"
        required_handling: >
          The permittedPolicies option MUST be one of: "none", "master-only", "by-content-type", "all".
          Any other string throws synchronously.
          Default (if omitted): "none"
          "none" is the recommended value for most apps (denies all cross-domain policies).
        sources:
          - "https://helmetjs.github.io/"
          - "https://github.com/helmetjs/helmet/blob/main/middlewares/x-permitted-cross-domain-policies/index.ts"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
