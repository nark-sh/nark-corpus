package: sharp
semver: ">=0.30.0 <1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0

detection:
  type_names:
    - Sharp
  factory_methods:
    - sharp

functions:
  - name: toFile
    import_path: "sharp"
    description: "Writes processed image to file system"
    postconditions:
      # Evidence: seen in 10 primary firings across 3 repos in scan-sharp-2026-04-13.json
      # Top affected: wfjsw/danbooru-diffusion-prompt-builder
      - id: tofile-rejects-on-error
        maturity: stable
        condition: "file system error, invalid image data, or processing failure"
        throws: "Promise rejection with Error (ENOENT, EACCES, ENOMEM, or processing errors)"
        required_handling: >
          Caller MUST use try-catch or .catch() to handle Promise rejections from toFile().
          File system errors (missing directory, permissions), invalid image data, and memory
          issues will reject the Promise and crash the application if unhandled.
          Use pattern: try { await sharp(input).toFile('output.jpg'); } catch (error) { /* handle */ }
        sources:
          - "https://sharp.pixelplumbing.com/api-output#tofile"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: toBuffer
    import_path: "sharp"
    description: "Returns processed image as Buffer"
    postconditions:
      # Evidence: seen in 27 primary firings across 13 repos in scan-sharp-2026-04-13.json
      # Top affected: getomni-ai/zerox (⭐ 12190 stars), saturndec/waoowaoo (⭐ 10142 stars), besscroft/PicImpact
      - id: tobuffer-rejects-on-error
        maturity: stable
        condition: "invalid image data or processing failure"
        throws: "Promise rejection with Error"
        required_handling: >
          Caller MUST use try-catch or .catch() to handle Promise rejections from toBuffer().
          Invalid or corrupted image data will reject the Promise and crash if unhandled.
          Use pattern: try { const buffer = await sharp(input).toBuffer(); } catch (error) { /* handle */ }
        sources:
          - "https://sharp.pixelplumbing.com/api-output#tobuffer"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: metadata
    import_path: "sharp"
    description: >
      Fast access to image metadata (width, height, format, channels, EXIF, ICC, etc.)
      without decoding compressed pixel data. Reads from the image header only.
      Returns a Promise that rejects if the input is corrupt, missing, or unsupported.
      Commonly used before toBuffer()/toFile() to determine dimensions or validate
      that an uploaded image is a genuine image file.
    postconditions:
      # Evidence: sharp C++ source — src/common.cc throws VError which propagates as Error
      # via is.nativeError() in lib/input.js → Promise.reject(is.nativeError(err, stack))
      # Source lines confirmed: common.cc:562 "Input file is missing: ..."
      # common.cc:572 "Input file has corrupt header: ..."
      # common.cc:575 "Input file contains unsupported image format"
      # common.cc:583 "Input image exceeds pixel limit"
      # common.cc:485 "Input buffer has corrupt header: ..."
      # common.cc:488 "Input buffer contains unsupported image format"
      # metadata.cc:292 → Callback with Napi::Error when baton->err is non-empty
      # Documentation: https://sharp.pixelplumbing.com/api-input#metadata
      - id: metadata-rejects-on-corrupt-or-unsupported-input
        maturity: stable
        condition: >
          Input image has a corrupt header, is not a recognized image format, or the
          input file is missing from the filesystem. Also rejects if the image exceeds
          the pixel limit (default 268,402,689 pixels) when limitInputPixels is set.
        throws: >
          Promise rejection with Error whose message begins with one of:
          "Input file is missing: <path>",
          "Input file has corrupt header: <libvips error>",
          "Input file contains unsupported image format",
          "Input buffer has corrupt header: <libvips error>",
          "Input buffer contains unsupported image format",
          "Input image exceeds pixel limit".
          All originate from libvips VError converted to a native JS Error via
          is.nativeError() in lib/input.js.
        required_handling: >
          Caller MUST wrap await sharp(input).metadata() in try-catch.
          Used in upload validation pipelines to check if a file is a genuine image —
          if the call throws, it must be caught or it silently crashes the upload handler
          and returns a 500 to the client.

          Correct pattern:
            try {
              const meta = await sharp(inputBuffer).metadata();
              // Use meta.width, meta.height, meta.format
            } catch (error) {
              // Input is corrupt, unsupported, or file is missing
              throw new Error(`Invalid image: ${error.message}`);
            }

          Note: metadata() reads only the header — a successful metadata() call does NOT
          guarantee the full image is valid. Corrupt pixel data surfaces only when
          toBuffer() or toFile() decodes the full image.
        sources:
          - "https://sharp.pixelplumbing.com/api-input#metadata"
          - "https://github.com/lovell/sharp/blob/main/src/common.cc"
          - "https://github.com/lovell/sharp/blob/main/src/metadata.cc"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: stats
    import_path: "sharp"
    description: >
      Access to pixel-derived statistics (min, max, mean, stdev per channel, entropy,
      sharpness, dominant color) for the input image. Unlike metadata(), stats() requires
      full pixel decoding — it cannot analyze transformed images without first calling
      toBuffer() to materialize the intermediate result. Returns a Promise.
    postconditions:
      # Evidence: sharp C++ source — src/stats.cc catches VError from pixel decoding
      # stats.cc:42-43 catches vips::VError and appends to baton->err
      # stats.cc:149 → Callback with Napi::Error when baton->err non-empty
      # Same input-loading errors as metadata() since it uses LoadInputImage()
      # Documentation: https://sharp.pixelplumbing.com/api-input#stats
      - id: stats-rejects-on-corrupt-or-unsupported-input
        maturity: stable
        condition: >
          Input image cannot be fully decoded: corrupt file, unsupported format,
          missing input file, or pixel limit exceeded. Unlike metadata(), stats()
          decodes all pixel data so corrupt pixel data (not just header corruption)
          will also cause rejection.
        throws: >
          Promise rejection with Error whose message originates from libvips VError:
          "Input file is missing: <path>",
          "Input file has corrupt header: <libvips error>",
          "Input file contains unsupported image format",
          "Input buffer has corrupt header: <libvips error>",
          "Input buffer contains unsupported image format",
          or any libvips processing error from full pixel decode.
        required_handling: >
          Caller MUST wrap await sharp(input).stats() in try-catch.
          stats() is often used for image quality analysis (is it blurry? colorful?).
          When called without error handling on unvalidated user uploads, a corrupt
          image will crash the analysis pipeline and leave jobs stuck.

          Correct pattern:
            try {
              const { entropy, sharpness, dominant } = await sharp(inputBuffer).stats();
              // Use entropy to detect blank images, sharpness for blur detection
            } catch (error) {
              console.error('Image stats failed:', error.message);
              throw error;
            }

          Critical gotcha: statistics are derived from the ORIGINAL input image.
          If you want stats on a resized/cropped region, you MUST first do:
            const part = await sharp(input).extract(region).toBuffer();
            const s = await sharp(part).stats();  // Stats on the cropped region
          Calling .extract(region).stats() without intermediate toBuffer() reads
          stats from the original unmodified image — a silent data correctness bug.
        sources:
          - "https://sharp.pixelplumbing.com/api-input#stats"
          - "https://github.com/lovell/sharp/blob/main/src/stats.cc"
          - "https://github.com/lovell/sharp/blob/main/src/common.cc"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: toUint8Array
    import_path: "sharp"
    description: >
      Writes processed image to a Uint8Array backed by a transferable ArrayBuffer.
      Supports JPEG, PNG, WebP, AVIF, TIFF, GIF and raw pixel data output. Added in
      sharp v0.35.0 as a zero-copy alternative to toBuffer() — the underlying
      ArrayBuffer can be transferred across worker boundaries without serialization
      cost. Returns a Promise that resolves with { data: Uint8Array, info: OutputInfo }
      and rejects through the same pipeline as toBuffer() / toFile() — the libvips
      VError surface is converted to a native Error via is.nativeError() in
      lib/output.js _pipeline().
    postconditions:
      # Evidence: dist/output.mjs — function toUint8Array() delegates to _pipeline(),
      # which rejects via Promise.reject(is.nativeError(err, stack)) on the same
      # libvips error surface as toBuffer() and toFile(). Same error classes apply.
      # Documentation: https://sharp.pixelplumbing.com/api-output#touint8array
      # Release notes: https://github.com/lovell/sharp/blob/main/docs/src/content/docs/changelog.md (v0.35.0)
      - id: touint8array-rejects-on-error
        maturity: stable
        condition: >
          Invalid image data, corrupt input buffer, unsupported format, missing
          input file, or pixel-decode failure during the libvips pipeline.
          toUint8Array() shares the same _pipeline() rejection path as toBuffer()
          and toFile() — any error surfaced by libvips during decode/encode causes
          a Promise rejection.
        throws: >
          Promise rejection with Error whose message originates from libvips VError
          via is.nativeError(): typical messages include "Input file is missing:",
          "Input buffer has corrupt header:", "Input buffer contains unsupported
          image format", or any libvips processing error from full pixel decode.
        required_handling: >
          Caller MUST wrap await sharp(input).toUint8Array() in try-catch or
          attach .catch(). The most common use case (zero-copy transfer to a
          worker via postMessage) is a hot path where unhandled rejections crash
          the worker process and orphan in-flight jobs.

          Correct pattern:
            try {
              const { data, info } = await sharp(inputBuffer)
                .resize(800, 600)
                .png()
                .toUint8Array();
              worker.postMessage({ data, info }, [data.buffer]);
            } catch (error) {
              // Corrupt input or unsupported format
              throw new Error(`Image encode failed: ${error.message}`);
            }

          Critical gotcha: the transferable ArrayBuffer means that if you
          forget to `await` and the Promise rejects asynchronously, the worker
          thread receives a stale or partially-populated buffer — and the
          rejection lands on the global unhandledRejection handler instead of
          the original call site. Always `await` (or `.then`/`.catch`) the
          returned Promise.
        sources:
          - "https://sharp.pixelplumbing.com/api-output#touint8array"
          - "https://github.com/lovell/sharp/blob/main/lib/output.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

