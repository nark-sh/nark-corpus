package: axios-retry
semver: ">=1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-13"
status: production
evidence_quality: confirmed

# SPECIAL CASE: axios-retry is a configuration/wrapper library.
# It does not introduce new error-throwing functions.
# After retries are exhausted, the underlying axios error is re-thrown.
# Users must still handle axios errors — see the axios contract.

functions:
  # axios-retry() is a configuration function - it doesn't throw
  # The errors users need to handle come from the underlying axios methods
  - name: "axiosRetry"
    import_path: "axios-retry"
    description: "See postconditions for behavioral contract details."
    postconditions:
      - id: axios-retry-config-only
        condition: "This function configures retry behavior but does not throw errors"
        throws: "N/A - Configuration function"
        required_handling: >
          axios-retry() is a configuration function that does not throw.

          The actual error handling requirements are for the UNDERLYING AXIOS METHODS.
          After retries are exhausted, axios will throw - users must still use try-catch.

          See the axios behavioral contract for specific error handling requirements.
        sources:
          - "https://github.com/softonic/axios-retry#usage"
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  # Document that axios methods still require error handling
  - name: "axios.get/post/put/delete (with retry)"
    import_path: "axios"
    description: "See postconditions for behavioral contract details."
    postconditions:
      - id: axios-retry-exhausted
        condition: "All retry attempts have been exhausted"
        throws: "AxiosError (same as standard axios)"
        required_handling: >
          Caller MUST wrap axios calls in try-catch block even when axios-retry is configured.

          axios-retry only retries failed requests - it does not prevent errors from being thrown.
          After the final retry fails, the error is re-thrown exactly as axios would throw it.

          The retry logic is transparent to error handling - try-catch is still required.
        sources:
          - "https://github.com/softonic/axios-retry#usage"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
