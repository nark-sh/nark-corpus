            import { DateTime } from 'luxon';
            const dt = DateTime.fromHTTP(httpHeaderValue);
            if (!dt.isValid) { /* handle invalid HTTP date */ }

        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromhttp"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
