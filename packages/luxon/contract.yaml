          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromRFC2822
    import_path: "luxon"
    description: >
      Parses an RFC 2822 date string. Returns Invalid DateTime on parse failure — does not throw.
      Security note: Versions before 3.2.1 are vulnerable to ReDoS on inputs over 10,000 chars.
    postconditions:
      # Evidence: fromRFC2822 returns invalid DateTime for bad input — does not throw
      - id: fromrfc2822-invalid-date
        condition: "input string is not a valid RFC 2822 format"
        returns: "Invalid DateTime object (dt.isValid is false)"
        required_handling: >
          Caller MUST check isValid property.

            import { DateTime } from 'luxon';
            const dt = DateTime.fromRFC2822(emailDate);
            if (!dt.isValid) { /* handle invalid RFC 2822 date */ }

        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromrfc2822"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        security_notes: >
          CVE-2023-22467: Versions <1.28.1, <2.5.2, <3.2.1 vulnerable to ReDoS attack with inputs >10k chars.
          This method has quadratic (N^2) complexity on specific inputs causing denial of service.
          Patched in 1.28.1, 2.5.2, and 3.2.1. Always validate and limit input length.

  - name: DateTime.fromObject
    import_path: "luxon"
    description: >
      Creates a DateTime from an object with date/time properties like { year, month, day }.
      Returns Invalid DateTime for invalid calendar values (no throw). However, THROWS
      ConflictingSpecificationError when mutually exclusive field sets are both provided
      (weekYear with gregorian fields, or ordinal with month/day).
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 817-823:
      #   throw new ConflictingSpecificationError("Can't mix weekYear/weekNumber units with year/month/day or ordinals")
      #   throw new ConflictingSpecificationError("Can't mix ordinal dates with month/day")
      - id: fromobject-conflicting-specification
        condition: >
          The object mixes mutually exclusive field sets. Two patterns that throw:
          1. weekYear or weekNumber is combined with year, month, day, or ordinal
          2. ordinal (day-of-year) is combined with month or day
          These are developer errors — calendar systems cannot be mixed in a single object.
        throws: >
          ConflictingSpecificationError: "Can't mix weekYear/weekNumber units with year/month/day or ordinals"
          or "Can't mix ordinal dates with month/day"
        required_handling: >
          Use only one calendar system per DateTime.fromObject() call:

            import { DateTime } from 'luxon';

            // WRONG — mixes ISO week date with Gregorian — throws ConflictingSpecificationError
            DateTime.fromObject({ weekYear: 2023, weekNumber: 5, month: 2, day: 1 });

            // WRONG — mixes ordinal with month/day
            DateTime.fromObject({ ordinal: 45, month: 2, day: 14 });

            // CORRECT — ISO week date only
            DateTime.fromObject({ weekYear: 2023, weekNumber: 5, weekday: 1 });

            // CORRECT — Gregorian only
            DateTime.fromObject({ year: 2023, month: 2, day: 1 });

            // CORRECT — ordinal only (day of year)
            DateTime.fromObject({ year: 2023, ordinal: 45 });

          This throws synchronously and will crash route handlers without try-catch.
        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L817"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromobject"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: fromObject returns DateTime.invalid() for out-of-range calendar values
      # (month 13, day 400, etc.) — these do NOT throw, they return an Invalid DateTime
      - id: fromobject-invalid-date
        condition: "object contains invalid date values (e.g., month 13, day 400)"
        returns: "Invalid DateTime object (dt.isValid is false)"
        required_handling: >
          Caller MUST check isValid property.
          Invalid calendar values (February 30, 25:00, month 13) produce invalid DateTimes.

            import { DateTime } from 'luxon';
            const dt = DateTime.fromObject({ year: 2023, month: 2, day: 30 });
            // dt.isValid === false, dt.invalidReason === 'unit out of range'
            if (!dt.isValid) { /* handle */ }

        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromobject"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromMillis
    import_path: "luxon"
    description: >
      Creates a DateTime from a Unix timestamp in milliseconds. THROWS InvalidArgumentError
      when the argument is not a number. Common when processing API timestamps that may be
      null, undefined, or string-formatted. Unlike fromISO/fromFormat, this method does NOT
      return an Invalid DateTime — it throws immediately for non-numeric input.
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 717-722:
      #   if (!isNumber(milliseconds)) {
      #     throw new InvalidArgumentError(
      #       `fromMillis requires a numerical input, but received a ${typeof milliseconds} with value ${milliseconds}`
      #     );
      #   }
      # Also: timestamps outside ±8.64e15 return DateTime.invalid("Timestamp out of range") — no throw
      - id: frommillis-non-number-throws
        condition: >
          The milliseconds argument is not a number. Common causes:
          - API response returns timestamp as a string (e.g., "1682506800000")
          - Database record has null or undefined timestamp (user.createdAt === null)
          - JavaScript arithmetic on non-number produces NaN
          Note: Out-of-range timestamps (beyond ±8.64e15 ms) return Invalid DateTime (no throw).
          Note: NaN is technically a number in JavaScript, so NaN does NOT trigger this throw —
          it produces an Invalid DateTime instead.
        throws: >
          InvalidArgumentError: "fromMillis requires a numerical input, but received a string with value 1682506800000"
          (error message includes the type and value of the invalid argument)
        required_handling: >
          Validate or coerce the argument before calling fromMillis():

            import { DateTime } from 'luxon';

            // WRONG — throws if timestamp is null or string
            const dt = DateTime.fromMillis(record.createdAt);

            // CORRECT — validate first
            const ts = Number(record.createdAt);
            if (!isFinite(ts)) {
              throw new Error(`Invalid timestamp: ${record.createdAt}`);
            }
            const dt = DateTime.fromMillis(ts);

            // Also CORRECT — use fromJSDate for Date objects
            const dt = DateTime.fromJSDate(new Date(record.createdAt));
            if (!dt.isValid) { /* handle */ }

        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L717"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefrommillis"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromSeconds
    import_path: "luxon"
    description: >
      Creates a DateTime from a Unix timestamp in seconds. THROWS InvalidArgumentError
      when the argument is not a number. Used for Unix timestamps from databases (PostgreSQL
      extract(epoch) returns numeric) or external APIs. Identical throw behavior to fromMillis.
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 746:
      #   throw new InvalidArgumentError("fromSeconds requires a numerical input");
      - id: fromseconds-non-number-throws
        condition: >
          The seconds argument is not a number. Common when Unix timestamps come from APIs
          as strings, or when database values are null/undefined. Note that NaN (JavaScript
          "Not a Number") is typeof === "number", so NaN does NOT trigger this throw —
          NaN*1000 = NaN, which produces an Invalid DateTime with "Timestamp out of range".
        throws: "InvalidArgumentError: fromSeconds requires a numerical input"
        required_handling: >
          Validate or coerce the argument before calling fromSeconds():

            import { DateTime } from 'luxon';

            // WRONG — throws if seconds is null, undefined, or string
            const dt = DateTime.fromSeconds(apiResponse.expires_at);

            // CORRECT — coerce and validate
            const secs = Number(apiResponse.expires_at);
            if (!Number.isFinite(secs)) {
              throw new Error('Missing or invalid expiry timestamp');
            }
            const dt = DateTime.fromSeconds(secs);
            if (!dt.isValid) { /* handle out-of-range */ }

        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L746"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefrommillis"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.startOf
    import_path: "luxon"
    description: >
      Returns a DateTime set to the start of a unit (year, month, week, day, hour, etc.).
      THROWS InvalidUnitError when passed an unrecognized unit string. This is a developer
      error — unit names must match luxon's unit vocabulary. When called on an Invalid DateTime,
      returns the Invalid DateTime unchanged (no throw). Used heavily in date range calculations
      for SaaS dashboards and reporting.
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 1733:
      #   "no default, invalid units throw in normalizeUnit()"
      # normalizeUnit() calls Duration.normalizeUnit() which throws InvalidUnitError
      # node_modules/luxon/src/datetime.js line 366:
      #   if (!normalized) throw new InvalidUnitError(unit);
      - id: startof-invalid-unit
        condition: >
          The unit argument is not a recognized luxon unit string. Valid values are:
          'year', 'quarter', 'month', 'week', 'day', 'hour', 'minute', 'second', 'millisecond'
          (also 'years', 'months', etc. plural forms). Common mistakes: 'date' (use 'day'),
          'hours' (valid), 'min' (use 'minute'), 'secs' (use 'second'), or unit from a
          different library (e.g., moment.js or date-fns unit names that differ).
          Note: Called on an Invalid DateTime, startOf() returns the Invalid DateTime — no throw.
        throws: "InvalidUnitError: Invalid unit <unit>"
        required_handling: >
          Always use valid luxon unit strings. Validate dynamically-sourced unit strings before use:

            import { DateTime } from 'luxon';

            // WRONG — throws if unit is 'date' or any unrecognized string
            const start = DateTime.now().startOf(userSelectedUnit);

            // CORRECT — restrict to valid units
            const VALID_UNITS = ['year', 'month', 'week', 'day', 'hour', 'minute', 'second'];
            if (!VALID_UNITS.includes(unit)) {
              throw new Error(`Invalid date unit: ${unit}`);
            }
            const start = DateTime.now().startOf(unit);

        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L1705"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimestartof"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: DateTime.endOf
    import_path: "luxon"
    description: >
      Returns a DateTime set to the end of a unit (year, month, week, day, etc.).
      Delegates to startOf() internally. THROWS InvalidUnitError for unrecognized unit
      strings — same behavior as startOf(). Commonly used in date range queries for
      filtering database records by period.
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 1769:
      #   endOf(unit, opts) { return this.startOf(unit, opts).plus(1).minus(1); }
      # Throws via startOf() → normalizeUnit() → InvalidUnitError
      - id: endof-invalid-unit
        condition: >
          The unit argument is not a recognized luxon unit string. Same valid unit set as
          startOf(): 'year', 'quarter', 'month', 'week', 'day', 'hour', 'minute', 'second', 'millisecond'.
          Throws for 'date', 'min', 'secs', or any unit string not in luxon's vocabulary.
        throws: "InvalidUnitError: Invalid unit <unit>"
        required_handling: >
          Same as startOf() — always validate dynamically-sourced unit strings before use:

            import { DateTime } from 'luxon';

            const VALID_UNITS = ['year', 'month', 'week', 'day', 'hour', 'minute', 'second'];
            if (!VALID_UNITS.includes(unit)) {
              throw new Error(`Invalid date unit: ${unit}`);
            }
            const end = DateTime.now().endOf(unit);

        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L1769"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimeendof"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: DateTime.min
    import_path: "luxon"
    description: >
      Returns the earliest of several DateTime objects. THROWS InvalidArgumentError if any
      argument is not a DateTime instance. Used in date range validation and scheduling
      logic. Common mistake: passing a raw Date object, a timestamp number, or a plain
      object instead of a DateTime instance.
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 2297-2300:
      #   if (!dateTimes.every(DateTime.isDateTime)) {
      #     throw new InvalidArgumentError("min requires all arguments be DateTimes");
      #   }
      - id: min-non-datetime-throws
        condition: >
          Any argument is not a luxon DateTime instance. Common mistakes:
          - Passing a JavaScript Date object (use DateTime.fromJSDate(d) first)
          - Passing a millisecond timestamp (use DateTime.fromMillis(ms) first)
          - Passing null or undefined (e.g., from an optional date field)
          - Mixing luxon DateTime with dates from other libraries (moment, dayjs)
          Note: DateTime.min() with zero arguments returns undefined (no throw).
        throws: "InvalidArgumentError: min requires all arguments be DateTimes"
        required_handling: >
          Ensure all arguments are luxon DateTime instances:

            import { DateTime } from 'luxon';

            // WRONG — throws for JS Date or non-DateTime arguments
            const earliest = DateTime.min(date1, new Date(), timestamp);

            // CORRECT — convert JS Dates first
            const dtArray = [date1, jsDate, ts].map(d => {
              if (DateTime.isDateTime(d)) return d;
              if (d instanceof Date) return DateTime.fromJSDate(d);
              if (typeof d === 'number') return DateTime.fromMillis(d);
              throw new Error(`Cannot convert to DateTime: ${d}`);
            });
            const earliest = DateTime.min(...dtArray);

        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L2297"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimemin"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: DateTime.max
    import_path: "luxon"
    description: >
      Returns the latest of several DateTime objects. THROWS InvalidArgumentError if any
      argument is not a DateTime instance. Identical throw behavior to DateTime.min().
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 2309-2312:
      #   if (!dateTimes.every(DateTime.isDateTime)) {
      #     throw new InvalidArgumentError("max requires all arguments be DateTimes");
      #   }
      - id: max-non-datetime-throws
        condition: >
          Any argument is not a luxon DateTime instance. Same causes as min-non-datetime-throws.
          Note: DateTime.max() with zero arguments returns undefined (no throw).
        throws: "InvalidArgumentError: max requires all arguments be DateTimes"
        required_handling: >
          Same as DateTime.min() — ensure all arguments are luxon DateTime instances before passing.

            import { DateTime } from 'luxon';

            // WRONG — throws if any date is a JS Date object or null
            const latest = DateTime.max(dt1, jsDate, null);

            // CORRECT
            const latest = DateTime.max(...validDateTimes.filter(DateTime.isDateTime));

        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L2309"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimemax"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: DateTime.set
    import_path: "luxon"
    description: >
      Returns a new DateTime with specified units changed. Commonly used to override
      specific date/time components (e.g., `.set({ hour: 0 })` for start-of-day).
      THROWS ConflictingSpecificationError when mixing mutually exclusive calendar
      field sets — same restriction as fromObject(). When called on an Invalid
      DateTime, returns the Invalid DateTime unchanged (no throw).
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js lines 1630-1636:
      #   if ((containsGregor || containsOrdinal) && definiteWeekDef) {
      #     throw new ConflictingSpecificationError("Can't mix weekYear/weekNumber units with year/month/day or ordinals")
      #   }
      #   if (containsGregorMD && containsOrdinal) {
      #     throw new ConflictingSpecificationError("Can't mix ordinal dates with month/day")
      #   }
      - id: set-conflicting-specification
        condition: >
          The values object mixes mutually exclusive calendar field sets. Two patterns that throw:
          1. weekYear or weekNumber is combined with year, month, day, or ordinal
          2. ordinal (day-of-year) is combined with month or day
          Note: Mixing ISO weekday fields (weekday) with localWeekday also throws
          (not supported). When called on an Invalid DateTime, returns Invalid — no throw.
        throws: >
          ConflictingSpecificationError: "Can't mix weekYear/weekNumber units with year/month/day or ordinals"
          or "Can't mix ordinal dates with month/day"
        required_handling: >
          Use only one calendar system per set() call:

            import { DateTime } from 'luxon';

            // WRONG — mixes ISO week date with Gregorian — throws ConflictingSpecificationError
            dt.set({ weekYear: 2023, weekNumber: 5, month: 2 });

            // WRONG — mixes ordinal with month/day
            dt.set({ ordinal: 45, month: 2, day: 14 });

            // CORRECT — change Gregorian fields only
            dt.set({ year: 2023, month: 2, day: 1 });

            // CORRECT — change ISO week date fields only
            dt.set({ weekYear: 2023, weekNumber: 5, weekday: 1 });

          This throws synchronously and will crash route handlers without try-catch.
          Less common than fromObject() conflicts but dangerous when building date
          manipulation utilities where the field set is determined at runtime.
        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L1630"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimeset"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: DateTime.diff
    import_path: "luxon"
    description: >
      Returns the difference between two DateTimes as a Duration. Accepts a unit
      string or array of unit strings (e.g., 'hours', 'days', ['months', 'days']).
      THROWS InvalidUnitError when passed an unrecognized unit string — same
      restriction as startOf()/endOf(). Used heavily in SaaS for subscription
      period calculations, billing intervals, and reporting dashboards.
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 2162:
      #   const units = maybeArray(unit).map(Duration.normalizeUnit)
      # Duration.normalizeUnit() at src/duration.js line 421:
      #   if (!normalized) throw new InvalidUnitError(unit)
      # This means diff() throws InvalidUnitError for any unrecognized unit string
      - id: diff-invalid-unit
        condition: >
          The unit argument (or any element of a unit array) is not a recognized luxon
          unit string. Valid units are: 'years', 'quarters', 'months', 'weeks', 'days',
          'hours', 'minutes', 'seconds', 'milliseconds' (singular forms also accepted).
          Common mistakes: 'date' (use 'day'), 'min' (use 'minute'), 'secs' (use 'second'),
          passing a moment.js or date-fns unit name that differs from luxon's vocabulary.
          Note: If either DateTime is invalid, diff() returns an invalid Duration — no throw.
        throws: "InvalidUnitError: Invalid unit <unit>"
        required_handling: >
          Always use valid luxon unit strings. Validate dynamically-sourced unit strings:

            import { DateTime } from 'luxon';

            // WRONG — throws if unit is 'date', 'min', or any unrecognized string
            const duration = start.diff(end, userSelectedUnit);

            // CORRECT — validate against known unit list
            const VALID_DIFF_UNITS = ['years', 'months', 'weeks', 'days', 'hours', 'minutes', 'seconds', 'milliseconds'];
            if (!VALID_DIFF_UNITS.includes(unit)) {
              throw new Error(`Invalid diff unit: ${unit}`);
            }
            const duration = start.diff(end, unit);

            // CORRECT — use multiple units safely
            const duration = start.diff(end, ['months', 'days']);

        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L2155"
          - "https://moment.github.io/luxon/api-docs/index.html#datetimediff"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: Duration.fromObject
    import_path: "luxon"
    description: >
      Creates a Duration from a JavaScript object with keys like { hours: 2, minutes: 30 }.
      THROWS InvalidArgumentError when passed null or a non-object — a developer error.
      This commonly occurs when duration configuration is loaded from a config file or
      API response where the expected key is missing (resolves to undefined/null).
    postconditions:
      # Evidence: node_modules/luxon/src/duration.js lines 289-295:
      #   if (obj == null || typeof obj !== "object") {
      #     throw new InvalidArgumentError(
      #       `Duration.fromObject: argument expected to be an object, got ${
      #         obj === null ? "null" : typeof obj
      #       }`
      #     );
      #   }
      - id: duration-fromobject-non-object-throws
        condition: >
          The obj argument is null, undefined, a string, a number, or any non-object value.
          Common causes:
          - Config value is missing: `Duration.fromObject(config.retryDelay)` where config
            key is absent (resolves to undefined)
          - API response field is null: `Duration.fromObject(data.duration)` when duration
            is not set
          - Passing a Duration instance (not a plain object) — this is allowed
          - Passing a number of milliseconds — this is NOT allowed (use Duration.fromMillis())
        throws: >
          InvalidArgumentError: "Duration.fromObject: argument expected to be an object, got null"
          or "...got undefined" or "...got number" etc.
        required_handling: >
          Validate or default the argument before calling Duration.fromObject():

            import { Duration } from 'luxon';

            // WRONG — throws if config.delay is undefined or null
            const delay = Duration.fromObject(config.delay);

            // CORRECT — validate first
            if (!config.delay || typeof config.delay !== 'object') {
              throw new Error('Missing or invalid duration configuration');
            }
            const delay = Duration.fromObject(config.delay);

            // ALSO CORRECT — provide a fallback
            const delay = Duration.fromObject(config.delay ?? { milliseconds: 1000 });

          Note: Use Duration.fromMillis() for numeric values, not fromObject().
        sources:
          - "https://github.com/moment/luxon/blob/master/src/duration.js#L289"
          - "https://moment.github.io/luxon/api-docs/index.html#durationfromobject"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

edge_cases:
  - id: invalid-date-propagation
    description: >
      Invalid DateTime objects propagate silently through luxon's transformation methods
      (plus, minus, setZone, startOf, endOf, etc.) — these return another Invalid DateTime
      rather than throwing. The crash happens when code paths expect a valid DateTime and
      skip isValid checks. Pattern: fromISO(badInput).startOf('month') returns Invalid DateTime
      with no warning; subsequent .toISO() call returns null, causing silent data corruption.
    sources:
      - "https://moment.github.io/luxon/#/validity"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: settings-throw-on-invalid
    description: >
      Setting Settings.throwOnInvalid = true globally changes all luxon parse methods to
      THROW instead of returning Invalid DateTime objects. This means fromISO, fromFormat,
      fromObject, etc. all throw InvalidDateTimeError on bad input when this flag is set.
      If this flag is enabled in a shared module (e.g., in a framework's setup code),
      all downstream luxon calls need try-catch. Check library code and framework settings
      before assuming the returns-invalid pattern.
      Source: settings.js line 166: throwOnInvalid setter; datetime.js line 1041-1042:
        if (Settings.throwOnInvalid) throw new InvalidDateTimeError(invalid)
    sources:
      - "https://github.com/moment/luxon/blob/master/src/settings.js#L166"
      - "https://moment.github.io/luxon/api-docs/index.html#settings"
    severity: error
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

notes:
  - "luxon uses returns-invalid-object pattern by default — fromISO/fromFormat/fromHTTP/etc. return dt.isValid=false, NOT throw"
  - "EXCEPTION: fromMillis() and fromSeconds() THROW for non-number (not typeof check on string '123')"
  - "EXCEPTION: fromObject() THROWS ConflictingSpecificationError for mixed calendar systems"
  - "EXCEPTION: fromFormat() THROWS if text or format argument is undefined"
  - "EXCEPTION: startOf()/endOf() THROW InvalidUnitError for unrecognized unit strings"
  - "EXCEPTION: min()/max() THROW if any argument is not a DateTime instance"
  - "EXCEPTION: set() THROWS ConflictingSpecificationError for mixed calendar systems (same as fromObject)"
  - "EXCEPTION: diff() THROWS InvalidUnitError for unrecognized unit strings (via Duration.normalizeUnit)"
  - "EXCEPTION: Duration.fromObject() THROWS InvalidArgumentError for null/non-object input"
  - "Settings.throwOnInvalid=true changes ALL parse methods to throw — check framework/lib setup"
  - "NaN is typeof 'number' in JavaScript — fromMillis(NaN) does NOT throw, returns Invalid DateTime"
  - "Out-of-range timestamps (beyond ±8.64e15 ms) return Invalid DateTime — no throw"
  - "Effective coverage: 13 error-contractable functions / 13 = 100%"
  - "12 omitted functions: returns-invalid pattern with no throw contract (fromJSDate, fromISO et al.), deprecated fromString, and read-only format methods (toISO, toFormat returning string or null)"

