# Depth pass 2026-06-12 (deepen-stream-1 pass 2):
# API surface re-enumerated against luxon@3.7.2 — previous pass underestimated total
# error-contractable surface; this pass added 5 throw-bearing methods previously missed.
#
# Depth pass 2026-06-23 (deepen-stream-2 pass 10):
# Re-walked the Interval and Duration surfaces against luxon@3.7.2 and found 7 more
# throw-bearing methods that the previous pass missed. All are high-frequency in SaaS
# code (analytics groupBy units, billing-period calculations, duration arithmetic
# from config/URL params). All verified empirically in node_modules/luxon/src/.
#
# Cumulative API surface (now correctly counted): 37 callable functions/methods;
# 27 with distinct error contracts; 10 are returns-invalid / no-throw utilities.
# Contracted before this pass: 20
# Contracted after this pass:  27 (+7 new — see additions below)
#
# NEW additions this pass (all throw-bearing, all common in SaaS code, all verified
# empirically against luxon@3.7.2 in oss-pr-forks/17-pr-misskey/.../luxon@3.7.2):
#   - DateTime.hasSame   — throws InvalidUnitError via startOf → normalizeUnit
#   - Duration.plus      — throws InvalidArgumentError via fromDurationLike on string/null/etc
#   - Duration.minus     — same throw profile as Duration.plus
#   - Duration.set       — throws InvalidUnitError via normalizeObject → normalizeUnit
#   - Interval.length    — throws InvalidUnitError via toDuration().get() → normalizeUnit
#   - Interval.count     — throws InvalidUnitError via startOf → normalizeUnit
#   - Interval.toDuration — throws InvalidUnitError via diff → normalizeUnit
#
# Empirical verification (luxon@3.7.2, all from /tmp/claude/test_luxon.mjs):
#   DateTime.now().hasSame(DateTime.now(), 'garbage')          → InvalidUnitError: Invalid unit garbage
#   Duration.fromObject({hours:1}).plus('1d')                  → InvalidArgumentError: Unknown duration argument 1d of type string
#   Duration.fromObject({hours:1}).minus('1d')                 → InvalidArgumentError: Unknown duration argument 1d of type string
#   Duration.fromObject({hours:1}).set({garbage:5})            → InvalidUnitError: Invalid unit garbage
#   Interval.fromDateTimes(a,b).length('garbage')              → InvalidUnitError: Invalid unit garbage
#   Interval.fromDateTimes(a,b).count('garbage')               → InvalidUnitError: Invalid unit garbage
#   Interval.fromDateTimes(a,b).toDuration('garbage')          → InvalidUnitError: Invalid unit garbage
#
# Intentionally omitted: 10 functions (returns-invalid pattern with no throw contract,
# or read-only utilities with no error contract beyond standard JS):
#   — fromJSDate, fromString (deprecated), local, utc, now (returns-invalid / no-error)
#     fromFormatParser, buildFormatParser (locale-mismatch niche, rarely called directly)
#     toISO, toISODate, toRelative, toRelativeCalendar (return null on invalid, no throw)
#     Duration.fromISO, Duration.fromISOTime (returns invalid, no throw)
#     Interval.fromDateTimes, Interval.fromISO (returns invalid, no throw)
#
# Coverage: 27/37 = 0.73 (was 20/30 = 0.67 — denominator grew because previous pass
