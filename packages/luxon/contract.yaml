package: luxon
semver: ">=3.2.1"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-04-02"
status: production
evidence_quality: confirmed
priority: low
# Note: 0 violations across 13 repos in scan-luxon-2026-04-02.json — luxon uses
# returns-invalid-object pattern (dt.isValid=false) rather than throws, so scanner
# does not fire on this package. Postconditions are documentation-confirmed.

functions:
  - name: DateTime.fromISO
    import_path: "luxon"
    description: "Parses an ISO 8601 date string into a DateTime object"
    postconditions:
      - id: fromiso-invalid-date
        condition: "input string is not a valid ISO 8601 format"
        returns: "Invalid DateTime object (dt.isValid is false, dt.invalidReason contains error)"
        required_handling: >
          Caller MUST check isValid property before using the DateTime object.
          Invalid DateTime objects contain error information in invalidReason and invalidExplanation.
          Without validation, invalid dates cause calculation errors, display issues, or data corruption.
          Use pattern: const dt = DateTime.fromISO(input); if (!dt.isValid) { console.error(dt.invalidReason); }
        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromiso"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromFormat
    import_path: "luxon"
    description: "Parses a date string using a specified format"
    postconditions:
      - id: fromformat-invalid-date
        condition: "input string does not match the specified format"
        returns: "Invalid DateTime object (dt.isValid is false, dt.invalidReason contains error)"
        required_handling: >
          Caller MUST check isValid property after parsing.
          Invalid DateTime objects indicate parsing failure but do not throw.
          Use pattern: const dt = DateTime.fromFormat(input, format); if (!dt.isValid) { /* handle */ }
        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromformat"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromSQL
    import_path: "luxon"
    description: "Parses a SQL date/datetime string"
    postconditions:
      - id: fromsql-invalid-date
        condition: "input string is not a valid SQL date format"
        returns: "Invalid DateTime object (dt.isValid is false)"
        required_handling: >
          Caller MUST check isValid property.
          Invalid SQL dates can cause database query errors and data corruption.
          Use pattern: const dt = DateTime.fromSQL(input); if (!dt.isValid) { /* handle */ }
        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromsql"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromHTTP
    import_path: "luxon"
    description: "Parses an HTTP header date string (RFC 2822/1123)"
    postconditions:
      - id: fromhttp-invalid-date
        condition: "input string is not a valid HTTP date format"
        returns: "Invalid DateTime object (dt.isValid is false)"
        required_handling: >
          Caller MUST check isValid property.
          Invalid HTTP dates can cause caching errors and incorrect header processing.
          Use pattern: const dt = DateTime.fromHTTP(input); if (!dt.isValid) { /* handle */ }
        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromhttp"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromRFC2822
    import_path: "luxon"
    description: "Parses an RFC 2822 date string"
    postconditions:
      - id: fromrfc2822-invalid-date
        condition: "input string is not a valid RFC 2822 format"
        returns: "Invalid DateTime object (dt.isValid is false)"
        required_handling: >
          Caller MUST check isValid property.
          Use pattern: const dt = DateTime.fromRFC2822(input); if (!dt.isValid) { /* handle */ }
        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromrfc2822"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        security_notes: >
          CVE-2023-22467: Versions <1.28.1, <2.5.2, <3.2.1 vulnerable to ReDoS attack with inputs >10k chars.
          This method has quadratic (N^2) complexity on specific inputs causing denial of service.
          Patched in 1.28.1, 2.5.2, and 3.2.1. Always validate and limit input length.

  - name: DateTime.fromObject
    import_path: "luxon"
    description: "Creates a DateTime from an object with date/time properties"
    postconditions:
      - id: fromobject-invalid-date
        condition: "object contains invalid date values (e.g., month 13, day 400)"
        returns: "Invalid DateTime object (dt.isValid is false)"
        required_handling: >
          Caller MUST check isValid property.
          Invalid calendar values (February 30, 25:00, month 13) produce invalid DateTimes.
          Use pattern: const dt = DateTime.fromObject({year, month, day}); if (!dt.isValid) { /* handle */ }
        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromobject"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

# Category: utilities
# npm: https://www.npmjs.com/package/luxon
# Repository: https://github.com/moment/luxon
# Note: Modern date library by moment.js team, immutable, timezone-aware
# Security: CVE-2023-22467 (ReDoS in fromRFC2822) - use patched versions only
