edge_cases:
  - id: invalid-date-propagation
    description: >
      Invalid DateTime objects propagate silently through luxon's transformation methods
      (plus, minus, setZone, startOf, endOf, etc.) — these return another Invalid DateTime
      rather than throwing. The crash happens when code paths expect a valid DateTime and
      skip isValid checks. Pattern: fromISO(badInput).startOf('month') returns Invalid DateTime
      with no warning; subsequent .toISO() call returns null, causing silent data corruption.
    sources:
      - "https://moment.github.io/luxon/#/validity"
    severity: warning
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

  - id: settings-throw-on-invalid
    description: >
      Setting Settings.throwOnInvalid = true globally changes all luxon parse methods to
      THROW instead of returning Invalid DateTime objects. This means fromISO, fromFormat,
      fromObject, etc. all throw InvalidDateTimeError on bad input when this flag is set.
      If this flag is enabled in a shared module (e.g., in a framework's setup code),
      all downstream luxon calls need try-catch. Check library code and framework settings
      before assuming the returns-invalid pattern.
      Source: settings.js line 166: throwOnInvalid setter; datetime.js line 1041-1042:
        if (Settings.throwOnInvalid) throw new InvalidDateTimeError(invalid)
    sources:
      - "https://github.com/moment/luxon/blob/master/src/settings.js#L166"
      - "https://moment.github.io/luxon/api-docs/index.html#settings"
    severity: error
    business_impact:
      incident_label: DOWNTIME
      production_behavior: immediate_exception
      visibility: visible
      user_experience: service_unavailable
      incident_cost_range: medium

notes:
  - "luxon uses returns-invalid-object pattern by default — fromISO/fromFormat/fromHTTP/etc. return dt.isValid=false, NOT throw"
  - "EXCEPTION: fromMillis() and fromSeconds() THROW for non-number (not typeof check on string '123')"
  - "EXCEPTION: fromObject() THROWS ConflictingSpecificationError for mixed calendar systems"
  - "EXCEPTION: fromFormat() THROWS if text or format argument is undefined"
  - "EXCEPTION: startOf()/endOf() THROW InvalidUnitError for unrecognized unit strings"
  - "EXCEPTION: min()/max() THROW if any argument is not a DateTime instance"
  - "EXCEPTION: set() THROWS ConflictingSpecificationError for mixed calendar systems (same as fromObject)"
  - "EXCEPTION: diff() THROWS InvalidUnitError for unrecognized unit strings (via Duration.normalizeUnit)"
  - "EXCEPTION: plus()/minus() THROW InvalidArgumentError for non-Duration / string / null input (via Duration.fromDurationLike)"
  - "EXCEPTION: hasSame() THROWS InvalidUnitError for unrecognized unit strings (via startOf → normalizeUnit)"
  - "EXCEPTION: Duration.fromObject() THROWS InvalidArgumentError for null/non-object input"
  - "EXCEPTION: Duration.plus()/minus() THROW InvalidArgumentError for non-Duration / string / null input (via fromDurationLike, same code path as DateTime.plus/minus)"
  - "EXCEPTION: Duration.set() THROWS InvalidUnitError when values object contains an unrecognized unit key (via normalizeObject)"
  - "EXCEPTION: Duration.shiftTo()/as()/get() THROW InvalidUnitError for unrecognized unit strings"
  - "EXCEPTION: Interval.length()/count()/toDuration() THROW InvalidUnitError for unrecognized unit strings (via startOf/diff → normalizeUnit). Invalid Interval returns NaN/Invalid Duration — only valid Interval with bad unit throws."
  - "Settings.throwOnInvalid=true changes ALL parse methods to throw — check framework/lib setup"
  - "NaN is typeof 'number' in JavaScript — fromMillis(NaN) does NOT throw, returns Invalid DateTime"
  - "dt.plus(NaN) DOES throw 'Invalid unit value NaN' — different code path than fromMillis(NaN)"
  - "Out-of-range timestamps (beyond ±8.64e15 ms) return Invalid DateTime — no throw"
  - "Effective coverage: 27 error-contractable functions / 27 = 100%"
  - "10 omitted functions: returns-invalid pattern with no throw contract (fromJSDate, fromISO et al.), deprecated fromString, and read-only format methods (toISO, toFormat returning string or null)"

