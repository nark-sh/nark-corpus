detection:
  type_names:
    - DateTime
    - Duration
    - Interval
    - Settings

functions:
  - name: DateTime.fromISO
    import_path: "luxon"
    description: >
      Parses an ISO 8601 date string into a DateTime object. Does NOT throw on invalid input —
      it returns an Invalid DateTime (dt.isValid === false). Callers who skip the isValid check
      and pass the result to calculations or formatting methods will encounter silent data
      corruption or downstream errors. Common in SaaS when processing timestamps from APIs,
      databases, or user input.
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js — fromISO delegates to parseISODate
      # Invalid input returns DateTime.invalid(reason) which sets isValid=false, NOT throws
      # Note: Settings.throwOnInvalid changes this behavior globally (see Settings entry below)
      - id: fromiso-invalid-date
        condition: "input string is not a valid ISO 8601 format"
        returns: "Invalid DateTime object (dt.isValid is false, dt.invalidReason contains error)"
        required_handling: >
          Caller MUST check isValid property before using the DateTime object.
          Invalid DateTime objects contain error information in invalidReason and invalidExplanation.
          Without validation, invalid dates cause calculation errors, display issues, or data corruption.

            import { DateTime } from 'luxon';

            const dt = DateTime.fromISO(apiResponse.timestamp);
            if (!dt.isValid) {
              throw new Error(`Invalid ISO timestamp: ${dt.invalidReason}`);
            }
            // Safe to use dt now

          Do NOT pass Invalid DateTimes to formatting, diff, or arithmetic methods without checking isValid.
        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromiso"
          - "https://github.com/moment/luxon/blob/master/src/datetime.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromFormat
    import_path: "luxon"
    description: >
      Parses a date string using a specified format token string. Returns an Invalid DateTime
      for format mismatches (no throw). However, THROWS InvalidArgumentError if either the
      text or format argument is undefined/null — developer error. Used when parsing user-provided
      date strings with custom formats.
    postconditions:
      # Evidence: node_modules/luxon/src/datetime.js line 978:
      #   throw new InvalidArgumentError("fromFormat requires an input string and a format")
      # This is thrown when either text or fmt is undefined (not when text doesn't match fmt)
      - id: fromformat-missing-args
        condition: >
          Either the text argument or the format argument is undefined or null. This is a
          developer error — not a user input error. Common when the format argument comes
          from a variable that was not properly initialized.
        throws: "InvalidArgumentError: fromFormat requires an input string and a format"
        required_handling: >
          Always ensure both arguments are non-null strings before calling fromFormat():

            import { DateTime } from 'luxon';

            // WRONG — throws if format is undefined
            const dt = DateTime.fromFormat(userInput, formatFromConfig);  // crashes if config missing

            // CORRECT — validate arguments first
            if (!formatFromConfig) {
              throw new Error('Date format configuration is missing');
            }
            const dt = DateTime.fromFormat(userInput, formatFromConfig);

          This is thrown synchronously, so it will crash any route handler without try-catch.
        sources:
          - "https://github.com/moment/luxon/blob/master/src/datetime.js#L978"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

      # Evidence: fromFormat returns DateTime.invalid() on parse failure — NOT throws
      - id: fromformat-invalid-date
        condition: "input string does not match the specified format"
        returns: "Invalid DateTime object (dt.isValid is false, dt.invalidReason contains error)"
        required_handling: >
          Caller MUST check isValid property after parsing.
          Invalid DateTime objects indicate parsing failure but do not throw.

            import { DateTime } from 'luxon';

            const dt = DateTime.fromFormat(userInput, 'MM/dd/yyyy');
            if (!dt.isValid) {
              return res.status(400).json({ error: `Invalid date: ${dt.invalidReason}` });
            }

        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromformat"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: DateTime.fromSQL
    import_path: "luxon"
    description: "Parses a SQL date/datetime string. Returns Invalid DateTime on parse failure — does not throw."
    postconditions:
      # Evidence: fromSQL delegates to fromFormat with SQL token format — returns invalid on failure
      - id: fromsql-invalid-date
        condition: "input string is not a valid SQL date format"
        returns: "Invalid DateTime object (dt.isValid is false)"
        required_handling: >
          Caller MUST check isValid property.
          Invalid SQL dates can cause database query errors and data corruption.

            import { DateTime } from 'luxon';
            const dt = DateTime.fromSQL(input);
            if (!dt.isValid) { throw new Error(`Invalid SQL date: ${dt.invalidReason}`); }

        sources:
          - "https://moment.github.io/luxon/api-docs/index.html#datetimefromsql"
        severity: warning
        business_impact:
