# image-size — Universal image dimensions reader for Node.js.
# Supports 20+ formats: BMP, GIF, HEIF/AVIF, ICO, ICNS, JPEG, JXL, KTX, PNG,
# PNM, PSD, SVG, TIFF/BigTIFF, TGA, WebP, DDS, J2C, JP2.
# imageSize(buffer) is synchronous; imageSizeFromFile(path) is async.
# Neither function is safe to call without try-catch.
#
# Depth pass 2026-04-17 (deepen-stream-2 pass 3):
# API surface: 4 exported functions (2 intentionally omitted: disableTypes, setConcurrency)
# Contracted before: 2 functions, 4 postconditions (missing empty-file + corrupt-image on async path)
# Contracted after:  2 functions, 6 postconditions (+2: empty-file, corrupt-image on imageSizeFromFile)
# Omitted: 2 (disableTypes — config-only, no throws; setConcurrency — config-only, no throws)
# Coverage: 2/2 non-omitted = 1.00 (was 0.50 raw due to 2 missing postconditions)
# Evidence sources confirmed from:
#   node_modules/image-size/dist/fromFile.cjs — explicit throw new Error("Empty file")
#   https://github.com/image-size/image-size/blob/main/lib/fromFile.ts — confirmed source
#   https://github.com/image-size/image-size/issues (PR #69, PR #453) — empty-file bug history
package: "image-size"
semver: ">=1.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-17"
status: production
evidence_quality: confirmed
coverage_score: 1.00  # 2 contracted / 2 non-omitted async-callable functions

functions:
  - name: imageSize
    import_path: "image-size"
    description: "Synchronously get dimensions of an image from a Uint8Array/Buffer"

    postconditions:
      # Evidence: seen in 3 primary firings across 2 repos in scan-image-size-2026-04-03.json
      # Top affected: koishijs/novelai-bot (⭐ 2539 stars), spacebarchat/server (⭐ 2124 stars)
      - id: unsupported-format
        condition: "Image format is unsupported or buffer is not a recognized image format"
        throws: "TypeError ('unsupported file type: ...' or 'disabled file type: ...')"
        required_handling: "Caller MUST wrap imageSize() in try-catch as it throws synchronously on unrecognized formats."
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - https://github.com/image-size/image-size/blob/main/lib/index.ts

      # Evidence: seen as subViolation in 3 primary firings across 2 repos in scan-image-size-2026-04-03.json
      # Top affected: koishijs/novelai-bot (⭐ 2539 stars), spacebarchat/server (⭐ 2124 stars)
      - id: corrupt-image
        condition: "Buffer contains corrupt or truncated image data"
        throws: "TypeError ('Corrupt JPG', 'Invalid PNG', etc.)"
        required_handling: "Caller MUST wrap imageSize() in try-catch as it throws on corrupt image data."
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - https://github.com/image-size/image-size/blob/main/lib/index.ts

  - name: imageSizeFromFile
    import_path: "image-size/fromFile"
    description: "Asynchronously get image dimensions from a file path"

    postconditions:
      - id: file-not-found
        condition: "File path does not exist or cannot be read"
        throws: "Error (ENOENT, EACCES)"
        required_handling: "Caller MUST wrap imageSizeFromFile() in try-catch as it rejects on file system errors."
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - https://github.com/image-size/image-size/blob/main/lib/fromFile.ts

      - id: unsupported-format
        condition: "File is not a recognized image format"
        throws: "TypeError ('unsupported file type: ...')"
        required_handling: "Caller MUST wrap imageSizeFromFile() in try-catch as it rejects on unrecognized image formats."
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - https://github.com/image-size/image-size/blob/main/lib/index.ts

      # Evidence: confirmed from node_modules/image-size/dist/fromFile.cjs source inspection
      # throw new Error("Empty file") when size <= 0 (line: if (size <= 0) { throw new Error("Empty file"); })
      # Also confirmed via GitHub PR #69: "Bug fix: when file size is 0, binding.read: Offset is out of bound"
      # Common in upload pipelines: file written but flushing incomplete, or upload slot reserved before data arrives
      - id: empty-file
        condition: "File exists at the given path but has zero bytes (size <= 0)"
        throws: "Error ('Empty file')"
        required_handling: >
          Caller MUST wrap imageSizeFromFile() in try-catch. An empty file rejects with
          Error('Empty file'), which is distinct from ENOENT (file missing) and from
          TypeError (unsupported format). Upload pipelines that check file existence
          before dimensions must also guard against the file being zero-length.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - https://github.com/image-size/image-size/blob/main/lib/fromFile.ts
          - https://github.com/image-size/image-size/issues?q=empty+file

      # Evidence: confirmed from node_modules/image-size/dist/fromFile.cjs — imageSizeFromFile()
      # delegates to imageSize(buffer) after reading file bytes. imageSize() throws TypeError on
      # corrupt data: 'Corrupt JPG, exceeded buffer limits', 'Invalid PNG', 'Invalid WebP', etc.
      # The async wrapper re-throws these as rejection without wrapping in a different error type.
      # This is distinct from file-not-found (ENOENT) — the file exists but data is malformed.
      - id: corrupt-image-async
        condition: "File exists and is readable but contains corrupt or malformed image data"
        throws: "TypeError (e.g. 'Corrupt JPG, exceeded buffer limits', 'Invalid PNG', 'Invalid WebP', etc.)"
        required_handling: >
          Caller MUST wrap imageSizeFromFile() in try-catch. When the file contains corrupt
          image data, the async wrapper rejects with the same TypeError thrown by the
          synchronous imageSize() parser. Callers checking only for ENOENT/EACCES will
          miss format corruption errors from user-uploaded files.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        sources:
          - https://github.com/image-size/image-size/blob/main/lib/fromFile.ts
          - https://github.com/image-size/image-size/blob/main/lib/index.ts
