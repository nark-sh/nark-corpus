package: winston
semver: ">=3.0.0 <4.0.0"
contract_version: "1.3.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 0.89
# Evidence: 6 repos scanned in scan-winston-2026-04-04.json, 2 affected (33%), 2 violations
# Top affected: seerr-team/seerr, santiq/bulletproof-nodejs
# All violations are createLogger() without .on('error') listener
# FP check: 0/50 repos false-positive-free. FP rate 0%. Confirmed evidence quality.

detection:
  factory_methods:
    - createLogger
  require_instance_tracking: true
  required_event_listeners:
    - event: error
      required: true
      severity: warning

functions:
  - name: createLogger
    import_path: "winston"
    description: "Creates a Winston logger instance. If no 'error' event listener is attached, transport failures (file ENOSPC, EACCES, network errors) are silently swallowed."
    postconditions:
      # Evidence: seen in 2 primary firings across 2 repos in scan-winston-2026-04-04.json
      # Top affected: seerr-team/seerr, santiq/bulletproof-nodejs
      - id: missing-error-listener
        condition: "createLogger() called without .on('error', handler) registered on the returned logger instance"
        returns: "logger instance that silently swallows transport errors without error listener"
        required_handling: >
          Caller MUST attach an 'error' event listener to the logger instance immediately after createLogger().
          Without it, transport failures (file system full, permission denied, network transport errors)
          are silently lost and logs may be dropped. Use: logger.on('error', (err) => { ... }).
          Source: Winston README — "the logger also emits an 'error' event if an error occurs within
          the logger itself which you should handle or suppress"
        sources:
          - "https://github.com/winstonjs/winston#readme"
          - "https://github.com/winstonjs/winston/blob/master/README.md"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: query
    import_path: "winston"
    description: >
      Queries all transport backends for stored log entries. Errors from individual
      transport queries are passed to the callback as the first argument. If no
      transports support querying, the callback is invoked with an empty results
      object — not an error. Used for log retrieval UIs and monitoring dashboards.
    postconditions:
      # Evidence: logger.js source — transport.query(options, (err, res) => { if (err) { return next(err); } })
      # Source confirmed: https://github.com/winstonjs/winston/blob/master/lib/winston/logger.js
      - id: query-unhandled-callback-error
        condition: >
          logger.query() callback receives err as first argument when any transport query
          fails (e.g. File transport ENOENT/EACCES on log read, or transport does not
          support query method). Callers that omit the err check silently receive null/undefined results.
        required_handling: >
          Caller MUST check the first argument to the callback: if (err) { handle or rethrow }.
          Ignoring err causes silent failures in log monitoring dashboards and audit UIs.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/logger.js"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: "transports.File"
    import_path: "winston"
    description: >
      Creates a File transport that writes log entries to disk. Constructor throws
      synchronously on conflicting or missing options. File write errors and rotation
      failures are emitted as 'error' events on the transport instance, not on the logger.
      Without a per-transport error listener, rotation and write failures are silently lost.
    postconditions:
      # Evidence: file.js source — this._onError attached to dest streams; constructor throws on bad opts
      # Source confirmed: https://github.com/winstonjs/winston/blob/master/lib/winston/transports/file.js
      - id: file-transport-missing-per-transport-error-listener
        condition: >
          new transports.File() created without transport.on('error', handler). Filesystem
          errors (ENOSPC disk full, EACCES permission denied, ENOENT missing directory) during
          log writes are emitted on the transport instance itself — NOT on the parent logger.
          A logger.on('error') listener does not catch transport-level errors.
        required_handling: >
          After creating a File transport, attach: transport.on('error', (err) => { ... }).
          This is separate from and required in addition to logger.on('error'). Without it,
          log file write failures are silently lost and logs are dropped without any alert.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/transports/file.js"
          - "https://github.com/winstonjs/winston#readme"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

      - id: file-transport-constructor-throws-on-invalid-options
        condition: >
          new transports.File() called with both 'stream' and 'filename'/'dirname' options
          simultaneously, or with neither a filename nor a stream. Constructor throws
          synchronously. When File transports are created dynamically (per-tenant log files,
          runtime-configured paths), uncaught throws crash the request handler.
        throws: "Error (synchronous, at construction time)"
        required_handling: >
          Wrap dynamic new transports.File() calls in try/catch when filename is derived
          from runtime input. Validate that mutually exclusive options are not passed together.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/transports/file.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: "transports.Http"
    import_path: "winston"
    description: >
      Creates an HTTP transport that POSTs log entries to a remote endpoint (e.g. Loggly,
      custom log aggregator). Network errors during log transmission are emitted as 'warn'
      events on the transport instance, not as 'error' events. Most error handlers only
      listen for 'error', leaving network failures completely unhandled.
    postconditions:
      # Evidence: http.js source — this.emit('warn', err) on request failure, not 'error'
      # Source confirmed: https://github.com/winstonjs/winston/blob/master/lib/winston/transports/http.js
      - id: http-transport-warn-not-error-on-failure
        condition: >
          transports.Http used without a 'warn' event listener. HTTP 4xx/5xx responses and
          connection errors trigger this.emit('warn', err) on the transport — not 'error'.
          Code that only attaches transport.on('error', handler) silently misses all
          network transport failures.
        required_handling: >
          When using Http transport and log delivery reliability matters, attach both:
          transport.on('error', handler) AND transport.on('warn', handler).
          The 'warn' event carries network failures, not 'error'. Omitting the warn
          listener means silent log loss to remote aggregators.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/transports/http.js"
        severity: warning
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: silent_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium

  - name: configure
    import_path: "winston"
    description: >
      Reconfigures an existing logger instance wholesale: resets all transports, applies new
      levels/format/options. Throws synchronously when deprecated winston@2 options
      (colors, emitErrs, formatters, padLevels, rewriters, stripColors) are passed.
      Called internally by the Logger constructor.
    postconditions:
      # Evidence: logger.js source — throw new Error('[...] were removed in winston@3.0.0.')
      # Source confirmed: https://github.com/winstonjs/winston/blob/master/lib/winston/logger.js
      - id: configure-throws-on-v2-options
        condition: >
          logger.configure() or createLogger() called with any of the removed winston@2 options:
          colors, emitErrs, formatters, padLevels, rewriters, stripColors. Throws synchronously
          with "{ colors, emitErrs, formatters, padLevels, rewriters, stripColors } were removed
          in winston@3.0.0." Migration codebases frequently pass both old and new options.
        throws: "Error — deprecated option keys present in configure options object"
        required_handling: >
          Remove all deprecated v2 option keys before passing to createLogger() or configure().
          Use winston.format.* combinators instead of the removed formatters/padLevels/stripColors
          options. Wrap logger initialization in try/catch when config is loaded from external
          sources (env vars, config files) that may contain v2-era options.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/logger.js"
          - "https://github.com/winstonjs/winston/blob/master/UPGRADE-3.0.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: add
    import_path: "winston"
    description: >
      Adds a transport to an existing logger instance. Throws synchronously if the transport
      is not a WritableStream in objectMode. Used when building loggers dynamically or adding
      conditional transports at runtime.
    postconditions:
      # Evidence: logger.js source — throw new Error('Transports must WritableStreams in objectMode.')
      # Source confirmed: https://github.com/winstonjs/winston/blob/master/lib/winston/logger.js
      - id: add-throws-on-non-objectmode-transport
        condition: >
          logger.add() called with a transport that lacks _writableState.objectMode.
          Throws synchronously with "Transports must WritableStreams in objectMode."
          Typically surfaces when using third-party custom transports written for
          winston@2 (non-stream transports) not yet updated for @3.
        throws: "Error — transport is not a WritableStream in objectMode"
        required_handling: >
          Wrap logger.add() in try/catch when transport type is not known at compile time.
          Verify third-party transports extend winston-transport (which sets objectMode: true)
          before dynamically adding them. For per-request transport patterns, validate
          transport instance before calling add().
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/logger.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: cli
    import_path: "winston"
    description: >
      Removed method that was a shorthand for CLI-style log formatting in winston@2.
      Always throws synchronously in winston@3+, regardless of arguments. Commonly
      encountered in projects migrating from winston@2 where the codebase still calls
      logger.cli() during initialization, causing immediate startup failures.
    postconditions:
      # Evidence: logger.js source — cli() unconditionally throws "Logger.cli() was removed in winston@3.0.0"
      # Source confirmed: https://github.com/winstonjs/winston/blob/master/lib/winston/logger.js
      - id: cli-throws-unconditionally
        condition: >
          logger.cli() called on any logger instance in winston@3+. Throws synchronously
          with "Logger.cli() was removed in winston@3.0.0\nUse a custom winston.formats.cli()
          instead." This is a hard migration trap — winston@2 codebases that call
          logger.cli() crash at startup after upgrade.
        throws: "Error — Logger.cli() was removed in winston@3.0.0"
        required_handling: >
          Remove all logger.cli() calls when upgrading from winston@2 to @3. Replace with
          winston.format.cli() composed into the logger's format chain:
            createLogger({ format: winston.format.cli(), transports: [...] }).
          If logger.cli() is called at startup, the synchronous throw will crash the
          process before any error handler can attach. Audit migration paths carefully.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/logger.js"
          - "https://github.com/winstonjs/winston/blob/master/UPGRADE-3.0.md"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

  - name: "exceptions.handle"
    import_path: "winston"
    description: >
      Attaches transports as handlers for the Node.js process-level `uncaughtException`
      event. Without `exceptions.handle()` (or the `handleExceptions: true` option on a
      transport), uncaught exceptions are NOT routed to winston transports — they print
      to stderr and the process exits. Logger.exceptions is an ExceptionHandler instance
      auto-created on every logger. The handler installs a `process.on('uncaughtException', ...)`
      listener that logs to the configured handler transports and then calls process.exit(1)
      based on the logger's `exitOnError` setting (default true, with 3s timeout).
    postconditions:
      # Evidence: exception-handler.js source — process.on('uncaughtException', ...) + process.exit(1)
      # Source confirmed: https://github.com/winstonjs/winston/blob/master/lib/winston/exception-handler.js
      - id: exceptions-handle-installs-process-exit
        condition: >
          logger.exceptions.handle(transport) or createLogger({ exceptionHandlers: [...] }) registers
          a `process.on('uncaughtException', ...)` listener. When an uncaught exception fires, the
          handler logs to the registered transports AND calls process.exit(1) after a 3-second
          timeout (when logger.exitOnError is true, the default). Code that relies on a long-running
          process being kept alive after the log is written will be terminated.
        required_handling: >
          To prevent process termination on uncaught exception while still logging, set
          `exitOnError: false` on the logger options OR pass a function: `exitOnError: (err) => false`.
          For services where reliability matters, prefer setting up domain-specific error boundaries
          (express error middleware, async-context try/catch, AbortController) rather than relying on
          winston's exception handler as a safety net — winston exits the process regardless of
          whether the log write succeeded.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/exception-handler.js"
          - "https://github.com/winstonjs/winston#exceptions"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

      # Evidence: exception-handler.js source — constructor throws "Logger is required to handle exceptions"
      - id: exception-handler-constructor-requires-logger
        condition: >
          new winston.ExceptionHandler() called without a logger argument. Throws synchronously
          with "Logger is required to handle exceptions". Encountered when users build a
          standalone ExceptionHandler outside the auto-created `logger.exceptions` path
          (e.g. shared exception capture across multiple loggers).
        throws: "Error — Logger is required to handle exceptions"
        required_handling: >
          Always pass a valid Logger instance to `new winston.ExceptionHandler(logger)`. The
          idiomatic path is to use the auto-created `logger.exceptions` accessor and call
          `.handle(...transports)` on it — that path is guaranteed to have a logger bound.
          Avoid manual ExceptionHandler construction unless you have a specific multi-logger
          coordination requirement.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/exception-handler.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: "rejections.handle"
    import_path: "winston"
    description: >
      Attaches transports as handlers for the Node.js process-level `unhandledRejection`
      event. Mirrors `exceptions.handle()` but for unhandled Promise rejections — async
      errors that escape every try/catch in a Promise chain. Same exit-on-error semantics
      as the exception handler. Without `rejections.handle()`, unhandled rejections only
      print to stderr; in Node 15+ they ALSO terminate the process (default
      `--unhandled-rejections=throw` mode).
    postconditions:
      # Evidence: rejection-handler.js — process.on('unhandledRejection') + process.exit(1) via gracefulExit
      # Source confirmed: https://github.com/winstonjs/winston/blob/master/lib/winston/rejection-handler.js
      - id: rejections-handle-installs-process-exit
        condition: >
          logger.rejections.handle(transport) or createLogger({ rejectionHandlers: [...] }) registers a
          `process.on('unhandledRejection', ...)` listener. On unhandled rejection, the handler logs
          to the registered transports and calls process.exit(1) after a 3-second timeout when
          `exitOnError` is true (default). Combined with Node 15+'s default `throw` mode on
          unhandled rejections, this means promises that lose their .catch() WILL terminate the
          service — even if the promise itself was fire-and-forget.
        required_handling: >
          Treat unhandled rejection capture as a last-resort observability tool, not a safety net.
          Every async function MUST have explicit error handling at the awaiter / .catch(). If
          you set `rejectionHandlers` to capture telemetry, set `exitOnError: false` to avoid
          terminating long-lived services on a single stray promise. For Express/Koa/Nest stacks,
          rely on framework-provided async error middleware and use `rejections.handle()` only
          to capture the log of last resort.
        sources:
          - "https://github.com/winstonjs/winston/blob/master/lib/winston/rejection-handler.js"
          - "https://github.com/winstonjs/winston#rejections"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: high

edge_cases:
  - id: uncaught-exception-handling
    description: >
      handleExceptions transport option catches uncaught exceptions. exitOnError defaults to true.
      Setting exitOnError: false requires careful handling to avoid masking fatal errors.
    sources:
      - "https://github.com/winstonjs/winston/blob/master/README.md"
    severity: warning
    business_impact:
      incident_label: SILENT_FAILURE
      production_behavior: silent_failure
      visibility: silent
      user_experience: degraded_performance
      incident_cost_range: low

  - id: daily-rotate-file-transport
    description: >
      winston-daily-rotate-file transport emits 'error' events for rotation failures.
      Must also attach error listener to transport instances directly via transport.on('error', ...).
    sources:
      - "https://github.com/winstonjs/winston-daily-rotate-file"
    severity: warning
    business_impact:
      incident_label: SILENT_FAILURE
      production_behavior: silent_failure
      visibility: silent
      user_experience: degraded_performance
      incident_cost_range: low
