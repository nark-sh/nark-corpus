package: "busboy"
semver: ">=1.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-04-16"
status: production
evidence_quality: confirmed
coverage_score: 0.90
# description: "A streaming parser for HTML form data for Node.js"

functions:
  - name: Busboy
    import_path: "busboy"
    description: >
      Creates a Busboy parser instance — a Writable stream that parses incoming
      HTML form data (multipart/form-data and application/x-www-form-urlencoded).
      The factory function is synchronous and can throw immediately if headers are
      invalid. Data is received through event callbacks ('file', 'field') and errors
      arrive via the 'error' event on the returned stream instance.
    postconditions:
      # Evidence: seen in 3 primary firings across 2 repos in scan-busboy-2026-04-02.json
      # Top affected: rejetto/hfs, CaviraOSS/PageLM
      # Source: https://github.com/mscdex/busboy/issues/234 (error handling docs gap)
      - id: busboy-001
        condition: "parsing fails due to limits or malformed data"
        throws: "Error emitted via 'error' event"
        required_handling: "Caller MUST attach error event listener to Busboy instance"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        sources:
          - "https://github.com/mscdex/busboy"

      # Evidence: https://github.com/mscdex/busboy/blob/master/lib/index.js
      # Source confirms three synchronous throw conditions in the factory function:
      #   1. throw new Error('Missing Content-Type') — when headers['content-type'] is missing
      #   2. throw new Error('Malformed content type') — when parseContentType() returns falsy
      #   3. throw new Error(`Unsupported content type: ...`) — when no parser matches
      - id: busboy-002
        condition: "constructor called with invalid or missing Content-Type header"
        throws: "Error (synchronous throw, not an event)"
        error_messages:
          - "Missing Content-Type"
          - "Malformed content type"
          - "Unsupported content type: <type>"
        required_handling: >
          Caller MUST wrap busboy() constructor call in try/catch. These are
          synchronous throws — an error event listener is NOT sufficient to catch them.
          Any request without a valid Content-Type (e.g. GET requests misrouted to a
          POST handler) will crash the process if not caught.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://github.com/mscdex/busboy/blob/master/lib/index.js"
          - "https://github.com/mscdex/busboy/issues/140"

      # Evidence: https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js
      # Source: When limits.parts, limits.files, or limits.fields are hit, a limit event
      # is emitted but no error is raised — the parser simply stops emitting more data.
      # Without a listener, limits are silently reached with no indication to the caller.
      - id: busboy-003
        condition: "form data exceeds configured parts, files, or fields limits"
        throws: "No error — emits 'partsLimit', 'filesLimit', or 'fieldsLimit' event then silently stops"
        required_handling: >
          Caller SHOULD attach listeners for 'partsLimit', 'filesLimit', and 'fieldsLimit'
          events to detect when limits are reached. Without these listeners, the upload
          appears to succeed but data is silently truncated — fields and files beyond the
          limit are never delivered to the 'field' or 'file' handlers. This is especially
          dangerous when limits are set intentionally as a security measure: an attacker
          can send more fields/files than the limit and the overflow is silently dropped
          with no error to the caller.
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js"
          - "https://github.com/mscdex/busboy/issues/287"

      # Evidence: https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js
      # Source confirms: when limits.fileSize is reached, file stream emits 'limit' event
      # and sets stream.truncated = true. The file is silently saved as a partial file
      # unless the caller checks file.truncated after the stream ends.
      - id: busboy-004
        condition: "uploaded file exceeds configured limits.fileSize"
        throws: "No error — emits 'limit' event on the file stream and sets file.truncated = true"
        required_handling: >
          Caller MUST check file.truncated after the file stream ends (in the 'close'
          or 'end' event handler). Without this check, the upload handler saves a partial
          file as if it were complete, silently corrupting stored data. The caller should
          also attach a 'limit' event listener on the file stream to detect the truncation
          in real time and abort the upload (e.g. delete the partial file, return 413).
        severity: error
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high
        evidence_quality: confirmed
        sources:
          - "https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js"
          - "https://www.npmjs.com/package/busboy"

      # Evidence: https://github.com/mscdex/busboy#api (README, file event documentation)
      # Source confirms: "If you listen for this event, you should always consume the stream
      # whether you care about its contents or not... otherwise the 'finish'/'close' event
      # will never fire on the busboy parser stream."
      - id: busboy-005
        condition: "file event listener registered but file stream not consumed"
        throws: "No error — causes stream deadlock; busboy 'close'/'finish' event never fires"
        required_handling: >
          When registering a 'file' event listener on a Busboy instance, the caller MUST
          consume every file stream. Use stream.resume() to discard contents if the file
          is not needed. Failing to consume the stream blocks all further parsing — the
          busboy 'close' event never fires, the request hangs indefinitely, and subsequent
          requests are blocked if using connection pooling. This is a common source of
          upload handler timeouts in production.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: delayed_failure
          visibility: silent
          user_experience: degraded_performance
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://github.com/mscdex/busboy#api"
          - "https://bytearcher.com/articles/terminate-busboy/"

      # Evidence: https://github.com/mscdex/busboy/blob/master/README.md
      # Source confirms: field event info.valueTruncated is true when limits.fieldSize is exceeded.
      # Default fieldSize limit is 1MB (1048576 bytes). The field value is silently truncated
      # without any error or event — the field 'info.valueTruncated' flag is the only signal.
      - id: busboy-006
        condition: "field value exceeds limits.fieldSize (default 1MB) without checking info.valueTruncated"
        throws: "No error — field event fires with truncated value and info.valueTruncated = true"
        required_handling: >
          When handling the 'field' event, the caller SHOULD check info.valueTruncated to detect
          silently truncated field values. The default limit is 1MB (1048576 bytes) which can
          be easily exceeded by textarea inputs, JSON blobs, or base64-encoded data submitted
          as form fields. Busboy does not emit any error or event when fieldSize is exceeded —
          the truncated value is delivered to the 'field' callback as if it were complete.
          Applications that store field values without checking info.valueTruncated will
          silently persist corrupt, incomplete data to their database.
        severity: warning
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://github.com/mscdex/busboy#api"
          - "https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js"

      # Evidence: https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js
      # Source confirms: _final() calls checkEndState() which returns Error('Unexpected end of form')
      # when this._complete is false (boundary terminator never received). Also: when a file stream
      # is still active at cleanup, fileStream.destroy(new Error('Unexpected end of file')) is called.
      # Both cause the 'error' event to be emitted on the busboy stream.
      # GitHub issue #171 confirms this is the most common production error pattern.
      - id: busboy-007
        condition: "client disconnects or aborts upload before multipart data is fully received"
        throws: "Error emitted via 'error' event: 'Unexpected end of form' or 'Unexpected end of file'"
        required_handling: >
          Caller MUST attach an 'error' event listener to the Busboy instance (covered by busboy-001)
          AND should handle the specific 'Unexpected end of form' and 'Unexpected end of file' error
          messages gracefully. These errors occur when:
          (1) the client drops the connection mid-upload (mobile network switch, browser tab closed),
          (2) a proxy or load balancer times out the request body,
          (3) the multipart data is malformed and missing the final boundary terminator.
          Without an error listener, Node.js throws an unhandled error event crashing the server.
          With a listener, the handler should clean up any partially-written files and return 400/499.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        evidence_quality: confirmed
        sources:
          - "https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js"
          - "https://github.com/mscdex/busboy/issues/171"
          - "https://github.com/mscdex/busboy/issues/44"

      # Evidence: https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js (line 232)
      # Source confirms: Multipart constructor throws 'Multipart: Boundary not found' synchronously
      # when the Content-Type header is 'multipart/form-data' but has no 'boundary' parameter.
      # This is distinct from busboy-002 which covers the outer validation (missing Content-Type,
      # malformed content type, unsupported type). This error fires after the outer check passes
      # (valid multipart/form-data content type is present) but the boundary is absent.
      # Reproduces with: Content-Type: multipart/form-data (no ;boundary=...)
      - id: busboy-008
        condition: "Content-Type is multipart/form-data but boundary parameter is missing"
        throws: "Error (synchronous throw): 'Multipart: Boundary not found'"
        required_handling: >
          Caller MUST wrap busboy() constructor in try/catch (see busboy-002) to also catch this
          specific throw. This error occurs when a client sends 'Content-Type: multipart/form-data'
          without the required ';boundary=<token>' parameter. This can happen with:
          (1) programmatic HTTP clients that set the Content-Type manually without generating a boundary,
          (2) curl requests where --form sets the boundary but manual -H 'Content-Type: ...' overrides it,
          (3) proxies or middleware that strip or rewrite Content-Type headers.
          The try/catch from busboy-002 is sufficient to catch this — no separate handler needed.
          Returning HTTP 400 is the correct response.
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - "https://github.com/mscdex/busboy/blob/master/lib/types/multipart.js"
          - "https://github.com/mscdex/busboy/issues/140"

      # Evidence: https://github.com/mscdex/busboy/blob/master/README.md
      # Source confirms: field event info.nameTruncated is true when limits.fieldNameSize (default 100 bytes)
      # is exceeded. Like valueTruncated, this is silent — no error, no separate event.
      # The field name is silently truncated to 100 bytes in the emitted 'field' callback.
      - id: busboy-009
        condition: "form field name exceeds limits.fieldNameSize (default 100 bytes) without checking info.nameTruncated"
        throws: "No error — field event fires with truncated name and info.nameTruncated = true"
        required_handling: >
          When handling the 'field' event, the caller SHOULD check info.nameTruncated to detect
          truncated field names. The default limit is 100 bytes. While most static form field
          names are short and will never hit this limit, dynamic field names from JSON→FormData
          conversions or array-style field names (e.g. 'items[0][metadata][description]') can
          exceed 100 bytes. A truncated field name will silently mismatch the application's
          expected field name, causing the data to be silently ignored or stored under an
          unexpected key.
        severity: info
        business_impact:
          incident_label: DATA_LOSS
          production_behavior: silent_failure
          visibility: silent
          user_experience: lost_data
          incident_cost_range: low
        evidence_quality: confirmed
        sources:
          - "https://github.com/mscdex/busboy#api"
          - "https://github.com/mscdex/busboy/blob/master/lib/types/urlencoded.js"