package: pusher
semver: "^5.0.0"
contract_version: "1.1.0"
maintainer: "corpus-team"
last_verified: "2026-06-24"
coverage_status: covered
status: production
evidence_quality: confirmed
coverage_score: 1.0  # 6 contracted / 6 async-callable (3 sync methods omitted; trigger() now covers encrypted-channel guards added 2026-06-24)

functions:
  - name: trigger
    import_path: "pusher"
    description: >
      Triggers one or more real-time events on specified Pusher channel(s).
      The most common server-side Pusher call — used after DB writes to push
      live updates to connected clients. Returns a Promise that rejects on
      API failures, network errors, or rate limits.

    postconditions:
      - id: api-error
        maturity: stable
        condition: >
          Any API or network failure: authentication error (401/403), rate limit (429),
          invalid app configuration (400), server error (5xx), network timeout, or
          connection failure
        throws: >
          Pusher.RequestError with properties: status (HTTP code or undefined for network),
          error (underlying Error for network failures), body (API response text), url (request URL).
          Common cases: 403 for bad credentials, 429 for rate limit, 5xx for Pusher outage.
        required_handling: >
          Caller MUST wrap in try-catch. pusher.trigger() rejects on all API and network
          failures — there is no auto-retry. Unhandled rejections crash Node.js workers or
          produce silent data loss in async route handlers.

          Minimum handling:
            try {
              await pusher.trigger(channel, event, data);
            } catch (err) {
              if (err instanceof Pusher.RequestError) {
                console.error('Pusher trigger failed:', err.status, err.body);
              }
              throw err;
            }

          For fire-and-forget patterns (where trigger is a side effect), at minimum log the
          error rather than silently dropping it:
            pusher.trigger(channel, event, data).catch(err => console.error('Pusher failed:', err));
        sources:
          - "https://github.com/pusher/pusher-http-node#error-handling"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

      # Evidence: lib/events.js exports.trigger lines 36-44 — throws synchronously when
      # channels.length > 1 AND any channel name starts with `private-encrypted-`.
      # Pusher end-to-end encryption only supports single-channel triggers; multi-channel
      # encrypted broadcasts are not allowed. Confirmed in pusher@5.3.4.
      - id: trigger-encrypted-multi-channel-error
        maturity: stable
        condition: >
          Calling trigger() with an array of channels where any channel name starts
          with `private-encrypted-` (E2E encrypted channel) and channels.length > 1.
          Encrypted channels can only be triggered one at a time.
        throws: >
          Plain Error: "You cannot trigger to multiple channels when using encrypted channels".
          Thrown synchronously inside the returned Promise body before any HTTP request —
          a try-catch around `await pusher.trigger(...)` catches it as a rejected Promise.
        required_handling: >
          Caller MUST handle this error path when triggering across multiple channels with
          mixed channel types. Either pre-filter encrypted channels and call trigger() per
          channel for those, or document the constraint in the calling layer.

            try {
              await pusher.trigger(channels, event, data);
            } catch (err) {
              if (err.message.includes('encrypted channels')) {
                for (const ch of channels) {
                  await pusher.trigger(ch, event, data);
                }
              }
              throw err;
            }

          Bypassing this error means the original event silently never sends — a real-time
          data loss bug masked as a rejected Promise.
        sources:
          - "https://github.com/pusher/pusher-http-node/blob/master/lib/events.js#L36-L44"
          - "https://pusher.com/docs/channels/using_channels/encrypted-channels/"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: medium

      # Evidence: lib/events.js encrypt() lines 6-10 — throws synchronously when an encrypted
      # channel is triggered without `encryptionMasterKeyBase64` set in Pusher constructor opts.
      # Pre-validation path before any HTTP call. Confirmed in pusher@5.3.4.
      - id: trigger-encryption-master-key-missing
        maturity: stable
        condition: >
          Calling trigger() on a `private-encrypted-` channel when the Pusher client was
          constructed without `encryptionMasterKeyBase64`. The library has no fallback —
          E2E encryption requires a master key, and absence is treated as a programming error.
        throws: >
          Plain Error: "Set encryptionMasterKey before triggering events on encrypted channels".
          Thrown synchronously from encrypt() during the trigger() call body. Rejects the
          returned Promise — visible to a try-catch around `await pusher.trigger(...)`.
        required_handling: >
          Caller MUST configure encryptionMasterKeyBase64 in the Pusher() constructor when
          any encrypted channel will be triggered. This is a setup-time invariant — failing
          here means the entire encrypted-channel feature is broken at runtime.

            const pusher = new Pusher({
              appId, key, secret, cluster,
              encryptionMasterKeyBase64: process.env.PUSHER_ENCRYPTION_KEY,
            });
            try {
              await pusher.trigger('private-encrypted-room', 'msg', payload);
            } catch (err) {
              if (err.message.includes('encryptionMasterKey')) {
                console.error('Pusher encrypted-channel setup error — check config');
              }
              throw err;
            }

          Without handling, encrypted-channel events silently fail every time, leaving
          end-to-end encrypted UX broken across the entire deployment.
        sources:
          - "https://github.com/pusher/pusher-http-node/blob/master/lib/events.js#L6-L10"
          - "https://pusher.com/docs/channels/using_channels/encrypted-channels/#how-it-works"
        severity: error
        business_impact:
          incident_label: SECURITY_RISK
          production_behavior: immediate_exception
          visibility: silent
          user_experience: lost_data
          incident_cost_range: high

  - name: triggerBatch
    import_path: "pusher"
    description: >
      Triggers up to 10 events in a single Pusher API request. Used for efficiency
      when multiple channels or events need updating simultaneously. Rejects with
      RequestError on any failure — all events in the batch fail together.

    postconditions:
      - id: api-error
        maturity: stable
        condition: >
          Any API or network failure, including rate limit (429), auth error, server
          error, or network failure. Batch max of 10 events — exceeding it throws
          before any network call.
        throws: >
          Pusher.RequestError (same as trigger) for API/network failures.
          Plain Error for exceeding batch size limit or invalid event structure.
        required_handling: >
          Caller MUST wrap in try-catch. A batch failure means ALL events in the
          batch were not delivered — callers should handle this atomically.

          try {
            await pusher.triggerBatch(events);
          } catch (err) {
            if (err instanceof Pusher.RequestError) {
              // All events failed — consider retry or fallback
            }
            throw err;
          }
        sources:
          - "https://github.com/pusher/pusher-http-node#triggering-events"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: sendToUser
    import_path: "pusher"
    description: >
      Sends a real-time event to a specific authenticated user by their user ID.
      Used with Pusher's user authentication feature (requires authenticateUser
      on the client). Rejects with RequestError on failure.

    postconditions:
      - id: api-error
        maturity: stable
        condition: >
          Any API or network failure: invalid user ID format, auth error, server error,
          network failure, or rate limit
        throws: >
          Pusher.RequestError for API/network failures.
          Plain Error for invalid userId (empty string, non-string value).
        required_handling: >
          Caller MUST wrap in try-catch. User notification failures should be handled
          gracefully — the primary action (DB write) may have succeeded even if the
          real-time notification fails.

          try {
            await pusher.sendToUser(userId, event, data);
          } catch (err) {
            if (err instanceof Pusher.RequestError) {
              console.error('Failed to notify user:', userId, err.status);
            }
            // Don't re-throw if notification failure should not abort the operation
          }
        sources:
          - "https://github.com/pusher/pusher-http-node#sending-events-to-users"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium

  - name: terminateUserConnections
    import_path: "pusher"
    description: >
      Terminates all active WebSocket connections for a specific authenticated user.
      Used in ban, logout, or revocation flows where a user must be immediately
      disconnected from Pusher channels. The termination ends current connections
      only — the user can reconnect unless their authentication endpoint is also
      blocked. Returns a Promise that rejects with Pusher.RequestError on failure.

    postconditions:
      # Evidence: https://pusher.com/docs/channels/server_api/terminating-user-connections/
      # Source confirmed: lib/pusher.js validates userId then calls this.post()
      # post() calls requests.send() which wraps all HTTP 4xx/5xx in Pusher.RequestError
      - id: terminate-api-error
        maturity: stable
        condition: >
          Any API or network failure: authentication error (401/403 from Pusher API),
          server error (5xx), network timeout, or connection failure. Also throws
          synchronous plain Error for empty or non-string userId before any HTTP call.
        throws: >
          Pusher.RequestError for API/network failures (status, body, url properties).
          Plain Error ("Invalid user id: '...'") for empty string or non-string userId —
          thrown synchronously before any network request.
        required_handling: >
          Caller MUST wrap in try-catch. terminateUserConnections() is typically called in
          ban/kick flows after a DB write. If the call fails (Pusher outage, auth error),
          the user may remain connected despite being banned in the database — a security gap.

          try {
            await pusher.terminateUserConnections(userId);
          } catch (err) {
            if (err instanceof Pusher.RequestError) {
              // Log and consider queuing for retry — user may still be connected
              console.error('Failed to terminate connections for', userId, err.status);
              await scheduleRetry(userId);
            }
            throw err;
          }

          Important: terminateUserConnections() disconnects existing sessions but does NOT
          prevent reconnection. Pair with blocking the user's authentication endpoint.
        sources:
          - "https://pusher.com/docs/channels/server_api/terminating-user-connections/"
          - "https://github.com/pusher/pusher-http-node/blob/master/lib/pusher.js#L175"
        severity: error
        business_impact:
          incident_label: SILENT_FAILURE
          production_behavior: immediate_exception
          visibility: silent
          user_experience: security_breach
          incident_cost_range: high

  - name: get
    import_path: "pusher"
    description: >
      Makes an authenticated GET request to the Pusher REST API. Used to query
      channel state: occupied channels, user counts on presence channels, or
      users subscribed to a channel. Lower-level than trigger() — requires
      constructing the path and params manually.

    postconditions:
      # Evidence: https://pusher.com/docs/channels/library_auth_reference/rest-api/
      # Source confirmed: lib/pusher.js get() → requests.send() → throws RequestError on status >= 400
      # HTTP 400 for invalid attribute (e.g. user_count on non-presence channel)
      # HTTP 401 for auth failure, 403 for disabled app or quota exceeded
      - id: get-api-error
        maturity: stable
        condition: >
          Any API or network failure: authentication error (401), forbidden (403, app disabled
          or quota exceeded), bad request (400, e.g. requesting user_count on non-presence
          channel), server error (5xx), or network failure/timeout.
        throws: >
          Pusher.RequestError with status (HTTP code), body (API error text), url (request URL).
          Plain Error thrown synchronously if reserved param keys (auth_key, auth_timestamp,
          auth_version, auth_signature, body_md5) are included in params — throws before any
          network request.
        required_handling: >
          Caller MUST wrap in try-catch. get() is typically used to fetch presence channel
          data or verify channel state before performing an action. A 400 from requesting
          user_count on a non-presence channel is a programming error; 401/403 indicate
          misconfigured credentials.

          try {
            const response = await pusher.get({ path: '/channels', params: { filter_by_prefix: 'presence-', info: 'user_count' } });
            if (response.status === 200) {
              const body = await response.json();
              // use body.channels
            }
          } catch (err) {
            if (err instanceof Pusher.RequestError) {
              if (err.status === 400) {
                // Invalid params — likely programming error (e.g., user_count on public channel)
              }
              console.error('Pusher GET failed:', err.status, err.body);
            }
            throw err;
          }
        sources:
          - "https://pusher.com/docs/channels/library_auth_reference/rest-api/#get-channels-fetch-info-for-multiple-channels"
          - "https://github.com/pusher/pusher-http-node/blob/master/lib/requests.js"
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

  - name: post
    import_path: "pusher"
    description: >
      Makes an authenticated POST request to the Pusher REST API. Low-level method
      used internally by terminateUserConnections() and other SDK methods. Rarely
      called directly by application code — most operations should use the higher-level
      trigger(), triggerBatch(), or sendToUser() methods.

    postconditions:
      # Evidence: lib/pusher.js post() → requests.send() → throws RequestError on status >= 400
      # Same error path as get() — both call requests.send()
      # Reserved param key guard throws synchronously before network call
      - id: post-api-error
        maturity: stable
        condition: >
          Any API or network failure: authentication error (401/403), bad request (400),
          payload too large (413, event data exceeds 10KB limit), server error (5xx),
          or network failure. Throws synchronously for reserved param keys in params.
        throws: >
          Pusher.RequestError for all HTTP 4xx/5xx responses and network errors.
          Plain Error synchronously for reserved params (auth_key, auth_timestamp, etc.)
          before any network call. Note: HTTP 413 is returned when event data exceeds
          the 10KB Pusher payload limit — relevant when posting custom event payloads.
        required_handling: >
          Caller MUST wrap in try-catch. post() is most commonly called indirectly via
          terminateUserConnections() — see that function's error handling guidance.
          If calling post() directly, validate path correctness and payload size first.

          try {
            const response = await pusher.post({ path: '/events', body: JSON.stringify(payload) });
          } catch (err) {
            if (err instanceof Pusher.RequestError) {
              if (err.status === 413) {
                // Payload too large — split or compress
              }
              console.error('Pusher POST failed:', err.status, err.body);
            }
            throw err;
          }
        sources:
          - "https://pusher.com/docs/channels/library_auth_reference/rest-api/"
          - "https://github.com/pusher/pusher-http-node/blob/master/lib/requests.js"
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: low

metadata:
  last_verified: "2026-06-24"
  evidence_quality: confirmed
  coverage_score: 1.0  # 6 contracted / 6 async-callable; trigger() deepened with 2 encrypted-channel postconditions on 2026-06-24 (pusher@5.3.4 surface re-verified)

notes:
  - "pusher uses its own RequestError class (not a standard Error subclass) — check instanceof Pusher.RequestError"
  - "err.status is the HTTP status code (401=auth, 403=disabled/quota, 429=rate limit, 413=payload too large) or undefined for network errors"
  - "err.body contains the raw Pusher API response body — useful for debugging"
  - "No auto-retry — every failure immediately rejects the Promise"
  - "trigger() accepts string or string[] for channel — up to 100 channels per call"
  - "triggerBatch() max 10 events per request — exceeding throws synchronously"
  - "Default: no timeout configured — network hangs can block workers indefinitely"
  - "sendToUser() requires client-side user authentication (pusher-js authenticateUser)"
  - "RequestError and WebHookError properly exported as TypeScript types since v5.3.2"
  - "terminateUserConnections() disconnects current sessions only — pair with blocking auth endpoint to prevent reconnection"
  - "get() HTTP 400 for invalid attribute on wrong channel type (e.g. user_count on non-presence channel)"
  - "post() HTTP 413 when event payload exceeds 10KB Pusher limit"
  - "trigger() throws sync plain Error when triggering >1 channel where any is `private-encrypted-` — E2E encryption forbids multi-channel"
  - "trigger() throws sync plain Error when `encryptionMasterKeyBase64` is missing from Pusher() opts and an encrypted channel is targeted"
