package: express-session
semver: '>=1.17.0 <2.0.0'
contract_version: 1.0.0
maintainer: corpus-team
last_verified: '2026-04-02'
status: production
evidence_quality: confirmed
functions:
  - name: session
    import_path: express-session
    description: >
      Creates Express session middleware that manages server-side sessions with a signed session ID cookie. The secret
      option is required. Returns a middleware function. By default uses MemoryStore, which is not suitable for
      production.
    preconditions:
      - id: secret-required
        description: The secret option is required. It is used to sign the session ID cookie via HMAC-SHA256.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
    postconditions:
      - id: missing-secret
        condition: session() is called without a secret option
        throws: 'TypeError: secret option required for sessions'
        required_handling: >
          Caller MUST provide a secret string or array of strings. This is a startup-time configuration error — the
          middleware will throw synchronously and the Express app will fail to start.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: store-error
        condition: The session store emits an error (e.g., Redis connection failure, store.get/set/destroy fails)
        throws: Error — forwarded to Express error handler via next(err)
        required_handling: >
          Application MUST register an Express error handler (4-argument middleware) to handle store errors. Without it,
          store failures will cause unhandled errors or 500 responses. Consider using store's reconnect/retry logic to
          handle transient failures.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: error
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: session-not-saved-without-changes
        condition: 'Session data is not modified during the request and saveUninitialized: false is set'
        returns: Session is not saved to the store. No Set-Cookie header is sent.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
      - id: success
        condition: Session middleware initializes or resumes a session successfully
        returns: req.session is populated with session data. req.session.id and req.session.cookie are set.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
        required_handling: No action required — use the returned value as needed.
    edge_cases:
      - id: memory-store-production
        description: >-
          The default MemoryStore is not designed for production: it leaks memory, does not scale past a single process,
          and will lose all sessions on restart. Use a persistent store (connect-redis, connect-pg-simple, etc.) in
          production.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: cookie-secure-https-only
        description: >-
          Setting cookie.secure: true causes the session cookie to only be sent over HTTPS. If your app runs behind a
          reverse proxy, you MUST set app.set('trust proxy', 1) otherwise req.secure will be false and the session
          cookie will never be sent.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: cookie-http-only
        description: >-
          cookie.httpOnly defaults to true, preventing client-side JavaScript from accessing the session cookie. Setting
          it to false exposes the session ID to XSS attacks.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: session-fixation
        description: >-
          Call req.session.regenerate() after a successful login to prevent session fixation attacks. The session ID
          must be rotated on privilege escalation.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: warning
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
      - id: resave-option
        description: >-
          The resave option controls whether sessions are re-saved to the store even if unmodified. The default value is
          deprecated. Explicitly set resave: false for stores that support the touch method, or resave: true for stores
          that do not.
        sources:
          - https://github.com/expressjs/session/blob/master/README.md
        severity: info
        business_impact:
          incident_label: DOWNTIME
          production_behavior: immediate_exception
          visibility: visible
          user_experience: service_unavailable
          incident_cost_range: medium
