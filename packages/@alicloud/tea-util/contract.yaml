package: "@alicloud/tea-util"
semver: ">=0.0.0"
contract_version: "1.0.0"
maintainer: "nark-sh"
last_verified: "2026-06-11"
coverage_status: "no-async-contract"
researched_at: "2026-06-11"
coverage_rationale: |
  Code-generation utility consumed by autogenerated Alibaba Cloud SDK clients.
  The default export `Client` exposes mostly synchronous static helpers
  (parseJSON, toJSONString, defaultString/Number, getNonce, is2xx/3xx/4xx/5xx,
  stringifyMapValue, etc.) plus three thin stream helpers
  (readAsBytes/readAsString/readAsJSON) and `sleep`. The re-exported
  `RuntimeOptions` is a property-bag class — instantiation never throws.

  Real-world TypeScript callsites (verified against labring/sealos,
  buxuku/SmartSub, drl990114/MarkFlowy on 2026-06-11) use this package
  exclusively for `new $Util.RuntimeOptions({})` and pass the result to
  another SDK's *WithOptions method. None of the async methods
  (readAsBytes/readAsString/readAsJSON/sleep) are exercised by app code —
  they exist to be called by autogenerated SDK code, not by developers.

  The error contract that callers actually need lives on the calling SDK
  (e.g., @alicloud/dysmsapi20170525.sendSmsWithOptions, which throws
  UnretryableError / ResponseError per the Alibaba Cloud Node.js SDK
  exception-handling guide). That responsibility belongs to those SDK
  packages, not to tea-util.

  Synchronous assertAs* methods and parseJSON do throw, but synchronous
  error handling is out of scope for nark's current analyzer.
